body:
  text: 欽定四庫全書欽定南巡盛典卷二十天章甲辰江南詩入江南境甫過三載復行春為戀民情望幸純踰古稀人應簡出趁今健體一來巡當年壯者多成老此日觀之益覺親却喜疆臣知我意不教綴景競竒新六依皇祖示江南大小諸吏韻皇祖六巡南聖量包山棷入疆詩示吏要義微言剖我每敬賡韻崇謨服膺久仲春日已良駐蹕頓之首載咨爾諸吏孰非民父母可有泣向隅可有萎棲畝斯皆爾我責瞻前莫忘後民艱不可忽官針要當守有來瞻覲民千百以為友老扶幼者挈馬前祝萬夀忍弗懷保之無逸言敢負龍泉莊行館即事江南兹首頓行館面平蕪綴景休煩飾朴風斯可娛官方體召見民隱訪嗟吁林下老臣覲健談情懇吾題行春堂疊庚子詩韻行春豈是漫行春實政應教被萬民減賦蠲逋施次第小亷大法最躬親諺曽聞夏休而助易首稱周元即仁三歲重來當仲月電光石火迅誠真降旨免江省積欠詩以志事三年積欠逾百萬自庚子南巡蠲免江省積欠後甫越三年兹入疆伊始周咨民隱江寧藩司所屬又有未完地丁漕項等銀三十六萬七千五百兩零民借籽種等銀十五萬一千九百兩零米麥豆十八萬九千七百石零蘇州藩司所屬未完地丁漕項銀四萬五百兩零民借籽種銀一千二百兩零米豆三萬八千九百石零安徽藩司所屬未完地丁等銀三十七萬三千二百兩零民借籽種銀六萬一千九百兩零漕項銀八萬三千一百六十兩零米麥豆六萬五千七百石零合計銀米共一百三十餘萬並降旨蠲免重矣民艱憐不遑豈是正供逋有意都緣借項迫無償江省未完積欠各屬如江寧之淮徐等處安徽之廬鳯頴泗等處均因災歉之餘致未完地丁漕項民借籽種口糧等項為數較多蘇州藩司所屬多獲有收是以積欠較少追呼忍更施窮巷蠲逭因教副省方雨雪早聞春澤好據薩載閔鶚元奏江寧江蘇徐州等處於正月初九初十十一等日得雪自七八寸至盈尺不等又據育竒李奉翰等奏清河桃源等處於正月草六七日得雨五六寸春膏優渥麥收可卜豐稔同民樂實沐穹蒼賜兩江總督薩載節度江南歷多歲練於吏治悉河工惟應益慎勤諸事勿以已知懈一躬不患士文武莫弛欲求民裕儉當崇久而敬者晏平仲潔矩為師爾我同賜江蘇巡撫閔鶚元暫降頭銜旋賜復蹕途迎謁拜恩榮詎云為隱在父子實不相同乃弟兄閔鶚元前因其弟閔鵷元在甘省知縣任內揑災冒賑閔鶚元不能先事教誡又不舉奏是以降為三品頂帶以示薄罰旋豫開復云薄罰聊因明國法取長仍以悉民情民情亦豈易言悉恆念其艱戒滿盈駱馬湖濟運應於節泄湖又在宣此湖承微山諸湖下遊常年藉以濟運而諸湖盛漲之年又資以宣泄辛丑青龍岡漫口未合龍時曽降旨令薩載等亟籌去路據奏先將駱馬湖竹簍閘開放其餘各閘壩次第啓放泄水由劉老澗下注六塘河歸海由是盛漲得以暢泄節宣胥要矣宵旰每厪焉幸得大河復早疏下口便六塘河為此湖下口昨歲癸卯河復後幸下口疏剔已暢微山湖消水已符舊志較之丁丑孫家集漫口合龍積水至兩年始行消盡者情形逈别然又恐分泄太過因將臨湖各閘壩次第堵閉收蓄水勢以濟今年重運今過喜無事永逸敢云然度永濟橋四疊前韻作歌澤國陸路行逶迤漸南野甸時見水水多可識近江河疏導宣防由此起丁丑逮今草七年永濟橋之水下注為六塘河歸海向多淤埂丁丑南巡時經臨籌度命大學士劉統勳等履勘濬培添建閘壩禁民侵占逮今已草七年矣往來經必慎勘視初惟六塘㵼夏潦俾之東注滄瀛裏辛丑此乃有大賴微湖漲泄實資爾初駱馬湖之水由永濟橋東注入六塘河歸海辛丑因青龍岡漫口未經合龍降旨命薩載等查勘亟籌去路嗣據奏漫水由微山湖下注邳宿桃清運河出楊莊口門歸海並將駱馬湖閘壩次第開放由劉老澗下注六塘河歸海俾來源雖大而去路亦多下口疏剔各工著有成效猶恐六塘不能容救急閘壩權折毁薩載等奏將駱馬湖竹簍閘先行開放其餘各閘壩次第啓放泄水由劉老澗下注六塘河歸海並開挑微山湖下之顧家莊等引渠分泄水勢為一時權宜補救之計幸而運道湖河得保無虞昨歲癸卯春漫口合龍後一切善後條葺閘壩各事宜均勒限趕辦次第完竣悉復舊時規制昨歲癸卯河乃復善後仍要勤修理事定之後益切懼事前之幸那可恃補偏救弊别無能蒿目焦心良有以順河集行館三疊舊作韻登舫惟餘四日程恧行館傍宿遷城雖非擇地為指示究是費財勞搆營暫倚忩紗迎日朗底須盆卉報春榮壬午年乙酉歲庚之子指壁三賡一瞬情過宿遷縣辛丑青龍岡決後泛溢三湖不能納金鄉魚臺之間沙遞澄辛丑青龍岡漫口之水滙歸南陽昭陽微山三湖恐有淤墊屢經馳詢據薩載李奉翰明興等奏漫水經由東省地方蕩漾停淤袤數百里至金鄉魚臺而下水色便已澄清清水漲與運河合薩載等奏又稱漫水入江南沛縣境即全屬清水其微山湖與運河連為一片之處並無黃色沛邑居上受災重洪波直立侵城堞即今水退昏墊蘇計惟遷縣無别法江南沛縣因漫水下注城垣俱被淹浸受災最重上年合龍後河復故道僅能涸出基址欲令永逺安堵不得不酌籌遷移為一勞永逸之計因降旨諭令薩載於沛縣境內履勘髙阜地方另建城垣俾百姓易地安居永無水患隨據薩載等奏請於距舊城西南三十里之戚山地方建立新城該處地勢較舊城計髙五六尺煙户本稠可資鞏固等語因令如所議行宿預實亦臨運河幸而下口分泄捷宿遷雖亦臨運河然下口由楊家莊宣泄僅二百里本屬近便又先經諭令薩載於李家莊新河置壩以資啓閉辛丑秋薩載遵諭並開放李家莊新河由是下遊得分路暢泄水勢平緩宿遷城郭田廬幸保無恙依然城郭民居安然已幾乎危業業去歲雖然薄有收那容易復元氣洽扶老携幼覲光民對之益愧調幕協過仰化集口占老幼黎明日日添馬前輿後任翹瞻林林斯盡仰化者思義顧名意未忺可使由之不可知魯論歲越二千斯如云設教以為化恐致翻成滋擾之按由者率也率由舊章率性之謂道訓已詳焉又由者因也因嚴以教敬因親以教愛則更親切著明可使由之亦如是而已矣若謂聖人之教有不可使民盡知之道吾知其不知聖人也因題此什更申明其説如此題展義齋林家莊行館內展義顔行館循名應有為官方厪省察民隱悉諏咨綴景非所喜朴風應切知載陽春氣動耕種莫稽遲賜隨營王大臣及江南督撫諸吏食詩以志事駐蹕今朝近授餐頓館便隨行胥跋涉共張更勤宣視等頒筐篚開筵侑管絃同稱民弗擾是我意欣然賜江南總河李奉翰南河任久熟經權每助豫工更力宣常近危仍勵汝志前因李奉翰熟悉河務命往豫工堵築青龍岡漫口壬寅四月初十日壩工已挂纜合龍十一日壩工陡蟄李奉翰督率人夫搶救轉身時金門裂縫數尺李奉翰失足跌入被門纜挂住傷胸夫役救護得全大學士阿桂奏到深為憐念兹迎鑾境上因其河工勞績茂著賞給騎都尉世職即令其子鑾儀衛治儀正李慶徵承襲以示優眷不辭勞實致豫憐而今河復雖無事益謹隄防戒有愆兩字官針爾其聽身惟勤與志惟虔賜漕運總督育竒􅔕馬巡漕運恰遭河決危育竒由給事中派出巡漕旋擢內閣學士仍兼巡漕值辛丑青龍岡漫口尚未合龍育竒往來督察漕運無悮因擢為漕運總督贊參頗中要來往不辭疲遂命今職領幸當故道隨幫期速踰月昨歲據育竒奏漕船尾幫於十月二十三日全數渡黃核計各幫回空抵次較常年可早月餘等語所辦甚為妥速儘力更逢時題同和堂君子和不同小人同不和而此云同和或乖聖語麼然吾實有解君道包者多庶民胥小人殊彼邪正科左傳云吾儕小人即指庶民而言非君子小人之小人也昨亦曽著論發明義研磨君子小人其界雖不可不明而其迹則不可不慎唐虞黜陟未嘗謂之為君子小人漢唐宋明門户朋黨之禍延及國家皆其界太明而不慎其迹之所致詳見昨所著君子小人論吾更思之若四凶應誠小人矣然舜惟殛一鯀其三皆不至於死若其不至四凶之甚之小人必更多皆在聖人寬宥之中可知為君之道雖小人未嘗不育之但不假之權而慎其迹耳况此巡方典休助諺無訛日日覲光者踵繼肩相摩忍弗視如子隨路沛恩波麥苖隄外麥苖日日多向南暖潤緑婆婆萬民瞻覲紛蹂躪心既惜之不忍訶隄外麥苖新茁道傍老幼奔走就瞻不免踐踏心實惜之然念其愛戴誠殷不忍加以訶斥也賜江蘇學政謝墉江浙均為文物鄉非鴻博此任難當雖然尚藻豈其韙必也窮經以是蘉雅正清真兹已鮮抹塗勦襲亦應防士風淳則民風順敦化寧云虛設庠題融春齋融春前歲駐原在桂家莊即近李家莊新運口新乃不如舊李停仍就楊桂家莊行館向近李家莊新開運口因漕艘商船皆願行楊家莊中河舊口李家莊新運口仍置壩不過為疏泄盛漲之用因命移建行館於楊家莊就近之處較前更為近便因之徙行館聊以憩書堂明日清江浦言登安福航安福艫歷年所御南巡舟名閲中河楊莊口皇祖六巡來往過楊莊定制乃無頗利聞不百不變法言貴用中用戒訛先是運道由清河縣之上仲莊閘出口形勢未順有助黃灌清之患康熙四十二年閘十皇祖南巡指示形勢命于楊莊改挑運口距仲莊餘里在清黃交會下遊地勢順利舟行稱便蓋由實為聖謨獨斷酌中定制萬世永賴也漕舸弗從新口渡商船原就舊川多惟教置壩消淫潦却藉微湖減漲波自康熙年間移改楊莊運口後數十年來漕艘商船遄行利便嗣髙晉請移中河口于下遊之李家莊以避黃河橫衝抵溜之險續經薩載以為楊莊河流暢出應循其舊上屆親蒞履勘以李莊挑河已成功不可廢諭令薩載于李莊新運口置壩啓閉以為疏泄盛漲之用至辛丑青龍岡漫口下注微山等湖之水滙入中河宣泄不及即諭令薩載開放李莊新河口由是微湖之水得藉此分路暢泄于調濟實為有益而李家莊運口亦不為虛棄也楊莊閘六依皇祖詩韻河務都經聖訓餘嘉謨千載利淮徐叮嚀大吏無多語慎守章程莫懈踈議河自昔若棼絲定志猶應堅不移燭理弗明設固執其為害大亦當知李家莊新河口志事疊庚子詩韻髙晉昔議謂楊莊河阻之往年髙晉謂楊家莊中河口有黃河沙阻請另開運口于李家莊為避阻就夷之計李莊開運口避黃應下移所費殊不多來往路就夷利商及漕運隄壩工作施然而細體察待之以歲時衆仍走楊莊新口行遲遲移改李家莊運口雖為避黃河之沙阻俾漕運商船得以往來便利起見然衆弗以為便及詢問薩載移改中河之事據稱楊家莊現在河流暢出蓋移改李家莊乃髙晉一人之見未嘗詢謀僉同也庚子躬履勘情形更悉知爰命仍舊貫舊口原甚宜新口堅築壩以待泄漲為而竟得其用泄漲兩路費庚子春南巡親行履勘楊莊河口原可仍其舊然中河設遇夏秋異漲由此李家莊新河分泄出口亦為有益因諭令薩載置壩以資啓閉前歲黃河衝決微山等湖泛湖中河不能容因命薩載將李家莊口門開放分流由是中河下遊得分路出水勢漸平緩而往來船隻仍由楊莊出入云凡事豫則立居髙恆念卑渡河有作昨日有風息夜半宵隂未雨霽晨清拈香綵幕虔致敬二月草二日自楊家莊行宫啓蹕渡黃河例設綵棚拈香瞻禮河神開棹蘭舟穩渡平蒙佑匪今益豫懼相親自昔篤民情回看西北雲容重澤霈豫齊庶利耕江南境上春澤已霑此時不雨尚可山東河南及直𨽻之河間景州等迤南府州各屬望澤較殷兹西北一帶雲氣濃厚庶兾膏澤普霑利我春耕也陶莊河神廟瞻禮疊庚子詩韻瀆宗丁酉徙陶莊清口從兹弗患黃向來清口每虞黃水倒灌自康熙已卯春西隔皇祖南巡蒞視即黃使命河臣董安國於清口迤岸桃陶莊引河導北因開放過早旋復淤墊其後庚辰辛巳壬辰甲午以及雍正庚戌歷漾非命大臣及河臣籌勘挑辦功迄未就朕以黃水倒開陶莊引河更無善䇿因命薩載詳細履勘隨繪圖貼説奏聞復于圖內往返指示自丙申秋興工至丁酉仲春工蕆開放引河溜勢暢逹河成命建河神廟以答神佑詳見御製碑記爰敬河干修廟侐永祈神佑福民長更疏北岸防沙逼仍葺南隄挑水障庚子三月阿桂于豫工合龍後至行在復命因令會同薩載查勘北岸陶莊新河據奏新河兩頭已寬至九十丈其中假僅寬六十餘丈請于北岸再開寬四十丈俾一律深通伏秋大汛暢注下逹其陶莊南岸木龍復經指示改建三架以期刷沙挑溜均為有益是日齋心謁靈宇先春額手肅清薌合龍庚子嵗叨殊宥庚子南巡于二月初十日渡黃時展謁陶莊行河神廟竭誠默禱旋據阿桂奏十一日兩壩自合龍黃河順歸故道之事及阿桂來行在細詢情形具奏二月十一日儀封漫口未合龍以前金門尚濶三丈水深十一丈餘至午時忽報南壩沉墜驚往勘視則南壩掃根全勢移走陡與北壩接連爾時見機有可乘隨趕緊填壓不三四刻立見斷流兩載勤劬收功片刻實由河神默相非人力所能到也復舊癸卯年荷篤慶儀封青龍岡漫口屢經堵築未就因命阿桂於上遊南岸相度為改絃更張之計隨據奏請在蘭陽至商邱一帶添築大隄開挑引河昨春正月復命阿桂前往于三月初一日督同開放引河奔騰掣溜暢注故道至十四日斷流金門合龍一舉蕆工實荷神庥默佑宣導無能頻賴惠曰虔曰悚兩增遑閲木龍再疊乙酉韻示總督薩載總河李奉翰架木為龍往歲成清口木龍自前河臣高斌於乾隆五年奏請在南岸御壩迤下建設木龍四架挑溜護灘甚為得力圖於清口禦侵清河流期永北岸順沙刷仍應南壩營木龍之設原以挑溜挂淤俾扺禦黃水不使侵入清口自乾隆四十二年陶莊新河既成黃水直北趨下不復有倒漾灌清之慮薩載又奏于陶莊新河峙家莊南岸移建木龍三架添建挑水壩一道以期挑溜北趨亦因時制宜之計也咨度無非萬民計周防常切一心驚天工人代垂明訓責在君臣共朂誠觀清口出水志三疊舊作韻昔年清敵黃所慮黃灌壅後乃改陶莊各行向東送昔年清口蓄清敵黃惟虞黃水倒灌自丁酉春移改陶莊新河溜勢暢逹東注去清口較昔逺五里于是永免倒灌之患清口惟出清益易為蓄縱自從定水志向來河臣率皆靳拆清口其東西兩壩雖稱蓄清敵黃隨時拆築然司事者總不肯大擴清口恐干多費工料之議自壬午年三次南巡親臨相度始定清口出水志惟微費柴葑下河免昏墊所全利實重五壩率未開幸免為壑供三巡來往兹殷殷念民痛熟籌乃定議自任斷聚訟前此河臣不肯拆清口惟啓五壩以泄洪湖盛漲下河一帶蓋無歲不被偏災自壬午年酌定以髙堰五壩水志髙一尺清口即開放十丈為凖俟秋汛後洪湖水勢既定仍如常接鑲口門河臣等恪守此法數十年來下河不受水患田廬頗資利益河臣守此法先事防而用所以數十年洪湖預留空幸在護民田肯詡言之中其間惟戊戌河決南岸動洚流入洪湖鯨波甚濞洶清口雖大拆瀚灝勢猶衆乃一開五壩燃眉救愁偬惟戊戌年豫省漫口之水入賈魯河由睢河渦河滙歸洪澤湖水勢陡長雖大開清口兩壩尚宣泄不及因諭令薩載等于五壩留心預籌尋據奏清水勢大以次開放五壩仍命先期申諭吏民為之以漸不致潰溢為患幸其時下河早禾已經刈穫未成大災然可一不可再也次第先諭民無告免申控可一不可再慙吾善經綜蒿目切民艱翕河漫虛頌閲河六依皇祖詩韻閲河往返六經營行所無行仰聖行救弊補偏亦何藉拳拳惟慎守其成惠濟祠河宗穩渡紫霞舟巍煥靈祠見舉頭五載一巡瞻廟貌民安物阜仰前猷清南黃北居中奠平地成天永世庥曰感曰欽念何已穹碑七字又教留清江浦緩御輕輿駐水營明當安福安福艫御舟名啓行程吳江浙海胥厪意問俗觀風敢懈情棨戟扼津慎守禦總河衙門建於此閭閻撲地計寧盈陶莊改後黃逾逺此日清江果是清慈雲寺瞻禮疊庚子詩韻玉林建寺碧雲濆慈雲寺為順治年間僧人玉林所住小菴雍正甲寅皇考命淮關監督建造遂成大叢林令其賜額曰慈雲寺追封玉林為國師仍派下承接云皇考重修題額文當日檀那在提唱至今苾侣孰殷勤徒因路便逰而涉却以昔緣戚弗欣茲寺慈寧皇考賜額每此經臨俱恭奉瞻禮回憶昔巡祇增感切是以庚子詩有已是拊膺思昔日那堪翹首望慈雲之句屺岵並瞻切悲念金剛徒憶曰如雲世通行者金剛六如為鳩摩羅什所譯夢幻泡影露電梵經留支所譯又有九如如雲如星如翳如燈四者合前夢幻泡露電為九如而無如影之支閲老壩老壩本土築辛未命改石老壩舊係土築辛未南巡命河臣髙斌等勘估易以石工癸酉幸免患甲午終致厄自老壩改建石工後節年保護鞏固癸酉年河淮並漲淮安幸得免患至甲午秋外河南岸老壩口隄工漫溢大溜全注決口板閘淮安一帶被水房屋人口俱有坍損城垣幸而未頺隨飭一面撫恤一面趕緊堵築于九月初八日開工至草八日合龍城市居民安業如故幸弗自詡功厄弗咎無益惟是慎修防俾民安枕席閲淮安石隄四疊前韻禹行水無事率並歸之海後世喜用智患多勞更倍然而今古殊亦難怪沿改土隄易以石實在辛未載淮城西北人煙輳集舊雖有土隄難資保障辛未南巡過淮亟命改建石隄敕河臣髙斌等勘估建築及癸酉河淮並漲淮城幸賴石隄得全亦惟救弊耳何有泥乘橇法遵皇祖垂議鄙安東委淮安府境當河淮交會又為運道咽喉關係緊要前明督漕侍郎吳桂芳建議黃河衝決駸駸欲奪安東入海安東衆流滙圍其勢垂陷不如棄之以拯全淮時雖未行然其論迂謬可鄙我朝定鼎以來口以皇祖六次南巡遍歷河干壩築睿謨廣運首闢海導黃注海次闢清口閉六髙堰以障淮敵黃改運中河以避洪流之險挑直黃河各險工使水直行刷沙又疏浚引河增修閘壩隄工區畫精詳具載治河方略中河臣遵守規制黃淮底績由是淮南黎庶咸登衽席靳輔及髙斌慎守頗具楷本朝善治河者首推靳輔恪遵里黃皇祖指示機宜開運中河以避百八十河湍悍之險又大挑運河陳經理河工事宜八疏勞績茂著髙斌才雖不及靳輔而辦理河務亦能盡心如毛城鋪所以分泄黃流於徐州設水志必至七尺始開至三滚壩泄洪湖盛漲髙斌堅持堵閉下河屢豐其功自不可泯癸酉賴以安甲午竟致殆癸酉河淮並漲幸石隄保護淮城藉以安全至甲午八月外河南岸老壩口漫溢大溜全注決口淮安板閘一帶俱被水淹當飭趕緊堵築自九月初八日開工至草八日合龍城市居民遷歸樂業兩旬功蕆實荷天佑神助亟命堵築之已成可中罷草日竟合龍飛報心為愷惟時籲天佑往事憶猶駭過淮安城清浦開舟行不逺郡城埤堄見淮安輕輿露冕任瞻覲膝下無殊赤子歡寶應縣詠事上元獲寶縣名改其寶已難定假真便使果真為瑞應牝雞可得救司晨按髙宗在位三十四年而改元十四上元三年以獲寶改縣名為寶應夫三十四年中凡十四改元則一元中不過三四年雖圖以鼎新為瑞耶豫以為其年不永非瑞乃不祥之兆耳且其時臣民難以紀年歲亦何瑞之有此如市井所謂開張店面之為徒資笑鄙至勝朝及本朝不為此惟以一元紀實誠足為萬世法也過髙郵州古邑嚴城稱覆盂覆盂之義可思乎以云射物堪嗤彼若擬安邦實切吾老幼喜看圍蹕路香燈何必滿通衢四隅近水真澤國百室求寧慎永圖閲南關車邏壩南關及車邏計泄洪湖漲清口定志後封土恆一樣惟值戊戌潦無已為一放先是洪澤湖水漲必由山旴五壩泄之髙郵等湖復不能容則由南關車邏等壩東放下河每受其患壬午南巡閲視湖河情形始于五壩酌定水志如壩志多過一尺即將清口拆寬十丈湖水以次遞長則清口以次展寬俾清口既暢湖水宣泄有資車邏壩始得永逺堅閉二十餘年來下河得免水患職此之故惟戊戌年儀封決口黃水由淮入洪澤湖不得已始啓山旴五壩以泄盛漲由此遞歸下河然先屢頒諭閭閻逭漂蕩早田幸復收賑借並行貺戊戌開壩之先預飭該督及總河等先期曉諭俾閭閻得早為遷避不致漂蕩又幸彼時早禾已收晚禾補種無多復令將成災之極次貧民分别展賑並借給籽種口糧以資耕作豈能免向隅回思切惆悵上方寺維舟暫據鞍老幼任從觀如子遇父母同心發喜歡上方蒞非逺古佛謁修檀傍室頗點綴多哉弗耐看竹西精舍上方寺側搆精舍杜牧詩情繪竹西筠徑宜吟猶在曲梅庭入畫欲開齊可憐春事將昌矣為囑江南且慢兮歌吹揚州唐已是借他空色偈全提至維揚即事維舟易馬策巡韁古寺先因到上方舟行至揚州城北易馬先謁上方寺瞻禮遂由陸路至香阜寺命舟更復花宫易輕舫遂由溪路至行堂登舟由內河行至天寧寺行宫行宫內書堂向名之曰大觀山情水態還如舊巷舞户歌覺倍常在此即當言此處民風須識尚輕揚駐蹕天寧寺行宫三疊舊作韻舊有行宫古寺邉曰門曰徑宿知便觀民仍復來斯日題句分明識昔年春景物華繪天寶梅心栁眼入時妍又何加富要惟教即景思之祇􅍀然題大觀堂設教省方標二義要惟不出義顒孚因之兩字堂額此惟是一心銘戒吾祇取朴淳供憩息微嫌藻繢太紛鋪我生觀在觀民也朱注雖通豫意殊觀之九五象曰觀我生觀民也朱注謂不但觀一身之得失又當觀民德之善否是分為二矣蓋九五為君象君與民原一體民之治亂係君之得失休戚本相關未有民失其生而君得安其生者因題大觀堂申其説如此萬夀重寧寺紀事天寧寺後建重寧衆志殷勤未可停昨歲兩淮鹽政伊齡阿奏衆啇籲請於揚州天寧寺寺後增建寺宇以申忱悃念其出于至誠因俞所請賜名萬夀重寧寺祝頌雖稱七月什莊嚴過甚梵王經却看植竹還植卉奚必有池更有亭太守間情留嶺在梅花嶺在萬夀重寧寺旁府志載明吳秀守揚州時開濬城壕積土為嶺樹以梅因名梅花嶺幾株仍剩古梅馨題春熙堂重寧寺側堂詄蕩藹韶光老柏蔚今色時梅發古香玲瓏湖石徑淡沱繡漪塘適以春熙額同民樂未央俯鑑室渌水泌圍階文鱗逰可數匡床近階置鑑影座中俯開奩照鬚眉覿面忘賔主設云堪喻民其情大可覩琅玕叢琅玕叢裡小回旋戞振聲清勝管絃如以雲棲幽徑擬設施終覺遜天然題慧因寺萬事不離因一念應于慧知因超能所解慧脫蒙翳因慧非兩途慧因無二致詎惟內典然繫辭見周易仁者謂之仁智者謂之智倚虹園畫舫沿溪蕩桂橈題園因近倚虹橋武夷九曲擬非謬陽羡何年縮不遙風土記陽羡亦有虹橋真水假山頗逺俗紅花緑栁已含韶新名舊號難究詰草四中知第幾條吳中數橋以一條兩條計之九峯園城南背郭區野趣攬斯須三徑原宜句九峯列在圖瀟然似山境犁若異塵衢源自平山放溯遊煙舫紆澄空寺草河源出平山流為草河流此滙成湖湖上亭軒儼畫圖圖在鏡中人俯鏡澄空一片性靈俱遊康山新城南界有山堂康山在揚州新城南門內髙三尺許無石骨當是昔時踈濬運河積土因搆築山堂志書不詳所自亦考證之疏也遺迹其人道姓康康山云因康海落職後來此宴飲董其昌題名曽是駐輿憶庚子遂教題額倣香光庚子年南巡駐蹕時因董書康山草堂額筆法殊不類香光遂倣董法重書康山草堂四字題額賜之重來園景皆依舊細看碑書未異常草堂內復鐫有石刻米芾欵城市山林四字筆法無竒亦似偽作述古雖訛近文翰一逰精鑒不妨詳倣董其昌書對山樓因成口號草堂前度辨其假今覺對山亦未真康山以康海落職後來此宴飲得名舊有康山草堂四字額欵署董其昌書然筆法實不類因倣董法重書四字賜之庚子南巡有即事詩辨其偽兹重逰康山見有對山樓亦署董書而偽更甚因復仿董法書額以賜更倣董書為題額他時應有識真人題淨香園沼園得號本因蓮此際花遲春仲天碧水中寧無藕在心蓮香淨豈非然怡性堂步入琳琅徑書堂我所顔淨迎緑坡曲香待碧波潺是園以竹淨荷香得名竹則未秋荷仍待夏也忩外真筠攬座中假竹攀是處庭中植竹座間復刻木為琅玕虛虛實實處怡性色空間青琅玕館問底泠泠拂耳過琅玕叢裡奏雲和莫嫌個個聨肩臂君子由來豈厭多趣園沿隄栁葉護梅花步入溪園清且嘉此是揚州絲管地可知日涉有陶然半畝塘在趣園內借問何成趣趣因竹及梅竹香留去聲冬翠梅野笑春開半畝波不作一奩影與陪天然澄照處五載偶重來蓮性寺四面波圍一嶼回蓮宫示性額楣懸春光六月花未放未放句誠提以全功德林口號平山左側聳雲岑梵宇向稱功德林度盡衆生始成佛兩言未識佛初心佛之深願度盡衆生方成佛道則功德二字佛所弗居也遊平山堂疊壬午詩韻大觀堂外命輕舟一卷圖中作勝逰向有平山一卷圖畫之諺恆此尋詩為即景不妨認性且隨流隨流認得性出禪宗語録因如且慧不妨有慧豈依因本自無行宫右側即慧因寺登舟必由此輸與寺僧粥飯罐即曽於此做工夫平山數典憶前朝六一風流事未遙記取維揚歐氏宅不殊閩海蔡家橋木蘭不藉棹歌聲黃鳥音傳煙栁橫故事何須舉柑酒生生萬物遂其情南來初見此平岡濟勝依然步不妨祇事詩情輸韋莊杜牧那更畫意學倪瓚王蒙寺傍精舍八忩空騁望來途一水通海濶天空點也意笑他綴景太求工豫逰回首不堪思豈謂今來獨憩兹聖日有賢守皇祖御書清風堂慈暉徒憶昔行雲流水可觀時黔黎雖聼頌聲揚却我猶慙一德涼老矣不期重問景吟留八首賞煙光文滙閣疊庚子韻天寧别館書樓聳向已圖書貯大成此閣成於庚子亦仿范氏天一閣之式為之曽頒貯占今圖書集成全部遂以推行庋四庫壬寅秋以四庫全書分弆文淵文溯文源文津四閣者均可按期蕆事因思江浙人文最盛士子願讀中祕書者不乏允宜廣布流傳以光文治敕于揚州之文滙閣鎮江金山之文宗閣杭州聖因寺之文瀾閣各貯四庫全書一分俾士子得就近觀摩並飭發內帑銀百萬于京師雇覔書手繕録全書三分驛致弆閣以昭我國家藏書美偹教思無窮之至意况因舊有匪重營西都七略江干現東壁五星霄際擎却待鈔完當驛致文昌永古煥重甍命頒布四庫全書時許願讀中祕者抄録毋靳詩以志事發帑增鈔書四庫更非捷徑為崇儒前因江浙為人文淵藪特命繕寫四庫全書三部分弆揚州文滙閣鎮江文宗閣杭州文瀾閣俾士子得就近鈔録傳觀用光文治其鈔録書手皆特發內帑雇覔不致濫邀議敘為仕途捷徑也擬公寒士廣聞見預禁守臣嚴護符全書繕竣分庋三閣後恐地方大小吏過于珍護致徒供插架無禆觀摩因復降旨曉諭有願讀中祕書者許其陸續領出廣為傳寫但令督撫等派委妥員董司其事設立收發檔案登注明晰不致遺失舛錯俾多士得殫見洽聞以副朕樂育人才稽古右文之至意褒博三倉實富矣精英二酉任觀乎欲期寰宇敷文教濟濟明廷治贊吾塔灣行宫六依皇祖詩韻最古行宫朴不華奎章拈韻六之麻塔灣行宫乃曽經皇祖南巡時所幸舊宫規制朴素御題詩用六麻韻恭依賡和者亦六度矣一心無繫於何繫四海為家即此家熟路重來識堂搆行春寧為賞煙花庸歌六次依成句摛筆於斯興正奢題承煦堂髙旻寺側開行館是處行館建于康熙四十二年來往於斯駐蹕常庚子當春攬雨意前畨駐此逢雨甲辰即景喜曦光是日晴松蒼竹翠天然朗茶朵梅英自在香萬姓歡欣承煦嫗由來皇祖聖恩長得間堂疊庚子詩韻古稀有加四步履尚能強遂造山房迥平臨煙野光栁隂欲籠院梅馥不藏堂閲五春秋矣爾間我祇忙塔灣行宫五依皇祖示江南吏韻奎章五依韻雲館六畨經階俯青蒲刺簷齊緑竹亭念民心有惻訓吏視無形遊豫非玩景欲吟筆輒停過瓜洲錦春園外換江舟渡指金山路不修向午出瓜洲西運河口渡江水面寬濶距金山行宫較逺前歲據薩載伊齡阿等奏以瓜洲城中有跨河一道上通運河由閘下逹大江若對渡金山計程止二三里繞越長江之險兼避江面之寬商民來往均為利便等語因俞所請開濬兹舟行經過果覺較前近捷且避中泓大溜云風靜浪平藉神佑漕艘商舫愜羣謀鎮城自古衝而要民舍於今富且稠詩話寬夫蔡傳置閘却憐潮不到揚州按蔡寬夫詩話潤州大江本與揚子橋對岸而瓜洲乃江中一洲耳故潮水悉通揚州城中唐李紳詩云揚州郭裏見潮生自瓜洲以閘為限不惟潮不至揚州亦不至揚子橋矣云云今瓜口雖有由閘之名而來往經臨實未見閘况江潮盛長亦非一閘啓開之所能限制向嘗作廣陵濤疆域辨訂正訛悮亦見記載家附會遷就每不免失實耳欽定南巡盛典卷二十
