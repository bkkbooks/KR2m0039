body:
  text: 海塘乾隆二十八年正月十三日莊有恭熊學鵬奏言竊查海寜縣境内自老鹽倉至石塘頭觀音堂迤西欽奉諭㫖估建柴塘及簍坦各九百四十五丈久經完竣嗣縁該地舊塘停修年久底柴呈露堰溝廻溜漸逼塘根經臣莊有恭奏明自觀音堂至翁戴二汛界再行接鑲柴塘三百丈以資捍禦除先築之一百五十丈業已完工臣熊學鵬到任後查勘通塘情形附摺奏明在案所有接鑲之一百五十丈當即督飭西防同知董世寜嘉防同知髙象震等二員辦料興工并委標員察㸔兹於本月初二日據報一律完竣臣熊學鵬隨於初五日親赴該工逐細查勘均皆如式堅固除飭海防道永徳將辦改建石塘上𦂳赶辦堅固報竣外所有續修柴工三百丈全工報竣查勘如式堅固之處理合具奏奏入報聞乾隆二十八年正月二十六日莊有恭熊學鵬奏言竊照觀音堂迤西一帯柴塘前因䕶沙坍卸水臨塘根經臣莊有恭奏准先後續鑲柴工三百丈業經完竣奏報在案今臣熊學鵬於臨工查驗時勘得接鑲柴工西頭起塘外雖經漲有嫩沙而堰溝廻溜仍復將貼塘䕶沙漸次刷低相度情形似應於乾隆二十八年春汛前迤西再行拆鑲柴工一百丈以為先事之防臣等札商意見相同除飭海防道永徳委員遵照前估成式上𦂳拆鑲取具估册核實另行題報外所有迤西再行續鑲柴塘一百丈之處理合恭摺㑹奏并將尖山石􅄵以及西塘現在沙水情形開列清单進呈奏入報聞乾隆二十八年二月二十八日莊有恭熊學鵬奏言竊照觀音堂迤西接修之柴塘三百丈已經臣熊學鵬親勘収工因迤西塘脚仍有臨水臣等復㑹請續修一百丈以為先事之防今指日即可訖工查前此所築簍工九百四十五丈𦂳靠塘身故塘脚安稳柴無外移抽掣之患今此續修之四百丈自應一律照辦臣等現在飭令海防道永徳㑹同藩司索琳確估分委工員領項辦料俟大石塘工料物運竣即接運簍工石料加𦂳修築又海寜城東至念里亭等處塘面向有土堰常時似無甚益然上秋風潮潑塘之水實資捍遏不致漫入附塘河中臣等㑹勘雖通塘俱有土堰髙低厚薄不一但細察情形海潮入尖山斜趍西北而来海寜城東塘面土堰尢為𦂳要則先事預防自當籌辦臣等謹行令該司道轉飭杭州府知府劉純煒自念里亭起至城東止逐叚查明確估除去舊土若干酌加新土若干總以自塘面量起髙五尺面寛六尺為度其有實係塘面太狭始准在塘後身加帮葢此等土堰只取阻遏潑塘之水俾得速退若於塘後加帮不惟糜費且留塘面太寛反不得力再乍浦平湖所属之獨山東脚至茅竹寨東首向有石塘五百二十二丈二尺係明季建築内有黄字號起至月字號止計工長七十丈因歴年久逺塘根被水汕嚙樁木悉皆朽爛根石外游塘面内矬應行一律照辦臣等公同詳勘此時辦理惟樁木湏全行購覔其石料尚多可用隨面加指示海防道永徳督同該㕔員按段確估將應増添工料之處務宜據實親勘毋致稍有浮冐除俟該司道等確估到日另行具題外所有臣等籌辦寧乍両塘各工縁由謹合辭具奏奏入報聞同日莊有恭熊學鵬奏言竊臣等查勘海塘除將現在塘工沙水情形暨寜乍兩塘應行鑲培拆築之處另摺奏聞外臣等伏思海塘各工均屬𦂳要而薛家􅄵以西至老鹽倉等處尤當最衝雖現在工程平稳諸宜先事預防所有一切工料俱可速辦惟柴石二項取辦於别州縣購運匪易設有應用之處與其臨時猝辦不若預籌妥備俾用力不煩而成功亦速臣等㑹同悉心酌議請動支海塘經費銀二萬両以一萬両備辦柴觔以一萬両備辦條石陸續運至海塘交與海防道永徳分貯工所臣等隨時查勘情形如有應行修築之處一靣動用修補一面具奏核實報銷如此庻免臨時猝辦之煩而於塘工實有禆益奏入報聞乾隆二十八年五月十六日工部奏言工科抄出浙江巡撫熊學鵬題稱海寧老鹽倉迤西一帯柴塘年久未修請定嵗修保固章程等因乾隆二十八年三月初五日奉㫖該部議奏欽此欽遵抄出到部該臣等查得寧邑老鹽倉迤西一帯柴塘先㨿該撫等遵㫖籌辦奏准拆修工長九百四十五丈塘外增建石簍九百四十五丈嗣因沙塗日缷過西接前已竣柴塘又續請拆修工長三百丈等因在案今㨿該撫疏稱前項各工俱已完竣稳固惟是該處沙土鬆浮恐經年累月潮汐徃来汕刷塘根雖有簍坦捍衛不致外游而沙底虚鬆易於低䧟加以行人踐踏雨雪淋漓未免間有蹲矬自應循例嵗修以資捍衛等語應如所請准其嵗修以資稳固至保固限期查定例加鑲柴塘保固三月拆築柴塘保固半年其竹簍並未定有保固限期今該撫既稱柴塘之外俱有簍坦衛䕶毋庸分别保固請將加鑲拆築俱定保固半年其竹簍雖係臨水施工然竹石性堅應與塘身一例保固等語亦應如所題辦理仍行令該撫等遇有應修工叚委員㨿實查勘如限内損壊之工責令原辦工員照例賠修如在限外應修工叚即行核實估計每年於霜降後彚造清册按照該年應需銀數在千兩以内咨部辦理千兩以外具題估銷并將所需銀両在於引費項下動支之處於估銷案内聲明仍報明户部查核可也奏入報聞乾隆二十八年五月二十五日莊有㳟熊學鵬奏言竊照海塘工程攸闗𦂳要本年春汛已過仁寧二縣各工均属平稳業經臣等恭摺奏明在案兹查為時已逾四月中旬轉瞬即是霉伏大汛諸當先事預防㨿海防道永徳禀稱東塘念里亭地方有一十六丈魚鱗石塘其塘外係舊廢盤頭未建坦水所有存留盤頭基址日逐被潮溜汕刷以致塘身現露十六七層不等亟應修建坦水以䕶塘根等由臣熊學鵬隨即親徃察看是叚塘身一十六丈外乃舊廢盤頭並無樁石其塘身已露出土靣十六七層不等其在土内者僅一二層情形險要委係應修之工當即靣令確加估計兹㨿該道永徳㑹同藩司索琳覆稱此一十六丈應建坦水計估需工料銀九百五十両一錢請委海防營守備王李棻速行趕辦等語臣等㑹商當此霉伏大汛之前應如該司道所請上𦂳趕辦俾為先事之防與各工一律鞏固除飭辦料儧築并取估册核實具題毋使稍有浮冒外臣等㳟摺具奏奏入上諭曰知道了許久未畵圖来是何故耶乾隆二十八年七月十二日莊有恭熊學鵬奏言竊照本年春汛霉汛海塘各工平稳經臣等節次奏明在案現值伏汛届臨之時臣等不時留心察看并飭該管道㕔逐叚防䕶務保無虞去後兹據海防道永徳禀稱東塘念里亭新建坦水一十六丈業經完工惟華家衖迤東曹殿地方堰溝外老沙較前刷卸請再行接鑲新柴塘一百丈以資捍衛等情臣熊學鵬隨於五月二十八日親詣各工逐細查勘所有念里亭新建坦水一十六丈業經完工實皆堅固如式其華家衖迤東曹殿地方海中所漲嫩沙潮退時雖覺寛長然沙色尚嫩未經堅實潮滿則不見而貼塘䕶沙現在僅寛三四丈至六七丈不等又堰溝外老沙日被潮冲刷低八十餘丈當此大汛届臨之際自應如該道所請再行續鑲柴塘一百丈以為先事之防現有臣等春間奏請預購備貯柴觔已㨿各縣運觧在塘足敷趕辦再查尖山石􅄵情形福寧宫前迤西新舊漲沙長一百三十四丈標記竹簍底層漫葢者七十個沙䕶者十個中層漫葢者七十箇上層漫葢者十六箇沙䕶者五十四箇計沙髙八尺餘至一丈二尺餘不等於保䕶􅄵工大有禆益其餘南北兩岸沙水情形各微有坍漲不等工程皆極平稳除取造續修柴塘估册核實另行具題外所有臣等查勘辦理縁由謹繕同沙水清單繪圖㳟摺具奏奏入報聞同日莊有㳟熊學鵬奏言竊臣等㑹奏念里亭一十六丈魚鱗石塘外添建坦水一摺奉到硃批知道了許久未畵圖來是何故耶欽此臣等跪誦之下不勝惶悚之至伏念海塘重大臣等察勘得本年春汛霉汛南北兩岸沙水雖㣲有坍漲然亦常年所有又柴石塘工間有奏明補修處乃係先事預防俾𦂳要頂冲之工永保無虞現在率皆平穩是以未經畵圖入奏惟是浙省海塘關係民生無時不上厪宸念臣等理應刻刻仰體㑹同商議嗣後除遇有𦂳急工程仍隨時畫圖具奏外其按月奏報工程沙水情形俱將有無坍漲及工程平穩之處繪圖隨摺進呈御覽以仰慰聖懷奏入上諭曰亦不必每月兩月一次可也乾隆二十八年八月十四日莊有㳟熊學鵬奏言竊照本年五月以前海塘工程暨沙水情形經臣等節次奏聞兹㨿海防道永徳將現在各叚工程及南北兩岸沙水開報前来臣熊學鵬復行親往查勘查自仁和縣八仙石起至尖山􅄵工止一帯柴土石各塘内曹殿地方新接鑲柴塘一百丈業經完工堅固又加培土堰亦皆培築如式惟戴家石橋汛内石塘二十丈五尺塘身微覺膨凸塘後附土續矬此係從前緩修之工内用塊石堆填外用條石包裹其工本難堅久雖塘外尚有坦水然該處勢當頂冲應請改建魚鱗石塘以垂鞏固惟是現值伏秋二汛風信靡常潮汐盛大若此時遽將塘身拆改不特戧土单薄難資捍禦且潮盈水滿亦未便圈築月􅄵清底開槽查現有臣等春間奏准購備之條石柴觔運送在塘臣等㑹商謹撥條石二千餘塊堆貯坦水上𦂳貼堵禦其後塘附土矬裂之處釘樁一路樁後用柴貼鑲柴後挑土夯實俾内外鑲夾緊固庻大汛期内可保無虞其所需石柴等項無庸另請開銷俟九月後改建魚鱗石塘之時即將拆出之柴樁仍撥塘工應用堆貯之條石即於本工應用俾工既固而費亦不繁再查尖山石􅄵情形連日東南風甚大竹簍䕶沙刷去者甚多簍外竹篾亦間有損破者俱已即時修整現在􅄵根堅固又海寧縣城西曹殿地方海内所漲嫩沙迤西漲連與念股頭沙相接迤東雖中有數十丈沙靣刷低然水内陰沙尚屬相連又東漲長一千餘丈至秧田廟於北塘甚有禆益其餘南北兩岸沙水微有坍漲不等柴土石各工俱属平穩臣等謹另繕沙水清单繪圖㳟呈御覽奏入報聞乾隆二十八年九月二十九日莊有㳟熊學鵬奏言竊照浙省海塘工程關係𦂳要每年八月朔望二汛尤為喫𦂳之時臣等督同該管道㕔員弁不時留心先事防範兹於本年八月初八日據海防道永徳禀稱自初五日起連朝風雨至初六夜東風甚大推波助瀾潮勢洶湧初七夜半風始止息幸一切柴土石工根脚塘身俱各穩固保䕶無虞不過塘外新漲嫩沙多有冲刷塘靣眉土雨淋浪潑間有激缷老鹽倉迤西保固限外柴塘其塘身下半因有簍工䕶衛毫無游動惟簍靣以上柴工為潮浪抽掣間有蹲矬又東塘之念里亭一帶昔年搶修緩修二項石工内亦有揭去靣皮邊石一二三四五層之處其戴家石橋緩修石塘内前因塘身膨凸附土續矬議請九月後改建魚鱗石塘者因已外堆條石内加樁柴足資捍禦均保無虞其尖山􅄵工經此風潮漲沙雖俱汕刷而塘身邊石以及大小簍工均一律鞏固不過靣土被浪花潑激有寛至三四尺積筭至長十餘丈者各等情前來臣熊學鵬聞報即於初八日馳赴工所周遭察看詢之在事員弁及附近居民據稱較之上年情形不過十分之一二當即將各叚應行修補之處逐一指示海防道永徳加𦂳補修其柴工即於春初具奏預購柴觔内核實撥動歸於嵗修案内辦理其眉土靣皮邊石坦水即督令各力作兵丁夯填修築毋庸另請開銷隨自十二至十六等日據陸續禀報各工俱已完竣臣莊有㳟於十六日自蘓起程約同臣熊學鵬於十八十九等日逐工親同履勘委皆完整如式又查得海鹽平湖二縣石工内攔石附土間亦微有潑刷葉經乍浦同知髙象震海鹽縣知縣沈全達修補完工查望汛期内旬日以來風色平正浪静波恬適十八日俗𫝊為潮生日臣等即虔備牲醴率同在工道㕔各員至海神廟報祭今大汛已過民情和樂所有海塘柴土石各工雖遇風潮仰邀聖主福庇均幸平穩理合奏聞恭慰聖𠂻再臣等伏查從前緩修搶修二項石工皆内用塊石堆塡外用條石包裹工本不堅年又經久故邇來凡有潑缷之工悉在此等工内今臣等復率同該道確勘除戴家石橋前奏二十丈五尺外又查有接西九丈及東塘之陳文港迤西第六十八叚緩修石塘三十五丈五尺第七十叚緩修石塘一十三丈二尺根脚俱有膨凸後矬之勢亦應仰體我皇上厪念民生至意乗此九十月内一律改建魚鱗大石塘以資永固現有臣等春間奏准購備之條石已經運送到塘儘足資用除飭海防道永徳確估㑹同藩司索琳造册題報另委妥員分叚承修外謹一并陳明並將南北兩岸沙水情形繪圖貼説㳟呈御覽奏入報聞欽定南巡盛典卷五十八
