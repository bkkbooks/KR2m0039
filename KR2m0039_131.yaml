body:
  text: 奏議乾隆二十九年十一月二十三日大學士公傅恆等奏言恭照聖駕巡幸所至隨從各行檔向地方官取具印結一事前欽奉諭㫖傳諭方觀承設法禁革並詳細確查具奏今據該督將取結各行檔開具清單進呈臣等詳閲該督所奏取結行檔內有結付印票與地方官實有交涉者亦有與地方官全無干涉不應向地方官取結者在該督摺內雖稱不知起自何人但臣等屢奉聖訓命於沿途訪察約束臣等總理行營並提督衙門俱每次多𣲖員役加意密訪今於取結一事竟未及早行查出奏請禁革咎實難辭不勝惶悚惟是隨從人等果有向該地方官需索騷擾之事斷不致絶無聞見即如從前有托稱王大臣等名色向支應房冒領傢伙肉麵者當經臣等查出治罪又如良鄉縣知縣張若瀛禀出冒領草料路費之人亦經臣等奏明將該犯治罪并奉㫖奬賞張若瀛緞匹並交與該督記名升用今此項取結一事若不過一二州縣偶有應付或猶係庸懦之員受長隨等愚弄所致今沿途經過地方盡復如此其中豈無强幹能事之員而亦甘心踵弊則其間必有希圖利益之處在各行檔微賤小人借此津貼微利以出結為名而在辦差人員亦借出結以為開銷實據以致上下相䝉真僞莫辨即如該督單內所開御轎上並鳥鎗處等項與地方官全無干涉而亦取具印結殊不可解今該督既稱兩無對證是以向來並無敗露之案若僅將取結一事嚴行禁草若輩奸詭伎倆勢必另立名目恣其巧取仍歸於兩無對證䆒非徹底澄清之道查該督摺內奏稱每次自大宛二縣出具印結起沿途州縣見結出給如或不給則頓生疑慮不給不已等語大宛二縣近在京城其辦差之長隨雖去來無定然伊等署內自必現有一二熟手辦過多次之人况必有每次應付檔册及書役可據此畨既經嚴革必須水落石出永杜弊端雖䝉皇上天恩其已往者不加深䆒然亦必明晰原委以警將來臣等愚見應請㫖傳取出結之大宛二縣知縣並辦過出結之長隨書役一二名并傳齊單內所開取結各行檔將因何向地方官取結並有無實在需索是否作何侵冒各緣由臣等㑹同總理行營及提督衙門三面質對明白俾內外共知無可影射臣等將來仍隨營留心查訪如有另換名色籍端滋擾及包攬侵冒者隨時奏明從重治罪如此釐剔肅清弊端自可永絶矣應否如是辦理伏候聖明訓示奏入上諭曰理應如此辦理乾隆二十九年十一月二十六日遭運總督楊錫紱奏言恭照來春翠華南幸接准部咨聖駕由陸路直至江南之清江浦回鑾之日由水路直抵德州聖駕由德州陸路進京皇太后聖駕仍由水路至通州進京所有來年重運漕船臣謹遵照二十七年辦理章程頭進船隻俱於正二月內催儧渡黃趕出臨清早者竟抵通州稍遲者亦可於天津西沽海河一帶暫行停避二進三進船隻俱於清江之養馬灘揚州之金灣六閘鎮江之龍嘴常州之髙橋蘇州之望亭寶帶橋等處支河酌量情形以次停避恭候聖駕回鑾後即緊跟行走不致河道擁擠臣已查照舊例移咨倉場及各省督撫總河并河知沿途鎮道營汛一體遵照再查乙酉年係閏二月二進三進漕船於聖駕回鑾跟隨行走臣照例委員加緊催儧計六月底七月初仍可依限抵通不致違悮奏入報聞乾隆二十九年十一月三十日總理行營事務和碩簡親王豐納亨等奏言據錢汝誠竇光鼐奏稱乾隆二十七年駕幸江浙臣衙門循照二十二年南巡辦理規條請將各行檔裝載什物車輌俟行至徐家渡水次照數留住以一半交江南一半交山東餧養以偹回鑾應用又查上届臣衙門預偹車四百餘輌實用車三百六十輌嗣因順屬原車途中間有回空騾馬不無疲乏之處至交車時山東省分留京車一百三十五輌江南省分留京車一百四十五輌其不敷之車在各該省照數備足又因江省素非産車而東省又有自應備辦之車不能協濟江南仍照二十二年之例奏明移咨直𨽻總督檄調附近南省之景州河間獻縣等邑代雇車輌以濟江省之用今此次臣等亦即飛咨直𨽻總督籌辦查從前順天府所雇車四百輌至徐家渡後將一半交山東餧養一半交江南餧養至回鑾時再行應用守候需時辦理原未妥協此次回鑾既由德州登陸情形與從前不同自應仰遵諭㫖另行酌議臣等㑹同內務府大臣詳悉查核此次由京至徐家渡共用車三百三十輌若仍令其回至德州守候餧養非所以仰體皇上軫恤之至意應請將此項車輌抵徐家渡後即各令散歸俾得及時營生俟皇上回鑾至德州時所需車二百一十二輌應交山東地方官就近雇覔預偹但恐山東車輌不足應令直𨽻總督飭令德州相近之州縣雇車一百輌協濟山東應用均于臨時三四日前預偹自不至遲悮再恭查皇太后水路至張家灣登陸止需隨從車三四十輌為數無多應交坐糧㕔臨時就便雇偹應用如此辦理則民車不致羈滯而官差不致貽悮奏入報聞乾隆二十九年十二月二十二日傅恆等奏言恭照明春聖駕南巡隨往江浙大臣官員兵役執事人等前曽奏明統以六千馬匹核計隨往餘俱留住又經奉㫖令各衙門將應行減𣲖人員自行奏减今據各該處册報隨往渡黃上船人數共二千八百七十一人比照上届三千二百三十人之數共减去三百五十餘員名臣等案其品級之大小及差使之緩急照從前之例酌量分𣲖共需馬五千二百四十一匹尚未奏明統以六千馬匹核計之數至渡黃以及各名勝處原奏𣲖馬俱在四千匹以內今照依原奏或按人减馬或按差减人渡黃時應需用馬三千五百零四匹名勝處應需用馬三千五百四十一匹謹開列清單進呈御覽俟命下時行知兩江總督查照並咨兵部照例辦給馬票一面知照各該處將單內隨往名勝處所减𣲖人數自行通融辦理至船隻一項仍令該督遵照從前原定章程將預備上用船隻及裝載御用食物等船敬謹預偹隨往官兵人等需用船隻可按從前奏定全數將現在該省所用船隻照單開人數分别𣲖撥至浙省應如何給票監放之處即照江省之例一體辦理應令兩江總督傳知浙江地方官遵照可也奏入報聞乾隆三十年二月十二日户部侍郎兼管順天府府尹錢汝誠奏言恭照本年聖駕南巡一切隨營車輌前經總理行營王大臣等議奏行至徐家渡水次即各令散歸俟回鑾至德州時交山東地方官就近雇偹如有不足令直𨽻總督於附近州縣雇覔協濟奉㫖依議欽此查起程時臣衙門共偹辦交用車三百四十八輌除沿途陸續回空外其餘車輌現在俱已行至徐家渡水次臣謹遵照原奏各令散歸苐恐沿途經過州縣或有别項差務截留封拿轉非所以仰體皇上優恤畿民之至意臣擬即一面行文江南山東直𨽻督撫轉飭沿途州縣不得藉端截拿致滋擾纍仍一面發給各車户執照一紙令其收執倘沿途地方胥役人等或有截拿情事即令該車户將執照呈驗禀明地方官䆒治如此則回京車輌即可專行無滯而近京車户俱得及時營生更沐皇恩於無既矣至回鑾應需車輌臣現經行文內務府預期酌核需車確數移咨山東撫臣直𨽻督臣遵照原奏飭屬雇覔以備回程應用奏入報聞乾隆三十年二月十五日兩江總督尹繼善江蘇巡撫莊有恭奏言據協辦大學士陳宏謀江蘇參將劉連捷都司白雲上守偹林宗岱千總李逢春等勤於揖捕之處開列清單恭呈聖鑒奉㫖俟到江南時交該督撫等查辦欽此准軍機處交出到臣等竊照地方遇有盜賊文武各官均有承緝之責逾限不獲向俱定有處分臣尹繼善因緝限寬餘地方官未能盡心偵緝是以於上年在京時奏請立定嵗終彚奏之例將各屬盜賊每嵗具報案數分别獲犯多寡其有緝獲本境案犯甚多兼能偵緝鄰境積匪巨盜者奏請酌豫升用如報案纍纍而獲犯甚少者不必待至承緝限滿即行參處以示勸懲奉㫖敇議通行臣等現在遵照辦理今據陳宏謀奏稱劉連捷等四員俱能實心緝捕所獲積賊凶盜甚多臣等查得參將劉連捷業經䝉恩升任貴州平逺協副將其餘三員均係熟練營伍實心緝盜之員而守偹林鍾岱才情明幹獲匪最多並能將所獲之案㑹同地方官審出實情在武員中尤為出色臣等現在查明各該員緝獲賊匪案據恭候聖駕回鑾時隨營帶領引見奏入上諭曰回鑾時帶領引見乾隆三十年閏二月初二日閩浙總督蘇昌奏言恭照翠華幸浙首站嘉興府南湖有烟雨樓一處厯届俱䝉聖主恩賜臨幸臣等略加修葺恭偹如意舟一隻現洎嘉興府東門外馬頭又恭偹皇太后御船一隻泊於北教場馬頭祗候臨幸烟雨樓之用再聖駕駐蹕石門鎮次日即由何家橋進路先幸海寧但中隔長安壩一道必須過壩換船前往臣等謹於壩南恭偹如意舟一隻伺候聖駕乘座臨幸海寧理合一併恭摺奏明奏入報聞乾隆三十年閏二月初三日蘇昌等奏言恭照本月初五日聖駕自石門鎮起鑾由何家橋過長安壩至海寧臣等恭偹如意舟一隻敬泊長安壩南伏候皇上過壩乘坐再查何家橋至長安壩一帶河道橋髙尺寸不等現在河水長落未定臣等敬請所有嘉興烟雨樓前如意舟一隻隨帶於御舟安福艫後跟往長安壩以偹察看臨時水勢情形聖駕乘坐之用奏入報聞乾隆三十年閏二月初四日蘇昌等奏言今春恭逢聖主載幸江浙垂念海塘關係民生要務一抵浙境即由石門縣之何家橋取道長安壩先幸海塘閲視塘壩工程由塘務抵省皇太后安輿仍由石門塘棲二處大營臨幸省城臣等業經遵照預偹惟是臣等扈從人員必須預行請㫖𣲖定伏查臣等二人均有地方之責荷蒙聖主臨幸海寧指示修防方略臣等理應扈蹕隨行祗領訓誨遵循籌辦所有皇太后安輿晉省應請於將軍臣福祿提督臣武進升副都統臣福德臣舒景阿學政臣錢維城織造臣西寧六人內敕𣲖河員敬謹扈從恭候諭㫖遵行奏入上諭曰著將軍福祿織造西寧乾隆三十年閏二月二十二日尹繼善等奏言竊照浙江學政錢維城奏請廣刋御製詩文集一摺欽奉諭㫖傳詢臣等公同閲看仰惟我皇上文思天縱學問日新幾暇濡毫發為聖藻闡圖書之精藴集今古之大成美擅百王妙兼衆體洵聫珠而合璧實振瞶而發聾所以藝苑文林尊崇睿製茒簷蔀屋傾慕天章或偶見於山郵或欣瞻於佛寺或拱對豐碑而雒誦或敬録片楮以珍藏人盡心同好逾口出䆒以未窺全于美富爰是彌切願于仰鑽顒企景慶之輝光實爭共快於先覩亟望縹緗之流布允非阿好之私言並詢之司道暨各地方官所云俱屬相同伏乞聖慈俯允錢維城所奏頒發直省廣為刋布則山陬海澨均沾教育之深恩於無既矣臣等謹合詞恭奏奏入上諭曰准其刋布著向武英殿請頒乾隆三十年閏二月二十六日刑部奏言乾隆三十年閏二月初七日奉上諭朕時巡江浙清蹕所經恩膏叠沛軍民士庶無不不忭舞臚歡而清理庶獄亦矜恤所宜逮用循舊典以廣深仁著將江蘇安徽浙江三省軍流以下人犯俱加恩各豫减等發落俾得改過自新勉為良善共亨太平之福欽此仰見我皇上稽古省方恩膏叠沛翠華所幸溫綸之覃被如春清蹕時巡億庶之歡騰載路重布祥刑巽命用昭矜恤鴻仁臣等查乾隆二十二二十七等年皇上巡幸江浙欽奉恩㫖軍流以下人犯各豫减等發落經臣部奏明除叛逆緣坐强盜免死發遣家奴喫酒行凶棍徒生事擾害用藥迷拐子女開窑誘賣并例應給披甲人為奴及擬遣之積匪猾賊搶竊滿貫並三犯擬絞三次緩决减等及私鑄十千以上為從並私鑄不及十千各犯俱屬情罪較重均不准其減等外其餘軍流遣犯並徒杖人犯概豫減等發落奉㫖依議欽此今恭逢恩㫖應請仍照乾隆二十七年之例除緣坐等項情罪較重人犯毋庸查辦再改發新疆人犯俱係情節較重亦毋庸查辦外其江蘇安徽浙江三省一切尋常軍流遣犯並犯該發遣黑龍江寧古塔及雲貴兩廣人犯不在前議數條之內者情罪與軍流相等事犯在恩㫖以前應請一體減為杕一百徒三年其徒罪及雜犯准徒人犯俱減為杖一百已經到配决杖徒犯即行釋放逃徒並免緝拿枷杖人犯均應寬免應刺字者免其刺字應追贓者仍行追贓其應減軍流遣犯內已犯未審已審未結已結未解及已經起解計其程限尚未到配者均照例准其㑹赦減等再江浙之人有在他省犯案遞回原籍追贓發配者今既在籍適逢恩㫖亦應一體准其減等其他省之人罪犯軍流遞發江浙者與江浙之軍流不同未便濫邀曠典至該三省題咨到部尚未核覆及嗣後到部之案核其事犯在恩㫖以前查與赦欵相符者臣部隨案聲明分别減免俟命下之日臣部行文各該督撫遵照辦理奏入報聞乾隆三十年三月初一日傅恆等奏言恭照此次回鑾皇上恭奉皇太后由水路同至德州分營皇上即由旱路旋蹕皇太后仍由水路抵通臣等查山東直𨽻一帶河道紆窄且在在經由閘壩扈從船隻過多未免擁擠當經傳知各該處不許多𣲖人員乘舟隨行並御舟之前除必須先往預備者始准在前行走餘俱留於後營隨行兹據各該處開報隨皇太后御舟抵通各船共二百五十八隻內應前行船三十隻至隨從皇上之大臣官兵如御前乾清門暨各部院各該處官兵人等行李馬匹俱按依水次程途在陸路行走一概不准坐船其由京至徐家渡順天府雇備裝載官用什物暨太監人等乘座之官車三百餘輌先經臣等遵㫖議准於徐家渡後俱令各散營生回鑾時照應用數目折給船隻隨至德州後再行更換車輌今據各該處開報車輌數目前來臣等按其裝載什物多少折給船隻共一百六十二隻內應前行船五十五隻二共船四百零二十隻較比乾隆二十七年隨皇太后進京船隻數目尚少數十隻如此酌𣲖前往庶舟行可以順駛而河道不致擁擠再查此次上駟院馬匹暨官用駝隻俱留在德州喂養將來由韓莊閘至徐州皇上由陸路前往其乘騎上駟院馬匹之太監拜唐阿人等亦須由陸路隨行臣等詢悉徐州南岸臨時偹八旗之馬一千匹以為官兵由南岸至雲龍山乘騎之用查黃河至韓莊閘路不甚逺應交與該管官於徐州備馬一千匹內先期撥馬三百匹至韓莊閘地方備抵上駟院馬匹之數並預先傳知隨往人等務須從簡酌𣲖不許多𣲖人數至駝隻既在德州喂養一切官兵什物亦應交與該地方官照前往江寧靈巖山等處章程雇備民夫扛擡俟命下交與各該處暨地方官遵照辦理奏入報聞乾隆三十年三月初五日尹繼善等奏言竊照候補通判席萇知縣許崇文縣丞范國泰丁憂知縣潘棠許治鍾一元張掄甲縣丞畨世英巡檢髙慧葉文麟等十員上年四月內經臣尹繼善奏請留江差遣如果奮往向前實心辦事俟差竣將作何補用之處分别請㫖仍行帶領引見丁憂直𨽻州德寧安縣丞白熙原應來江候補並懇先准來江以供驅策欽奉恩㫖著照所請行該部知道欽此該員等自委辦差務以來無不奮勉趨事經理妥協洵為實心出力之員除原應在江候補之德寧安服滿後應補直𨽻州白熙服滿後應補縣丞外其奏請留江之席萇等十員俱係應補人員應請一併留江補用查通判席萇知縣許崇文二員籍𨽻江蘇應於安徽省以通判知縣補用其餘八貟請於上下兩江缺出通融酌補李棠許治鍾一元張掄甲應以知縣補用范國泰潘世英應以縣丞補用髙慧葉文麟應以巡檢補用各員內已經服滿者應行照例請補其李棠張掄甲葉文麟等三員尚未服滿應俟服滿請補再丁憂鳯陽通判徐文燦厯俸八年因係二十二二十七年兩次辦船熟手上年七月內經臣尹繼善奏准留辦差務船隻事事盡心料理亦甚妥協應請俟服滿後於上下兩江同知缺出酌量升補以上席萇等十一員均係辦差出力應行引見之員可否容臣等將各員於江寧徐州等處咨明吏部陸續隨營引見留江分别補用恭候欽定臣等謹合詞具奏伏祈訓示遵行再徐文燦李棠范國泰三員均於二十八年大計案內卓異應行引見合並陳明奏入上諭曰著行在吏部帶領引見欽定南巡盛典卷九十六
