body:
  text: 河防乾隆四十三年五月初七日河道總督薩載奏言竊臣於本月十七日奏覆黃水並未入運及髙家馬頭現在情形一摺兹於二十五日奉到硃批已有旨了欽此摺內黃河改從陶莊繞北下注句上奉硃批幸而改流不然此番必致入運矣欽此又亦未漾至惠濟祠句上奉硃批慰欽此並接到乾隆四十三年四月二十二日廷寄欽奉上諭據薩載奏黃河改從陶莊繞北下注向東直趨距清口東西壩已逺是此番雖遇連日東北大風黃水不過抵至桞園頭而止不但未曾入運亦未漾至惠濟祠地方等語覽奏稍為慰懷若非前年諭令疏挑新河俾黃河正溜繞北東注此番東北大風黃水不但倒漾且必致入運是先事預籌已有成效矣至所稱目下出口之水尚未暢達僅能刷出河泓所長嫩沙未能即時刷淨須俟淮水長發暢流下注自可全行刷淨等語淮水長發難以預期時日恐不足恃現在正當重運北上不宜稍有阻滯且髙家馬頭一帶所長之淤及其尚嫩時加工挑挖亦易於為力著傳諭薩載等即遵前次發去圖內硃批點志處董率廳營各貟多集兵夫將嫩淤速行挖淨俾河流疏暢并可將挖出之土由河內船運至順黃壩根以為壩內填土之用即或用帑稍多亦不致如前嵗開挑引河之費并可令無業貧民藉資糊口亦以工代賑之意將此由五百里發往並諭髙晉知之欽此臣伏查清黃交滙處所前遇東北大風黃水抵至桞園頭因距清口已逺是以不但未曾入運亦未漾至惠濟祠地方此實仰賴聖主諭挑陶莊新河俾河流繞北東注不致倒漾之明效大驗在工文武官貟莫不感頌睿算先幾中心悅服其髙家馬頭一帶業已刷出河泓重運可以挽渡惟兩旁積有嫩灘水內爬潦未見著效雖俟淮水一長清水暢流自可全行刷淨但水長之期遲早難定目下漕船北上攸關緊要必須設法疏通以利舟行以復河道臣接奉前旨後當將實在情形及籌辦緣由繕摺由驛具奏恭請訓示一面董率道將廳營遵照圗內硃筆點志四處派委員辨調集河兵堡夫並雇民夫四百名分段挑切帶水撈挖為得尺進尺之計並於嫩灘面上酌抽溝槽以備清水下注沖刷惟該處在桞園頭一帶尚為黃水所到之地水到而沙復停是以驟難見效兹復欽承諭旨令將嫩􅌎速行挖淨即或用帑稍多亦不致如前嵗開挖引河之費並可令無業貧民藉資糊口仰見聖訓周詳重工愛民至意臣惟有恪遵指示實力辦理斷不敢恃清水能刷稍存觀望之心亦不敢因人力難施稍有惜費之見現在駐工督辦加添人夫趕緊疏挖以冀逐漸挑除河流通順庶可仰慰聖懷奏入報聞乾隆四十四年正月十九日河道總督薩載奏言本年洪澤湖清水微弱出口下注散漫無力仰蒙皇上睿謨廣運頒示河圖並奉諭旨清水出口以後經過惠濟祠下其對面舊黃河尚存清水至此不免散漫減力因用硃筆標記若於此築堤一道逼令清水直注庶可資刷黃之力等因欽此七月內大學士督臣髙晉來工會同查勘維時普面皆水測量硃筆標記築堤處所水深四五尺不等恐填築土堤而兩面皆水難資穩固擬於西壩下老灘之上接築土堤一道長一百一十七丈直至水邉使清水順流東下並於新河南岸褁頭處冉接長一百五十丈俾黃水直達下注於七月十四日將勘籌辦理緣由會摺奏請聖訓並將原圗恭繳嗣準廷寄欽奉上諭實在形勢若何難以懸揣且照所奏辦理俟庚子春南巡時親臨閲視冉為定奪等因欽此嗣因洪澤湖清水接續加長西壩下老灘普面漫水其新河南岸縷堤褁頭迤下新淤亦經清水刷去所有前次擬接兩處堤工未經築做臣往來工次隨時留心察看惠濟祠下對面舊黃河身前於伏汛內黃水盛漲之時蕩漾停淤自交十一月以來水勢陸續消退灘土顯露直接下首老灘前奉硃筆標記築堤處所現在灘髙水面二尺四五寸不等挖探淤土已經乾老形勢較前大不相同仰見聖主智炳幾先指示機宜實在有所遵循在工文武無不同深欽服目下灘土雖已出水若無土堤攔禦將來伏秋水長仍復漫灘與黃河之水連成一片清水究不免於散漫自應乘此機會欽遵前奉諭旨即於灘面築做束水堤工一道自新西壩起直至新河南岸縷堤止就灘勢髙低築髙自六尺至一丈二尺不等頂寬二丈一律夯硪堅實不但清水出口以後徑直暢注可無散漫之慮即攔黃壩外添此重門又可為陶莊新河之保障臣與大學士督臣髙晉往返札商意見相同隨督同道將等覆加籌酌逐細確估計長六百九十餘丈共需土方銀四千二百餘兩即趂此水小時𣲖委幹員給發銀兩趕緊築做勒限來年正月內完工以束清水以資鞏固奏入報聞乾隆四十五年三月二十日兩江總督薩載奏言竊臣前至清口將勘過黃河情形繕摺具奏後并將河工諸事料理完畢即自清江轉回恭迎聖駕兹於初九日渡江正在儧行間接到乾隆四十五年三月初八日廷寄欽奉上諭據阿桂奏稱自豫省來浙經過淮徐一帶查勘陶莊引河兩頭已寬至九十丈其中段僅寬六十餘丈河身雖已刷深但水勢被束不能大暢且將來伏秋大汛倘水來猛驟恐一時宣泄不及若將河身能通行開寬四十丈俾一律深通汛水便可期暢注等語所奏自屬應行辦理之事現在已令阿桂前往該處會同薩載查勘後即行回京薩載再來據實面奏如果應行辦理並速派委妥員興工挑挖務於四月內全行趕辦完竣約計朕回鑾經過時可以辦得幾成並著薩載據實覆奏將此由五百里傳諭薩載並諭陳輝祖知之欽此仰見我皇上念切宣防以期汛水暢注之至意臣自當悉心籌畫妥速辦理伏查黃河汛水長發來勢驟猛河身愈寬則宣泄愈暢此亦自然之理江南黃河因限於地勢較豫省黃河本窄蓋自徐州起已莭莭被束不僅陶莊新河一段然該河於乾隆四十一年開挑時河頭只寬四十丈河身寬三十五丈挑深一丈至一丈五尺不等自開放以來逐漸沖刷寬深今河頭已寬至九十餘丈河身寬至六十餘丈中泓水深二丈五六尺至三丈不等四十一二兩年汛水發時宣泄甚暢即偶逢盛長而上遊兩岸則有毛城鋪蘇家山峯山閘祥符閘亦莭莭可以分泄不致因河身稍窄壅遏為患此南河現在通體情形今大學士公阿桂以陶莊引河中段僅寬六十餘丈恐汛水驟猛宣泄不及請將河身通行開寬四十丈俾一律深通以資暢注洵與河防有益查該河南岸逼近清口只有北岸可以展寬但目下已屆桃汛河水正大若從旁施工挑挖必得寬留故界攔禦於工將竣時冉為啓除庶免風浪汕刷是此時興挑應須相度形勢慎重方可收一勞永逸之效臣現即馳回清口先行籌度俟阿桂到後會同詳加履勘如能趕四月前完工不致為汛水漫淤即一面遵旨確估派員興工趕辦一面繪圗據實奏聞臣冉遵旨趨赴行在奏入上諭曰是不必自行回護亦不必回護阿桂汝二人皆曉事之人總期於事有濟可耳乾隆四十五年三月二十四日大學士公阿桂兩江總督薩載奏言竊照陶莊新河口寬身窄應須挑展之處臣薩載前於鎮江途次接奉廷寄諭旨當即馳回清江查辦業經恭摺奏覆臣阿桂於初九日自浙起程路過蘇州傳旨令吳壇隨往勘辦於十六日行抵清江即與臣薩載藩司吳壇同至陶莊將該河頭尾中段逐一相度勘量自順黃壩起工處至壩尾裹頭處計長一千零六十丈頭尾河面各寬七十餘丈河身寬六十丈內外不等中泓水深二丈餘至三丈不等此河自新開至今數年以來漸次沖刷雖較初挑之始業已寬深而北岸土性膠結現在河身寬止六十丈內外今黃流復故若於北岸展寬四十丈使河身通寬百丈將來汛水偶遇盛漲之時用資宣泄自屬大有禆益惟臣等詳加履勘河頭北岸迤東原挑集土之外臨河縷堤距河身水面只有三十丈該處河面寬六十五丈若加寬三十五丈以符百丈之數則應挑至此堤之外另築新堤此時似可不必破堤辦理臣等就現在形勢公同冉三斟酌擬于此處堤內留土十五丈挑土十五丈連有水河身共寬八十丈將河身現寬六十餘丈者挑展十餘丈不足六十丈者挑展二十餘丈則河勢已屬通身寬展即偶有盛漲可兾無虞以仰副聖主厪念河防之至意臣薩載督同總兵銜副將徐建功參將髙聖竒及廳營各員逐加確估牽折計算共須挑土十一萬七千餘方估需銀一萬二千八百餘兩派員集夫上緊趕辦務期四月內竣工聖駕臨幸之時約可有四五分工程所有臣等會勘陶莊新河據實估辦緣由理合繪圖貼説恭摺奏聞冉臣等查得新河頭迤上北岸舊有灘嘴前奉硃茟標記臣薩載遵照挑挖引渠一道原以放水通流後使之自行刷去因溜走南岸該處仍屬淤灘今臣等察其形勢細加商酌擬於南岸第三架木龍以上改建挑水壩一座長三十丈寬八丈將大溜挑逼灘嘴則北岸嫩灘自可日益刷去南岸順黃河壩一帶可望漸次停淤以資外護似于新河更為有益臣阿桂與藩司吳壇相度形勢自應如此辦理連築壩臺估需料土夫工銀二萬一千五百餘兩臣等勘估加展陶莊新河事畢即同赴雲梯關外查勘黃河尾閭情形合并奏聞奏入上諭曰好如所議行乾隆四十五年三月二十六日大學士阿桂兩江總督薩載奏言臣等遵旨前赴雲梯關以外將黃河尾閭入海情形會同遍處履勘測量查得二套三套近年漫口由北潮河入海之處捷近而水深其現在經行河道海口紆逺而水淺均與臣阿桂前此面奏情形無異臣阿桂臣薩載因與藩司臣吳壇往返詳細商酌如果黃河現在經由之四浤以下海口大有淤墊之勢尾閭不能暢達必須另籌入海道路則取捷就下舍北潮河别無他途但現今河流順軌其通洋海口落潮水定時雖比口內較淺而雲梯關以外水面比兩岸尚低丈許海口外灘比現在水面又低數尺寬至三百六十餘丈是河水歸槽之時安流東注尚無壅遏之虞自無庸亟籌更易海口之舉但或遇大風盛漲洪流湍駛一時不及暢泄則從前連次漫口處所不能保無復溢若將漫口堤外現有沖出河形處所略為通其淤滯俾漫溢之水自行循途入海則盛漲可資疏消於上遊各處河工不為無補至已堵漫口既難保無復溢可否仿照王營減壩之意添建閘壩以資啓閉宣泄臣薩載再行細勘堤下土頭淤沙深淺俟新任河臣陳輝祖到後會同熟籌奏明妥辦臣等謹繪圖詳細貼説恭呈御覽又查二套堤外從前漫水之東直至海邉均係阜寧安東海州等處減則灘地及葦蕩營産蘆蕩地間有淤沙溝槽形迹並無防護堤堰漫水之西淤沙較厚舊有之南潮河上段業已淤平又西則係已涸之馬港河有夾河殘缺舊堤二道堤之南頭均與黃河北堤相接其東堤長六里零其西堤長二十九里零迤下無堤空檔長十六里零下接北潮河西岸民埝此堤之西俱係安東海州等處民田臣等冉四商確馬港河西舊壩雖在雲梯關外十數里但其上遊即係腹裡民田每遇盛漲漫溢時即倒漾至雲梯關以上且該處只有木牌樓一座鐫刻古雲梯關四字並無內外界限若將此堤殘缺處所修復並將無堤之十六里一律補足下接北潮河西岸民埝則自雲梯關北堤下逮通海潮河堤堰連為一縷既可保衛安海等處上遊民田偶遇盛漲時溢出之水不致浸漫俾濵臨河海民人得享樂利之休並可作為雲梯關內外界址其堤東之海灘減則地畝悉遵照二十九年諭旨不必與水爭地聽民隨宜耕種以收自然之利似於河防民生均屬稍有禆益奏入上諭曰所奏修復馬港河西堤殘缺之處及接築無堤處所聫至北潮河西岸民堰以禦倒漾自應如此辦理其二套以下由北潮河入海之處既係路捷勢順設遇漫溢正可分泄盛漲俾尾閭益得暢達轉可不必添建閘壩雲梯關以外原不必與水爭地今二套以下既為分泄盛漲之區則馬港河堤東灘地即不能保無漫溢其應徴減則地畝錢糧著交薩載等查明奏請加恩豁免乾隆四十五年四月十五日協辦大學士吏部尚書嵇璜兩江總督薩載奏言竊臣等奉命查勘徐州城外應行添建并加髙石工仰見我皇上慎重河防保衛民生之至意臣等遵即前往於十二日抵徐州隨周履該工上下查勘緣徐州居江南黃河上遊北岸居民稠密南岸緊靠府城黃河至此一束河面現寬八十餘丈大汛時甚關緊要城外舊有石工三段長九百七十三丈五尺自乾隆二十二年仰蒙聖駕親臨閲視指示增建石工四段計長一千五百六十八丈與舊工相連徐城一帶深資保障惟石工頭迤上至韓家山尚有空檔四百五十丈向因外灘尚寬未曽接做石工只有堤堰欄禦亦甚卑矮近年河勢漸向上堤大汛漫灘之水直至堤根該處在於徐城上首外髙內窪汛水長時既已漫至該處此一段並無石工與徐城全局實有關係臣等悉心籌度若將該處一律接築石工則自韓家山起至奎山一帶全資衛護冉舊石工長九百七十餘丈較之乾隆二十二年新建石工原矮二三層不等前年黃水盛漲時舊石工僅出水數寸間有與水相平者應請將舊工分别加髙二三層與新工相平更可無虞冉石工尾段自梓潼閣以下為溜勢掃灣之處石工之外本有桞草壩數座挑溜并有石磯嘴一段計長五十九丈五尺每年拋填碎石以資攩護甚為有益今碎石漸向外遊亦應加添鞏固臣等隨檢查乾隆二十二年添建石工估册用石十七層下簽樁木上砌條石此次添建石工應照從前辦法亦以十七層為度惟緊接韓家山山根一段長二十丈地勢稍髙只須砌石十二層即可與十七層相平所有現擬添建并加髙石工以及拋填碎石加築尾土臣等逐一勘明酌定即督令參將李永吉等詳加估計共約需銀九萬二千餘兩理合繪圗貼説繕摺覆奏恭請聖訓如蒙俞允交臣薩載會同河臣陳輝祖冉加核實題估並派委妥員採辦石料俟運到若干即令承辦之員將加髙工程先行儘數儧砌隨到隨辦以禦大汛其接築空檔石料并飭陸續採辦運工接築統於來年四月以前務期全竣從此徐城永資保障濵河億兆感沐皇仁更無極矣奏入諭依議行乾隆四十五年六月十六日兩江總督薩載奏言竊查洪澤一湖周圍四百餘里承受淮水來源較廣每年伏秋汛水長發雖大展清口使之東注酌開五壩資其旁泄而盛漲時髙堰志樁仍長至一丈三四五尺不等勢甚浩瀚全仗髙堰山盱二廳磚石工程為之抵禦髙堰廳汛內有卑矮者六段山盱廳汛內有卑矮者六段上年湖水盛漲時此數段磚石工程髙出水面一尺四五寸及二尺餘寸不等風浪堪虞頗費搶護臣上年與前河臣李奉翰悉心商確必得將此卑矮段落一律加髙庶足以禦風浪冬間臣進京陛見曽經繕摺繪圗奏請聖駕南巡時閲視指示欽奉硃批屆期面奏欽此臣回南後即派員將卑矮各段詳細確估按其出水尺寸加髙磚石一二層不等並眉尾土工髙堰廳汛內核實估需銀九千六十餘兩山盱廳汛內核實估需銀九千二百五十餘兩今逢聖駕臨工閲視臣謹繪圗貼説恭呈御覽如蒙聖恩俞允容臣與河臣派委妥員採石燒磚興工辦理俾資抵禦則金堤永資鞏固濵湖億兆更沐鴻庥於無既矣奏入報聞乾隆四十五年八月初十日兩江總督臣薩載河道總督臣陳輝祖奏言竊照今春恭逢翠華南幸荷蒙聖駕於回鑾時親臨髙堰武家墩閲視洪澤湖磚石工程令臣薩載將石工卑矮段落確估加髙其原舊用磚成砌各工均令改用石料修砌俾臨湖大堤通身全改石工永逺鞏固以為淮揚數郡民生捍衛仰見聖慈惠愛黎元至深且逺臣等欽遵訓示自當熟籌妥辦查武家墩地方為髙堰廳工頭裡河廳工尾裡河自濟運壩起至髙堰廳交界一帶亦係磚工但湖水至此由太平引河下注並非臨湖要工亦非犯風之所且磚工係乾隆二十二二十七年兩次恭逢聖駕南巡閲視指示新建之工尚在堅整足資抵禦又洪湖北岸吳城一帶舊有磚工係外河廳所屬為攔禦張福口引河漫灘之水此二廳磚工均非湖內緊要工程自可毋庸一併改辦以莭糜費今蒙聖駕臨幸閲視指示處所應自髙堰廳工頭起向南至山盱廳蔣家壩工尾止凡有石工酌量加髙磚工改石以為全湖保障臣等隨督道將等逐一確估去後兹據河庫道何裕城淮揚道荆如棠副將李永吉會稟洪澤湖磚石工自髙家堰武家墩汛至山盱蔣家壩南工尾止通共工長一萬七千一百九十八丈內舊有石工應行加髙者九千一百三十六丈一尺磚工改砌石工者五千七百七十一丈七尺連山盱廳屬淮徐二汛堤身窄矮處加估幫培土工通共估需工料銀三十三萬二千餘兩臣等覆加查勘確核所估尚無浮多臣等又復冉三籌酌堰盱二廳臨湖石工仰蒙皇上不惜重帑大加興修必須慎重辦理以期永資利賴查現在擬辦各工工段綿長若同時興修不但購運石料一時不能齊全並恐趕緊辦理工程易於草率且磚工內尚有完好者此時一概拆改亦覺可惜臣等擬將已經朽壞應先拆改之磚工及正當湖心之卑矮應加石工並堤身卑薄應行加髙幫創之土工均列為急修計需銀十四萬三千四百餘兩即於本年購料動辦至磚工內雖間有􅀈朽而根腳尚未搖動及卑矮石工之不甚犯風者均列為次修需銀十二萬四千五百餘兩留於明年動辦其餘應行改石尚未朽壞之磚工及石工稍為卑矮并應一律加髙者約需銀六萬四千餘兩統俟後年修砌如此分作三年辦理則興作既可舒徐而工程亦得實在臣等商定後隨酌派妥幹人員將本年應辦工程土工即為領銀趕辦其石工先行領銀購買灰石樁木各料務於十月內到齊驗明上緊修砌如至冬寒氷凍灰漿凝結修砌恐有不堅即暫停工作一俟開正接續儧辦統限二月內完竣臣等俟開工後仍督同道將上下往來查催稽察務期如式堅實以仰副聖主保衛民生之至意至徐城加髙添建石工估需銀九萬二千餘兩前經臣薩載會同協辦大學士尚書嵇璜勘明繕摺奏蒙聖鑒今洪湖石工復經估定現飭各道造具確册分案照例題估奏入報聞欽定南巡盛典卷四十七
