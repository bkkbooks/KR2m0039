body:
  text: 詩迴蹕至蘇州即事有詠舟艤鞍憑路不賖迴蹕至蘇即艤舟由葑門按轡入城路較近便扶攜瞻弗禁諠譁廿朝曰别本非别四海為家即是家信宿駐鑾憩扈從片時摛藻詠清嘉豈無餘意因民戀政務程期肯或差計程至江寜即應閲兵試獻賦諸生又鍾山謁明陵徐州則閲黄河到京後又有殿試㪚館朝考引見諸務并民情北郊大典均定有日期難以改易雖依戀欲多留數日不得也髙義園七百餘年地天平尚范家林泉寜彼愛景概致予嘉樹即交讓樹花為能忍花舜之徒是矣循路喜無差白雲泉五叠白樂天韻白雲復此俯巖泉聊趁春逰片刻閒一十六年消底事淙淙好在滴其間上方山楞伽寺上方結精藍自因境清静金仙所宜居開士所宜領而何起樓䑓用以供玩景前度盖已然重來益修整小坐意為恧豈合方之省雖云弗勞民却近逰觀逞質諸兩足尊亦恐弗相肯石湖八絶句再叠王寵題周臣畫箑頭韻别久斯當意切憐石湖烟景宛如前畫屏静展翠濯雨玉鏡平拖朗映天東村筆趣足風流氣韻兼之若動浮山靄欲開下歸鶴湖波㸃破起飛鷗参政當年别業開詎知今日有樓䑓前畨乙酉今庚子㸃綴嫌他備兩迴雅宜七字似天成題箑風生動揺去聲輕即境即詩相印證不差些子是神情風和日麗颺㳺絲步輦徐教畫裏移唤雨隔林聼鳩婦闖波躍藻出魚兒峡瀑淙池半畆强鐫題兩字勢飛翔海潮菴後石池半畆鐫題石湖兩字于壁上石湖之名盖始于此非謂山前連太湖之湖也不知者謂太湖尾錯把行春借作梁鳴鞭問景向城歸由石湖還蘇城䇿騎可達不必掉舟不必牙檣引䌫絲西望靈巖山頂寺祇餘塔影挿雲㣲室豈維摩天雨花興䦨歸路踏平沙最憐接踵駢肩者翹首歡心仰翠華漪瀾堂再叠前韻玉局當年題此堂重來試閲鏡中光過眸嵗月真無住漪面波瀾亦有章繞砌不妨任清濁随流那復計圓方促成七字言旋蹕恐就瞻民候久長若氷洞流出為池方為圓溯源氷洞得淙泉濯清因識具深義六一成之含地天雨三月二十日旋蹕舟行正值閒呉雲宻幕逺峯鬟巧其晴寄江天外沃朕心滋麥隴間諛頌厭聞娱上下恵鮮益切憫惸鰥溟濛中裏敲吟罷迴望九龍失却山舟過揚子至金山駐蹕作巡鑾将次至金陵一宿程留浮玉仍向幸江寕自丹陽城霞閣舟行過揚子江駐金山一宿次日渡江遵陸駐龍潭兹仍其例風順而平送舟速江恬以静不波興佈隂樹葉餞春張去聲似繪山花望夏増拱讀穹碑今溯昔金山寺㳟刻予亦皇祖御製奉碑記辛未嵗製有恭奉聖皇太后駕臨金山母駕臨金山之記今風景如舊而觸目縈懐祇増感愴耳無心問景慽難勝句容道中作遵陸大江邉衢平直似弦所欣宜北馬乃覺勝南船麥穂秀将寔菜花開已全三茅曽不問我意匪求仙雨三月二十四日駐鑾見雨落作解聽雷鳴真是如人意自然宜物情飛簷垂瀑響虗砌受盆傾仍有非常願願兹達帝京三月十二日京師得雨二寸餘未似此優渥也晴用前詩韻渥雨入宵止庭柯乾鵲鳴利秧浸稲種飽穂喜麰情塵静沿峯轉谿喧赴澗傾棲霞喜停蹕指日到南京於棲霞信宿駐蹕擬二十六日至江寜慧居寺叠乙酉韻精藍據向陽熟路到曽常風静乃旛動禅圓而戒方寺原超下界僧自富齋糧試問出塵地可真選佛場愛他别室逈却盡納山光賜額慧居改寺本名隆昌在寳華山梁僧寳誌駐錫于此聖祖南巡勅改慧居寺賜御書額千秋名永揚駐棲霞行宫即事有詠於斯有宿因心境兩無塵樹色自太古山花又好春壺中仰天鏡座底俯泉紳一瞬十六載今來忽七旬題棲霞十景長江為帶曰山襟攝養寕因葯草尋幼挈老扶鋪蹕路惬予一十六年心右棲霞山行宫之内最髙處髙處得泉他鮮同滙作清池鑑毛髪諸峯圍印影玲瓏右玲峯池豎峯萬古矗嶔嵜髙閣仍兹偶對之太白香鑪詠瀑布一時日照想然疑右紫峯閣過眼浮光迅若馳重兹書舍萬松披山房設果刮目待猶昔人哉暫自知右萬松山房入自䝉茸得以深豁然開處見天心天心原在人心裏應向聖經章句㝷右天開岩㝷幽最喜得居宜逺郤俗塵引静思雅合付之僧紹輩千乘萬騎此何為右幽居菴詭峯揺刖復峆呀鋪谷傾崖蹙浪花是水胡然今不涇山靈直欲傲江巴右叠浪崖一泓無滓印空澄山脚泉歕珠顆砯憑攬不殊昔年况剔疏猶憶尹家曽江搃攝山棲霞寺碑稱尹先生記曰山多草藥可以攝養故以攝為名云云此泉復經前督臣尹継善疏剔亦今古因縁適相同耳右珍珠泉橋以虹稱溪以鏡藉来幻喻却成真因思世上號真者何一而非幻所因右彩虹明鏡闍黎公案底須刪又見巖雲佈徳山空也色乎難著語彼英英者祇閒閒右徳雲菴登最髙峯作歌縂斯一攝山巒壑𣲖分夥而皆朝宗頂如佛螺髻妥凌晨肩輿陟紫峯閣萬松山房幽居菴循徑従竒松詭石太古宗槎枒詰曲披䝉茸豁然開朗神心泰是乃造極髙之最落星以為襟長江以為帶攝兮無所不包含小哉採藥養生談是時天風拂嶃嵒峭寒切體旃衣添牛頭一帶俯視南此為足底彼峯尖孰能乘天風駕鸞驂消萬慮於華巖六朝往蹟誠其纎白乳泉試茶亭用皇甫曽送陸鴻漸棲霞寺採茶詩韻石壁𨽻書六嵗久莓苔生見明盛時泰攝山志即白乳泉試茶亭六字適自髙峯降遂縁曲棧行小憇笠亭幽慢試雲竇清曽羽茗蹟邈兹復傳其聲題太古堂就山以搆堂堂豈如山久斯堂固今為山實太古有居然堂占之寜渠非享帚名山意若云復久待可否武夷一曲精廬言勝彼以山是獨勝以水水亦非浩瀚一曲斯足矣渒􅀈掛崖口澴瀯圍砌齒武夷我豈見想或有同此因思世間物何莫非名擬春雨山房對雨山房號春雨昨至乃晴明適自山逰回山雲四面迎徐霏乍急陣簷泉遂霔聲峯姿及樹態隐現萬變生珠簾垂八忩鳯笙奏六霙把筆坐山房佳哉善循名既云踐其實便可以時晴晴快雨復時晴潤暄欣適平行宫背北麓曉駕指南京巡狩巡所守觀民觀我生幸逢諸事吉惟益懔持盈按觀九五之象朱子注之曰人君觀已所行不但一身之得失又當觀民之善否以自省察如是則君與民為二非一體而自省察之語亦属引而不發以余論之君與民本一體民心之向背宜觀也民風之善惡宜觀也民生之治亂宜觀也是此三者皆觀民之要而其餘宜觀者不可屈指數然此三觀皆應觀已之所行有以致之若曰觀已之得失又觀民之善否是朱子所謂話成兩橛而非一體矣因用象語故闡其義如此燕子磯即景巖徑度輿輕塵消泥不生暢觀縁造極快意是新晴栁絮殷勤舞山禽自在鳴長江静風浪來往任舟行逰觀音山永濟寺一帶山崖依大江棲巖蕭寺若吳艭下臨無地意無住上睇得空心得降何必孤舟錬鐵鎖俗稱鐵鎖錬孤舟恰如破浪挂筠䉶普門明示法惟識三界惟心萬法惟識又惟識故聲色摐摐出指月錄即境何妨聲色摐駐蹕江寜三叠舊作韻重臨白下古名區詎祇逰觀清蹕紆因以興亡弔吳國終當形勢遜燕都江河入畫神俱秀草木當春意轉蘇萬姓随鑾分左右恫瘝歡悦與之俱題明陵口號佳城三里近都城舉眼可瞻簷與楹彼子孫如無心可有心歎彼若為情題靈谷寺龍蟠因獨據象教以重遷莫辨興國蹟宋時是寺名却殊開善縁謂明季因建陵移寺亦即梁時寺名昔新今復舊空是色非禅小憩憑輿去鐘聲林外傳賦得日華川上動得暉字八韻江寕試題春旭初升曉晴川先受輝騰光纔旳㬇送暖向熹㣲平浦波輕閃深潭淵未晞隂陽山異號山南先見日為陽北為隂水北先見日為陽南為隂南北岸分圻晃朗驚鷗宿迷離起鷺飛懸華時上下耀藻乍依違輪駐羲仲馭錦披織女機拈毫咏浮景睪想謝元暉閲江寜旗兵詰爾方行寓覲光閲兵江表武維揚㣲風不動旌旗肅曉日偏増組練煌問俗此時思繼述駐防當日意深長毋㤀爾祖國之藎禦侮曽兹随豫王按豫王執明福王平江南其功不可泯戊戌春有㫖申雪罪愆並復其舊封號配祀太廟凡以旌前示後勵我宗潢而彼時隨王折衝禦侮皆我八旗子弟兵今兹駐防江寕者或尚有其曽元也雞鳴寺閲武有餘暇尋山試勝㳺雲梯登百級月宇豁雙眸普濟寺塔名仍瞻塔憑虗寺閣名亦倚樓孳孳善與利語憶子輿留逰清涼寺清涼山上清凉寺縮地五䑓為建康清凉山本山西五䑓山名不知何代亦名此山一統志無其名惟于石頭山附載之立字安名曷有定春風秋月自其常禅枝籠宇佈新葉慧草當階發古香左市右江都入攬不堪前代論興亾朝天宫宋時天慶此朝天易後名因洪武年道侣何須問修煉吾心原不慕神仙幻哉法術干星斗逺矣元言留五千朝賀習儀曰於此見一統志思量殷鍳意䕫然命大學士阿桂總督薩載同勘陶荘黄河及入海口事畢復命詩以誌事久聞海口淤議論紛聚訟實無善治法未可漫試用復聞決隄後海口淤塞外間頗有浮議逮四十三年儀封與時和馹先後决口議者益復紛紛而又寔無疏治之䇿及河工合龍後大學士阿桂赴行在復命因命與縂督薩載前赴雲梯関外履勘黄河入海情形以便籌辨溜自渦河縦徐州下流微舊河乃多空適值清水壮刷深海口送一弊亦一利却反資川降叶今者河初復善後事方衆新河俾開寛夏漲度可容叶雲梯関以外東注實無壅阿桂等勘畢海口復奏雲梯関外水面比兩岸低丈許海口外灘比現在水面又低數尺寛至三百六十餘丈河水東注並無壅遏無庸亟籌更易海口云云盖前嵗儀封河决溜從渦河而下適值洪澤湖水壮盛藉清刷深海口是安嶽河南雖被灾而黄河下㳺轉得利益矣馬港接西隄自属分提封阿桂等又奏馬港河有殘缺舊隄二道東隄長六里餘西隄長二十九里餘雖在雲梯関外但上㳺為腹裏民田毎遇盛漲即虞倒漾請将西隄殘缺及接築無隄處所聨至北潮河西岸民堰以禦倒漾自應知此籌畫其二套以下宜留分洩共二套以下由北潮河入海處所路㨗勢順設遇漫溢正可分洩盛漲宜留以暢逹尾閭無庸更行辦理建閘轉不必與水争利閧雲梯関外原不必與水争地阿桂等所請添建閘壩以資啟閉之處諭令停止灘地保無溢豁粮切瘝恫二套以下分洩盛漲則馬巷河隄東灘地即不能保無漫溢其應徴减則地畆錢粮並著薩載等查明奏請豁除大端既以示推行善叅綜巡方非徒來安民切深衷叶江寜故宫城歌江寜故城凡幾移秣陵冶城紛難考建康䑓城即在兹無過左右淆裏表一統志江寜在秦漢為秣陵孫權都此改名建業又舊志建業故城在吴冶城東厯代沿革名既更而地亦屡移䑓城在元武湖側輿地紀勝䑓城本吴後苑城晋咸和中修繕為建康宮又建康志今胭脂井至髙樓基二里即古䑓城地雖陵谷變遷地名屢易然縂不出石頭之左鍾山之右大江之南牛首之北而已率因世逺年已湮以訛傳訛殊不少祇有紫禁及故宫朱明蹟近還堪討然而殿閣無一存惟在柱礎埋煙草至元拆木輸大都舊志宋行宫在京城内大中街元至元十五年拆故宫材木輸之大都遺址僅存二十三年改為御史䑓至正十六年明祖建府于此後改築皇城于東偏稱此為舊内是故宫之一變也永樂重運燕京道明初築紫禁城營立宫殿當鍾山之陽規制頗宏整俗傳永樂遷都時運故宫材木于北京若元至正故事金陵宫闕遂鞠為茂草是故宫之又一變也午門斗城餘雉堞皇極殿瓦雙䲭倒福王覩斯應椎心卧薪恢復猶難保福王雖都此播遷之後一切蓽露殊無朝廟規制也而何耽樂信奸邪乃歎優人艱致好豫王得之未費力福王監國南京不思戈嘗胆以圖恢復而乃信任馬阮惟聲色是耽以致淪胥莫救時豫王乘霧統兵渡江援師悉潰福王夜奔太平執至南京其取滅亾良可歎耳荒涼豈縁兵燹擾即今城内駐旗兵尚覺空壙多溪沼憑輿小住弔興亾鍳戒慮深非炫藻江寜旋蹕駐龍潭行宫作巡狩無非事者然要於勝處戒流連金陵諸務既云畢觀民省俗閲武謁明陵考士子諸務皆畢容水一程適可旋殊昔攝山駐以豫向從江寕還蹕必仍駐攝山一㳺次日至金山程将百里兹改駐龍潭次日較近二十餘里圖今浮玉到為便怯行百里近廿里自覺鬢眉已長去聲年渡江至金山未至攝山駐省餘廿里程宻雲将作雨曉日忽開晴壠麥向暄秀野花得意榮金山到卓午風静剪江平金山妙髙䑓再和蘇東坡韻乙酉昔登臨契濶今庚子今昔誠瞬息南巡數千里逰豫為侯度無非為民耳是日渡江迴風平浪不起金山仍一宿拾級登䑓砥曰䑓而有屋甌硯潔陳几因繹妙髙義蘇句香沁齒上則碧寥天下則汪洋水妙髙合相觀借問非乎是爾時談禅句非活亦非死禅門問答有活句死句之殊見傳燈錄再題文宗閣四庫全書鈔四部八年未蕆費功勤集成㧞萃石渠者頌貯思公天下云今古英華率全薈江山秀麗與平分百川於此朝宗海是地誠應庋此文再題大觀堂渡江北上此維舟信宿仍教兩日留花事南邦未云謝樹隂夏院已加稠觀民觀我中心忖近詩有觀民觀我生之句意以民心向背民風善惡民生治亂皆應觀已之所行有以致之是為君民一體詳見前按曰旦曰明逝水流一再題吟泐齋壁自思結習可㤀不大觀堂對雨終日雲疎宻非煙是霧濛濕衣看不見盈手潤原同問政仍餘暇巡方半蕆功平山罷㳺舫付與詠思中再題文滙閣萬卷圖書集成部頒來髙閣貯凌雲㑹心妙趣生清暇撲鼻古香領浄芸身體力行愧何有還淳返樸念常勤烟花三月揚州地莫謂無資此匯文過金灣六閘書事車邏及南関金灣之上首㵼漲仍恐弱籌及六閘口然皆治標計治本計則否清口定水誌此事在壬午叶午壬南巡時親臨髙堰酌定視山盱五埧之誌預開清口東西二壩以洩湖水為釡底抽薪之計其五埧封土不令輕折下河十餘年來遂獲連稔釡底誠抽薪下河獲利久戊戌河决秋洪湖不能受無已開五壩戊戌秋河决儀封下㳺入洪澤湖宣洩不及無已啟山圩五埧歸之髙寳諸湖又以次開南関車邏諸埧歸之下河幸彼時髙堰無患下河早禾又已收晚禾補種無多未致成大灾盛漲由是走髙堰幸無害為以漸非陡下河灾雖䡖對民心自咎即今慶河復此事或希有底績無良方救弊惟増醜過車邏壩往南過壩時大河尚未復還北兹過壩故道歸黄瀆未復盻速復日夜問奏牘儀封未報合龍前日夜詢問黄河水勢入江南境之信随據薩載連次奏報黄水入江南境及至徐城水誌長水丈餘始知黄河歸故道矣歸故籌歸後夏汛防三伏然因定水誌自壬午酌定山盱五埧水誌不令䡖折車邏等埧常封固下河遂連嵗獲稔山盱守以篤戊戌秋河决注淮勢甚酷無已始開兹輕重權惟恧戊戌儀封决口料黄水定由淮入洪澤湖不得已始啟山盱五埧以洩盛漲逓歸下河幸早禾已收晚禾補種無多不致成大灾彼時權其䡖重不得不如此辦理也其餘率封土十年九遇熟然此幸而中去聲戒驕謙自牧五依皇祖閲河隄詩韻洪湖賴髙堰厪念在深宫費那惜官帑慮惟慙術窮黄流幸北徙清水暢南通自陶荘開放引河又築順黄欄黄二埧挑逼溜势黄流幸已北趋其恵濟祠一帶昔時迎溜頂衝處所今則清水暢流至彭口始㑹黄東注矣救弊補偏耳終艱永逸功洪澤湖五依皇祖詩韻碧净連天萬頃虚隄功咨度立觀徐迴蹕渡黄臨視髙堰及清口東西埧工據薩載繪圖請将三堡六堡等處卑矮磚石工加髙余以磚工不若石工經久自應一律改建石工逐段分年修築以資鞏固因令再行確核期于永逺安瀾即多費帑金不惜也可憐漁舫謀生計不避風濤此捕魚陶荘河神廟瞻禮春仲渡河日瓣香敬禱申何期即翼旦顯佑沭明神儀封决口合龍後阿桂至行在面奏十一日儀封金門尚濶三丈水深十一丈餘至午時南埧埽根北走興北埧接連随填壓稭料不三四刻立見断流而埽底亦無翻花過溜机縁巧合因敗為功此寔二月初十日渡河瓣香䖍禱之次日也河神黙佑誠神速矣詳見所作河復記南壩忽移北無心自合脣崇祠紀鴻貺惟益勵䖍寅渡黄河作越角呉根諸務成大河返渡禮壇棚幸逢今日全殊昨又見黄流得㑹清二月初十日渡黄有渡黄如渡清之句盖彼大河尚未復故道云息浪寕湏稱浪細無風真不啻風䡖天恩神佑欽承處自問何修益屏營命嵇璜薩載往徐州勘應添石工詩以誌事徐城經三臨無非民務急土工及石工次第籌詳悉丁丑壬午乙酉三次南巡均至徐城閱視次第籌䇿其河南岸既添甃石隄而北岸土隄則戊寅夏命劉統勲来徐相度議築者起自大孤山至蘇山以禦漫流而束河勢兩堤既成城郭田廬均資捍衛凡緩可待者擬翠華重出其工在城西石隄於彼畢欲接至韓山條石易一律自周家荘石工起至韓家山靈神廟四百三十丈地當徐城上㳺本擬一律椄築石堤以工可緩欲俟重臨指示故待至今庶可恃無恐黎民安井邑前嵗戊戌秋異漲徐城危岌岌上㳺决儀封此幸保無失戊戌秋黄水盛漲徐城勢處危險因上㳺儀封時和驛决口全河歸注賈魯渦河由淮入洪澤湖故此地幸獲保全然不可不亟籌鞏䕶之䇿矣是不可再緩前議應循緝獨是陸程遥来往百六十自朝荘牐至徐州陸路往還百六十里衆應萬騎随已亦七旬及因之罷親莅慙非勵無逸而斯事體大部臣家聲習嵇璜乃前河臣嵇曽筠之子習聞河務且亦曽為副搃河因命㑹同薩載前往勘視周家荘至韓家山一帯應河石工搃期永保安瀾不惜費帑也督臣夙治河情形審所必同往試經營復命重勘挹費帑非所靳安瀾籲永翕寄題黄樓四叠蘇東坡韻前年河決不忍説衝隄洚水滔天發下注賈魯傍四溢直達䝉亳洪流滑屢築屢頽嗟無計諸臣泥立濕衣襪前嵗儀封决口屡次堵築至合龍時毎被冲塌在事諸臣勞瘁河干甚至原任叅将李永吉随埽落水冲入回溜遇救生船登岸因賞給花翎復還原職滙入五湖畧澄澈委輸洪澤欲呀呷為思長此竟安窮引河加寛聚钁鍤阿桂等奏埧工屡被冲塌究以引河未能全掣大溜之故今擬自黄家荘引河中叚起于已開丈尺外再行儘力挑寛使其不待冲刷即可暢逹因允所請即令調集人夫上緊開工務于挑汛前蕆事是或釡底抽薪䇿瘒瘃夫工最憐煞徐州舊河成細渠空有香燈走神刹黄樓大異東坡時下俯来往櫓聲軋即今河雖復故道猶厪灾所飢饉壓徐城儌倖未被沴豈對此㤀彼疵齾賑窮逭賦縦亟恤那更餘力畜鵝鴨四畨險韻勉四叠興異老蘇託泛霅河復東坡詠河復乃復澶淵彼我今詠河復實復徐城此爾時雖曽入淮泗旋即堵閉仍北釃所以東坡次年晏黄樓謂東坡九日登黄樓事椘舞呉歌把琖喜櫽括蘇句自從紹熈南入淮經徐奪泗多年矣此實故道要亟歸天然合龍真幸耳阿桂奏二月十一日合龍時南埧埽根忽向北走與北埧接連随填壓稭料不三四刻立見断流而埽底亦無翻花過溜遂以蕆功此實天助神佑非人力也誠謝誠畏誠敬䖍以云誠感誠堪恥按蘇軾河復詩序云熙寕十年秋河決澶淵注鉅野入淮泗彭門城下水二丈八尺盖彼時黄河正道在澶州大名及濮鄆濱棣諸州其至徐州亦如近戊戌河决之由賈魯渦河五湖之入洪澤耳又統志稱今之河淮并為一瀆自金明昌始金之明昌當為宋之紹熈爾時宋雖稱姪於金而南遷之宋社故在也金之與宋祇可比為南北朝而非一統且此地亦非金所有當稱宋紹熈五年河淮并為一瀆又元時河徑徐州與泗水合則淮泗乃今日之經流而徐州為河故道亦久矣獨是熈寕時河復以澶州大風終日既止而河流一枝已復今儀封决口已一載有餘而合龍時兩壩天然巧合片刻收工豈非神靈黙佑非人力所能與乎既詳見河復記因感熈寕河復之事並識於此過桃源二首桃園明季譌桃源斌髙曰同畊古道存一再審之無其事知仁觀過昔曽論辛未過桃源時髙斌曽奏此地畊者鳴鑼集衆通力合作猶存古風且于隄旁呈覧及丁丑壬午兩經其地俱未見復一再問之督撫皆云實無其事盖通力合作即同養公田之説人心不古豈能行之今日髙斌非欺予者想受人愚耳前乙酉詩故有觀過知仁之論云北來麥穂綠董黄翻浪風聞餅餌香陶記寓同無何有便移此地亦何妨雷雨四月十二日清晨西南風細雨落旋止晴轉西北風倐忽大雲起南北氣殊有是哉南風雨止北雨来阿香推車殷其雷運河接上銀竹皚流離頓挫勢莫擬極量豎灑還横排是時安福御舟名閤閭坐兩岸萬民紛右左舉香瞻就雨弗避船齋入憩夫豈可執事雖有油繖支風絲時亦拂鬚眉侍臣則已衣帽濕時御前侍臣等䕶衛左右衣帽均已霑濕黄頭邪許齊力施風雨歸舟畫活脱石渠寳笈舊蔵風雨歸舟圖為宋李唐所畫煙景蒼茫與此時情景絶相似更因濟川憶命説同舟濟不勝僂指如説其人則有㡬夏家馬路運河東帶大河西左右牢防恃兩隄放淤較前雖積土加髙應畀兩隄齊壬午乙酉兩次親臨夏家馬路指示河臣築月堤于深塘内進黄放淤今積土雖較前加髙然必湏與左右隄岸相齊方為稳固因復􅎔視面諭陳輝祖令其照前放淤以資保障安瀾龍王廟三叠舊作韻欲勘流歸壑暫教艫安福艤河萬年資普濟一氣達洪渦清浦纔申悃二月初十日渡黄河甫于陶荘兩河神廟申誠黙禱而十一日遂有儀封埧自行合龍黄河順歸故道之事詳見河復記宣防竟蕆歌由来叨一佑陶荘儀封相去雖逺而其神靈昭貺正如水在地中無往不在固不當論在此在彼是一是二也敢不謝斯過繼志勵無忝此廟雍正五年皇考所建答庥曰若何恵民敷化雨克巳息心波嵇璜薩載㑹勘徐州石工畢復命詩以誌事勘河貼説繪圖還同是隄防非剔鬟新石重教増舊石徐州城外舊有石工三叚長九百七十餘丈較之丁丑南巡時親臨指示所見新石工用石十七層者短少二三層不等前嵗黄流漲盛僅出水數寸因命嵇璜薩載㑹勘将舊工分别加髙二三層務與新工一律相平以資鞏䕶韓山一律接奎山自韓家山至奎山一帶四百五十丈當徐城上㳺向止堤堰攔禦茲命㑹勘改築新石堤内四百三十丈應砌石十七層其接連山脚之二十丈地勢較髙砌石十二層以上各工共估需銀九萬二千餘兩即令薩載等核寔採辦運工接築統于来年四月以前工竣補偏救弊惟斯亟永逸一勞真是艱行水禹之行無事言思及此輒頳顔過牐運河利有牐為節盛則宣洩弱則蓄設使無此資操縦一往就下後難續牐束水因水勢雄拖犂牽䌫忙船工左支舟或屈於右西掣牐翻撞其東閤閭坐視乃生笑一切罷之去呼噪無何牐牆亦自過河有尾大致不掉朅爾因憶杜老詩本無事而庸擾之過伊河入運口㣲山洩漲亦名伊此伊河非伊洛之伊盖微山湖㑹牛頭淶栁之水並金鄊魚䑓二縣水由南陽昭陽等湖滙成巨浸其尾閭一由荆山橋河入運一由韓荘湖口新舊二牐入運丁丑嵗因湖水漲盛開此伊家河一道長六十九里由韓荘牐宣洩入運嗣後酌定水誌于湖口牐迤北添建滚水石埧量水勢大小加板蓄洩以資濟運兼利農田寔為一舉兩得酌濟其間利運資一舉不妨成兩得由來事縂在人為㣲山湖受潦利民田輸川濟漕運水匵功實鉅節宣要勤慎前人貽良規行之在後進無貴屢更張亦戒怠弗振即事吟五言或補司河訓舟行自入山東境舟行鮮御驂毎出船頭坐為便萬民瞻兩岸堪縦目沿路農功探麥穂秀以齊灌漿浪含含大田種亦畢出土發翠尖獨是㣲覺燥風日漸烈炎雖未堀堁甚弱苖恐難堪何處非吾民為望時膏甘夏雲佈四宇庶㡬三寸霑雨四月十八日卓午雲纔佈交申雨遂紛沃心副希冀今曉舟行有為望時膏甘之句以近日畧覺風燥也澤物特殷勤期䟎五日近五風十雨已為時若期昨十二日雷雨兹纔五日耳潤霑四寸深山東巡撫國泰奏报濟寕州境及所属魚䑓嘉祥汶上三縣于十八日未時至戌時得雨入土四寸四野深透入宵聴淅􅅹惟惕以為欣晴夜雨詰晨霽河風拂曉寒露光平野潤雲氣逺天殘溪路依然溯麥田頓改觀前途農務况次第待憑看登太白樓三叠舊作韻步輦濟地曉入闉萬民瞻就愛情真清逰趂此暇之便豪飲殊他主與賓却以飄然緬昔句謂杜子美詩益教愴爾憶前巡丙申東巡掖前益輦經此追溯如在目増感愴拈吟鬚忽七旬逮豈是不踰矩者人題南池少陵祠三絶句狂歌適陟太白閣苦詠今瞻子美祠咫尺遺踪隣左右吾心乃覺醉於斯詩仙雖具出塵體詩聖原多憂世心問我二人優劣者試看七字定評吟三間古屋亦㝷常却覺迎人翰墨香安得清閒無一事展他遺帙與商量謁分水龍王廟僢釃背流原是合千秋通漕著竒勲永資神佑恵無射亦藉人謀識不羣謂白英老人識水性者上水船兹為下水北沄波轉㤀南沄裴家庭裕姚家洎優劣殊他頃刻分登光嶽樓即事三叠舊作韻二首東南巡狩浙蘇區鷁首歸瞻西北隅暫命行艫艤河岸遂乘輕輦入城衢祇因為度觀民切畧厭排當接路鋪麥固望收塵土大却愁近日雨膏無自十八日雨後晴霽六七日漸覺風燥為之望澤又殷矣統志今殊府志區為光為望各分隅一統志以望嶽樓在聊城東北今名光嶽樓而東昌府志又以光嶽樓在府城中而城東北隅又别有望嶽樓即一事而紀載譌舛如此其不足信前乙酉辛夘丙申諸作屢辨之謝他舊跡尋東北府志所稱東北望嶽樓今寔無之盖久頽廢而此樓基址宏固益足經久祇此層甍據巷衢不必誰何七萃肅任教瞻仰萬民鋪銀牌侍衛行行賜可果其中漏者無無為觀再叠舊作韻南巡出法宫蕆禮既惇崇歸舫兹停舫三公謁帝公觀中祀即三官大帝世傳茅家三弟兄上帝之三公也午年忽經亂申嵗此歌功甲午秋夀張逆匪王倫倡立邪教糾衆作亂佔踞􅎔清舊城寺廟民居多被殘毁此觀亦重經修整丙申東巡經此作臨清歌以紀其事象設惟冲漢無為佈澤鴻雷雨四月二十六日過午燥西陽傍晩升雲氣湏㬰作雷聲雨絲忽棼至篷忩遂摐鳴一川􅓴雭意喜而不忍眠然未敢即慰曽弗消片時雲輕雨亦細患失果失之徘徊惜難置迴鑾至徳州行宫作舟事昨朝蕆陸程今曉登十旬忽已閲一豫敢㤀競邇日望雲切乾田待澤仍行宫詠舊作壁間舊作多問之安迎輦什至丙申留題尚云祇為頥詠彌躬衆忱切又聞縮頓數間成迴環諷覺増懐益覺悶懐増入直𨽻境燕齊近接境疆吏肅迎分一例坌塵堁忽看起夏雲雨霏旋即止是日㣲雨心惜那能欣麥穂灌漿候為之望澤殷河間道中作五月初二日前朝修市雨淋纎四月晦日獻縣北今五寸霑尚見牛蹄涔積潤不湏蟻穴象重占資蘇藂簇麥麰穂改觀去聲菁葱禾黍尖迤北未知澤何若速教詳視騎程兼河間道中於四月晦日得雨五寸今日經行尚見四野含潤頗為優涯其迤北各處是否能一律普霑仍深厪念因令袁守侗馳騎探報由來方幸河間北霑雨由來迤北旱還同都無卅里土膏潤原祇一天風日烘行路那能免旅况閲田惟是憫農功歸輿已自嬾吟興吟以恒𤾉益省躬夜雨五月初四日夜雨忽聲傳簷牙滴溜泉沃心盼未定傾耳聽無眠半刻遂中止他方徒逺牽凌晨馳探騎一寸澤猶愆初四日趙北口入夜時雷雨大作半刻旋霽因令袁守侗遣人南北馳探數十里均不及寸益勞厪念耳端午日於趙北口作迎鑾近逺發伻郵端午日駐蹕趙北口班禅額爾徳呢遣喇嘛伊什巴爾珠布及哈薩克使臣色徳克蘇爾坦等前来迎覲即于行宫前設龍舟水嬉賜宴其自京迎鑾及扈從之王大臣等並命與宴以昭慈恵是日内閣本報亦至仍照常批發不因宴賞致稽政務也午日燕南趙北州嘉彼傾陽来雁使恰兹臨水示龍舟率因逢節俾懐恵實自望霖未解愁春孟去而夏中返光隂訝似逝波流南巡迴蹕駐御園之作往返十旬勤省方湖淮河徐海浙各䇿籌蘉南巡要務在河工海塘而洪湖清口尤為治黄関鍵昨親臨閱視罷揚荘河口改移之議其髙堰三堡六堡等處卑矮磚工改建石工逐段分年修築又暢開陶荘引河俾加寛深復命大學士阿桂等往勘雲梯関外海口自二套以下留以分洩盛漲暢逺尾閭不必與水争地其灘地應徴減則地畆並令薩載等查明請豁又命尚書嵇璜等往勘周家荘至韓家山改建石工四百餘丈並将舊石堤加髙層數與新堤一律整齊至浙江海寕柴塘四千二百餘丈雖尚完整然究不如石塘之鞏固因命督撫勘估改建石塘俾濱海羣黎永資樂利三春時若南邦閲首夏澤殷北地望自四月以来直𨽻山東望雨頗切惟濟南一帶于四月三十日已得透雨至徳州以北則仍盻渥澤詳見前詩閲若怱怱時度速望殷切切澤愆長寸衷更有難堪處萱戺那重問豫慶欽定南巡盛典卷十八
