body:
  text: 河防豫省青龍岡漫水由東省微山等湖滙注江南邳州宿遷桃源運中河內水勢盛漲汪洋浩瀚我皇上宵旰勤求廣籌宣泄機宜有駱馬湖五道尾閭劉老澗九孔石閘并十字河臨運壩等處去路其桃源境內上自古城下至楊莊計程百二十里並無旁泄之處乾隆四十七年河臣薩載以衆興集南岸顧家莊縴堤距黃河縷堤一百十丈上下有格堤二道天然關束隨於中間奏開挑引渠將兩堤挖槽放水暢泄入黃以减盛漲之勢中河大堤安然無恙其安東沭陽海州一帶地方所全者大矣乾隆四十四年河南省漫工未竣一屆伏秋黃水下注勢必由淮入湖皇上思患預防令將東西􅄵及早盡行展拓以資暢流尚恐湖水加長特令於他處别籌分泄如髙家灣一帶並歸仁堤左近俱經上厪宸衷河臣遍行相度髙家灣迤下吳城磚工迤上三堡地方堤外有灘離黃河邉計寬二百九十餘丈測量湖內灘水髙於河內積水三尺七寸若由此分泄則洪湖自可多一分去路但河南省漫水由淮入湖原屬偶然之事今開放黃河堤工分泄只可為權宜之計既不便過寬亦可無庸建設閘壩擬將堤工挖寬二十丈兩頭用料裹護中以竹絡鋪底以免跌塘外挖引渠形如倒勾逹於河內暫資分泄上游豫工一有合龍之信該處即應堵閉如此籌辦即使黃水下注湖水盛長亦可稍資分泄是亦補偏救弊之一法爾河水至髙家灣直趨而下去清口甚近易於倒灌而惠濟祠之掃工亦每受險乾隆四十一年河臣薩載奏西壩一帶逼近黃河自建設木龍以來挑溜東行淤出灘靣自一百四五十丈至三百三四十丈不等甚為有益然遇黃水盛長之時大溜直射惠濟祠由祠前回溜倒灌流入清口此一帶雖經修有磨􅌉掃壩攔禦而黃流勢盛仍屬無濟今在於陶莊迤上積土之北開挖引河一道至周家莊㑹清東注俾清黃並流入海既可越過惠濟祠逺避清口倒灌之路而周家莊迤下兩岸灘靣尚寬離堤較逺相距中河口門尚有三百五十丈溜向東趨形勢較順引河挑竣仍擬在於河頭對岸第三架木龍處做一挑水壩挑溜全歸引河並築挑水及攔水大壩如期工竣四十二年又請將陶莊積土翻築堤工一道從新壩根起直至河尾以防漫灘水勢並舊有縷越堤工請於越堤下尾接長以越作縷俾資捍禦又薩載靣奉諭㫖於清黃界壩上首加築壩工一道以為重門保障自添此壩而河流之南逼者不致直到攔黃壩根仰見籌畫精詳無微不至四十三年皇上指示將攔黃順黃二壩空塘填平續奉諭以所填止就河形寬窄而止尚餘壩身一段未經填實令於此內一律填土又自界壩斜抵順黃壩尾添築撐堤一道四十五年大學士公阿桂傳㫖令蘇州布政司吳壇隨抵清江與薩載同至陶莊將新河逐一相度勘量現寬六十餘丈者挑展十餘丈不足六十丈者挑展二十餘丈河勢通身寬展偶有盛漲亦可無虞蓋自陶莊新河開成並築攔黃順黃二壩而黃水永無倒灌之虞惠濟祠前向來最險之處亦化險為平矣河工挑溜以衝刷積淤惟木龍最為得力乾隆五年河臣髙斌奏於御壩添設木龍五架挑溜北趨以刷陶莊積土十四年又經添設二架四十二年河臣薩載奏清口舊有木龍七架內五六七三架在新壩之下淤入土中應將各龍木植刨挖拆起以為將來改扎木龍之用至頭二三三架正對新河挑溜有力第四架已在新河口下移在二木龍上扎做則挑溜護灘更有禆益又奉諭頭架木龍之上應添扎木龍一架遵御筆圈示處所將第三架拆起舊木如式添建長五十丈又查得頭架木龍龍尾起至二木龍頭空檔長一百餘丈相距較逺挑溜恐難得力於中間再添一架其陶莊新河南岸河崖自峙家莊對岸起至河尾一帶共長三百四十一丈將拆存舊木添扎三十丈長木龍一架又於下首再添二十丈長木龍二架分段安設以資挑溜直刷北岸而南岸河岸亦可永資保護矣外河自陶莊引河工成溜勢利順不復漾入清口乾隆四十六年大學士公阿桂奏于順黃壩南岸一帶御筆尖記飭令添築新堤一道河臣并將御樁亭之西硃筆㸃記處所築磨􅌉大壩先後儧辦自新堤成而沿河即多一層保障且河流順直于新河形勢有禆自磨􅌉大壩成而河溜不致卧進有礙木龍既可保護南岸灘崖又可挑溜東趨實為有益陶莊新河告成後溜勢時向南趨仰䝉聖明逺照指示全局機宜在於攔黃壩外添築順黃壩工以為重門保障河臣禀承睿訓鳩工儧築禦水之衝即以順水之性但順黃壩外全河大溜直趨甚關緊要乾隆四十五年恭逢翠華南幸復荷聖謨廣運智炳幾先命將空塘用土填平以資保障永逺安如磐石矣外河順黃壩後空塘一經填實形勢改觀而攔黃壩塘內尚有積水年久浸潤風浪搏擊亦足為堤根之患乾隆四十九年我皇上六巡江浙廣咨博訪以期安益求安河臣仰體聖心熟加籌畫又奏一併填平前後聨成一氣既堅且實洵為萬年鞏固云工程視形勢為轉移方中肯綮舊章可循而不可執此機宜之所由生也王營减水石壩創自康熙四十五年减泄清黃異漲之水由鹽河至北潮河歸海藉以保護外河山安海防兩岸工程屢著成效但壩工厯年久逺旋修旋塌啓閉為難揆厥所由因舊壩離河僅二十餘丈開放時溜勢湍激激湧易于冲損乾隆四十六年河臣審度地勢河形㑹籌改建移下八十五丈距黃河縷堤百有餘丈下至鹽河一百六十丈另建石滚壩一座金門仍寬三十丈由身改長二十丈較舊壩落低四尺使壩面坦坡下注溜勢伸長不致過激上下兩唇用碎石填護倘遇水大啓放宣泄即免衝跌之患較從前可經久云乾隆四十三年二月河臣奏將運口改移舊鹽壩以東河頭起至李家莊出口止挑長一千一百九十一丈口寬十六丈即以挑河之土築做兩岸縴道其李家莊河尾􅌉做頭壩酌留口門寬八丈頭壩以上一百丈處􅌉做二壩酌留口門寬十丈二壩以上一百八十丈處􅌉做三壩酌留口門寬十二丈又於迤上一百二十八丈􅌉做鉗口壩酌留口門寬五丈至此以下估挑閘上引河長二百一十丈以挑河之土兩岸築做堤堰該處引河尾建鹽閘一座計石二十二層閘下一百丈􅌉做兜水壩酌留口門寬五丈又新河頭兩岸􅌉做褁頭酌留口門寬六丈冬春堵閉蓄水濟運重運漕船過竣即行開放節宣水勢以濟鹽柴運行四十五年聖駕南巡親臨指示此河止可宣泄異漲水勢漕艘運行仍進楊莊口門毋庸更易河水自王家營折而南趨為毛家嘴老灘所扼大溜直射老壩口掃工該處縷堤單薄後塘寬濶積水過深甚為險要我皇上厪念河防諭謀長策河臣恪遵聖訓勘籌審度積水廣而且深設法宣放既無可通之路戽乾填土又恐所費不資乾隆四十八年冬自老壩工起下至紅幅莊一帶堤工確估幫培現在底寬一十九丈頂寬十丈至十二丈不等嗣後遞年酌量培厚加髙即可永資捍衛駱馬湖在宿遷縣之西北境環繞一百五十餘里上承東省䝉沂白馬諸河之水滙為巨浸一由湖之尾閭泄入六塘河經宿桃安清海五州縣入海一由運河北隄入中河至楊家莊滙黃入海此湖水之源委也駱馬湖入中河之處舊即十字河口門與竹絡壩通黃之口門正對黃水盛漲之時直趨灌湖日漸淤墊雍正五年河臣齊蘇勒將通湖口門堵閉另於上遊王家溝建五孔石閘分泄湖水入運以濟漕因閘底較髙不能暢流經河臣髙斌將石底起深以資宣泄復於乾隆十三年在王家􅗂迤下栁園頭建三孔深底石閘設板啓閉內挑通湖引河一道長一千餘丈引𨗳湖水以濟運謹按中河重運經臨須藉湖水接濟當預為收蓄以濟運行是以冬春常慮其不足宿遷等縣之民田俱為駱馬湖下游經由入海之地一經泛漲每致淹浸是以夏秋常慮其有餘每年於霜降水勢平定之時將尾閭正引河寧家河等處一律堵築瀦蓄湖水不使外出來春糧艘盛行中河水勢微弱將三孔閘啓板并於王家溝分泄以濟漕運之不足至夏間糧船過完二麥收穫之後將尾閭啓放由六塘河下注又恐六塘容受不能過多將正引河寧家河等處相機酌放不令全啓使之循序而進其通運之三孔閘王家溝仍照舊啓放使由中河分泄是駱馬一湖冬春水小則宜堵壩蓄瀦以收濟運之益夏秋水大則宜相機啓放使無泛溢之虞康熙三十九年河臣張鵬翮於桃源運河北岸劉老澗地方建九孔石壩一座以宣泄運河之水由六塘河經海州安東縣之碩項湖串入運鹽河以逹於海嗣因黃水入運勢盛每一啓放散漫停淤兼之六塘河為駱馬湖下委每遇伏秋水勢頗為浩瀚若再添入劉老澗减泄之水難於容納致滋泛濫河臣髙斌於乾隆十一年奏將劉老澗壩堵閉無容常放又王營减壩係康熙四十五年河臣張鵬翮建造以分減黃水由運鹽河入海但鹽河地靣窄狹即使啓放所泄不多不能减黃河之水勢而黃水挾沙灌入反將鹽河淤墊有損無益將王營减壩照乾隆八年原議必俟黃水異漲始行啓放今黃水不入中河河道日漸刷深暢流下注更無藉劉老壩石壩以資分減至王營减壩既無分减實濟又慮􅌎墊鹽河并使六塘河下泄之水流行不暢均無禆益自應照舊堵閉非遇異漲無庸啓放鹽河係康熙二十六年河臣靳輔題請挑濬由清河縣厯山陽縣之朱元莊安東縣之平旺河逹袁家河至海州之新安鎮武障河入潮河歸海其臨運之口門舊在清河縣西四十二年改運口於楊莊遂移鹽河口門於楊莊迤上之花家莊建造石閘以資啓閉雍正九年因大溜下移形勢不順將石閘堵閉改建草壩為淮北各場鹽艘運行并葦蕩左營暨各㕔運料之要道其所經之清河山陽安東海州各邑民田藉以灌溉民間柴米船隻藉以通行而中河盛漲之水亦於此分泄每年當冬春中河水小之時則將鹽河口門草壩堵閉以蓄水濟漕夏秋糧艘過完之後則將草壩啓放以運送鹽柴船隻為利甚溥但河身逼窄而河道又紆曲綿長從前宿遷竹絡壩口門通入黃河之水挾帶泥沙與王營減壩之水俱泄入鹽河往往易致淤墊阻礙鹽運今竹絡壩與王營減壩既皆節宣有制則黃水自無沙停淤淺之患復於鹽河以下之武障河項家冲牛墩河六里河義澤河等處各建滚水石壩使水勢蓄泄有度惟在口門草壩啓閉合宜則運道民生與鹽運工料均資利益楊家莊運口康熙四十二年奉聖袓仁皇帝指示改挑以利漕運先是中河運道由清河縣之上仲莊閘出口形勢未順逼溜南趨切近黃淮交㑹之區有助黃灌清之患經聖袓仁皇帝巡視南河審察形勢指授善後之計命於陶莊迤下之楊家莊改挑運口與仲莊閘相距十餘里在清黃交㑹之下游黃流平緩情形頓異惟時河臣張鵬翮奉諭於清河縣運河之雙金門閘地方挑河長二千三百八丈兩岸創建堤工因雙金門閘磯心窄狹難以行運盡行拆去另建草壩裹護又建草壩二座均為鉗束河流之用嗣因中河水勢充暢無需石閘啓閉惟添建三草壩足資收蓄使清水不致驟泄又得遞加約束鼓其力以禦黃此皆聖謨獨斷指示楊家莊運口得地勢之宜既避越清口不致助黃灌清而中河發源東省千里長流順軌東注從無倒灌之患迄今利賴無窮洪澤湖在山陽縣西南清河縣東南旴𣅿縣東北周環三百餘里發源河南桐柏經信陽羅山息縣光州新蔡固始霍邱至正陽關與汝水合又經安徽夀州與淝水合厯臨淮懷逺五河泗州旴𣅿合豫皖諸山河之水滙為洪澤湖由清口㑹黃入海堤工自武家墩至秦家髙岡長一萬七千餘丈查洪澤湖地居淮揚數十州縣之上游堰旴隄工所以障全淮之水使不得分流旁出併力北趨以與黃㑹復分入運口以通運道乃黃運兩河之關鍵也先是堤身單薄石工間段幫築不足以資捍禦屢致衝潰淮揚頻告水災淮水勢分力弱黃水倒灌入湖運口淤墊運道民生均為可慮自聖袓仁皇帝南巡親臨指示堅築髙堰堵閉六壩使淮水得歸故道暢出清口雍正八年世宗憲皇帝特降諭㫖以治河之道惟有使黃水暢流無所壅滯則永慶安瀾然欲使黃水無所壅滯必須保固髙堰堤工使清水力能敵黃且以助其暢流之勢則河工可以永逺無虞發户部帑金一百萬兩將堤工險要之所及單薄之處俱加修石工務令堅固髙厚以為久逺之計蓋自石工大加興築以後屹若金墉捍禦洪澤全湖巨浪保護淮揚二郡民生蓄清㑹黃利漕濟運聖德神謨功成底定誠千古不易之章程也查髙堰一帶石堤現今完固間有舊石工殘缺隨時修整惟土堤緣湖水汪洋浩瀚兼有西風鼓浪洶湧搏擊漸次汕刷尾土查自武家墩至秦家髙岡有寬十餘丈者有寬七八九丈者且有僅寬五六丈者雖土堤之外俱有磚石工程而萬全之策必須將尾土修築髙厚計堤長一萬七千餘丈通身幫寬一律以十丈為率約需土方銀五萬餘兩即於堰盱二㕔嵗搶修柴掃工內分年節省妥辦數年之間一律完整該處土性頗堅足資捍衛既有石工以為外捍復厚其土堤以資保障髙堰一帶大堤益增鞏固欣逢鑾輅南巡親臨指授正以仰體世宗憲皇帝大修石堤保固髙堰之聖謨昭埀久逺而淮揚數十州縣民生咸底安全實為萬世永賴矣洪澤湖三滚壩於康熙四十年河臣張鵬翮題建一北壩一南壩俱寬七十丈一中壩寬六十丈因其時六壩既經堵塞大汛水漲若専恃運口以為尾閭則髙堰危於是議設減水三石壩以泄溢槽之水其舊壩原有天然南北二壩仍留以備異漲各壩滚下之水俱由草字唐漕等河分泄入白馬寶應諸湖厯髙郵邵伯入運以逹於江乾隆十一年河臣髙斌將滚壩迤南之蔣壩石閘修建每年酌看情形相機啓放查洪澤湖㑹黃濟運必須併力收蓄使之常盛方能暢出清口不致有黃水倒灌之患值伏秋盛漲有餘之水必早為分泄髙堰一帶方能容受現在南北中三石壩總以髙堰水志長至八尺五寸以外聼其過水其八尺五寸以內則水已低於壩脊常得收蓄以㑹黃濟運既可泄溢槽之水仍能留平槽之水則減水之法莫如滚壩為最善至天然南北二壩該處係屬土壩並無石基一經啓放則全湖之水徹底奔注寶應髙郵邵伯諸湖勢難容受必須將運河東堤南關車邏等壩啓放下河各州縣田廬受淹且分泄太多水退之後湖水受虧不能㑹黃濟運是天然二壩誠未可輕議啓放也謹按洪湖為全淮委注之地汪洋浩瀚天然壩既未可輕啓若専恃南北中三滚壩過水其蔣家閘分泄亦屬無多不能一時消退設遇出格之水湖身不能容受因於乾隆八年奏請添建二滚水石壩估銀一十一萬餘兩嗣經廷議以天然壩地亢灘髙所受之水原係淮漲分流漫注倒漾之餘水令將現在土壩改與南壩相平過水停其建石逮十年南滚壩過水二寸即啓天然土壩汕刷寬深仍係徹底開放隨經搶護堵閉十一年復奏俟南滚壩過水三尺之時再行相機啓放十四年湖水加長自六月初一日滚壩過水後至七月十二日水勢有長無消滚壩過水已至三尺一時不能消退髙堰全隄甚為可慮急須啓壩分泄實因下河民生關係是以慎重未放幸水勢漸退保護無虞試驗水勢情形若再添兩滚壩則減泄既多水退自速仍照八年原議相度地勢添建二石壩其天然舊壩照舊堵閉庶節宣有制異漲既可多為分減而過水只在壩面以上一經平壩便已斷流於全湖應蓄之水毫無損礙與天然壩之徹底啓放致清水受虧者迥别兼之循序漸下下游不致驟漲而髙堰一帶又無危險之患矣洪澤湖滙豫省七十二山溪之水出清口㑹黃以注海為黃淮之要津全河之關鍵藉力於東西二壩以定機宜蓋黃水勢大則遏淮而內灌故病淮即以病運者莫如黃禦黃即以利運者莫如淮淮水必使其有餘始可為治黃利運之用東西兩壩所以調劑盈虛權衡蓄泄者也西壩常宜保守以抵禦黃流無庸輕動東壩則視水勢之消長酌量盈縮以為拆修冬春湖水未發將壩接長收窄口門預蓄以培其不足夏秋湖水盛長將壩拆短放寬口門宣泄以瀉其有餘惟期助淮之弱抑黃之强無使遏淮倒灌合趨以注海是淮黃並行而不相悖全資清口蓄泄之適其宜也先是運口與清口切近直對濁流易於倒灌運道屢梗逮後數經更移未得其地乾隆二年奉諭移於舊運口迤上七十餘丈與三汊河相接得以避黃而納清第運口分淮入運為淮揚三百里之咽喉以通漕運惟量分湖水足以濟運而止無庸過多以致泛溢前明曽建五閘以為收蓄因年久傾廢嗣後修復天妃越河石閘各一座不足以資節束每於湖水長發下有吸川之形上有建瓴之勢空重漕船過閘甚為危險而髙寶一帶每致溢岸盈堤於運口之內建草壩三座惠濟正越兩閘之下酌建正石閘二座越河石閘二座又於二閘尾各建草壩重重關鎖視水勢之大小更換啓閉庶水平溜緩操縱由人又於十一年奏請運口頭二三壩口門俱收窄以四丈為度俾源頭進水有節則下游自無盈溢之虞淮揚兩郡河水安瀾重運經臨正值汛水長發之候而惠濟各閘水勢平緩糧艘挽拽過閘便易非復昔時危險矣欽定南巡盛典卷五十三
