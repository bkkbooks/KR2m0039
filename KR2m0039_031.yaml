body:
  text: 欽定四庫全書欽定南廵盛典卷十九天章甲辰直𨽻山東詩南巡啟蹕五叠前韻有序時邁東南望幸俞六巡之請言觀河海省方考三載之成惟民事之大宜勤先咨樂利體乾行之健不息遑憚舟車典數虞周途循江浙昨嵗豳豐展禮萬年仰締造之艱今兹吴㑹敷㤙兆庶慰尊親之戴石塘鱗次潮平籌走中亹砌岸山連軌順慶安髙堰况復源探星宿瀾廻際二月桃花時若雨暘蹕路看三春麥浪自郊畿以遵東魯由淮海而逹錢塘陸館水程戒大吏改前巡之舊人和政肅示後昆知家法之嚴軔啟首塗韻成五叠從此韶開九十因閏餘而媚景添長佇斯里記三千值幾暇而新篇嗣詠云遊云豫豈云辛休助期霑望幸倫五載考功速虞狩庚子南巡至今甫三載一章時邁舉周巡海塘條石從新築庚子年南巡時以海寧柴塘究不如石塘之鞏固因命該省督撫逐叚確勘凡可以改建石塘之處一概從新改築石塘並勅江省恊濟石料次第建築俾濵海羣黎永資樂利河堰並山接舊申徐州河南岸既於丁丑壬午乙酉三次南巡時添甃石堤其北岸土堤則於戊寅年夏命劉統勲往徐議築均資捍衛至南岸韓家山一帶工程四百餘丈地當徐城上㳺於庚子南巡時命嵇璜與薩載㑹勘改築新石堤即令核實採辦接築完固况值黄流初順軌益勤赤縣普安民前嵗經大學士阿桂等奏自蘭陽三堡至啇邱七堡南隄外添建大隄開引河一百六十餘里𨗳河水入渠下注啇邱歸入正河故道安流入海其黄水經行處所如山東之曹兖濟寜江南之豐沛等屬從前皆不論月分常予賑恤所有各該處情形元氣是否全復尤爲軫念水程陸館惟遵舊綵結燈張戒慢陳㩦子更殷身示度昨允薩載等陳請諏吉六巡臨幸江浙親閲河工海塘以愜輿情所有沿途行宫坐落一概仍舊毋稍踵事増華並命皇子等隨往觀看沿途水陸扈從人等約束整齊迎鑾士庶忻戴至誠必如此然後可言省方問俗度若不能不如罷巡幸之舉不啻耳提靣命矣觀風誠幸氣如春媚依黎庶懐仍昔資借精神句倍新佳麗山川往擬别古稀合以罷巡頻南巡諸作最多不無秀麗江山之助兹年逾古稀意此後可不事命駕矣良鄉行宫五叠舊作韻復此一巡發京國逮兹六度渉呉江行宫初頓駐鑾早饒得拈毫倚緑忩别館無煩修餙勞閲三年雅稱去聲棲遨自庚子南巡閲今纔三載沿途行館均屬整齊先期諭令一切俱仍其舊毋庸再加修飾省河觀俗胥正務寧爲江山助興豪立言憶務去陳句爲政當知愜衆情休助非闗循故典欲酬望幸萬民誠百雉縣城平野南髙低積素正濃酣豐年後蓄倉箱否明日前途歴攬探郊臺行旌發廣陽臺逈向南望兩度斯郊勞去聲将庚辰春二月軍兆惠等平定凖噶爾回部凱旋於良鄉縣南築郊臺迎勞成禮丙申夏四月将軍阿桂等平定兩金川凱旋重修郊臺具儀迎勞如庚辰之禮一心感昊慶春初苔色淺嵗久樹隂長惟願無兹事佳兵豈有當𢎞恩寺花宫路必經取便小留停那計今和昔欲忘色與形階蕪未染綠庭栢祗拏青旋命輕輿去簷風響送鈴琉璃河時節值初韶氷凝雪未消薄寒切輕輦凍浦度長橋溱洧非子産杠梁縁豎貂琉璃河石橋千尺接以石路頗便行旅相傳逆璫魏忠賢故里春秋祭掃來往經過軒幢羽盖騶從萬數有司畏其權勢爲之修建勝朝時事至此可爲浩歎屢見前巡琉璃河詩逆璫勢如此觸目歎前朝降㫖寛免直𨽻各府民欠倉糓詩以誌事三輔比年幸有収直𨽻連嵗俱獲有収昨嵗臘前復連得雨澤於春麥尤爲有益偏灾春借合償秋未完之項自餘積概予其蠲莫更留直省從前偶被偏灾地方尚有積年借欠未完倉榖但按限催科民力不無拮据兹清蹕所經命該督劉峩飭查順天保定河間天津正定順徳廣平大名宣化遵化趙州深州等十二府州屬所有未完積欠倉榖十五萬五千二百餘石概予豁免用普春褀老㓜計資衣與食豫遊義在助和休雖云臘雪深培麥膏雨其時望庶酬涿鹿行九叠前韻常聞衆志合成城曰休曰助惟巡行時邁其邦天子之設失其度戒亦明蠲租逭賦徳期飽惠施那計収成好去年直屬雨水調匀収成豐稔今嵗因蹕路所經既按例蠲緩租賦其積欠向年因偏灾民間所借倉榖亦普予蠲免俾近畿黎庶益洽盈寧之福務爲實政袪虚文由來大道無小巧好爲章句豈非尤涿鹿八叠韻已稠欲罷不能結習爾即今仍復一叠留黄綾詩本寫以収未足契乎業之修涿鹿行宫作向例燈宵烟火陳今畨過節不教頻向年南巡啟蹕在上元前地方官毎毎於近頓預備烟火今嵗節後啟鑾因傳諭直𨽻山東督撫停止預備豈誠官費非民費可識還淳在尚淳晝静詩書堪枕葄年深松栢益精神舊新詩句難僂指何必多慚杜甫嗔漢昭烈廟詠事昭烈不失爲賢君諸葛則誠稱賢相君臣同心期中興惟能王去聲蜀失所望終致安樂喪其基豈天不祚炎劉貺元成桓靈敗徳久縱懐恢復無救喪所以向爲酌中論難在守成倍開創向嘗爲創業守成難易説大㫖以岑文本對唐太宗撥亂難守成不易之説爲非盖以創業者未竟之難皆守成者分内之難不待失道失衆始爲慚負前人但使式廓之版圖或有侵削垂裕之成憲或有廢弛即無以覲耿光而揚大烈是非安不忘危存不忘亡鮮有不盛滿中之以此思難者所以持難者可知故予之獨以難責夫守成者非獨忘創業者之難正以慰創業者之初心耳因過昭烈廟感後主之不能嗣守前業以安樂喪其心而尤不能不歎息痛恨於元成桓靈之敗徳益信予前言之爲酌中定論也春雪春雪南方各報霑江浙湖廣一帯今春俱屢霑雪澤據富勒渾福崧奏報浙江省城得雪五寸有餘薩載伊齡阿奏江寧及兩淮得雪五寸至三寸不等姚成烈奏湖北得雪六寸有餘南省雪澤逺近均霑實堪欣慰蹕途喜信迓眉尖犁鋤舉趾自弗誤餅餌充腸庶可占邇日毎披風且暴平原頻堀堁堪嫌思量復雪雨更好所欲奢哉豈易兼紫泉行宫賜隨從諸臣及地方官食詩以誌事此頓郵籖近門前賜食便畺臣胥扈蹕今日許陪筵二十四日紫泉行宫賜扈從諸臣食並令地方官陪預以均慈惠和氣聨中外春風在管絃無湏燈火設向年紫泉行宫賜食並於晩來設燈火今嵗上元節事已過概諭罷之不是上元前賜直𨽻總督劉峩畿輔居官爲最久掄開􅙺㦸俾仔肩由來吏治能誰隠所重民間在汝宣莫以已知自矜也常如不足尚勤旃三年方伯凡三易直𨽻總督自鄭大進袁守侗及劉峩三年中凡三易矣摛句翻因意慽然紫泉行宫十詠敞軒一區行館縣城南路近因之早駐驂十景向來率留詠無妨次第與全探屏山門内應須屏以遮嶔嵜堆石徑教斜試看面面皆活畵底論元時四大家鏡湖水鏡動氷鏡不動春凌未泮静光呈設於鏡上求本體不動饒他動者明舫室舫稱爲室室稱舫名實主賔曷有常飛興一時千里外不殊展卷玩江鄉椶亭椶亭何異剪茅茨阜上惟消四柱支黄屋非堯心古語一時絜矩祗慙之虹橋負氷魚陟底應空不可履氷橋履虹取象安名胥幻爾何須幻裏辨雌雄魚􅊻春冰未可試魚􅊻虚置湖邉失所能一宿寧須多綴景拈毫惟道不相應石逕髙低壘處皆成趣曲折􅌉中總入竒散歩莫嫌斯逕險世情險或過於斯竹埭春埭烟篁亦自佳戞風延月傍虚齋連林指日看江浙君子先容此結懐箭㕔弧矢廢將三十嵗自庚辰年臂痛後騎射尚可借馬力開放且時亦命中而歩射則艱於持滿久未親御弧矢閲今甲辰已二十餘年矣箭㕔即景小􅌉桓携來皇子觀其射新舊拈吟命畢看自丙子嵗至庚子凡箭㕔新舊留題皆寓習勤肄武之意而以臂病後廢射爲歉今嵗携諸皇子來觀其習射因徧示以前後題句趙北口行宫四疊舊作韻素心在崇樸踵事戒増妍行宫憩依舊新詩韻疊前得閒因筆㸃過節罷燈懸庚子甲辰換忩中下水船昔嵗與今夕一彈指頃明且欣節事罷前巡每駐蹕趙北口多值上元令節每於行宫前張燈賜宴今嵗正月二十一日啟鑾至趙北口則節事已過因先期申諭畺吏停止預備都付電光評蝶栩夢堪悟魚恬浪不驚初韻未昌冶適可契閒情題湛持軒倚淀書軒號湛持湛持之義可深思即如春物昌昌至亦賴其軒静有思懐清樓層樓俯清波懐清因以名毎來各殊致即景興㑹生清爲景之佳懐爲心之萌懐清則弗濁設施乃得貞所以童子歌滄浪貴濯纓趙北口行宫西軒作行宫逮百年趙北口行宫康熈年間即建以備水蒐者西軒向所喜階基臨淀池千頃俯𣺌瀰額因用杜句相於永天水往來毎有句更僕難僂指而何置亭臺㸃綴圖景美向年行宫西軒俯臨淀池烟波渺瀰晴空一碧與杜甫天水相與永之句情景適肖因以題額往來題詠甚多嗣周元理楊景素乃於此㸃綴亭臺廊榭既占淀池夏潦之容而且有碍騁望徒滋靡費實爲辦理不善庚子年曽有詩誌事既以隘波容而復致財靡愧未先預禁成事不説矣臨忩意索然五字惟責已填倉日作禮有從其俗節名義可論斯千詩已詠餘九計因存是日蹕途遇水鄉氣象温大官供菜餅飽煖願村村思賢村行館三疊舊作韻授經韓傅此貽祠尸祝千秋亦曰宜嘉彼纂言留外傳笑予失學闕師資駐鑾有暇頻咨政凭几無妨更疊詩明日輕輿就前道迴瞻袛􅍀此何爲題授經臺漢以傳經著諸儒授受資荒臺雖蹟冺太傅藉名垂詩易闡精義趙賁述秘思更稱善處事不負讀書時題毛公祠野店籠喬樹毛公故里云其傍行館築怯稱去聲駐車欣設匪光斯價孔頴達毛詩正義序毛氏光價於河間於河尊所聞新安别立傳得失半相分按毛傳詩序自漢相傳至唐宋諸儒俱無異詞惟朱子作詩經集傳以爲毛萇始引詩序入經齊魯韓三家之傳絶而毛説孤行讀者傳相尊信無敢擬議有所不通則爲之委曲遷就云云於是别立觧説如鄭風則自緇衣以下惟六篇與舊説相仿餘十五篇悉以滛奔斥之盖泥於鄭聲滛之一語以致拘而過當遂與漢唐諸儒歴傳舊説顯相牴牾亦不得云有得無失也向賦月令七十二候詩虹始見篇詩注折衷及此因題毛公祠並識日日日日迎鑾億萬民飽籌其腹煖籌身思量實政無他筞爲叩天庥綏屢頻紅杏園六疊前韻平楚有行宫初春停御輦考古疑信半可果梁王館善善欲其長人固因境顯木架羅詩書玩味芸編展設非此津梁藉何資消遣津梁在獻王汲古以爲善景州行館感懐酉年築館豫慈襟乙酉年此處行館甫得孰謂纔消一度臨頥志有堂惟泚顙澹懐於室祗椎心頥志堂澹懐室皆行宫八景内之名幻因真寓真胥幻今閲古成古弗今几淨忩明春正暇能無和墨寫悲吟景州行館八詠展義齋展義非徒循美名必應愷澤逮編氓設無實政鮮民隠真是尋山問水行頥志堂十八年前此北堂駐輿前膝起居詳檐楣今祗空瞻額俛首無言黯自傷通渌橋曲溪宛轉達平池溪隔芳隄橋接之橋下溶溶通渌水倚欄湛可鑑鬚眉澹懐室室臨水裔水侵階筆硯精良愜澹懐㸃筆欲吟即景句集虚可以悟心齋延月臺石洞年深假似真洞巔平處砌臺脣恰宜延月登臺望粉本傳來顛米新涵虚舫室肖舫爲因號舫主賔室舫定爲誰凍湖半觧冰和水一切分疏付不知葆光洞實處爲峰虛處洞虚生光亦實葆光相需殷則彰相得理趣文宗契顯藏四照亭敞處爲亭亭却小近遥都入照臨通因思四海生民計總在吾心方寸中過德州浮橋一水燕齊兩界分萬民迎送任紛紜古時國歩那堪論今日邊防寧此云益切惠鮮厪保赤惟希與翼祝如雲大河復故運河治自上年三月蘭陽至啇邱開挑引河工成後大河全歸故道暢達入海所有運河兩岸堤工縴道命大學士阿桂於籌辦豫工善後事畢後赴東省㑹同巡撫明興相度機宜疏消積水趕𦂳修築堤工均於嵗前告竣今兩岸青疇彌望廬舍鱗次民間元氣已復實爲慶幸而迴思前事尚殷然於經營籌畫之間也前事迴思懼尚殷駐蹕徳州行宫疊庚子詩韻五嵗一巡早一嵗入齊自趙首臨兹迎鑾老幼紛如昔莩甲風光正及時石火流隂迅堪驗載舟惟水戒應知疇咨事罷聊閒坐温室東瞻不忍思行宫東爲向年恭奉彌切慈寧安憇之所毎來瞻望感懐九依皇祖徳州即事詩韻齊境徐而入春光嫩以初顧注起居者有事必當書素璧泐堯章拱讀心欽肅繩先對時義寰區願安燠降㫖免山東利津霑化等二十一州縣衛借欠銀榖詩以誌事前嵗金鄉魚臺河決灾恒年賑恤救汙萊前嵗青龍岡决口自上年二月合龍後因山東之金鄉魚臺等縣黄水經行被灾較重特降恩㫖不論月分常予賑恤至本年閏三月爲止利津等處雖非甚借欠向隅亦可哀金鄉魚臺等縣已加恩常賑兹入疆伊始疇咨民瘼知金鄉魚臺及偏灾之利津霑化等二十一州縣衛均尚有未完積年出借籽種牛具等銀十一萬八千六百餘兩倉穀十萬一千一百餘石乃復降㫖概予豁免仍飭該撫率属實力奉行俾霑實恵以副行慶施恵之意概予蠲除蘓民困不孤老幼望吾來即今堀堁春風起爲盼時膏又切哉賜山東巡撫明興布政黄圖治有效教巡山左撫而安官方弛後整非易山東自前任巡撫國泰貪黷營私布政使于易簡扶同欺隠以致吏治廢弛倉庫多有虧缺因令澈底清查勒限彌補民隠灾餘救更難自辛丑豫省青龍岡漫口黄水下注城武金鄉魚臺濟寧等處被淹較重屢降㫖加恩展賑並飭令地方大吏率属實力妥辦毋致一夫失所賑恤逾年費弗靳被灾較重之州縣既降㫖撫恤又以自昨嵗二月合龍後該處低地未能全涸復屢頒諭㫖加恩常予賑濟直至今嵗閏三月爲止俾灾黎得資接濟即多費帑項弗計也恵鮮僻壤力應殫時巡夏諺義斯重供帳寧須飾美觀曲陸店詠事不曰平曰曲無從考命名傍村築行館按頓駐巡旌景物當春穉詩書稽古評陸乎如有識想未愜其情醇和堂三疊舊作韻平原縣行館内堂名詎是無端浪與名與名亦自具深情治民豈别有他術醇俗和風在致誠徒駭河徒駭尚禹蹟今河弗道此辛丑河北决其流二分釃南者入三湖辛丑青龍岡漫口之水經由東省之金鄉魚臺等處蕩漾渟淤滙歸南陽昭陽微山三湖水色均已澄清北者穿運矣幸因有徒駭東流下如駛大河始漫之際分爲二支南一支由三湖南下其北一支自趙王河至張秋穿運由大清河歸海分洩不及者由徒駭馬頬等河歸海暢流下注勢甚迅駛運乃未致淤旋總歸南徙漫水穿運之北一支原止十分之二又漸次澄清下注是以運河未致受黄河水之淤墊嗣因霜降後水勢漸消北行一支旋即斷流矣四千年以後不用備猶美禹功誠大哉仰緬平成理齊河縣行館書懐四疊舊作韻十九年前搆此居齊河縣行館在晏子祠旁於乙酉年搆築有雖然數宇樸欣此尚覺中人産厪予之句春風二月又停輿怡神恱目徒工彼察吏安民更要予軼事可曽讀晏傳曠官安得恕爰書前國泰爲山東巡撫時於一路行館皆求華美費工無益甚不惬懐曽嚴行申飭後以勒索屬員事發覺審實抵罪不以此寛彼也扈行畺吏旃旌側七字言情胥慎諸書懐復得一首仍疊前韻四疊韻斯五度居無過一宿發晨輿賦詩已是違杜甫賦詩何必多杜甫句也晝寢何曽效宰予不忍今時思昔日徒教舊作繼新書陳言欲去其難戞先獲我心韓論諸見麥閏嵗春寒麥出遲齊郊今日始逄之啟雙眼實勝圖畫沃朕心如話别離稚稚最憐塵土壓芊芊那得露華滋幸兹風定雲容蔚益爲顒祈甘雨時八依皇祖南巡過濟南韻八度經過弗入城未爲禪理契無生戊辰春初次東巡駐蹕濟南孝賢皇后於此遘疾遂至不起嗣後自辛未逮今甲辰凡八度經過皆弗入城合之生本無生之説尚覺未忘芥蒂耳桞烟觧令遮人逺蓮性久應閲世平舊習合忘心芥蒂新巡惟祝户寧盈賡詩益切繩祖武勝向通儒經問横宿長清縣行館誌意吉行路不遥逐頓行館置無過一宿去搆築嫌多費昔尚縁頥慈今更無其事撫景益増愴自訟吟五字吟餘有餘思所思長清義大清億萬年祚長籲天賜扈隨有皇子顧言識予意小憇崮山疊辛卯韻一卷豈不足稱山半刻停輿趁此間邇日陸行平甸久今朝恰喜見峯顔崮山來往屢經過憑輦惟看翠嶺峩小駐傳餐辛卯始崮山行館數楹小駐傳餐始於辛卯年有何來幾處山房見不爲怡顔爲怩顔之句幾間樸斵却嫌多對山不是背山樓淰淰朝嵐曉欲収一炷名香差致敬未登石磴恐防修傳宣便復進前途肯以棲遲恣攬娱雖未八义四章就由來拙速尚能吾靈巖寺六疊前韻東西路徑原一路南北靈巖有二靈向因劉長卿西入石路詩名與此處同曽四疊其韻丙申春駐此細檢其詩知道林麓山寺乃在楚南因作詠事詩辨正其訛遂不復疊其韻豈必長卿重賡句依然元奘尚留亭漫云逝水如其往試看石泉鎮此渟調御丈夫獨無語由他色色與形形七題靈巖八景巢鶴巖隠士髙僧率愛鶴盖難屈指數去聲其蹤胎仙最是性孤介未必人間願屢逄甘露亭上方自合有靈泉甘露佳名亭額傳一字縱詮三乗義那如無字廣長宣卓錫泉杖錫原從天竺來適然小駐此崔嵬六通得謂神竒矣四句金剛可識哉摩頂松求經去實自長安松樹焉能摩頂看却笑千秋耳食輩弗如斯者轉應難鐡袈裟鐡鑄袈裟千百斤誰能披得七條紋可看平石擎崖路不識分疏不用勤白雲洞有暇無妨山路尋崇椒石洞窈而深白雲藹藹洞中出山上猶晴山下隂雨花巖方山巖與秣陵臺都説講經花雨來試謂天花知厭否那禁人世屢重儓愛山樓園墻内倚愛山樓近遠竒觀向牖投閒凭紗疏聊騁目方山七景一時留宿方山行館傍花宫林巒益致静山遊薄暮歸篝燈夜方永定鍾近宵聲弗霜亦含警安禪付彼僧我自娱清省詣岱廟瞻禮古紀三公貴今惟五嶽尊路經當肅謁國佑永希恩震位旉天徳神功生物原丙申祝釐願黙憶獨無言體元堂再疊丙申韻白鶴泉行館書堂有舊名體元厪君徳展義以時行諸吏扈陪謹庶民瞻就誠於斯無别好即此可怡情摘句春忩暇觀書夜燭明南瞻闕里近釋奠致寅精賜扈蹕諸臣及山東畺吏食得句駐蹕有餘暇列筵非素餐地雖分内外職總賛治平聲安應識官方要謾言禮數寛入疆頻盼雪歌舞不爲歡山東巡撫明興奏報郯城沂水等處得雨詩以誌慰泰安此日駐鳴騶積素雖存究欠優駐蹕泰安時山徑尚餘積素以本月初二日泰安報得雪二寸然究欠優渥也却報郯城雨已被據明興奏報正月二十六七日沂州府属之郯城等縣得雨四五寸不等莒州得雪三寸濟寜州得雨二寸又二月初二日濟南府得雨二寸泰安府東平州各得雪二寸兖州府得雪二三寸不等曹州府沂州府各得雪二三寸不等濟寜州得雪四五寸土膏滋潤春農有益等語劇憐鬲縣雪仍休前過徳州一帯頗覺乾燥兹各屬兩次獲被春膏而所經徳州一帯未獲奏報顒望尤切近枯兼弗信遥潤彼慰那能觧此愁澤自南來將及北江浙等省雪澤優霑有奏報盈尺以上者盖春膏自南而北也行行喜信迓官郵四賢祠行館詠古四賢鄉祀事非誣石介孔道輔斯誠無間吾枘鑿何當有瑗復方圜夫豈不程蘓從來門户清流禍祇爲去聲羶薌時輩殊君子小人近著論界明蹟慎尚思乎昨曽著君子小人論以爲其界不可不明而其蹟不可不慎堯舜之時未嘗分别君子小人是以庶績咸熙後世爲上者固不能明其界而爲下者益顯其蹟以致門户朋黨小人之害君子不必言而君子且操室中之戈漢唐宋明之禍延及國家是盖其界太明而大不慎其蹟之所致耳四賢如孫復在太學與胡瑗不合石介以斥夏竦致爲中傷孔道輔坐朋黨大臣出謫益曉然於君子小人之界不可不明而其蹟不可不慎因過四賢祠詠古並識如右渡汶河三疊壬午舊作韻二汶岀由牟與蕪合流入濟帯齊都漢書地理志泰山郡萊蕪縣原山汶水出西南入濟又水經注汶出牟縣故城西南阜下俗謂爲牟汶又右合北汶水逕汶陽縣云云二水合流入濟又一統志今大清河即濟水故道云岱宗北指青未了呉㑹南巡景不殊親切輿情三載閲助休王政六驄紆宣防閘壩疇咨慎上年何裕城奏請於汶河之戴村壩添建閘座因命大學士阿桂於豫工合龍後㑹同查勘嗣據㑹勘具奏戴村壩係明臣宋禮所建所以截汶助運壩髙於汶河五尺水弱時由南旺分水口蓄水濟運水旺時壩身不髙即可漫入大淸河歸海何裕城之意以戴村壩水挟沙行每汶水盛漲易致淤墊與其毎嵗挑挖不如改建閘座以資蓄洩阿桂之意則以爲閘座雖隨時啟閉但沙隨水入即使建閘後南旺嵗挑仍未可停况建閘後汶水由鹽河大清河入海年年開放鹽河是否能容東平各處民田是否無碍均宜逐一詳慎察㸔請俟東省運河堤壩各工告竣經歴汛水一兩次後另行請㫖辦理朕以爲阿桂之奏為慎重永久起見因俞所請命姑待今秋再勘莫匪因民求善模於中水行館作行館枕平川吉行駐早焉軒堂供憇息書史伴清便舊詠從頭讀新知著意詮明朝當謁聖數問夜應然致本齋中水行宫内書室也北别泰山麓西臨闕里程言將修釋奠久以濶瞻誠自丙申年東巡恭謁闕里距今甲辰凡八年矣頓宿循而駐書齋潔且清髫齡讀論語所愧是躬行微雨二月初十日微雨四更零達曙猶弗止登程霏雪花亦僅飄縿纚雖云清塵埃潤實未盈指四宇雲氣重謂當作霖矣卓午露曦光失望徒延企昨近見積素迤南可待耳昨所經靈巖泰安中水各處山徑均有積雪土膏滋潤是東省迤南一帯尚不至望澤也迤北亟需澤迴瞻惄無已東省徳州及直𨽻之河間景州一帯地脉乾燥望澤尤切昨已降㫖詢問劉峩等令其迅速馳奏雲容西北馳優霈迫予俟謁少昊陵取道自東西崇丘先敬躋自中水行宫至曲阜途經少昊陵先詣展謁申敬八年濶拜謁萬古啟端倪曲阜安天域清陽兆國禔按路史少昊青陽氏其父曰清黄帝之第五子胙土於清是爲清陽作大淵之樂以諧人神和上下云云大淵樂世逺難稽惟胙土清陽與我大清國號相合疏仡遐紀已兆國家受命之基兹來展謁益仰上蒼眷頋也大淵和上下世逺莫能稽五依皇祖過闕里詩元韻春秋八閲度日月迅堂堂徒以古稀嵗依然數仭牆道惟一貫約教在萬方長聖廟興州建丙申自屬闕里釋奠迴詔升熱河爲承徳府以所六㕔爲州縣興建文廟躬親釋奠増置學額及鄉試中額即新疆巴里坤烏魯木齊等處亦改建鎮西府迪化安西兩州及宜禾等七縣皆建立訖文廟設學置額聲教暨之遠盖古未有也絃歌習褧裳駐蹕古泮池到來叩謁大成殿齋宿退臨古泮池瞻依一冄心不足躬行終始意猶怩有水有亭都好在曰松曰栢益森其明當承祭親釋奠八嵗春秋逝者斯二月十一日釋奠先師疊去嵗仲春丁祭韻昨嵗精思釋用丁昨嵗癸卯仲春丁祭親詣太學行禮考月令上下命樂正習舞釋菜始見於呂覽漢儒編入戴記其所以用上丁之義原無明文因思説文釋丁云丁承丙象人心用丁之義或指堯舜傳心之學而夫子承之丙者明也在明明徳即明心也釋奠用丁義或取此是以禮成述事詩有象心承丙前賢注内聖外王後世刑之句祭臨日吉恰斯經爲師永俾百王法立教恒垂萬代刑樂奏仰瞻心嚮往禮成應退歩猶停古稀何有不踰矩舞象惟慙自幼齡謁孔林酹酒吉禮䖍申釋奠忱祭臺更詣酹喬林桑田大海有時變方趾圓顱無不欽立教惟師真是獨作君則我愧於心柞枌聞説門人植萬古千秋永鬰森賜衍聖公孔憲培久住京師學問蘉孔憲培爲衍聖公孔昭煥之子向隨妻父大學士于敏中在京讀書嗣因昭煥患病憲培囘籍承奉祭祀言歸承祭聖人鄉親儀慎勿仍其短昭煥嗜酒失學憲培當勉勵學行紹承遺澤以盖前愆勿效昭煥所爲也祖徳思惟衍以長修己無過守禮樂睦宗首在率端方卌年兩見崇公襲孔昭煥於乾隆十年承襲今憲培於乾隆四十七年又襲公爵悵憶人生曷有常謁元聖祠終始不離周惟公心篤悠至今斯廟食萬古祖儒流東國成迎切金縢武病瘳睿王有同躅寃雪沛恩優按周公夾輔成王乃心王室尚因疑謗居東及金縢書啟出郊禮迎然後心蹟始明我朝睿親王多爾衮當開國時首先統衆入闗撫定疆宇尋即奉迎世祖定鼎燕京厥功最著顧以攝政年久頗多自專諸王大臣未免畏忌致殁後爲蘓克薩哈等搆䧟誣以逆謀削爵夫睿親王果萌異志方兵權掌握何事不可爲乃不於彼時因利乗便直至身後以僣用明黄龍衮指爲覬覦之證有是情理乎予因恭閲實錄諗知王之立心行事忠藎出於至誠爲史冊所罕覯皇祖時亦有睿王即我朝周公之㫖因於戊戍年降㫖追復王爵並予配享太廟以妥功宗而昭渥典因謁元聖祠感王之心蹟實有與公先後同揆者並識其畧若夫修身立教則王實不及公然不必以是責賢矣至泉林駐蹕由旬計里近而便自中水至泉林纔四十六里以佛經計之爲一由旬林是儒林泉聖泉那可言過於此地因之成駐似前年不教七萃嚴訶蹕竟許羣黎擁嚲鞭旭暖風和略乗馬古稀腰臂尚依然近南氣象漸和將至泉林數里遂易乗馬以慰就瞻雖年逾古稀控御猶不减昔時也泉林七叠舊作韻泉林是我藏詩藪花木秀而水石明瑟爾入歌還入繪妥然宜雨又宜晴不無舊他尋他踐似有新題向我迎底事七言艱拙速不堪迴憶侍遊情甫纔闕里行寅祀川上恰當此順來總是聖蹤欽想像寧闗勝境恣遊陪遥吟俯暢誠佳矣昔日今時何速哉一宿饒他松與栢間去聲間平聲清月伴㣶徊八題泉林行宫八景叠庚子韻近聖居適纔闕里祭丁朝二月十一日丁卯適當闕里丁祭之辰恭詣行禮東道兹臨迴望迢近聖居原我所額躬行心祗愧其遥在川處是川寧可比他川子在時無殊昔年道脉千秋流不絶即㸔石罅此淙泉鏡瀾榭瀾如有動難爲鏡鏡自常明何礙瀾如是鏡瀾齊置却榭瀾閒倚試爲觀横雲館館北堂曽慈昔御横雲館北搆堂三楹爲聖母昔年駐宿焉再來舉目望爲遲七年石火光隂速即景低徊益自悲九曲彴溪上小橋成九曲前行人顧後行招於斯設悟行文理不藉旁求理自超柳烟坡仲月韶光逓似輕柳絲爲䜿柳烟横於斯識得化工妙畫理詩裁總在情古䕃堂古把千年以外計菁葱猶見翠雲鋪杯棬爲順抑戕賊論自斒斕樹識無紅雨亭臨亭多值弗花時縱值弗花花在枝明日依然啟行蹕南邦民隠切疇咨望䝉山五叠韻孤望如期致不同辛未丁丑壬午三度經此皆遇雨乙酉正值望澤有將謂其滂昔嵗同不期孤望此行中之句庚子則雪後繼雨入土霑足故詩有云雪而繼雨不同同謂勝前畨此度中雖前後景致各殊然祈嵗之心則一也同惟祈嵗寸心中以休巡法夏時諺育德境思羲象䝉髙處峰恣猶獲霧㘭迴柳眼細揺風閟宫偶憶歌奄有曽紀魯侯幾許功註經臺行館作平野祠堂疑信徴云惟鄭氏註經曽固殊賈董治亂策頗勝毛韓議論興何事其傍棟宇建更教此外榭臺増設如呼起斯人問行館於斯應不應問官里行館詠事郯爲少皥後因有問官名述古猶稱里於今那見城却看館早築不説事之成一宿仍前進徘徊弗愜情春秋郯子來朝因有叔孫昭子問官之事其地應在曲阜孔子見而學之亦未明言至郯惟韓詩外傳載於郯遇程子傾盖贈束帛一事又山東通志載郯城縣治西北有碑曰問官故里又一統志載問官祠在縣北世傳即孔子問官之地則此地問官里之名於古既無證據且距郯城甚遠知出於傅㑹所稱也郯子園三叠舊作韻塗山朝萬國魯境更呉墟爾日封疆窄無過數里餘禹巡狩㑹諸侯朝者萬國其時中國提封不過萬里分爲萬國即一國祗得一里也有是理乎疆域褊小可知郯子爲魯附庸若任與顓臾之類盖一魯國中即有十數國矣今天下疆宇數倍於古然中國亦祗千五百州縣則今一州縣可當古數十國也此皆屬後人傅㑹遷就亦存而弗論可耳地寛真過古政冗益殷予以此巡狩切欲因休助諸郯園自宛在清蹕復斯於駐早仍多暇明忩一閲書欽定南巡盛典卷十九
