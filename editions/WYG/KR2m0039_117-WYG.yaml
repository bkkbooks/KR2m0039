body:
  text: 名勝江南淮安徐州揚州龍泉荘在宿遷縣為入江南首程距山東接壤之紅花埠三十五里鑾輅時巡向皆駐蹕行幄乾隆己亥嵗督臣奏請添搆便殿數楹欽奉諭㫖勿事浮靡因于舊基西南二里度地營建恭備臨幸自此㟃峿山色駱馬湖光永煥彩于雲楣松棟間矣庚子御書堂額曰行春聫曰境因徑曲詩情逺山為林稀畫􅖵開甲辰御書聫曰對時真惬農桑慶寕道非關視聴娱順河集在宿遷縣運河遥隄之旁過永濟橋五里北拱三山南繞六塘乾隆庚辰嵗恭建行館以供憇宿自後車駕經臨屢奉清蹕焉壬午御書額曰澤國敷春聫曰百里控長隄利籌行水三間開樸字安厪同民又聫曰暇當綈几身聊憩景入紗疏意與存甲辰御書聫曰寒勒梅巖紅始吐潤含麥坂緑方蕤林家荘在桃源縣乾隆己亥嵗督臣奏請于旱營舊基酌添行殿敬體聖心諸従樸斵弗施丹艧恭逢羲馭經臨天章錫咏仰見省方觀民慶行恵施稽之前古無以加云庚子御書齋額曰展義又額曰風日清美聫曰徧野麥針含露潤夾衢栁線􅇢烟䡖又聫曰騁目不遮斯暢矣棲心惟静總宜焉甲辰御書聫曰何處不堪體物理于斯亦未忘民艱陳家荘在桃源縣皇上三幸江南俱駐蹕扵魯家荘營盤乾隆二十九年欽奉諭㫖即于舊營酌備座落數宇省帶布城一分以節䭾運之煩大吏欽遵相度以陳家荘地勢較髙與舊營相去無㡬恭建行館扵此庚子御書堂額曰同和楊家荘在清河縣先是督臣於桂家荘恭建行宫近李家荘新運口乾隆四十五年皇上以漕艘商舶皆願行楊家荘中河舊口因命移建于此翠華臨幸得以閲視堤工猗歟至哉一蹕途暫憇之所而俯順民情若此大聖人如天之仁豈誦説所能盡也庚子御書齋額曰融春陶荘河神廟在淮安府清河縣自河淮合流清水不能刷黄恒有倒漾之患仰䝉皇上睿㫁訓示周詳扵陶荘開濬引河越丁酉春蕆功于是河流北移清口暢逹二瀆乂寜御製碑文紀其事歸功于天佑神相命于新口石壩建廟妥神并錫以迎神送神樂章恭逢翠華臨莅崇祀升香仰見至誠歆感扵萬斯年安瀾永慶詩所稱懐柔翕河猶未足以方斯昭貺也庚子御書額曰功佑宣流聫曰河勢𨗳而成清黄交頼神庥順以助南北胥恬恵濟祠在淮安府清河縣祠臨大堤中祀天后明正徳二年建嘉靖中賜額曰恵濟其神福河濟運孚應若響祠前黄淮合流地當形勝為全河之樞要國朝乆邀崇祀我皇上臨幸升香薦帛禮有加隆焉乾隆辛未御書祠額曰福佑河漕曰協順資靈曰道光玉宇聫曰璿源順效安瀾慶玉粒長資飛輓功又聫曰靈昭雲馬風檣㑹績奏河清海晏時又聫曰神契元符傳玉簡妙恭紫炁閟金庭又御書恵濟祠行殿額曰繼述平成曰風帆沙嶼聨曰極目雲濤思利濟關心沮洳切疇咨又聨曰上策評量懐賈讓一時詞賦憶枚皋丁丑御書額曰恵濟壬午御書聨曰韶光喜不蔵隄樹緑意看将漾沚蘋乙酉御書聨曰天光水態披襟袖岸芷汀蘭入畫圗又聫曰湖山入畫迎人翠鳬雁當春得意鳴又聫曰長隄罨畫青連墅新水漣漪緑映船天寜寺在揚州府拱宸門外舊為晉大傅謝安别墅義熈間梵僧譯華嚴經于此禇叔度請于謝琰遂捨為寺名謝司空寺宋政和間改今名乾隆丙子嵗扵寺之右恭建行宫自後聖駕南巡俱邀駐蹕乙酉于寺内題省方設教四字掲之楣間臣民仰瞻益敬頌大聖人勤民之至意云辛未御書寺額曰淮南香界曰浮山華海聨曰花雨南天靈文傳妙諦香雲蜀阜舊墅表名區丁丑御書寺額曰淮南麗矚曰神威擁䕶聫曰閭里謳歌聞樂愷軒忩烟景適清嘉又聨曰楚尾吴頭開畫鏡林光鳥語入吟軒壬午御書寺殿聫曰西竺駐祥輪三摩合證東山留浄業二諦俱融又聫曰琉璃瓶水資功徳瓔珞龕雲現吉祥又聫曰衆香馥郁疑華盖多寳光明駐法輪又聫曰寳地生歡喜香臺普吉祥御書行宫堂額曰大觀聫曰樹将暖旭䡖籠牖花與香風並入簾又聫曰麗日和風春淡蕩花香鳥語物昭蘓又聫曰鈞陶錦繡化工鬯松竹笙簧仙籟諧又聫曰牕意延山趣春工鬯物情乙酉御書寺樓曰萬佛樓殿曰大雄寳殿又聫曰商鼎周彛自典重檻葩苑樹相芬芳庚子御書行宫額曰東壁流輝又額曰文滙閣聨曰成隂髙樹天然爽過雨閒花自在香又聨曰忩虚含爽籟座静接朝嵐甲辰御書聫曰問景詎寜欣若繢甄心益覺勅惟㡬萬夀重寜寺在天寜寺後乾隆癸夘嵗鹺臣奏請恭建為淮商祝釐之所臣民嵗時延集僧衆建設經壇恭祝聖夀以致愛戴之忱寺旁為東園翠華臨莅多邀睿藻焉甲辰御書額曰勅賜萬夀重寜寺又額曰普現荘嚴曰妙香花雨又賜寺旁東園堂額曰春熈曰俯鑑室曰琅玕叢聫曰水木自清華方壺納景烟雲共澄霽圓鏡涵虚又聨曰春色芳菲入圗畫化機活潑悟魚鳶又聨曰倚巖松翠龍鱗蔚入牖篁新鳯尾娑又聫曰自覺雲林延静賞喜従香界覔新題栁湖春汎在倚虹園之西湖心壘石為山建亭其上小橋通之橋之西北亭榭掩映蘆荻參差荷葉田田一望無際冶春詩社在虹橋之西與倚虹園東西相望皆郡人上已修禊之所今為冶春樓取王士正詩名之又有香影樓懐仙館秋思山房浄香園在虹橋之東築堂以奉宸憩堂左則仿泰西營造法為室五重過此層欄繞屋曲檻臨波曰荷浦薰風由春波橋折而之北則接趣園矣乾隆壬午御書額曰浄香園聫曰結念底須懐爛漫洗心雅足契清涼又聫曰竹喧歸浣女蓮動下漁舟乙酉御書堂額曰怡性聫曰雨過浄倚竹夏前香想蓮甲辰御書聫曰水以澄渟謀目静山惟平逺致心閒青琅玕館在浄香園之右蓺竹萬竿中置亭館石筍林立掩映葱青春雨抽萌秋風響籜自饒佳趣香海慈雲在浄香園之北碧沼數畝澄明如鏡中為海雲龕奉大士像其南為來薰堂堂之東為春波橋長隄春栁由虹橋而北沿海皆髙栁長條踠地如行圖畫中橋之東為跨虹樓迤邐而北有濃隂草堂曉烟亭曙光樓趣園舊稱四橋烟雨四橋者南為春波北為長春西為玉版又西則曰蓮花春水方生千頃一碧而層軒洞豁曲檻逶迤髙下掩映每當暝烟羃䍥小雨亷纎環望四橋如綵虹蜿蜒出没波間極水雲縹緲之趣乾隆壬午御題額曰趣園聫曰縈迴水抱中和氣平逺山如藴藉人又聫曰目属髙低石步延曲折廊乙酉御書聫曰何曾日涉原成趣恰值雲開亦覺欣甲辰御書額曰半畝塘聫曰妙理清機都逺俗詩情畫趣縂怡神水雲勝概在趣園之西徧有勝概樓吹香草堂春水廊小南屛其右則蓮花橋也梅嶺春深即長春嶺也嶺上多植梅花故名兩水合流縈繞山麓虚亭曲檻㸃綴有致桃花塢在保障河西岸西通法海橋春日繁花齊放望如錯繡有蒸霞堂澄鮮閣山半有髙樓可以逺眺蓮性寺舊名法海寺四面環水白塔峙其中又有夕陽雙寺樓雲山閣諸勝橋則法海跨其前蓮花踞其後迤北青帘白舫每縈拂于春秋佳日也乾隆丁丑御書額曰衆香清梵白塔晴雲與蓮性寺白塔隔水相對故名有花南水北之堂積翠軒林香草堂諸勝望春樓與白塔晴雲相連琢石為池左右二橋彎環如月其對岸即熈春臺也香阜寺在揚州江都縣運河之東土脈隆起如山俗名小五臺岡阜陂陀松篁蒼翠與金碧名藍掩映髙下山靈亦若有知敷榮聳秀欣然而望幸焉乾隆丁丑御書額曰臺麓化城聫曰紺宇晴空翠嵐浮蜀阜祗林香靄禪月湛䢴流竹西芳徑在揚州城北十里唐杜牧詩誰知竹西路歌吹是揚州名由此而著有上方寺寺舊蔵石刻寳誌像唐吳道子畫李白賛顔真卿書亦稱三絶又壁有石刻為宋蘇軾送李孝博詩寺旁為竹西亭乾隆甲辰御書額曰竹西精舎聫曰慧草階前亦生意徳山户外自佳隣平岡艷雪在草河南植紅梅數百本中搆亭館早春花放不减嵰山之雪也近水則䕶以長隄垂栁疎筠引人入勝臨水紅霞在平岡艷雪之左其地多桃花每春深花放爛如錦綺中為桃花庵清磬疎鐘聲出林表亦棲禪之勝地也杏花村舎在草河北岸東連迎恩橋竹籬茅舎頗具野趣䢴上農桑在迎恩河西岸敬仿聖祖仁皇帝耕織圗扵河北藝嘉榖樹條桑井陌蠺房恍如圗繪皇上教養之恩聖代恬熈之象舉此可見以視豳風七月殆有加焉慧因寺向為舍利禪院恭逢車駕臨幸賜今名旁有小園叢桂古松境絶清逈中有悟香亭寺鐘初動梵唱同聲時得静中之趣西為曲廊水榭低貼水際北折為㕔顔曰綠楊城郭右為芍園多異種小築數椽亦饒秀野静閒之勝乾隆辛未御題額曰慧因寺丁丑御書額曰慈縁勝果卷石洞天在城河北岸疊石為山玲瓏窈窕巖壑天然其旁為宛委山房契秋閣堞雲春暖在北門外城隅臨水為園屋宇參差竹樹蓊鬰大有濠濮間想倚虹園本元崔伯亨園址為虹橋修禊之所傍城西濠三面臨河有領芳軒餞春館諸勝乾隆壬午御書園額曰倚虹聫曰栁拖弱縷學垂手梅展芳姿初試嚬又聫曰明月松間照清泉石上流乙酉御書樓額曰致佳聫曰花木正佳二月景人家疑近武陵溪甲辰御書亭額曰潤竹聫曰鈞陶錦繡化工暢松竹笙簧仙籟諧西園曲水在城河西北水自北而東折若半壁然依水曲折以置亭館有新月樓觴詠樓拂栁亭春臺祝夀在保障河西岸為兩淮人士獻夀呼嵩之所其左為曲樓數十楹與篠園相属篠園花瑞在熈春臺左園廣數十畝徧栽芍藥其種有並頭三蕚者尤為罕覯因作瑞芍亭以紀盛云平流湧瀑在熈春臺右有竹亭水由亭下過石橋入保障河又有鏡泉樓含珠堂亦于登眺為宜水竹居皇上臨幸賜名也山石壁立屈曲若展畫屏中有花潭竹嶼又玉蘭數十本環繞精舎花時清輝照人如在瑶林瓊樹間循廊而西巨石臨水上鐫石壁流淙四字水由石罅落池中懸流㶁㶁冬夏不竭其間為堂為樓為亭為花塢曲折交互最後萬竿浄綠一鏡拖藍水竹幽竒于斯為最乾隆乙酉御書額曰水竹居又書軒額曰静照聫曰水色清依榻竹聲涼入牕髙詠樓在蜀岡朝旭之左舊傳宋蘇軾題西江月詞于此乾隆壬午御書額曰髙詠樓聫曰山堂返棹閒留憩畫閣開牕納景光甲辰御書堂額曰清韻聫曰水月清懐同迥照神仙翰墨有餘芬蜀岡朝旭在髙詠樓之右其地近連蜀岡初日照萬松間如浮金疊翠所謂西山朝來致有爽氣者也有來春堂曠如亭初日軒皆登眺之所春流畫舫在蜀岡朝旭之北臨水為屋四壁垂簾波紋蕩漾錦泉花嶼在保障河東岸南接水竹居北連功徳山入門而左為錦雲軒牡丹開時爛若疊錦西有微波館泉出澗中泠泠不竭功徳山山有觀音寺亦名觀音山在蜀岡最髙處天花佛火僧戒梵音儼在靈鷲峯頭也上有小池畜文魚數百頭臨池為屋以邀睿覽乾隆乙酉御書額曰天池聫曰淥水入澄照青山猶古姿山亭野眺在功徳山之半前為南樓可以眺逺山後臨池為屋顔曰芰荷深處平山堂在法浄寺之右宋郡守歐陽修建以南徐諸山環拱望與檻平故名其時梅堯臣王安石蘓軾秦觀諸人皆有唱和之什堂之前為行春臺初建扵宋守刁約堂之西曰第五泉復顯扵明僧滄溟其餘樓閣池臺頗饒勝賞恭䝉列聖留題天文舄奕皇上復疊頒奎藻寵錫逾常賢守名山何幸七百餘年以後邀此殊榮乾隆丁丑御書聫曰詩意豈因今古異山光長在有無中甲辰御書額曰天然三友又聨曰對時真愜農桑慶寜道非關視聴娱法浄寺古棲靈寺又稱大明寺寺枕蜀岡舊有浮圗九級見于大觀圗經唐劉長卿髙適諸人俱有詩乾隆乙酉車駕重幸賜名法浄寺御書聫曰竹裏尋幽径梅間卜野居萬松疊翠園與蜀岡相對萬松森立滴露飄花近落衣袖小香雪在蜀岡平衍處東接萬松亭由法浄寺東樓石磴而下北過小橋穿竹径復折而東數十步古梅繞屋疎影寒花洵為清涼香界乾隆乙酉御書額曰小香雪康山在揚州府新城西南隅明正徳中武功康修撰海寓居于此山搆草堂于上其東為觀山臺遥望郭外風帆來往隔江山色青翠如畫乾隆庚子御書額曰康山草堂聫曰時花二月之中遇古樹千年以上論甲辰御書樓額曰對山聫曰籠庭水樹宜涼影匝砌烟花帶露􅐾九峯園園故多佳石大者逾丈小亦及尋如仰如俯如拱如揖如鰲背如駝峯如蛟舞螭􅋥如獅蹲象踏千形萬態不可端倪石間羅植卉木又築臨池小榭以擬右軍墨池南為風漪閣可供眺望乾隆壬午御書額曰九峯園聫曰雨後蘭芽猶帶潤風前梅朶始敷榮又聫曰名園依緑水野竹上青霄乙酉御書聫曰縦目軒忩饒野趣遣懐梅栁入詩情甲辰御書額曰澄空宇聫曰紅梅翠竹天然繪妙理清機不盡吟髙旻寺在城南十五里之茱茰灣其水北承淮流西逹儀徴南通𤓰步故亦名三㲼河寺踞其上有塔曰天中琳宇嵯峨遥臨俯瞰洵江皋攬勝之地聖祖仁皇帝南巡于此敬建行宫皇上省方重葺其舊以備臨幸乾隆辛未御書寺額曰江月澂觀聫曰潮湧廣陵磬聲飛逺梵樹連䢴水鈴語出中天御書殿額曰䢴江勝地曰江表春暉聫曰衆水迴環蜀岡秀大江遥應廣陵濤又聫曰碧漢雲間晴階分塔影青郊雨足春陌起田歌丁丑御書行宫佛堂聫曰法雲迥䕃蓮華塔慈照長輝貝葉經又聨曰塔鈴便是廣長舌香篆還成妙鬟雲又寺旁關帝廟額曰氣塞宇宙壬午御書齋額曰罨畫牕乙酉御書聫曰綠野農懽在青山畫意堆庚子御書堂額曰得間聫曰清風明月取無盡山峙水流用不窮甲辰御書堂額曰承煦聫曰宇宙以來此山色冲融之際蕩烟光錦春園在揚州府城南三十里距由閘關二里舊有大觀樓後成小築門臨水次丹堊相鮮其中傑閣修廊松泉蘿磴頗足幽勝四圍羅植花木每遇風日晴美爛若舒錦乾隆辛未御書額曰錦春園丁丑御書額曰竹浄松蕤甲辰御書聫曰鏡水雲岑標道趣䡖荑嫩蘤繢春光又聫曰鏡裡林花舒艷裔雲邉樓閣隐神仙欽定南巡盛典卷八十四
