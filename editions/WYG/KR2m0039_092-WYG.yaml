body:
  text: 海塘乾隆四十五年三月初一日閩浙總督三寳浙江巡撫王亶望奏言竊照仁和海寧二州縣一帶海塘工程沙水情形例應按月繪圗恭進兹據布政司國棟杭嘉湖海防道董世寧将二月分望汛情形禀報到臣臣查得時屆仲春潮汐尚屬平緩西塘張家庵至潮神廟之西一帶老沙現長五百四十餘丈東塘韓家池塘外陰沙現長八十餘丈尖山石壩東南面老沙現寛一十五丈外接陰沙寛二十餘丈計斜長一百餘丈厎層中層竹簍各二百個俱係陰沙擁䕶上層竹簍顯露二百個均與上月奏報時相同再塔山口從前起有中沙一道計長二千五百餘丈今春水稍旺逐漸刷低八百餘丈現長一千七百餘丈其餘南岸各沙水情形並無增減一切柴土石塘暨石壩坦水各工悉皆穏固謹将二月分海塘各工沙水情形並查明上月沙水丈尺逐一比較另繕清單繪圗貼說恭候聖駕親臨閱視奏入報聞乾隆四十五年三月十一日三寳王亶望奏言竊照海寜州塘工現䝉皇上親臨閱視特頒恩㫖改建魚鱗石塘仰見聖主保衞民生永定安瀾至意除欽遵勘估另行具奏外惟查海塘工程浩大帑項攸闗估計興工在在需員専司經理庶工料不致浮冒保固各有責成而地方官既有應辦公務即一二閑曹及試用候補人員亦時有委署委解事務不敷差委伏查本年翠華重幸一切應辦差務遇有丞倅州縣中丁憂等項事故伊等踴躍急公籲懇留工効力藉抒誠悃者有潘安成等十四員臣等因其曽任浙省熟悉風土人情且察其平日才具可資任使又有鄰省捐納運副及就職州判遞捐分發情愿赴浙自備資斧協辦工程之王炳等二員臣等亦因差委乏人均各據情允准俟差竣酌量核辦兹遇修建海塘要工約計興修之期該員等經手差務錢糧已可銷算清楚與其另籌揀發更易生手不若留此熟練之人就近分資委任較為便易臣等公同商酌合無仰懇天恩将各該員仍准留浙接辦塘工則伊等自必益加感激奮勉且並無本任兼顧事務更可常川在工安心任事於工程實有禆益統俟大工告竣容臣等将該員前後所辦差務逐一確核其實在奮勉出力著有勞績者據實具奏請㫖俟有相當缺出酌量補用以示鼓勵臣等為要工需人起見謹繕摺恭奏並另繕各員職名清單敬呈御覽奏入上諭部知之乾隆四十五年三月二十九日督辦海塘臣王亶望奏言竊照海寧仁和二州縣海塘䝉皇上親臨指示改建魚鱗石塘查此次改建石塘四千餘丈工繁任重計臣往返尚需時日一切工料若非預為勘估採辦恐致遲延其應動欵項尤需預為籌撥以便給領購料庶可趕𦂳興工臣即檄行藩司㑹同杭嘉湖道先行勘估将應需銀兩動支欵項詳請題撥一面将石料木樁等物飭令各屬出產地方及早購辦運工備用查石料尤為塘工第一𦂳要浙省出產石料惟紹興湖州二府屬向有宕户但需用浩繁斷不敷用從前興作大工俱於附近之江蘇省洞庭山等處委員採辦協濟今應預為妥籌循照辦理並将一切預備事宜咨明督臣三寳新任撫臣李質頴兩江總督臣薩載江蘇撫臣楊魁一體轉飭遵辦奏入報聞乾隆四十五年五月二十四日三寳奏言竊照浙江海塘老鹽倉一帶柴塘四千二百餘丈荷䝉聖主親臨閱視諭令改築石工實為萬年經久之至計前撫臣王亶望交印起程暫行回籍臣随委布政司國棟等前往相度情形臣又親往逐一覆勘縁此時正屆大汛現在柴塘實資抵禦臣沿塘察看各工俱屬穏固惟海神廟前大盤頭西藏字號起舊時柴塘朽腐外沙将已坍盡潮水臨塘殊闗𦂳要現在石工採辦物料興建尚需時日應将此處趕𦂳鑲修柴塘一百丈以資保䕶估需工料銀共二千三百八十五兩零已飭司委員趕辦不日告竣至四千二百餘丈柴塘改建石工自應籌度萬全現今柴塘既臨大汛固未便稍有更動而退後多係民田廬舎臣與司道等面加籌酌似應𦂳靠柴塘之内下樁築砌石工既可以柴塘為外䕶則捍衞更為得力居民亦屬相安惟是石工四千二百餘丈所需石料甚多辦理不宜稍緩現已於本省紹興湖州二府出產地方招集宕户酌發料價承領委員上𦂳督採恐本省不敷另行派員前赴江蘇洞庭山等處採辦一俟運抵工所彼時秋汛已過前撫臣王亶望早已來浙即可擇日興工不致遲滯又諭㫖内指示應修繞海寧城之石塘内有工二十九丈地勢較髙兩旁魚鱗舊塘原係十六層其城東八里文将字號至陳文港宻字號一百五十餘丈地勢稍低兩旁魚鱗舊塘原係十八層今應各照原舊層數築砌以期一律鞏固所添二處坦水即以所拆舊時條塊石料抵用其應添樁木條石亦經派員先行領項購辦因屆大汛不便拆動亦俟秋汛平後一律興工臣随時督催趕辦料物備貯外所有現在相度酌籌情形理合恭摺具奏奏入報聞乾隆四十五年七月十六日三寳奏言本年五月二十六日接奉上諭前因浙江海塘改建石工恐該處居民或視柴塘為可廢任意拆毁竊用致有損壊於城郭田廬甚有闗係曾明降諭㫖令該督撫嚴飭地方文武各官将現有柴塘照前加意防䕶以為重闗保障将來石工告竣之時此塘亦可留為外衛此㫖尚未據三寳奏到兹據三寳奏到摺内乃與司道等面加籌酌𦂳靠柴塘之内下樁築砌石工既可以柴塘為外䕶則扞衛更為得力等語三寳此摺與朕前降諭㫖適相符合其是否業經接奉前㫖遵辦何以摺内又無遵㫖籌辦字樣著𫝊諭三寳即将前㫖曾否接到之處據實覆奏欽此臣伏查臣前因此案石塘鉅工伊始諸當倍加慎重臣飭該管㕔備悉心查勘先據禀請從柴塘退後數丈建築石工須拆去民房八百餘間臣思遷移民舎殊非仰體聖恩保䕶田廬至意臣即率同司道親徃逐一履勘因時屆大汛目擊柴塘𦂳要情形随與司道等面加熟籌似應於𦂳靠柴塘之内築砌石工庶捍衛較為得力亦可免動民居是以将查勘酌籌縁由於四月二十二日恭摺具奏嗣於五月初六日在邸抄内恭讀諭㫖杭州老鹽倉一帶改建石塘仍留柴塘以作重闗保障旋於五月十二日接准工部咨恭録上諭行知到臣跪讀之下仰見聖明先機燭照於臣未經籌及具奏之前已邀睿慮周詳無微不至臣當即欽遵嚴飭地方文武将柴塘加意保固勿任居民私自拆毁竊用致有損壊是臣前次具奏時尚未接奉諭㫖謹據實恭摺覆奏奏入報聞乾隆四十五年八月十九日王亶望奏言竊照臣前於自浙囘籍将應行勘估石塘各事宜檄行司道及咨㑹江蘇浙江各督撫臣并恭摺奏聞兹臣於六月二十日抵浙據藩司國棟等禀陳辦理一切情形随率同各員前赴海塘逐一履勘查改建石塘即𦂳靠柴塘之内石塘得柴塘捍蔽不特易於施功并免潮汐衝刷誠如聖明先㡬之燭以為重闗保障於海塘愈資鞏固統計應改石塘四千二百餘丈工段綿長勢難同時並舉臣與督撫二臣詳加商㩁勘得仁和縣境内柴塘天字號以東工二百丈塘外尚有沙塗擁衛可暫緩建築擬自辰字號起至伏字號止先估辦二千丈據海防道王燧間段開槽扦試可以下樁所需條石照部頒營造尺每丈疊砌十七層計用折正石一百一十三丈零共工二千丈應需條石二十二萬七千五百丈已經臣與督撫二臣檄委本省產石之山陰㑹稽徳清武康四縣分辦一千丈石料十一萬三千七百五十丈業經陸續給領脚價銀兩嚴催趕運其一千丈石料在於江蘇洞庭等山分頭購備臣與督撫二臣先後咨明復於過蘇時與撫臣吴壇藩司瑺齡面加商酌飭屬上𦂳開採并據吴壇議令就地一手鑿光既省重做之繁又節運脚之費現委妥員分解脚價銀十萬兩赴蘇交兑又所需樁木共約估三十萬根並飭本省金華衢州嚴州三府屬產木各縣領銀購辦并一應需用物料亦陸續採買以上二千丈工料價脚約共估銀三十三萬六千三百餘兩據藩司詳請酌撥地丁項下銀兩業經督撫二臣飭令一面借欵先行動用一面題撥歸欵至承辦收料監工往來催儧并稽察匠役先儘於奏留辦工各員内按段分派以専責成臨期不敷委用與督撫二臣於現任人員内再行遴選其自伏字號迤東並老鹽倉各段俟此二千丈辦有頭緒即行照估接築以仰副聖主宵旰疇咨為沿海生民一勞永逸至意除俟石料樁木物件運有成數秋汛一過即日督率在事各員尅期敬謹興工並将確估銀欵㑹同督撫恭疏題報外所有臣現在勘辦塘工縁由理合繪圗貼説恭呈御覽再時值伏汛舊有柴石各塘均屬穏固業經撫臣繪圗具奏秋汛瞬屆臣督同工員随時勤加防䕶合并陳明奏入報聞乾隆四十五年九月二十六日王亶望奏言竊照仁和海寧二州縣改建海塘石工先行估辦二千丈所需條石最為𦂳要除於浙省產石各縣採辦一千丈石料十一萬三千七百五十丈其尚少一千丈石料於鄰近江蘇省洞度山等處採辦俱先後咨明江蘇督撫臣並委員齎銀十萬兩交收縁由業經恭摺奏聞嗣准江蘇撫臣吴壇咨稱據吴縣知縣陳烈具詳據採石宕户禀稱江省採石地方不一開鑿難易不同需費較繁各路逺近運脚亦不一律現已批飭悉照江省章程辦理移咨到臣臣伏思塘工首重石料而浙省與江省開採情形原難畫一現在兩省各地方官皆仰體我皇上保衛民生至意無不踴躍急公上𦂳趕辦至江省石料本有部定成例即一切運脚逺近不齊亦可按程核計臣與撫臣李質頴面商已咨明江蘇督撫臣轉飭地方官将購辦浙江塘工石料并做光工價悉照江省准銷定例給領所需夫船並令該處地方官就近僱辦運至仁和縣之施賀兩壩及海寜州之長安壩交浙江委員接運工所其自江省至壩應給運脚俱照江蘇之例按程計算總期加𦂳採辦按期運工應用不致遲延於勅建要工實有禆益所有現在咨明辦理縁由恭摺具奏奏入報聞乾隆四十五年十月十三日王亶望奏言竊臣於六月二十日自籍到浙業将海塘估辦二千丈並督辦本省木石及江蘇省協辦石料各事宜恭摺奏䝉聖鑒臣與撫臣李質頴上𦂳督催料物並據布政司國棟等具詳将分段承辦及騐收石木往來督察各員逐一飭委已定旋於七月下旬至今據山陰等縣禀稱採就石料共計一萬六千餘丈陸續起運解工又據金華等府報稱起樁木已有五萬餘根統共約計可敷開工需用随行據該司道敬謹選擇於八月二十八日開工臣㑹同撫臣李質頴親詣工所於海神前致祭敬宣聖主軫念濵海民生勅建鉅工永資保障至意虔誠禱告即督同承辦監工各員按照分定界址自辰字號起遞行建築惟是大工經始第一𦂳要惟厎樁為最重亦惟打樁為最難查海神廟翁家埠一帶現在開槽見厎多係沙土下樁微覺澀滯必須加工簽釘倘稍有茍簡則雖築砌嚴𦂳鈎灌整宻而根厎鬆浮塘身總難堅固今到工樁木雖必照原估徑圍尺寸方准量收而釘樁之時或匠役希圗省力或工員防範稍疎致有私行削截之弊臣嚴加查察諄切告誡監委各員當此開槽伊始必須親身量記㸃騐入槽目覩如式簽釘俾寸土必皆入土百宻總無一疎加以安砌條石一切做法並令實料實工在在堅好庶塘身上下永資鞏固俟築有成數随時奏報外所有石塘開工日期理合繕摺具奏奏入報聞乾隆四十五年十一月初三日浙江巡撫李質頴奏言據浙江鹽道陳淮詳據商人何永和等呈稱竊照仁和海寧二州縣濵臨大海潮汐靡常一帶塘工最闗𦂳要屢䝉睿慮念切民依特沛恩綸不惜帑金改建魚鱗石塘永資捍衛商等世業浙鹽仰沐皇仁至優極厚且塘堤以内灶舎毗連商等辦運源源長荷恩施樂利淪肌浃髄難報髙深情願捐銀二十萬兩稍佐塘工之用惟是商等資本營運在外一時不能凑齊懇請先於藩庫内借撥交工應用商等分作五年按引輸繳道庫彚解歸欵少申微末下忱伏祈詳請代奏由該鹽道轉詳到臣随即𫝊詢該商等跪稱荷䝉聖諭改建石塘工程浩大帑費甚多原不需此絲粟之添用商等實因受恩深重感戴情殷共願稍抒螻蟻微忱於萬一臣恭惟我皇上眷念海疆建此萬年鞏固之宏規沿海商民永獲安居樂業今該商等同聲跪懇願稍輸将臣察看情形實出誠悃不敢壅阻謹代為陳奏合無仰懇聖主俯鑒商等微末之忱恩准所請於藩庫借撥銀二十萬兩先行交工應用俾於五年内按引共輸歸欵則該商等益深感激洪慈於無既矣奏入上諭曰此係有益彼桑梓之事可行耳乾隆四十五年十一月二十四日王亶望奏言竊照浙省海塘十月望汛水勢平緩及辦理柴塘各工縁由前經臣恭摺奏聞自十月下旬潮勢漸減兼之連日晴霽各工均屬穏固惟章家庵一帶對面新漲陰沙日漸寛濶距塘僅二里有餘其迤西頭圍地方又新漲陰沙一塊以致潮水轉成灣勢直射塘身洄溜捜刷根脚所有黄宇等字號竟屬頂衝甚闗險要探量該處水深二丈有餘木櫃恐難穏固今柴塘雖已搶築冬令自可無虞但轉瞬即交春汛萬一難資抵禦則仁和海寧嘉湖下㳺民田廬舎闗係匪輕今春仰䝉皇上諭令改建石塘實為現在𦂳要工程臣於六月底到浙彼時天字號以東二百丈塘外尚有沙塗擁衛先經奏請從辰字號起至伏字號估辦石工二千丈今自九月十月以来天字號以東外沙業已坍盡水刷塘根臣目擊𦂳要情形不敢因己經奏定開工字號稍存拘泥随飭令各工員即從天字號柴塘以内先行趕辦石工並察看形勢必須於天字號以西酌量添建石塘數十丈以備險工上下擁䕶之計庶工程較為周宻查老鹽倉至章家庵一帶柴塘四千二百餘丈先於乾隆五六年間經前督臣徳沛兩次奏請改建石工并築塘樣二十丈嗣經節次欽派大臣来浙勘視議奏或緩或停縁其時塘外䕶沙寛廣未即舉行是從前本已定有章程並非不可辦之工今值勢當險要與昔日情形迥異尤為不可遲緩兹督臣富勒渾業已抵浙臣㑹同履勘意見相同臣䝉皇上天恩至深至重當此工程𦂳要惟有竭盡血誠随時相度悉心籌辦於柴塘各工不敢稍存岐視并不敢依違瞻顧坐失機宜務使工程周妥俾海濵黎庶長慶安瀾以仰副聖主委任鉅工之至意所有石塘籌辦情形謹恭摺具奏并繪圗貼説敬呈御覽奏入上諭曰是勉力為之乾隆四十五年十一月二十六日王亶望奏言竊臣於九月内具奏海塘開工日期及督辦情形一摺奉到硃批好知道了欽此又於根底鬆浮句奉硃批此斷不可慎之若實遇浮沙不能下樁亦不可迴䕶前㫖将實情奏来欽此又於致有私行削截句奉硃批此更不可實汝之要事慎之欽此又於㸃騐入槽句奉硃批總以親身往來查看為要莫圗安逸且汝今更有何别事耶欽此跪讀之下仰見我皇上慎重要工至意臣以庸愚荷䝉聖恩訓勉䇿勵敢不崇實認真上副鴻慈委任伏查石塘開槽打樁土性愈結實則樁木愈堅牢若土係鬆浮即樁難著實誠如聖明洞鑒倘實遇浮沙即當據實奏請訓示遵行不敢稍存迴䕶今辰字等號所開各槽臣細加查騐土性澀滯並不浮鬆正須多用人力現已簽樁三千餘根皆係寸節築打入土根脚實為堅固至下樁之際誠恐工員防範稍疎致有私行削截之弊俱經臣親自往來察看自無從稍滋弊端臣受恩深重具有天良斷不敢稍萌安逸旁諉之念惟下樁之後即需砌石查浙省產石之山陰等四縣先後據報採就石料二萬餘丈運抵工所者止三千餘丈僅敷二十丈塘工之用若先行儘力開槽石料未能應手浙省陰雨較多倘槽厎積水泥濘轉多未便其江蘇省採辦石料已准江蘇撫臣来咨飭屬趕辦尚無採就成數及起運日期臣現㑹同撫臣李質頴分别嚴催運工以濟急需一俟石料充裕即可多集人夫上𦂳趕辦臣今春叨沐殊恩節次跪聆慈訓兹又欽奉硃批勉勵切至惟有仰體聖心從實妥辦處處親身督率不遺餘力成此鉅工以冀稍酬髙厚於萬一所有塘工實在情形恭摺具奏奏入報聞乾隆四十五年十二月初八日王亶望奏言竊照十月望汛海塘水勢平穏及辦理柴石各工縁由經臣等先後奏聞並因黄宇字號已成頂衝即於天字號柴塘以内趕辦石工又經臣王亶望恭摺具奏兹十一月初旬以来天氣和暖潮汛長發如常因范家埠對面所漲陰沙日漸寛濶北岸頭圍地方又有新漲陰沙夹峙以致潮溜轉成灣勢直射塘身迴溜捜刷根脚其頂衝黄宇字號新築柴工於初三日復有衝刷矬陷之處随經臣王亶望督率各員下埽搶䕶並知㑹臣富勒渾臣李質頴赴工公同逐處細加相度探量頂衝處所現在水深三丈有餘較前又深丈餘上下洄溜湍激加添之竹簍木櫃亦被衝去趕𦂳下埽搶築已獲平穏此時冬令防䕶自可無虞但轉瞬即交春汛恐難抵禦惟有在於柴塘以後儧砌石工以為重闗保障之計第查魚鱗石塘每丈需用條石一百十三丈有零現在運抵工所者僅有四千餘丈祇敷三十餘丈魚鱗之用且查現在搶修石塘處所土性澀滯每丈下樁一百五十餘根亦未免有需時日臣等再四籌酌查乾隆元年大學士嵇曽筠辦理海塘曽有搶險石工外用條石疊砌内用石塊填堵計每丈所用條石樁木可減魚鱗石塘之半臣等以勢當險要迫不及待未敢拘泥前奏公同定議仿照辦理以期施工少易而成事較速復察看頂衝上下闗鍵應於柴塘以内自天字號起直至辰字號以東趕砌條塊石塘二百數十丈再於天字號迤西添砌數十丈共合三百丈以為後䕶一面嚴催條石陸續做運以便趕砌務於来年春汛以前報竣俟此項條塊石塘辦竣倘或溜有改移尚可相機添築如勢已平穏即從辰字號以東接辦魚鱗石工與從前間段築砌之案亦屬相符臣等因預備来年春汛急工酌籌意見相同恭摺具奏奏入報聞乾隆四十五年十二月二十四日王亶望奏言竊照海塘黄宇字號己成頂衝前於十一月初三日該處新築柴工復有衝刷矬陷之處當經臣王亶望在工率員搶䕶並知㑹臣富勒渾臣李質頴到工㑹同督率下埽搶築平穏随公同酌議在於柴塘以後趕辦搶險條塊石塘三百丈以備春汛業經恭摺奏聞臣等一面嚴催條塊石料迅速儧運一面督飭工員上𦂳開槽打樁臣等伏查前督臣嵇曽筠所辦東塘搶險石工下築長樁四千六十餘根用石十四層成築外係條石疊砌内用塊石填堵每層各留收分厎寛八尺頂寛四尺五寸現在俱屬𦂳固每丈用條石二十六丈零今臣等仿照辦理必須較辦工程酌加髙寛堅實務令搶險之工足抵魚鱗石塘之用公同悉心籌畫於塘底外打排樁四十根裏用散樁四十根共八十根空處俱用塊石填築後接築塊石六尺使一律平坦其第一層加砌石板二路進深八尺後砌塊石六尺第二層順砌條石四路其餘各層分别條石丁順收分成砌後俱逐層用塊石鑲砌灌用灰漿鬬縫𦂳宻面葢條石一路計上下十七層成做厎寛一丈四尺頂寛四尺較前所辦條塊石塘加髙三層厎加寛六尺每丈用條石三十五丈零再於後面加培土戧現令工員照式趕辦臣王亶望親身督辦務使料實工堅足資捍禦查開槽打樁每塘一丈僅能安樁架一副該處土性澀滯計每日樁架一副打樁止二三根前因柴塘矬陷搶築並補築添建柴塘七百餘丈當将樁夫移築柴工現又上𦂳添僱務足三百副計搶險塘脚三百丈厎樁二萬四千根按每日每副下樁計四十日加以陰雨暫停日期約計兩月樁可打完随時夯築逐層砌石計至開春三月内即可辦竣三百丈彼時春汛将臨柴塘頂衝處所後有石工擁衛周防保䕶自不致稍有疎虞并察看大溜有無改移應否添築随時相機辦理另行奏聞所有現在趕辦搶險石塘情形恭摺具奏謹繪具圗說敬呈御覽再查十一月望汛海塘水勢平緩合併陳明奏入上諭曰諸凡用心為之以實可也同日大學士公阿柱等奏言本日面奉諭㫖令臣等将浙江省海塘工程情形公同酌議仰見聖主虚衷集益慎重要工之至意伏查前奉諭㫖将柴塘改建石工原為保䕶民生一勞永逸之計至老鹽倉一帶難以下樁從前聖駕巡幸親臨閱視久邀洞鑒其餘四千餘丈曽經奉㫖将可以下樁處所一律興工今臣李質頴在工目擊釘樁之難若改照從前嵇曾筠所辦條塊石塘每丈可減樁木數十根并可将釘樁入土尺寸減短數尺辦理較易臣阿桂等查樁木既可減少減短即非全不能釘若徒為目前節省起見減短減少誠如聖諭或致有捜根汕刷之虞何以永資鞏衛再臣李質頴之意與其多費帑項辦理石工而柴塘土塘仍須嵗修保䕶不若於現在柴塘外一律改築坦水實與柴塘有益臣阿桂等查改建石塘原為每年柴塘需料甚多或致不敷採購於民間殊多不便且不如石塘之經久堅固是以不惜帑金興工改築俾沿海民生永資樂利若果如臣李質頴所奏改建石塘後仍須嵗修柴塘自屬徒費無益之舉但以上情形臣阿桂等均未經目睹難以懸斷即臣三寳雖離浙未久而於現在沙水情形亦未敢確持定見容臣阿桂到浙後與富勒渾及李質頴虚衷採訪公同熟籌詳勘目下實在形勢應如何辦理之處再行妥悉議奏請㫖遵行奏入上諭曰依議海塘工程闗係重大必得廣集衆思以期經理妥善陳輝祖於此等事務尚能留心講習現在薩載已回兩江總督之任所有南河總河印信暫交薩載兼署陳輝祖俟大學士阿桂經過清江浦時即㑹同前徃海塘與富勒渾公同履勘籌酌詳悉妥議具奏欽定南巡盛典卷六十
