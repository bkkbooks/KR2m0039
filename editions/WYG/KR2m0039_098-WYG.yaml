body:
  text: 欽定四庫全書欽定南巡盛典卷六十六祀典乾隆十五年十月三十日禮部奏言所有南廵應行祀典謹條列具議陳奏伏乞睿鑒遵行一㳟查康熙二十三年聖祖仁皇帝稽古時廵駕至泰安豋山躬祭岱嶽回鑾過魯觀車服禮器詣闕里親祭先師孔子遣親王致祭元聖周公臣等伏思乾隆十三年我皇上肇修東巡先師孔子闕里東嶽岱宗均已躬親展虔此次巡厯經行便道似可無煩聖駕親厯應照常祀例於明春駕臨東省之時遣官致祭闕里望秩岱宗其元聖周公廟近在曲阜亦請照康熙二十三年例遣官致祭一㳟查康熙二十三年聖祖仁皇帝南巡至蘇州虎邱諭大學士等曰明太祖一代開創令主功徳並隆朕巡省方域将及江寕鍾山之麓陵寝斯在朕優禮前代况於其君實賢可遣祀如禮又奉諭明太祖陵已遣官致祭但朕既抵江寕距陵非逺其親為拜奠是年躬詣明太祖陵奠酒二十八年躬詣致祭三十八年遣官致祭躬詣奠酒四十二年遣官致祭命皇子奠酒四十四年復躬詣致祭又查康熙二十八年聖祖仁皇帝南巡至浙江㑹稽有㫖祭禹陵經臣部以遣官致祭後皇帝親詣奠酒進奏奉上諭堯舜禹湯文武皆前代聖君遣官致祭後方行親詣奠酒未為允協禹陵朕将親祭之此祭文内可書朕名是年親祭禹陵臣等謹查厯代帝王陵寝凡逢慶典遣官致祭具有常經我聖祖仁皇帝聖徳如天鑾輿所届特於㑹稽禹陵江寕明太祖陵親行奠獻允足以樹無前之芳規昭萬世之法守今茲皇上紹䋲祖武六飛初駕由江南至浙江二地陵寝臣等理合奏聞如䝉諭㫖親祭一應典禮届期臣部詳查奏明請㫖交太常寺照例具儀以進至陵寝之祭向無載明樂章乾隆十三年皇上東巡親祭少昊金天氏陵亦未用樂似可無庸另議其禮神祝版香帛以及祭器等項應帶往者由太常寺帶往應備辦者由太常寺如式開列詳叙尺寸行文該地方官依式敬謹製辦以備應用一查黄河自入江南境經邳宿而東至小清口淮水㑹之江流經揚鎮二府而東皆聖駕所必經古者天子巡狩祭所過名山大川禮也㳟查康熙二十三年聖祖仁皇帝南巡渡河遣官祀河神又今秋皇上中巡經臣部議准於河陽栁園口聖駕渡河處所相地設壇遣官祗行望祭此次皇上南巡由宿遷登舟過淮揚抵浙江河瀆淮瀆江瀆之神並應秩祀再查浙江海塘皇上親臨閲視又㑹稽山為東南望鎮逢兹百神懐柔之㑹應一體遣祭如禮臣等敬擬行文該省督撫飭守土官就聖駕往返經由黄河江淮處所相度潔浄地面敬謹設壇届期遣官致祭其浙江海神㑹稽山神附近原有専廟則仍因廟遣祭用昭盛典以上數條臣等敬稽舊典㳟抒末見是否有當伏候聖明訓誨命下之日親祭祭文及遣官祭文交翰林院撰擬遣祭人員届期臣部於扈從王公大臣内照例奏派祭品由地方官潔備香帛由太常寺送往至於御道經行三十里内先賢勲臣名臣忠烈祠墓理應致祭者臣部節經行催直𨽻山東江南浙江各督撫詳查具報尚未到齊應俟咨覆到齊之日冄議奏入奉㫖禹陵明太祖陵朕親詣行禮餘依議乾隆十五年十一月三十日禮部尚書兼管太寺事務伍齡安奏言禮部具奏明年皇上南巡親詣禹陵明太祖陵其禮神祝版香帛以及祭器等項應帶往者由太常寺帶往應備辦者由太常寺如式開单詳敘尺寸行文該地方官依式敬謹製辦以備應用臣寺謹查東巡致祭少昊金天氏陵經太常寺奏明儀注前期進呈并移㑹内閣派繕寫祝版中書一員預期到彼敬謹繕寫前期一日臣等㳟捧請於祭所供設其應用之香帛祝版拜褥祭器等項亦經太常寺奏明臨期行文兵部咨取人夫車輛並䕶送兵丁派員沿途敬謹運往指示陳設今此次皇上親詣禹陵明太祖陵既經禮部奏明援照致祭少昊金天氏陵之例辦理所有儀注臣於祭祀前期進呈仍移㑹内閣派中書一員同太常寺官員到彼敬謹繕寫祝版拜褥祭器㳟捧請於祭所供設所有香帛祝版拜褥祭器等項並厨役等應帶往者臣寺臨期行文兵部咨取人夫車輛船隻並䕶送兵丁於帶往賛禮郎内揀選得辦事㕔官明祿賛禮郎訥親額筆帖式常有預行前期将香帛祝版拜褥祭器等項敬謹運往指示陳設應地方官備辦者臣寺如式開单詳叙尺寸行文各該督撫依式敬謹製辦以備應用奏入報聞乾隆十五年十二月初九日禮部奏言本年十月内臣部具奏皇上南巡應行祀典一摺奉㫖禹陵明太祖陵朕親詣行禮欽此㳟查乾隆十三年皇上東巡親詣少昊金天氏陵祭日皇上御龍袍補服行二跪六叩禮扈從之内大臣侍衛文官五品以上武官三品以上官員該地方文官知府以上武官副将以上俱齊集陪祀其不陪祀之文武各官并地方官員俱穿蟒袍補服在行宫前兩旁列跪送迎今皇上親詣禹陵明太祖陵行禮所有應行禮儀應請照乾隆十三年親詣少昊金天氏陵之例交太常寺届期填入儀注奏聞行文吏兵二部轉傳文武各衙門門並行知江南浙江各該督撫一體欽遵冄㳟查㑹典康熙二十八年聖祖仁皇帝南巡親詣禹陵明太祖陵致祭俱行三跪九叩禮今照致祭少昊金天氏陵行二跪六叩禮謹擬具奏奏入奉㫖行三跪九叩禮乾隆十五年十二月十九日禮部奏言㳟查㑹典皇上行幸經過地方遇有厯代帝王陵寝及勲臣塋墓在百里之内者遣官致祭又查康熙四十二年聖祖仁皇帝行幸山西等處奉㫖朕經過地方有應祭嶽瀆厯代帝王陵寝預行議奏經臣部查明具奏奉㫖在三十里以内者奏聞三十里以外者不必具奏又查本年八月内聖駕巡幸中州直𨽻河南各省督撫咨請附近輦路之名臣忠烈先賢等祠墓應否致祭經臣部議准致祭名臣以從祀帝王廟者為斷先賢以從祀聖廟者為斷夲朝名臣以入祀賢良祠者為斷其未經列祀典忠義卓越諸人分别酌議致祭明春聖駕南巡先經臣部敬查應行祀典東省元聖周公先師孔子岱宗江省河瀆淮瀆江瀆明太祖陵浙江禹陵南鎮海神分别親詣行禮及遣官致祭奏聞請㫖並聲明御道三十里内先賢勲臣名臣忠烈祠墓禮應致祭者節經行催直𨽻山東江南浙江各督撫詳查具報俟覆齊日冄議奉㫖禹陵明太祖陵朕親詣行禮餘依議臣部随行文各該督撫欽遵辦理並飛催御道三十里内有無應祭先賢勲臣名臣忠烈各祠墓詳查報部定議兹據直𨽻總督山東廵撫兩江總督江南河道總督江蘇巡撫浙江廵撫各陸續具咨報部臣等詳加酌核除冊内所列㑹稽禹陵江寕明太祖陵經奉諭㫖親祭山東岱廟江南河瀆淮瀆江瀆浙江南鎮神廟海神廟經臣部議准遣祭並各省帝王陵寝先賢名臣祠墓在御道三十里外及直省所報之燕樂毅等祠墓五處山東省所報之晉羊祜等祠二處浙江省所報之唐禇遂良等祠三十五處向來不列祀典者均應毋庸置議外其浙江省咨報嘉興縣唐陸䞇祠錢塘縣宋岳飛祠墓明于謙祠墓本朝怡賢親王祠山隂縣王守仁祠查陸䞇岳飛于謙係從祀厯代帝王廟王守仁係從祀文廟所有祠墓或為里居或為殉節之地本朝怡賢親王祠雍正八年奉㫖建造皆與臣部議准中州祀典符合理應遣祭又吳越王錢鏐首建塘功功徳在民現在臨安有祠均宜膺祀典又宿遷縣西堤大王廟本朝勅封為顯佑通濟昭靈効順金龍四大王之神康熙二十三年聖祖仁皇帝南巡遣官致祭今河瀆已經臣部奏准於聖駕經渡處所設壇遣祭其西堤大王廟亦應遣官致祭冄㳟照聖駕親詣禹陵行禮由杭州渡錢塘江至㑹稽應照渡河渡江之例令地方官於江干潔浄地面設壇遣官致祭以上八處如䝉俞允臣部行文翰林院撰擬祭文太常寺備辦香帛地方官預備祭品應行遣祭人員届期照例於随駕滿漢大臣内繕冩名籖㳟侯欽㸃其餘杭省所報先賢曾子子貢子路朱子二程子先儒張栻楊時等祠宇雖皆符合祀典惟查諸賢里居均不在浙原因浙地人士景仰芳規随時建立如此之類所在多有難與駕幸東省遣祭顔曾思孟専祠駕幸中州遣祭二程子諸人祠一例議祭此外冊開嚴光李泌王叔英等合祠共七處臣等按冊詳查其中雖間有經列祀典之人並非専祠且一祠内人數繁多碍難分晰若槩議致祭於禮未免煩凟均應毋庸置議至江南一省現據該督撫咨報明太祖陵宿遷大王廟及聖駕渡江渡河處所而外惟有九華山一處向原不載祀典毋庸置議其御道三十里内有無先賢名臣各祠墓屢經行催未據咨覆今聖駕正月啟行如該督撫於數日内咨報到部臣部即行定議具奏如尚未經具報應俟報到之日臣部随駕堂官随時議奏請㫖預令太常寺酌備香帛帶往應用祭文届時知㑹扈從翰林院撰擬祭品交地方官備辦奏入報聞乾隆十六年正月初九日禮部奏言先經臣部具奏聖駕南廵御道三十里内先賢名臣應行致祭之處江南一省未據咨覆俟報到之日臣部随駕堂官随時議奏兹節據兩江總督咨稱揚州三㲼河怡賢親王等祠計五處江南河道總督咨稱河口惠濟等祠廟計十一處皆係聖駕經過近地應否遣官致祭各聲明咨請到部臣部詳查該督冊開除河口惠濟祠清口風神祠運口張将軍廟武家墩威􅂋王廟髙堰闗侯廟髙良澗禹王廟山陽縣漢淮隂侯祠漂母祠宋徐績祠明陳瑄祠等十一處考㑹典祠祀各祠原未開載應毋庸議其皂河運口金龍四大王廟二處查顯佑通濟昭靈効順金龍四大王業據於宿遷縣西堤廟内遣祭已屬重複亦應毋庸置議惟清江浦祠宇一處祀國朝河臣靳輔齊蘇勒大學士嵇曽筠查靳輔等三人皆係本朝治河名臣祠宇又属勅建與祀例相符應仰邀恩祭至江淮之神前經臣部奏准於傍岸設壇遣祭今該督既稱運口有淮神廟𤓰洲有江神廟應令該督確查果係江瀆淮瀆専廟即宜因廟致祭毋庸另行設壇冄浙江錢塘縣怡賢親王祠前經臣部先據浙撫咨議祭令揚州三㲼河口有祠為聖駕先行經臨之地應即於此處遣祭其錢塘祠宇毋庸冄行遣祭命下之日應用祭文香帛祭品及遣祭人員臣部照例行文各該處辦理其江蘇等處御道三十里内有無先賢名臣祠墓該撫尚未咨覆到部應俟報到之日臣部遵照前奏辦理奏入奉㫖浙江錢塘縣揚州三㲼河怡賢親王祠宇俱不必致祭餘如所議行乾隆十六年正月二十六日禮部奏言先經臣部具奏聖駕南巡御道三十里内應祭先賢名臣祠墓江蘇等府尚未咨覆應俟報到之日冄行奏辦今據兩江總督黄廷桂冊報江寕蘇州常州鎮江揚州各屬界内先賢名臣祠墓到部臣等詳查冊列祠墓計一百一十九處内江寕各府除不入祀典如宋臣鄭俠等五十四人祠廟重複如唐臣陸䞇等十六人又或經列祀典而祠廟所在多有難以遍祭如宋儒程子等三十一人均毋庸置議外惟蘇州府周泰伯祠先賢言子㳺祠先儒范仲淹祠宋臣韓世忠祠本朝江蘇廵撫臣楊斌祠張伯行祠總河臣陳鵬年祠江寕府晉臣卞壼祠宋臣曺彬廟明臣徐逹常遇春墓方孝孺等一百十八人合祠本朝兩江總督臣于成龍祠𫝊臘塔祠常州府周吴季扎祠本朝尚書臣趙申喬祠鎮江府宋臣宗澤祠本朝大學士臣張玊書祠計祠墓十有八處查泰伯季扎至徳髙風著稱經傳言子㳺范仲淹皆吴産從祀聖廟張玉書趙申喬從祀賢良祠均與臣部奏准遣祭之例相符卞壼曺彬宗澤韓世忠徐達常遇春方孝孺等于成龍傅臘塔湯斌張伯行陳鵬年皆非江蘇常鎮四府人但或配享厯代帝王廟或從祀賢良祠或忠義卓著於史冊其於江蘇地方或有功斯民或盡節兹土或歸𦵏此鄉據該督咨稱祠墓均在御道三十里以内似應一體仰邀遣祭以彰盛典其祭文交行在翰林院撰擬香帛由行在太常寺頒發應用祭品行文地方官備辦奏入報可乾隆十六年二月初六日行在禮部奏言㳟查乾隆十五年八月内聖駕廵幸中州渡黄河日皇上親詣彩棚拈香行禮回鑾日遣荘親王拈香行禮此次駕幸江浙由清河縣孫家荘渡黄河𤓰洲渡揚子江杭州渡錢塘江照臣部奏准之例遣官致祭外皇上囘鑾時渡河渡江日請照駕幸中州渡河之例遣官拈香行禮奏入奉㫖往返朕皆親詣拈香乾隆十六年二月初四日行在禮部奏言先經臣部具奏聖駕經過三十里之内有應祭處所俱遣官致祭今宿遷縣金龍四大王廟清河縣河瀆淮瀆山陽縣本朝治河名臣靳輔齊蘇勒嵇曽筠祠理應致祭謹将随駕之滿漢文武大臣職名繕寫名籖㳟候欽㸃四員前往致祭奏入奉㫖遣錢陳羣胡寳瑔多爾濟永慶乾隆十六年二月十二日行在禮部奏言先經臣部奏准江都縣江瀆之神丹徒縣宋臣宗澤祠本朝大學士臣張玉書祠陽湖縣吳季扎祠本朝尚書臣趙申喬祠遣官致祭謹将随駕滿漢文武大臣職名繕冩名籖進呈㳟候欽㸃五員前往致祭奏入奉㫖遣永慶胡寳瑔七達色多爾濟伍彌泰乾隆十六年二月十九日行在禮部奏言前經臣部奏准長洲縣言子㳺祠宋臣韓世忠祠本朝原任廵撫臣湯斌張伯行陳鵬年三祠俱在蘇州府學内一處應遣一人致祭謹将随駕滿漢文武大臣職名繕冩名籖進呈㳟候欽㸃五員前往致祭奏入奉㫖遣錢陳羣胡寳瑔七達色伍彌泰多爾濟乾隆十六年二月二十日行在禮部奏言前經臣部奏准嘉興府唐臣陸贄祠海寕縣海神廟錢塘縣本朝原任尚書臣徐潮墓唐臣錢鏐祠宋臣岳飛墓臣于謙墓致祭之處謹将随駕滿漢文武大臣職名繕冩名籖進呈㳟候欽㸃六員前往致祭奏入奉㫖遣錢陳羣胡寳瑔七達色多爾濟四人人其餘二處量其近處兼行致祭乾隆十六年二月二十二日太常寺奏言伏查去嵗皇上巡幸豫省祭祀中嶽於駕到次日祭祀此次祭祀禹王亦照中嶽之例俟駕幸紹興府六合村次日祭祀理合請㫖載入儀注奏入報聞乾隆十六年三月初四日行在禮部奏言前經臣部奏准錢塘縣錢塘江神山隂縣明臣王守仁祠㑹稽縣南鎮神廟遣官致祭謹将随駕滿漢文武大臣職名繕冩名籖進呈㳟候欽㸃三員前往致祭奏入奉㫖遣錢陳羣胡寳瑔永慶乾隆十六年三月十八日行在禮部奏言前經臣部奏准江寕府晉臣卞壼祠宋臣曺彬廟明臣徐達墓常遇春墓方孝孺等一百十八人合祠本朝兩江總督臣于成龍祠傅臘塔祠遣官致祭查此七處相離不逺請派四人就近兼祭謹将随駕滿漢文武大臣職名繕冩名籖進呈㳟候欽㸃致祭奏入奉㫖遣錢陳羣七達色永慶多爾濟乾隆十六年七月初七日禮部奏言本年我皇上南廵浙江親奠禹陵特命擇姒氏子孫有品行者世予八品官奉祀兹據浙江廵撫永貴疏稱據布政使葉存仁轉據紹興府知府鄭肇奎㑹稽縣知縣髙居寕於姒氏子姓中詳加選擇查有姒恒甸者考之世譜系出宗支詢於鄉評克敦品望奉祀有年恪守烝嘗於奕世擇賢授職堪膺聖代之殊榮取具親族譜結府縣加結詳請題授八品官世襲奉祀臣覆查無異除譜送部外臣謹㑹同閩浙總督臣喀爾吉善合詞具題奉㫖下部臣部謹議得随刋底績姒氏之明徳在人府事允修萬世之成功攸賴惟㑹稽為神禹衣冠所藏自宋明以來禁樵蘇置守陵户代有著令我朝益隆崇徳報功之典每嵗春秋勅令有司致祭康熙二十八年㳟逢聖祖仁皇帝巡幸浙江御書地平天成匾額並修理陵廟増置守祠人役盛事昭垂簡冊我皇上稽古時巡仰惟明徳溯厥成功特賜姒氏奉祀裔孫八品世職擇其有品行一人充之誠千古未有之曠典也兹查姒恒甸既據該撫䟽稱世系可徵克敦品望取具譜結確鑿有憑應如所請授姒恒甸為八品官仍准世襲奉祀臣部照例行文吏部給劄嗣後凡届應行承襲之時令該督撫按其宗支次序詳加選擇照例具題併送㑹典館編輯用垂永久奏入報可乾隆二十年七月十九日禮部奏言竊惟省方乃以觀民時邁亦隆肆祀古者天子巡狩祭所過名山大川禮也查乾隆十六年皇上南巡遣官致祭河瀆淮瀆江瀆之神又經臣部奏請皇上回鑾時渡河渡江之日照駕幸中州之例遣官拈香行禮奉㫖往返朕皆親詣行禮今此次皇上南巡應照例遣官致祭河瀆淮瀆江瀆之神皇上在返渡河渡江之時或遣官拈香行禮或皇上親詣行禮之處伏候訓示其祭文交翰林院撰擬遣官届期臣部於扈從王公大臣内照例奏派祭品由地方官備辦香帛由太常寺帶往冄查定例御道經行三十里之内有無應祭厯代帝王陵寝及先賢勲臣名臣忠烈祠墓臣部行文江浙督撫俟查覆到日另行具奏奏入奉㫖渡江渡河往返朕親詣行禮乾隆二十一年十月初二日禮部奏言明春㳟逢皇上南巡應請照例遣官致祭河瀆淮瀆江瀆之神御道經行三十里内有無應祭厯代帝王陵寝及先賢勲臣名臣忠烈祠墓臣部現在行文直𨽻山東江浙督撫俟查覆到日另行具奏兹謹将聖祖仁皇帝南廵躬詣祭奠明太祖陵之處繕冩夾片㳟呈口御覽伏候訓示奏入奉㫖明太祖陵遣官致祭朕親詣奠酒乾隆二十一年十二月十一日太常寺奏言此次皇上南巡渡黄河淮河揚子江㸃香親詣明太祖陵奠酒暨應遣官致祭各處所用香帛祭品蠟燭拜褥桌案等項内應地方官備辦者仍行文江南總督敬謹預備外其應帶往者臣寺遵照乾隆十六年之例行文兵部咨取人夫車輛船隻䕶送兵丁派辦理㕔務之賛禮郎訥親額豊伸帶領鋪排人等前往運送指示陳設預備㸃香祭祀事務冄皇上經行御道三十里以内應遣官致祭之處所需香帛等物臣寺預期備辦俟禮部奏明知㑹到日帶往應用奏入報聞乾隆二十一年十二月二十日禮部奏言明春皇上南巡臣等酌議省方問俗禮隆望秩逢兹百神懐柔之㑹所有先師孔子闕里元聖周公東嶽岱宗浙江海神南鎮㑹稽山應請照乾隆十六年奏准之例遣官致祭用昭盛典至禹陵臣等伏思乾隆十六年皇上肇修南巡已經躬親展祭禮至隆備此次巡厯應請照例一體遣官致祭冄御路所經三十里内有無應祭處所臣部現在行查各省尚未覆到俟覆到之日另行定議奏入報可乾隆二十一年十二月二十一日禮部奏言明春聖駕南巡經臣部奏准御路所經三十里内有無應祭厯代帝王陵寝及先賢先儒名臣勲臣忠烈祠墓交各該督撫查明報部今據直𨽻總督查報良鄉縣有戰國時樂毅墓河間縣有漢儒毛萇墓獻縣有漢河間獻王墓景州有漢條侯周亞夫墓北魏咸陽公髙允墓北齊安徳公封隆墓均在御路三十里内到部臣等詳查河間縣漢儒毛萇係從祀文廟與遣祭之例相符應俟聖駕經過時遣官致祭其樂毅等五人墳墓向未列入祀典應毋庸議伏候命下祭文交翰林院撰擬香帛由太常寺帶往祭品令地方官備辦遣官届期臣部将隨駕滿漢大臣職名繕冩名籖進呈㳟候欽㸃致祭現未覆到之山東江南浙江三省應祭處所俟查覆到日臣部另議奏入報可乾隆二十二年正月十七日行在禮部奏言聖駕南巡經過地方凡御路三十里以内有應祭處所俱遣官致祭今河間縣漢儒毛萇墓係在御路三十里以内應遣一人致祭謹将随駕大臣職名繕冩名籖進呈㳟候欽㸃一員前往致祭奏入奉㫖遣劉綸乾隆二十二年正月十九日行在禮部奏請遣官致祭先師孔子闕里元聖周公東嶽岱宗三處得㫖遣蒋溥致祭先師孔子闕里遣秦蕙田致祭元聖周公遣介福致祭東嶽岱宗乾隆二十二年正月二十六日禮部奏言㳟照御路所經三十里内有無應祭處所臣部行文各該督撫查明報部兹據兩江總督尹繼善将御路所經三十里内應祭處所共二十七處造冊咨報又據閩浙總督喀爾吉善将御路所經三十里内應祭處所共五處各咨報到部查江省冊開宿遷縣金龍四大王廟上元縣晉臣卞壼廟宋臣曺彬廟明臣徐達墓常遇春墓方孝孺等一百十八人合祠江寕縣本朝總督臣于成龍祠傅臘塔祠長洲縣言子㳺祠宋臣韓世忠祠本朝巡撫臣湯斌祠張伯行祠河道總督臣陳鵬年祠吳縣周泰伯祠宋臣范仲淹祠陽湖縣周吳季扎祠本朝尚書臣趙申喬祠丹徒縣宋臣宋澤祠本朝大學士臣張玉書祠山陽縣本朝河道總督臣靳輔齊蘇勒紀曽筠祠等二十處浙省咨報嘉興府唐臣陸贄祠錢塘縣唐臣錢鏐祠宋臣岳飛墓明臣于謙墓本朝尚書臣徐潮墓等五處以上共二十五處乾隆十六年聖駕南巡經臣部奏准照依遣官致祭此次仍請照例遣祭外冄江省上元縣明臣李文忠係從祀厯代帝王廟陽湖縣本朝廵撫臣潘思榘係乾隆十七年㫖入祀賢良祠亦與遣官致祭之例相符所有李文忠墓潘思榘祠應請一體遣官致祭至江省上元縣明臣張怡湯和吳良吳禎漢蒋子文等五人祠墓向未列入祀典應毋庸議奏入報可乾隆二十二年二月初九日行在禮部奏請遣官致祭金龍四大王河瀆淮瀆河道總督靳輔齊蘇勒嵇曾筠祠等四處奉㫖遣蒋溥秦蕙田劉綸錢維城乾隆二十二年二月初九日行在禮部奏請遣官致祭江都縣江瀆之神陽湖縣周吳季扎祠武進縣尚書臣趙申喬祠廵撫臣潘思榘祠丹徒縣大學士臣張玉書祠宋臣宗澤祠奉㫖遣劉綸程景伊錢維城乾隆二十二年二月十七日行在禮部奏言遣官致祭先賢言子㳺祠宋臣韓世忠祠范仲淹祠本朝廵撫臣湯斌祠張伯行祠河道總督臣陳鵬年祠周泰伯祠七處應請遣官三員就近兼祭奏入奉㫖遣李景劉綸錢維城乾隆二十二年二月二十一日行在禮部奏言前經臣部奏准禹陵南鎮㑹稽山神浙江海神廟俱遣官致祭謹将随駕滿漢文武大臣職名繕冩名籖進呈㳟候欽㸃前往致祭奏入奉㫖遣李景永慶乾隆二十二年二月二十三日行在禮部奏言前經臣部奏准嘉興府唐臣陸贄祠錢塘縣唐臣錢鏐祠宋臣岳飛墓明臣于謙墓本朝原任尚書臣徐潮墓致祭之處謹将随駕滿漢文武大臣職名繕冩名籖進呈㳟候欽㸃前往致祭奏入奉㫖遣永慶劉綸秦蕙田乾隆二十二年三月初一日行在禮部奏言本年二月二十八日内閣奉上諭朕昨至浙江省城禮部未奏請遣祭已故大學士徐本詢其故則以未入賢良祠例不致祭為對徐本厯事兩朝宣力多年勤慎懋著即如前者過常州時已故之廵撫潘思榘禮部尚猶奏請徐本視潘思榘為何如耶朕廵幸所過縣郡名臣舊輔皆即致祭乃國家念舊酬㓛之典該部自當慎重辦理何得膠柱鼓瑟乃爾徐本著入本省賢良祠並著該部奏請遣官致祭臣部遵即行知該督撫辦理兹謹将随駕滿漢文武大臣職名繕冩名籖進呈恭候欽㸃一員前往致祭奏入奉㫖遣秦蕙田乾隆二十二年三月十七日行在禮部奏請致祭明太祖陵並晉臣卞壼祠宋臣曺彬祠明臣徐達墓常遇春墓方孝孺等一百十八人合祠李文忠祠本朝總督臣于成龍祠傅臘塔祠九處奉㫖遣永慶李景程景伊七達色欽定南巡盛典巻六十六
