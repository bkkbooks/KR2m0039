body:
  text: 欽定四庫全書欽定南巡盛典卷七十六閲武臣等謹按較閲之法莫詳于周禮大司馬職中春教振旅中夏教苃舍中秋教治兵中冬教大閲盖聖王寓軍政于狩田而鼓鐸鐲鐃之用坐作進退之莭綦備焉漢制京師有南北軍為天子所親試而郡國材官騎士嵗時之試則守臣主之唐宋以來相沿不改夫兵可百年不用不可一日不備易之師曰容民畜衆書之立政曰克詰戎兵震疊懐柔理無偏廢我皇上聖神文武撫育萬方威􅏢憺于遐陬偉伐鎸于貞石猶且木蘭秋獮南苑春蒐載纉于苖肄勤䋲武盖仁育義正之規未有如斯之懿爍者也江浙沐浴湛恩乆安耕鑿材勇技擊之士既無所用其蹶張因得講習知方雍容决拾而清蹕所經又必討軍實而申儆之親臨簡閲指示樞鈐因以廣勵戎行普行慶賞厲韎韋之壯氣革絲竹之靡音意美法良靡不賅舉所謂覲光揚烈足兵衛民禮各有宜備斯無患即古岐陽甫草之盛未足以比方萬一曽何有于長楊羽獵華林馬射之云爾哉謹志閲武第九欽定四庫全書欽定南巡盛典卷七十六閲武乾隆二十二年二月二十七日上諭内閣曰今日朕至杭州省城其接駕之緑營兵丁有奏簫管細樂者夫身隸行伍當以騎射勇力為重戊樓鼓角不過用肅軍容即古者鐃歌鼓吹之詞亦以鳴其得勝之氣耳若吹竹弹絲技近優伶豈挽強引重之夫所宜相效此等綠營陋習各省均所不免可傳諭各該督撫提鎮等轉飭所屬標營嗣後營伍中但許用鉦鼓銅角其簫管細樂概行禁止乾隆二十六年十一月十七日上諭内閣曰伍彌泰等奏請明嵗南巡伊等揀選江寧京口官兵沿河安設臺站等語朕幸南省所有京城隨從官兵足敷當差至上船時於官兵内尚且酌量存留伊等縱逺接亦無用處明嵗所有江寧京口兵丁不必迎至宿遷亦不必安設臺站預備差使乾隆十五年五月初六日總理行營王大臣和碩荘親王允祿等奏臣等議得江寧将軍保徳等奏稱辛未年皇上南巡臣等駐防地方老少俱得瞻仰聖顔不勝欣悦官兵等亦各得隨行營當差無不踴躍伏查康熙年間將軍副都統等帯領官兵在宿遷地方接駕明春聖主南巡臣保徳祁爾丹富昌等請帯領官兵六百名前至宿遷地方接駕所帯之官兵日則隨駕當差夜則支更等語查明春聖駕南巡所有隨駕官兵俱係酌量派定差使裕如駕至宿遷地方必由舟行兩岸路窄隨從當差無闗𦂳要之人尚且存住若如該將軍等所請帯領官兵六百名接駕人数過多沿途行走一切地方必至擁阻似毋庸若許人等但該處官兵幸際聖駕親臨而不得黽勉當差殊屬不安臣等酌議交與將軍江寧駐防官兵内挑取二百名前至宿遷地方接駕沿途照木蘭學習行圍人等之例交與䕶軍統領等日則與䕶軍人等一同當差夜則支更至将軍副都統等若俱前來接駕則省城内存下官兵尚多不可無大員管束况聖駕至江寧省時副都統等亦得瞻仰聖顔所有宿遷接駕之處應止令該将軍保徳帶領官兵前來其副都統祁爾丹富昌等不必前來在該處等候奏入報可乾隆十五年七月初六日大學士公傳恒等奏言本年三月内鎮海将軍趙宏恩等奏明春皇上南巡所有沿途一帶應於駐防弁兵内派撥䕶送自清江浦至鎮江分作十䑓每䑓撥兵四十名經臣等議以安䑓派撥四十名未免過多或酌派三十名或十数名沿途䕶送亦屬可行應令該将軍㑹同縂督黄廷桂妥商定議再江寧杭州俱有駐防辦理自宜畫一亦行令該督等㑹同該省將軍都統一體妥商今稱詳細議商量為减撥鎮江兵丁自清江浦至𤓰洲分設十䑓江寧兵丁自鎮江至平望分設十䑓各䑓派官一員兵二十名派恊領二員以為統轄自鎮江至江寧派江寧兵十名鎮江兵十名各官一員在於龍潭安設一䑓至浙江縂督将軍業已咨商該督等自另摺具奏其安䑓地方另行委員勘定查沿途䕶送惟期人数足敷差遣可以不必過多是以臣等原議将派撥四十名之處令㑹同縂督黄廷桂等妥議今據奏安䑓派官一員兵二十名已較原奏量為裁減自清江浦至􅆶洲十䑓則派撥鎮江駐防自鎮江至平望十䑓則派撥江寕駐防辦理亦已畫一但所奏安䑓派兵二十名猶覺過多酌派十名已敷沿途防䕶差遣應令該将軍等預為派撥以備明春臨期䕶送所派兵弁必悉心選擇務得賢能强壮之人足供使令者方為妥協其安䑓地方亦應飭委幹員詳加勘定縂期前後適中庻聫絡照應一切不致貽悮至杭州駐防應如何預備派撥之處亦毋庸俟該省縂督将軍另行具奏應俟臣等此奏命下之日行文知㑹仿照江省之例酌量辦理奏入得㫖依議乾隆十五年十二月十三日兩江縂督黄廷桂江寧将軍保徳奏言竊照江寧省城駐防滿漢兵丁明春聖駕臨幸應備大閲但查滿兵雖有四千除循例輪派水操兵一千名之外實兵止有三千名而營汛遼濶堆卡繁多兼之臨時各項差務所餘無多又督標兩營及城守兩營額兵止共二千餘名除去親丁公費並分防差務之外餘兵更属有限若滿漢各自分操備閲為数既少隊伍不宻似不足以壮軍威而肅觀瞻臣等公同商酌仿照直隸保定府滿漢合操之例預備滿兵一千五百名漢兵一千五百名㑹合操練祗候皇上臨閲以整部伍以壮軍容奏入報可同日兩江縂督黄廷桂奏言江寧鎮江蘓州等處應行預備官兵祗候大閲除江省滿漢合操緣由臣另摺㳟奏外其鎮江駐防旗兵與将軍標營漢兵均應在教塲預備又将軍所管水師標兵應在江靣預備惟蘇州撫標額兵僅止五百餘名除親丁公費并差防之外餘兵甚少不足備閲查鄧尉山下前傍太湖此地水勢不深溜亦平恬帆檣易施合操水陣較京口大江中流上下往來不免濡滯者似覺㨗便可觀臣謹量調蘇松鎮標及太湖營船隻於鄧尉山下操船預備㳟候皇上駕臨鄧尉登山閲視奏入報聞乾隆十五年十二月十四日兩江縂督黄廷桂奏言明春翠華南幸蘇松水師鎮臣王澄係武職大員理應隨臣叩接聖駕但查鎮属髙家嘴汛地係内外大洋通連要隘髙家嘴之内又有呂泗一汛係江海交接之區風帆便利自髙家嘴兩日可逹鎮江所以毎嵗立春以後定有鎮臣帯領弁兵巡緝洋靣之例我朝徳威逺播数十年來乆已海不揚波惟是春初御輅臨幸臣等身任地方不敢不加意慎重臣謹擬令該鎮於正月初旬遵照徃例即赴髙家嘴一帯外洋率領将弁加意巡防其吕泗係狼山鎮標右營所轄即調該管将領帯兵駐守仍交狼山鎮一體督察㳟候聖駕将臨京口令鎮臣王澄先期由水路前來祗候迎鑾其髙家嘴洋面飭令在彼将弁梭織巡遊毋許疎懈在鎮臣既可遂其瞻天仰聖之誠而海洋重地得有大員督巡似更嚴宻再查京口焦山之下僻處江心懸隔江岸臣更将海船弁兵量調三十隻周圍屯劄以肅警蹕至各處支河港􅆜并大營防䕶外衛以及沿途站道官兵臣咨行提臣武進陞率同狼山鎮臣魏文舉壽春鎮臣常岱管領約束合并奏明伏祈皇上睿鑒奏入報可乾隆十六年二月二十七日閩浙縂督喀爾吉善奏言臣於乾隆十四年冬間入覲天顔荷䝉皇上詢及南巡事宜經臣将閲看水操必須在乍浦西山炮䑓地甚淺窄風汛亦須守候據實具奏面奉諭㫖乍浦朕不必前徃閱看臨時或遣王子或差大臣徃看彼處不必預備欽此臣於上年秋間到浙與提臣譚行義酌定於沿海水師各營内按額設戰船兵数之多寡每營調撥一二隻不等配足兵丁噐械派委隣近之定海鎮縂兵官陳鳴夏預期統領前赴乍浦洋面伺候㑹同乍浦滿營水師兵合操陣勢苐臣伏查操演舟師全藉風力在内洋更須候風汎地勢相合方可開篷出碇布列陣勢如遇無風之期固不能操演而乍浦係向南洋面遇南風直抵山脚石礁遇北風颺出外洋俱不便操演惟東南西南諸風汛方可開操大臣赴乍浦須等候風汛與洋面相合然後開操不能一到即閲如俟聖駕抵省後奏請欽㸃大臣前徃恐有稽程限臣查乍浦即在嘉興府属平湖縣境自嘉興府至乍浦路僅一百三四十里又支河一水可通臣先期已飭地方官預備小船乘坐前徃相應具摺奏請特派大臣赴乍浦閲看水操事竣仍由水路至嘉興府囬至省城復命至乍浦滿營水師将軍臣薩爾哈岱有統轄之責理應隨同欽差前徃閲操苐㳟逢聖駕臨幸省城将軍應在省伺候皇上親閲陸路操演並統率官兵辦理省城差使未便前徃乍浦其乍浦副都統臣額爾登現今奉㫖令跟隨䕶軍統領沿途一體辦差乍浦滿營水師係伊管轄兵丁應請令額爾登即從嘉興跟隨欽差大臣赴乍浦閲操事竣仍赴省㳟候差遣合并陳明奏入得㫖命納延泰閲之乾隆十六年三月十二日大學士公傳恒奏言查得去年皇上豫省閲兵時曽賞演陣之巡撫大縀三疋縂兵官城守尉等大縀各一疋八絲緞各一疋參將佐領等八絲縀各一疋都司守備防禦等金奨武牌各一面千縂把縂等銀奨武牌各一面此次浙省演陣大臣官員兵丁賞賜之處遵㫖酌議亦照前賞賜外再預備歩射騎射花馬箭放鳥鎗騎射跑觧舞籐牌官員兵丁等亦照此賞賜内有演陣而又預備各様技藝官五員兵二名臣等酌量議於伊等演陣之應得賞賜等項外増賞官員貂皮各一張兵丁銀奨武牌各一面謹将應賞大臣官員兵丁人数與物件数目另繕清單一併進呈俟命下之日所賞貂皮縀疋金銀奨武牌赴廣儲司支領賞給奏入報可乾隆十六年三月二十四日行在兵部奏言明日江寕駐防官兵及緑旗營兵合操請酌量於伊等齋集時先徃操演一次㳟俟皇上閲看今将陣圗并官兵数目一并進呈奏入報聞乾隆十六年三月二十六日大學士公傅恒等奏言遵㫖賞賚江寧省演陣大臣官兵酌議亦照賞給浙江省演陣大臣官員兵丁之例将軍縂督以下防禦守備以上等官分别賞給縀疋驍騎校滿洲兵丁賞給一月錢糧千縂把縂外委把縂綠旗兵丁賞給奨武銀牌今将應賞大臣官員兵丁及物件数目叧繕清单謹呈俟命下之日賞給驍騎校兵丁一月錢糧著該将軍飭行藩司攴給外其賞給大臣官員縀疋及綠旗千把縂兵丁奨武牌著在廣儲司支領賞給奏入得㫖如所議行乾隆二十年十一月二十六日䕶理鎮海将軍印務京口副都統伊林阿奏言乾隆十六年聖駕南巡前任将軍趙宏恩奏請帶領官兵二百名前徃宿遷縣地方㳟迎聖駕經軍機大臣議以京口至宿遷路途不逺又係江南境内請照該将軍所請准其帶領官兵二百名至宿遷縣地方㳟迎聖駕今将軍李紱尚未到任俟到任時遵照前例帶領官兵二百名前徃宿遷縣地方㳟迎聖駕日則敬謹隨行夜則守更巡邏倘将軍李紱未及到任伏乞皇上即准臣等帶領官兵迎接再查乾隆十六年聖駕南巡前任将軍趙宏恩奏請安䑓一摺經軍機大臣議覆准行自𤓰洲起至清江浦止安設十䑓於龍潭地方江寧京口合設一䑓明嵗聖駕南巡臣等請亦照前例辦理奏入上諭曰安䑓照前兵丁不必來接乾隆二十一年十一月初十日江寧将軍徳敏奏言㳟照乾隆十六年聖主南巡前任将軍保徳等奏請帶領官兵接駕一事經縂理行營王大臣議准将江寧駐防官兵内挑取二百名前至宿遷地方接駕沿途照木蘭學習行圍人等之例交與䕶軍統領日則與䕶軍人等當差夜則巡邏支更至省城内存下官兵尚多必須有大員管束應祗令該将軍帶領官兵前至宿遷接駕其副都統等不必前來明春聖駕南巡臣等遵照前例派官十六員兵二百名臣徳敏帶領前至宿遷地方接駕所帶官兵仍照例交與䕶軍統領與䕶軍等一同支更當差再辦理江寧馬匹縂督尹繼善奏准派副都統一員辦理臣等請将副都統富昌帶領江寕八旗馬匹在京口地方預備聖駕未至京口之前富昌過江㳟請聖安副都統佟明存住守城暫理将軍印務約束官兵聖駕未至江寧之前佟明在龍潭地方㳟請聖安奏入報聞乾隆二十一年十一月十一日江寧将軍徳敏奏言㳟照乾隆十六年聖駕南巡由臣等奏派官兵沿河坐䑓其江寧官兵自京口起至平望地方安設十䑓毎䑓官一員兵十名派恊領二員統轄其京口官兵自京口起至清江浦地方安設十䑓毎䑓官一員兵十名派恊領二員統轄龍潭地方江寧京口官兵合設一䑓毎處官一員兵五名明春聖駕南巡臣等請仍照十六年定例分别預備奏入報聞乾隆二十二年二月二十六日杭州将軍薩爾哈岱閩浙縂督喀爾吉善浙江巡撫楊廷璋浙江提督武進陞同奏言窃照浙江滿營綠營各官兵馬歩技勇自乾隆十六年荷䝉皇上校閲迄今五載恭逢翠華重幸将士歡騰臣等謹於杭州省城滿營敎塲預備滿營操陣緑營操陣并照上屆預備滿營緑營合操陣式伏候皇上訓示應閲何項屆期祗候恭請大閲奏入得㫖滿漢合操乾隆二十二年二月二十九日大學士公傅恒奏言遵㫖賞賜浙江省合操大臣官員兵丁之處查十六年皇上賞賜浙江省大臣官員兵丁自将軍縂督以下防禦等官以上俱經分别賞給縀疋驍騎校兵丁給奨武銀牌今此次浙江省合操大臣官員兵丁請俱照十六年之例賞給再皇上前歩射騎射對撲馬上打鎗官兵應入於合操官兵内一體賞給所有應賞之大臣官員兵丁數目所賞之縀疋錢糧銀牌数目另開清单一併進呈其賞給驍騎校及滿兵之一月錢糧亦照前交於行在户部将兩淮鹽項銀兩内動支除應賞之縀疋銀牌由廣儲司支領外是日舞籐牌之浙江福建省分緑營官兵前䝉皇上親閲時已經恩賞此次應毋庸再議奏入得㫖如所議行乾隆二十二年三月二十日大學士公傳恒等奏言遵㫖賞給江寧省演陣大臣官員兵丁一事查十六年賞給江寧省演陣将軍縂督以下防禦以上俱分别賞以縀疋驍騎校兵丁俱賞一月錢粮緑營兵丁賞奨武銀牌此次演陣江寧省大臣官員兵丁等請俱照十六年之例賞給再御前射箭對撲官兵亦照演陣官兵一體賞給其撂跤滿洲兵丁有閒㪚二名未食錢糧之人應請每人賞給銀牌一面所有應賞演陣之大臣官兵等数目併賞給縀疋錢糧銀牌数目另繕清单一併進呈所有賞給縀疋銀牌在廣儲司支領賞給驍騎校兵丁一月錢糧亦照上次交行在户部飭行布政司庫銀内動支奏入得㫖如所議行欽定南巡盛典卷七十六
