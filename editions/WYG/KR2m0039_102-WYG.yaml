  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_102-1a, image: WYG0659/WYG0659-0157a.png}
body:
  text: 臣等謹按重仲舒有言春者天之所以生也仁者君之所以愛也天行健而覆露照導普汜無私聖憲天而行慶施惠莫不欣悦帝王統乾元體太一法乎春生歸於仁育三五以來靡不由之國家重熙累洽寰海内外沐浴膏澤歌咏太平之日乆矣皇上以至仁極聖秉籙膺圖羣生霑濡淪肌浃髄清蹕所屆愷澤覃敷極渥至優懿爍往載粤自重光協洽洎乎閼逢執徐翠華六幸江浙内而親藩卿尹扈從之臣外而秉節麾旄封疆之吏下逮文武將士庻司百執事迄芻蕘輿𨽻掃除輯濯之夫靡不睿慮周詳賚予周悉至若􅂄年碩徳齒危髪秃之彦英跱俊邁覈義希仁之士隠淪野處白叟黄童瞻雲就日遮道迎鑾者或優以爵禄或頒之粟帛或予以金錢或錫以酺燕躬被者抃舞逖聴者謳思夐哉邈乎登郅治于隆平超羲軒而無上太和保合醲化充周又豈僅式序有位加地進律之云爾㢤深恩沐於平日異數被於入疆易曰雲行雨施品物流形葢乗春以布澤而天下歸仁固非揚厲之所能賅舉矣臣等謹録前後所奉諭㫖恩賞諸事依次年月彚輯成編為褒賞第七欽定四庫全書欽定南巡盛典卷六十九褒賞乾隆十五年十月初一日上諭内閣曰向來截留漕糧歇帮船隻例給一半本折月糧俾旗丁資以養贍朕前因南省明春需米將江浙二省乾隆十五年漕米共截留二十五萬石應減帮船頗多若照例給與折半月糧恐其苫葢食用尚有不敷著加恩於應給折半之外再賞給二分以恤丁力該部即遵諭行乾隆十六年正月二十一日上諭内閣曰朕此次南巡所有經過直𨽻山東江南浙江地方各營汛兵丁有派辦差務者著查明賞給兩月錢糧以昭恩賚乾隆十六年正月二十二日上諭内閣曰朕翠華南幸所有直𨽻山東江南浙江等省承辦差務之文武官弁宜一體加恩著各該督撫查明咨部凡有罰俸降級之案俱准其開復其無此等叅罸案件者各加一級乾隆十六年二月初七日上諭内閣曰此次隨朕南巡人等雖俱賞有帮貼路費俸禄錢糧官馬但内地行走與口外不同其一應物價不無昂貴勢必稍需餘費著總理行營事務大臣將此次随來大臣侍衛官貟執事人兵丁及存住順河集人等作何加恩賞賜之處分别定議具奏所賞銀兩於兩淮塩政存貯公項銀内動用乾隆十六年二月初八日上諭内閣曰劉師恕著加恩賞給侍讀學士職銜呉華孫汪士鍠于枋周龍官俱著加恩給還翰林院編修以原銜休致乾隆十六年二月初九日上諭内閣曰朕稽古時巡省方問俗直𨽻屢經臨幸地方供頓辦理夙有章程山左山右曽准商捐於閭閻並無擾累兹當巡幸江南地方官初次承辦大差距皇祖南巡已四十餘年舊章難于稽攷深慮其辦理拮据或致有累民力今兩淮商人踴躍急公捐輸報効地方官一應公務俱於此取給可信其無絲毫擾累閭閻而辦理工程貧民更得資其利賴於生計轉有禆益甚屬可嘉著加恩各按其本身職銜加頂帶一級以示朕䘏商為民至意同日上諭内閣曰熊學鵬著加恩賞給原銜王璣葉一棟繆孔昭俱著加恩賞給鴻臚寺卿銜馬豫賞給翰林院編修銜曺繩柱朱鳳英王箴輿各賞給原道府銜黄蘭谷賞給五品銜桞廷璣賞給原知縣銜朱鎔賞給縣丞銜黄暄馮焜俱加恩准令河工効力三年無過以通判補用乾隆十六年二月初十日上諭内閣曰朕巡幸江浙經過地方各營汛兵丁有派令辦差者俱著加恩賞給兩月錢糧今念河兵有攬縴諸務更屬勤勞再加賞一月錢糧以示優䘏乾隆十六年二月十三日上諭内閣曰髙斌張師載管理挽縴河兵一路随從諸事實心辦理所屬河工人員亦俱能黽勉出力甚属可嘉髙斌著加一級張師載著加頂帶一級作為從一品其河工辦差人員俱著各加一級乾隆十六年二月十五日上諭内閣曰許王猷著加恩賞給侍讀學士銜江呉鑑著給還知州銜陳克鎬黄湘俱著給還知縣銜嚴鈺仍賞給主簿銜黄錫申以叅將用周光烈交與該部發往鄰省以守備委署試用三年無過題請寔授同日上諭内閣曰革職提督楊凱前來接駕朕觀其年力未衰從前叅案尚無實在劣蹟且曾經厯練戎行著加恩以總兵官用乾隆十六年二月十六日上諭内閣曰朕省方所至廣沛恩膏前因兩淮商衆踴躍急公業已加恩優奬更念其運綱輸課接濟民食恤商斯足以惠民特行再沛殊恩著將兩淮綱塩食塩於定額外每引賞加一十觔不在原定成本之内俾得永逺沾受實惠商人仰體朕博愛敦本至意風俗雖未必驟更近一分返檏之心即逺一分極奢之念植息毋取其三倍減一分售塩之價即利一分食塩之人其有昂值網利致累閭閻則深負加恩徳意該塩政其通示衆商知之同日上諭内閣曰革職廣東巡撫王謩著加恩賞給三品職銜革職衡永彬道許登瀛著加恩賞給五品職銜乾隆十六年二月十七日上諭内閣曰朕清蹕南巡行慶施惠所有駐防旗人亦應一體加恩著各督撫將軍等將江寜京口浙江等處駐防滿洲漢軍官兵年七十八十以上者查明分别賞賚乾隆十六年二月十八日上諭内閣曰于梓年已八十前來接駕著加恩給還知縣原銜並著賞給縀疋乾隆十六年二月十九日上諭内閣曰現在随營當差之江寜等處協領恭領等著各賞給縀四疋防禦以上官員各賞給縀三疋驍騎校兵丁人等各賞給一月半錢糧沿途坐臺及随督臣黄廷桂當差之京口等處協領叅領等員著各賞給縀三疋防禦以上等官各賞給縀二疋驍騎校兵丁人等各賞給一月錢糧乾隆十六年二月二十日上諭内閣曰舉人華希閔年逾八十著給與知縣職銜仍著賞給縀疋同日上諭内閣曰孫灝從前革職之案尚無寔在劣蹟且年力猶屬壯盛著加恩以少詹事補用乾隆十六年二月二十三日上諭内閣曰顧祖鎮著加恩賞給五品職銜郭孫順著給還檢討職銜范瑶著給還知府職銜乾隆十六年二月二十五日上諭内閣曰李重華著加恩賞給編修原銜乾隆十六年三月初二日上諭内閣曰此次接駕人内革職御史范咸員外郎陳祖勲知府金以成姜士崙同知徐志巖州同烏伸州判張宗洙俱著加恩給賞原銜乾隆十六年三月初七日上諭内閣曰胡彦頴著加恩給還編修原銜費楷陳㳟周宣猷俱著賞給原銜乾隆十六年三月初八日上諭内閣曰瘳鴻章著加恩給還檢討乾隆十六年三月十一日上諭内閣曰朕問俗省方翠華所至黄耉台背䇿杖歡迎雖已于途次各加恩賜而恤髙年推恩宜渥著各督撫查明經過州縣男婦七十以上者照從前恩詔之例分别賞賚乾隆十六年三月十三日上諭内閣曰此次杭州駐防滿洲官員兵丁内沿途坐臺随營當差以及演陣人員俱已加恩分别賞賚但在城駐劄官員兵丁此際亦各奮勉當差著加恩于官員兵丁較演陣人員賞賚之數減半分開賞賚乾隆十六年三月十五日上諭内閣曰陳其凝著加恩賞給編修職銜熊本著給還編修原銜王者輔陳令言著給還知州縣丞原銜乾隆十六年三月十六日上諭内閣曰此次随從大臣侍衛章京執事兵丁等從前雖經加恩賞賜但行走日期過多不無所費著加恩大臣侍衛章京執事兵丁等仍照前次總理行營大臣等議奏之數賞給乾隆十六年三月十九日上諭内閣曰文鐸著加恩給還知縣原銜乾隆十六年三月二十三日上諭内閣曰致仕侍郎沈徳潛著加恩照依原官賞給本俸同日上諭内閣曰呉槃陳采俱著加恩給還知府原銜陳夢魚著給還司務原銜乾隆十六年三月二十四日上諭内閣曰革職同知李直方黄煐通判方道永知縣張應梅吏目譚秀健俱著加恩賞給原銜乾隆十六年三月二十六日上諭内閣曰革職總兵雷澤逺著加恩賞給叅將銜令其休致革職知縣吴率祖教諭魏權俱著賞給原銜乾隆十六年三月二十八日上諭内閣曰革職監察御史王原圻知縣陳嘉書張鑑俱著加恩給還原銜同日上諭内閣曰江寜駐防兵丁每年應支兵米例支本色四個月折色八個月其折色内惟二三五六八九等月每石折銀一兩二錢至十一十二兩月及遇有閏月每石則折銀七錢五分多寡既未畫一且偶值市價昂貴兵丁未免拮据嗣後江寜駐防兵丁十一十二兩月並閏月折色俱著加恩照二三等月之例一概給銀一兩二錢該部即遵諭行乾隆十六年三月三十日上諭内閣曰大學士陳世倌從前罷任尚無大咎上年已復予原銜此畨於行在屢經召見雖年過七十精力尚健且係舊人仍著入閣辦事乾隆十六年四月初三日上諭内閣曰革職叅將阮玉堂著以都司用革職都司耿蕙著以守備用乾隆十六年四月初五日上諭内閣曰賞給拉縴河兵錢糧一月自京随來水手網户賞給錢糧半月江南水手頭領賞給二兩銀錁一錠水手等仍各賞給一兩銀錁一錠乾隆十六年四月初七日上諭内閣曰著于商捐供億銀内賞給蘇州織造圖拉一萬五千兩以為辦公之用乾隆十六年四月初十日上諭内閣曰乍浦水師滿洲兵自雍正七年設立於杭州江寜二處餘丁内挑選移駐原定加増每名月支餉銀二兩米一石伊等水陸操防差務繁多而移駐將及二十年家口漸増所領銀米不敷食用朕命駕省方清問所周無不廣敷渥澤自應一體加恩所有乍浦駐防水師新兵每月米石著照杭州駐防之例給與二石五斗其應支本色折色之處令該將軍督撫都統酌量照例辦理乾隆十六年四月二十四日上諭内閣曰休致尚書魏廷珍之子魏鍚齡賞給一品廕生乾隆二十二年正月初二日上諭内閣曰朕巡幸江浙前經降㫖截留江蘇漕糧十萬石浙江漕糧五萬石預備臨期平糶之用所有此項減歇漕船向例止給一半月糧於該丁等生計未免拮据著加恩於應給月糧之外再賞給十分之二該部即遵諭行乾隆二十二年正月十八日上諭内閣曰朕奉皇太后鑾輿載臨江浙經過直𨽻山東各州縣男婦年七十以上者俱著查明照從前恩詔之例分别賞賚乾隆二十二年正月二十五日上諭内閣曰此次南巡所有直𨽻山東派出辦差兵丁著加恩賞給兩個月錢糧乾隆二十二年正月二十九日上諭内閣曰此次南巡經過直𨽻山東二省所有辦差文武各官住俸罸俸降級之案著加恩准其開復如無此等叅罸案件者各加一級乾隆二十二年正月三十日上諭内閣曰大學士史貽直謝事歸田協辦大學士尚書梁詩正請假終養在籍均屬安静可嘉兹值南巡前來接駕俱著加恩照其品級在家食俸侍郎錢陳羣從前在京供職勤慎今養疴林居亦著加恩在家食俸以昭眷念舊臣之意乾隆二十二年二月初一日上諭内閣曰左都御史梅瑴成在皇祖時以筭學効力内廷經朕擢用洊厯正卿今謝事家居年近八十著加恩照其原品級在家食俸乾隆二十二年二月初二日上諭内閣曰朕省方觀民再臨江浙行慶施惠蔀屋均霑其地方各官之承辦差務者亦宜加以優叙以昭盛典所有江浙二省辦差文武員弁任内罸俸住俸降級之案俱著加恩准其開復其無此等叅罸者俱各准其加一級同日上諭内閣曰朕翠華南幸載莅江淮問俗省方宏敷愷澤兩淮衆商皆未登仕版之人其承辦差務踴躍急公宜沛特恩以示奬勵伊等本身原有職銜如已至三品者俱著賞給奉宸苑卿銜其未至三品者俱各加頂帶一級同日上諭内閣曰朕奉皇太后鑾輿載巡江浙所至黎庻愛戴情殷夾道焚香歡迎輦路而鶴髪皤然扶携恐後尤堪軫念所有江浙二省男婦年七十以上者俱著加恩照從前恩詔例賞賚以示優老引年之意乾隆二十二年二月初三日上諭内閣曰兩淮辦差商衆現已加恩優叙更念該啇等銷引辦課嵗額通完而於地方公事更樂輸恐後即如前嵗江省灾務在國家之撫恤雖已逾數千萬而淮揚煮賑半出商捐其桑梓任恤之誼深可嘉予著再加恩自丁丑綱為始綱塩食塩每引加賞十觔不在原定成本之内以二年為限庻民力既足而商力亦紓以示恤商愛民之意同日上諭内閣曰朕清蹕時巡膏澤叠沛所有江浙二省派出辦差之緑營兵丁俱著加恩賞給兩月錢糧以昭恩賚乾隆二十二年二月初五日上諭内閣曰禮部侍郎沈徳潛致仕歸田年逾八十實為蓬瀛人瑞今來接駕著加恩給與禮部尚書銜以示優念老臣之意乾隆二十二年二月二十一日上諭内閣曰現在隨營行走當差之江寜協領委署前鋒翼長各賞縀四疋防禦以上等官各賞縀三疋驍騎校兵丁人等各賞一月半錢糧同日上諭内閣曰自京随來水手網户著賞一月錢糧江南省水手頭目著賞一兩重銀錁兩個水手每名著賞一兩重銀錁一個縴兵每名著賞一月錢糧乾隆二十二年二月十五日上諭内閣曰現在随同䕶軍營當差杭州協領著賞縀四疋防禦以上等官各賞縀三疋驍騎校兵丁人等俱著賞給一月半錢糧沿途坐臺江寜京口杭州乍浦協領恭領著各賞縀三疋防禦以上等官各賞縀二疋驍騎校兵丁人等著賞給一月錢糧同日上諭内閣曰朕奉皇太后鑾輿再臨江浙巡省所至惠澤頻頒而優老引年加恩尤渥其江寕京口杭州乍浦等駐防旗人男婦年七十以上者亦著照從前恩詔例一體賞賚以昭慶典乾隆二十二年三月初三日上諭内閣曰此次駐防杭州官兵内沿途坐臺随營辦差演陣人等俱已加恩分别賞給在城官兵尚未得賞伊等俱各奮勉辦差著加恩與演陣官兵减半賞給乾隆二十二年三月初七日上諭内閣曰京城随來水手網户著賞給一月錢糧江南省水手頭目等賞給一兩重銀錁各二個水手等著賞給一兩重銀錁各一個管河兵守備著賞給金牌各一面銀牌各二面千總把總等著賞給銀牌各三面効力千總把總等著賞給銀牌各二面六班河兵著賞給一月錢糧乾隆二十二年三月十二日上諭内閣曰顧棟髙前以保舉經學特賜國子監司業銜今朕巡幸江南前來接駕念其年登耄耋經術湛深著加恩賜以國子監祭酒銜用示奬勵寔學之意同日上諭内閣曰秦夀然著加恩賞給翰林院編修職銜秦芝田著賞復知縣原銜秦東田秦莘田俱著賞縀二疋乾隆二十二年三月十五日上諭内閣曰自京随來水手網户著賞一月錢糧江南省水手頭目著賞一兩重銀錁各二個水手等著賞一兩重銀錁各一個拉縴河兵一千名著賞一月錢糧乾隆二十二年三月二十三日上諭内閣曰原任大學士史貽直從前為伊子致書是以令其休致兩年以來家居安静業已改悔朕南巡前來接駕見其精神未衰尚堪任使且宣力年乆本係舊臣大學士黄廷桂現在兼管陜甘總督内閣需人史貽直仍補授大學士入閣辦事黄廷桂仍以大學士管理陜甘總督事務乾隆二十二年七月十四日上諭内閣曰今春南巡接駕廢員内酌量情罪較䡖者加恩分别賞給職銜用廣行慶施惠之典所有胡定虞欽元龔鍚輅趙林徐以豐沈瀾汪垕馮景曾馮渠王賔孔興浙徐錦于文駿黄昌遇施敬勝康廷道胡圻蕭濬故彦輔郭錦眷謝禮朱元彬蔣尚憲孫璋劉晏于文濬張廷發王瑜楊明楊成龍馬正蘇芳張髙萬世洪等三十四員俱著照原銜賞給頂帶馮元欽呉􅴒嚴裕鈺余騰蛟夏宗瀾朱叔權陳克䋲王熉陳詩劉炳張秉綸劉日章沈震世汪疇李百奎韓榗張九鈞呉日華曺守垣湯登鰲李九標呉卓黄宜載謝祖庚梁卿材焦作新俞垂宋文鑑楊髙士馬澤程國棟陳學沆陳基姜之瑜梅廷訓卞灤趙康呉鶚峙胡世科葛淳王鑑黄家甲程元度金世越王林顧楠宋模宋應麟黄守箴鄭嘉忠曾曰環蔣禹敷金枚臣顧紹愚黄元吉等五十五員俱著照伊原銜降一級賞給頂帶宫爾勸著照伊原銜降四級賞給頂帶丁廷譲著照伊原銜降三級賞給頂帶戚振鷺著照伊原銜降二級賞給頂帶金文淳著該部行文調取來京引見乾隆二十七年正月十三日上諭内閣曰朕因巡幸江浙前經降㫖著照丁丑年之例於江浙兩省冬兑漕糧内各截留十萬石預備臨時平糶之用所有此次減歇漕船向例止給一半月糧於該丁等生計未免拮据著加恩於應給月糧之外再賞給十分之二該部遵諭速行乾隆二十七年正月十七日上諭内閣曰此次南巡所有直𨽻山東派出辦差兵丁著加恩賞給一月錢糧乾隆二十七年正月二十三日上諭内閣曰此次南巡經過直𨽻山東二省所有辦差文武各官住俸罸俸絳級之案俱著加恩准其開復如無此等叅罸案件者各加一級乾隆二十七年二月初四日上諭内閣曰朕清蹕時巡聿昭慶典所有江浙二省派出辦差兵丁著加恩賞給兩月錢糧以示恩賚上諭内閣曰原任左都御史梅㲄成以康熙年間舊人服官有年休致在籍今前來接駕雖齒逾八秩而神明不衰居鄉亦復安静洵屬昇平􅂄瑞念其家計清素諸子内亦無通籍之人著加恩將伊長子梅釴賞給舉人一體㑹試以示優眷乾隆二十七年二月十二日上諭内閣曰朕此次南巡所有江浙二省辦差文武各官任内罸俸住俸降級之案俱著加恩准其開復其無此等叅罸案件者著各加一級以昭慶典乾隆二十七年二月十四日上諭内閣曰朕此次南巡所有兩淮啇衆承辦差務皆能踴躍急公宜沛特恩以示奬勵其己加奉宸苑卿銜之黄履暹洪徴治江春呉禧祖各加一級已加按察使銜之徐士業汪立徳王朂俱著加奉宸苑卿銜李志勲汪秉徳畢本恕汪燾著各加按察使銜程徴棨著賞給六品職銜程揚宗程玓呉山玉汪長馨俱著各加一級同日上諭内閣曰兩淮商衆現已加恩優叙更念該商等銷引辦課嵗額通完而於承辦差務尤能踴躍急公深堪嘉予著再加恩自壬午綱為始綱塩食塩每引加賞十觔不在原定成本之内以二年為限庻民食既足而商力亦舒用示恤啇愛民之意乾隆二十七年二月十五日上諭内閣曰自京随來水手網户每人賞一月錢糧江南水手頭目每人賞一兩重銀錁二個水手每人賞一兩重銀錁一個拉縴河兵一千名每人賞一月錢糧乾隆二十七年二月十七日上諭内閣曰朕奉皇太后鑾輿南巡江浙行慶施惠愷澤鴻敷而優老引年推恩宜渥所有江浙二省及經過地方男婦年七十以上者俱著加恩照從前恩詔例一體賞賚以廣慈福上諭内閣曰朕稽古省方推恩錫福其江寕京口杭州乍浦等駐防旗人男婦七十以上者亦著照從前恩詔例一體賞賚以敷慶澤乾隆二十七年三月初六日上諭内閣曰由京城随從水手網户人等各賞給一月錢糧江南水手頭目等各賞給一兩重銀錁二個水手等各賞給一兩重銀錁一個管河兵守備等各賞給金牌一面銀牌二面千把總等各賞給銀牌三面効力千把總等各賞給銀牌二面六班河兵等各賞給一月錢糧乾隆二十七年三月十一日上諭内閣曰此次南巡兩淮辦差商衆已降㫖奨賞而浙商亦有承辦差務巡省所至宜一體加恩以敷慶澤著將嘉松寕紹等所運銷引每引各加五觔以一年為滿俾民食足而商力紓稱朕恤商愛民至意乾隆二十七年三月十四日上諭内閣曰本年巡幸江浙降㫖截留漕糧以備平糶所有此次減歇漕船業已加恩於一半月糧之外賞給十分之二而各省因灾减歇漕船向例俱止給一半月糧于該丁等生計未免拮据亦著加恩各於應給月糧之外賞給十分之一該部遵諭速行同日上諭内閣曰尚書錢陳羣原係刑部侍郎著加恩賞給刑部尚書銜乾隆二十七年三月二十一日上諭内閣曰自京随來水手網户著每人賞給一月錢糧江南水手頭目等著賞給銀一兩銀錁二個水手頭目等著賞給銀一兩銀錁一個河兵一千名每人著賞給一月錢糧撑駕渡江槳船兵二十八名著加倍每人賞給兩月錢糧乾隆二十七年四月十三日上諭内閣曰河庫道錢度糧道胡文伯厯仕江省年乆辦理公務俱屬奮勉出力著加恩賞給按察使銜以示奨勵乾隆二十七年四月十四日上諭内閣曰鎮江府署丹徒縣知縣徐名標辦公黽勉著加恩准其實授乾隆二十七年四月二十五日上諭内閣曰恩賞拉縴河兵六百名每名銀二兩共銀一千二百兩乾隆二十七年六月十一日上諭内閣曰吏兵二部將此次南巡接駕人員查開履厯按情具奏朕詳加檢閲除從前已經賞給頂帶職銜並案情較重者毋庸辦理外所有編修沈齊禮胡紹鼎張坦湯大紳邵齊燾毛咏喻煒陸樹本檢討潘乙震等九員俱因考試休致别無公私過犯其有情願來京考試者准其自行來京候朕考試定奪至因事降革之馮鎬趙通經趙屏晉金文宗朱扆靳樹椿徐炳王心銘叚宏深韓鏞鍾和梅戴泰運田僖等十三員核其縁事情節尚屬因公與行止卑汚及有贓私罪贖者不同著該部行文調取來京引見再降諭㫖並將各員原恭情由查明于引見時一併附摺聲奏欽定南巡盛典卷六十九
