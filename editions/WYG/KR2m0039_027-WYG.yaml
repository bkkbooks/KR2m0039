body:
  text: 欽定四庫全書欽定南巡盛典卷十六天章庚子江南詩入江南境為憶南邦望幸切春朝命駕此重巡魯齊再至别非久自乙酉南巡後辛邜丙申曽两至東省江浙未來情更親胥赤子寜分彼此秉青陽與佈和仁翕河察吏諮民隐要務非闗慶七旬五依皇祖示江南大小諸吏韻鳯麟之所逰豈非郊與棷而兹胡不然此理亦易剖唐虞世去逺王道弗行久君臣應共慊於我宜為首仁皇仁逮今赤子如懐母樂樂而利利南東安􅅵􅅕但當守良法毋事紛更後咨爾牧民者官箴慎宜守重來觀民風尚覺敦孝友迎蹕紛夹塗少者扶其夀施恵厪向隅推行爾莫負龍泉莊行舘即事南巡駐皆舊行宫他應駝載御營備張御營處祗餘五江南者三山東二江南之龍泉莊林家莊桂家莊三處山東之註經䑓問官里二處上四次南巡均御行營此次該督撫以駝載省費為請因各建行舘雖結搆樸素而計費已不啻中人十家産矣大吏因之建行舘斯實圖省駝載費入江南境此其一其二按程宿次第雖云樸斵弗丹艧中人十家産不啻疇咨政務覲林下駐蹕後召軍機大臣理政降㫖後即宣江南在籍縉紳彭啟豐張若溎蔣元益史奕昻儲麟趾金士松陸耀宫兆麟等各進見咨詢民瘼幾閒拈筆吟即事即事亦豈賞景光摛辭率以誌吾愧降㫖免江蘇安徽两省積欠詩以誌事積欠寜為民願焉率縁灾歉實堪憐行時問俗莫踰是施恵因心非用􅁠入江南境諮詢民隐將江寜藩司所属災緩未完銀四十五萬餘两米十七萬二千餘石蘇州藩司所属灾緩未完銀二萬三千餘两米十二萬九千餘石安徽藩司所属灾緩銀四十萬餘两米麥榖九萬餘石全行豁免俾两省積欠悉除以紓民力漕項地丁逋並逭給求養欲道無偏儀封企望合龍速庶得災區耕涸田題行春堂龍泉莊行舘内行時正值四之春露冕鳴鞭隨萬民不禁歡呼任瞻就那分疆界縂尊親于焉止止恰欣樸惟是孜孜切體仁近百萬寛两省欠循名庶副責其真夜雨二月初六日春雲傍晩忽濃鋪遂霈甘膏半夜濡知已連朝被霑潤那辭前路致泥塗雨珠太守喜誠有漸石僕人勞豈無歌舞農夫怨行路􅁠其輕重學農夫度永濟橋三叠前韻作歌北來平陸行延迤漸南時見有積水固知此邦治水難未得領要議紛起丁丑過此命修橋剔之鬟之俾詳視橋下之水下注為六塘河向多淤埂丁丑經臨籌度命大學士劉統勲等履勘濬培添建牐壩并簡㕔員移駐禁民侵占壬午乙酉再經其地視之悉就理矣自此六塘得宣洩湖水下注中泓裏兹來乃隔十六年橋長流細春時爾夏霖秋潦或可容已成良法毋或毁黍髙稲下各隨宜是在有司勤料理撫字之勞爾莫懈催科之政爾莫恃蒿目民艱猶昔然吁嗟是吾乃所以過宿遷縣宿預過古縣運河俯大隄春烟萬户靄新水一川低吏治入疆察民情我后傒撫兹親切意恵澤可云稽順河集行館再叠舊作韻永濟橋過六里程順河集傍厹猶存仲春適可一朝憩壬午猶思大吏營壬午南巡地方大吏以此間距登舟尚有四程因搆行館數楹為憩勞息衆之所規制樸而且小遂聼之墻外桞條髙下嬝盆中梅朶两三榮撫今豈不追前度每欲摛詞輙繾情䇿馬過仰化集口占䇿馬徐過仰化集萬民迎謁路傍盈顧言扈蹕地方吏爾我寜無愧此名隄上宿霧徐開曉日暾大隄廿里度輕軒左慿緑野右運水通漕籌農意合存麥苗芃緑桞絲黄蝸舍漁舟近水鄉日日迎人融冶逓果然有脚是春光有時按轡一鳴鞭萬姓隨行相後先問此人情何以得自維愛養亦多年題展義齋林家莊行館内行館向平原新題額素軒對宜時霽好憩喜樸風存烟景近江國衣裳覺潤暄逭蠲勤實政展義豈虗言賜两江縂督薩載两江縂督例兼河任重事繁資是吪晋也昔聞家訓在髙晋大學士髙斌之侄習聞家訓諳悉河務因簡任两江縂督兼管河務十餘年載弓能集衆思羅幕開建業亦無忝川改陶莊有足多陶莊引河自康熈己邜及南巡時即入覲命開治而河臣率以為難因循未就薩載履任時面諭赴工察看伊即力請開挖引河與余意合遂扵四十二年二月奏報工成引河暢逹形勢甚順等語因交部從優議叙給與世職以示奬勵識要輸誠更何諭所期軍肅與民和賜蘇州巡撫楊魁久曽為府道上下習嫺知必不喜趨奉更當體溺饑於奢儉應示既飬教毋遺朂爾勤本務周帎有往規題同和堂在陳家莊行館内時之和為春民之和為親行時觀萬民瞻就胥歡欣博施以濟衆堯舜猶難云一念苟存誠亦無不懐仁名齋永自勵吾豈漫逰巡賜隨營衆臣及江南大小吏食得句示志春郊好雨復佳晴程近午前已駐旌扈駕守疆胥列坐大員小吏俾聨情時和要在叨天賜政乂還當戒已盈一食莫忘憶饑溺君臣職縂為民生賜縂河李奉翰今調河東縂河之任之作耕當問僕世勤司奉翰父李宏曽為南河河東縂河簡任南河两載斯特以豫工須善後因移東省藉深知江南河務雖繁於河東而䂊省善後事宜𦂳要李奉翰又任河官較為諳習至南河本要任而現在安瀾工程稳固又有薩載兼管陳輝祖隨同辦理自可漸臻熟悉因將二人對調行於無事莫過慎防以其先豈在竒尚此合龍盻佳信闗心遥望引愁思賜江蘇學政劉墉曽此司文柄後教習政衡劉墉官翰林時曽任江蘇學政後出為府道臬司俾練習政務洊升至卿貳重莅訓諸生去稗收精鑿駕輕就熟程朂哉莫孤望爾父國之楨題融春齋在桂家莊行館内登舟明日此停驂樸宇於斯憩宿堪桞眼盼春當仲月梅心融雨近江南祗須修葺舊之二圖省馱裝益乃三入江南境舊有行館應修葺者順河集陳家莊二處新構者龍泉莊林家莊桂家莊三處雖藉省馱裝而按􅉐又増憩宿之所扵心䆒未慊耳按􅉐都看有行館摛詞用以誌吾慙閲李家莊新河口髙晋昔建議中河沙埂之黄流況横截勢應向東移楊莊舊中河口遷李莊新河口避阻而就夷既已從其言次苐工作施却因清水弱前嵗髙晋面請移楊莊中河口扵下㳺之李家莊雖允其請而意尚遲疑髙晋囬任後亦未籌辦迨夏間黄水淤滯清水出口力弱未能迅即施工及髙晋前赴豫省督堵漫口中河仍復遷延待時知必有難辦之勢矣未行尚俟時後薩載入覲面詢何故遲其言似遷就其意我早知昨冬薩載入覲詢及移改中河之事其言雖遷就髙晋原奏然以為楊莊現在河流暢出今因情形異宜窺其意盖移改李家莊乃髙晋一人之見而未嘗詢謀僉同非必當更張者因諭薩載云果爾莫若仍舊貫議為愈薩載奏謂如是則甚合機宜遂令寝髙晉之莫若仍舊貫則稱實得宜今來親履勘原屬多此為然亦非虚費疏漲或可資茲親莅履勘楊莊河口原可毋庸移改然髙晋彼時意在避黄河横衝抵溜之病今雖無用設中河夏秋或遇異漲由李莊新河分出亦未為無益不得䆒其妄費因以此意諭薩載酌行莫非謀民安怙過則見卑閲中河中河酌中定聖制古誰過中河酌實聖祖所定斟盡善也五度經臨熟萬年利頼多進舟斯有待䇿馬此無訛前巡于此閲中河亦皆䇿馬而行度清口始進舟也節相欲更置前春髙晋在京面奏以楊家莊中河口一帶每多淤阻欲移中河口至下游之李家莊自係實在情形雖允其請而意中䆒属遲疑髙晋并言回任後即擇便興工迨夏間黄河淤淺未能辦及嗣扵秋間令髙晋馳赴豫省督辦漫工薩載扵改置一事屡遷其期因傳諭詢問則稱楊莊河口近已通暢若改由李家莊往來渡黄須在黄河中多行十餘里而李莊閘壩有開有堵亦殊不易盖移改乃髙晋一人之見並非實有必當更張之勢詢謀僉同也因諭仍從其舊尋思未易麽楊家牐五依皇祖詩韻御碑亭七十年餘乙酉皇祖此詩成于康熈迄今七十餘年矣拱讀欽猷立為徐曹相學他守勿失陸翁思彼巧中疎陸游詩人謀常向巧中疎保障由來勝繭絲民情河務豈殊移治河本以衛民耳咨爾諸臣宜盡知渡黄河即事六韻河裔駐鑾旌瓣香叩彩棚輕風不作浪細雨忽成晴一自儀封决常懐午夜驚翕川願歸舊凭舫益為怦厪近更厪逺渡黄如渡清渡黄處竟無黄水盖因上游儀封决口大溜全趨渦淮未行故道以致皆清水耳邇聞工逮蕆昨阿桂等奏引河工程扵二月初四日全行挑竣上下一律通順現在大溜直掃北崕臨水土堰并外灘亦日漸刷深初十日内必可開放引河合龍蕆事益切佳音之至黙禱盡吾誠陶莊河神廟瞻禮六韻大河南釃北陶莊逼溜恒虞清灌黄幾度興工工未就康熈己邜春河導皇祖南巡董安親莅河干閲視即􅌎命挑陶莊引黄以河臣國開放過早隨墊庚辰春侍郎常綬遵淤阻㫖閲勘請再挑深辛巳秋河臣張鵬翮請挑中叚功皆弗就壬辰甲午河臣趙世顕亦屡挑屡塞雍正庚戌以後大溜南趋更難施工乾隆己未命大學士鄂爾泰來勘仍持開引河之議時髙斌為縂河以為工不易就乃創建木龍挑溜北趋為補偏救弊之計扵是引河遂置而不論矣邇年黄水倒漾非開陶莊引河更無善䇿因命薩載詳悉履勘遂繪圖貼説以聞余復扵圖内徃返指示議既定即于丙申秋興工至丁酉仲春工蕆開引放溜極為暢順引河遂成因命建河神廟以荅神祐詳見御製碑記一時頼佑佑誠長改前果向新渠徙善後還培舊壩障用答神庥祠宇建永祈民宥肆籩薌瓣香此日申誠悃峻碣多年誌感慶丁河神廟碑酉年建皇祖鴻謨幸因蕆守成惟勵敬無遑閲木龍叠乙酉韻清口木龍向久成逼黄不致􅈅乎清陶莊改溜去南逺新渚䕶沙移北營清口木龍始自乾隆五年前河臣髙斌因南岸御壩迤下險工奏請建設木龍四架挑溜北趋頗著成效嗣壬午乙酉南巡閲視復經指示陸續増至七架以資逼溜䕶灘自乾隆四十二年開挑陶莊引河扵第四架木龍處築攔黄壩溜勢改北去南漸逺所有五六七三架木龍在新壩東􅌎入土中經薩載奏明啟拆復經指示扵頭架木龍上添改一架又於陶莊新河峙家莊南岸改建木龍三架以期冲刷北岸灘土甚為得力是木龍挑溜掛􅌎後並可啟拆改建事省而功倍實為補偏救弊之良法救弊補偏未可少抽薪於釡永無驚木龍雖補偏救弊逼黄挑溜使不致􅈅入清口固河工内不可少之法至陶莊引河新改使黄水直北趋下不復有倒漾􅈅清之虞則誠釡底抽薪之計也雖然應識滿招損謙鞏吾惟盡此誠觀清口出水誌再叠舊作韻壬午定水誌两壩去其擁然實有節制非聼一往送亦弗害蓄清禦黄有束縱不過束縱間拆築費楗葑自從定此制殊無費太重較之下河灾鄰國為壑供所以數年來民鮮昬墊痛從來渉河務其議如聚訟兹實出獨㫁幸免執已用下河屡獲收室家逭乏空河臣守此䇿竅要頗稱中戊戌秋河決竟掣大溜動賈魯不能容睢淮因致洶尾閭歸洪澤株守斯害衆預命開五壩前嵗豫省漫口之水入扵賈魯河由睢河渦河而行遂為淮水歸扵洪澤湖恐湖水陡長難展清口两壩宣洩不及諭令薩載等扵五壩留心預防尋據奏清水勢大以次開放五壩幸無潰溢為患雖下河不免被水但其時早禾已經刈穫所種晩禾無多即有淹浸之處尚不致成大灾臨期漫􅘓􅘓因為之以漸湖河叠疏控下河未大灾無聊之思綜懐哉切痼瘝恧矣對稱頌閲河五依皇祖詩韻禹之行在無營知者後來異所行皇祖閲河垂至訓惟期稼穡底平成謁恵濟祠恵濟千秋䝉庇佑崇祠枚實見河干十餘年别今朝謁一片誠同昔日殚不動微風刹竿静暢流清水巨川寛大河北徙陶莊後益頼神庥永奠安阿桂等奏報引河已放溜詩以誌事陶莊籲神佑即日得佳音陶莊引河初成即勅建黄河神廟以荅嘉貺兹初十日渡瞻禮神祠黙致䖍禱即扵未刻得阿桂等馳奏稱初六日晩間開放引河掣動大溜奔騰下注至初七日夘刻已過百里外之和好地方且初開時金門􅉐落水一尺次日又落四寸察看引河實已掣溜六七分現在相機堵合等語是甫瓣香申悃數百里外即荷神佑垂貺更期迅速合龍耳引溜就新速歸川赴舊深翕流庶無變垂貺信昭諶必俟合龍後吾方敢慰心慈雲寺瞻禮招提久建運河濆題額依然仰聖文慈雲舊係小菴雍正十二年辦遂皇考勅建慈雲寺命淮闗監督年希堯督成大叢林因僧玉林住持仍令其派下承接云為闡宗風期悟徹重臨南國致瞻勤幾畨掖輦明如幻一晌登雲忽不欣已是拊膺思昔日那堪翹首望慈雲閲老壩合龍處甲午秋漲盛老壩黄河決㴞天勢莫遏萬姓遭臲隉賑救不遺力督催速堵缺廿日奏功成明神佑誠别甲午八月外河南岸老壩口隄工漫溢大溜全注決口板閘淮安一帶俱被水淹當飭赶𦂳堵築于九月初八日開工進埽至二十八日合龍两旬功蕆實頼河神佑助云兹來視隄工出水髙凸凸瓣香致敬宜安瀾籲以切老㓜紛隨輿温飽多歡悦元氣似已復閭閻亦填列而我一迴思往事不忍説閲淮安石隄三叠前韻淮安無不安清河並入海然而安難哉至今難更倍辛未始南巡土隄以石改癸酉並漲時恃此為寜載淮城西北舊皆土隄辛未南巡臨閲始建石工癸酉河淮並漲淮城幸頼石隄之利惟蘄奠昬墊那惜勞畚橇是後凡三巡粗識其原委然乏永逸圖宵旰厪心每亦惟事補苴何有垂範楷甲午决老壩岌岌淮城殆蕩析壊廬舍遷避市為罷亟命速堵築廿日功成愷甲午八月髙晋等奏十九日外河南岸老壩口漫溢過水大溜全注缺口附近之板閘淮安一帶俱被水淹房屋人口俱有坍損城垣幸而未頽隨即飭查撫恤尋據呉嗣爵等奏淮城南門外先已乾涸東門外亦涸出里許西北二門早築一壩阻其進水居民陸續遷歸故廬城市早得安業因飭河臣上𦂳堵塞決口二十日即合龍兹觀雖少慰回憶心猶駭過淮安城御舟小泊射陽城登岸還教䇿馬行翠盖錦旍徹儀衛風鞍露冕決民情弦歌那聼八音奏婦子稍欣百室盈甲午迴思灾甚劇今來額慶爾更生過寳應縣傍岸艤蘭舸度衢攬玉韁民情益親切土俗念周詳舊號平安漢新稱寳應唐若論予夙志惟是祝綏穣閲壩南闗迤邐接車邏封土下河受益多壬午南巡親臨酌定視五壩水誌預開清口以洩湖水其山盱五壩封土不令輕拆下河十餘年來遂獲連嵗豐収戊戌洪河經異漲預防思患早開矬戊戌秋河決儀封下游入洪澤湖清口两壩悉行展拆猶減洩不及因勅薩載等留心預防無已啟山盱五壩歸之髙寳諸湖及歸諸湖不得不開南闗車邏諸壩歸之下河幸早禾已収晩禾補種無多尚不致成大灾彼時權其輕重為無可奈何之辦理耳􅁠其輕重誠無奈那免閭閻被薦瘥惟冀儀封合龍速不資壩減永嵯峨過髙郵州髙郵昔水鄉五壩減水受自定清口誌封土五壩守前此啟五壩以洩洪湖盛漲髙郵等處下河一帶叠被偏灾自壬午春親臨相度酌定視五壩水誌展拓清口東西两壩為釡底抽薪之計其山盱五壩不令輕拆從此下河連嵗豐収乙酉南巡已觀成效十餘年來屡獲有秋下河連嵗収葢藏比户有戊戍黄河決水向洪澤走尾大恐弗掉預減咨可否戊戌秋豫省黄河漫溢由賈魯河睢河渦河入扵洪澤湖因恐清水驟長清口两壩宣洩不及湖不能容屡勅薩載等留心預防未幾清水陡漲洪湖不能宣納清口悉行展拆仍未能洩減薩載等以次啟山盱五壩歸之下河所幸早禾已經収獲晚禾補種無多浸没有限遂不致成大灾因為之以漸未大灾田畆己亥亦如斯倖矣邀天偶兹來觀閭閻頗覺相安阜然而憂民心益甚以日久至維揚即事小雨北風起蟄雷是日始聞雷夜隂曉霽進舟催日暄景䴡春方仲㓜挈老扶民縂來稍厭笙歌特煩䀨不嫌梅竹作清陪竹西小杜曽留句何事唐時已有開上方寺蜀岡此其尾登岸必先臨尚逺笙歌沸却欣松竹深山僧習俗禮野鳥解禅音顔李賛呉畫查然莫可尋駐蹕天寜寺行宫再叠舊作韻梵寺天寜䢴水邉行宫右側駐旌便重來仍值仲春月别去忽成十六年栢樹喬偏増古貌梅花放不入時妍軒齋依舊景非昔東望惟増意黯然天寜寺行宫東即為奉憩慈寜之所今咫尺軒庭如舊情景非昔瞻望惟増悽感題大觀堂大觀玩象羲經示設教省方義最該必有休民敷政化寜因適已事徘徊神心契處㤀今昔天下為家那去來理萬幾餘得清暇拈毫也覺暢吟材文滙閣皇祖崇經訓圖書集大成分頒廣流布髙閣此經營閣中貯分頒古今圖書集成此閣亦倣范氏天一閣為之規擬范家制工因商衆擎亦堪匹四庫四庫全書繁重不能分貯各處故祗賜圖書集成一部永以貯層甍慧因寺浄慧本無因善因亦有慧無實浄之根有以善為蔇而縂非全提全提泯文義大士坐如如黙然示度世青琅玕館口號矗矗干雲歩歩圖静披細籟奏笙竽青琅玕信和闐顆戞徴含宫似此無題浄香園花以香為浄人因去有來春秋十六閲嵗月隙駒催逕入真玕曲座仍假竹陪入青琅玕舘仍緑竹参天而軒中坐處雕木成竹為屏榻巧而不傷雅巧還不傷雅拈句亦宜哉題趣園日渉園成趣别之十六年景光仍似昔嵗月暗為遷隄桞眠還起山梅浄以妍畧徘徊便去桂檝指前川遊平山堂叠壬午舊作韻䢴江昨日艤行舟清曉平山作勝逰七字昔年賡舊韻春秋十六閲如流慧因寺裏参調御浄善聊為辦有無題慧因寺詩有無實浄之根有以善為蔇之句可惜僧雛不識此施檀熱閙羡金夫杜詩休説李唐朝千百年來事已遥豈啻笙歌二十四畧嫌雜遝壓溪橋漫教警蹕肅呼聲老㓜任趋縱與横到處欣他親切意不孤多載愛民情功徳平山一脈岡棧途跋馬尚無妨驩虞皥皥忘分别底事子輿較覇王精藍色色與空空丈六無為罷六通到此應忘一切地而何㸃筆騁吟工賢守清風一緬思四字為御題皇祖奎文千載永留兹至今大法小亷者垂訓依然凛昔時逰餘亦命返㠶揚川路韶曦暄且涼岸轉舟行迴首望緑雲叢底淡􅃄光題倚虹園今朝駐蹕饒餘暇園倚虹橋路不賒畫舫命逰任瞻就溪堂近水實清嘉岸傍大吏周咨度川引洪流恐致差過倚虹園詢問薩載黄水到徐州之信據奏尚未接禀報計日應到而未到恐前此阿桂等所奏開引河或有更變深為懸切薩載亦以為慮如旱望霖愁更甚那更閒緒賞烟花逰康山即事二首䢴城䇿馬進南門聞説康山舊蹟存誰識濬河䟽運道康山在新城南門内髙三丈許無石骨盖昔人濬運河時積土所成因築山館志書未詳所始亦弗深考耳竟成築館作名園時花二月之中遇古樹千年以上論為倣畫禅書四字舊有康山草堂四字額欵署董其昌書以康海落職後曽來讌飲得名但筆法不類香光因倣董法重書四字賜之似於不似緬釵㾗汴州節木久名揚陶榖清異錄云廣陵東南一都㑹凡百頗類京師號節木汴州更説康山有草堂城市已云擅幽絶石刻米芾城市山林四字似属偽作管絃何事閙紛忙愛他梅竹秀而野致我吟情静以償略歩樓䑓髙下者謂應數㸃愧香光新調河東縂河李奉翰奏報黄流已至徐州詩以誌慰清曉正慮河恐復有更變卓午接奏章徐州黄水見川流六尺餘歸故道機現十六日午刻李奉翰奏到十四日至徐州見黄河内黄水増長六尺八寸現已平槽溜行迅速此係儀工引河成功大壩定已合龍等語覧之欣慰惟佇望阿桂等奏到耳阿桂何未報疑信猶叅半佇待合龍信吾憂或少間塔灣行宫四依皇祖示江南吏韻以休存夏諺時邁著葩經同任民父母莫㤀物毒亭食衣雖稍足熈皞未全形咨爾法亷者毋勤供蹕停題得閒堂夘發辰牌駐程纔廿里強是日自揚州至塔灣春雲閣雨色野岸淡烟光到早得閒早書堂遂額堂傳宣謁疆吏仍是萬幾忙㣲雨㣲雨午前宻江雲暗逺天無聲惟潤物有喜是宜田梅蕚姢如洗桞條重欲眠蜃忩憑眺處緑麥正芊芊阿桂奏報將合龍形勢詩以誌慰未敢稱功就先期逹喜音金門溜已㫁竹箭落猶深阿桂奏儀封決口扵本月十一日午刻两壩攏合隨上𦂳填壓未逾数刻金門立見㫁流大溜全注引河但尚有一二腰漏處未屆十分放心不敢即馳報合龍然十一日金門業已㫁流大溜全入新河壩脚俱係停水而長水亦已消退等語腰漏誠無礙脚停亦漸沉黄流將到浦薩載奏黄水已長至九尺餘十六日已據禀報黄水已到桃源境内距清黄交滙處不過百餘里蕆事庻幾今塔灣行宫五依皇祖詩韻五度南巡五嵗華亦經五次韻賡麻豫逰敢逞己之欲中外由來帝者家聒耳早嫌絲與竹怡情那在鳥和花堯年行館惟斯一兹漸多空言戒奢過𤓰洲鎮𤓰字原為江裏洲閘成潮不到揚州蔡寛夫詩話云潤州大江與揚子橋對岸𤓰洲乃江中一洲唐李紳詩云揚州郭裡見潮生當時大江之潮揚州固嘗見之自𤓰洲以閘為限潮遂不至揚州記載家遷就失實嘗訂正之詳見向所作廣陵濤疆域辨從來記載多遷就各報見聞滋怨尤無暇因他考古蹟有心惟是切民謀甲申憶被坍沙後甲申六月髙晋奏𤓰洲江水長發丈餘迴瀾壩岸坍嚙至七月汛平加甃碎石江塘復完十餘年來頗為安鞏今閲視民居較之前巡所見益覺稠宻矣重覩閭閻奠以稠渡江不藉稱㠶利真如渡鏡空雲頭霏細雨江面斂㣲風艤岸方知到得門乃自通瀆神信昭貺欣感意何窮至金山駐蹕作畫舸長江茲五度較前四度景嫌殊雲瞻日就情仍彼逰奉歡承感切吾未可罷巡以民戀依然安泛頼神扶金山純粹而精處秀助吟酬那得無金山寺五依皇祖詩韻治安端在萬民和欽仰堯勲自勵多即此林林迓鑾者心誠如保中去聲云何題鏡治齋浮玉中行齋向曽額鏡治憩宿偶循名於斯有二義一曰鏡在民果得教飬遂一曰鏡在已屋漏可無愧自審多未逮徒言何濟事返躬每以先玩景猶其次逰金山寺五叠蘇軾韻觀我莫若觀乎民浮江即似浮於海君師責匪道不行遐想乗浮愧應在泊舟茲復逰頭陀風恬曽弗揚㣲波長流萬里奚啻萬西源東委興懐多往來梭織行㠶揖四民赴時争一日飬欲給求其艱哉省方亦曰厪黎赤海門湧出玉蟾魄光耀巨川練非黒而我夕窗方映明擬賡蘇句心先驚欲罷不能羞不識險韻依然一體物流者為永峙者山曰流詎巧峙豈頑峙流祗寓樂而已何係仁山與智水題文宗閣皇祖圖書集大成區分五百廿函盛空前絶後菁華煥内聖外王模楷呈秀稡江山稱去聲此地文宗今古貯層甍略觀大意那知要知要仍惟在力行金山四叠舊作韻大江洗不盡山青色匪色還形匪形萬刼以來天與浄九州之内地稱􅂕仲春月值景方鬯十五年過蹕重去聲停為憶前巡掖輦處措詞無緒意冥冥試看欄外東流水恰似胷中一片天魏躓吴顛同是戯風聲月色自為仙鏡呈上下照終古樓貯圖書始近年前嵗賜古今圖書集成一部扵金山行宫鹺臣建閣以弆并請扁額名之曰文宗閣並御書江山永秀額賜之翻笑開函難遍讀無邉景物逓闗連觀濤樓作歌觀水有術必觀瀾濤實為瀾之大者海固㝡鉅江次之較於湖河更雄也層樓峙立俯石排盈川顥氣向東瀉習習㣲風畧鼔之漻淚奔騰難狀冩洞心駭目不可視萬變千竒幻真假榜者於中若無事持心既定任上下叶古人於此亦有言南人之舟北人馬須㬰風定浪亦息適纔見者都無把登金山塔頂四叠舊作韻大江東望玉簮尖忽到拾登百級兼無地有天雙目豁撫今思昔一心恬十餘五載景重閲四叠七年韻再添拙速雖然遜響鉢亦非鬚㫁數莖拈自金山放舟至焦山五叠蘇軾韻輿情望幸酬深耽用是五舉巡江南金焦两㸃矗波翠何異前三與後三路便聊以駐信宿要因省方觀田蠶懸華結綵稱祝頌何徳被民増怍慙昨者浮玉憩山館今朝順流漾江潭西以屋勝東樹勝敷葉吐蘂春未酣未酣之意勝酣矣即斯三勝誰能談侵尋譙亦有建置莊􅃊定慧寺名康熈二十三年賜額輝珠龕那更峰頂事㸃綴譬之食蔗窮其甘東坡艱韻忽五叠雖曰逸興寜非貪黄頭桂檝候已久清賞既適歸亦堪佳處無須重繫戀倩閒雲為封巗菴清寄堂書堂古寺側清寄向曽顔一十六年别青春片刻閒吟安松竹裏瞬息昔今間俯視東流水何嘗有往還竹樓竹樓此日復相過覺比前遭鳯尾娑背念王家記中語􅎈然髙致恐輸他海門庵東向江連大海溶丸泥那得此門封扶桑曉旭紅雲湧泰岱何殊日觀峰逰焦山作歌三叠舊作韻既是名山那無屋譬人盎背必有腹頭陀應弟焦先兄如氣相求相應聲東西雙峰秀㧞水在此曰此彼曰彼其實一脈地根連何有於行暨夫止知之而復云來逰斯則隣非弗隣是春和日䴡正良辰山僧速客意甚勤輕輿減從試攬勝不教緹騎呼紛紜羅漢巗傍得入路瘞鶴崖畔尋遺文棧道歩歩入叢雲青玉島俯江波氲由東而南漸夷曠僧菴民舍相區分周覧原未消半日迴舟两岸景吐吞江天一色逺莫辨㫁續鐘聲時尚聞甘露寺再用張祜韻古寺枕江岸上方絶世埃春能醒物睡佛已識予來徒和張祜家句那尋李徳裕氏臺浮雲為去聲攬景歸岫一時開平風静浪歌風以浪為用浪以風為鼓風平浪宜静浪静風平覩一觧我泛揚子亦數度無不平静邀神祐百神受職縂天恩敬天感神銘心所二觧昨日㣲雨今日晴焦山速客亦已誠往來畫舫大江渡何異太液與昆明三觧浪自静風自平巽二坎六息應聲布㠶弗掛寂五两軋軋雙櫓乗波鳴四觧中流攬景猶餘事心恬因亦理觧生大之無極而太極雖互為根静肇成次之物來而順應為順應者自静呈五觧觀水雖有術觀瀾亦末矣不如寥天一無動契其始告彼抽秘騁妍者曷澄其末返而求諸六經㫖六觧䇿馬過鎮江府艤舟䇿馬過毘陵為便就瞻郤輦乗那禁笑呼任前後頻詢疾苦切憐矜省方首在官方飭籌治惟於民治徴感豈易言弗致畏不嫌襍遝謂相應登城霞閣三叠舊作韻二首駐舸教依岸鳴鞭爰度衢詎寜事掃􅎈卻覺過勤劬層閣知臨水三分緬昔圖閣名為董其昌題俗為之三義閣未能便顛魏無已且親呉世逺泯傳説時巡競祝呼萬民傒我后代匪后來蘇涿鹿近經郡樓桑尚有衢建興真不肖諸葛惜虚劬川水仍常鏡城霞逺入圖耕桑殊盛昔文物向稱呉忩蜃略閒凭墨娥可便呼八章酬八韻叠倣聚星蘇黄河至清浦黄河至清浦薩載連日奏報黄河水勢加長今復據奏十八日徐城誌樁長水一丈一尺餘山安㕔禀報雲梯闗長水四尺九寸溜勢湍急全黄已復故道直逹歸海等語是黄水已過清黄交滙處所直赴海門可為欣慰斯為歸壑定雲梯闗非遥交滙故道競河決逢已屡弗久合龍併此畨閲两嵗久為吾民病儀封決口自四十三年七月至今㡬及两嵗屡屆垂成而毁向年堵築漫口從未有似此久者宵旰冀功成發帑吾弗吝叶重臣往經理竭力無餘賸引河大開寛始得溜還正此次漫工前後撥給部帑並两淮鹽課銀五百六十萬两並命大學士公阿桂前往經理近復將引河大展寛深又接作挑水壩逼溜北趋始得黄水歸還故道惟阿桂等慎重奏報尚未得合龍喜音仍未免闗心北望耳惟因慎其事未報合龍竟闗心仍北望既慰益顒敬逰寄暢園再叠丁丑舊作韻江表初看山勢鴻埠墩西放一舟通秦園蕭寺相鄰近水閣雲忩小憩中視昔由今興堪託松聲泉韻畫慙工倣斯早已成八景扵萬夀山左倣斯成八景名之曰恵山園愧是卑稱大禹宫恵山寺四叠舊作韻恵山依舊矗青螺層叠禅林䕶呿羅一片赤心㤀今到幾莖白髪較前多慧枝演法髙還下忍草當春婆復娑禮佛而非佞佛者留詩最是好檀那圓池圓池圓中規恰似月之滿石洞在其上夏凉而冬暖方池方池方中矩本自圓釃出清冽遂不及惡居下流述至蘇州䇿馬入城安福艫維運水濵玉鞍徐控入城闉可知其切覲光衆縂是此􅇆保赤民少者壯而壯者老别因久故久因親銀牌分賜諸耆艾自笑吾年亦七旬凝懐堂三叠舊作韻展義觀風俗勤民念食衣豫逰切休助言行慎樞機憩宇體無逸瞻簷思入㣲奎章掲道趣三字萬年輝阿桂等奏報儀封合龍工成詩以誌慰決隄雖幸築時和四十三年秋間儀封與時和驛先後決口乃時和驛漫口塞而復開者再至十一月杪始得合龍而儀封新工復有蟄䧟遂至濡滞年餘工滯儀封一嵗過治水江南宣手熟儀封漫口後即命大學士髙晋率諳習樁埽之將偹李永吉等馳赴豫省董助堵築屬薪山左運肩摩儀封堵築漫口所需稭科較多恐本省採買不敷曽两次諭令直𨽻山東扵附近豫省地方各購買稭科運往應用幾成復變誠胡謂儀封之十六堡屡築屡衝因復議移扵七堡築順黄壩又扵王家莊展開引河以掣溜勢西掣東穿竟若何幸以開寛引大溜上年十二月内阿桂等奏請將引河大加開展寛深又接作挑水壩逼溜北趋黄水始掣入引河復歸故道金門合龍乃能翕受復原河文堙徒憶酸棗叙武作應同瓠子歌慰以為慙功奚有祗寛賠例廣恩波此次漫口幾閲两載始獲蕆事合龍報到為慰復以為慙即在事大臣如阿桂等亦自不肻仰叨天功更邀甄叙惟司員及司道知府等官非大臣可比仍令交部議叙至漫工糜費銀两照例亦應著賠但此畨辦理情形實非比前数次阿桂等悉心經理亦不遺餘力所有用過工料銀两悉准奏銷毋庸議賠惟決口䆒由平時防䕶不慎所致因傳諭阿桂查明河臣姚立徳撫臣徐績任内所辦隄工嵗修分别著落賠補勸彰懲􅂆并宣示中外令知辦理庻務一秉大公云獅子林再叠舊作韻山莊御苑雖圖貌避暑山莊與御園均仿獅子林而数典實自呉閶是同是異尚覺舊踰扵新耳黄氏倪家久繫心恰以金閶重蹕駐可㤀清閟清閟閣在獅子林中一言尋略看似矣彼新構祗覺輸於此古林壬午摹成長卷在展聼松竹答清音題虎邱雲巗寺虎邱上復雲巗寺畧覺畫蛇與足添一切有為法如幻六時無作笑何拈磬聲自逈落而下劔氣於今久亦潛側有行齋供静憩翻書聊當閲華嚴静觀齋虎邱最是繁歌舞卻見堯年額静觀我有還淳返樸責繹思垂訓意遑安含暉山館山館重來憩㤀言却似歸偶參禅偈静不異道心㣲庭有松隂冪床無花雨霏最繁簫管處巗閣祗含暉虎邱寺五叠蘇東坡韻蘇城北平原㧞地起崇嶺其磴五十三其磵通深井嶺頂法王宫浮圖矗雄耿梵唱落雲間絲管真䀨黽虗傳虎踞巔徒説劔飛礦盡信不如無論欲戒竒猛玉局同此意妥貼新詞騁用韻不妨險廢食豈因硬逮茲五叠之雖遜響鉢頃拙速頗亦成足遣清興冷仰蘇樓咫尺致我睪思永旋蹕循山塘厯厯觀民景鐘聲漸以逺鍼尖餘塔影顧問扈駕臣可誤奏章請逰支硎山再叠丁丑舊作韻未改山腰石脚泉支公别卻十餘年可知無住光隂幻便是有為清浄禅大似翻經參半滿不殊懸鏡泯中邉既然一切應無礙底事迴思復愴然支公庵支硎山復經蕭寺松韻泉聲縂快情却笑上人稱善遁至今仍未遁其名題寒山别墅支公菴甫過别墅面前看滴翠圍横嶺濺銀落激湍向知有行館便可憩逰鞍偶憶宦光事寒山未甚寒朱彛尊明詩綜趙宦光字凡夫吴人饒扵財卜築城西寒山之麓陶洗泥沙俾山骨畢露髙下泉流凢逰扵吴者靡不造廬談讌廣為樂方云云雖山以寒名而梯巗架壑構築精雅甚且廣結交逰絶不類寒士所為知非陶淵明軰之眞隐也緑雲樓支硎小嶺過非遥别墅寒山近若招遂進牆門尋曲逕便登樓級凭虚寮緑雲題額横松棟繡野連塍䜿麥苖嫌彼亭臺増㸃綴無過走馬看中消飛魚峡三叠前韻溪魚異於海那有翅飛然海中魚有翅能飛江湖之魚即不能飛况溪魚乎訝此胡名峡豈其遂奮天設如燒尾喻益逺曝顋仙觸景聊成詠猶慙四十賢馳烟驛戯題稚圭文孰移於趙我此省方非隐淪老尹却云看山似凡逰覧所至不過畧觀大意尹繼善曽比之馳驛看山言雖近戯頗合余寓意而不留意之㫖憶其語亦憶其人對瀑三叠前韻山為道人骨瀑即地仙髓小對两相㤀無物可持洗題澄懐堂懐藴方寸間澄或資乎境内外似倒置斯可喻而省譬之鏡設前弗對安知影影現縁對者則仍在已領别墅固明秀數嵗空孤景而覓懐不得乃因澄以静欲遂㤀言詮物物任平等清暉樓一泓池水碧而清圍暎山暉漾影明鮮與層樓湊詩趣無勞響鉢亦詩成寒山千尺雪四叠舊作韻一十五載别寒山重巡依舊臨山泉泉聲山色本如是以何為委何為源澄懐胥可㑹理趣觸目無非契道詮適來别墅寒山暫逰憩輕輿遂命曲徑縁至閣坐而聼昔雪六花落峡為潭淵聲非聲亦色非色但欣濕潤蒸巗巒曲注肖之塞上塞雄流圖以田盤田西苑畧葺勝朝蹟而皆視此鼻祖然向扵熱河盤山竝西苑仿照寒山為千尺雪復扵盤山自冩千尺雪圖而命張宗蒼寫寒山董邦逹寫西苑錢維城寫熱河各為一圖四卷合裝分貯四處要以此為鼻祖云四圖分弆於四處興存得一函三間聼雪閣四叠舊作韻雪落千尺髙其源本磵底斯乃假名象取譬言之耳六霙那計尺實固勝幻美實雪有時罷幻雪無時止又似幻勝實試看憑而喜因悟一切説炙轂艱窮始巗泉付不知如是淙而已五依皇祖華山詩韻更入向西路春山幾叠深新題選竹刻舊詠被苔侵寺鮮參禅侣庭來聼法禽雖云騁逰目隨處仰堯襟駐蹕靈巗四叠舊作韻十六春秋一瞬中靈巗重駐昔行宫瓣香梵宇先瞻謁歩輦雲衢西轉通古樹䕶門到春緑閒花繞砌暎曦紅晩來書室消清暇鐘韻悠揚恰在東臨湖榭向南山榭曰臨湖幾餘坐可盻具區具區雖逺見不逺意之到豈到之殊東西洞庭峙萬刼洞天竒語多半誣香水溪實在眼底越來由此曽傾呉撫景弔古遣清暇亦云逸興遄飛俱何來圖近新築葺此次南巡屡諭該督撫行宫名勝一切照舊勿稍踵事増華而楊魁乃扵西蹟山程園中㸃綴數宇以圖近觀太湖成事不説撫景祗覺増慙耳成事不説徒慙吾成事不説徒慙吾弗此欣夫轉懼夫靈巗雜詠五叠沈徳潛韻昔憐徳潛老驟用縁鼔舞誰知引宫墻圬乃於糞土徳潛年六十餘始得第憐其晚遇選入翰林屡擢至禮部侍郎加尚書銜以示鼔勵及予告歸里仍准食俸扵詞臣中受㤙最深徳潛宜如何感㤙守分乃唯利是圖甚且為逆犯徐述䕫作詩序使其身尚在自當明寘典刑得逃法網實其倖耳述䕫實亂民為序託李杜生當正以法幸其人成古右館娃宫不以人廢言其詩實斐然茲復至靈巗成詠聊記年仍五叠原韻水遇渠必湲琴臺接館娃絶響誰欲眠右琴臺石洞山半腰那可搆廊敞而曰有屧音捕風率傳響潛既訛以訛余亦莽其莽拙速足成萹未可無言往右響屧廊雜詠第四章髙閣吟涵空茲實有層宇拾級披清風是耶亦非耶名象混魚龍五百年之後將復傳離宫右涵空閣左日而右月一例於山頂誰與分甘澀蘇州府志載山有二井謂之日池月池相傳右甘而左澀試之殊不盡然無過虚捉影中冷固勝此無勞試修綆即今呉宫非餘此不改井右呉王井渫然一泓水颯爾萬古泠誰名曰研池虗印青天青呉王聲色徒那觧溪籐横日夕悦越姬越兵來不驚右研池呉宫多芳草揚風而浥露羣姬日采香勞勞玉腕素以供夷光用椒蘭焚曉霧旋起絲管聲響送西舂暮右采香逕徳潛詠翫花意在悦山谷惜其幸晚逹而反不知足每為諛墓文不辨涇渭渌仆碑非魏徴徳潛因徐述䕫逆詞案發廷臣僉議應削奪階銜祠謚並仆墓碑以為衆戒因從之此實徳潛㤀良負恩所自取非若魏徴為媢者毁短言徴録前後諌争語示史官唐太宗滋不悦仆所為碑者所可比也疵行無能浴右翫花池穹窿山上真觀叠乙酉舊作韻古觀崇椒奉玉真蕭臺重仰欝羅親求仙那問乗六氣祈嵗惟殷撫五辰偶爾小逰出塵地已教久候覲光民鳴鞭吟興知誰引鄧尉非遥即右鄰鄧尉山恭依皇祖松風水月額三叠舊作韻卉裏有三友稱兄定是松依然隣弟季肅若緬題重惟是含香淡不妨取䕃濃漫云别之久來往每扵胸右松四字額垂古五言韻叠風仲春雪霏白初日海升紅習習悠揚逓恢恢境象融即斯標至道何必訪崆峒右風青青鄧尉山白白太湖水山固如大庾水豈譲西子寫韻瀾漪間㺯影鏡光裏宸章不言梅括盡梅之㫖右水問梅何所宜不水則於月浮動漫重儓孤髙信超越印處玉是姿照得冰為骨奎畫朗千秋春芳亦無歇右月鄧尉香雪海歌四叠舊作韻閲十五載久别吾即今重逰恍似初山陽山隂各執見圖經誌乗多増誣大地豈不在海中豈繫一邱一壑之卷舒辛未祗偶山陽到丁丑山隂始識模争竒竝秀都具妙此後每並清蹕紆至理村名光福里名厯次第黄童白叟紛迎途覲光雖愜衆所願麥田猶惜躪競趋漠漠一片連南北分疏不可味之則有餘梅事實足稱觀止長歌四叠供清娯何來有稱逺太湖西蹟更闢山蹊殊楊魁奏進西蹟山程園圖在鄧尉西北山蹊窈曲泉石殊勝且南去太湖不百歩可以近供眺覧乃於其地復搆數宇實覺踵事増華而結搆已成若不一至又未免孤其誠意亦成事不説耳石泉梅塢精㸃景欲與鄧尉較勝輸雙目之賞何多需心知此舉誠為疎擬遂迴輿􅂸弗到又憐作者誠意孤増華踵事可長此後言寜免云巡呉後言寜免云巡呉摛詞先用自訟夫遊西蹟程園紀事成詠鄧尉復西去蓋行十餘里西蹟山在焉程氏園居彼志云無多景潭西差勝耳見一統志大吏脩葺之供攬太湖水事成乃弗説一渉聊為此髙下度小嶺溪邨凡經幾到亦未逾時坐亦未移晷屋雖謝丹雘石乃多砌壘其松非古遺其梅或新徙獨是太湖近憑欄觀足底白浮及漫山飣餖如置几何殊靈巗山臨湖榭在靈巗行宫内所視輕輿遂言旋夘出時踰已舁者覺過勞彼亦人之子易馬按轡行七十猶能爾過午還靈巗咨政戒怠弛誠馳驛觀山靈巗至程園往返八十餘里中途易馬還行館時已過午向尹繼善以馳驛觀山為比盖以余逰覧所至憩不逾時於寓意而不留意之㫖誠有合耳倍由旬弗止顧謂大云可一再斯否園應還故主吾弗更去矣逰髙義園駐蹕靈巗有餘暇園逰髙義去非賒溪村處處聞流水春樹㣲㣲見落花逕路不殊昔年至景光恰值一時嘉門前連理荆猶在園外荆樹二本百餘年物數十年前始交合成連理范氏裔孫大同守瑶刻連理荆三字扵樹田氏遺芳到范家法螺寺甫别髙義園言瞻法螺寺山路不十里遂造精㣲地何以識精㣲水明山復翠梵宇據深窈樸鮮莊􅃊事風旛標法音雲峰矗螺髻左廂試展歩㣲嫌飾㸃綴徒増浄域景未識如來意再題緑雲樓叠丁丑舊作韻靈巗清曉降山隂髙義法螺次第尋路便寒山寜可置春佳别墅得教臨千畦麥向緑中望七字詩從雲外吟陡憶當年掖輦處悵然難措此時心文廟文廟呉中古來瞻致仰欽胡為觀像設或可擬尸臨各省之文廟俱奉弟神位而呉中府學設像制雖非古然較周人以子為尸而父兄跪拜其下若尸年童稚則慮驚悸失儀如年及髫丱已有知識必且居之不安轉不若像設之妥神也秦漢後不行此制或職是故余嘗疑周人用尸事因瞻謁呉中文廟像設附識于此乙酉别成昔七旬重謁今敬思不踰矩勅命敢從心過紫陽書院書院以明學亦欲真材鑄况名曰紫陽晦翁教應溯寜徒詞藻貴甚之情面付徳潛昔掌此或尚工章句而其實行卑没後乃敗露徳潛歸里為紫陽書院掌教雖詩文尚工而品行實卑後為徐述夔作詩序允廷臣議削奪爵謚向年書院題句朂以努力實修未免失之假借耳則我向所譽亦失假借處知人信難哉於予改是懼題滄浪亭蘇城盤門側向有滄浪亭翠邏雖假山而其水誠清結構樸而雅頗具谿壑情云備來往官於此為送迎我昔曽一渉託意吟濯纓乙酉戯題此有不知誰是濯纓人之句即今興復别六計亷胥程治官應此亟惟亷清乃成寄語逰斯者勉實善副名即事於蘇州行宫作呉下艱逢十日晴浹旬開霽悦輿情人言巡狩符嘉兆我慮田疇誤早耕大吏都稱慶時若呉城二月下旬未雨詢之大吏均稱本年春雪盈尺繼以雨水兼之日内早霧沾潤農田並未缺雨等語然經旬晴霽未免厪念早耕耳深懐惟是念民生逰山玩景其餘事示意因之七字成欽定南巡盛典卷十六
