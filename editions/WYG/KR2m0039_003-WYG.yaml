  text: 欽定四庫全書欽定南巡盛典卷一天章
  hash: sha256:fb412c6ca71db2a058f6a5be96890e2a10dd3c064deb8e7e4f32a4b99551577b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_003-1a, image: WYG0658/WYG0658-0025a.png}
body:
  text: 臣等伏考唐虞繼治依永和聲時㡬勅命之作卿雲糺縵之章實開雅頌元音然不聞於方岳輯瑞之餘隨時紀事播為歌詠是以後世無傳焉若夫般與時邁武有廵狩之篇吉日車攻宣著中興之盛刻石鼓而員獵游巻阿以矢音郁郁乎文于斯為偹由今考之出于臣下頌揚休羙者居多非必發自王言垂為世範也後代若秋風汾水之辭作於漢武以及摩崖勒石傳諸天寳行宫題壁紀自咸平不過寥落數篇傳為故事而且功徳不足稱文辭不足述已欽惟我皇上聰明睿智聖學淵深天縱多能博賅衆藝萬㡬之暇每以周情孔思發為詩文制作契乎苞符楷模垂乎金石矞矞皇皇既已輝雲漢而燦日星矣乃若鑾輿臨幸當省方問俗之餘摛文掞藻自辛未以逮甲辰六舉時廵天章炳煥如五音之迭和如六爻之發揮斧藻羣言囊括萬有備載御製諸集共為天下臣庶所欽誦臣等恭錄篇詠謹以時廵要㫖為主或雨暘時若敬念天庥或水土告功疇咨地利或賡聖祖留題之韻䋲武永懐或奉慈徽掖輦之歡孝思純篤若夫崇尚儒宗志切高山之仰懐柔岳凟親頒勒石之文下至奨勵臣工恵愛黎庶凡兹名區勝蹟之摛吟悉本對時育物之至意用是一逰一豫鋪鴻藻而申景鑠實為自古帝王所未有洵足光昭盛典垂示萬年臣等敬謹編次冠諸簡端誌天章第一辛未直𨽻山東江南詩恭奉皇太后南巡啓蹕京師近體言志有序兹乾隆辛未建紀之歲實慈寧六旬大慶之年奉遊豫以祝釐皇祖聿垂燕翼省閭閻而行慶蒼生普被鴻恩將見農人紅女呼嵩者繞大安之輿越水呉山罨畫者邀王母之顧精禋蕆事王路載登成律七言克諧八韻崇壇祈榖届初辛是嵗雖祭於次辛而立春在正月則尚為初辛云盥薦柴升秩有倫仰冀瑶編書嵗稔親扶鳯輦舉時巡南人望幸心云慰西母承歡願以申四海一家何徳我三朝厚澤久孚民省方設教羲經重覲后同衡虞典陳駘宕和風清始蹕依韋暖律鬯青春厯看麥隴勾萌達擬詠江鄉景色新法祖悦親厪休助六龍于邁豈辭頻蘆溝橋石橋卧凍波來徃行人渡乗時每斷流狂瀾歸何處去嵗决畿南至今困沮洳固愧人力為詎容諉諸數疏濬付河臣古今重防䕶良鄉行宫作冬前迴蹕因巡豫春孟登程為渡江兩月風光那争異閑齋日影漸移牕來徃云何不惜勞勤民匪止為遊遨人文江左遥相望却慮經臨句未豪十六年來厪保赤近光引領自輿情縱饒觧澤輸蠭涌有慙去聲蒼生愛戴誠浙東西及大江南分付韶光莫太酣指日六飛應駐蹕觀民餘暇試清探良鄉行宫侍皇太后宴兼陳火戯梅信催人未可遲江南梅花春半即盛故早起程祈辛禮罷翠華移那無酬節同民樂且喜稱觴是處宜風定紫瀾迎五夜春輝銀蕊燦千枝一家中外嘉賓集䝉古王公送駕者命隨一頓觀燈依約觀燈上苑時𢎞恩寺雜咏遥瞻古樹蒼小憇禪房􅆼來往頗慣經新年景倍好寺縱臨通衢有僧住便静此趣僧未諳翻詡荘嚴整闍黎重清規云是蓮池派指日經武林雲棲應好在丈室紙牕明依然昨景情却憐枝上鳥觧報曉春生積素釀餘寒盆梅香正放叶琴薦墨壺清合是此中賞每得新題句不同前詠時問伊老庭樹是爾啟予思趙北口行宫作初嵗臨行館開韶景已妍㑹心即在此得句偶思前瓷缽唐花茁紗檠銀蒜懸淀池氷未泮不必命虞舡簾捲和風細窗含嫩日明兩間供静玩萬彚快新晴凍浦鳬仍聚春林鳥不驚文床浄棐几書史最怡情命直𨽻總督方觀承加賑去嵗被水諸郡縣詩以示志方春氣始和萬物欣榮滋翠蹕經黄圖施恵期惟時途次所厯覽閭閻固恬熙嗟予未見者豈無嘆向隅叶去嵗况多水懸釜飢難支沮洳未全涸播麥復失期致災莫諱咎救災要善為亦無别竒方加賑頻疇咨截漕及散金屯膏戒有司國以民為本舍是其愛誰民以食為天祈年夙夜孜河間道中示直𨽻官河間古瀛洲文物頗可觀前廵適災餘室家纔茍完版築命代賑雉堞儼崇垣閭閻亦較盛菆井騰炊烟邇來幸屢熟繭枲粗免寒覽此心為慰申命親民官彼獻乃列藩詩書教尚敦熙朝際富庶教之勿畏難束濕術宜戒粉飾習並蠲豈弟行以誠感民亦匪艱佇待此户封吾將鼔薰絃㣲雪㣲雪霏春宇輕寒峭幰車㸃林全發蕊著體旋融花未苦成泥濘方欣潤麥芽曉炊村墅裏縷縷裊烟斜紅杏園渤海經古邑芳園駐翠輦徘徊尋故蹟云昔日華館三雍曽著稱五經亦頼顯崇構早傾頹土階新拓展池臺取畧具琴書供静遣物力毋亟勞容膝斯已善賜山東巡撫凖泰山左前廵憶洊饑吾民疾苦日思之三年休息今何若莫飾虚觀進頌詞賜魏廷珍髙年引養客向日弼諧卿鶴髪猶然健葵心不改傾遂初孫著作樂志仲髙平别後今三載刪裁可就成路旁秋麥頗少切切有懐因示直𨽻官去嵗愁霖未涸泥延縁秋麥誤耕犁連阡那見青蔥滿入夏安期鬚穂低縱復截漕難遍及敢蘄觧澤慰羣徯青郊餘潤春畬利好勸乗時舉趾齊衍聖公孔昭煥來迎詩以賜之挈族郊迎蹕路邊成人見汝忽三年戊辰至闕里時昭煥尚㓜文宣世澤垂千古克繼家聲慎朂旃麥未萌昨過畿田未見麥苖被隴以為秋潦未盡涸而播種者稀切切不能去諸懐進總督方觀承而問之始知去秋乗潤種麥者較諸往嵗乃倍蓰至冬例驅馬牛踐食之當春萌芽益壯其尚未青蔥者則以今嵗遇閏尚未發生時也問之耕氓亦然既慰於懐兼成是什記我戊辰經畿南秋牟被壠迎人緑今來曽未見蔥芊預恐餅餌或不足進彼大吏共疇咨謂因遇閏春令遲正月栁稊今未稊何獨麥萌遇後時一言中窽吾觧頤詢之老農同一辭聞言欣然笑相慰先事過憂毋乃遽我久課農意盡知於今仍有未知處賜河東總河顧琮堤遥工簡息洪濤無事常經智不勞泉閘湖垸善瀦洩永期轉漕去聲濟千艘過景州城上遥看塔影孤輕塵不動雪微鋪三年兩度仍經此今日昔時頻感吾秃樹花如發温卉青郊寒未茁春蕪葢藏畧具雞豚息擊壤隨民得自娯開福寺紺宇現青蓮瞻遊取路便法雲垂四界花雨散諸天韶秀春光閟崇窿塔影懸禪房聊靜憇駒隙指三年入山東境不爭十里度平川民俗全分齊與燕稍因秋糧積囷簏更逢春色被原田初晴日上籠輕靄薄冷天低羃曉煙運水北流津口近那堪回首憶前年過徳州運水浮橋螮蝀懸重邱城郭富人烟觀民喜見千家聚問嵗知逢五熟連戊辰春東巡時山左諸郡縣洊饑之後户鮮盖藏流離之狀憫惻予懐於是竭力賑恤更頼以是天恩雨𤾉時若其秋遂有收巳巳庚午春秋皆稔閭閻景象大覺改觀為之額慶益凜持盈之懼云調幕多慚休頌我書禾有慶益祈天十分心始三分慰次第評量驛路前老黄河導河積石至龍門華隂底柱逮孟津播為九河入于海神禹舊跡堪指論後世因循漸南徙誰能障使歸其源又聞刷黄利深導義取其合毋取分一河猶時虞淤壅析而為九流難奔居今志古不盡同卓哉史遷垂名言復雪風雪夜交加嚴寒切曉車紛霏迷玉海散漫捲銀沙縱值年餘閏虞傷物茁芽謾云花信遲去聲農務重看花閲本印篆新年卜日開封章郵置速傳來宵衣旰食其常耳勤政親賢又勉哉毋作聰明循舊典不私耳目示親裁深慙端拱無為治問俗巡方嵗幾迴齊河道中作厯厯齊郊已三日物力民情亦粗悉雞鳴犬吠達四境飢食寒衣足千室民風迥不與昔同信知敦俗由年豐年豐余福災余罪此責豈諉諸羣工羣工邇來喻我意豐不偽陳災不諱但須終始以誠誠天必降康民受賜前嵗流離即此民今來皆作飽煖人道路感謝爾莫頻尚冀風俗歸温淳恭依皇祖南巡過濟南韻春月南巡過濟城敬䋲家法念民生承歡更冀増遐算後樂遑誇閲太平嗷雁昔憐凋羽翼夢魚今喜兆豐盈不堪厯下馳遥望倩取村煙一片横填倉日作俗節重填倉此日宜晴和朝來風日佳所喜占得禾青齊經數程氣象異昔過轉旋頼天佑賑救知吏宜叶遂使三年間元氣復萬家叶煙村昔年芳燈事今夕羅便與占民風姑弛金吾訶慽慽憶昔人鵲華况嵯峨憶慧賢皇貴妃以乙丑是日薨逝而南孝賢皇后又以戊辰春月東巡至濟抱病仙逝三年之間兩失故侣觸緒傷懷曷能巳巳尋思事固然舊緒徒延俄達者戒一徃毋為感慨多長清道中作雪後餘寒戀翠㣲春初薄暖愛晴暉山中曲折覘民俗不必匆匆䇿六騑一水縈廻出崖口數橋迤邐度川頭幸他舉家千家足慰我思人幾日愁童山處處是牛山孟氏名言想像間只有崮峯蒼翠好清晞酬我片時閑無風和霽曉烟輕閑冶嵐光驀地迎今嵗春寒遲春事畧傳消息到長清過泰山恭依皇祖詩韻纔看積雪消峯脚又覺輕雲翳日頭豈是山靈邀客住故教嵐氣作煙浮賡吟尚憶堯登頂結攬遐思禹畫州阿那天門門左側雲巢三日我曽留雲巢岱頂行宫名仄路盤旋出塞口岱宗俯視衆峯頭試思前度遊如在了識百年夢亦浮稍喜省方近呉㑹豈辭問路自齊州若云此地山川景只合驅車不合留望岱廟自有蒼精協震亨崇祠象設始誰成靈趨漢縣羣黎赤事紀茅家三弟兄香和岱雲千仞合鐘傳汶水十分清憑輿朅爾馳遥睞鱗繡郊原漸可耕㣲雪膚寸英英傍晩濃天花幾㸃下嶤峯山靈都觧標神異况是巍巍數岱宗勾萌未發驗稊陽春早田功雪未妨獨慮扈行羽林衆豈無寒者薄征裳天衣簁玉白皚皚合是合雲亭裏來合雲亭在泰山之北著樹繽紛開且落先傳消息隔江梅度汶水汶水虹橋凍合津紐芽宿麥遲抽新心期鄧尉村前景背指天孫雲外皴徃事總堪愁𣺌𣺌無生底必滯塵塵未㤀只有勤民念餘概空花付夙因喜晴春月希逢是喜晴春月北方毎慮少雪雪足始喜晴故云喜晴最利在新耕原田遍潤應回霽莩甲辭寒自向榮薄凌去聲一灣依日脆徂雲幾縷逐風輕初韶景色行行近似為江南馬首迎䝉隂積雪恭依皇祖詩韻東來不是為登封繩武南巡重劭農今日䝉隂仍積雪當年聖藻並高峯䝉山岱宗東來數百里或宫或霍伏還起蜿蜒一氣結䝉山嶻嶭堂皇重見此惜哉濯濯乏喬柯牛山之木亦嘗美翠㣲風來生峭寒放乎琅琊意近是一遊一豫侯度昭仿彿其招在角徴望䝉山雪色再成崇巒積雪昔年同聖祖巡踪景仰中奄有海邦為魯鎮果然山下出泉䝉逢年民鮮飢寒色敦俗户多淳朴風百嵗熙和九州宴自惟何以繼鴻功過沂州此州前者災尤重地處南游衆水歸縱未目經心倍切敢㤀民務國斯依所欣逢嵗蘇千里豈冀呼恩擁六飛銀鋪紅橋春日嫩高風遐想浴乎沂題禹王臺沂沐不相見神規禹所餘自從歸以壑誰復歎為魚績豈資堙障功惟利瀹疏巍然石臺下即此溯權輿郯城道中龜䝉迴望數峯尖大野風光取次拈人意貪程催馬策晴曦送暖入車幨江聲迎客行行近詩趣和春旋旋添老㓜初逢清蹕至羽林訶禁莫教嚴示山東巡撫凖泰所過蘭山郯城上年畧被偏災之區見扶􅂝而來者雖無饑寒之色而室廬蓋藏究不逮他邑亟命加賑並未經過而亦係偏災之五州縣令分别加賑焉蘭郯去秋潦蠲賑早施恵今來閲閭閻稍幸起凋敝尚未臻盈寧終嵗盖藏計俗云民所艱青黄不接濟念此心怦怦豈靳沛恩濟加賑有常經隨宜善措置其餘五州縣歉收與此類雖非目所擊民瘼豈有異貧户有等差布澤應次苐毋使吏胥侵向隅或弗逮庶冀蒼黎蘇安心待逢嵗入江南境裊裊東風拂靣春乗春鑾輅舉時巡江南至矣猶江北我地同兮總我民祇承觀方懐保切豈難觧澤恵鮮頻更欣餘事尋文翰秀麗山河發藻新恭依皇祖示江南大小諸吏詩韻聖人致熙皡鳯麟在郊棷而猶所無逸巡方民隠剖於今四十年盛典未行久藐予䝉業安負扆為元首繩武仰仁皇承歡奉慈母逋賦二百萬蠲除恵農畆乗春發行旌皮軒道游後減從勅羽林修職戒典守閭閻期不驚比户相睦友餘暇寄山水智樂仁者夀兹來匪豫遊前徽勉無負宿州道中作觀民展義舉時巡澤國非遥路少塵畢雨箕風從好惡小廉大法朂臣隣就瞻一任扶􅂝至出入何須警蹕頻底事初逢如舊識本吾宵旰繫懐人賜兩江總督黄廷桂迎鑾衛警蹕建節久旬宣體我勤民徳嘉卿率屬賢何須張錦帳惟喜閲鱗田細騐剛柔俗周諮豐歉年咸中方有慶虚已自無偏此地人文盛還淳尚勉旃麥盼從冀兖寒遲茁看到淮徐緑滿田第一江山春好處十分梅栁色徒傳漸漸他日應藏雉縷縷於今欲起烟此是千家餅餌計羽林馳騎戒紛填駱馬湖濟運輸天庾防霖安地行相機資蓄洩惟謹度虧盈洲渚江鄉趣鳬鷗春水情六塘東達海切切念民生度永濟橋水退長橋未卧波垂鞭風裊跨虹過每聞行潦愁湓溢蒿目疏治竟若何示總督黄廷桂所過宿遷清河桃源三縣上年被水之區雖已加賑兹經覽閭閻益切軫念亟命再加恩䘏並成是詩三縣雖加賑經臨倍切情䘏民寧過厚咨爾善推行貸種休償責興鋤莫誤耕所憐灾歉後歡忭馬前迎夜雨夜雨入深更氊廬淅有聲却因詢土俗知亦利春耕地脈應餘潤花枝欲向榮所嫌泥濘甚輜重慮艱行見新耕者春郊叱犢一聲聲雨笠風簔最厪情憶似燕南還早作去嵗保陽見新耕者於二月下旬故云喜從淮北見新耕煙花千里都應讓銍乂三秋冀有成望杏瞻蒲迎蹕路水田疆􅎌互縱横中河駐輦近中河朱欄俯緑波羣歌漕運利永頼謨多運口向在仲莊我艘及皇祖指示命移於楊家荘號為中河漕商船利頼無窮云繼述夫何有遵循敢更過省方得知要遑復論其他晴入境逢晴和兩日繼隂雨渡河快曉霽是日渡黄河波平澹容與黄流片刻過歡聲騰萬户人意即天心益凛無逸所楊莊閘恭依皇祖詩韻景仰先猷志有餘御碑亭畔佇徐徐守而弗失由來事前烈毋忘語豈踈初晴暖日颺遊絲幾里金隄翠葆移露冕茅檐頻借問民間要欲得周知渡黄河去嵗渡孟津兩岸隔五里今來渡淮安河惟里許耳岸寛流則平河窄流斯駛南河防塞多時聞疊浪起而我時南巡正逢晴日美盪槳越溜過安穏非昨比天心明錫佑河伯黙相祉平陵川氣黄紛擁雲容紫蓊匌象實雄詄蕩波偏瀰永念平成功細度修防理恵濟祠玉構金隄神所憑瓣香展謁肅䖍増黄清淮乂常資佑楗宻茭長敢恃能夢雨飄初逢曉霽靈風恬不致波興漕艘來徃稱庥應争奉馨椒潔享蒸閲河示總督高斌澤國民生庶金隄祖制垂來巡期善守底績貴無為持正裁浮議開誠集衆思問予何訓示志在五言詩恭依皇祖覽淮黄詩韻御碑亭畔滙清黄仰溯塗山疏瀹方端拱九重遑自逸疇咨萬姓切如傷惟期繼述誠應朂亦曰流連慎戒荒髙堰重䝉皇考建千秋淮郡倚金湯木龍木龍制如鹿角枝梧交午其中編竹為幛置急流中水徑過而沙漸淤宋臣陳堯佐創為是法前代治河者未得其用近河員李昞陳之總河髙斌斌用之遂著成效朕臨視河工目繫其制詩以紀之刋木遺來天用竒淤沙禦水兩兼宜宻茭奚事搴横浦曲岸居然漲逺涯鱗次常令波浪靜蟠拏那許蜧蛟馳陳堯佐創髙斌繼績奏安恬制永垂閲髙堰工有作皇考重河防神謨定廟堂帑金頒太府髙堰衛維揚濟運南輸北安流清滙黄申咨惟善守千載固苞桑洪澤湖恭依皇祖詩韻翠華六度事非虚昏墊常憂淮與徐疏導逺同神禹蹟至今民免歎為魚閲河恭依皇祖詩韻清浦今來駐御營神堯方畧仰天行河臣咨爾無多訓惟是丁寧朂守成賜沈徳潜水碧山明呉下春三年契濶喜相親玉皇案吏今煙客天子門生更故人别後詩裁經細檢當前民瘼聴頻陳老來底越精神健刼外胎禽雪裏筠清江浦春江鳯舸駐沙濱南國風情領畧新白鶴紫霄皆福地枚臯趙嘏兩詞人韶光喜不藏隄樹緑意看將􅃞沚蘋邇日寫懐多韻語得無民事閒去聲咨詢示江蘇政莊有恭從來庠序儲才地觀國之光利用賓所貴清真兼雅正莫容牛鬼及蛇神春華秋實崇經術廷獻家修重大倫自是此邦文勝質丁寧致朂務還淳恭依皇祖閲河隄詩韻巡法重華典歡承長樂宫河防惟祖述民瘼更研窮石閘萬年固清江千里通神堯復神禹奕葉戴鴻功過淮安城初來南國為觀民水郡臨隄䇿騎巡富矣閭閻藏不匱彬哉士庶許還淳就瞻特地千軍禁感頌還憐一念真共受春温抒愛戴豈辭膏澤及時頻髙郵湖淮南古澤國髙郵更巨浸諸湖率滙兹萬頃波容任灑火含隂精孕珠符祥䜟隄岸高於屋民居疑地窨嗟我水鄉民生計惟罟罧􅀢芡佐饔飱舴艋待傭賃其樂實未見其艱亦已甚船忩夜雨之作聞道江南春雨多船牕㸃滴夜如何榜人預喜明朝路下水兼逢漲運河零零淅淅滴波聲妙寫溟濛杳靄情今嵗春寒便開霽曉看花未重江城髙飛迴雁下沙汀逺帯瀟湘音𣺌冥最是推篷望漁火分明煙嶼㸃疎星北地常稀好雨滋設教敷被信稱時麥鍼芃緑二千里幾甸闗心付寤思晴見未見今聞未聞北南風氣果殊分春逢雨易難逢霽風送船行更送雲不獨耕犁免沮洳頓教征棹豁氛氲明朝便近維揚路隠隠遥眉列翠紋舟過高郵黄㡌發謳歌樓船穏運河厪心籌澤國極目賞烟波春色栁梅綻江城士庶多聖蹤隨處仰沙岸倚牂牁香阜寺維舟對晩春登陸初地水鄉經數程見山已快意土阜縱無竒名與清凉配是䖏俗名小五臺文殊無小大而人紛位置丈室暫㣶徨爐香綴烟穂高旻寺蘭若青蓮宇浮圖碧落天名灣真不愧是䖏俗名塔灣埋雁亦堪傳未縱晴明望誰忘言象詮金山不速客暫爾隠江煙髙旻寺塔晴明可見金山故戱及之塔灣行宫恭依皇祖詩韻南來逐處仰重華此日重教韻和麻但得一心常守敬從知四海永為家省方咨度惟耕織悦己竒衺戒鳥花數宇行宫無藻繢昭垂作法恐其奢夜雪晨晴雨寒催夜雪風息報晨晴觧事東皇恵生歡萬物情與梅添朶纈積石潤雲英紆棹平山路同民愜此行駐塔灣行宫之次日由維揚郡城至平山堂途雖稍紆喜值新晴一慰士庶瞻就之願故云過維揚郡城淮海維揚下下田兹看撲地聚人煙古今奚必無殊異豐嗇從來有轉旋蔵富於民欣按戀返華以樸憶陳編百年休養八埏靖致此其難益慎旃天寧寺小憇昨朝望裏煙雲𣺌今日坐覺春光舒阿大中郎留别業優婁比邱得廣居鳥是南音真愜聴花欺北地無虚譽平山更在緑雲外俯暢樓牕却受虚虹橋緑波春水飲長虹錦纜徐牽碧鏡中真在横披圖裏過平山迎靣送香風平山堂梅花纔放為春寒果見淮東苐一觀馥馥清風來月牖枝枝畫意入雲欄蜀岡可是希呉苑永叔何曽遜謝安更喜翠峯餘積雪平章香色助清歡渡江駐蹕金山南巡行慶奉慈寧畫舸中流瞬息經浪静風恬頼江若琳宫福地藉山靈西瞻𤓰渡長煙白東挹焦山逺樹青拱讀穹碑欽聖孝法貽百世慎聰聽初登金山得句萬疊銀堆一㸃青到來曠若換塵形奔騰揚子原標勝突兀金山更表靈刼外滄桑慿水閲空中樓閣借雲停江天無盡心如爾頓使吟情入杳冥亭臺俯瞰真無地星斗平臨别有天萬古豪吟誰造極一時勝覽若登仙方壺圓嶠逢今日伊闕轘轅㤀去年而我先憂饒後樂何能福地久留連遊金山寺用蘇軾兼效其體平生不戒遊覽興西浮於洛東觀海輕舟風利過維揚此間初識有江在中流嵽嶫如補陀八功徳水澄無波精藍信宿可留憇層樓阿閣何須多青雀黄龍盡收楫笳吹笙歌送西日帆檣逺近掛紅燈照入江天星㸃赤髯翁醉醒風雅魄竒句孤吟深夜黒蘇詩有二更月落天深黒及江心似有炬火明非鬼非人竟何物之句信耶非耶漫强明中使使人人鬼驚六百年來人莫識我偶拈賡答風物濫觴逺憶巴岷山土鼓雲門拳石頑清賞憑高興未已烹茶更試中泠水金山寺恭依皇祖詩韻𤓰步登舟風日和金山景概實堪多此行詎止尋清賞繩武思量應若何登金山塔頂拾級慿登雁塔尖北南形勝望中兼髙盤鸛鶴天風勁下鎮蛟龍江窟恬造極真教諸慮靜到斯何必百憂添許多勝概吟無暇歸棹重臨擬細拈自金山放船至焦山用蘇軾韻東坡材富大厦耽錢塘通守遵江南豪詞强韻寄磊落醉酹江月對影三我乗陽氣行時令呉楚越若農農蠶黔黎愛戴任瞻就何徳至此翻懐慙金山泊舟憇信宿頭陁巖畔窺澄潭放舟焦山符勝賞長歌快誦心先酣興來走筆步其韻何殊喚起髯翁談底須樓觀北浮玉但愛松竹籠虚龕江山本色乃在此靜寄飽厭山泉甘從來逺遊志士志豈辭多取貪夫貪餘杭此去讀竒作綴辭拙速吾猶堪江風五雨送征棹青雲迴望封禪菴遊焦山作歌金山似謝安絲管春風醉華屋焦山似羲之偃卧東牀坦其腹此難為弟彼為兄元方季方各騰聲若以本色論山色我意在此不在彼㣲風入江縠紋起從臣告我遊應止橋安舟險有名言曉人何不當如是叶須臾風息日纔辰焦先望幸意已勤輕舟減從聊攬勝不教警蹕呼紛紜三詔祠邊撫遺蹟瘞鶴碑側尋殘文交枝萬樹蔽白日造極俯瞰干青雲江聲澎湃山色氤氲東西亘界南北區分一條白水無斷續兩岸青山相吐吞焦山之遊不虚云詩成用詔聞未聞三詔洞衡泌棲遲風尚清蝸廬焚後一身輕千秋洞口傳三詔遁世㣲嫌未遁名甘露寺和蘇軾韻江曉風始息山芳春未䦨江山有佳致助我尋清歡三詔别隠士萬騎擁材官捨舟而遵陸快控青驄鞍左右陸麥畦曲折朱木欄比日多舟居乗馬意為寛南仰峯嵂嶊北俯波𣺌漫尋筏步初地參旛標刹竿湧出宇寫蓮蹲來石貌羱蒲牢傳天監年月精鐫鑚其西踞筭峯卧龍籌阿瞞東東接象嶺鎖鑰壯雄觀六朝此割據訓練列卒團蕭梁更佞佛云益功徳欄長廊扶㠎嶫拾級暫逰盤居然得所思古殿猶善完猊鼎噴都梁鯨旛剪綺紈莊嚴獲福果俗僧多誕謾天人下山節雲中翔且跚忽為驂者龍忽為翥者鸞如夢幻泡影一語真不刋小閣冠峯頂拂拂天風寒長煙一空碧騁目窮江干衛公栢何在空傳枝屈蟠更聞葬舍利七粒已出棺當時頗樹黨布金徒致歡地下遇董狐應梅跡未刓東坡詩中仙五字留吟安豪氣驅雄才力敵扶揺摶倚韻成長篇非欲為其難梅花率已發梅子何時酸重來應首夏無何一指弹潤州道中作山染青螺水緑涵今朝春色識江南迂途城市觀民俗暫捨舟行䇿玉驂碧草新蕪接驛樓金山迴望鏡中浮詩人月旦非唐突苐一江山果潤州到䖏摩肩户口多百年休養際熙和寒衣飢食人人願足食足衣籌若何許渾别墅今何在猶道詩人丁卯橋便可進舟行廿里好乗京口晩來潮戴顒宅作招隠寺雅合斯人髙尚心玉蘂唐昌自仙品誰知津逮此中尋長江天塹古稱雄守險何如守徳崇此日徃來成坦道殷殷保泰惕予衷射􅋈棹河濵早抨弦弓手調旅登皆有度連中豈須驕是日發十矢中九問俗來南國詰戎重本朝從行諸將士慎爾勵勤勞過常州府城毘陵驛口駐飛艫城郭周巡六轡紆老㓜歡欣稱就日江山風物已勾呉朂哉爾牧無胥怠弱矣斯民未盡愚户口實繁盖藏少隠憂水旱豈能無寄暢園輕棹沿尋曲水灣秦園寄暢暫偷閑無多臺榭喬柯古不盡烟霞飛瀑潺近族九人年六百耆英髙㑹勝香山松風水月垂宸藻昔日卷阿想像間秦氏子孫迎駕者二十餘人秦孝然年九十實然年八十七敬然年八十五榮然年七十夀然年六十六芝田年七十六瑞熙年六十一莘田年六十東田年六十二九人六百餘嵗又皆近族故五六及之恵山寺寄暢園中眺翠螺入雲撫樹濕多羅了知到䖏佛無住信是名山僧占多暗竇名亭相掩映天花澗草自婆娑闍黎公案休拈舊十六春秋一刹那寺僧有雍正年間在圓明園内㕘禪者駐蹕姑蘇牙檣春日駐姑蘇為問民風豈自娯艷舞新歌翻覺閙老扶㓜挈喜相趨周諮嵗計云秋有旋察官方道弊無入耳信疑還各半可誠萬衆慶恬愉奉皇太后遊虎邱即景閒登海湧峯雨洗緑鬟濃古蹟多留詠春郊盡力農雲樓既虚厰月牖且從容最引予心慕虞歌毎毎逢誰云金寶氣化作虎邱山西踞瞻湖墅東臨鎮市寰巖姿浮刻削澗響瀉潺湲聴法猶存石生公舊徃還梅綻三分白麥抽千畆青飲泉思陸羽卓錫擬支硎雲罨石常潤風和草亦馨智仁山水徳樂夀頌慈寧虎邱寺和蘇軾韻曽聞沈恭子論詩虎邱嶺商周二千年逸事談井井平原為磨崖光怪龍蛇耿雙絶尋無踪累句紛鼃黽汲古得蘇詩兼金固在礦硬語出横盤有似魚腸猛當年圖伯人志氣頗馳騁倐爾埋澒地囑子徒凄哽不及槃郢氣化石彈指頃行春喜初地不礙東風冷天水目與暢琴書興以永歸騎循蘭蹊江城入雨景何當巖半閣坐弄新蟾影去留隨所適奚用山僧請遊支硎馬首見支硎迎人罨秀色一逕入松竹峯秀不可得到山始暢然環秀真竒特却失來時逕但見緑雲羃山川聚靈氣變幻曷有極迴向參世尊萬慮於以息石室及寒泉一一供遊歴支公鶴不聞空亭祗留迹寒山千尺雪支硎一帯連寒山山下出泉為寒泉淙淙幽幽赴溪壑跳珠濺玉多來源土人區分稱各别豈能一一徴名詮蘭椒策馬尋幽勝山水與我果有縁就中宦光好事者引泉千尺注之淵泉飛千尺雪千尺小篆三字銘雲巒名山子孫真不絶用呉梅村詩意安在捨宅資福田槃陀坐對清萬慮得未曽有詩亦然雪香在梅色在水其聲乃在虚無間聴雪閣千尺雪之上架白屋三間氷牕俯暢砰湱之聲滿耳跳激之勢謀目閣素無名名之曰聴雪而係以詩雪宜落天上云胡落澗底其源不可及千尺約畧耳三間白板閣占盡林泉美珠玉碎復完琴筑鳴無止澗葉冬不凋巖葩春似喜入望窈且深宜聴静方始是合㤀名言而復不能已華山問山何以分髙下宜在引人詩興者遥瞻濯濯青芙蓉南嶂猶平堪跋馬登峯造極覽全呉却步鳥道尋蘭若左右泉聲上下雲間以踈梅秀而野厯險即夷小憇留别室數宇致瀟灑琅玕千個緑雲叢笙筑百道銀雪瀉我逰名山亦已多謂當無過田盤也此間松石遜怪竒梅竹彼應讓都雅兩山何用費較量夢寐他時總心寫恭依皇祖華山詩韻觀水有其術入山不厭深境無容俗混林豈受樵侵香遞英英朶聲喧命命禽宸章垂琬琰胞與識胸襟駐蹕靈巖塔影遥瞻碧漢中梵王宫側舊離宫觀民展義因時切石棧雲林有路通竹􅄜蕭蕭喧䖏静梅花漠漠白邊紅太湖萬頃軒牕下坐辨洞庭西與東靈巖雜咏用沈徳潛韻館娃宫瓊宫號館娃艷歌復麗舞歡娯廿三年凄凉一􅀈土偶來尋舊蹟山徑步芳杜哲婦能傾城坰戒垂千古琴臺白銀世界中石湖言則然而我攬竒景其趣符昔年月出山寥寂風定波潺湲琴聲靜無聞雲扄寄高眠響屧廊夾徑多長松度松漸豁敞伊昔構曲廊夷光留屧響屧響久不聞春烟䝉蔓莾小草設有知云見人來徃涵空閣靈巖三百丈嶻嶭凌虚空高閣俯太湖鏡影澄微風吐納閲今古變化資魚龍清夜靜萬縁鐘聲下梵宫呉王井山下宜出泉云何於其頂行雲時吐英古魄幾留影子胥抱孤忠不食空垂綆徒傳艷冶蹟貽羞日月井研池石鼓淙天池清波澹泠泠扶欄成小憇春蘚匝甃青我欲習揮毫古帖徒縱横筆諫有名言豈事龍蛇驚采香逕采香勝采葛采葛行野露欣戚不同倫誰知繪後素倭墮籠春芳甲煎蒸曉霧坐看笠澤邊越師來薄暮翫花池山花落春風貼貼依溪谷底怪呉宫人鎮日翫不足紅顔已塵土蒼巖仍湛渌三復徳潛詩吾心一以浴鄧尉香雪海歌并命沈徳潛和韻鄧尉之名久詔吾鄧尉之竒今見初一四天下總在海都梁嵰山夫豈誣天風卉歙波濤泛春日淡冶漣漪舒目謀耳食已絶勝更惟鼻觀為模偨池韶秀復蓊匌泌潗案衍還縈紆坐令甲煎嫌艷膩逺慮葱嶺非坦途山僧抱月眠初醒却跽道左紛相趨爾所羡者我厭久我所慕者爾厭餘乃知兩全信難得何妨一晌供清娯北眺虎阜南太湖南船北馬用各殊此間無可無不可滿坑滿谷酬所需林逋畢竟寒儉相但詠香暗及影疎徳潛黄山詫雲海咄咄香雪詎可孤東皇亦觧助韻事春寒勒待今臨呉春寒勒待今臨呉平山何有見金夫平山鹽商雖種梅而今嵗春寒到時始綻數英今正值盛放之時故戲及之宴準噶爾夷使渠搜入貢值巡方後隊隨行許覲光麾去招來遵我約氊裘帕額適其常三巡湛露申歡豫二月東風正艷陽深戒誇奢纒錦樹盈寧畧足示來王夜雨北方此際惟虞少南國今來却慮多祇論遊觀無不可重因農務望睛和法螺寺前朝跋山路法螺近咫尺却為遊華山竺菴暫虚擲靈巖今返蹕取便尋幽適牝谷纔幾曲便覺仙凡隔石泉常似咽磴道不嫌窄别室亦瀟灑松竹有佳色微辨來時路下盤緑雲隙再遊支硎兩日靈巖巖果靈更尋光福叩雲扄如斯佳境安能盡不竭歡情慢久停旋命歸舟指呉㑹取便䇿馬憇支硎一天快霽予心暢下視方方麥坂青舟發姑蘇蘭鷁發胥江風平五兩䉶霽天留曉月麥剡入篷牕行閲溪山畫真稱文物邦具區空濶裏洞出洞庭雙田家春興湖山豈不美最喜是田家過雨修春耒臨溪轉水車東阡芃緑毯西陌簇黄花攬結真娯意端勝玩物華城市厭笙歌農謳愜聴多三時務耕織六畜富雞鵞髙廩村場積新篘父老酡今年春雨足卜稔望晴和紫陽書院題句沈徳潛主紫陽書院為乞額因顔之曰白鹿遺規并成是什棫樸重育賢菁莪厪即俊矧兹文雅都造士方應慎書院號紫陽義盖由慕藺徳潛縱懸車鄉教猶能振乞我四字額更無他語訓白鹿有芳規氣貴消鄙吝學非養貧地貧乃士之分學復不重華乃實之釁功或虧一簣山弗成九仞詩雖夙所耽不足示後進努力崇實修佐我休明運平望景霽風微湖似鏡輕帆廿里暢人心樓臺逺近稱呉望老㓜扶􅂝漸越音澤滿魚蝦船作市地多桑柘樹成隂吾民庶矣思藏富