body:
  text: 欽定四庫全書欽定南巡盛典卷七天章壬午直𨽻山東詩恭奉皇太后南巡啓蹕再疊前韻有序年占午正宜揚南國之旌月肇寅生爰效東皇之駕當朔塞九功奏凱慶逮乘時况西池七秩稱觴懽逾獻嵗時乃燕臺日近魯甸春迴指吳頭則堰莅觀河臨越角而塘循捍海詔郤綵棚燈幔何以文為風陳巷舞衢謳無非事者然而典符三接辰紀十周求民莫以給餔厪呼庚癸體懿懐而紆軫重閲辛壬維再巡令則還仍用誌憑軒伊始想一路懽聲可即如言候仗何遲云爾初嵗開壬甫背辛答陽任養叙彛倫添籌纔度七旬慶養志還符五載巡毎為賑賙傳蹕止本擬辛巳南巡以下河窪地偶值偏災復改為壬午幸逢給足俾情申南轅始命展軨僕澤國遥懐引領民寧以行時吳與越肯忘遇澇衛還陳十行不惜恩加月去秋豫河漫口奪溜數郡被災亟命地方大吏妥為撫䘏開年復命從優加展賑期四海惟期澤普春日奉慈顔心有喜途臨韶序景從新行宫所幸前遭者武定聊無籌筆頻丁丑南巡時賊酋巴雅爾等搆釁兩路進討軍書徑達行在故有敢廢軍書裁决頻之句駐良鄉行宫疊舊作韻黄圖古冀緬盧胥堯以為心久愧諸惟是敬誠凜無逸庶幾風俗復還初時巡民瘼體毋怠日侍慈顔樂有餘詎可深宫圖宴息聖人見説貴鶉居良鄉行宫奉皇太后觀烟火即事得句時巡啓蹕先去聲元宵初頓黄圖路不遥迎節欣邀慈閫豫送鑾况集外藩朝是夕在京王公及外藩送駕者皆令預觀紫瀾欲定風澄晚七寳将圓月燭霄大野春鐙民共樂廣陵却笑躡虹橋良鄉行宫再疊舊韻立春昨日欣逢雪便覺春琴藹帝江啓蹕正宜迎氣始行宫韶旭曣明窗心欲其安身欲勞挑燈義府足怡遨賦詩何必多明憶毎至摛詞興輒豪清風一牖春秋韻明月滿庭今古情無盡蔵真大公物坡公游戲語猶誠翠華三度指東南遮莫逰情覺已酣豁賦省耕度入聲河務其他無欲孰窺探郊臺廣陽南五里封土建郊臺毎過欽天祐非闗詡域開戰袍解昔勞去聲纒㡌扈今來年班来謁諸回人皆令隨行過上元始分路命侍衛帶往各城迴憶誠徼倖淵𠂻益慎哉𢎞恩寺祗園古道左来往駐旌仍僧有毘尼行去聲梵言毘尼華稱戒律也佛無聖見乘聲聞緣覺無凡見尚有聖見惟佛乘始無聖見時禽鳴意喜靜室憩心澂即境思名義敷恩亦欲𢎞涿州行宫晚景涿州出南門行宫向逺原底須事藻繢亦自有亭軒西嶺銜春旭東蟾竚上元郊燈真足賞民俗藉堪論豈不還淳念其間同樂存清宵閒㸃筆爆竹聴村村涿鹿行四疊前韻行官近隣凹字城至今四疊涿鹿行昨辛耆定識僥倖前丁擘畫思分明如願麥熟千村飽去嵗麥大熟夏田苗秀誠亦好不期秋霖忽致澇救災蒿目乏術巧匪民之過皆我尤猶幸此方䝉眷稠豫省河决乃大沴賑濟不教餘力留重臣馳驛往督築幸能瓠子全功収往来巡狩無非事萬方方寸勵慎修紫泉行宫十詠敞軒千秋一水帶新城變紫伊誰浪與名稍葺行宫省駝力䟽軒早見敞三楹屏山圖水寛因致山聳三峯當户畫屏風訝看中吐英英氣能爾為應王氏䝉鏡湖湛渌溶溶數畝涵碧波消息遞江南開奩設使譬明鏡却憶貞觀有理談舫室飛鳬不繫鏡湖涯似效昆明石舫為好惡毫釐可弗慎未期安處早慙斯㯶亭四柱孤亭臨石坡㯶毛宻葺㲞婆娑雖然從儉還新樣比似茅茨祗覺過虹橋長橋飲練學南國顛米詩情憶宛然幾度吳江訪古蹟不知其處祇名傳魚􅊻渚畔魚罾得所償豐於竿釣儉於綱若非雲水滄浪意子莫執中底所長石逕十畝間園五畝宅逕惟曲折爾能長因之悟得行文法不在縱横在抑揚竹埭風處鏗然月處虚幾竿牕外足扶踈春来紫戢猶勹土已覺干雲勢有餘箭㕔駐輦還教集羽林學文皇習射親臨尋常㸃綴渾餘事嘉此知予奮武心駐趙北口行宫即事䟦馬䧺縣南須臾長堤莅行宫知巳近烟栁柔條肄于邁指江南江南消息遞漁村與蟹舍近逺坡陀寄積雪氷鋪仍新水春生未野老捧木盤一雙氷鯉置還鯉命賚之嘉此獻芹意水鄉水鄉也自藝桑麻去嵗霪霖潦嚙沙絜矩原田經澇者合教一例賑期加上元日侍皇太后宴南巡東陸奉慈鑾三五昌宵月正團四海為家欽養志萬年介祉永承歡氷花火樹輝行館玉籹銀粱供大官此樂本來天下共即看祝嘏侍江干駐蹕思賢村行館題句漢家太傅有遺祠行館於旁樸且宜兩字思賢易新號舊名四善村因改此名千秋稽古藉先資閒庭不改風還月欹案依然易與詩一宿明當發清蹕已安容膝底多為題授經臺髙臺喜識授經名太傅猶稱處事明河内後来傳趙子淮南先是受賁生詩殊東魯意頗合易是専韓義獨精憇宇恰依林屋側睪然望古集遥情題毛公祠村尚以詩傳心儀設教筵淵源子夏訓詁逮延年愛此儒祠古兼臨行館便地方官備數宇憩舍於祠旁既樸且宄稱莅止焉展書樂清暇妙􅆻鄭家箋於毛公祠旁行館作行館儒祠畔春風特地臨無邪蔽三百有傳至而今已喜書筵潔那更石徑深卷阿稍伴奐可惬昔賢心即事駐輦春風日又斜傳宣守吏問桑麻災區賑濟還當黽憩宇鋪陳底足誇且喜説經近毛氏不須買節學錢家京都放燈自十三日至燕九兹以巡幸在途十七十八兩日命罷之行檠清夜無繁聒名教中原樂趣賖示直𨽻總督方觀承及其屬吏驅車過瀛州縱目瞻原田原田有積水氷凝雪鋪連秋麥既悞種去聲春種上聲亦覺艱去嵗潦非常調幕吾恧旃賑救或少靳災黎何賴焉村行厯觀民色實鮮饑寒都稱賴麥稔早收穫潦前此語疑信半况在蹕路邉其不經見者寧無向隅人叶我惟加實恵爾其勉勤宣官階大小殊民父母同然各盡保赤心蒼黎庶多全紅杏園三疊前韻今杏仍昔園兩度曽駐輦乘陽令時令爰復停雲館撫景騐貞元晰理窮幽顯更無軍務殷喜有經書展㢠廻思此問夜始籌王旅遣掃逆兼靖回丁丑駐此時雖伊犂已定而賊黨巴雅爾等乘阿逆之竄觀望煽動方命将士乘春進討今厄魯回部悉平為憶爾時行在旁午不禁喜惕倍増也天恩錫盡善燕九日賜隨營諸臣及直𨽻各官食修市行營御邱仙節日臨度疆留牧伯明日入山東境直𨽻各官皆留扈駕有纓簪宜與開春宴因之惬衆心筠沖常預席随行回部王公等並得依次列坐食椹擬懐音賜衍聖公孔昭煥翠華迎謁蹕途旁徳業宗風想益蘉取道迤東卿且返迴鑾當一仰宫牆過徳州運河即事卧波浮彴亘通津夾岸肩摩接駕人按轡徐行還徹葢鋪衢隨覲不嫌塵益祈田榖資其食所喜民情向我親去嵗此曽遭異漲􅂞思猶為恫瘝頻駐蹕徳州示山東大小吏疊舊作韻東省斯惟首頓居狩巡五載又臨予詎欣駐處閒庭廓尚念災餘比户虚申命官箴宜惻爾設云民感益慚如十行頻有恩綸沛要在推行善體諸四依皇祖徳州即事詩韻五度徳州路民風不改初有成尼父語吾愧魯論書去嵗盛秋霖協時乖曰肅竭力濟昬墊千村幸飽燠賜山東巡撫阿爾泰承宣原佐治安撫遂専衙阿爾泰由山東布政使擢本省廵撫課吏旌清慎勤民重麥麻入疆此所慶行館彼非嘉郯城行館葢因地名郯子園之舊増葺數椽用備臨憩阿彌泰以事非興作不先奏請然非朕所取也化雨青齊被希璉政豈賒徳州行宫疊舊作韻京畿東首兹門户水舸陸車滙路程幾宇行宫原早就一時賡韻又重成且遲栁色迎隄發已喜梅香對座榮遊豫大經曰休助載咨方伯體予情賜河東河道總督張師載去嵗楊橋决予當咎匪卿從來不諉過正爾憫奔驚初報漫口時張師載引罪惶遽曽諭以此非人事所能為慎勿張皇失措清白揚前烈師載故禮部尚書伯行之子奠安觀後成修防益懃恁最此繋民生徒駭河策騎過徒駭禹功猶可稽由来大事舉艱致衆心齊故道難循舊秋霖藉洩低今運河秋漲由此洩入海益慙三度往劼毖議防隄三依皇祖南巡過濟南詩韻百里桑麻率有城無非保障厪民生與吾共者二千石漫爾徒稱天下平潦後尚嗟溝壑轉春来那見色家盈巡方惠政循前揆詎為華不翠色横崮山疊舊作韻十日行春盡郊野今朝發駕見山姿逢迎喜與峯巒近駐蹕纔方卓午時雪積隂崖勒薄寒和門武帳向南安予寧慮闕豐裘暖慮在多人布帳單生色圍屏畫意装謖聲泛出籟含凉前番却憶雪中見依舊行齋松嶺陽翠雲千疊弄春晴抱石為胎强項生落落寧同凡草木却隨冬夏變枯萌靈巖寺疊前韻玉符祗苑由来久巖有佛居合號靈豈必吳中八面塔請看厯下五花亭松因摩頂今聴法泉自渡盃古瀉渟别館近旁堪一宿清虚端足謐神形駐蹕方山疊舊作韻誰向丹陽借宋符江南上元縣有方山宋元嘉時何尚之退居處其地為丹陽郡所轄按山東志載方山在長清縣界雖名同上元實即水經注之玉符山也佳談一例助遊娛何湏此是彼非論不異氷流山峙區行館數間堪駐耳好峯幾疊試登乎前年已是攜圖去今日居然身在圖再題靈巖寺八景巢鶴巖羽客本来瑶島種何因瑞相兆開山應縁命命同飛去安養道塲聴法還甘露亭甘露前頭甘露亭瀹泉洗鉢茁蓮青無端津逮闍黎口説法猶當字字馨卓錫泉都大緇流也好竒錫傳乳竇注山坡玊泉第一惠泉二問爾神僧卓者誰摩頂松長安辭闕求西竺摩頂松何在魯東遷固猶然有蹖駁稗官奚恠語多空鐵袈裟鐵鑄袈裟圖久住誰能著得自元超蒲牢設擬鯨魚發也似鐘聲披七條白雲洞天半嵌巖名白雲晴空無雨亦氤氲前春憶得探竒到路自英英蔚處分雨花巖維摩空裏文殊問那是如來不二門付與層巖雨花者更無人説黙無言愛山樓潔治行宫備豫巡髙樓納得好山皴設云仁者有同樂便擬當春澤物均降㫖免山東被水州縣積欠詩以誌事夏諺曰遊豫其義重休助此地昨秋潦宵旰厪憂慮春來寛大詔率巳屢頒布經過切體察老㓜迎蹕路雖云無菜色猶懼有薪措亷知餘積欠期緩終應賦不如一與豁俾免催呼遽安心勤耕農有秋冀可遇填倉日作餅節途中度民風取次探炊烟村樹引澌水野橋含問俗新棉有充庖嫩韭堪落蓂纔數日積榖厪餘三望岱廟岱嶽崇隆百里瞻荅陽岱廟侐精嚴禮官肅祀儀雖備巡蹕将經告岱宗首途遣官祭如禮恭已欣翹敬倍添居震徳宏六子率配天澤厚萬方霑心馳未覺雲山隔敢曰誠通冀福謙過泰山五依皇祖詩韻靈巖謂是髙無比更有髙峯在上頭瞻魯象曽詩裏想青齊色忽路前浮禪封玉帛秦兮漢襟帶耕桑郡復州保泰惟斯躬所勉况榮若彼志毋留兩度天門親拾級羲碑捧讀憶從頭戊辰年事那堪道丁丑春廵過似浮不改旰宵勤庶政惟期樂利永齊州省方繼武一心切詎是無端七字留閲本封篆例應過節開閣章今日驛傳来敢云披閲吾門矣益勅幾康其慎哉問俗巡方惟敬事察言觀行更量平聲材重熈處泰宜何務堯典欽明一語該過汶河靈源逺溯出莱蕪行地横陳齊魯都是日輕輿復經過春風野彴自清殊昔今不異觀民切来往寧因問景紆分水北南胥濟運古人相土有良模至泉林二首再疊舊作韻泉林子在川上處成誦髫齡記憶明五十望牆猶未入東西歸壑又逢晴泉林即陪尾山東西各有泉出牆則合一川為泗水矣門庭熟路無須問軒榭前題有若迎勝地良辰扶翠輦髙年憩賞足娛情我曾兩度駐負尾絶勝渾如初度来何必管絃誇熱閙可知泉石稱清陪觀民蒿目盈寧耳近聖翹心鑽仰哉較量前番幸成武丁丑過此時西師尚未蕆事有不異前兹惟問夜軍書籌畫為偟徊之句幾閒對景一徘徊三題泉林行宫八景近聖居近聖人居若此甚然而無有則亦無子輿斯語俟神㑹㑹者依稀程與朱在川處泛海猶然来往續印心何異鏡開奩千秋川上徘徊者誰解宣尼道體拈鏡瀾榭自露妍媸不示形迴塘流動復瀠渟何須博古圖中考此是軒轅一片青横雲館陪瓦何曽髙百丈地靈亦自解生雲憑軒不惜蔵山色却為春郊作雨欣九曲彴山下出泉成野河板橋接岸往来過底須九曲擬仙境樂事由来名教多栁烟坡大戴禮詮正月候協時近可驗長條若為畫筆能傳照烟意惟看此處饒古䕃堂杞樹輪囷巧覆墀春来重見出塵姿喬柯為問何年發性善曽箴告子時紅雨亭春曉緋枝苞尚含趲程巡蹕指江南漫言佳景成孤負看到霏霏轉不堪賜山東巡撫阿爾泰及其屬吏食詩以示志泉林卓午駐瑜輪賜食兹邦執役臣灑道清塵都致敬遊休豫助重時巡詎欣别館美如許惟厪災區恵可均一食不忘君見説還當一食不忘民泉林行宫晚坐别館春風夕景侵泉林真箇好泉林盛名難副兹誠副聖蹟宜尋近可尋川氣滃然連古樹暮春􅊬爾隠遥岑神凝乍欲忘機象剪燭匡床又課吟綽楔穹碑八十年行宫前年二十三皇祖碑記屹峙是康熈南巡旋蹕将詣曲阜經此所建每来敬識弼仔肩總林樂利仍依舊赫濯聲靈勉繼前祇祝耕犁豐沃野幸過籌筆奠新邊卷阿幾度分明憶駒隙遷中有不遷㣲雪四首兩度䝉山都見雪今来峯頂又生雲已看積玉原如昔設更飛霙益可欣厯辰過午蔚雲濃憑􅚫遥看麥壠封傍晚綏綏忽宻灑春郊如約遘竒逄亂飄斜墮態森森氊室茶爐悦可心素積髙峯直北望䝉陽瑞色接䝉隂辛未丁丑年皆有恭和皇祖䝉隂積雪詩原田三白積漫漫微雪欣宜此處看便使開晴尤恰當恐妨春氣轉嚴寒䝉隂積雪三依皇祖詩韻瑞雪春朝遍野村立春日京畿至齊魯普獲瑞雪此處尤渥霑節遲遇閏未興農山靈葢不違堯命示我詩情在玉峯望䝉山雪色再疊舊韻翠微積素訝偏同三度春光一例中此可無言平野過試看有霧逺峯䝉賦情因遇思梁苑詩意其雱緬衛風較量前番饒厚幸伊犁早慶兆農功丁丑疊韻有遐心憶到伊犁塞佇待王師早建功之句近得駐伊犁大臣阿桂奏則各屯屯政畢興収穫倍稔且遇冬雪兆慶有秋實堪欣慰也萬松山停蹕停蹕山欣號萬松春晴滃然綠隂濃無多室宇花宫側近逺都来眼界供北軒耐可縱遥眸疊浪喬松翠欲流設擬遨遊雲海上不瀛州定是防邱春風琳宇小停驂幾㡧青雲映碧潭謾議小山無故事八公見說晤淮南二月朔日復雪前日微飄今大作行營早是駐鳴驂背迷逺岫銀屏繢細糝長空玉鳯毿滋䕶麥根纔仲月芳遲梅蕋待江南發生未鬯寒無礙喜遞勾吳潤意含晴三首昨日雪将二寸餘嚴寒切慮變春初晴和更復無風色策馬青郊意為舒路放瑯琊遵海南橋過沂水境臨郯萬民迎蹕情親切露冕南廵逮此三軟曦融雪作輕泥喜復無塵逐馬蹄却為閏年遲節令麥苗待看茁青齊郯子園六韻觀民指吳㑹按􅉐莅郯墟少皥嗣封後春風駐節餘何當庭館此為愧旰宵予一宿園奚藉千秋蹟信諸既成斯不説至止偶相於誰與徵傾葢因之試訪書欽定南巡盛典卷七
