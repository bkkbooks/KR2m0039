body:
  text: 河防乾隆四十六年三月二十六日大學士公阿桂兩江總督薩載河道總督李奉翰奏言竊照桃源㕔屬臨河集之九里崗一帶河勢向走北岸舊有埽工嗣因河向南趨工即淤閉河勢由南岸之臨河集下注該處素稱崗淺乾隆四十三年臣薩載於總河任内曾經奏明調撥河兵堡夫挑浚一次緣此叚崗土砂礓性俱堅實不能冀其沖刷通深而中間横亘崗砂千餘丈内測量水深僅止二三尺不等較之迤上水深六七尺迤下水深九尺一丈者其為髙仰已屬顯然全河至此未免為之梗阻但黄河溜勢雖趨向靡常而水性就下則係必然之理若能挑挖深通使之流行暢達則下游盛漲即可望其隨長隨消不致壅遏為患但水底不能施工撈浚終屬無濟臣等上下履勘再四籌酌惟於北岸坐灣處自李家荘起至臨河集北首止取直開挑引河一道計長一千一百四十丈口寛四十丈底寛二十八丈通身挑深二丈約估需銀十一萬二千餘兩臣薩載臣李奉翰一面調撥工員預集人夫俟奉到諭㫖允准辦理即分段上𦂳儧挑務於五月内完工屆期開放因勢利𨗳自可沖刷寛深伏秋大汛流行直注較常年自當更為通暢則上游消落亦必迅速於全河形勢大有禆益奏入上諭曰宜速為之但不可因欲速而工不實乾隆四十六年五月初十日兩江總督薩載河道總督李奉翰奏言竊照外河㕔屬黄河北岸王營減水石滚壩創自康熙四十五年係減洩清黄異漲之水由鹽河至北潮河歸海以保䕶外河山安海防等㕔兩岸工程乾隆三十三年黄强清弱清口及楊家荘口門停淤阻碍漕船難行相機啓壩黄水減消兩處運口立見通順乾隆三十六三十八四十四等年黄水清水盛漲下游埽壩在在喫𦂳放壩分洩各工亦即化險為平屢著成效惟查該壩經歴多年屢修屢塌乾隆四十四年啓放之後壩頂沖損樁石俱壞壩下跌成深塘堵閉時甚費周章設遇盛漲之年必須啓放水勢恐有吸溜之虞督臣薩載在淮時面加商酌急應另行拆修以備開放兹臣率同淮揚道王問羮副将李永吉及㕔營等細加履勘該壩從前修造時金門原寛三十丈由身直長六丈一尺二寸壩面既窄壩底又髙並離黄河僅二十餘丈啓放之際溜勢直下湍激汹湧是以壩内易於衝損内塘毎致跌深臣相度形勢與道將講求即就該處移下八十五丈距黄河縷堤二百丈下至鹽河一百六十餘丈另建石滚壩一座金門仍寛三十丈由身改長二十丈較舊壩落底四尺使壩面坦坡下注溜勢伸長不致過激上下兩脣俱用碎石填築加釘闗口木樁以資攔禦如此核實修做庶將來啓時可免衝跌得垂永久所需工料共估銀五萬四千餘兩目下將届大汛難以趕辦謹先繪圖貼説恭摺奏請如䝉俞允容臣遴委幹員給發銀兩先行採辦灰石樁木等項料物全數購運貯工俟秋後築做壩基興工儧辦並照例造册具題送部查核奏入報聞乾隆四十六年六月二十七日兩江總督薩載河道總督李奉翰奏言竊照桃源㕔屬臨河集地方舊有崗淺黄水至此未免梗阻前經大學士公阿桂㑹同臣等前往勘明在于北岸灘上奏請開挑引河一道長一千一百四十丈口寛四十丈底寛二十八丈通身挑深二丈以暢溜勢緣由奉硃批宜速為之但不可因欲速而工不實欽此臣等當即遴委幹員集夫儧辦于閏五月初六日一律挑挖完竣因坡底埂界尚應銷除曾經奏明俟黄水再長相機啓放兹查該處引河自挑完之後各工員加意收拾口底髙寛丈尺較原估有増無減河中埂界挑除浄盡簽試新挑河底凡土性堅凝之處又令翻犁虚鬆俾易沖刷曰來黄水接續加長臣李奉翰馳赴該處上下查探壩外黄水髙于壩内河底一丈七尺全河大溜直趋河頭亟應乘時開放因勢利𨗳期收實效隨率同道將等督飭工員将工頭工尾土壩及臨水防風上𦂳挑挖起除于閏五月二十七日開放黄水建瓴直注奔騰湍激形勢甚屬暢順測量新河内已水深一丈六尺大溜由西南直注東北現在兩岸堤坡漸次刷塌並查新河未放以前上游樁誌存水一丈二尺三寸下游樁誌存水一丈一尺四寸新河放後上游誌樁消水一尺五寸下游誌樁長水一尺一寸此即河身通暢銷除梗阻之明騐也從此長河水勢得以隨長隨消不致壅遏為患寔與河工大有禆益現派専員往宿河干查明往後刷塌寛深情形隨時具報奏入報聞乾隆四十六年十二月初四日兩江總督兼署河道總督薩載奏言竊照本年回空漕船南下稍遲疊奉聖諭飭令小心催儧及早抵次節經臣将派員迎催并渡黄船數繕摺奏䝉聖鑒查漕船已入江南境者邳宿一帶運河兩岸縴道無碍遄行無阻惟洪澤湖存水較小前經臣督令淮揚道王問羮将清口口門早為收窄而黄河現無來源湖水東注未免日有所耗遇東南風則湖水入運較少查今嵗回空糧艘因東省運河難行南下既較往嵗稍遲渡黄後不便又因水小濡滯臣帶同道将在於清口上下勘籌緣清口東西壩源逺流長湖水過運口後則直向東流不能攔回入運臣隨督令道㕔復於舊東西壩迤上兩岸築以兠水壩使湖水多入運口并将恵濟等閘抝板蓄水次第倒塘浮送現在運口以内水深已有三尺餘寸糧船隨到隨行截至二十一日已渡黄漕船二千一百隻計四十餘帮内上下江廣船均已全數渡竣可期依限抵次浙江帮船現亦銜尾南下經過鎮江徒陽運河遇潮水小時間有淺滯之處臣現飭逐段挑撈以冀處處深通俾漕船渡江後亦得遄行不使稍有阻滯所有回空漕船渡黄數目理合恭摺附驛奏報再近日㣲山湖水已消尺許下游邳宿運河及駱馬湖六塘河各處俱已消水三四尺不等濵臨湖河前次水漫淹浸之地已陸續消落髙阜之處涸出地畝甚多農民現在翻犁種麥淮徐各災屬正值初賑藩司劉墫現在親往查察臣亦就近督辦民情甚為寧貼莫不含脯鼓腹感頌皇仁奏入報聞乾隆四十六年十二月初八日兩江總督兼署河道總督薩載奏言竊臣前将自宿遷至清口查勘東西壩并髙埝山盱一帶工程縁由繕摺奏䝉聖鑒查宿遷之皂河夏家馬路放淤坑塘上年恭逢聖駕臨幸指示一律填平嗣因大汛水長盈堤拍岸無處取土尚未辦理今嵗伏秋水落灘現臣與河臣李奉翰勘估酌定派委該㕔儧辦兹臣順道親勘業已辦有四五分工程嵗内即可一律填平永資鞏固又本年六月内經大學士公阿桂覆奏河工圖内仰䝉皇上于順黄壩南岸一帶硃筆尖記飭令添築新堤一道則沿河即多一層保障且河流更直於新河形勢更為有益命臣㑹同河臣妥商辦理當經臣與河臣李奉翰勘籌實屬一勞永逸之舉遵即確估并將御樁亭之西硃筆㸃記處所詳加籌畫應于該處用柴土築做磨盤大壩不使河勢卧進有碍木龍既可保䕶南岸灘崖又可挑溜斜注東北順黄壩對岸灘嘴更資汕刷自更得力繕摺繪圖覆奏奉到硃批此非目前急務矣俟新工合龍後妥為可耳欽此兹查得南河魏家荘漫工早已堵閉堅實豫省漫工亦已將次合龍黄水指日歸復故道前奉聖諭指示順黄壩南岸添築新堤一道應行辦理以為重門保障臣昨自宿遷至清口又經順道該處閲看督飭道㕔即行照估興築其應做磨盤埽壩現令備集料物俟黄水下注察看溜勢趨向情形再為接做奏入報聞乾隆四十七年三月二十四日河東河道總督韓鑅奏言竊照東省閘河全仗汶泗来源南北分流濟運泗水收蓄于馬場湖而以金口壩為洩水南行之路汶水全出於分水口而以何家壩為分流北注之區本年湖河漲水未消汛期已届汶泗二河陸續増長江境下游既廣籌分洩東省上游亦須節減其來源查泗河之金口壩内於冬間堵築俾泗水全由黒風口入馬場河遇泗水長發則開金口壩出魯橋入運今馬場湖水現深五尺運河南行無庸接濟湖水不必再收泗河上源又别無歸宿之處應將金口壩及早起除使泗水漸次減洩以防蓄極積滿騰湧驟漲其汶水之出分水口南北分流北七南三本有節制今南行之水勢無可加若猶照常聴其南北分注恐漫衍更甚雖将栁林寺前二閘已嚴閉全板逼水北注但漕運銅鉛等船經臨隨時啓放汶水仍未減其南趨兹查分水口以上汶河西岸何家滚水壩原洩汶水異漲由分水口以北劉老口石頭口兩支河入運舊壩長二十丈髙五尺二寸乾隆二十二年因洩水不暢将該壩中間十丈落低二尺現在壩脊髙水面三尺五寸壩前水深二尺五寸濟寧以南湖河之水現比二十二年較大三尺餘寸計汶水再長四尺而該壩僅能過水數寸分洩不暢勢必多注分水口仍不免於南趋今擬将何家壩中間十丈再行落低一尺庶可由分水口上游即旁分北注如遇汛漲猶恐該壩分洩不急則仍將迤上之戴村壩民埝酌挖水口入大清河歸海庶汶泗兩水南北分流不致合而滋患其於濟寧以南運道似有禆益至捕河属之戴廟五空橋滚水壩去秋黄水串入之各支河及上河属之徒駭馬頰等河凡有淤淺之處已委員查辦酌量疏挑以備宣洩臣俟縴道各工妥竣後首帮糧船抵濟仍馳赴捕上二㕔親行勘騐再查自濟寧至韓荘一帶趕修縴道将次完竣水站各船亦已到濟八閘各水口橋梁草壩已報完工統俟通身完竣臣當㑹同撫臣國泰巡漕臣毓竒騐收另為具奏臣查催縴道行至臺荘探知南糧首帮已抵江南邳州境臣現遵㫖前赴徐州㑹同督臣薩載勘籌宣洩奏入上諭因時制宜之為知道了乾隆四十七年十月初十日兩江總督薩載江蘇巡撫閔鶚元兩淮鹽政伊齡阿奏言竊照前任江蘇撫臣呉壇查辦金壇于時和侵佔已故大學士于敏中資産五萬七千餘兩一案欽奉諭㫖詳查金壇有無應辦水利隄工等項公務即将此項撥辦等因欽此隨經臣吳壇議請開挑金壇縣漕河由小河厯三里橋向西至句容縣分水脊中隔陸路一段盤壩行走由上元縣之三岔河加以疏浚西通秦淮河直達江寧省城以期金壇漕運通利商民稱便約計需費不過十數萬兩除動撥前項外餘再籌撥閒欵凑用俟親勘明確即㑹同臣薩載核實辦理另行奏聞奉硃批好知道了欽此未及㑹勘移交臣等隨經檄飭江寜布政使劉墫蘇州布政使瑺齡江寧鹽巡道伍拉納常鎮通道孫栝率同江寧鎮江二府並熟請河工員弁逐一詳細察勘去後嗣據該司道等查勘詳覆臣薩載於往來鎮江金壇之便復率同司道等親詣各處詳加確勘查金壇地居腹内相距運河僅止百里南通奔牛北通丹陽奔牛一路係屬繞道計程紆逺丹陽一路較為近便該縣漕糧向用小船装載由丹陽七里橋出口至運河上漕船交兑相沿已久今若将此河挑至金壇縣城使漕船直抵城下受兑固為直捷但測量地勢内外河身髙下懸殊非開挑寛深與運河底相平漕船不能直抵城下特是内河水無來源即使挑深亦無長流不竭之水可資浮送且河深則岸土髙聳亦難免於坍卸必致旋挑旋淤徒費無益惟七里橋至港口橋一段計長四千五百丈較之縣城一帶河道更覺淺窄每於冬令必須築壩戽水方資剥運漕糧未免倍費民力應就現在河身挑浚與上下河道一律相平則剝運漕糧既可免築壩戽水之繁費而民船往来亦俱稱便約估需銀四千八百四十二兩零所費無多應行辦理其自金壇三里橋向西經丹徒句容上元各境至江寧省城一帶中隔句容之分水脊即茅山脚山岡髙阜較之兩頭地勢逓髙至十二丈有竒兩頭雖有河形係山水分流之路非通行舟楫之河山脚之下悉属砂礓即多費錢糧亦㫁不能将河身挑至十數丈深與兩頭河底相平即就地勢髙低閒段挑通水無來源亦不能常流存注資送行舟中閒髙阜之區仍須盤壩該處並無大村鎮市可設埠行招集脚夫以為水陸馬頭而行旅往来以一百餘里之程竟至一番登陸兩次乘舟轉多勞費參之輿論咸稱不便案查從前厯任督臣亦曽議及於此一路欲開河道以通舟楫皆因中隔茅山髙岡難以挑通多費無益遂爾中止前撫臣吳壇擬請開挑句容分水脊一帶河道勢有難行自可毋庸置議惟是江寧為首㑹之地士商輻輳從蘇杭一帶來者水路必經長江中有黄天蕩之險陸路則從鎮江起旱由龍潭至省計程一百六十餘里脚力匪易江寧商庶赴蘇杭者亦然是以久有開河之論限於地勢迄無成議臣等往來鎮屬留心體察勘得金山對岸之錢家港内由師古灘至龍潭棲霞沿江一帶本有閒段河形其無河形處不過二十餘里亦係洲灘地勢平衍應将此一路就舊有河形挑成河道即以挑河之土填築縴路則蘇杭赴寧船集即有錢家港師古灘入新挑河可以直達龍潭并可由龍潭直到棲霞之四板橋從此登陸至省不過三十餘里旱路比之鎮江起旱至省所省實多又可繞過長江以避黄天蕩一帶并棲霞最髙峯等山偃風之險而舟行所厯之境俱有村鎮營汛可以停泊與山原曠僻髙阜開河情形難易迥殊河成之後兩頭通江中閒又有通江汊港潮汐往来可期不竭兩傍地畝益資灌溉舟楫既通附近居民更可沿河貿易其中挖廢地畝無多拆除零星民房合計不過數十間照例給價豁除糧賦詢之士民咸各樂從遷移臣等隨飭司道等帶同熟諳人員詳細確估約計需用土方銀八萬七千餘兩加以金壇挑河銀四千八百餘兩并酌給挖廢地畝遷讓民房價值通共需銀亦只十萬餘兩與原奏銀數相等又自鎮江至金山進𤓰洲口入運河江面計有十餘里往來船隻對渡若遇風信不免稍有稽阻臣伊齡阿商之臣薩載以𤓰洲跨城有河一道上通運河由閘下達大江若由金山對渡入𤓰洲城河計程只有二三里江面甚近瞬息即可過渡臣等查該河從前本屬寛深沙飛船隻俱可行走祗以年久未浚潮汐往來未免淤墊夏秋潮大舟楫尚通冬春水落則甚淺滯所以渡江船隻於春時自南來者須從金山繞迥瀾壩一帶進𤓰洲口入運自北對渡者亦須出𤓰洲口江面實屬寛濶難行若将通𤓰洲城内外河道酌量展寛挑深并将兩岸縴道修整橋座城圏一體起髙則冬春江潮灌注往來船隻由此一路渡江較為近捷可期穏速臣等於因公渡江之便親加履勘亦屬應辦之工約畧估計需費不過一萬數千餘兩合計三處挑河所需費除動用前項入官銀五萬七千餘兩外其不敷銀兩臣等在於江寧蘇州藩庫並兩淮運庫内酌籌閒款凑撥即可濟用毋庸動支正項錢糧如此則金壇之漕糧剝運既易自鎮江以至江寧直屬一水可通由金山而入運河渡江僅只三里繞越長江之險兼避江面之寛商民往來均稱利便永戴皇仁實無紀極如䝉俞允容臣等一面飭再分晰確估造册咨部查核一面遴委妥員定於今冬分投築壩興挑工竣騐明来春即可開放通流以利舟行所有臣等酌籌開挑金壇漕河并江以南之錢家港江以北之𤓰洲城等處河道情形謹㑹摺具奏并將大江南北擬開河道繪圖貼説恭呈御覽奏入報聞乾隆四十七年十月二十七日直隸總督袁守侗河東河道總督何裕城山東巡撫明興奏言竊臣等欽奉諭㫖㑹勘伊家河工程臣袁守侗自原籍長山縣赴省即同臣明興於初八日起程嗣至兖州復㑹同臣何裕城先後行抵伊家河悉心履勘查該河在運河八閘之西二里許自微山湖口河頭起至江南之梁旺城入運河尾止計有六十餘里共長一萬二千四百餘丈係於乾隆二十二年間開挑成河宣洩微山湖水勢現在河之頭尾水勢俱屬寛深惟中段有侯孟龍王二泉自西而東横穿入河毎年大汛發水該處停積沙泥日久愈多雖屢經疏濬終未能大加挑辦以致淺滯之處過水無多若潮水再落必致㫁流該河為分洩湖水要路且距八閘一帶甚近形勢相同必得挑展寛深方資分路疏消之益兹臣等將該河通身測探計自河頭起長四千一百餘丈一段計河尾長一千一百餘丈一段其水勢均深八九尺以至丈餘至中間一段長七千二百餘丈内過水只有二三四五尺不等總因該處地當山脚多有砂礓並察視中段之善庄橋以北原有月河及迤上四百數十丈係在張山平山之間其下盡屬大石臣等詢問土人俱稱二十二年開挖時因正河内山石甚大復於此處另開月河及至挑深數尺其上下仍係石底用匠開鑿極費人力今查該處石底過水均有六尺許其中間鑿有溝形寛及一二丈連石面水深八尺以外自係從前因鑿深數尺後未能再施工作是以只於石上抽溝以流水勢兹臣等再四籌度如欲將石底再行鑿深不但須費甚鉅且恐稽延時日於宣洩要務未免緩不濟急因查月河以下即係中段淤淺最長之處其水底比月河迤上石底已髙及數尺似應将此段内七千餘丈普加挑挖綂以水深八尺為率與石溝之底一律相平而與首尾兩段内水勢亦可倍加通順至其河身過窄處所均須逐一展寛并將碍水之各橋座分别拆改務必通身暢利則湖水從此分消可建瓴直下歸入江境運河於東省籌洩水勢之道實有禆益惟查該工段落甚属綿長且轉瞬即及深冬寒凍之時而於河身内開挑必先將兩頭築壩戽水涸出河底始能挿鍁興工似應於估定後即行奏請辦理期早一日工竣即可早消一日之水現在臣等將該工内水勢之深淺河身之寛窄以及砂礓水旱各方分别勘量細加估計併恐將来挑深數尺之下仍有山石隔碍尤當逐節簽試確切講求統俟詳細勘估并合定銀數後另行繕摺㑹同具奏所有臣等到工履勘伊家河大概情形及公同商辦縁由謹繪圖貼說恭呈御覽奏入上諭曰好即應速行辦理乾隆四十七年十一月初四日直隸總督袁守侗河東河道總督何裕城山東巡撫明興奏言竊臣等先後前抵伊家河工次業將該河大概情形及商辦縁由㑹摺奏聞在案連日以来臣等復自上而下通行勘量並逐段悉心體察查伊家河共長一萬二千四百餘丈其河頭一帶因近接微山湖口湖流湧注水深一丈有餘自此而至善庄橋以上計長四千一百餘丈水深八九尺不等甚属寛深其間歇馬亭地方有月河一道長一百數十丈并迤北四百餘丈緣在兩山之中均係石底鑿有溝槽水勢至此為底石所激愈加湍溜亦深至八尺以外此河頭一段無庸辦理之情形也至河尾一段計長一千一百餘丈自楊家樓起水深八尺其下以次逓深直至梁旺城入運之處水深一丈一二尺亦頗有建瓴就下之勢無庸估辦惟因該河中叚淤墊過髙祗有二三尺之水流至河尾雖逐漸積深而其勢甚緩反為下游運河之水頂託是以水平不溜而河頭一段内極為暢溜之水復因中段淺阻其大半竟從兩岸各缺口而出旁流散漫以致河身形同魚脊不能由首達尾一路通順今查中段自善庄橋以北工頭起至花山橋迤南楊家樓工尾止共長七千二百四十五丈其中間因王家河口及萬年橋一帶河底本係砂礓且每遇伏秋山水湧發淤積泥沙甚厚現在過水僅深一尺數寸逓及兩邉水勢自二尺至五六七尺不等其河面亦甚窄狹有祗寛三四丈之處并查萬年花山二橋係鄉民建自近年已在河身淤淺之後是以橋底甚髙於水勢亦大有阻碍兹臣等再四酌商擬將此一段普行挑挖就過水之淺深定挑工之厚薄總照現在水勢挑深至八尺為度其兩岸過窄處所亦一律切寛以展至六丈為率計估挑土工長六千六百五十四丈内旱方土七萬六千四百八十六方水方土十二萬九千八十二方零又估挑砂礓工長五百九十一丈内土方九千五百三十一方砂礓一萬八千五百六十九方零查砂礓工挑挖較難必須多用夫力該處與八閘相近情形亦同應照毎年運河内挑挖八閘砂礓之例以每砂礓一方用夫五名估計辦理至應挑工段内恐挑至數尺之下亦如歇馬亭月河一帶開出山根大石未免費力因委員逐段簽試現已簽過數十處並無石底但該工段落綿長萬一開深以後或稍有隔碍之處即於臨時設法妥辦再查該河内共石橋八座查河頭之伊家橋及月河以下之塩石橋其橋下過水甚深惟橋空太窄應於褁頭之外開挖月溝一道以暢水勢除撥用該汛額夫辦理無庸估動錢糧並將木橋四座分别拆留外其萬年橋下石底過水祗有一尺二寸花山橋下石底過水五尺二寸且橋空亦俱窄小與現在估挑寛深處有碍均應另行拆建以通水勢而便行人但該橋雖建自民間今因挑河拆改工程𦂳迫若責令百姓重修未免拮据應即於此案内一併估辦又查該河内東西兩岸有缺口五十八處應於挑工完竣後分别估用柴工逐加堵築以免水勢旁洩不致流緩受淤至其中有在挑工以内之進水各口尤應先為堵閉並將工頭築壩攔截以便戽乾底水挿鍁興挑以上挑河築壩及拆建橋梁各工共估需銀二萬九千四百十七兩零應即動撥司庫銀兩發辦其所需挑河器具照例置備綂扵事竣後核銷臣等因勘估伊家河之便毎日就近查看微山湖水勢現深二丈一尺九寸較定誌尚餘一半必得多路速消方為有禆且此時已近仲冬所有現估之伊家河挑工似應及早辦理於嵗暮趕竣放水冀其多為減洩是以公同商酌請㫖即行趕辦俟大學士公阿桂自浙回東時再行逐加覆勘並可騐收所挑分數臣等計議已定因即照所估工程逐一分定段落遴委河㕔二員州縣十員承辦府㕔四員承催并選擇熟諳工作之地方佐貳及河工汛閘員弁協同辦理其督工之員専委運河道沈啟震住宿工所上𦂳儧挑自開挑日起勒限四十日完竣臣何裕城臣明興仍隨時往來查騐務期如式挑辦依限完工以仰副我皇上厪念河防廣籌宣洩之至意再臣等查伊家河自乾隆二十二年間開成以後因未經定有嵗加疏浚之例以致每年全沙噴注淤墊日厚轉須費帑重挑應請自此次挑竣之後遇毎嵗冬運河估挑時於大小挑募夫工價之外量為増給責成該管道㕔將伊家河一併查勘挑浚務令河底與新建之萬年橋底一律相平庶河身不致復淤即可永資分洩之益矣奏入報聞乾隆四十七年十一月十四日兩江總督兼署河道總督薩載奏言竊臣前接准廷寄欽奉上諭以江南之駱馬湖六塘河鹽河俱係宣洩運河去水之要路尤宜展拓口門使得暢達東注方為妥善即著傳諭阿桂於浙省回京之便順道㑹勘其應趕𦂳籌辦之處一面奏聞一面辦理欽此并接欽差大學士公阿桂札㑹以海州境内之漣河歸海較六塘河為直捷奏明交臣勘辦并囑臣將凡有洩水去路應行辦理之工即行勘辦俟浙省事竣回程再為㑹同覆勘當經臣飛委新任淮揚道師彦公淮徐道劉錫嘏㑹同加總兵銜河標左營副將李永吉河營叅將鄭永泰分投上下查勘籌稟一俟臣安慶事畢即親往覆勘辦理并經恭摺由驛覆奏兹臣在皖接據各道將勘明陸續禀覆到臣查江省邳宿一帶運河上承豫省漫溢入運下注之水東受山東沂䝉諸山之水西受伊家河及藺家山由荆山橋出潘家河靳家河彭家河等處皆分洩微山湖之水滙入運河來源較廣其勢本大兼之本年八月初旬風狂雨驟上游山水陡發河湖異漲以一綫運河受各路来水㡬致不能容納幸賴聖主平日指授機宜預飭廣籌分洩之路如東岸則有駱馬湖尾閭五道引河并劉老澗九孔石閘分洩入六塘河西岸則有十字河臨運壩及顧家庄兩路分洩入黄下游楊家莊口門及李家莊新運口出水俱暢勢若建瓴楊家莊旁并有塩河閘分洩下達莞凟武障等河歸海節節通暢無阻是以八月至今上游邳宿運河内已消水一丈一尺四寸下游中河内已消水九尺二寸劉老澗閘底已消水七尺五寸六塘河已消水七尺六寸現在運中河内僅存水一丈二尺餘寸比之上游東省運河消水實多此即分洩去路疏暢無滯之明騐惟是東省運河七月至九月既止消水二尺以外堤岸不克即時施工民田未能早為涸出耕種則江南之駱馬湖六塘河塩河皆係宣洩運河去水之路自應凛遵聖訓展拓口門使之更為暢達東注查駱馬湖尾閭五道引河口門原經展寛一百七十餘丈今據道將等稟尚可展寛二十四丈共寛一百九十五丈各口過水一丈三四尺及五六尺不等足資宣洩又十字河之臨運壩口門原寛八丈今再展寛十二丈共寛二十丈口門過水一丈三尺不等分洩入黄亦属暢順此兩處應行展拓口門臣已飛飭道將督率㕔營分投趕辦又劉老澗石閘底現止過水一尺五寸若運河水勢再消尺許則該閘不能過水臣現飭道將在于閘旁酌開堤工一處挑挖引渠滙注閘下引河歸入六塘河其六塘河旁之凌溝口寛五十二丈水深一丈五六尺此一路宣洩甚暢毋庸再展其鹽河分洩中河之水由莞瀆武障等河歸海亦属要路現在下游莞瀆河口門寛六十丈武障河口門寛三十二丈水深各有一丈三四尺宣洩甚暢無須展拓上游從鹽閘金門分洩亦無可以拆展惟鹽河舊閘自四十五年改挑李家荘運口時將舊閘改建新河即將舊鉗口草壩堵閉兹臣行據道將等勘禀測量舊鹽河鉗口壩外之水髙於壩裡積水四尺三寸已於十月二十三日將舊壩啓拆使新舊鹽河兩路河頭均在過水滙入鹽河分洩東注亦甚有益以上駱馬湖六塘河鹽河等處臣凜遵聖訓展拓口門現在趕辦之情形也至海州境内之漣河上接凌溝陸家口下至新壩係分洩六塘河之水由恬風渡歸海該河寛七八十丈長七十餘里緣海潮往来年久淤墊上年曽經臣耑委降調之原任臬司袁鑒前往帶同海州知州林光照查勘因水勢汪洋瀰漫難以估挑兹臣復委淮揚道師彦公㑹同叅將鄭永泰往勘據稱該河上二十餘里現有積水下四十餘里係属稀淤仍難施工應俟月餘後上下河身水涸土乾可以措手方能辦理臣查該河如能挑浚深通不惟駱馬湖入六塘河之水分洩歸海較為直捷即與海州沭陽一帶民田亦多禆益此係水利河道應照業食佃力之例先行借帑辦理者但可施工即當興舉容俟月餘後臣再察看情形確估奏辦又河東河臣何裕城具奏擬於徐州北岸潘家屯旁馬家樓一處斜挑引渠一道以達潘家屯引河宣洩入黄兹臣行據淮徐道劉錫嘏㑹同加總兵銜副將李永吉勘禀該處計長一千七百餘丈只有二百三十丈尚属露灘其餘一千五百餘丈現在水深三四尺不等若遇西北風起則普面漫灘俱在水中難以挑挖必須遶越估挑但恐不能得力臣查何裕城所奏開挑馬家樓本属分支仍須滙入潘家屯引河下注如渠頭果可挑至湖心取勢亦較直捷分洩未為無益今既不能接至湖心繞越挑挖亦属無濟且潘家屯等處濱臨黄河非運河東岸駱馬湖等處洩水可比轉瞬黄河歸復故道臨黄各引渠口門均應堵閉是馬家樓一處不特未能興挑即或趕挑完竣亦不及宣洩竟可毋庸糜費又山東之伊家河為分洩微山湖水入江南運河之路據淮徐道劉錫嘏禀稱現今袁守侗㑹同何裕城遵㫖查勘河頭河尾俱属深通惟中間一段稍淺現在估辦查該河河尾係𨽻江南地方水勢既與河頭一律深通自可毋庸挑挖以上漣河及馬家樓引渠并伊家河尾三處或俟水涸施工或開挑無益或水深毋庸挑浚仍俟欽差大學士公阿桂自浙回程臣再面商㑹同勘籌妥議另行具奏所有臣凛遵諭㫖督飭道將勘籌運河淺水各路分别籌辦縁由謹由驛奏聞并繪圖貼説恭呈御覽奏入報聞乾隆四十七年十二月初九日山東巡撫明興奏言乾隆四十七年十一月二十八日承准本月二十六日廷寄欽奉上諭據阿桂奏查勘山東伊家河工程摺内稱該河中段自善莊橋起至楊家樓止共長七千二百四十丈此時業已開工而人夫不多所挑土方尚無分數可計等語伊家河闗係湖水分洩去路現已動工挑挖應照袁守侗等原奏估辦分數速行齊集人夫上𦂳趕辦務期一律寛深不得稍有遲緩著傳諭明興即飭令承辦各員多集人夫上𦂳督催其現在辦出土方共有若干並令切實查收毋致夫役人等稍有偷減將此由五百里傳諭仍將辦理情形據實覆奏並諭阿桂知之欽此仰見我皇上厪念河防至周至宻切查伊家河挑工共長七千二百四十五丈前臣㑹同袁守侗何裕城等逐細核估明確分段派員趕辦並委道府等駐工督催及應先行築壩戽水俟底水涸盡後自開挑日起勒限四十日完竣各縁由均恭摺奏䝉聖鑒查該河近接微山湖口必須築壩堵截湖流再將原有底水全行戽盡方可挿鍁興挑縁該處地勢髙下不同故底水乾涸亦遲速不等計自次第開挑以来臣叠經飛檄該道府㕔縣等加𦂳督催儧辦昨復親往查催現在地當上游底水空乾較早及土性尚鬆施工稍易各段計出土方已挑有四分其地居下游底水急難戽盡並土性堅實及兼有砂礓各段計出土方亦已挑有二分至三分有餘不等通工牽算合計出土數目寔已挑有三分以上工程目下天氣晴明正可乗時儧辦現復嚴飭承辦各員多集人夫併力挑挖總可依限完竣不致遲悮臣仍往來查察務令照依原估寛深丈尺一律如式妥竣斷不敢任夫役人等稍有偷減以仰副聖主慎重要工至意奏入報聞乾隆四十七年十二月二十六日兩江總督薩載河道總督李奉翰江蘇巡撫閔鶚元奏言竊照漣河一道上接凌溝陸家口承受六塘河来源下至新壩由恬風渡歸海為海州境内水利幹河該河原寛七八十丈長七十餘里縁海潮往來年久淤墊又因上游展寛凌溝口下注之水較大海沭地方間被淹浸上年經臣薩載委員前往查勘因水勢瀰漫難以估挑原擬俟今冬水落勘估前欽差大學士公阿桂札知奏明嘱令妥為籌辦奉到硃批是欽此時臣薩載在安慶查辦事件復經耑委道將往勘據稱該河上二十餘里現有積水下四寸餘里水勢甫落尚係稀淤俟月餘後上下河身水涸土乾可以措手即行估辦并經臣薩載於籌洩湖河水勢分别展拓情形摺内繪圖聲明覆奏仰䝉聖鑒嗣大學士公阿桂自浙回程過浦又經商定如水勢未能全涸即於河旁抽挑引渠因勢利𨗳以資宣洩兹臣等復督道將帶同海州知州林光照詳加勘估内自陸家口漣河頭起至下罾口止工長一千三百丈現在水深一二尺應估築攔水壩一道暫且約攔水勢自下罾口至何家莊止工長六千丈仍係稀淤應于西岸灘邊估挑引渠口寛十丈底寛四丈深八尺先行趕挑俟此六千丈挑竣再將上段壩工起除騰放積水接續儧挑其下段自何家莊起至蒲灣莊止舊有溝槽毋庸估挑惟俟開壩之日相機撈淤引水歸槽宣洩入海以上分别淤土乾土築壩挑挖約估需銀六萬八千餘兩臣等現在一面督令道將再加確估核實詳報一面派委海州知州林光照沭陽縣知縣劉若雨贛榆縣知縣李際夀分段承挑并委淮徐道劉錫嘏河營叅將鄭永泰往来督催趕辦務於明春二月以前一律告竣不獨駱馬湖下注六塘河之水由此直㵼歸海可期暢達即海州沭陽一帶民田積水亦得藉以分消永資利賴至該河係水利工程原應照業食佃力之例歸民辦理但海沭地方連年被水成灾現䝉聖恩賑恤民力實属不繼臣等查有王亶望在揚家人卞樹卞松等入官家産并將蒋全迪在揚行塩貲本共銀十六萬三千餘兩經塩臣伊齡阿追變齊全奏明遵㫖解交江寧藩庫收存以備工程等項之用今海州境内挑浚漣河攸闗地方水利要工合無仰懇皇上天恩俯准在於此項銀兩先行借動辦理臣等仍飭司籌議在於海州沭陽二州縣民田内按畝攤徴分作六年還欵如此則濱海民生感沐皇恩於無既矣再明春豫工告成後江南臨黄之潘家屯各引河均須堵閉上㳺来水仍須歸於江南運河前經大學士公阿桂商及劉老澗以上二百餘里中以一線運河承受上游来水恐驟難消涸擬俟漣河挑竣駱馬湖尾閭洩水必暢彼時湖面騰空自可容納應將沿湖之馬莊閘萬莊閘竹簍閘䡐車頭王家溝栁園頭等閘壩提放之外再在湖邊多開口門數處俾資暢洩則上游東省水勢更易減落臣等現在籌酌臨時相機辦理奏入報聞乾隆四十七年十二月三十日山東巡撫明興奏言為恭報伊家河完工日期並放水情形事竊照伊家河工程已挑分數節次經臣奏報自本月初以来臣往来工次率同運河道沈啓震等上𦂳督催誠恐承辦各員因挑深之後砂礓較多或致稍有稽滯查該工有闗宣洩機宜必得早一日完工庶可多消一日之水臣因復親駐工所責令各該員加倍添夫畫夜儧辦幸賴聖主洪福連日天氣晴和人夫力作倍極踴躍已於十二月二十三日將通工挑挖完竣臣隨照原估寛深丈尺自工頭至工尾七千二百餘丈之内逐段量騐俱属相符並無草率偷減并查勘應行拆改之萬年花山二橋底俱已照估落低與挑成之河底一律平順其鹽石等橋應於橋旁開溝展寛之處亦已趕辦如式隨令將挑工内各段壩埂自下而上盡行拆除其河身繞灣處所亦即將灘嘴挑切順勢一面察視工頭壩外湖水積髙勢頗湍湧臣隨於二十五日督同道府等迅將頭尾兩壩全行啓放水勢奔騰下注頃刻間已由工尾直達江境運河其情形實為通暢查微山湖水自前月下旬至今陸續又消水一尺現深二丈零四寸比七月間盛漲時已共消水五尺二寸今伊家河挑成放水之後去路已廣從此日就減消實於宣洩之道大有禆益至在工人夫本係就嶧滕附近一帶被水之區催覔應用數十日以來於每日恩賑之外復得領支工價今挑工完竣正當嵗暮之時該人夫等既幸飽煖有資並冀漲水漸消沿湖地畝即可涸出耕種無不懽忻鼓舞感頌皇仁謹由驛馳奏仰慰聖懷奏入報聞欽定南巡盛典卷四十八
