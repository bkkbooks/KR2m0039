  text: 欽定四庫全書欽定南巡盛典卷七十七閲武
  hash: sha256:06a6f301f7571e843182bae8efd40c01605e308a1949f8271d369988168658a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_110-1a, image: WYG0659/WYG0659-0235c.png}
body:
  text: 乾隆二十七年三月初一日杭州將軍福祿閩浙總督楊廷璋浙江巡撫莊有恭浙江提督王無黨同奏言浙江滿營綠營各官兵馬步技勇自乾隆二十二年荷䝉皇上校閲後迄今又歴五載經臣等督飭將備勤加訓練不時操演不敢稍有懈弛兹恭逢鑾輅重臨將士歡騰踴躍急思獻技以展報効之誠臣謹於杭州省城内滿營教塲預備滿營操陣綠營操陣并照前兩屆預備滿營綠營合操陣式伏候皇上訓示應閲何項屆期祗候恭請大閲再閩省籐牌兵及浙閩二省挑取之各種雜技兵丁一并帶齊恭候睿覽奏入得㫖滿漢合操乾隆二十七年三月初四日閩浙總督楊廷璋奏言臣自福建帶來籐牌兵八隊共計二百二十二名硬弓兵十名馬上三鎗兵十名擬於初五日在滿營教塲於滿漢合操之後恭備簡閲奏入報聞乾隆二十七年三月初四日閩浙總督楊廷璋奏言臣於閩省水兵内挑有泅水兵數十名扒桅兵數十名委官管帶來浙於錢塘江演試習練敬備御閲先經奏明循照前屆於觀潮樓前預備今因樓下漲沙綿逺約二里有餘水兵於該處呈技閲視未能親切今改於望江亭預備祗候聖駕臨幸六和塔時令各兵分别演試奏入報聞乾隆二十七年三月初九日大學士公傅恒奏言上次賞賜浙省合操大臣官員兵丁人等將軍總督以下防禦以上綠營大小官員俱經分别賞賜緞疋驍騎校兵丁俱各賞給一月錢糧千把外委綠旗兵丁賞賜奬武牌帶領此項兵丁官員分别賞賜緞疋金牌此次閲操浙江滿營綠營大小官員兵丁及浙閩籐牌兵馬上鎗兵丁並帶領此項兵丁官員俱請照上次賞賜鳥鎗兵中三鎗者五人每人賞給銀牌二面中兩鎗者五人每人賞給銀牌一面所有應賞大小官員職名兵丁數目賞賜緞疋錢糧金牌銀牌數目另繕清單一併進呈所有賞給驍騎校滿兵一月錢糧銀兩交行在户部於兩淮鹽項銀兩内動用所有賞賜緞疋金牌由廣儲司支取奏入得㫖莊有恭照將軍總督例賜之餘依議乾隆二十七年三月二十六日大學士公傅恒奏言遵㫖賞給江寜省演陣火臣官員兵丁一事查得上屆將軍總督以下防禦以上大臣官員等俱分晰賞給緞疋驍騎校兵丁俱賞一月錢糧綠營兵丁賞奬武銀牌此次江寜省演陣大臣官員兵丁等俱請照上屆之例賞給所有演陣之大臣官兵等數目並賞給緞疋錢糧銀牌數目另繕清單一併進呈所有賞給緞疋銀牌在廣儲司支領外賞給驍騎校兵丁一月錢糧交户部飭行布政司庫銀内動支奏入得㫖如所議行乾隆三十年二月二十四日杭州將軍福祿閩浙總督蘇昌浙江巡撫熊學鵬浙江提督武進陞奏言浙省滿營綠營各官兵馬步技勇自乾隆二十七年荷䝉聖主幸浙校閲後迄今又歴三載經臣等督飭協領將備等勤加訓練不時操演不敢稍任廢弛兹恭逢鑾輅重臨將士歡騰踴躍急思獻技以展報効之誠臣等謹於杭州省城滿營教塲預備滿兵陣式綠旗兵陣式伏候皇上訓示應閲何項屆期恭請大閲再閩省籐牌兵及浙閩二省挑取之各項雜技兵丁一併帶齊敬候睿覽其乍浦水操一項先經前督臣楊廷璋具奏欽奉硃批不必預備合併陳明奏入得㫖滿漢合操同日閩浙總督蘇昌奏言歴屆翠華南幸俱經前督臣將閩省籐牌兵挑選二百餘名帶赴浙省仰荷聖主恩准預備閲視各官兵叨䝉恩賞榮幸非常至今感淪肌髓兹欣聞聖主載舉時巡盛典各兵丁無不踴躍歡欣心殷獻技争趨恐後臣隨酌調漳泉二屬牌兵二百餘名飭委將領備弁管帶來浙適漳州鎮總兵任澍奏准赴浙接駕臣隨囑令將牌兵再加操演純熟配成隊伍於省城滿營教塲預備敬候大閲滿洲綠營官兵後即令牌兵演技恭備御覽再閩浙二省各營内有硬弓馬鎗跑解騙馬各雜技兵丁亦各酌挑數名隨營伺候其閩省泅水扒桅各兵亦照前在錢塘江預備祗候聖駕臨幸觀潮樓以俟親閲奏入報聞乾隆三十年閏二月初七日閩浙總督蘇昌奏言臣於閩省水兵内挑選泅水兵數十名扒桅兵數名委官管帶来浙於錢塘江演試習練敬備御閲先經奏明伏查錢塘江觀潮樓前沙消水近各水兵於該處呈技閲視尚屬親切臣敬謹預備祗候聖駕臨幸觀潮樓時令各兵分别演試奏入報可乾隆三十年閏二月初十日大學士公傅恒奏言遵㫖賞賜浙省合操大臣官員兵丁人等一事查得上次賞賜浙江操兵之大臣官員兵丁人等自將軍總督以下防禦以上大臣官員及綠營大臣官員俱經分别賞給緞疋驍騎校兵丁俱賞一月錢糧綠營千總把總外委百總兵丁賞給奬武銀牌浙閩舞牌馬上鎗各兵等俱經賞給奬武銀牌其領操官員分别賞給緞疋金銀牌每人銀牌二面中二鎗者加賞銀牌一面今次除將合操之浙江滿洲綠營大臣官員兵丁人等及浙閩舞牌馬上鎗兵丁領操之官員等照上屆賞賜外請將鎗兵内中三鎗者二名每人加賞銀牌二面中二鎗者四名每人加賞銀牌一面復查十六年二十二年間浙江巡撫俱入於提督副都統等次内賞賜惟二十七年奉㫖莊有恭照將軍總督一體賞賜今次熊學鵬或照提督副都統或照將軍總督賞賜之處伏候指示遵行謹將應賞大臣官員職名兵丁數目賞賜緞疋錢糧金銀牌面數目另繕清單敬呈御覽請將賞給驍騎校兵丁銀兩交行在户部於兩淮鹽課内動支所賞緞疋金銀牌面於廣儲司支取奏入得㫖熊學鵬照將軍總督例賜之餘依議乾隆三十年三月初八日大學士公傅恒奏言遵㫖查賞江寜合操大臣官員兵丁上屆自總督以下守備等官以上大臣官員俱經分别賞給緞疋驍騎校領催兵丁賞給一月錢糧綠旗兵丁賞給奬武銀牌此次合操江寜省城大臣官員兵丁請俱照上屆賞給並將應賞之大臣官員兵丁數目及放賞之緞疋錢糧銀牌數目另繕清單恭呈御覽除所需放賞之緞疋銀牌由廣儲司領取外驍騎校滿洲兵丁所得應賞一月錢糧交户部動用藩司庫項賞給奏入得㫖如所議行乾隆四十五年二月二十三日閩浙總督三寳福建提督黄仕簡奏言福建水師兵丁演試水操泅水扒桅等技上屆聖駕幸浙曽䝉賜覽臣於上年調任閩浙抵任後接准前督臣楊景素札稱赴京陛見業經奏明聖駕南巡時閲視可帶至浙江在六和塔江面預備當經臣等挑取熟習水性兵丁現已帶至杭州惟查六和塔江面現在北面漲沙較逺水操船隻難以遥視查上屆恭逢聖駕南巡演試水技兵丁俱在秋濤宫今次臣等查明該處冬間雖覺江水稍淺交春之後連得雨澤江水漸深堪以操演應請仍在秋濤宫預備屆期恭請閲視奏入報聞同日杭州將軍傅玉閩浙總督三寳浙江巡撫王亶望浙江提督劉鑑杭州副都統舒楞額乍浦副都統永慶奏言浙江省滿營綠營官兵經臣等督飭協領將備等勤加訓練不時操演不敢稍任廢弛伏查乾隆三十年荷䝉聖主幸浙校閲滿漢合操之後迄今已十餘載兹恭逢鑾輅載臨各營將士歡欣踴躍急思獻技以展報効之誠臣等謹於杭州省城滿營教塲預備滿兵陣式綠旗陣式并照歴屆預備滿營綠營合操陣式伏候皇上訓示應閲何項屆期恭請大閲再閩省籐牌兵丁經臣三寳與陸路提臣俞金鰲照例挑取熟練兵丁現帶至浙並將閩浙二省挑取之各項兵丁一併帶齊敬候聖覽奏入報聞乾隆四十五年三月初六日尚書公福隆安奏言遵㫖賞賚浙江省合操大臣官員兵丁一事臣查得上屆所賞浙省合操大臣官員兵丁將軍總督以下防禦以上大臣官員俱各分别賞給緞疋驍騎校兵丁等各賞給奬武銀牌浙江福建牌兵打馬上鎗兵俱賞奬武銀牌領隊官員分别賞給緞疋金牌此次浙江合操滿漢大臣官員兵丁浙江福建牌兵打馬上鎗兵等領隊官員均照前例賞給外復查三十年浙江提督曽照將軍總督一例賞賚此次劉鑑或照副都統或照將軍總督例賞賚之處恭候諭㫖欽遵外謹將應賞大臣官員銜名兵丁額數并賞緞疋錢糧金銀牌面數目另繕清單一併恭呈御覽所有驍騎校滿洲兵丁應賞銀兩行文行在户部於兩淮鹽銀項内動支所有緞疋金銀牌面於廣儲司支取奏入得㫖劉鑑照副都統例賜之餘如所請乾隆四十五年三月二十八日尚書公福隆安奏言查得江寜省閲兵大臣官貟兵丁賞賚上次將軍總督以下防禦以上大臣官員分别賞給緞疋驍騎校領催兵丁俱各賞給一月錢糧綠營兵丁賞給奬武銀牌此次閲兵江寜省大臣官員兵丁俱照上次之例賞給其應賞閲兵大臣官員兵丁數目及賞給緞疋錢糧銀牌數目另繕清單一併進呈所賞緞疋銀牌由廣儲司支領外其賞給驍騎校滿洲兵丁一月錢糧交與户部由藩庫銀内動用奏入報可乾隆四十九年三月十二日杭州將軍常青閩浙總督富勒渾浙江巡撫福崧浙江提督喬照杭州副都統永慶奏言浙江省滿營綠營官兵恭值翠華臨幸歴䝉恩賜校閲兹欣逢鑾輅載臨各營將士踴躍騰歡咸思獻技臣等現於杭州省城滿營教塲敬謹預備分别繪具分操合操圖式伏候聖主臨省示期大閲再閩省籐牌兵丁先經臣富勒渾與陸路提臣常青照例挑取熟練各兵派員帶領来浙與閩浙二省挑取各項兵丁一并帶齊敬候宸覽奏入報聞同日閩浙總督富勒渾浙江巡撫福崧福建水師提督黄仕簡奏言福建水師兵丁演試水操及泅水扒桅等技恭值聖駕南巡歴䝉賜閲兹欣逢鑾輅載臨臣富勒渾臣黄仕簡挑取熟習水性兵丁派員帶領來浙臣富勒渾並即㑹同臣福崧勘擇梵村地方江深水緩堪以依法駕駛隨即恭建行殿繪具圖説敬謹預備查該處係自西湖行宫至雲棲順道伏候聖主幸浙示期賜閲奏入報聞欽定南巡盛典卷七十七
