body:
  text: 乾隆十六年辛未皇上駐蹕淮安賜總漕臣瑚寳御書額曰天儲永裕駐蹕揚州賜兩淮鹽政臣吉慶御書額曰筴海流膏駐蹕蘇州賜江蘇巡撫臣王師御書額曰呉㑹風清賜蘇州織造臣圖拉御書額曰采章明備賜致仕禮部侍郎臣沈徳潛御書額曰道存風雅駐蹕江寧賜兩江總督臣黄廷桂御書額曰秉鉞三江賜江寧将軍臣錫爾璊御書額曰整武鍾山賜副總河署安徽巡撫臣張師載御書額曰勤襄保障賜安徽巡撫臣衛哲治御書額曰化洽皖江賜江寧織造臣髙晉御書額曰黼黻文明駐蹕杭州賜閩浙總督臣喀爾吉善御書額曰海疆制閫賜署浙江巡撫臣永貴御書額曰湖山膏雨賜署浙江巡撫臣永貴之祖母禄布哩氏御書額曰節勁霜筠賜浙江提督臣呉進義御書額曰矍鑠専閫賜署浙江布政使臣徳福御書額曰布徳賜浙江按察使臣葉存仁御書額曰秉憲賜協辦大學士吏部尚書臣梁詩正之父梁文濓御書額曰湖山養福賜協辦大學士吏部尚書臣梁詩正御書額曰台階愛日賜一百三嵗翰林院侍講臣劉起振御書額曰詞垣耆瑞乾隆二十二年丁丑皇上駐蹕徳州賜衍聖公孔昭煥髙祖母黄氏御書額曰六代含飴賜山東巡撫臣鶴年御書額曰海嶽宣勤駐蹕淮安賜總河臣白鍾山御書額曰懋襄底定駐蹕鎮江賜在籍大學士臣史貽直御書額曰緑野頥和駐蹕惠山寺賜在籍吏部侍郎臣嵇璜御書額曰奕世宣勤賜國子監司業銜臣顧棟髙御書額曰傳經耆碩駐蹕蘇州賜蘇州織造臣安寧御書額曰虔共服采賜在籍禮部尚書臣沈徳潛御書額曰詞宗耆碩駐蹕江寧賜兩江總督臣尹繼善御書額曰恵洽兩江又賜督署齋額曰不繫舟賜安徽巡撫臣髙晉御書額曰江城屏翰賜安徽布政使臣託庸御書額曰宣恵又賜藩署齋額曰瞻園駐蹕雲龍山賜徐州府署御書額曰司牧又額曰籌河莅止駐蹕杭州賜閩浙總督臣喀爾吉善御書額曰耆臣清徳賜浙江巡撫臣楊廷璋御書額曰澤宣浙水賜協辦大學士吏部尚書臣梁詩正之父梁文濓御書額曰萊衣晝永乾隆二十七年壬午皇上駐蹕常州賜刑部侍郎臣錢維城之父錢人麟御書額曰蘭陔眉夀駐蹕蘇州賜在籍禮部尚書臣沈徳潛御書額曰九袠詩仙駐蹕杭州賜閩浙總督臣楊廷璋御書額曰恵孚兩浙賜在籍刑部尚書臣錢陳羣御書額曰香山耆碩乾隆三十年乙酉皇上駐蹕絳河行宫賜直𨽻總督臣方觀承御書聨曰嵗收即是君臣福民樂多縁風雨調駐蹕臨清賜山東巡撫臣崔應階御書額曰績懋東邦駐蹕淮安賜江南河道總督臣髙晉御書額曰底績宣勤駐蹕揚州賜原任順天府府尹臣程盛修御書額曰春暉延景駐蹕寄暢園賜原任内閣學士兼禮部侍郎臣鄒一桂御書額曰畫禅頤夀駐蹕蘇州賜江蘇巡撫臣荘有恭御書額曰政成入贊駐蹕杭州賜浙江巡撫臣熊學鵬之父熊本御書額曰禄養延祺賜閩浙總督臣蘇昌御書額曰恵孚海嶠賜浙江巡撫臣熊學鵬御書額曰浙水風清賜浙江按察使臣李治運之母張氏御書額曰萱榮頥慶賜一百七嵗遂昌縣訓導臣王世芳御書額曰黌席期頥賜在籍工部侍郎臣范燦御書額曰耆英介景賜在籍宗人府府丞臣徐杞御書額曰湖山香洛乾隆四十五年庚子皇上駐蹕蘇州賜原任陜西巡撫臣畢沅母張氏御書額曰經訓克家乾隆四十九年甲辰皇上駐蹕淮安賜河道總督臣李奉翰御書額曰保障宣勤駐蹕江寧賜兩江總督臣薩載御書額曰政洽東南欽定南巡盛典卷七十三
