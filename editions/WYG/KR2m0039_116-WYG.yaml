body:
  text: 欽定四庫全書欽定南巡盛典卷八十三名勝直𨽻山東盧溝橋在廣寧門西南三十里盧溝即永定河發源代郡古桑乾水也石橋横跨二百餘步剏於金明昌間名曰廣利康熙八年重建聖祖仁皇帝製文紀石南有河神廟沙平坡轉古樹蒼然東為拱極城百雉崇墉環若雲幄橋當往來孔道輪蹄絡繹每曉星初霽素月曖空西山諸峯羅列如畫乾隆辛未嵗御書盧溝曉月並賜以詩敬勒碑於亭以誌勝景云郊勞臺在良鄉縣南乾隆己夘嵗耆定凖夷蕩平回部闢疆二萬餘里露頂奮肘候月歸琛者以億萬計庚辰三月将軍兆恵等振旅凱旋築臺建大纛七先期皇上駐蹕黄新荘行宫於是日設鹵簿陳鐃吹親勞郊外行抱膝禮以示褒異諸将士次第慶賞舎爵䇿勲禮成御製詩章紀事丙申四月将軍阿桂等平定兩金川再舉郊勞盛典如前儀駿業鴻庥昭兹來許梯航所㑹瞻仰靡極宏恩寺在良鄉縣南門臨古道繚以周垣環以叢木蒼翠陰森為逰人憩息之所六時清梵一杵踈鐘響出林表初不知在輪轅雜還間也聖祖仁皇帝翠華三幸賜書大願慈航額並題詩勒石皇上時巡道經斯寺天葩煥采普蔭曇華洵郊坰之福地云乾隆辛未御書額曰秀挹龍泉永濟橋在涿州城北跨巨馬河剏於前明因河流南徙橋失其用乾隆庚辰嵗勅建新橋而改舊橋為涵洞十有八平其脊以連新橋迤北之尾通長二百丈有竒橋南表以坊字輔以樓欄西曰攬翠東曰延清地列望𦂳為九逵輻輳之㑹自此民無病涉車無留軌衆流歕欱沃衍神臯榆栁垂陂蒲葦夾岸橋䦨轉處西連髙阜建亭其上奉御製碑文與盧溝橋御碑亭輝映百里為畿南雄搆焉涿州古涿鹿之地黄帝所都也魏土地記下洛城東南六十里有涿鹿城城東一里有阪泉泉上有黄帝祠今州城南廟祀黄帝為藥王猶髣髴其遺蹟皓壁暠輝丹楹歙赩四圍濃翠影罨繚垣乾隆辛未年㳟葺行宫於左平岡迤邐環若屏嶂石徑紆折亭館周通飛閣搆其旁憑髙遐矚控山襟河縈畿帯甸雲連萬室塔影浮空信為雄輔形勝之最丁丑御書額曰秀野迎薫曰黄圖攬勝曰觀風自近聮曰雨暘時若天庥應風日恬和物象舒又聮曰梵響清嚴天籟轉香燈華曜月輪明又聮曰山容積雪融和盎物象熈春詄蕩披壬午御書聮曰春色芳菲入圖畫化機活潑悟魚鳶乙酉御書聮曰勒寒花樹芳遲發向暖郊原潤逮耕紫泉在新城縣西考水經注巨馬水上承督亢溝於逎縣東東南流厯紫淵東今按方位紫泉即紫淵其名舊矣源出龍堂邨逕釣魚臺繞郭而西厥有奥區碧流環帯如練乾隆辛未嵗建行陛於中畫舫風亭清幽颯爽埭旁植修竹拳石秀峙畧彴紆迴畿南名勝首屈一指焉辛未御書題十景額曰敞軒屏山鏡湖舫室㯶亭虹橋魚罾石逕竹埭箭㕔壬午御書額曰景湛清華曰雲川飛泳聮曰澗筑松濤相問答峯容波態總氤氲又聮曰石泉不改琤琮主雲巘常看圖畫横又聮曰圖畫竒参窗户裏筑琴響逓榻床邉又聮曰法輪自轉光明藏龍象經行兜率天又聮曰松陰真是葢鶴跡自成書趙北口在任邱縣北五十里即趙堡口後漢書公孫瓉傳所稱燕南垂趙北際也亘以萬栁堤橋十有一虹跨其上為南北通衢西淀諸水由此東注聖祖仁皇帝舉水圍之典葺治行殿並於端村郭里口圏頭各建一所皇上式繩祖武每當春省之期輙命水虞修故事焉時巡南國屢駐青旂水檻風廊映帯左右晴空一碧寫詠鳶魚仿彿江南圖畫也乾隆辛未御書軒額曰湛持曰天水相與永又齋額曰渌浄又樓額曰懐清又聮曰香閣結雲瞻寳相花臺飛雨現金仙韓太傅祠在任邱縣南十里四善村村即漢韓嬰故居也嬰於孝文時為博士景帝時為常山王太傅推詩人之意作内外傳數萬言與齊魯二家並稱燕趙言詩者多宗之兼著易傳惟韓氏自傳其學有授經臺在祠之後曲徑䆗窱卉木環蔭塍畦綺錯含秀鋪棻乾隆壬午嵗仍舊宇脩葺為行宫牆垣簡樸欄檻清曠與逺坰雲樹相映帯皇上即景懷古易村名曰思賢並御書額曰賢里諏風又堂額曰授經聮曰麗日和風春浩蕩花香鳥語物昭蘇又聮曰縈迴水抱中和氣平逺山如藴藉人又聮曰纔聞善事心先喜每見竒書手自抄又聮曰書圃禮園無斁好甌香研淨有餘欣又聮曰庭饒芳毯鋪生意座有芸編結古歡又聮曰香凝貝葉荘嚴具寳湧蓮花福徳多毛公祠在河間縣南太平荘後漢書儒林傳毛萇武帝時為河間獻王博士治詩别於齊魯韓三家授同國貫長卿平帝時立於學祠為元總管王思誠建堂階樸素叢木蒼欎清流襟其北苔垣竹牖倒影玻璃乾隆壬午嵗㳟搆行館於左繕葺規模不事雕文藻繢軒忩瀟灑天筆揚葩風雅流傳於茲勿替矣壬午御書額曰陳詩展義聮曰澄懐茹古涵今處悦志麥疇黍隴間又聮曰問字惟應知稼穡著書何必注蟲魚又聮曰生機對物觀其妙義府因心䕶所寧又聮曰雲現吉祥垂妙鬘花增智慧湧優曇乙酉御書聮曰獨喜惜陰澄静照更因稽古契遐心又聮曰無邉生意歸芳甸有象清明繪野郊庚子御書聮曰縱目恰宜遇寥朗託懷又喜得清舒紅杏園在獻縣南三十里河間獻王日華宫故址也獻王好儒術置客館二十餘區一時文學士多從之逰明為御史王注别墅環植紅杏數百株故名有亭翼然有池泓然月橋形似半規曲通臺榭乾隆辛未嵗仍舊制葺為行館駢柯晻葉萬蕚絢春縐縠漣漪菰蘆一碧禽魚翔泳多㑹於欄檻之前爰惬宸襟邀睿藻焉辛未御書額曰緑淨又聮曰却喜名園傳翰墨亦饒幽趣足徜徉壬午御書聮曰萬頃緑雲秋麥蔚千村紅雨杏花深甲辰御書聮曰平野潤含雪後澤逺峯輕作晚來陰絳河自故城流入又北逕景州西水經注絳瀆西至信都東連廣川縣之張甲故瀆同歸於海故漢書地理志禹貢絳水在信都按故城漢廣州治景州属信都國河即絳瀆之遺也斜抱村墟環罨烟樹中搆行館為駐蹕之所乾隆乙酉御書額曰展義齋曰頥志堂曰通渌橋曰澹懐室曰延月臺曰涵虚舫曰葆光洞曰四照亭聮曰康衢敷恵澤喜洽畿南樸宇適􅄼居塵清水北又聮曰土香階草纔蘇紐風細盆梅欲放榮又聮曰半窓愛日虚而朗一水䕶門湛且清開福寺在景州治西北前明舊刹也層檐疊架博敞豊麗傑閣峙其旁名曰千佛前有古塔相傳隋時建累十有三級覆以鐡籠銅瓶環以瑜欄石砌盤回陡絶洞户豁然四圍周眺蓚城萬雉闤闠村墟櫛比鱗次康熙丙戍嵗聖祖仁皇帝嘗駐蹕焉皇上經臨疊敷宸藻慧日祥雲永麗於蘭若間矣恩泉在徳州南門外川原曠衍林木叢茂撫臣就其地㳟建行宫皇上南巡入東省第一程也乾隆丁丑而後屢邀駐蹕疊煥宸章鬲氏遺封遂為勝地矣壬午御書額曰海岱觀風曰念民依聮曰衆香馥郁凝華葢多寳荘嚴䕶梵文又聮曰徳水縈迴涵化澤康衢詄蕩聴讙謡庚子御書聮曰碧窗試搴幌緑野遍興鋤曲陸店在平原縣西北三十里乾隆丙申嵗皇上時巡東岳撫臣㳟建行宫以駐清蹕嗣後翠華南幸睿藻屢頒從此趙勝故封管輅舊里常輝映千古矣庚子御書額曰靄緑曰閱芳聮曰四壁圖書鑑今古一庭花木驗農桑李六店在平原縣東南十五里與平原嶺相近舊治平原有望逺臺一名平原嶺登髙平眺百餘里如在几席乾隆辛夘嵗撫臣搆行殿數楹仰邀天藻額其堂曰醇和葢飲和食徳返樸還醇具於聖主省方騐之矣庚子御書聮曰麗日和風春澹蕩花香鳥語物昭蘇又聮曰徧野麥針含露潤夾衢栁線􅇢􅃄輕又聮曰無邉生意歸芳甸有象清明繪野郊又聮曰心田洗淨全如水鼻觀清芬詎必蓮又聮曰得句因新意躭書是宿縁晏子祠在齊河縣西北二十五里地名晏城為齊晏嬰采邑太平寰宇記禹城縣有晏嬰城即此也乾隆乙酉嵗撫臣於祠之西㳟搆行宫瓦屋數楹不假雕飾乾隆庚子御書聮曰軒亭喜淳樸甌研總清嘉又聮曰居中攬外襟懷暢擊轂摩肩職殖殷又聮曰麗日和風方蕩漾輕荑嫩草已芊眠潘村在長清縣東北旁有朶子諸山巖壑參差樹林蓊欎與綺塍繡壤相交錯乾隆辛夘嵗撫臣㳟建行館數椽亭榭清幽翠葢頻臨宸襟逺鬯自此以南靈巖泰岱迤邐相属為東省鉅觀庚子御書聮曰墨斗研山足遣興琪花瑶草底湏妍又聮曰舉目峰巒惬遥望甄心翰墨挹清芬甲辰御書聮曰勒寒花樹芳遲發向暖郊原潤逮耕又聮曰春隴詩成滿豳野雲巖畫意妙房山崮山在長清縣東南三十里山容秀削翠柏盈巔望如螺髻乾隆三十六年㳟建亭館數楹以供宸眺青崖五峯諸山勢若環拱靈巖山在長清縣東南九十里一名方山于欽齊乗云即水經所謂玉符山也上有黄龍甘露獨孤雙鶴卓錫石龜六泉下為靈巖寺寺内有山石色黒繡如鐡覆地如架裟披摺之状土人謂之鐡袈裟山相傳為希有佛出現之所寺建於元魏至唐復移於山下峰壑秀美謁岱嶽者必紆徑以造焉乾隆丙子嵗撫臣於寺之舊址㳟建行殿采椽不斵尚存茅茨土階之風而山色溪光足供宸玩十道圖以靈巖與閏之棲霞台之國清荆之玉泉稱為四絶宜其屢邀睿藻雲漢同昭矣丁丑御書額曰卓錫名藍又書愛山樓額曰巡方攬秀又書各景額曰巢鶴巖雨花巖甘露泉卓錫泉白雲洞鐡袈裟摩頂松聮曰竒松爾日猶回向詭石何心忽㸃頭庚子御書聮曰巖壑有竒趣烟雲無盡藏又聮曰卧楹冩霧軒窗逈飛觀圖雲翰墨香又聮曰翠含螺黛山迎户影覆曾青樹隱天又聮曰入幽已自清塵念造極還堪縱逺眸又聮曰俯臨常似披圖畫得契宛堪悦性靈甲辰御書聮曰便有香風吹左右似聞了義示縁因泰嶽在泰安縣北周圍一百六十餘里從麓至頂四十八里凡十八盤而上中峰最髙處為岱頂世所稱玉皇頂也其支峯别阜為峯為嶺為巖為厓為洞為峪凡百餘名而南天門十八盤山勢尤峻非架木為橋不能髙陟乾隆二十二年欽奉上諭登山路逕或乗馬或用山輿即緩步徐行亦何不可不必搭架天橋致多糜費故厯次車駕登岱皆策騎而上絶無修繕之煩若紅門玉皇廟朝陽洞及岱頂諸名勝之尤著者經撫臣㳟建行軒數楹謹各綴説於後紅門循山麓而上徑路逶迤至是則山勢若翼闢塗而升盖登岱之初級也紅門之西㳟葺數楹以備宸逰憩息玉皇廟在迴馬嶺稍南峻閣聳峙俯瞰萬象乾隆十三年御題曰壺天閣西有倚山亭閣東建屋數楹以供宸眺朝陽洞由三蹬厓盤路峻削至五松樹則地平如掌曲徑縈紆其上面對青松曦光四徹精舎三間宸章稱其清潔厯届題詠俱摩勒崖壁名山聖藻千古遭逢白鶴泉在泰山南麓宋升元觀故址相傳有白鶴啄土得泉因而名之泉出石罅水聲鍧然精瑩澄潔為泰山勝地撫臣於其上㳟建行宫萬壑千巖延入窗牖宛如圖畫乾隆辛夘嵗㳟逢鑾輅初臨賜體元堂匾額仰見聖天子育物宣仁之至意云庚子御書額曰延緑曰積芳聮曰景清神謐天常泰水趣山情靜可論又聮曰築館恰疎泉澄源課治省方近瞻嶽育物宣仁又聮曰句披月脇天心妙窗納千岩萬壑風又聮曰圖畫竒恭窗户裏筑琴響逓榻牀邉又聮曰階下泉聲荅松籟雲間樹色隠峰螺又聮曰㡬層峰色背檐挹一片波光面座迎又聮曰云似畫時偏愜照欲吟詩際恰攄思又聮曰化工真閱烟霞表道筦非從色象窺甲辰御書聮曰靜與心謀寧有色香生鼻觀亦非空岱廟在泰安府治之西雍正七年敕修極為閎麗西偏有環詠亭厯代題詠甚富東有漢柏黛色霜皮亭亭矗立乾隆三十五年遵㫖重修丕增式廓御製碑文奎章炳耀撫臣復於此㳟搆行殿數楹皇上省方秩祀胥於是乎憩適焉對松山在岱嶽南麓由朝陽洞而上巉巖碨礧兩山對峙竒松萬樹從峭壁中鬅鬙而出鱗鬛之而蒼然雲表葢靈泉秀石之所鍾也乾隆丙申嵗大吏葺治數椽以備臨幸烟巒霧葉矯若游龍相間於雲旗翠䍐之間有符睿賞四賢祠在泰安縣西南魏家荘祀宋胡瑗孫復石介孔道輔四賢也府境諸名蹟皆依山取勝至是則土壤平曠林木欎蔥登陟之勞於是少憩撫臣於祠西㳟建行宫以駐清蹕乾隆庚子御書聮曰閒庭不改風還月欹案依然易與詩又聮曰閒披芸簡窗前朗靜聴松風户外敲又聮曰素壁題詩還自檢明窗披帙雅相親孔廟在曲阜縣城内即古闕里面洙背泗矍相圃之東北也雍正七年奉勅重建規制崇閎較之厯代益加壮麗我皇上東巡山左既䝉特詣闕里躬親致祭而自二十二年以後省方江浙鑾輅往還復謁廟瞻拜尊崇之典葢自古所未有也孔林在曲阜縣城北泗水上繞以周垣圍徑數里康熙二十三年聖祖仁皇帝詣聖林詔於原額地外增擴地十一頃十四畝有竒除免糧課雍正八年奉詔重修聖林門堂殿亭益加宏麗是時慶雲疊見瑞應丕昭我皇上繩武時巡親詣致奠尊師重道隆禮有加度越前古矣中水在泗水縣城北八里盖居汶南泗北之中地隣曲阜近聖之居栁墅花村風景殊别乾隆辛夘嵗㳟建行館御題齋名曰致本復賦宸章以志之仰見聖心厪念民依無時或釋云庚子御書額曰風醒曰露香聮曰書圃禮園無斁好甌香研靜有餘欣又聮曰觸目無非逺塵俗㑹心皆可入研覃又聮曰萬頃緑雲秋麥蔚千邨紅雨杏花深又聮曰展圖恰對景清候得句多於神謐餘又聮曰詩情詎花栁樂意在農桑又聮曰花如濯錦芳迎埒草盡貫珠潤叠茵又聮曰虚窗納逺聊披景沃壤融膏見種田又聮曰風前畫意輝横埭雨後雲容罨逺巒甲辰御書聮曰不生波處心恒定大寂光天相總融古泮池在曲阜縣東南隅其地舊有泮宫臺按水經注靈光殿東南即泮宫也臺髙八十尺臺南水東西一百步南北六十步臺西水南北四百步東西六十步臺池咸甃石為之即魯頌所謂思樂泮水是已乾隆乙亥嵗撫臣㳟建行宫屢邀臨幸壬午復䝉御製古泮池證疑一篇藻芹風雅萬禩不磨矣孟廟在鄒縣城南右臨大道北去孟子故宅三十餘里宋宣和間移建於此規模宏敞鄒嶧山在其東南蔚然深秀於逺眺為宜皇上南巡迥鑾道經鄒縣並䝉親詣拈香洵稱尊儒鉅典乾隆丁丑御題額曰道闡尼山聮曰尊王言必稱堯舜憂世心同切禹顔泉林在泗水縣東五十里水經注陪尾山之陽四泉並發故謂之泗今泗源左右有泉數十互相灌輸合而成流故又名泉林康熙二十三年聖祖仁皇帝駐蹕於此御製記文勒之碑石鹺臣於御碑亭後㳟建行宫我皇上㡬餘流覧錫以嘉名曰近聖居曰在川處曰鏡瀾榭曰横雲館曰九曲彴曰栁烟坡曰古蔭堂曰紅雨亭號為八景各賦宸章繩武紹徽後先輝映山川靈淑亦胥悦遭際之隆矣乾隆庚子御書聮曰情性由來躭淡泊文章豈必藉淪漣註經臺在費縣北六十里臺前有漢鄭康成祠相傳為康成註經處石室尚存西北有䝉山七十二峰秀插雲表即孔子所登東山也乾隆庚子嵗撫臣於祠之西㳟建行館以備宸憩甲辰御書聮曰四壁圖書鑑今古一庭花木驗農桑又聮曰觸目無非逺塵俗㑹心皆可入研覃又聮曰清風明月取無盡山峙川流用不窮萬松山在費縣東北十里齊乗云䝉山前陽口山有玉皇觀老子故宫也費縣志陽口山近祊城山之北浚水出焉今萬松山即其地也蔚然聳峙蒼柏成林祊浚兩河夾繞南北乾隆乙酉嵗撫臣㳟搆行殿敬備駐蹕庚子御書聮曰拂招林牖風光美負帯烟霞景物清又聮曰階臨渌水祛塵逺簷拂蒼松引籟長又聮曰藉松為幄陰偏秀倚石成章興迥殊甲辰御書聮曰滿窗松石無非古一屋雲烟總是清又聮曰春隴詩成滿豳野雲巖畫意妙房山問官里在郯城縣西北境八十里故郯子國孔子嘗從郯子問官後人因名此地為問官里列墅縈紆長林葱舊每當春風遲日桃李爭妍望如錯繡乾隆庚子嵗㳟建行宫嗣是時巡駐輦睿藻頻頒紅蘤緑楊皆䝉宸賞矣甲辰御書聮曰饒看花色鮮而潤真覺韶光媚以明又聮曰竹秀石竒恭道妙水流雲在示真常又聮曰滿窗松石無非古一屋雲烟總是清郯子花園在郯城縣外里許其地林木蒼蔚土人稱為郯子花園乾隆壬午嵗前撫臣㳟建行宫規模儉樸無臺沼觀遊之勝㳟遇翠華屢幸錫以宸章自此永為勝地矣壬午御書聮曰山容積水融和盎物象熙春詄蕩披又聮曰川原春望全宜畫松柏古心靜可論庚子御書聮曰問風畧先農桑候覧古欣過禮樂邦南池在濟寧州南門外唐杜甫有同任城許主簿遊南池詩後人因祀甫於其地濬池築館遂成勝境皇上御題額曰藎臣詩史鑾輅經由並抒鴻藻光燄萬丈逺邁前賢矣太白樓在濟寧州南城上古任城地也唐李白客遊任城縣令賀知章觴白於此後人因建樓焉形勢雄傑俯臨運河南北帆檣往來如織鑾輅疊經臨幸錫以天章賀李風流益傳諸不朽矣分水口在汶上縣界明尚書宋禮用老人白英䇿遏汶水於此濟運地勢髙仰南北分流舊有大禹廟龍王廟宋公祠乾隆乙酉嵗前撫臣㳟搆數楹以備御舫至此登覧分水形勢御書禹王廟額曰溯源明徳聮曰敷土奠山川行所無事分流導南北因其自然又御書闗帝廟額曰赫濯同欽聮曰本正大之情放海而凖體神明之徳如川斯流光岳樓在東昌府城中傑構入雲髙下在目或曰可以逺望岱岳故名或曰意取接三光而齊五岳也其興建始末無可考據皇上春巡山左六巡江浙屢經登臨其上親揮宸翰睿藻輝煌斯樓之名自此永傳萬古乾隆乙酉御書額曰光岳樓無為觀在臨清州境運河南岸舊有玉皇閣聖祖仁皇帝賜額曰無為觀乾隆乙酉嵗撫臣添建數楹㳟備宸遊臨憩御書額曰福佑津途聮曰雙牐莭宣資利濟三元調爕協寧居四女寺在恩縣界運河滚水壩側運河水勢全在蓄洩得宜恩縣之四女寺與徳州之哨馬營並為運河減水分入老黄河要道仰䝉睿慮精詳特命大臣悉心籌辦乾隆乙酉嵗皇上南巡由水路迴鑾順道閟視撫臣於河干㳟設數楹以備宸憩欽定南巡盛典卷八十三
