body:
  text: 河防乾隆二十七年四月初六日上諭内閣曰江南瀕臨湖河沮洳之區南則髙寳甘泉北則宿清海沐各屬最稱窪下每遇伏秋大汛霖潦堪虞而下游蓄洩機宜惟洪澤一湖尤為槖籥闗鍵朕早夜勤思為澤國生民求保障安全之計疇咨所及中外臣工持議各慿所見非親巡規畫難定折􅇆昨駐蹕蘇城時先命大學士劉統勲協辦大學士兆恵㑹同督撫河臣將歸江歸海各路詳勘標誌朕回鑾取道按閲講求指示其在髙寶一帶應宣𨗳歸江者自邵伯以下如灣頭閘壁虎橋鳳凰橋等處河身寛展足資分洩惟金灣滾􅄵寛五十丈而新挑引河僅寛十五丈底寛八丈未能暢逹應冄為展寛以河底十丈為率迤下地勢稍仰並一律挑濬深通俾成建瓴之勢又東灣滚􅄵前年已改落三尺而西灣􅄵尚仍其舊諸臣議請一體落低三尺朕量該處洩水情形至為便捷應將西灣􅄵冄加落一尺共低四尺則平日已有尺水入江循序而進庶可預減暴漲之勢其河頭亦加挑寛深以資利𨗳設遇落水過多運河間有淺澁即宜將淺處深挖以視小小切埂撈淤從事於河中者不猶愈乎其金灣六閘應折去中二閘添建石􅄵接築土堤並量挑引渠以偹盛漲湖水自無淤壅之患然此節節措置特為三湖旁疏曲引起見耳若其溯源挈要為釡底抽薪之䇿則莫如廣疏清口乃及今第一義現在測騐洪湖髙堰五􅄵髙於水面七尺及七尺五寸不等清口口門現寛二十丈當以此酌定成􅄸將來俟兩􅄵之水如冄增長三尺清口不必議展仍存其蓄清之説設如由三尺長至四尺即將清口拆寛十丈湖水以次逓長則清口以次遞寛縂以上􅄵增一尺之水下口加開十丈之門為凖其或入夏後水勢一時不長旋長旋落則不必以口門既展急事堵塞以過秋汛為定逐漸收束清口仍至二十丈或十數丈如此則全湖勢暢以視求助於分支别𣲖者其功奚啻倍蓰哉脱以清口拆堵費工鰓鰓過慮獨不思湖水浸溢下流所費更當何似以彼絜此其間輕重大小不待握筭而知也至駱馬湖水由永濟橋東注為六塘河源流既逺所受支河甚多河中淤埂阻滯溜勢一遇暴漲猝難容洩田廬易致漫渰應視兩岸中間窄狹者再加寛展切去河中淤埂俾游波寛緩不致出槽堤身殘缺卑薄者量為修補以資捍禦其六塘河尾閭横經塩河由東岸武障等河下洩入海原設條石滾􅄵為過水之準其旁並設草􅄵水小則蓄水運鹽水漲則拆􅄵消水商利蓄而民利消彼此各争其便當每年權其緩急利害立定限期以時啟閉庶於渠政有裨其草􅄵以下各有引河及六塘河北岸之丁家溝南岸之馬家河鮑營河形勢紆曲阻塞者均如諸臣所勘估挑辦理務使通流以達於海苐六塘河修防事宜向無専設之員即塩河各􅄵亦非鹽務微員所能相機經理該督撫可於通省事簡同知通判缺内議移一員駐髙家溝適中地方仍應簡選能勝此任者奏聞補授俾專司水利及修防啟閉之事地方水利各員聼其調遣仍歸淮徐道總轄亦聴總河節制務令宣防無悞而蓄洩合宜此皆朕目擊心維集衆議而取裁定制如此地方大吏其善體朕意實力奉行所有應添石􅄵土堤及一切挑挖疏濬各工該督撫河臣㑹同鹽政悉心確估核議以聞乾隆二十七年四月初七日上諭内閣曰朕閲視髙堰堤工自武家墩迤北扵乾隆二十二年命建磚工以来整繕堅緻足資保障惟由濟運􅄵至運口五百餘丈許尚仍土􅄵之舊未免間有汕刷自宜一律接建磚工至燒造磚塊尤宜較前寛厚以期鞏固俾全湖均籍安瀾副朕軫念民生至意河道總督髙晋即遵諭行乾隆二十七年四月十三日上諭内閣曰徐州迤西之毛城舖石堤向遇黄流盛漲随時啟放宣洩苐司事者經理或未協宜既恐分減水勢難以併力刷沙且過水太多有妨民田廬舍前巡幸時籌度指示令河臣等慎重封閉毋得擅啟比年以來中泓刷深現至九尺三寸成效已著銅沛各屬生計亦均改觀苐念水束流深自屬經常不易之法其時偶值暴漲不無漫灘出槽積乆遂成淤墊議者欲於北岸新堤改建石􅄵以資減洩不知有洩則必有淤其為㣲湖荆橋等處之患尤不可不為深慮今回鑾取道冄行規畫與督撫總河諸臣悉心講求其蔣家營傅家窪等形勢不宜莭宣當如常堅閉外惟毛城舖迤東之唐家灣向有倒溝引河可以酌量分洩然不詳定水誌工員無所遵守應遵洪澤湖開放清口現定之規於唐家灣引河亦視徐城水誌長水一丈一尺毋庸䦕放若至一丈一尺五寸以上冄將引河開放俟漫灘水落即行堵閉仍令該督撫河臣於按誌應放時一面奏聞一面辦理清口併照此例行其濉河為唐家灣下游如遇減水少淤随宜相機挑浚俾引河減出之水無致壅滯乾隆二十九年四月初五日上諭内閣曰髙晋奏籌辦雲梯闗黄河下游情形一摺所見甚是已於摺内批諭雲梯闗一帶為黄河入海尾閭平沙漫衍原不應設立堤岸與水爭地而無識者好徇浮言或以上流清口洩水分數較多遇海潮盛漲或不免意存顧慮因有子堰堤防之議殊不知清口暢洩其收利在下河州縣者不可數計至雲梯闗附近不過阜寧安東二邑所轄地面以此衡彼其輕重大小不待智者而知即令一時偶值盛漲所浸溢者不敵百分之一二耳髙晉當守其定見既知下㳺之制防一切毋庸置議益可信清口之展放無難永逺力持於水利民生實為交有裨益摺並發乾隆三十年二月十一日上諭内閣曰南巡回鑾時皇太后御舟仍由水路進京朕亦舟行至徳州登陸而江廣糧艘亦俱以次北上東省運河一切收蓄調劑事宜正湏早為經理淮徐道李清時前任運河道於山東河務素所熟悉去嵗秋冬間因運河水勢畧覺㣲弱曾諭令往濟寧一帶協同商辦此次著仍派李清時随總督楊錫紱前徃山東㑹同總河李宏将河湖諸務妥協辦理事竣仍回本任乾隆三十年七月初五日上命軍機大臣傳諭崔應階等曰前因微山湖蓄水過多遇夏秋漲溢之時瀕湖窪地每多淹浸經崔應階等奏請宣洩微湖以誌一丈為度於韓莊添建新閘以殺其勢並挑荆山橋以暢其流辦理以來漸著成效今嵗南巡回鑾時舟行所經詢悉該處情形知濵湖窪地近多涸出農田耕作有資但湖水暢消既乆瀦蓄未充亦恐艱於濟運事難兩利深厪熟籌今據楊錫紱奏稱湖内之水湏存一丈二尺用至五月八閘底水尚可得四尺餘寸足供挽運則止存一丈則五月八閘底水止存二尺六七寸重運難以遄行請交山東河撫二臣將現在各處出水口門地勢髙下水勢深淺尺寸與湖口滚水􅄵是否相等及可否量改水誌之處確切定議如水誌難以議改或將湖口以下至頓莊閘數十里河底一律挑深五尺以為調劑等語所奏於漕渠轉輸自有裨益但水誌改加二尺於低窪地畝有無妨礙及挑深河底是否可行著崔應階同李宏李清時詳悉確勘定議具奏期於漕運民田均得利頼可將此傳諭知之楊錫紱摺並抄寄閲㸔乾隆四十一年七月初三日上命軍機大臣傳諭髙晉等曰髙晋等奏議開挑黄河周家莊引河一摺並展畫大圖貼説進呈朕披覽圖内所繪引河形勢尚覺太窄已扵圖内批示從來河不兩行既經開挑引河則黄河大溜即應由引河行走必湏䦕挖寛深方能引溜全注細閱貼説但稱計長一千零五十丈而於寛深丈數均未奏及恐髙晉等因省費起見是以不肯開寛朕念切愛民凡有闗民間利病及捍衛保障之事從不稍為靳費况此項引河為黄淮緊要闗鍵若果能開放深通使黄流不致停淤清水得以暢出實為最善之舉即多用帑金亦所不惜但湏核實經理耳國家籌辦要務若行之有益縦數逾鉅億亦不為多若為而無成雖費金千餘亦屬虗擲即如近日征勦兩金川用至六七千萬而大功既成足為一勞永逸之計不得謂之糜費此其明效大騐也著髙晋等悉心籌度將擬開之引河一律挑挖寛深其引溜處尤宜寛展使正溜易於趨注髙晉等即將河身擬挑寛若干丈較現在河身幾分之幾底深若干於圖内詳悉貼説覆奏冄圖説内稱俟引河開就應於對岸另築挑水􅄵挑溜引注新河等語朕意似可將第四木龍畧移向上在硃圈記出之處安置便可借以挑溜但未知能得力否又就圖内河流形勢而論新開引河似可冄移向上於第二木龍對岸徑直開下似更便捷該督等或因彼處大溜趨勢尚未甚急恐不能引流直注如建瓴之勢是以欲於稍下施工抑或可照朕所指量為移上否並著髙晉等一併詳加勘度據實覆奏至摺内據稱東西兩􅄵因每年頻折頻築厯嵗已久􅄵底不能刨挖浄盡或為柴土壅塞或為倒灌淤積以致清水不能暢出請將舊􅄵基址刨盡以期清水出口得力等語此係向來辦理不善所致已於摺内批示展收清口實為緊要機宜自應將􅄵根刨浄使無壅滯停淤方為妥善何竟草率從事若此厯任承辦之人均難辭咎朕此時亦不將伊等治罪所有現擬刨挖舊􅄵基址之費即著落乾隆二十七年以後原辦之厯任總河及該管河道按年分賠以示懲儆將此傳諭髙晉等知之乾隆四十一年十二月二十八日上命軍機大臣傳諭髙晉薩載等曰據髙晉等奏開挑陶莊引河完竣騐㸔工程如式因時屆嚴寒黄河凍結氷凌恐氷底水流微弱難資冲刷請俟交春後天暖氷融冄行放水等語所奏甚是陶莊開挑引河於全河極有闗係開􅄵時必須乘勢引放俾大溜直趨暢注方為有益自當俟春融後趂桃汛相機妥協為之至引河為河工要務並須選用吉日著傳諭髙晉薩載等即預行擇吉先期迅速奏聞冄行辦理又髙晉另摺奏稱現因閔鶚元進京陛見暫署安徽撫篆俟閔鶚元回任後接兼河篆俾薩載即行赴京等語現在開放引河為總河専責必須在工督視不便遽行離工且薩載此時並無亟須陛見請示之事著傳諭薩載於引河放溜後細視新河上下是否循流順軌大局全定即行奏聞一面將總河印務交髙晉暫行兼署起程来京將此傳諭知之乾隆四十二年二月二十六日上命軍機大臣傳諭髙晉薩載等曰據髙晉等奏報陶荘引河開放成功大溜暢注情形一摺覧奏深為欣慰已於摺内批示竝明降諭㫖将薩載交部議叙矣陶荘開挑引河為治河一大闗鍵今開放之後新河内大溜暢注衝刷寛深形勢甚順從此清黄分流直至周家荘滙歸東注清口可免倒灌之虞實為一勞永逸非神黙佑不能成此鉅功自應於該處立廟以酬神貺又另摺内所稱通湖引河勘辦情形此皆其餘事惟當謹防舊河口最為闗係重大又老黄壩工程尤闗𦂳要更宜悉心詳慎防䕶以期永逺鞏固至摺内稱原估挑水壩工計長七十七丈其餘河面僅有二十七丈與其留此河泓旁洩不若一律估築使水無分注則全河溜勢自必盡歸新河雖所用工料加増銀八千餘兩於要工更為有禆等語所奏甚合機宜自應如此辦理其舊河内未築壩工據稱旬日内可儹堵告竣現在曽否已經堵築畢工並著上𦂳妥辦至現在河身挑寛若干及河流暢注之處自應繪畫全圖貼説注明以便省覧何以伊等見未及此著傳諭髙晉薩載速即詳晰繪圗貼説並将工所立廟及老黄壩工程如何防䕶之處迅速據實覆奏此由四百里諭令知之同日上諭内閣曰朕從前屡次南巡閲視清黄交㑹處每悉其倒漾之患因思若能引向陶荘以北而流則清口通暢庶免黄流倒灌因未躬臨陶荘一帶閲視是以踟蹰及詢之厯任河臣亦無能任此事者昨嵗薩載赴山東行在召見時諭令赴黄河海口上下察看伊即奏請若於陶荘開挖引河一道使黄水繞北下注相距清口較逺清水益得暢行與朕意適相符合因與再三籌酌伊果能遵照指示剔挑完竣今據奏報扵二月十五日将引河開放過水新河内大溜暢注衝刷寛深形勢甚順各等語黄河大溜改由陶荘北行離清口甚逺可免黄河倒灌之虞竝収清水刷沙之益即就近險工亦俱化為平稳薩載辦理此事實心實力其所辦引河實為全河一大闗鍵非尋常築隄打埽開河者可比薩載著交部查照齊蘓勒之例從優議叙以示奨勵乾隆四十二年二月三十日上命軍機大臣傳諭髙晉薩載等曰據髙晉接奉諭㫖由驛覆奏陶荘引河開放後情形并往上江一帶查勘河務工程各縁由一摺均於摺内批示矣此次開放新河并堵築舊河為全局一大闗鍵自應繪圗貼説方能瞭如指掌何以髙晉等總不具圗呈覧實属疎忽至摺内所稱河無兩行原擬估挑水兠水􅄵與其留此河面任其分流不若一律估築堵閉所奏甚是正與朕前降諭㫖相合但所稱僅存上口七丈下口五丈薩載現在住工督辦旬日内亦可完竣䓁語此時曾否竣工向来河工習氣如上口七丈雖經堵築其下口五丈内必尚留罅隙使餘水仍得走洩以為日後做工冐銷地歩著傳諭髙晉薩載䓁於堵閉時務須悉心講求設法籌築厚實堅固務使㸃滴不漏方保無虞不可輕信河員餙詞完局仍一面詳晰繪圖貼説具奏俟薩載辦竣後来京時再為按圗指示善後保固各事宜将此由四百里傳諭知之乾隆四十二年七月初四日上命軍機大臣傳諭薩載等曰前據薩載奏陶荘新河溜勢湍急河頭河身河尾現加寛闊形勢較前更為暢順䓁語具奏於六月十二日奏到距今二十餘日未據續奏現在伏汛甫過已當秋汛之期黄水自較前加長不知近日新河溜勢若何能否暢流無滯以及清口出水是否暢出有力足資禦黄朕心深為厪念著傳諭薩載即将該處實在情形迅速由驛覆奏以慰懸注此㫖著由五百里發往并諭髙晉知之乾隆四十二年十月十二日上命軍機大臣傳諭髙晉薩載曰據薩載奏黄運河湖情形一摺已於摺内批示及閱進到新舊兩圗舊圗順黄􅄵外已有停淤故大溜趨北及閱新繪之圗則河流直抵􅄵根嫩灘所存無㡬自係河勢向南畧逼刷去停淤前此朕命添築順黄􅄵薩載在京時意尚以為可以不辦朕為之詳悉指示始遵照辦理就現在情形而論若非此壩為重門保障河流之南逼者不且直到攔黄􅄵根乎又閱新圗河北岸長有嫩淤一帶北淤則流必南趨乃一定之理因於其處用硃筆標記急宜将此一帶嫩灘切去使其不復停淤則南岸所添之木龍挑溜自更得力河流必日漸北趨不復捜刷壩根新河正溜亦益當暢順實為目下最要機宜著傳諭髙晉薩載及此時即速實力遵辦以期妥善仍将辦後情形迅速覆奏著将硃批兩圗發往由五百里傳諭知之乾隆四十三年四月二十二日上命軍機大臣傳諭薩載等曰據薩載奏黄河改從陶荘繞北下注向東直趨距清口東西壩已逺是以此畨雖遇連日東北大風黄水不過抵至栁園頭而止不但未曾入運亦未漾至恵濟祠地方等語覧奏稍為慰懐若非前年諭令疏挑新河俾黄河正溜繞北東注此畨東北大風黄水不但倒漾且必致入運是先事預籌已有成效矣至所稱目下出口之水尚未暢達僅能刷出河泓所長嫩沙未能即時刷淨須俟淮水長發暢流下注自可全行刷除等語淮水長發難以預期時日恐不足恃現在正當重運北上不宜稍有阻滯且髙家馬頭一帶所長之淤及其尚嫩時加工挑挖亦易於為力著傳諭薩載䒭即遵前次發去圗内硃批㸃誌處董率㕔營各員多集兵夫将嫩淤速行挖淨俾河流疏暢並可将挖出之土由河内船運至順黄壩根以為壩内填土之用即或用帑稍多亦不致如前嵗開挖引河之費並可令無業貧民藉資餬口亦以工代賑之意将此由五百里發往並諭髙晉知之乾隆四十五年三月初八日上命軍機大臣傳諭薩載陳輝祖等曰據阿桂奏稱自豫省来浙經過淮徐一帶查看陶荘引河兩頭已寛至九十丈其中段僅寛六十餘丈河身雖已刷深但水勢被束不能大暢且将来伏秋大汛水来猛驟恐一時宣洩不及若将河身通行開寛四十丈俾一律深通汛水便可暢注等語所奏自属應行辦理之事現在已令阿桂前往該處㑹同薩載查勘後即行囘京薩載再来據實面奏如果應行辦理並速派委妥員興工挑挖務於四月内全行赶辦完竣約計朕囘鑾經過時可以辦得㡬成并著薩載據實覆奏将此由五百里傳諭薩載并諭陳輝祖知之乾隆四十七年十月初六日上命軍機大臣傳諭阿桂䒭曰本日據何裕城奏查勘運河堤工並籌備料物一摺内稱就目下水勢而論自七月十九日消水起至九月下旬止陸續消退二尺以外此後時交冬令水源更弱約計明春尚可減去二三尺等語漫水下游設法䟽洩入海為目下第一要務節經降㫖令該督等廣籌去路竭力疏消今自七月至九月僅陸續消退二尺以外轉瞬明年春汛不可不於冬令水弱之時預為籌辦以期積水早涸運河堤閘得以及時施工而民田亦得早為耕種前據阿桂奏伊家河口以挑浚分洩請令袁守侗先行㑹同勘辦業經降㫖先行又江南之駱馬湖六塘河塩河俱係宣洩運河去水之路尤宜展拓口門使得暢達東注方為妥善著傳諭阿桂於浙省囘京之便順道㑹勘應行赶𦂳籌辦之處即一面奏聞一面辦理将此由六百里傳諭阿桂其何裕城原摺一併抄寄閱看並諭薩載袁守侗何裕城知之乾隆四十七年十二月初八日上命軍機大臣傳諭薩載閔鶚元䒭曰昨福長安到京奏及伊過江南據薩載告稱江南運河入江口門距金山行宫較逺今查有舊河身一道若加挑浚止有三里經過更覺便㨗且可避中泓溜勢之險而於商賈舟楫往来亦為利便又往棲霞向係經由陸路不免舍舟登岸今亦擬挑河一道直達棲霞一水可通以省往返跋渉之勞等語竝将圗説呈覧此議可行俱應亟為者著傳諭薩載閔鶚元即将此二處於明春迅速興工挑浚即於從前預偹留江銀兩應用但念四十九年南巡粘補行宫等費未免不敷現已傳諭富勒渾等於賞給浙省辦差多餘銀兩内撥觧江南二十萬兩薩載等自能仰體朕意妥協辦理也將此由四百里諭令知之乾隆四十八年正月二十二日上命軍機大臣傳諭伊齡阿等曰前因辦理南巡差務曽諭令福崧由浙江撥交薩載銀二十萬兩現在鎮江龍潭開挖新河此係有利商旅之事恐需費尚有不敷著傳諭伊齡阿於運庫存貯應觧内務府項下撥銀二十萬兩觧交薩載應用毋庸動支塩課正項亦不必令衆商捐辦並諭令薩載等知之乾隆四十八年四月十六日上諭内閣曰山東運河堤閘各工現在勘明叚落一律興修著於部庫内撥給銀五十萬兩照例解往備用該部即遵諭行乾隆四十八年七月二十七日上命軍機大臣傳諭薩載等曰據薩載等奏黄河水勢盛漲搶䕶各工及張家馬路相機酌放水戧平稳情形一摺已於摺内批示矣此次伏汛黄水連前共長至一丈三四尺大溜奔騰浩瀚實為盛漲上下各㕔工程如夏家馬路張家馬路等處在在險要該督䒭督率在工員弁或赶𦂳搶䕶或酌放水戧仰賴上蒼河神黙助得以化險為平各工保䕶安穏以手加額欣慰覽之朕感荷之餘益深䖍敬現在秋汛即至新河下游在在喫𦂳薩載等尤宜倍加謹慎督飭工員晝夜防守保䕶各工俟秋汛奏報安瀾後再降諭㫖将該督並河東江南兩縂河及在事出力員弁交部議叙以示奨勵再閱圗内張家馬路堤後塘内清水深八九尺至一丈一二尺不等恐傷及堤根亦為可慮此時如能放淤使水去泥澄壅䕶堤根固為盡善否則亦須設法疏消毋令清水積存堤外致貽後患上屆南巡時閱視河工亦見数處堤後尚有積水彼時曾諭設法疏消放淤該督等並宜逐一留心查勘一律妥辦或放堤外以為鞏固堤工之計至薩載等另摺所奏李家荘口門外黄水漸次増髙恐致漾入淤墊新河已於六月二十八日堵閉䓁語楊家荘口門出水既暢自無須李家荘新河分溜該督䓁相時堵閉所辦甚合機宜但何以未經奏及計彼時薩載已赴東省㑹勘運河工程李奉翰何以亦未具奏直至降㫖詢問始行奏覆伊等豈未知朕厪念河防昕夕懸注耶著傳諭該督等此後凡有闗河務事宜俱即随時具奏以慰厪念將此由四百里諭令知之乾隆四十八年十月二十三日上命軍機大臣傳諭薩載等曰據薩載䓁奏黄河形勢兠灣刷成新河一摺内稱郭家堂一帶黄河坐灣溜勢偏趋南岸田家樓埽工係頂冲迎溜正擬於老灘挑挖引渠引溜直趨現在興工尚未挑成而河溜日見塌進勢甚迅速當即乗勢啓放河頭河尾共刷寛一百数十丈全河大溜暢達所有田家楼埽工現今淤閉等語覧奏欣慰已於摺内批示矣郭家堂老灘正在挑挖引渠仰邀河神黙佑乗勢塌寛全河大溜忽然取直歸中自属善機朕心深為嘉悦但閱圗内郭家堂即逼近新河該處現有居民向来隄外灘地距河稍逺之處原准民間居住惟不准私築隄堰致碍水道例禁本明前經降㫖命河臣㑹同地方官妥協辦理但恐日乆廢弛小民各䕶田廬仍不免私自圈築侵佔河形以致汛水長發時有碍溜勢於河務大有闗係除将此摺交軍機處存記俟明春南巡親臨閱看外著傳諭薩載李奉翰蘭第錫何裕城明興於南北兩河灘地留心實力查辦毋得視為具文将此諭令知之乾隆四十九年閏三月二十二日上諭内閣曰據薩載李奉翰奏江南河工預籌修防蓄洩機宜辦理工程三處繪圗貼説具奏已扵圗内詳悉批示並面諭該督等遵辦矣天然閘下既舊有引河年久淤墊理應一律疏浚深通以備盛漲之年開放分洩自當首先辦理方為有備無患其所奏外河順黄壩堤工後深塘用土填平並於迤下估築新堤一道是應次第辦理以資保障至該督等所稱髙堰石工子堰尾土尚矮須一律加髙培厚一節髙堰石工既􅀴加髙層数其土堰間有卑矮之處自應一律加髙培厚接成一勢並應栽種桞樹俾根株盤結更可永逺鞏固此事與前在海寧令将紫塘石工中間積水溝槽墊平以資重障之㫖事同一例應定為再次辦理将此分晰指示該督等其仰體朕意遵照妥辦所需錢糧著照所請於兩淮運庫撥用乾隆四十九年四月初一日上諭内閣曰山東運河堤岸各工前經發帑興修現已一律完整辦理甚為妥速蘭第錫何裕城明興俱著交部議叙其道府以下各員著蘭第錫明興查明具奏實在奮勉出力者交部從優議叙其次出力者交部議叙其餘随同在工未經出力者亦不必濫行叙入至効力各員或留河工委用或留地方差遣並著蘭第錫明興分别查明酌議具奏乾隆四十九年四月初二日上諭内閣曰昨因東省運河隄岸各工修理妥速已降㫖将蘭第錫何裕城明興及在工出力人員分别交部議叙矣因思從前堵築青龍岡壩工時漫水由㣲山湖下注曽降㫖命薩載等籌勘去路旋據該督等将㣲山湖下游之顧家荘引渠開挖寛深及駱馬湖各閘壩次第啓放分洩水勢故㣲山湖運河得以速消運水乃可興工則薩載李奉翰之功亦不可泯又髙堰改砌石工徐州韓家山接築石隄各工皆尅期蕆事在工人員均属奮勉薩載李奉翰俱著交部議叙其在工出力人員並著薩載查照昨降諭㫖分别等第一體交部議叙乾隆四十九年四月初十日上諭内閣曰山東運河前因豫省漫水下注湖河一片縴道閘壩俱被淹浸上年合龍河復後特降諭㫖将東省運河官民堤埝土石各工一律興修共用銀五十三萬九千四百餘兩今因例價不敷加用津貼銀五十三萬餘兩據該撫明興奏請分年捐亷歸欵毋庸按例攤徵等語向来黄運兩河間遇𦂳要工程採辦料物雇募人夫官發例價本属優厚即或因料物昻貴限期稍𦂳一時難以取給于例價之外復有津貼不過加至十分之二三至多亦不過十分之五儘足敷用况運河堤岸工程尤非若豫省之堵築壩工可比加價銀兩何以較正項増至一倍恐其中不無藉端分潤之弊但朕軫念羣黎如河南江南等省一切河務闗係民生者不惜数千百萬帑金興工修築以期永資捍衛又何靳此数十萬津貼銀兩致官民竭蹷耶所有此次東省運河津貼銀五十三萬餘兩若按例攤徵民力固不免拮据即地方官捐㢘歸欵亦恐不肖之吏有所藉口致滋派累竟加恩准其一體作正開銷以示朕恵愛黎元有加無已之至意即使工員等果有侵蝕浮開等弊将来别􅀴發覺時必當按律懲治所謂與其有聚歛之臣寧有盗臣自不肯因恐有弊端轉致恩澤不能下逮也将此通諭知之同日上命軍機大臣傳諭薩載李奉翰何裕城等曰據明興奏上年興修東省運河官民堤埝土石各工共用銀五十三萬九千四百餘兩因例價不敷加用津貼銀五十三萬餘兩請分年捐亷歸欵等語已明降諭㫖加恩准其作正價開銷矣部定例價較民間本属寛餘向来黄運兩河間遇𦂳急要工採買料物僱募人夫誠恐一時難以取給於例價之外酌加津貼亦不能免然不過加至十分之二三多亦不過十分之五儘足敷用何至如此次多至加倍而上屆豫省堵築青龍岡壩工甚且加至三倍之多雖朕愛民之心有加無已然工程銷算自有一定章程若俱似此任意津貼工竣後即准作正開銷将来遇有要工不但漫無限制無所底止且恐不肖之員恃有加價之例從中侵蝕浮冐開銷以冀㤙免又復成何事體耶朕因黄運各工闗係運道民生不惜千百萬帑金俾閭閻永資利賴所有数次津貼銀兩業已寛免此後倘遇各工不得援以為例著傳諭薩載李奉翰何裕城永逺存記除就近諭知蘭第錫明興外将此各諭令知之欽定南巡盛典卷三十六
