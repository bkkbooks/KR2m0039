body:
  text: 詩迴蹕至蘇州䇿馬入城之作膏雨既已渥快晴實愜情進舟速水路䇿馬入蘇城如子欣父至駢肩繞膝迎愛之無别法不擾飭官清重逰寒山得句蘇城駐信宿乗暇訪名山結習知應捨勝逰縁逮還將以明日旋蹕喜看麥穗吐前駐蹕蘇州時麥苗㣲覺望雨兹旋蹕重至寒山以農田屢被春膏巳巳吐穂頓改前觀矣茂錯菜花間大慰從前意新詩那可刪題澄懐堂徑入緑琳琅三間别有堂據床引綺思列架發芸香駒影分明是塵勞頓覺忘澄懐擬何事民務細商量清暉樓口號翠峰邏復碧波圍秀入搴帷潤逼衣拾級乍欣得新况溪樓仍是此清暉六依皇祖華山詩韻理趣将塵逺詩裁與境深步猶堪勝濟鬢不礙霜侵解舞花經􅄜能言春入禽五言賡聖藻六度仰冲襟白雲泉六疊白樂天韻香山昔日對流泉太守公堂一日閒我自先憂天下者豈能效彼樂斯間髙義園山北靈巖天平路名園乆識吾施田本創范仲淹作記却因蘇軾桃栁暢春意詩書供静娛載咨由義者莫負舜之徒舟過無錫縣舟過無錫弗艤岸去時䇿馬已觀民茲來露冕坐闔閭夹岸跪覲無萬人因思皆資衣食者自當物貴生計貧幸遇有收尚可活水旱那無饑溺頻以是祈嵗厪宵旰大吏並飭諱災諄展義時邁政因此我豈山水徒遊巡漪瀾堂三疊前韻山中喜有水圍堂滉漾楣欄上下光勝處恰宜孟王􅀞庚子前巡以王紱竹罏圗既燬因復檢石渠寳笈所弆王紱溪山漁隠圖賜藏山寺是巻亦有吴寛䟦語與竹罏圖筆墨絶肖郵致名藍俾還舊觀亦為兹山增一叚佳話也與来還和老蘇章綺紈那辨文和武趙州栢林等有吴道子畫文水武水甘劣休論圓與方恵山有方圓二池圓者甘而方者較劣七字捉成壁間􅘧笑云付爾樂斯長若氷洞牝洞從来具靈氣温冬􅈵夏不可竒凡石洞中冬必温而夏反凉大屋亦然不足竒也題名此曰若氷者應是来當暑月時便民港紀事句容道屢經新港初見爾壬寅方始事癸邜成功駛沙溪拓以寛自鎮江師古灘逕句容至上元舊有沙溪一道長百里嵗乆湮塞乾隆四十七年冬間薩載奏請開濬寛深引注江水入新港士商得以舟行至江寧且可越黄天蕩江路之險行旅稱便於四十八年冬竣事奏到賜名曰便民港泥泉濬而泚别引江漲途潮汐波増瀰和雇民受利亦非徭役起是役飭發江省公項給價和雇民夫百姓藉資謀食並無絲毫擾累共用銀十一萬餘兩安福御艫名御以行鏡中風物美大吏乞港名便民賜名是鎮江及江寧陸路弗通水南方便於舟艱車及步履考士並賈客自此舟行矣若云勤蹕途吾殊不為去聲此髙資港詠古髙資已駐燕兵近孝孺方陳割地謀洪武設非遵古制應無靖難肆䖍劉按建文君臣庸懦固不足論使洪武弗泥古立皇太孫擇賢而立燕王為皇太子則必無靖難簒奪􅃤殺之事矣因經此地並及之由便民港舟至棲霞山行館即事有詠發以寅而到以申舟行由便民港至棲霞山行館水程百里較每日稍逺因以寅刻起行迨申刻即到舟行百里未勞身此言訝不當出我執役猶應念衆人漫向青山論今昔最欣緑水滌精神迎鑾老幼胥懽忭自審如何稱去聲便民題棲霞十景四隣峭蒨碧峰圍中有行宫據翠微不向攝山尋藥草古稀過四又何希右棲霞山玲瓏峰表滀天池却弗流為瀑布垂一種尋常勝他者旱乾水溢兩無之右玲峰池峰姿㠎嶫照曦紅青石烘成紫亦通惡以奪朱權弗論千秋永䕶化人宫右紫峰閣山房愛聴謖濤聲却不希他𢎞景名笑指繞階一溪水三年前此座中清右萬松山房對立雙峰萬古亭中間一線迥含青天開豈費疏鑿力蜀道空勞笑五丁右天開岩巒繞岡遮幽且偏居斯凡骨亦成仙自嫌清蹕来游際扃岫掩闗合致然右幽居菴盈溝盈谷蹙花傾是浪而無澎湃聲莫謂斯崖出假借千秋何物定其名右曡浪崖栲栳明珠鏡面呈方塘半畆渫然清玉泉山下湖論頃大小由他萬斛傾攝山珍珠泉晶瑩上出半畆澄清為前督臣尹繼善所疏剔然較玉泉之趵突山根蕩漾成湖其倍小泉淙噴而出者不啻萬数實不可同年語也右珍珠泉虹非日照鏡非銅溪徹橋彎值偶同奚必名中辨真假藉他假幻悟真空右彩虹明鏡誰與竺菴號徳雲聊欣一炷淨香聞爾時布景恦然憶馳驛觀山豈漫云昔逰此山時尹繼善以未盡其羙有馳驛觀山之喻予則以為深惬宿懐不留意於物至今猶每追憶其言云右徳雲菴白乳泉試茶亭用皇甫曽送陸鴻漸棲霞寺採茶詩韻採茶遂試茶弗焙葉猶生凡採茶其葉必生當焙之然後可烹茗兹皇甫曽送陸鴻漸採茶而遂云野飯石泉清是甫採而即烹茗矣故戱及之疑舉且喫語謂趙州和尚且喫茶句但期此話行且放此話行亦指月錄中語羽踪藉因著曽句亦云清泉則付無意淙淙千載聲題太古堂用庚子詩韻棲霞此重来倐閲四年乆是我藏詩所一有無不有拈花弗闗指掃葉底湏帚胥是太古然問堂知是否武夷一曲精廬用庚子韻攝山勝以山然亦不乏水命曰武夷曲似㦲而逺矣有石可枕頭有流可潄齒王武子所云適可用於此然我憂勤人未宜斯比擬登棲霞􅆟髙峯眺望作歌我昨進舟来棲霞髙峯半天望及至今日徐徐登便民港水眼底漾由港而江通潮汐舊稱險處黄天蕩避險就安誠便民兩府謂江寧鎮江行舟水無恙不惟兩府歌利濟通省士庶情俱暢便民港既成不特鎮江江寧兩府舟行稳順即通省士民往来金陵者免渉黄天蕩江濤之險及陸行䟦履之艱無不稱便也然而江中仍有舟圖利忘害憐衆状邇日作炎其熱難堪比及造極爽拂風尖身既適矣心亦恬於是息江港安險之幻境置魏吴機械之浮談歌留石碑傍花龕萬刼佑我黎與黔古稀誠老矣南巡願罷安福帆得趣樓攝山趣難僂指數髙樓得全隨所取數之既難得何易數属有意得無意以此知無勝有多山情水態面前羅而樓不識不知付以寥天一獨欣明日啟蹕後乃無人過自棲霞至江寧駐蹕之作兩日山逰六蹕移古来都㑹合臨之萬民瞻就情増舊一已安懐念在兹􅕊里輿驄無甚勩六朝興廢有餘思安南適值陪臣至道左俾觀巡狩儀安南國王黎維褍遣陪臣黄仲政黎有容阮􅚻賫表至京奏謝計程距迴鑾尚逺守候需時因喻令由湖北取道赴江寧於蹕途瞻覲是日易輿乘馬俾觀巡狩之儀仍優予宴賚遣令歸國題燕子磯有石臨江翻若飛久聞燕子用名磯六朝往事誰興廢幾卷遺編自是非形勢江山如錦繡光春風物已芳菲而今沙漲興耕作俯瞰青蔥麥壠肥逰觀音山永濟寺永濟觀音寺稱名義可循佛仍殷愛物我敢懈勤民景豈芳菲賞時惟休助巡思堯舜猶病蒿目愧心頻駐蹕江寧四曡舊韻作一帶長江南北區古稱天塹勢縈紆星文牛斗輝分野地利淮揚鞏䕶都知建業曽傳有趙鼎守錢塘那讓其蘇行官四日于斯駐蹟撫前朝敬畏俱夜雨閏三月初八日昨自棲霞乗輿来路傍緑麥芃誠好大麥穂長踰二寸小麥吐穂将齊了惟是陸行畧起塵此景南方實所少南方地濕無塵有塵則為晴乆望雨也昨来劇熱熾非常其雨解炎望及早駐輦之晚漸作雲蒸為靈雨霏㣲巧入夜霈霶遂大作倒槖傾盆恣汗浩浸種挿秧時雖未麥穂灌漿信資飽以言斯地固堪慰遥憶北方憂更悄近畿直𨽻山東河南現均望雨此次是否一律普霑佇待馳奏之至何當渥澤普徧霑佇待飛章遞驛道雨中禮報恩寺夜雨曉畧止城南禮梵宫往來限日裏於江寧祗駐四日故雨畧止即出禮寺􅓴雭復途中一例龍和象誰叅旛與風寺名曽取義泚視此相同凡以報恩名寺多取怙恃之義是以萬夀山建報恩延夀寺即用此寺名昔年南巡於此屢奉愴慈逰今非昔比惟増然題明陵用庚子韻金川不守景隆城建文四年六月燕王棣渡江犯京師進兵屯金川門谷王橞及李景隆守門登城見棣麾盖開門迎降叩馬壮哉御史楹景隆迎降後御史連楹叩馬欲刺棣被殺都門䧟先謁陵乎先即位楊榮却異姓連情棣入京編修楊榮迎謁馬首曰殿下先謁陵乎先即位乎棣遽趨謁陵畢羣臣偹法駕迎謁即帝位向批通鑑輯覧以楊榮身為侍從國破君亡迎謁不暇臣莭已隳且明請謁陵隂為勸進尤是巧於獻䛕大異連楹之莭烈矣靈谷寺建陵故遷寺鍾山東南舊有道林寺在獨龍阜明初因建陵故遷寺於此改名靈谷儒釋典俱違儒固垂忠恕釋仍有是非舊名殊杳杳自移寺改名靈谷後道林寺舊名遂無稱者新景自依依暫向匡床坐那看花雨霏賦得至人心鏡得無字八韻江南試題軒皇造為器莊子喻成謨造則鏡標有喻惟心表無藴之寸田約照乃萬方俱水火寧資取隂陽自合符将迎實非也妍醜任呈乎賦一可封于著鑒三貞觀殊放彌擬滿月卷退静融珠望道聊吟此行躬實愧吾閲江寧旂兵曡庚子詩韻湔過旌功史重去聲光國初平江南執明福王實豫王之功戊戌春曽降㫖申雪前愆復還封號配享前勞太廟以旌復封陪享偉勲揚祗今江表文風盛憶昔闗東武徳煌一日備寧聽其弛八旗駐實慮猶長偏安南渡原堪守即境慆滛惡福王按福王監國江寧勢雖危弱然果能念亂圖存卧薪嘗膽未嘗不可茍延嵗月如宋南渡之偏安而乃信任馬阮惟聲色是耽以致淪胥莫挽我豫王乗霧渡江援師悉潰其底滅亡寔自取耳賦得春雨如膏甘雨晝兼夜濃雲髙復低如膏真是澤沃隴更滋畦詎止南方被欣酬北省徯昨劉峩明興何裕城等各奏報得雨南北先後均霑實堪欣慰遐思慶優渥近喜得凄迷信已叨盈尺寧惟逮一犁浸秧稲可種結穂麥將齊豈不對時慰惟殷敬日躋陪臣稱解詠遂以命為題時安南國陪臣黄仲政黎有容阮􅚻在江寧迎覲詢其能詩適甘膏大霈因以命題詩亦頗可觀鷄鳴寺口號鷄籠此日換鷄鳴鷄鳴山舊名鷄籠在江寧府城東北又名鷄鳴埭千古何曽有定名調御丈夫破顔笑六朝乆已㡬凡荆觀象臺鷄鳴山巔觀象臺元明已来所舊有明至永樂北遷都元主中原實弗乆則此觀象徒虚名挈壺家法無人守惟我聖祖巡江寧臨兹即境懐敬授叶爾時扈從多儒臣爰咨有知天文否獨宣光地李載諏論參觜明示其先後恭閲丑駐皇祖實錄康熈二十八年二月己蹕江寧幸觀星臺召諸臣問有知天文者否因問掌院學士李光地古觜參今為參觜其理云何光地奏未曉上曰以儀器測之參宿至天中確在觜宿之先觀此足信今之不誤儀器據實斥空言郭守敬法誠為醜法言上又問恒星動否光地奏臣不能知惟新敬恒星天亦動但其動㣲耳上曰郭守儀器不可行於今由不知恒星天動故也自来史志厯法類空言無實如熒惑退舍之説天象垂戒理則有之若果退舍後来以何積算示從上又厯指三垣星座問光地不能盡舉上指官厯厯明晰尚書張玉書圖納等皆欽頌仰窺聰明天縦非臣等所能云江寧合見老人星正闢史稱徴仁夀上又披小星圖指南方近地大星諭諸臣曰此老人星也光地奏據史傳謂老人星見天下仁夀之徴有隠上曰以北極度推之江寕合見是星此豈見也放勲以後第一人自愧未能承善誘藴諸皇祖於天文算法貫徹古今書實為萬世法程惜余逮事御纂數理精皇祖時年甫十二未獲親承習之訓示至今為愧因命皇子皇孫軰兹頗有通曉者逰清凉寺何山不清凉而此山獨占五臺亦有之新舊原易勘江寧清凉山在府城西北上有清凉寺本吳之興教寺也唐為清凉道塲宋為清凉廣恵寺是清凉之名始於唐也至五臺山亦名清凉寰宇記稱五臺山在代州道經以為紫府山内經以為清凉山又華嚴大疏清凉山即五臺山夏無炎暑故曰清凉五峯聳出故曰五臺云云道蔵釋典均有是山其得名較此為舊云然湏同幻名久近何湏騐山名既屬幻寺名益觴濫而在兹言兹雲林喜蒼淡静室小憇坐藉用消塵念朝天宫宋時天慶宫朝天明秀易總以居羽流世改地無革然思朝天義盖謂飛雲舄流鈐與擲火欝羅謁有赫天在人人心對越匪朝夕夫豈藉黄冠緑章達心赤江寧行宫八詠勤政堂前殿三楹為咨政覲接之所御苑山荘之以勤政題額者甚多兹時巡莅止亦以是顔之於展義尤協祖訓由來勤政先在宫時邁總應然深居肯祗搆清詠引見除官取衆便昨駐蹕江寧凡江省地方文武員弁有應行遷授赴京引見者即就近命行在吏兵二部帶領引見以免其長途往返之勞鑑古齋在勤政堂後庭中海棠四本扶踈古致憇息之餘睪然逺念不勝殷鑒之思焉事當鑑古亦其然即境題齋敢不蘉豈必六朝舉往蹟近看明代此興亡洪武興於此福王滅於此天命無常吁可畏也鏡中亭斯亭峙水中央南北接以曲折畧彴澄光漾影宛然在鏡中行也緑水中亭號鏡中旃摩弗藉照恒空妍􅎀自取都無我此是人間最大公彩虹橋鏡中亭南北邐迤雙橋卧波飲練不啻太白詩中畫意曲折雙橋接水亭朱欄倒暎緑波渟試思何以彩虹號閃影波翻無定形塔影樓池北有樓登眺近逺諸景在目宋熈寧賜名普照寺中鐵塔巋然影落窓牖間因以名之拾級登樓納逺景巍然塔影入樓忩曰空曰色如何判此際惟應萬慮降聽瀑軒庭下瀑水潺潺跳珠濺雪聽之儼有匡廬天台之勝正不妨即寓全提爾平地亦復有髙低濺石為聲韻各擕此是八音繁㑹處不齊中自有其齊緑浄榭園東偏虗榭三間周匝琅玕萬箇緑隂入座几榻生凉渭川千畆斯得其槩宻圍敞榭令人逺暫坐翻因意與遲􅆟愛琅玕初過雨雲棲重拂露珠垂判春室室前芍藥欲開古梅早謝乗春時邁之意固在彼不在此也庭梅結子藥欄開判㫁春風著意催八景往年都頓置七言促就蹕將迴江寧旋蹕駐棲霞之作駐蹕三朝諸務成如引見閲武謁明陵考士之類言旋恰值朗新晴未能民意初無戀詎可神情略有縈潤野農功過雨好棲霞山景向人迎前斯劇熱今薄冷時節何曾有定衡慧居寺再疊乙酉韻輕輿趂曉陽古寺逕知常是日弗多路是日自棲霞至龍潭不及三十里便途至寳華山慧居寺一逰逰山到上方佛居無住處僧食有縁糧却守毘尼律殊非棒喝場以斯勤本分亦可度流光小憇還行館松隂鞭緩揚留京王大臣飛報得五代元孫之喜詩以誌意飛章報喜達行軒十二日駐蹕龍潭行館留京王大臣等由六百里馳報本月初八日皇曽孫奕純慶得皇元孫之喜具摺稱賀歡動中朝及外藩予得五世元孫實自古帝王罕有之盛事一時扈從王公大臣及外藩䝉古王公等下逮官員人役聞之無不額手歡忭同聲頌慶曾以古稀數上聲六帝何期今復抱元孫百男周室非五代三祝堯封是一言耄耋人多兹鮮上聲遇世之登耄耋者甚多而五代一堂則所鮮覯予今年古稀有四已得五代元孫實為我國家萬禩雲礽之慶上蒼眷佑如此優渥予惟日益孜孜勤政愛民以期仰副耳獲兹惟益凛天㤙渡江至金山金陵巡蹕迴金山行館駐往還纔月餘韶光暗中度落地有紅英依巖多綠樹流隂迅若斯陶侃語弗誤然自太古来江天宛如故過江至天寧寺行宫即事書懐問夜金山曙景鋪陽候静稳渡江艫老攀㓜戀憐誠有聖水靈巖躭本無瞥眼風光逾一月厪心民物永三吴南巡六度禮斯蕆佑謝神明敬感俱迴蹕於大觀堂得句觀我觀民義早申朱註釋觀之九五謂不但觀身之得失又當觀民徳之善否是分為二矣余意九五為君象君與民原一體民之治亂係君之得失休戚本相闗未有民失其生而君得安其生者詳見昨題大觀堂詩按語今觀迴蹕以南巡風恬浪静渡靈瀆緑重紅稀尚閏春北省幸霑膏澤遍連日留京王大臣及直𨽻山東河南各督撫俱陸續奏報得雨深透至盈尺不等元孫適獲喜音新昨留京王大臣馳報皇曽孫奕純得五代元孫之喜因賜名曰載錫斯来未負時巡義自審惟增勵悚寅再逰平山堂舟依栁岸行行近輿指松巖欵欵登䇿馬而今慙略少觀民於昔倍為増幽探適遇其何戀拙速由来我所能笑指緑疇麥芃處是前度為去聲爾愁曽昨過維揚正在望雨此時迴蹕則雨已透足麥疇芃蔚比前此大改觀矣過金灣六閘書事書事已詳庚子時壬午南巡時親臨髙堰酌定視山旴五壩水誌預開清口東西二壩以洩湖水為釡底抽薪之計其五壩封土不令輕拆詳見庚子書事詩總因民瘼剔疏施定其水誌於清口免以潦侵及下陂清口水誌既定五壩不令輕拆自壬午以後下河得免水患連穫豐收職此之故戊戍竟仍開五壩其秋幸早穫如茨戊戍年因儀封决口黄水由淮入洪澤湖宣洩不及不得已始啟山旴五壩歸之髙寳諸湖又以次開南闗車邏諸壩歸之下河幸其時下河早禾已收晚禾補種無多未成大灾然可一不可再惟䖍祝神佑永保安瀾堅閉五壩及此南闗等壩為長䇿耳雖然可一不可再䖍祝安瀾後莫為過車邏壩丑年黄北决洪澤復流㣲辛丑秋河决北岸之青龍岡漫水經由東省金鄉魚臺等三處數百里間蕩漾澄清至南陽昭陽㣲山三湖即係清水下注邳宿桃清運河出楊荘口門歸海并将駱馬湖牐壩開放由劉老澗下注六塘河歸海又開㣲山湖下之顧家荘等引渠分洩盛漲恰值洪澤湖水勢平稳得保安恬五壩連年封閉故下河秋穫屢豐五壩嵗連固下河秋穫肥未能胥績底益用慎民依救弊補偏耳孜孜勅萬㡬洪澤湖六依皇祖詩韻髙堰培髙並補虚甎教易石命為徐庚子南巡迴蹕渡黄臨視髙堰及清口東西壩工據薩載請将三堡六堡等處卑矮甎工加髙余以甎工不若石工經乆因命再行確核不惜帑費一例改建石工逐叚分年修築以期永逺安瀾嗣據薩載奏先将急修各工於四十六年春間辦竣其次修緩修各工亦於四十八年五月通工一律完竣共用工料銀三十三萬餘兩次苐徐修石工胥蕆今来厯閲工胥蕆慶慰吾民㣲禹魚閲接築髙堰隄工甎工不若石工堅改築曽教庚子年庚子南巡迴蹕閲髙家堰工據薩載請将三堡六堡等卑矮甎工加髙余以甎工不若石工經乆因命改建石工不惜多費帑金分年修築以資鞏固兹一律加髙培厚改築完整既以衛民兼因代賑瀕河州縣庶冀永逺安瀾云培厚加髙一律鞏衛民代賑兩謀全亦云救弊補偏耳恒念有孚勿問焉易益卦有孚惠心勿問元吉向嘗釋勿問謂加惠於民不問其感徳與弗感徳以視厯来釋經者謂加惠於民不問可知為元吉之解較為切實固堰可重隄不可當年聖訓實昭然按髙家堰為黄淮闗鍵淮揚各府藉資保障恭閲皇祖實錄康熈三十一年十一月工部議覆靳輔髙家堰加築小隄一疏皇祖諭曰承受洪澤湖大水全惟髙家堰是頼將髙家堰之堤築之使其益堅則可其外築一小堤有何益哉倘髙家堰之隄衝决則一小隄能禦之乎此皆靳輔執其向時意見而行之也先是二十六年靳輔請於髙家堰外另築重隄特命廷臣㑹同地方大吏履勘又下九卿詳議罷其事兹復請加築小隄仍即曩時重隄之見膠執於中是以聖訓委曲申諭祗宜固髙堰捍障淮湖不宜加築重隄也繼復命大學士張玊書刑部尚書圖訥二人察視加修髙家堰工以期永逺堅固雍正八年皇考以治河之道必湏保固髙堰隄工使清水力能敵黄發户部帑金一百萬兩将隄工險要單薄處加修石工為永逺之計余昨庚子南巡飭督臣薩載将三堡六堡舊有甎工改石補髙培厚凡皆推闡聖謨厯巡指示堅築髙堰之訓諭以期金隄鞏固淮揚數郡得保安全因閲髙堰接築隄工謹識如右六依皇祖閲河隄詩韻戌子丑三次戊戌秋河决儀封南岸之時和驛至庚子春合龍是年夏又决睢寧之郭家渡至秋合龍辛丑秋又决儀封北岸之青龍岡殷憂切在宫詳籌新路徙豫省青龍岡屢經堵築功敗垂成因降㫖詢問大學士阿桂等於上㳺南岸相度形勢為改絃更張之計據奏履勘得上㳺蘭陽三堡至商邱七堡一帶南岸添築大隄内開引渠俾大溜由此掣歸故道入海等語隨勅大學士九卿等詳議僉同降㫖允行逺遣本源窮壬寅春因青龍岡合龍未就命乾清門侍衛阿彌達告祭河神務窮河源據奏窮至星宿海西南三百餘里得一河名阿勒坦郭勒䝉古語為金河其西有巨石名阿勒坦噶達素齊老䝉古語為北極石其上為天池流泉百道皆作金色入阿勒坦郭勒實黄河真源也幸底蘭陽績癸丑春開放蘭陽引河據大學士阿桂奏報三月初一日開放引河奔騰掣溜十三日辰刻舊河斷流十四日金門合龍棄北取南一舉蔵工實荷天佑神助也兼資海口通自癸夘春開放新河大溜東注直達海口一律深通盖縁前嵗黄水漫口時由山東金鄉魚臺一帶漫注㣲山湖入運至清黄交滙以下節次澄清歸海均係清水是以比較往年冲刷寛深尤為暢順河臣朂敬慎毋恃此成功陶莊河神廟瞻禮庚子儀封壩合龍顯佑殊儀封自戊戍决口至庚子南巡渡黄時尚未合龍二月初十日展謁陶荘河神廟䖍誠祈禱十一日儀封兩壩即自行合龍不三四刻立見㫁流實由河神顯佑非人力所能到詳見庚子河復記蘭陽癸夘口故道順流趨青龍岡自辛丑决口亦乆未合龍因命大學士阿桂履勘上㳺於蘭陽商邱一帶添築大隄内開引渠掣溜歸故道入海癸夘三月開放引河一舉蕆工又賴神助也彼此胥神貺䖍誠謁廟模北坍㑹清逺昨冬據薩載奏黄流形勢於郭家堂老灘正在挑挖引渠間仰邀神佑乘勢塌寛全河大溜北向取直歸中自係善機因傳諭該督及河臣等於南北河灘嚴禁私築隄堰致礙水道俾河流暢順民生均資利益昭事益欽吾過宿遷縣春仲此度鑾潤野較齊好二月間毓竒迎鑾北上奏途次桃源清河等處得雨入土四五六寸以近清河桃源界雨雪已霑早宿遷與清河桃源境壌相近春仲曽獲畧霑雨雪夏初斯旋蹕未能副望飽南膏弗及兹三月􅕊三四等日浙省甘霖大霈甚為透足薩載亦奏報蘇常江揚等府及上江之太平鳯頴各属均於十四五六等日先後得雨而宿遷一帶以近北未獲優霑渥澤北澤又離杳昨據明興奏山東各府属於閏三月初四五日均得雨深透而此地偏南又未及一律霑被舟行及水路揚塵猶浩浩陸地自旱乾緑苗将近槁切切為去聲望雨中心惄如𢷬一隅有民人刻豈忘懐保安瀾龍王廟四曡舊作韻子丑寅之嵗連年三决河庚子春時和驛决口甫合龍是年夏秋又决郭家渡張家油房堵合後辛丑秋又决青龍岡閲壬寅至癸夘春始合龍潰南輕下壑時和驛郭家渡張家油房均在南岸其漫水由賈魯舊河一帶下注雖於田廬不無淹浸其患尚輕奪北重停渦辛丑所决之青龍岡乃在北岸恐水積沙停慮淤㣲山等湖並致奪運闗係更重屢經堵築功敗垂成幸開蘭陽引河始得底績云幸得蘭陽引稍紓瓠子歌總縁叨惠貺謹以謝經過祖考胥勤是覲揚當若何奎文昭殿額廟懸書額皇考御永佑願安波賜河東總河蘭第錫永定分司久素知慎且勤河東擢開府川奠冀成勲初任原厪念所為果出羣蘭第錫由永定河道擢為河東總河因初任尚屬厪念到任後據陳修防事宜及奏請畫定隄旁餘地種栁䕶根並申禁近隄取土各條所奏竟有定見大慰朕懐因傳諭明興何裕城飭屬協同妥辦以收實效益當志黽勉副望俾予欣過伊河入運口丁丑開伊河其勢尚未暢辛丑河北决洪波三湖放辛丑青龍崗漫口之水由金鄉魚臺下注南陽昭陽㣲山三湖㣲山居下㳺浩瀚愁到漾因大疏伊河冀洩㴞天漲㣲山又居三湖下㳺滙為巨漫其尾閭一由荆山橋河入運一由韓荘牐入運辛丑嵗因湖水盛漲開此伊家河長六十九里由韓荘牐下洩入運前嵗壬寅因厯時既乆從前開挑時山根砂礓未能如式必須大加挑深方資利益因命袁守侗先同何裕城㑹勘並命大學士阿桂再行覆勘籌定興工大加開挑于十二月工竣比前更覺深寛湖水得暢達入海終屬補偏䇿亟力闢砂礓叶幸今河復古運道原無恙過斯有餘惕愧我無一當栁泉登陸至徐州長途逾百里大吏欲節勞中途行館起此畨重南巡禁工作有旨諸凡命依舊新營祇此耳然亦有軒堂有山復有水信宿之所費中人十弗止遐憶漢文言惟増恧而已荆山橋丁丑過荆橋河過沙淤去路細荆山橋東接邳睢西連豐沛長三里許乾隆丙寅年發帑重修至丁夘年告成丁丑南巡經過時因丙子秋河决孫家集黄水經此入海橋洞一百五十九孔不足分洩其時水過沙停橋孔半多淤澱去路遂微壬午過荆橋幸因無事麥浪翠壬午南巡時以劉統勲所築河北孤山新土隄成湖河之水由孤山茶城等處經橋下東入運河幸獲無事是以過荆山橋詩有漲波未至春膏足且喜農民獲麥歌之句乙酉過荆橋督責去沙沙近積黄河至徐州而窄河員毎持束急易漲之説聼漫水洩歸荆山橋以故河多淤埂㣲湖趨下之勢不暢茂寅夏遣劉統勲相度議築河北孤山新土隄黄流乃不旁溢湖水亦暢消無阻甲申春撫臣崔應階請濬荆山橋乃命兆恵前来㑹勘添建新牐使湖水暢流入運其䟽濬荆山橋本為去沙漲計而工員圖省力沙弗逺運積兩傍㡬與橋欄齊民因種麥田占河身至十分之六彼時即不以為然有橋建茍非虚河疏功乃捐二者必居一吾心實未安之句詳見乙酉荆山橋記占河十六同不疏仍以穫麥陳大吏前年㣲湖漲水多長橋疏洩猶未利乃及潘張兩引河歸黄聊救燃眉計辛丑青龍崗漫口黄水下注由城武金鄉魚臺等處蕩漾澄清滙歸三湖入蘭家山由金山橋下注其時疏洩猶未暢利因命薩載等廣籌去路開挑潘家荘張家荘等引河分洩入黄又啟放駝車壩栁園頭一帶牐壩由漣河六塘河宣洩入海是以癸夘合龍後積水易消然又恐分洩太過復将臨湖各牐壩次苐堵閉收蓄水勢以濟重運几此皆隨時酌劑不惜帑項相機補救然終無一勞永逸之計也即今河復此無藉更恐洩多謀堵閉荆山過水仍如前酌劑相機豈惜費終乏一勞永逸䇿蒿目平成祗心愧題黄樓五曡蘇東坡韻庚子寄題當吟説未至徐州舟竟發其年因未值閏月迴途期廹槳盪滑庚子南巡未至徐州以其年無閏計程至五月初九日始迴蹕至京北郊及廷試諸大典為期已廹不及親臨有寄題黄樓四曡蘇軾韻之作徒遣重臣馳勘踏王事豈惜勞靴韈是年命大學士阿桂總督薩載同勘陶荘黄河及雲梯闗外入海情形又命尚書嵇璜同薩載勘徐州應添石工周家荘至韓家山一律石工禦嗋呷自周家荘石工起至韓家山靈神廟一帶凡四百三十丈地當徐城上逰久擬一律接築石工至是不可再緩因命嵇璜薩載等前往履勘興工以期永保安瀾不惜帑費也南北兩岸為次第乗河未復興鍫鍤丁丑壬午乙酉三次南巡均至徐城閲視其河南岸既添甃石隄而北岸土隄自大孤山至蘇山則戊寅夏命劉統勲相度議築者兹庚子改築之韓家山石工四百三十丈據勘佑砌石十七層其接連山脚之二十丈地勢較髙砌石十二層共佔需銀九萬二千餘兩即令薩載等核實辦料次第接築已於壬寅年大工告竣壬寅大工已告成萬户安眠免驚殺今年通閏有餘暇紆蹕重来叩龍刹况幸癸卯復故道商賈往來鳴榔軋河南咫尺即徐城城上飛樓埤堄壓下臨無地水流滔平眺有屏山層齾玉局險韻凡五曡拙速篆􅃄消睡鴨詩成依例仍勒壁頗喜文光騰煜霅題雲龍山行館庚子徐州實未臨閲隄此重去聲舊途尋並山接築曾差㸔庚子南巡未至徐州因遣嵇璜薩載查勘周家荘至韓家山接築石工四百三十丈一律修整于壬寅年已告工竣易石蕆工此慰心别館雲龍憶昔駐大彭風物入新吟拈毫㑹意於何是一瞬廿年仍碧岑試衣亭四曡蘇東坡韻欲解衣乎欲着衣猜東坡意立晴暉爾時行志未能也相共山人謂張天驥羡鶴飛題放鶴亭處士浙放鶴林逋率欲視如子山人徐放鶴張天驥未定以何擬率欲有為法未定無為㫖以是相等度此似勝乎彼重儓笑山荘避暑山荘亦有放鶴亭故乙酉題雲龍山放鶴亭詩有我亦山荘聊仿作祗虞貽笑彼胎仙之句更不如林耳大士巖招提恒有廢興時廢則蕭條興陸離大士如如巖畔坐廢興一切付無知黄茅崗同於生物殊於所櫽括東坡答張山人書白葦黄茅荒瘠宜笑傲崗頭千古韻此情寧許俗人知栁泉行宫八景春靄堂昨朝甫到頗無暇今日言旋適有閒逰目拈毫詠諸景一堂春靄接卿班是堂為行宫前殿駐蹕批摺向軍機大臣發㫖及宣召地方大吏咨詢政務之後方一逰目諸景也怡神室樸楹五架額怡神即寝室也宵養於斯契静因曰静於斯能静否片時念及萬方民知依齋所其無逸在知依行館幽閒首夏時親切民情盈蹕路足衣食否為思之水樂庭東陽未至杭纔至東陽杭州均有水樂洞東陽非蹕途所經杭郡水樂洞則甫在杭州經臨題詠水樂於斯又聼聲謾擬蘇詩舉再三去聲世間何事匪虚名鳴翠亭翠流於目鳴聞耳目色由来即耳聲悟得色聲本無著翠兮何不可為鳴含漪館澄鏡溶溶繞砌墀㣲風不動亦含漪設如畫舫相比擬若水民情亦可思俯緑墅栁泉名以因多栁繞墅更多泉水披一緑雖然分上下巧㸔聨接有長絲漾影橋月様横橋鏡様溪假山斷續接長隄俯㸔影漾團圞處七寳廣寒中覔題命彭元瑞曹文埴檢四庫全書古来見元孫者有幾據奏自唐迄明凡六人詩以誌事五世元孫膝上珍子為膝下至若元孫反當抱之膝上矣檢兹有幾命儒臣奏來詳悉翻四庫特出禎祥得六人四庫全書載唐錢朗宋張燾元吴宗元明羅恢歸璿文徴明六人皆以耆夀得見元孫恰彼古稀帝同數庚子年届古稀因查自三代以下帝王年逾七十者漢武帝梁髙祖唐明皇宋髙祖元世祖明太祖凡六帝然六帝皆未親見元孫也嬴其家慶我饒臻如斯天貺叨駢曡忍不勅㡬心愛民昨因慶得五世元孫命彭元瑞曹文埴檢閲四庫全書自古以耆夀得見元孫者凡㡬人兹據奏三代以上不可考秦漢以後隨以前未有其人惟山堂肆考載唐錢朗南昌人仕唐官光禄大夫元孫數人皆以明經為縣宰年一百七十餘嵗又周必大平園續藁載宋張燾饒州人孝宗時叅知政事年七十五見元孫一人又宋濓潛溪集載元吳宗元紹興人不仕年八十八及見元孫舉觴為夀抱置膝上望者謂神仙中人又明文衡載明羅恢吉安人永樂時官國子監博士年八十二見元孫一人又明歸璿常熟人即歸有光之髙祖見有光集璿有髙元嘉慶堂顧九和為之記又明文徴明甫田集載戊午元旦詩有百嵗㡬人登耄耋一身五世見曾元之句考徴明年九十有元孫二人等語臣庶以耆夀得元孫者僅止六人帝王中臻斯盛者尤未之前聞余叨膺天貺嘉慶駢蕃若此惟有益深乾惕勅幾愛民以冀仰答昊蒼純佑耳㣲山湖辛丑河决北事較决南巨金鄉魚臺雖停沙清水艱他去三湖以次漲㣲山下流所辛丑青龍崗漫口之水滙㣲山歸南陽昭陽㣲山三湖而湖尤居下流為衆水所歸汪洋浩瀚與運河連為一片宵旰勅大吏亟力籌洩路叶查辛丑壬寅因青龍崗漫口屢築未成降㫖命薩載等勘亟籌去路嗣據奏漫水由㣲山湖下注邳宿挑清運河出楊荘口門歸海将駱馬湖竹簍牐先行開放其餘各牐壩次苐啟放洩水由劉老澗下注六塘河歸海并開挑㣲山湖下之顧家荘等引渠分洩水勢為一時權宜補救之計幸而運道河湖得保無虞然猶異常盛丈深難計數下㳺去路雖多而来源本大湖水猶異常盛漲測量深二丈三四五尺不等漕船有失事哀哉運丁苦沛縣竟頺城吾民受悽楚為之切憂煎不靳賑恤普昨嵗幸河復微湖潦消屢上年漫口未合河湖水勢相連漕船行走有被沉溺之事曽降㫖将應賠米石全行豁免以示體恤至沛豐等縣及山東之金鄉魚臺被淹最重而沛縣城垣竟致頽圮莭􅀴降旨撫恤並加恩将被水各州縣給予常賑俾灾黎不至失所幸昨嵗青龍崗漫口合龍河復故道積潦漸消居民始獲安堵矣翻慮消太多濟運漸築堵自昨嵗三月漫口合龍後㣲山湖水勢陸續消落至八九月湖水止存一丈二尺五寸已符往年定誌又當預為儲蓄因令薩載等将微山湖尾閭五道引河並運河中河各牐壩及藺家山草壩乘時接築堵閉收蓄水勢以濟重運縴道以次修濟寧以南運河兩岸工程分作四十九叚前據明興等奏過白露後堤岸均已涸露現在積料鳩工簽樁夯土畚鍤雲集在事各委員及夫役等無不歡欣鼓舞踴躍從事所有堤岸各工均一律興修赶辦於春前完竣往來利行旅乘勢在待時罅苴惟漏補敢言希平成悚慚不遑處過沛縣我過沛縣境不見沛縣城移城向西北髙處謀久恒實因壬寅潦追憶心猶怦河决青龍崗一片水鋪平埤堄為之湮老㓜為之驚嗟嗟我赤子忍弗救其生蠲租豈待言賑饑繾遥情那論極次貧踰年周濟増沛縣自辛丑九月猝被豫省漫口之水下注将䕶城堤冲塌水由東北直入沛縣壬寅八月又因風大水湧城墻及衙署民房悉皆坍塌莭經降㫖撫綏并加㤙常予賑恤至合龍後復降㫖展賑至癸卯六月又以該縣及銅山豐邳等州縣并山東之金郷魚臺濟寧等處低地未能全涸復降㫖再行普展賑五個月以資接濟即今河雖復涸地已可耕慮其乏顆粒借種上聲資經營沛縣等低窪地方除展賑外其灾分稍輕地畆并諭令該督撫等酌借籽種俾得趕種春麥舊城地本窪移建就髙坪沛縣舊城地本低窪難以修復前經諭令薩載于沛縣境内各鄉履勘髙地移建城垣嗣據奏履勘得該縣西南三十里之戚山地勢較髙五六尺且南有縷水隄北有太行隄東臨叠路三面攔截可期永無水患該處舊有村荘即為南闗形勢亦甚聫絡因飭尅期發帑委員分叚承修責成道府催督於昨嵗修建完整閭閻安堵士民同聲歡忭老㓜來謝恩幸少鳩鵠形痛定思事前憐之慙愧并運河自從辛丑河北决踊愁為害無底止三湖雖未受沙淤辛丑青龍崗河决北岸即慮淤湖阻運深以為憂不啻三咨五詢莭據河東縂河及山東巡撫奏報大溜由金鄉魚臺下注蕩漾數百里漸次澄清至南陽昭陽㣲山三湖即係清水歸邳宿桃清運河出楊荘口門入海三湖運河皆未受沙淤澄剰清流盡歸爾㣲山湖更居下㳺與運連成一片矣兩岸縴道及牐壩多半弗見見惟水以此亟求疏洩法不遺餘力不惜費叶陽㣲山湖地勢更在南陽昭下㳺清流灌注與中運河連為一片縴道半沒水中雖微山湖尾閭於丁丑年開伊家河一道長六十九里由韓荘牐下宣洩入運但開挑時山根沙礓未能净盡因命袁守侗何裕城等㑹勘並命大學士阿桂覆勘比前加挑寛深俾湖水得暢達入運而運河東之駱馬湖竹簍等牐壩多籌去路由劉老澗下注六塘河歸海更開挑㣲山湖下之顧家荘等引渠俾分洩入舊黄河凡所以洩㣲湖之漲籌畫無遺徼幸昨年河復故青龍崗乆未合龍因于蘭陽商邱一帶另挑引河至癸夘三月開放十四日金門合龍河復故道兩載憂勤幸得一舉蕆事微湖下流去如駛舊誌蓄水丈二尺後存丈三多無幾因之陸續兩岸露牐壩次苐工興起本殊民修及官修亦是從來例如此災餘民力那能兹一概發帑官修耳昨夏命大學士阿桂等勘估自濟寧至韓荘三百餘里隄工五萬三千餘丈民堰五萬五千八百餘丈分别估修其民堰因此次被災較重概發官帑修理以甦民困其韓荘大石工并上下牐座橋壩涵洞裏頭等工亦俱勘修復于大石工外估築臨湖圈壩以便興築統計各工需銀五十五萬六千零嗣據蘭第錫奏原派工四十九叚除先修十五叚外其餘均于去年八月普修趕辦又據薩載等奏去嵗夏秋以来各湖消水最速㣲山湖現深一丈三尺較定誌應收之一丈二尺所多無㡬又不可不早為儲蓄因查二十二年孫家集漫口合龍後積水至兩年始行消盡此次以廣籌去路是以積水易消今又恐分洩太過無以濟運因将各牐壩次苐堵閉收蓄水勢以濟重運兹来舟行稳順縴道隄岸修復如故益信事在人為也兹來縴道原如故安福艫名中行平如砥却憶丁丑决孫集積水兩年始消彼斯乃積多消反速事在人為本至理命議叙薩載李奉翰蘭第錫何裕城明興等詩以誌事辛丑河北决踴懼為運患幸而沙漸停辛丑河决豫省北岸之青龍崗黄水下注經由東省金鄉魚臺等處蕩漾停淤水色幸巳澄清運河免受淤墊之患清水三湖漫漫口之水滙歸南陽昭陽微山三湖者均属清水是以湖身亦不致淤淺微湖居下㳺洪流實浩汗堤堰那能禦與運連成片癸邜河復故疏剔督籌辦所幸去路多消􅌺施工便濟寧至黄林兩岸工分叚微山湖在南陽昭陽湖之下㳺漫水灌注與運河連為一片縴道半沒水中黄河一復故道即命袁守侗何裕城等㑹勘伊家河加挑寛深俾河水暢達入運復命薩載李奉翰等籌勘去路将微山湖下㳺之顧家荘引渠開挑寛深及駱馬湖各牐壩次第啟放分洩湖河水勢俾運河兩岸得以迅速興工薩載李奉翰之功亦不可冺復命大學士阿桂勘估自濟寧至黄林荘共重修官堤五萬餘丈官修民埝一萬四千五百餘丈并牐座橋壩涵洞等工分叚𣲖員購料僱夫優給價值即以代賑自上年四月至本年閏三月一律完竣實用銀五十三萬九千餘兩運道頓復舊觀兹御經􅀴過兩岸及縴道橋牐壩座俱各堅實鞏固漕運民船均資利濟其督工則蘭第錫何裕城明興董率有方在事人員亦能奮勉出力因降㫖交部分别議叙以示優奨堤埝及牐壩次第胥修建和雇弗惜帑代賑功倍半何期一年中運道復舊觀御舟兹經過如昔牽長縴不惟利漕艘行旅普稱便勤哉大小吏優叙酬劬倦慙無安晏䇿遑惜籌宵旰一勞盡我心永逸祈天眷乘輿過濟寧州清曉乘輿弗䇿驄古稀遵養合知崇家絃户誦文風蔚㓜挈老扶物象融百嵗熈和非易致萬民親愛不期同那堪迴首思辛丑辛丑秋河决豫省青龍岡漫水經由東省之曹單城武金鄉魚臺濟寧等處思及城池民居岌岌乎殆幸昨春河復今覧閭閻無恙且涸出地畆轉為膏壤實出意外也幸矣斯邦尚惕𠂻登太白樓四曡舊作韻綪筏旃旌入郭闉青蓮遺跡向傳真千年佳話留詩酒一代名流稱去聲主賔亭北早應賦雲想謂李太白池南近可和去聲檐巡謂杜子美祠在城南池求賢欲以贊實政此際無資若輩人南池襍詠適纔太白試登樓咫尺南池可罷不一入門心生敬慕碑亭因是聖文留康熈乙丑年建碑亭于此恭勒皇祖閱河隄詩㡬株古樹䕶澄池池畔三間老杜祠便弗叩還應下拜此人詩合是吾師李杜由來伯仲行吾云旗鼓異相當應知學杜克念聖學李防其罔念狂謁分水龍王廟地脊原來南北分老人能識果超羣分水人皆知為白衣老人之力而不知分流濟運乃因地脊自然形勢人不能識老人特能識之耳水村斯藉䟽宣夥河復何須議論紛前嵗韓鑅于戴村壩上建挑水壩三道挑溜南趨以洩水勢經工部侍郎徳成奏駁嗣何裕城復請于戴村壩改建牐座議論紛如因命大學士阿桂于豫省河工合龍後親至㑹勘據覆奏牐座雖隨時啟閉但沙隨水入即使建牐後南旺嵗修仍未可停况汶水由塩河歸大清河入海年年開放塩河是否能容東平各處民田是否無礙均須逐一詳勘請俟東省運河堤壩各工告竣經厯汛水一兩次後再行請㫖辦理所奏為慎重修防起見因允所請天下本無事如此明神頼有佑誠云御舟由是順流下登岸應抒瞻拜勤降㫖將明興等奏請捐亷歸還運道工程例外津貼銀兩並准作正開銷詩以誌事户口日以滋物價日騰貴國家承平百數十年户口日滋順治初年民數一千六十餘萬乾隆初年已増至一萬六千餘萬近年乃至二萬七千餘萬是户口増至二十倍物價日昂理勢自然詳見癸夘民數榖數詩是即保㤗難可靳官帑費前年河北决堵塞口宣引河䇿籌備和僱與民價征役弗民逮壬寅年因豫省青龍崗漫口屢堵弗就議開引河經韓鑅等請撥直𨽻山東夫役助工朕以隣省助夫非便屢經降㫖訓諭停止並令緩至次年挑汎完工隨命大學士阿桂前往督辦和雇本省民夫如期藏事詳見壬寅年助夫詩然而奏銷時部原有成例增價例應駁乃有捐亷議堵築漫工及築隄開渠部中原有一定成例前豫省漫工奏銷時據該撫李世傑奏請酌増夫料價值銀兩分年攤徴朕以為數甚多民力不無拮据特降恩㫖将應行攤徴銀九百四十五萬餘兩及上次攤徴未完銀九十四萬餘兩普行豁免兹河復之後修理東省運道各工據明興等奏有例價不敷加用津貼銀五十三萬餘兩請分年捐亷歸欵以免按例攤徵等語吾豈肯為斯普許官銷賜河復修運道較前本一事兹勘所築工堅整如鱗比田廬實可衛議叙酬勤勩山東運河隄岸各工御舟經過時見其一律完整辦理妥速因降㫖将蘭第錫何裕城明興及江省預籌宣洩漫水去路之薩載李奉韓等交部議叙並令該撫查明在事出力人員一體從優議叙以勵勤勞必有所增價亦准官銷暨東省運道工程例價不敷銀兩若按例攤徴固恐民力不給即捐亷亦慮辦公竭蹶因降㫖加㤙准其一體作正開銷以示體恤臣工恵愛黎民之至意但弗勞萬民忍更苦羣吏一二資飯食雖有非大弊河工官役領帑辦工藉沾餘潤以資飯食在所不免但非有侵蝕大弊姑置弗問亦不為己甚之意也聚歛及盗臣傳語吾猶記登光嶽樓即事四曡舊作韻九㸃烟中齊一區大圓鏡裏漫分隅觀風遂以停艫舫問景權教履陌衢拾級登來霄漢接憑窓望處近遥鋪載将通志殷勤考光嶽誠斯望嶽無一統志以望嶽樓在聊城東北今名光嶽樓而東昌府志又稱城東北隅别有望嶽樓兹巡蹕屢經則光嶽樓在東昌府城中而望嶽樓今實無之紀載之不足徴信已詳見乙酉庚子詩并注嶽光原在望中區何必兼思東北隅舊望嶽樓云在城東北隅也漫憶吴閶饒水郭奚妨齊野厯烟衢以予視本同庭户嫌彼争為盛設鋪四叠欣成十全什合因閣筆復􅆳無無為觀三曡舊作韻佛寺道家宫是處為道觀胥應致敬崇謁神匪為去聲獨求雨總因公東省自閠春得雨後大田雖種今復望雨呵䕶閭閻晏敷宣天地功那忘甲午嵗賊燹劇哀鴻甲午秋夀張逆匪王倫以邪教倡亂佔踞舊城寺廟民居多被殘毁此觀亦重經修整者河間道中作春初此南巡為之望雪愁夏孟斯北旋復因希雨憂其間雖霈澤閠三月初四五等日近畿得雨頗為透足是以大田得普種齊全但至今晴又逾月待澤復殷又隔月餘修禾黍縱吐苗麰麥固失收稚秧廹待潤遍隴青垂頭邇日纔生雲狂風吹以流西北隂勢重深冀佳􅉈優無過霑二寸邇日西北雲濃清早甚凉兹據劉峩胡季堂虞鳴球等奏十三日申刻新城縣得雨三寸涿州通州武清順義昌平州等處得雨二寸雖未霑足䆒亦天澤但此處不成分寸仍為憂之較此勝一籌何當普甘霖近逺胥䝉庥調幕信無能觀民惟含羞喜雨四月十八日自我渡河後望雲愁日深誰期近趙北是日駐思賢村明當至趙北口五寸沐甘霖起槁還蘇秀滌眸真慰心豫齊徐被否自午至申得雨五寸勢甚綿宻且四望雲氣廣逺山東河南江蘇等省或同被甘膏因降㫖馳詢該督撫令其迅速覆奏馳驛問佳音復雨四月二十日前朝思賢村佳􅉈霑五寸今日過趙北廿里土乾坋問以前朝澤稱滋一寸僅為之復增愁傍晚雲生迅作觧殷雷聲傾盆落雨陣急命劚土㸔四寸已逮潤勢自直北來亟盼京畿信南巡迴蹕至御園之作六度南巡于邁勤一心惟是為民殷雨雖繼雨仍希望自閏三月初四五日得透南後復於四月十八二十一等日連得雨澤蹕途所見禾苗漸次長發但究未透足尚殷顒望耳孫又生孫亦喜欣日月居諸誠過隙園庭莅止迓南薫載咨兒輩其聰聽毋易言遊視記文今嵗六巡江浙携諸皇子侍行俾視朕躬之克已無欲以及扈從之奉法官吏之奉公民人之親近有不如此未可言南巡而總不出敬見天明理両端詳昨所製南巡記欽定南巡盛典卷二十三
