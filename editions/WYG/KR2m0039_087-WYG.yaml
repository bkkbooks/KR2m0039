body:
  text: 海塘乾隆二十六年四月初三日莊有恭奏言竊臣看得海寧縣東塘小文前等處條塊石塘三叚從前改建大工之時塘身鞏固未議一律改建該工自雍正八年建築以来已歴年久塘身日漸矬蟄先經該司道具詳請修經臣親徃查勘批飭確勘估報兹㨿布政司明山杭嘉湖海防道永徳詳稱小文前一叚外無䕶沙塘根狭淺應改建魚鱗石塘一十丈塘身拆出舊石修建條石坦水一十丈又白牆門東一叚地勢稍低舊坦外㳺塘脚不整應照本工做法修築條塊石塘四丈拆出條塊石料添砌坦水一十丈又念里亭盤頭西側條塊石塘二十五丈面土矬蟄應行一律加髙平整并修補隨塘坦水二十五丈前項各工俱属𦂳要飭委平湖縣知縣劉純煒領銀承辦行㨿東塘同知并海寧縣估需工料銀三千八十九兩四錢三分六釐零悉與成例相符所需銀兩請於司庫塘工經費項下照例給發委員儧辦以禦潮汐工完委驗請銷合將估册詳送察核具題臣覆核無異除册送部外恭䟽具題奏入上諭部知之乾隆二十六年四月初六日莊有恭奏言竊照杭州府属之東西兩防塘工縁自上年霜降後江流弱小不能冲刷南沙以致逼溜北趨將北岸漲沙大半刷卸經臣於詣闕時繪圖陳奏仰蒙睿鑒今臣於本年二月十四日旋任詢㨿司道㕔汛禀自十二月至本年二月上旬北岸新舊沙塗仍多被刷臣隨於十七日馳詣各塘先由西塘境内之翁家埠老鹽倉馬牧港一帯逐一查勘自臣交篆後至本月望汛止刷去老沙自三十丈至一百三十三丈不等其東塘境内胡家兠以下新漲沙塗現㨿被刷無存其南岸漲沙自蜀山西至文堂山脚臣復委員量驗現存沙寛五百丈至九百七十丈不等又巖峰山脚漲沙之外復起有中沙一道量寛二百餘丈其文堂山西脚中沙一道寛長丈尺較上冬亦有加增以致逼溜日益向北幸自本月初十至十五十六等日上㳺各属連得雨澤江水長發臣履勘之時正值望汛大潮竊見江流迅駛已足抵禦潮頭將来江水旺發若將南沙日漸冲刷仍可期掣溜向南惟是北岸與巖峰斜對之老鹽倉為柴石兩塘交接之區雖直出老沙尚有一千八十餘丈而自柴塘頭斜向東南抵潮溜掃灣處所僅寛二百七十四丈臣徃来相度細察情形大潮由海寧城外逼於蜀山脚下堰溝東北新漲陰沙潮頭由曹殿盤頭折向西北則老鹽倉實為潮溜頂冲該處柴塘停修十有六年前因䕶沙寛廣未敢輕議拆鑲今去掃灣處所不及三百丈自應先事預防查二十四年動支引費購柴四百四十餘萬觔存貯備用除撥鑲韓家池柴塘及三處盤頭共用柴二百餘萬觔現存柴二百三十五萬觔不敷應用臣已飭司在於塘工經費頂下動支銀四千兩分發富建桐分四縣採辦柴薪依期運觧並飭另發銀一千兩飭令西防同知購辦樁木器具預解工所以資搶䕶其餘塘坦石􅄵内除緩搶二工有應請分别續修之處另行具摺餘皆一律稳固所有臣旋任後查勘両塘沙勢情形及籌備縁由謹繪圖恭摺具奏奏入報聞乾隆二十六年八月二十五日楊廷璋莊有恭奏言竊照海寧境内之尖塔両山相去二百丈該處􅄵身底靣約髙五丈此埧本縁沙漲始得合龍五丈之下即係積沙非純用簍石築成者可比上年三月望汛刷去南北両靣䕶沙七十餘丈􅄵邊即有蹲矬剝落之處應行先事預防是以臣莊有恭請用寛長竹簍填貯塊石三層叠砌以為攩浪䕶根之計幸自建築之後旋有新沙漲䕶經渉伏秋大汛鞏固無虞今年因五月雨多潮溜盛大又縁塔山對岸漲有中沙一道大溜為中沙所逼徑薄大尖山下其洄溜由尖山之麓盤旋迅激還薄􅄵根外沙被刷即底沙亦漸遭捜嚙六月二十内外將面篓六十三個蹲矬四五六尺不等又經臣莊有恭飭委東防同知張曾肇添做薪篓鳩工填築於六月二十三日恭摺奏明今㨿該㕔禀報自七月初一日至初四日新築竹簍俱有蹲矬􅄵之邉石亦多坍落臣等因查勘海寧差務先後赴該􅄵親加體勘竊見上年安置面簍一百八十七箇今次加蓋新簍五十三箇勢漸外㳺内外新舊竹簍一百五十餘箇蹲矬下䧟自數尺至丈餘不等所有􅄵旁邉石本係𦂳貼簍頭陂陀斜築因竹簍外㳺下䧟是以邉石一百餘丈亦多脱卸坍矬臣等查該􅄵挑溜外行為通塘障衛前後費帑至六萬七千餘兩所關綦重今􅄵外竹簍雖因底沙捜刷㳺動低矬而􅄵身不至摇動尚藉此數層竹簍擁䕶根脚之力今籌保衛之法惟有即以蹲矬舊簍為基仍照前用長方竹篓式不計層數逐層加築總以髙出水靣𦂳貼􅄵身為度庻保無虞但現在矬䧟之處有深有淺非將極大塊石先為一律填平遽將竹簍施放不能保無傾側查前貯塊石四百方除添做新簍之外所存無幾今與道㕔各員在工約畧統計堆填盛貯以及修整􅄵邉并存工備用約需塊石三千方現在就近遴員飭令分頭採辦限日運觧以濟工需再查上年簍工係前任海寧縣今調平湖縣知縣劉純煒一手承辦該員頗能不辭勞瘁今仍檄調該縣即日赴工恊同専管同知上𦂳辦理謹將現勘情形及籌辦事宜恭摺具奏奏入報聞乾隆二十六年十二月二十六日莊有恭奏言竊照海寧縣西塘境内老鹽倉一帯因自上冬至本年霉伏二汛塘外老沙積多汕刷臣因該處柴塘停修十有六年亟宜先事預防先於本年二月飭司於塘工經費項下動支銀五千兩分發㕔縣購貯柴薪樁木以資備用嗣於四六兩月先後拆鑲三百丈以資捍禦節經恭摺奏聞兹自霜降後臣因查閲海寧差務不時徃来查勘竊見柴石兩塘交接之區水已臨塘自此迤西老沙仍多接續坍落前於請鑲第二叚時該處䕶沙尚存四百二十四丈今至本月朔汛僅存二十九丈向西雖䕶沙較廣又有堰溝一道貼臨塘脚潮溜徃来長落致將䕶沙推刷舊塘柴頭間叚呈露急宜接續加鑲以禦春汛當即諭飭道㕔覆加勘估兹㨿杭嘉湖道永徳㑹同布政使明山轉㨿該㕔縣請詳自已鑲二百丈起再行接鑲一百七十丈估需工料銀三千一百二十六兩九錢零内除柴薪樁木需銀二千四百六十八兩四錢應即於貯工備存項下撥用毋庸動項所需夫工雜料銀六百五十八兩五錢零應請在於塘工經費項下動支給發委員領辦并造具估冊詳送到臣臣查該工實属𦂳要估報料工銀數均與成例相符除即飭委西塘同知董世寧乘此天和水涸先將接連前工之七十丈上𦂳鑲辦餘再次第接修并咨明户工二部再查東塘境内韓家池柴塘因於本年七月十八十九等日風潮潑卸應行拆底鑲築另於風潮案内分案具題又西塘境内自秧田廟起至普兒兠止均有應建應修坦水現在飭取確實估冊詳送俟詳到再加確核分别奏明辦理奏入報聞乾隆二十七年二月初七日莊有恭奏言竊照海寧縣東塘韓家池柴塘二百八十丈因本年秋汛潮水頂冲外沙坍卸兼遭風潮潑刷致將柴埽矬䧟五六尺不等先㨿該司道詳請拆底加鑲以資捍衛經臣批飭確估興修今㨿布政使等㑹核册開工料銀四千三百二十一兩二錢二分六釐内應需柴薪銀二千九百六十三両五錢二分動項分發新淳等縣辦運解工濟用應需夫工樁木等項銀一千三百五十七兩七錢六釐照例動支塘工經費委貟領解以禦春汛臣覆核無異除冊送部外恭䟽具題奏入報上諭部知之乾隆二十七年三月初八日大學士公傅恒等奏言本年三月初二日内閣奉上諭朕稽典時巡念海塘為越中第一保障比嵗潮勢漸趍北大亹實關海寜錢塘諸邑利害計於老鹽倉一帯柴塘改建石工即多費帑金為民間永逺禦災捍患良所弗惜而議者卒以施工難易彼此所見紛岐昨於行在先命大學士劉統勲河道總督髙晉巡撫莊有恭前徃工所簽試樁木朕抵浙次日簡從臨勘則柴塘沙性澁汕一樁甫下始雖扞格卒復動摇石工斷難措手若舊塘迤内數十丈許土即冝樁而地皆田廬聚落將移換石工毁拆必多欲衛民而先殃民其病甚於醫瘡剜肉矣朕心不忍且并外塘而棄之乎抑兩存而贅疣可乎以此蒿目熟籌所可為吾民善後者惟有力繕柴塘得補偏救弊之一端耳地方大吏其明體朕意悉心經理定嵗修以固塘根増坦水石簍以資擁䕶庻幾盡人事而荷神庥是朕所宵旰厪懐不能刻置者至繕工欲固購料不得不周現在採辦柴薪非河工秫葦之比向為額定官價所限未免拮据應酌量議加俾民樂運售而官易集事其令行在户部㑹同該督撫詳悉定議以聞朕為浙省徃復咨度之苦心其詳具見誌事一詩督撫等可并將此㫖於工次勒石一通永志遵守毋忽欽此仰見我皇上軫念民依於捍衛民生之中寓曲體物情之意俾厚其值而民樂於從事寛其用而工易於集成誠保䕶安全之至計也伏查海寧柴塘工程從前柴價每百觔部定則例准銷六分乾隆七年欽差劉統勲㑹同前督撫臣徳沛等因柴價不敷購辦恐悞要工奏請加銀三分每百觔統以九分報銷經部覆准行是該處料價業已較前加増今蒙聖恩念及邇日柴價稍昂恐小民購辦裝運或為額定官價所限不無拮据特沛恩綸令臣等㑹同酌議加増臣等面為商㩁應請於原定九分之數再加一分每百觔統以一錢報銷以敷辦工惟是發價運料全在地方承辦之員經理得宜果能使購運交納民間無守候擾累之煩給價接収吏胥絶朘剝抑勒之弊則恩加價值得以實恵在民倘調劑未能妥恊即使倍増其價亦恐不能悉歸實用臣楊廷璋莊有恭當嚴飭工員實心承辦務使吏無侵漁而工資儲備以仰副聖主加恵海疆優卹小民之至意如有浮収短價等弊即行從重懲治自此加増辦理之後或將来柴價漸平該督撫即隨時酌减核實報銷勿致稍有浮収俟命下臣等仍咨明工部一體遵照可也奏入報聞乾隆二十七年四月初三日莊有恭奏言竊照海寧老鹽倉一帯柴塘水臨塘脚工程𦂳要仰蒙我聖主厪念民生綢繆未雨親勤萬乘靣示機宜洞若觀火實切中保衛久長至計臣於本月十五日跪送鑾輿之後即由便道趍赴海寜十六日辰刻先徃塔山查勘􅄵外漲沙勘得原標記第一竹簍自十三日福隆安努三續勘除増漲外露髙一尺一寸五分者今復増漲六寸五分僅露出竹簍五寸其第二竹簍續勘除増漲外露髙一尺三寸五分者今復增漲一寸五分尚露出竹簍一尺二寸其臨水之第六十九簍則仍照前尺寸未有増漲詢之在工人員㨿云連日大汛潮水湧急之故臣己靣諭工員嗣後五日一報以憑稽考彚奏十七日臣即查勘老鹽倉一帯徃復諦視相度其柴塘外䕶沙日漸汕刷勢益向西而塘靣亦日見蹲矬誠如聖諭湏以修至觀音堂為度臣現在帯同海防道永徳遵奉聖明指示一一詳悉𫝊述俾令共知遵守興工則自東而西一面多方集料一面分手程功除臣前奏已修二百七十丈外接修至觀音堂計尚有應拆修柴塘六百七十五丈臣飭令務於秋汛前完工以資保固至柴塘之下本属活土浮沙若修條塊石坦水關樁既難施工石料亦易㳺䧟臣自當遵照諭㫖即以竹簍作坦水相水勢之淺深或二層或三層四層務以保䕶柴塘根脚不致游矬為度再臣查此處一帯柴塘自乾隆十年停修之後柴朽樁腐舊料無可添用則此次之拆修實與新築無異一切工料俱須務求堅固今現在所修柴工底寛一丈二尺面寛一丈八尺髙一丈六尺臣覆加細勘尚嫌单薄所有髙寛丈尺及底樁腰樁靣樁應用數目應請仿照雍正十年拆底修築之案再加核實酌量辦理臣已靣飭該道永徳親督諳練工員各就柴塘叚落参照雍正十年成案據實確估俟估報到日另將現在做法恭摺奏聞一靣臣即親督工員遵照辦理至前撫臣朱軾所修之舊大石塘四百六十丈蒙聖諭亦應増條塊石坦水臣於潮水退净之復履行塘下逐叚查勘縁從前俱未建有坦水此時關石樁及底樁露出者通工自二三尺至四五尺不等且有底樁向外欹斜空虚須拆開重修計至十丈者臣現在飭令該道率同㕔汛各員通盤估計分别緩急次第興修至應用錢糧臣現在行令藩司查明欵項數目另疏題請所有遵㫖查勘籌辦縁由謹恭摺具奏奏入報聞乾隆二十七年九月二十七日莊有恭奏言竊臣看得東西兩塘應修應建坦水工程一千六百六十餘丈先於乾隆二十五年二月間經臣㑹同督臣逐一勘明分别緩急奏請次第興修欽奉俞允内除最要坦工七百七十七丈次要坦工一百七十丈五尺均於乾隆二十五六年等先後趕辦完固分案題銷其餘七百一十餘丈本年春間臣節次赴工逐一履勘内有一百三十丈或底沙増刷塘身露髙十五六層或舊有樁石殘缺兵力不能理砌又迤西另有搶修石塘二十一丈五尺塘身亦現在露髙十五六層舊存塊石不及二分急應一併估辦又念里亭白牆門兩處舊有盤頭二座積被汕刷塘根將露應行改建石坦三十一丈以資堅久所有現在辦理縁由業經㳟摺奏明兹㨿司道㑹同詳稱前項應修應建坦水工程共長一百八十三丈三尺估需銀八千三百四十五両零估用工料與例相符除經詳奉派委東防同知劉純煒等五員分叚承辦工完委驗結覆請銷外合將送到估冊詳候核題臣覆核無異除冊送部外恭䟽具題奏入上諭部知之乾隆二十七年十二月二十九日浙江巡撫熊學鵬奏言竊臣於十一月初四日自杭州起程查勘海塘各工從仁和縣八仙石起至江南金山縣界止計程三百餘里俱係海塘其尖山以西潮頭始起自北大亹開後汕刷塘根工程較險内老鹽倉至觀音堂更當冲溜活土浮沙尤属險要仰蒙睿慮周詳籌畫添建柴塘竹簍坦水等工誠為切中機宜所有原議工程九百四十五丈俱已告竣續因塘外䕶沙日漸刷低水勢漸逼塘根自觀音堂至翁戴二汛就其水勢臨塘之處經前撫臣莊有恭奏明添建接鑲柴工三百丈臣抵任後批飭辦料興工内一百五十丈已經完竣尚有一百五十丈十一月底可以告成臣入海寧縣界勘至薛家􅄵等處地方海潮自尖山入口斜掃而来以致該地方獨受其冲本年七月風潮將塘身間叚坍卸前撫臣莊有恭題請改建魚鱗大石塘一百四十三丈七寸陳文港盤頭改建坦水六十丈一尺及條塊石塘五丈裏頭四丈八尺工尚未完詢據道㕔等各員僉稱所需石料有採自江南洞庭等山者有採自浙省羊山大山等山者因船隻運送石料未齊是以遲緩臣查此地雖較老鹽倉等險處稍次然亦湏加𦂳籌辦當經嚴飭海防兵備道永徳督令委員多僱船隻加𦂳辦齊物料務於春汛前工竣再臣東至尖山石􅄵周遭履勘此時冬令水涸貼簍沙髙擁䕶工皆稳固臣復循海而北由海鹽至平湖茅竹寨等處逐一察勘沙係鐡板設遇風狂浪驟直潑塘面潮不捜根較之尖山以西潮溜直刷塘根者情形各别其秦駐乍浦諸山山峻沙堅内惟海鹽以一邑當潮汐之冲該處石塘闗係𦂳要本年七月風潮坍缷裏外攔石七百餘丈業已修復完工又平邑獨山石塘五百餘丈今年風潮坍缷二十餘丈現在修築十二月初亦可完工其餘本年搶修各工併自東至西石土各塘尚属平稳間有一二殘缺之處臣已指示各㕔汛員弁隨時修補完固以禦春汛臣於十六日前徃紹興查灾時先至河莊山文堂山赭山等山登髙察看南大亹雖有赭山脚老沙挖進一百七十餘丈但沙勢髙而廣濶一時南大亹似不能冲破至中小亹雖現在沙壅其沙勢較之南大亹低至三四尺不等又看北大亹情形河莊巖峯蜀山各山之北目今老沙日就坍刷水勢漸向南趨岸北翁家埠至馬牧港一帯新漲出有嫩沙約寛三四里不等倘於明年春汛前後得不坍缷漸漲漸堅則水趨中小亹可望其復開通矣臣接莊有恭来札内稱海塘汛期己過尚無應辦事宜俟新正後春汛將臨當前詣各塘㑹同查閲除俟莊有㳟到浙㑹同查閲再將臨時情形勘明妥議請㫖遵辦外臣思現在時值仲冬應將所辦各工上𦂳赶辦完竣臣一面督飭海防兵備道永徳并委員及㕔汛等官弁實力儧辦按旬摺報務於春汛前竣事臣在杭城與海塘甚近仍不時親身前徃查驗督率如有怠玩不力者即時嚴㕘示懲謹將勘驗過海塘各工柴土石塘己未完竣及現在儧辦之處併坍漲沙水情形分繕清单繪具圖説恭呈御覽奏入上諭曰汝二人和衷共濟自當仰邀天佑復歸中亹故道欽定南巡盛典卷五十七
