body:
  text: 祀典乾隆四十四年十月初八日禮部奏言乾隆四十五年正月恭逢皇上聖駕南巡臣等伏查三十年聖駕南巡臣部具奏沿途秩祀事宜奉㫖照二十七年舉行嗣經奏准禹陵元聖周公先師孔子闕里東嶽岱宗河瀆淮瀆江瀆河神廟海神廟南鎮㑹稽山均經遣官讀文致祭明太祖陵親詣奠酒仍遣官讀文致祭至往返渡江渡淮渡河時或親詣拈香或遣官之處臨時請㫖此次聖駕南巡所有山東境内元聖周公先師孔子闕里東嶽岱宗江南境内河瀆淮瀆江瀆河神廟明太祖陵浙江境内禹陵南鎮㑹稽山海神廟共十一處應請照三十年之例遣官致祭現在御路所經順黄壩之河神廟係乾隆四十二年奉㫖建立自應一體遣官致祭至渡江渡淮渡河時或親詣拈香或遣官拈香之處届期臣部具奏請㫖所有應用祭文交翰林院撰擬香帛由太常寺帶往祭品交地方官備辦各處遣官届期臣等將扈從之王大臣繕寫名簽奏請欽派再御路經由三十里内之先賢先儒名臣勲臣祠墓因恐近年間有増易之處臣部行文咨查各該督撫俟查覆到日臣部比照前次遣官致奠各處所恭繕清单奏請欽定奏入報聞乾隆四十四年十二月初三日禮部奏言恭照明春皇上南巡前經臣等奏准遣官致祭嶽鎮海瀆等處并聲明御路所經三十里内應行致奠各祠墓俟各該督撫查覆到日再行具奏兹據江南河道總督李奉翰咨稱寳應縣境之湖神廟係乾隆三十年二月内奉㫖勅建又清河縣境李家莊之新鹽河閘大王廟係乾隆四十三年奉㫖勅建均在御路三十里以内查順黄壩之河神廟已經臣部奏准遣官讀文致祭今據咨稱寳應縣境之湖神廟李家莊之大王廟亦在三十里以内似應一體遣官讀文致祭所有應用祭文由翰林院撰擬香帛祭品交地方官敬謹預備奏入報聞乾隆四十四年十二月二十五日禮部奏言恭照明春聖駕南巡所有應行遣官讀文致祭之嶽瀆及厯代帝王陵寝闕里等處業經臣部奏明至應請遣官拈香奠酒之先賢先儒名臣各祠墓聲明俟各該督撫查覆到日另行具奏今據直𨽻等省各督撫册報御路三十里内先賢先儒等祠墓祠墓三十七處查與上次奏請遣官拈香奠酒各處所均属相符理合䦕列清单恭呈御覽至册報山東汶上縣禹王廟龍神廟浙江仁和縣海潮神廟錢塘縣江潮神廟等四處查上次奏請遣官拈香此次應請一併遣官拈香恭候命下臣部行文各該督撫照例敬謹預偹届期臣部將扈從大臣等繕冩名簽奏請欽派再兩江總督薩載咨報大學士劉綸祠離御路二里明臣史可法祠墓離天寧寺行宫半里查原任大學士劉綸係奉㫖入祀賢良祠明臣史可法扵乾隆四十年賜謚忠正此二處祠墓應否遣官拈香奠酒之處伏候諭㫖遵行奏入報可乾隆四十五年正月十四日行在禮部奏言前經臣部具奏直𨽻河間縣先儒毛萇祠遣官拈香謹將扈從大臣職名繕寫名簽恭候欽派一員前往拈香奏入得㫖遣蔣賜􅙺乾隆四十五年正月二十日行在禮部奏言前經臣部具奏山東省先師孔子闕里元聖周公東嶽岱宗遣官讀文致祭謹將扈從大臣職名繕寫名簽恭候欽派二員前往承祭奏入得㫖遣􅄞璜逹椿乾隆四十五年正月二十八日行在禮部奏言恭照前次聖駕南巡往返渡江渡河渡淮俱䝉親詣綵棚拈香此次聖駕南巡往返渡河渡江渡淮或照上次親詣拈香或遣官拈香之處伏候諭㫖奏入得㫖朕親詣拈香乾隆四十五年正月二十九日行在禮部奏言前經臣部奏准江南省河瀆之神淮瀆之神又順黄壩新建之河神廟楊莊之大王廟應遣官讀文致祭並河臣靳輔齊蘇勒􅄞曽筠髙斌四人合祠請遣官拈香謹將扈從大臣職名繕寫名簽恭候欽派二員前往讀文致祭欽派一員前往拈香奏入得㫖遣達椿徳明嵩貴謹按奏内楊莊大王廟一處經上年禮部原奏以李家莊新鹽河閘大王廟係乾隆四十三年奉㫖勅建議准遣官讀文致祭嗣因巡蹕由楊莊經過故此奏改請楊莊致祭云乾隆四十五年二月初八日行在禮部奏言皇上親詣河瀆拈香儀注是日皇上具行服乗輿至綵棚降輿處降輿臣達椿臣徳明恭導皇上入綵棚至香案前立司香官恭捧香盒跪進皇上三上瓣香鋪拜褥官鋪拜褥皇上陞拜褥不贊行二跪六叩禮禮畢臣等恭導皇上出綵棚至降輿處陞輿奏入報聞乾隆四十五年二月初九日行在禮部奏言前經臣部奏准江南省寳應縣新建之湖神廟遣官讀文致祭謹將扈從大臣職名繕寫名簽恭候欽派一員奏入得㫖遣蔣賜􅙺乾隆四十五年二月十四日行在禮部奏言皇上親詣江瀆拈香儀注是日皇上具行服乗輿至綵棚降輿處降輿臣達椿臣徳明恭導皇上入綵棚至香案前立司香官恭捧香盒跪進皇上三上瓣香鋪拜褥官鋪拜褥皇上陞拜褥不贊行二跪六叩禮禮畢臣等恭導皇上出綵棚至降輿處陞輿奏入報聞同日行在禮部奏言前經臣部奏准江南省江瀆之神遣官讀文致祭並甘泉縣明臣史可法墓丹徒縣本朝大學士臣張玉書祠宋臣宗澤祠陽湖縣本朝大學士臣劉綸墓呉季扎祠武進縣本朝尚書臣趙申喬祠巡撫臣潘思榘祠遣官拈香奠酒謹將扈從大臣職名繕寫名簽恭候欽派一員讀文致祭江瀆之神欽派二員各祠墓拈香奠酒奏入得㫖致祭江瀆之神遣􅄞璜各祠墓拈香奠酒遣王昶倪承寛乾隆四十五年二月十六日行在禮部奏言前經臣部奏准江南省溧陽縣大學士史貽直墓遣官奠酒謹將扈從大臣職名繕寫名簽恭候欽派一員奏入得㫖遣蔣賜􅙺乾隆四十五年二月二十三日行在禮部奏言前經臣部奏准江南省長洲縣言子㳺祠宋臣韓世忠祠呉縣周㤗伯祠宋臣范仲淹祠本朝巡撫臣湯斌祠張伯行祠河臣陳鵬年祠常􅌻縣本朝大學士臣蔣溥墓等八處遣官拈香奠酒謹將扈從大臣職名繕寫名簽恭候欽派三員奏入得㫖遣嵩貴王昶倪承寛乾隆四十五年二月二十八日行在禮部奏言前經臣部奏准准江省海寜州海神廟遣官讀文致祭唐臣張巡許逺合祠海鹽縣本朝大學士臣陳元龍墓陳世倌墓等三處遣官拈香奠酒謹將随往海寧大臣職名繕寫名簽恭候欽派一員奏入得㫖海神廟遣徳保餘遣阿玉璽同日行在禮部奏言前經臣部奏淮浙江省㑹稽縣南鎮㑹稽山神夏禹王陵等二處遣官讀文致祭秀水縣唐臣陸贄祠仁和縣海潮神廟錢塘縣江潮神廟唐臣錢鏐祠宋臣岳飛墓明臣于謙祠本朝尚書臣徐潮墓大學士臣徐本墓梁詩正墓等九處遣官拈香奠酒謹將扈從大臣職名繕寫名簽恭候欽㸃一員讀文致祭欽㸃二員拈香奠酒奏入得㫖南鎮㑹稽山神夏禹王陵海潮神廟江潮神廟遣徳明其餘遣王昶倪承寛乾隆四十五年三月十八日行在禮部奏言江寧府明太祖陵遣官讀文致祭江寧縣本朝總督臣于成龍祠傅臘塔祠上元縣晉臣卞壼祠宋臣曹彬祠明臣徐達墓常遇春墓李文忠墓方孝孺等一百十八人合祠遣官拈香奠酒經臣部奏准謹將扈從王大臣繕寫名簽恭候欽派一員讀文致祭欽派二員各祠墓拈香奠酒奏入得㫖讀文致祭遣睿親王淳頴拈香奠酒遣蔣賜􅙺嵩貴乾隆四十五年三月二十四日行在禮部奏言皇上親詣明太祖陵行禮儀注是日皇上御行服乗輿由大門進至二門外甬道前鋪棕毯處降輿扈從之大臣侍衛等在大門外下馬随行禮之三品以上文武大臣官員往大門外東旁排立聖駕至時鴻臚寺官引三品以上大臣官員随入至二門内按翼排立武備院官預鋪拜褥臣逹椿臣徳明恭導皇上由正中進享殿陞拜褥不贊行二跪六叩禮衆俱随行禮禮畢鴻臚寺官預引大臣官員出至大門外東旁排立臣等恭導皇上由原進門出至降輿處陞輿奏入報聞乾隆四十五年四月初六日行在禮部奏言皇上親詣淮瀆河瀆拈香儀注是日皇上具行服乗輿至降輿處降輿臣逹椿臣徳明恭導皇上至香案前立司香官恭捧香盒跪進皇上三上瓣香鋪拜褥官鋪拜褥皇上陞拜褥不贊行二跪六叩禮畢臣等恭導皇上至降輿處陞輿奏入報聞乾隆四十五年四月十四日行在禮部奏言前經臣部奏准山東省汶上縣分水口禹王廟龍神廟明臣宋禮祠濟寧州先賢仲子由祠任子不齊祠五處遣官拈香謹將扈從大臣職名繕寫名簽恭候欽派二員奏入得㫖遣徳明呉玉綸乾隆四十八年十二月初四日禮部奏言恭照乾隆四十一年皇上展謁孔林欽奉諭㫖少昊金天氏陵元聖周公廟東嶽岱宗廟遣官致祭仍親詣拈香又乾隆四十五年聖駕南巡往返渡河渡淮渡江除遣官致祭外俱䝉皇上親詣綵棚拈香再江寧府明太祖陵遣官致祭仍親詣行禮明嵗正月十一日恭遇聖駕啟鑾展謁孔林巡幸江浙所有闕里文廟及上届拈香行禮各處所是否仍照前次俱行親詣之處伏候諭㫖遵行奏入得㫖闕里文廟親詣致祭少昊金天氏陵孔林及明太祖陵親詣奠酒餘均遣官致祭同日禮部奏言恭照明春聖駕啟鑾展謁孔林巡幸江浙蹕路經由三十里以内嶽瀆祠廟及前代帝王陵寝臣等謹照上届奏准讀文致祭各處所開列清单恭呈御覽查江南丹徒縣金山尊神廟乾隆四十七年欽奉特㫖崇昭秩祀此次蹕路經由應請一並遣官讀文致祭交翰應用祭文交翰林院撰擬香帛祭品交地方官照例備辦各處遣官届期臣部將扈從之王大臣繕寫名簽奏請欽派奏入報聞同日禮部奏言聖駕啟鑾展謁孔林巡幸江浙所有蹕路經由三十里以内各先賢先儒名臣祠墓共四十七處臣等謹照上次奏准拈香奠酒各處所分晰開单恭呈御覽届期臣部將扈從大臣職名繕寫名簽奏請欽派至此外有無増添之處行文各該督撫俟查覆到日随時奏聞奏入報可乾隆四十九年正月二十四日行在禮部奏言前經臣部奏准河間縣先儒毛萇祠遣官拈香謹將扈從大臣職名繕寫名簽恭候欽派一員奏入得㫖遣尹壯圖乾隆四十九年二月初十日行在禮部奏言恭查曲阜縣啟聖林請遣官奠酒曲阜縣顔子祠嘉祥縣曾子祠鄒縣子思子祠孟子祠請遣官拈香謹將扈從大臣職名繕寫名簽恭候欽派三員前往奠酒拈香奏入得㫖遣蔣賜􅙺尹壯圖杜玉林乾隆四十九年二月十八日行在禮部奏言皇上親詣淮瀆河瀆拈香儀注是日皇上具行服乗輿至降輿處降輿臣達椿臣徳明恭導皇上至香案前立司香官恭捧香盒跪進皇上三上瓣香鋪拜褥官鋪拜褥皇上升拜褥不贊行二跪六叩禮禮畢臣等恭導皇上至降輿處升輿奏入報聞乾隆四十九年二月十九日行在禮部奏言前經臣部奏准江南境内河瀆之神淮瀆之神又順黄壩河神廟楊莊大王廟寳應縣湖神廟請遣官讀文致祭並河臣靳輔齊蘇勒􅄞曾筠髙斌四人合祠請遣官拈香謹將扈從大臣職名繕寫名簽恭候欽派四員分路前往奏入得㫖江南境内河瀆淮瀆之神並順黄壩河神廟楊莊大王廟寳應縣湖神廟五處遣十一阿哥十五阿哥十七阿哥睿親王莊親王分往致祭河臣靳輔齊蘇勒􅄞曾筠髙斌祠遣瑪興阿拈香乾隆四十九年二月二十三日禮部奏言皇上親詣江瀆拈香儀注是日皇上具行服乗輿至綵棚降輿處降輿臣達椿臣徳明恭導皇上入綵棚至香案前立司香官恭捧香盒跪進皇上三上瓣香鋪拜褥官鋪拜褥皇上升拜褥不贊行二跪六叩禮禮畢臣等恭導皇上出綵棚至降輿處升輿奏入報聞乾隆四十九年二月二十四日行在禮部奏言前經臣部具奏江南省江瀆之神金山尊神祠遣官讀文致祭謹將扈從大臣職名繕寫名簽恭候欽派二員前往致祭奏入得㫖遣十一阿哥十五阿哥乾隆四十九年二月二十五日行在禮部奏言前經臣部奏准江南省甘泉縣明