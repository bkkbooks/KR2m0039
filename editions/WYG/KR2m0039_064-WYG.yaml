body:
  text: 河防乾隆四十二年正月初八日兩江總督髙晉河道總督薩載奏言竊照外河清口黄河北岸陶荘迤上前經臣等奏請開挖引河一道使黄水繞北下注相距清口較逺清水益得暢出行至周家荘而後㑹黄東注以期二凟并流合力攻沙仰蒙皇上聖明逺照叠頒諭㫖訓示周詳令将引河挑挖寛深河頭展寛向上當經臣等欽遵辦理查引河估長一千零六十丈河頭估寛四十丈深一丈河身估寛三十五丈深一丈二尺五寸河尾估寛三十丈深一丈五尺分委裏河外河二㕔山陽清河二縣四股承挑臣等於九月十一日恭摺奏蒙聖鑒隨督飭工員領銀雇工上𦂳挑挖自開工以来仰賴聖主洪福天氣晴和人夫雲集工員亦各踴躍奮勉于十二月十二日儧挑完工僅留兩頭土壩其河身界埂間有不平之處復令消除净盡收拾妥恊并於引河中心抽挖溝槽數處以備開放時跌塘掣溜一律完竣兹臣等於十七日上自河頭下至河尾逐細查丈面底寛深均照原估如式並無偷减情弊至該處引河臣等原定挑竣後将新河兩頭土壩即行開放近因連次得雪天氣寒冷黄河内間叚凍結氷凌層疊凝積較往年為甚臣等察㸔情形並與道将等公同商酌現在河靣既經氷凍新挑引河若遽行開放恐氷底水流微弱難資冲刷日内即使天氣和暖氷凍甫解河内又值淌凌亦恐壅塞且時屆五九嚴寒雨雪無定設或旋融旋凍一經阻滯更恐有淤墊之虞臣等再四思維該處工程攸闗𦂳要河雖挑成未便輕開本年節氣較早應俟交春後天暖氷融臣等㑹同相度機宜乘勢放水妥恊料理另行奏聞務期全河大溜盡歸引河趋北暢注以仰副聖懐臣髙晉商定一切因安撫臣閔鶚元進京陛見即從清口暫回省城兼署巡撫印務臣薩載現往各屬查勘来春應修土埽工程及年内到工料物合併陳明奏入上諭曰甚是已有㫖了乾隆四十二年正月二十八日兩江總督髙晉河道縂督薩載奏言竊臣等接准乾隆四十一年十二月二十八日廷寄欽奉上諭據髙晉奏開挖陶荘引河完竣騐㸔工程如式因時屆嚴寒黄河凍結氷凌恐水底水流微弱難資冲刷請俟交春後天暖氷融再行放水等語所奏甚是陶荘開挑引河於全河極有關係開壩時必湏乘勢引放俾大溜直趋暢注方為有㿽自當俟春融後趂桃汛相機妥協為之至引河為河工要務並湏選用吉日著傳諭髙晉薩載等即預行擇吉先期迅速奏聞再行辦理又髙晉另摺奏稱現因閔鶚元進京陛見暫署安徽撫篆俟閔鶚元回任後接兼河篆俾薩載即行赴京等語現在開放引河為總河専責必湏在工督視不便遽行離工且薩載此時並無亟湏陛見請示之事著傳諭薩載於引河放溜後細視新河上下是否循流順軌俟大局全定即行奏聞一靣将縂河印務交髙晉暫行兼署起程来京将此由三百里傳諭知之欽此臣等跪讀之下仰見聖主垂念要工於唘放機宜訓示周詳中心欽服莫可名言伏思陶庄引河放關全河機要上年挑挖時原擬於工完之日斟酌放溜後因臘月内天氣嚴寒氷凌凍結更兼底水較小臣等察㸔情形未便驟開是以㑹摺奏明暫緩唘放今春以来河内氷凌漸欠融解苐春水未生溜勢綿緩誠如聖諭當俟春融後趂桃汛相機妥協為之庶乘勢引放俾大溜直趨暢注方為有益而開放之期必湏選用吉日以冀循流順軌兆慶安瀾臣等復查毎年花以汎水縂在二月間發生今嵗立春既早則水長似應較早但遲速究未敢預必臣等遵㫖預行諏吉彼此札商選擇正月二十五日二月初六初十十五等日均係吉日臣髙晉於開篆後即馳河工㑹同籌度縂視水勢光景在於所選日期内相機開放以期成功仰慰聖懐臣薩載於放水後悉心審視俟新河上下暢流循軌大局全行即行奏聞一靣将縂河印務交臣髙晉暫行兼署進京陛見奏入報聞乾隆四十二年二月三十日兩江縂督髙晉河道縂督薩載奏言外河清口黄河北岸陶荘一帶上年臣等奏請開挑引河一道以期清黄並流免到到灌仰邀俞允並蒙皇上智炳㡬先訓示周詳令将引河挑挖寛深河頭展寛向上當經臣等欽遵辦理於臘月十二日儧挑完竣時因天寒氷凍未便輕開奏明緩俟交春後天煖氷融再行放水復奉諭㫖陶荘引河於全河極有關係開壩時必湏乘勢引放俾大溜直趋暢注方為有㿽並湏選用吉日著迅速奏聞等因欽此又經臣等預擇吉期恭摺奏覆奉到硃批好知道了欽此入春後河水未長之前臣等察㸔情形舊河内原估北岸之兠水壩南岸之挑水壩固為得力但河不兩行必湏籌計萬全庶可成功迅速臣等復加商酌測量該處河靣計寛一百零四丈除兩岸原估挑水兠水壩工計長七十七丈其餘河面僅有二十七丈與其留此河泓旁洩不若一律估築使水無分注則全河溜勢自必盡歸新河雖所用工料較原估加增銀八千餘兩而一勞永逸於要工更為有裨隨飭工員確估照辦酌留口門十餘丈以俟水長開放引河時再為全行堵閉自二月初旬以来黄水漸次長發外河誌樁加長三尺餘寸水力旺盛開放引河正合機宜臣等即照選定二月十五吉期先将引河上下土壩赶𦂳起除争盡次将引河頭挑通開放過水仰賴聖主洪福河神黙佑新河内大溜暢注衡刷寛深形勢甚順從此清黄分流直至周家荘滙歸東注清口可免倒灌之患其舊河内酌㽞未築之壩工並即分頭儧堵旬日内亦可告竣臣髙晉於拜摺後即由工次星馳北上臣薩載駐工督辦并遵前奉諭㫖在於新河上下隨時察㸔壩工完竣新河大局已定另行奏聞即兼程進京奏入報聞乾隆四十二年三月初七日河道縂督薩載奏言外河清口陶荘挑挖新河一道於二月十五日乘勢開放大溜暢注情形及舊河内酌㽞未築壩工臣駐工儧堵縁由業經㑹摺奏聞旬日以来臣住宿清口将舊河壩工督率道将㕔營赶𦂳接築兹于二月二十四日一律儧堵完竣舊河内即經斷流閉氣並於壩外廂做邉掃一道以為外䕶可免水長捜刷之患兩日来上水壩根漸次停淤下水業已澄清甚為稳固其新河上下臣欽遵前奉諭㫖息心細視查新河迤上大溜自玉皇閣掃工尾循流而下趋入新河由周家荘一帶直達中泓並未傍趋偏注形勢頗為暢順至新河内􅘇勢湍急迅疾奔騰仰賴聖主洪福兩崖又加刷塌前挑河頭原寛四十丈今陸續塌去三十餘丈現寛七十餘丈河身河尾原寛三十五丈及三十丈不等今續續塌去二十餘丈現寛五六十丈探量河底水深一丈四五尺兩崖尚髙出水靣二三尺較原估刷深六七尺往後水力日盛溜勢日𦂳河身日加冲刷即可與舊河一律寛深其善後事宜臣與道将等往来察㸔新河之南即係陶荘積工離河六七十丈應将積土翻築堤工一道從新壩根起直至河尾以防漫灘之勢新河之北舊有縷越堤工縷堤近在河崖應聴其自行塌去使河身舒展越堤離河一百四五十丈至二百餘丈不等應加髙培厚並於下尾接長以越作縷俾資欄禦新河頭下唇溜勢旋轉著力應俟灘土塌定廂柴裹䕶以順其勢新河河尾目下正在塌崖将来刷寛刷深新堤尾有應行裹䕶之處隨時相機另為酌辦再清口舊有木龍七架内五六七三架在新壩之下淤入土中應将各龍木植刨挖折起以為将来改紥木龍之用至頭二三架正對新河挑溜有力第四架已在新河口下應移在二龍迤上紥做則挑溜䕶灘更有禆㿽以上工程臣前與大學士督臣髙晉靣加商酌意見相同現即督令逐細估計核實𣲖員分投儧辦另行造冊具題外所有陶荘新河上下循流順軌大局全定及舊河壩工築竣稳固情形謹由驛奏報上慰聖懐並繪圖貼説恭呈御覽再臣前經奏明俟新河定局壩工辦竣即行進京今接髙晉来信於途中欽奉諭㫖前往安徽查辦事件臣現将一切善後工程督率料理約計儹辦停妥髙晉亦可事竣来工臣欽遵前㫖将河道縂督關防委員迎賫髙晉暫署即兼程進京合併陳明奏入上諭曰諸凢妥恊嘉慰覽之乾隆四十二年三月初十日河道縂督薩載奏言竊臣於二月二十八日酉刻接准乾隆四十二年二月二十四日廷寄欽奉上諭據髙晉奏㑹同薩載開放陶荘引河業于二月十八日将開放暢順引河功成情形専差㑹摺奏報等語陶荘開放引河為全河此時辦理關鍵朕心時切懸念髙晉等既經開放暢順自應由驛馳奏以慰厪懐乃僅差人賫摺此時尚未到京何以不權事體輕重若此至引河既經開放則舊口自應嚴宻堵禦或将木龍相度移置或竟度地堅築掃工俾引河永逺暢流以資鞏固髙晉等接奉此㫖務湏盡心籌畫相度機宜妥協商辦一靣𣲖熟練之員詳加􅃌示令其在工料理薩載進京陛見髙晉前赴安徽查辦琨玉之案完竣後地方事務𦂳要仍遵前㫖不必来京可将此由四百里傳諭髙晉並薩載知之仍将㑹同籌辦情形詳悉覆奏欽此臣跪讀之下惶悚靡寧伏念陶荘新河甚關𦂳要時厪宸􅇆臣與大學士督臣髙晉㑹同開放之後理應将暢順情形由驛奏報上慰聖懐乃差人賫進實屬不知輕重茫昧糊塗之至查該處舊河兩岸估築挑水兠水壩工時髙晉與臣㑹同察㸔并與道将等復加籌酌河不兩行與其尚㽞舊口旁洩不若一律堵閉使水無分注更屬有裨因即上𦂳儧築留口門寛一十餘丈於新河開放後臣即督令星夜儧辦于二十四日堵閉斷流臣復上下審視全河大溜盡趋新河業将循流順軌大局全定及籌辦善後事宜於二十八日巳刻由驛奏䝉聖鑒今欽奉諭㫖引河既經開放則舊口自應嚴宻堵禦俾引河永逺暢流以資鞏固仰見睿謨廣運智炳㡬先於千里外之情形早蒙聖明洞燭訓示周詳臣與在工道将等無不心悦誠服所有善後工程業已辦有端緒臣現在派委河庫道李奉翰淮揚道松齡副将徐建功叅将李永吉等督率㕔營上𦂳儧辦可無遲悞至縂河闗防原奉諭㫖交髙晉暫署今髙晉正在安徽查辦事件距工稍逺因即交與河庫道李奉翰暫行䕶理俟髙晉事竣来工即行轉送接署除扎㑹督臣髙晉外臣即于二十九日自清江浦起身兼程北上奏入報聞乾隆四十二年三月十二日河道縂督薩載奏言竊臣於二月三十日桃源途次准兵部火票逓到本月十八日臣與大學士督臣髙晉㑹奏陶荘引河開放成功一摺奉御批何不具一圖来餘有㫖諭欽此摺内與其留此河泓旁洩不若一律估築使水無分注句上奉硃批甚是欽此又於河神黙祐新河内大溜暢注句上奉硃批以手加額覽之此處不應立廟以酬神貺乎欽此又㑹奏勘辦通湖引河情形一摺奉硃批陶荘改流則無倒漾之患此皆其餘事但當謹防舊河口為要又老黄壩更要𦂳慎之欽此並接准乾隆四十二年二月二十六日廷寄欽奉上諭據髙晉等奏報陶荘引河開放成功大溜暢注情形一摺覽奏深為欣慰已於摺内批示並明降諭㫖将薩載交部議叙矣陶荘開挑引河為治黄一大闗鍵今開放之後新河内大溜暢注衝刷寛深形勢甚順從此清黄分流直至周家荘滙歸東注清口可免倒灌之虞實為一勞永逸非神黙祐不能成此鉅功自應於該處立廟以酬神貺又另摺内所稱通湖引河勘辦情形此皆其餘事惟當謹防舊河口最為闗係重大又老黄壩工程尤關𦂳要更宜悉心詳慎防䕶以期永逺鞏固至摺内稱原估挑水壩工計長七十七丈其餘河靣僅有二十七丈與其留此河泓旁洩不若一律估築使水無分注則全河溜勢自必盡歸新河雖所用工料加增銀八千餘兩於要工更為有裨等語所奏甚合機宜自應如此辦理其舊河内未築壩工據稱旬日内可儧堵告竣現在曾否已經堵築畢工並着上𦂳妥辦至現在河身挑寛若干及河流暢注之處自應繪畫全圖貼説註明以便省覧何以伊等見未及此着傳諭髙晉薩載速即詳晰繪圖貼説並将工所立廟及老黄壩工程如何防䕶之處迅速據實覆奏将此由四百里諭令知之欽此仰見聖主慎重壩工諄諄訓誡并報功崇祀以酬神貺至意伏查舊河口壩工堵築斷流之後臣恐水長捜刷又經添做邉埽以為外䕶甚為稳固其老黄壩工誠如訓諭尤闗𦂳要臣前此往来查勘新河北岸舊有縷越堤工應行分别加倍髙厚陶荘積土之外亦應添築新堤以防外灘漫水其南岸木龍後御樁亭一帶老堤直至新口舊西壩止均屬髙厚外灘甚寛現在髙出水面四五尺不等並有木龍挑䕶東首河灘今春舊河口築壩時臣相度形勢即於灘上斜築攔水堤一道長一百四十丈接連舊河口壩頭俾資攔禦以上善後各工先經臣與督臣髙晉靣加商定𣲖員分投儧辦隨於二月二十八日繪圖貼説同新河刷塌寛深情形繕摺由驛奏蒙聖鑒兹欽奉諭㫖訓示臣現又扎飭道将㕔營将堤壩工程悉心加意防䕶並将現辦堤工上𦂳儧築完竣務期一律鞏固以仰副聖懐至建廟地基擬在新河頭舊河口適中地方建立該處現在接築新堤應俟築竣容臣與髙晉再加相度遵㫖建立奏入上諭曰覽汝不日即面㑹一切再細講乾隆四十二年三月十三日河道縂督薩載奏言竊臣於本月初三日行至山東郯城縣十里舖地方接准乾隆四十二年二月三十日廷寄欽奉上諭據髙晉接奉諭㫖由驛覆奏陶莊引河開放情形并住滁州確查琨玉有無虧空各縁由一摺均於摺内批示矣此次開放新河并堵築舊河為全河一大關鍵自應繪圖貼説方能瞭如􅃌掌何以髙晉等縂不具圖呈覽實屬疎忽至摺内所稱河無兩行原擬估做挑水兠水壩與其留此河靣任其分流不若一律估築堵閉所奏甚是正與朕前降諭㫖相合但所稱僅存上口七丈下口五丈薩載現在住工督辦旬日内亦可完竣等語此時曾否竣工向来河工習氣如上口七丈雖經堵閉其下口五丈内必尚留罅隙使餘水仍得走洩以為日後做工冒銷地歩着傳諭髙晉薩載等於堵閉時務湏悉心講求設法籌築厚實堅固無使㸃滴不漏方保無虞不可輕信河員飾詞完局仍一靣詳晰繪圖貼説具奏俟薩載辦竣後来京時再為按圖􅃌示善後保固各事宜将此由四百里傳諭知之欽此臣跪讀之下惶恐無地伏念陶荘引河上勤睿慮二月十五日開放之後理應繪圖貼説進呈御覽乃竟見未及此以致重厪天心實屬疎忽之至查舊河清黄界壩計寛九丈二月十八日大學士督臣髙晉自工起身時原存上口七丈下口五丈口門既窄水勢愈𦂳臣因堵築合龍若稍留罅隙除水仍得走洩闗係非細當經悉心講求日夜住工督率道将㕔營慎重辦理接剩口門三丈两邉復進埽箇層層廂壓到底仰賴聖主洪福于二十四日平安合龍其時口門下水離壩三四丈外間有翻花黄水臣又督令實力追壓上加厚土旋即閉氣并恐水長捜刷復加做邉埽以為外䕶臣上下察㸔壩外水已澄清壩内用竿試探業經停淤甚為稳固可保無虞當於二十八日繪圖貼説由驛奏蒙聖鑒臣初任河工事事務求實際况堵築舊河實為全局一大關鍵斷不敢輕信人言草率完局上負聖恩今臣遵㫖進京陛見一切善後保固事宜更得跪聆聖訓有所遵循感戴鴻慈㿽無涯矣奏入報聞乾隆四十二年四月二十八日兩江縂督髙晉河道縂督薩載奏言竊臣薩載于三月十六日陛見時靣奉諭㫖清河界壩上首應加築壩工一道以為重門保障其頭架木龍之上應添紥木龍一架命将御筆圈㸃記出原圖帶回㑹勘奏辦兹臣薩載于四月初六日馳回清口臣髙晉先自安徽来至公所隨即遵㫖㑹同察勘上下審度查陶荘新河功成之後一月以来日見寛深現在河頭已寛有九十餘丈河身河尾寛有五六十丈至七十餘丈不等水深一丈八九尺至二丈五六尺形勢暢順其舊河内清黄界壩邉埽外沙停淤淺處從前水深三丈四丈者今則量水深二丈一二尺及一丈三四尺不等現在壩工甚為稳固但将来伏秋大汛水勢加長盛如聖訓應加築壩工一道以為重門保障更可放心臣等遵照御筆㸃示在於新河頭下唇起至第三架木龍迤上止斜建壩工一道長一百三十丈頂寛五丈若将該壩全用柴料築做需費較多臣等復加酌議臨黄一靣廂做埽工靠裏用土填築即使伏秋大汛黄水長發亦堪抵禦並于南首壩頭起至老堤止河灘寛一百三十丈一律接築土堤以防水漫庶資攔禦核計土方工料共需銀一萬八千餘兩其南岸頭架木龍迤上御筆圏示之處再添木龍一架臣等詳細㑹勘於桃溜䕶灘情形實有裨㿽查第三架舊木龍迤上現在遵㫖添築壩工該架木龍係在壩工之内應行起拆移於頭龍迤上紥做至五六七三架淤入土内舊木龍業将木植斥起存俟新河兩崖塌定再為相度情形請㫖建紥所有清黄界壩上首加築壩工一道及頭龍迤上添紥木龍一架臣等現已督令上𦂳集夫備料即于四月初十日興工迅速儹辦務於迅前完竣以期上慰聖懐謹另繪新圖同御筆圏㸃原圖一併恭呈御覽至前奏善後各工内新河南岸堤工一道業經辦竣新河北岸加培接長之堤亦已辦有八分工程新河頭下唇接做壩臺廂柴裹䕶叚落現亦次第儹辦再臣薩載前奉諭㫖查明從前兩次挑挖陶荘引河寛深丈尺及因何未成原委容臣詳查案卷另行具奏至應建河神廟宇現飭酌擬估計再行繪圖進呈恭侯欽定合併聲明奏入上諭曰諸几皆妥知道了謹按大河自南行入淮後清黄交㑹之地闗鍵最為𦂳要盖迤南則逼近清口倒灌堪虞迤北則清水暢流刷沙有力自前明嘉靖之初三義口就淤而可㿽南徙我朝康熙年間聖祖仁皇帝洞燭㡬先親臨閲視詔司河諸臣開陶荘引渠而以逼近舊河分流勢緩迨我皇上睿謨廣運􅃌授機宜于積土之北挑挖新渠並按圖垂示酌定河頭直迎大溜河臣等始行禀承智畧迅速奏功且於舊口則嚴宻堵塞不使分流於新河則添築堤工以資保障而凡增木龍切灘靣展寛河身填實壩腹諸務無不睿算周詳勘酌盡善是以雙流循軌交齊有成漕運往来安如枕席為億萬載無疆之利㿽要皆本聖心之誠敬以為貫通感格者矣欽定南巡盛典卷四十五
