body:
  text: 奏議乾隆四十八年正月十五日兩江總督薩載等奏言欽惟我皇上至徳諴民敷天錫福法宫無逸勤宵旰於㡬康御輦時巡仰春秋之補助道光虞典肆覲之霈澤惟均地近堯封江浙之承恩尤渥醲膏叠被既浃髓以淪肌玊輅頻臨㿽衢歌而巷舞伏念先庚布闓忻捧綸音大丙首塗得孚輿望顧自五巡之後又經三載於兹白叟黄童羣望載瞻雲日茅簷蔀屋咸思同覲龍光况夫河海宣防均關聖慮䟽濬要務時厪宸衷前蒙聖主指示機宜爰是鉅工悉行修舉兹則塩倉之鱗塘将竣徐旴之石堤已成善後良模端賴親臨指授安瀾成算更祈睿瞩提撕規萬年鞏固之鴻圖益資利賴造億兆蒼生之福命永獲安全草野之酬報何能難名帝徳民物之阜康胥遂願覩天顔臣等備員兹土採訪輿情羣黎望幸之忱實深真摰臣庶迎鑾之悃倍切歡呼伏懇聖主於四十九年載駕鑾輿舉六巡之盛典早頒温㫖慰萬姓之贍依行慶春和仰蒼龍而獻瑞望中雲物隨翠䍐以呈祥将見華祝嵩呼共廣太平之盛事吳山越水羣依日月之光華奏入上諭恭載恩綸乾隆四十八年四月初八日薩載奏言恭照聖駕巡幸江南沿途應需分設臺站接逓文報用馬甚多上屇乾隆二十七年三十年四十五年因江南驛馬已奉裁减七百匹不敷派應厯經奏請将裁馬七百匹暫行復額應差俱邀聖恩俞允今乾隆四十九年荷蒙皇上六幸江浙所有江省驛馬應循上屇之例暫照原額加増馬七百匹分派沼途經由各州縣准其於驛站項下借支採買所需草料自本年十一月初一日為始照依額設驛馬一體支給在於驛站項下開銷差竣停其攴給仍将所買馬匹照數變價歸還原欵如此斟酌辦理則驛馬暫増既於差務有禆而後差仍行照數變價還欵亦於錢糧無虧奏入報聞乾隆四十八年四月初十日薩載奏言恭照厯屇聖駕南巡所有隨從官兵執事人等應需騎乘馬俱於通省緑營及江寧京口駐防馬内各撥四千匹分屯江南江北伺應查江南緑營額馬四千匹於派撥應差之外所餘無㡬誠恐貽悞向於江西營驛馬内酌調數百匹来江協濟今乾隆四十九年恭逢聖駕南巡仍應一體照辦臣現移㑹江西撫臣照例派撥惟江寧京口駐防額馬原設六千匹因奉裁京口馬甲二千名即减馬二千匹現存額馬四千匹儘數當差設遇沿途疲乏無馬添換厯屇俱經奏明在於豫省旗營馬内酌撥六百匹来江協濟差竣之後即留江寧京口駐防作為補額之用照江省買馬價值每匹十七八兩之數觧還豫省買補此次恭逢翠華重幸江省駐防馬四千匹全行當差誠恐臨期疲乏無可添換致有貽悞仰懇聖恩俯准仍於豫省旗營内撥協馬六百匹以應差務如蒙恩准仍照上屇由江寧京口将軍衙門於存貯馬價内照數移還買補臣因差馬𦂳要謹循例繕摺奏懇㐲乞皇上睿鑒再此項馬匹應令豫省於本年十月内預期撥送在於兩省交界地方交收所需沿途草料及馬夫飯食等項各歸本省照例報銷至江省緑營馬匹應差日久不無勞傷倒缺應需籌備添換向係奏請借動司庫養亷馬價銀兩購買餘馬三百匹以備臨時倒缺添換之用現因各營養亷名糧已經挑補實兵添有額馬所有應偹餘馬堪以抵撥母庸另行借項購買合并陳明奏入報聞乾隆四十八年四月初十日兩江縂督薩載山東巡撫明興奏言恭照乾隆四十九年聖駕南巡一切差務事宜現在循照舊章次第辦理惟查北来馬駝一項從前定議因江省地方潮熱於馬駝不甚相宜是以由東省委員在於江省徐家渡接收休息三四日拉回東省境上派給嶧滕等州縣分棚喂養於聖駕回鑾之前趕赴徐家渡伺候應差無悞此乾隆十六年至三十年四屇辦理之章程也上屇四十五年差務經前任山東撫臣國泰奏請改於江省桃源縣衆興集地方屯養先由江省委員接收轉交東省委員喂養所需草料由東省備齊運赴應用其時雖經照辦但桃源之衆興集在運河北岸地方本窄形勢低窪於屯養牲口不甚相宜以致上屇馬駝間多疲瘦臣薩載前過山東與臣明興㑹晤籌議及此臣明興查江南不産桿草所出豆料無多若在江省喂養馬駝東省仍需辦運草料往返本多未便且江省衆興集地處河濵又不如東省較為寛曠上屇馬駝疲瘦此即江省地方潮熱屯養非宜之明驗臣等熟加商酌前項馬駝厯屇既在東省境内喂養今四十九年恭逢翠華重幸應請仍照前四屇章程由東省委員接收拉回東境分棚喂養於聖駕回鑾之前趕赴徐家渡伺應不但屯養得所馬駝自必臕壯即需用草料亦省轉運之煩似於差務有㿽其在徐家渡休息三四日需用草料即在江省備用開銷亦属便㨗臣薩載到京陛見時曾經靣陳聖覽今復與臣明興靣商意見相同謹恭摺具奏奏入報聞乾隆四十八年五月初三日明興奏言竊照東省原額設驛馬三千一百五十四匹於乾隆二十三年奉裁驛馬六百匹乾隆四十五年恭逢聖駕南巡經臨東省需用馬匹不敷經前撫臣援照乾隆三十年将東省原裁馬匹請照江南暫行復額之例於驛站項下借支買補應差仰蒙聖恩俞允乾隆四十九年恭逢翠華巡幸江浙經由東省展謁闕里需用馬匹現将營驛一併籌撥尚有不敷仰懇皇上天恩俯照三十年之例将東省奉裁驛馬六百匹暫准借支驛馬項下銀兩買補所需草料夫役等項亦照上屇之例自本年十一月初一日起照額設馬匹一體支銷差竣停其支給仍将所買馬匹變價歸欵於差務既有禆㿽而所借馬價亦俱歸補無虧奏入報聞乾隆四十八年七月初二日薩載奏言恭照聖駕南巡沿途管押馬匹船隻以及巡防站道等項均需官兵分派差遣而外出應差一切衣装盤費在所必需上屇節次南巡俱經奏明酌借俸餉兩月以資製備於差竣後分作二年全數扣還清欵兹恭逢甲辰年翠華巡幸應調補辦差官兵現在照例派調據局司道議詳照上屇之例屇期将緑營官兵一律公借兩月俸餉江寧京口八旗官兵現亦照此酌量動借俟差竣之後於乾隆四十九年夏季起分作二年照數公扣還欵其江西省管理協濟馬匹及来南辦差官兵亦請一律借給臣查與上屇節次借案相符所有辦差官兵循例借給俸餉縁由臣恭摺奏明奏入報聞乾隆四十八年九月三十日江蘇巡撫閔鶚元奏言竊照厯屇恭逄鑾輅巡幸江南扈從官員兵丁人等沿途需用錢文恐一時市價騰踴俱動撥官錢分派各站兑換應用如存局之錢不敷派撥均經奏明酌量加夘鼓鑄明春恭逢皇上六巡臨幸所有應備錢文據蘇州布政使永保等詳稱厯屇需用官錢九萬五千餘串寶蘇局存貯庫錢扣至四十八年年底計應存錢八萬餘串但尚有應放各標營春餉錢文不敷派撥請循照成例鑄錢十四夘計可得錢四萬七千串以備撥用並聲明厯屇現存銅鉛㸃錫足敷配鑄詳請具奏臣查明春恭遇鑾輅經臨各差站應偹買賣街發兑官錢據該司等請加鑄局錢十四夘凑撥應用係属循例應行預偹之項除飭司照辦外謹㑹同兩江縂督臣薩載恭摺具奏奏入報聞乾隆四十八年十月二十七日明興奏言恭照聖駕南巡經臨東省所有隨營站道辦差及調赴别汛聼候派撥之各營官兵上屇奏請預借一季俸餉分年扣還蒙恩俞允明春恭逢鑾輅巡幸江浙據各該鎮協援例請借合無仰懇聖恩循照上屇之例恩准借支俸餉仍按例分年扣還俾各營官兵辦差資斧寛裕更必奮勇趨事益戴聖恩髙厚於無既矣奏入報聞乾隆四十八年十一月初八日總理營行事務和碩荘親王永瑺奏言明春聖駕南巡所有應行預偹各事宜應查照四十五年之例預為派辦臣等查得旱路俱有行宫其大城蒙古包帳房等項停止偹帶惟将尖城蒙古包帳房等件備帶二分前往水路所需黄布城二分仍照前次由驛先行送徃直𨽻厰交地方官臨期轉交隨往之䕶軍統領武偹院支搭回鑾時山東水路仍須應用仍照上屇由江南僱騾二百頭應付前鋒䕶軍仍派七百名此次所帶尖城應需駝隻及茶膳房等所需駱駝車輛應需若干酌定數目知㑹兵部由部支給撁駝兵丁合數酌派再拉船撁兵由河兵内揀派户部内務府應偹帶賞用銀兩縀疋奏明帶往侍衛派出三班各處官員酌量派出到江南登舟時将兵丁酌减止揀派五百名章京四十員虎鎗營侍衛兵丁七十員名仍照向例揀選四十名當差外其餘歸入三班侍衛前鋒䕶軍數内選派應行給與官馬人等俱全數放給往回行程約計一百三十餘日所有路費亦照一百三十日滿支上船後大臣官員等馬匹存留家人喂養拜唐阿兵丁所騎官馬及官駝俱交給山東巡撫分屯喂養又喂養存留馬匹所需麩草豆髙梁等項交該省照例預偹沿途所安臺站兵部勘明行宫尖營地方交該督撫於通省驛馬内抽調備用所有經過地方尖營道路橋梁等項交該督撫照例預為偹辦隨往大臣官員等将春季應得俸禄於年内預為支給侍衛鑾儀衛章京等除賞給銀外仍給與帮貼銀内其應派約束存留兵丁家奴等之大臣承辦回京所需車輛之大臣俱於臨時奏明請㫖派出又查上船後所需馬匹大江以北派緑營馬四千匹大江以南派八旗馬四千匹到浙江時添派馬二千匹放給之處應由兵部行知該省亦照前次辦理隨從御舟船隻及攆撁所需馬匹交該省亦照上屇辦理所有各該處人數俟報明總理行營處彚總咨行該省核辦支放船隻仍交兵部亦屇上屇妥辦御前大臣領侍衛内大臣軍機大臣乾清門行走大臣侍衛等船隻及裝載御馬船隻上駟院武偹院侍衛官員鑾儀衛章京批本奏事軍機處侍衛處内閣兵部官員船隻俱照上次在前行走其餘船隻俱在後行走如有應辦事件應在前行走者臨期令各該處自行具奏江南河道窄狭應嚴加管束衝擠之處交派出管船大臣㑹同䕶軍統領於船隻行走各處嚴行管束浙省放馬等事亦照前次同江南一體辦理聖駕南巡事畢回鑾至徳州起旱由陸路行走所有經過地方應行辦理尖營道路橋梁等項俱交該督撫備辦前往時仍照向例於青州副都統處偹辦滿營馬八百匹再交山東巡撫在緑營馬匹内派出一千二百匹共馬二千匹於泰安地方為隨往官員兵丁所騎官馬内有實在疲瘦者預偹補換回鑾時交直𨽻縂督著派緑營馬二千匹在於徳州地方預偹補換再前次上駟院所給拜唐阿太監等乘騎官馬俱係留於河北官給草豆喂養所有應需照管人等内難免匪類混行滋事今次上駟院所帶圏馬仍照例喂養外所有七百匹官馬亦同兵丁所乘之官馬一併交山東巡撫分棚喂養俟命下之日行文各該處遵照辦理奏入報聞乾隆四十八年十一月十一日鴻臚寺奏言向例凡遇皇上行幸沿途地方文武官員於百里内接送查乾隆四十八年十一月巡幸山東又乾隆四十五年巡幸江南臣等将經過沿途地方文武各官于㡬十里以内接送之處具奏均奉㫖着三十里以内接送欽此此次皇上親詣闕里後巡幸江浙所有沿途地方文武各官於㡬十里以内接送之處理合具奏請㫖恭候命下臣寺行文知照各該督撫謹遵奏入上諭曰着在三十里以内接送欽定南巡盛典九十九
