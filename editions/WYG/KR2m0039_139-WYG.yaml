body:
  text: 奏議乾隆四十八年十一月十四日倉場縂督書麟蔣賜棨奏言恭查乾隆三十年聖駕南巡因河道糧艘應湏沿途催攅經前任倉埸侍郎温福蒋炳奏請欽𣲖一人隨往奉㫖着派温福欽此又乾隆四十五年南巡前任倉場侍郎雅徳同臣蒋賜棨恭摺奏請䝉恩准𣲖臣蒋賜棨隨往明春恭逢翠華南幸伏乞皇上於臣書麟臣蒋賜棨二人内派出一人隨駕前往以便沿途催攅漕船並可聼派差遣奏入上諭曰著派蔣賜棨随往乾隆四十八年十二月二十二日大學士公阿桂等奏言恭查上數次皇上南巡隨往江浙大臣官員兵役執事人等奏明統以六千馬匹核計随往明春聖駕南巡所有随往渡黄上船人數㨿各該處冊報共三千二百四十七人臣等按照向例随其品級之大小及差使之緩急酌量分派共需馬五千八百四十八匹尚未奏明統以六千馬匹核計之數至渡黄以及各名勝處原奏派馬俱在四千匹以内今照原奏或按人減馬或按差減人渡黄時需馬三千九百四十九匹名勝處需馬三千七百七十二匹俟命下交該部行知两江縂督查照并交兵部照例辦給馬票一面知照各該處将单内随往名勝處所減派人數自行通融辦理至船隻一項仍令該督遵照舊定章程将預備上用船隻及装載御用什物等船敬謹預備又明年阿哥三位随往江浙跟随船隻向無定例應令該督查照内庭主位之例酌減預備其餘随往官兵人等需用船隻仍按從前奏定船數現在該省所有船隻照单内人數分别派撥至浙省應如何給票監放之處即照江省之例辦理應令两江縂督就近知照浙省督撫遵照妥辦奏入報聞乾隆四十九年正月二十九日湖北巡撫姚成烈奏言竊照安南使臣黄仲政等進京臣准廣西撫臣咨㑹當經飭委署武黄同知錢敬熈漢陽營守備汪琮前往迎䕶嗣㨿該使臣等於十二月初十日行抵省城照例犒勞撥給站船乗坐正擬俟其出境具奏間兹臣扵十二月二十七日在荆門州欽奉上諭安南使臣行走約於明年閏三月間方可到京彼時距回鑾之期尚逺未免守候需時不若由湖北取道江西安徽扵閏三月初旬駐蹕江寕時令其在彼就近瞻仰著傳諭姚成烈即傳知䕶送委員並咨㑹沿途各督撫一體委員交替接䕶並扣筭程途先期數日令其抵江寜亦不必太早欽此仰見我皇上柔逺深仁至周至備臣查自湖北省城至江寕約計水路一千四百餘里今值初春計該使臣扵三月杪抵江寕為日尚寛随行司諭令委員扣筭水路程途按日行走不得稍有遲速兹㨿詳稱該使臣現在漢口製備春衣尚湏時日今應於正月下旬自漢口䕶送起程二月初旬可出椘省之蘄州境復自江西安徽等省從容前進務令計期於三月杪閏月初間行抵江寕俾該使臣等就近瞻仰天顔既免逺行亦不至太早該使臣等頂戴聖恩益無既極冄該國謝恩并慶賀儀物向由廣西撫臣委員代解前據廣西南寕府同知潘鍾濓管解扵十二月十二日由湖南巴陵縣陸路入湖北蒲圻縣境已於十二月二十三日由應山縣送至河南信陽州交替訖合併陳明奏入報聞乾隆四十九年正月三十日衍聖公孔憲培奏言伏查向來駕幸孔林係於亨殿前恭設降輦處乾隆四十一年兼管太常寺禮部侍郎臣逹敏㑹同臣父孔昭焕商度改設降輦處於亨殿之後因殿後角門門口太狹難進御轎而止嗣於聖駕囬鑾後臣父随将角門改建寛大門口髙八尺七寸濶六尺七寸並将楷亭撤去欄檻改作四面厰亭由角門内轉北過楷亭可以直達座落亭前今此次恭遇皇上幸林酹酒臣謹擬即於座落亭前恭設降輦棕薦距御拜位路長二十二丈較從前降輦處近十六丈冄廟内聖蹟殿前有東西角門两座門口舊僅三尺二寸今亦一律改建寛大門口濶六尺三寸與南向正門相仿恭傋可通御轎奏入報聞乾隆四十九年三月十一日刑部奏言乾隆四十九年二月二十二日奉上諭朕清蹕巡方順時行慶而矜恤庻獄厪念尤深宜沛徳音用敷愷澤江蘇安徽浙江三省軍流以下人犯俱著加恩各予减等發落用昭肆眚施恵之至意欽此仰見我皇上稽古省方恩膏叠沛温綸之覃被如春億庻之歡騰載道所有江蘇安徽浙江三省軍流以下人犯荷䝉聖慈各予减等俾得改過自新勉為良善誠格外之殊恩難邀之曠典臣等恭查上次皇上巡幸江浙欽奉恩㫖軍流以下人犯各予减等發落經臣部奏明除叛逆縁坐強盗免死發遣家奴吃酒行兇棍徒生事擾害用藥迷拐子女開窑誘賣為從并例應給披甲人為奴及擬遣之積匪猾賊搶窃滿貫及三犯竊盜擬絞緩决减等及私刨人参􅀻鑄十千以上為從不及十千為首并擬遣新疆以及由新疆改發内地等項人犯俱屬情罪較重不准减等外其餘尋常軍流以下人犯一概分别减免奉㫖依議欽此今恭逢恩㫖應請仍照乾隆四十五年之例除縁坐等項情罪較重人犯及改發新疆并停發新疆改發内地人犯俱係情莭較重均毋庸查辦外其江蘇安徽浙江三省一切尋常軍流遣犯并犯該發遣黒龍江寕古塔及雲貴两廣人犯不在前議條欵之内者情莭與軍流相等事犯在恩㫖以前應請一體减為杖一百徒三年徒罪人犯概减為杖一百雜犯准徒搃徒人犯逓减一年已經到配决杖徒犯即行釋放迯徒并免緝拿枷杖人犯俱應寛免應刺字者並免刺字應追賍者仍予追賍其應减軍流遣犯内已犯未審已審未結已結未解及已經起解計其程限尚未到配者均照例准其㑹赦减等冄江浙之人有在他省犯案逓回原籍追賍發配者今既在籍適逢恩㫖亦應一體准其减等其他省之人罪犯軍流逓發江浙省與江浙之軍流不同未便濫邀曠典至該三省題咨到部尚未核覆及嗣後到部之案核其事犯在恩㫖以前查與赦欵相符者臣部随案聲明分别减免命下之日臣部行文各省督撫遵照辦理奏入報可乾隆四十九年三月二十日薩載奏言竊照各省雨水農田時厪宵旰江南地方本年正二月内曽連得雨雪二麥春花已俱長發仍需雨澤滋培更可暢茂兹臣叩送聖駕後回蘇辦事於三月十四五两日得有㣲雨數陣十五夜間得雨優渥入土計有二寸餘於農田甚為有益現在隂雲宻佈雨勢廣逺除行查通省各屬是否一律均霑另行具奏外所有蘇城地方得雨情形理合恭摺奏聞仰慰聖懐奏入諭曰正盼此信似覺㣲欠霑足耳不如此間乾隆四十九年三月二十三日薩載奏言竊臣扵本月二十日接准乾隆四十九年三月十九日奉上諭㨿閔鶚元奏十五日震澤縣地方得有大雨入土深透吴江蘇城一帶均各霑足䓁語昨㨿薩載奏報蘇州於十四五两日得有㣲雨十五夜間得雨二寸看來尚未能霑足震澤地方距蘓城僅四十里或迤北㣲小亦未可定至蘇州雨澤情形何以薩載與閔鶚元所奏互異著傳諭薩載閔鶚元即将該省得雨寔在分寸曾否霑足之處迅速具奏欽此伏查蘇州扵十四五日得有雨澤臣暫駐蘇城接據府縣䓁禀報得雨入土二寸有餘是以㨿禀繕摺具奏查是日雨水各屬禀報入土大小情形不一如蘇州以至常州鎮江得雨二三寸不等揚州所屬之江都甘泉境内得雨四寸寳應境内得雨五寸淮安清河桃源邳州睢寕一帶得雨二三寸宿遷境内得雨六寸均稱普遍前奉諭㫖垂詢業經臣扵二十日午間繕摺由馹覆奏查此次江省得雨分寸􅢖多寡不䓁而本年正二月内連得雨雪土膏尚屬滋潤今得此雨水可稱一律霑足仰荷聖明厪念謹冄㨿實覆奏上慰聖懐奏入諭曰此間復得雨想亦優霑矣同日薩載又奏言竊臣前奏十四五日蘇城得雨情形一摺欽奉上諭浙江杭州海寕一帶于十五十六两日連得透雨見雲氣皆向東北江蘇各屬似應一律均霑本日㨿薩載奏報蘇州扵十四五两日得有㣲雨數陣十五夜間得雨二寸等語看來尚欠霑透不如此間優渥江南如此則山東直𨽻此次雨澤未能一律普遍可知朕心深為厪念著傳諭薩載将現在江南各屬是否續得透雨並諭明興劉莪将山東直𨽻曽否得有雨澤之處查明迅速覆奏以慰懸注欽此臣跪讀之下仰見我皇上厪念農田至意伏查十四五日蘇城得雨臣即飛飭各屬查報去後連日接㨿常州府屬之無錫金匱武進陽湖鎮江府屬之丹陽丹徒金壇揚州府屬之江都甘泉興化髙郵寳應淮安府屬之山陽清河阜寕桃源徐州府屬之宿遷邳州睢寕等州縣陸續報到均於十五日得有雨澤内寶應得雨五寸宿遷得雨六寸餘俱二三四寸不䓁查宿遷界連山東該縣得雨六寸洵稱優渥山東直𨽻一帶當已一律普遍冄㨿盧鳯道王懿徳禀報鳯陽府城十五日子時起宻雨達旦尚未止息現在飭查另報其餘各屬尚未報齊容俟續報得有透雨冄行具奏奏入上諭曰覧奏稍慰乾隆四十九年三月二十七日薩載閔鶚元奏言竊照蘇州地方於夲月十四五䓁日得雨并常州鎮江揚州淮安徐州䓁屬報到相同節經臣䓁繕摺奏䝉聖鍳兹蘇城於二十三日細雨竟日自酉時起至二十四日子時漸次綿宻頗為優渥查前次得雨於乆晴之後入土即渗此次􅢖屬細雨較前更為有益㨿該府縣查明四野均霑入土二寸二麥春花得此連雨滋培青葱暢發豐収可卜連日臣䓁又接㨿蘇州府屬之崑山新陽常熟昭文太倉州并所屬之嘉定鎮洋常州府屬之靖江江寕府屬之上元江寕句容江浦揚州府屬之泰州淮安府屬之安東塩城徐州府屬之銅山沛縣蕭縣碭山及安徽省太平府屬之當塗鳯陽府屬之鳯陽定逺穎州府屬之䝉城又泗州并所屬之五河滁州并所屬之全椒及六安州䓁州縣禀報均於十四五六䓁日先後一體得雨内定逺自十四日辰時起至十五日未時止得雨入土計有一尺鳯陽境内入土六寸江寕省城上元江寕二縣境内入土五寸其餘各州縣得雨俱入土三四寸不䓁臣䓁逐加察核各州縣所禀十四五等日得雨雖入土分寸多寡不一而通省實已普遍現在蘇州復得雨澤雲氣隂濃雨勢未止逺屬亦必一體續得此皆我皇上愛民念切有以感召休和恭值鑾輅時巡春膏叠沛遐邇優霑農民莫不額手稱慶臣䓁謹恭摺具奏仰慰聖懐奏入上諭曰以手加額欣慰覧之乾隆四十九年閏三月初二日禮部奏言安南國王黎維褍遣陪臣黄仲政䓁賫表進貢慶賀謝恩前來今㨿两江縂督薩載咨稱該陪臣䓁於閠三月初五六日即可抵江寕省城臣達椿臣徳明先行前往恭接表文照例交内閣具題外至該陪臣䓁接駕處所謹擬於離城五里太平門外蒋廟地方恭迎聖駕瞻仰天顔例應在禮部筵宴一次館寓筵宴一次今遵奉諭㫖在江寕将軍衙門賜宴臣䓁照例陪宴奏入報聞乾隆四十九年十二月初一日薩載奏言竊照乾隆四十九年春恭逢聖駕六巡江浙恩膏叠沛億兆歡騰江南省一切預備事宜先經臣與各撫臣查照上五届章程分别増減設立總局耑司其事凛遵聖諭槩從儉樸不敢稍事増華清蹕所經舉凡水陸營盤橋梁道路與夫行宫名勝夫馬船隻䓁項所需經費悉動恩賞各款銀兩辦理於地方官民毫無擾累如工程一項上届自乾隆三十年至四十五年相隔十五年之乆修費不無稍多此次自四十五年至四十九年僅隔五載各工只湏量加修飾見新并将桂家荘行宫遵㫖移建楊家荘地方又徐家渡駐蹕水營移於新荘泇口駐蹕水營移於對岸並於銅山境内添設尖營一處餘俱照舊臣與撫臣並縂局司道上年先行周厯各屬查勘指示派委熟諳人貟詳細確估由縂局覆核具詳臣䓁批定然後發銀興修此外各項亦俱飭令各州縣照依往例預備估計詳定差臨有應行増減之處即責成總局司道核明随時記檔自差竣之後臣與撫臣督飭縂局司道逐一核實照冊報銷其有不在預估及並無詳報案㨿係地方官自辦者一概刪除不准銷筭以杜浮冒差後有應變價者亦經照估折變歸欵不在准銷銀數之内又縴夫一項因原任松大道盛保辦理不善􅀁用夫價銀三萬餘两奏明着落盛保分賠一半臣薩載與撫臣閔鶚元分賠一半不准開銷餘俱核實無浮除例應報部各欵請動支司庫正項銀十二萬五千三百餘两較上届少用銀二萬五千餘两循例由撫臣㑹核題咨請銷其移新修舊各項工程並磚石橋梁道路旱夫船隻車騾䓁項計共用銀四十三萬四千九百八十八两七錢五分四厘即於厯次恩賞各欵銀内動用較之上届計少用銀七萬七千餘两現在分欵造冊咨送軍機處核銷又開挑便民港並𤓰洲城河金壇漕河用銀一十六萬一千八百五十九两三錢七分八厘現在另摺核銷具奏此外共存恩賞及各項存公銀十一萬八千五十二两九錢一分九厘應請留為下届差務之用冄乾隆三十年差案恩賞用存銀六千四百四十三两零及河庫撥觧水利平餘銀一萬三千八百二十七两零二共銀二萬二百七十两零經前督臣髙晋奏明發典生息以為嵗修差案工程並看管人役飯食之費現仍存典生息照案辦理合併聲明所有乾隆四十九年差務事竣分别報銷縁由臣謹㑹同江蘇巡撫臣具奏奏入報聞欽定南巡盛典卷一百
