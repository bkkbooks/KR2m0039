body:
  text: 河防乾隆二十九年四月十三日江南河道總督髙晉奏言竊臣由徐州至清口查勘黄河各㕔工程料物前經恭摺奏聞伏查清口為淮黄交滙之區清口以上宿桃等㕔専受黄水自清口東壩以下則淮黄合流計程二百餘里至雲梯闗迤東歸海比年来臣仰遵皇上聖訓將清口東西壩預為啟拆大加展寛俾湖水暢流東注不致由五壩旁洩業已著有成效惟下㳺山海二㕔以二瀆之水合為一河兼以伏秋盛漲或遇海潮相抵毎致水勢平堤拍岸工程險要臣前於荆山橋工次據山安海防㕔營稟北岸之五套南岸之陳家浦近日溜勢趨逼漸次坐灣將成頂冲入䄂之勢舊有土堤卑矮單薄請估帮髙厚添築魚鱗越堤方能抵禦估需工料銀二萬餘兩臣隨于查工時親赴各該處往来周厯細加察勘如雲梯闗之内南岸阜寧縣馬起營等工北岸安東縣佃湖等工均屬逼近城垣更多民舎村庄凡迎溜頂冲之處所謂尺地必争自應將現有埽壩工程加謹防䕶隨時修築堅實以資鞏固至雲梯闗以外南岸至灶工尾北岸至六套俱係蘆葦蕩地離海甚近即間有樵採漁戸散處其間亦遷徙無定是以舊制本無堤岸因一朢平灘水勢易於散漫曽設卑矮土堤約攔水勢與雲梯闗内𦂳要堤工形勢迥别毎年汛水長發海潮倒漾出槽漫灘内外皆水無闗𦂳要自應不與水争地無事生工檢查舊案乾隆十年南岸陳家浦漫溢因海灘土性浮沙樁埽旋築旋塌不能施工直至水落掛淤填土補築其北岸五套於乾隆十八年及二十五年亦經兩次漫灘過水旋即掛淤並無妨礙今若因溜勢坐灣乃復添築越堤勢必又將卑矮土堤加帮髙厚修築埽工昔年之陳家浦前車可鑒不特虚糜錢糧而海灘地面埽工難期穏固實屬無益臣與淮揚道吴嗣爵率同各㕔營詳加相度冄四講求陳家浦五套二處與其築堤束水致生新工不若讓地與水以順其性查現在黄河距堤尚有八九十丈以至一百二十丈不等此時可以緩辦將来伏秋汛内冄看刷崖情形如溜勢仍然兠灣向裹則舊有卑薄土堤不必加帮亦不必添築魚鱗越堤只湏預于舊堤上首另做斜長子堰一道俾地勢展寛約攔漫灘之水使之滙歸正河暢達入海而所築子堰夫工約估需銀不過數千金即在該二㕔嵗搶修庫貯内撙節辦理毋庸另請錢糧如此則山海二㕔雲梯闗下㳺既可不致生工而清口東西壩毎年大加拆展湖水滙黄歸海尾閭寛濶於就下之勢益資暢達矣奏入上諭曰覧奏俱悉餘有㫖諭乾隆二十九年五月十九日江南河道總督髙晉奏言竊臣接准廷寄欽奉上諭朕前嵗南巡在徐州閲視河工見北岸有隄身單薄髙晉奏稱應行放淤培䕶先挑倒勾引河俟應放時放淤等語今閲時已乆未見該督摺奏及此其曾否相度籌辦並現在該處情形若何著傳諭髙晋可即詳悉具奏欽此臣跪讀之下仰見我皇上垂念河防工無鉅細莫不時厪宸𠂻臣伏查徐屬宿虹㕔之黄河北岸夏家馬路一工係在運河縷隄外正當黄河頂冲築做壩臺鑲埽保䕶縷隄與壩臺兩相交峙中隔二三十丈全是坑窪深塘工程素稱險要臣從前協辦河務時曾與前河臣白鍾山以放淤相啇事未果行乾隆二十七年春恭逢聖駕南巡親臨閲視該工隄身單薄經臣將該處應行放淤培䕶先挑倒勾引河俟水長時相機放淤之處面奏請訓仰䝉聖鍳俞允臣於跪送聖駕回鑾後即赴該工相度將工頭工尾應開進水出水倒勾引河如法辦竣然放淤必待黄河水勢盛長開放始克有濟是年伏秋汛内黄水盛長兩次䦕放後計澄淤五六尺至八九尺不等臣於該年奏報查勘徐属各工情形附摺聲明未經耑摺具奏上年臣於勘辦春工時復將該處倒勾引河挑挖修慗迨伏秋黄水盛長又經疊次䦕放因工長四百四十餘丈尚未一律淤成夲年臣督辦徐州荆山橋河往返該工查勘數次詳加測探現在上叚長一百餘丈下段長九十餘丈已澄淤八九尺不等通身坑塘亦俱墊平惟中段計長二百丈許止澄淤二三四尺仍湏設法接續辦理未便使其功虧一簣隨與道㕔叅逰等冄四講求細心籌計查放淤引河形取倒勾是以進水勢緩工頭則水過淤停工尾則倒漾之水淤亦易積惟中段所過之水沙停兩頭積淤甚少今應於該工中段磨盤埽迴溜處另挑倒勾引渠一道俾黄水自中段引入由上下兩頭分流而出則中段進水停淤必多可期與兩頭所澄之淤一律相平庶隄埽培䕶堅厚工程得資鞏固現在督飭㕔營照此辦理臣原擬今年夏秋放淤工竣恭備明春鑾輅經臨奏請皇上閲視今奉諭旨垂詢所有臣厯年相度籌辦並該處現在情形理合繪圖貼説詳悉具奏奏入報聞乾隆二十九年五月二十七日山東廵撫崔應階奏言竊臣因直𨽻全漳歸衞東省沿河州縣及直屬下㳺一帶恐致漫溢已照裘曰修所奏將四女寺壩口支河展寛一十二丈以資分洩並將沿河兩岸堤堰􅂆民加髙培厚辦理完竣臣往来查勘如沿河之武城縣境内地勢最窪運河東岸有沙河一道遇伏秋雨多臨清夏津等處坡水皆由沙河滙注武城之牛蹄窩祝官屯一帶為東岸運堤所隔不得入運常至淹浸民田雖牛蹄窩舊有􅆂洞因地勢外髙内低運河漲發反至倒灌民間毎年加築䕶堤俟秋後運河水消䦕堤洩水民田方得消涸又武城縣境内運河西岸有蔡河一道西通黄潞河遇伏秋雨多則上㳺臨清並直𨽻清河䓁處坡水俱由黄潞河蔡河滙注武城之馮家灣為西岸運堤所隔不得入運浸灌民田毎年亦俟秋後運河水消開堤洩水臣查武城東西兩岸坡水不能入運民間毎年秋後開堤春間堵築出於萬不得已且時堵時開堤不堅固運道攸闗任民開挖恐失緩急機宜况開堤之處水勢旁刷毎年以數十萬之土冲入運河多費撈濬臣與布政使梁翥鴻運河道李清時濟東道尹嘉銓履勘詳籌擬於東岸之牛蹄窩祝官屯西岸之馮家灣䓁三處各建石閘一座設板啟閉遇運河水大則下板以防倒灌深秋水落則啟板以消積潦較之䦕堤顯有節制内如馮家灣坡水甚盛一閘不足以資宣洩擬將閘門展寛分為兩空中設磯心開槽下板則水勢得以暢洩以上三處閘座除將牛蹄窩舊有涵洞甲馬營舊有廢閘選舊石可用者凑用外其應添工料飭令據寔確估叧取估冊咨報於耗羡項下動用似此辦理庻得大消坡水直東民田均免淹浸又免民間毎年䦕堤有悮運道似属一勞永逸之事臣謹㑹同河臣葉存仁恭摺奏明並將該處情形繪圖貼説恭呈御覧奏入諭如議行乾隆二十九年九月十九日江南河道總督髙晋奏言竊查宿虹㕔属夏家馬路放淤工程伏汛内新淤尺寸業經臣繕摺奏䝉聖鍳交秋以来黄河水勢節經加長臣又兩次飛飭該㕔營䓁如法䦕放旋據㕔營稟報該工中段業已淤平應否接續辦理請示到臣兹臣前赴上㳺徐属查工隨親至該處逐一履勘查該工計長四百四十餘丈從前自兩頭進水上段一百餘丈下段九十餘丈兩年来已澄淤八九尺不䓁中段之二百餘丈只澄淤二三四尺本年伏汛内改由中叚進淤雖又増淤二三尺然較兩頭所澄之淤尚少一二尺今秋汛内又經兩次進淤二三尺已與兩頭一律淤平測量現在淤髙水面三尺是當日埽後深塘已成平地從此頂冲要工得有後靠化險為平臣復再四相度該工淤髙水面三尺雖已著有成效然而淤益髙則工益固自應接續辦理以期一勞永逸臣隨面交該管㕔營督率兵夫在新淤中間接挑溝槽寛以一丈深以三尺為率挖起之土分鋪淤面並將上中下三道倒勾引渠如式修慗目下秋汛未過若遇水長仍可進淤即或水不再長亦可為明嵗伏秋放淤之計臣並在工上下看定安設馬頭地方明春翠華南幸届期敬謹預備恭請聖駕臨工閲視若得仰䝉指示臣更知有所遵守矣奏入報聞乾隆三十年二月十三日江南河道縂督髙晋奏言本月十二日恭逢聖駕親臨閲視清口木龍工程荷䝉聖明指示應于四架木龍迤下與陶庄積土相對之處再添木龍一架庶挑溜更為有力大溜全歸北岸則陶庄積土自可冲刷浄盡以收清黄並流之效臣遵即測量地勢䝉皇上指示之處在四龍迤下相隔一百九十丈正與北岸陶莊積土緊對應遵㫖即於該處添建木龍一架擬長五十丈挑溜全趋北岸寔属有益除現在委員核寔確估辦料俟料物到齊儧辦務於伏汛前完竣奏入上是之乾隆三十年二月十四日兩江縂督尹繼善江蘇巡撫莊有恭奏言據協辦大學士陳宏謀奏請將常鎮二府港􅆜圩圍責成司道大員前往查勘有阻塞破損者疏濬培補其通江尾閭如孟河之類如有淤塞大加挑挖期於有蓄有洩奉㫖俟到江南時交該督撫查辦欽此准軍機處移交到臣䓁竊照農功必藉乎水利而水利之興修全在溝洫流通圩隄堅固方足以資灌溉而衞田疇伏查江南一省恭逢我皇上疊舉時巡盛典翠華所遇指示機宜如徐海淮揚一帶河道溝渠俱大發帑金次第疏瀹並於工竣之後督率民力毎年嵗修不使稍有淤塞其蘇松太䓁處前嵗亦經奏明將淞江婁江河道一體開濬現在宣洩以時旱澇有備豐亨屢慶成效可稽至常鎮二府地土寛平河流坦易本不至如淮揚蘇松各郡之低窪惟是地近江邉潮汐往来不無淤沙停積如鎮江府之城河臣䓁已于上年飭令該道府勸諭紳士設法開疏報騐竣工又如金壇縣之運河亦據該縣紳士呈議集費經臣䓁批准定於今嵗農隙築埧大挑原俱仰體聖主重農興利至意量民之力因天之時次第辦理今據陳宏謀所奏皆属應辦之事臣䓁伏查該二府支河􅆜港圍蕩堤塘所在皆有向俱民間自為經理但恐心力不齊彼此諉缷自應官為督辦至通江尾閭如孟河之類淤塞年乆工煩費重非可茍且圖功且東作將興大江以南民勤力作届期即刻無寧晷断不能即時興工臣䓁擬請先委常鎮道督同常鎮二府親往各處逐一查勘分别先後舉行如支河􅆜港圍蕩堤塘坍塌淤滯工費無多者即立督各業佃􅀈期挑挖培固至通江尾閭如孟河之類應大加挑濬者先測量髙下淺深工費需用若干諭令民間公同議辦或一時民力難於集費則酌借公帑分年徴還俟查明之後冄另委大員覆勘分定段落預選紳耆多派官員先定規模俟本年農隙齊力大舉務期莭莭疏通農田永頼以仰副聖懐奏入諭依議行乾隆三十年三月二十八日江南河道總督髙晋奏言切查徐州豐碭㕔毛城舗原設砕石滚壩為宣洩黄水盛漲之水啟閉機宜最關𦂳要乾隆二十七年恭逢聖駕南巡臨徐閲視北門外誌樁水勢仰䝉睿謨廣運因時制宜欽奉諭㫖毛城舖迤東之唐家灣引河視徐城水誌長至一丈一尺五寸以上䦕放宣洩俟漫灘水落即行堵閉仍令督撫河臣於按誌應放時一面奏聞一面辦理欽此臣敬謹遵守二十七八兩年伏秋汛内徐城水誌加長逾誌將唐家灣草埧依時啟閉二十九年未經漫灘唐家灣亦未開放俱經臣先後具摺奏聞臣數年以来留心察勘該處從前漫灘係在唐家灣迤下二十七年漫灘正對唐家灣引河二十八年漫灘又在唐家灣迤上察其所以上下無定之故盖漫灘一次則河唇必髙仰數寸以至尺餘不䓁水性就下乗低而漫理勢固然惟是唐家灣漫灘形勢既已自下而上河崖袤延二三十里地方廣濶若聼其自然不加修治將来漸徙漸上正與蔣家營傅家窪䓁處逼近恐􅂈水較多致有掣溜之虞臣查毛城舗下㳺濉河毎年秋汛後如有淤墊俱經勘估挑濬今唐家灣引河外灘既因沙淤髙仰自應比較欽定徐城水誌尺寸將該處河灘新淤浮沙剷去一遇水長逾誌即䦕放唐家灣引河以資宣洩方合機宜臣于上年冬間親往查勘督飭道㕔將該處河灘新淤測量剷平地勢髙下悉仍其舊總以徐城水誌為凖似於節宣下㳺減洩盛漲均有禆益奏入報聞乾隆三十年四月十三日河道總督李清時山東巡撫崔應階奏言竊查徳州城外衞河因西方菴形勢偏趋城垣受險于乾隆二十七年十一月内經前河臣張師載前撫臣阿爾泰㑹同奏明在於對岸魏家庄挑挖引渠長四百九十五丈分洩溜勢嗣因新挑引渠河身窄狭䦕放之後舊河内西方菴險工仍不能盡除又經前河臣張師載奏明將舊河口門堵築攔河大壩令全流悉歸引渠冀其冲刷寛深臣䓁屢至其地逐一勘騐舊河原寛三十五六丈今引渠僅口寛十二三丈引渠兩崖全係膠淤兩年以来水勢不能冲刷現在口底寛深仍與原挑丈尺不相上下伏查衞河之水滙合汶漳毎至伏秋大汛勢甚浩瀚在河面較寛之慮尚慮出槽盈岸今以十餘丈之引渠承受全衞之水咽㗋既束勢必益増其漲上年汛水安瀾至此處因引渠窄狭水勢擁髙浸及攔河壩上竭力搶䕶始保無虞此其明騐也查舊河現寛三十五六丈若將引渠大加展寛與上下舊河一律水勢非不可以下達而核計土方銀兩需費較多若䦕壩分水不加約束則舊河勢順溜復偏趋險仍未除臣䓁公同商酌可否將攔河壩挑開酌留舊河口門二十丈聼其分流壩之兩頭用草柴褁䕶并於西方菴頂冲迎溜之處修築挑水草壩以挑溜勢其舊日埽工酌量應修之處相機辦理庶水勢分行俾得有莭制舊河内不致盡吸全河之水而迎溜之處復有壩工挑䕶河流暢順于河道城垣均属有益奏入報聞乾隆三十年九月二十六日大學士管兩江總督尹繼善䓁奏言竊照常鎮二府港􅆜圩圍通江尾閭前據協辦大學士陳宏謀奏請修培挑挖經臣等議奏先委常鎮道府查勘如支河港􅆜圍蕩堤塘坍塌淤滯工費無多者應督業佃尅期挑挖培固至通江尾閭應大加挑浚者諭令民間公同議辦或一時力民難以集費酌借公帑分年徴還奉㫖依議欽此當即飭委該道府逐一詳查確勘兹據常鎮道陳大化䓁勘明該二府通江尾閭支河􅆜港多属深通圍埂堤岸亦俱完固其武陽宜荆四縣聮界之南運河暨金壇丹陽兩邑交界之七里橋河冬令水涸均有淤淺現據各該縣士民按田集費自行興挑外惟常州府属武進縣之孟瀆徳勝兩河南通運道北達大江関係數邑水利蓄洩民田萬頃咸資灌溉縁吐納江潮流沙停積河身淤墊亟湏築壩大加挑濬孟瀆河計長一萬五百餘丈約估工價銀三萬一千九十餘兩徳勝河計長六千六百餘丈約估工價銀二萬二千七百五十餘兩其孟瀆河旁舊有小河一道分流入江較正河近便直㨗潮退盡由小河洩㵼正河水緩沙停易致淤墊應于小河分流處添建石閘一座責成小河司巡檢同孟河舊閘一並管理依時啟閉使潮退全歸正河以免停沙壅滯所有建閘工料約估需銀五千六百九十兩零通計孟瀆德勝兩河挑浚建閘共約估工料銀五萬九千五百四十餘兩工費浩繁民力一時難以措辦據武進陽湖兩縣士民呈請備動公項于今冬築壩分叚儧辦按兩邑田畝騐派分作四年徴還又鎮江府属丹陽縣之九曲河亦係通潮濟運灌溉田疇年久淤塞應行挑濬計河長九千五百餘丈内有橋閘坍塌均湏修慗共約估工料銀一萬三千七百九十餘兩據該縣士民呈請借項于今冬興挑按照沾用水利田畝騐派分作三年完􅌳詳報到臣臣䓁查常鎮二府属孟瀆徳勝九曲三河均係通江尾閭攸関水利農田今既年乆淤塞自應一律挑濬深通以資宣洩灌溉現在行司遴委幹員于秋深水涸時再行詳細覆勘核寔一面選擇誠寔士民分派段落酌定章程於冬間興舉勒限完竣其孟瀆河添建閘座一並選擇紳士購料承修仍遴委諳練河員分段督催責成道府随時稽察工竣委員騐收務期處處如式工歸寔在惟是三河所需工料多至七萬數千兩民力不齊仰懇聖恩俯准於司庫公項銀内借給儧辦仍按所借銀數丹陽縣分作三年徴還武進陽湖二縣分作四年徴還庶民力稍紓大工得以尅期告竣數邑水利農田永資利頼億萬民人感沐隆㤙於靡既矣奏入諭如所議行乾隆三十年十月十四日河道總督李宏山東巡撫崔應階奏言竊臣䓁接准乾隆三十年七月初五日廷寄欽奉上諭前因㣲山湖蓄水過多遇夏秋漲溢之時瀕湖窪地毎多淹浸經崔應階䓁奏請宣洩㣲湖以誌一丈為度於韓庄添建新閘以殺其勢並挑荆山橋以暢其流辦理以来漸著成效今嵗南巡回鑾時舟行所經詢悉該處情形知濵湖漥地近多涸出農田耕作有資但湖水暢消既乆瀦蓄未充亦恐艱于濟運事難兩利深厪熟籌今據楊鍚紱奏稱湖内之水湏存一丈二尺用至五月八閘底水尚可得四尺餘寸足供挽運若止存一丈則五月八閘底水止存二尺六七寸重運難以遄行請交山東河撫二臣將現在各處出水口門地勢髙下水勢深淺尺寸與湖口滚水壩是否相䓁及可否量改水誌之處􅃀切定議如水誌難以議改或將湖口以下至頓莊閘數十里河底一律挑深五尺以為調劑䓁語所奏于漕渠轉輸自有禆益但水誌改加二尺於低窪地畝有無妨礙及挑深河底是否可行著崔應階同李宏李清時詳悉確勘定議具奏期於漕運民田均得利頼可將此傳諭知之楊錫紱摺並抄寄閲看欽此臣崔應階接奉諭㫖後即于九月十四日自省城􅁸程前至濟寧會同臣李清時馳赴韓庄䓁處臣李宏亦于十九日到工隨㑹同悉心相度詳加籌議遵查濟魚䓁處向因㣲湖水大不能消掣致淹民田上厪宸𠂻屢荷聖慈欽差大臣㑹同河撫諸臣勘籌妥辦加意疏消近年以来積水暢洩嵗獲有秋臣䓁細查水誌濟魚濵湖地勢髙于滚壩無幾如消水至一丈濟魚民地方能播種若将滚壩加髙二尺則濵湖地畝未免浸淹厯冬及春未能速涸越至次年舊水未消新水又至民田消涸寔属難期惟是漕運民生均関𦂳要不得不反覆籌熟如漕臣所稱八閘水勢至五月止存二尺六七寸正值天晴日乆上源放水過弱之際誠為不足查現在湖水深九尺九寸時届蓄水入湖湖口雙閘未經啟放而目下八閘運河之水現存四尺五寸不等即最淺之處亦有二尺臣䓁探量湖水現髙於運河水面二尺餘寸来春䦕放雙閘河淺處可有五尺餘寸之水厯查㣲湖滚壩毎月消水六寸重運經行約有三月之乆除消水一尺八寸迨江廣重運入境尚可存水三尺四五寸江廣船身重大三尺餘寸之水實難浮送臣䓁冄四圖維將滚壩内磯心毎空安砌石槽設立板片如今嵗水小之年加板攔束多收一尺設遇隂雨連綿水勢日増即將所下板片盡行啟除俾得及時暢洩至于八閘河㡳多係砂礓難於開鑿若自湖口以下至頓庄五六十里悉行挑深五尺不特工力浩大糜費帑金而且韓庄以上運河亦恐抽掣過甚反至淺阻惟應將八閘運河確加勘估不必拘定五尺之數凡有新經淤墊沙泥盡行估挑務至舊時河底而止如此則水小之年滚壩之上既經加水一尺八閘河㡳又復挑深於漕臣増水二尺之數儘可相符而濟魚民地亦不致有浸淹之患矣至于各處支河出水之口如小梁山内華山蘭家山伊家河䓁處較量河底俱低于滚壩今既于該壩設板攔水所有各處水口應悉堵閉以俟應行宣洩之時立即啟放臣䓁再查韓庄以下地勢西髙東窪勢若建瓴所以舊制於數里之内建閘至八座之多原欲莭莭関攔以資瀦蓄年来因江南泇口猫兒窩䓁處間有淺澁不得不亮八閘之板以為接濟之用督臣髙晋覆奏漕臣條奏案内已將盧口亂石壩拆寛五丈沂河之水得以引導入運而江南河定河清河成䓁閘與山東八閘毗連亦可以下板臣李宏已飭令管閘官員照山東八閘之例㑹牐啟閉其泇口猫兒窩淺澁之處逐一測量于冬底流濬一律深通是運河水勢来路増多而山東八閘既無虞淺阻而江南邳州一帶足資浮送有餘矣臣䓁凛遵聖訓周詳因時斟酌惟在洩所當洩蓄所當蓄務期民田無淹浸之患漕渠無淺澁之虞庶幾仰副我皇上重農利漕至意添設滚壩石槽閘板及疏濬八閘所需銀兩即在運河道莭省項下通融辦理毋庸另請錢粮奏入上諭曰所議甚妥依議行乾隆三十年二月二十四日河道總督李清時奏言竊照徳州城外西方菴運河逼近州城兠灣迎溜年年修做埽工所費不貲乾隆二十七年經原任河臣張師載陞任撫臣阿爾泰来往勘籌㑹同奏明在於對面魏家庄改挑引河一道以免城垣之險復將舊河口堵築令全流悉歸引河彼時籌辦之初原寛十二三丈深與舊河一律足資粮艘冬春運行俟伏秋水盛使兩崖自行刷寛因年来漳衞水勢未經盛漲河底雖較舊河刷深而兩崖俱係膠泥未能大刷嗣經調任河臣李宏以新河窄狭水盛之時恐不能吞納全河于三十年四月内奏請將所築舊河大壩仍行挑䦕鑲做挑水壩褁頭復將西方菴埽工附請鑲做各在案臣来往勘工見該處自開挑舊壩以来水勢旁分恐冬春水弱運河未免淺澁且舊河既已䦕通伏秋氷長西方菴䓁埽工仍湏年年修做以衞城垣臣查此叚運河自西南直射西方菴折而東北形如灣月該處運堤外臨大溜内趺深潭情形備極𦂳要當年創挑引河以免城垣受險最為妥協惟原挑河身未免過於窄狭再三熟籌仍當将舊河大壩照舊堵截其河身窄狭之䖏再加展寛與上下舊河約畧相等核計土方共需銀三千餘兩細為核􅈫西方菴及挑水壩兩褁頭嵗有搶修所費亦三千餘金今展挑引河需用之銀不過搶修之數一年一經告成不獨該處堤工可以化險為平徳州城垣可以永資保障西方菴䓁各埽工亦可以永停修做至估需銀兩仍在運河道属嵗搶項下通融動用毋需另請司庫錢粮除確核細數造册送部外所有臣籌辦情形謹繕摺恭奏奏入報聞欽定南巡盛典卷四十三
