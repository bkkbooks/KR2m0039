  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_009-1a, image: WYG0658/WYG0658-0102a.png}
body:
  text: 詩入浙江境輕舟曉日别吳門川路溪煙漾宴温栁葉青籠雞犬社菜花黄入苧蘿村連江頓覺民風異轉壑都闗吾意存恩沛寧無需再沛疇咨大吏悉心論賜閩浙縂督喀爾吉善海疆澤國乆聲騰坐鎮宣風嘉汝能連率威儀今陶侃一家父子昔韓𢎞喀爾吉善之子定長為貴州巡撫行春恵化吾方攬作雨平章民乆稱供頓何須事華飾山川韶秀此邦勝賜浙江巡撫楊廷璋監司經乆任自是悉民情要以能倡率寧惟貴潔清艱難九年蓄生聚五方盈飢溺吾心切勤哉撫恤誠過嘉興府城接境金閶即秀水此豐彼歉理真無旋知大吏為屯澤肯使斯民歎向隅前秋南省偏災江浙接境江蘇請賑之地頗廣而浙省報災獨輕且全遺嘉郡因特命加賑溝壑流離期普濟閭閻氣象幸微蘇城鄉輳僻從来異不獲吾猶厪一夫賜梁詩正文章館閣本仙曹何事江鄉六載遨膝下樂兼林下樂南峰髙並北峰髙依然橋梓欣來覲不老春秋閲正豪成汝孝名娛愛日且饒山水得清陶題煙雨樓楊栁磯邉繫畫舟六年清蹕重去聲來遊素稱雨意復煙意漫數處州還沔州名勝志煙雨樓有三一即此一在處州括山一在沔陽州詩句全從畫間得雲山常在鏡中留鴛湖依舊誰相識懶惰無心問野鷗觀錢陳羣書趙孟頫耕織圗詩屏題句侍臣歸老此居停煙雨樓中書素屏悉我重耕還重織豈其如畫竟如銘深惟衣食求民瘼詎止湖山悦性靈無逸爾知曽染翰勤政殿屏間無逸篇朕􅀁手書也嘉兹金鏡效張齡和錢陳羣田園雜興十首書以賜之庸醫望問覔形聲氣䭇三閭病豈成我令歸田静調攝精神竟得復平生怱怱過隙白駒催聞道家居七袠開蹕路迎鑾多舊侣就中頗喜此人來村舍何妨門縛柴逃禪時有野僧來惟應戀闕心如炷辨色趨朝心未灰前嵗災鴻實弊勞賑賙南望首徒搔相逢為問民蘇未巡狩寧因問栁桃開年正可墾春畦更喜柔桑葉漸􅏂勸穡課蠶林下事豈能髙枕說閒歸武原舟放莫教遲見陳羣詩煙雨樓前煙雨微撿得石湖詩卅首一時賡韻與軒飛陳羣詩本和范成大田園雜興三十首之十也溪上風来料峭寒春衫也覺切肌單笑伊何故朝衣典鄉俸從来志可寛命如沈徳潛例在家食俸故戱及之世族錢塘嫡派錢禦兒遷里是何年滮湖淼淼澄明水可養胸中一片天溪雲欲泮栁煙低栁外青帘颺影飛新壓糟床春酒熟換沽可觧帶腰圍炊黍何論蓴與菘怡情桃李繪薫醲今来扈蹕權教置可忘螭頭珥筆供石門道中作水程卅里恵風柔迤邐由拳接秀州毎至横橋人更庶夾川歡喜迓龍舟杏花紅覆菜花黄間出芃芃綠麥長岸轉川廻渾助喜為看芒穂報秋穰徐行減從經城郭萬騎奔馳亦底為到岸畫艫還少待率知舟較馬猶遲溪亭水市夾横塘老㓜扶擕共覲光却喜陌桑纔吐葉人家未至礙蠶忙偶因建置考圖經降縣升州浪與名天下本来無事好石城榮辱豈闗情至杭州行宫駐蹕八韻塘棲朝啟蹕寳慶午維舟策馬武林入觀民文教修湖山重到識衣食永圖求曰庶誠堪喜思艱轉益愁遇災憐静待乙亥秋嵗遭歉収杭人惟静俟賑䘏未嘗以米價騰踊越分妄干救急悉心謀旋轉叨鴻造歡欣迓六騶䋲先期展義祝嘏願添籌即漸臨明聖幾閒擬暢逰再依皇祖巡幸杭州詩韻前嵗災鴻今稍安觀民不為事遊觀餘杭省治臨行館二月春風駐翠鑾温凊常承養志樂湖山佳致悅心寛有来婦子多愉色應博慈顔一笑歡登吳山作蘿逕陟煙巒吳山暢大觀平陵秦望秀近挹浙江瀾逰目心因逺騁懐意戒盤閭閻殷樸地惟是厪饑寒瑞石洞天目東来走溟海龍飛鳯舞勢竒駭呉山控江為最竒瑞石竒擅吴山最叶我昔未遊今遊初谽谺􅀢㠑真仙都拾級不辭百丈峻乗興安用輕步輿興亦不可窮竒亦曷有限徒因剏覽一憑欄率費中人十家産飛來石飛來峯頂一拳石從彼飛來忽住此殊形詭態信翩􅗁景純未得窮具理再依皇祖吴山詩韻䍐罼重臨明聖湖吴山先此陟雲衢萬家煙火滋繁庶足食足衣慎後圗閱武旭麗恵風輕廣塲試閱兵百年偃雖可一日備須明氣勵熊羆旅勇軒組練晶詰戎伊古訓詎敢詡昇平昭慶寺錢塘門外古昭慶取便尋幽過野隄僧不叅禅修浄業佛無定相示全提法林自是忘憂所精舍堪稱小隠棲而我民艱常滿目豈能耽静對闍黎題黄龍洞欲攬棲霞峯取道黄龍洞雲根殊峭蒨有泉出嵌孔云昔僧慧開卓錫處所湧因移吴興名名此山巃嵸攀陟窮其幽竹樹紛鬱蓊千年紫藤花穂穂風吹動天池方半畆印月不可攏月即太古鏡池即丹砂澒宜置忘世人邱索書數種不出户庭讀奈予去倥偬黄龍石佛誰施月斧開山石相好荘嚴調御人倚壁恰看飛四柱真成一笠蓋金身紫雲洞作昔向畫中讀今從畫裏遊是日頗暄熱入洞凉風颼棲霞待舉歩黄龍漫廻頭非我屢耽咏率以記里郵竹素園小憩䇿馬山隂廿里強延緣嶺複達山陽亭看放鶴緬髙士祠過褒忠嘉鄂王却喜名園傳翰墨亦饒幽趣足徜徉外湖宛與内湖接咫尺煙宫可泛航詣聖因寺皇祖神御殿行禮明聖兹重攬卷阿昔剏留敢云繩祖武惟頼詒去聲孫謀家法勤宵旰民艱體豫逰一湖春水碧常共聖恩流駐蹕聖因行宫問俗重臨明聖湖白沙隄上果清殊髙峯南北呈雙髻行館招提别一區麗日和風春淡蕩花香鳥語物昭蘇民心樂處吾同樂豔舞清歌亦底須題西湖十景疊舊作韻蘇隄春曉重来民氣幸新蘇災後猶然念厪吾此是春巡第一義遊隄寧為玩西湖栁浪聞鶯虚傳公子號金衣不見聞聲綠樹深我豈戴顒閒逸者雙柑無復徃尋林花港觀魚玉泉空說魚稱錦玉泉觀魚盖西湖新増十八景名也蕉石還隣港號花此處近丁家山又名蕉石鳴琴名色任増新㸃綴躍潛終讓舊風華曲院風荷嫩芷新蒲始漾風那看淥水植花紅笑予却是拘名象杏雨桃霞豈不同雙峯挿雲南峯若仰比峯垂呼吸相通練色披入影澄波渾一合湖心亭上㑹心時雷峯夕照峯峯夕照都竒絶十景惟斯最擅名所惜堵波登未得付他髙矗晚霞横三潭印月塔影雖三月一輪是三是一是金身誰能識得金身幻可向潭前悟浄因平湖秋月綺榭紗疏虚碧油春蟾漪影恵風柔已看煙景清諸慮豈必秋輪始勝流南屏晩鐘湖山四面畫為屏合有鐘聲警衆聲唐宋至今諸物改霜天惟此未曾更斷橋殘雪斷橋佳趣屬三餘春景澄觀頗亦如積素明占芃麥好農民歡喜迓巡輿賜浙江學政竇光鼐兩浙山川常毓秀諸生月旦汝司文從来士習民成俗朂彼行知尊所聞見外發中務清正含今茹古去纎紛曰公似矣曰明要籲俊紓予一念殷放鶴亭作孤山山北聖湖濆云有林家處士墳自是傲時尚髙逸豈闗綴景事華紛桑田海水殊當代鶴子梅妻屬此君暫對拈毫非不可慮無佳句繼餘芬急雨急雨西峯来不待醖釀勢空羅纔細霏傾盆倐奔至邇来五日晴頗覺陽光熾在南恐不宜在北則常事南北皆吾民孰不厪祈嵗晴逰雖致佳切切弗快意兹雨實稱甘麥苖正吐穂滌炎人更欣濯黛山逾媚明當北髙峯一策行春騎吟香别業亭臺勝蹟號句留義取樂天戀此州前巡撫范成謨别業取白樂天詩句題曰句留處在孤山之南地方大吏重修以其多荷易以今名固惜湖山聴荒廢也嫌官吏太捜求設鮮民瘼皆如是斯慰吾心又底憂小坐不因賞煙景題詩用戒保釐儔清漣寺觀魚疊舊作韻煙輕春雨後暇值萬幾餘載禮金光佛因觀青色魚生機盎翰墨樂意映襟裾怪底叅軍羨還勞開士如新題看㡧畫舊句讀碑書謾設重来約猶今視昔歟恭依皇祖靈隠寺詩韻嶺是西方鷲飛来住岌峩名山觀不少此地比寧多法苑開龍象清襟洽薜蘿諸天應拱䕶御輦昔曽過北髙峯北髙峯是最髙峯夾路新筠復古松迥絶縦眸窮越望巉巖䟦馬訝吴儂千巒吐春霧銀絮萬壑霏山花紫茸天目探竒姑舍是半因無暇半因慵韜光菴雲林别室小徜徉深秀真稱委宛蔵兩寺由来分一寺見白居易詩湖光儼去接江光竒松詭石天然静澗草山花自在芳不辨北髙峯下路碧琅玕表矗蒼蒼飛来峯歌我欲靈隠陟髙峯經兹且漫窮􅆼䆗三十六曲既盤降韜光庵已散幽抱竒境當面竟失之山靈或我粗疎笑叶辭騎屧步聊爾為乗輿何必拘葩瑵千億化身棲碧巖法華國土奚能考一佛一樹經所云非色非空誰則曉是時雨後幻隂晴洞中鍾乳垂津寳便當擺脫六根塵如是法味餐以飽而我先憂後樂人與佛有縁無就道作歌亦如慧理歎傳名而已堪絶倒上天竺竹泉深秀處梵宇若天成亦自荘嚴相而無塵俗情此中消萬慮誰道認三生小憩鳴鞭去行雲出岫輕湖心亭春雨連宵傍曉晴進舟宛在小蓬瀛千重水樹印蔥翠四面雲嵐互送迎那有波濤驚俗眼毎因澹泊恱神情湖光設擬明如鏡此是心心純粹精題漪園峯分南屏峯水占西湖水竹閣與柏堂或自蘇詩擬明聖景無邉左右逢源取叶維舟一朅覽位置殊清羙兩字題漪園記予初到此浄慈寺瞻禮峯色湖光萃羙處金䋲紺宇此間開絶無塵相染初地定有天花落講臺况為祝釐伸衆願浙中縉紳於此恭設經壇延僧衆百員頂禮上為聖母祝釐豈縁問景偶閒陪慈寧夀比浄慈夀稽首我聞如是来小有天園蔚然深秀秀而娟宛識名園小有天新筍紫苞雷後埭落花紅織澗邉泉清幽最喜樹皆古㸃綴微嫌景勝前新搆御書樓固好揮毫却愧米家顛琴臺琴臺非子賤傳自米襄陽我不觧攫醳春温即景償留餘山居雜詠俗名陶荘路入絶塵路居真太古居湖山秀不盡此處獨留餘步步踏竒石聲聲聴冷泉香爐峯下濕一半借来懸穿石登丹梯憑樓出綠樹曠觀破天慳豪吟愜始遇把臂合佺喬决眥入寥廓振衣天氣寒西湖真一勺㑹得留餘意境將福不窮門應髙大著徃事有于公自蘇堤䟦馬至聖因行宫山居乗興憩留餘泉白峯前可戀諸卓午沿隄策歸騎為因封奏達中書閣報間二日一發是日應至蘇隄桃李畧過時油菜裳裳花正􅅋分付從人戒蹂躪吾民衣食此深資雙湖夾鏡六橋横隄上鳴鞭㪚意行耕織圗邉渾似此偶因比望憶昆明昆明湖仿此為六橋橋外即耕織圗育蠺種水田處也罷漁石湖畧觀魚少觀旋即罷西湖並弗觀意亦故有在彼非出本浦移放由官買其利仍民得畧觀當無礙叶究以事弗實作歌戒寮寀此則湖中物民業各分宰聞為去聲備水虞數日禁捕採厥牛未蹊田奪之固無罪長官在愛民此事吾弗觧敖漢瀑摐摐吉林流浼浼何漁曽未經藉此區區乃罷禁付之民網鬻資三倍水樂洞水樂探幽洞鍧鏗果異常盡消諸慮處繁㑹八音塲非竹還非革中去聲宫亦中商妙張洞庭趣何必問東陽見蘇軾詩理安寺一徑入深秀萬峯森簇攢石橋原不隔蓮界總生歡既狹中方濶憑髙望亦寛禪寧與儒異惟欲理之安戱題虎跑泉跑出清泉虎避居是泉雖名虎跑而山中本無虎也祗園想像得名初宗風信有能降者苛政将毋更猛於一帶崖懸鍾乳滴千年藤綴石華疎色聲香味觸都静便試茶甌亦緒餘開化寺蕭寺倚江干江天暢逺觀慧燈傳浩劫寳塔鎮洪瀾庭籟􅋽生竹山春香噴蘭坐欣諸品浄何處覔心安雲栖寺路入琳琅个个青祛人塵是洗心亭七年幻夢誰叅破六字真言此重去聲聴蝶舞花香自詮註瀑飛石矗孰流停修篁深處軒名忘機坐適可依然恱性靈觀採茶作歌三月初二日前日採茶我不喜率縁供覽官經理今日採茶我愛觀吴民生計勤自然雲栖取近䟦山路都非吏備清蹕處無事廻避出採茶相待男婦實勞劬叶嫩莢新芽細撥挑趁忙榖雨臨明朝雨前價貴雨後賤民艱觸目陳鳴鑣由来貴誠不貴偽嗟哉老㓜赴時意弊衣糲食曽不敷龍團鳯餅真無味閱海塘作騎度錢塘閱海塘閭閻本計聖謨良雍正年間海塘直偪北岸大為杭嘉郡縣之患徙皇考特命大臣鳩工築塘以捍之潮頭遂漸南岸海寧一帶沙漲數十里迄今廿餘年全塘永固民安其業長江已輯風兼浪萬户都安耕與桑南北由中頼神佑生靈永奠為民慶漲沙百里誠無事莫頌惟増敬不遑詠煎塩者一厯篷蘆厰載觀塩竈民樵山已遥逺釡海亦艱辛火候知應熟滷漿配欲勻可憐終嵗苦享利是他人觀江潮作歌樓名望潮江岸傍既到弗登有底忙登矣不俟潮一望殺風景事誠何當哉生魄為潮盛候因縁恰值聊相徉是日未刻潮應至厯申那見濤乗江駕山張盖徒想像詩消醮退真荒唐江山小船迎潮慣船名出江山縣地方吏備迎潮者用之觧嘲畧仿羯鼔腔金支翠旗光錯落摐金撃革聲鏗鏜俄頃江面潮亦至恬風輯浪非礌硠惟覺兩岸隠増溜賈舶好趁輕㠶揚陽侯静斂滄波細一霎依舊天水蒼昔聞厔沓戰藉藉欺人慣是文人長或云乗輿百靈䕶伍胥文種心早降土人謂潮頭奮振者為靈胥潮其後如綿絮而少弱者為文種潮云或云江走中亹後潮汐非比曩時强其然豈然付一笑漲沙惟喜資耕桑敷文書院六韻崇儒因廣學設教幸敷文砥礪先修己圭璋待致君兩京班莫羨三䇿董應勤詎尚飾其貎還應尊所聞江山誠助秀華藻欲祛紛棫樸真材毓朂哉魚雅羣再至雲林寺雲林舊日靈隐寺兩字奎章殿額髙鷲石西来作屏障浙江東去見波濤詩裁誰則如駱宋禪派他猶分濟曹香界若論真面目大都形跡粕和糟過靈隠至韜光誰道我無戀韜光那幾盤滿山紅躑躅一路翠琅玕泉不見頻響石如危轉安金蓮池半畆弗著釣魚竿賦得蠶月條桑得留字八韻南國蠶忙候猗猗桑正柔鄭坰寧此勝漆水可同不彼斧遵林際懿筐遍陌頭落枝嫩於篠採葉碧如油滿箔方聞響盈箱預賀收西陵錫佳貺工女忌寒休未免妨羣作因之返六騶湖山非不羙詎肯為淹留登六和塔作初地詣堅固信心登窣堵二諦此俱融空色本無所三眀真浄域可以冺今古四天垂寳網落落聞鈴語五雲糺扶盖擁䕶龍象旅六鼇永負戴萬刼奠江溆七寳勝荘嚴如是瓣香炷層層標實詮七層皆辛未年所題扁額厯厯憑證取江山識重巡歡喜生八部颺以細細風霏以纎纎雨造極朱欄扶曠覽供仰俯扵己可忘憂扵民那忘苦廻首禮釋迦徒羨曽何補再題雲棲寺雨中偏合訪雲棲曲徑通幽步不泥截竹引泉到香積動雲移石作丹梯野鼯得意松間擲山鳥無心花下啼小坐煙絲泮清嶂一天霽景又堪題詣天竺寺謝晴有序浙省麥田菜花髙下芃鬱羣稱數十年僅見而桑葉隂隂連村被隴蠶事亦將興矣數日以來頗覺雨多適以明日廻鑾再至開化寺登六和塔遂冒雨訪雲棲四山濛濛霧重煙凝頗不易即渙者心切切念之傳聞天竺觀音大士甚靈應因遣人至彼祈晴及至雲棲小憩精室則雲㪚日出千峯朗翠感應之速有如此者是日原不擬至天竺此則有不敢不至且不忍不至者矣故紆道敬詣謝佑詩以紀實云天竺重教特地行敬酬靈貺信昭明農蠶意羙微嫌雨籲禱心馳忽放晴匪為去聲及時尋樂地早傳翼日啟歸程大慈悲是觀音願應悉勤民一念誠喜晴前朝喜雨今喜晴可是吾心無定衡到處勤民祝時若此邦蠶並重扵耕杭州啟蹕廻鑾之作展義原廑民瘼諏閭閻未覺異前逰時和嵗羙休過頌小補粗足詎觧憂間亦湖山頻惬賞翻惟絲管畧嫌稠蠶忙候矣休因誤肯為宜詩鎮滯留欽定南巡盛典卷五
