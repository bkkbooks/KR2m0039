body:
  text: 欽定四庫全書欽定南巡盛典卷三天章丁丑直𨽻山東詩恭奉皇太后南廵啟蹕京師疊辛未舊作韻有序疆圉肇嵗正條風應律之初太蔟開陽協始和行慶之候爰諏令旦冄舉南廵溯前度之遊歌星周六稔奉安輿而莅止路指三呉翠羽金支掖輦長依愛日黄童白叟迎鑾更慶瞻雲問俗觀風顧閭閻而求瘼敷膏布澤軰井里之蒙庥舊韻重賡七言述志澤國省耕紀憶辛山川韶秀信無倫前秋適值逢灾歉昨嵗因之罷豫廵前降㫖丙嵗南廵以乙亥江浙秋澇停止槖籥轉旋農慶稔黔黎籲請志重申肆鳴帝里和鑾駕一慰江千望幸民再奉安輿出長樂徐遵廣陌衛勾陳青郊喜見餘晴雪緑麥行看發始春淑氣眼前天與盎詩情馬首日迎新乗時展義非無事敢廢軍書裁决頻時凖夷酋長巴雅爾等搆釁命將擒討西北兩路軍書令其直逹行在駐蹕良鄉行宫作青旗練吉指姑胥元氣凴㸔果復諸五載狩廵方過一三春景物恰臨初明窻温席清依永昔日今時静賞餘到處棲遲有行館兩言慙愧是懷居良鄉行宫疊舊作韻首頓庭軒近帝里長途車馬指胥江不遷者問伊誰是風在寒檐月在窻欲悉灾餘耕織勞南巡詎為事清遨江山秀亦天然助頗覺遄飛興已豪邇來頗有南來者都道羣黎望幸情然乎疑信吾猶半信者吾𠂻保赤誠塔影凌空曠野南節前古月正清酣奉慈兼欲同民樂趙北燈宵即景探辛未南巡十三日起程故即在此陳燈火今嵗以十一日起程命於十四日趙北口待皇太后賞燈並許民同觀也𢎞恩寺二首蘭若康衢側往來路必經松門宛舊識蓮梵亦堪聴佛豈較今昔物皆肖色形東軒更幽絶片刻為延停蓮社傳清派精脩奉羼提羼提華言律戒也提戈渾一室䜿拂斥多蹊誰是忘懷者徒成著我弓莊嚴斯信好可以覺凡迷琉璃河東風解凍春波泱長橋飲練將百丈雁齒枕陸接石衢中流曾無十尺廣徒勞人力此胡為勝朝遺跡得諮訪叶權璫桑梓乃在兹春秋祭掃來往有司畏畏勢為修塗葆盖穏驅平似掌椓人凶燄一至此朱家宗社將奚仗適來固節度鹽溝架木吾猶發官帑守閽豈得盡廢斯惕然以懼睪然想涿州行宫作練吉廵江國重臨凹字城軒楹無藻飾几席有餘清興與新春發心依古月明金吾何必禁爆竹喜聲聲涿鹿行再疊舊韻影燈喜爆閙郡城民風豐歉覘經行行宫晚景正清絶壁詩嵗月標分明西征士騰馬亦饑縁縁天凑時誠好其如審勢乏人為西師所至仰蒙統兵天佑可刻日廓清而諸臣各分彼此致失機宜狼子野心殊詭巧降蕃變亂因畏尤阿睦爾撒納巴爾雅等皆因受恩驕恣自知罪狀暴著懼罹誅討遂决計叛亂反面不顧恩遇稠聲罪致討重整旅肯使偝徳殘生畱七摛南人不復反三年克之鬼方收身此南廵心西海宵衣寧憚軍書修再詠紫泉行宫十景敞軒一區十畆縣城陲宻室敞軒各得宜路便重臨風日好吾心與物共春熙屛山門逕縈紆足幽趣一拳亦自得稱屛設如真展瀟湘畫翻厭施丹與著青鏡湖去年波影開奩澹今日氷光照座新可識凍融何礙鏡往來都是鏡中人舫室重宇湖心還號舫層層疊石固階基載舟得託常安穏吾亦因之悟所宜㯶亭棲崖一笠只容身滿受春風廽出塵設擬應真留下物能參背觸又何人虹橋朱闌詰屈不嫌長勢作垂虹飲練光天水心情斯小試遄飛興早到維掦魚罾未出輕鯈凍尚凝不教綴景設魚罾當春生飬資涵煦育物吾心别有凴石逕􅆆峯曲棧致多佳屧歩因之到竹齊却是小窻堪望逺村居野幙入觀皆竹埭琅玕幾個得天然便擬坡仙與懶仙此去雲棲幽絶處明知萬玉戛晴烟箭㕔恱心惟是勵無逸觀徳端知重有方駐輦恒因試弧矢承平武備詎宜忌趙北口行宫三首萬栁隄臨淀熏黄未發青渚宫實瀟洒節夕此居停大吏陳烟火勤民豈政經屬縁奉豫不罷且權㕔西窻猶納逺㳺目每教慿春氣怡還裊氷光融間凝雁囬欣翼接魚陟乍鱗矜遥浦村民集待㸔入夜燈魚筌還蠏籪生計淀村俱那藉名家畫真披漁家樂圖波將暖鷗鷺洲未長菰蒲正助萌陽候因之罷水虞命免天津府所屬積欠詩以示直􅈻總督方觀承去嵗秋告登編氓鮮逋賦今春駕南廵免三逮經路南廵經過直𨽻州縣今嵗應徴正供免十之三津門近海濵下濕多沮洳積欠非一朝致然豈無故與民樂休息保赤吾􅇆素新恩所不及曲體惟要務帑則免其徴糧亦豁其輸閭閻留有餘是豈非藏富叶長官善推行莫容胥吏蠧上元前夕趙北口行宫侍皇太后觀燈火即席得句晚來風定紫瀾收預夕承歡樂事稠座裏同欣上元節渚邉亦有慶霄樓垂虹百道連氷朗結燄千葩映雪留箭影飛空數無萬作朋慈夀祝添籌長隄迤邐長隄度六􅆖詩中景趣􅀞中探七橋梯栁黄金嫩兩淀氷綠玉涵恱可水鄉經趙北早教春意逓江南村民夾路尊親共富教難臻用此慙上元節賜隨營諸臣食五日吉行早駐鑾節朝賜食扈隨官珢霜粔籹頒羣座星海魚龍舞七槃元夕所欣逄蹕路一家何處不長安東風弗妒明蟾滿更待銀花入夜㸔日日日日迎鑾瞻就民百年休養此甡甡試看幼挈老扶者盡是寒衣饑食倫庶矣能無絲粟貴教之何有俗風淳從來保㤗惟難事今日其難倍古人紅杏園再叠前韻練日廵江國乘春發鳳輦昨嵗告武成憶曾於斯舘豈知馳㨗旌詭計事後顯去嵗以伊犁底定親告納孔林起鑾時擒獲阿睦爾撒之報適至閱數日乃知叛賊誑言以懈衆志統軍正不審其謬遂馳露布久之屢失機宜迄未擒賊因正軍帥之罪云三軍頼司命一籌何莫展選將更整旅問罪王師遣去嵗以阿睦爾撒納未就獲故懐觀望如巴爾雅之類巴爾雅之類者旋復搆亂因更命喀衮札布為定邉將軍以今春統索倫察哈爾等兵進討諸逆佇待奏膚功勘亂靖鄯善過景州曉春薄寒峭驛路惠風柔輕幰臨修市前驅指徳州村烟暗栁眼塔影矗城頭菆井民風驗燈棚節物酬羣黎來不約一老溘無留往嵗過景州致仕尚書魏廷珍輙迎道左頻賜以詩去嵗溘逝故及之故舊凄然睠誰真佺羡儔劉智社古社界燕齊舊名存劉智聞昔吕思誠令蓚稱循吏五馬廵民間曾以行田至均徭勸樹畜彰善與農器吾黨直在隠李氏感兄弟安得如斯人郡縣各一置厯久觀厥成無而自治賜衍聖公孔昭煥蹕路趨迎領一門詩書教澤泗洙源卿來處早予心往大禮方行不欲煩去嵗親諸按闕里釋奠故今嵗不復往僅例遣官致祭云徳州行宫示山東大小吏未敢深宫自宴居省方展義毎厪予按程移帳安猶便擇向開軒費則虚一宿遷他賞何有萬民得所樂寧如由來不説惟成事去嵗廵撫愛必逹于徳州建行宫以傋南廵入東境首程宿頓將訖工乃入奏因成事不説故仍之然朕所不取也此後無需慎戒諸燕九日奉皇太后觀燈火燕值邱仙節燈陳鬲氏墟火城張大野綵閣奉安輿孔雀千屏金蓮萬朶舒鸞車朝絳闕龍馬負舟書勝賞真無斁圍觀共樂胥兆民齊祝夀夀指㤗山如駐蹕徳州行宫作行春南去三千里問俗東來第一程但得清塵儘表敬豈期作室儼觀成橋銀樹婪燈燦火棗金芝應節榮入夜肩輿不呵禁為田久矣此民情再依皇祖徳州即事詩韻去嵗告功至紅旗又報初元戎堕詭計未讀六韜書闕里兹弗臨遣祭瓣香肅翠䍐指江南早喜東風燠賜山東廵撫鶴年粤海旬宣久青齊治平聲撫掄嘉伊品犖為我我牧元元坐鎮青油幕扈隨紫氣軒驅馳何足貴善政勉徐源麥二首鳴鞭過禹城塍麥綠方萌經雪膏猶潤迎風浪未生宣言避騰􅏳滿意入吟評野老修春耒行將舉趾耕春入年前早南來氣復暄芃烟新染翠茁壠宻含温農務從頭起民依箇裏存兩岐寧上瑞普獲乃真恩徒駭河神禹治河乃最神當時猶治人徒駭三千年後智非禹問勝此任誰能解徒駭極北鬲津南其間大都九河在相去乃至二百里同為逆河方入海今河不過數里餘安得修防不日治將欲棄地讓之水億萬生計嗟瓦解即禹治今河應難是吾蒿目所以乃降㫖加賑去嵗被水五州縣去嵗河北溢乃自無隄處填築失疎畧遂有奪溜慮河至孫家集以北無隄黄河漫河所過汕刷成渠者水落後一一填築以禦來嵗汛漲上年河臣經理疎畧致黄河北流幾至奪溜亟命大臣堵塞而當河溢時上流諸州縣積潦無可宣洩東省魚臺等處遂致成灾茭楗亟堵塞乃得歸故路積水則已多五郡當其劇尾閭苦泥淤當春尚沮洳涸田正需時耕犂早云誤新正例施恵加賑曾頒諭今來縁南廵民艱悉經度何妨一再加蘇此惸獨庶嗟爾親民官推行體休助雪三首正月二十二日東風拂􅀈車稷雪忽交加沿路勢添密依人飛故斜連塍藏綠毯大野捲銀沙既慰還因慮寧無凁麥芽行宫午駐蹕六出尚漫漫坐我氊廬暖思人布帳單收來煮小鳳望去舞翔鸞功徳明當莅方山靈巖寺最髙處日功徳頂千巖積素看廣甸含膏潤問知冬雪多得斯誠益善惟是奉中和澤被東南畆花開頃刻科皇州七百里霑否意如何再依祖南廵過濟南韻清蹕重過厯下城栁絲遲放麥芽生觀民未覺足衣食敷政深慙措治平繩武勉思堂構肯祝釐欣願海山盈靈巖聞道多竒秀佳氣遥看馬首横曉發崓山雲封昨過藏松色崓山上多松雪積今看繢巘姿清致山程逄不易却教回首立移時雪後春朝生峭寒輕裘暖幰意遑安為他道左來黎庶粗布衣猶纊絮單連朝劇暖換棉装一雪青郊頓作凉凡事如斯難逆料鞫躬誰是昔南陽春山迤邐度朝晴卓午還逄薄暖生旅况暄寒人自備所欣連壠麥方萌駐蹕方山濟北名山駐玉符欣於始遇暢清娛梵宫髙下羅諸岫行殿樸淳别一區容膝已安謂多矣竒觀何限詎窮乎潤州此去樓霞欖吉甫均標十道圖靈巖寺方山方有靈巖寺呉下靈巖不獨靈立字安名由箇箇今來古往鎮亭亭砌瓴塔尚千雲矗卓錫泉常注竇渟希有佛曾出現地既云希有現何形題靈巖寺八景巢鶴巖法定開山有鶴瑞羽衣皜皜駐雲峰至今月白風清夕彷彿東坡夢所逄甘露亭泉疏甘露淙淙亭子因仍甘露名用汲誰工註及汲象馬遷曾是嘆王明卓錫泉泉臨卓錫一亭幽萬壑千岩景畢收最喜東南縹緲處澄公常共朗公游摩頂松髙松西指為求經般若真詮冺色形假使虬枝解更向定知糟粕是青寧鐡袈裟片鐡為衣狀水田滄桑幾閲鎮精堅誰云五葉一花止試看伽犂萬古傳白雲洞靄靄英英相後先穿雲忽上白雲巔春郊方待一犂雨便可為霖潤大田峰枝澗葉未芬芳祗有天花樸鼻香底事座來都不著維摩室裏即斯床愛山樓縈青繞白相入聲氤氲無色聲天大塊文著個横樓真恰當四時佳氣與平分過㤗山再依皇祖詩韻方山一宿停清蹕㤗岱巖巖見舉頭南指遥程春曉發東來紫氣馬前浮聖踪永古並崇岳愷澤於今在九州縱是瞠乎嗟莫及覲掦敢不意深留靈巖石路盤山脚齊甸春光動陌頭案衍遙從西峪度巃嵸不礙曉烟浮瓣香寸意馳仙闕與地千年鎮兖州憂樂向來何處著思量結習豈應留望岱廟寄題皇林取路向西移敬仰崇祠一念馳作鎮配天首五岳廟中配匾曰皇祖御書天作鎮居方出震佑嘉師唐槐虞柏應依舊秋月春風又㡬時香帛太常依例遣車駕經山東境禮官奏遣大臣賫香帛告祭岱宗修故事也祈年惟是禱無私賜山東學政謝溶生聖賢桑梓地俊秀鑑衡司勝任誠非易不鰥在有為遷喬思已早刈楚念人遲士習民風倡朂哉法則持渡汶河三汶兹為大千秋帶魯郊原山溯源出濟水滙流交凍解遲蒲刺清波下鷺抓方春生飬候未擬網罛抛填倉日二首前章即景後章抒懐春朝廿五客中過烟火千村入詠歌節以俗傳聊聴去聲俗義縁多稼豈辭多九州誠使倉箱足萬姓自然長幼和旋頋迎鑾總總輩盡資衣食計如何屈指為期十二過慧賢皇貴妃以乙丑年是日薨逝可堪囬憶是耶歌悲歡展轉都來幻嵗月推遷積以多永巷羣維式儀則中宫素服喜祥和不三年又辭予去辰孝賢皇后以戊三月崩于徳州舟次難向君平問若何復雪三首曉報濃隂羃逺巒雨縁春暖雪縁寒雖然膏澤無兮别恐釀嚴凝意未安六出昨逄頗益麥千林今詩復装梅設云入畫斯誠善而我寧因㸔畫來霏霏著地旋消融積處都無一寸蒙厯覽吾心方稍慰午餘還放日輪紅至泉林二首叠舊作韻無多室宇淳而朴咫尺泉林秀且明芳勤杏花春未放素皴把樹雪初晴窻櫺好景隨心㑹壁額前題向客迎民氣安和嵗中上省方縁此一怡情禊辰昨嵗雨餘至春孟今朝雪裏來宫是皇曾駐憇輦扶母喜趨陪西瞻曲阜増顒爾南指江鄉已近哉不異前兹惟問夜軍書籌畫為徨徊去嵗駐此已覺紅旗馳報浮虜為偽督令策楞等進兵終以路逺遲延坐失事機而逆醜未獲懐首鼠者旋復猖獗故今嵗更籌進兵致討耳再題泉林行宫八景近聖居髙齊樸斵適居安映帯清流多激湍拈筆還思去藻句句新題近聖額簷端在川處石罅淙淙清且漣如斯不舍向長川名依夫子垂終古理註魯論在目前鏡瀾榭石髪經冬碧轉深毎來曲榭必慿臨開奩設以菱花擬定是秦䑓照膽金横雲舘曲抱逥廓鏡様圓三間虚榭聳中天有時一片雲生彩恰似廣寒霄漢懸九曲彴溶溶春水漾蘭苕碧柱朱欄窣栁條合是武夷最深處便當􅓏歩躡虹橋栁烟坡新梯欲放曉寒輕低泮朝烟一縷横今嵗春來節令早已憐舉眼盻清明古䕃堂古樹曾經䕃古人今人對樹樹如新由來樹不知今古知者誠為未出塵紅雨亭一亭文杏四鄰圍寒勒花枝未染緋却憶去年臨上已垂簾紅織雨霏霏蒙隂積雪再依皇祖詩韻二首城過顓臾憶古封南廵為省織將農蒙隂雪後賡前韻大塊文章占素峰平田融未麥根封為問農言不􅊣農却繢前遭景如舊幾曾積玉在嶤峰望蒙山雪色再成叠舊作韻積雪蒙山又昔同行軒妙趣静慿中蘇家詩愛尖吟軾王氏畫看皴是蒙路指東南迎暖日首廽西北峭寒風遐心憶到伊犂塞佇待王師早建功萬松山小憇衆山多濯濯一嶠獨蒼蒼想有靈祗䕶如看圖畫張清齋梵宫側古􅄜午隂凉小憇登程去拈毫興已償賜河東總河張師載疏瀹期嘉績修防董衆寮詎予惟使過勵汝尚更調張師載前任江南副總河以徇庇悞公與髙斌同獲罪既念其人素謹朴復加錄用兹命代白鍾山為河東總河俾得改弦自効法在遵潘訓文寧藉鮑昭魚䑓全涸未舉趾待春朝
