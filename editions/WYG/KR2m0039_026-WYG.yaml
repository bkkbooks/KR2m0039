body:
  text: 欽定四庫全書欽定南廵盛典卷十五天章庚子直𨽻山東詩南廵啓蹕四疊前韻有序十六載溯懐繫念莫申蒼赤之誠三千里積悃就瞻難却東南之請矧清弱黄强之乆悉復南坍北漲之夙期後海先河民事咨其大者由呉入越人情慰彼同然於是儀舉五廵循成例而禁申靡縟值此籌開七袠罷慶典而祝謝歌謡惟是蠲漕開科俾士庶各孚所願且更賜金發帑使上下勿耗其貲兾連疆共紓望幸之忱而發軔正逮祈年之日韻經四疊体踵七言􅔔維扶鳯雲中感舂音而增悵爰此鳴鑾郊外随里鼓以繼賡云爾髙齡遠馭慮勞辛色養由來闗大倫乙酉以還罷斯役乙酉南廵回鑾以難聖母春秋日髙冄奉以逺莅曾諭地方大吏向後不復有所請三年云滿舉重廵因之俞允諸臣請前歲江南浙江督撫以兩省臣民望辛並殷合詞申籲且言河工海塘亦必藉親臨指授遂允其請於今春舉行惟七旬慶典降㫖停止仍普蠲漕糧開鄉㑹恩科以慰士民之願亦欲行觀夙願申憶昔迴鑾攀戀衆江浙羣黎於乙酉迴鑾時依戀之誠極為懇切余非不繫念實不忍訂以後期今怱怱十六年復舉廵典此日就瞻之民仍多昔日攀留之衆也即今露冕拊循民殷哉一体逸圖切小矣七旬慶典陳瞥眼歲華過十六迎人江浙逮書春戒奢崇樸例依舊撫景得詩事又新賡韻茫然失掖輦不禁把筆愴懐頻過盧溝橋撰吉啟行旌南廵第一程東風石橋嫩積雪野田明燈節烟村近韶年物象亨春氷猶未解元玉鏡光平良鄉行宫四疊舊韻璧薦祈辛發東道鼓鳴計里指南江初程不逺午前到饒得餘閒對碧忩已不言勞厪衆勞􅂉應諒弗為嬉遨徘徊景却異前度吟興何由得爾豪乙酉有言弗重幸乙酉南廵回鑾曽諭江浙督撫不再舉南巡之典民非悉喻吏知情何當十六年再舉豈我祝釐心弗誠節前燈火御營南觀罷清陪古月酣恰有盆梅一枝馥堂堂春信此先探郊臺迤邐向南程郊臺覿靣呈丙申斯再叩丙申歳阿桂等平定兩金川凱旋時仍視庚辰春兆惠等平定回部凱旋之例行郊勞禮但庚辰初創規模丙申則臺已甃成其舊設幄次者亦已為亭座矣孟月重去聲經行屢獲帡幪佑敢忘乾惕誠諸藩扈清蹕益切撫柔情𢎞恩寺三首招提枕路陲東道必經斯𣗳古難論古春時正好時佛原泯空色僧自重毘尼一十六年閲真如瞥眼馳下院分潭柘此寺為潭柘岫雲寺下院傳來守浄規未䏻忘有執佛以無著為宗即守律仍有所執著也却亦勉無私忍草向陽發禪枝帶籟披華幢及香鼎仍是聖慈施東廂有静室熟路徑庭知歩入齋牀撫坐來忩旭移樸淳原自好陳設此何為欲曡前畨韻前畨不可追涿州行宫作行館城南茲重去聲臨蕭然門逕窈而深嫩苔依砌纔生色古𣗳鋪庭未張去聲隂撫舊跡惟増慨歎消餘閒祗以清吟遙知南去江鄉景何日䏻忘此際心涿鹿行七疊前韻七言不似五言城短則近体長歌行於此恰宜歌涿鹿厯厯舊作書壁明城村民象胥温飽獄訟不興任恤好籌治盖亦弗出茲詎在求竒及誇巧不為已甚去其尤余於地方官民弊病有犯必懲從不肯顢頇了事然必不肯逆億苛求嘗有詩云不為已甚去已甚總不外此意也勉斯恒以喻衆稠省方展義率由此吉行五十清蹕留觀燈應節入夕收明朝遂與登程修紫泉行宫賜隨營諸臣及直𨽻各官食即席成什程非逺乃到斯早賜食同招大小臣亦有笙歌呈百樂却無酒醴事三廵晩來燈火觀先節都以歡娱答始春回部番官胥令預年班入覲之回部伯克及四川畨部頭目等並令扈隨數程俾得與觀燈節之盛輝光􅘈爽澤應均紫泉行宫十詠敞軒敞軒都不設忩櫺茲日於茲適可停略弗覺寒微覺暖尋思俶律正迴青屏山堆石當門代屏扇一拳意亦具雄嶠襄陽設使驀逢此難作柴桑不折腰鏡湖滿浦水光尚未融為氷為水本來同唐宗喻别開生面三鑑意余都在中舫室舫廬傍岸却艱行一例篷忩映沼清安福遥知待淮浦不妨小試此先聲㯶亭㯶亭雅合隠淪居綴景因之此構諸歩入自嫌衣履異欲詢構者意何如虹橋曲折扶欄接逺津豈虹為主豈橋賓世間名象率如此幻爾何曽信有真魚罾魚罾不啻幾遭吟曽未烹之試釡鬵設擬仲舒筞中喻對之惟覺愧扵心石逕不同蔣宅擬之三碪􅑇中間屧歩堪我是小山招隠者漫訾㨗徑此終南竹埭幾个猗猗埭畔扶但看節概逈然殊雲棲謾詡干霄翠為問斯非君子乎箭㕔馬射依然歩射廢自臂痛以來騎射尚可借馬力開放且有命中者歩射則因左臂不􅀎支拄乆不作矣已看虚擲廿年春箭㕔猶自瞻簷額憶古微慙拊髀人降㫖命免直𨽻厯年逋賦詩以誌事經途例免十分三每廵幸經過地方免額賦十分之三昨已降㫖予蠲惟直省尚有積年偏灾借出未完之項并令查明一體蠲免所弗經應澤並覃稔幸昨年逢以普灾厪前歲被于南順徳廣平大名天津迤南四府属平前歳被灾較重所有因災出借常倉榖八萬四千餘石折色銀九萬八千餘兩屯糧豈榖一千二百餘石概予豁免俾無催科之擾豈無積欠勞追呼去聲率與豁除免負擔四府因灾出借積欠銀榖全予蠲除仍飭該督等實力妥辦俾閭閻均霑實惠咨爾長官勤撫字催科漫詡政䏻堪賜直𨽻總督袁守侗督軍兼理撫民事責重器資特簡諸中外久經勤􅆒厯淀河竝賴善防疏直𨽻縂督兼理河道守侗曽為河東縂河故授此任葺脩行館猶餘務保障京畿慎匪紓幕府一年凡兩易昨歲周元理因井陘聚衆抗官一案於縣官派累激變袒䕶不問因罷其任以揚景素易之乃甫經數月而楊景素又忽以驟病不起既惜其材更難其選益厪為君之難耳掄材宅牧益愁予趙北口行宫作烟宫向每此停驂門徑依然舊所諳展拓却看侵淀渚經營似擬肖江南趙北口舊有行宫􅀢地方大吏又於浦西拓置軒亭雖肖江南風景然踵事増華未免侵及淀池地靣較之前時眺覧清曠轉覺不及矣今來明去何湏是踵事増華信不堪唱始兩人難重去聲問増置亭臺乃周元理楊景素所辦然過於増餙徒費物力使兩人若在本任必當嚴加申飭也未先諭祗自懐慙題湛持軒舊有書軒臨淀池紙忩木榻樸相宜隔溪㸃綴頗繁矣未識吾心湛以持懐清樓有㑹層樓我向名懐清雖云即景有深意滄浪寧渠喻玩水弊吏曰亷非我事九州四海奉大清胥俾懐之豈易致是必乾惕整君綱近悦逺來胥化被南廵茲詎圖逰遨省方所重惟施惠趙北口行宫西軒作西軒咫尺臨淀池忩俯清波淼萬頃向喜慿之吟吐詩恰合天水相與永别斯弗到凡數年來徃吾胸愛清境茲來建置却殊前溪外亭臺修以整迴廊宛轉遮髙低欲因騁目何由騁供觀烟火何須是費奢長此安窮逞况占淀池為陸地夏漲無所容堪省經始二人弗在斯在斯未必䏻逃𤯝行宫西軒俯瞰淀池𣺌瀰萬頃足資騁望是以冇天水相與永之額今周元理楊景素因欲供觀烟火添置亭臺廊榭既遮騁望更占淀池水道無益而徒滋繁費辦理實為不善二人設尚在本任未必􅀎辭其咎也博喜徒増風景佳不喜翻謂煞風景趙北口行宫三疊舊作韻於意有不懌摛詞那得妍居停原似舊建置訝増前行宫浦西拓置亭榭既多勞費且風景逺遜昔時矣既徃事弗究費多心為懸西軒偶慿憩殊異昔如船丙子年舊作冇虚忩依碧水不繫得稱船之句辛未南廵句郵籖記以明祀河酉歲詠釋奠子年評辛未南廵成詩二首後南廵三次皆未疊韻癸酉年因閲視永定河丙子年因撫定伊犁告功南闕里經趙北口二疊韻皆矣非南巡茲廵三疊舊韻亦閲廿餘年來徃誠如㓜光隂迅可驚尚存問安室撫榻最傷情鄚州道中作俶装計里發晨朝格淀長隄千里遥隄上春光何所似看他漏洩栁枝條漁村蝸舍大隄西東則平阡緑麥萋物象随宜四時閲民艱到處一心稽土郭猶存古鄚州人家負郭頗稱稠年年四月集藥市鄚州每歲四月中廟市最甚其地為扁鵲里祀藥王祠凡各處地道藥材之至京城及北省市售者必集於此始發行風俗應從民便由思賢村行館再疊舊作韻思賢名為祀賢祠傍築齋堂宜非宜不號行宫曰行館用舊作第七句反其意欲求論息即論資御營繁重雖減費地方大吏以此地舊無行宫於壬午年添構數楹即可省備帶行營駝装之力竝可息傔從之勞且所増不過數處因聼之清暇徘徊慙考詩經以漢明學以宋述之足矣漫更為題毛公祠故里祀毛公傳詩正派通亦看連樸館誰弗曰行宫砌草蘇輕緑盆梅暈淺紅不教烟火設節間燈火惟十二至元夕而止又十九日為燕九節亦仍設之其十六至十八三日則皆命停止示有節也長此恐安窮紅杏園五疊前韻十六載重經不殊前税輦平逺見樹籠知為紅杏館紅杏紅猶未物固因時顯東風鼓昭蘇蓓蕾仍遲展即境懐其人考古㡬閒遣厥後更稱誰東平云樂善景州行館即事言懐酉年行館備髙年乙酉南廵地方官以館數聖母髙年旃廬不及瓦屋之安適因於此建行楹以備憇息閲今十六年恍愡如夢實不堪追憶矣閲歲獨來意惘然八景豈重供懿賞一心無那付哀絃春秋十六空餘憶世界三千幻裏縁祗有夜深明月上碧霄朗照徹中邉景州行館八詠展義齋有暇臨斯常召見載咨諸大小臣工試思展義於何在不出數言夏諺中頣志堂堂名頤志更頤誰簷額猶存祗益悲合付睨而弗視耳夜深清夢􅂉逢之通渌橋池中橋是不行舟渌水宛看左右流汲井或因工綴景率難問及水源頭澹懐室温室居然溪水涯儻來一宿澹予懐澹懐祗為去聲廑民隠寧為臨風琢句佳延月臺石為梯似洞天燭玲瓏亦隠婵娟恰當過望輪遲上遂一登之意與延涵虚舫岸則幾楹肖舫式亦涵烟水亦乗浮遄然逸興飛白下老尹曾留不擊舟葆光洞石洞􅆼深號葆光葆光其意味來長詩云衣錦尚之絅文著由來戒發揚四照亭曲徑重茲履歩尋坐來四照可供吟聖因一笠名同此西湖聖因寺行宫内有四照亭此亦如慕藺也想亦翹然待我臨微雪正月二十日邇日東北風情知應有雪雪弗雪皆可積素存郊埒西南廑河工阻流虞決裂昨十五日途經雄縣一带東北風大因河工相距不逺恐逆風阻流曽降㫖詢問阿桂該處是否不致氷凍施工是否尚易為力至今尚未覆奏行行入齊疆六花為飄瞥宿麥未萌芽亦無慮凍結未能忘逺愁聊以詠近悦胥因勤民務君職縁民設過徳州浮橋即事造舟早是此為梁遵陸南廵茲俶裝北指趙疆猶未逺東經齊路乃方長已欣去歲登榖寳昨歲山左秋收極為臺稔撫臣奏報徳州以南均九分有餘更看當春茁麥秧接覲諸臣隨扈駕暇應民務問之詳駐蹕徳州行宫即事去由陸路歸水路發軔維舟總在茲構築行宫亦已乆休停清蹕此惟時黔黎葵向誠堪喜江浙輿情率可知室宇依然景非昔每因把筆引悲思八依皇祖徳州即事詩韻赤縣向平逺青齊入境初駐輿纔卓午有暇更觀書仰繹虞歌意春温勝秋肅所幸有收餘萬民率飽燠徳州行宫即事有感疆吏延諮有餘暇厯觀題壁祇徨徊蹕停徳水縁行慶舟發津門曽溯洄丙申年恭奉登陸聖母自天津水程安行至徳州從容奉豫厯觀前題彌深追憶前度歡娯胥幻矣此番起憶亦徒哉丙申奉豫事猶近何事南廵此獨來降㫖免東省逋賦詩以誌事明知昨歲普豐收豈乏前茲逋賦留雖已經途例蠲免更廑欠欵細諮諏時廵經過東省已蠲本年額賦十分之三茲復加恩將四十二三四等年厯城等二十一州縣灾緩未完地丁銀十三萬四千餘兩臨清等七州縣灾緩未完常平榖二萬六千餘石社榖二千四百餘石麥種三千二百餘石概予豁免俾民力益得寛紓概寛借廪榖和麥並豁窮丁縣與州庶使閭閻元氣復力田耕作兾登秋曲陸店行館曡丙申舊作韻曲陸原平陸始誰顛倒稱館因豫耆艾義屬祝岡陵孰謂一番御丙申春平定金川告功宜闕里地方大吏以此數程較長聖母髙年理安適特於此添置行館惹悲終古増徑庭自熟識榻席此重登觸景引繁緒無言祇拊膺蹟前信已逝事後亦徒懲醇和堂再曡舊作韻平原縣行館内堂名醇和辛卯額堂名今歲全殊前歲情但使民風常似此無煩勗督慰斯誠正月二十三日聖母三週忌辰感成一律弗獲躬親謁㤗陵凡至謁必先㤗東陵祭奠㤗陵故云三週倐至益悲増四迴戊巳前猶述戊戌己亥兩年均二次親詣㤗東陵謁祭與前此正同皇考大事時丁巳戊午二年各兩詣展謁典禮故有一遵丁戊例疎數敢逾吾之句一闕再朞例亦仍丁巳八月督力皇考二週諱忌時李衛河為直𨽻縂陳以禾稼在地且拒馬秋漲異常不能支橋故未得躬謁誠也㤗陵然其後亦曽秋􅂈拒馬河始悟李衛之言不今歲值聖母三以南廵啟蹕應於五月初旬至京方不悞殿試北郊諸典故不獲躬謁㤗東陵撫今追昔情事略同益深感慕西北那堪凝望眼凄凉惟是恨填膺行宫多有奉遊句翹首瞻吟痛不勝賜山東廵撫國㤗向稱去聲旬宣任今除鎮撫權大東資保障萬姓頼安眠李洞送中丞詩六州安撫後萬户解衣眠經理田功悉勤劬蹕路邉橋同梓建節國㤗父文綬現任四川縂督昨適入覲因諭令國㤗星速來京俾其父子相見其善凛氷淵齊河縣行館三曡舊作韻祝阿復此一宵居行館逐程堪駐輿雖曰奉宸心切爾可知圖逸事慚予庭前已閲三番景此間行館搆於乙酉春辛夘丙申及今凡三至此地壁上惟消幾幅書大吏小僚都扈蹕曡宣民隐細咨諸題晏子祠管晏從來傳並美管多實蹟晏虚稱二桃艶説殺三士除暴雖佳機詐増西南風昨每東北風似於行程為順適今朝西南風却於行程為偏逆人情惡逆而好順好今惡昨予情易豈其好惡異乎人縁有心中别籌畫河工今逮放溜時昨阿桂奏引河已挑至六分以上月内完竣即可開放若借西南風勢逼溜直射入引河實為事半功倍惟顒望喜音之至耳東北風阻西南射借勢供波歸引河事半庶幾功倍翕路塗塵􅅽乃其常西南企望喜音獲七依皇祖南廵過濟南韻昔曽一駐濟南城過弗入徒餘恨生戊辰春駐濟南此孝賢皇后扵疾遂至不起因不忍復至其地後蹕途屢經率皆徑過􅜼至近塗祇嫌逺丗年别意未能平夏秋登以三農慶婦子寧還百堂盈何異向臨北闉見華不直峙鵲山横填倉日作此日值填倉郊行厯覧詳幸民無菜色即我飽饑膓數上聲節忘風雅堆塲有盖藏千村逢此象額手為民慶宿長清縣行館行館新成舊辛卯年即有此恰當一宿程那忘憶昔念益切慕棬情有暇惟勤勅安民戒屢更因思弊吏法未易曰長清靈巖寺五疊前韻事用長卿後知誤向以劉長卿靈巖寺西入石路為即此處曽用長卿韻凡四疊丙申春駐此偶檢劉詩題乃􅂈林麓山寺詩中復有湘水語知在楚南所作前此以其亦係西入石路遂致沿訛因作詠事詩辨定之蹟傳元奘昔稱靈原由西入非其路長卿尚自右存是此亭元奘院栢又經三載别丙申東廵曽駐此山泉仍俯一泓渟今宵小駐明朝去無暇呼僧叅色形六題靈巖入景巢鶴巖髙士此山當日開巢居雲有鶴相陪方山本異遼東境丁令知他何事來甘露亭小亭泉上俯石竇甘露為名樂泌洋不渉世間稱瑞事皇山應笑米襄陽卓錫泉卓錫猶傳經佛圖六神通越世間無雖然更有欲咨者四句金剛亦識乎謂全剛經色見聲求四句偈摩頂松西枝東指是誰為僧自歸來松豈知設以此傳元奘異質之元奘定遭嗤鐵袈裟鐵否石乎半信疑伽梨路畔是誰遺朗公設向澄公問一笑還成兩不知白雲洞牝洞偏居絶頂峰蕼然小坐􅂰堪容攀躋早是人艱到漫倩白雲一片封雨花巖維摩室裏文殊問曰致曼陀落雨知有著者還無著者天花未免渉分䟽愛山樓七景錯羅行館外一樓迥據石牆中愛山原括其餘矣却以慿忩静㑹通宿方山我宿方山率有詩此來七字可無之承歡侍笑嗟非昔抹月批風又一時勝處忘憂那䏻忘去聲箇中宜詠信相宜厯年舊作聫新句補闕聊因勉綴詞詣岱廟瞻禮前歲丙申維新奉祝釐何當獨謁值今斯代天出震惟生物行令廵南致叩寅漢栢唐槐都好在佑民福國頼延禧於心更復無他籲所籲屢綏晹雨時體元堂曡丙申韻書堂仍此駐責實愧循名本是承歡處云何成獨行對其景如非咎我祝非誠舊作有還申介夀誠之句觸緒無佳㑹摛詞多戚情便程宿此夕啓駕定於明設論體元義羲經訓已精過㤗山十依皇祖詩韻六十一年君道煥髙如㤗岱孰齊頭仁心仁政恒垂永實行去聲實言務去浮峻極至今存七字鴻庥萬古被諸州不禁即境増鑽仰從實末由意遲去聲留十全今果酬前韻丙申登㤗山有十全有待再吟留之句今果十依皇祖元韻惟彼時作詩之意弗獲如願不堪追憶亦不忍仰瞻耳睨弗視之祗俛頭豈謂祝釐誠未乆旋成永别幻如浮徒因民願廵呉郡便以途遵過嶽州四字賡來各已廿再經不擬重去聲詞留四賢祠行館逐程行館足盤旋傍有樷詞祀四賢恰喜昭蘇方孟月忽驚俯仰異當年稱其孫復石介應聲耳略彼孔道輔胡瑗異趣焉論古由來戒深索欲長善善此思㫋渡汶河再曡壬午舊作韻夾岸萌青有嫩蕪方春醖釀未云都長橋猶是卧波接兩界何曾隔省殊迎蹕民情親且切鳴鞭途景直非紆西流分水各南北濟運真資奕世模於中水行宫作行館成辛卯再題憶丙申斯來乃三度徃事祗増顰飲恨無䏻避承歡何處循顔齋曰致本向所題行宫内齊名致本在思親麥色麥色南來日日深嫩青新緑露珠斟潤因消盡融融玉暖以催成簇簇金奚啻鳴鞭悦乎目真教亞壠惬於心黔黎隨馬相蹂􅏳不忍禁去聲之惜不禁至泉林六曡舊作韻韻賡六曡來七度昔歲今時厯厯明最絶塵區石泉泌無䨇畵境曉春晴砌苔向日暖相送庭樹識人意與迎欲罷不䏻勉摘句東廂瞻望若為情丙申曲阜近瞻禮弗重去聲莅因徑此來原有在川留聖蹟可無一宿寓翹陪山容水態誠佳矣箋擘毫揮却懶哉明曉便當催轡去耽乎勝景漫遲徊賜扈蹕及山東大小諸吏食因得句晦日韶春馬上逢泉林勝處駐鑾重適因到早羣僚召聊以酬勞扈蹕從雖是笙簧有雅奏未如山水足清供翰臣賡韻原常例沈宋寧須較景龍七題泉林行宫八景近聖居行鑾復此駐春朝闕里西瞻路不迢佔畢孰非近聖者得門或寡漫逍遥在川處此處猶傳子在川如斯不舍㡬千年㑹其趣寓㑹其理豈是尋常賞石泉鏡瀾榭不波得照波艱照水榭云何稱鏡瀾程子書明詮此理静中定合動中觀横雲館月漾廊圍三加館北堂咫尺昔棲遲館北為駐宿聖母昔年所那䏻撫景成新賞真是望雲引舊悲九曲彴卧波長彴曲成九夾岸縁楊若相去聲招問景莫嫌屧歩逺越因曲折越神超柳烟坡嫩緑初看拂籟輕春烟一片忽來撗設無此意為揺蕩窣地長條有底情古䕃堂樹古由來䕃亦古銀雲櫛櫛滿庭鋪重經此復引遐想種樹人還識此無紅雨亭茲來復匪放花時亭畔徒看突兀枝恰合明晨清蹕去對紅雨或引嗟咨雨二月朔日徹夜隂晴互相間去聲泉昨夜駐林雨絲雪粒曉來濃晨寒颯颯輕輿度午暖􅓴􅓴沿路逢時宻時疎霑四寸是日行經費縣自寅至未先雪後雨疎宻相間詢之國㤗云入土四寸於麥苖大為有益既優既渥悦三農最髙自合氣凝冷玉積䝉山三兩峰望蒙山四曡舊韻雪而繼雨不同同謂勝前番此度中乙酉望蒙山有將謂其雱昔歲同不期孤望此行中之句以前三度經此皆遇雪乙酉則正望澤也此次則雪從繼雨且入土四寸尤為霑足不特逺勝乙酉并逾前三度矣望澤未深真及節以亨當去聲可是為䝉翠圍野郭均各潤素積遥巒弗動風此實應欣愁則底合龍忽繾􅄩成功昨阿桂等奏引河工程已有八分河水一經蓄髙月内即可開放以為堵合之計今已仲月之朔而喜信尚未至繾望因之益切耳註經臺行館六韻幾宇叢祠野甸隅康成徃蹟試評乎賈生以後殊董子漢儒首稱賈董然賈以治安策董以天人三䇿及春秋繁露未嘗註經也其餘註經家史稱其守文之徒滯固所禀異端紛紜疑而莫正惟康成括嚢大典網羅衆家刪裁繁誣刋改漏失自是學者略知所歸云云是康成在漢儒中最為有功經學以視賈董正復難為優劣也秦火之餘頼漢儒一室操戈多異論出奴入主不同趨網羅喜爾猶精核嚢括刪他有薉蕪學者識歸洙泗路行人欣遇費䝉途何來館舍於傍建不説事成深慙去聲吾萬松山行館駐蹕作北則田盤南則杭一為佛守盤山萬松寺一為嶺西湖萬松嶺此山亦名曰萬松栢多松少名弗稱叶循名責實夙性然更因齊物觀平等細尋童童祗兩株亦覺落落宜新境有招提弗事莊嚴傍為行館樸而整乙酉於斯乃初駐十六春秋過以猛㡬餘小坐慿昔窻一聲定磬發清省晴邇日每作雲郊行覺隂寒徐看緑野潤麥苗抽翠攅今曉雲㪚浄扶桑湧朱丸宜𤾉同農慰利旋知衆歡一念弗已為去聲諸務因民觀傍午頗覺暖遂與易征鞍露冕惬瞻願老㓜隨並肩固知非强為如保心益磾問官里行館詠事郯子當年魯附庸郯子朝魯後人遂以為魯附庸其實不見經史盖如任與顓臾之属耳那䏻近百里提封附庸不䏻五十里今自問官里至郯城幾及百里則郯之提封安得如許之廣且所云問官里亦未必果即此地或後人遷就附㑹未經核實耳廟朝少皥官述悉園去由旬里計重梵經四十里為一由旬何事邉傍行館築更兼㸃綴曲池溶雖云圖省駝裝費上四次南廵經註經臺問官里均御行營茲該撫復於兩處添搆行館雖以駝装省費為辭然因一宿又煩添建兩行館於心䆒未釋然也舍欲為辭媿鮮悰郯子園再曡舊作韻今朝駐魯境明日入呉墟郯子名猶在金天蹟緬餘園因述古彼館以憇春予淳樸為佳矣華紛奚事諸惟民之切耳是我所殷於有暇慿棐几成吟即便書欽定南廵盛典卷十五
