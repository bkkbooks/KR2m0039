body:
  text: 欽定四庫全書欽定南廵盛典卷六十五祀典臣等謹案治神人和上下莫重乎祀典五禮吉居其一八政祀列於三王者所由合隂陽微顯以懋三靈叶賛之治也其在廵守之年則方望之事無所不通虞五年一廵守舜典著之曰柴望秩於山川周十二年一廵守周頌歌之曰懐柔百神及河喬嶽允猶翕河是也他若戴記所言法施於民則祀之以勞定國則祀之能禦大災能捍大患則祀之凡諸應祭法者要皆有舉而莫廢可知矣我皇上至諴感神格於上下宥宻孚顒固有黙通於􅏕薦之先者而尤以勤民為昭事之本於是法天行健稽古省方求瘼圖寜孜孜焉五十餘年如一日用能位天地育萬物時和年豊百福輳至八蜡咸通由是豫順以動六廵於南覲民展義而諏吉啟鑾必在上辛祈榖禮成之後逮屬車至止肇禋肆祀咸秩孔殷若前代帝王若先師先聖以及嶽瀆之祠羣小祀之舉或親詣将事或分命祠官薦潔告嘉儀文燦偹其諸所謂先成民而後致力於神者歟而實則秩祀之禮正以勤民牲帛所呈豊融盻蠁書云至治馨香感於神明又曰山川鬼神以莫不寜方今萬靈受職百榖時熟清宴式昭和甘協應如響荅焉信哉乎享於克誠祭必受福一人有慶兆民賴之矣謹錄祀典第六欽定南廵盛典卷六十五祀典乾隆十六年三月初十日上諭内閣曰朕時廵至杭州禹陵在望緬惟平成之徳萬世永賴皇祖聖祖仁皇帝曾親祀焉爰東渡浙江陟㑹稽式遵皇祖舊典躬薦馨於宇下厥有姒氏子姓世居陵側應世子八品官奉祀該督撫擇其有品行者一人充之以昭崇徳報功至意乾隆十六年三月二十七日上諭内閣曰朕省方問俗廵幸江寜鍾山之麓明太祖陵在焉皇祖聖祖仁皇帝南廵時念其為一代創業之君鑾輿屢詣曠典光昭朕於駐蹕詰朝即命駕前徃躬申奠謁念本朝受命以來百有餘年勝國故陵寝殿依然松楸無恙皆我祖宗盛徳保全之所致也令該督撫飭地方官加意保䕶其附近陵地毋許樵牧徃來致滋踐踏並曉諭各陵户知之乾隆二十二年二月初五日上諭内閣曰原任大學士内大臣髙斌前任河道總督時頗著勞績即如毛城舖所以分洩黄流設立徐州水誌至七尺方開人不用其法遂致黄弱沙淤隠貽河患其於黄河两岸汕刷支河毎嵗冬季必督率㕔汎實力填築近年司工踈忽因有孫家集奪溜之事至三滚壩洪湖盛漲髙斌堅持堵閉是以數年之間下游州縣屢獲豊收其功在生民自不可冺至於癸酉張家馬路及運河二閘之決則又其果於自信抑且年邁志滿之失朕不得不治其罪而要其瑕瑜自不相掩在本朝河臣中即不能如靳輔而較齊蘇勒嵇曽筠朕以為有過之無不及也兹者翠華南幸追溯前勞特沛恩綸用孚公論可與靳輔齊蘇勒嵇曽筠一並祠祀以昭國家念舊酬功之典且亦使後之司河務者知所激勸也該部其遵諭行同日上諭内閣曰昨以内大臣髙斌前在南河懋著勞績特頒恩諭令與靳輔齊蘇勒􅄞曽筠一同祠祀更念有明一代治河之臣最著者惟陳瑄潘季馴二人而季馴之功實優於瑄運道民生至今攸賴今清江之湄瑄有專祠季馴獨不列祀典朕甚憫焉其以潘季與陳瑄並祀有司春秋致祭用昭崇徳報功之典乾隆二十二年二月二十八日上諭内閣曰朕昨至浙江省城禮部未奏請遣祭已故大學士徐本詢其故則以未入賢良祠例不致祭為對徐本歴事两朝宣力多年勤慎懋著即如前者過常州時已故之廵撫潘思榘禮部尚猶奏請徐本視潘思榘為何如耶朕廵幸所經郡縣名臣舊輔皆即致祭乃國家念酬功之典該部自當慎重辦理何得膠柱鼓瑟乃爾徐本着入本省賢良祠並着該部奏請遣官致祭乾隆二十二年三月二十八日上諭内閣曰浙海之神自雍正八年海塘告成時特加褒封勅於海寜縣地方建廟崇祀邇年以來海波不揚塘工鞏固朕省方浙中親臨踏閲見大流直趨中小亹兩岸沙灘自為捍禦濵海諸邑得慶安瀾利及生民實資神明顯佑應於杭州省城之觀潮樓敬建海神之廟以昭朕崇徳答佑至意應行事宜該部其具以聞乾隆三十年二月十一日上諭軍機大臣曰恵濟祠風神廟大王廟行禮看過木龍於恵濟祠龍王廟拈香其闗帝廟令額駙色布騰巴爾珠爾拈香乾隆三十年二月二十二日上諭内閣曰朕清蹕時廵所有經過地方大臣祠墓在三十里以内者例俱遣官致祭原任大學士史貽直之墓雖逺在溧陽念其宣力年乆亦著加恩一體遣祭以示優恤乾隆四十五年三月初一日上諭内閣曰朕鑾輅時廵凡大學士祠墓在三十里内者例俱遣官致祭故尚書錢陳羣向在内庭行走人品學問俱優著加恩𣲖逹椿前徃致祭以示眷念舊臣之意乾隆四十七年三月初一日上諭内閣曰朕前嵗南廵駐蹕金山即敬書金山靈區安瀾恒佑宏仁廣濟至徳尊神牌位供奉神祠及回鑾渡江時雖有風濤而御舟稳渡實賴神佑不可不崇昭秩祀以答靈庥著該部載入祀典嗣後每遇致祭之期著該部封香帛祝文送徃交該督撫親詣金山寺行禮乾隆四十九年閏三月初七日上諭内閣曰禮部奏詣明太祖陵儀注三奠酒每奠行一叩禮前代陵寝於經過時親詣拈香自應較本朝陵寢儀節有别然朕加隆前代禮數從優昨經過曲阜親詣少昊陵孔陵皆行二跪六叩禮嗣後遇親詣前代陵寝拈香俱照此行禮不必奠酒著為令欽定南廵盛典卷六十五
