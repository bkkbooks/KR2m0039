  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_077-1a, image: WYG0658/WYG0658-0804a.png}
body:
  text: 河防恩縣四女寺減水壩係明臣白昻治張秋決河於四女寺涵洞鑿河分洩衛河之水至九龍口入老黄河歸海雍正八年建設石壩寛八丈壩脊髙衛河底一丈一尺乾隆二十七年河臣張師載撫臣阿爾㤗奏展寛壩門三丈大學士劉統勲直𨽻督臣方觀承撫臣阿爾㤗奉命查勘此壩坐當衛河頂冲分水減溜最為得力奏再行展寛一丈落低一尺六寸與下游哨馬營減壩两處分消以減衛漲移駐徳州州判於邊臨鎮專司河捕並責成山東糧道稽查疏築嵗事増修二十八年河臣張師載撫臣崔應階因全漳歸衛以二十餘丈之河受直豫東三省之水又河流迂迴曲折易漲難消奏再展十二丈共寛二十四丈較舊時加倍徳州以北得収減洩之益武城縣境内地勢最窪運河两岸坡水東由沙河滙注西由黄潞河蔡河滙注俱為運堤所隔淹浸民田嵗須開堤放水未有善䇿乾隆二十九年河臣葉存仁撫臣崔應階於東岸牛蹄窩祝官屯西岸馮家灣等三處建洩水石閘各一座運河水大下板以防倒灌深秋水落啟板以消積潦遵守章程相機啟閉黄水至清口與淮水㑹清水力弱不能敵黄每有倒灌之患洪湖既已停淤運道亦即受病矣運河之在黄河以北者取給于汶泇泗諸水在淮以南者取給于淮湖諸水而淮安之山阜塩揚州之髙寳興泰東諸州縣形如釡底謂之下河一遇洪湖異漲清口宣洩不及不得不由五壩分洩以為保固髙堰計而髙寳諸湖既溢下河往往受險司河者每苦不能兼顧我聖朝保愛蒸黎奠平水土每以東南河務為要政發帑頻修我皇上睿智天錫洞矚機宜翠華南幸周厯河堧親授方略著有成效睿謨獨運永為治河金鑑乾隆四十一年挑濬陶荘引河加築攔黄大壩尤為全河闗鍵仰惟皇上成矩在心多方指示煌煌聖訓無非洩淮以刷黄引湖以濟運總蘄上游下河安流循軌四十五年南巡迴蹕奉命将堰盱徐城堤㟁石工一律加髙四十九年聖駕六幸江浙復諭将子堰尾土普律培厚他如攔黄順黄二壩填平塘土臨河集天然閘等處開挑引河以及添築土壩加帮縷堤凡所以籌河務而衛萬民者無不至詳且備慶徳水之安瀾頌金堤之鞏固考之史冊夐乎莫與京矣乾隆三十九年河臣姚立徳以㣲湖來源缺乏近處無可挹注奏于江南徐屬之潘家屯開挖引河引黄助湖奉諭令兩江總督髙晉迅速妥辦以引黄助湖是亦有益無損之一道且潘家屯原定徐城水誌消至六尺始行開放俾過水二尺入湖俟徐城誌樁長至七尺以上即行堵閉非若毛城舖于大汛水漲時開放分洩異漲可比擬照毛城舖作法建立碎石滚壩兩牆砌石外築束水堤並鉗口草壩以為重門闗鍵原為慎重啟閉一經水漲則将引渠層層堵築不致有吸溜之虞辦理工竣後将引河頭開放進水由倒勾而入過壩下注導引入湖頗資接濟並奏嗣後如遇㣲湖需水接濟于霜降之後桃汛以前一面奏聞一面知㑹江南河臣並委員來江㑹同豊碭㕔營查明徐州水誌若在八尺以下冄為開放以昭慎重徐州南㟁逼近城垣北㟁民居稠宻河行至此一束愈加湍悍堤工在在受險乾隆四十四年奉諭将該堤卑矮處所加砌石塊次年聖駕南廵特遣大學士嵇璜兩江總督薩載查勘確估将韓家山起至石工頭止補砌石工長四百五十丈工頭二十丈計石十二層其餘砌髙十七層又自奶奶廟起至四大王廟止加髙石工長六百五十四丈加砌石三四層不等又東門外闗帝廟起至拐角樓舊石工止長二百四十一丈加砌石二三層不等梓潼閣至石磯嘴止舊石工長六十一丈二尺加砌石二三層不等梓潼閣起石工外又砌碎石工長五十九丈五尺東門外至石磯嘴止上加築子堰長三百零二丈從此城郭民居均資擁䕶利賴無窮唐家灣倒勾引河減洩黄河盛漲之水由毛城舖石壩下注每年伏秋大汛以徐城水誌長至一丈一尺五寸開放下㳺洪河濉河兩㟁並下江之蕭縣上江之宿州靈璧虹縣往往受險乾隆四十二年河臣髙晉以該處水大之由皆縁唐家灣引河在徐城上㳺相距有二百餘里待徐城水誌長至一丈一尺五寸上㳺水已逾誌冄為輾轉知㑹刨挖又需工夫迨至開止一丈一尺五寸是以開放之後流行不及以致下㳺難以容納查上㳺河勢寛闊下㳺徐城兩岸窄狭遡考厯年水勢如上㳺唐家灣長至九尺下㳺徐城誌樁水長至一丈以外經酌定以唐家灣水誌長至九尺五寸時即令開放循軌安流下注洪濉二河並未出槽兩岸堰工均甚稳固即定為章程以垂久逺嗣後水誌以唐家灣為凖一俟長至九尺五寸即将倒勾引河開放循序下注下㳺可免漫溢之虞矣黄河當盛漲時分洩之路固欲其多尤欲其近多則洩之廣近更洩之速徐州河面寛止八十餘丈形勢最窄黄河至此一束伏秋大汛水平堤岸雖上有毛城舖蘇家山下有峰山閘等處分洩而距徐稍逺縂未得隨長隨消之力徐州迤上南岸舊有天然閘減洩黄漲近而且速水由五湖入洪澤湖出清口歸海縁閘下引河年久淤墊一經開啟去路不暢經過之蕭縣宿州靈璧等州縣民田易於淹浸故未敢輕議啟放乾隆四十九年河臣相度機宜奏允將天然閘下引河一律挑濬深通以偹盛漲之年開放分洩水由引河而下各州縣民田既無虞淹浸而黄河多此分洩去路不但徐州可期永保奠安即通工亦得免危險之慮矣黄河至睢寜縣南岸有峰山龍虎山北岸有鯉魚山河行中央两岸夹束恐致驟漲為患康熈二十三年河臣靳輔因山鑿建石閘四座以減洩黄水由焦管營入孟山等湖逹於洪澤乾隆三年循四閘故蹟量加修整上游毛城舖等處節宣有制水非異漲不致旁洩所以黄河日漸深通暢流下注河深則閘髙現在二閘三閘俱仰於河面其頭四两閘雖地勢稍下然亦過水無多十一年以該閘洩水無多不遇盛漲之年無庸啟放河道民田两資禆益宿遷縣運河之十字河竹絡壩係康熈二十八年挑浚中河告成堵閉支河口之後因駱馬湖水直刷黄河北岸堤工經河臣王新命請建竹絡石壩一道以偹湖黄溢漲三十五年河臣董安國因黄水盛漲將壩衝卸題請堵築未竣三十九年經河臣張鵬翮復請堵築以禦黄河因旋閉旋衝亦未竣事四十二年聖祖仁皇帝南巡指示竹絡壩口門宜留口門北通湖南通黄運河横亘其間形如十字故名十字河迨雍正初年黄河形勢變遷大溜北徙刷去外灘直逼竹絡壩口門灌入十字河淤墊駱馬湖河臣齊蘇勒於竹絡壩口門外建築箝口壩并汰黄壩以挑黄溜將十字河北口堵閉另於迤上之王家溝地方建造五孔石閘以便宣洩湖水俾黄河不致有灌湖之患惟黄河由竹絡壩入運勢漸湍激妨於運道河臣髙斌於乾隆六年議奏現在情形黄水入運勢盛則衝囓堤岸溜緩則淤墊運河而下游之鹽河亦受其患且黄河勢漸北徙與運河僅隔一灘應將竹絡壩堵閉使黄水歸黄得以併力刷沙而運河又可專受上源之清水實有禆益惟是黄水常患其盛清水常患其弱又不得不􅁠宜啟閉於一時以為補救之計若遇各省重運經臨適值清水過弱則暫啟此壩引黄以助清濟運若遇黄水過盛宿遷以下工程險要亦暫啟此壩以洩黄漲更遇清強黄弱之時又得藉以洩清以固下游中河一帶工程閉於常以守其經啟於暫以行其􅁠得以相濟為用庶於聖祖仁皇帝口門宜留之諭㫖相符至於蓄洩啟閉之宜惟在臨時相機辦理徐城北岸蘇家山舊有明季所建石閘乾隆二十四年河臣白鍾山改建石滚壩一道長五百二十丈如遇黄水異漲由滚壩入水線引河分洩嗣因外灘淤髙不能過水三十八年豫東二省河水陡長下游水勢驟湧各㕔工程受險毛城舖滚壩雖經開放而大河盛水未減經两江縂督髙晋展寛至十二丈以洩上游來水其分洩之路則由荆山橋及潘家河靳家口彭家口等河入運宿遷縣迤東黄河北堤舊有朱家閘河臣靳輔挑浚運河縁與黄河逼近遂廢其閘而不用至今仍循其名乾隆五年秋汛異漲黄河坐灣頂衝直刷堤根隨水塌卸堤外運河相隔咫尺河臣下埽帮堤上𦂳搶䕶仰頼皇上洪庥保䕶無虞當即奏鑲做埽工二百一十丈又經加築越堤格堤重重保障迨後水勢下徙工叚漸生於十一年秋汛河臣顧琮引水放淤地勢淤髙十二年河臣周學健於兜灣處疏挑引河長二百七十丈河頭下唇築壩逼溜以趨引河順性下注正河現在引河溜勢通行即值冬令水緩之時並不停淤大溜全歸引河朱家閘隄埽工程既資稳固而對岸陳家道口並迤下五堡舊有埽工之下游俱可漸次淤閉化險為平黄河自豫省虞城縣入江南境奔騰千里至清口㑹淮以逹於海桃源地方居徐邳之下游在清口之上首水勢盈聚險工較多北岸九里崗工程又為桃源之首工掃灣頂衝切近中河運道尤為險要之地厯經題建埽工以資抵禦康熈四十二年聖祖仁皇帝南巡指示方畧於大王廟東上水頭建挑水埽壩又於四十四年親臨指示舊龍門處建埽壩二叚以挑溜勢保䕶安全現在埽工長七百餘丈嵗加鑲修以禦三汛江南地窄民稠两岸縷隄相去甚近與水争尺寸之地黄河數里一曲埽灣頂衝恐刷坍堤岸淹浸地方勢不容已而下埽以資捍禦一有埽工則塌卸者自應鑲補蟄䧟者自應加修又勢不容已而有嵗搶二修之工程黄河一灣生一險工南省黄河容易掃灣所以埽工亦多九里崗為黄河最險之工自䝉聖祖仁皇帝两次臨工指示建築埽壩河臣遵守修防克臻平稳矣聖人所過者化所存者神隨在皆然而翠華臨幸之處指示均闗機要宿遷縣皂河之夏家馬路内運外黄两堤相隔僅三十餘丈中間空塘積水甚深素稱危險節年放淤尚未坦平乾隆四十五年恭逢聖駕南巡勅令一律填實與堤面相平埽後得此數十丈寛堤有恃無恐洵屬王道蕩平矣洪澤湖西岸祥符五瑞二閘康熈三十九年河臣張鵬翮題建原由白洋河涵洞分洩洪澤湖水入黄如湖水㣲弱亦可洩黄助清乾隆四十年河臣呉嗣爵以湖水缺乏籌洩黄水改由陳工東首河形宣洩自閘南束水堤至河形築堰長一千一百四十五丈閘北臨黄外灘挑倒勾岔河長四十七丈閘東開挑引河長三百八十五丈两閘上各做鉗口壩並雁翅防風南挑河長八百一十五丈北築子堰以䕶縷堤四十四十一二等年黄水異漲俱行啟放桃源黄河向趨北岸之九里崗本係險工自乾隆三十六年南岸陳家道口漫溢之後溜往南趨九里崗埽工淤閉河勢即由臨河集下注該處素稱崗淺砂礓性甚堅凝横亘千餘丈溜勢不能冲刷水行至此為之梗阻四十六年大學士公阿桂㑹同河臣相度情形復按土性在於北岸坐灣處奏請取直開挑引河一道長一千數百丈深以二丈為度奉㫖宜速為之是年夏照估挑竣大汛水長相機啟放因勢利導河身已刷滌寛深嗣因曲家樓決口大河水涸又於臨河集上下接挑河長數千丈從此梗阻之患盡除實全河扼要之闗鍵也欽定南巡盛典卷五十二
