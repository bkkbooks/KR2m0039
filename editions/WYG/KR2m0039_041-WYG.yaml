body:
  text: 欽定四庫全書欽定南巡盛典卷二十九恩綸乾隆四十三年十月初三日上諭内閣曰大學士管兩江總督髙晉閩浙總督楊景素等合詞陳奏以江浙臣民望幸甚殷且河工海塘皆兾親臨指示懇請於庚子春冄舉南巡盛典以愜輿情一摺朕於乙酉南巡回鑾時因耆孺攀戀情殷曾許以翠華再莅然敬念聖母皇太后春秋已髙難以冄奉安輿長途逺涉遂諭江浙大吏不必更以南巡為請而江鄉士庶愛戴依戀之情狀未嘗不往来于懐距今十有四年其顒望悃忱自益諄切且自前巡閱定五壩水誌以為展拓清口之凖下河從此遂免水災嗣聞黄河倒漾所繫甚重因酌定挑浚陶荘引河面諭薩載籌辦河成而清黄交㑹處移逺清口不復有倒灌之患但下㳺尚有停淤亦不可不除其流弊而一切善後事宜若非臨莅閱視究不能悉其實在情形至浙省海塘近来潮勢漸趨北岸深為厪念亦不可不親為相度機宜今髙晉等既有此奏着照所請於乾隆四十五年正月諏吉啟鑾巡幸江浙便道親閲河工海塘所有各處行宮座落俱就舊有規模略加葺治毋得踵事增華致滋煩費至該督等以庚子年適逢朕七旬萬夀欲就近舉行慶典則斷不可朕本意以庚子年為朕七旬慶辰越嵗辛丑即恭逢聖母九旬萬夀斯則敷天同慶自當臚歡祝嘏以抒萬姓悃忱今既不能遂朕初願尚復何心為已稱慶况朕蹕途所經老幼歡迎扶擕恐後未嘗不顧而樂之若經棚戱臺侈陳燈綵㸃綴紛華飾為衢歌巷舞深所不取且非所以深體朕意也不特江浙臣民不當為祝釐之舉即凡内外大小臣工於朕七旬萬夀時亦均不得請行慶典以及進貢獻詩若伊等謂欲藉以申其尊敬之誠是轉増朕心之不悦尚得謂之忠愛乎但天下士民遇朕七旬萬夀皆不免望恩倖澤此則情理之常朕亦何肯因不舉行慶典並靳恩施乎着於己亥年八月舉行恩科鄉試庚子年三月舉行恩科㑹試以彰夀考作人之盛至各省漕糧於乾隆三十一年普免一次兹蒙昊天眷佑累洽重熈朕敬體天心愛養億兆用是再霈恩膏着於庚子年為始復行普免天下漕糧一次俾藏富於民共享盈寧之福所謂歛福錫民慶莫大焉其開科事宜着交禮部查例辦理其各省漕糧應如何分年輪免之處着交户部詳悉妥議具奏將此通諭中外知之乾隆四十三年十月二十日上命軍機大臣傳諭兩江總督髙晉曰昨已降㫖允江浙督撫等所請於乾隆四十五年正月啟鑾南巡並諭令沿途毋得踵事増華致滋糜費矣至蹕路所經水營行宫等事皆不能不需用度前四次南巡俱曾賞給銀兩以資籌辦而督撫至道府等大員亦有稱自捐亷俸者今春髙晉在京亦曾奏及照上數届之例於伊等養亷内公捐備用今髙晉楊魁俱有應繳之項勢不能再捐養亷若止令司道等員公捐更屬不成事體朕南巡省方觀民期使萬姓共臻安阜豈肯令不肖官吏藉端科派方今府庫充盈因巡幸而頒發帑金一切皆由公辦最為盛事朕亦無所靳惜着傳諭髙晉即将上四次南巡毎次賞銀若干並查明現辦南巡差務需用銀兩若干通盤核計據實具奏候朕降㫖撥給毋得絲毫派累閭閻髙晉於髙樸差家人李福到蘇私賣玉石一事既未盤詰查叅轉給以䕶牌其罪甚大朕不将伊革職治罪已屬格外施恩當如何感激圖報若於辦理南巡一事再不據實確核具奏並不能妥協辦理致有派累則是該督自取重戾不能更為曲貸矣乾隆四十三年十一月初三日上諭内閣曰前經降㫖允江浙所請於乾隆四十五年正月啟鑾南巡並諭令沿途毋得踵事增華致滋糜費苐念蹕路所經江蘇地面較多水營行官等事皆不能不需用度前四次南巡俱曾賞給庫銀以資籌辦因諭令髙晉将現辦南巡差務需用銀兩若干通盤核計據實具奏兹據髙晉将上四次南巡報銷銀數及恩賞銀兩開单呈覽並稱此次差務除添建行官三處餘俱撙節辦理較之上届所費有减無增等語該省辦理差務所用經費既有一定章程上届乙酉年曾經恩賞運庫銀三十萬兩以資籌辦此次著照乙酉年之例於運庫恩賞銀三十萬兩為辦理南巡差務之用即著伊齡阿照數撥給仍具摺奏聞該督撫務須董率所屬妥協經理毋得絲毫科派閭閻致滋擾累副朕觀民孚恵至意該部即遵諭行乾隆四十三年十二月初一日上諭内閣曰前經降㫖允江浙所請於乾隆四十五年正月啟鑾南巡因江蘇辦理差務不無經費已有㫖令伊齡阿於運庫内賞給銀三十萬兩以為南巡差務之用矣苐念浙江水營行宫等事雖少於江蘇地面然一切差務亦資費用自宜一體加恩著於鹽項餘銀内賞給十萬兩以為浙省辦差之用該督撫務須董率所屬妥協經理毋得絲毫派累民間致滋紛擾以副朕孚恵於民至意該部即遵諭行乾隆四十四年二月二十六日上命軍機大臣傳諭河南巡撫陳輝祖等曰薩載奏南巡隨從官兵執事人等應需馬匹俱於綠旗標營及江寧京口駐防馬内撥應查江寧京口額馬祇四千匹不敷添換上届經督臣尹繼善奏准在豫省旗營馬内酌撥来江協濟照江省買馬價值觧還豫省在案明嵗應備馬匹請仍照依上届撥協等語著傳諭陳輝祖即照上届之例在豫省旗營馬内酌撥六百匹於本年十月内撥送江省交界地方薩載慎派妥員前往接收交代善為餵養以為来年南巡協濟之用仍於差竣後照該省馬價還豫以便買補歸額該督撫等務宜妥為經理毋致從中滋弊將此傳諭陳輝祖并諭薩載嵩椿知之乾隆四十四年八月十八日上諭内閣曰前因江浙督撫等以兩省臣民望幸奏請巡閱河工海塘已降㫖允於庚子春正月諏吉南巡至所稱明嵗為朕七旬萬夀欲就近申祝則斷乎不可業經宣諭飭禁盖朕本意原以庚子為朕七旬誕辰辛丑即為母九旬萬夀連嵗叠逢大慶中外臚歡自可聽其抒誠祝今既不能遂朕初願朕復何心為已稱慶惟念士民想望恩澤積有嵗年因詔開鄉㑹恩科並輪免各省漕糧一週以洽羣悃明年南巡囬鑾後俟郊禮成即起程幸避暑山荘駐蹕八月慶辰一切仍照常年例行若在京受賀惟恐轉多棖觸遂至山荘以避之至於西藏班禪額爾徳尼預請覲祝實屬吉祥盛事是以允其前来即令於山荘瞻謁俾從其便朕並非因其稱祝先期往就之也恐内外臣工尚未能深喻朕意仍有以慶典為請者非唯不能博朕之恱適以增朕之懐又豈臣子愛敬之道乎俟朕八旬大慶則當聽從諸臣稱祝此次必不允行又前届朕六旬萬壽時自古北口熱河兩處曽有㸃綴段落燈綵之類本屬朕所不取明年尤當嚴禁將此再行通諭知之乾隆四十四年八月二十二日上命軍機大臣傳諭總河總漕等曰昨因滇省戊戌兩運京銅限於五月以前全數抵通計入閘河以内正當漕艘重運之時諭令總漕總河預定章程使銅船與糧船分起相間過閘毋致守候稽時矣因思明嵗春間朕南巡江浙自直𨽻厰登舟以及囬鑾俱由水程恐總河總漕以及沿途各督撫狃於舊例預将河道肅清令船隻預於支河汊港迴避以待御舟經過始准放行殊可不必朕巡幸所至原以省方問俗一切均須有便於民不但銅船限𦂳糧艘亦不宜遲斷不可令其迴避守候致稽程限即估舶民船亦不必令其逺避凡御舫所經舟楫往来聽從其便但須於經過時令各船貼岸一邉順排停泊過後即可放行總不可因南巡蹕除河道無論閘内閘外均若無其事者然方為妥善著傳諭總河總漕及沿途各督撫深體朕意妥為辦理乾隆四十四年十月初一日上諭内閣曰朕明春巡幸江浙所有供宿頓次皆出自帑項絲毫不以累民苐扈從官兵以及外省接駕人等輻輳雲集經過地方米糧價值恐一時或致騰踊着照從前之例於江浙二省冬兑漕糟内各截留十萬石在水陸駐蹕地方分厰平糶即令漕運總督及各該督撫妥協辦理該部即遵諭行同日上諭内閣曰朕明春巡幸江浙於正月十二日啟鑾所有一切事宜著各該衙門照例預偹乾隆四十四年十月二十一日上命軍機大臣傳諭山東各省将軍等曰朕来年臨幸江浙正月十二日即行啟鑾朕所經由之山東江南浙江各省将軍副都統城守尉等内未免有今嵗年班應来陛見者着将此傳諭經由諸處之将軍副都統城守尉等其内若有今嵗年班應来陛見者今嵗著俱不必前来俟来嵗年底再来乾隆四十四年十一月十八日上命軍機大臣傳諭兩江總督薩載等曰明春南巡江浙該督撫等自皆念切迎鑾越竟逺出但各省俱有應辦事宜逺迎轉恐貽悮亦不必以此為敬且入疆在即自可毎日扈行常承指誨更不在早見數日薩載楊魁閔鶚元止須於離江南境一站之山東地方接駕三寳王亶望止須於蘇州接駕均毋庸逺迎将此各傳諭知之乾隆四十五年二月初五日上命軍機大臣傳諭兩江總督薩載等曰各處行宫名勝於駕未到之前不許地方官及各工員長随與内廷太監説話凡有陳設應俟派出查㸃之員到後查交次日仍令伊等㸃還如平山堂等處商辦工程陳設亦不許商人與内廷太監説話亦俟派出之員到後查㸃從前太監張鳯認識商人皆由於此應以為鑒同日上命軍機大臣傳諭兩淮塩政伊齡阿等曰朕清蹕時巡省方問俗供頓盡由公帑昨伊齡阿奏兩淮商人請捐銀一百萬兩以効悃忱在辦差經費原無需此等捐輸苐衆商情詞肫懇且昨已蠲免伊等應完銀一百二十萬兩又緩徴銀二十萬餘兩其踴躍樂輸之悃自必倍殷却之轉阻其誠意此項銀兩即留為此次各省辦公之用著交伊齡阿於此項銀内給還直𨽻公捐飬亷銀五萬兩山東公捐養亷銀十三萬八千五百餘兩江南公捐養亷銀十二萬三千七百餘兩又前賞江南辦差銀三十萬兩亦著於此項内歸還原欵又直𨽻正定隆興寺廟工告竣明春朕當親蒞䦕光又山西五臺自乾隆二十六年巡幸後迄今已閱二十年亦應於明春前往拈香其直𨽻山西境内蹕路所經有應行修葺舊有行官四處此外總用行營斷不許再行添建並著於此項捐銀賞給直𨽻銀三萬兩山西銀五萬兩以資修葺之費毋庸再行捐㢘辦理其餘銀三十萬餘兩仍即交存兩淮運庫以備将来辦公之用乾隆四十五年二月十四日上諭内閣曰朕鑾輅時巡乗春行慶而清理庶獄矜恤尤深用沛徳音式敷愷澤所有江蘇安徽浙江三省恩詔後軍流以下人犯俱著加恩各予减等發落用昭肆眚施恩至意乾隆四十五年三月初八日上諭内閣曰朕清蹕時巡臨莅江浙原因厪念河工海塘親臨閱視兼以省方問俗順時行慶非為遊觀計也前屡經降㫖所有經過地方止須掃除蹕路一切供頓毋庸踵事増華今浙省仍有添建屋宇㸃綴燈綵之事兼多華縟未免徒滋繁費朕心實所不取三寳王亶望均著傳㫖申飭嗣後如再有似此過費者朕必加以嚴譴不能寛貸也乾隆四十五年三月十四日上諭内閣曰朕自三十年南巡以後迄今十有五年東南士俗民風易趨華靡每朂督撫大吏諄諄化導務期返樸還淳以臻郅治而江南之陶庄清口浙江之海寧塘工其修舉尤闗民瘼因允兩省督撫籲請於今春再舉時巡之典乃自啟蹕以来所過在直隷江南一切行宫供頓不過就舊有規模畧加修葺辦理尚為妥協而從事浮華山東已䦕其端至浙江為尤甚朕心深所不取現在陶庄及海塘各工經朕親臨指示所有應行修理工程特命頒發帑金交該督撫等悉心妥辦将来工程完竣後朕自當再來親蒞閲視恐後任督撫見此次所辦差務已多粉飾未免踵事増華從而加甚勢将伊於何底朕臨御四十五年無日不厪念民依乃省方問俗而督撫大吏不能善體朕心朕亦将引以為愧著再通諭各督撫以後務宜黜奢崇儉於地方諸大政實心經理毋得徒事繁華致滋浮費以稱朕恵愛東南黎庶之至意乾隆四十五年三月十九日上命軍機大臣傳諭安徽巡撫閔鶚元曰安徽巡撫閔鶚元前於入江南境時接駕召見已面奉訓諭令其囬任辦事今聞其復欲前来江寧安省路途較逺往返需時况豫省黄河甫經合龍該處為黄水下㳺一切堤堰宣洩並涸出地畆催耕補種無令失時應行籌辦之事正多閔鶚元若復出境逺迎轉於公務無益即傳諭於何處接此㫖即速行回任乾隆四十五年三月二十一日上諭内閣曰前以庚子年為朕七旬萬夀恐内外臣工欲申祝嘏屢經宣諭飭禁此次南巡回鑾後一俟北郊禮成即起程幸避暑山荘各督撫等皆不必前来稱祝更恐外省督撫不能仰體朕懐聞因七旬萬夀有取九九之義購備貢器誇多鬬靡甚至力有不逮而隨衆效尤勉為充數尤屬不必各省督撫身任封疆惟當大法小亷奉公勤職副朕委任本不當以進奉見長著再傳諭各督撫今年八月慶辰一切仍照常例若借七旬萬夀為名多事繁文以申媚兹之悃不但為朕所不取且現經降㫖令奏事處届期遇有多進貢物者一概不准接收諸臣其善體朕意毋得藉詞請覲致増繁費轉滋擾凟将此通諭各督撫知之乾隆四十五年四月二十四日上諭内閣曰朕此次巡幸江浙蹕途經過直𨽻山東地方其長蘆商人業經加恩緩徴課項所有山東商人並著加恩将乾隆四十五年應徴引票鹽課銀十八萬餘兩自本年奏銷後起限分作六年帶徴以示優恤該部即遵諭行乾隆四十五年十一月二十五日上諭内閣曰本年南巡接駕廢員經吏兵二部查明情節較輕者帶領引見除加恩錄用外其賞給職銜者業經朕親加甄别不得再准捐復至慶祝萬壽賞給職銜各員及此外緣事降革人員内如有在部呈請捐復者該部核明情節無論應准應駁俱著具奏請㫖准捐人員並著該部帶領引見候朕欽定欽定南巡盛典卷二十九
