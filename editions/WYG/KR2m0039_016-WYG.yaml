body:
  text: 詩入浙江境一水原無異兩疆頓爾分行春三月近迎駕萬民紛瞻就寧須禁頌揚非所欣不謀共尊戴保赤益心勤過嘉興府城御舟别路溯漕河登陸春城按轡過吴帝經營非舊郭周書假藉得嘉禾户聞絃誦漸摩善野富蠶桑衣被多博施愧予焉濟衆民情到處總逢和再題煙雨樓未年丑嵗雨經行煙雨都逢副盛名却訝今番出新様自過江後總開晴栁􅁝窣地折腰舞梅朶烘春笑口迎更上髙樓聊極目水村近逺望分明過嘉興再和錢陳羣田園雜興十首接踵迎鑾多頌聲觀民惟愧政無成境臨秀水聊心喜為晤林居有老生祝釐昨嵗驛程催九老圖形霽月開便令還鄉頤暮齒宣傳不許逺迎來稜稜孤鶴瘦如柴圓嶠方壺任徃來鶴其性人夀其似㑹看刼火有寒灰遊山屐總不辭勞遇勝吟詩白髮搔花瀨濛濛春澹澹微醺何致暈如桃春田未致手親畦俸養何妨刺齒肥常把一篇𢎞景傳殊途要欲有同歸三月違如三嵗遲詩裁前席辨精㣲雖然賜枝何須枝見説香山步似飛時命九老就香山遊讌以副嘉㑹先期並有賜杖薄試春寒冬更寒吾民寧乏有衣單定當愷切陳民隠莫飾其辭蘄意寛結屋江鄉不費錢雙槐門巷䕃多年樸淳生計耕還織淡蕩心情水與天樓臺煙雨望中低早見書屏健筆飛烟雨樓有陳羣書趙孟頫耕織圖詩屏新署頭銜榮晩節定知家慶子孫圍鄉味休耽韭與菘行時韶令正芳醲為吾數日隨清蹕可負湖山佳景供賜閩浙總督楊廷璋西粤昔開府南閩今建牙兼知亦舊制閩浙總督駐衙於閩兼知浙省舊制也勝任得卿嘉政有羣黎感身無大耋嗟廷璋七十三嵗精神尚健老成方倚賴調攝意須加賜浙江巡撫荘有恭己未親為䇿士文精掄蕊榜得超羣起行不負坐言學率屬偏能先已勤鶴市舊聲猶眷眷龍山新政更慇慇海塘正是投艱處磐石維安勉奏勲過石門縣䇿馬石門縣觀民度石城閭閻際時泰埤堄倚春晴寸土桑麻地萬家絃誦聲何加曰惟然匪尚詞英三月朔日至杭州駐驆武林駐節暮春初物色人情繢綺舒前度煙容常翳若今來霽景喜昌如捍塘久計籌行館迎駕歡聲接比閭覩此尊親彌共切安能保赤刻㤀予恭依皇祖巡幸杭州詩三疊韻三度南巡侍大安江山介祉奉徽觀風輕日麗臨雄郡踵接肩摩迓御鑾蹕館暫居㡬有勅海潮言念志難寛乾隆二十四年海塘自中亹漸移北大亹飭大吏繕治尖山等處塘工令當親臨閲視修防要欲籌全善那覺西湖景助歡瑞石洞駐輦有餘暇吴山近宜眺瑞石别一峯下馬喜先到初猶步仄磴既乃入幽竅轉折若無路含蓄益致妙蘿薜緑垂煙梅栁芳迎曜巖半有天池靈物不可釣宻竹䕶隂森怪石攢舊峭孤騫訝欲墜傲睨忽疑笑攀躋當造頂全呉歸朗照坐石冩剏得大觀更攬要飛來石來自何方飛豈羽将翔復騫勢容與徒觀翩集誠怪神欲賦却思子不語三依皇祖吴山詩韻南晀長江西盼湖城中陟巘歴香衢寧因玩景賡前韻曰在觀民有本圖登呉山作歌一峯蜿蜒走郡城衆峭攢簇羅天屏若有若無尋樹升造極廣厦原平陵何須勒馬誇豪情惟願兆庶恒安寧西湖下視如亟待吾方未暇将觀海觀海塘誌事示總督楊廷璋巡撫荘有恭明發出慶春駕言指海寧海寧往何為要欲觀塘形浙海沙無常南北屢變更北坍危海寧南坍危紹興惟趨中小亹北南兩獲平然若中亹窄其勢難必恒紹興故有山為害猶差輕海寧陸且低所恃塘為屏先是常趋南漲沙率可耕兩度曽未臨額手謝神靈辰忽轉北海近石塘行接石為柴塘易石自久經費帑所弗惜無非為民生或云下活沙石堤艱致擎或云量移内接築庶可能切忌道旁論不如目擊憑活沙話信然尺寸不可争塘邊試下木樁始苦沙澁用二百餘斤之硪一築率不及寸許待樁下既深又苦沙散不能齧木樁搖揺無著也移内似可為閭閻櫛比并柴塘向内數十丈其土似宜樁可以即工然所在皆田廬此處為塘必致毁棄田患廬患未至而先殃民心復有所不其無室廬處又復多池阮固云舉大事弗顧小害應然以衛民心忍先使民驚且如内石建寧聴外柴傾是將雨堤間生靈蠲滄滄瀛如仍䕶外當去聲奚必勞内營以此吾意决致力柴塘成坦水簍石置可固隄根撑柴艱酌加價母俾司農程命行在户部及該督撫詳議加柴價補苴示大端推行宜殫誠竭海神廟瞻禮有作鹽官駐馬先䖍謁廟貌枚枚皇考修捍患禦災宜祀典恬風静浪賴神庥即今南漲方坍北尚此春逢况值秋黍稷非馨在明徳是吾所愧敢忘愁駐陳氏安瀾園即事雜詠六首名園陳氏業題額曰安瀾至止縁觀海居停暫解鞍金隄築籌固沙渚漲希寛總厪萬民戚非尋一己歡兩世鳯池邊髙樓睿藻懸樓中恭懇父原皇考林泉耆碩陳䢴直之大學士陳元龍御書是編修予告時賜額也渥恩賚耆碩適性愜林泉是日亭臺景春風角徴絃觀瀾遂返駕供帳漫求妍隅園舊有名以是園為閲塘暫憩之所因賜今額隅園其舊名也巖壑窈而清城市山林趣春遊花鳥情溪堂擅東海古樹識前明世守猶陳氏休因擬奉誠别業百年古喬松徑路尋梅香聞不厭竹静望偏深瑞鶴舞清影時禽歌好音最佳泉石處撫帖玩懸針元臣娯老地内翰肯堂年賭墅棋聲罷木天磚影捐竹堂致瀟灑月閣挹清娟竹堂月閣皆園内名勝信宿當迴蹕池邊坐少延天朗恵風柔臨溪禊可修是日上已趣真如谷口姓不讓岡頭意以延清永步因覔韻留安瀾祝同郡寧為暢巡遊睡醒睡醒恰三更喧聞萬馬聲潮來勢如此海晏念徒縈徴禹乏良䇿傷文多愧情明當陟尖嶠廣益竭吾誠題土備塘土備塘云海望修意存未雨早綢繆石柴誠賴斯重障是謂忘唇守齒謀塘上四首西塘尚有沙塗䕶既至東塘沙總無石不能為柴欲朽防秋要計可徐圖鹽官從不曉迎鑾古樸民風致可觀却勝杭嘉多飾禮綵棚鼓樂滿河干葦廬竈户日煎鹽辛苦蠅頭覔潤霑嘘􅦈胼胝耐燥濕厚資原是富商兼隄栁青青畦葉黄村梅遮隝逺聞香徐行咨度周防計懶惰無心問景光登尖山觀海輿圖早已識尖山地設天開障海闗東北岡巒捍猶易西南柴石禦為艱䖍心所祝資坍漲蒿目無方計剔鬟大吏載咨補偏策盡吾誠耳敢云閑視塔山誌事尖山寶捍海搭山舒右翼翟村當兜灣賴此雄潮逼條石未可築塊石先救急其下布石簍射溜圖根立䇿馬視簍痕云沙漲數尺浙撫臣言竹簍貯石下䕶壩基數日來沙漲掩簍四尺許遂命立標以騐増漲尺寸是為轉旋機其然談何易叶詎當恃天佑而弗盡予責叮嚀示方伯吾意知應悉斯時工難施沙逺當易石魚鱗一例接方為經久䇿閲海塘疊舊作韻今日海塘殊昔塘丁丑南巡時海塘大溜尚走中亹己夘以來潮勢復趋北亹現飭大吏相度修繕以為民衛補偏而已䇿無良北坍南漲嗟燒莫水占田區竟變桑父老常談寧可誘土人以三亹海潮之行不南即北此因任之論與河徙天數語同非治水者所宜出也明神顯佑詎孤慶雍正七年海寧飾祠勅建昭海神廟近復命錢塘崇宇以靈眖尖山跋馬非探勝萬井安全慮不遑觀海潮作歌辛未觀潮潮已竒杭人猶稱其力微丁丑觀潮潮未至作歌髙樓聊紀事似神而非者曰三逮兹三度潮真酣却非江樓觀約畧剏得乃在柴塘尖我閲柴塘籌禦海詎圖快覽驚濤駭因縁大汛三月三洪瀾有若将予待跋馬指東向鹽官一條銀線天際看捲江倒海須㬰至迎來底藉江山船江山船迎潮見前詩色猶未覩先聞聲礌硠磅􅔫輷匉訇徐行按轡攬其状大哉觀矣誰與京􅇧母弭節倐奔㵼並驅素車而白馬淋淋汨汨浩湯湯踰跇配藜白鷺下一空前此初遇竒既欣旋復生愁思長茭厚石弗豫固秋来轉瞬奚當之迴蹕杭州詣皇太后行宫問安即事有作迴鑾百里日方中自杭至海寧程百里然實止八十里而已清曉䇿馬隄上時亦乘輿日中即至省城迎送黙黎擁六驄燈市鹽橋臨古郡問安視膳謁慈宫西湖佳矣明将東海艱哉慮不窮捍禦盡心粗擘畫此行或可未云空閲武時巡江國駐行驂武備於今閲已三敢際定遐忘要政寔闗計久詎常談扈隨况有新烏什回部郡王霍集斯舊為烏什部長今居之京師扈蹕来此命預觀統制由来舊耿弇杭州将軍福祿曽為西路軍營叅贊事畢命駐杭統旂兵未御射侯縁臂病自去私偶患臂病艱致彎弧馬上猶可勉為步射不能如式命中故遂弗為詰戎身先去聲畧懐慚昭慶寺寶叔遥曕塔錢塘近度橋偷閒遊佛境問景憩僧寮辦見還叅柏徴心欲剥蕉香花羣祝願慈慶喜恒昭遊黄龍洞遵陸後湖邊湖山名勝連雖無暇應接儘有喜周旋嵌洞教雲䕶披筠得逕穿慧開卓錫處今尚湧清泉題紫雲洞纔别黄龍到紫雲春山膚寸正氤氲連岡誰識東西洞求氣全詮九五文似此宜居易博士如何都属佛聲聞今将復古誠難矣且自因民意所欣題竹素園面水背山地涵今茹古園娱情惟翰墨撲鼻有蘭蓀㑹景皆詮理沿波欲討源白蘇胥未識詩句向誰論詣聖因寺瞻禮皇祖神御殿巡狩曾兹聖蹟留至今黎獻憶恩稠由來樂利天同乆豈必衣冠月出遊鑚仰無能窺卓立繼繩有志勵艱投髫年愛育親承訓瞥眼驚心四十秋恭奉皇太后至聖因寺行宫駐蹕一巡五載溯姚虞聖水髙峯駕重去聲紆山色依然緬祖蹟湖光耐可奉慈娱鳥聲宛轉調絲管塔影玲瓏入畫圖無暇慢嫌勞應接此間吟興足軒吾雨三月初五日開舟以後久逢晴澤國翻縈望雨情駐蹕孤山霏霢霂漪瀾湖水越澄泓菜花含潤黄如濯栁葉拖煙綠尚輕明日淨慈䖍祝嘏一天霽景益分明題放鶴亭君復當年真逸哉江淮遊懶獨歸來何妨鶴子聊無母且喜梅妻不藉媒張氏西山有津逮徐州雲龍山亦有放鶴亭以山人張天􅂹得名盧家雲壁豈重儓至今亭畔胎仙縱想見先生返棹迴戲題巢居閣處士橋頭放鶴林巢居有閣倚山陰晦明風雨如來願應悔入山猶不深吟香别業作孤山東側聖湖邊范撫勾留慕樂天别業舊名勾留處盖前撫范承謨取樂天詩意也地方大吏易今名丁丑春巡至此曾有詩别業荒頺餘舊跡吟香葺築記前編心田淨洗全如水鼻觀清芬詎必蓮設以卉中擬君子吾方渴意在求賢淨慈寺瞻禮鹿苑延釐萃搢紳浙中紳士于此建壇祝聖母夀和風祥旭藹光春共欣天意同人意預祝八旬繼七旬耆窟鳥吟都送喜香林花色總離塵慈無不被敦慈慶浄以為貞夀淨因小有天園南屏峯下聖湖隈小有天園清蹕來了識曰門及曰徑依然為榭復為臺山多古意鳥忘去水有清音魚喜陪昔冩斜枝紅杏在恰同庭樹一時開初遊龍井誌懐三十韻瀕湖佳景多不可僂指數巖泉各擅長大畧吾能舉南山有龍井向聞曾未覩弗肯命騎遊恐費經營苦今來却重飾既成説無補罷去太矯情新晴景更嫵是用一涉藩以答衆誠剖花港遵迤西跋馬數里許漸入姻霏深南北諸峯齬石泉淙其寒千盤曲抱嶼䝉蘢新篠低似掃塵客武乃至過溪亭下馬相與步叶㠍嶪羅秀石閜砢叠竒楚参差列亭臺無非攬勝所最勝則以泉深潭靈物處祈雨每致應利濟功尤巨㵼為百丈瀑對之久延佇善空一切聲角徴安能譜神運石或幻沼滌心應與神運石滌心沼為龍井八景中之二玲瓏竅簇攅錦繡卉纂組春深鳥妙歌雨後花新舞蘿烟濕我衣蘭氣馨於炷攀躋越踴躍髙下迭賔主造巔益愜懐暢觀極仰俯江湖辨近遥窪稜窮幽阻名山所厯屢觀止鮮或旅得句乃命駕遂至日卓午遐思秦蘇輩辨才此晤聚人地乃相宜萬乗来奚取作詩誌吾慚卷阿漫擬古龍井八詠過溪亭行雲流水視遷留奚問虎溪過與不一笑詩吟杜子吳墨名儒行足風流滌心沼辨才歸老開精舍沼水曽臨蘇與秦却是清波無芥蒂滌乎抑否聴伊人一片雲片石玲瓏號片雲英英常自蔚氤氲龍泓本自顛翁碣磬折宜應於此君風篁嶺靈石峯西翠嶺岑蒼筤萬个戛風森世間宫徴安能譜此是雲山韶頀音方圓菴方圓菴是辨才蹟葺築曽經聞啟祥今日重看新舊址有為一切幻誰常龍泓澗鳯凰嶺上龍泓澗噴沫成池貯碧流飛作瀑泉靈作雨攻祈那待法師投神運石移來不藉五丁穿峭舊亭亭一朶蓮聞説鐵牌同出井依稀辨得赤烏年翠峯閣平陵小閣切青霄縱目因之意與遥頗怪呉人費疏剔翠峯今古祗髙標上天竺天竺天一方震旦兹亦有聞之一切法事必遇其偶﨑嶇入葱舊步步離塵垢臺傳康樂翻石識李源友大士昔示相聊藉仁謙手靈感無不應香市傾城走恒處菩提座此理人知否文通教易禅適足啟笑口靈隱寺用宋之問韻即效其體飛來矗翠嶤屏障已清寥月地開如鏡雲璈沸似潮栢烟林外冩花雨座中飄泉冷石為瘦峯髙樹與遥考功昔遊厯此處感榮凋五字殊難屬一聯渾解囂江南曽有贈當面眯津橋紀事稱之問遊靈隠夜月極明行吟曰鷲嶺鬱岧嶤龍宫鎖寂寥久不能續有老僧問之之問以興思不為對即曰何不云樓觀滄海日門對浙江潮之問訝其遒麗遲明更訪之不復見寺僧有知者曰此駱賔王也然駱自有在江南贈宋五之問之詩不應當面不識且并無一語傳竒之家不足為據類此清漣寺觀魚再叠舊韻源發西山脚伏流廿里餘春朝駐䍐葢僧寺静鐘魚知有池呈鏡堪臨檻振涺翠鱗來得得樂意自如如誰謂清波畫偏宜藻句書效蘇頻叠韻曽㡬似髯歟題漪園觀水聞有術名園宛在兹門臨且牆繞月漾更風漪花木倒涵鏡亭臺閒中去聲詩㑹心别有在與物共春怡題丁家山輕輿破雨上蘭椒頑石何人擬緑蕉是處又名蕉石鳴琴為西湖新增十八景之一剝盡心空原一合底須横膝七絃調賦得春雨如膏得逢字八韻浙江士子題江國虞頻致今番喜恰逢暄晴宜一豫膏雨利三農輕重權之久旰宵厪以重氣蒸十折水雲接雨髙峯􅓴雭初猶細霈霶繼遂濃菜花黄沃濯栁葉緑髼鬆周雅曽方恵韓詩善冩容巡方歌玉燭撫已慎金鎔再題西湖行宫八景四照亭孤山髙處一亭幽芝篆雲簷四字留亭中雲峯四照額皇祖御筆也峯色湖光皆道趣聖人此意照千秋竹凉處低籠曲徑斜依檻颯爾生寒邈若空安得朱明此散步披襟無礙度來風綠雲逕喬樹菁葱鎖碧峋偶然屧步迥無塵山隂便是林家宅却恐先生笑不倫瞰碧樓一碧天光萬頃澄岳陽樓記近堪徴若無後樂先憂志文正佳文亦底稱貯月泉石鏬淙泉滙小池玉輪初上貯來宜居然似與平湖傲曰以山髙先得之鷲香庭玉華桂樹皆盆植香山玉華岫盆桂最多庭樹春時葉尚纎金粟如來髙丈六可容當面悟香嚴領要閣天容湖影浄無痕領要何能頓忘去聲言竹閣栢堂皆左近呼之欲出白蘇存玉蘭堂盡得湖山秀氣陶春風别館適相遭王家詩與文家畫未及雙株不語髙題留餘山居湖上有山居居然畫不如飛泉當面落詭石礙肱舒樹色春昌矣波光逺漾諸留餘眄題遊興亦慵予法雲寺處處有流水面面多竒峯乃入龍井路妙想真難窮調御一朶拈隨宜現花宫顧弗事荘校示諸萬有空是謂法雲㫖初非恒所逢龍井上作深潭噴靈液􅥼濈更溶漾此與元氣通雨中自宜壯心神既澄濾耳目殊供養㵼為垂巖瀑原從足底放巖下適仰觀計以數百丈乃悟地處髙其卑難為望絜矩有所思惕若萬民上再依皇祖靈隠寺詩韻飛來峯畔路法相坐嵯峨宛識祗園近已聞梵唄多竺雲開月宇仙籟下烟蘿到處瞻光被羮牆豈是過韜光菴言遊凈室别雲林曲曲山蹊步步深輪尺筠竿紫粉墜垂尋泉脈玉絲斟不因初狹厯層磴那得中宏暢逺襟耽静未宜歸勅政安能箇裏學安心金蓮池韜光寺裏一泓水竒蹟應同卓錫泉此日偶然臨碧鏡當年見説育金蓮常涵古往今來月不異雲容山色天七字促成旋命駕清新却愧白家篇題虎跪泉大慈寺側虎跪泉性空昔日此棲禪以無水将他之矣忽有神人来告旃南岳童子遣二虎旋來移請無憂為翌日乳竇淙有泌異常甘冽清且寒不見不聞無窮已伎倆有盡語不刋綆汲聊償問景興還訝其然豈其然開化寺六和寶塔矗岧嶤古寺成傳開寳朝隔岸越山拖畫㡧列屛吳嶺入雲標已教息慮棲禪悦但未忘言答景撩頗訝考功誤靈隠試看門對浙江湖瞻禮六和塔作寳塔岧嶤聳七層恐妨泥汙不須登鎮江厯刼安瀾䖍凌漢單提向上乘立久波光如欲徹望來烟意亦将澄漫言造極今孤約興已軒飛絶頂凴雲棲寺叠舊韻一律諸峯遥看簇蓮青路轉叢篁得野亭知是洗心契儒玩饒他念佛著僧聴從新春景粉圖展依舊山齋翠蹕停真蹟香光聊遣瑕寺中弆藏董其昌所書金剛經過此披閲凡三度矣底論前後顗和靈理安寺見説安心竟何來理與安山如標静諦鳥亦發清歡葢影張祗樹經聲出戒壇了當忘結習歸去漫迴看小樂洞口號何聲不中宫商相遭泉石其常宇内似此多矣重儓奚獨東陽湖心亭聳似雲居浮似航蓬萊宫闕水中央東西南北望無盡春夏秋冬景異常是鏡何曽藉揩拭非蟾而覺發輝光縱教荘叟斯焉對得意於言可易忘敷文書院叠舊作六韻牖民先廸士籌治在崇文爾尚希前誓吾寧驕大君並非事遊衍實欲騐修勤峯色北軒挹江聲南户聞取裁堪契要稽度貴離紛治事兼經義胡家法出羣賜浙江學政李因培即用舊賜原韻於呉遂遷越總是善文邦以爾能精鑑庶予賛化厖東西浙水一南北兩峯雙自得江山助濟宜醇與龎觀潮樓紀事跋馬萬松嶺言尋觀潮樓樓祀江潮神繄吾禋典修戊寅嵗命浙省守土臣修建其神祠於觀潮樓並製文勒碑以紀事前兩度臨兹江從樓下流今番乃漲沙羣咸頌神庥然吾别有思無非為民謀迤東利漲沙庶望桑庥稠迤西本弗藉石塘鞏金甌從古樓臨江濤觀八月秋觀濤固非要况昨暢吟眸利者乃致敗柴石捍禦籌弗藉者反然泥塗艱行舟試看西來薪轉運以車牛觀潮樓下沙未漲時富陽等邑柴船連檣東下直抵艱江岸今漲沙既逺率用牛車轉運輓致頗合郡供㸑薪弗屬寧免愁謂此為昭假實益吾懐羞再遊瑞石洞口號瑞石由來迥出竒郡城柱駕再觀之萬民遂彼瞻依願七字起予瀟灑詩澄觀齋敬題皇祖御筆聖因寺中精舍名也聖因原是昔離宫尚有宸章額繡櫳兩字澄觀掲天趣一時善繼凛淵衷滿湖歌舞聞非樂萬姓飢寒慮不窮當日豫遊雖未逮勤民展義志希同六一泉孤山側畔石泓深泉以人傳可用斟坡老遺蹤尋六一即今坡老更誰尋栢堂用蘇軾韻老栢雙撑廣化前東坡尚見一巋然至今亦復餘名字太古誰恒駐嵗年秋月春風結金友江聲山色識薪傳微嫌玉局猶饒舌却向榮枯細論禪竹閣用蘇軾韻白傅蘇公總杳然湖邊尚説竹籠軒成林未逮晉七士畫水曽聞蜀雨孫見東坡雪浪石詩徙置不離山下路長上聲來都䕶寺前村寄題何必紆清蹕遵海常懐晏子言再至雲棲題句我有樂山意雲棲山最幽緑筠饒静趣白足事清修梵籟簷前落香泉階下流少停便應去課誦可妨不題西湖十景再叠舊作韻蘇堤春曉三度南巡杭復蘇懃吾長堤今日遊乘暇與物皆春似此湖栁浪聞鶯儘有宫商石與金栗留誰似獨情深戴家只在潤州表可識清波門外林花港觀魚錦梭不藉天孫擲練影中堆萬簇花設與水仙作春服無邊風月傲清華曲院風荷幾個田田漾細風乍看緑葉想花紅昆明湖上浮輕舫六月春光訝許同雙峯插雲春雲㡬縷卷還垂南北雙峯一例披湖上吟詩第三度迴思彈指不多時雷峯夕照南屏别嶂堵陂矗夕照從來得雅名遺跡漫因歎興廢豎窮三際十方横三潭印月標意恒沙轉法輪佛標身塔標意經標口見梵典見身非實是真身無心古鏡波心印不向拈花悟果因平湖秋月堤畔輕車駐碧油春風春月景方柔何須遼待三秋看孟子名言戒謂流南屏晩鐘繡峯南面正開屏浮色兼之發浄聲我聴未能息諸慮宵衣問政惕深更斷橋殘雪豈有瓊葩田尚餘徒觀麥色信芃如耕夫織女吾胥厪防誤蠶忙擬返輿再小有天園不入最深處安知小有天船從聖湖泊逕自祕林穿萬卉軒春節是日清明千峯低霽烟明當旋翠蹕偷暇重留連勝閣望湖勝閣攀登攬全勝一堤桃栁兩湖船民情暢我憂中樂物色昌其静裏妍杭州啟蹕迴鑾之作鹽官周視海塘形湖上㡬餘數日停已逮農桑三月候慢耽南北兩峯青一遊一豫闗民樂水樂山養性靈安福舟中片時暇促成新記識求寧是日走筆為閲海塘記示地方大吏烟雨樓叠舊作韻烟絲罥栁栁絲濛雨意迎人人意通自是雲容盟水態並宜草緑藉花紅奚稱處括沔陽彼處州括山及沔陽州并有烟雨樓而嘉興名特著總屬天髙地厚中耕織圖詩屏宛在樓中有錢陳羣書趙孟頫耕織圖詩屛不殊惇史惕深宫欽定南巡盛典卷九
