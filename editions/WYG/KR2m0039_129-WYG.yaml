body:
  text: 奏議乾隆二十八年十二月十七日两江總督尹繼善等奏言竊惟時邁省方自古載為典禮我皇上俯從輿望三次南巡江浙殊恩疊沛愷澤覃敷蔀屋茅簷莫不感戴皇仁淪肌浃髓是以翠華所至衢歌巷舞夹道懽迎此雖周詩之頌懐柔夏諺之稱遊豫未足比擬隆規也且以河防重大屢邀鑾輅親臨閲視指授機宜凡在前人籌議之所未周臣等經營之所未及悉荷宸衷裁制睿訓精詳故連年以来淮黄並奏安瀾澤國均安袵席濵水沮洳之地皆成沃壤膏腴嵗慶豐登羣資利賴無論黄童白叟僉謂聖主勤民無逸到處蒙庥倘逢御輦頻来更多錫福臣等備員江省博採與情當此年豐人樂之時益深就日瞻雲之願計至後年乙酉已越三載之期恭懇皇上允降綸音即定南巡吉日再光鉅典以洽億兆歡心所有一切事宜臣等仰體聖意既已確核章程務去繁華撙節預備惟望六飛早届吳山越水同欽至徳輝光欣看萬姓尊親華祝嵩呼永誌熙朝盛事臣等敬謹恭摺奏請奏入上諭恭載恩綸乾隆二十八年十二月二十日閩浙總督楊廷璋等奏言欽惟我皇上以法祖愛民之聖心行省方問俗之盛典前自乾隆十六年以来三次恭奉聖母皇太后安輿南巡幸浙錫類推仁殊恩疊沛凡属臣民無不均沾普慶喜溢歡騰自乾隆二十七年春聖駕回鑾以後至今又隔三載浙省年糓豐登地方寧謐白叟黄童飲和食徳隨地隨時俱各感戴帝澤瞻天仰聖之忱倍加誠切伏查厯次鑾輅經由之地絲毫不煩供億即杭城内外行宫及各處古蹟名勝以及營盤道路節經辦理著有章程並無糜費臣等職任封疆體察輿情竊見羣黎望幸之殷實属肫誠懇擎不敢壅于上聞仰懇皇上天恩再舉時巡之典頒示啟鑾諭㫖以慰億萬萬黎庶蒼生之望再查浙省海塘乾隆二十七年春月仰蒙皇上親臨指示臣等敬謹遵奉辦理一切柴土石各工俱慶穏固惟是塘工闗係重大沙水坍漲靡常臣等究恐才識未周更求聖駕再賜臨幸尖山石壩暨仁寧等處将一帶塘工面加訓誨俾臣等欽奉仰體黾勉遵辦永慶安瀾臣等實感􅈭無地謹合詞恭摺春請奏入上諭曰昨尹繼善等奏已有㫖矣乾隆二十九年四月初九日尹繼善奏言恭照聖駕巡幸江南沿途應需分設臺站接逓文報用馬衆多臣于乾隆二十二年在通省州縣額設驛馬内通融協撥尚慮不敷各属仍自備餘馬應付乾隆二十七年因江南驛馬已奉裁七百匹較二十二年額數更少𣲖應益属不敷若不酌量加増必致貽悮差務經臣奏請将裁馬七百匹暫行復額應差仰邀聖恩俞允今次翠華載幸所有江省驛馬應循上届之例暫照從前原額加増馬七百匹分𣲖沿途經過各州縣准其于驛站項下借支採買自本年十一月初一日為始照依額設驛馬一體支給草料至差竣日停其支給仍將所買馬匹照數變價歸還原欵如此斟酌辦理則暫增馬匹既于差務甚有禆益而差後仍行照數變價還項亦于錢糧並無􅉛缺奏入諭如所議行同日尹繼善奏言恭照聖駕南巡所有隨從官兵執事人等應需乘騎馬匹厯次俱于緑營各標營及江寧京口駐防馬内各撥馬四千匹分屯江南江北伺應查緑營額馬止有四千四十餘匹于𣲖撥應差四千匹之外所餘無㡬臣恐臨期貽悮向于江西營驛馬内酌調數百匹来江協濟今次仍應照辦外惟江寧京口駐防額馬本有六千匹因上年奉裁京口駐防兵丁有甲馬二千名即減馬二千匹現在駐防額馬祗有四千匹儘數當差沿途設遇疲乏無馬添换自應預購馬匹以防缺悮現據將軍臣容保于貯庫馬價内委員赴口購馬四五百匹備用酌須冬間赶至江南既恐尚有不敷且慮新馬到江相去差期不逺喂養未乆難以應差惟有撥協隣省馬匹方克有濟查乾隆二十年江省需用差馬先准軍機處議請於軍營凱旋馬内領取亦因新馬不能應差復經奏准在于豫省旗營馬内調撥二千五百匹赴江應用今次八旗駐防應需預備之馬仰懇聖恩俯照乾隆二十年之例在於豫省旗營馬内酌撥六百匹協濟江省惟是前項協濟馬匹應差之後即多疲乏難以再還豫省查旗營之馬毎年倒斃缺額者原應買補應将此馬即交江寧京口駐防作為補額之需一靣照原撥數目觧價還豫聴其自行購買以補撥缺之數但江省往年赴口買馬合計馬價同沿途喂養盤費毎匹約需銀十七八两豫省採買馬匹大約亦需此數自應公平還價使豫省易于買補應俟恩准之後臣與豫撫臣商定㑹同將軍臣容保扵存貯馬價内照數移還臣縁差馬𦂳要専摺奏懇如蒙聖恩俞允應令豫省于本年十月内預備撥送在于两省交界地方交收所需沿途料草及撁夫飯食等項各歸本省照例報銷合并聲明奏入報聞乾隆二十九年七月十九日尹繼善奏言恭照明春聖駕南巡一切扈從人員應需乘騎馬匹于江省緑營並駐防八旗馬内各以四千匹分江南江北𣲖撥伺應前因八旗馬匹不敷經臣奏請借撥豫馬六百匹仰蒙聖恩允准為數已属寛餘而緑營應差之馬通省額數止四千有零雖經臣酌量𣲖撥現已足用但馬匹應差日久不無倒缺若不籌辦多備臨時設有貽悮所闗匪細臣與提鎮諸臣再三商酌必湏再購餘馬數百匹預備接濟而此時無項可動查存貯司庫内有各官養亷馬價一項可以酌動現于此内借支銀六千餘两委員出口採買馬匹回南加料喂養以為明年差所臨時倒缺之用其借支養亷馬價銀两仍于各營明嵗例領大報馬價内按分領馬匹營分照數扣還歸欵至漕河撫各標營臣亦移咨酌購餘馬以備差所撥補奏入報聞乾隆二十九年九月二十二日總理行營事務和碩簡親王豐納亨等奏言明春皇上南巡所有一切應行備辦事宜臣等按照上次皇上南巡旱路扎營所需大城蒙古包帳房等項俱帶往二分工部應備樁橛等項亦照例帶往所用駝隻及茶飯房等處所用駝隻車輛俱交各該處照例預備其拉船縴夫由河兵内揀用應行備帶銀两縀疋等項令户部内務府具奏帶往其侍衛㨂𣲖三班兵丁揀𣲖一千名各處官員拜唐阿等酌量㨂𣲖再至江南登舟之時兵丁減𣲖五百名章京𣲖四十員虎鎗侍衛兵丁一百三十七員名内㨂𣲖四十員名其餘入于三班侍衛及五百名䕶軍數内㨂𣲖其扈從大臣官員俱于嵗前預行支給春季俸銀應騎官馬人員俱照應領之數全給俱先支給两個月盤費途間再行補給登舟後大臣官員各留家人喂養馬匹其拜唐阿兵丁等乗騎馬匹並官用駝隻交與山東巡撫分給就近各州縣及綠旗各營喂養留住之兵丁家人委𣲖大臣管轄約束回京所用車輛欽㸃大臣㑹同地方官僱覔備用喂養存留馬匹所需麩豆草料等項令山東巡撫酌量採買以備支糶至浙江地方豆石短少或有應行撥濟之處令咨明東撫令其酌量採買運送至沂州一帶以備支糶再沿途安設臺站由兵部騐明正腰各站令該督撫于通省驛站馬匹内抽撥備用至經過地方應行辦理營盤道路橋梁一切事宜俱令該督撫照例先期預備伏查明年皇上南巡旱路扎營自山東徳州以南間站業已盖造行宫而江南陳家莊亦盖造行宫其大城蒙古包帳房等項帶往一分儘可敷用不必仍帶二分所需駝隻及撁駝兵丁亦約敷一分之用辦理應𣲖兵丁一千名減𣲖三百名著𣲖七百名其餘俱請照上届之例辦理至留住之兵丁跟役應𣲖大臣彈壓管束及經理回京所用車輛大臣俟臨期再奏請欽派再查照登舟後所需馬匹北北㨂選緑營馬四千匹江南㨂選旗營馬四千匹至江寧等處時應添備馬二千匹放給之處令兵部交該督仍照上次之例辦理其隨從御船及督催拉船縴夫需用馬匹亦令該督仍照上次辦理所用船隻令各該處将人數報明總理行營處合計行文該省辦理其㪚給船隻令兵部照上次辦理御前大臣領侍衛内大臣軍機大臣御前侍衛乾清門侍衛船隻與載御馬船隻及上駟院侍衛官員批本奏事軍機處侍衛處内閣兵部官員等船隻俱照上次令其在前行走其餘船隻俱令在後行走若有承辦事件必應在前行走者俱令臨時自行奏請其江南河路狭窄理宜嚴禁擁擠應令管理船隻大臣協同䕶軍統領于行走停泊之處嚴加管理其在浙江放馬等項亦照上次江南一同辦理皇上巡幸畢囘鑾時皇太后内廷各主位仍至張家灣下船皇上至徳州下船由旱路行走所有經過地方應行辦理營盤道路橋梁一切事宜俱令該督撫備辦俟命下之日行令各該處遵奉辦理奏入報聞乾隆二十九年十月十七日尹繼善奏言恭照聖駕南巡沿途管押馬匹船隻以及巡防站道等項均需官兵分𣲖差遣而外出應差一切衣装盤費在所必需上届節次南巡俱經奏明酌借俸餉两月以資製備于差竣後俱已全數扣還清欵明春翠華再幸江南其各營承應差使官兵據請酌借盤費等項似應循照上届之例將緑營官兵一律公借两月俸餉江寧京口八旗官兵亦照此酌量動借俟差竣之後從明年夏季起分作二年照數公扣還欵其江西省管理協濟馬匹及来南辦差官兵亦應一例借給奏入報聞乾隆二十九年十一月初二日江蘇巡撫荘有恭奏言恭照明春聖駕南巡一切應備事宜臣等率同司道等官敬謹備辦所有各項動支正耗銀欵上届係先期奏明今據江寧布政使彰保蘇州布政使蘇爾徳㑹詳稱上届乾隆二十七年翠華南幸所有扈從官兵人等船隻需用縴夫聖駕經由旱路需用扛擡旱夫囘鑾需用車輛䭾載御用什物等項需用騾頭均于司庫正項銀内動支又扈從官兵馬駝需用豆草麥麩均于司庫雜税及正項銀内借支再行宫名勝備辦器物并修浚道路橋梁河道等項均係動支司庫耗羡匣費銀两料理各于事竣據實造冊分别核實請銷今次均應循照舊例辦理所有動用銀欵相應詳請核奏臣覆查無異除飭取估冊分咨户兵工三部備案外臣謹㑹同大學士管两江總督臣尹繼善具奏奏入報聞同日莊有恭奏言竊照明春恭逢聖主重舉巡方之典一切差務現在敬謹辦理惟查北来扈從官兵人等需用錢文均應預備臣先經扎行蘇州布政使蘇爾徳查議籌辦旋據該司詳覆厯届需用官錢約九萬五千餘串向係加鑄以供兑換今擬請乾隆二十九年循例加鑄一十四卯可得錢四萬七千餘串又現有收買局内爐匠工料錢二萬三千五百餘串並積存局庫餉錢三萬六千餘串足敷分發各属兑换以供北来扈從官兵之用除臣據詳咨部查核并批令將一切發兑事宜預行酌定妥辦外謹㑹同督臣尹繼善具奏奏入報聞乾隆二十九年十一月初十日大學士公傅恒等奏言本月初七日據䕶軍統領慶泰奏請將旗下家奴指稱帮辦差務希圖漁利人等查觧来亰管束等因一摺奉㫖軍機大臣議奏欽此據慶泰奏稱八旗滿洲俱賴家生僕人當差行走近日家奴内稍有伶俐能事者竟至棄其舊主情愿跟隨外任官員前往者並有因過活艱窘佯許給伊舊主銀两騙支前往者且有因伊主親族局騙妄希射利潛行前往者殊属大闗風紀臣慶泰隨駕臨幸江南竊見沿途備辦差務之地方漢員帶領旗僕行走者甚多詢之俱稱帮辦差務揆厥所由大抵俱因不諳事體之地方漢員以為此軰習知旗人性情尋覔帶往使令易得一切信息是以僱令跟隨甚或大加任用帮辦差使此等旗僕一得機㑹于中漁利必致藉端滋擾民間大為地方之害應請飭交直𨽻山東江南浙江等省各督撫查明除旗員現任某地方官准將已僕隨帶外其餘大小漢員等所僱旗僕俱著詳細查出于皇上啟鑾之前盡行觧送回京交各該旗嚴行管束如地方官員仍得隠徇存留此軰不行舉報上司或經總理行營事務王大臣等查獲或經在京御史等風聞叅奏必將該員從重治罪以示懲儆臣等伏查厯次皇上巡幸地方均蒙特㫖飭諭各該省督撫嚴禁匪徒指稱辦差從中取利復飭總理行營王大臣等沿途嚴宻稽查地方官員各宜凛遵將此等匪徒查挐管束但恐漢員中智愚不等或以旗僕諳習旗人之性于辦差有益僱倩伊等跟隨使用藉為耳目自不能保其必無應請如慶泰所奏飭交直𨽻山東江南浙江等省各督撫詳切曉諭如漢員有僱用旗僕者于皇上啟鑾之前盡行自行檢捜觧送来京交付各該旗給伊原主嚴加管束即旗人為地方官者亦祗准其存留寔係已僕其所僱用跟隨之僕並著一概查觧如各該員等仍復有意容留不行舉報至被總理行營王大臣等查出將該員一并叅奏治罪再慶泰摺内奏稱凡有旗人均著查出觧送来京交該旗管束之處查旗人内另户人等原不准出京其出旗為民之人業蒙皇上加恩聴其各往外省謀生若有一併查不惟該旗難于管束且使伊等亦復不得生路應請免其一併查觧来京仍飭各該督撫于此項人等飭知地方官只許留在署中當差凡于蹕路經由之處不得聴其外出妄生事端臣等仍同總理行營王大臣留心嚴查如一經查獲即行審訊治罪並將該地方官一併查叅庶各知所警惕伏候命下即行令各該省督撫欽遵辦理奏入諭依議行乾隆二十九年十一月十二日倉場侍郎温福蔣炳奏言恭照聖駕南巡所有乗用御舟向𣲖坐粮㕔一員先期駕赴清江浦伺候乾隆二十六年經臣温福奏請帶同坐粮㕔徳風跟隨御舟照料行船事宜仰蒙聖恩俞允嗣于乾隆二十七年五月内欽奉上諭天津所有一應船座收貯經管各事宜著長蘆鹽政就近管理欽此明春翠華南幸應用御舟已據該鹽政髙誠奏𣲖長蘆運同永貴先期駕赴清江浦伺候自毋庸復𣲖坐粮㕔前往辦理惟是皇上回鑾由水路至徳州起旱進京皇太后至張家灣起旱進京所有御舟經行之處河道理宜肅清而東省閘河正在粮艘盛行之際其應如何停避須隨時料理伏乞皇上于臣温福臣蔣炳二人内𣲖出一人隨駕前往奏入上諭曰著𣲖温福乾隆二十九年十一月十二日鴻臚寺奏言向例凡遇皇上行幸沿途地方文武官員于百里内接送查乾隆二十七年皇上南巡臣寺將經過沿途地方文武各官于㡬十里以内接送之處具奏奉㫖著三十里以内接送欽此此次皇上南巡經過沿途地方文武各官于㡬十里以内接送之處恭候命下臣寺行文知照各該督撫遵奉奏入上諭曰仍著三十里以内接送乾隆二十九年十一月二十日總管内務府大臣奏言伏查乾隆二十六年十二月二十八日欽奉上諭向來巡幸所需車輛例由順天府用官價預為僱覔應用其中胥役人等多有乗機藉名抑勒需索諸弊為累閭閻此次南巡啟鑾伊邇順天府自已照例預備著步軍統領衙門簡𣲖員役查察如有滋事情弊即行挐究以儆刁猾嗣後有應備車輛著交内務府總管大臣交㑹計司所属大粮荘頭等設法官辦既可供應無悞又可永斷因差滋弊根株其悉心妥議具奏欽此當經臣等詳細酌議毎年皇上巡幸木蘭内務府各等處備差約需大車七百餘輛擬備官車八百輌每車一輛騾馬四匹給價銀一百二十輛分𣲖大粮荘頭及口外荘頭等拴養以備巡幸之用平時聴其營運生息查向例毎車一輛毎日行程脚價銀七錢二分守候住宿給銀五錢二分今此項官車係領價備辦平時既不碍其營運則應差之時未便與民車一例多給僱價嗣後行程毎輛毎日給脚價銀五錢住宿四錢足敷喂養馬騾之用再車輛日久馬騾不無倒斃應酌定以三年之後毎車一輛馬騾四匹准倒斃一匹官給銀十两以為買騾之用奏准遵行今據拴車荘頭楊之連等呈稱竊荘頭等自奉拴車以來業經三載毎次備差未敢違悮但荘頭等散居各州縣地方逺近不一毎遇傳差往返途次守候費煩且荘頭等惟知種地當差原不善于營運所有官車出差俱賴僱工車夫在外應差不䏻親身隨往經理以致備車一次騾馬倒斃賠補羸瘦不堪應用恐悮官差闗係非輕荘頭等不得不將實在不能拴養官車賠累情由據實呈明懇祈查照辦理紛紛逓呈伏查皇上巡幸所需車輛向發官價僱覔應用原無累于地方乃蒙特恩猶恐胥役藉端滋擾為累閭閻特設官車備用自拴官車三年以来毎遇巡幸雖承應官車未至遲悮今據拴車荘頭等将不能備辦情形具呈臣等伏查從前僱覔民車價銀行程七錢二分住宿五錢二分守候二日毎車給銀一两四分回空按住宿五錢二分七扣合算毎日給銀三錢六分四厘今官車價銀行程五錢住宿四錢守候回空俱不給價原令其平時善為營運以為津貼之資今留心體察荘頭人等散居各州縣地方近者數十里逺者或至數百里應差之日藉有價銀而赴京回屯往返之間均需自行貼補辦理不無竭蹶然以一年計之應差之日少空閒之日多茍其善于營運原可以有餘而補不足無如荘頭等勤惰不齊于種地交差之外善于營運者本少是以只覺其艱而難期其效今臣等詳細籌畫每年皇上巡幸木蘭内務府各等處備差回車六百餘輛需脚價銀一萬二千餘两至一萬五千餘两不等若以原發拴車價本銀九萬六千餘两並平餘銀四四千两共銀十萬两再請發銀十萬两共銀二十萬两以此滋生利銀按一分核算毎年可得利銀二萬四千两如入毎年所需車脚銀两合算計照官庫脚價行程五錢住宿四錢之數行程増價五錢毎日給銀一两住宿増價四錢毎日給銀八錢僱覔應用不惟足用尚有餘剰利銀可以陸續歸還原本况民間有耑以拴著車輛為生意之人伊等久慣喂養騾馬精壮拉運得力若官用時増價僱覔不但不致賠累且可獲利諒無畏避不前之患所有荘頭等拴養官車應請停止令其繳回原車價本銀两以為滋生之用嗣後凡遇巡幸所需車輛請交與順天府照増定價銀行程一两住宿八錢僱覔其守候回空仍照從前僱覔車輛之例給發辦理嚴飭該地方官不得混行挐𣲖民車擾累閭閻並請勅交步軍統領及五城監察御史等嚴行查訪倘有挐獲或經首告嚴行叅奏從重治罪如蒙俞允由廣儲司銀庫先請發銀二十萬两分交與两淮長蘆鹽政于商人内㨂選家道殷寔借給聴其酌量經營按一分生息毎年觧交廣儲司銀庫以為車脚價銀之用其荘頭等應交脚價本銀著限一年令其完歸欵項至明嵗皇上巡幸江浙及往木蘭應用車輛所需脚價由廣儲司銀庫先行動給俟两淮長蘆两處觧到利銀之日照數扣還如有餘剰銀两陸續歸還原項可也為此具奏請㫖奏入報聞欽定南巡盛典卷九十五
