  text: 欽定四庫全書欽定南巡盛典卷十七天章庚子浙江
  hash: sha256:ce2c1231d7e92198e98cabe61a13b51b0e57f8b6d6bab568153933ab6220e3cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_028-1a, image: WYG0658/WYG0658-0307a.png}
body:
  text: 詩入浙江境一水無須更换舟却看両省各分陬南為迎者北為送養俾欲兮給俾求老幼依然非越俗桑麻櫛若較蘇稠来巡要務此疆切正在海塘固永謀雨二月三十日十日晴和略厪念見近作即事詩恐於南方不宜也油雲忽落雨絲稠恰宜佳節過寒食况是川塗駐綵舟不疾不徐利麰麥既優既渥潤田疇一端更有怡神者明日應臨烟雨樓降㫖免浙省地丁漕米積欠詩以誌事施惠應於始入疆未完積欠合寛償較之江省數為少浙省歸安等縣未完地丁漕白各欵銀五萬三千九百餘兩南米四千七百餘石仁和等縣民借穀一萬八千餘石均加思一併豁免以紓民力然較之江省銀未共蠲免一百二十餘萬多寡懸殊浙省民俗較良矣自是浙民俗尚良概與逭除資樂利俾其耕鑿冀豊穣即看時雨時𤾉景合共黔黎沐吉祥題􅃄雨樓祇疑瀛泛到雲來鏡裏樓臺熟路開四面波光烟雨意無邉春景詠吟材今斯今也昔斯昔栁尚栁兮梅尚梅一讀錢家書趙句樓中有錢陳羣書趙孟頫耕織圖詩屏愴然弗忍更徘徊晴江國常宜雨雨霑亦藉晴潤暄既時若髙下普資生破曉雲猶重過辰曦放晶不無濘縴路何礙畧遲行謁海神廟瞻禮再曡舊作韻閲十六年重巡狩䖍瞻廟貎潔禋修況逢坍北方南漲益切竭誠仰籲庥遍地耕桑艱讓水禦潮堤堰願安秋御碑拱讀増欽慕一例勤民不觧愁駐蹕安瀾園再曡前韻六首觀海較前異石塘貼近瀾州臨因繫舫城入更乘鞍熟路原相識名園頗覺寛就瞻任民便雷動夾塗歡沙坍逮北邉數嵗為心懸塘外漲沙南北坍漲靡常北漲則塘工鞏固壬午閲視簍誌情形命撫臣每月勘驗具圖奏報自壬辰春以来沙痕漸覺北坍實為厪念不置到此蒿増目慙其言湧泉急籌塘與堰懶聴管和弦對景惟惕息摛辭那復妍安瀾易舊名舊名隅園重駐蹕之清御苑近傳蹟圓明園曾仿此為之即以安瀾名之并有記海疆遥繫情来觀自親切指示慙去聲分明行水緬神禹惟云盡我誠石逕雖詰曲歩来那用尋無花不具野有竹與之深磵户開生面泉紳振舊音御書樓好在垂露䕶韋鍼溪上三間閣棲遲似昔年非圖燕寢適頗覺犀塵捐老栝詩中盡古梅静裏娟别来十六載可不意為延拂岸柳絲柔出簷竹个修重来亦儻耳昔事憶從頭南北漲坍屢自乾隆戊寅後潮勢漸趨北亹恃魚鱗大石塘及坦水竹絡壩為之鞏䕶丁丑南廵時值南坍北漲大溜已向南己夘以後潮復趨北壬午乙酉兩經親閲溜勢或南或北遷改不常随時指示大吏添用坦水竹簍防䕶並有詩紀事愁欣詩句留北漲則為之欣坍則為之愁亦經屢矣即今值愁際那得惬情遊觀潮四首曡乙酉韻穹塔依然峙迥臺十餘年别此重来海潮欲問似神者幾度東西兹往廻雷鼓雲車聲應隨自宜神物式憑斯設非之二人司是乙酉詩云伍胥文種誠司是之二人前更屬誰見雖髙而語似慢其後北坍南漲至今潮勢乃逼近石塘意甚悔之故反前句意如是雄威更合誰石塘上畧肩輿駐報到未時潮不差是日潮以未時至枚客賦成擬閣筆周郎宿寄唤推車流光瞥眼誠云速潮信兹来試攬仍審至竒中至静在一時得句興堪乗登尖山觀海尖山更在塔山北潮所弗及勢猶逺以之觀海斯則近鐵版沙䕶北成堰尖山北至乍浦一帶向無塘堰因其地係鐵版沙不畏潮勢沖齧無庸防䕶山頂舊有大士宫竭誠瞻禮登雲棧所祝安瀾佑萬民寧圖玩景供遊眼亭臺㸃綴夫何為􅍀然為之意不滿視塔山誌事再曡舊韻塔山塘入江竹簍以為翼壬午視之次沙漲畧弗逼乙酉詩誌幸其後勢漸急兹閲三層簍一層已露立壬午閲視塔山壩工有竹簍貯石下䕶壩基其時沙漲掩簍四尺許遂命立標以騐増漲尺寸諭撫臣按月繪圖奏報乙酉臨閲沙漲増至五尺衆皆欣頌但坍漲靡常實不敢即以為慰並有詩紀事兹復親臨相視不但所増之五尺漲沙盡坍且三層竹簍之上層已經顯露因竹篾年乆朽敝撫藩諸臣另簍换砌於保䕶雖屬有益然切望漲沙之漸増長耳其何禦三秋不啻减五尺前廵所慶幸兹番頓變易扼腕民之艱撫膺吾之責於無可如何敢不籌詳悉欲圖安墊居遑吝増鞏石補偏救弊耳愧無永逸筞閲海塘三曡舊作韻乙酉潮頭􅅻逼塘退潮沙尚䕶塘良乙酉臨閲時潮頭雖漸有趨北之勢而潮退後塘外漲沙較壬午所閲摽誌頗覺増長然亦未敢以為慰也即今坍盡一江水切已愁厪萬井桑何日中亹復故道爾時合郡祝同慶神祠咫尺申瞻拜祈佑不遑慙不遑賜隨營諸臣及浙省大小吏食即席得句觀海尖山返良辰上巳臨是日三月初三列茵聊食賜曲水異觴斟韶景不孤節輕隂欲作霖能詩者賡韻詎必襲華林命老鹽倉上下相地仍建石塘詩以誌事壬午視海塘長言曽誌事爾時雖北坍塘外尚沙地未若此時甚水竟塘根至老鹽倉一帶惟賴柴塘峙向亦經親臨下樁目所視沙散弗齧樁條石艱鱗砌海寜恃塘工為屏蔽嗣因潮近石塘復接石為柴塘然柴不如石之完固壬午親臨老鹽倉一帶擬昜以石試下木樁苦沙活不能齧樁難於砌石其柴塘向内數十丈似可下樁又皆民田弗忍毁棄因罷石塘之議移内又弗可遂罷石塘議茲來細周閲未可前言必叶柴塘四千丈豈盡活沙寄不無受樁處石塘終可恃石塘迤上柴塘四千二百餘丈未必概係活沙難以受椿因復飭該督撫派委誠妥大員據實逐欵勘估凡柴塘可以改建石塘之處悉令易石毋惜工費俾濱海羣黎永享安恬之福申命重相去聲勘莫慮國帑費庶幾永安瀾為民籲天庇至杭州即事成什夜雨優霑曉猶宻輕輿發駕指杭城石塘且不十分濘已刻漸看四宇晴連壠菁葱二麥潤夹途歡喜萬民迎行官到絶問安事向每南廵至石門即奉酉自海寧勘塘至杭問聖母安舟先至杭州乙安尚有鹽官先往為籌塘舊路而承安舟奉不再夀康之句今韶光如昔歡撫景彌覺悵然俛首無言自悵情恭依皇祖廵幸杭州詩五曡韻要務海塘求永安鹽官紆駕歴親觀長堤保固相籌䇿治省言旋此駐鑾俗為從奢寧尚儉政知用猛莫如寛依然温凊前廵處祗助悲懐那助歡丁丑詩有應博慈顔一笑歡之句韻玉館曡乙酉詩韻韻為君子致節是丈夫强春暮葉猶宻月虚影共長别来十餘嵗披得滿懐凉更愛清風拂泠泠奏八琅登呉山攬古作歌我来餘杭駐郡城呉山城中必一登到江呉地盡南界子胥蹟古訛堪徴入門石磴拾百級梵宮仙院羅崚􅜤大都唐宋舊殿宇頺廢今屬道與僧可笑最宋南遷後一徳之閣猶傳名奸相更希非分去聲福孱君難託殷宗稱坐視中原不復顧朝歡暮樂山水清近輯四庫益悉故撫卷為之感慨生攬景詎因暢吟興殷鑒不逺凛持盈五依皇祖呉山詩韻左俯閭閻右挹湖觀民咸欲躋亨衢海陵勒馬誠乖甚忘却中原有别圖題瑞石洞山以石為骨洞則山之心搜土石常現披石洞昜尋玲瓏碪􅑇間體立用自愔曰瑞誰所名想有㑹意深豈其餙言祥徒供玩景臨而景亦竒絶蔥菁䕶林岑憶我丁丑来把筆為剏吟屢来屢殊趣悟理則斯今飛来石飛来峰自梵僧識飛来石又誰所稱拳峙乍覩無翼至東西相嚮争峥嶸一之為甚豈可再此難弟彼亦難兄既飛来斯有来處試問来處為何名紫陽洞紫陽書院紫陽洞紫陽山下瑞石洞俗又呼紫陽洞康熈年間於其下建紫陽書院則因朱子以名之也雍正年間復因紫陽真人所居為立祠盖總以山得名耳一地居然得兩名為道為儒趨各異山何曽與辦分明觀潮樓曡乙酉詩韻南坍與北漲幻若谷和陵江南岸之近樓如舫以乘暢懐忘景間厪念在欄憑遥指中亹陸通流何日能閲水操誌事候潮門外觀潮樓閩省水師備閲視列營佈陣誠合宜搶風施銃皆精技履水如履平地安爬桅似爬墻梯倚撇捩騰掉逞雄强以此臨敵誰能抵己丑征緬因選精己丑出征緬甸因福建水師􅈺於駕駛攻撃乃令提督葉相徳選派二千人統領赴滇聴候調遣意謂目無全敵矣及至臨陣乃不然聞敵礟響先驚死盡欲泗水逺遁逃反累我師救而止福建水師徒有其名而臨陣殊怯是年冬阿思哈乘舟率健鋭營兵及福建水兵賊賊遇賊人抵禦乃福建兵一聞鎗響即欲泅水逺遁轉賴健鋭營兵管押救䕶可見全無實用師回重處示創懲今兹水兵仍昔彼不過演習為美觀譬之戲塲一劇耳水師本意豈其然節鎮侍前應悉此笑謂江寧将軍云汝水師更遜劇擬近於金山見鎮江水師較福建水師更逺不及矣賜大學士仍管浙閩總督三寳海彊浙閩重幕府簡猶難必也知大體寧惟期小安暴除難廢猛衆得允於寛節相權資理徐歸黄閣端賜浙江巡撫王亶望海塘正南漲柴塘費經營既弗差徭横去聲還資工作成安民先察吏用智務敦誠朂爾無多語直須繼父聲王亶望父王師曽任浙江江蘇撫藩頗著賢聲賜浙江學政彭元瑞江右兩名士彭元瑞與蔣士銓皆江西人同舉進士入翰林有文名而元瑞擢用至侍郎乃因奉職恪勤亦練逹政務非僅以詞翰受知也汝今為貳卿是因敦實行去聲非特取虚聲司此盛文處要當明道衡學脩民自化匪所重詞英題毛竒齡三詰三誤辨神州書覽共咨詢見竒齡序語三誤因之三詰頻浙水幾曽合浩瀚呉山未改聳嶙峋竒齡以舊志云錢塘故城在靈隐山下為非援引載籍以駁正之是也其考訂亦極博洽但江與西湖中有山以隔之自南屏至呉山一帶連岡不斷天然限制不能相通若謂在呉山之東潮又無可通江之路山勢聳峙千古不改此不待辨而自明者竒齡尚不免費辭矣迤東信藉塘堰固無地安能畚臿循竒齡又以舊志謂錢塘無地而有水為非亦駁正之誠是今據呉山考之則江湖必不能相通而錢塘城必不在靈隱山下安得有無地之説且果江與湖通為一片則當時築塘又何以施畚臿乎千古湖山自不昜竒齡還覺費詞真閲武祖制真垂逺杭州駐八旗鴻猷惟慎矣武備可踈之既練仍應閲雖安不忘去聲危未曽御弧矢弓矢為我朝凡閲家法即位以来每率侍衛等較射習勞武必親御弧矢示衆自壬午年臂痛雖馬射如故而罷歩射者十餘年矣毎追憶前事不覺恨然臂病久慙斯昭慶寺欲駐西湖蹕先從北岸游過堤門便入憶昔水同流如是金仙禮無須具帙搜閒窻五字詠静室一茶留春到松恒古風来竹亦秋前題石碑􅘧不忍更凝眸壬午詩有慈慶喜恒昭之句大佛寺題句黄龍洞及此皆鐫石佛像彼乃慧開修南宋僧此實思浄剏叶僧北宋言蹟固已古面相直逾丈在此不在彼大佛斯非爽雖然經有云色見聲求枉則我兹所詠去道逺霄壤葛嶺葛嶺向曽逺望之兹来親陟笑何為梯山架壑羅樓閣傍竹依松奏管絲遺跡空傳蘇守詠仙踪那辦葛翁祠殊吾觀海省方意弗為去聲嘉斯實慚去聲斯初陽臺初陽臺據葛嶺巔海日升時可憑眺雲棧峻挺費攀登四度来巡初未到臺據髙峻前四次南巡俱未躋陟兹大吏以便途為修治其事已成蹔登攬勝然實慙愧不當矣即今斫莽窮丹梯肩輿曽不勞陟躋吸華原鄙求仙術摛藻猶深責已思參寥泉用宋韓淲韻髯翁所名泉坐聴泉韻清爾時緬談禪有情還無情仍此澄澄色不斷泠泠聲色聲胥幻縁名何足重輕不必更言汲聊賞水木明即此寥天一吾更懐莊生夀星院四景用蘇東坡韻寒是竹聲籟拂扉碧是竹色粗轉圍髯翁曽此一憩息綸巾還著鶴氅衣此句櫽括東坡語色空與翁本無體爾時逸興應遄飛而何有識前生事西湖遊覽志載東坡守杭日入門即悟前身曽到歴言院後殿閣及山石之名無一遺謬云云盖偶然遊戲妄語非實有其事也是謂刻帖徒曽巴月右寒碧軒試問靈山泉有無一杯宛爾覩兹夫由来度在汝邉耳笑晋髙僧尚見盂右杯泉止捨樂斯定觀離苦自寧語雖傳白業理亦契黄庭二水江湖逺近之景登覽皆在目前常分碧䨇峰南北不斷青弗同蘇所悟却似列之泠右觀臺玉局真稱箇裏人興酣吟筆掃千軍偶然賡韻促歸轡佳處留連戒在君右此君軒瑪瑙寺有詠葛嶺之麓下寺稱瑪瑙云増華為結搆餙美太殷勤啇力彼民力寺在葛嶺下増餙頗華美詢之大吏云浙啇捐修然啇力亦民力以此誇靡求勝轉不惬余懐耳求欣吾不欣率多弗顧去方寸愧思紛題放鶴亭山隂為訪隱君墳放鶴亭存舊所聞宇宙一籠何有去和去聲鳴萬古亦堪欣鄙他明逺曽為賦祗此先生可作羣笑我山莊偶曽放避署山莊有亭亦以放鶴名山向曽題詠不同道也愧云云吟香别業本是勾留處是處本故督臣范承謨别業名勾留處自修葺後改今名後昜吟香所吟香豈其時田田未鋪渚白句邈以清苑業頽已乆叶葺修因大吏向亦詠之屢循名欲責實不免意為撫詣聖因寺瞻禮皇祖神御殿南巡昔嵗駐西湖神御爰留敬謁趨詎是聖情在遊攬都縁民莫切訏謨閲年十五兹重仰歴世百千賴永圖䝉業而安勵無忝持盈䖍鞏益䕫吾四題西湖行宮八景四照亭孤山勝處舊行宮髙下亭臺致不同獨喜奎章留額梠萬方民物照臨中竹涼處猗猗夾徑矗叢篁容裔煙光接水光我是萬幾無暇者那能九夏此乗涼緑雲逕孤山山眷自成蹊夹逕深林望若迷怪底行来衣履潤披雲尋緑藹淒淒瞰碧樓何必起樓嗤背山明湖當面挹披間静中忙笑搜吟者豈若水天上丁間貯月泉一泓玉乳貯山根印就銀蟾若可捫佈景問誰得寄想依稀猶道是江村聖因寺行宫後園相傳為康熈年間髙士竒所建鷲香庭春来新發葉飄蕭縱未花時花意標移得考功竺菴句天香鷲嶺豈其遥領要閣山環湖面鏡光開應接真教無暇哉設使弗能領要者隨他物轉豈如来玉蘭堂玉蘭仍自峙堂邉香色無䨇總净娟十五年前侍賞處不堪迴首意悽然題西湖十景四曡舊作韻蘇堤春曉十古長堤祗姓蘇牧民絜矩意殷吾春風十五重經面摘句能無愧此湖栁浪聞鶯聲中去聲絲而復中金聞聲難覔見於深聖湖浪接柔條浪暖勝北方早鎻林北方此時栁方佈葉林隂未鎻也花港觀魚惠莊空論知與否魚樂由来在港花大輅椎輪原即此玉泉踵事笑増華西湖新増之十八景中有玉泉觀魚曲院風荷風荷新牓易荷風曲院嫌他醉頰紅地本南宋之麴院而多荷故有麴院荷風之名康熈己夘荷風皇祖御題額易麴院為曲院為風荷言景文山趣真好李羣玉詩風荷珠露傾論名夏帝惡還同䨇峰揷雲倒影䨇峰儼若垂浮雲一片兩頭披武夷縮地為明聖不異虹橋讌客詩雷峰夕照半存窣堵浄慈北久矣羶薌夕照名影入玲瓏光上下當年想像八忩横三潭印月圍印千秋滿半輪前三三即後三身我来不見潭中影省辦非因與是因平湖秋月平湖新水碧扵油蘸入堤楊縷縷柔底更春秋較其月幾曽宵景一􅑀流南屏晚鐘幾暇搜㝠對硯屏霜鐘送響一聲聲鬢霜已改十年貌醒耳清音卒未更斷橋殘雪十景吟成興有餘斷橋無雪雪原如即看四字題名處三白何殊罨翠輿杭州孤山寺再用張祜詩韻䨇峯連逺岑一島入湖心不見當年寺徒吟今寸隂葺修較已富俯仰恧滋深吾意詎斯在在乎彼總林六一泉用韓淲韻偶閲韓淲集其名曰澗泉中有詠六一邈然懐昔賢将謂崖石際或有緑字鐫尋之乃久無徒以鈔本傳我適憑清冷思賡韓韻連及考其跡泯把筆増茫然陵谷雖屢變六一名不遷佛宮與禁苑見韓詩何異觀雲烟笑而弗迴顧佳境且問前題述古堂畺吏無端述古為栢堂竹閣重去聲成之柏難更見撑䨇榦竹昜移栽近萬枝㸃綴却嫌非樸素徘徊祇覺惹嗟咨宋蘇唐白溯而上未必二人首肯斯栢堂三曡蘇東坡韻以栢名堂事緬前於斯誰見栢喬然因知成有那無壊何必居今論昔年太乙宮寜非假相西湖志亦半真傳間来三曡東坡韻不異三幡畧説禪竹閣三曡蘇東坡韻竹閣即兹然否然香山玉局意猶軒翠筠萬古真朋友緑字兩言永子孫過客漫尋崖上句行人還指岸傍村春秋十六閲如水孰謂今重續韻言九里松蹟創自李唐千載以上亘靈竺所自入詎曰行由徑舊新各參半忘年友實稱翠葢影張宻雲門音奏競偶憩一字亭怡人古色映欲問十八公誰識袁仁敬上天竺一法喜寺巒谷溯懐抱行行越入深因之上天竺一禮古觀音大士無著相衆生有感心訛辭訂敏政疑案務求諶題法鏡寺三天竺以斯稱古塔矗神尼峯䕶蓮神尼塔蓮花峯皆寺後佳景成佛夢誰靈運後翻經詠憶樂天前夢謝亭翻經臺皆寺中古蹟尋竒恰值暮春節題額猶思壬午年寺舊名下天竺壬午南巡寺僧請賜額因昜今名㸃綴微嫌増昔麗地方大吏以其地為至上天竺所必經畧加修葺因成事不説亦姑聼之莊嚴本意豈其然詠三生石靈鷲山尋下天竺三生石宛後門通却傳昔友彼僧侣即是後逢此牧童莫訝改頭還换面何須賞月與吟風此語即牧童所歌云信然仍弄精魂漢見指月録未識内空内外空七葉堂口號初祖明留五葉詞一花開五葉初祖逹摩付法時偈語也忽増其二是誰為香山畧曉枯禪者何亦隨聲附和之西湖詠南宋事内湖外湖活􅀞披南山北山明鏡􅂻開封失守遷以居棄置中原如弗視長江為塹姑恃防處堂燕雀聊堪比偏安民物置富饒君臣胥忘卧薪矣朝歌夜絃詡昇平春遊秋賞窮奢靡即今峯凹水之裔往往行宫見遺址名園弗可屈指數而胡秦賈亦效此湖山一時之幸耳然其不幸應在是孝宗可謂盡奉養何乃身逢不孝子秀王本生太漠然矯枉濮王過正爾沈氏日旦有佳評寜獨責賢實至理按沈長卿著沈氏日旦云宋孝宗之事髙宗也嵗朝太上皇於德夀宫時節從幸聚景園七十八十逓加尊號服三年喪不變此特問視之常禮哀戚之恒情耳胡遂以孝謚耶至秀王為孝宗本生父在御二十七年不一加尊號張夫人為本生母薨僅成服後苑何其薄也光宗之事孝宗併常禮恒情不存矣自紹熈三年間六朝重華宫而後夀皇疾不問大漸不赴成服不哭羅㸃引裾諫而留止肩輿遁去豈孝宗粉餙彌文乏真誠以動厥子耶所論得情理之平非獨責備賢者苛求於孝宗也因感西湖南宋時事并及之湖心亭誰云無地起樓臺無地樓臺鏡面開到必以舟限塵逺坐當忘物是雲来両峯西峙惟天近三塔南浮倩月倍白髪較添鬚尚黑撚吟今昔底殊哉漪園西湖何處不清漪圍作池園因額之乙酉南巡始見此園盖倚山占湖而為之因賦詩云一園倚南嶺十畝占西湖亦紀實也一棹不妨重濟勝七言耐可乍宜詩鳥銜䔩䔩紅花片魚避垂垂緑栁絲早慮侵尋占湖面有闗水利戒頻為西湖十里漣漪魚鰕菱芡之利取攜誠所不禁而民間侵占湖面或作水籪或為葑田或圍為池園設過行潦必致無所容而反虞泛溢則水利所闗不可不防其漸曽於乙酉南巡時諭令禁民侵占云浄慈寺瞻禮有感曡乙酉詩韻依然古寺枕湖涯為憶前巡此祝釐顒願九旬延聖算豈期一旦别仁慈亦知是處應忘念難對斯時弗溯思鼉鼓鯨鐘喧梵貝聼之總覺不相宜詠雷峯塔中峯迴暎浄慈峥僧院顯嚴舊有名白業廢頺非昔觀去聲黄皮突兀至今撐詩詞誰繼林和靖圖畵猶存莫景行窣堵漫嫌留半截應知全體箇間呈小有天園小有天園吾所名既窈而深復明浄别後忽忽十五年儻此重臨宛熟徑為堂為閣為林木一一含暉碧波暎入幽得逈復開豁眼底西湖呈逺鏡循名那復無情㑹而實非因暢吟興譬之人心祗方寸中有天焉呼吸應操之則存舎則亡吉凶所闗在敬勝園較方寸斯大矣游衍敢忘曰旦詠虎跑泉再曡蘇東坡韻石罅噴花雪飛上跑傳有虎威靈仰性空大徳既居之何愁無水煩神掌古藤喬木蓊蔚間重来試一聼清響玉局險韻一再賡亦曰非想非非想開化寺月輪山頂開化寺建置傳因南果園開化寺本呉越錢氏南果園宋開寶三年僧延夀開山建六和塔以鎮江潮紹興間僧智曇重修幾度廢興法如是一時瞻禮佛無言浙江永鎮潮和汐南海同恭風與旛廣州南海光孝寺初名訶林梁天監元年智藥三藏自西竺國移植菩提一樹於壇前唐儀鳯元年六祖慧能祝髪樹下因風颺幡一僧云旛動一云風動六祖曰風旛非動動自心耳後人於此建風旛堂至南宋改為光孝寺少坐便應移蹕去欲勤實政異空門瞻禮六和塔作六和四度臨兩登辛未丁丑罷其兩壬午乙酉况閲十五嵗七旬年已長何必學少者言登斯技癢然吾别有㑹登取一時賞弗登意無盡江天原豁朗豈係百丈髙試以昔題想初地此堅固二諦俱融象三明通浄域四諦羅寳網五雲扶盖聳六鼇負戴奘七寳莊嚴畢以上七層匾額皆辛未初登所題共演舌長廣登乎弗登乎且詠詩瞻仰雲棲寺三曡舊韻一律一徑入深萬竹青洗心奚藉有溪亭已知古佛坐而待寜在梵經誦以聼本分僧規喜淳樸不塵山色鎮凝停董家真蹟欣重展寺藏董其昌書金剛經真蹟毎臨展閲於今五度云怕撫知他筆擅靈理安寺溪澗迴環徑不寛到來精舍暫盤桓泉臨法雨毛髪鑑閣坐松嶺衣袂寒法雨泉松嶺閣寺中二景也唐宋遺踪頗可考人天顯應漫從開理安傳自理宗定其代偏安理豈安賦得春風扇微和得巡字八韻浙省召試題淑景方迴律東風正扇春冲融微送暖澹蕩恰依旬雖具吹嘘午全殊栗烈晨天心昭愛育物意暢和誾悠颺含生卉動揺觧凍淪能言繞樹匝自舞歩檐巡催放非催謝冶新亦冶陳常懐管仲語欲擬被諸人丁家山口號尋勝宛来勝處停依然石白與蕉青底須賓主較形似假相去聲何妨寄所丁龍井八詠過溪亭不過原来有溪在過而弗覺并溪無前三三後三三者應笑今朝又過吾滌心沼泉能為滌心為所心所泉能兩孰真欲起辯材作轉語滌之一字屬何因一片雲雲依石則石為主石似雲斯雲作賓箇裏由来無定法打成一片是何人風篁嶺横嶺中分南北雲篔簹夾道翠氤氲經過不覺衣裳濕清籟猶從天半聞方圓菴述古何須稱辯材笠菴聊爾與徘徊天圓為覆地方載試問誰能出此哉龍泓澗乳竇淙淙出石罅石欄圍處作天池適来谷口看飛瀑誰識㵼從脚底斯神運石傑立昻然似偉人運来聞説力由神東坡被服夫子者不語可曽此辨真翠峰閣層甍逈據最髙峰十五年重此蹟蹤依舊青山緑水裏去来今者覔何從留餘山居山居南山隂松竹何森森熟處自難忘乗門聊一尋植物既瀟灑峙物仍林岑時有激湍鳴盖縁静不禁曲中宛得路塵外足暢襟繹兹両字題悠然獲我心應為窮理思詎祗攬景吟登鳳凰山澄觀臺作歌鳳凰山今杭城外宋代却在禁苑中爾時偏安忘恢復嬉遊泛索多行宫屢經兵燹率頽廢斷垣破礎猶或逢乙酉之春南巡浙大吏綴景稍興工成事不説因亦聼究之總覺欿於衷髙臺澄觀我所額江山勝攬豁心胸訝到水晶宫觀表乙酉登澄觀臺之句昔年清興㑹以重呉興真有子昻蹟罷往恐妨桑與農湖州有水晶宫古蹟即郡城南樓也因趙孟頫溪上玉樓樓上月清光合作水晶宫之詩得名孟頫並自號水晶宫道人予舊題此臺以水晶宫相擬故附及之先是地方大吏以湖州太湖漊港闗係數郡水利臣民盻望臨幸指示本欲允之前嵗秋浙閩總督楊景素入覲以圖様呈進計程應多數日且聞縁道有礙農桑遂罷其説而漊港之水利則令􅔜督撫率屬安為濬治慈雲嶺梁時興建識涒灘十六年過此重去聲觀為憶曩時兹掖輦愴然俯首秪餘嘆敷文書院三叠舊作六韻乆矣别書院重修時對文載咨爾多士何以稱去聲尊君值此興學際應思課讀勤虚車凛有戒實地鄙無聞雅正原非餙清真不貴紛他年棟梁器兹日蒯菅羣清漣寺觀魚四叠舊作韻依舊清漣寺别来十載餘迅誠莊夢蝶知笑惠論平聲魚乍凭去聲奩開鏡還欣檻倚裾泳㳺随所適潛躍任其如物意叅理趣新題接舊書鱗中足智者誰試釣竿歟紫雲洞黄龍洞帯左棲霞嶺右牝洞居然據路中未可鳴鞭過弗入春風坐似拂秋風黄龍洞山陽迤邐至山隂古洞黄龍此重去聲尋巒谷峭間歩由迥竹松森處望延深依然石佛禮當面何有金經悟入心移自呉興慧開剏見西湖志徒遥題句罷登臨宋淳祐間有僧慧開初説法於呉興之黄龍山後卓錫於此洞因得名洞中石佛髙二丈許相傳即慧開所鑿呉興雖有慧開古蹟今既罷吴興之行僅惟遥詠耳飛来峯四絶句西天竺與東震旦大地三千一掌平宇宙以来便有此寜資慧理始傳名􅌑瓏峯裏﨑嶇棧熟路之中展歩尋以世語形容弗得虚空體現妙明心嵌巖梵像無央數聞説鎸成自大元西湖逰覧志云壁間布鐫佛像皆六代遺蹟而傳聞以為元梵僧扎穆揚拉勒第所鑿扎穆揚拉勒第發掘南宋陵寢且以貪淫獲罪其遇惡園多盖由元季袒縱梵僧所致至鑿佛石􅑐其善縁亦不可設也扎穆揚拉勒第􅃇作楊璉真伽今譯改福業禍因齊置却景増萬古䕶秪園岰㠡竒峰烘翠烟緩尋詭徑意祺然閲兹常住威光裏彈指頃過十六年題靈隱寺靈隱昜雲林奎章嵗月深寺舊名靈隠額即皇祖南廵時昜名雲林寺御書也名從工部借詩憶考功吟詎必頻賡韻那無一寫心偷閒成五字佳境向前尋四和皇祖靈隱寺詩韻峯八飛来路玲瓏復﨑峨即看佛宇富應識祖恩多春物鬯階卉山雲潤壁蘿豈期十五載仍此一相過韜光菴再叠舊作韻重尋幽谷入筠林歩歩非塵得得深佛宇不期行以到詩情相與酌而斟松聲泉韻近宜聼山色湖光逺豁襟此是天龍一指處去来今那覔從心逰普圓院永福資嚴屢易號兹仍溯始普圖稱峯標石筍陵雲獨泉冽金沙落磵層蘇子瞻趙閲逰蹤尋已冺屠隆徐𢎞基題額見何曽重看修葺供吟眺未識予心益愧増按此院開山於劉宋元嘉時至石晋天福間顔為普圓院又名資巖南宋咸淳間改為永福寺資巖無所取義寺何資於山巖乎意謂西湖志誤書嚴為巖遂以訛傳訛耳盖父謂之嚴君作寺者必因資其父之㝠福遂以資嚴名寺耳且雷峰塔下别有顯嚴院亦即作寺者取顯揚其親之義足為資嚴誤巖之証雖梵書有莊嚴之語但單書嚴則不成文佛以慈為本無所用嚴也因為訂正竝識於此杭州啟蹕迴鑾之作勝逰亦戒泥㽞情適可言旋啟蹕旌九日快情一夜雨幾章清詠二編成南巡時率以三本書之自京起程為一本自入江南至西湖逰畢為一本今自杭州迴鑾則第三本之首篇矣山明水秀誠欣我蠶事農功恐誤氓籌度柴塘教易石入浙江境即先至海寜閲視塘工見繞城石塘内有工二十餘丈及杭城東老盐倉處有柴塘四千二百餘丈雖現在完整然究不如石塘之鞏固命督撫據實勘估改建石塘俾濱海羣黎永享安恬以副予先事務籌保愛元元之意斯實巡浙第一要務也保民計不負兹行雨三月十三日南國多逢雨時晴是此春江浙素多春雨今嵗自入江南境即時雨優霑至蘇州乃晴将及旬入浙境復得優澤至杭州又晴将及旬兹於啟蹕迴鑾前夕復被渥霖至今日卓午方止傍晚遂快晴優霑已盈尺及節正依旬佳處罷遊務良田起墾畇更因望齊冀渥澤可叨均晴春両既優渥春晴亦載陽苗而秀滋麥柔以穉宜桑川路徐輕櫓陌谿出懿筐勤劬逮婦子誰曰樂江鄉嘉興道中作去時桑葉未抽齊返棹桑隂緑覆低正是蠶忙此鄉最未宜歸舫更教稽填潭積土有諧傳茶禅寺呉越時為保安院宋改景徳禅寺又名三塔寺壬午南巡時賜今名相傳寺基為潭不利行舟来往唐僧行雲填土起塔鎮之因以名寺土人相沿之説如此三塔而今尚峙然僧侣向曽迄題額與名遂舉趙州禪龍井昨纔述橋事嘉禾今復識堂名蘇軾訪文長老嘗三過湖上汲水烹茶後人建堂因以三過名之在府城西南再斯可矣三仍在玉局居然未忘情已収宿雨烟未泮寫景傳神更詠詩今日晴明異名實直教舟過恐程遲欽定南巡盛典卷十七
