body:
  text: 河防乾隆四十三年五月初七日河道總督薩載奏言竊臣於本月十七日奏覆黄水並未入運及髙家馬頭現在情形一摺兹於二十五日奉到硃批已有㫖了欽此摺内黄河改從陶荘繞北下注句上奉硃批幸而改流不然此番必致入運矣欽此又亦未漾至恵濟祠句上奉硃批慰欽此並接到乾隆四十三年四月二十二日廷寄欽奉上諭據薩載奏黄河改從陶莊繞北下注向東直趨距清口東西壩已逺是此番雖遇連日東北大風黄水不過抵至桞園頭而止不但未曾入運亦未漾至恵濟祠地方等語覧奏稍為慰懐若非前年諭令疏挑新河俾黄河正溜繞北東注此番東北大風黄水不但倒漾且必致入運是先事預籌已有成效矣至所稱目下出口之水尚未暢達僅能刷出河泓所長嫩沙未能即時刷浄湏俟淮水長發暢流下注自可全行刷浄等語淮水長發難以預期時日恐不足恃現在正當重運北上不宜稍有阻滯且髙家馬頭一帶所長之淤及其尚嫩時加工挑挖亦易於為力著傳諭薩載等即遵前次發去圖内硃批㸃誌處董率㕔營各貟多集兵夫將嫩淤速行挖净俾河流䟽暢并可将挖出之土由河内船運至順黄壩根以為壩内填土之用即或用帑稍多亦不致如前嵗開挑引河之費并可令無業貧民藉資餬口亦以工代賑之意将此由五百里發往並諭髙晋知之欽此臣伏查清黄交滙處所前遇東北大風黄水抵至桞園頭因距清口已逺是以不但未曾入運亦未漾至恵濟祠地方此實仰頼聖主諭挑陶莊新河俾河流繞北東注不致倒漾之明效大騐在工文武官貟莫不感頌睿算先㡬中心悦服其髙家馬頭一帶業已刷出河泓重運可以挽渡惟两旁積有嫩灘水内爬澇未見著效雖俟淮水一長清水暢流自可全行刷浄但水長之期遲早難定目下漕船北上攸闗𦂳要必湏設法疏通以利舟行以復河道臣接奉前㫖後當将實在情形及籌辦縁由繕摺由驛具奏恭請訓示一面董率道將㕔營遵照圗内硃筆㸃誌四處派委員弁調集河兵堡夫幷僱民夫四百名分段挑切帶水捞挖為得尺進尺之計幷於嫩灘面上酌抽溝槽以備清水下注沖刷惟該處在桞園頭一帶尚為黄水所到之地水到而沙復停是以驟難見效兹復欽承諭㫖令將嫩􅌎速行挖浄即或用帑稍多亦不致如前嵗開挖引河之費幷可令無業貧民藉資餬口仰見聖訓周詳重工愛民至意臣惟有恪遵指示實力辦理斷不敢恃清水能刷稍存觀望之心亦不敢因人力難施稍有惜費之見現在駐工督辦加添人夫趕𦂳疏挖以冀逐漸挑除河流通順庻可仰慰聖懐奏入報聞乾隆四十四年正月十九日河道總督薩載奏言本年洪澤湖清水㣲弱出口下注散漫無力仰䝉皇上睿謨廣運頒示河圖並奉諭㫖清水出口以後經過恵濟祠下其對面舊黄河尚存清水至此不免散漫減力因用硃筆標記若於此築堤一道逼令清水直注庻可資刷黄之力等因欽此七月内大學士督臣髙晋來工㑹同查勘維時普面皆水測量硃筆標記築堤處所水深四五尺不等恐填築土堤而两面皆水難資穏固擬於西壩下老灘之上接築土堤一道長一百一十七丈直至水邉使清水順流東下並於新河南岸褁頭處冄接長一百五十丈俾黄水直達下注於七月十四日將勘籌辦理縁由會摺奏請聖訓並將原圗恭繳嗣准廷寄欽奉上諭實在形勢若何難以懸揣且照所奏辦理俟庚子春南巡時親臨閲視冄為定奪䓁因欽此嗣因洪澤湖清水接續加長西壩下老灘普面漫水其新河南岸縷堤褁頭迤下新淤亦經清水刷去所有前次擬接两處堤工未經築做臣往來工次隨時留心察看恵濟祠下對面舊黄河身前於伏汛内黄水盛漲之時蕩漾停淤自交十一月以來水勢陸續消退灘土顯露直接下首老灘前奉硃筆標記築堤處所現在灘髙水面二尺四五寸不等挖探淤土已經乾老形勢較前大不相同仰見聖主智炳㡬先指示機宜實在有所遵循在工文武無不同深欽服目下灘土雖已出水若無土堤攔禦將來伏秋水長仍復漫灘與黄河之水連成一片清水究不免於散漫自應乗此機㑹欽遵前奉諭㫖即於灘面築做束水堤工一道自新西壩起直至新河南岸縷堤止就灘勢髙低築髙自六尺至一丈二尺不等頂寛二丈一律夯硪堅實不但清水出口以後徑直暢注可無㪚漫之慮即攔黄壩外添此重門又可為陶莊新河之保障臣與大學士督臣髙晋往返札商意見相同隨督同道将等覆加籌酌逐細確估計長六百九十餘丈共需土方銀四千二百餘两即趂此水小時𣲖委幹員給發銀两趕𦂳築做勒限來年正月内完工以束清水以資鞏固奏入報聞乾隆四十五年三月二十日两江總督薩載奏言竊臣前至清口將勘過黄河情形繕摺具奏後并將河工諸事料理完畢即自清江轉囬恭迎聖駕兹於初九日渡江正在儧行間接到乾隆四十五年三月初八日廷寄欽奉上諭據阿桂奏稱自豫省來浙經過淮徐一帶查勘陶莊引河两頭已寛至九十丈其中段僅寛六十餘丈河身雖已刷深但水勢被束不能大暢且将來伏秋大汛倘水來猛驟恐一時宣洩不及若將河身能通行開寛四十丈俾一律深通汛水便可期暢注等語所奏自屬應行辦理之事現在已令阿桂前往該處㑹同薩載查勘後即行回京薩載再來據實面奏如果應行辦理並速派委妥員興工挑挖務於四月内全行趕辦完竣約計朕回鑾經過時可以辦得㡬成並著薩載㨿實覆奏將此由五百里傳諭薩載並諭陳輝祖知之欽此仰見我皇上念切宣防以期汛水暢注之至意臣自當悉心籌畫妥速辦理伏查黄河汛水長發來勢驟猛河身愈寛則宣洩愈暢此亦自然之理江南黄河因限於地勢較豫省黄河本窄葢自徐州起已莭莭被束不僅陶荘新河一段然該河於乾隆四十一年開挑時河頭只寛四十丈河身寛三十五丈挑深一丈至一丈五尺不䓁自開放以來逐漸沖刷寛深今河頭已寛至九十餘丈河身寛至六十餘丈中泓水深二丈五六尺至三丈不等四十一二两年汛水發時宣洩甚暢即偶逢盛長而上㳺两岸則有毛城舖蘇家山峯山閘祥符閘亦莭莭可以分洩不致因河身稍窄壅遏為患此南河現在通體情形今大學士公阿桂以陶荘引河中段僅寛六十餘丈恐汛水驟猛宣洩不及請将河身通行開寛四十丈俾一律深通以資暢注洵與河防有益查該河南岸逼近清口只有北岸可以展寛但目下已届桃汛河水正大若從旁施工挑挖必得寛留故界攔禦於工將竣時冄為啟除庶免風浪汕刷是此時興挑應湏相度形勢慎重方可収一勞永逸之效臣現即馳囬清口先行籌度俟阿桂到後㑹同詳加履勘如能趕四月前完工不致為汛水漫淤即一面遵㫖確估派員興工趕辦一面繪圗㨿實奏聞臣冄遵㫖趨赴行在奏入上諭曰是不必自行逥䕶亦不必迴䕶阿桂汝二人皆曉事之人縂期於事有濟可耳乾隆四十五年三月二十四日大學士公阿桂两江縂督薩載奏言竊照陶荘新河口寛身窄應湏挑展之處臣薩載前於鎮江途次接奉廷寄諭㫖當即馳回清江查辦業經恭摺奏覆臣阿桂於初九日自浙起程路過蘇州傳㫖令吳壇隨往勘辦於十六日行抵清江即與臣薩載藩司吴壇同至陶荘将該河頭尾中段逐一相度勘量自順黄壩起工處至壩尾裹頭處計長一千零六十丈頭尾河面各寛七十餘丈河身寛六十丈内外不䓁中泓水深二丈餘至三丈不䓁此河自新開至今數年以來漸次沖刷雖較初挑之始業已寛深而北岸土性膠結現在河身寛止六十丈内外今黄流復故若於北岸展寛四十丈使河身通寛百丈将來汛水偶遇盛漲之時用資宣洩自屬大有禆益惟臣䓁詳加履勘河頭北岸迤東原挑集土之外臨河縷堤距河身水面只有三十丈該處河面寛六十五丈若加寛三十五丈以符百丈之數則應挑至此堤之外另築新堤此時似可不必破堤辦理臣䓁就現在形勢公同冄三斟酌擬扵此處堤内留土十五丈挑土十五丈連有水河身共寛八十丈将河身現寛六十餘丈者挑展十餘丈不足六十丈者挑展二十餘丈則河勢已屬通身寛展即偶有盛漲可兾無虞以仰副聖主厪念河防之至意臣薩載督同縂兵銜副将徐建功叅将髙聖竒及㕔營各員逐加確估牽折計筭共湏挑土十一萬七千餘方估需銀一萬二千八百餘两派員集夫上𦂳趕辦務期四月内竣工聖駕臨幸之時約可有四五分工程所有臣䓁㑹勘陶莊新河㨿實估辦縁由理合繪圖貼説恭摺奏聞冄臣等查得新河頭迤上北岸舊有灘嘴前奉硃茟標記臣薩載遵照挑挖引渠一道原以放水通流後使之自行刷去因溜走南岸該處仍屬淤灘今臣等察其形勢細加商酌擬於南岸第三架木龍以上改建挑水壩一座長三十丈寛八丈将大溜挑逼灘嘴則北岸嫩灘自可日益刷去南岸順黄河壩一帶可望漸次停淤以資外䕶似扵新河更為有益臣阿桂與藩司吴壇相度形勢自應如此辦理連築壩臺估需料土夫工銀二萬一千五百餘两臣等勘估加展陶荘新河事畢即同赴雲梯闗外查勘黄河尾閭情形合并奏聞奏入上諭曰好如所議行乾隆四十五年三月二十六日大學士阿桂两江縂督薩載奏言臣䓁遵㫖前赴雲梯闗以外将黄河尾閭入海情形㑹同遍處履勘測量查得二套三套近年漫口由北潮河入海之處㨗近而水深其現在經行河道海口紆逺而水淺均與臣阿桂前此面奏情形無異臣阿桂臣薩載因與藩司臣吴壇往返詳細商酌如果黄河現在經由之四浤以下海口大有淤墊之勢尾閭不能暢達必湏另籌入海道路則取㨗就下舍北潮河别無他途但現今河流順軌其通洋海口落潮水定時雖比口内較淺而雲梯闗以外水面比两岸尚低丈許海口外灘比現在水面又低數尺寛至三百六十餘丈是河水歸槽之時安流東注尚無壅遏之虞自無庸亟籌更易海口之舉但或遇大風盛漲洪流湍駛一時不及暢洩則從前連次漫口處所不能保無復溢若将漫口堤外現有沖出河形處所畧為通其淤滯俾漫溢之水自行循途入海則盛漲可資䟽消於上㳺各處河工不為無補至已堵漫口既難保無復溢可否仿照王營減壩之意添建閘壩以資啟閉宣洩臣薩載再行細勘堤下土頭淤沙深淺俟新任河臣陳輝祖到後㑹同熟籌奏明妥辦臣等謹繪圖詳細貼説恭呈御覧又查二套堤外從前漫水之東直至海邉均係阜寜安東海州等處減則灘地及葦蕩營産蘆蕩地間有淤沙溝槽形迹並無防護堤堰漫水之西淤沙較厚舊有之南潮河上段業已淤平又西則係已涸之馬港河有夾河殘缺舊堤二道堤之南頭均與黄河北堤相接其東堤長六里零其西堤長二十九里零迤下無堤空檔長十六里零下接北潮河西岸民埝此堤之西俱係安東海州䓁處民田臣䓁冄四商確馬港河西舊壩雖在雲梯闗外十數里但其上㳺即係腹裡民田毎遇盛漲漫溢時即倒漾至雲梯闗以上且該處只有木牌樓一座鐫刻古雲梯闗四字並無内外界限若将此堤殘缺處所修復並将無堤之十六里一律補足下接北潮河西岸民埝則自雲梯闗北堤下逮通海潮河堤堰連為一縷既可保衛安海䓁處上㳺民田偶遇盛漲時溢出之水不致浸漫俾濵臨河海民人得享樂利之休並可作為雲梯闗内外界址其堤東之海灘減則地畆悉遵照二十九年諭㫖不必與水争地聴民隨宜耕種以収自然之利似於河防民生均屬稍有禆益奏入上諭曰所奏修復馬港河西堤殘缺之處及接築無堤處所聫至北潮河西岸民堰以禦倒漾自應如此辦理其二套以下由北潮河入海之處既係路㨗勢順設遇漫溢正可分洩盛漲俾尾閭益得暢達轉可不必添建閘壩雲梯闗以外原不必與水爭地今二套以下既為分洩盛漲之區則馬港河堤東灘地即不能保無漫溢其應徴減則地畆錢糧著交薩載䓁查明奏請加恩豁免乾隆四十五年四月十五日協辦大學士吏部尚書嵇璜两江總督薩載奏言竊臣䓁奉命查勘徐州城外應行添建并加髙石工仰見我皇上慎重河防保衛民生之至意臣等遵即前往於十二日抵徐州隨週履該工上下查勘縁徐州居江南黄河上游北岸居民稠宻南岸𦂳靠府城黄河至此一束河面現寛八十餘丈大汛時甚闗𦂳要城外舊有石工三段長九百七十三丈五尺自乾隆二十二年仰䝉聖駕親臨閲視指示増建石工四段計長一千五百六十八丈與舊工相連徐城一帶深資保障惟石工頭迤上至韓家山尚有空檔四百五十丈向因外灘尚寛未曽接做石工只有堤堰欄禦亦甚卑矮近年河勢漸向上堤大汛漫灘之水直至堤根該處在於徐城上首外髙内窪汛水長時既已漫至該處此一段並無石工與徐城全局實有闗係臣䓁悉心籌度若將該處一律接築石工則自韓家山起至奎山一帶全資衛䕶冄舊石工長九百七十餘丈較之乾隆二十二年新建石工原矮二三層不等前年黄水盛漲時舊石工僅出水數寸間有與水相平者應請将舊工分别加髙二三層與新工相平更可無虞冄石工尾段自梓潼閣以下為溜勢掃灣之處石工之外本有桞草壩數座挑溜并有石磯嘴一段計長五十九丈五尺毎年抛填碎石以資攩䕶甚為有益今碎石漸向外游亦應加添鞏固臣等隨檢查乾隆二十二年添建石工估冊用石十七層下簽樁木上砌條石此次添建石工應照從前辦法亦以十七層為度惟𦂳接韓家山山根一段長二十丈地勢稍髙只湏砌石十二層即可與十七層相平所有現擬添建并加髙石工以及抛填碎石加築尾土臣等逐一勘明酌定即督令叅将李永吉等詳加估計共約需銀九萬二千餘两理合繪圗貼説繕摺覆奏恭請聖訓如䝉俞允交臣薩載㑹同河臣陳輝祖冄加核實題估幷派委妥員採辦石料俟運到若干即令承辦之員将加髙工程先行儘數儧砌隨到隨辦以禦大汛其接築空檔石料并飭陸續採辦運工接築統於來年四月以前務期全竣從此徐城永資保障濵河億兆感沐皇仁更無極矣奏入諭依議行乾隆四十五年六月十六日两江總督薩載奏言竊查洪澤一湖週圍四百餘里承受淮水來源較廣毎年伏秋汛水長發雖大展清口使之東注酌開五壩資其旁洩而盛漲時髙堰誌樁仍長至一丈三四五尺不等勢甚浩瀚全仗髙堰山盱二㕔磚石工程為之抵禦髙堰㕔汛内有卑矮者六段山盱㕔汛内有卑矮者六段上年湖水盛漲時此數段磚石工程髙出水面一尺四五寸及二尺餘寸不等風浪堪虞頗費搶䕶臣上年與前河臣李奉翰悉心商確必得將此卑矮段落一律加髙庻足以禦風浪冬間臣進京陛見曽經繕摺繪圗奏請聖駕南巡時閲視指示欽奉硃批届期面奏欽此臣回南後即􅉽員将卑矮各段詳細確估按其出水尺寸加髙磚石一二層不䓁幷眉尾土工髙堰㕔汛内核實估需銀九千六十餘两山盱㕔汛内核實估需銀九千二百五十餘两今逢聖駕臨工閱視臣謹繪圗貼説恭呈御覧如䝉聖恩俞允容臣與河臣􅉽委妥員採石燒磚興工辦理俾資抵禦則金堤永資鞏固濵湖億兆更沐鴻庥於無既矣奏入報聞乾隆四十五年八月初十日两江總督臣薩載河道總督臣陳輝祖奏言竊照今春㳟逢翠華南幸荷䝉聖駕於囬鑾時親臨髙堰武家墩閱視洪澤湖磚石工程令臣薩載将石工卑矮段落確估加髙其原舊用磚成砌各工均令改用石料修砌俾臨湖大堤通身全改石工永逺鞏固以為淮揚數郡民生捍衛仰見聖慈恵愛黎元至深且逺臣䓁欽遵訓示自當熟籌妥辦查武家墩地方為髙堰㕔工頭裡河㕔工尾裡河自濟運壩起至髙堰㕔交界一帶亦係磚工但湖水至此由太平引河下注並非臨湖要工亦非犯風之所且磚工係乾隆二十二二十七年两次恭逢聖駕南巡閱視指示新建之工尚在堅整足資抵禦又洪湖北岸吴城一帶舊有磚工係外河㕔所屬為攔禦張福口引河漫灘之水此二㕔磚工均非湖内𦂳要工程自可毋庸一併改辦以莭糜費今䝉聖駕臨幸閲視指示處所應自髙堰㕔工頭起向南至山盱㕔蒋家壩工尾止凡有石工酌量加髙磚工改石以為全湖保障臣等隨督道将等逐一確估去後兹據河庫道何裕城淮揚道荆如棠副将李永吉㑹稟洪澤湖磚石工自髙家堰武家墩汛至山盱蒋家壩南工尾止通共工長一萬七千一百九十八丈内舊有石工應行加髙者九千一百三十六丈一尺磚工改砌石工者五千七百七十一丈七尺連山盱㕔屬淮徐二汛堤身窄矮處加估帮培土工通共估需工料銀三十三萬二千餘两臣䓁覆加查勘確核所估尚無浮多臣等又復冄三籌酌堰盱二㕔臨湖石工仰䝉皇上不惜重帑大加興修必湏慎重辦理以期永資利頼查現在擬辦各工工段綿長若同時興修不但購運石料一時不能齊全並恐趕𦂳辦理工程易於草率且磚工内尚有完好者此時一概拆改亦覺可惜臣䓁擬将已經朽壊應先拆改之磚工及正當湖心之卑矮應加石工並堤身卑薄應行加髙帮戧之土工均列為急修計需銀十四萬三千四百餘两即於本年購料動辦至磚工内雖間有􅀈朽而根脚尚未摇動及卑矮石工之不甚犯風者均列為次修需銀十二萬四千五百餘两留於明年動辦其餘應行改石尚未朽壊之磚工及石工稍為卑矮并應一律加髙者約需銀六萬四千餘两統俟後年修砌如此分作三年辦理則興作既可舒徐而工程亦得實在臣等商定後隨酌派妥幹人員将本年應辦工程土工即為領銀趕辦其石工先行領銀購買灰石樁木各料務於十月内到齊騐明上𦂳修砌如至冬寒氷凍灰漿凝結修砌恐有不堅即暫停工作一俟開正接續儧辦統限二月内完竣臣䓁俟開工後仍督同道将上下往來查催稽察務期如式堅實以仰副聖主保衛民生之至意至徐城加髙添建石工估需銀九萬二千餘两前經臣薩載㑹同協辦大學士尚書嵇璜勘明繕摺奏䝉聖鍳今洪湖石工復經估定現飭各道造具確冊分案照例題估奏入報聞欽定南巡盛典卷四十七
