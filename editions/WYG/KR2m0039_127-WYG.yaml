body:
  text: 奏議乾隆二十一年十一月十七日江蘇巡撫莊有恭奏言准户部咨乾隆二十一年閏九月二十六日奉上諭朕明春巡幸江浙所有供宿頓次皆出自帑項絲毫不以累民苐扈從官兵以及外省接駕人等輻輳雲集經過地方錢米價值恐一時或致騰踴著將運京銅鉛兩省各截留十萬觔添爐鼓鑄減價發賣並将該二省應運本年漕粮各截留五萬石減價平糶以裕民間食用欽此仰見我皇上省方觀民嘉恵東南之至意除截留漕糧現在酌核派撥外至錢文一項上年臣經奏奉俞允於寳蘇局加鑄一十四夘并收買各爐頭工料錢文凑濟現存局加夘錢四萬七千六百餘串又收買各爐工料錢一萬六千六百餘串又蘇局額鑄餉錢除搭放兵餉外尚餘錢二萬五千餘串通共存局錢八萬九千餘串查乾隆十六年翠華南幸各州縣共止兌發錢七萬五千九百餘串核計現存局錢較上届已属有餘無庸再行加鑄所有恩諭截留江省銅鉛十萬觔似應仍聴運京以濟户工兩局鼔鑄之用奏入上諭曰如所議行該部知道乾隆二十一年十一月二十一日内務府奏言查從前凡遇皇上駕幸木蘭等處臣衙門所有備帶物件應需擡運者向由各該處僱覔民夫抬運毎夫一名行程日支銀一錢三分住宿日支銀一錢歴来照此辦理惟乾隆十六年皇上巡幸江南經總理行營大臣奏准凡有抬運官物之夫自京至順河集仍由臣衙門僱覔應用其自順河集過河即交巡撫備辦前次該地方官所備民夫甚属便利且派有佐雜沿途管押抬運一切無悮苐查臣衙門廣儲司等處毎次需用抬夫由京僱往向係夫頭包攬各處凑僱多有匪徒混入長途抬運難於管束易生事端臣等酌議嗣後凡恭遇皇上巡幸自京起運所需抬夫均照南省備辦之例交沿途地方官僱夫抬運派員管押俾抬夫一項盡歸地方官就近備辦庶抬運彈壓俱属利便自無生事貽悮之虞如蒙俞允嗣後凡恭遇皇上巡幸俱由臣衙門預行移咨經過該地方官一體遵照辦理奏入報聞乾隆二十一年十二月二十日大學士公傅恒等奏言明春皇上巡幸江浙共需駝九百隻前次交與直隸喂養駝九百餘隻俱趕赴甘肅現在京城所有駝三百餘隻不敷應用經臣等議得武備院等處應用駝隻俱交與該衙門移㑹直隸方觀承酌量或僱車或僱騾需用之處具奏行文續因太僕寺䭾載黄布城需用䭾二百七十隻或用官駝或用民駝需用之處䕶軍統領等請示臣等經臣等查得若用官駝必須以符駝隻之數派章京三十四員牽駝披甲三百五十八名伊等應得賞銀盤費帮銀合計一萬四千六百餘兩若僱覔民駝需用駝二百七十餘隻兩個月整價銀按日各三錢兩個月一半價銀按日各一錢五分通計核算共需銀七千三百餘兩此二項較比僱覔民駝需用與官用駝隻即減省一半七千三百餘兩而且不用官駝不派官兵節省官馬數百匹順河集存下等候兵丁隊内若無此項牽駝官兵管轄亦属便易相應將䭾載黄布城即僱覔民駝應用交與䕶軍統領等辦理今方觀承又將武備院茶飯房廣儲司等處需用駝六百餘隻俱已採買備用具奏外雖無别需用駝隻之處但現今需用駝隻之時必得敷餘數百隻以備應用現在京城所有官駝三百七十八隻即交與方觀承歸併現在伊採買駝隻内㨂選臕壯者以備明嵗皇上巡幸南省應用外其餘臕欠疲瘐者加謹喂養以備應用奏入報聞乾隆二十一年十二月二十四日總理行營事務和碩荘親王允祿等奏言據兩江總督尹繼善奏請将明嵗隨駕官員所騎馬匹並應留車輛在附近徐家渡之王家營地方屯留一摺奉硃批總理行營處議奏欽此查上次聖駕南巡回鑾時係在順河集起旱是以各官員馬匹車輛就近在順河集屯留明嵗聖駕自徐家渡渡黄至回鑾時亦在徐家渡起旱則應留馬匹車輛自應在徐家渡附近地方屯喂無庸再駐順河集該督既查明附近徐家渡之王家營地形髙阜堪以屯駐即令該督於該處將應備草料等項飭員先期妥辦俟命下之日臣等行令該督遵照辦理并行知在京各該處一體遵照奏入報聞乾隆二十一年十二月二十四日允祿等奏言恭照明春聖駕南巡隨往江浙大臣官員兵役執事人等前經奏明統以六千馬匹核計隨往今按各處冊報隨往人數計算馬匹不敷臣等酌定将原議二人給馬三匹者改為毎人給馬一匹合計需馬五千六百六十九匹至渡黄以及各名勝處原議派馬俱在四千匹以内今照依原奏渡黄時按人減馬應需三千八百一十二匹名勝處按差減人應需馬三千九百五十六匹應開单行知兩江總督遵照仍交兵部查照原奏辦給馬票一面知照各該處將单内隨往名勝處所減派人數通融辦理至船隻一項應令該督遵照原奏将預備上用船隻敬謹預備其隨往官兵人等船隻亦按奏定船數及单内人數分别派撥奏入報聞乾隆二十二年正月初七日軍機處㑹同兵部奏言據河南巡撫圖爾炳阿奏稱竊照西路軍營文報向由陜晉直𨽻一路轉逓京師明嵗春正恭逢聖駕南巡啓鑾之後若仍由晉省逓京未免路逺稽時臣等查豫属之内黄縣路通直隸考城縣壤接山東永城縣界連江省凡軍營文報自應由陜省潼闗出境即從豫省就近逓送行在庶可速達御覽但查豫省並未設有腰站恐一有遲悮闗係匪輕應於陜豫交界之閿鄉縣起凡路通直隸山東江南三省之各州縣挑撥好馬安設正腰各站以速逓送但各站事務僅責成該管州縣經理查各該州縣均有地方事務不能時刻在站照察勢必委之丁役人等若輩不知緩急恐不無稽延應每二站就近派委佐雜一員遇有文報到站即稽查件數接送時刻登註排单號簿限日行六百里者刻即逓送仍令該管州縣及各府州隨時稽察其要站馬匹即於正站内抽撥既無増添糜費而馬匹亦可免疲乏除咨陜西直𨽻山東江南各督撫外理合恭摺奏明奉㫖軍機大臣㑹同兵部速議具奏欽此查先經直督方觀承咨稱今嵗恭逢皇上南巡請照上届東巡之例西路軍營文報由甘肅嘉峪闗陜西定邊營山西保徳州等處逓至直𨽻迴龍闗直送盧溝橋由良鄉逓送行營安設正要各站毎站一律設馬五十匹於各該正站内派守備一員千把外委三員耑司馳逓仍派道府丞倅等官往来稽查續據山東江南浙江各督撫亦照例一體安設今據巡撫圖爾炳阿奏稱豫属内黄縣路通直隸考城縣接山東永城縣界連江省凡軍營文報應由陜省潼闗出境就近逓送行在庶可速達查西路軍營文報由陜甘山西沿邊一帶逓至直𨽻良鄉縣計程四千六百四十里由良鄉至山東界計程五百九十里由山東徳州至江南界計程九百一十二里今若由陜西潼闗入河南閿鄉縣就近分路接逓自嘉峪闗至潼闗計程三千四百四十里自潼闗由河南内黄縣至直隸計程一千一百二十里自潼闗由河南考城縣至山東界計程一千一十五里自潼闗由河南永城縣至江南界計程一千三百五里臣等統計核算查自嘉峪闗由潼闗至河南内黄縣共程四千五百六十里已較沿邊逓至良鄉縣之路相等若再由内黄縣逓送直𨽻各站程途轉逺七八百里及千餘里不等反不免紆遲應將該撫所請由河南内黄縣安設臺站接送直隸之處毋庸議至河南接連山東界之考城縣并接連江南界之永城縣較之由沿邊馳逓山東計近程七百七十五里江南計近程一千三百九十七里查軍機文報闗係𦂳要自應就近接逓以期迅速應如該撫所請恭逢聖駕南巡啓鑾之後軍營文報准其由陜省潼闗出境從閿鄉起於考城永城二縣等處安設正腰各站就近分路送往行營之該撫所稱毎二站派佐雜一員登記號件令各該州縣稽查之處臣等伏查陜甘直隸等省逓送軍營文報臺站俱經奏明毎正站各派守備一員千把外委三員耑司馳送酌派同知通判往来料理併責成各該道府經理稽查今豫省僅派佐雜辦理恐佐雜不諳馳逓必委之驛卒等夫難保其一無遺悮應令該撫照直𨽻等省之例一體辦理其所需馬匹於通省驛馬内㨂選挑撥仍将派委員弁姓名臺站馬匹數目造冊報部查核俟命下之日行文該撫并直𨽻陜甘山東江南各督撫一體遵照恭遇聖駕巡幸直𨽻山東江南等省入境之日行在兵部即將入境日期知照河南巡撫遵照辦理奏入上諭曰依議著兵部行文陕督沿邊一帶尚有北路軍營奏報所有臺站仍照舊安設俟啓鑾後計程已抵山東境則西来文報即由潼闗往送河南接逓至回鑾將抵直境即仍由北路馳逓其陜西河南山東江南浙江著該督撫各㨂派滿洲道員一人専司軍臺事務往来督察以期迅速乾隆二十二年正月初八日傅恒等奏言查本月十一日聖駕自京啓鑾按程核計應於十九日抵山東徳州西路文報自潼闗由河南考城縣至山東界計程一千一十五里以日行六百里扣算應即於十九日從潼闗分路由河南馳逓約三日即可逓至行在大營臣等交兵部行文該省辦理至回鑾将抵直𨽻今行在兵部先期核算日期知㑹各該省仍由山西一路馳逓可也奏入報聞乾隆二十二年正月初十日允祿等奏言案照武備院奏将交與直𨽻總督喂養駝隻内除挑選使用外所剩駝隻趕赴紅花舖喂養俟回鑾時預備補换一摺奉㫖著交與總理行在事務王大臣議奏欽此伏查今嵗皇上巡幸南省共需駝九百餘隻經直𨽻總督方觀承将武備院等處所用駝六百餘隻俱已採買其太僕寺䭾載黄布城之駱駝三百隻由臣等酌議交與䕶軍統領等僱覔使用又八旗所有官駝三百七十八隻亦由臣等議明交直𨽻總督方觀承歸入伊之採買駝隻内挑選肥壮者使用所剰疲瘦者仍著喂養預備補换業經奏明遵行今武備院惟恐又似前次南巡駝隻内疲乏甚多雖交地方官喂養並未能肥壮以致有悮大營黄城故請将所剩之駝隻趕赴紅花舖等處喂養以作回鑾補换之用查此次自京起程至徐家渡止需二十餘日皇上陞舟後即将駝隻交與地方官喂養則行走二十餘日之駝若喂養兩月有餘斷無不肥之理應著該武備院逐一騐明嚴交地方官妥協喂養倘似前次不能肥壮以致不堪使用即将該地方官等題恭如照武備院所奏将用剩駱駝三百七十餘隻俱趕赴紅花舖備用則該衙門官員人等倚仗有補换駝隻領去之駝遂不爱惜反致多有瘦憊應將武備院所奏此次用剩駝隻不必趕赴紅花舖仍照常存于直省喂養惟是所稱回鑾時正值雨水道濘難行臣等酌量擬議著交與直𨽻總督方觀承将此次用剰駱駝三百七十餘隻内挑出一百五十隻恭候皇上起鑾以後緩緩趕赴紅花舖交與地方官等妥協喂養以備回鑾補用如此則官駝輕健捷速亦不致多所瘦憊矣倘䝉俞允臣即行文飭交直𨽻總督山東巡撫一體遵行奏入報聞乾隆二十二年正月十二日江蘇巡撫愛必達奏言恭照乾隆丁丑年春聖駕南巡一切應備事宜節經督臣尹繼善暨前撫臣荘有恭率同司道等官敬謹備辦今據江蘇布政司許松佶詳稱今查乾隆十六年翠華南幸所有扈從官員人等乘坐船隻需用縴夫并聖駕經由旱路遊覽名勝需用摃抬旱夫及回鑾需用車輛䭾載御用什物等項需用騾頭均於司庫正項銀内動支自應循照上届成例動用事竣據實報銷又扈從官兵馬駝沿途需用豆草麥麩以及屯駐馬駝地方設立買賣街購備麩豆等物上届係於司庫雜税及驛站餘剰銀内借發預期採辦差竣之日将奉文支給應開銷者造冊請銷應發賣者觧價歸款再行宫名勝備辦器具什物安頓御舟御馬搭建棚厰并槽䥷人夫運送冰塊脩理道路橋梁開濬河道安設馬頭脩墊縴路平治營盤等項上届係於司庫耗羡存公項下動支辦理均應循例動支事竣彚案報銷除取造估冊另詳咨部外所有動用銀款相應詳請㑹奏臣覆核無異除飭取清冊分咨户兵工三部備案外謹㑹同兩江總督臣尹繼善恭摺奏入報聞乾隆二十二年正月二十四日步軍統領衙門奏言查向来皇上巡幸各處臣衙門捕盗官兵番役人等所有拏獲竊盗取供後即送行在刑部該部辦理轉送行在兵部兵部始行交發地方官但行在刑部辦理交送兵部兵部尋交地方官之際二部俱無看守之人仍交臣衙門原拏官兵隨營押帶臣衙門番役捕盜兵丁俱係酌量派出為數無多若拏一犯看守即須三四人若拏數犯看守即致乏人且兵丁小人因所拏人犯仍交伊等隨營押帶在帳房看守伊等不免因有看守之責轉致託故不行勇往拏賊臣請嗣後凡遇皇上巡幸處所令經過省分地方之州縣逐日派佐雜官一員衙役十名隨處交與行在刑部跟隨帳房預備接收看守人犯如此行在刑部看守人犯有人臣衙門所拏事件亦能隨交隨收原拏官兵番役既得交出拏獲事件亦可另捕他犯隨營稽察甚有俾益俟命下之日除行文此次經過之該督撫遵照一體辦理外嗣後永著為例凡遇皇上巡幸俱照此例辦理奏入報聞乾隆二十二年正月二十七日兵部奏言查上届聖駕南巡臣部官員等俱在前面行走此次凡一應奏摺俱從後趕送請備坐船一隻令臣部官員等輪班在豹尾鎗後與軍機處官員一處行走至駐營時将船在布城從角灣住以便接逓事件再請将驛馬選擇十匹令隨在豹尾鎗後堤岸行走以備馳送事件奏入報聞乾隆二十二年二月十一日刑部奏言乾隆二十二年二月初八日奉上諭江浙二省讞獄滋繁陳臬之司素稱劇任兹朕巡省所至覃布恩膏黎庶均沾閭閻愷樂而有罪之人囹圄桎梏實由自取亦何恤焉但念獄一成而不變其中奸民之犯法者固多而無知誤蹈之人亦所時有况未抵於重辟尚可望其自新用播徳音以符寛大所有江蘇安徽浙江等属軍流以下人犯俱著加恩各予減等發落從此案牘一清在問刑各官當益勵精勤期於明慎而凡爾百姓更宜各安本業勉為良民勿為曠典可以倖邀而輕國法也欽此仰見我皇上鑾蹕所臨太和洋溢恤刑宥罪特沛殊恩臣伏思此次皇上巡幸江浙現在軍流以下人犯仰䝉聖恩各予減等惟是情罪輕重攸分辦理自應稍為區别臣詳加酌議所有江浙人犯該發遣黒龍江寧古塔及内遣雲貴川廣人犯罪與軍流相等應請一體援減此内如叛逆緣坐强盗免死發遣家奴喫酒行兇棍徒生事擾害用藥迷拐子女開窑誘賣并例應給披甲人為奴及擬軍之積匪滑賊情罪較重俱不准其減等其餘軍流遣犯俱應減為杖一百徒三年徒罪及雜犯准徒人犯減為杖一百其已經到配徒犯即行釋放逃徒並免緝拏枷杖人犯均應寛免應刺字者并免刺字其已經發遣軍流計其程限尚未到配核其情罪與恩㫖相符准其㑹赦減等再江浙之人有在别省犯案逓回原籍追賍僉配人犯計其犯事在恩㫖以前似應推廣皇仁俱准其減等發落其外省犯事逓發江浙軍流人犯與江浙現在軍流不同未便濫邀曠典均不在減等之例侯命下之日臣部行文各該督撫遵照辦理奏入報聞乾隆二十二年二月十六日直𨽻總督方觀承奏言竊查八旗官駝三百七十八隻奉文發直喂養備用嗣准部咨内開總理行營處議覆武備院籌備回鑾時補换駱駝一摺請於發直駝内挑出一百五十隻恭候皇上啓鑾以後緩緩趕赴紅花舖交與地方官喂養以備回鑾補换之用奏准行知到臣伏查武備院䭾載之駝係六百隻今預備補换駝一百五十隻自可敷用臣昨至徳州見東省撫臣進有駝隻又臣上年在張家口買有瘦駝牧放已久俱臕肥可用臣現在挑選一百隻趕赴紅花舖一帶如䝉天恩賞收合之東省駝隻已可為沿途補换之用所有八旗官駝一百五十隻似可毋庸送往應請仍留直𨽻喂養以備木蘭差務奏入報聞乾隆二十二年三月二十九日兵部侍郎管順天府府尹劉綸奏言恭照聖駕回鑾内務府鑾儀衛衙門各行檔需用車輛臣先期前赴水次督同山東江南兩省道府委員并内務府司員稽核監放查山東省原分留京車一百三十四輛江南省原分留京車一百六十二輛並直𨽻協濟代僱車一百輛共四大套車三百九十六輛於本月二十五六七等日㑹同各員在厰陸續騐照支給計放過各行檔車二百八十二輛所有餘剰原車並兩省預備三套二套各車俱照上届成規酌聴隨駕大臣官員等自行給價添僱接濟疲乏餘仍交與兩省各員自行檢收以為沿途預備之用奏入報聞乾隆二十二年四月初九日浙江巡撫楊廷璋奏言乾隆二十二年三月初一日恭逢聖駕駐驆西湖臣等面奉上諭西湖之水海寧一帶田畝藉以灌溉今聞沿湖多有佔墾若將墾􅌻之田挖廢歸湖小民未免失業如任其佔墾將来湖身日漸壅塞海邑田畝有涸竭之虞於水利民田均有未便除已經開墾成􅌻者免其清出外嗣後不許再行侵佔欽此臣等跪奉之下仰見聖主軫念民生􅌻籌水利至意伏查西湖故址周圍原額係三十餘里東南抵城西北接山受武林諸山之水滙聚成湖由湧金水門入城出艮山等門㑹上塘河而直達海寧沿塘民田數千頃皆藉湖水以資灌溉縁湖身寛廣水大則可容納無汛溢之虞水小則可停蓄無涸竭之患利益民生其功甚溥嗣經瀕湖小民栽荷蓄魚始則圏湖為蕩繼則開墾成田日漸侵佔以致水利日多阻滯雍正二年荷䝉世宗憲皇帝勅令清查将所佔田蕩豁除糧額照址盡行清出歸湖開通水源俾無淤滯下游田畝可以不虞旱熯伏查西湖舊址三十餘里彼時查丈僅存二十二里四分有竒通計裡外湖面一萬一千三百一十五畝淤淺沙灘三千一百二十五畝已失故址四分之一歴今三十餘年為時既久小民又復漸次佔墾亟應清釐禁止仰䝉聖主洞燭情形勅令設法查禁臣等隨與藩司公同斟酌現在遴委幹員將湖址逐叚悉心勘丈除久墾成田無碍水源者欽遵諭㫖免其清出外其現存湖面及淤淺沙灘逐段俱丈量清楚竪立標記飭委大員覆勘明確于湖岸立石永禁仍繪圖貼説存案查禁之後遇有侵佔絲毫即照强佔官湖律嚴加治罪至現存小民栽荷蓄魚之蕩止許用竹箔攔隔以通水道不許私築土硬圖為後日佔墾賬本仍責令地方官於毎年冬令水落時按圖勘丈一次倘有越佔立押刨挖歸湖如無侵越即出具並無侵佔印結申報各上司稽考倘敢瞻徇隠匿查出立即嚴叅其已經墾􅌻田畝蒙聖主格外施恩免其清出但究係私佔官湖俯俟丈出確數核明雍正二年清查以後復佔墾田蕩各若干畝如果無碍水源容臣等具奏請㫖應否按畝酌量徴輸地租歸入西湖嵗脩項下為挑濬西湖淤泥葑草等項之用恭候聖明定奪如此立法查禁庶小民不敢再行侵佔湖水自可永不淤塞下游民田旱澇有資聖主恩施當與湖流永頌靡涯矣奏入報聞乾隆二十三年正月初十日楊廷璋奏言乾隆二十二年春恭逢聖主重幸浙江面奉上諭西湖之水海寧一帶田畝藉以灌溉今聞沿湖多有佔墾若将墾􅌻之田挖廢歸湖小民未免失業如任其佔墾將来湖身日漸壅塞海邑田畝有涸竭之虞於水利民田均有未便除已經開墾成􅌻者免其清出外嗣後不許再行侵佔欽此欽遵先經㑹同前督臣喀爾吉善將酌籌清理情形恭摺奏請聖鑒欽奉硃批俞允臣隨飭委署鹽驛道事温處道朱椿續又委鹽繹道張唯寅率同杭州府知府張逢堯等先將湖面通行查丈自雍正二年清理西湖丈量湖面周圍計二十二里四分迄今三十餘年沿湖居民或築隄為塘或培土成田逐漸佔墾並淤淺沙灘共二里有餘現丈湖面祇存不及二十里之數此次清查自應以雍正二年丈定之數為凖將陸續佔墾之處悉行刨挖歸湖以疏下游水利乃仰蒙聖主軫念民生將已墾􅌻者免其清出此誠聖主格外恩施臣敢不欽遵查辦第西湖之水攸闗下游水利若將有碍水道之處一概准其存留恐日漸淤塞必至不敷灌溉似應分别辦理臣因率同司道并承辦各員親歴湖濵周遭相度將各處佔墾之地蕩田畝及淤灘勘明有無阻遏水源逐一挿籖記認分定應去應留明白掲示曉諭於秋杪收穫後令該道府督率佐雜各員分頭展復計小有天園迤西一天山脚下金沙港廟後錦帶橋内湖錢塘門迤南湧金門迤南清波門西首長橋等處共清出有礙水道之地蕩淤灘約計一里有零逐一開挖歸湖其已成田者概免刨挖内將小有天園門前圏佔之水蕩清出建築馬頭不特湖船直達無礙而水源亦疏暢流通又於栁浪聞鶯處將開挖圈蕩之土方即用以築堤一道計長一百餘丈直至湧金門馬頭以作界限其於沿湖凹凸不齊之處各按形勢悉行裁直淤淺沙灘一律開濬深通現在丈實湖面已有二十一里二分零較前清出一里有餘其各處不礙水源之田畝地蕩尚有五百八十九畝零應遵㫖免其清出即照現在二十一里二分之湖面立石永禁侵佔東面於湧金門馬頭之右西面于一天山脚下南於長橋埠北面於湖山春社之左共四處各立一碑将現在清出里數及侵佔官湖例應擬流條款刋刻碑上俾小民咸知畏法遵守仍造冊繪圖存案毎年責令地方官查丈一次稍有侵佔立押刨廢徇𨼆即行叅處所有免其清出之田畝地蕩雖䝉聖恩不予刨廢但究係侵佔既已免其治罪復仍歸管業自應酌量徴租以充嵗脩疏濬西湖之用臣與司道悉心斟酌計其出息之厚薄定以租額之低昻毎蕩一畝嵗徴租銀五錢田一畝嵗徴租銀四錢地一畝嵗徴租銀三錢造具户畝各確冊於二十三年起令地方官按數徴收觧鹽驛道衙門歸入西湖租息項下以備挑濬修理公用自此畨清理後斷不容稍有圏佔再沿湖雖已立石刋禁但湖身寛濶恐小民惟利是圖或於各處堤岸仍有侵損擬令地方官於清出之堤岸上照蘇隄之式沿岸栽挿栁樹不特可杜小民侵損其根株盤結亦可堅固堤身且一二年後長發茂盛萬緑成隂更足與湖山増色所用刨費即於鹽道收存之西湖租息項下動支無需開銷正項錢糧現在湖面較前已大為開展湖流暢達水道不淤下游田畝從此倍資灌溉之利白叟黄童咸歌聖澤優渥樂利無涯矣奏入上諭曰好如議行欽定南巡盛典卷九十三
