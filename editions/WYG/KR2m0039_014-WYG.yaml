body:
  text: 欽定四庫全書欽定南廵盛典卷八天章壬午江南詩入江南境雪霽春郊喜不風入江南境便韶融此疆彼界爾雖異圖易思艱我總同但覺民情更親切爰咨吏治可明公翕河汜利巡方要名勝休誇㸃綴工三依皇祖示江南大小諸吏韻四海皆吾家羽林無煩棷逰豫本為民民艱厪咨剖忽生乎所易懈萌在經乆而吾何敢然慎終勵其首巡方法皇祖視膳奉文母南邦已莅止農實勤南畝風俗不異前教養應善後善後非更張章程貴謹守老幼盡安懐閭閻自親友庶幾休以息世共登仁夀三賡緬堯巍一意懋湯負駱馬湖當春資濟運行潦藉歸川實有闗閭里要惟慎節宣橋横下口處㠶掛逺天邊幾度思長䇿致艱利洳田度永濟橋疊舊韻作歌司吾除道遵􅧧迤雪消平原有積水故知此邦易致潦頻賑無能瘡痏起長橋前度憶圮頺鳩工重築親相視今來蕆役利往來春時水弱行壑裏夏霖秋澇不可當曽無良法慙徒爾徒杠輿梁有常經不虞之譽求全毁咨爾羣工善勤宣豈能一一待親理與我共之之謂何食天禄斯民所恃示懐聊此舉大凡加恵蠲逋即繼以順河集行館作登舟尚遲去聲四朝程儘可修除張幕城何事居然亦室宇稍欣未致大經營土香階草纔蘇紐風細盆梅欲放榮西望運河隄傑峙幾多酌劑繫予情過宿遷縣登隄指桃鎮隔岸望厹猶百雉闉闍固萬家烟火稠民風咨利弊漕運欲周流觸目無非事吾寧為豫逰䇿馬度仰化集口占老幼數無萬都為仰化人斯之未能信慙愧頌聲頻賜兩江總督尹繼善保障資三省忠勤著兩朝節樓無過乆尹繼善於雍正七年巡撫江蘇旋兼節制厯兩江雲貴川陜諸重任而兩江至今凡三莅前後三十餘年幕府獨稱超善得軍民服兼能上下調暇還工作誦吉甫可同條賜江南河道總督髙晉撫皖昔㕘俎督淮今建旌髙晉昔為安慶巡撫時命為副總河俾習河務簡賢我惟切盡職爾應誠兩世司河務髙晉髙斌之嫡姪也一心如水清朂哉為國幹便是繼家聲過宿遷命借給民籽種宿預地卑濕十嵗九逢灾悇然思救濟剔還示前迴去乃免澇賑恩例弗推一夫茍向隅如傷繫吾懐矧此瘠郡民艱狀憶向來較昔雖小差曰蘇實未哉當春東作興籽種要安排借給俾勤耕庶幾闢汙萊便幸逢有秋毋遽科呼催隄上偶成運河轉漕達都京䇿馬春風隄上行九里崗臨禦黄壩曽無長䇿祗心驚半是郊村半水荘輕風馬上曉猶凉韶光南國不相讓已見沿隄栁色黄鋪路蒼黎日覲光京垓兆億數猶强皆資饑食寒衣者奚怪絲糧價不昂宿遷迤邐接桃源澤國觀民鮮飽温侍衛􅇸金分賜與途次命侍衛視迎駕年邁者分賜優老牌其貧者量給銀錁慙無暇計子輿論降㫖加賑江南去嵗被灾州縣詩以誌事遇灾蠲賑循常經賑則有期蠲賦耳積逋原在不蠲例加賑更惟待特㫖新正江浙逋盡寛入疆民瘼尤詳揣雖無展轉溝壑人大半衣裳多藍縷叶賑期視災為短長長者較可短奚恃命加一月普予糧無論極次貧同視撙節庶可度青黄尚在有司善經理謄黄謝恵亦何必調幕慙懐正無已閱中河汶水分南北皇都轉漕資酌中河性順楊荘中河䂓制皇祖所定也利後聖謨垂已是閱三度無能賛一辭守成吾所勉靡不詎惟斯楊莊牐三依皇祖詩韻刳木千秋利賴餘為籌節制立姑徐行其無事戒穿鑿顧語河臣記莫疎幾縷輕黄染栁絲春光日日近南移羣知有喜縁行令意在繩先豈盡知渡黄河七言近體八韻半夜風狂曉畧息登舟五兩更全停土臣執伇喜無比河伯昭庥信有靈悦豫慈情欣穏渡狩巡祖制緬恢型雰清旭全開朗歸壑長川贊毒亭去年豫省堵築楊橋漫口功成迅速合龍時且有迴風助引之騐已命於工所建祠報貺浩瀚宏波覘盪檝配藜元氣䕶揚舲孫荘縹緲成彼岸彭口須臾泊近汀恵濟祠䖍瞻廟貌清黄滙謹度情形神堯方畧貽良範慎守惟乾冀永寧清口去年河決楊橋驛清口清流始暢適開封迤下方免災不幸幸難料以逆賈魯奪溜仍歸淮日乆慮致開門揖劼劬督䇿築宣房發帑屬薪所弗惜未三月乃大工成事在人為語不易黄仍入淮誠甚佳河終歸海路艱得即今河復並淮行刷黄至竟資清力清口東西壩對峙恃量節宣慎寸尺補苴罅漏賴斯存蒿目何年當底績恵濟祠河畔崇祠金碧煌蓬萊祗在水中央載瞻鳳戺還龍户永奠内清與外黄功在民生宜祀典徳惟坎濟受天慶禱之乆矣寧因已恵我黔黎識不忘木龍示總河髙晉作總河髙晉欲建木龍刷沙因渡清口指示其處蜿蜒横灘木寓龍非循雍畤擬臨衝倍功半事惟斯捷射浪停沙作爾庸積土陶荘希盡刷暢流清口庶恒容卿家阿大中郎法斟酌尤宜勉繼踪麥色過河逢麥色寒暖北南殊因憶尤教喜入詩兼可圖未曽風擺浪已自露貫平聲珠賴此青黄接絶勝看緑蕪閲河三依皇祖詩韻閲河日晏駐舟營河以北皆陸營渡河則水路以舟為營故云紆蹕因多廿里行一述前䂓無敢作當年曾是慶平成清江浦清黄滙後清常弱此號清江意寓深咨爾建牙督河者體予保障恤民心春巡問俗欣猶昔水驛行程數上聲自今安福臚御舟名中梅一朶江南消息遞侵尋過淮安城分野瞻星紀聨城逮射陽始營猶憶晉重築更傳張濱運接南北臨淮謹禦防觀民還按轡過郡亦登航愛戴羣情切安懐予意蘉一人艱遍及慎選有司良賜總漕楊錫紱轉漕由來大政闗得人乆任謂卿閑四星儲蓄天容與千里北南嵗往返革弊深應體民隠董媮兼欲恤丁艱奉公盡職誠斯在扈蹕儀文儘可删閲淮安石隄疊前韻黄流昔南遷奪淮挾歸海於一已覺難况兩難更倍閘堰非不夥各以所見改因之水益髙受病實多載皇祖厪民瘼濬距勞乗橇曰予瞠乎後庸詎悉源委雖然敢不蘉所以南巡毎修防戒更張鞏固奉模楷土隄易石工寓賑兼免殆丑嵗已告成為魚憂早罷今來益繁滋比户歌安愷開封憶昨秋又為豫人駭雨大霧翻為雨江鄉有所常濕衣看不見憶昨詎曽忘川路依㣲辨舡廬料峭凉農桑未興候隂翳總無妨晴三首澤國今經三度過不愁雨少祗愁多西風捲霧晴光放嫩栁輕蕪景色和小涇南接大涇河淺洞沿隄洩漲波農事未興信何礙夏秋為壑患常多一道長隄栁向城水田鱗疊野橋横御舟且謾乗風利霽景天然入畫情過寳應縣古縣闉闍濱運河安宜三度此經過艤舟䇿馬従民願毎至城市多捨舟䇿馬過之欲以觀民亦従民所願也就日曕雲聴彼歌昨嵗雖云被災小僻鄉寧鮮向隅多越堤邏壩原林立蒿目修防竟若何過髙郵州黄龍曉發近盂城上岸乗驄按轡行綪筏珩紞却虚飾黔圍黎繞騐真情早知江國民居庶且喜槐街米價平厯閱黨軍隄復舊州屬黨軍樓隄工上年七月為風暴衝嚙旋即堵築今視一律完固迴思去嵗尚心驚賜蘇州巡撫陳宏謀外吏中惟乆由來繁鉅勝體予視傷切謂爾佈恩能必有逺猷贊寧惟苦節稱金閶誠富庶返樸最相應賜江蘇學政劉墉皖翕嘉能職吴淞俾董繁先經後子史多行去聲寡文言可作化裁法毋孤簡用恩繄予勤實政藻頌不須煩香阜寺過岱多平陸臨江得小山伏龍知有角香阜葢蜀岡伏脈見豹底論斑畫舫於斯易易輕舟遂達天寧寺行宫花宫祗是閒行齋知已近五載隙駒間天寧寺疊前作韻奈苑香花集禪侣慈寧萬夀祝如陵似兹那可異端闢但彼誰臻最上層忘所入流佛惟寂遇佳得句我猶能論民便欲論其苦廿七年來心是憑駐蹕天寧寺行宫作别館天寧古寺邊居停許就舊材便雖然商力非民力但覺今年勝昔年墨斗硯山足遣逸琪花瑶草底須妍省方更切還淳意不為怡然為憮然哈薩克陪臣到因攜觀廣陵風景哈薩朝正貢馬頻路遥遲到值南巡因教馳驛來江國便挈行春閱綺闉昔嵗觀光稱使者辛未準噶爾使臣曽命至蘇州賜諭爾時準夷尚未𠞰滅哈薩克原屬準夷不通中國也今畨優賚實陪臣廣陵鄂畚哈薩克地名何南北總我心懐保赤人題九峯園䇿馬觀民度郡城城西池館暫逰行平臨一水入澄照錯置九峯出古情雨後蘭芽猶帶潤風前梅朶始敷榮忘言似泛武夷曲同異何須細致評逰平山堂即景雜韻八首九峯園畔換輕舟古郡城西初度逰二十四橋雖莫辨紫薇猶是緬風流樓臺絲管廣陵擅廿里雙隄隙地無幼挈老扶恣瞻就吾心所喜是斯夫陪臣賀節大宛朝侍衛擕來不憚遥便許隨觀都踴躍無文徑説踐虹橋舟移岸轉換歌聲早見平山翠黛横五載流隂纔瞥眼越豪今日是吟情一脈西來總蜀岡安名立字定何妨東山偏自稱功徳蓮界因之禮法王瀑泉浡淴落雲空宛轉輕輿有路通對峙雙峯度雲棧笑他望蜀太求工是地有雙峯雲棧之名山堂小憩引遐思論世端宜尚友兹漫惜梅花開未盛看梅恰合是斯時閏藏芳信待維揚霽旭和風了不凉緑蕙紅􅖗争放色平山今日識春光第五泉平山堂畔石欄圍甲乙由人弗是非三度頻臨牧勿幕勞民勸相慎幾㣲蜀岡何山不自西南來崑崙地脊支派開㕘軍文賦具卓識圖經地紀拘墟皆苿萸灣口進輕舫平山堂上聊徘徊遥想當時賢太守二三良友相追陪還淳返樸豈無意要當因民為化裁廣陵繁華今倍昔蜀岡地少多樓臺歐陽亷近吾亷逺近者艱致况逺哉居今誌古詎易事蜀岡之述因興懐題蓮性寺江都城北多陂澤水物猶來清且竒瀟灑青蓮宇標性交蘆同悟合還離逰倚虹園題句虹橋自屬廣陵事園倚虹橋偶問津閙處笙歌宜逺聴老人年紀愛親詢栁拖弱縷學垂手梅展芳姿初試嚬預借花朝為上已是處舊名虹橋修禊明日即花朝故云冶春慣是此都民題浄香園滿浦紅荷六月芳慈雲大小水中央無邊願力超塵海有喜題名曰浄香結念底須懐爛漫洗心雅足契清涼片時小憩移舟處得句髙齋興已償青琅玕館戲成口號萬玉叢中一徑分細飄天籟逈干雲忽聴牆外管絃沸却恐無端笑此君趣園偶涉亦成趣居然水竹鄉因之道彭澤從此擅維揚目屬髙低石步延曲折廊流雲憑木榻喜早晤宧光亭中木榻甚古樸刻趙宧光題流雲二字及董其昌陳繼儒題語雖属偽作頗愜幽賞再逰平山堂時節逮花朝百卉舒韶光駐蹕有餘暇爰再逰山堂逺迎坡梅紅近拂隄栁黄夾堤多名園時復一徜徉遇佳輒留題好樂亦戒荒畫舫不知遥至止大明寺名在山堂左首旁逈出適所逢試問因何芳地勝究以人睪然懐歐陽既乃怵然懼得毋誚馮唐髙詠樓髙樓蘇蹟乆羶薌今古風流翰墨塲八詠遥年符瘦沈一時同氣近歐陽山堂返棹閒留憩畫閣開牕納景光却憶髯翁擬擱筆似聞翁語正何妨慧因寺金粟如來是慧雲迥超縁覺與聲聞猶嫌靈運為饒舌孟顗精勤底足云塔灣行宫再依皇祖詩韻二月東風桃始華南巡本意厪桑麻郡城甫過甘泉市行館還依法苑家澤國令其足衣食廣陵古漫翊烟花牖民不藉重申命皇祖詩萹早戒奢塔灣行宫三依皇祖示江南吏韻别館運河側南巡此重去聲經閒堪閲書史樂不在池亭惟切旰宵志匪耽月露形申咨大小吏有恵莫屯停渡江至金山駐蹕作昨夜風雄曉盡停祖功一例奉慈寧心期無沗勵無逸瀆貺有昭欽有靈畫舸人情胥悦豫鏡天景物正薫馨十年三度事多矣不改金山幾疊青金山寺三依皇祖詩韻江山風物鬯春和總為慈寧祝嘏多到岸羲碑先拱讀繼繩自問應去聲如何登金山塔頂再疊舊韻塔已山尖又塔尖竿頭進步那辭兼寧惟縱望目眸豁真是入㣲情性恬窣堵饒他劫火閲江波照我鬢霜添便教險韻賡千度不外如來一朶拈觀濤樓即景崇搆觀濤舊所稱石簰壯觀去聲試臨憑千尋巘翠天疑近一道長江波不興來往布㠶嫌力弱空明玉鏡與心澄風恬浪静自佳事何必枚乗賦語徵閲水操因題奚縁閲水操哈薩䕶巡艘欲示詰戎制都闗馭逺韜千帆殊欠捷五兩曰非遭戰艦轉帆不甚迅駛詢之将軍伍彌泰以未值風順對因戲及之怪底東風便周郎始破曹金山再疊舊作韻春來江㶑鴨頭青天塹千秋據勝形祖蹟重瞻祝母嘏乾符丕慶協坤靈依山蘭殿詢安退照水花宫取便停風物美哉還盡善疇咨有暇合捜㝠峭壁巖前春似海迴廊欄下地如天荒唐見説獲氐賊疑似猶傳瘞筮仙此處泯兮芥與蒂古來紛矣嵗和年視民不改如傷志脈脈前巡一念連逰金山寺三疊蘇軾韻趙宋詩人許坡翁雄才磅礴富似海創為險韻再三疊妙理無在無不在偶然逰戲㕘伽陀横江那畏排山波中江長老一握手故鄉情誼何其多伏牛山下重艤楫風物撩人如昔日舊編翻讀和蘇章欲效其為面先赤强顔倚檻安吟魄甲乙寧須較白黒花紅桞緑春正明人所習見誰言驚子瞻磊落頗卓識飛燄江心見何物英雄欺人力拔山設竒葢欲曉彼頑歸歟何事不得已底藉定盟有如水自金山放舟至焦山三疊蘇軾韻清流亹亹元䕃耽山以包屋稱江南竹徑禪林胥熟路到此屈指今凡三玉局傑作重快讀秘思愛彼抽春蠺中流豪歌復酣嘯老僧笑晤心何慙觀民休助我正務暇亦延賞窮巖潭金山佳矣鮮隙矣已嫌樓閣羅峯酣剪江言造幽絶處勝以弗飾方可談乃復稍稍事荘校貝多羅樹珊瑚龕踵事増華俗猶厭質諸佛想非所甘以言施者雖破悋以言居者寧非貪髯翁有知應首肯但以成事説何堪瘞鶴真蹟惜漫漶為臨元本留雲庵清寄堂别業精藍左名之清寄堂江山無盡蔵翰墨偶然償緑草經冬色紅梅逐日芳行雲與流水不住是真常海門庵所遇欣於向未逢竺庵深䕶緑雲濃海門月出江天浄正暎如來滿月容竹樓架竹為樓竹逕通山光江瀨攬無窮黄岡同異何須辯王禹偁文睪想中登鏡江樓極目焦山登極頂俯暢鏡江樓是日㣲風静當春霽景浮遥源溯西自萬古鎮東流底論北南界清時此豫逰逰焦山作歌疊舊作韻金山豈無山勝在包以屋焦山亦有屋勝在山之腹髯翁為弟長老兄中江長老見東坡焦山詩非印公也至今謦欬聆其聲君子之交淡如水毎到金焦輒懐彼長江風静浪不起青雀片刻旋至止定慧寺禮金粟身左首行齋昔無是無過小憩縁此辰樓臺位置費太勤成事不説自排解後言寧免他紛紜梅花已開氷玉色竹枝全寫龍鳳文梅竹之間得句返興致亦足標巖雲槎枒萬樹青氤氲一條曲徑菁䓗分造極忽豁萬里目吴顛魏躓氣早吞百年熙和五載狩象山迎蹕笙歌聞甘露寺六韻志謂吴年建或稱天露垂明統志謂吴甘露中建因名輿地紀勝又稱李徳裕建寺時適有甘露之瑞因名史評誰竟定佛法本無為是日韶光好言尋初地宜郡城東角到軒檻北端披全攬江山勝獨標今古竒吟安須五字翠蹕為去聲遲移過鎮江府城疊舊作韻䇿馬過城始就舟壮哉鐵甕古雄州那更南北分疆界惟有耕桑厪度諏户口益滋誠盛事食衣難繼乏良謀水營駐蹕聞漁笛一例桓伊不解愁反李白丁都䕶歌我歌丁都䕶却匪歌丁旿舉人思其地昔曽開東府齊澣移漕路水淺丹陽土鑿石牛曳舟李白歌其苦長此奚到今以今可知古豈無疏濬方天工在人補輪年大小修丹陽運口藉潮水灌輸土汕沙淤常需疏濬乾隆八年撫臣陳大受奏定六年大修而毎嵗随宜間叚修挑可展大修之限轉漕甚為便利來往通商賈設如青蓮言漕米其安取即事識所懷鳴榔過江滸登城霞閣疊舊作韻二首曲阿循水驛髙閣俯城衢毎厪惟民瘼寧云忘已劬官方需考績河務乏良圖風氣殊南北材華盛越吴憂惟一意切頌漫萬聲呼所幸今成武來巡携闔蘇時厄魯特及諸回部錫封爵備禁衛者並列扈從其地視漢書西域闔蘇葢逺過之丹樓祀昭烈香火走櫩衢惜耳事艱就嘉哉志並劬欲信平聲難度徳不共見深圖無已偏安蜀有求且去聲吴一時懐古慨三義至今呼青雀還南進前程近指蘇過常州府城城郭恒教按轡過覲光不許佽飛訶閙街自覺恬熈象僻壤猶懐疾苦多一度民情親一度無煩王道正無頗越吴襟帶舟車㑹良有司存應若何艤舟亭疊舊作韻跋馬過府城至此應登艇云有蘇子瞻艤舟之舊境其然豈其然但覺松筠静千秋稱古蹟如是率堪省往來八州牧留題成妙景斯亭而在斯詎非毘陵幸紺宇樓金仙瞻謁吾亦肯東坡喜逃禪往往偈句警立朝乃剛直正合進善猛今寧無頗牧馮言㑹心永解纜遵川程迴望風旛影沈徳潛錢陳羣來接走筆成什書之各賜一通二老江浙之大老新從九老㑹中迴身體康强自逢吉芝蘭氣味還相陪迎隄驀遇以為喜出詩命和羣臣推更與殷勤訂佳約期頥定復登金臺二人皆云朕六旬時徳潛當九十八陳羣當八十七必皆入京叩賀亦笑許之泛梁溪逰寄暢園即目得句溪泛梁鴻破曉氛秦園勝蹟乆名聞愛他書史傳家學况有煙霞䕶聖文園中㳟奉額聨皇祖賜詩及瀟灑聊尋三徑曲就瞻那禁萬民紛問予寄暢縁何事情以為田此所勤寄暢園再疊舊韻畫舫權教艤玉灣秦園寄暢暫偷閒逕從古樹隂中度泉向竒峯罅處潺隨喜禪心依佛寺己意芳意動春山過牆便是青蓮宇可得敲吟忘此間恵山寺疊舊作韻鹿苑䖍瞻佛髻螺装嚴七寳實駢羅若於本分云相應去聲祗是無言已覺多水去梁溪惟澹澹草生祗窟鎮娑娑松庵偶試禪家茗漫擬周王詠有那恵泉山房作恵泉恵麓東氷洞噴乳竇江南稱第二盛名實能副流為方圓池一例石欄甃圓甘而方劣此理殊難究對泉三間屋樸斲稱去聲雅搆竹罏就近烹空諸六根囿想像豚遯人流枕而石潄乃宜此巖阿寧知外物誘叶亭臺今頗多綴景如錯繡信美樂不存去去庶績懋駐蹕蘇州疊舊作韻五載今來又一巡胥江舟駐郡城濱仄街按轡斥警蹕蘇州街最窄辛未初巡大吏欲擴寛之以不便民弗許左右就瞻之民近至馬足也比屋迎鑾共戴親外飾信堪稱富庶逺隅自不乏饑貧益祈嵗事常綏稔何患民風弗化淳凝懐堂疊舊作韻省方勤輯物髙處上聲慙去聲垂衣每得瞻天藻恒因仰帝機當春蓮漏永坐乆蕙烟微萬慮澄無滓松簷素月輝賜沈徳潛去嵗入都祝慈夀皤然九老領林泉致仕九老中徳潛職與嵗皆居首清詞還擅香山會蕆事便教故里旋更止逺迎厪跋涉在籍大臣去冬赴京晉祝歸里者今春令就里門迎接毋庸越省逺來以節勞勩所欣重晤得留連論文兼及蒼生隠虚席誰訾宣室前支硎山棗葉湏彌沒義尋支硎奚礙號觀音支硎又名觀音山春山依舊開圖畫平石何曽識古今當户松榰千丈葢落溪泉奏七絃琴馬嘶牆外鶴籠院似憶雲巖有道林寒泉亭子曲折􅋥山逕别墅猶在西野芳發幽香行行遲馬蹄山寒泉亦寒釃流率成溪此亭獨擅名孰謂與物齊奚礙一臠嘗因之悟天倪放鶴亭戲題支硎谿壑多分支寒泉樓閣早弗寒獨喜四柱稱放鶴猶存本色臨荒山道人已往不復返胎仙一去誰還期千年丁令致可笑惜未忘情於世間寒山别墅幽人留舊阯大吏事重修自藉林泉秀㣲嫌花木稠片時軒榭憩昔日景光遒欲起宧光問居斯可肯不對瀑疊前韻石縫飛振鷺仙漿復道髓今昔了不隔那有塵心洗飛魚峽疊舊作韻飛魚亦此峽謾訝豈其然地借甯家地天猶浪水天一空能外物萬有總真仙而我原無涉惟求濟世賢戲題馳烟驛髙士昔年此肥遯出塵瀟灑樂泉林茍無周子參差意何必馳烟自表心緑雲樓别墅題名率因舊髙樓緑雲我所題萬民生計恒深厪千頃麥苗今復齊雨意霽隨輕風散露光濃入曉烟低登樓騁望意多愜不在花香與鳥啼寒山千尺雪再疊舊作韻南峯東峯總寒山山之佳以多流泉吴人疏剔慣綴景誰能一一分根源設云彼非此乃是是謂執象求言詮寒山别墅適小憩山鳥春花喜有縁就中修篁為最美个个玉節臨氷淵范家名園一牆隔過門更不勞陟巒各有所長異眼界總無些俗娱情田聴雪之閣我予額雪聲雪色皆依然便擬聚星一再疊興寄非色非聲間聴雪閣再疊前韻四季此雪恒垂空落巖底翻笑綏綏者所擅惟冬耳實有時而窮名有時而美使以何而行尼以何而止逹斯乃可聴聴雪吾誠喜簁簁颯颯中無終復無始得句便前行寧宜耽未已逰法螺寺書懐山寺勝以幽林壑繚而邃支硎北屏秀天平南襟翠喜此處僻境向曽一跋騎本色佛道塲那在莊嚴費今來殊可觀亦頗事㸃綴鳩工非庶民施檀云大吏惜哉不二門幾至無隙地小坐命返輿書懐誌吾愧三依皇祖華山詩韻峭拔諸峯表兼之巖穴深自多真賞在都有俗縁侵古意指禪栢春聲出語禽軒文䕶丁甲景仰緬神襟駐蹕靈巖再疊舊作韻窣堵髙標雲表中其旁了識有行宫松隂羃谷盤桓上磴道梯巖曲折通衛士暫休仙蹕䕶山僧應笑禁門紅夜深底是前縁續清磬一聲隔院東臨湖榭詠古靈巖軒閣率仍舊臨湖之榭敞且清三間雖小納空濶復無松竹庭前横太湖萬頃挹襟袖縦觀意與天水并館娃池徑蹟俱在奚如少伯乗桴征烏啄共憂難共樂子禽不去走狗烹耕齊居陶又何謂要之所止皆成名穹窿山上真觀見説古由鍾乗閒陟碧峯上真嚴祀帝四鬴切祈農奚必逢茅固無勞學赤松具區眼底近可以暢心胸題拈花寺二首紺宇祗園棲碧峋裝嚴好相坐金身滿庭白白紅紅者都是無端微笑人僧寺居然道觀隣上真觀亦在山頂底須同異辨疎親名山綴景由來乆惟愧何方牖此民鄧尉香雪海歌再疊舊作韻辛未香雪詩題吾山陽韶秀驚識初丁丑乃至山隂境翻覺前作隣傳誣由來錦峯光福里諸岡連屬互卷舒圖經取此或失彼率鮮考實多依模滕六一岡霏玉屑豈以南北分縈紆三壺祗在巨瀛表相隔萬里非通途彼雪仍雪海仍海可以例此原同趣松風水月朅賡韻見前詩行漏清暇還有餘辨疑求是則且止嶺適可尋幽幽娱且喜此海非臨湖無相形益覺邈殊詎藉百川為灌輸無為利涉雲天需眼界真色色寂寂鼻觀浄芬芬疎疎大圓鏡中一合相前茅後勁兩不孤依韻紀事聊得句或者破訛志正吴亦弗更蘄志正吴吉人辭寡有以夫鄧尉山㳟詠皇祖松風水月額疊舊作韻弄影水将月結朋竹與松聖人契理獨春日和詩重老幹偏宜覆寒花不肯濃依依投氣味落落洗心胸右松都惜風吹落吹開亦藉風玉瀛觧楊白銀燭慙去聲揺紅活脱春林態霏㣲日午融乍如訪姑射漫擬獵崆峒右風鄧尉萬峯山太湖一片水相對有餘趣可曰無多子言影那忘形因表亦知裏會心迥不凡璇題揭妙音右水何嘗宿此山浮動待宜月勞人言逸韻如秦視彼越想像入鏡姿自古離塵骨欲問圓缺中花事幾興歇右月靈巖雜詠三疊沈徳潛韻館娃宫毎疊徳潛韻逸興輒鼓舞是中有元音桴蕢而鼓土館娃雖艷哉華清曾詠杜茍不失美刺自足傳今古琴堂東坡醉翁操空山響琅然宧光豈能琴有臺傳遥年攫醳乆不聞惟餘磵水湲詠古抽繹思春蠶方未眠響屧廊山腰洞穴深外狹而中敞石安得有聲云藉梓以響百計悦蛾眉萬古委榛莽後誰襲其踪齊宫踏蓮往涵空閣髙閣俯具區天水相與空來往絮舟者布帆不避風曙光看浴日夜吟疑聆龍洞庭縹緲間虚無仙人宫吳王井名山有名泉往往淙山頂屈哉託吳宫曽照吴姬影銀床金轆轤晨装沈素綆跼蹐秦餘杭迴首空憶井研池研山作館娃研池貯清泠不可測其底俯視深含青輕風起㣲縐靴紋縦復横並無竿絲投醉魚何事驚采香逕句踐行九術伐吴機早露施旦入吴都體不勝䊵素采香供靚装麝風散花霧那慮越兵來惟愁日易暮翫花池乗陽行時令艷裔鋪阿谷離宫奚遣暇敲吟興未足歸愚有佳作淡似春波渌依韻凡三賡藉以揚清浴題上方山楞伽寺跋馬平明到上方闍黎㳟迎去聲蹕途旁試㕘鳥語花香者義合楞伽第幾章治平寺上方䇿騎下山行小憩精藍喜治平𫝊奕當年知此義空桑蕭瑀不閒評逰石湖疊舊作韻江春妨雨那妨晴麗日和風景正清重到宛然識熟路迴思未免動閒情田蠶豐儉彤宫計老幼安懐翠蹕迎小石湖分太湖水漪瀾不起鏡光平行春橋溪跨越來山對横小長橋正好春晴翠鑾自有上公奉白鹿猶傳太守行堪悦目雖二月景最牽懐是萬民情肩摩踵接寧嫌閙但慮塍田誤爾耕湖心亭地分震澤萬之一名藉西湖偶不竒堤上目逰意已足更無須命畫橈移詣文廟行禮毎問招提境藉舒山水情泮宫惟致敬聖道正昌明那見梅英發愛聴松籟清過牆即書院多士朂躬行過紫陽書示諸生士惟首四民名在副其真道重繼濓洛地寧拘歙閩研精味經訓晰理守彛倫莫漫虚車飾吾方起化淳逰獅子林得句一樹一峯入畫意幾灣幾曲逺塵心法王善吼應如是居士髙蹤宛可尋誰謂今時非昔日端知城市有山林松風閣聴松風謖絶勝滿街絲管音題虎邱靈巖寺閶門西轉厯山塘尋勝雲巖春載陽嶊崣峯容真虎踞荒唐劒氣幻魚腸司徒文學應稱獨洗馬風流不可當髙處縦眸喜有在近遥緑麥一方方静觀齋雲巖寺側㡬間屋羲畫昭回嵗月深絲管叢中山水趣觀辭敬識聖人心含暉山館巖壑天成真秀拔劒飛虎踞失之誣娱人山水清暉永謝氏詩還沈氏圖沈周虎邱圖石渠寳笈上等虎邱寺三疊蘇軾韻地脈伏來龍突兀湧巒嶺石梯五十三未至勞捫井真覺泉石佳幻傳光怪耿吟誰虎與龍雜或鼃兮黽湛盧及干將紛稱裂蒼礦越絶書言虎邱池劒三千魚腸在然吴越春秋風胡子曰吴王得越所獻寳劒三枚一魚腸二槃郢三湛盧魚腸已用利僚槃郢以送其女湛盧入椘又載干将莫邪夫妻鑄劒二匿其陽獻其隂故姑蘇志記干将墓有青蛇繞足事乃楊維楨沿蘇詩専引湛盧則與入椘之文不合髙啟既有干将墓詩而劒池詩又云干将欲飛出夫干将陽劒既不獻而自匿於墓其未入劒池三千之數可知啟何轉舍魚腸而取此絶不相䝉者葢稗史語本無稽而文人一時傳竒不無譌舛率此類也惟喜蘇子瞻材雄氣猶猛細故弗記憶鑿空詞塲騁左右取逢源聰明非壅哽我來凡三度今昔祗俄頃亦三疊其韻小立春風冷觀民有正務偃息詎宜永駕言返翠華江城麗午景借問興所託雲外青蓮影有暇當再臨名山訂予請欽定南廵盛典卷八
