  text: 欽定四庫全書欽定南巡盛典卷六十四
  hash: sha256:d002f2eaa4f22a856bfb8cde75f661f3061b78a904fbaf023c600b8694703540
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_096-1a, image: WYG0659/WYG0659-0095c.png}
body:
  text: 海防海塘總圖浙東西十一郡杭嘉寧紹温台六府皆臨大海温台山多土結所有海塘之處間多碶閘斗門蓄洩之利多冲決之患少故厯來修築之事較省於他郡杭嘉寧紹四府江水順流海潮逆上加以回溜汕刷一日兩次非巨石長樁宻排深砌不足以資捍禦然寧紹塘外沙塗近者二三里逺者或數十里非遇異常之湧漲潮不輕至塘根惟杭嘉二郡海水直逼塘下又與湖州及江南之蘇松常各府壤地相接是以防海工程北岸要於南岸按北岸海塘自錢塘縣之江塘起至江南金山界止袤延三百餘里跨連錢塘仁和海寧海鹽平湖五縣然省城以西乍浦以東皆倚山作隄土石相間向來稱為平穏自乍浦諸山突出海口南與鹽邑之秦駐山兩峯遥對山趾角張潮既入套不得舒展至尖山一束激起潮頭活土浮沙難施樁橛所以仁寧二邑之地在在皆屬險要全恃一線塘工為之捍衛塘工有土有柴有石石塘亦有二等自潮走北大亹以來嵗修搶築殆無虚日世宗憲皇帝特簡重臣相度形勢改建魚鱗大石塘一百餘里新添土備塘一萬四千餘丈築石壩以挑溜開引河以分流大工漸舉皇上御極以來一切工程次第告竣金堤屹若崇墉乾隆二十四五年間海潮漸有北趨之勢壬午乙酉聖駕親臨咨度疆吏恪遵謨訓隨時查勘章家菴至老鹽倉一帯加謹修防西塘自章家菴至老鹽倉舊以活沙不能受樁僅築塘庚子翠華五幸以柴塘長至四千二百餘丈未必盡係活沙特命大臣勘估将可以改建石工之處一律興築魚鱗石塘其鎮海塔東字號至陳文港等處為海寧全城保障亦均改建除章家菴天字號起西至范家埠寒字號止因迎溜頂冲先行搶築石塘五百丈外復自来字號起迤東至食字號止建鱗塘二千二百四十丈自場字號起迤東至因字號止建鱗塘一千七百丈甲辰再蒞復命范公塘一帯一律改建石工扵是浙江海塘西起省城東盡尖山遂無一寸土塘現已化險為平安瀾永慶謹将全塘形勢繪圖綴説恭列簡端尖山石壩圖海寧州之東南有尖山其西有塔山相距二百餘丈為海潮入江門户雍正十一年内大臣海望等奏請於兩山間壘石為壩使江水海潮挑向外行於是先築雞嘴浮壩以挑水勢繼用竹簍装石挨磡推墊計築起一百餘丈而波濤洶湧厯二年而不能合龍十三年大學士兼督臣稽曽筠奏請停止至乾隆四年巡撫盧焯復請接築其時䕶沙已漲前測量中流深十二三丈至是最深不過一丈九尺隨接續堵建築成二百丈鑄銕牛四座以鎮之自此掣溜南趨北岸塘堤無濤頭冲突之患者垂二十年寔賴此灞為之障蔽二十五年巡撫莊有恭以壩根䕶沙漸有坍缷請用長方竹簍裝填塊石𦂳貼壩身三層叠砌工長一百餘丈用以攩浪䕶根二十七年皇上親至尖山聖諭以其横截海中直逼大溜為海塘扼要闗鍵特勅加意修防相時改建條石壩工俾屹然成砥柱之勢命插立標記以騐漲沙尺寸三十年再幸尖山閲視量騐竹簍漲沙比較二十七年情形續有増長諭巡撫熊學鵬照新定標記辦理按月勘騐隨時修補兩月一次繪圖奏報四十五年總督三寳奏塔山口従前起有中沙一道計二千五百餘丈今春水稍旺逐漸刷低八百餘丈嗣大學士公阿桂奉命查勘奏尖山至塔山石壩内外自四十六年正月下句以來均有新漲嫩沙而壩外約更寛里許至六月中因風潮狂猛尖山石壩致有裂縫蹲矬潑缷之處總督陳輝祖奉諭趕集料物加𦂳鑲築搶䕶並遵前奉諭㫖如漲沙漸逺即改建條石壩工俾益鞏固無虞魚鱗石塘圖海寧州治濱臨大海早潮晚汐横齧斜捜全藉一線塘堤以資捍禦從前石工皆外用條石包裹内用塊石堆填屢有潑缷康熙五十九年巡撫朱軾於普兒兠地方創建大石塘五百丈工堅料寔足以捍禦頂冲世宗憲皇帝軫念海疆特令全塘一律改建魚鱗大石為一勞永逸之計皇上御宇復命閣臣綜理經畫為濱海生民計安久逺遂先築遶城大石塘五百餘丈次建東西兩防大石塘五千九百三十丈又扵緩修工内次第改建連前巡撫朱軾所築共七千四百餘丈其建築之法先測量地勢髙下自十六層至十八層不等髙一丈六七八尺不等底寛一丈二尺頂寛四尺五寸為凖逐層收分陂陀斜下塘脚密釘馬牙樁四路間釘梅花樁七路用三和土堅築每層用厚一尺寛一尺二寸之大石條丁順間砌参差壓縫自九層以下外砌坦水保䕶九層以上至頂間層鑿成槽筍扣嵌錠鋦聨合牽制難於動搖石之接縫處用米汁油灰灌抿俾免渗漏其塘後身又加帮附塘土戧髙過塘面三尺寛三四丈不等全塘以梁周興嗣千字文編號每二十丈為一字號自仁和章家菴天字號起至海寧尖山脚颻字號止共七百一十八號而老鹽倉改建鱗塘長至四千二百餘丈保衞民生永資利頼所有塘工正面形勢及排樁附戧各式另圖如右又舊建鱗塘就地勢之髙卑定層數之多少今奏明統以十七層為率一律完整條石坦水圖浙江海潮隨地異勢澉浦以東潮水暗長自尖山激起濤頭斜捜横齧潮退之時江流又順勢汕刷是以海寧一帯既重塘身又重塘脚此坦水之制實為䕶塘第一善策也但従前或用木櫃填築或用塊石鋪砌雖多至數層終易潑缷乾隆二年大學士兼總督嵇曽筠建築魚鱗大石塘奏請改建條石坦水遂於遶城五百五丈二尺外鋪砌二層裡髙外低斜披而下面用條石鑲葢底用塊石墊髙每層計寛一丈二尺石口各釘排樁二路闗攔八年大石塘工竣議請一律鋪砌㑹以塘外沙漲停止二十四年潮溜仍趨北大亹石塘根脚尤資擁䕶巡撫莊有恭遵㫖於普兒兠大石塘四百六十丈外俱増築條塊石坦水又修補東西兩塘舊坦水并陸續改念里亭白牆門陳文港秧田廟等處草盤頭為坦水二十八年巡撫熊學鵬奏請小文前魚鱗石塘外建築坦水十六丈又戴家橋汛念里亭汛内有未建坦水者六段請一律添建二層以䕶塘脚二十九年又勘得海寧近城地面勢尤頂冲請於原築二層之外添建一層工長六十餘丈三十年皇上親臨相度以遶城石塘五百三十餘丈寔為全城保障而塘下坦水尤所以捍衛塘身上年加建三層止有六十餘丈殊未全備降㫖将應建之四百六十餘丈一例普築三層石坦既以捍蔽塘根復可保䕶城郭四十五年復奉恩㫖将老鹽倉等地一律改建魚鱗大石塘經大學士公阿桂等議現築之石塘擬離柴塘土戧二三丈酌量坦水地步俟全工告竣後酌地形之髙卑水勢之平險再建坦水及木櫃竹簍等俾塘根得資擁䕶章家菴柴盤頭圖柴盤頭即挑水壩突出海中形如半月盖其處塘堤原屬平穏忽因對岸漲有新沙或海中沙潬隂積水勢直冲平即成險故築此以挑溜其式下捆埽牛鋪底或以竹簍盛石為脚周圍宻釘排樁加鑲柴土又用磈石貼樁填砌以固根基按丈簽釘底面腰樁各二根再扵頂上用雲梯蜻蜓架釘長樁深貫其底形制大小不等有髙至三四丈外圍三四十丈直長一二十丈者自潮走北大亹後隨時建築自西至東計有普兒兠馬牧港戴家石橋秧田廟賣魚橋小文前鄭九臯門前白牆門陳文港念里亭共十座乾隆四年巡撫盧焯復以塘外漲沙漸逺無溜可挑請俱改建石塘奉㫖准行二十四年潮勢又直逼塘下巡撫莊有恭奏請興復陳文港念里亭盤頭二座以挑急溜嗣後秧田廟白牆門曹将軍殿普兒兠馬牧港韓家池凡值頂冲之處又經陸續添設自二十七年至三十年以後因各工次第改建坦水止存普兒兠馬牧港曹将軍殿韓家池四座四十六年大學士公阿桂查勘塘工以水勢北趨仁和之章家菴頂衝險要欽遵諭旨於其地添築盤頭自後溜勢漸離塘根搶築塘工可期平穏范公塘石工圖仁和范公堤外頭圍沙塗挺入江心江流南行向北直刷章家菴其地遂成頂衝前議開濬引河使江水東行頗為順軌皇上六巡浙江復以范公堤本係土塘不如石工堅固因命一律改建石塘使省城永資鞏䕶
