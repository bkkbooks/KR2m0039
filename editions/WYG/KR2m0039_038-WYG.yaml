body:
  text: 乾隆二十年三月二十日上命軍機大臣傳諭兩江總督尹繼善等曰尹繼善奏南巡一切事宜現在立定章程預為籌備等語已扵摺内批諭矣西北兩路現有軍務如成功迅速則於奏凱䇿勲後舉行省方問俗之典實屬應行之事總之南巡之遲早以軍務告竣之期為定應俟朕頒發諭㫖摺内既稱現在預為籌備亦所謂成事不説然儘可從容辦理不必過於急遽况此次南巡與從前初次籌備諸事草創者不同如各處行宫及名勝之地前次既經修建雖已閲數年亦止須稍加葺治可資頓宿而備觀覽足矣其所需經費可將兩淮運庫應觧内府閒欵銀内撥給十數萬兩交與該督等一切均扵此内動用斷不可令商人捐貲亦㫁不可扣地方各官養亷即如直𨽻州縣朕嵗時經歴其辦差悉從簡便近年以來復經核定章程扵官民絲毫無累除修路及尖營地面外片蓆隻木不許用地方官始無以藉口尹繼善等諒所深知自能仰體至前次沿途羅列臺閣故事一切務為羙觀不但徒滋糜費不必踵行且朕車駕所經周覽閭閻省視農作凡事闗吏治民風延覽不暇又何用此粉飾増華徒溷人意為也所過省㑹州郡士民懽忻瞻仰有設綵棚者案以申愛戴之誠自可不禁但聼其出扵本意不必官為指𣲖惟朕恭奉皇太后渡江時前次辦有小船數十隻既可衛䕶大舟而中流植斾鳴指顧間初不覺江濤之浩淼足以仰承聖母慈懐此事仍應照前辦理其餘一應事宜俱令尹繼善酌量撙節妥協籌備静聼軍務就緒䧏㫖遵行此時慎勿先事張皇徒令逺近傳聞致滋揣度也將此詳悉傳諭尹繼善并寄莊有恭吉慶等知之乾隆二十年五月十四日上命軍機大臣傳諭閩浙總督喀爾吉善等曰前尹繼善奏請明嵗南廵預備一切事宜已䧏㫖俟西北兩路軍務告竣後頒發諭㫖遵行此時有預備處只當從容籌畫無事張皇今兩路征兵所至凖噶爾諸部望風投欵接踵歸誠看來即日已可就緒省方問俗自屬應行之事江浙地境毗連所有應行預備事屬相等但俟降㫖後始行籌備未免急遽著傳諭喀爾吉善或當先期飭備前經臨幸各處止湏畧加葺治以資頓宿備觀覽足矣上次過扵繁費此畨俱可不必紹興毋庸前徃即西湖中所需皇太后及朕御舟各備一二隻其餘隨侍各載小艇毋須多備船座以滋糜費其馬匹一項江省已令將現需馬匹開數具奏交軍機大臣代為籌辦浙省湏備馬幾何不敷幾何亦將如何委員採買如何定價之處詳悉奏聞一併交令籌辦至一應費用若扣各屬官養亷及令衆商損資皆㫁不可行浙省商力尤非兩淮可比兩淮尚不准捐輸何况兩浙該督可行文普福扵應觧内務府閒欵内撥銀十萬兩預備浙省辦差之用諸事較前務加簡樸稱朕觀風省俗之意其或過於糜費務事華飾不惟不能邀朕嘉悦将轉致取咎矣該督酌量應扵何時前赴浙省親為料理先期奏聞將此詳悉傳諭知之乾隆二十年六月初三日上命軍機大臣傳諭兩江總督尹繼善等曰明年南巡一應預備事宜已降㫖該督撫等令其撙節妥辦矣所有各處行宫内從前皆陳設玩器此等物件或係假借應用或用重價購買承辦之員徃徃張皇其事藉以邀結上司而對人則苦稱賠累即鄉紳舖戸亦紛然傳為口實在朕不過偶爾駐蹕而伊等先期多方覔置至臨時又或照料不及易致遺失甚至不肖家人胥役即有乗間藏匿者種種情弊俱所不免此際南巡除揚州之高旻寺行宫原係商人自行置辦應仍聼其預備但須交收清椘外其餘各處行宫概毋得陳設玩器惟潔净軒窻布置䄄褥足供頓宿可矣若羅列􅎓鼎以圖飾觀甚屬無謂殊可不必將此傳諭該督撫等務各凛遵倘仍前預備必於尹繼善喀爾吉善等是問乾隆二十年六月十三日上諭内閣曰大學士陳世倌協辦大學士蔣溥等奏稱江浙士庶望幸情殷請扵明嵗再舉南巡一摺朕於乾隆十六年巡幸呉越迄今已越五載該督尹繼善喀爾吉善等均曾具摺奏請朕因西師尚未凱旋未經允准現今膚功迅奏荒服敉寜南省民風吏治時厪扵懐而高堰堤工尤數郡生靈攸繫上年告竣以後正當親加察勘前降㫖扵明嵗春月展謁孔林著允大學士等所請扵禮成之後敬奉聖母皇太后鑾輿順道前徃江浙以抒勤民之隐而慰望幸之忱朕省方觀民入疆考績維期勤求實政宣達羣情一切供頓均出内府絲毫不以擾民地方官毋得指名儲備令衆商捐輸及扣各屬養亷察出定行嚴加究處前者巡幸南省時屢飭各督撫務從簡樸而所至尚覺過於華飾喧溷耳目此次行宫及名勝憇息之地悉仍舊觀但取灑掃潔除概毋増一椽一瓦毋陳設玩器城市經塗毋張燈演劇踵事増華巡覽所及各督撫等果能妥輯井疆康乂蒸庶俾人敦禮讓俗慶盈寜朕自深為嘉悦若其徒事華靡致飾觀羙耗有用之財侈無益之費適以自滋罪戾甚無取焉各督撫及所屬官民人等尚其善體朕心以副朕觀風問俗行慶施恵之至意乾隆二十年六月三十日上諭内閣曰巡省所過城邑除道清塵足矣前次南巡蘇州揚州城内街衢間張設棚幔南方多雨且街窄簷低而上施綵幕既不開爽復滋糜費甚無謂也該督撫其飭禁之乾隆二十年七月初七日上諭内閣曰朕時巡江浙已屢降㫖令該督撫等毋事浮糜毋從簡樸並飭禁一切商捐陋習乃聞前次南巡時浙省辦差至有當商捐費者此㫁不可著再行曉諭嚴加禁止朕清蹕所經觀民問俗闗政治之大端即動用數十萬正帑亦何不可而必取給於捐項乎該督撫等宜仰承徳意撫恤黔黎茍徒以鋪張華麗炫溷耳目至派累各商舖戸使不肖胥役乗機滋擾侵肥是以惠民之典而轉以累民豈朕巡幸本意亦豈所以慰兆庻望幸之忱耶若仍出此朕惟引以為戒不當俯從所請矣如西湖中船隻自皇太后及朕御用一二舟外其隨侍人等原可各載小艇毋庸多備船座以滋糜費再所過城市民居因迎候鑾輿各出誠敬之意於其門前香燈懸綵者自可不禁其行宫陳列玩器蘇揚城郭街衢間張設棚幔已有㫖禁飭至沿途水次從前俱設燈船戲船臺閣俚俗㳺玩之具此不過地方吏役及民間㳺手好事之徒藉名苛歛尤當通行嚴禁該督撫等其凛遵毋忽乾隆二十年九月十三日上諭内閣曰喀爾吉善等奏稱明嵗南巡請照例截留漕糧備用等語著照所請准將浙省本年應運漕糧截畱十萬石以備來春之用該部即遵諭行乾隆二十年十月十四日上諭内閣曰前經降㫖於明春躬詣孔林䖍申祭告爰允江浙臣工暨該督撫等奏請便道南巡一切事宜務從簡約該督尹繼善來京面請訓諭酌定章程近聞八九月以來江蘇所屬各州縣衛卑下之地秋霖致潦兼有蟲傷亟宜賑䘏現命截漕揆粟多方儲備毋令小民稍有失所但稽查散賑必須地方官親身經理春間青黄不接之時尤為𦂳要若因除道迎鑾而賑給稍有遺濫使澤不下逮究非朕意也夫巡省本以勤民辦差與賑務孰重南巡俟明嵗西成有秋該督撫等再行請㫖尹繼善著速行囘任㑹同該撫等確按災地情形董率屬僚實力妥辦副朕嘉惠元元痌瘝在抱之意其明春躬祭孔林典禮仍著各該衙門照例預備乾隆二十一年正月初二日上諭内閣曰上年江浙兩省截留漕糧共一百一十餘萬石原為地方賑䘏之需而其中亦有因朕南巡先期奏明備用者今思該二省現在歉收民食必湏充裕方可有備無患雖屢經降㫖多方撫䘏而將來青黄不接之候小民餬口維艱實堪軫念恐該督撫等拘泥前奏或留其有餘以致澤不下逮究非朕意也所有江省截漕一百萬石浙省截漕十五萬石著交該處儘數賑糶撥用各督撫等其董率屬員善為經理務俾窮黎均沾實惠副朕子惠元元至意該部遵諭速行乾隆二十一年九月二十日上諭内閣曰昨嵗江浙督撫等據士民呈詞籲請南巡朕已降㫖俞允後因江蘇所属偶被災祲地方各官皆有應辦賑務朕恐伊等因除道清塵之役轉扵民事稍有妨誤則殊非朕眷顧羣黎之本意復經特諭停止今據兩江浙省督撫諸臣合詞奏稱西成有慶臣民望幸實深請於明嵗再舉巡幸之典南省民風吏治時厪朕懐兹當嵗羙人和之候省方觀民入疆考績正可抒朕勤民之隐而高堰堤工告竣後亦當親加察看著允該督等所請扵明春時巡至扵一切供帳頓次絲毫不以累民地方官承辦差務寜樸勿華從前所降諭㫖甚明該督撫等其善體朕心以副朕觀風問俗加惠斯民之至意將此通行傳諭知之乾隆二十一年閠九月二十四日上諭内閣曰據兩淮鹽政普福奏稱明春南巡所有淮揚一帯運鹽船隻扵今年十月内令該商等先期預運四十餘萬引堆積儀所以資來嵗江廣食用等語此項鹽引先期預運堆貯不無滷耗著加恩照十六年之例毎引加耗二十觔以裕民食以紓商力乾隆二十六年閏九月二十六日上命軍機大臣傳諭直𨽻總督方觀成曰江省辦理官馬以備明春差遣之用而直𨽻所買官馬為數既多現在亦無急需之處著方觀成即親赴張家口據實查明已買若干價值若干其已買得者令委員即送囘南未足數者於直省現買數内撥往將南省馬價照原值扣存俾南省應差無誤亦不致藉詞價昂冐銷同日上諭内閣曰朕明春巡幸江浙所有供宿頓次皆出自帑項絲毫不以累民第扈從官兵以及外省接駕人等輻輳雲集經過地方錢米價值恐一時或至騰踊著将運京銅鉛两省各截留十萬觔添爐鼓鑄减價發賣并将該二省應運本年漕糧各截留五萬石减價平糶以裕民間日用該督撫其各飭屬員實心經理毋使吏胥滋弊務俾均沾實恵該部即遵諭彳乾隆二十一年十月二十八日上諭内閣曰程盛修奏南巡接駕之在籍官員請限以品級並守制諸臣停止接駕一摺其所見非是朕稽古時巡省方問俗黄童白叟皆得懽迎道左共申愛戴其在籍大僚夙叨恩遇自當遂其覲光之願即小臣中踈逺罷斥者既曽沾一命亦何至禁阻令不得與民齒此與朝儀之定頓威以明體制固不同也雖此等接駕人員不無望恩幸澤之意然在朕自有權衡上次南巡時亦俱就其罷斥情罪酌量分别其間有棄瑕録用者餘或加恩復其原銜或降等給以頂帶未嘗概得濫邀異數此爾諸臣所共知共見試問有因接駕復用而劣蹟仍前昭著殃及百姓者誰乎至扵守制諸臣教孝作忠均闗至性何曽概令其必出迎鑾然其中有將届即吉之期或林墓之事已畢者而竟閉門不出扵心自有所不安即如親老終養者自應不離親側然里門咫尺而不令其一展葵向之誠乎且此等亦各揆時度理即不能來迎者原未嘗罪一人也程盛修既有此奏恐外間無識之人或未免尚有拘牽之見可將此通行曉諭知之乾隆二十一年十一月二十九日上諭内閣曰朕恭奉皇太后鑾輿南巡江浙於來年正月十一日起程乾隆二十一年十一月三十日上諭内閣曰前已降㫖江浙兩省各截漕五萬石以備平糶之用但明春廵幸所經江省地方較多五萬之數恐尚不敷著再截留五萬石分貯平糶俾市價不致昂貴扵民食尤有所濟該部即遵諭行乾隆二十二年正月二十日上諭内閣曰山東之濟寜金鄉魚臺滕嶧等五州縣上年偶被水災已降㫖於加恩賑恤之外加賑兩個月以資接濟今翠華經臨念閭閻春作方殷麥秋有待著再加賑一個月該撫其董率属員實力查辦以副朕軫恤災黎至意乾隆二十二年二月初二日上諭内閣曰上年江南之淮徐海等屬被水偏災除照例賑恤外復經降㫖分别被災輕重加賑一二三月以資接濟今朕翠華南幸體訪民情而災地貧黎尤深軫念著再加恩將下江被災之清河桃源銅山蕭縣沛縣邳州宿遷睢寜海州沭陽徐州大河等十二州縣衛及安東豐縣二縣同上江被災之宿遷靈璧虹縣長淮等四縣衛毋論極貧次貧俱各加賑一個月以普恵澤該督撫等其督率属員妥恊經理慰朕懐保至意該部即遵諭行乾隆二十二年二月初八日上諭内閣曰江浙二省讞獄滋繁陳臬之司素稱劇任兹朕巡省所至覃布恩膏黎庻均沾閭閻愷樂而有罪之人囹圄桎梏實由自取亦何恤焉但念獄一成而不變其中奸民之犯法者固多而無知悞蹈之人亦所時有况未抵扵重辟尚可望其自新用播徳音以符寛大所有江蘇安徽浙江等屬軍流以下人犯俱著加恩各予减等發落從此案牘一清在問刑各官當益勵精勤期扵明慎而凡爾百姓更宜各安本業勉為良民勿謂曠典可以倖邀而輕國法也乾隆二十二年二月十九日上諭内閣曰上江所屬宿靈虹三州縣及長淮一衛去秋被水災黎其成災在六分以上者業已多方撫恤復兩經降㫖加賑自可不致失所惟被災五分地畝定例既不成災不在給賑之内而其中有積水未消而不能種麥之處及已種春麥正月内又為毛城舖减洩黄水淹浸者雖可播種大田而時距秋成尚逺貧民生計不無拮据清問所及軫念殊深著加恩於例借一月口糧之外再加借一月口糧以資力作該督撫其董率屬員查明速辦乾隆二十二年二月二十二日上諭内閣曰朕於囘鑾渡黄後由順河集至徐州閲視河工朕即由徐州至曲阜展謁孔林途經泰安登岱拈香本日仍囘大營駐蹕可傳諭鶴年預行備辦其登山路逕但須畧為掃除足供行走即有窄狹之處或乗馬或用行山歩輿即緩歩徐行亦何不可者且皇太后鑾輿並不登山切不可撘架天橋致多竭蹶皇太后鑾輿仍由順河集舊路先至靈巖駐蹕可一併傳諭知之乾隆二十二年二月二十三日上諭内閣曰江蘇徐州府之銅沛邳豐蕭碭雎等七州縣上秋偶被偏災業經蠲賑並施并將新舊漕糧槩行停緩第朕念該處俱係積歉之區民鮮葢藏將來青黄不接之時正須設法調劑所有七州縣熟田應徴漕米二萬四百餘石著即截留本地照例糶借庻於民食更為充裕該部即遵諭行乾隆二十二年二月二十八日上命軍機大臣傳諭兩江總督尹繼善等曰朕於囘鑾渡黄後前徃徐州閲視河工所有營尖道路已有㫖令其不必過求齊備至前次山東直𨽻因囘鑾已值初夏天氣炎熱搭盖天棚此次尚可聼其撘盖至扵江南境内則尚在春和斷不可一律倣效其餘一切預備俱宜從簡看來該督撫等所辦未免較前加増即如沿河水營辦事草亭乃前次所無如此踵事増華所動何項徒資藉口其現有者俱著拆去可一併傳諭知之乾隆二十二年三月二十二日上命軍機大臣傳諭總河白鍾山曰上次南巡挽縴河兵所需日費及製備衣㡌銀兩俱扵河庫公項動用此次因清查公項之後該督等遂於各兵月餉内坐扣所辦非是河兵挽縴甚為勞苦而更扣其月餉耶可傳諭白鍾山令將挽縴河兵日費等項銀兩仍照前例於公項内開銷不必坐扣還項以示朕體䘏兵丁之意乾隆二十二年四月初六日上諭内閣曰徐州等府屬州縣叠被水災業經蠲賑兼施並截留徐州本處糟糧以供借糶昨車駕幸臨又復將所有借欠籽種口糧不分新舊概予豁免凡以曲體並施冀於災黎少濟今思該處倉儲未裕不可不預籌著再將本年現運漕糧截留五萬石存貯徐州等處以備不時之需其上江之鳯陽等属頻年被祲小民艱扵謀食並著截留糟米五萬石撥運鳯陽等處備用其酌截何帮糟船並如何分别收貯之處著該督撫等悉心區畫一面辦理一面奏聞該部即遵諭行乾隆二十二年五月初三日上命軍機大臣傳諭兩江總督尹繼善等曰前據尹繼善奏稱江省官員有願捐養亷承辦差務之舉已面諭禁止凡一應費用俱令動項按欵照数撥給不得分毫科派但恐臨時料理容有用浮於數之處亦未可定特傳諭普福令其撥給銀十萬兩交與尹繼善等酌量支用然不得因銀两充裕以致屬員侵冐浮銷總在該督撫等悉心綜核若此項銀两僅足支給則已如不敷著再請倘尚有嬴餘即留貯該省為下次之用此項報銷雖毋庸咨部核議然朕南巡地方公用有何不可對人言之事若有則是私弊尚未盡除矣其正項開銷之外凡所動用細數仍著開造清冊咨送軍機處以便存案著傳諭尹繼善等知之乾隆二十二年十一月二十七日上命軍機大臣傳諭两江總督尹繼善曰今年南巡辦理差務一切俱早定章程地方有司較前更為熟練比之乾隆十六年生手初辦大相逕庭所有動用銀數報銷奏冊何以至今尚未奏到可傳諭尹繼善即飭經手各員速行據實開造亦不宜太遲並查較乾隆十六年所用之數有無减省不可聼其任意浮冐統扵嵗内具奏為是欽定南巡盛典卷二十六
