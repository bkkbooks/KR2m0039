body:
  text: 河防乾隆二十二年九月初七日裘曰修夢麟鶴年奏言竊臣裘曰修臣鶴年於六月之初在於嶧縣韓荘之迤西查舊有伊家河一道雖河形尚存而淤埂已乆是否開通得以疏消湖水臣等遽難定議應俟委員確勘再行查辦業􅀴具摺奏聞臣裘曰修即前赴徐州河南等處查辦一切臣鶴年回省之後即委布政使阿爾泰運河道李清時㑹同確勘是否可開有無利益據實禀覆今據該司道禀稱㑹勘得伊家河舊有水溝形迹寛一二丈深一二尺不等隨沿河往東南履勘相度形勢及入運處所其河身叚落自韓荘迤西舊有河形之伊家河開起至江南之梁旺城入運計程六十九里七分零一萬二千五百五十三丈河頭髙於河尾一丈九尺四寸所開河面自應加寛但據泇河通判張克儉禀稱逐處挖井測騐下多砂礓刨挖需時恐悞放水未便加寛原議河靣只寛七丈似覺稍窄今議定開寛八丈底寛四丈深一丈二三四尺不等河尾入運之處挑寛十丈使湖水得以暢流河頭處所係江南利國驛驛路所經請照兩江督臣所議於河頭建滚水石壩一座按河身寛八丈壩座金門應寛十一丈有零並酌建石橋以通驛路所需土方滚壩各工料原估需銀四萬二千三百八十六兩零今河面加寛一丈土方銀數加増另行估報如有河身開至民間地畆之處亦即照例查辦時值臣夢麟到濟共相斟酌至韓荘詳悉相度洵屬應行之事至徐復與臣裘曰修籌辦意見亦復相同臣等伏查微山湖積水為患以致濟金魚等荘村乆被淹浸時厪宸􅇆諄諄訓誡惟期民生永奠袵席早登我皇上宵旰圖維仰見匪朝伊夕臣等敢不竭力籌辦設法疏消以上慰聖懐惟是湖河一片去路甚微運河之水年来又復盛漲而傍洩運河之漲者全頼支河分流暢達無滯今河清等閘越河業經兩江督臣尹繼善酌議開寛盧口等處又擬堵閉入運之水既分則來源漸少亦可日就疏消其下游之駱馬湖臣夢麟臣尹繼善㑹商挑挖菱溝港河二道由運河入海以資分洩至伊家河實為微山湖宣洩扼要之區今速行挑濬與荆山湖口三路爭流則奔騰無滯直注八閘之外微湖積水自能遞掣而下臣等再四詳查自應如該司道所議迅速辦理謹繪圖貼説恭呈御覽伏候諭㫖欽遵臣等現在商酌擬􅉽兖沂曹道徐鐸運河道李清時督辦並分派叚落専員經理於九月初七日興工臣鶴年另摺恭奏外臣等仍不時往來親加查勘務期速竣厥工庶上游可資宣洩而下游亦無滙注之虞除移督臣尹繼善河臣白鍾山撫臣陳宏謀髙晉胡寳瑔臣等謹㑹同河東總河臣張師載合詞恭奏奏入上諭曰如所議行乾隆二十二年九月十二日夢麟尹繼善白鍾山嵇璜陳宏謀奏言竊惟淮徐海地方水患頻仍民罹災苦荷䝉聖心軫念宵旰憂勞特命臣等悉心熟籌不惜帑金開濬河道以期消彌災患拯救民生臣等恪遵訓㫖公同啇酌通籌全局竊以湖河之水各有源流支派要皆以海為歸宿若下游去路不能疏通則上流來源必多壅滯湖河正身不能容納則民田廬舎即受漫淹淮徐等處厯年之被災皆由於此臣等親厯各處遍加查勘細考受病之由詳求治病之法必使田間坡水層層引導由溝渠以達湖河湖河之水莭莭疏通由尾閭以歸大海則源委並治支幹兼修庶可蘇積困而收實效如山東與江南接壤之南陽昭陽微山等湖積水未消亟宜設法宣洩在山東僅由湖口閘入運過水無多現在另行籌開伊家河至梁旺城入運江南運河經邳宿桃清一由楊家荘出口㑹黄一由塩河閘壩滙六塘河入海現在運河俱屬寛深各閘越河已經奏明再加開展運河内如有砂礓淺滯間段應濬者並行相機辦理惟因沂河之水自盧口旁洩由沙家徐塘二口入運過多有阻㣲山湖水經行之路經臣尹繼善奏明酌辦臣等親往細看沂河源出山東河寛百餘丈行至邳境盧口地方正流由駱馬湖六塘河歸海旁流由盧口壩分注入運祗縁舊壩口門寛至八十丈且未築石底年乆刷深以致旁流過多淹没邳境民田阻礙運河宣洩亟宜籌辦但沂水來源甚大若遽行堵閉不但暴漲之時全注六塘為宿桃清沭之患倘遇運河水小之年無以接濟亦甚有闗係再三相度擬将石壩裹頭接長中間祗留口門寛三十丈並築亂碎石壩底以為莭制使沂水多半歸湖祗留二三分濟運但目下運河之水惟患壅滯無需接濟應於盧口築做草壩将沂水堵截使涓滴不得入運其邳境沂河尚屬寛深間有積沙淤灘酌加疏濬兩岸土堰亦為培修使沂水正流暢入駱馬湖由六塘河歸海俾運河宣洩㣲山湖之水得以全力下注庶可望其速消至荆山一河原係分洩湖水之要路業䝉皇上指示於小梁山内華山茶城開挑引河其有沙積灘現之處現在凛遵諭㫖於荆山橋上下並出水湖口再加疏濬務使暢流入運其荆山橋下游之彭家河又經臣夢麟奏准開濬現在趕辦此籌辦微山等湖宣導入河歸海之情形也又勘得六塘河處駱馬湖下游為宣導沂水之要道駱馬湖尾閭有引河五道甚屬寛暢自引河以下滙為一河形勢窄狹亟宜開寛並將永濟橋酌添一十二孔俾湖水暢注其六塘河内如有間段淤淺及兩岸舊堰殘缺之處亦應修濬培補又六塘河北岸宿遷境内凌溝地方向有水口通砂礓河注於沭陽縣之沐河入漣河歸海盛漲之時散漫四出波及民田今擬就現有河路開挑寛深仍於凌溝酌建滚壩俾節宣有制又桃源境内有港河一道亦係分洩六塘河㑹沭入漣歸海年乆淤淺應行挑濬亦於河頭建築滚壩並将沐河舊堰酌加修補使六塘得有分洩之支下游可免為壑之患至六塘河下尾在海州地方與塩河交滙由武障義澤項冲東門白蜆牛墩六里等河歸海口門閘間有淺阻俱加疏濬並将塩河加挑寛深現有之洩水各壩減低二尺其例應啇人辦者仍歸啇辦臣等派官監督俾塩運洩水兩有禆益惟義澤項冲二河與武障下游同歸北潮河紆迴灣曲宣洩不能通暢今查義澤河下游舊有小冲河一道年乆淤墊應行疏濬深通則洩水更為徑直又東門白蜆牛墩六里等河由六道溝滙入北潮河與武障義澤同歸一路未免壅阻今查東門河下游現有五圖河河形淤塞應行開挑深通俾下游尾閭多一入海之路庶千里長流咸順朝宗之勢自無横溢之虞此籌酌六塘河分導沂水入海之情形也再河南夏邑永城等縣之水向由濉河下注江南宿靈虹之楊疃泗山等湖經宿遷之烏鴉嶺桃源之安河抵泗州陡門入洪澤湖出清口㑹黄歸海近年河道多有淤阻業經臣裘曰修臣髙晉㑹同查勘将應行挑濬之處具摺奏明内有烏鴉嶺安河董家溝等工係下江宿遷桃源所管乃濉河五湖之水歸入洪澤湖尾閭更為𦂳要現在委員確估趕辦惟各水多歸洪澤則出口務須宣暢查凊口之束水二壩業䝉聖明指示汛前早行拆䣃俾得暢流自當永逺遵守其冬間收束之時亦宜相機斟酌如湖水足留敵黄則口門酌量留寛不得收束太𦂳其裴家厰張福荘等處引河俟水落之後通身細看如有淤淺並加疏濬使湖口出水得以暢達此籌酌濉河入湖並湖水入海之情形也以上應開各河道或因舊河淺窄而加挑寛深或因來源寛廣而添籌去路皆係上接隣省下聨數郡之幹河所當首先興舉其餘一州一邑山泉坡水連界接疆滙而成河必須因勢利導使之水由地中如碭山之利民溝永定溝豐縣之食城河蕭縣之歐邵河爛石河銅山之奎河房村河睢寧之沈家河白山河邳州之武河燕子河艾山河宿遷之北岸民便河蔡家閘引河羅家河桃源之姜胡窪河清河縣之包家河民便河郭家河周橋河山陽之十字河太平河烏沙河安東之民便河舊塩河阜寧之穿里河戴家溝河海州之髙􅇕口王官口丁家溝等河沭陽之分水沙河以上均係支流於民田俱有闗係現多淤墊脈絡不能貫通臣等詳加斟酌有必須通身開挑者有止須間段疏濬者有疏洩積澇添設閘洞者俱應因地因時逐一經理使之入湖入河各有㑹歸現在督率道府選帶熟諳人員分頭確估一面委員興挑臣等往來督查限於年内告成以期積水消涸農民及時播種仰副我皇上念切痌瘝懐保黎元之至意所有敬籌湖河宣導機宜謹偹晰具摺恭奏並将各河源委繪圖貼説同臣嵇璜奏准下河應濬河道一併粘簽恭呈御覽奏入上諭曰覽奏頗得領要但須諸臣無分彼此和􅇆共濟以慰朕南顧之憂仍須實力督催不可草率塞責其共勉之圖留覽乾隆二十二年九月十四日直𨽻總督方觀承山東廵撫鶴年奏言乾隆二十二年八月初六日欽奉廷寄上諭近年山東頻被水患而今年南運河更屬異常泛漲因思東省境内如徒駭馬頰及老黄河等皆古九河故道原為河水分注之區其遺迹故在特因循日乆遂致湮塞若将南運河之水從此宣洩相當淌注迅速方觀承當往來徳州一帶閲視堵築第三屯决口或即乗便前赴山東㑹同鶴年將徒駭馬頰等舊日河身循行履勘核其現在形勢如可由此放運河之水似亦一宣洩之法但今昔異宜亦不必存膠柱之見現今秋分已届海受衆水之時應酌量導之入海俾有所歸天津一帶凡有可開支河分減水勢之處亦即相度情形妥協籌議一併具奏縂期廣為疏濬使尾閭通暢則水患自可漸消要在師古人之意而不泥其迹斯得之耳着将此傳諭方觀承鶴年等知之欽此又於八月二十四日欽奉廷寄上諭鶴年所奏堵築三屯决口及挑􅀈支河一摺内稱四女寺哨馬營二處皆運河歸海之路現已興工挑濬等語朕前以運河異漲非洩之入海不能消減是以降㫖方觀承鶴年等令於徒駭馬頰等處相度歸海之路設法疏濬原非欲復九河故道縂期於洩運河之水使之入海不必存膠柱之見今鶴年所奏四女寺哨馬營等處既為洩運尾閭此即朕諭中所及該撫等自當及時開濬以收疏導之益至此外或尚有可資宣洩者亦應留心查勘次第辦理縂之多一入海之路即多一洩運之路不必拘泥也著将此諭令方觀承鶴年等知之欽此臣方觀承欽遵於八月二十四日自天津起程由徳州哨馬營四女寺一帶㑹同臣鶴年赴東昌府運河東岸查勘馬頰徒駭二河復至東阿縣屬之張秋鎮迤南周廻閲視查得運河自汶上縣南旺分水處引汶入運北行三百八十里經東平東阿聊城博平諸境至臨清州衛水自館陶合漳水滙之又北行三百三十餘里經武城恩縣徳州入直𨽻境厯吳橋東光南皮滄州青縣静海天津以達於海除直𨽻境内運河有㨗地興築二減河分流入海莭年加濬深通現資宣洩經臣方觀承奏明其山東境内運河自徳州至南旺共七百一十二里内有徳州哨馬營減水壩一座寛三十丈壩面髙運河一丈二尺又南五十五里有四女寺減水壩一座寛八丈壩面髙運河一丈堤外老黄河一道即古之鈎盤河哨馬營壩下引河長五十里四女寺壩下引河長九十里俱入於呉橋縣屬之玉泉荘㑹流經寧津南皮樂陵塩山慶雲至海豐縣大沽口入海計長二百九十里自四女寺而南又三百七十里過臨清州至博平縣之魏灣有馬頰河一道係唐時黄河故道經清平髙唐恩縣樂陵慶雲至海豐之沙土河入海計長五百七十里河頭十里之内設有減水壩一座寛八丈壩面髙運河八尺減水閘二座每座口門寛一丈五尺底髙運河七尺五寸涵洞一座寛八尺底髙運河五尺五寸自馬頰河而南又五十五里至聊城縣屬之龍灣有徒駭河一道即古之漯水經博平茌平髙唐禹城濱州至霑化縣乆山口入海計長六百五十里河頭八里之内設有減水壩一座寛八丈壩面髙運河七尺五寸減水閘二座每座口門寛一丈五尺底髙運河七尺五寸自徒駭河而南又一百三十里至東阿縣屬之張秋鎮舊有五空橋一座寛十一丈五尺底髙運河一丈二尺又南二十五里舊有三空橋一座寛八丈底髙運河一丈五寸五空之南三空之北乾隆十九年復建有減水閘三座每座口門寛二丈底髙運河一丈減西岸沙河趙王河之水由堤外引河就近入於大清河歸海自三空橋而南又一百二里即係南旺分水處為汶水北入運河之始以上七百一十二里中䝉聖諭指示之老黄河馬頰徒駭三河所有減水壩四座減水閘七座涵洞一座又三空五空橋二座今年盛漲之時俱過水自三四尺至一丈五尺不等現在尚過水自一尺至六尺不等合計閘壩各口門共寛八十六丈三尺皆以宣洩運河盛漲入海其馬頰河河身寛自二十丈至一百餘丈容水為多老黄河次之徒駭又次之此運河分減舊有之途經也臣等欽遵先後所奉訓㫖惟期洩運多途不敢稍存膠柱之見兹查哨馬營壩口並壩下引河業經臣鶴年奏明挑挖現在深通其四女寺壩外十二里有徳州三十里舖大橋横亘髙埂之上橋内水深三四尺橋外迤東至嚴家荘四十里内水止二三尺形勢不順自嚴家荘下接玉泉荘㑹流處中間四十里並無河身水勢散漫髙低不一應行一律挑深自呉橋以下老黄河均於乾隆十四年水利案内抽挑子河迄今不無淤墊並葦草阻塞之處均應徹底疏通馬頰徒駭二河亦於乾隆十四年曽經挑濬莭年水過沙停閘口引河尤多淤阻並須加挑河身之内亦多蘆葦盤結兼有民間捕魚土壩及道埂攔阻之處均應間段清理又馬頰河於海豐境内將近入海處所有羊沽橋支河一道現為居民築堰斷流並應拆毁以暢尾閭又各河所經橋座多有窄隘兩頭土壩甚長束水不能暢流並須拆改展寛添設木橋寛通水道俾無壅遏方為妥協查各河至海豐綿長數百里復多支河傍港臣等已派委明白河員每處二人挨查自至海口逐段測量水勢分晰開報但河身現皆過水其寛窄深淺情形尚難查丈確實應請俟水勢消退之後再行復勘分别工程難易或勸用民力或動帑興修臣方觀承㑹同東省撫臣河臣次第妥酌辦理期於支流暢達洩運有資以仰副我皇上指示機宜期於有偹無患之至意再查張秋運河西岸有沙河趙王河二道滙上游河南之儀封延津直𨽻之長垣東明山東之鄆濮范張諸境厯來横衝入運每逄水發勢甚汹湧而該處運河兩岸東髙西下東岸所設之三空五空橋及減水各閘口門皆髙運河一丈至一丈二尺水勢不能暢消不獨運道阻艱兼致附近州縣汛溢為患本年八月盛漲之時臣鶴年曽於三空五空橋之間新閘之南地名八里廟将運河東堤刨開數丈洩水入大清河數日之内運漲頓落旁邑積水亦消行之已有成效今臣李清時公同詳加相度應請即於此處建滚水石壩一座面寛十二丈底髙運河八尺比五空橋低四尺比新建閘座低二尺遇八尺以上之水即可由此減洩隨長隨過不須啟閉兼有限制既資分導之利並收濟運之益相應一併請㫖交與新任撫臣㑹同河臣再行籌議奏請聖訓辦理至直𨽻天津一帶支河祗係消洩境内􅅹水下通淀泊無闗南運宣洩等情形業􅀴臣方觀承恭摺奏覆在案所有臣等㑹勘各情形及籌辦縁由理合繪圖貼説恭摺具奏奏入報聞並有㫖諭部乾隆二十二年十月初三日山東廵撫蒋洲奏言竊山東徳州衛所三屯四屯地方本年六七月間運河水發各衝决堤口淹浸田廬臣赴任道經徳州於九月十四十五二日親赴各該處勘視查三屯地方有哨馬營支河原為宣洩運河之水由海豐入海近年支河淤淺運河水無洩㵼本年水大遂致衝决三屯堤口經陞任撫臣鶴年親詣該地督率署徳州知州呉祖修将哨馬營橋洞開通使水洩疏始於老堤决口之外搶築月堤一道使運河之水不能流入三屯之水方得盡涸今老堤决口現尚水深工力難施應俟來嵗春融方可填築於新築月堤内外堵禦庶可永資捍衛又四屯地方亦有四女寺支河藉疏運河之水亦俱淤淺支河髙於運河今年運河水漲水難消洩将四女寺上游衝决兩口目下南岸决口已築月堤抵禦現在北岸决口未築因尚有武城縣菜家場决口漫入恩縣西北鄉下灌四女寺附近民田積水頼此决口洩㵼須俟水退後再行填築臣又查哨馬營支河由東省流入直𨽻復轉入山東海豐入海現在下游一帶悉屬淤淺以致水難暢流自易泛溢臣管窺之見先於哨馬營支河上游築一攔水土壩堵截河水将下游淤淺之處一律開濬深通之後拆去土壩俾水得暢流其四女寺支河係由東省老黄河而下合入海豐縣入海下游淤淺各處亦須逐一開濬此二處支河均闗民田耕種皆應及時急為開濬使水得暢流入海自可永慶安瀾其開濬工程應請責令各該地方官各就境界分段承辦専委濟東道稽查督率其哨馬營支河下游有屬直𨽻地方者聴督臣方觀承委員承辦庶各耑責成辦理可期迅速再臣勘得徳州運河兩岸堤岸係保䕶民田廬舎例係民築民修現在面寛二三尺底寛四五尺不等追溯其源因河水日事衝激堤泥剥落是以堤身日薄而河底日漸淤髙現今運河水面髙於堤内民田且運河過往船隻絡繹停泊必在堤身錠椿繫攬現多殘損水發之時漫决甚易民力有限勢難責其加築寛厚此又保䕶民間田廬必應早為籌畫之處臣伏思皇上痌瘝在抱凡於民生有益莫不上厪宸􅇆不惜帑金登斯民於袵席之安本年災祲之餘災黎已荷聖主撫賑頻施無虞失所但賑畢之期在二月正值青黄不接之時臣愚伏懇皇上天恩俯准動項将臨清以下一帶運河悉行挑濬深通其堤岸加築髙厚務須面寛一丈底寛三丈於明年二月鳩工集事寓賑於工小民之利頼無窮矣如䝉俞允臣再㑹同河臣逐一估計咨啇直督臣方觀承㑹同請㫖遵行其餘東省水利工程臣甫經到任現擬将政務料理數日即親赴各處逐加查勘㑹同欽差及河臣等籌議趕𦂳辦理務期一勞永逸息水患而安民業以仰慰聖主宵旰厪念之徳意奏入上諭曰已有㫖交劉統勲帶去爾等同心實力妥為之乾隆二十二年十月十四日裘曰修夢麟張師載蒋洲奏言臣裘曰修臣張師載於濟寧上下查勘臣夢麟臣蒋洲前後俱至韓荘㑹同籌議查得山東應行疏濬之處兖州為要曹州次之其故皆原於微山一湖積水不消以致宣洩無路臣裘曰修與前撫臣鶴年六月間於微山湖一帶相度地勢惟伊家河形勢最順檄令藩司阿爾泰運河道李清時勘議嗣臣夢麟與撫臣鶴年又細加講求奏請興工臣裘曰修於九月初七日復到工所諭令将原估十丈河請再行展寛數丈今已按段分工併日儧辦總期十一月上旬完竣将来告成㣲山湖積水建瓴而下則濟寕金鄉魚䑓滕縣嶧縣以及江南之豐沛二邑地畆可以普行涸出既有此宣洩之路即伏秋盛漲亦必不致如前此之壅閼不下臣等再詳求原委水消之後更有應辦者在兖州言之魚臺縣屬有舊運河一道係明代未開泇河之先舊行運道也在今運河之西向雖年久不治河形尚存且通舟楫今則淪入湖中㡬及二載查此河故道界㣲湖之西南上接濟寧牛頭河金鄉之淶河桞林河由沛縣安家口鬭虎店至銅山縣之玉皇廟出茶城十字河至荆山橋入邳州之彭家河歸運若㣲湖消退之後疏通此河並牛頭河淶河桞林河一併挑濬在下游言之則直接現在之茶城河頭而脉絡貫通在上游言之則濟寧金鄉以下各州縣滙注之水皆有去路而水患可除矣又泗水河發源於泗水縣之陪尾山􅀴曲阜縣滋陽鄒縣入濟寧州境歸魯橋濟運在滋陽鄒縣曲阜境内者向不為患自濟寕州姚家荘以下河身愈下愈窄至張家橋等處寛不及四分之一在在淤阻致多泛濫迄今未消又白馬河自鄒縣北九龍山發源入濟寧孟家橋歸獨山湖濟運因中叚之董家口與泗河相接泗河之尾窄隘不能容納每多旁溢遂漫入白馬河合流愈致淤阻今請於泗河白馬河二水並将河尾挑浚務俾各行故道勿致交阻則兩河分流消納亦易矣此均在伊河既成㣲湖既洩之後所應辦之工程也至現今可興舉者有府河係泗水分支向有金口閘俗名黒風口建涵洞二座由涵洞穿入府城至濟寧東闗之楊家壩一出天井閘入運一㑹洸河入馬場湖今涵洞淤墊已在河底來路既已壅滯至楊家􅄵又以用土堵築去路亦復隔㫁每嵗俱有暴漲之虞今若将涵洞改建減水閘一座楊家壩亦改建石閘一座用板啟閉則上下通流且有節宣之制至洸河㑹流入馬場湖之洸河每多旁溢查自濟寧之興文鎮以下舊有河形一半入運一半入馬場湖年乆淤墊應請挑浚則兩河交治矣此現今即可興作者也至曹州府則應分二道言之其西南一道則自豫省之延津滑縣封邱直𨽻之長垣東明等處坡水漫溢而來是以明代建築太行堤之始即沿堤開河一道名曰順堤河長短起止悉與堤同使順軌東流曹單等縣入江南豐沛境以逹於㣲湖自㣲湖水長此水不能下逹以致每嵗為災多有淤墊此亦在伊河既成微湖既洩之後所應辦之工程也其東北一道則曹濮范鄆夀張陽榖上承濮州定陶各坡河之水俱從沙河趙王河二處入運由東岸之三空橋五空橋及平水閘洩入大清河歸海而壩底過髙宣洩不及今嵗衛河異漲運河為其頂阻倒様而上遂多淹漫今直督臣方觀承前撫臣鶴年奏請於八里廟添建滚水壩一座臣等再加詳酌此處正當沙趙二河之衝於地勢最為切中但壩底仍髙則泛漲之時尚有不能暢消之慮今奉㫖俱放低改為七尺以使過水仰見聖鑒精詳之至應欽遵辦理總使平槽之水濟運有餘而泛漲之時消減亦易則曹州東面一帶水患可除矣且不獨此也向来入運之水無所宣洩泛溢於上則濮州范縣朝城莘縣陽榖夀張等處固先受其患泛溢於下則鉅野嘉祥濟寧金鄉魚臺諸縣亦為所波及今沙趙二河既治則水之從東入大清河歸海也地近而速不復從鉅野以下南灌金濟是即於兖屬言之治之於源頭亦止火息薪一術至東省地勢臣等上下察看並詢之河員該地土人實係安山以南東髙西下安山以北則西髙東下東堤之外入大清河之路勢皆順利無虞倒漾若馬頰徒駭四女寺哨馬營等處皆為東洩入海之路已前後奉㫖遣員分導是諸水皆有所歸東省數千里從此可免積潦之患臣等公同啇酌意見相同謹據實合詞陳奏臣張師載臣蒋洲再逐細詳審確估並各支港溝渠分别民力官工一切及時辦理以期仰副聖天子軫念民生之至意再查沂沭二水皆為幹河沭河至江南􅀴沭陽縣入海山東境内尚屬安流沂河正支入江南之駱馬湖旁支從盧口入運向因入運太多臣等業􅀴㑹議於盧口建壩不使多洩以疏運河水勢今開沂河入駱馬湖之正支受賢集等處多有淤阻如此則恐夏秋水漲之時蘭山郯城易致泛濫臣等仍咨明江省将沂河入駱馬湖正支再行疏通増入下江水道工程案内辦理合併聲明奏入上諭曰覽奏俱悉朕正慮沂州府屬每被水災摺内有疏通駱馬湖之議速行妥協相度乾隆二十二年十月十八日白鍾山嵇璜奏言竊查下河歸江歸海各工一案欽奉諭㫖令臣等督率屬員悉心妥恊辦理俾下河民生永有禆益欽此欽遵臣等與督臣尹繼善當經飛飭該管道府選帶熟諳估計人員将各處工程分頭確估上𦂳興修去後查湖河水勢歸江近而歸海逺歸海紆廻而歸江徑直是以臣嵇璜前奏内将歸江者列為急工歸海者列為緩工今查歸江之路固宜急辦而歸海各工其中亦有應行先辦者不便以列為緩工遂使遲緩如歸海工内髙寳運河東堤之郎兒閘子嬰南閘邵伯減水三閘水大則藉以洩水歸海水小則藉以灌溉民田今因年乆損壊急應拆修完固以資啟閉阜寧之射陽湖改紆為直移逺為近則歸海逕㨗宣洩甚暢不致阻壅水勢頗為𦂳要泰州之孔家涵河鹽邑之皮岔河岡溝河係分導西水之要路亟須疏濬深通以資利導又下河之石䃮天妃越閘裹頭尾土俱已塌䣃兩墻壁立若不急修恐致傾圮重防多費難以再緩以上俱係歸海緩工内應行先辦之工今與歸江急工俱已一併估定臣等於河㕔營汛及鹽務人員内遴委幹員酌撥帑銀分段承修現在興工又将一切挑河建閘事宜給發條約委令道府大員實力查催嚴加稽察統限於年内一律如式完竣不使稍有草率遲延臣等敬遵聖訓董率属員悉心妥辦務使歸江歸海之路莭莭疏通不致阻遏泛溢淹漫農田以冀仰副我皇上軫念下河奠安民生之至意奏入上諭曰甚好知道了同日劉統勲鶴年奏言竊山東江南一帶河道工程闗係民生漕運上厪宸􅇆指示臣等實力查辦臣鶴年現管山東廵撫事務臣劉統勲将應行事宜面加啇𣙜漕臣楊錫紱所請挑河築堰修理縴道整頓閘壩等事俱需親身勘估派員分修至八里廟湖閘以及盧口壩等處亦經撫河臣各抒所見先後陳奏當此水落歸槽風日和暖之候正當覆加相度計日儧工惟運河南岸民堰一事既不應任其傾圮又未便過滋糜費則酌量賞給飯食照河撫臣胡寳瑔所奏給錢數十文之例俾無業貧民藉以餬口實属公私有益臣等又思現在運河既需挑濬其挑出之土堆向兩邊即係增培堤岸但中多泥濘未便即用夯硪請目下以挑河作培堰既可一舉兩便俟土乾之後仍照前例僱募民夫加以夯硪俾得整齊堅固既可以防泛濫又足以利遄行俟臣鶴年前赴濟寧時與河臣張師載定議舉行臣劉統勲於再回工之時接續辦理奏入報聞欽定南廵盛典卷三十九
