  text: 欽定四庫全書欽定南廵盛典卷十四天章乙酉江南山東直𨽻
  hash: sha256:591d0c252395dcd0fa4d742a0eed42effc047fd363670d797970ba3206310ebd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_024-1a, image: WYG0658/WYG0658-0252a.png}
body:
  text: 詩迴蹕至蘓州廿日如杭来往途翠華迴復駐姑蘓一天霽色皆喜色萬姓難誣實不誣瞻就何曾有所避遮留寧忍弗云俞近行宫門有數十老民叩請多留數日心甚憐之甫来已自戀将去赤子於親定豈殊再逰獅子林夲擬行宫一日閒念民瞻就䇿天閑是日夲欲駐蹕不出以便民瞻就故特命駕一逰獅子林寧論龍井煙霞表若論湖山佳景則固逺遜龍井矣却愛獅林城市間古樹春来亦芳𣗳假山嵗久似真山小停適可言旋耳寓意非因暢陟攀出閶門復逰西山諸勝遂駐靈巖得十四韻五日駐金閶從民願覲光寧宜耽室静非為去聲攬山芳日日徐鳴轡依依近捧裳覩兹親切意益厪養教平聲方城市過繁庶村亭接短長麥纔吐穂綠菜遍綻花黄硎憶支公遁泉臨趙氏莊巖葩争染繪林鳥各調簧春暖雪猶落澗飛千尺强法空螺自現寺具四禪匡小坐情何戀一遊興足償范園便仍憩吴館近相望擬宿三更月聊成五字章青蓮如有問来去兩俱忘白雲泉四叠白居易韻山腰清泚噴靈泉白傅當年好是閒一覽便行不烹茗恐妨煙火溷其間上方山楞伽寺路便楞伽又朅来峯蔵隂霧記前迴目欣春景兹酣暢心與吴雲共豁開出樹依然標峻塔臨湖那藉起層臺莫釐翠色在襟䄂興托髙岑有别裁遊石湖再叠舊作韻石湖宜雨復宜晴都為去聲山川秀且清詎彼畫家能爾貌縈予懐者最民情㡬層峯色背檐挹一片波光面座迎小坐因之憶成大愛他詩格頗遒平逰虎邱雲巖寺雲巖重至不因山露冕因民瞻仰顔虎阜松篁晴益蔚劍池蹊逕昔原閑生公願力依稀是短簿風流想像間遍野黄金菜花茂今来真不負躋攀再叠髙啟虎邱次清逺道士詩韻清逺非凡人生殷而逮漢四海為遨逰有似仙籍竄曽擕沈恭子虎阜來登翫危磴陟嵳峩平湖俯𣺌漫清辭託鬼神古格冺崖岸常聞子不語怪力與神亂顔真卿李徳裕皮日休陸龜䝉軰毋乃失以半豈其意别寓曠懐偶紓散青邱千載下險韻和一旦而我復何為兩度掞吟翰吟罷忽怵然或有同髙歎設使登廟廊寧不資日賛蘓州啓蹕作翠華五日駐蘓城適可平明返蹕旌展義兼應臨白下省耕要欲趂春晴攀留親意過平聲尊意觀察民生即我生却是尋常無戀者不能無戀此輿情逰寄暢園疊舊作韻勝地寧當目送鴻屢来熟路自知通一橋横駕琉璃上数字廻懸琬琰中景到春前畫不若境惟塵表句難工書堂小憩傳清蹕欲趁佳辰禮梵宫漪瀾堂叠前韻泉上呀庨宛有堂髯仙題額特輝光源頭如在若氷洞波面看成大塊章木榻横陳一泓映石欄周繞四圍方未能久此耽清賞祇有勤民厪念長若冰洞靈泉本有源嵌洞自為丆夏凉冬却温徳水無増减伏脈復淙津水洊至習坎釃為方圓池净碧圍朱檻前度與今畨流隂信荏苒不遷者固存谾谾及澹澹草堂何處尋髙風緬宋湛艤舟亭再叠舊作韻髯翁遷八州浮踪不繫艇其不遷者存至今遺佳境當年艤棹時水流人自静倜儻緬髙風徘徊發清省孤舟野宿際東坡有除夜野宿常州城外詩盖即此意逺火殘燈景櫽括蘓詩意屈短奚足悲信長詎非幸棲禅固翁志想亦心所肯松竹益深邃鐘磬時泠警堂堂坐金仙伏魔那用猛雖曰此頻来而每興懐永得句便解纜五兩揚帆影自丹徒跋馬至象山渡江駐焦山三度駐金未駐焦辛未丁丑壬午往来渡江皆駐金山焦山雖屢到曽未一駐隱虞頓置笑松寥菴名在焦山廻鑾得趁一時興䇿騎偷逍十里遥是日較至金山近十里信是無雙棲净域還因有暇陟崇椒水天俯仰惟空濶小矣奚稱隱士招鏡江樓有象皆呈照無風亦作瀾何妨大圓鏡遂凭一層欄雲散髙空净湖来兩岸寛金山即蓬島訝却向西看曠觀堂構屋古譙尖曠觀暢六兼雲開繪春麗風静冩波恬天水無邊濶蛟龍一任潜述懐誰雅稱去聲花筆緬江淹髙資港詠古京口東辭舫石頭西問郵髙資今有詠庸主昔無憂一旦燕兵過千屯明甲収謂守将童俊迎降孝孺乏畫䇿割地是佳謀慧居寺梵宇寳華陽莊嚴殊勝常石壇授五戒銅殿壓諸方庭有禽聼唄厨多鼠守糧香積中多鼠呼之即至而不耗糧盖僧雛飼養者謝參黄蘗拂期結白蓮塲輪演無生法燈傳不盡光廻輿渡耨水清磬尚悠揚逰棲霞山疊舊作韻三載重来逰攝山紅霞棲見碧峯間南齊古寺依然在建業名區好是閒付與僧人坐享逸登其鳥道歩忘艱騁懐逰目湏臾得長此非宜大合閑武夷一曲精廬名山初歩未云深峯有神姿泉有音比似武夷纔一曲許多竒境自兹尋太古堂對泉有作座對白鹿泉有堂名太古泉髙與座平逰魚清可數漸下滙小池亦復侵堦礎求仙固誕事招隠徒虚語緬思羲皇来不改者惟汝春雨山房行春今日喜春晴總為去聲民間桑與耕分付山房斯實好再三不用善循名用劉長卿棲霞寺東峯尋南齊明徴君故居韻世殊數百載厥宅訪何從但自存髙致無妨問故峯入雲尋玉徑鐫石現金容春日重臨寺六朝尚有松影標霞際塔聲落講時鐘唐吏將齊隠㤀年任相去聲逢夕佳樓面山則然背山否向西更喜開窻牖山氣日夕斯益佳霞蔚嵐蒸入虚受悠然之意真不凡取以名樓聊亦偶柴桑平原出處同吁嗟於我誠何有萬松山房餘杭亦有嶺田盤亦有寺兹以山房稱四隣延古意春濤颯似秋蒼幹老益翠時閲南齊流艷任山花媚落落如有云誰此同氣類戱題般若臺口號般若即空還即色石臺非古亦非今山僧舉似全不識合掌門前候駕臨徳雲庵㸃綴蒼巖藉紺園竺庵爐火自温存徳山設問誰當見謖謖松濤户外翻題九株松古幹當春翠越濃蟠鱗振鬛各猶龍根旁坐合讀周易用九乾元是正宗叠浪崖浙海觀雄濤䘏謂竒無比誰知逰攝山崖浪復見此庢㳫去更廻騰激伏還起素車與霓旌胥種疑驅使盡態兼極妍萬状難議擬莫謂獨無聲傾耳松濤是題幽居菴詭石叢中仄徑修惟虚惟静得相投千年古樹當軒立一道寒泉繞砌流休烈曾斯著筍弁元㣲何異被文裘小停門外催行蹕笑問幽居幽不幽登最髙峯幽居跋馬上崇椒造極悠然憩敞寮與顥氣俱即仙境喜春雲净協農謡平臨白下懐遺蹟俯視長江暎碧寥山峙川流自千古那知興廢有南朝玲峯池最髙峯處降從容咫尺園門覿面逢下馬肩輿仍陟巘園中此又最髙峯玲石攅叢中有池渫然天半鏡光披誰能尺丈量深淺山出内雲無已時淆之不濁澄不清妍及媸因鑒者呈此與繖山孰先後其詳應問尹先生攝山名始尹先生見江縂碑記燕子磯一峯飛插長江裏其勢翩􅗁疑燕子我来四度亦四登翠壁丹崖信如綺地險山川雖有言失守誠同衣带水凛乎馭朽磐石安底湏天塹徒恃此遊觀音山永濟寺飛閣臨江寳筏然普門願力度人天我聞不住是常住底用孤舟鐵鎻牽是處俗有鐡鎻鍊孤舟之名駐蹕江寧再疊舊作韻又厯胥江與浙區上游建業蹕當紆六朝文物扵斯盛南國提封莫此都髙下山川争畫麗芬菲草木賀春蘓對時曽未相孤負恒有懋勤研匣俱賦得稼穡惟寳得夫字八韻題試江南士子稼穡資生貴如斯寳更無賦成范文正雅述芮良夫茀草興后稷耕山肇有虞此誠天下本亦實萬民湏播植披沙似豐登照乗逾心臧土物愛志䘮旅􅋙吁暘雨常祈若胼胝莫忘劬珍求宜戒彼玉食每慙吾謁明太祖陵崛起何嫌本做僧漢髙同傑又多能每當廵省臨華里必致勤䖍謁孝陵一代規模頗稱樹百年禮樂未遑興獨憐復古非通變翻使燕兵釁可乗嘗謂太祖以建文為太孫及分封諸子豈非欲復古而翻以致禍使擇賢而即立成祖且不分封豈有靖難之事哉逰靈谷寺孝陵卜幽宫靈谷遷古寺遷復閲嵗古瓦獸荆榛墜後人惜湮滅稍稍事檀施豈能復舊觀百什存一二道林與開善誰更辨名字一切有為法金剛六如蔽小憩便言旋行雲無繫意閲武江寧江左雄都駐八旗時廵武備合觀之開營頗牧宣方畧置陳韓彭聴指麾平樂何湏九重盖昆明慢襲一泓池太平門箭今猶在太平門鐡扇有勁簇貫其上國初領兵都統譚泰所中也土人因口傳為澹臺箭云嗟爾行間最効為雞鳴寺雞籠山上雞鳴寺閲武因之路便逰峯不在髙頗延瞩境惟逺俗有相投初登舊詠疑如迓小坐春雲看漸收是日小雨即止正喜晴光開一片綠芃麥處放眉頭逰清凉寺山寺夷􅉄俯石頭行春得暇偶来逰入幽已自清塵念造極還堪縱逺眸禁苑昔年何帝宅長江千古客人舟便蓮宇亦時興廢一切有為孰久留朝天宫再叠蘓軾韻眉山當日憶茹􅅔建業登樓興早歸七字詎惟紓思去聲作千秋何獨和吟稀吾方夏諺懐逰豫那向陳編辨是非紙牒金刀却隣誕明史紀事本末傅㑹建文遜國時出明祖遺箧得度牒袈裟帽鞋剃刀出㑹扵神樂觀云云以所經鬼門水闗計之神樂觀當即今之朝天宫然其事荒怪無稽固不得為正史傳信也略傷往事立斜暉大報㤙寺城南耆域化人居古蹟金陵莫此如石鼎然香超六度柏檀聞唄辨三車鈐音替戾飄洪漢塔影穹隆接碧虚小坐旋教清蹕返觀民展義務殷予戱題雨花臺聞道文殊問病由雨花摩詰坐無留法師便果誠能致已落人間第二籌江寧旋蹕再駐棲霞作廵方諸典大端成戒在從流返旞旌鍾阜廻看林外隔攝山乍見面前迎一宵巖館聊眠月萬頃麥田喜烘去聲晴詩句已多圗静賞景光其奈每牽情再詠沈徳潛逰攝山十二首詩韻仍令沈徳潛並錢陳羣和之金山坐棲霞前設大圎鏡那藉綵虹橋方臻武夷勝韶春復南廵綪茷旃旌暎建業諸務畢重事探幽夐入門先濯清天水當前浄憶革不觀魚一任澄波泳右綵虹明鏡繖山迥絶塵幽居幽之最然逢濟勝流何礙蹊成兑往者尹與沈清遨並肩背憇息長松下甘棠擬勿拜倡酬因有詩興託清凉界郵箋曽和韻又逾兩年外右幽居嶒峵背屏峯浟湙面帯澗精藍搆其間棲霞之别院七處徵惟心六度滿以願天花散浄芬甘露垂法濺中峙般若䑓津逮廬溪沜可同慧逺修浄土乃真幻右般若臺一氣鬯百昌洪鈞善陶冶山中亦有桃夭夭而灑灑静非時世装是真阿蘭若精舎忽對之忩前數枝寫齊隠晉徵士其致豈殊也右桃花澗對峯搆書閣借峯為屏障髙下鑿金仙一一皆殊相小巧笑鬼工大法營天匠北同居庸側南憶靈隠上居庸闗及靈隠飛来峯皆有鑿石佛相扵宻斯退藏六合斯彌放詎曰始僧紹廼有此奇状叅禅實無暇或可一凴望右紫峯閣徐鉉曽有言古者冠無帽江左始著稱燕居便私好題峯殊不稱去聲有似縁木釣我為易玉冠俗名一似掃老沈屢有詠精神乃畢肖何必定烏紗嚇彼宦途耀右玉冠峯跋馬屴崱間周旋多石佛峯廻路轉處滿月殊不一化身豈無謂盖欲普濟物物無不度盡寂照坐巖穴試看春彚昌熙登寳筏曰相即非相慈雲亦湏豁右千佛巖曽觀㑹圖圗九老松其色兹松乃九株落落性孤特或貌彼九人永夀無終極沈亦九之一祝嘏沐恩錫辛巳恭逢年七皇太后七旬大慶集在朝諸王文武及致仕大臣十以上者為九老凡三班並繪成圗徳潛即致仕中之一也今古豈迥殊延年在貞直小立佳䕃側偷閒偶逰息底事頻命賡愛卿有古格右九株松疊石豈人工富媪為去聲皴皺稱浪自何時太古此起伏舒如匹練鋪急似萬馬驟變態既不一在川忘陟岫固宜隠者棲那杜詩客走奚必冷泉亭始聞嘯猿狖右疊浪崖萬松闢林闗欲敂意先肅委宛步深逕曲欄縳野竹太古以来色三春不知燠疑有偓佺逢方曈髪飄綠将擬與之言謖風下巖谷右萬松臺幕府識泉性剪草剔泥滓聚少勢成多䟽閼流因駛就中白鹿最一泓院牆裏導出灌鱗塍資潤不計里實足惠農氓春省為去聲斯喜右白鹿泉知有最髙峯進歩力須努天風落碧空萬籟奏叢楚􅲡􅴁夫何礙緩轡跋予馬俄亦造其巔北瞻俯江滸南眺形勝多盤龍復踞虎六朝事已紛慨然一弔古重賡紀再逰那辭雷門鼓錢起不可黙謄牋因孟姥陳羣與徳潛並居林下吟眺之興畧同而是篇尚闕和作因示此督之右最髙峯渡江至金山江浙載廵狩典成清蹕還觀民胥敬事問景敢偷閒烟意桃霞表晴光麥浪間南風送五兩片刻達金山静瀾堂玉嶼大江中蘭堂曠望通氣連巫峽白日湧海門紅何必懐觀水恒斯遇息風四廵庥祉疊益勵慎淵衷渡江駐蹕髙旻寺行宫作蘭舸渡江津花宫及暮春毋奢仰祖訓恭讀序復皇祖御製行宫詩碑有莫遣争能縱慾奢之句引漢文惜露臺事以示維揚商民垂訓深切允宜遵守云有事此躬廵機鑑惟勤政情田祇厪民覲揚瞠後矣巍蕩共髙旻題大觀堂江浙省方廻三春蹕館開白綿飛苑栁青子綴庭梅旌茷于焉憩琴書此重去聲陪循名玩辭象顒若益深哉逰平山堂即景襍詠去時春仲来春暮真是春光馬上看祇有風流賢太守千秋名在碧峯端北瞻崑軸廣陵南園倚虹橋鏡影涵設使武夷徵故事便當九曲自兹探緑栁隂濃曲岸頭緩移畫舸惠風柔青琅玕館凝神盼誰道尋常竹有秋侍衛銀牌賜老人渇恩便奪亦情真可知半日行春舫不為閒逰為省民暖香明艷正含嘉㡬架雲棚䕶惜加不讀廬陵歐氏序誰知天下有真花麗日輕風喜朗晴麥田吐穗待秋成今朝功徳山頭望始覺吾心暢快生平阜池堂俯碧漣已看荷葉出田田傳花命酒圍嘉客即歐陽修在揚州事髙致當年在眼前坐惟片刻未斜暉問景聼稱馳驛飛尹繼善每稱逰山似馳驛然過而不留實予本意耳短句八章聊紀事足酬佳興可言歸維揚旋蹕作南廵往返路胥經古郡因教兩日停三月煙花雖入畫䢴溝春水合揚舲民情到處皆親愛我意無時忘撫寧最喜雲消輝旭影宜暘夾岸麥蔥青過金灣六閘書事西灣接東灣落低向所命上次南廵親臨金灣相度以東灣滚壩前已落低命将西灣亦落四尺俾湖河入江之路益暢而其鍵要尤在視髙堰水誌展拓清口為釡底抽薪之計五壩始無溢漏下河田田廬頗資利頼常瀉運水餘入江斯㨗徑絜要實清口尺寸為去聲親定五壩無漏巵下河屢豐慶凴舟觀局勢幸矣籌偶應更張亦奚必多言徒啟競顧語司河臣守之仍在敬洪澤湖四依皇祖詩韻南廵四度事非虚洪堰籌安淮及徐頌致萬民益増愧詎予信實及豚魚閲接築髙堰隄工詩以紀事一律甎工運口連崇墉憑閲實牢堅蕆功即在迴巡後髙堰石隄為洪湖防障而武家墩迤北以工緩未修癸酉秋漲危而復安因命築以甎工千餘丈俾資扞禦壬午親莅指示復命自甎工止處一律接築屬扵運口該督扵廻鑾後鳩工修築兹臨閲視則堅甓屹然延亘益覺緩急可恃前所籌定凖五壩水誌暢開清口又幸邇年未遇霖潦湖水未致侵溢然伏秋拍隄之水究在隨時宣洩得宜斯則河臣所應加之意而不能一刻釋諸懐者也防患要扵未事前平日原常見渚出汛時云每到隄邊雖然清口籌疏瀹南望夏秋心總懸四依皇祖閲河隄詩韻廵方兩閱月渡瀆逮還宫吏治課惟悉河防厪莫窮洪隄千載固運口萬艘通祖考垂經制真同天地功渡黄河述事無風更戢浪鼓枻不移時屢奉大安渡均邀明貺垂豫逰良已愜尊養合從兹敬念奉以皇太后髙年不敢復逺廵江浙矣南望𣺌烟樹民情繫我思桃源耕者辛未過桃源髙斌奏曽記云此地耕者猶能存古制鳴鑼合羣力相與勤種概不獨其言然隄旁呈覽試此實任䘏風因之紀五字丁丑及壬午兩度經斯地未逢向所見兹用諮大吏問之大學士尹繼善始云不知後復博詢屬吏皆稱無其事則稱行實難而且無其事斌豈欺予者盖受人欺蔽觀過可知仁重吟誌詳細安瀾龍王廟再疊舊作韻徳水方遵陸上次南廵廻蹕由順河集登陸今則乗舟直至徳州便於沿途閱視運河情形圖因閱運河蘭舟溯洄溜桂棹艤清渦放淤兼觀績是日小駐御舟登岸詣廟瞻禮兼閲夏家馬路放淤工程升香謝薦歌千秋垂聖額廟懸書額皇考御三度此欽過予意望非别神庥冀曰何安瀾佑黎庶洪瀆永寧波過伊何入運口圖欲㵼㣲湖尾閭大疏治韓荘閘迤西伊河就下利其餘彭潘口均自荆橋出前年率剔鬟魚臺金鄉多涸地即今過伊河入運實暢遂然上源来少濟寧臨清水虞匱顧漕慮棄農農顧防漕棄籌政所以難兩全益艱致舟行入山東境去時遵陸返乗舟一水殊分徐魯郵是日晴光明翠栁前旬雨澤渥来牟北河漕務心勤度入聲西郡民風目始謀運河一带為山東西境濟運籌農胥要計戒更張亦厪詳求韓荘閘韓莊實洩㣲湖水籌涸金鄉魚臺閘建新魚臺金鄉諸縣之水皆滙㣲山湖夏秋坡水漲溢魚臺一带每多積潦之患既疏伊家河以釃其流並於韓荘西岸建滚水石壩以殺其勢甲申春撫臣崔應階請濬治㣲湖下游因命故協辦大學士公兆惠前往㑹勘以湖口舊閘宣洩未暢議於舊閘北添建新閘使湖水暢流入運閘成而數縣瀕湖沮洳悉皆涸出民得頼以乗時耕種濟運利農期兩益每因觸境憶賢臣過荆山橋橋長三里計納水原自寛侵尋沙淤之㣲湖去路艱因之事疏剔夲圗洩漲瀾沙弗逺運去積隄齊橋欄占河十之六功同不疏然大吏前致辭已足受漲川徒觀隄以外齊橋芃麥田橋建茍非虚河疏功乃捐二者必居一吾心寔未安扵凡待目擊吁嗟此實難渡黄河至徐州彭城深厪念有事閲河防枉駕遵陸坦進舟日未央天光澄映碧川氣欝蜚黄浪盡邀神佑滋因敬不遑閱徐州河隄有作南固石堤北土隄徐州當大道之衝向年屢經水患丁丑南廵親臨閲視命扵河南岸添甃石隄俾緩急益足恃而北岸土隄則戊寅夏遣大學士劉統勲来徐相度議築以禦漫流而束河勢使攻沙者也両隄既成城郭民田皆資利賴連年頻獲豐稔閭閻景象恬熈廵蹕經覧深為慰悦利農䕶國備俱齊今来不藉多籌畫祇覺民生益暢兮題黄樓三疊蘓軾韻疊險寧非滕口説每遇蘓詩興軒發黄樓三登可黙去却慮格卑縁手滑遐想當年事修築豈有閒情辦布襪東坡詩已辦布襪青行纒隔時水退遇重陽把琖對花恣豪呷憶我丁丑始莅此急葺石堤舉籠鍤是時災餘百室空鵠面鳩形可憐殺壬午重来則改觀雲龍酬恵起神刹徐城河隄自丁丑親臨相度各工修舉數年耒閭閻生計滋阜因就雲龍之岡勅建恵佑龍王廟用申報貺田有農夫荷鋤耕屋有織婦鳴機軋即兹元氣實大復倉庾陳陳相因壓為民愁亦為民慶城樓埤堄俯齾齾綈几清閒命墨娥錦屏馥郁噴金鴨旋教清蹕轉行宫老幼歡隨走靸霅恵佑龍王廟疊舊作韻盛徳贊天縡鴻功著地宗一方頼呵䕶三拜肅儀容民氣誠云復神歆益致恭蓍乾得九五雲起定從龍遊雲龍山蜿蜒如龍從以雲剛過細雨滌埃氛髙踪那慕張隠士佳致猶思蘓使君樹裏有禽皆雅韻巖間無卉不清芬閭閻元氣洵稱復羣擁鑾輿共爾欣試衣亭三疊蘓軾韻寧同歸去賦吹衣赴選怱怱䟎夕暉身共山人謂張天驥斯則託心隨旅客謂張斯厚彼焉飛戯題放鶴亭雲龍瀛嶼虎邱巔都有亭因放鶴傳我亦山荘聊仿作祇虞貽笑彼胎仙渡黄河有述侵曉庭柯風勢䬒登舟頓爾静陽侯屢䝉天貺昭神貺自問何修益勵修波浪不生恬水性隄防惟固盡人謀南廵狩禮於焉蕆獨民情戀尚留金鄉魚臺民以涸田得種謝㤙詩以紀事㣲湖昔倒漾數縣被災連金魚為尤重有釡常嗟懸雖常豁糧賦豈似慶逢年昨從撫臣請為之疏荆山金鄉魚臺皆瀕㣲山湖向苦湖水泛溢窪田悉沒於水既穿伊家河増置韓荘壩牐以殺其勢甲申春復允撫臣崔應階請濬下游之荆山橋以資宣洩數縣積潦田畆次第涸出民得賴以耕種先是隄徐北黄流免泛川黄河至徐州而窄河員每持束急易漲之説聴漫水洩歸荆山橋以故河多淤梗㣲湖趋下之勢不暢戊寅夏始於徐城北岸築土隄黄流乃不旁溢湖水得疏消無阻諸水得就下漸見有涸田廻舟溯運河萬姓兩岸邊言謝汝固耳言慚吾猶然奚如豫籌畫免此遭迍邅况慮去路多来源已覺艱漕渠亦要務何非政所闗㣲湖雖患其漲溢然漕艘北上亦藉灌輸之利盖洩多固有益民田而瀦少又恐防運道事誠有難於兼善者既慰之餘彌復厪念展轉厪民瘼事葢鮮兩全過濟寧州州城雄枕運河濵珠勒徐驅覲萬民總以平居恒厪念那因初識始相親南巡迴鑾向從陸路兹始御舟初過州城萬民尤覺懽迎豁糧爾縱謝誠切前以頻遭潦沴凡低田受水者皆與豁糧老幼聚集叩謝登席吾猶愧是真李杜詩情髙萬丈州城内太白樓為賀李豪飲蹟城外南池即杜甫與許主簿逰處有少陵祠摛詞即境却逡廵登太白樓岧嶤髙閣俯城闉名字猶傳太白真善醸者汪信知已舉觴惟賀是佳賔良辰漫惜方春餞勝蹟初探返蹕廵禹戒常遵惡㫖酒醉歌無事取斯人題南池少陵祠任城南郭有南池古蹟猶傳老杜祠喬樹那知春已去閒庭不覺歩前移何期此日仍瞻斗唐書稱昌黎文泰山北斗吾扵子美之詩亦云可惜先生未遇時却異東坡頻疊韻南廵疊蘓東坡韻獨多斯人前豈易言詩再詠南池四首到處平成仰禹功崇碑五字厪河工康熈乙丑年建碑亭恭勒皇祖閱河隄詩益殷此日覲揚志敢曰當年廵狩同淥波一片澹南池樸室三間潔葺之筆研精良待摛藻却吾今日畏言詩詩仙詩聖漫區分總屬箇中迥出羣李杜劣優何以見一懐適已一懐君千秋遺跡以誰芬咫尺城南静不紛何事尋常許主簿却教名字附青雲題分水龍王廟清汶滔滔来大東自然水脊脈潜洪横川僢注勢非迕濟運分流惠莫窮人力原因天地力河功誠擅古今功人皆知分水為白衣老人之力而不知實天地自然結局勢於此衆不能識老人特能識之耳非但此也上古聖人教耒耜作舟楫何一非因天地自然之功用㢤由来大巧原非巧穿鑿寧知禹徳崇北来北来日日驗農耕夹岸農民喜氣迎麰麥秀齊惟待實黍禾種遍已抽萌早知春澤髙低被近覺炎風塵土生畏雨情纔忘㡬日旋去聲為望雨又何情策馬過東昌府南邦逢郡邑按轡便民瞻南廵渡黄後即循川途御舟惟過郡縣城郭必遵陸䇿騎經行既覧閭閻景象兼便民瞻就兹過東昌仍倣行之運路兹經厯乗舟肯已忺䇿驄惟一例隨鐙更多添親愛不謀合熙和著處覘平原攬城市光嶽俯樓檐光嶽楼居城之中重檐髙聳可以延眺為蹕路所必經因一登覧則闤闠恬熙郊原豐沃燦然在目共治二千石益思慎選亷登光嶽樓即事層欄傑構入雲區聳峙城中鎮四隅髙下耕桑俯沃野北南水陸接通衢虹光奕奕扶梁焕㤗嶽巖巖罨牖鋪長記短詩粗讀遍子安牛斗句曽無光望為同為異區又稱東北據城隅一統志載望嶽楼在聊城縣東北髙矗雲表今名光嶽及閲東昌府志則光嶽楼在府城中而城東北隅又别有所為望嶽楼者兹以廵蹕經行始知其舛百聞不如一見紀載之不足信大率類此從来多舛惟冊府且自清逰厯箭衢魯仲連蹟亦在此城却喜閭閻頗繁庶嫌他屏扆太陳鋪牧臣咨爾盡心者察吏安民似此無臨清舟次襍詠南来一水貫城闉北去三朝川路循水路三程便至徳州由陸路旋蹕厯遍山東五十閘節宣深計緬前人板閘洪波㵼吕梁云縁蓄水灌溪塘臨清設甎板二閘以節宣南来之水舟行逓進上閘啟則下閘閉俗稱灌塘因其地勢建瓴蓄乆而啟流頗湍急舟非牽挽不能過也因思天下夲無事子美詩中道已詳衛水西来挟濁漳滙川北注色㣲黄更無闗鍵資宣蓄過臨清則無閘直達徳州順注乗流直進航㡬度溯洄復溯逰通漕實藉古人謀善經理自足輸挽冐險何湏海運籌雨四月初十日西風一夜無雨望侵曉誰知送雨来不似江南慮過矣恰當夏首曰時哉滿船畫意全含潤兩岸詩情喜不埃過午欲晴霑二寸雅予蜀望又徘徊曉凉前朝劇嫌熱過雨頓生凉無定如斯幻有恒原是常汀蒲梳霧氣隄麥浴曦光破冷厜㕒坐從民渇望償船首露坐夹岸老幼趋隨歡呼瞻仰每入舫室民若失望憐其誠冐凉有所不避也御舟至徳州仍命親藩恭奉皇太后由川路迴鑾是日登陸即事有述登陸遄臻勅政機由川頥養奉慈闈南廵典禮斯全備旬日晨昏此暫違去轡未瞻桞梯茁迴鞭倐拂麥芒菲前朝作雨㣲嫌少大霈希資實栗肥南巡迴鑾駐蹕御園之作往還水陸六千里春夏推遷百廿朝望埭早無争色卉聴林已有試聲蜩對時展轉希膏雨勅政傳宣覲庶僚鳯舸仍遲到三日潞川欽溯一心遥恭迎皇太后駕至暢春園即事得句翟舫昨當駐潞河不眠數問夜如何䇿驄心切誠懽迓扶輦躬承顧語和萱為去聲暎階翠展葉榴如報節絳舒柯浃旬依戀一朝慰繞膝由来樂事多欽定南巡盛典卷十四
