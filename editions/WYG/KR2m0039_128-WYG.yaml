body:
  text: 奏議乾隆二十三年九月十三日兩江總督尹繼善等奏言竊惟省耕省歛自昔著有隆規時邁時巡載籍垂為盛事我皇上撫臨四海涵育羣生無逸勤民既勅㡬康於宵旰誠求保赤復殷補助於春秋是以稽古省方兩次南巡江浙恩膏疊沛遍洽吳山越水之間徳意旁流周恤蔀屋茅簷之隠更以河工事務攸闗重大親臨指示備極精詳一切疏濬機宜與夫宣防闗鍵凡屬前人經理之所不及臣等籌議之所不周悉皆斷自宸衷疊頒睿訓不惜千萬國帑奠兹億兆人民務期濱水沮汝化作膏腴之壤永令縁溝老弱登諸袵席之安覺覆載猶難並此生成故黎庶莫能名其愛戴今者工程報竣湖河俱得順流晴雨均調禾黎臻大熟雖在淮徐以北嵗嵗告災之地亦慶倉箱盈積人人皷腹而遊僉謂厯年未有之豐登總由聖心感召身沐有加無已之愷澤益思玊輦頻來既瞻雲就日之同心遂灑道清塵而恐後臣等偹員兹土側聴謳歌現今顒望之誠倍深往日擬待庚辰之嵗再幸南邦懇特降綸音聿光大典俾獲恭迎鑾輅用慰輿情至於一應預偹事宜臣等自當仰體聖懷恪遵訓諭不許纎毫擾累毋取供帳繁華舊有章程易於料理惟願六飛時届快覩民康物阜之風常使萬姓銜恩共傳華祝嵩呼之盛臣等敬謹恭摺奏請奏入上諭恭載恩綸乾隆二十四年十一月二十二日尹繼善奏言恭照明春聖駕重幸江南沿途分設臺􅀈接逓文報需馬衆多上届皇上南巡時於通省州縣額設驛馬内通融協撥尚慮不敷各屬仍自偹餘馬應付今江南驛馬奉裁七百匹較上届額數更少𣲖益屬不敷若不酌量加増必致貽悮差務應請暫照從前原額加増馬七百匹分派沿途經由各州縣准其于驛站項下借支採買自明年十一月初一日為始照依額設驛馬一體支給草料至差竣日止停其支給仍將所買馬匹照數變價歸還原款如此斟酌辦理則暫増馬匹仍行照數變價還項於錢糧既無虧缺於差務甚有禆益奏入報聞乾隆二十六年九月初二日尹繼善奏言竊照乾隆五十五年江南雨水過多髙寶下河窪地被災荷䝉聖訓以地方官辦差辦賑難以兼顧特頒諭㫖將南巡之期改於壬午年舉行此誠我皇上念切民瘼因時制宜之至意也今嵗雨暘時若通省可望豐收於七月内忽遭風暴湖水漲溢將髙郵東隄漫缺數處以致下河田禾又被淹浸在聖心誠求保赤宵旰憂勞眷顧南邦又不知㡬經籌慮但江省今嵗秋收大勢可稱豐稔間有極窪之地收成歉薄情形俱不為重髙郵一帶雖又被水而早稻已有收穫亦較輕於去年現在應行賑恤者祇數州縣地方各官儘可從容辦理即差務内一切事宜已經預備齊全伏思我聖主深仁厚澤徧於海隅蒼生大江南北尤屬淪肌浹髓自時巡改期稍遲一載黄童白叟無不翹首跋足望鑾輅之早臨况正逢聖母七旬萬夀之後行慶施恵待澤彌殷歌樂嵗而効嵩呼更可愜輿情而昭盛典臣謹將江省收成景象並臣民仰望悃忱㑹同髙晉陳宏謀託庸髙恒恭摺具奏奏入上諭部知之乾隆二十六年十月初八日户部侍郎兼管順天府府尹錢汝誠等奏言恭照明春聖駕南巡所需隨營車輛例由臣衙門飭屬敬謹預備伏查乾隆二十二年正月駕幸江浙經前任兼管府尹臣劉綸等循照乾隆十六年皇上南巡辦理規條具摺奏明請將各行檔装載什物車輛至順河集水次照數留住以一半交江南一半交山東餧養以備回鑾應用其車價銀兩在於該兩省動用給發照例報銷今次恭逢聖駕南巡臣等現在移咨内務府先期酌定應備車數一面分飭所屬預行備辦並咨明山東江南督撫循照乾隆十六年并二十二年籌辦規條㑹同妥協經理再臣等恭查上屆駕幸江浙經前任兼管府尹臣劉綸飭屬預備車四百餘輛後實用車三百四十三輛旋因順天府所辦原車途中間有回空騾馬不無疲乏之處至交車時山東省分留京車一百三十四輛江南省分留京車一百六十二輛其不敷之車在於各該省照數備足但江省素非産車之區東省有自應備辦之車不能協濟亦經前任兼管府尹臣劉綸循例奏明移咨直隸總督檄調附近南省之景州河間獻縣等處代僱百輛以濟江省之用臣等亦即一面詳悉咨明直𨽻督臣方觀承籌備俟明年需用時定數以調協濟又官用駝隻沿途恐有疲乏短缺者回鑾時不敷應用亦應行令山東撫臣查明成例預為籌辦以車抵給除一應委派人員照料管理及包封支發車價各事宜臨期照例酌辦敬謹預備外合將臣等現在辦理縁由奏明奏入報聞乾隆二十六年十月初八日錢汝誠等奏言明春恭逢聖駕南巡所有臣衙門辦車事宜臣謹㑹同府尹臣羅源漢循照乾隆十六年併二十二年辦理規條繕摺奏聞至恭辦回鑾車輛前經兼管府尹臣劉綸前赴順河集㑹同江南山東兩省地方官籌辦今次恭逢駕幸江浙仰懇皇上天恩准臣錢汝誠扈從前往於順河集水次督率各委員交收車輛至聖駕回鑾時臣再由彼處先期趨赴順河集敬謹料理回程車輛事務奏入報聞乾隆二十六年十一月初九日總理行營事和碩莊親王允祿等奏言恭照明春聖駕巡幸江浙一切應用預備事宜查乾隆二十二年巡幸南省陸路安營所用大城䝉古包帳房等件俱帶往二分工部應帶椿橛等件亦照例帶往所需駝隻並茶膳房等處所需駝隻車輛交各該處照例預備挽船縴夫於河兵内選用應帶備用銀兩縀疋等件交户部内務府衙門奏明帶往選派侍衛三班兵丁一千名各處官員拜唐阿人等酌量派往至抵江南上船將兵丁減派五百名章京等四十員於虎鎗侍衛兵丁一百三十七員名内選派四十員名其餘於三班侍衛並五百名䕶軍選派入數隨往大臣官員俱於年前預給春季俸禄其應騎官馬人等照應給之數給馬一半折價一半先給兩箇月行粮沿途再行補給上船之後大臣官員各留家人喂養馬匹其拜唐阿兵丁等所騎官馬並官駝交與山東巡撫於臨近各州縣及綠旗各營分喂養約束所留兵丁家人派大臣管轄回京辦用車輛奉㫖派大臣㑹同地方官僱備喂養所留馬匹應需麩草料豆髙粱等項交山東巡撫酌量購買以備市賣至江浙豆少如需撥協行文山東巡撫酌量採買運至沂州一帶地方以備市賣再沿途安設臺站由兵部勘明尖宿飭各該督撫於通省驛馬内抽派備用所過各處地方應辦營盤道路橋梁一切事件俱交該督撫照例預先備辦明嵗聖駕巡幸南省陸路安營所用大城䝉古包帳房等件備帶二分應帶樁橛等項所需駝隻茶膳房所需駝隻車輛河兵内㨂派挽船縴夫户部内務府奏帶備用銀兩縀疋派侍衛三班兵丁一千名各處官員酌量派往至江南上船將兵丁減派五百名章京等四十員於虎鎗侍衛兵丁一百三十七員名内選派四十員名其餘於三班侍衛五百名䕶軍選派入數隨往大臣官員於年前支給春季俸祿並先支給兩月行糧沿途再行補支上船之後大臣官員留家人喂養馬匹拜唐阿兵丁所騎官馬並官駝交山東巡撫分給喂養所留馬匹應需麩草料豆髙粱等項交山東巡撫購買以備市賣江浙如需撥協照依所咨撥運豆石交山東巡撫運至沂州一帶地方預備市賣沿途安設臺站由兵部勘明尖宿地方飭該督撫於通省驛馬内抽派備用所過地方營盤道路橋梁等項該督撫預先備辦之處俱請照上次辦理但上次因官馬缺少各半支給今官馬既敷支給請將應給官馬人等俱滿數支給外約束所留兵丁跟役人等派大臣管轄至辦理回京車輛大臣臨時奏請欽㸃又查上船後應需馬匹江迤北緑旗營馬四千匹江迤南八旗營馬四千匹並江寧等處添備馬二千匹支放馬匹事宜上次所辦雖未能甚有條理尚無過於繁瑣應請交兵部及該省即照上次辦理督催御舟縴夫需用馬匹請交該省亦照上次辦理需用船隻應令各該處將人數具報總理行營處彚總行文該省辦理支放船隻請交兵部亦照上次辦理其内廷行走大臣領侍衛内大臣軍機處大臣内廷乾清門行走侍衛等船隻并装載御馬船隻上駟院侍衛官員批本奏事軍機處侍衛處内閣兵部官員等船隻俱請照上次令其在前行走其餘船隻俱令在後行走如有承辦事件應前行者臨期各自奏請江南路途窄狭倘有混行衝突應飭禁交管御舟大臣㑹同䕶軍綂領於船隻行泊處所嚴加查禁浙省支放馬匹船隻事宜亦俱照上次與江南一體辦理恭候命下交各該處欽奉施行奏入報聞乾隆二十六年十一月十二日鴻臚寺奏言向例凡遇皇上行幸沿途地方文武官員於百里内接送查乾隆二十二年皇上南巡臣等將經過沿途地方文武各官於㡬十里以内接送之處具奏奉㫖著三十里以内接送欽此此次皇上南巡經過沿途地方文武各官於㡬十里以内接送之處謹奏請㫖恭候命下臣寺行文知照各該督撫敬謹遵奉奏入上諭曰著在三十里以内接送乾隆二十六年十一月二十三日江蘇巡撫陳宏謀奏言恭照明春聖駕南巡一切應備事宜臣等率同司道等官敬謹備辦所有各項動支正耗銀款上屆係先期奏明今據江寧布政使彰寶蘇州布政使安寧㑹詳稱乾隆二十二年翠華南幸所有扈從官員人等船隻需用縴夫聖駕經由旱路需用摃擡旱夫回鑾需用車輛䭾載御用什物等項需用騾頭上屆均於司庫正項銀内動支又扈從官兵馬駝需用豆草麥麩上屆均於司庫雜税及驛站餘剩銀内借支再行宫名勝備辦器物并修浚道路橋梁河道等項上屆均係動支司庫耗羡匣費銀兩料理各於事竣據實造冊分别請銷今次均應循照舊例辦理惟上屆所動驛站餘剩銀兩現在司庫並無存貯應請亦動正項給辦所有動用銀款相應詳請核奏臣覆查無異除飭取估冊分咨户兵工三部備案外謹㑹同督臣尹繼善具奏奏入報聞乾隆二十六年十二月初五日尹繼善奏言恭照聖駕南巡沿途管押馬匹船隻以及巡防跕道等項均須官兵分派差遣而外出應差一切衣装盤費在所必需上屆兩次南巡俱經酌借俸餉兩月以資製備嗣於差竣後俱已全數扣還清楚明春翠華載莅江南其承應差使官兵據請酌借盤費等項似應循照上屆之例行司將綠營官兵一律借給兩月俸餉俟差竣之後分作一年照數扣還歸款八旗官兵如有應需借給者照此酌量動借其江西省來南辦差官兵亦應一例借給奏入報聞乾隆二十六年十二月二十七日允祿等奏言臣等恭照聖駕南巡隨往江浙大臣官員兵役執事人等前經奏明綂以六千馬匹核計隨往餘俱留住今按各處冊報隨往官役人數計算馬匹不敷臣等比照上屆之例按其人數多寡及差使之緩急酌量核減共需馬五千八百八十六匹至渡黄以及名勝處從前原奏派馬俱在四千匹以内今照依原奏或按差減人渡黄時應需馬三千九百八十五匹名勝處應需馬三千八百八十九匹謹開列清单進呈恭俟發下行知兩江總督遵照仍交兵部照例辦給馬票一面知照各該處將单内隨往名勝處所減派人數自行通融辦理至船隻一項仍令該督遵照上屆原奏將預備上用船隻及装載御用什物等船隻敬謹預備其隨往官兵人等船隻亦照奏定船數及单内人數分别派撥并將核減各處人數一并開单呈覽奏入報聞乾隆二十七年正月初十日允祿等奏言臣等查上次皇上南巡隨往官員兵丁上船後拜唐阿兵丁所騎官馬皆交山東巡撫分喂以備回程乘騎此次皇上南巡至順河集皇太后陞船回京時跟隨人等無用馬匹之處應派侍衛拜唐阿官員兵丁相應預先派出至直隸厰上船後所騎官馬應令先回臣等酌量議定此次皇太后至順河集陞船回京時跟隨侍衛一班親軍十名管人坐更等差派營長一員章京二十四員兵丁三百五十名再查二十二年皇太后自靈巖山回時奉㫖派出竒通阿等總管跟隨人等派出蘇和納等帶領䕶衛鎗此次皇太后陞船回京時現派出前鋒統領馬常䕶軍綂領愛龍阿慶㤗三人内請皇上欽派一員管理管人坐更等事再内務府奏派帶領皇太后䕶衛鎗之處奉㫖著派永慶勒景皇太后回京時著派荘親王欽此現應帶領䕶衛鎗總管隨從人等之處皆係莊親王管理或應添派之處請㫖訓示應派之侍衛章京兵丁等交領侍衛内大臣前軍綂領在現派出人員内即行派定各處應派人員亦即一并派定至直隸厰時上船後將派出侍衛章京前鋒䕶軍各項人等所騎官馬皆交山東巡撫即派官員兵丁從容趕至直省交方觀承善為喂養以備木蘭應用所有侍衛官員兵丁帳房等項各自行留交家人先回但途次若無管理之人家人等不免生事相應交領侍衛内大臣前鋒綂領等臨時酌量派侍衛一員章京一員管束送回奏入上諭曰皇太后囬京時總管官員兵丁帶領䕶衛鎗之處莊親王一人不敷著派兆恵一同管理章京䕶軍等著派慶泰管理餘依議乾隆二十七年正月十四日漕運總督楊錫紱奏言乾隆二十六年十二月二十三日接准乾隆二十六年十二月十六日奉上諭據倉場侍郎温福等奏來嵗南巡皇太后由運河水路回鑾所有北上糧艘酌量迴避一摺著將原摺抄寄楊錫紱令其查照事宜悉心妥議俾河道既無妨礙而糧運亦不致稽延一切善為經理仍先行具摺奏聞欽此臣恭讀諭㫖仰見我皇上睿慮周詳務期妥協盡善之至意查明春聖駕南巡皇太后由運河水路回鑾臣於本年十二月初十日接到部咨即將南北漕船通盤籌計山東之船來春出運不過四百餘隻例應三月内抵通飭令到通交兑後其回空船隻俱趕赴天津之西沽一帶迴避南省漕船向例分為三進首進各帮在正月二月初渡黄者飭令上𦂳趕行務於四月初抵天津以便於西沽一帶迴避其或不能趕至天津即於臨清口外衛河之上游迴避二進帮船飭令於洪澤湖之太平河飬馬灘等處迴避三進帮船飭令於髙郵之金灣六閘揚州之三岔河常州之髙橋等處迴避俱俟四月初間皇太后由順河集啓鑾之後再行催儹北上并分委員弁各處駐扎専行料理俾順河集至通州一路運河俱無船隻阻礙河路并將先後行走及各處料理迴避條款於十二月二十日飛咨倉場侍郎及直隸山東江南督撫并江南山東總河查照轉行兹查倉場侍郎臣温福等所奏南北運河的行迴避處所與臣敬謹籌酌先行咨移各督撫之處俱屬相同臣自當欽遵諭㫖督率屬員并再移行南北沿河文武員弁將首進帮船上𦂳催儧早抵天津以清河道再查二進三進帮船於四月以後渡黄北上有四月五月閏五月六月之期儘可全行抵通不致遲悞奏入諭如所議行乾隆二十七年正月二十一日大學士公傅恒奏言遵㫖詢問張師載阿爾泰皇太后由水路馬頭大營如何預備據稱現備之馬頭係五十丈仍照預備皇上水路馬頭之式臣等恭查皇上經過之馬頭大營船艦既多且支架辦事䝉古包故此所需地面寛大皇太后乘船行走並無許多船隻且無大䝉古包等項若仍照皇上行走之馬頭辦理未免地方廣濶轉不𦂳凑臣等酌量妥議皇太后行走之馬頭酌修二十五丈似為𦂳凑再挽縴處三班預備一千二百名河兵為數似屬太多理宜酌敷用分班挽縴皇太后内庭各主位所乘三船毎船給挽縴河兵四十名供佛船縴夫二十名編定三班每班一百四十名隨侍太監船茶房太監船各項太監船共六隻毎船給河兵十五名三班共二百七十名計需用河兵六百九十名俟命下之日交張師載阿爾泰敬謹遵辦奏入上諭曰挽縴河兵著留六百名不必用江南河兵俱用束省河兵此處官員若不熟練著於江南官員内酌派帮管亦可餘依議乾隆二十七年二月初九日兵部奏言總理行營王大臣奏稱議得汪札爾等奏稱皇太后内庭各主位由水路回京所用大城䝉古包帳房不必駝隻䭾載請由順河集船載回京之處伏思此次皇太后内庭各主位既由水路行走無須更用䝉古包帳房等項若用船隻装載帶往較為省便且駝隻亦不致傷損應如汪扎爾等所奏至徐家渡時此項駝隻交與東撫阿爾泰㨂派幹員趕回交直省加謹喂養以備木蘭之用䝉古包帳房等件由順河集装載上船隨皇太后行營由水路運至京城交該管處㸃收奏入報聞乾隆二十七年三月初七日閩浙總督楊廷璋奏言竊照浙省應行引見官凡有派委辦差者俱經臣咨部覆准俟差竣給咨兹查有甄别副叅等第案内保列一等應陞副將福勒和等共七員六年俸滿副將易崑一員題補錢塘水師都司之提標右營守備李楚玉一員又閩省預保案内應行引見之水師提標前營千總黄海一員俱因派辦差務未經給咨赴部今恭逢翠華臨幸該員等所辦差務俱已告竣可否仰邀天恩勅下行在兵部就近帶領引見臣未敢擅便相應請㫖遵行再應於何日帶領引見之處伏候聖鑒奏入上諭曰著隨便帶領引見乾隆二十七年三月十九日刑部奏言乾隆二十七年二月二十九日奉上諭朕稽古省方乘春布令而清理庶獄矜恤尤深用沛徳音式昭慶典所有江蘇安徽浙江三省軍流以下人犯俱著加恩各予減等發落凡親民之吏其諄切告誡俾知改過自新共享太平之福欽此仰見我皇上省方觀民行慶施恵翠華所莅爰沛徳以推恩春令攸行迺祥刑而宥罪誠格外之殊恩難邀之曠典謹查乾隆二十二年皇上巡幸江浙欽奉恩㫖軍流以下人犯各予減等發落經行在刑部奏明除叛逆縁坐强盗免死發遣家奴喫酒行兇棍徒生事擾害用藥迷拐子女開窑誘賣並例應給披甲人為奴及擬軍之積匪猾賊情罪較重俱不准其減等其餘軍流遣犯并徒杖人犯概予減等發落奉㫖知道了欽此又乾隆二十四年恭逢恩詔軍流以下人犯減等發落經臣部議定除前議不准減等各項外其搶竊滿貫並三犯擬絞三次緩决減等擬軍及私鑄為從並私鑄銅錢不及十千擬軍俱屬情罪較重均不准其減等兹奉恩㫖應請仍照乾隆二十二二十四年之例除緣坐等項情罪較重人犯毋庸查辦外其江安浙江三省一切尋常軍流遣犯並犯該發黒龍江寧古㙮及内遣雲貴兩廣人犯不在前議數條之内者其情罪與軍流相等事犯在恩㫖以前應請一體減為杖一百徒三年其徒罪及雜犯准徒人犯減為杖一百其已經在配徒犯即行釋放迯徒並免緝拏枷杖人犯均行寛免應刺字者並免刺字應追贜者仍行追贜其應減軍流遣犯内已犯未審已審未結已結未觧已經起解計其程限尚未到配均照例准其㑹赦減等再江浙之人有在别省犯案遞回原籍追贜發配其犯事在恩㫖以前者亦應遵照二十二年奏准之例一體准其減等其外省人犯事遞發江浙之軍流人犯與江浙現在軍流不同未便濫邀曠典至該三省題咨到部尚未核覆及嗣後到部之案核其事犯在恩㫖以前查與赦款相符者臣部隨案聲明分别減免俟命下之日臣部行文各該督撫遵照辦理奏入報聞乾隆二十七年四月初三日倉場侍郎蔣炳直隸總督方觀承奏言竊照北運河楊村迤北一帶本係流沙最易淤淺自設漕運通判督率淺夫専司刮挖毎年四五月間糧船北上日行二三十里猶需起剝挖淺今嵗恭逢皇太后回鑾由水路至張家灣所有北運河道更宜䟽濬深通以期御舟行走順速二月冰津之後據報淤淺之處甚多臣等隨飭該通判預行督夫上𦂳刨挖以水深三尺為度臣蔣炳正在查騐間適臣方觀承查看水營縴道到灣公同商酌查楊村至灣計程二百餘里分為三站應日行六七十里而河底流沙又易淤積雖預為刨挖仍恐臨期水淺沙淤應於御舟臨到之前數日添備刮板等器具加僱人夫並酌看河道情形多築草壩數道束水使深或用運米殘袋囊沙作壩照從前辦過成規相㡬料理其水道深處兩邊挿立栁枝為御舟遄行眼目現委坐糧㕔姚成烈通永河道明琦帶同該丞倅等遵照妥辦奏入上諭曰所奏甚是早挖而復淤豈不虚費人力乎乾隆二十七年四月初九日兵部奏言現據山東巡撫阿爾泰奏請於留東餒飬馬匹原交額數外備馬五百匹在順河集撥給上駟院各行檔併拜唐阿兵丁在途疲憊未經交棚人等乘騎一摺奉硃批好知道了欽此臣等恭照皇上南巡隨從人等除侍衛官員外所有各行檔拜唐阿兵丁自京起程時毎人原領馬三四匹不等雖途中陸續疲憊馬六百餘匹現在仍各領有留東喂養馬乘騎似可毋庸撥給查此次山東撫臣照上屆之例上駟院備馬四百匹隨從官兵備馬一千匹青州將軍奏明備馬八百匹俱在泰安地方更換又直隸總督亦照上屆之例於徳州交界備馬一千匹更換各在案臣等酌議莫若將此項馬一千匹内抽馬五百匹歸併在泰安地方一體更換庶於官兵均屬有益奏入報聞欽定南巡盛典卷九十四
