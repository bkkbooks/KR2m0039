body:
  text: 乾隆二十年三月二十日兩江總督尹繼善等奏言竊惟省耕省歛頻殷補助於春秋一豫一遊遂協謳歌於兆庶在周禮所載則廵狩之制敬戒屬諸職方若雅頌所傳則時邁之章懐柔及於河嶽此皆古昔之鉅典尤為盛世之隆規我皇上徳洽羣生仁周六服法官無逸既深宵旰之憂勞御輦遥臨復厯郊原而清問惟聖主無非為民之舉斯愚賤咸懐望幸之忱伏思乾隆十六年春間敬奉聖母皇太后南廵大典為光臣黎交慶敦崇孝治萬方畢洽歡心慰豫慈懐所在親承色笑更荷湛恩倍至睿慮精詳指示修防以衛民永卜河清海晏分别蠲除以益下總期物阜人康優恤髙年不僅多頒粟帛重蘇積困爰為速發帑金且禁供帳之繁華雖草木無滋擾累嚴屬車之約束即雞犬亦得恬熙是以呉山越水之間爭率清塵而灑道蔀屋茅簷之衆共欣就日而瞻雲環老稚以歡呼迓翠華而恐後皆謂聖天子心誠懐保方勤求民瘼於九重我萬姓情切尊親願時近天顔於咫尺一自送駕回鑾之日又盼省方問俗之期於今越有五年乆已顒然引領臣等備員兹土博採輿情非徒文武臣工竚待六飛之再屆實亦東南億兆思迎萬乗之重來謹考昔年聖祖仁皇帝屢廵江浙閱視河工深仁與天地同流聖績垂古今丕煥我皇上敬承謨烈動念民依素惟澤國宣防尤厪宸衷眷注兹當大工告竣髙堰初成善後機宜正賴親臨指授安瀾底績還祈睿照提撕前因西北軍興未敢即行凟奏今悉天威逺振凖夷稽首而歸誠聖武布昭逆虜傾心而向化闗塞息烽烟之警不戰成功穹廬識覆載之寛大生為徳納遐荒於在宥洵亘古所未聞凱歌既奏於邉庭舞蹈並深於衢路望龍光者更深廹切求肆覲者倍篤瞻依所有一應事宜臣等現在籌備仰懇聖明俯從所請定明春之吉日邀鑾輅以南廵庶江畔海濵更誌太平之盛事黄童白叟常親日月之光華臣等敬謹恭摺奏請伏祈俞允奏入報可乾隆二十年六月十三日大學士陳世倌等奏言伏覩乾隆十六年恭遇皇太后六旬萬夀皇上祗奉安輿廵幸南省型方訓俗察吏安民紹承聖祖仁皇帝家法一時鴻恩疊沛愷澤覃敷浹髓淪肌至深且厚迄今時閱五年南服歌思乆而益摯兹者恭逢我皇上布昭聖武綏靖遐荒景運彌光宸衷益懋本月初六日特頒諭㫖於明嵗春月躬詣先師孔子闕里廟廷展禮以申誠敬仰見我皇上本崇儒重道之心厪保㤗持盈之意彛章具舉典則丕昭不獨東土䝉恩實為萬方稱慶臣等伏思江南與山左隣近越中與呉下毗連兩省士民瞻雲就日之思匪朝伊夕今聞翠華近在東省延頸舉踵喁喁望幸倍切平時若於曲阜禮成之日順道賜臨水驛舟航最為近便况儲偫悉資内府絲粟不擾民間仰惟聖主之豫遊實屬閭閻之休助屬車跂望人有同心恭懇皇上俯允臣等所請就近南廵應凱樂之昌期臻屢豐之嘉㑹自吏治民依以及河防軍政諸大務無不仰邀睿矚指示周詳地暨三呉兩浙之全時符五載一廵之候用俾逺近紳衿黎庶再瞻鑾輅親荷龍光則愜民情而光盛治實為曠世之竒逢矣臣等身依魏闕家在江鄉聽榆社之謳思同深雀躍近楓宸而抒悃先効鳬趨謹恭摺奏請伏祈俞允奏入報可乾隆二十年六月三十日江蘓廵撫莊有恭奏言竊照乾隆十六年春翠華南幸准部咨行増鑄錢文沿途經過地方設局官賣以平錢價經前撫臣酌議奏明除厯年餘積各項錢文四萬四千五百餘串又加鑄八夘得錢二萬七千二百餘串又借撥兵餉錢二萬三千餘串三共錢九萬五千餘串分撥沿途設局官賣一時泉貨流通錢價並未昂貴本年三月二十九日欽奉上諭南廵一應事宜俱令尹繼善等酌量籌偹静候俟軍務就緒降㫖遵行並諭莊有恭等知之欽此現將應辦事宜酌量撙節辦理惟查錢文一項必須預籌加鑄臨時始敷濟用臣等宻飭細查現在蘇局錢文截至本年六月底除給發兵餉外僅餘錢一萬五千餘串若止照前加鑄八夘亦僅得錢二萬七千二百餘串恐不敷用應請加鑄一十四夘可得錢四萬七千六百餘串再查鼓鑄工料價值向係支給錢文今應請照時價庫平給銀兑買正鑄加鑄計可易存工料錢一萬六千六百餘串以上餉餘加鑄並易存工料共可得錢七萬九千三百餘串以此倣照十六年之例恭候聖駕經臨時分發各州縣設局官賣足可流通平價如有餘剰留充下年搭放兵餉至所需銅鉛錫觔查庫貯洋銅除供本年額鑄外尚存五十六萬餘觔可供加鑄之用惟銘錫僅敷額鑄必須採買除另飭藩司動支庫項預籌採買銘錫查照加鑄外理合先行奏明奏入報聞乾隆二十年八月初五日大學士公傅恒等奏言兩江總督尹繼善所奏増撥馬匹以備差務一摺奉硃批軍機大臣議奏欽此據稱江南所領馬匹原為預備差務應用今准部咨軍營餘剰馬匹現在尚未起臕緩程趕至張家口約在九月盡間則口外行數千里恐臕分愈減再自張家口赶至江南又計程三千餘里沿途既無厰地可牧而新馬又不能驟加料豆難免疲乏且趕至江南已在冬底相近辦差之期雖加料喂養亦恐不能一律長臕設有貽悮闗係非輕現在趕至張家口馬計數尚有多餘仰懇於原奏一千三百匹之外再行撥給壯健馬五百匹所需馬價遵照部議即交本省藩庫收貯報部撥用查本年六月内據江寧將軍請買馬二千二百匹京口將軍請買馬八百匹兩江總督請買馬一千三百匹經臣等酌議准其所請令各委妥員於八月盡間赴兵部報明該部㑹同理藩院各派司員帶同至張家口於軍營餘剰馬内照數撥給所有馬價均交藩庫收貯無庸解京今尹繼善奏稱接准部咨軍營餘剰馬匹現在尚未起臕趕至張家口約在九月盡間再趕至江南已在冬底雖加料喂養亦恐不能一律長臕請於原奏一千三百匹之外再撥給馬五百匹恭查明春聖駕南廵該省預備差務需馬必多自應酌量多撥以免貽悮且軍營餘存馬匹其現議趕至張家口者共有一萬八千餘匹原議撥給該將軍總督等計馬四千三百匹其餘辦差省分浙江一省已據該督喀爾吉善奏到現在馬匹已足敷用毋庸購補山東一省據青州將軍咨請撥應補馬四百五十六匹其廵撫各鎮即有續請撥補馬匹大約亦不過數百匹是餘剰馬匹尚多應如尹繼善所奏准于原奏一千三百匹之外再撥給馬五百匹令該督委員赴部㑹同司員前往張家口一併照數撥領所有馬價銀兩仍照原議均交司庫存貯以備撥用俟命下臣等交部行文該督尹繼善遵照辦理奏入報聞乾隆二十年九月二十五日傅恒等奏言明春恭遇聖駕廵幸江南該省應差馬匹現赴張家口於軍營凱旋馬内領取四千餘匹應用但趕赴江南尚需時日恐不能喂養臕壯臣等查河南省綠旗營馬一千七百餘匹駐防官兵馬二千五百餘匹除倒缺外現有馬二千二百餘匹二共馬四千餘匹擬於此内酌撥臕壯馬二千五百匹交與江南則該省辦差足敷應用其河南撥缺馬數即令江南委員將所領口馬就近解送撥還補額其應交馬價仍令江省按數解還藩庫如此則辦差省分可得臕壯之馬而豫省馬匹可以從容喂養一轉移間均有裨益是否有當伏候命下臣等行知各該省一面調撥委員解交令於十一月内陸續到齊預備應用奏入報聞乾隆二十年十二月初八日傅恒等奏言圗爾炳阿奏辦理解送江南馬匹一摺奉硃批軍機大臣速議具奏欽此據稱豫省綠營馬一千七百餘匹滿營馬二千二百餘匹按數酌派滿營應撥馬一千三百餘匹綠營應撥馬一千二百餘匹但滿營馬二千二百匹數内有報部存價並倒缺馬匹奉部停買外現只有馬一千二百餘匹已於此内挑選一千匹其不敷馬匹應於扣存馬價内動支購買於附近各州縣代買三百匹以足𣲖撥之數倘新買馬匹有臕分不足尚需喂養者先於豫省驛馬内挑選抽換庶馬匹可以即時解送於豫省驛馬亦無短少其派撥各營馬二千五百匹分為十三起陸續行走均不致擁擠遲悮至喂養馬匹草料長途難以裹帶現令各營於馬匹離營之日即將本營馬料截扣造報飭令沿途經過地方官照例供應並派委將弁稽查管押每馬二匹用兵一名晝牽夜喂所需日給官兵飯食兵丁口糧同馬匹草料等項循照豫省從前解甘馬匹成例照數動給於乾隆二十年耗羡項下支發事竣核實造銷其在江省境内經該地方官供應者應聽江省自行照例報銷其應解何處交收之處現咨詢江省候覆照辦所有撥補豫省馬匹應俟江省委員趕赴到日撥還各標營補額查江省領取口馬一案前經臣等議准該總督尹繼善所奏令於預省滿洲緑旗各標營酌撥壯馬二千五百匹交付江南應用其豫省撥缺馬數即令江省委員將所領口馬就近解還補額今南廵大差雖經奉有諭㫖俟明嵗秋成後再行奏請但此項馬匹原係江省各營應換勞傷馬匹之數而江省距口較逺長途牽趕馬匹必致疲乏若由豫抽撥而以口馬就近補缺於錢糧不致糜費於馬匹亦不致勞疲彼此均為有益且豫省馬匹此時業經起程在途而江省所領馬匹亦將次赴豫若再行掣回徒滋往返自應仍照原議辦理今該撫圗爾炳阿所奏於緑營馬内挑選一千二百匹滿營馬内挑馬一千匹其不敷三百匹於滿營扣存馬價内代買足數其有臕分不足並於驛馬内挑撥抽換亦屬通融辦理之法至分起行走派弁管押及沿途所需草料口糧照例支銷至江省境内則聽江省自行報銷之處籌辦尚為妥協均應如所奏辦理其應於何處交收現據該督尹繼善稱業已札知豫撫令委員解送開封交收補額所需盤費則暫聽豫省酌辦自應聽各該督撫酌量商辦務使錢糧不致糜費而兩省差撥馬匹均無缺乏奏入報聞乾隆二十一年九月二十日尹繼善等奏言竊惟省方肆覲古昔著有隆規考績覲風盛世垂為鉅典我皇上仁同覆幬澤洽寰瀛旰食宵衣既切憂勤於黼座春耕秋歛尤殷補助於郊原是以翠華臨幸之區無非雨露涵濡之地迺自乾隆十六年聖駕南廵而後又經五載有餘呉山越水之間猶記同瞻雲日蔀屋茅簷之衆乆思再覲龍光臣等察據輿情上年先後奏請荷䝉諭㫖俞允舉行凡在兩省臣黎方翹首以待鑾輿之􅊩止偶值秋收歉薄復為民而煩殿陛之焦勞殊恩叠沛於東南固已重生再造膏澤遍沾於億兆奚啻浹髓倫肌猶恐閭閻重困之難蘇欲俾有司専心於撫字特頒明詔暫緩時巡聖慈懐保之誠曲加體恤士庶尊親之戴倍切瞻依今者二麥已報有秋百榖咸稱大熟築場納稼喜溢千村飲蜡吹豳歡騰萬井不特倉箱崇積更無艱食之虞抑且風雨均調可卜屢豐之慶僉謂歴年未有之景象總由聖主感召天和備沐千載罕遇之恩施惟我小民敢忘帝力草野何能酬報祗知聖徳難名民物既獲阜安願覩天顔有喜望鑾旂之再届黃童白叟共云為日已遲盼玉輦之重臨兩浙三江莫不懽迎恐後臣等恭膺簡命忝任南邦幸際昌期欣逢稔嵗聆多黍多稌之頌庶㡬上慰宸𠂻採一遊一豫之歌亦得備陳天聼仰懇皇上俯從所請准定明春啟鑾以愜下忱並昭大典將見太平盛事載傳江海之濵日月光華添被湖山之色臣等敬謹繕摺具奉伏祈俞允上諭恭載恩綸乾隆二十一年閏九月初七日總督倉場侍郎雙慶等奏言竊查上年預備聖駕南巡所需船隻業經奉㫖𣲖出安福艫一隻翔鳯艇一隻湖船二隻撲拉船一隻臣當即敬謹修艌於上年九月間駕赴江省伺候應用嗣奉諭㫖停止巡幸因復駕回歸塢俱經奏明兹接部咨恭逢皇上明春再舉南巡大典所有上年𣲖出船五隻自應仍照前例即於閏九月内委員敬謹駕赴清江令地方官撘篷苫葢以備臨期乗用再天津船塢内除前𣲖五隻外尚有船十隻臣等謹繕清單恭呈御覽應否於前派五隻外再行添𣲖之處相應請㫖遵行奏入諭曰五船已足敷用不必再行添派乾隆二十一年十月初三日兵部侍郎管順天府府尹劉綸府尹陳兆崙奏言恭照明春聖駕南巡所有隨營車輛例由順天府衙門敬謹預備伏查乾隆十六年正月駕幸江浙經前任兼管府尹臣蔣炳等飭屬預備車四百餘輛後實用車三百四十九輛原議各車至順河集即令回京所需回鑾車輛交與山東江南地方官就近催辦旋經兩江督臣黄廷桂山東撫臣凖泰奏明將順天府原車照數留住以一半交江南一半交山東以備回鑾應用其車價銀兩在於該兩省動用給發照例報銷今次恭逢聖駕南巡臣等現在移咨内務府先期酌定應備車輛一面分飭所屬預行妥辦并咨山東江南督臣撫臣循照乾隆十六年籌辦規條㑹同妥協經理再臣等恭查上屆江南山東二省辦理回鑾車輛因僱備原車途中騾馬不無疲乏至交車時每省僅各留一百一二十輛不敷應用又隨營官用駝隻間有疲乏短少者經撫臣凖泰奏明以一車抵給三駝一併於東省僱備其江南素非産車之區所有本省應備之車東省不能協濟復經前管府尹臣蔣炳移咨直督檄調附近南省之景州河間獻縣等處代僱車百輛以濟江省之用沿途草料等費由江省委員分送給發臣等亦即一面詳悉商知直𨽻督臣方觀承預為籌備俟明年需用時定數移調協濟除一應𣲖委人員照㑹管理及包封支發車價各事宜臨期照例酌辦外所有臣等現在辦理縁由理合具奏奏入報聞乾隆二十一年十月初五日劉綸奏言明春恭逢聖駕南廵所有順天府辦車事宜臣謹㑹同府尹臣陳兆崙循照乾隆十六年辦理條規繕摺奏聞至恭辦回鑾車輛前經兼管府尹臣蔣炳前赴順河集㑹同江南山東兩省地方官籌辦今次恭逢駕幸江浙伏懇皇上天恩准臣劉綸恭隨聖駕前往於順河集水次督率各委員交收車輛至隨駕回鑾時再先期趨赴順河集敬謹料理辦車事務奏入報聞乾隆二十一年十月二十七日總理行營事務和碩莊親王允禄奏言恭照明春皇上南巡江浙所有一切預偹事宜臣等查照上次議定章程悉心斟酌務期妥協伏查乾隆十五年十一月内臣等議奏南巡事宜内稱旱路扎營所需大城䝉古包帳房等項俱帶往二分工部應備樁橛等項亦照例帶往所用駝隻及茶膳房等處駝隻車輛俱交各該處預偹自徐家渡至直𨽻厰留駐旱營一日所用大城等項亦先期運往舟行所用縴夫於河兵内撥用應帶銀兩縀疋等項交户部内務府具奏備帶侍衛揀𣲖三班八旗兵丁揀𣲖一千名各處官員執事人等酌量𣲖往至江南登舟時兵丁減𣲖五百名章京擬𣲖四十員虎鎗侍衛兵丁一百三十七員名内揀選四十員名其餘入於三班侍衛及䕶軍五百名數内㨂𣲖扈從大臣官員俱於嵗前預領春季俸銀應騎官馬人等按應給數目在京全給先支兩個月路費途間再行找給登舟時令其各留家人拴養拜唐阿兵丁所騎官馬并官用駝隻交山東巡撫分給附近各州縣及綠旗各營喂養交𣲖出總管大臣彈壓經理回京車輛欽𣲖大臣㑹同地方官僱備黒豆一項令東撫酌量採買運送沂州一帶以供支糶或江浙地方有需撥濟之處即令咨明東撫撥運其留養馬匹所需麸草髙糧等項亦令東撫酌買備糶至沿途安設臺站由兵部勘明正腰各站各該督撫於通省驛馬内抽調備用所有經過地方應辦營盤道路橋梁一切事宜令各該督撫照例預備明春翠華南幸除中途留駐之總管大臣及料理回京車輛大臣臨時奏請欽𣲖外據總督尹繼善請㫖已䝉聖諭自徐家渡渡黄至直𨽻厰登舟回鑾至徐家渡起旱查直𨽻厰地方即係御舟停泊之所該處已備水營似不必再備旱營此次渡黄後應請皇上駐驆直𨽻厰水營其餘應備事宜均應照上次議定章程辦理惟馬匹船隻二項上次雖亦定有章程而臨期經理未善不免有爭奪偏枯之弊據總督尹繼善於上年十月内酌議具奏奉硃批總理行營王大臣議奏欽此今復據該督將辦理情形並船隻堪坐人數分晰咨商臣等與尹繼善面同酌議查上次原議每大臣一員給馬五匹章京侍衛官員等每員給馬三匹䕶軍𦂳要執事人等每人給馬二匹其餘每二人給馬三匹共需馬六千六百餘匹至往各名勝處減備十分之四只需馬四千匹此次江省馬匹該督原奏江以北備緑旗營馬四千匹江以南備八旗營馬四千匹渡黄後上船及往各名勝處所用之馬均請在四千匹以内應用惟是錢家港至江寧添備馬二千匹則此項扈從官員兵丁人等俱酌量足敷差使不得浮於上屆所𣲖之數至抵江境時應統以六千馬匹核計隨往餘俱留住查渡黄後上船官員人等係全數俱行若照六千匹之數給馬則有不敷據該督稱此次内河泊船之所趾黄不過二三里僕從人等儘可歩行自應按人減馬臣等酌議除三品以上大臣官員御前侍衛乾清門侍衛批本奏事官奏䝉古事侍衛軍機處滿漢官總管首領有職太監應按數給馬毋庸另議外其餘官員兵丁人等或酌減馬一匹或只給本身騎馬總在四千匹數内其隨身行李令地方官聚集民夫聽其自行僱用至駕幸髙堰暨徃蘇揚各名勝處俱係暫時往回非有𦂳要執事不必隨往則當按差減人亦在四千匹數内應令各處將随往江南人數於十一月内報明總理行營處彚總查核即將確數分晰開單行知該督遵照至應給馬票應俟總理行營處核定數目即令各該處先期行文咨報兵部將刋刻空白紅票填註官員銜姓馬數如騎五匹及二三匹者每員各給一票其一人一馬者按行檔彚給一票如有為數過多或至百餘者按十匹分給一票仍令各該處各照行檔自𣲖専員管理并請特𣲖大臣於渡黄數日前會同兵部率同江省管馬大臣將渡黄紅票一張散給各人收執仍註明渡黄字様以免牽混至渡黄後再將隨往各名勝䖏紅票散給管馬之員見票發馬並於票内印一某䖏應訖戳記其中如有分班更換者即將原票通融支馬不必另行換票其自錢家港至江寧扈從人員係屬全數随往俟將到錢家港之數日前兵部再添給二千匹紅票率同江省大員按數散給自江寧回至錢家港即將添給紅票截繳又沿途隨駕進城及跟隨御舟攆縴需用騎馬不過數百匹不便再憑紅票支馬應令江省管馬大員另製印恪竹籖數百根編立字號俟先期𣲖定傳知用馬數目即將竹籖按數送交兵部每馬散給一籖按籖支馬繳馬還籖均應如該督所議辦理至船隻一項上次共需頭號沙飛馬溜等船四百四十一隻又每船十隻外多備一隻以便添換其時船隻本不寛裕以致人多船少混行搶奪且頭號沙飛等船遲笨難行易致阻礙今該督議改用三號沙飛等船比較上次船數雖屬加増但俱係中號小船亦祗堪敷用俱就各船名色及可容㡬人核派撥自屬斟酌得宜俟各該處將人數報明總理行營處彚總行知該省將所備船隻各釘木牌開寫銜姓行檔挨次排列河干仍請特派大臣㑹同兵部於渡黄十日前先至該處㸃騐明白其應坐船官員人等由兵部給發船票自差家人賫領若數人共一船難以人人給票者一船彚給一票其各項船隻行走先後次序仍照上次原議御前大臣領侍衛内大臣軍機大臣御前侍衛乾清門侍衛船隻應在御舟之前上駟院侍衛官員與裝載御馬船隻以及批本奏事軍機處侍衛處内閣兵部之𦂳要官員等亦應令其在前行走其餘船隻皆照例在後行走若有承辦事件必應在前行走處俱令臨時自行奏請再江南河道窄狹易於擁擠應交管理御舟之大臣協同䕶軍統領等稽查凡行走及停泊之時母許攙越擁擠其浙省馬匹船隻給票監放等項應照江南一體辦理奏入報聞欽定南巡盛典卷九十二
