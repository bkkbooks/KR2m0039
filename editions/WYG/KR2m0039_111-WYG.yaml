  text: 欽定四庫全書欽定南巡盛典卷七十八
  hash: sha256:af97723d7750fdb39eb297945ce0f82358d1ee0824769c1eb19ad4e1623bc893
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_111-1a, image: WYG0659/WYG0659-0243a.png}
body:
  text: 程塗臣等謹案周禮掌方氏辨九服之邦國自王畿千里而外率以五百里為準王將巡守則戒於四方及王之所行先道帥其屬而巡戒令盖所以周知夫山鎮澤藪之殊而因以廣布夫人民穀畜之利典至鉅也我國家幅員廣逺亘古罕有倫比而維江與浙六迓鑾輿羽葆所經元化滋液其間計里置頓率由故常蕩蕩平平無在非與民休息之意故尚膳有定所掌舍有常經供億不煩儲跱無設和門帳殿計日按程預籌必蘄於地為宜於民為順於用為節慎重周詳以垂萬年不易之典逮安福既登烝徒乃楫風烏徐轉川后效靈寧衆息勞歡心畢洽而且視河工則往復循行臨海塘則改途速駕釋奠用展宫牆之敬登岱不襲封禪之文夫是以通都廣陌之間白叟黄童莫不奔走偕來就瞻雲日以視周雅所歌敷天裒對之盛殆逺過之而後代所稱萬騎雲屯千旗谷暗僅沾沾於儀衛警蹕之盛者又豈足以擬大聖人省方觀民之極軌歟夫吏民愛戴之忱與夫淑景淳風巷舞衢歌之概固編載所不能傳而水陸川原榮光依被允宜臚叙以表天行之健以昭聖澤之周俾按籍而求者仰見日月所照莫不依光而非僅以代記里之鼓也謹誌程塗第十欽定四庫全書欽定南巡盛典卷七十八程塗乾隆十四年十一月十九日上諭内閣曰㨿準泰奏東省至江南陸路有二道其自泰安至紅花埠一路較之兖郡至韓莊閘稍逺似應從中路行走但聖祖仁皇帝巡幸時俱由東路或中路雖稍近不如東路之便易著準泰會同江南總督等詳悉酌議將兩路應行之處速行繪圖具奏乾隆十五年三月二十六日上諭嚮導大臣曰據努三兆惠奏由杭州府渡江至紹興禹陵南鎮一路河道窄狹僅容小船等語朕初次南巡禹陵近在百餘里以内不躬親展奠無以申崇仰先聖之素心嚮導及地方官拘泥而不知權宜辦理之道鰓鰓以水道不容巨艦為慮朕在宫中及由髙梁橋至金海常御小船寛不過數尺長不過丈餘平橋皆可徑渡最為便捷越中河路既窄日間祗須乘用駕駛小船著該督等遵照妥辦乾隆二十一年閏九月二十八日上命軍機大臣傳諭閩浙總督喀爾吉善曰紹興一帶此次毋庸前往該督等不必預備乾隆二十二年二月二十二日上諭内閣曰朕囘鑾渡黄後由順河集至徐州閲視河工朕即自徐州至曲阜展謁孔林途經泰安登岱拈香本日仍囘大營駐蹕其登山路徑但須畧為掃除足供行走即有窄狹之處或乘馬或用山歩輿亦無不可至聖母皇太后鑾輿並不登臨仍由順河集舊路先至靈巖駐蹕該撫毋庸搭架天橋致多糜費乾隆二十六年十二月十六日上諭内閣曰㩀倉場侍郎温福等奏開嵗南巡皇太后由運河水路囘鑾所有北上糧艘酌量迴避一摺著將原摺寄交楊錫紱令其查照事理悉心妥議俾河道既無妨碍而糧運亦不致稽延一切善為經理仍先行具摺奏聞乾隆二十七年二月初五日上諭内閣曰朕巡省江浙所過地方並未禁止行旅將來旋蹕時皇太后御舟由水道進京程途尤為穏便昨巡漕給事中洋海乃先期奏請自通州南下船隻悉令迴避所見甚属紕繆運河為南北通津舟楫往來相望即屇聖母御舟經過時旁有支河㲼港自可暫行引避設其地别無可避亦苐附泊傍岸不致妨礙縴道足矣若豫事盡行飭禁則自春涉夏為日頗長以千里長河使行者久羈道路於事理全未通曉已傳旨申飭並傳諭經行各處一切如常放行但江浙二省水程更多有司不能曉事或有似此拘泥辦理者並著各該督撫即飭知沿河地方官凡啇民船隻均行照例行走毋得稍有禁阻乾隆二十九年十二月二十日上諭内閣曰昨據尹繼善等奏稱丹陽一帶河道淺窄若浙省官員俱前赴鎮江接駕誠恐船隻過多未免擁擠除錢陳羣聴其逺接外其餘督撫司道等官俱令於蘇州迎接等語蘇州河道亦不甚寛濶若浙省應行接駕官員俱前赴蘇州則船隻較多仍恐未免擁擠浙省除將軍總督巡撫准其赴蘇迎接然亦不得逺越蘇郡其餘各官俱於本省嘉興交界處所祗候槩不必出境乾隆四十三年十一月十七日上諭嚮導大臣曰庚子年春南巡所有自京至浙江杭州府沿途水陸路程已據該處繪圖進覽從前四次南巡皆預𣲖嚮導前往查勘原因山東江南尚有行營數處是以必須嚮導相度核定今春高晉國泰在京面請江南山東各添建行宫數處以供憩息俱已酌定地面并稱現在各行宫均有應拆材料足敷添用不致多費因允其所請飭令勿事浮糜是由京至江南登舟處陸路沿途俱有行宫毋庸武備院備帶大營城分及氊廬等項以省駝䭾之煩并不必復𣲖嚮導前往其沿途尖營向日本有章程只須酌量道路長短安設逺者設尖營兩處若近在四十里以内者止設尖營一處均非難辦之事各督撫自能經理裕如著傳諭各督撫將南巡蹕路所經一應橋梁道路尖營行宫按站開明總列一摺并詳晰繪圖貼説呈進其兩省交界之處並須彼此照㑹將何處行宫及何道路係何省何州縣所轄明白聲叙自可一目了然又水程所安大營上四屇南巡江浙兩省久經辦熟近年直𨽻山東間有於水營内備板房座落數楹朕因囘鑾時天氣漸熱且北方岸旁寛濶尚可擴充若江浙河岸窄狹實無可容板房之處且自登舟至囘程不過春末夏初亦無取乎凉爽斷不可倣照山東直𨽻辦理至山東水營舊料尚存原不妨聴之直𨽻并不必預備水營也其餘各省古蹟行宫有由督撫承辦者有由鹽政織造承辦者均著照舊辦理總宜善體朕意勿稍踵事増華致耗物力乾隆四十五年二月初七日上命軍機大臣傳諭兩江總督薩載曰此次南巡因閲視河工是以由陳家莊至桂家莊嗣後南巡不必經由桂家莊乾隆四十八年八月初八日上諭内閣曰據薩載覆奏明嵗南巡臨幸徐州閲視石工所有沛縣舊城新城相距荆山橋經由御道俱有一百二十餘里未能望見惟沛縣所轄之夏鎮地方附近昭陽湖舊有城垣被水冲塌現亦興工辨理該城濵臨運河可以順道閲看等語沛縣新舊城垣既據該督奏稱距御道較逺即可毋庸前往至夏鎮近在河邉御舟經過一覽周知亦可毋庸預備再金山橋新建行宫與栁泉相近著即改為栁泉行宫除就近傳知嚮導處外並諭該督等知之欽定南巡盛典卷七十八
