body:
  text: 河防乾隆三十二年二月十四日河東河道總督李清時山東巡撫崔應階奏言東省運河上年伏秋汛内河坡並漲臣李清時自豫省防工回東勘辦事宜案内即經奏明將徒駭馬頰二河逐加疏濬捕河㕔屬之三空橋落低展寛臨清磚閘月河挑挖深通奉到硃批好如所議行欽此臣等隨即委員自龍魏灣閘壩以下河頭起至海豐霑化等縣入海河尾止循流測量淤淺阻礙段落逐一估計臣崔應階業經嚴飭各府州縣照依本管地界督勸民夫乗此春融農隙實力疏濬其三空橋落低展寛工程臣李清時亦經勘核形勢機宜改為五空落低三尺按照成規據實確估計需工料銀六千七百餘兩動撥司庫銀兩委員購料興工儧辦至臨清磚閘月河已於去冬小挑運河案内莭省可緩之工通融挑挖如式深通從此河坡水勢多添暢洩之路水有所歸於運道民田似有禆益惟查臨清地處下㳺磚閘月河為汶河入衛尾閭而衛汶之水性本湍悍渾濁伏秋長發時設汶力不足以相抵即致灌入停淤必須於洩汶之中更求禦衛之䇿臣等伏思月河臨時築壩堵閉固可免於倒灌苐汶衛二河水勢長發靡常倘一時先後並漲則月河之壩甫經堵築以禦衛水又需開放以洩汶流開閉不時不特糜費錢糧且恐辦理不及致失機宜所闗匪細臣等率同運河道姚立徳相度情形確加籌畫應於月河上口修建單閘一座設板啟閉若遇汶強衛弱則啟板宣洩如遇汶弱衛強則閉板抵禦庶隨時應手莭宣有備臣等又查東阿縣境内運河東岸平水三閘於乾隆十九年修建又五空橋一座建自前明於乾隆二十七年改修落低均係保固限外工程上年伏秋汛内汶河水發及沙趙二河之水同時並漲該處橋閘過水甚大激傷磯心并衝掀跌水面石塊掏空底土多成坑塘亟應照舊修整備資宣洩以上添建單閘并修整橋閘皆闗運河水利應辦之工臣等撙節確估共計需銀五千一百餘兩亦請動撥司庫銀兩及時趕辦務於汛前完竣實有禆益奏入報聞乾隆三十二年三月初六日河東河道總督李清時奏言東省運泇二㕔所屬南陽以下運河西岸碎石堤工係漕船挽縴之路最闗𦂳要先於乾隆二十一年間因江省徐州黄河北岸孫家集一帶刷成溝槽奪河内灌南陽昭陽㣲山等湖受水益多以致縴道沈沒水底湖河一片澎湃汪洋官民船隻至此非風莫渡視為畏途臣在運河道時随同前河臣張師載前撫臣阿爾泰屢次相度幾費經營既作通縴之計復為經久之圗仿照竹絡碎石壩之製師其意而變通其法奏明在於水勢深濶之處兩面簽下管石排樁内填碎石上加頂土其㣲露堤形止係湖面受險者則簽一面管石排樁内砌碎石加築土頂土戧分别籌辦較之簽樁下埽及叠砌大石費省數倍工程可資堅固計堤長一萬餘丈估銀十四萬餘兩仰䝉聖主洞徹機宜俞允所請發帑興修尅期完竣十年以來内河外湖長隄限隔糧艘商民得資縴挽永免風濤之危險時頌浩蕩之鴻恩惟查前項碎石工程水中填砌全賴水面排樁管定始得整齊髙厚而樁木因歴年已久土漚水泡難免朽腐斷折石無樁管土隨石卸不特河中有觸舟之患抑且坍卸日甚碎石沈失工費較多臣帶同運河道姚立徳細加查驗分别估計除水内工段樁木間有損缺尚能管石一二年不即坍缺者暫緩補修其有乾地内坍卸碎石可以無須再簽排樁者止令額夫檢石安砌不給工價以節錢糧外惟運河㕔屬田家單閘起至徐家營房止工長二千九百餘丈泇河㕔屬葛墟店起至郗山上下止工長一千五百餘丈湖河相夾兩面皆水大段損缺排樁工石坍卸現在全無隄頂殘缺過甚情形𦂳要臣隨㸃明應補排樁確核砌石加土工價共計需銀二萬餘兩應請動支司庫銀兩照舊補修如式以期運隄永固縴挽有資理合将現在情形恭摺具奏奏入諭如所議行乾隆三十七年三月十五日河東河道總督姚立徳山東巡撫徐績奏言兗州府屬濟寧一州為汶泗府洸牛頭等河之水滙歸之區每遇伏秋汛漲易致淹及民田上年六七月間大雨時行河湖坡水並漲自石佛以下汪洋瀰漫勘報成災䝉我皇上念切恫瘝發帑賑濟今春又沭隆恩加賑被災窮黎感激鴻施淪肌浹髓其被淹處所去冬運河水落即經臣等督飭地方河員設法疏消積潦之地始得及時春耕但其受災之由不得不講求經理以除後患臣姚立徳往來運河熟察情形臣徐績曽任濟寧州知州河坡源流竟委曽經留心今自戴村壩騐收挑沙工程于三月初一日至濟寧㑹同詳勘参以輿論固湖堤而通去路有急應辦理之工庶使諸流歸宿有資可冀減除水患臣等查南旺一湖週圍九十三里坐落汶上嘉祥濟寧三州縣境内地居上㳺適當汶河之衝每年收蓄汶水入湖濟運湖之圏堤向係民修雍正九年及乾隆十二年曽經動帑帮培已歴二十五載近年以來雖撥民夫擇要加修無如道里綿長現在殘缺卑矮之處甚多湖波撞激險要堪虞必須一律培築髙厚以資保衛又運河之西有牛頭河一道上承宋家窪及各州縣諸坡之水下達昭陽湖舊有馬公橋一座係魚臺縣驛路所經計長五百一十八丈横亘南陽昭陽兩湖之間下設橋洞統計僅寛二十三丈牛頭河入湖之水來源盛而束其咽喉往往壅滯難消不特濟寧西坡受漫淹之患即金鄉魚臺二縣亦並波及自應多添橋洞加寛十丈並将廣運荘以下河湖淤淺抽溝導引俾上㳺之水㨗趨昭陽湖則濟寧西坡水患可以減除矣臣等又查運河之東有泗河一道源出泉林至濟寧之魯橋入運名為魯橋𣲖向因泗水下流董家口屢被衝缺日刷日深勢難抵禦于乾隆十四年間即在該處修建石壩一座減洩漲漫之水由孟家橋以達獨山湖旁分一股由貫家灣之西出興隆橋仍㑹泗水入運縁壩身過髙水因壩阻每遇水勢漲發泗河下逰宣洩不及壅滯停淤輒于董家壩上㳺溢入東坡又寧陽縣之石梁口小腿灣等處汶水漫堰入洸至濟寧城北頂阻府河之水漲滿難容亦多旁溢東坡民田屢被淹浸運河東堤亦深受其害臣等現将石梁口等處民堰飭縣堵築将來汶水自可無慮入洸核計土方有限不須請動錢糧其董家口地方在當日建壩之時泗水分洩有備意非不善惟是今昔情形不同泗水南趨轉為石壩所累自當從長計議務求萬全但與其疏濬舊泗河身紆迴窄狹道逺土多需費浩大不若拆除董家口石壩展寛孟家橋舊石橋疏浚馬坡以下入湖尾閭俾水大之時直達獨山湖免致旁溢東坡春間水小即於孟家橋以下築一土壩攔截仍由興隆橋濟運事半功倍則泗水歸宿有資濟寧東坡水患可以減除矣臣等隨率同道府㕔州逐加核估所有修堤疏淤拆展橋壩共計需銀二萬三千餘兩臣等伏思此等工程原係民間自為修理若請動帑項轉啓愚民推諉㳺惰之漸而該州縣灾歉之後現在䝉恩加賑責其及時興修民力實有不能合無仰懇皇上天恩俯念工程𦂳要暫借司庫銀二萬三千兩容臣等委員承修勒限完竣仍于汶上嘉祥濟寧魚臺等州縣分作三年隨同地丁錢糧按數徴還歸欵庶帑項不致虚懸工程得收實益奏入諭如所議行乾隆三十八年九月二十二日河東河道總督姚立徳奏言竊臣前自豫省回濟當經奏明料理運河事宜因查各湖水櫃攸闗來年漕運最為𦂳要臣已将應蓄應洩縁由先行籌酌恭摺具奏兹一月以來臣率同運河道陸燿上下細加查勘今嵗伏秋汎内汶泗府洸沙趙等河水勢叠次長發南入㣲山湖為歸宿北由大清河以達海故運河之水隨長隨消并無騰湧之患惟運河㕔内南旺分水口以裏向有何家石壩一座分洩汶水由劉老口入運前次水發時該壩過水較大冲塌壩身幾奪汶流全勢北注經臣飛飭該管㕔員儧修稭草壩工藉資攔截查此壩減洩汶漲實為運道之闗鍵所修草壩不過暫䕶一時塌損石壩亟宜拆修堅固又南陽以下臨湖邵家徐家二單閘馬家三空橋以及泇河㕔屬之夏鎮六里二閘或沖掀地平石塊蟄裂金門或墻石塌卸不能下板蓄水以上各工臣現在親督道㕔㸃驗舊石酌添新料確核估計容俟估定再行分案題請興修此外尚有官堤民埝被水汕刷殘缺應行培築整齊並各湖進水支河沙淤淺澀應行挑濬深通處所臣俱嚴飭㕔印各官撥集人夫乗時上𦂳儧辦以節錢糧目下回空糧船未過濟寧者祗有二十二帮若連檣入境約計九月内即可全數過完今嵗運河輪届大挑臣俟糧船過竣即将應挑淤淺分頭委員確估熟籌妥辦奏入報聞乾隆四十年六月二十七日河東河道總督姚立徳奏言山東運河下㳺八閘數十里借㣲山湖之水灌輸接濟其南自韓荘北迄臨清計程六百七十餘里全頼蜀山馬踏南旺馬塲等湖蓄水充裕方足濟運無悮而諸湖之中蜀山湖湖面寛濶地居上㳺貼近汶河浥注便㨗歴來收水較别湖多三四尺尤闗𦂳要每年糧艘經臨啟金線利運二閘放水入運以濟船北行上年八月内欽奉訓諭令臣于常規之外多蓄數寸以備雨泉之不足仰見聖明籌畫至善永當奉為法守臣敬謹遵行加意收蓄本年正月底開壩起至五月中旬将各湖之水次第啓放宣注數月餘已有明驗臣近日率同運河道陸燿探量湖面寛長道里逺近水勢深淺尺寸念蓄瀦以多多為善庶接濟可源源不匱苐察看湖堤頗多單薄難持之處與該道細為講求欲圖保安經久之䇿惟有固其攔蓄之堤岸以為瀦水無虞地步該處湖堤西首臨運一面内湖外河南首一面係沮洳漥地形勢均屬喫𦂳當冬月挑河之時運河乾塘舉􅓩一遇北風奔騰撞激勢若排山雖隨時搶䕶得保平穏而每嵗如此究非常法今逐加經度西南地勢既就卑小又適當風浪之衝應從孫村起至季家路口止分别頂險次險估修石戧保䕶其間原有舊石工草工並沙山髙阜處不必估計外就現在堤身陡窄水勢較深處所酌擬修砌石工堤根平順水勢稍淺處所擬辦碎石坦坡以免多費仍各加髙頂土二尺共估石工六百七十七丈碎石坦坡長一千六百六十四丈連加髙土工約計需銀二萬餘兩其自季家路口至蘇家橋一帶均係民埝地形漸髙且在湖之東北風浪較小照例督勸民夫用土帮培髙厚以資一律所需工料土方銀兩查河北道兗沂道庫均存有節省八束一欵原係留為河工别項工程之用今應即于此欵内動支毋庸另請錢糧臣謹繕摺具奏並繪圖貼説恭呈御覽如䝉俞允臣于重運過完湖水暢放濟運存貯底水無多之候一面委員辦料興工将底盤先為趕𦂳築起不悞收蓄一面確估造册具題奏入上諭曰好應修築者但須實工實料毋滋冐銷之弊可也乾隆四十一年六月初六日兩江總督髙晉河道總督薩載奏言竊臣薩載前於東省行在面奉諭㫖以呉嗣爵奏黄河兩腮淤髙中間構槽窄狹洪湖運河亦因連年黄水倒灌致有淤墊現在清口開挑引河係帶水撈挖恐於事無濟又聞海口亦復沙淤令臣薩載到任後察看實在情形㑹同髙晉悉行籌酌如何能使黄水暢流不致倒灌分晰奏覆等因欽此遵於三月二十七日到清江任事時因臣髙晉在省查辦事件臣薩載遵㫖先赴黄河海口上下察看将勘過實在情形繪圖貼説於四月十八日恭摺奏䝉聖鑒兹臣髙晉於五月初二日到淮與臣薩載公同講論悉心籌議并考之書誌康熈八九年間黄河海口積沙成灘横亘二十餘里相傳為攔門沙其時黄河即從東北紆迴入海前河臣董安國乃創築攔黄大壩另闢馬家港口改易舊制轉致去路不暢上㳺易潰康熈三十八年将攔黄大壩盡行拆毁堵塞各處決口束水攻沙仍由故道入海即今之大通口是也八十年來黄水滔滔東注並無阻遏惟查該處潮汐往來海水黄水交接之處淤沙勢所不免而日積月累兩岸接生淤灘南岸遂有新淤尖尖頭洋之名北岸有二泓三泓四泓之名現今海口距從前之王家港地方已有四十餘里之遥灘勢逾長海口逾逺水勢散漫口門計有二三百丈至一千數百丈之寛若來水湧盛湍急海水原可由淺刷深祗以近年來黄水時有倒灌以致通湖引河淤墊引河既已淺阻則清水不能暢出清江淮安一帶之運道俱有停沙並清口以外之黄河兩腮亦有淤髙且上年秋間豐碭南岸之丁家集外灘民埝刷塌溜往南趨黄水從毛城舖渷壩旁流幾至奪溜為患徐州以下銅沛邳睢宿虹桃源黄河又未免水緩沙停此海口與黄河運河洪澤引河先後淤墊之實在情形也臣髙晉在工二十餘年歴經黄流倒灌河道停沙由通而淤由淤而通或淤在上而下㳺淺阻或淤在下而上流壅盛一年之内通塞靡常數載之中變遷莫定不但海口茫茫萬頃無可施工即黄河内東坍西長東長西坍欲加疏治亦無良䇿今臣等凛遵聖訓再四講求惟有将清口以内之通湖引河沙停淤淺人力可施處所設法挑挖使清水暢出清口與黄水滙流東注并力刷沙則黄水不濬自深海口不疏自治歴年臣髙晉奏明辦理雖未能一勞永逸此即補偏救弊之一法也本年二月内臣髙晉自京回南欽奉諭㫖引河甚有闗係命臣髙晉上𦂳勘籌疏治彼時湖水較大難以煞壩挑挖當與呉嗣爵面加商定凡水深五尺以上者毋庸辦理其水深四尺以下者接續疏浚恭摺奏覆欽奉硃批覽奏俱悉欽此查現在洪湖誌樁存水一丈零八寸五道引河普面漫灘無可施工但臣等㑹同測探五道引河内淺者已在六尺以外深者俱有一丈一二尺不等就目下情形而論清水力足抵黄自可無虞倒灌惟查向年通湖五道引河俱各深至二三丈不等奔騰暢注扺禦黄流是以鮮有倒灌之事而湖水旋長旋消髙埝誌樁每到冬令水落之候存底水無多盖騰空湖面以為伏秋水發容納之地也今則年終誌樁存水九尺有餘此即湖水未能暢出之明驗湖水不能暢出遇黄水盛漲時力不相抵必致有倒灌之慮一經倒灌則引河復淤非特不能攻刷淤沙即黄運兩河之淤墊又所不免矣臣等再四熟籌並採訪輿論必須於冬春湖水消落引河灘現時照依各引河寛長丈尺兩頭煞壩大加挑挖並将清口東西壩基址移下一百六十丈在於平成臺之處建築使清水源逺流長出口之勢有力再清口之西所建各架木龍原以挑溜北趨冀刷陶荘積土使黄水不致逼近清口之意歴年以來陶荘積土雖已刷去大半著有成效但積土根基凝結驟難盡刷臣等相度形勢若於陶荘迤上積土之北開挖引河一道使黄水遶北下注相距清口較逺清水益得暢行至周家荘而後㑹黄東注不獨可免倒灌之虞而二瀆並流合力攻刷則黄河兩腮浮淤以及海口積沙均可漸次刷深下㳺深通暢達則黄河上㳺流行迅疾並可不致停淤且洪湖無壅遏之病即埝圩磚石工程亦得常資穏固恵濟祠之埽工更可化險為平如此一舉數善備焉所謂治淮即以治黄捨此别無良法但目下湖水普漫而出引河為水所佔難以煞壩估挑而時将伏汛黄水方在加長陶荘溜勢情形不定引河頭尾未能􅃍為定準今就臣等勘籌愚昧之見先行繕摺覆奏並繪圖貼説恭呈御覽如䝉俞允容臣等於本年霜降水落後再行察看情形相機酌定隨時奏聞辦理總期清黄併行東注暢達歸海上下黄河漸次刷深海口淤墊一律通順洪湖引河及淮揚運河永無倒灌之弊庶幾仰副我聖主慎重河防殷􅎋訓誨之至意奏入報聞乾隆四十一年七月十六日兩江總督髙晉河道總督薩載奏言竊臣等㑹議覆奏察看海口無阻籌辦治淮即以治黄各情形一摺奉到硃批此奏皆合機宜形勢是治淮黄一大闗鍵届時妥為之欽此摺内請俟通湖引河灘現時照依各引河寛長丈尺兩頭煞壩大加挑挖句上奉硃批此係治本之論宜實力為之欽此又摺内将清口東西壩基址移下一百六十丈在於平成臺之處建築使清水源逺流長出口有力句上奉硃批好欽此又擬於陶荘迤上積土之北開挖引河一道使黄水繞北下注相距清口較逺清水益得暢行句上奉硃批此亦一法勉為之欽此並於圖内奉硃批将所圈處放一大様貼説來庶便觀覽此時尚未興工正可相商也欽此臣等跪讀之下仰見我皇上指示周詳訓勉殷切臣等自當仰體聖心於霜降水落後察看水勢情形實力妥辦以收實効伏念淮黄闗鍵全在清口而東西壩仰䝉聖明指授機宜視湖水之大小定拆展之限制實為永逺遵守不易之章程現在壩工因每年頻拆頻築歴嵗已久壩底不能刨挖浄盡或為柴土壅塞或為倒灌淤積壩根朽腐拆築未能應手以致積水不能暢出今若移下一百六十丈在於平成臺地方建築遵照欽定限制以時蓄洩並将舊埧基址刨除浄盡使清水源逺流長則出口之勢可期得力然不将通湖引河挑挖深通仍恐有名無實現今潮水較大髙埝誌樁已長至一丈一尺以上尚未能奔騰暢出皆由各引河河身及湖邉積淤阻碍所致今湖邉一片汪洋稀淤寛廣難以施工疏治惟有将各引河於冬春水落時兩頭煞壩大加挑挖引河若深則湖水建瓴而出再将湖邉稀淤隨勢撈浚更可掣刷深通暢達引河矣至西壩一帶逼近黄河自建設木龍以來挑溜東行淤出灘面寛自一百四五十丈至三百三四十丈不等甚為有益然遇黄水甚長之時大溜直射恵濟祠由祠前迴溜倒灌流入清口此一帶雖經修有磨盤埽壩攔禦而黄流勢盛仍屬無濟臣等今擬在於陶荘迤上積土之北開挖引河一道至周家荘㑹清東注俾清黄並流入海既可越過惠濟祠逺避清口倒灌之路而周家荘迤下兩岸灘面尚寛離堤較逺相距中河口門尚有三百五十丈溜向東趨形勢較順引河挑竣仍擬在於河頭對岸第三架木龍處做一挑水壩挑溜全歸引河更為有益統俟本年霜降水落歸槽容臣等察看形勢一面確估興工一面詳細奏聞總期清黄並流東注暢達歸海既免黄水倒灌之虞復藉清水刷沙之益所謂治淮即以治黄庶可仰副我聖主慎重河防之至意臣等謹遵㫖繪具大様圖説並将原奉硃批奏摺圖説一併恭繳奏入報聞乾隆四十一年九月初三日兩江總督髙晉河道總督薩載奏言竊臣等於本年六月十八日具奏清口機宜繪放大様圖説恭呈御覽一摺兹賫摺人回奉到硃批已有㫖了欽此摺内清口壩工壩工因每年頻拆頻築歴嵗已久壩底不能刨挖淨盡句上奉硃批此係向來辦理不善應責成原辦之人也欽此又圖内奉硃批引河覺窄應加寛欽此並接准乾隆四十一年七月初三日欽奉上諭髙晉等奏覆開挑黄河周家荘引河一摺並展畫大圖貼説進呈朕披覽圖内所繪引河形勢尚覺太窄已於圖内批示從來河不兩行既經開挑引河則黄水大溜即應由引河行走必須開挖寛深方能引溜全注細閲貼説但稱計長一千零五十丈而於寛深丈數均未奏及恐髙晉等因省費起見是以不肯開寛朕念切愛民凡有闗民間利病及捍衛保障之事從不稍為靳費况此項引河為黄河𦂳要闗鍵若果能開放深通使黄流不致停淤清水得以暢出實為最善之舉即多用帑金亦所不惜但須核實經理耳國家籌辦要務若行之有益縱數逾鉅億亦不為多若為而無成雖費僅千餘亦屬虚擲即如近日征勦兩金川用至六七千萬而大功既成足為一勞永逸之計不得謂之糜費此其明效大驗也著髙晉等悉心籌度将擬開之引河一律挑挖寛深其引溜處尤宜寛展使正溜易於趨注髙晉等即将河身擬挑寛若干丈較現在河身幾分之幾底深若干於圖内詳悉貼説覆奏再圖説内稱俟引河開就應於對岸另築挑水壩挑溜引注新河等語朕意似可将第四木龍畧移向上在硃圈記出之處安置便可借以挑溜但未知能得力否又就圖内河流形勢而論新開引河似可再移向上於第二木龍對岸徑直開下似更便㨗該督等或因彼處大溜趨勢尚未甚急恐不能引流直注如建瓴之勢是以欲於稍下施工抑或可照朕所指量為移上否並著髙晉等一併詳加勘度據實覆奏至摺内據稱東西兩壩因每年頻拆頻築歴嵗已久壩底不能刨挖淨盡或為柴土壅塞或為倒灌淤積以致清水不能暢出請将舊埧基址刨盡以期清水出口得力等語此係向來辦理不善所致已於摺内批示展収清口實為𦂳要機宜自應将壩根刨浄使無壅滯停淤方為妥善何竟草率從事若此歴任承辦之人均難辭咎朕此時亦不将伊等治罪所有現擬刨挖舊壩基址之費即著落乾隆二十七年以後原辦之歴任總河及該管河道按年分賠以示懲儆将此傳諭髙晉等知之欽此臣等跪讀之下仰見聖主洞悉機要燭照靡遺訓示周詳無微不至並於懲儆之中寓寛恤之恩不勝感悚交集伏查清口黄河北岸陶荘迤上擬開引河一道使黄水繞北下注相距清口較逺清水益得暢出行至周家荘而後㑹黄東注以期二瀆并行合力攻沙海口刷深通順前此㑹勘時因黄水方在加長陶荘溜勢情形不定引河頭尾未能遽為定準雖經聲明俟本年霜降水落後再行察看情形相機酌定奏辦而前摺及貼説均未定以寛深丈尺圖内所繪引河形勢又過於窄狹實屬臣等疎漏以致上煩睿慮今䝉明㫖訓誨臣等悉心籌酌将來開挑引河誠如聖諭必湏一律挑挖寛深其引溜處尤宜寛展使正溜易於趨注中心欽服莫可名言臣等隨督同淮揚道松齡副将徐建功叅将李永吉遊擊劉徳等前往該處上下相度測量現在河身寛一百四丈就目下情形酌擬引河河頭挑寛四十丈河身挑寛三十五丈河尾挑寛三十丈較現在河身三分之一其引河底擬挑深一丈至一丈五尺不等使河頭有吸川之形河尾有建瓴之勢以期引溜全趨至新開河頭欽奉諭㫖再移向上於第二龍對岸徑直開下不但河口上迎亦且溜行便㨗較前擬河頭更為順利臣等俱見未及此今䝉聖明指示實當敬謹遵循其新河以外正河之内向來溜勢順行一時欲其舍舊趨新必當籌畫盡善乃能得濟兹仰承垂詢将對岸第四龍畧移向上在於硃筆圏記之處安置查厯來木龍沿灘斜紥原可挑溜開行惟河面寛濶今於移建木龍之外仍湏於對岸築做挑水壩則兩重挑逼自更得力容臣等於霜降水落時覆勘核實確估另行奏請聖訓辦理至於清口壩基厯年未能刨挖浄盡本係向來辦理不善所致厯任承辦之人實難辭咎乃䝉皇上不加嚴譴令将現擬刨挖舊壩基址之費即著落乾隆二十七年以後原辦之歴任總督及該管河道按年分賠更屬格外鴻慈查現擬刨挖舊壩基址細加核算所費不過二千餘兩在於歴任各院道名下按年分賠為數無多尚不足以示懲自應将乾隆二十七年起至四十一年現今止莭年拆撈壩工共費過銀一萬三千六百餘兩一併著落歴任各院道按年分賠以為添補将來築壩應用則咸知辦理不善之戒矣所有臣等欽奉諭㫖詳加籌度情形謹繕摺覆奏並另繪新圖貼説同原圖恭呈御覽奏入上諭曰覽奏俱悉届時更當妥為之乾隆四十一年十月初二日兩江總督髙晉河道總督薩載奏言竊臣等前因黄河海口上厪宸衷於本年五月内遵㫖公同籌議繪圖㑹摺覆奏縁海口無可施工惟治淮即以治黄請将清口以内之通湖引河於水消灘現時兩頭煞壩大加挑挖清口東西壩基址移下一百六十丈在於平成臺之處建築使清水源逺流長出口有力並請将清口黄河北岸陶荘迤上開挖引河一道使黄水繞北下注相距清口較逺清水益得暢出行至周家荘而後㑹黄東注俾二瀆並流合力攻沙以期海口刷深通順縁由欽奉硃批此奏皆合機宜形勢是治淮黄一大闗鍵届時妥為之欽此並䝉聖明逺照屢頒諭㫖令将引河一律挑挖寛深其引溜處尤宜寛展使正溜易於趨注河頭冄移向上於第二木龍對岸徑直開下似更便捷等因欽此兹查東西壩基址先因湖水消落即於八月初旬開工移建趕𦂳接做前已附摺奏聞至通湖引河此時湖水尚存九尺三寸俟将來灘現時細勘確估另行奏辦其陶荘以上引河此時黄水消落形勢已定臣等隨率同淮揚道松齡及副㕘逰等詳加相度恪遵皇上訓示確切估計引河共長一千零六十丈河頭估寛四十丈深一丈河身估寛三十五丈深一丈二尺五寸河尾估寛三十丈深一丈五尺連移紥木龍及估築挑水攔水等壩共需銀八萬五千六百餘兩該處引河分委裏河同知席萇外河同知汪田山陽縣知縣金幼淳署清河縣知縣姚一元四股承挑擇於九月十六日開工儧辦其築壩等工委令副将徐建功㕘将李永吉逰擊劉徳等辦理以専責成俟引河将次挑完動工儧做務期妥協如式以收實效奏入報聞乾隆四十一年十月二十一日河道總督薩載奏言竊照江南黄運湖河前届霜降水平工穏業經㑹摺奏聞兹查前月中旬以來黄水又加長一尺九寸徐城誌樁連前長至一丈一尺三寸豐碭南岸唐家灣引河尚未堵閉毛城舖過水三尺三寸邳州宿遷一帶運河因東省大泛口雨後發水滙歸下注又長水二三尺不等洪澤湖内上㳺正陽闗淮河於九月二十一日起至二十八日共長水六尺七寸下注洪湖髙堰誌樁亦陸續加長四寸連前長至九尺七寸各處工程臣又嚴飭道将㕔營加𦂳巡查防䕶勿以霜降已過稍有懈忽清口東西壩為全河最要闗鍵前因湖水消落三尺七寸臣即於奏明移建之處趕𦂳儧築東壩連壩基已築成三十六丈西壩連壩基已築成二十九丈口門尚寛二十一丈現在清水尚旺出口有力直抵至惠濟祠後彭家馬頭㑹黄東注臣察看情形目下東西壩工已令停辦俟将來再看水勢消落若何如應收束隨時相機接築另行奏聞其陶荘引河上厪宸衷前大學士督臣髙晉㑹同臣奏報銅沛㕔屬南岸韓工放淤平穏情形一摺奉到硃批好知道了此猶小喜若陶荘引河成而溜走北實大喜朕誠望之爾等於何時興工何時放溜也欽此臣跪讀之下實深謹凛並将諭㫖宣示工員莫不勇往奮勉前項引河自九月十六日開工以來實力儧挑已挑有二三分工程臣仍與道将等往來督催上𦂳趕辦務於冬底一律完工與大學士督臣髙晉㑹同驗看相機放溜慎重料理以期迅速成功上慰聖懐至各處水勢現在據報黄河内已消水一尺一寸運河内亦消水一尺三四寸上下各工均屬保䕶穏固回空漕船渡黄南下者已有二千八百餘隻遄行無滯奏入報聞欽定南巡盛典卷四十四
