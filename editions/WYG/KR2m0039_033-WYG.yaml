body:
  text: 欽定四庫全書欽定南廵盛典卷二十一天章甲辰江南詩金山寺六依皇祖詩韻六臨浮玊又春和弗少虞巡亦弗多敬遵度南皇祖亦六巡時邁治河遵舊制瞠乎莫及愧維何逰金山寺六疊蘇東坡韻岷峡濫觴詎本源其源更在剛底海自禹貢言岷山導江厥後桑經酈注及漢宋諸儒並云江出岷山皆囿扵内地見聞惟胡渭着禹貢錐指引明徐宏祖傳稱其平生好逺逰作溯江紀源萹萹以岷山導江特汎濫中國之始其發源則自昆崙之南其説寔得之目擊云按昆崙即今西藏所謂剛底斯又通典稱阿耨達或曰崑崙漢語都龍王也兹詢之西藏敏珠爾瑚圖克圖堪布桑齋鄂特則爾稱剛底始在西藏阿里克之西週圍有大海名瑪璩巴係四大部洲衆水之源難陀龍王所居等語難陀即通典所稱阿耨達也據此則江源在剛底斯由金沙江㑹入蜀江歴歴可據其源並不止出扵岷山義復何疑向賦四瀆詩亦曽詳志辨識之入中國此近東瀛湧出砥柱惟斯在妙足如現兠率陀徳水四繞無雄波鹿苑雁塔羅高下包山之屋由來多為憶坡翁維桂楫應是離朝往南日相於佛印一談禪不妨飲酒酡顔赤牢騷志記攄文魄江心炬火照深黒􅕍括蘓句深黒片時為朗明用遷意耳無湏驚盖用司馬遷屈原傳王明並受其福之意當面率失後始識蒸民有則亦有物終古鎮此氐父山介甫有權難笑頑青苖新法論不已祗今亦付東流水鏡治齋作歌昆明有閣曰治鏡此地有齋曰鏡治胥以俯澄而得名治鏡鏡治非二義鏡之於古誠未逮鏡之於今實増愧未逮増愧之不遑何可腆顔云治遂然而時存此愧心庻幾無大隕越致題文宗閣疊庚子詩韻庚子南巡閣已成香楠為架列函盛庚子南巡時金山文宗閣已成貯古今圖書集成全部鈔胥聊待數年閲數上聲典應看四庫呈先是辦理四庫全書分庋文淵文溯文源文津四閣嗣因辦有就緒可以指期蕆事於壬寅秋復降諭㫖發内帑催覔書手再繕全書三分安置江浙之文滙文宗文瀾三閣俾東南士子得就近觀摩且許鈔録以光文教書借一瓻寧酒器册蔵二酉富芸甍恵嘉南國崇文地尚朂尊聞知所行金山五疊舊作韻𤓰歩遥瞻曉岫青到時仙境悦神形甲辰六度巡斯蕆自辛未丁丑壬午乙酉庚子迄今甲辰敬遵皇祖六舉南巡之典庚子迴途佑藉靈庚子南巡二月駐蹕時勑加號金山靈區安瀾恒佑宏仁廣濟至徳尊神封有平風静浪歌回鑾復至金山登妙高臺詩有是日渡江迴風平浪不起之句往來順􅆘實邀神靈䕶佑昔去今來觀造化水流雲在孰遷停奎文贔屭重欽讀金山有是以皇祖御碑毎渡江駐蹕必先欽誦辛未詩有拱讀穹碑欽世聖孝法貽百慎聰聽之句萬古輝輝照紫冥萬千刼裏天接水一大圓中水上天昨嵗為雲上於天解為雲即水也音義家讀上為上聲因有雲氣上升於天之語是雲仍在天之下矣盖上字應作去聲讀為上下之上天為圓體元氣運之以行日夜一周而不息知地之在水上則可知天之在水下天無不包此至平至易之理不必求諸神竒也兹因駐蹕金山益恍然於水天相接之義於此自然能逺俗到斯誰不曰登仙抹塗已具十二首來往忽經卅四年自辛未初次南巡越今甲辰凡三十四年金山二首凡五疊舊作韻亦十二首矣閣筆合哉興猶勃還當坡韻重賡連太古堂太古堂前一株梅歩來滿院香風起斯之幾度致弗一或逢未開或謝萎今番所遇實正佳深白淡紅萬枝委和而不同具秀野冶以為韻非綺靡或有意博詩與畵古稀無暇且老矣於金山禮塔五疊登塔詩韻此畨塔頂未登尖年至古稀有四兼何必陟攀誇勝濟祗冝安靜飬心恬江山槩亦全供覧詩句篇原取次添一佛名該千億佛下層禮已悟花拈自金山放舟至焦山六疊蘓東坡韻弗肯深居九户耽載言于邁江之南翕河觀民法聖祖巡數去聲亦符兩其三曰耕候未逮浸種曰織時亦遲育蠶未妨民務民坌集歡欣瞻就憐以慙昨日金山駐巡楫今朝焦山問林潭大江中矗䨇玉柱千古永荅吟情酣順流一舟到頃刻調御黙座無言談三乗十二部包括莊嚴豈在琉璃龕而况左廂行館麗質之焦隠應非甘固知啇力非民力冀檀白足寧辭貪即景欲詠詠則恧促賡蘓韻歸棹堪香牋佳墨懋勤供書之粘壁留松庵清寄堂􅆊王宫左廂行館建昔嵗每來實未駐片時聊息憇松栢既蒼舊庭徑致深䆳乃知天然佳夫何勞㸃綴言忘塵益逺神謐清自致五字泐書堂萬古於斯寄竹樓迤東歩歩入琳瑯拾級登樓聊騁望我有憂民心不了豈能髙志學黄岡海門菴海門東望接扶桑不擬求仙路渺茫此地古今無别慮一心遥繾浙江塘遊焦山作歌四疊舊作韻採薪汲水僧兩三用東坡語爾時有山未有屋世忠韓世傑張屯其軍見宋史亦以邀敵伏山腹南渡稱姪過於兄金源原是揚靈聲至今都付東流水何足甲此而乙彼孫吴曹魏更小㢤如彼交蘆遞眠起即境詠古則且置放舟問景亦莅止梵寺行館胥熟路山色江聲故如是昔来辛未今甲辰自辛未至今甲辰凡茲六度巡蹕勤卅四年間事已夥静觀底是紛而紜古鼎歌焦山寺中古鼎相傳為周時器辛未南巡曽和沈徳􅇓韻作焦山古鼎歌又山麓瘞鶴銘原刻文多剥蝕丁丑南巡曾手書一通勒石瘞鶴文何殊流水與行雲青玊塢尚青林氲塢出幽僻曲逕分民居僧舎互吐呑焦山之逰止於此泐石翠巖以待千載逰客聞其聞甘露寺三用張祜韻枕嶺有髙寺過江無㸃埃陡思庚子别復此甲辰来佛鳥窺經冊天花落講臺清詩讀承吉心地一時開䇿馬􅂈鎮江府古稀露冕尚鳴鞭為洽民情瞻比肩大有義焉非恵小後斯樂矣本憂先因他愛似勝於畏致我觀之益切憐天塹長江南北界一家今可此言捐登城霞閣四疊舊作韻傍岸駐舟蹕層樓近水衢曰逰因舊蹟其建匪新劬城霞閣在丹陽縣上有董其昌題額盖明季所建矣景概宜詩句山川入畫圖天晴遥見海民俗已為呉鳬藻来老㓜鴿歡任笑呼副予懐保意施恵法春蘓古實兩孫邑謂孫䇿孫權今為異姓衢俗又名三義閣中祀漢昭烈帝左右祀闗帝及張桓侯有譽三代直足荅㡬年劬蜀據懐逺略魏征韞永圖奈天不祚漢惜地盡歸呉爼豆依然列精神若可呼歴賡六十韻是詩五言六韻二首四疊舊作則六十韻矣别舫指姑蘓夜雨三月初三日上巳無湏脩稧為恵風河露畫圖披蒸看過午一川暖釀作濃雨四野垂入夜連纎欹枕聴間去聲時作止打舲遲江鄉雨弗雨胥可北省遥祈渥澤滋江浙䓁省新春雪澤霑足此時雨弗雨皆可惟山東河南及直𨽻迤南各府現盻雨澤晚来北望雲氣甚濃惟冀甘霖普渥耳逰寄暢園三疊丁丑舊作韻那能此地目飛鴻境古而幽與理通山色泉聲清賞外昔年今日黙思中問他王紱顧愷之畫曾擅便是杜鎬倪瓉句豈工促就詩休論巧拙右廂去禮梵王宫恵山寺五疊舊作韻梁溪開舫見遥螺稍近叢雲梵宇羅寄暢園尋幽徑暫恵山寺入繚垣多禪林不礙獅音唱古稀依然鳳尾娑五疊韻成詩六度止斯適可厭過那圓池圓池圓象天泉源清冷然豈必拘上下易象稱為編謂乾上坤下方池方池方象地折旋産玊粹九龍昔在兹樂饑俯洋泌過無錫縣得句九龍騁暢觀梁溪順水下清瀾徘徊因命蹔維舫矍鑠依然遂據鞍踵接肩摩真是庶衣豐食足為思難古稀天子猶乗馬老㓜就曕益忭歡至蘓州䇿馬入城據鞍得句庚子南巡正七旬今来有四度芳春維舟䇿馬仍康健露冕觀民一切親俾畏如何斯俾愛忘懐那肯便忘仁黄衣問嵗八十六一老民著黄衣命侍衛賜銀牌問其嵗曰八十六嵗矣似汝嵗方歸政辰凝懐堂四疊舊作韻明璫司織造三處貢龍衣革矣兹供職明季以内監司織造擅作威福擾累滋弊不可勝言我朝則江寕蘓州杭州織造雖仍明朝舊制而弗用宦寺惟以内務府司員簡用其職止司税及供尚衣御用與各項賞賚縀疋之事一切地方事務概不許與聞也殊乎彼擅機官衙作行館體憇騐心微五字留别什千年依徳輝六度南巡之事既蕆亦不冄擬命駕矣逰獅子林三疊舊作韻粉本石渠藏手蹟倪瓚舊有獅子林圖已入石渠寳笈曾倣其筆意重摹一本弆藏吴中冩雖應手運因心眞山古樹有如此勝日芳春可弗尋然豈耽哉斯灑灑所堪嘉者彼林林出逰圖便民瞻就寧為夾途絲管音題虎邱雲巖寺一卷平地起林閭遺蹟難尋呉越書劍氣金精乆寂寂禪枝慧草祗如如休稱應接眞無暇可識虚空自有餘調御丈夫巍相去聲好去来今合掌相於静觀齋静觀齋額耀奎文訓及千秋聖意殷歌舞叢中其莫繫饑寒念裏要於勤含暉山館寺側接山館遊餘小憇便含暉復今日題句憶前年駒隙一何速蜂臺本不遷試看無住住大士坐如然虎邱寺六疊蘓東坡韻蘓城建平地本自少山嶺一卷矗武邱作鎮俯閭井我来凡六度六疊蘓韻耿頗惬水與乳詎論鼃和黽故事徴率遍金總不離礦茲覧五人墓實足嘉義猛魏璫擅焬竈其志無窮騁緹騎為家奴順昌氣頺哽五人攘雄臂奪取以俄頃終焉飲屬鏤頸血灑風冷身縱一時亡名乃千秋永静言觀其時國政成何景羣小恣意為捕風更捉影天啟真童騃楊漣徒奏請逰支硎山三疊丁丑舊作韻増山趣固以山泉勝數上聲支硎亦有年落瀑響宣梵宗偈平池照徹鏡光禪拈花提冺全和半食宻甜同中與邉喚起上人擬一問適來七字否乎然支公菴山光樹色無今古流水行雲有送迎馬去鶴飛消息絶巖菴猶紀遁公名題寒山别墅宦光當日傳名别墅水秀山清充隠雖非皇甫樂饑殊異淵明緑雲樓山樹及田麥均堪稱緑雲樹惟供攬結麥實係耕耘一因時所發一因力之勤收用亦自異資食麥娯觀樹分登樓聘目間髙下殊品云飛魚峡四疊舊作韻飛魚長一尺即似翼生然息便􅅗深水奮能躍上上聲天人稱有縮地物亦可登仙寄語傳竒者慎哉紀實賢戲題馳烟驛馳烟驛本寓幽人隠亦當徴其假真呉下富翁樂山水宦光曾此㑹嘉賔按朱彛尊明詩綜稱趙宦光字凡夫呉人饒扵財卜築城西寒山之麓淘洗泥沙俾山骨畢露髙下泉流凡逰扵吳者靡不造廬談讌廣為樂方云云宦光託名隠逸而梯巖架壑搆築精雅甚且倚其貲財廣結交逰因以欺世盗名豈可與陶潛司馬承楨之流同日語哉對瀑四疊前韻於此悟道源石皮泉則髄復笑渉多言水那以水洗寒山千尺雪五疊舊作韻吳中多水少者山山已佳復加有泉是謂合撰乗最上乗最上者真之源即今我来凡六度無不長言其妙詮然而其妙豈昜盡永為萬古逰人縁宦光别業固好在屏以秀嶂帯以淵嫌淵自淵嶂自嶂聨為一氣瀑落巒妙斯盡矣觀宜止欲冺尺宅與寸田長韻五疊東坡效笑東坡逰此未然題罷擲筆聼泐壁付他蘿曼苔侵間聴雪閣五疊舊作韻雪花落自天安能至澗底聴雪閣之雪直透不窮耳名雪勝實雪似較一籌羙所以世間人求名無底止那顧其實非徒騖其名喜溪閣一静觀格物致知始然不出煩言㸃筆亦冝已法螺寺法螺致幽閴徑路亦䆡窱其傍精舎添乃自宏謀造法螺寺在寒山向年舊有梵宇壬午年陳宏謨為江蘓巡撫復扵其傍増置精舍有今来殊所觀亦頗事㸃綴鳩工非庶民施檀云大吏之句殊弗以為韙成事不説告此後每頻来頗堪暢吟眺菴中坐調御拈花亦微笑却匪示别傳似笑莊嚴閙逰髙義園名園弗一足髙義獨稱薌豈不因行去聲懿寧惟擅景芳座陪梅馥細隄拂桞􅁝長春色已如許農工厪悮忙駐驆􅂕巖五疊舊作韻虎阜華山此據中行齋乆慙去聲禹卑宫到来左側花龕謁施轉右廂松逕通映座太湖一片碧繞階雜卉㡬叢紅何當望夕斯来憇是日始三月朔日滿月先瞻湧海東臨湖榭􅆍閣西邉更近南廓然虗榭搆盈三到来必此片時坐心與太湖一片涵水天上下澄無盡心目空明静有存今古寧湏徴故事忘懐那更説㤀言穹窿山上真觀再疊乙酉韻道書撰述真不真敬天瞻拜宜躬親髙居絳節吟昔日謂杜甫重到玊臺謁此辰求福豈縁為一已祈年祗以利萬民扈蹕大小隨疆吏思艱遂用諮臣隣鄧尉山恭依皇祖松風水月四疊舊作韻四字貽宸藻五言首咏松每教神㑹别那避句儓重友處香非逺映来翠更濃陶家樓上者此景可存胷右松李諤薄時態惟稱雲與風看吹香雪白似勝軟塵紅一缶户為隔㡬枝春自融錦嚢未拈得空説鑿崆峒李賀惱公詩有今日鑿崆峒之句右風韻冝滃濛風影定横斜水詩傳林氏仙賦薄曹家子謂洛神賦品固超草木神自通表裏弗言梅概梅敬識愛梅㫖右水青邱擬羙人謂是特輕月静對香水溪那􅃹曾来越得句鄙玉肌引興惟氷骨擲筆尋廻途此後吟應歇右月鄧尉香雪海歌五疊舊作韻婆娑遊興不淺吾歡新未可忘其初庚子西蹟經綴景云鄰鄧尉言近誣庚子南巡時前江蘓巡撫楊魁奏進西蹟山程園圖云在鄧尉西北山蹊􅆼曲泉石殊勝且南去太湖不百歩可供眺覧等語彼時即覺其踵事增華而成事不説若不一至未免孤其誠懇因往返九十餘里中途䟦馬比還行舘時已過午轉以時刻匆遽未獲細領香雪海之勝随諭該撫将程園給還原主有園應還故主吾弗更去矣之句是日往返九十里弗輿而馬鞭䄂舒翻嫌忽遽捨此去未曾細領香雪模明諭其園歸舊主一臨不再行鑾紆茲来乃得畢勝槩得門而入原熟途化人寺裏瞻相好減從底用七萃趋石側精舎甚幽絶適可片刻憇㡬餘筆墨精良妙五合一缶恰在供吟娯遥看萬雪堆銀湖近領鼻觀叅清殊若逺若近豈有别曰色曰香任彼輸昨為文解雲上需昨嵗作雲上扵天觧以上字應作去聲讀是坎在上而天在下也盖天為圓體元氣運之以行日夜一周而不息知地之在水上則可知天之在水下其在水下之時非坎上乾下之需乎知天有在水下之時則若地若雷若風火山澤均有在天上之時此八卦本然之象包含萬里一以貫之然則香雪海之在地上亦大圓鏡中一自然之象矣包含萬里何親踈眼見雪海㑹一貫好竒豈我論剏孤速成長歌命蹕返記予六度来臨呉或擬獲麟亦可夫上方山楞伽寺寺據上方山楞加額乆顔登来極頂表逰趁一朝間誰觧三乘義難叅八見還太湖萬頃碧祗在俯臨間石湖八絶句三疊王􅃂題周臣畫箑頭韻橋過行春春可憐許公麗句宛如前韶光有脚紅匝地湖水無邉碧接天山半石湖滀下流微風拂處亦瀾浮却嫌前後屋圍䕶未肯飄然下野鷗㡬朶桃花照水開那論千瓣與重臺間吟七字相㸔處真是不孤此往廻石湖號以石湖成叅政誠看富貴輕㡬百年猶薌姓氏江山却亦未孤情保障由来勝繭絲訓官此義不䡖移夹輿試看黔黎意總是懐中女與兒海潮菴後石崖强崖頂佛宫宛若翔生面别開周氏畫不從倪范問津梁曾倣東邨畫箑歸周臣􅃅東邨畫箑有王􅃂題八絶句弆存石湖行館乙酉庚子及今甲辰毎至必展閲凡三疊韻向曾倣其畫意以歸今置圓明園之池上居每當展閲興軒飛在前真者兹親炙未免遜他具體微雅宜八首詠烟花書法那論泥與沙張旭云用筆如印泥畫沙貴藏鋒也王􅃂書得鍾王法故云窄韻促成以拙速偶然借用紀年華謁孔子廟甫經廟貌拜闕里復此宫墻謁古蘇堯舜心傳真接彼君師責重並殷吾遷隅文正范蹟可考作記常宗王事不誣道塞乾坤神宇宙底湏南面論區區末句反王彛記意按明徴士王彛字常宗嘉定人作蘓州府孔子廟南門記大指以孔子之道使萬世帝王因之而不革廟貌當擬王者舊廟畫扵鄰垣􅈳而之東弗稱南面向明之義自宋范仲淹遷于錢氏南園之㢲隅後復屢加展拓至明洪武問始自櫺星門極于南城之隂表文廟之道于洗馬池南又謂此一區為孔子南面之地范公所未得為者云云其所稱孔子道在萬世是矣而區區較量門􅈳以南面為尊崇則猶未免拘墟之見耳過紫陽書院口號院長應延學行醇徳􅅗竟以假亂真於予改是宣尼語昔實失之未識人書院掌教必湏學行醇粹方足為多士師表向年沈徳􅇓為紫陽書院山長雖工于詩文而品行實卑後因為徐述夔作詩序允廷臣議削奪爵謚是以庚子過紫陽書院有知人信難㢤於予改是懼之句逰滄浪亭滄浪亭是延賔所㸃綴湖山其水清大法小亷應視此憇扵此者合循名南方南方苦雨多恒弗苦雨少今嵗過江来逾旬逢日皛問稱正二月渥膏霑已早江浙正二月間􅔜督撫等屡次奏報雨雪霑足茲畺吏来覲詢以農田情形據奏春膏早渥目下並未缺雨麥苖實芄芄亞隴青而好設使冄潤根餅餌可期飽觧之者於傍慰我意誠巧霽景凑逰山此語見何小况我繾北省希霈徒乆禱直𨽻山東河南春雨未能霑透屡經降旨馳詢該督撫並令䖍誠祈禱邇日雲毎作閣雨旋晴了南猶覺似難北甚惄如𢷬玊蘭臺在蘓州行宫内靈巖兩日問山迴曰白辛夷花尚開紫者為辛夷白者為玉蘭本一種也以玊蘭接枝於夷辛則開白花否則開紫花然未見以玉蘭接枝于玉蘭者亦其明騐向屡於詠玉蘭詩詳考之冇原是辛夷種接植之句昨日虎邱識為最虎邱山隂王蘭一株本髙數丈枝葉茂盛花開甚繁茲因玉磬得其陪文徴明所居有玉蘭堂茲蘓州行宫所植玉蘭於春巡時盛開因即以此名之文家堂下想荒矣行館階前正菀哉即境無端一數典恐他璧老笑重儓夜雨三月十一日夜雨打船牕恰值清夣醒入耳適宜聴披衾不覺冷即南已増潤憶北牽懐永時北省正望雨之際未知此澤遍及否湏臾聲漸稀無眠以耿耿欽定南巡盛典卷二十一
