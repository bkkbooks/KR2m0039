body:
  text: 乾隆十六年二月初八日大學士公傅恆奏言臣欽奉諭旨今日查得預備河工打樁下掃官兵遊擊一員守備四員兵五百名夫三百名應賞伊等之處酌量議得遊擊賞奬武金牌一靣官縀一匹守備四員每員賞奬武銀牌三靣兵五百名每名賞奬武銀牌各一靣夫三百名每名賞三錢銀錁各一錠此內落水守備鄭一舉兵三名酌量加賞守備官縀一匹兵加賞奬武銀牌各一靣恭候命下之日所有應賞奬武金銀牌銀錁官縀由廣儲司支領賞給外其守備鄭一舉奉旨記名之處交與兵部謹奏奏入上諭曰遊擊朱一智著再加賞奬武金牌一靣亦著交兵部記名鄭一舉著賞整聫大縀一匹再加賞奬武銀牌一靣其墜河兵丁三名亦著加賞奬武銀牌一靣餘依議乾隆十六年二月十五日傅恆等奏言乾隆十六年二月初七日奉上諭此次隨朕南巡人等雖俱賞有幫貼路費俸祿錢糧官馬但內地行走與口外不同其一應物價不無昻貴勢必稍需餘費著總理行營事務大臣將此次隨來大臣侍衛官員執事人兵丁及存住順河集人等作何加恩賞賜之處分别定議具奏所賞銀兩於兩淮鹽政存貯公項銀內動用欽此臣等伏思隨駕巡方乃臣等分內之事起程以前即加恩賞給幫貼路費官馬錢糧途間甚屬寬裕今皇上復念內地行走與口外不同惟恐稍有不足令臣等議賞隨從大臣官兵之諭旨體恤周詳無微不至查得前次遵旨除賞親王一千兩郡王八百兩貝勒六百兩宗室公二百兩外一品以下三品以上文武大臣賞給本職正俸半年四品以下堂官侍衛等各賞給四十兩五品以下堂官內府護軍統領前鋒章京侍衛護軍恭領等官各賞銀三十兩六品以上文員及內府恭領雲騎校步軍恭領步軍校管拉駝兵丁章京等各賞銀二十兩七品以下中書等員批本處行走之監生巡捕三營守偹俱各賞銀十五兩護軍校驍騎校巡捕三營千總把總庫使等各賞銀六兩前鋒親軍護軍等各賞銀五兩領催各賞銀四兩食錢糧執事人等各賞銀四兩食二兩三兩錢糧執事披甲校尉人等各賞銀三兩其餘各項匠役等俱各賞銀二兩總管太監等各賞銀二十兩首領太監有頂太監等賞銀十五兩太監等各賞銀四兩臣等擬將此次應賞隨從及存住順河集等處人等分别酌議現在隨從一品以下三品以上文武大臣仍照從前賞給半年本職正俸額駙色布騰巴爾珠爾貝子扎拉豐阿俱兼都統亦應照一品大臣賞給四品堂官侍衛鑾儀衛章京等各賞銀四十兩五品堂官監察御史內府護軍統領前鋒章京侍衛護軍參領等各賞銀三十兩六品以上文員粘杆處行走間散官員內府恭領步軍恭領步軍校等各賞銀二十兩七品以下文員批本處行走監生巡捕三營守偹等各賞銀十五兩前鋒親軍護軍校驍騎校巡捕三營千總把總庫使等各賞銀六兩前鋒及親軍護軍各賞銀五兩領催各賞銀四兩食錢糧頭目執事人等各賞銀四兩食二兩三兩錢糧頭目執事拜唐阿天文生聽差人披甲校尉人等各賞銀三兩各項匠役番役厨役步軍領催兵丁緑旗兵水手網户人等各賞銀二兩總管太監各賞銀二十兩首領太監有頂太監各賞銀十五兩太監等各賞銀四兩存住順河集等處大臣侍衛官員護軍執事各項人等俱於隨駕行走人等賞給之數減半賞給共應賞銀約四萬餘兩俟命下之日各該處造具清册交於兩淮鹽政會同行在户部照數賞給可也奏入上諭曰傳恆賞銀六百兩扎拉豐阿色布騰巴爾珠爾各賞銀四百兩汪扎爾哈逹哈舒赫德班第努三汪由敦各賞俸一年存住順河集人等亦照隨來人等賞給正分餘依議乾隆十六年二月二十一日傅恆奏言查現今隨營行走駐防滿洲官兵內江寧協領二員佐領二員騎都尉一員防尉二員驍騎校五員兵二百名杭州協領一員恭領一員佐領一員防尉一員驍騎校四員兵二百名乍浦佐領一員兵二十名伊等俱在護軍營內坐堆當差再署理將軍事務黃廷桂帶來京口兵二百名內除先行發回一百外其餘協領一員防尉六員驍騎校二員兵一百名現在隨營管理布城當差再查得自清江浦起至杭州拱宸橋止沿途共二十九臺坐臺京口協領一員恭領一員防尉六員驍騎校五員兵一百五名江寧協領二員佐領二員防尉五員驍騎校四員兵一百五名杭州協領一員佐領二員防尉二員驍騎校四員兵八十名伊等俱各奮勉當差亦應加恩分别賞給臣等酌議現在隨營當差協領恭領等賞縀各四匹佐領騎都尉防尉賞縀各三匹驍騎校兵丁各賞一月半錢糧沿途坐臺及隨黃廷桂當差協領參領等賞縀各三匹防尉以上官員賞縀各二匹驍騎校兵丁各賞一月錢糧共應賞縀一百十六匹銀三千四百二十兩有零俟命下之日縀匹於廣儲司支領賞給外銀兩於鹽政庫內存公銀兩動用賞給奏入報聞乾隆十六年四月十三日山東巡撫凖泰奏言欽惟我皇上省方問俗覃敷至治凡所以教孝表忠以樹風聲者無不仰蒙聖恩闡發幽光以昭聖化兹臣伏查山東之沂州府舊為琅琊郡地嗣號臨沂本朝因之曰沂州府升為郡考之通志該地為漢臣諸葛亮及晉臣王祥王覽唐臣顔杲卿顔真卿故里是以城內舊有賢良祠為合祀亮與祥覽及杲卿真卿等五臣之所又忠孝祠専祀亮祥於內今各祠宇雖皆年久堙圯而志乘載之里民思之並有諸葛城孝感河諸遺迹存焉臣查此五臣者如諸葛亮之鞠躬盡瘁殫忠漢室偉業豐功史册炳然至如王祥之純孝格天王覽之孝友感母洵皆至性出於醇篤非僅為一代名臣已也若夫顔杲卿顔真卿之節烈萃於一門孤忠標於千古尤為正氣凛然是亮等不獨學術事功彪炳載籍且其忠孝友悌實為千古人倫坊表今事逺年湮各迹雖沉榛莾然里民之懷想芳徽猶昭昭可考兹當我皇上翠華巡狩聿修慶典可否仰懇天恩將此五臣或賜匾額或賜詩章一經聖主褒嘉則五臣之忠孝亮節既得上隨奎藻天章永垂不朽而聖主表忠教孝之化益更光昭萬䙫矣奏入報可乾隆二十二年二月二十三日大學士傅恆等奏言查十六年隨駕前來南省之大臣官員一品以下三品以上文武大臣等賞給正俸半年四品堂官侍衛鑾儀衛章京等每人賞銀四十兩五品堂官御史內府護軍統領前鋒參領前鋒侍衛護軍恭領等每人賞銀三十兩六品以上文職官員粘杆處行走之世襲官內府參領步軍協尉步軍尉等每人賞銀二十兩七品以下文職官員及巡捕營守偹等官每人賞銀十五兩前鋒校親軍校戴翎頭目驍騎校巡捕營千總把總庫使庫上人每人賞銀六兩前鋒親軍護軍等每人賞銀五兩領催以及食四兩錢糧頭目拜唐阿等每人賞銀四兩食二兩三兩錢糧頭目拜唐阿書吏承差披甲校尉等俱每人賞銀三兩各項匠役捕役厨役步軍領催及步甲緑營兵水手網户等每人賞銀二兩總管太監等每人賞銀二十兩首領太監有頂帶太監等每人賞銀十五兩太監等每人賞銀四兩存住順河集大臣侍衛官員護軍拜唐阿各項人等亦照隨從人等之例賞給正分此次隨駕前來之大臣侍衛官員拜唐阿兵丁太監及存住王家營人等俱照十六年賞給之例賞給再宗室公如松等四人俱照伊等現在職任賞給簡親王額駙德勒克公扎拉豐阿如何賞給及除將軍新柱上次特恩賞給此次亦照從前賞給之處恭候欽定欽遵賞給外交與各該處將應得賞銀大臣官員各項拜唐阿兵丁匠役人等職名并內監等數目造册行文行在户部於兩淮鹽政庫存銀兩動支賞給奏入上諭曰簡親王著賞銀三百兩德勒克扎拉豐阿著賞銀二百兩餘依議乾隆二十七年二月二十四日總理行營王大臣和碩莊親王允祿等奏言乾隆二十七年二月二十一日奉旨此次跟隨人等雖俱加恩賞賚但內地行走與邉外不同所用之項皆須少增著交總理行營王大臣等將此次跟隨各項人等並留王家營各項人等如何加恩賞給之處分别定議具奏其所賞銀兩在兩淮鹽政庫貯公項內動用欽此伏思隨駕巡幸皆臣等分內之事未經起程已蒙皇上加恩賞賚今又以內地行走不無多費降旨議賞誠體恤臣等深恩查乾隆十六年皇上臨幸江南時一品以下三品以上文武大臣等賞半年正俸四品堂官侍衛鑾儀衛章京等各賞銀四十兩五品堂官御史內府護軍恭領前鋒參領侍衛護軍參領等各賞銀三十兩六品以上文員粘杆處行走世襲官員內府恭領步軍尉步軍章京各賞銀二十兩七品以下文員巡捕營守偹等各賞銀十五兩前鋒校親軍校藍翎校驍騎校巡捕營千總把總庫使庫官各賞銀六兩前鋒親軍等各賞銀五兩領催食四兩錢糧之頭目拜唐阿等各賞銀四兩食三兩二兩錢糧之頭目拜唐阿書吏聽使馬甲校尉等各賞銀三兩各匠役捕役厨役步軍領催步軍緑旗兵丁水手網户各賞銀二兩總管太監各賞銀二十兩首領太監有頂帶太監等各賞銀十五兩太監等各賞銀四兩留住順河集大臣官員及各項人等減半賞給具奏奉旨傅恆著賞銀六百兩色布騰巴爾珠爾扎拉豐阿著賞銀四百兩汪扎爾哈達哈舒赫德班第努三汪由敦著各賞一年俸留住順河集人等亦照跟隨人等著全分賞給餘依議欽此二十二年皇上臨幸江南將跟隨人等賞給之處遵旨議奏時惟照十六年議賞具奏奉旨簡親王著賞銀三百兩德勒克扎拉豐阿各賞銀二百兩其餘各項人等俱照上屆賞給欽此此次莊親王額駙色布騰巴爾珠爾等如何賞給之處伏候欽定外其餘大臣官員各項人等留住王家營人等仍照上屆賞給候降諭旨由各該處造具清册交兩淮鹽政會同行在户部照數賞給奏入上諭曰莊親王著賞銀五百兩簡親王額駙色布騰巴爾珠爾傅恆著各賞銀四百兩扎拉豐阿兆惠阿里袞富德著各賞銀三百兩劉統勳汪扎爾努三福隆阿劉綸于敏中著賞給一年正俸留住王家營人等減半賞給餘依議賞給又諭曰著加恩和濟思博克賞銀一百兩額色音圗爾都各賞銀八十兩瑪穆特謨咱帕爾各賞銀六十兩乾隆二十七年四月初一日大學士公傳恆奏言據糧道胡文伯查稱護軍統領慶泰乘座三號沙飛船一隻船户楊繼聖於三月二十九日在江中失風碰損並未傷人查二月初十日寶應地方因風傷損船隻查明分别賞恤內三號沙飛傷次重者得恩賞銀三十五兩今船户楊繼聖碰損之船遵旨加賞一倍應賞銀七十兩俟命下交與督臣尹繼善即委妥員眼同賞給奏入上諭曰著賞銀一百兩乾隆二十七年四月初三日兩江總督尹繼善江蘇巡撫愛必逹奏言臣等查接駕老民金旭陽係蘇州府吳縣人現年一百零一嵗例應具題該縣尚未具報今恭迎聖駕欽奉恩旨令即行辦理應請照例賞銀三十兩給與升平人瑞四字聽本家自行建坊以昭旌揚盛典再查向例具題覆準奉旨加恩賞銀十兩縀一匹今奉諭旨賞給縀二匹應仍加賞銀十兩理合奏明奏入報聞欽定南巡盛典卷七十一
