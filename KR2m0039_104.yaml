body:
  text: 乾隆十六年二月初八日大學士公傅恒奏言臣欽奉諭㫖今日查得預備河工打樁下埽官兵遊撃一員守備四員兵五百名夫三百名應賞伊等之處酌量議得遊撃賞奨武金牌一靣官縀一疋守備四員每員賞奨武銀牌三靣兵五百名每名賞奨武銀牌各一靣夫三百名每名賞三錢銀錁各一錠此内落水守備鄭一舉兵三名酌量加賞守備官縀一疋兵加賞奨武銀牌各一靣恭候命下之日所有應賞奨武金銀牌銀錁官縀由廣儲司支領賞給外其守備鄭一舉奉㫖記名之處交與兵部謹奏奏入上諭曰遊撃朱一智著再加賞奨武金牌一靣亦著交兵部記名鄭一舉著賞整聫大縀一疋再加賞奨武銀牌一靣其墜河兵丁三名亦著加賞奨武銀牌一靣餘依議乾隆十六年二月十五日傅恒等奏言乾隆十六年二月初七日奉上諭此次隨朕南巡人等雖俱賞有帮貼路費俸禄錢糧官馬但内地行走與口外不同其一應物價不無昻貴勢必稍需餘費著總理行營事務大臣将此次隨來大臣侍衞官員執事人兵丁及存住順河集人等作何加㤙賞賜之處分别定議具奏所賞銀兩於兩淮鹽政存貯公項銀内動用欽此臣等伏思隨駕巡方乃臣等分内之事起程以前即加㤙賞給帮貼路費官馬錢糧途間甚屬寛裕今皇上復念内地行走與口外不同惟恐稍有不足令臣等議賞隨從大臣官兵之諭㫖體恤周詳無㣲不至查得前次遵㫖除賞親王一千兩郡王八百両貝勒六百両宗室公二百両外一品以下三品以上文武大臣賞給本職正俸半年四品以下堂官侍衛等各賞給四十兩五品以下堂官内府䕶軍統領前鋒章京侍衛䕶軍恭領等官各賞銀三十兩六品以上文員及内府恭領雲騎校歩軍恭領歩軍校管拉駝兵丁章京等各賞銀二十両七品以下中書等員批本處行走之監生巡捕三營守偹俱各賞銀十五両䕶軍校驍騎校巡捕三營千總把總庫使等各賞銀六両前鋒親軍䕶軍等各賞銀五両領催各賞銀四両食錢粮執事人等各賞銀四両食二両三両錢粮執事披甲校尉人等各賞銀三両其餘各項匠役等俱各賞銀二両總管太監等各賞銀二十両首領太監有頂太監等賞銀十五両太監等各賞銀四両臣等擬将此次應賞隨從及存住順河集等處人等分别酌議現在隨從一品以下三品以上文武大臣仍照從前賞給半年本職正俸額駙色布騰巴爾珠爾貝子扎拉豐阿俱兼都統亦應照一品大臣賞給四品堂官侍衛鑾儀衞章京等各賞銀四十両五品堂官監察御史内府䕶軍統領前鋒章京侍衛䕶軍㕘領等各賞銀三十両六品以上文員粘杆處行走閑散官員内府恭領歩軍恭領步軍校等各賞銀二十両七品以下文員批本處行走監生巡捕三營守偹等各賞銀十五両前鋒親軍䕶軍校驍騎校巡捕三營千總把總庫使等各賞銀六両前鋒及親軍䕶軍各賞銀五両領催各賞銀四両食錢粮頭目執事人等各賞銀四両食二両三両錢粮頭目執事拜唐阿天文生聴差人披甲校尉人等各賞銀三両各項匠役番役厨役步軍領催兵丁綠旂兵水手網户人等各賞銀二両總管太監各賞銀二十兩首領太監有頂太監各賞銀十五両太監等各賞銀四両存住順河集等處大臣侍衛官員䕶軍執事各項人等俱於隨駕行走人等賞給之数减半賞給共應賞銀約四萬餘両俟命下之日各該處造具清冊交於両淮鹽政㑹同行在户部照数賞給可也奏入上諭曰𫝊恒賞銀六百両扎拉豐阿色布騰巴爾珠爾各賞銀四百両汪扎爾哈逹哈舒赫徳班第努三汪由敦各賞俸一年存住順河集人等亦照隨來人等賞給正分餘依議乾隆十六年二月二十一日傅恒奏言查現今隨營行走駐防滿洲官兵内江寕協領二員佐領二員騎都尉一員防尉二員驍騎校五員兵二百名杭州協領一員恭領一員佐領一員防尉一員驍騎校四員兵二百名乍浦佐領一員兵二十名伊等俱在䕶軍營内坐堆當差再署理将軍事務黄廷桂帯來京口兵二百名内除先行發回一百外其餘協領一員防尉六員驍騎校二員兵一百名現在隨營管理布城當差再查得自清江浦起至杭州拱宸橋止沿途共二十九䑓坐䑓京口協領一員恭領一員防尉六員驍騎校五員兵一百五名江寕協領二員佐領二員防尉五員驍騎校四員兵一百五名杭州協領一員佐領二員防尉二員驍騎校四員兵八十名伊等俱各奮勉當差亦應加㤙分别賞給臣等酌議現在隨營當差協領恭領等賞縀各四疋佐領騎都尉防尉賞縀各三疋驍騎校兵丁各賞一月半錢粮沿途坐䑓及隨黄廷桂當差協領叅領等賞縀各三疋防尉以上官員賞縀各二疋驍騎校兵丁各賞一月錢粮共應賞縀一百十六疋銀三千四百二十両有零俟命下之日縀疋於廣儲司支領賞給外銀両於鹽政庫内存公銀両動用賞給奏入報聞乾隆十六年四月十三日山東廵撫凖㤗奏言欽惟我皇上省方問俗覃敷至治凡所以教孝表忠以樹風聲者無不仰䝉聖㤙闡發幽光以昭聖化兹臣伏查山東之沂州府舊為瑯琊郡地嗣號臨沂本朝因之曰沂州府陞為郡考之通志該地為漢臣諸葛亮及晋臣王祥王覧唐臣顔杲卿顔真卿故里是以城内舊有賢良祠為合祀亮與祥覧及杲卿真卿等五臣之所又忠孝祠専祀亮祥於内今各祠宇雖皆年乆堙圯而志乘載之里民思之並有諸葛城孝感河諸遺跡存焉臣查此五臣者如諸葛亮之鞠躬盡瘁殫忠漢室偉業豐功史冊炳然至如王祥之純孝格天王覧之孝友感母洵皆至性出於醇篤非僅為一代名臣已也若夫顔杲卿顔真卿之節烈萃於一門孤忠標於千古尤為正氣凛然是亮等不獨學術事功彪炳載籍且其忠孝友悌實為千古人倫坊表今事逺年湮各蹟雖沉榛莾然里民之懐想芳徽猶昭昭可考兹當我皇上翠華巡狩聿修慶典可否仰懇天㤙将此五臣或賜匾額或賜詩章一經聖主褒嘉則五臣之忠孝亮節既得上隨奎藻天章永垂不朽而聖主表忠教孝之化益更光昭萬䙫矣奏入報可乾隆二十二年二月二十三日大學士傅恒等奏言查十六年隨駕前來南省之大臣官員一品以下三品以上文武大臣等賞給正俸半年四品堂官侍衛鑾儀衛章京等每人賞銀四十兩五品堂官御史内府䕶軍統領前鋒叅領前鋒侍衛䕶軍恭領等每人賞銀三十両六品以上文職官員粘杆處行走之世襲官内府叅領步軍協尉步軍尉等每人賞銀二十両七品以下文職官員及廵捕營守偹等官毎人賞銀十五両前鋒校親軍校戴翎頭目驍騎校巡捕營千總把總庫使庫上人每人賞銀六両前鋒親軍䕶軍等每人賞銀五両領催以及食四両錢糧頭目拜唐阿等每人賞銀四両食二両三両錢粮頭目拜唐阿書吏承差披甲校尉等俱每人賞銀三両各項匠役捕役厨役步軍領催及歩甲緑營兵水手網户等每人賞銀二両總管太監等每人賞銀二十両首領太監有頂帯太監等每人賞銀十五両太監等每人賞銀四両存住順河集大臣侍衛官員䕶軍拜唐阿各項人等亦照隨從人等之例賞給正分此次隨駕前來之大臣侍衛官員拜唐阿兵丁太監及存住王家營人等俱照十六年賞給之例賞給再宗室公如松等四人俱照伊等現在職任賞給簡親王額駙徳勒克公扎拉豐阿如何賞給及除将軍新柱上次特㤙賞給此次亦照從前賞給之處恭候欽定欽遵賞給外交與各該處将應得賞銀大臣官員各項拜唐阿兵丁匠役人等職名并内監等数目造冊行文行在户部於両淮鹽政庫存銀両動支賞給奏入上諭曰簡親王著賞銀三百両徳勒克扎拉豐阿著賞銀二百両餘依議乾隆二十七年二月二十四日總理行營王大臣和碩荘親王允禄等奏言乾隆二十七年二月二十一日奉㫖此次跟隨人等雖俱加㤙賞賚但内地行走與邉外不同所用之項皆湏少増著交總理行營王大臣等将此次跟隨各項人等並留王家營各項人等如何加㤙賞給之處分别定議具奏其所賞銀両在両淮鹽政庫貯公項内動用欽此伏思隨駕廵幸皆臣等分内之事未經起程已䝉皇上加㤙賞賚今又以内地行走不無多費降㫖議賞誠體恤臣等深㤙查乾隆十六年皇上臨幸江南時一品以下三品以上文武大臣等賞半年正俸四品堂官侍衛鑾儀衛章京等各賞銀四十両五品堂官御史内府䕶軍恭領前鋒叅領侍衞䕶軍叅領等各賞銀三十両六品以上文員粘杆處行走世襲官員内府恭領歩軍尉歩軍章京各賞銀二十両七品以下文員廵捕營守偹等各賞銀十五両前鋒校親軍校藍翎校驍騎校廵捕營千總把總庫使庫官各賞銀六両前鋒親軍等各賞銀五両領催食四両錢粮之頭目拜唐阿等各賞銀四両食三両二両錢粮之頭目拜唐阿書吏聴使馬甲校尉等各賞銀三両各匠役捕役厨役步軍領催步軍緑旂兵丁水手網户各賞銀二両總管太監各賞銀二十両首領太監有頂帶太監等各賞銀十五両太監等各賞銀四両留住順河集大臣官員及各項人等减半賞給具奏奉㫖傅恒著賞銀六百両色布騰巴爾珠爾扎拉豐阿著賞銀四百両汪扎爾哈達哈舒赫徳班第努三汪由敦著各賞一年俸留住順河集人䒭亦照跟隨人等著全分賞給餘依議欽此二十二年皇上臨幸江南将跟隨人等賞給之處遵㫖議奏時惟照十六年議賞具奏奉㫖簡親王著賞銀三百両徳勒克扎拉豐阿各賞銀二百両其餘各項人等俱照上届賞給欽此此次荘親王額駙色布騰巴爾珠爾等如何賞給之處伏候欽定外其餘大臣官員各項人等留住王家營人等仍照上届賞給候降諭㫖由各該處造具清冊交両淮鹽政㑹同行在户部照数賞給奏入上諭曰荘親王著賞銀五百両簡親王額駙色布騰巴爾珠爾傅恒著各賞銀四百両扎拉豐阿兆恵阿里袞富徳著各賞銀三百両劉統勲汪扎爾努三福隆阿劉綸于敏中著賞給一年正俸留住王家營人等减半賞給餘依議賞給又諭曰著加㤙和濟思博克賞銀一百両額色音圗爾都各賞銀八十両瑪穆特謨咱帕爾各賞銀六十両乾隆二十七年四月初一日大學士公傳恒奏言據粮道胡文伯查稱䕶軍統領慶㤗乗座三號沙飛船一隻船户楊繼聖於三月二十九日在江中失風碰損並未傷人查二月初十日寳應地方因風傷損船隻查明分别賞恤内三號沙飛傷次重者得㤙賞銀三十五両今船户楊繼聖碰損之船遵㫖加賞一倍應賞銀七十両俟命下交與督臣尹繼善即委妥員眼同賞給奏入上諭曰著賞銀一百両乾隆二十七年四月初三日両江總督尹繼善江蘇廵撫愛必逹奏言臣等查接駕老民金旭陽係蘇州府呉縣人現年一百零一嵗例應具題該縣尚未具報今恭迎聖駕欽奉㤙㫖令即行辦理應請照例賞銀三十両給與昇平人瑞四字聴本家自行建坊以昭旌揚盛典再查向例具題覆准奉㫖加恩賞銀十両縀一疋今奉諭㫖賞給縀二疋應仍加賞銀十両理合奏明奏入報聞欽定南巡盛典卷七十一
