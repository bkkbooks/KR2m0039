body:
  text: 欽定四庫全書欽定南巡盛典卷九十七奏議乾隆四十三年九月十四日大學士管兩江總督髙晉等奏言竊惟地臨吳越分星稍逺堯封跡界江淮行水每煩禹畫遡昔聖祖翠華六度遍咨謀而共豫安恬蒙皇上法駕頻臨勤旰宵而普資樂利元辰元日隨春雨以流膏先甲先庚應條風而布闓凡兹浹髓淪肌之感洵由重熙纍洽之深白首憶沐膏而咏勤蒼黎思瞻雲以就曰顧自旃蒙作噩之嵗載舉南巡逮今著雍奄茂之年已逾一紀天顔有喜記留鑾曽許重來赤子無知惟迎輦得伸衆戴芹獻倍顒於蔀屋葵傾競向於楓宸况下河之沮洳成腴度清口而循水志近岸之漲沙如阜閲鹽倉而底柴工濁流免倒灌之虞湯水息頂衝之患藉回瀾之成算重望懷柔殷善後之良模亟邀臨蒞敬惟乾隆四十五年之吉恭逢聖主七旬萬夀之期薈吳區之塗舞衢謡羣頌箕疇之五合浙水之鄽駢闠接並呼嵩祝之三綺陌含韶適符行慶香盆郁采宜介恆春伏願俯順輿情即頒溫㫖舉五巡之儀典慰萬姓之瞻依惟冀恩俞曷勝喁望謹恭摺具奏奏入上諭恭載恩綸乾隆四十三年十一月初六日髙晉奏言竊臣在河南工次接准乾隆四十三年十月二十日奉上諭昨已降㫖允江浙督撫等所請於乾隆四十五年正月起鑾南巡並諭令沿途母得踵事增華致滋糜費矣至蹕路所經水營行宫等事皆不能不需用度前四次南巡俱曾賞給銀兩以資籌辦而督撫至道府等大員亦有稱自捐亷俸者今春髙晉在京亦曾奏及照上數屇之例於伊等養亷公頃內支用今髙晉楊魁俱有應繳之項勢不能再捐養亷若止令令司道等員公捐更屬不成事體朕南巡省方觀民使萬姓共臻安阜豈肯令不肖官吏藉端科派方今府庫充盈因巡幸而頒發帑金一切皆由公辦最為盛事朕亦無所靳惜著傳諭髙晉即將上四次南巡每次賞銀若干並查明現辦南巡差務需用銀兩若干通盤核計據實具奏候朕降㫖撥給毋得絲毫派纍閭閻欽此伏查上四次恭逢聖駕南巡均蒙頒發銀兩開銷正項動支閒欵俱係官為辦理並無絲毫擾纍閭閻臣在江年久素所深知今庚子年春恭逢翠華南幸差務一切舊有章程只須量加修治除動支司庫正頃并閒欵之外添補無多是以臣今春在京靣為奏明於上下兩江諸臣養亷內公捐辦理以伸報效之忱不敢請發帑項昨奉明㫖下頒臣在豫督工正擬俟大工告竣奏懇陛見將差務諸事靣請聖訓遵行已飛札江寧總局司道督令印委各員將一切工程趕緊估計核實用費馳禀以慿核定尚未覆到今蒙聖恩垂念及臣與楊魁俱有應繳之項不便令司道等員公捐此實我皇上體恤臣等惟恐纍及閭閻恩意臣敢不仰體聖心認真辦理查此次差務雖尚未據司道等估定彚報而臣隨帶檔案內查有上四次南巡報銷銀數內有動支恩賞運庫並藩庫及扣平捐亷閒欵等項銀兩今分晰開單恭呈御覽此次差務除添建行宫三處除俱撙節辦理較之上屇所費有减無增容俟估報到日臣再為通盤核計叧行具奏請㫖遵行奏入報聞乾隆四十四年二月二十六日兩江總督薩載奏言恭照聖駕巡幸江南沿途應須分設臺站接遞文報用馬甚多上屇乾隆二十七年及三十年兩次因江南驛馬已奉裁减七百匹不敷派應經前督臣尹繼善奏請將裁减馬七百匹暫行復額應差俱經仰邀聖恩俞允今乾隆四十五年荷䝉皇上再幸江浙所有江省驛馬應循上例暫照原額加增馬七百匹分派沿途經由各州縣准其于驛站項下借支採買所需料草自本年十一月初一日為始照依額設驛馬一體支給在於驛站項下開銷差竣停其支給仍將所買馬匹照數變價歸還原項如此辦理則暫增之馬既於差務甚有禆益而差竣仍行照數變價還欵亦於錢糧更無虧缺奏入諭如所議行乾隆四十四年三月初三日兵部奏言據兩江總督薩載咨稱恭照乾隆三十年聖駕南巡經由各屬自宿遷入境安設正腰臺站調撥馬匹派委臺員接遞北來軍機本報其西路文報由河南按站接遞兹明春翠華南巡除東路臺站仍照例安設外查得西陲久經底定一切善後事宜俱經定有章程所有自河南入江南境接遞西路文報一帶臺站應否毋庸偹辦抑或照前安設相應咨部核覆遵辦恭查乾隆三十年聖駕巡幸江浙先據該督以西域蕩平年久西路正腰各站即於本州縣存棚馬內調撥减半安設各安馬十五匹令各州縣自行承辦報部明春恭遇翠華南幸自直𨽻山東以至浙江例應安設臺站遞送文報所有入江南境之宿遷一帶東路臺站應照三十年之例派撥安設至西路文報向係於河南交界之宿遷起由鳳陽等處安臺遞送今該督以西陲久經平定其西路臺站應否毋庸備辦咨商臣等伏查西路新疆文報均關緊要若概由東路臺站遞送計繞道行走幾及二千里恐致稽遲應令該督捋西路文報各站仍照三十年之例减半安設在該州縣額設馬內抽撥毋庸另行籌議以節糜費恭候命下臣部行文該督並陕甘河南各督撫一體遵照奏入報聞乾隆四十四年三月初九日薩載奏言恭照厯次聖駕南巡所有隨從官兵執事人等應需乘騎馬匹俱於緑旗標營及江寧京口駐防馬內各撥四千匹分屯江南江北伺應查緑營兵額馬祗有四千四十餘匹於派撥應差之外所餘無幾誠恐貽誤從前俱經前督臣尹繼善於江西營驛馬內酌調數百匹來江協濟今次仍應一體照辦外惟江寧京口駐防額馬本有六千匹因奉裁京口馬甲二千名即减馬二千匹現祗額馬四千匹儘數當差設遇沿途疲乏無馬添換上屇又經前督臣尹繼善奏准於豫省緑旗營馬內酌撥六百匹來江協濟差竣之後即留江寧京口駐防作為補額之用照江省買馬價值每匹十七八兩之數解還豫省買補足數今乾隆四十五年翠華重幸江省駐防馬四千匹全行當差誠恐臨期疲乏無可添補致有貽誤仰懇聖恩俯准照例撥協庶於差務有裨如蒙恩准仍照依上屇臣與河南撫臣商定㑹同將軍臣嵩椿於存貯馬價內照數移還臣因差馬緊要恭摺奏懇再此項馬匹應令豫省於本年十月內預期撥送在於兩省交界地方交收所需沿途草料及馬夫飯食等項各歸本省照例報銷合並陳明奏入報聞乾隆四十四年三月二十九日薩載奏言恭照乾隆四十五年聖駕南巡一切扈從人員應需乘騎馬匹於江省緑營並八旗駐防馬內各以四千匹分派江南江北伺應其八旗馬匹不敷經臣循例奏請借撥豫馬六百匹仰蒙聖主允准為數已屬寬餘而緑營應差之馬通省額數只三千九百有零雖酌量派撥似足敷用而馬匹應差日久不無倒缺若不預為籌辦臨時設有貽誤所關非細上屇經前督臣尹繼善奏請借動司庫養亷馬價六千兩購買餘馬三百匹以偹臨時倒缺添換所借銀兩俱於各營次年例領大報馬價內扣還歸欵今次自應一體辦理臣於上冬咨明兵部轉飭各營借動司庫養亷馬價銀六千兩購買餘匹三百匹加意喂養以偹臨時添換所借銀兩於來年各營應領例報馬價銀內照數扣還歸欵並咨㑹漕河撫臣一體照辦奏入報聞乾隆四十四年四月十四日山東巡撫國泰奏言竊照東省於乾隆二十三年奏裁驛馬六百匹乾隆三十年恭遇聖駕南巡經臨東省需用馬匹不敷經前撫臣崔應階奏請所裁馬匹照江南暫時復額之例於驛站項下借支買補應差仰邀聖恩俞允今乾隆四十五年聖駕巡幸江浙臨蒞東省需用馬匹現將營驛一併籌撥尚有不敷仰懇皇上天恩俯照三十年之例將東省奉裁驛馬六百匹暫准借支驛站項下銀兩買補所需草料夫役等銀亦照上屇之例自本年十一月初一日起照額設驛馬一體支銷差竣停其支給仍將所買馬匹變價歸還原欵既於差務有裨而所借馬價亦照歸補無虧奏入報聞乾隆四十四年六月二十七日兩淮鹽政伊齡阿奏言恭照聖駕南巡應用賞賚銀兩以及金銀牌錁厯查前屇俱係于兩淮應解內庫銅斤等欵銀內奏請存留十二三萬兩以備支用兹庚子年春恭遇聖主鑾輿巡幸江浙所有恩賚需用銀兩牌錁自應仍照向例留項從容辦理飭司妥議今據運使朱孝純禀稱運庫內有本年秋季應解己亥綱銅斤引費銀十萬兩又應解己亥年分賞借利銀七萬二千兩均係應繳內府之項請將銅斤引費頃下銀十萬兩全留再酌留利銀二萬兩共十二萬兩以備明春賞賚之用臣伏查該運使所禀既與節次預偹銀兩數目相符理合循例恭摺奏明請㫖如蒙俞允俟屇期賞賚用有餘剩另行奏明解繳奏入報聞乾隆四十四年六月三十日長蘆鹽政西寧奏言恭照明春皇上巡幸江浙有天津船塢內應行修理御舟業將興工日期於本年正月內恭摺奏蒙聖鑒在案臣率同運使督商敬謹開工修理今於本年六月十九日一律修理完竣入塢詳加查驗均屬堅固恭照乾隆三十年聖駕巡幸江浙御舟數目謹擬安福艫翔鳳艇沙飛船二隻湖船二隻朴拉船一隻烏圖里船二隻擬於本年九月內擇吉出塢派委長蘆運同孟淦大使常天佑由直𨽻山東河路駕赴江南清江浦預偹伺候其行春舫一隻上屇未及派出此次似毋庸隨往所需用御舟前引威虎船暨內務府水手臣呈明該管處照例酌撥應用至此外應偹一切事宜俱照上届舊例遵照偹辦所有現在修理完竣入塢日期理合奏明並將謹擬御舟船隻數目另繕清單恭呈御覽奏入報聞乾隆四十四年七月十五日閩浙總督三寶奏言恭照上四次聖駕南巡一切扈從人員及官兵騎乘安設臺站馬匹浙省向資杭州滿營馬匹協濟經前任浙江撫臣永貴奏請裁去馬一千匹現在滿營實止僅存馬六百匹明春恭逢南巡盛典差馬不敷撥用雖經調任督臣楊景素奏請循照往例預偹動用各緑營􅏤子年大報馬價銀七千兩委員出口採買馬五百匹趕回應用但各營尚有添補之需現據藩司國棟等通盤籌計尚不敷馬一千八十餘匹詳請在於福建通省提鎮標營撥用臣查閩省提鎮等標駐劄各地相距杭州省城自二千餘里以至一千餘里不等山路髙峻往來非易臣再四酌籌查閩省緑旗各營所須操騎馬匹因鄰省馬匹缺乏前督臣崔應階奏請仍赴口外採買今四十四年分現據各營詳請領價赴口購買補額馬八百七十九匹回閩時必由浙江省城經過即可就便截留仍令閩省差辨在浙攢槽喂養以應明春差務俟差竣後趕回原買營分派撥各官兵操騎似此乘便截留應用免致各營抽撥往返與差務營伍均有裨益至在浙餧養草乾閩省現在本年報倒馬草乾銀兩請即於此項內解浙支給以免動用欵項其浙省尚不敷差馬二百餘匹臣現在於閩省較近浙省之建寧福寧二鎮所屬各營分酌量抽調並於浙省現有馬匹內撙節派撥已足敷用奏入報聞乾隆四十四年八月二十五日薩載奏言恭照聖駕南巡沿途管押馬匹船隻以及巡防站等項均需官兵分派差遣而外出應差一切衣裝盤費在所必需上屇節次南巡俱經前督臣尹繼善奏明酌俸俸餉兩月以資偹辦裝束於差竣後全數扣還清欵兹逢􅏤子年翠華巡幸據總局司道議詳各營承應差使官兵請借盤費等項似應循照上屇之例屇期將緑營官兵一律公借兩月俸餉江寧京口八旗官兵亦照此酌量動借俟差竣之後於乾隆四十五年夏季起分作二年照數公扣還欵其江西省管理協濟馬匹及來南辦差官兵亦請一律借給臣查俱與上屇節次借案相符謹循例奏明奏入報聞乾隆四十四年十月十一日江蘇巡撫楊魁奏言乾隆􅏤子年春恭逢聖主巡幸江南所有北來扈從官兵人等沿途需用錢文應需預為籌偹臣等先行扎行蘇州布政使吳壇查核辦理兹據該司查明厯屇需用官錢約計九萬五千餘串向因寶蘇局庫貯餘錢不敷動用俱係加卯加鑄并收買爐匠工料錢文同局存錢奏明凑足偹用今查局庫現貯錢文除照例搭放兵餉之外核計截至四十四年年底止共積存錢十萬四千五百餘串照厯屇預偹官錢需用九萬五千串之數尚有餘存錢九千餘串已屬有盈無缺無須叧籌加鑄及收買工料詳覆到臣臣等公同酌量意見相同現已咨明户部查核並飭令該司將一切發兑事宜循例預行酌定妥辦奏入報聞乾隆四十四年十月三十日國泰奏言恭照前四次聖駕南巡經過東省所有隨營站道辦差及調赴别汛聼候派撥之各營官兵俱蒙聖恩預借一季俸餉按季扣還明春翠華南幸江省官兵現經兩江督臣薩載奏請借支俸餉分年扣還蒙恩俞允東省官兵事同一例合無仰懇聖恩循照江南奏准分年扣還歸欵之例恩准借支一季俸餉俾辦差倍資寬裕各營官兵奮勇趨事益戴聖慈髙厚於無既矣奏入報聞欽定南巡盛典卷九十七
