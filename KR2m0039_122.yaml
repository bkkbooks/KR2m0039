body:
  text: 奏議臣等謹按劉協有云唐虞之世敷奏以言奏者進也言敷於下情達于上也帝王聖神廣運渙號聿頒于時百爾臣工祗服訓詞敷陳政要故在上者莫不有以進考夫為治之說而為之試其言以要其功至若時届省方鴻儀懋舉禮俗政事教治諸大端與夫康樂和親安平之盛軌疇咨所及羣䇿畢宣斯則奏議為尤備矣我皇上道隆千古知周萬物然猶聖不自聖俾芻蕘一得咸可上陳黼座以備采甄至於法駕時巡則沛恩膏飭吏治興文教振戎行所以懋慶賞而廣化澤凡屬在廷之臣守土之吏無弗遵循訓諭實力措施其間參預末議條上封章斟酌舊典隨時損益又仰邀睿斷而奉行焉爰自辛未翠華南蒞由是而丁丑而壬午而乙酉暨庚子甲辰綜括羣議式敷鴻猷章程明備品式咸周蓋抒忱而竭藎者羣力之勤宣也兼聽而並觀者一人之睿哲也皇矣偉哉亘古之宏規熙朝之巨典也上軼隆乎往牒下垂範乎來兹而司事之臣忝對揚之列附名簡末其為榮幸又何加焉謹輯奏議第十二欽定四庫全書欽定南巡盛典卷八十九奏議乾隆十四年九月十二日兩江總督黃廷桂等奏言竊惟省方肆覲聿昭盛世之宏規問俗觀風動關民生之休戚我皇上勤求治理涵育羣生清問不輟於宵衣民隱時陳於黼座固已德洋恩溥遍被寰區厚澤深仁均霑海宇而江南一省民物殷繁首推重地尤為聖心所眷注自十有四年以來教育生成蠲租減賦偶值偏災旱潦賑恤普逮窮簷大興水利工程沮洳皆成沃壤凡所以為民奠室家而謀樂利者已無隱之不周無微之不至是以羣情愛戴浹髓淪肌其瞻雲向日之誠亦倍深於他省臣等採聽風謡咨諏輿頌咸以我皇上民依厪念不憚勤勞前者西幸雲中晋水臺山共仰光華之盛東巡泰岱青齊魯甸同霑雨露之膏惟茲江淮之地帶水非遙獨不得一邀翠華之臨幸延頸企足朝夕以祈衆口同心歡迎恐後此實出於全省紳耆士庶之至誠臣等不敢不以上聞者也且江省襟帶黃淮素稱澤國河工疏濬事宜關係民生運道年來固竭力修防而安瀾未能永奏至於水陸營制布置雖周而操防未為盡宜士技難必精練一經鑾輅親臨黃運河湖之全局江衝海泛之戎政悉在聖明睿照之中諸凡修守機宜操防要領臣等親承指示庶幾知所遵循籲懇我皇上俯稽典禮下順輿情恩賜俞允南巡江省覽三吳之風俗愜憶兆之歡心行見山川草木盡荷光榮營伍河防均叨利賴臣等與合省臣民曷勝欣切瞻望之至奏入上諭曰大學士九卿議奏乾隆十四年十月初五日大學士公傅恆等奏言臣等竊以易載省方詩歌時邁書稱五載一巡狩禮記天子巡狩望祀山川陳詩納賈周禮王巡狩職方氏戒於四方考職事無不敬戒風俗通曰道德太平恐逺近不同化幽隱有不得所者故自躬親行之此典籍所記皆以巡方為大典也洪惟聖祖仁皇帝澤溢萬方恩覃九有六十一年勤求治理翠華臨幸時殷安阜之懷百千萬姓普被鴻仁緑野歡呼屢遍江淮之域恭查康熙二十三年二月內吏科給事中王承祖疏請燔柴泰山過孔林觀禮器九卿等議准奉㫖著候㫖行九月由泰安登岱致祭乘舟至江南閲隄工抵蘇州還駐江寧回鑾過魯親謁闕里二十七年九月工部尚書蘇赫奏請臨河指示修築二十八年正月奉諭諏吉南巡閲視中河至浙江㑹稽三十八年正月奉諭黃淮為患廷臣咸請親臨指示為一勞永逸之圖二月奉皇太后啓行親閲髙家堰歸仁隄由蘇州幸浙江四十年十二月河道總督張鵬翮疏請河工甫就善後之策及應修之處請親臨指示四十一年九月奉諭昨年冬月河臣張鵬翮曽以河工善後之策及應修之處請親臨指示茲當農事之隙輕裝南下自徐州一路循視隄塘至德州回鑾四十二年正月諏吉啓行閲河工至蘇州杭州還駐江寧四十四年正月奉諭黃河工竣未經親閲今欲特蒞其地減從輕裝循河南下二月駕發京師至張家灣登舟閲河工至蘇州松江幸杭州四十五年正月兩江總督阿山等奏稱髙家堰三壩等處河工在於泗州之西溜淮套開河工程重大請親臨指示四十六年正月奉諭九卿集議再三陳請朕以諸臣之言奏聞皇太后祗遵慈命擇于本月二十二日啓行閲河舟楫往返不御室廬至五月回宫𬗟稽巡省之鴻規具沛臣黎之愷澤修防固而河清海晏永慶安瀾蠲賑頻而巷舞塗歌齊聞擊壤采風詩則俊乂遂觀光之願宏赦宥則吏民蒙解網之慈大川喬嶽聿隆望秩之文古聖前王並修享祀之禮道路禁修除之擾都衢戒侈麗之風凡兹一豫一遊莫不以休以助是以涵濡聖澤父老猶扶杖以翹思炳焕天章泉石亦含膏而耀采此則聖祖之屢巡允著熙朝之盛典者也臣等稽史冊之成憲亘古為昭誦祖德之鴻休於今為烈欽惟我皇上以孝法祖以惠安民兩間之德同流四海之情必達不自暇逸時省春秋晉地山河已燦卿雲於復旦魯郊秩祀尤光爼豆於千年維彼江南素稱澤國治河濬澮重興明德之思陸守水巡曲盡衛民之術前此偏災偶告賑恤頻施既而維正輪蠲輸將盡免自東自西自南北罔非戴髙履厚之倫曰淮曰泗曰江河尤勤就日瞻雲之願蓋受恩倍切宜望幸彌殷此兩江督臣黃廷桂等所以有恭請南巡之奏也且淮黃雖已底績其决排疏瀹尚待睿訓之提撕山海固屬敉寧而聫絡巡防還祈聖謨之指示此非徒封疆文武大吏願奉屬車之清塵抑亦東南朝野諸臣兾迓鑾輿於吉日臣等㑹議應如該督等所請示期巡幸用慰輿情龍蟠虎踞之山望六飛而呼萬嵗火耨水耕之衆迎萬乘而祝三多水利修則旱潦無憂武備飭斯干城永賴服先疇而食舊德盡歌有道之長沐膏澤而詠勤勞永戴皇仁之厚矣恭候命下所有應行一切典禮及附近鄰省經由道路預備事宜臣等交各該衙門另行詳議具奏請㫖遵行奏入上諭恭載恩綸乾隆十四年十二月十九日户部奏言據福建道監察御史陸秩奏稱江浙兩省錢米向來昂貴錢價每京平紋銀一兩僅易大錢七百文及六百八九十文不等米價自上年撥賑東省之後每石賣至三兩及二兩四五錢不等今嵗年榖順成始得平減我皇上痌癏在抱念切民依將來翠華巡幸江浙萬姓歡呼統計隨駕官員跟隨人役以及外府外縣各鄉各鎮雲集省㑹之地不下數十萬人而江浙錢米止有此數一時騰貴勢所必然查乾隆八年駕幸盛京特頒諭㫖將本地庫貯錢文設局官賣以平市價現有成效可稽乞敕諭江南督撫將運京銅斤酌留數十萬斤分發江浙兩省錢局增加鼓鑄存貯司庫俟聖駕臨幸届期將一半設立官局減價變賣其餘一半或賞賚兵丁人役之處即將此項錢文給發泉布流通市價不能昂貴再懇聖恩將十五年冬季應兑辛未年漕糧江浙每省截留十萬餘石亦於聖駕抵江抵浙之時令該地方官裝載船隻在蘇州之楓橋杭州之墅河減價平糶則米價亦不致驟長以上二項只須運京腳費之需儘敷減價官賣之數既於國家倉庫無虧實與巡幸地方有益奉硃批總理行營王大臣㑹同該部議奏欽此臣等伏查本年九月兩江總督臣黃廷桂等恭請皇上南巡經大學士九卿遵㫖議奏應如該督等所請示期巡幸用慰輿情蒙諭依議允從南巡之舉當在辛未年春欽此今該御史陸秩奏稱將來翠華巡幸江浙萬姓歡呼統計官員人役以及外府縣各鄉鎮雲集省㑹不下數十萬人而江浙錢米止有此數一時騰貴勢所必然乞敕諭江南督撫將運京銅斤酌留數十萬斤分發江浙兩省錢局增加鼓鑄存貯司庫届期將一半設局減價變賣其餘一半或有恩賞以備給發泉布流通市價不能昻貴查江蘇浙江現在開爐鼓鑄錢文充裕市價理應平減至我皇上臨幸江浙駐蹕省㑹一時人數雲集恐錢價驟昂其設局平賣之處自應預為辦理查江浙兩省嵗鑄錢文除搭放兵餉外每年俱存有餘錢浙江乾隆十三年鼓鑄奏銷案內䦕報現在實存節年餘錢三萬八千八百餘串江蘇乾隆十二年鼓鑄奏銷案內䦕報現在實存節年餘錢四萬三百餘串均未據報部動用再加十三年以後至辛未年春約計兩省所存餘錢共有十餘萬串以鼓鑄銅斤計算約用銅四十餘萬斤已符該御史奏請酌留數十萬斤之數毋庸將滇省額解京銅再為截留應將前項存貯賤文行令各該撫如數收貯以備應用再查浙省本年報部收買銅斤有一百四十餘萬斤江蘇有三十餘萬斤是現在銅數均屬充裕若再量為增鑄備用更屬有益應令各該撫即於現設爐座內酌量通融加鑄毋庸添爐以節浮費至届期作何設局官賣之處應令各該撫斟酌妥辦務使錢價平減其沿途經過地方亦應預為查辦毋使價昂至奏請應兑辛未年漕糧江浙每省截留十餘萬石令該地方官裝載船隻在蘇州之楓橋杭州之墅河減價平糶之處臣等伏思聖駕臨幸江浙其隨從官員人役至各該地方需米必多米價難免昂貴若酌截漕糧減價平糶實與隨從之官役及各該地方之小民日食均有禆益應如所奏將江浙二省乾隆十五年冬應運漕糧內每省截留十萬石以備平糶至所留漕糧應截何屬米石並截留米石裝載船隻應在何處平糶應令總漕㑹同各該省督撫各按地方情形妥協辦理報部查核奏入奉㫖如議速行乾隆十五年三月十四日黃廷桂奏言竊查江蘇省寶蘇局鼓鑄青錢原設十六爐座每年正勤二十八卯鑄出錢文向係每月一成搭放各營兵餉繼因乾隆十一年銅鉛不敷當經前撫臣題准部覆暫停八爐止設八爐鼓鑄餉錢減為間月一成搭放俟銅鉛敷裕之日仍復八爐照舊辦理續因蘇局銅鉛錫斤已敷十六爐座之用現在存錢無幾以之搭放兵餉及將來南巡需用恐致不敷經署撫臣雅爾哈善咨明户部將原停八爐於乾隆十五年照舊復設鼓鑄今御史陸秩奏請於翠華臨幸之地截留銅斤增加鼓鑄經部議覆江蘇乾隆十二年鼓鑄奏銷案內䦕報現在實存節餘錢四萬三百餘串均未報部動用再加十三年以後至辛未年春約計所存餘錢共有十餘萬串毋庸將額解京銅再為截留應將前項存貯錢文行令如數收貯以備應用再江蘇現在銅數充裕若再量為增鑄備用更屬有益於現設爐座內酌量通融加鑄毋庸添爐以節浮費至届期作何設局官賣之處應令斟酌妥辦務使錢價平減其沿途經過地方亦應預為查辦奉㫖依議速行欽此臣伏查乾隆辛未年春恭逢聖駕南巡隨從辦事官員人役同時畢集而外府州縣紳士耆民心殷瞻仰亦必千里恭迎人口既多需錢自廣仰荷聖恩洞鑒俯允部議行令籌辦臣查江蘇省乾隆十二年鼓鑄奏銷案內原報存錢四萬三百三十三串零因十三四年減爐鑄錢不敷一嵗搭放餉錢之用已將前項存錢統入乾隆十三十四兩年餉錢通融凑用現今截至乾隆十四年年底止實止存錢二萬三千六百一十九串零今乾隆十五年雖經復設八爐鑄錢但查搭放餉錢乃皇上優恤兵丁之曠典前因減爐錢少是以減為間月一成搭放原經曉諭兵丁俟復設爐座之日照舊按每月一成搭放今既復設十六爐座餉錢亦應仍照舊例按月一成搭放共計一嵗需錢八萬六千七百八十三串零以原設復設十六爐嵗共出錢九萬五千三百三十七串零計算僅存餘錢八千五百五十四串零加之舊存餘錢二萬三千六百一十九串零亦止存三萬二千一百七十三串零查江省境內車駕經臨之處自北而南共有二十三州縣道路綿長需錢甚廣前項存錢實不敷用但若添爐鼓鑄未免又需建房添設爐具等項誠如部議致多浮費似應遵照部覆於現設爐座之內酌量通融加鑄庶為允協隨經行據署蘇州布政使和其𠂻議覆寶蘇局現設十六爐座正勤二十八卯之外酌再暫行加鑄八卯嵗可得錢二萬七千二百三十八串零又查十六爐每嵗應用工料價值向係支給錢文今應按照時價庫平給銀買辦又可節存錢二萬一千三百八十八串零連前存剩餘錢共可得錢八萬七百九十九串零以此分發聖駕經由之各州縣仿照巡幸東省之例設局委員官賣足可流通平價如有餘剩留充下年搭放兵餉之用所需添鑄銅鉛錫斤現有存局及委員採運足敷應用此項所添八卯原為南巡暫時需用應俟乾隆辛未年即行停止仍照舊例二十八卯鼓鑄臣復加查核加卯添鑄不增爐座既省建屋製具之費而錢文又得敷裕流通誠於公事有益除經飭令照議妥辦一靣咨明户部外至届期作何分𣲖設局官賣之處臣等自當籌酌妥辦務期錢價平減以仰副聖主念切民依之至意奏入報聞乾隆十五年六月十九日黃廷桂奏言竊查明春恭值聖駕南巡漕臣瑚寶奏辦糧艘回避一摺奉㫖交臣辦理查瑚寶摺內議將江浙兩省起運船隻較往年收兑䦕行均早二十日原屬預籌之意但江江南北民間穫稻遲早不同有八月底九月初收割者亦有九月半後方始收割者所以向來䦕徵俱在十月初旬以後今嵗䦕徵應飭有司運辨旋徵旋兑徵完即可兑完兑竣即令䦕行均不許少有延捱如此辦理可較往年趕早十餘日凡可以催過宿遷者上緊催䟎速挽前進其不能催過宿遷者亦不必預先指定灣泊之處蓋緣糧船重大風有順逆惟在臨時相度擇地停泊回避或有幫船一時回避不及者即於河身寬濶處所挨次停泊一邉恭候御舟過後統令兼程遄行北上既無擁擠之虞又可不致遲逾仍將各幫回避地方停泊日期報明漕臣咨部以備查考臣謹遵㫖酌議覆奏至南巡應辦各項事宜半載以來臣等率同司道盡心籌畫定有章程悉交各該知府率同有司遵照辦理即有尚須增減之處臣等不過隨時妥酌似無遲誤所需騎坐馬匹亦已計算停妥現有滿漢標營額馬儘可撥調足用至安設塘站之馬亦有上下兩江馹馬通融抽調如或不敷再於江西驛馬內酌量摘撥應俟兵部行文至日即便如數𣲖調惟需用船隻數目難以預定但目今為時甚早俟八九月間臣等另行請㫖備辦亦可無誤奏入報聞乾隆十五年七月十七日黃廷桂吉慶奏言竊照明春恭值聖駕南巡一切預備事宜欽奉恩㫖例應報銷者俱令動用公帑臣等督同總辦司道逐一籌議如道路橋梁馬頭營尖茶棚等類係例應報部者著動支藩庫錢糧行宫名勝及附近上山道路并鋪墊陳設等類不應報部者著動支運庫商捐銀兩均經分别飭辦惟是地方官應辦之事甚多若不為其區畫恐致擾纍閭閻有辜我皇上省方問俗至意是以臣吉慶前曽靣奏請將商捐項下撥銀十五萬兩交與藩庫幫助地方官辦理差務仰蒙恩允今臣等已撥銀五萬兩交與江寧藩庫撥銀十萬兩交與蘇州藩庫令其酌量動用又河務預備事宜亦需資辦理臣等公同啇酌亦撥給河庫銀二萬兩幫辦河工差務以免𣲖纍凡動用藩庫錢糧者由巡撫稽核照例報銷動用運庫商捐銀兩者臣與黃廷桂公同稽核隨時登載冊籍俟聖駕回鑾臣等將用過數目另行具奏奏入報聞乾隆十五年八月十六日總理行營事務和碩莊親王允祿等奏言據總督倉場侍郎書山等奏稱恭查聖祖仁皇帝南巡所乘船隻向係坐糧㕔於天津收貯船內預備皇上明春巡幸江浙所有應用船隻自宜照例辦理惟是冬春之交河冰未䦕此項船隻必須於本年九月間先行駕赴宿遷庶可臨期備用謹䦕船單恭請皇上𣲖出若干隻以便委員駕赴該處伺候仍令地方官搭篷苫蓋以蔽風雨所有外雇水手及添换旗幛衣帽篙櫓等物容臣另行查例備辦奉㫖總理行營王大臣議奏欽此恭查從前聖祖仁皇帝南巡所用船隻應坐糧㕔承辦者俱令於天津收貯船隻內預備今恭遇皇上明春南巡該侍郎等以冬月河冰必須於本年九月間先行駕赴宿遷䦕單奏請皇上𣲖出臣等謹按單內所䦕翔鳯艇一隻大沙飛船一隻新沙飛船一隻新如意船一隻俱係皇上乘坐及御用之船自應先行駕赴其餘船隻有可減省者亦有不必帶往者臣等公同酌議湖船撲拉船二項係在御舟前行備用今於湖船三隻內酌用二隻撲拉船三隻內酌用一隻此外尚有佛船一隻四執事船一隻清茶房船一隻又如意船二隻看圍船二隻以上船隻南省備用甚易該督撫等自必乘便預辦無庸於天津駕送以省長途糜費再查此次駕赴南省船隻尚有應帶威虎船六隻應令該侍郎等行文內務府將應帶威虎船查交該侍郎等同御船一并送往宿遷其應帶水手若干及添换旗幛衣帽篙櫓等物亦令該侍郎等照例辦理務於九月內委員駕赴並行知江浙督撫令其搭篷苫蓋及應預備各項船隻敬謹辦理奏入上諭曰御船但令將翔鳯艇一隻送去其沙飛如意船亦不必駕赴餘依議乾隆十五年九月十五日允祿等奏言尚書蔣溥奏預籌備貯一摺奉硃批總理行營王大臣速議具奏欽此據稱來嵗江浙等處恭遇翠華巡幸凡扈從官兵人等需用等物應加籌畫查黑豆一項江浙地方向不出産江南水次最近者莫如山東該省上年秋成豐稔黑豆廣收價值平賤民間餘蓄必多撥運江南取程甚便且官為買運糶賣較之商賈販運貴賤判然仰請敕下江浙督撫㑹同山東撫臣將如何採買撥運並運貯何處糶賣及將來作何歸還原欵之處作速商酌妥辦以期臨時濟用查明春恭遇皇上臨幸江浙所有扈從官兵人等馬匹應用黑豆事在必需自應預籌但隨駕人員在浙江地方槩用船隻所乘馬匹俱留在紅花埠與山東境內相連所需黑豆隨地可以取給應令山東巡撫酌量運送沂州一帶以免價值昂貴至江浙地方需用無幾若東省撥運太多徒滋糜費或該處調集營馬有需撥濟之處應令江浙督撫酌用若干一靣知㑹山東巡撫即行撥運一靣奏聞奏入報聞乾隆十五年九月十六日兵部奏言查向例皇上行幸各處一切往來本報事件俱由臺站接遞馳送明春恭逢聖駕南巡所有經由地方應照例安設臺站近據山東巡撫凖泰奏稱該省擬安正站十五處腰站十五處需馬二千八百五十匹臣部現在另摺核議具奏其直𨽻江南浙江等省作何安設之處未據該督撫等報部應請敕交各該督撫遴委道府人員於嚮𨗳大臣勘定經由處所并各省交界接壤地方詳加妥酌應於何處擬安正腰各站需用車馬船隻如何調撥預偹逐一妥議報部臣部𣲖員前往㑹同查勘安設至所安正腰各站需用坐臺筆帖式領催等臣部照例𣲖往馳送如臣部筆帖式領催不敷照例行文各部院衙門選送公同籖掣𣲖往俟回鑾之日停撤奏入報聞乾隆十五年九月十七日允祿等奏言兩江總督黃廷桂兩淮鹽政吉慶覆奏南巡船隻一摺奉硃批總理行營王大臣速議具奏欽此據稱明春南巡所有供奉皇太后御舟皇上御舟臣吉慶敬謹製竣又於本年現造之官船內擇其輕便敬謹裝修三隻以備應用至扈從人員應需船隻數目前經奏請敕議行知到日即便遵照偹辦是各項船隻俱已預備其通州隨帶船隻如俟明年冰融開行勢必緩不及用若於今嵗即行南來又恐多費似可無庸隨帶臣查明嵗恭遇皇上南巡所有御舟及應用船隻現據該督等俱已預偹至奏稱通州船隻似可無庸隨帶之處查本月八月內總督倉場侍郎書山等奏請酌送船隻經臣等定議奉㫖酌減僅送御舟一隻撲拉船一隻湖船二隻威虎船六隻其餘俱已停其駕送是通州船隻原未令其帶往以省糜費至前議所帶船隻俱係隨時應用為數甚少目下河水未冰現在開行該督等所請可以無庸再議奏入報聞乾隆十五年十月十九日閩浙總督喀爾吉善署浙江巡撫永貴奏言乾隆十五年八月十六日奉上諭據總理行營王大臣等議奏此次南巡隨帶船隻行令倉場衙門照議定之數預備一摺朕思該督黃廷桂等現在辦差所有恭奉皇太后御舟及乘用各船自必先期敬謹籌偹即朕御用之舟應令酌帶亦不必按照各項名目重復辦理著傳㫖詢問該督等如彼處既經辦理妥協則通州帶往船隻無庸多備况南省原係一水可通之地若江省備船足用則自江至浙何須遞為更换該撫永貴亦不必另行預偹欽此又於九月初三日臣喀爾吉善奉廷寄總理行營王大臣和碩莊親王等奏摺一件奉㫖御船但令將翔鳯艇一隻送去其沙飛如意船亦不必駕赴餘依議欽此恭照明春翠華南幸江浙二省應行㑹辦事宜臣等於上年冬間及今春進京陛見路由江省業與兩江督臣黃廷桂兩淮鹽政臣吉慶等靣為啇酌本年六月內又經准咨専委大員赴蘇㑹商集議所有自江至浙運河內供奉御舟已擬由江淮直抵杭城需用扈從船隻亦從江省雇備其浙省站民各船均駕赴江省以備差遣一應人夫水腳等費兩省仍各自按程給發核實報銷至於杭州西湖錢塘江及紹興三處河道皆有閘壩大江阻隔不通臣等謹於西湖恭備大小御舟五隻錢塘江渡船一隻紹河駐蹕大船三隻行駛小船一隻久經鳩工庀材敬謹成造三處需用扈蹕之船臨時另行雇募應用是各項船隻俱已有備所有通州之船除已奉㫖𣲖出翔鳯艇一隻之外臣等愚見似可無需多帶奏入報聞乾隆十五年十月二十三日允祿等奏言侍郎兼管順天府府尹蔣炳等條奏籌辦車兩事宜一摺奉㫖總理行營王大臣議奏欽此據奏准兵部咨八旗存京駝隻及上駟院挑選駝共一百八十九隻尚不敷六百餘隻行令預行雇車此項抵駝車輛請以一車抵駝三隻請令附近之遵化玉田豐潤延慶等州縣協同辦理并令武備院等處先期核定數目知照所有腳價草料銀兩請於部庫支領又奏稱向來車輛每日給銀七錢二分如遇駐蹕之日每車日給草料銀五錢二分明嵗南巡至順河集即登御舟由江寧蘇杭㑹稽回鑾至順河集計五十餘程約六十餘日所有車輛若令在彼守候計需二萬餘金糜費無益查八旗駝隻緣自河南回京不無疲乏是以雇車抵駝若喂至明年三月臕力俱可滿足應請於三月中旬空拉緩程至順河集等候回鑾之用其抵駝車輛無庸在彼守候又江南之王家營山東之臺莊濟寧等處向為車輛聚集之地就近雇辦亦屬便易所有回鑾時內務府鑾儀衛需用隨營車輛應請敕交各該撫轉飭該州縣等届期雇備應用查抵駝車輛原因自豫回京駝隻恐有疲乏不敷明春之用是以該部行令該府尹等雇車抵算今查八旗駝共八百八十一隻此次巡幸河南共用駝八百一十八隻明嵗用駝之處其數大略相等再查八旗尚有存京駝六十三隻又有上駟院駝隻途次復經添換雖自河南回京其中不無疲乏計回京後喂養兩月臕力自是滿足儘可敷用且由京至順河集不過一千數百里用以䭾載亦不至於疲乏應令仍用駝隻以省雇車糜費所有抵駝車輛令該府尹等停止添雇至所奏一車抵駝三隻等條該府尹等原因籌辦抵駝車輛起見今既仍用駝隻可以無庸再議惟內務府鑾儀衛需用隨行車輛向來不過駐蹕之日給與草料銀五錢二分今若長令守候亦多糜費該府尹等既稱王家營臺莊等處為車輛聚集之所雇辦甚易應令隨行車輛至順河集不必守候需用之時即就近雇辦最為妥協但此項車輛向來俱係該府尹等辦理若僅交與該省地方官雇辦恐有未諳以致臨時貽誤應請將該府尹等特𣲖一員前往順河集㑹同各該督撫等董率地方官指示稽查悉心備辦如蒙俞允臣等即行知順天府并各該撫遵照辦理奏入報聞乾隆十五年十月二十四日允祿等奏言臣等議覆蔣炳等籌辦車輛摺內請㫖於該府尹等特𣲖一員前往順河集辦理車輛奉㫖依議欽此謹將府尹等職名開列恭候欽㸃一員奏入奉㫖著蔣炳去欽定南巡盛典卷八十九
