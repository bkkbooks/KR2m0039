body:
  text: 欽定四庫全書欽定南巡盛典卷二十五恩綸臣等謹案書曰大哉王言記曰王言如絲其出如綸王言如綸其出如綍古帝王發號施令必有大澤以副之而尚書載堯以來典謨誓誥之文綦備作於巡狩時者未之見焉周則陳詩有命納賈有命文雖闕如制昉諸此兩漢分制詔令𠡠為四品文章爾雅訓詞深厚然如永平之幸滎陽建初之行秋稼劇易親知貧弱有利外此亦不多覯豈史文闕略抑所謂淪浹者有未備歟我皇上廣運聖神亭育函夏恢纉前光六巡江浙介慈寧之福慰望幸之忱自辛未以迄甲辰繼繩祖武奉若成憲兢兢以簡儀衛除供億崇樸黜華撙莭愛飬為本而自疆吏以逮編氓無不仰沐仁膏同歸揚詡加恩於無可復加利物而不言所利中外禔福含仁謳風夫豈漢唐以來所能比擬乎竊嘗玩有孚恵心勿問元吉之占解者多云加恵于民不問可知為元吉伏讀聖製釋為加恵而不問其感與弗感是則至徳如天黙運於辰居端拱者既極其周詳而普被於鑾輅經臨者益昭夫優渥河濟以北江淮以南歌衢祝華之聲怡怡于于仰帝車而未有艾者其感戴更當何如也謹録恩綸第二欽定四庫全書欽定南巡盛典卷二十五恩綸乾隆十四年十月初五日上諭内閣曰江南督撫等以該省紳耆士庶望幸心殷合詞奏請南巡朕以鉅典攸闗特命廷臣集議今經大學士九卿等援据經史且仰稽聖祖仁皇帝六巡江浙謨烈光昭允宜俯從所請朕軫念民依省方問俗郊圻近省不憚躬勤鑾輅江左地廣人稠素所厪念其官方戎政河務海防與凡閭閻疾苦無非事者苐程途稍逺十餘年來未遑舉行屢嘗敬讀聖祖實録備載前後南巡恭侍皇太后鑾輿羣黎扶老擕㓜夾道歡迎交頌天家孝徳心甚慕焉朕巡幸所至悉奉聖母皇太后逰賞江南名勝甲于天下誠親掖安輿聎覽山川之佳秀民物之豐美良足以娛暢慈懐既詢謀僉同應依議允從所請但朕將以明年秋幸五臺經太原厯嵩洛趙魏回鑾已涉冬令南巡之舉當在辛未年春正我聖母六旬萬夀之年也將見巷舞衢歌騰歡獻祝稱朕以天下飬之至愛上以廣承歡之慶下以慰望幸之忱益深嘉悦届期諏吉以聞嚮道人員朕酌量先期簡𣲖前往清蹕所至簡約儀衛一切出自内府無煩有司供億至行營宿頓不過偶一經臨即暫停亦不逾旬日前嵗山左過求華䴡多耗物力朕甚勿取曽經降㫖申飭明嵗晋豫等省以及江南俱不可倣效至名山古蹟南省尤多祇應掃除潔浄足備臨觀而已無事崇餙倘有傾圯隨宜補葺悉令動用官項且有吉慶所奏淮啇願捐之項可以報銷但當核實不得任有司浮冒其民間張燈結綵聖祖嘗以為戒載在方冊宜共恪遵其慎勿以華侈相尚所司通行曉諭其一切應行典禮著照所議行乾隆十五年正月二十八日上命軍機大臣傳諭兩江總督黄廷桂等曰朕巡幸江浙問俗觀風清蹕所至除道供頓有司不必過費周章已經屡降諭㫖至川原林麓民間塜墓所在安厝已乆不過附近道傍於輦路經由無礙不得令其移徙即如直属近畿常經車駕往返及由都城以至西苑所司平治道途雖觀瞻所及間或蔽以布帷菅蒯之属曠野中竟不為障蔽南省係初次辦差恐未盡悉在督撫等仰體朕意自能妥協辦理而臣工中有陳奏及此者雖属過慮但既有此言應令該督撫等留心體察戒飭承辦各員無得藉端輕議遷瘞致滋紛擾將此傳諭知之乾隆十五年二月十九日上命軍機大臣傳諭兩江總督黄廷桂等曰朕省方駐蹕之所扈從人等所需米糧柴草地方官招集貿易人預先運備以便臨時買用又恐市價昂貴復官為備辦以平市價原係意美法良但現在山西每人給與價票騐票發賣以致諸弊叢生或有以一人而兼領數人之票者或有不肖之徒多取官票賤買貴賣從中射利者殊與隨從人等無益現在已令停止嗣後如遇巡幸凡扈從官兵需用之物該地方官但招集啇人並官為運備以期貨物充裕市價公平不必發票來年巡省江浙即著照此例行可一併傳諭該督撫等知之乾隆十五年四月初六日上命軍機大臣傳諭兩江總督黄廷桂曰據漕運總督瑚寳奏到二摺一稱明年巡幸江浙經王大臣等議准每省截漕十萬石以資平糶但江省經臨之所站多地廣原議之數恐不足普及等語朕思十萬不敷請増五萬即揆諸瑚寳本意亦属片言可了乃輾轉費辭連篇累牘並往復咨啇浙省多生支莭轉于事理不明又奏臨幸時糧艘豫籌廻避一摺詞語亦瑣碎冗雜披閲之下總未明晰辦理南巡差務有事闗漕運者漕臣自不得稍存推諉之見但看來瑚寳辦事糊塗必致多費周章仍不妥協著傳諭黄廷桂江省一切事務原属該地方應辦之事著伊悉心籌酌將瑚寳原奏二摺抄録令其閲看所有應行先事辦理之處逐一詳悉奏聞乾隆十五年五月初七日上諭内閣曰朕明春巡幸江浙經王大臣等議准每省截漕十萬石以資平糶朕已允行今據總督黄廷桂等奏稱巡幸江南經臨之所站多地廣原議之數恐有不敷再請截留五萬石等語著照所請再截留漕糧五萬石俾糶用充裕其作何截留及應在何處平糶該督黄廷桂等即行㑹商妥協辦理乾隆十五年八月十六日上命軍機大臣傳諭浙江巡撫永貴等曰據總理行營王大臣等議奏此次南巡隨帯船隻行令倉場衙門照議定之數預備一摺朕思該督黄廷貴等現在辦差所有恭奉太后御舟及乘用各船自必先期敬謹籌備即朕御用之船應令酌帯亦不必按照各項名目重複辦理著傳㫖詢問該督等如彼處既經辦理妥協則通州帯往船隻無庸多備况南省原係一水可通之地若江省備船足用則自江至浙何湏遞為更换該撫永貴亦不必另行預備將此一併傳諭知之乾隆十五年八月二十八日上諭内閣曰朕明春巡幸江浙淮揚河路運鹽船隻未便絡繹往來現據兩淮鹽政吉慶奏請于本年十月將鹽觔預運四十萬引以資接濟朕思該商等先期趕辦一切起撥掣貯無不耗費著加恩將本年冬季所運之辛未綱鹽准其每引加耗二十觔俾商力充裕自與江廣民食有益該部即行文該鹽政知之乾隆十五年十月初五日上諭内閣曰朕明春巡幸江浙所過道路橋梁該地方官現在以次預辦應遣嚮導大臣覆加查看著兆恵努三就近自開封府馳驛前往並傳諭該督撫等一切供頓辦理務從簡樸毋得徒尚紛華以滋糜費乾隆十五年十月十四日上諭内閣曰朕明春巡幸江浙曽經降㫖每省各截留漕糧十萬石以資平糶之用今據永貴摺奏温台各属今嵗秋收稍薄米價未免増長等語著將浙省庚午年漕糧再截留五萬石俾糶用充裕民食有資所有截留撥運事宜仍著該撫詳悉酌籌妥協辦理該部即遵諭行乾隆十五年十一月初一日上命軍機大臣傳諭兩江總督黄廷桂等曰從前恭遇皇祖聖祖仁皇帝南巡時自順河集以達江口皆係河臣𣲖撥河兵以供舟行挽縴之用渡江後則由江省地方官僱覔民夫更替及行至浙江交界該省换䌫亦另用僱夫應差此舊制也朕明春巡幸江浙聞江省督撫河臣㑹商擬於渡江後仍用河兵挽縴以省募夫接替之煩惟浙江因地属隔省尚欲遵循昔年僱夫成例朕思兩省本属一水可通若江省槩用河兵而浙省又别行召募往來守候未免紛繁兵丁向𨽻河標舟行乃其素習且在江省經行已乆亦必益就熟嫻若即令其隨至浙江一路就便應用較之臨期鳩集之夫自為有益况浙省本有僱夫工價若即以之加給河兵在伊等既可獲資斧之需而浙省地方官并得省僱募之役彼此均覺妥便著傳諭該督撫等令其㑹同河道總督髙斌張師載就近一體通融籌酌定議奏聞惟期公務有禆毋得存此疆彼界之見乾隆十五年十一月二十六日上諭内閣曰明春恭奉聖母皇太后鑾輿巡幸江浙于正月十三祈穀禮成日啟駕同日上諭内閣曰朕頻歳巡幸直省問俗觀風一遵祖制入疆考績既足利益民生而扈従官兵亦得練習勤勞修明紀律所闗甚鉅者也所有行營供頓悉出内帑絲毫不以擾民道路橋梁原准開銷正欵且更特賜公項俾通融協濟該督撫等量力措辦儘足敷用即或以大員俸入既豐稍効忱悃尚非必不可行之事從未有出于指𣲖紳民者今嵗時巡豫省見所司辦理非該撫及二三大員等力所能供因逐日召見藩臬道府等隨事詢察伊等奏對之間皆有畏首畏尾之意朕知其辦理不善詢之該撫而卾容安初尚欲含糊了事及加嚴詰一一據實奏明出自通省士民捐輸朕本欲即治其罪念伊父大學士鄂爾泰宣勞有素伊在巡撫任内二年以來頗改其好名舊習而諸事黽勉出力且因朕問亦即行據實奏明尚與始終欺隠者有間是以降㫖切責姑免其交部議處至於富明身任藩司與該撫公同辦理乃至朕回鑾日援藩臬三年期滿之例奏請來京陛見朕當即降㫖伊於行在屢經召對不應遽請陛見顯係取巧乖張交部察議且明指其非出於糊塗拘泥必因見朕深責卾容安故為此奏如准其來京遂得於召見時乘機卸責此其巧獪居心殊不可問令軍機大臣等傳㫖申飭富明令其明白回奏今回奏摺内果稱諸凡與撫臣㑹同商酌並無異議是卾容安辦理此事竟為富明所賣不能逃朕洞鍳矣富明已照部議降調朕在中州時見該撫不能仰體朕心冒昧辦理恐江浙督撫等聞風效尤將以觀風布澤之盛典轉成地方官科斂累民之私計因即遣兆恵等由開封馳至江浙宣布朕意俾督撫知所儆戒今兆恵回京覆奏江浙督撫並無𣲖累朕心稍釋朕為海内蒼黎蠲免正供至數千萬尚所不惜豈因省方盛舉轉惜多費數十萬金而乃需民力捐輸耶即謂感恩趨事實出羣情所願而農民非富商可比該督撫亦應明諭朕㫖早行禁止方為知輕重之大臣豈可因循従事著將朕在中州訓飭卾容安並同富明前奏傳諭鄂容安各諭㫖宣示中外俾共知朕意科道等惟以摭拾陳言及枚舉細故為盡職似此有闗政體之事何不叅奏著通行申飭朕已明頒諭㫖亦不必再行凟奏乾隆十五年十二月十六日上諭内閣曰明嵗恭逢聖母皇太后萬夀之年朕於新正恭奉鑾輿巡幸江南浙江省方觀民入疆考績式遵祖烈慶典斯行東南父老共效嵩呼洵昇平之盛事惟念江浙二省襟帯江湖程途稍逺自皇祖聖祖仁皇帝南巡以來異數隆恩昭垂史冊迄今四十餘年朕俯従望幸之忱倍切勤民之隠前於大學士九卿等議准兩江總督黄廷桂等一摺已降㫖諄切曉諭又特遣嚮導大臣兆恵努三等前往面傳諭㫖務従儉約一切供頓絲毫不累民間凡地方大吏職任旬宣自能仰體朕心遵㫖辦理但恐地方有司奉行不善或窮鄉僻壌未及周知是用再行申諭各該督撫及所属官民人等尚其凛遵前㫖共期撙莭以敦善俗以導淳風如所在行宫與其逺購珍竒雜陳玩好不如明窻净几灑掃潔除足供信宿之適也經過道路與其張燈懸綵徒侈美觀不若蔀屋茅簷桑麻在望足覘盈寧之象也闤闠通衢人烟稠宻正以見懋遷有無之樂不得因道路湫隘俾遷移㕓舍或至商民失業也朕翠華所至念切民依惟期宣達羣情勤求治道上以奉慈顔之悦豫下以荅黎庶之瞻依凡属虚文浮費概宜實力摒除用光鉅典其扈従滿漢文武大臣官員侍衛等皆當奉公守法不得與地方官往來交際潜通餽遺兵丁以及隨従人等著該𬋩大臣各嚴加約束經行所至不得稍有滋擾春苗遍野無得踐踏違者察出従重治罪務令白叟黄童普霑膏澤共樂恬熈副朕問俗觀風行慶施恵之至意乾隆十五年十二月二十二日上諭内閣曰朕明嵗南巡江浙省方問俗務使民啇樂業肆不改㕓如京口諸處為南北咽喉百貨叢集軸轤銜尾皆民間日用所資不可稍有間缺恐地方有司因御舟將至惟使河道肅清先期于各處早為攔阻以致啇賈裹足不前市價昂貴於民生殊多未便著速行傳諭各該省督撫酌量辦理祗可於三五日前稍令避入支港俟過即放遄行以副朕便民䘏啇至意該部遵諭速行乾隆十五年十二月二十七日上諭内閣曰明嵗南巡鹵簿不必帯往乾隆十六年正月十三日上諭内閣曰朕此次巡幸江浙聞士民父老念切近光其闤闠通衢人烟輻輳之所瞻仰者既足慰望幸之忱而朕亦得因以見閭閻風俗之盛誠恐地方有司因慮道路擁擠或至先期攔阻用是特行申諭如經過村巷果属湫隘難容自應量為曉諭令其散處路旁毋致喧擾若道路寛廣清蹕所經毋虞擁塞不得概行禁止以阻黎庶瞻就之誠著即傳諭各督撫知之乾隆十六年正月十六日上諭内閣曰直𨽻州縣内上年間有被灾之處當諭該督方觀承照例加意撫恤復經降㫖將十二月内應止賑各户加恩展賑一月貧民雖不致失所但今東作方興被灾貧民未免仍属拮据朕巡幸畿甸軫念維殷著再加恩將七八分灾之極貧九十分災之極次貧各加賑兩個月六分灾之極貧七八分灾之次貧各加賑一個月令該督方觀承轉飭各属俾得均霑實恵以資力作該部遵諭速行同日上諭内閣曰直属上年偏灾州縣現在降㫖加賑有需用米石之處著將河南本年運通粟米截留十萬石交總督方觀承酌量辦理該部遵諭速行乾隆十六年正月二十五日上諭内閣曰向例鑾輿巡幸經過地方官員應行接駕由鴻臚寺具奏里數請㫖臨時該寺帯領接駕至駐蹕後復奏聞帯領行禮朕入疆考績地方大吏隨營行走不時召見即州縣各官凡有承辦差務者業已於路旁隨便跪接此皆不在帯領行禮之例其帯領行禮者非散員即武弁教職充數之人此何為者而鴻臚寺官員先期傳示不無滋擾嗣後凡應行接駕人員祗令鴻臚寺在京奏請里數得㫖行知其一切繁文及接駕後赴鴻臚寺投遞職名概著停止以示朕行簡務實之意乾隆十六年二月初三日上諭内閣曰上年東省雖獲有秋而蘭山等七州縣偶被偏灾加恩賑恤民食固不至缺乏但農事方興麥秋尚早清蹕所經見蘭山郯城二縣民氣似遜他處深為軫念著將蘭山郯城二縣極次貧民俱加賑一月其未經過之嶧縣平度州膠州髙宻昌邑五處被灾稍輕著將極貧之民加賑一月令該撫凖泰查明辦理務使均霑實恵該部遵諭速行乾隆十六年二月初十日上諭内閣曰上下両江有被灾稍重之處曽經加恩將極重之宿州靈璧虹縣五河宿遷邳州睢寧海州沭陽等處次重之鳯陽臨淮懐逺鳳臺夀州霍邱清河桃源安東等處分别加賑朕車駕南巡所有經臨之宿遷桃源清河三縣見其民氣逺遜他處並將所借籽種銀兩全行豁免今聞該地方官展賑之事尚未開期朕省方問俗念切民依若地方官借辦差之名致窮黎嗷嗷待哺殊非仰體朕痌瘝在已之意著布政使永寧星速親往督率該府州縣等即日按户開賑並傳諭黄廷桂飭令該州縣正印官不必辦差即回本任辦理散賑務俾均沾實恵朕回鑾時或尚有不能妥協之處惟永寧是問乾隆十六年二月二十五日上諭内閣曰朕命駕南巡周覧風俗觀民察吏惟日兢兢三吳尤素所厪念也粤自我皇祖聖祖仁皇帝巡幸東南先後六舉厯今四十餘年盛典昭垂衢謡在耳頃者入境以來白叟黄童扶擕恐後就瞻愛戴誠意可嘉朕已叠沛恩膏廣敷渥澤惟念大江南北土沃人稠重以百年休飬户口益増習尚所趨葢藏未裕紛華靡䴡之意多而樸茂之風轉有未逮夫去奢崇實固閭閻生計之常經而因時訓俗以宣風而布化則官兹土者之責也其尚勵乃實心以行實政無忝教飬斯民之任凡兹士庶更宜各敦本業力屏浮華以莭儉留其有餘以勤勞補其不足時時思物力之維艱事事惟奢靡之是戒將見康阜之盛益臻父老子弟共享昇平之福朕清蹕所至有厚望焉乾隆十六年三月初一日上諭内閣曰經史學之根柢也㑹城書院聚黌庠之秀而砥礪之尤宜示之正學朕時巡所至若江寧之鍾山書院蘓州之紫陽書院杭州之敷文書院各賜武英殿所刋之十三經二十二史一部資髦士稽古之學乾隆十六年三月十三日上諭内閣曰朕省方觀民茂求上理前因浙省士庶誼切急公正供概無宿逋頒諭嘉獎誕布特恩頃翠華涖止周覧土風雖與三吳繡壌相錯而閭閻趨尚較吳稍樸但浮競之習舉所不免其葢蔵未裕均也凡爾封疆大吏暨監司守令俱有教飬斯民之責當以移風易俗為已任詎惟簿書期㑹為克盡乃職其在小民則宜崇寔去奢雍睦敦讓相勉于孝弟力田以臻仁夀之俗將見化行俗美有進而日上者兹當旋蹕用申訓諭其善承朕意毋忽乾隆十六年三月二十二日上命軍機大臣傳諭兩江總督黃廷桂等曰時届暮春朕回鑾所至青疇彌望二麥既已抽芒新苗亦將出水朕心甚為欣慰但沿途耆民婦孺紛闐載道翠華一過則皆隨行恐後在民情之愛戴雖所嘉許而接隴連畦或致踐踏殊可惜也著傳諭該督曉諭百姓許其路傍跽接不必追隨逺行以致擁擠有損青苗但行勸諭不必令兵驅逐禁止俾知朕愛民重農之意乾隆十六年四月初七日上諭内閣曰此次隨從人等至順河集登陸後所用船隻仍應各回生理但恐閘口擁滯多被攔阻伊等窮苦船户回空既無僱值又致停泊乆候何以資生著𣲖侍郎雅爾圗嵩夀㑹同將軍西爾們總漕瑚寳往順河集一帯將此項回空船隻于二三日内令其盡行過閘以示體恤乾隆十六年四月二十一日上諭内閣曰日食天變之大者自古重之顧僅以引咎求言虚文従事夫豈應天以實之義乃者五月丁酉朔日有食之朕自惟宵旰憂勤無時不深乾愓寜待懸象著明始知戒儆然遇灾而懼罔敢不欽戒慎修省惟崇實政行在鑾儀衛早晚鼓角是日著停止一日以示撤懸齋戒我君臣當就常存之敬畏倍加謹凛益修實政即如朕省方所至戲臺綵棚龍舟燈舫俱可不必朕向來巡幸地方官惟修治道途此外一無華飾自乾隆十三年東巡該撫等于省㑹城市稍従觀美後乃踵事増華雖謂巷舞衢歌輿情共樂而以旬月經營僅供途次一覧實覺過于勞費且耳目之娛徒増喧聒朕心深所不取苐先期業經預偹今嵗恭遇皇太后萬夀兆庶亦藉以申祝嘏之忱是以俯順民情至朕待督撫有司惟因其能實心辦事令地方日有起色方加恩獎予而不知朕心者未必不以辦差華美求工取悦為得計將玩視民瘼専務浮華此風一開於吏治民風所闗者甚大嗣後尋常行幸槩不准行違者以違制論並諭中外知之乾隆十八年十月十三日上諭内閣曰朕巡幸經過地方所有道路橋梁自應照例辦理至道旁茶棚一項隨従官員原無暇憇息徒供僕𨽻人等蹂躪作踐而地方官又多此一畨預備甚属無謂嗣後俱著停止欽定南巡盛典卷二十五
