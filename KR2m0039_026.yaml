body:
  text: 欽定四庫全書欽定南巡盛典卷十五天章庚子直𨽻山東詩南巡啓蹕四疊前韻有序十六載溯懷繫念莫申蒼赤之誠三千里積悃就瞻難却東南之請矧清弱黃強之久悉復南坍北漲之夙期後海先河民事咨其大者由吳入越人情慰彼同然於是儀舉五巡循成例而禁申靡縟值此籌開七帙罷慶典而祝謝歌謡惟是蠲漕開科俾士庶各孚所願且更賜金發帑使上下勿耗其資兾連疆共紓望幸之忱而發軔正逮祈年之日韻經四疊體踵七言眷維扶鳯雲中感舂音而增悵爰此鳴鑾郊外隨里鼓以繼賡云爾髙齡遠馭慮勞辛色養由來關大倫乙酉以還罷斯役乙酉南巡回鑾以難聖母春秋日髙冉奉以逺蒞曾諭地方大吏向後不復有所請三年云滿舉重巡因之俞允諸臣請前歲江南浙江督撫以兩省臣民望辛並殷合詞申籲且言河工海塘亦必藉親臨指授遂允其請於今春舉行惟七旬慶典降旨停止仍普蠲漕糧開鄉會恩科以慰士民之願亦欲行觀夙願申憶昔回鑾攀戀衆江浙羣黎於乙酉回鑾時依戀之誠極為懇切余非不繫念實不忍訂以後期今匆匆十六年復舉巡典此日就瞻之民仍多昔日攀留之衆也即今露冕拊循民殷哉一體逸圖切小矣七旬慶典陳瞥眼歲華過十六迎人江浙逮書春戒奢崇朴例依舊撫景得詩事又新賡韻茫然失掖輦不禁把筆愴懷頻過盧溝橋撰吉啓行旌南巡第一程東風石橋嫩積雪野田明燈節煙村近韶年物象亨春氷猶未解元玉鏡光平良鄉行宫四疊舊韻璧薦祈辛發東道鼓鳴計里指南江初程不逺午前到饒得餘間對碧忩已不言勞厪衆勞或應諒弗為嬉遨徘徊景却異前度吟興何由得爾豪乙酉有言弗重幸乙酉南巡回鑾曽諭江浙督撫不再舉南巡之典民非悉喻吏知情何當十六年再舉豈我祝釐心弗誠節前燈火御營南觀罷清陪古月酣恰有盆梅一枝馥堂堂春信此先探郊臺迤邐向南程郊臺覿靣呈丙申斯再叩丙申歲阿桂等平定兩金川凱旋時仍視庚辰春兆惠等平定回部凱旋之例行郊勞禮但庚辰初創規模丙申則臺已甃成其舊設幄次者亦已為亭座矣孟月重去聲經行屢獲帡幪佑敢忘乾惕誠諸藩扈清蹕益切撫柔情𢎞恩寺三首招提枕路陲東道必經斯樹古難論古春時正好時佛原泯空色僧自重毗尼一十六年閲真如瞥眼馳下院分潭柘此寺為潭柘岫雲寺下院傳來守淨規未能忘有執佛以無著為宗即守律仍有所執著也却亦勉無私忍草向陽發禪枝帶籟披華幢及香鼎仍是聖慈施東廂有靜室熟路徑庭知步入齋牀撫坐來忩旭移朴淳原自好陳設此何為欲疊前畨韻前畨不可追涿州行宫作行館城南茲重去聲臨蕭然門徑窈而深嫩苔依砌才生色古樹鋪庭未張去聲隂撫舊迹惟增慨歎消餘間祗以清吟遙知南去江鄉景何日能忘此際心涿鹿行七疊前韻七言不似五言城短則近體長歌行於此恰宜歌涿鹿厯厯舊作書壁明城村民象胥溫飽獄訟不興任恤好籌治蓋亦弗出茲詎在求竒及誇巧不為已甚去其尤余於地方官民弊病有犯必懲從不肯顢頇了事然必不肯逆億苛求嘗有詩云不為已甚去已甚總不外此意也勉斯恆以喻衆稠省方展義率由此吉行五十清蹕留觀燈應節入夕收明朝遂與登程修紫泉行宫賜隨營諸臣及直𨽻各官食即席成什程非逺乃到斯早賜食同招大小臣亦有笙歌呈百樂却無酒醴事三巡晚來燈火觀先節都以歡娛答始春回部番官胥令預年班入覲之回部伯克及四川畨部頭目等並令扈隨數程俾得與觀燈節之盛輝光􅘈爽澤應均紫泉行宫十詠敞軒敞軒都不設忩櫺茲日於茲適可停略弗覺寒微覺暖尋思俶律正回青屏山堆石當門代屏扇一拳意亦具雄嶠襄陽設使驀逢此難作柴桑不折腰鏡湖滿浦水光尚未融為氷為水本來同唐宗喻别開生面三鑑意余都在中舫室舫廬傍岸却艱行一例篷忩映沼清安福遙知待淮浦不妨小試此先聲棕亭棕亭雅合隱淪居綴景因之此構諸步入自嫌衣履異欲詢構者意何如虹橋曲折扶欄接逺津豈虹為主豈橋賓世間名象率如此幻爾何曽信有真魚罾魚罾不啻幾遭吟曽未烹之試釡鬵設擬仲舒策中喻對之惟覺愧于心石徑不同蔣宅擬之三砧􅑇中間屧步堪我是小山招隱者漫訾捷徑此終南竹埭幾個猗猗埭畔扶但看節概逈然殊雲棲謾詡干霄翠為問斯非君子乎箭廳馬射依然步射廢自臂痛以來騎射尚可借馬力開放且有命中者步射則因左臂不能支拄久不作矣已看虛擲草年春箭廳猶自瞻簷額憶古微慙拊髀人降旨命免直𨽻厯年逋賦詩以志事經途例免十分三每巡幸經過地方免額賦十分之三昨已降旨豫蠲惟直省尚有積年偏災借出未完之項并令查明一體蠲免所弗經應澤並覃稔幸昨年逢以普災厪前歲被于南順德廣平大名天津迤南四府屬平前歲被災較重所有因災出借常倉榖八萬四千餘石折色銀九萬八千餘兩屯糧豈榖一千二百餘石概豫豁免俾無催科之擾豈無積欠勞追呼去聲率與豁除免負擔四府因災出借積欠銀榖全豫蠲除仍飭該督等實力妥辦俾閭閻均霑實惠咨爾長官勤撫字催科漫詡政能堪賜直𨽻總督袁守侗督軍兼理撫民事責重器資特簡諸中外久經勤敡厯淀河並賴善防疏直𨽻總督兼理河道守侗曽為河東總河故授此任葺修行館猶餘務保障京畿慎匪紓幕府一年凡兩易昨歲周元理因井陘聚衆抗官一案於縣官派纍激變袒護不問因罷其任以揚景素易之乃甫經數月而楊景素又忽以驟病不起既惜其材更難其選益厪為君之難耳掄材宅牧益愁豫趙北口行宫作煙宫向每此停驂門徑依然舊所諳展拓却看侵淀渚經營似擬肖江南趙北口舊有行宫􅀢地方大吏又於浦西拓置軒亭雖肖江南風景然踵事增華未免侵及淀池地靣較之前時眺覽清曠轉覺不及矣今來明去何須是踵事增華信不堪唱始兩人難重去聲問增置亭臺乃周元理楊景素所辦然過於增飾徒費物力使兩人若在本任必當嚴加申飭也未先諭祗自懷慙題湛持軒舊有書軒臨淀池紙忩木榻朴相宜隔溪點綴頗繁矣未識吾心湛以持懷清樓有會層樓我向名懷清雖云即景有深意滄浪寧渠喻玩水弊吏曰亷非我事九州四海奉大清胥俾懷之豈易致是必乾惕整君綱近悅逺來胥化被南巡茲詎圖逰遨省方所重惟施惠趙北口行宫西軒作西軒咫尺臨淀池忩俯清波渺萬頃向喜慿之吟吐詩恰合天水相與永别斯弗到凡數年來往吾胸愛清境茲來建置却殊前溪外亭臺修以整回廊宛轉遮髙低欲因騁目何由騁供觀煙火何須是費奢長此安窮逞况占淀池為陸地夏漲無所容堪省經始二人弗在斯在斯未必能逃眚行宫西軒俯瞰淀池渺瀰萬頃足資騁望是以冇天水相與永之額今周元理楊景素因欲供觀煙火添置亭臺廊榭既遮騁望更占淀池水道無益而徒滋繁費辦理實為不善二人設尚在本任未必能辭其咎也博喜徒增風景佳不喜翻謂煞風景趙北口行宫三疊舊作韻於意有不懌摛詞那得妍居停原似舊建置訝增前行宫浦西拓置亭榭既多勞費且風景逺遜昔時矣既往事弗究費多心為懸西軒偶慿憩殊異昔如船丙子年舊作冇虛忩依碧水不繫得稱船之句辛未南巡句郵籖記以明祀河酉歲詠釋奠子年評辛未南巡成詩二首後南巡三次皆未疊韻癸酉年因閲視永定河丙子年因撫定伊犁告功南闕里經趙北口二疊韻皆矣非南巡茲巡三疊舊韻亦閲草餘年來往誠如幼光隂迅可驚尚存問安室撫榻最傷情鄚州道中作俶裝計里發晨朝格淀長隄千里遙隄上春光何所似看他漏泄栁枝條漁村蝸舍大隄西東則平阡緑麥萋物象隨宜四時閲民艱到處一心稽土郭猶存古鄚州人家負郭頗稱稠年年四月集藥市鄚州每歲四月中廟市最甚其地為扁鵲里祀藥王祠凡各處地道藥材之至京城及北省市售者必集於此始發行風俗應從民便由思賢村行館再疊舊作韻思賢名為祀賢祠傍築齋堂宜非宜不號行宫曰行館用舊作第七句反其意欲求論息即論資御營繁重雖減費地方大吏以此地舊無行宫於壬午年添構數楹即可省備帶行營駝裝之力並可息傔從之勞且所增不過數處因聼之清暇徘徊慙考詩經以漢明學以宋述之足矣漫更為題毛公祠故里祀毛公傳詩正派通亦看連朴館誰弗曰行宫砌草蘇輕緑盆梅暈淺紅不教煙火設節間燈火惟十二至元夕而止又十九日為燕九節亦仍設之其十六至十八三日則皆命停止示有節也長此恐安窮紅杏園五疊前韻十六載重經不殊前稅輦平逺見樹籠知為紅杏館紅杏紅猶未物固因時顯東風鼓昭蘇蓓蕾仍遲展即境懷其人考古幾間遣厥後更稱誰東平云樂善景州行館即事言懷酉年行館備髙年乙酉南巡地方官以館數聖母髙年旃廬不及瓦屋之安適因於此建行楹以備憩息閲今十六年恍愡如夢實不堪追憶矣閲歲獨來意惘然八景豈重供懿賞一心無那付哀絃春秋十六空餘憶世界三千幻裏緣祗有夜深明月上碧霄朗照徹中邉景州行館八詠展義齋有暇臨斯常召見載咨諸大小臣工試思展義於何在不出數言夏諺中頤志堂堂名頤志更頤誰簷額猶存祗益悲合付睨而弗視耳夜深清夢或逢之通渌橋池中橋是不行舟渌水宛看左右流汲井或因工綴景率難問及水源頭淡懷室溫室居然溪水涯儻來一宿淡豫懷淡懷祗為去聲廑民隱寧為臨風琢句佳延月臺石為梯似洞天燭玲瓏亦隱嬋娟恰當過望輪遲上遂一登之意與延涵虛舫岸則幾楹肖舫式亦涵煙水亦乘浮遄然逸興飛白下老尹曾留不擊舟葆光洞石洞窈深號葆光葆光其意味來長詩云衣錦尚之絅文著由來戒發揚四照亭曲徑重茲履步尋坐來四照可供吟聖因一笠名同此西湖聖因寺行宫內有四照亭此亦如慕藺也想亦翹然待我臨微雪正月二十日邇日東北風情知應有雪雪弗雪皆可積素存郊埒西南廑河工阻流虞決裂昨十五日途經雄縣一帶東北風大因河工相距不逺恐逆風阻流曽降旨詢問阿桂該處是否不致氷凍施工是否尚易為力至今尚未覆奏行行入齊疆六花為飄瞥宿麥未萌芽亦無慮凍結未能忘逺愁聊以詠近悅胥因勤民務君職緣民設過德州浮橋即事造舟早是此為梁遵陸南巡茲俶裝北指趙疆猶未逺東經齊路乃方長已欣去歲登榖寶昨歲山左秋收極為臺稔撫臣奏報德州以南均九分有餘更看當春茁麥秧接覲諸臣隨扈駕暇應民務問之詳駐蹕德州行宫即事去由陸路歸水路發軔維舟總在茲構築行宫亦已久休停清蹕此惟時黔黎葵向誠堪喜江浙輿情率可知室宇依然景非昔每因把筆引悲思八依皇祖德州即事詩韻赤縣向平逺青齊入境初駐輿才卓午有暇更觀書仰繹虞歌意春溫勝秋肅所幸有收餘萬民率飽燠德州行宫即事有感疆吏延咨有餘暇厯觀題壁祇徨徊蹕停德水緣行慶舟發津門曽溯洄丙申年恭奉登陸聖母自天津水程安行至德州從容奉豫厯觀前題彌深追憶前度歡娛胥幻矣此番起憶亦徒哉丙申奉豫事猶近何事南巡此獨來降旨免東省逋賦詩以志事明知昨歲普豐收豈乏前茲逋賦留雖已經途例蠲免更廑欠欵細咨諏時巡經過東省已蠲本年額賦十分之三茲復加恩將四十二三四等年厯城等二十一州縣災緩未完地丁銀十三萬四千餘兩臨清等七州縣災緩未完常平榖二萬六千餘石社榖二千四百餘石麥種三千二百餘石概豫豁免俾民力益得寬紓概寬借廪榖和麥並豁窮丁縣與州庶使閭閻元氣復力田耕作兾登秋曲陸店行館疊丙申舊作韻曲陸原平陸始誰顛倒稱館因豫耆艾義屬祝岡陵孰謂一番御丙申春平定金川告功宜闕里地方大吏以此數程較長聖母髙年理安適特於此添置行館惹悲終古增徑庭自熟識榻席此重登觸景引繁緒無言祇拊膺迹前信已逝事後亦徒懲醇和堂再疊舊作韻平原縣行館內堂名醇和辛卯額堂名今歲全殊前歲情但使民風常似此無煩勗督慰斯誠正月二十三日聖母三周忌辰感成一律弗獲躬親謁泰陵凡至謁必先泰東陵祭奠泰陵故云三周倐至益悲增四回戊巳前猶述戊戌己亥兩年均二次親詣泰東陵謁祭與前此正同皇考大事時丁巳戊午二年各兩詣展謁典禮故有一遵丁戊例疏數敢逾吾之句一闕再期例亦仍丁巳八月督力皇考二周諱忌時李衛河為直𨽻總陳以禾稼在地且拒馬秋漲異常不能支橋故未得躬謁誠也泰陵然其後亦曽秋過拒馬河始悟李衛之言不今歲值聖母三以南巡啓蹕應於五月初旬至京方不誤殿試北郊諸典故不獲躬謁泰東陵撫今追昔情事略同益深感慕西北那堪凝望眼凄涼惟是恨填膺行宫多有奉遊句翹首瞻吟痛不勝賜山東巡撫國泰向稱去聲旬宣任今除鎮撫權大東資保障萬姓賴安眠李洞送中丞詩六州安撫後萬户解衣眠經理田功悉勤劬蹕路邉橋同梓建節國泰父文綬現任四川總督昨適入覲因諭令國泰星速來京俾其父子相見其善凛氷淵齊河縣行館三疊舊作韻祝阿復此一宵居行館逐程堪駐輿雖曰奉宸心切爾可知圖逸事慚豫庭前已閲三番景此間行館搆於乙酉春辛卯丙申及今凡三至此地壁上惟消幾幅書大吏小僚都扈蹕疊宣民隱細咨諸題晏子祠管晏從來傳並美管多實迹晏虛稱二桃艷説殺三士除暴雖佳機詐增西南風昨每東北風似於行程為順適今朝西南風却於行程為偏逆人情惡逆而好順好今惡昨豫情易豈其好惡異乎人緣有心中别籌畫河工今逮放溜時昨阿桂奏引河已挑至六分以上月內完竣即可開放若借西南風勢逼溜直射入引河實為事半功倍惟顒望喜音之至耳東北風阻西南射借勢供波歸引河事半庶幾功倍翕路塗塵壒乃其常西南企望喜音獲七依皇祖南巡過濟南韻昔曽一駐濟南城過弗入徒餘恨生戊辰春駐濟南此孝賢皇后于疾遂至不起因不忍復至其地後蹕途屢經率皆徑過􅜼至近塗祇嫌逺丗年别意未能平夏秋登以三農慶婦子寧還百堂盈何異向臨北闉見華不直峙鵲山橫填倉日作此日值填倉郊行厯覽詳幸民無菜色即我飽飢腸數上聲節忘風雅堆場有蓋藏千村逢此象額手為民慶宿長清縣行館行館新成舊辛卯年即有此恰當一宿程那忘憶昔念益切慕棬情有暇惟勤敕安民戒屢更因思弊吏法未易曰長清靈巖寺五疊前韻事用長卿後知誤向以劉長卿靈巖寺西入石路為即此處曽用長卿韻凡四疊丙申春駐此偶檢劉詩題乃過林麓山寺詩中復有湘水語知在楚南所作前此以其亦係西入石路遂致沿訛因作詠事詩辨定之迹傳元奘昔稱靈原由西入非其路長卿尚自右存是此亭元奘院柏又經三載别丙申東巡曽駐此山泉仍俯一泓渟今宵小駐明朝去無暇呼僧參色形六題靈巖入景巢鶴巖髙士此山當日開巢居雲有鶴相陪方山本異遼東境丁令知他何事來甘露亭小亭泉上俯石竇甘露為名樂泌洋不涉世間稱瑞事皇山應笑米襄陽卓錫泉卓錫猶傳經佛圖六神通越世間無雖然更有欲咨者四句金剛亦識乎謂全剛經色見聲求四句偈摩頂松西枝東指是誰為僧自歸來松豈知設以此傳元奘異質之元奘定遭嗤鐵袈裟鐵否石乎半信疑伽梨路畔是誰遺朗公設向澄公問一笑還成兩不知白雲洞牝洞偏居絶頂峰蕼然小坐膝堪容攀躋早是人艱到漫倩白雲一片封雨花巖維摩室裏文殊問曰致曼陀落雨知有著者還無著者天花未免涉分疏愛山樓七景錯羅行館外一樓迥據石牆中愛山原括其餘矣却以慿忩靜會通宿方山我宿方山率有詩此來七字可無之承歡侍笑嗟非昔抹月批風又一時勝處忘憂那能忘去聲箇中宜詠信相宜厯年舊作聫新句補闕聊因勉綴詞詣岱廟瞻禮前歲丙申維新奉祝釐何當獨謁值今斯代天出震惟生物行令巡南致叩寅漢柏唐槐都好在佑民福國賴延禧於心更復無他籲所籲屢綏晹雨時體元堂疊丙申韻書堂仍此駐責實愧循名本是承歡處云何成獨行對其景如非咎我祝非誠舊作有還申介夀誠之句觸緒無佳會摛詞多戚情便程宿此夕啓駕定於明設論體元義羲經訓已精過泰山十依皇祖詩韻六十一年君道煥髙如泰岱孰齊頭仁心仁政恆垂永實行去聲實言務去浮峻極至今存七字鴻庥萬古被諸州不禁即境增鑽仰從實末由意遲去聲留十全今果酬前韻丙申登泰山有十全有待再吟留之句今果十依皇祖元韻惟彼時作詩之意弗獲如願不堪追憶亦不忍仰瞻耳睨弗視之祗俯頭豈謂祝釐誠未久旋成永别幻如浮徒因民願巡吳郡便以途遵過嶽州四字賡來各已草再經不擬重去聲詞留四賢祠行館逐程行館足盤旋傍有叢詞祀四賢恰喜昭蘇方孟月忽驚俯仰異當年稱其孫復石介應聲耳略彼孔道輔胡瑗異趣焉論古由來戒深索欲長善善此思旃渡汶河再疊壬午舊作韻夾岸萌青有嫩蕪方春醖釀未云都長橋猶是卧波接兩界何曾隔省殊迎蹕民情親且切鳴鞭途景直非紆西流分水各南北濟運真資奕世模於中水行宫作行館成辛卯再題憶丙申斯來乃三度往事祗增顰飲恨無能避承歡何處循顔齋曰致本向所題行宫內齊名致本在思親麥色麥色南來日日深嫩青新緑露珠斟潤因消盡融融玉暖以催成簇簇金奚啻鳴鞭悅乎目真教亞壠愜於心黔黎隨馬相蹂􅏳不忍禁去聲之惜不禁至泉林六疊舊作韻韻賡六疊來七度昔歲今時厯厯明最絶塵區石泉泌無雙畫境曉春晴砌苔向日暖相送庭樹識人意與迎欲罷不能勉摘句東廂瞻望若為情丙申曲阜近瞻禮弗重去聲蒞因徑此來原有在川留聖迹可無一宿寓翹陪山容水態誠佳矣箋擘毫揮却懶哉明曉便當催轡去耽乎勝景漫遲徊賜扈蹕及山東大小諸吏食因得句晦日韶春馬上逢泉林勝處駐鑾重適因到早羣僚召聊以酬勞扈蹕從雖是笙簧有雅奏未如山水足清供翰臣賡韻原常例沈宋寧須較景龍七題泉林行宫八景近聖居行鑾復此駐春朝闕里西瞻路不迢占畢孰非近聖者得門或寡漫逍遙在川處此處猶傳子在川如斯不舍幾千年會其趣寓會其理豈是尋常賞石泉鏡瀾榭不波得照波艱照水榭云何稱鏡瀾程子書明詮此理靜中定合動中觀橫雲館月漾廊圍三加館北堂咫尺昔棲遲館北為駐宿聖母昔年所那能撫景成新賞真是望雲引舊悲九曲彴卧波長彴曲成九夾岸緣楊若相去聲招問景莫嫌屧步逺越因曲折越神超柳煙坡嫩緑初看拂籟輕春煙一片忽來撗設無此意為搖蕩窣地長條有底情古蔭堂樹古由來蔭亦古銀雲櫛櫛滿庭鋪重經此復引遐想種樹人還識此無紅雨亭茲來復匪放花時亭畔徒看突兀枝恰合明晨清蹕去對紅雨或引嗟咨雨二月朔日徹夜隂晴互相間去聲泉昨夜駐林雨絲雪粒曉來濃晨寒颯颯輕輿度午暖􅓴􅓴沿路逢時密時疏霑四寸是日行經費縣自寅至未先雪後雨疏密相間詢之國泰云入土四寸於麥苖大為有益既優既渥悅三農最髙自合氣凝冷玉積蒙山三兩峰望蒙山四疊舊韻雪而繼雨不同同謂勝前番此度中乙酉望蒙山有將謂其雱昔歲同不期孤望此行中之句以前三度經此皆遇雪乙酉則正望澤也此次則雪從繼雨且入土四寸尤為霑足不特逺勝乙酉并逾前三度矣望澤未深真及節以亨當去聲可是為蒙翠圍野郭均各潤素積遙巒弗動風此實應欣愁則底合龍忽繾速成功昨阿桂等奏引河工程已有八分河水一經蓄髙月內即可開放以為堵合之計今已仲月之朔而喜信尚未至繾望因之益切耳注經臺行館六韻幾宇叢祠野甸隅康成往迹試評乎賈生以後殊董子漢儒首稱賈董然賈以治安策董以天人三䇿及春秋繁露未嘗注經也其餘注經家史稱其守文之徒滯固所稟異端紛紜疑而莫正惟康成括囊大典網羅衆家刪裁繁誣刋改漏失自是學者略知所歸云云是康成在漢儒中最為有功經學以視賈董正復難為優劣也秦火之餘賴漢儒一室操戈多異論出奴入主不同趨網羅喜爾猶精核囊括刪他有薉蕪學者識歸洙泗路行人欣遇費蒙途何來館舍於傍建不説事成深慙去聲吾萬松山行館駐蹕作北則田盤南則杭一為佛守盤山萬松寺一為嶺西湖萬松嶺此山亦名曰萬松柏多松少名弗稱叶循名責實夙性然更因齊物觀平等細尋童童祗兩株亦覺落落宜新境有招提弗事莊嚴傍為行館朴而整乙酉於斯乃初駐十六春秋過以猛幾餘小坐慿昔窗一聲定磬發清省晴邇日每作雲郊行覺隂寒徐看緑野潤麥苗抽翠攢今曉雲散淨扶桑湧朱丸宜㿩同農慰利旋知衆歡一念弗已為去聲諸務因民觀傍午頗覺暖遂與易征鞍露冕愜瞻願老幼隨並肩固知非強為如保心益磾問官里行館詠事郯子當年魯附庸郯子朝魯後人遂以為魯附庸其實不見經史蓋如任與顓臾之屬耳那能近百里提封附庸不能五十里今自問官里至郯城幾及百里則郯之提封安得如許之廣且所云問官里亦未必果即此地或後人遷就附會未經核實耳廟朝少皥官述悉園去由旬里計重梵經四十里為一由旬何事邉傍行館築更兼點綴曲池溶雖云圖省駝裝費上四次南巡經注經臺問官里均御行營茲該撫復於兩處添搆行館雖以駝裝省費為辭然因一宿又煩添建兩行館於心究未釋然也舍欲為辭愧鮮悰郯子園再疊舊作韻今朝駐魯境明日入吳墟郯子名猶在金天迹緬餘園因述古彼館以憩春豫淳朴為佳矣華紛奚事諸惟民之切耳是我所殷於有暇慿棐几成吟即便書欽定南巡盛典卷十五
