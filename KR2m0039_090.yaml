body:
  text: 海塘乾隆二十九年二月二十五日莊有恭熊學鵬奏言竊照浙省仁寧一帶海塘上厪宸衷今封印內事務稍簡臣莊有恭於正月初十日起程赴浙㑹同臣熊學鵬率領海防道永德於十二十三等日先至尖山周遭履勘沙面漲髙丈尺較前奏報時約略相同竹簍壩身俱甚堅固回至陳文港等處查勘新建之魚鱗石工皆各如式堅固足資捍禦惟海寧城東之念里亭汛內第五十四段六十四段六十六段城西之戴家橋汛內第三十三段三十四段四十五段七十二段大石塘外從前原未建有坦水地當衝要亟應估築坦水共計工長一百七十七丈七尺俾令一律完整臣等沿途查勘有現經改修之緩修石塘拆存舊石堆貯在塘當即飭將此石先儘凑用其應釘樁木及應添石料工價另行核實造具細册報部時届春汛即遴委妥員分段趕築以資捍衛臣等復由海寧城西取道查勘老鹽倉一帶石柴塘工并細察沙水形勢本年正月初七至初九日雨雪較大新漲嫩沙有刷低者其塘外漲沙仍屬綿亘一切柴塘竹簍並無低矬游缷之處俱極平穩所有臣等㑹勘海塘沙水情形謹與上月比較另繕清單恭呈御覽奏入報聞乾隆二十九年十月初二日莊有恭熊學鵬奏言竊照海塘工程雖慶安瀾而塘外沙水每無定勢欲籌預備之道當思固本之謀臣等於上年正月內曾經奏請動銀一萬兩預備條石又動銀一萬兩預備柴薪荷䝉聖恩俞允逮至秋間適遇風潮應時濟用甚為有益查條石除上年改建大石塘動用外尚餘三千丈石料柴薪除接築塘工及上年嵗修動用外存剩無多今臣等㑹勘西塘之老鹽倉一帶東塘之韓家池一帶及各處盤頭等工本於沙上水邉壘土鑲築而成其在保固限外者閲時既久已有矬蟄若冬間再經雨雪則春汛蟄必更多臣等仰體我皇上慎重海塘有備無患至意查現在時届秋深正落實取材之候請動支海塘經費銀五千兩行令産柴各縣陸續運至工所臣等督率海防道永德查明應修應鑲各工分别多寡核實動用餘剩之柴加謹堆貯以備不時之需歸於嵗修案內報銷又查有戴家橋汛內之第七十段第七十八段鎮海汛內之城東第二段城西之第十段念里亭汛內之第五十五段五十六段各工內有係大石塘而未建有坦水今護沙漸刷塘身已露十五六層應建坦水以捍護塘腳者有舊建坦水厯年久逺樁木殘朽石料矬缺應添樁加料者有本係盤頭舊基今應改建坦水者俱應於霜降水落後及時修建臣等與該道在工相度情形分别多寡丈尺面經指示該㕔辨另造細册確估工料分别題咨辦理所有酌籌商辦緣由恭摺具奏奏入報聞乾隆二十九年十月二十九日莊有恭熊學鵬奏言竊照仁寧二縣海塘工程沙水情形應行按月奏報兹據海防道永德將九月分望汛情形禀報到臣臣熊學鵬隨往覆驗查得西塘念股頭沙尖及翁家埠等處新舊漲沙並東塘陳家塢一帶嫩沙均與前月無所增減而尖山壩外漲沙及壩外竹簍較前次奏報時多有漲漫之處正溜南趨􅄵身照前堅固看此北岸沙勢情形霜降以後尚可望其逐漸加增至南岸之蜀山􅑐峯河莊等山下沙勢此一月來俱有坍缷若得從此日漸汕刷則彼坍此漲於北岸塘工更有禆益至上月臣等奏請修建之戴家橋汛等處坦水工程據各工員辦料齊全現在上緊趕辦十月內俱可一律完竣又查念里亭第九十二段東西俱係魚鱗石塘中間有緩修石塘二十九丈年久樁朽塘腳虛鬆塘後土創蹲矬急應預為修整隨與該道㕔悉心商酌趁此冬令水涸之時現有存塘條石足敷應用應將此緩修舊塘二十九丈改建魚鱗石工以禦來年春汛現飭該道等遵照辦理並將應用夫工樁木等項撙節估辦照例造册報部核銷其餘一切柴土石各工俱極平穩臣等謹查明上月沙水比較另繕清單恭呈御覽奏入報聞乾隆二十九年十一月二十八日莊有恭熊學鵬奏言竊照仁寧等縣海塘工程沙水情形欽奉諭㫖兩月一次繪圖恭進兹據海防道永德將十月分望汛情形禀報到臣臣熊學鵬隨往覆驗查得西塘念股頭沙尖及翁家埠等處新舊漲沙並東塘陳家塢一帶嫩沙與前月比較微有增減而尖山壩外漲沙及􅄵外竹簍較前次奏報時均有漲漫之處正溜仍向南趨􅄵身照前堅固其南岸之蜀山河莊巖峯等山下沙勢此一月來較有坍缷看此南岸坍缷情形若得日漸汕刷則彼坍此漲於北岸塘工殊有禆益至臣等奏請修建之戴家橋汛等處坦水工程及念里亭改建魚鱗石塘據各工員陸續禀報開工現飭上緊趕辦完竣再查通塘險要處所塘外坦水有接築至三四層不等海寧縣南門外繞城塘工近日形勢頂冲汕刷內有二層坦水六十餘丈樁木髙懸必須於二層坦水之外加築一層以資鞏固臣等㑹商應趁此初冬農隙天時晴暖之候添築三層坦水六十二丈以禦來年春汛核計工費無幾當經飭委杭州府知府劉純煒領辦興工并將應用夫工樁木等項撙節估計照例造册題報送部核銷此六十二丈之外如有續經刷露者臣等當即隨時親赴勘明照此辦理其餘東西兩塘一切柴石土各工均極平穩臣等查明上月沙水比較另繕清單繪圖貼說恭呈御覽奏入報聞乾隆二十九年十二月二十八日莊有恭熊學鵬奏言竊照仁寧二縣海塘工程沙水情形例應按月奏報兹據海防道永德將十一月望汛情形禀報到臣臣莊有恭自蘇前赴海寧於十一月十九二十二十一等日與臣熊學鵬㑹同察勘查得東西兩塘新舊漲沙暨海中新漲嫩沙與前月比較沙形有增髙處其長寬丈尺無所增減惟尖山壩外漲沙及壩外竹簍較前此奏報時微有坍漲現届冬令潮平􅄵身照前鞏固至臣等奏請修建之戴家橋汛等處坦水及寧邑繞城塘外之六十二丈三層坦水工程已據各辦員呈報完工查勘如式堅固足資抵禦其六十二丈之外間有沙汕樁髙尚須築坦添樁以資保衛者臣等並即指示道㕔飭令確查丈尺詳報撙節估計一體照辦又念里亭改建之魚鱗石工二十九丈亦據辦員築壩開工上緊儧辦計嵗內可以一律完竣其餘一切柴土石各工均極平穩再查華家弄迤東老鹽倉一帶柴塘外竹簍間段雖有破損俱在限外理應請修但現在漲沙日漸增髙內有底簍全護止露面簍一二尺者更有底面二簍全行沙護者臣等相度該處情形㑹同商酌所有破碎竹簍既經沙護足以保護塘身現在只宜將露石堆砌整齊似可毋庸估修糜費帑項仍隨時察看如有沙走應修之處核實再行陸續估辦不致遲悮所有臣等查勘通塘平穩情形并查明上月沙水比較另繕清單恭呈御覽奏入報聞乾隆三十年二月初四日莊有恭熊學鵬奏言竊照仁寧二縣海塘工程沙水情形欽奉諭㫖兩月一次繪圖恭進兹據海防道永德將十二月分望汛沙水情形禀報到臣臣熊學鵬隨往覆驗查得西塘新舊漲沙暨海中新漲嫩沙與前月比較長寬丈尺均無增減其東石塘外海中新漲嫩沙自本月望汛以後較增漲長五百餘丈尖山壩工仍照前堅固至臣等奏請修築之念里亭改建魚鱗石塘二十九丈已據辦員紹興府知府鄒應元呈報完工經臣熊學鵬查驗如式堅固足資捍禦其寧邑繞城塘外地當頂冲所有應須添釘樁木之坦水三十餘丈及現在舊坦之有殘缺者及時修砌仍於單層樁木之外加釘排樁一路以護塘根俾禦來年春汛另將工料銀兩據實報部查核其餘一切柴土石各工俱極平穩并查明上月沙水比較另繕清單繪圖貼說進呈御覽奏入報聞乾隆三十年閏二月二十日嚮導大臣努三奏言查二十七年原係將第一標記設立在方竹簍第二標記設立在第一長竹簍第三標記設立在第六十七長竹簍今淤沙因較前漲滿改制將第一標記仍設立在方竹簍第二標記設立在第四十個長竹簍第三標記設立在第八十個長竹簍第四標記設立在一百二十個長竹簍臣努三將建立標記交明西海塘同知彭元煒千總魯禹文外將原建立標記漲沙尺丈新建立標記漲沙尺丈另繕清單恭呈御覽奏入上諭曰交熊學鵬照新定標記辦理第一標記方竹簍計四層共髙八尺漲沙髙四尺八寸五分簍露三尺一寸五分今查得漲沙髙九尺較比二十七年漲沙髙四尺一寸五分沙護一尺第二標記長竹簍第一個計三層共髙一丈二尺漲沙髙七尺七寸簍露四尺三寸今查得漲沙髙一丈三尺較比二十七年漲沙髙五尺三寸沙護一尺第三標記長竹簍第六十七個計三層共髙一丈二尺漲沙髙三尺七寸簍露八尺三寸今查得漲沙髙一丈一尺五寸較比二十七年漲沙髙七尺八寸簍露五寸新定第一標記仍立方竹簍計四層共髙八尺漲沙髙九尺沙護一尺第二標記長竹簍第四十個計三層共髙一丈二尺漲沙髙一丈一尺七寸簍露三寸第三標記長竹簍第八十個計三層共髙一丈二尺漲沙髙一丈一尺二寸簍露八寸第四標記長竹簍第一百二十個計三層共髙一丈二尺漲沙髙一丈一尺二寸簍露八寸乾隆三十年四月二十三日熊學鵬奏言竊照仁和縣境內海龍洋沈家埠曹殿荆墟廟四處曾經前任督臣德沛於乾隆四年間試築樣塘四段計二十丈届今二十餘年虛懸於柴塘之後形若贅疣本年正月內恭逄聖駕臨塘閲視欽奉諭㫖拆缷將石料抵别工之用仰見我皇上洞燭機宜俾無用歸於有用禆益甚大臣當即欽遵飭令布政司永德海防道劉純煒督押辨兵按段拆卸兹據禀報拆竣臣臨工逐一看驗查得前工原建十八層共用條石二千三百三十三丈零迄今拆出長三尺至五尺寬一尺至一尺二寸厚九寸至一尺一寸堪作魚鱗石塘工用者計條石一千四百五十一塊共長五百三十六丈九尺九寸拆出長二尺四寸至五尺寬一尺至一尺三寸厚六寸至一尺堪作坦水工用者計條石四千三百三十九塊共長一千三百八十三丈七寸其年久碎斷零星石塊約一尺及尺餘二尺不等堪作填砌竹簍工用者共長一百二十二丈四尺臣查現在欽奉諭㫖添建海寧繞城石塘外坦水四百六十五丈七尺所有應用石塊即以此內堪作坦水之條石添砌堅而且大且可省另購條石一千三百八十三丈七尺之費其堪作魚鱗石塘之條石仍行堆貯工所俟將來遇有應用時奏明動用其餘散碎石塊隨時察看遇有竹簍內應行填砌之處及時填砌臣謹逐一分晰飭交永德劉純煒遵照辦理除咨部備案外理合將拆卸樣塘分别抵用緣由據實具奏奏入報聞乾隆三十年五月二十一日熊學鵬奏言竊照仁寧二縣海塘工程沙水情形例應按月奏報兹據布政司永德海防道劉純煒將四月分望汛工程沙水情形開報到臣臣隨親往履勘查得西塘翁家埠海中新漲嫩沙較前間有刷低但貼近塘腳之處仍有隂沙墊起其東塘陳家塢海中嫩沙較前查有增漲又尖山石壩外漲沙業已漲至塔山腳根較前漲髙自五寸至一尺不等潮溜日向南趨壩身愈資鞏固其餘南北兩岸沙勢均與前奏相同所有一切柴土石各工查皆平穩至海寧縣繞城石塘外遵㫖添築三層坦水四百六十五丈七尺并修補二層舊坦各工據海防道劉純煒禀報於四月初十日通工一律完竣臣與布政司永德先後往驗石大樁固釘砌緊密悉皆如式足垂永久再查海寧縣城迤東鎮海汛第十段魚鱗石塘東西兩頭俱建有坦水二層中有五十丈塘外向係舊塘基拆卸年久未曾建築坦水今此段塘身業已露髙十七八層不等臣與在工道㕔等將舊塘基沙內留餘碎石細加檢驗除破損小石不堪用者外尚有大塊石計五十五方以之添凑新石補築二層坦水保護塘根東西交接歸於畫一俾禦伏秋大汛於塘工甚有禆益除飭該司道督令委員上緊趕辦並將估計工料造册送部查核遵例另行題報外謹將現在查勘工程平穩情形及添築鎮海汛二層坦水五十丈緣由並查明上月所報沙水逐一比較另繕清單恭呈御覽奏入報聞乾隆三十年九月初一日熊學鵬奏言竊照浙江布政司覺羅永德於乾隆三十年五月十六日奏請將西防同知移駐翁家埠一摺於六月二十三日奉到硃批交撫臣聽其議奏欽此臣查浙省仁寧二邑江海塘工向設東西兩海防同知分任修防其東塘同知經管寧邑之戴家石橋起至尖山外談仙嶺止八十七里塘工該同知駐劄海寧縣城所管工段得以就近照料惟西塘同知經管仁邑之八仙石起至寧邑之戴家石橋止八十五里塘工該同知向未建造衙署乾隆十九年間經前督臣喀爾吉善將省城內裁存織造府司庫空閒房屋一所報部撥給居住遇伏秋汛期令其在工賃屋防護今布政司永德奏稱海防㕔員責任甚巨人地不可相離查西防同知所管工段內翁家埠地方西距八仙石五十餘里東距戴家石橋四十餘里正在適中之區該處現有從前奉裁營署空閒餘地請將西防同知省城官房確估變價在翁家埠建造衙署使該㕔常住工所其所管東西兩頭塘工皆得就近隨時相機料理一切防護搶修呼應得靈臣查西防同知經管江海塘工而老鹽倉迤西迤東一帶工程現在更為緊要翁家埠離老鹽倉一十五里相距甚近雖該同知於伏秋等大汛係在工賃屋居住然衙署眷屬既在省城究不若常住工所之更為専便且於仁邑八仙石一帶寧邑戴家石橋一帶亦係適中之地似應如該司永德所奏准其移駐以重汛守查翁家埠原有海防右營守備衙署乾隆十三年將守備移駐南塘其署房亦即拆變抵為南塘備署工料之用現存空閒基趾今據海防道劉純煒勘驗詳報該同知所住省城衙署估值價銀八百兩若以此項價銀於翁家埠舊存守備衙署地基改造同知衙署儘足敷用在該同知既得棲止有常於塘工實有禆益臣復親往勘驗無異如䝉聖恩俞允其應建衙署房間數目及需用一切工料另行撙節確估造册報明工部查核臣謹遵㫖議奏奏入上諭部知之乾隆三十年十月初七日莊有恭熊學鵬奏言竊照仁寧二縣一帶海塘工程沙水情形例應按月奏報兹據布政司永德海防道劉純煒將八月分望汛以後情形開報臣熊學鵬於二十六七等日親往海塘覆勘查得本年自七月望汛以後雨𤾉時若並無風潮即間有東南風亦不甚大是以一切北岸工程在八月大汛之期均獲平穩西塘翁家埠塘外海中新漲嫩沙較前奏報時增漲長二百一十丈東塘陳家塢中沙迤東相近塔山處所又增漲長五百六十丈并有隂沙墊起直接塘根沙勢較前更為綿亘其尖山壩外漲沙髙過竹簍自三尺至一尺六寸不等沙形日漲增髙壩工愈資鞏固至老鹽倉鐡牛盤頭等處柴塘外竹簍前因查有損缷經臣等奏明先將缷出石塊堆砌完整一面趕辦竹石俟秋汛過後通查明確分别更換今臣熊學鵬與劉純煒逐段履勘統計竹簍工長一千三百四十五丈內有底面已經漲沙漫蓋者有石塊現在理砌完整者均足以保護塘根抵禦汛水毋庸再行拆換轉致震撼徒資糜費其林茂舍迤東至石塘頭止內有三百二十四丈查係保固限外之工日久竹朽石缷勢當沖要應行及時修整以禦來年春汛其有舊石抵用者即將舊石抵用其應需添備物料已據各委員趕辦齊全現届小汛就經催令分段開工上緊趕砌撙節辦理約九月內均可一律完竣除飭將需用工料核實造册送部核銷並照例題報外臣等伏查每年七八月間潮水旺發北岸沙勢俱有坍缷今春仰䝉皇上閲視海塘指示訓誨厯黴伏秋三汛浪靜風恬正溜南趨一切柴土石工程較前更加平穩其北岸沙勢據在工員辨沿海兵民咸稱自開北亹以來從未有增漲至此者莫不感頌聖恩共相慶幸輿情歡忭之至謹恭摺奏聞再查七月內繪圖以後應於九月底始行繪圖今因東西兩塘沙勢大有增漲是以敬謹繪具圖說並查明上月沙水比較另繕清單進呈仰慰聖懷嗣後仍遵例兩月一次繪圖合並陳明奏入報聞欽定南巡盛典卷五十九
