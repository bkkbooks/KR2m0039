front:
  text: 欽定四庫全書欽定南巡盛典卷三十恩綸
  hash: sha256:929f0d78b03b2efaa35337deca4404c8f0beba980de9be7d2a63c8f2c07d56a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_042-1a, image: WYG0658/WYG0658-0492a.png}
body:
  text: 乾隆四十八年正月十五日上諭內閣曰兩江總督薩載浙閩總督富勒渾等合詞呈奏以江浙兩省臣民望幸情殷且河工海塘以次告竣一切善後事宜尤兾親臨指示懇請於乾隆四十九年春六舉南巡盛典以愜輿情一摺朕自庚子南巡時髙家堰石塘及徐州城外石隄巨工俱逐一親臨指示兹據奏以次告成所有一切善後事宜自應蒞閲視指授機宜俾河流永慶安瀾至浙省海塘前經降旨將柴塘二千四百餘丈一體改建魚鱗石塘為海濵羣黎永資捍衛今要工將竣亦不可不親為相度且自四十一年告工闕里後閲時已久應行展謁孔林以伸景仰今據該督撫等合詞呈奏江浙兩省耆庶望幸忱悃尤為肫切著照所請於乾隆四十九年正月諏吉啓鑾祗謁孔林巡幸江浙順道親閲河工海塘所有各處行宫座落俱就舊有規模略加葺治毋得踵事增華致滋繁費該督撫等其善體朕意妥協辦理副朕省方問俗觀民孚惠至意摺并發乾隆四十八年九月二十六日上諭內閣曰朕明嵗南巡一切行營供頓俱預期頒發帑金交該督撫備辦從無絲毫擾纍閭閻但恐各督撫不能仰體朕意致滋糜費如現在盛京途次見有搭蓋買賣街席棚即此一節亦屬多事隨從之官員人等其日用所需聼其自便每嵗木蘭行圍何嘗官為預偹並未缺少食物且添此席棚恐差竣後不肖屬吏冒濫開銷在所不免朕明春巡幸自直𨽻以至浙江著傳諭各該督撫不得隨營預備買賣街支搭棚厰以滋無益之費至此次令阿哥等隨行者原令左右隨侍知朕年逾古稀未嘗少懈而扈蹕諸大臣亦皆恪恭敬事管束嚴明此令阿哥等觀看之意也該督撫等務須循照上數次之例辦理差務行所無事總以節儉為主不得因有阿哥隨行稍為添設預備再各省鹽政織造關差皆係內府世僕知公主隨行係朕所踵愛或進衣服食物以博朕歡殊不思服食玩好宫中何物蔑有豈藉外間呈進著一併傳諭飭禁伊等係內務府人員尚不許稍有進獻至督撫為封疆大吏又何得效尤及此耶著將此傳諭知之乾隆四十八年十一月初四日上諭內閣曰朕于明年正月十一日啓鑾巡幸江浙閲視河工海塘所有應行事宜各該衙門照例預備乾隆四十八年十一月十三日上諭內閣曰朕明春南巡著照從前之例於江浙二省冬兑漕糧內各截留十萬石在水陸駐蹕地方分厰平糶即令漕運總督及各該督撫妥協辦理該部遵諭速行乾隆四十八年十二月二十一日上命軍機大臣傳諭兩江總督薩載湖北巡撫姚成烈等曰昨據舒常奏安南國賫進謝恩奏表使臣黃仲政等於十一月十八日由水路經過長沙省城等語因令軍機大臣查核厯次該國使臣行走程站日期約于明年閏三月內方可到京彼時距回鑾之期尚逺該使臣等未免守候需時不若令其由湖北取道江西安徽前赴江寧祗候於閏三月初旬駐蹕江寧時令其在彼就近瞻仰該處為省城都會之地且行宫宏厰賜宴亦屬妥便著傳諭姚成烈即遵照傳知護送委員併咨沿途各督撫於該使臣到境時一體委員交替接護并扣算程途先期數日令其抵江寧亦不必太早如該使臣等於到江寧後仍願赴京貿易再加恩俯從其便將此諭令薩載等知之乾隆四十九年正月初六日上諭內閣曰朕今嵗巡幸江浙原擇本月十一日啓鑾但節候在立春以前天氣尚寒著諏吉於二十一日啓鑾同日上命軍機大臣傳諭直𨽻總督劉峩等曰此次巡幸江浙業經降旨諏吉於正月二十一日啓鑾彼時已過燈節所有直𨽻山東備用煙火俱不必預備將此傳諭劉峩明興知之乾隆四十九年正月二十三日上命軍機大臣傳諭兩江總督薩載湖北巡撫姚成烈等曰姚成烈奏安南國使臣於二月初旬可出楚省之蘄州境復自江西安徽等省從容前進務令於三月杪閏月初間行抵江寧等語朕此次駐蹕江寧計在閏三月初十日該使臣若於三月杪閏月初間到彼祗候途次未免匆迫祗須飭令伴送人員途次緩程行走於閏三月初五六間行抵江寧省城祗候瞻覲更覺從容著傳諭姚成烈即遵照辦理並諭薩載知之乾隆四十九年正月二十三日上命軍機大臣傳諭衍聖公曰衍聖公孔憲培現在制中到曲阜時並其本家官員人等毋庸賜宴並著於中水地方送駕乾隆四十九年二月二十三日上諭內閣曰朕清蹕巡方順時行慶而矜恤庶獄厪念尤深宜沛德音用敷愷澤所有江蘇安徽浙江三省軍流以下人犯俱著加恩各豫減等發落用昭肆眚施惠至意乾隆四十九年閏三月十五日上命軍機大臣傳諭直𨽻總督劉峩等曰現在隨駕之蒙古王貝子等至揚州即令其先行各回本處前因薩載與伊等係同在御前行走之人聼其致送紬縀土儀俾盡同僚交誼至劉峩明興與伊等素無交往不可因聞江南曽有贈送亦或踵而行之斷乎不必况彼等已由揚州先回遊牧尤非隨駕可比更不應有餽送將此諭令知之乾隆四十九年四月初七日上諭內閣曰朕巡幸江浙慶典覃敷於庶獄尤深矜恤業經降旨照厯次南巡之例將江浙二省軍流人犯減等發落但念山東直𨽻二省現在缺雨農田望澤維殷清理庶獄亦可感召天和所有該二省軍流以下人犯亦著一體加恩各豫減等發落用普仁施以期甘霖速霈欽定南巡盛典卷三十
