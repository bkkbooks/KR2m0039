body:
  text: 欽定四庫全書欽定南巡盛典卷五十六海塘乾隆十四年十月二十日閩浙總督喀爾吉善署浙江巡撫永貴奏言竊照浙省錢塘江接連海洋潮汐經行之所分南北中三亹水行南大亹則南岸塘工受險水行北大亹則北岸塘工受險康熙年間江流盡歸北大亹仁和海寧二縣頂衝極險經聖祖仁皇帝親臨相視指授機宜復蒙世宗憲皇帝暨我皇上先後興舉大工幾經籌畫大費帑金城社民生均獲保全茲于乾隆十二年秋間江流忽趨中小亹現在潮汐經行深通暢流北岸仁寧各縣塘工之外漲沙綿逺盡成腴産沿海各郡永免衝激之險並享地利之益實千載難逄之㑹也兩浙羣黎既感三朝保護之恩且欣遇景運適逄之會羣情踴躍咸望皇上臨幸浙省閲視海塘紹聖祖時巡沛澤之盛典奠萬年鞏固之鴻圖俾海若效靈安流順軌兩浙民生從此永享安瀾之福實為慶幸臣等身任地方目覩民情歡欣鼓舞激切抒誠不敢壅於上聞奏入上諭部知之乾隆十六年正月二十一日兵部尚書舒赫德閩浙總督喀爾吉善署浙江巡撫永貴奏言乾隆十五年十二月十二日奉上諭浙江海塘為捍衛民生要務朕明春巡幸浙省意欲親臨閲視著尚書舒赫德於江南審訊事畢之日即赴浙江會同該督撫等查看豫備奏聞欽此臣舒赫德并奉內廷發交海塘圖一張令將看過海塘應由何處行走於圖內簽明具奏臣喀爾吉善臣永貴於十二月二十五日接准部文一面籌畫預備事宜一面候臣舒赫德到浙㑹同勘定詳悉奏聞兹臣舒赫德於正月十六日抵浙臣等㑹同先赴海寧一帶閲看海塘復渡江至赭山閲看中小亹臣等謹看得浙江海塘土石巨工均在自省至海寧縣屬尖山一帶康熙雍正年間水行北大亹之時此一帶海塘處處均屬至險逮後塘外漸漲沙灘潮汐江流日徙而南乾隆十二年水歸中小亹北岸漲沙一望無際非秋汛異漲水不到塘上石各塘屹立穩固自省直至尖山並無受險工段至中小亹居北岸河莊葛㠗二山南岸文堂赭山禪機諸山之中天然門户現在深通暢衍臣等恭閲之下咸仰我皇上敬天勤民至德感孚故能致此安瀾順軌之庥徴南北兩岸不特塘工毫無受險之處抑且塘之內外桑麻遍野尺土寸壤無非膏腴新漲沙灘或耕犁布種或刮鹵煎鹽無處非安居樂業景象是今日南北兩塘與中小亹情形固無險要工程尚須布置即善後事宜亦節經題奏均蒙聖明指示欽遵辦理此現在南北兩塘實在情形也至臣等相度御道經行之處自省城至尖山計程一百數十餘里往來道路皆就塘上行走塘以內遍地桑麻水田竟鮮平曠高壤塘以外新漲沙灘地氣斥鹵臣等沿途細加閲看自省至海寧將及百里直至縣城方可駐蹕其海寧城至尖山往返九十里更屬瀕海沙磧無堪設立大營地盤必須仍回海寧駐蹕所經道路如遇天晴土乾塘上尚屬可行若一遇春雨南方土性膠粘泥濘甚屬難走臣等於十八日前往海寧適值午後微雨便覺跋涉維艱黎明自省啓行至日暮方抵海寧次日由海寧尖山往回不過九十里亦至更餘方回縣城至於尖山登陟路徑極為逼窄及至山頂眺望江海形勢又為大尖山所壅蔽不能窮髙極逺是以臣永貴上年在京陛見即會商大學士公臣傅恆等奏請聖駕毋庸閲視欽奉硃批俞允臣喀爾吉善亦於上年正月內備細奏明業蒙聖鑒自省至尖山往回三日道路甚長臣等再四查看沿途實無可以設立大營處所至閲看中小亹又須回至省城渡錢塘江由轉塘村大營至赭山往回雖止七十餘里程站又須兩日臣等伏覩海塘工程穩固中小亹暢行無滯江海安瀾民竈樂業揆之現在情形海塘竟可無庸親臨閲視且臣等往來錢塘江周覽形勢見杭城候潮門外豫備臨幸之觀潮樓地踞江海上游潮汐之往來塘工之捍禦與夫沿江濵海情形已可見其大概是翠華幸浙捍禦民生之要務皆在睿照之中臣等愚見如此是以一切應行豫備之處未經舉行謹據實繕摺馳奏至臣舒赫德奉內廷所發海塘圖係臣永貴上年春間恭進之道里程圖彼時不過按照里數酌擬設立營盤處所原未經與嚮道勘定地盤是以中有未符今既請無庸親臨閲視所有行走道路亦無庸簽明謹將原圖恭繳奏入報聞乾隆二十四年四月十九日閩浙總督臣楊廷璋奏言竊照浙省江海塘工向設海防兵備道統率官兵興修防護嗣因尖山石壩告成中小亹引河暢流之後北岸塘工較前平穩乾隆十九年間經前督撫臣奏准將海防兵備道裁汰南北兩岸塘工歸併杭嘉湖道與寧紹台道専管其原設員辨除改撥杭乍二營外尚餘千總二員把總四員外委八員均行裁汰原設馬步守兵一千名亦改撥杭乍二營三百名又改為堡夫四百名內以三百名防守北岸以一百名防守南岸尚餘馬兵四十名步戰兵七十名守兵一百九十名均行裁汰惟是江海坍漲靡常情形亦因時更易按海寧縣屬之中小亹地靣窄小不及南北兩大亹三分之一是以向來水勢不徙而南即徙而北我朝百餘年以來江溜多由北大亹東趨入海自乾隆十二年始由中小亹而行實為百餘年中僅有之事今中小亹之下口門因雷蜀二山漲沙連接水勢仍致北趨現在北大亹河莊山後已衝開港道大溜由中北二亹各半分流誠慮再厯嵗時中小亹漲沙日漸髙起水勢竟由北大亹直逹則北岸海寧一帶又為全塘第一緊要之區雖管理北塘之杭嘉湖道前臣於在京時已奏允移駐海寧就近經理但石塘草塘悉關緊要搶修防護在在需人現今北岸除可緩工程外其緊要塘工計設堡夫一百八十三名伊等每因嵗支工食無幾又未若兵丁之得以考拔上進是以材技優長工程熟諳之人往往不願充應其現充之堡夫率多軟弱無能難供修防之用臣思黃河運河皆設辨兵以備搶築險工而海塘尤重於黃運豈可祗令無能堡夫防守今北岸海塘現在既屬要工則原裁辨兵自應酌量議復以資臂指謹與司道暨熟諳營員等悉心籌畫應請於原裁海防營千總二員把總四員外委八員兵丁三百名之內酌復千總一員把總二員外委三員并馬兵二十名步戰兵六十名守兵一百零三名共兵一百八十三名自海寧縣南門外分界起迤東至尖山談仙嶺止尖山緊要之地設立一汛又自南門外迤西至八仙石塘止應於翁家埠緊要之地設立一汛每汛派撥把總一員専防外委一員協防尚餘千總一員外委一員駐劄寧城稽查調度至此項兵丁應於海防營原撥杭乍二營兵丁內擇其熟諳修防之人撥回充補其不敷之數并杭乍二營所出兵額另募補充所有北岸現設要工堡夫一百八十三名應即裁汰以抵酌復兵丁之數其鹽平二縣塘工堡夫一百一十七名無庸改設所需兵餉除以堡夫工食抵給外其不敷餉米仍於原裁海防營餉米內按數支給惟此次酌復兵丁既止一百八十三名其千把外委應需養廉名糧并公費名糧若再於此內支食勢致兵數無多不敷差遣似應亦在原裁海防營官兵俸餉內按照公費額數以及該千把外委應支數目截留支領如此通融辦理既無增設之繁而修防獲臂指之用實於要工大有禆益奏入上諭部知之乾隆二十四年閏六月十六日浙江巡撫莊有恭奏言竊臣仰蒙恩㫖以浙省海塘漸有改趨北大亹之勢一切應辦之事命臣預籌妥辦臣抵浙後即馳往查勘業將江溜海潮全趨北大亹情形恭摺奏明今臣復往親勘究已往之成規察目前之大勢博稽輿論廣集衆思竊見論塘工者以石塘為最固為海塘計者至建石塘而已極今東西兩防同知經管海寧仁和二縣塘工凡屬險要處所自康熙五十四年以後聖聖相承軫念民生不惜數千百萬帑金於舊有條塊石塘之外又陸續改建石塘七千六百餘丈屹若崇墉似已無復可加之工其西防同知所管自老鹽倉迤西至章家菴有柴塘四千二百二十八丈五尺當年亦曽屢議接建石塘始以活土浮沙難施樁石而止繼以塘外護沙接漲廣逺而止本非惜費而留未竟之工惟是江海坍漲倐忽靡常安流十餘年之中小亹可以數月而全淤平陸千百丈之北大亹可以數月而遽開則難必者天時宜盡者人事臣與司道詳加籌議審潮汐之往來驗護沙之盈縮今昔異形有宜思患預防者敬為我皇上陳之一老鹽倉一帶柴塘宜酌備物料也查老鹽倉迤西之華家弄翁家埠等處正在河莊嚴峯之緊對北岸現在江溜海潮俱經行北大亹水靣約寬七八百餘丈不等雖塘外沙尚未坍動然水勢靡常磡形陡立設遇江溜汛發秋潮盛滿又資風力互相撞擊不能保無橫冲成堰進臨塘腳之虞溯柴塘停修越今已十四年現多矬蟄底柴自必黴朽若議概加拆䣃一律加鑲現有老沙擁護平險情形尚難預測且工巨料繁亦須慎重辦理若但將矬蟄處所填築髙平則靣實底虛更屬糜費無益今與該司道等籌議應先酌發價銀四千兩循照往例給發産柴之富建桐分四縣採辦齊全限一月內運至工程較要之老鹽倉華家弄一帶堆貯備用計每百斤給價銀九分發價四千兩可購柴四百四十餘萬斤每工拆鑲見方一丈例用柴六千斤可敷七百餘丈工程之用其應用樁木夫工器具等項均可臨期辦募不致遲悮仍候秋汛過後水落潮平審量溜勢有無坍逼塘身應否拆修另行分别緩急奏聞辦理一海寧縣附塘土堰宜相度情形幫築髙厚也查海寧縣石塘近城一帶護沙日見冲刷坍䣃僅存九十餘丈至二三百丈不等秋潮大汛自必逼臨塘腳查南門外繞城石塘五百餘丈向因逼近城垣無地可建備塘而東至七里廟西至小荆場雖有備塘但石塘之內田廬鱗次倘遇異常風汛潑塘之水亦復可虞今與該司道等籌議該處起止共長二千三百一十一丈九尺應於現存矬蟄舊土之上加高三尺以六尺為凖又舊堰底原寬一丈二尺靣寬八尺今於堰底幫寬二尺上至堰頂仍寬八尺每丈估需加土四方一分共約需土九千四百七十方零此次需土甚多所有改設兵丁分段巡防大汛未能分身力作應請雇夫挑築繞城子堰五百三十四丈二尺取土甚逺循照舊例每方給銀一錢八分東西各堰取土稍近每方給銀一錢五分均連夯硪在內共約需夫工銀一千四百八十三兩零連前需用欵項統於節省引費欵內給發以資備辦及時上緊趕築完工自可足資捍禦至新舊石塘之外修砌層石坦水原為保護塘根而設查雍正十三年原任督臣嵇曽筠於擇險塘搶築案內奏請修砌仁寧等縣石塘外坦水八千四百餘丈經總理事務王大臣等議覆准行在案現今水勢北趨塘根護沙日被冲卸有需添建坦水處所亦應先事籌維應俟大汛過後相度情形如有逼臨頂衝處所查勘未建坦水另行籌議添建如係舊有坦水或因年久樁朽石欹亦即勘實補修庶石塘根腳經久可資鞏固以上數條臣為預籌海防起見是否有當伏乞皇上睿鑒訓示遵行奏入上諭部知之乾隆二十四年九月十二日莊有恭奏言本年閏六月三十日申刻奉准廷寄內開乾隆二十四年閏六月十六日奉上諭莊有恭奏東西海防柴石塘工豫備事宜一摺已批該部速議具奏矣江溜海潮全勢既趨北大亹則一切應行修築事宜正關緊要現在時届立秋防汛不宜遲緩而部臣議覆不無尚需時日且定議時亦無可駁詰著𫝊諭該撫速就勘明籌辦之處一靣即行發帑興工上緊趕築無庸聽候部覆遲悮要工欽此臣跪讀之下仰見聖主軫切要工以衛民生至意除應辦柴薪欽遵諭㫖飛飭富建桐分四屬領價購辦依限運工堆貯備用仍照原奏俟秋汛過後審量情形另行分别緩急奏聞辦理外臣查附塘土堰本為防禦秋潮而七月已當大汛之期此項工程最為緊要臣於未奉廷寄之先即經遵照急工之例豫撥六分工費分飭東防同知林文德海寧縣知縣劉純煒糾集夫工分段趕築海寧縣承築繞城工段併日加工先於閏六月底幫築完工東防同知工段稍長亦於七月望汛以前報竣又七里廟迤東至薛家壩止工長七百二十一丈二尺前因該處護沙尚逺未將該塘工堰彚估加幫嗣因潮勢直從南岸轉擊折向北趨塘外護沙日漸冲刷該處又關險要亦應豫防據該司道續請加幫估需夫工雜料銀四百五十七兩零又經臣飭令一律加幫並將估冊送部是以七月兩汛遇有風雨海寧城東一帶海潮雖湧而潑塘之水均資捍禦無虞茲臣於七月二十二日自湖郡審辦逆案回省即於二十六日馳詣海寧查閲工程均髙寬如式夯築堅固其現在水臨塘腳一切應修應建坦水處所另行具摺所有遵㫖趕辦及七月兩汛工程穩固情形臣謹恭摺奏明奏入報聞乾隆二十五年三月二十七日楊廷璋莊有恭奏言竊照浙海塘工前因大溜北趨上厪睿念經臣節將加培土堰儲備柴薪並修建坦水分别緩急各事宜先後請㫖遵行茲查海寧縣塘坦工程先請擇險修築並續添工段共五百八十餘丈均於上冬至本年正月陸續完工今自正月至二月朔汛據報北岸老沙仍有汕刷坦基塘腳復多呈露所有臣前奏內聲明請緩修工段及未經議建議修坦水請俟沙盡後隨時勘辦之工均宜乘此浮沙刷盡通加察勘分别施工以為先事之防茲臣勘得寧邑南門外西過戴家石橋工長二千一百六十丈零東至陳文港工長二千九百八十丈零臣臨勘之時正值望汛潮水盛長此五千一百四十餘丈之工現俱水臨塘腳雖間有沙未刷盡尚存三四尺至一二丈不等者所有塘坦舊基亦俱呈露內除擇險修築案內已修已建坦水五百八十餘丈又兵修整舊坦三百餘丈不計外查有未建坦水二千八百二十餘丈未修坦水一千四百三十餘丈就此四千二百數十丈之中臣率同㕔汛各員逐一親加閲勘如魚鱗大石塘初建工竣之時雖因護沙漸漲未將坦水併建然各就舊塘基址清槽建築塘身自十六層十八層不等今勘塘外舊基亦尚有抱護塘身自一二層至七八層不等者雖舊塘石塊參差殘缺高下不齊然俱根腳堅實經歷數十餘年不可搖動今若因其外貌殘缺祗取完美適觀一律拆建無論費帑不資轉恐新工不若舊址之堅即緩修搶修案內各塘之外所存舊坦雖多殘缺然亦有樁木尚全石塊未缺不過些微潑亂可資兵力扛擡理砌以漸完整者並無庸一律興修致滋糜費其中實有塘腳單露舊坦傾矬樁殘石缺必須修築者臣亦不敢姑事因循不及時籌辦臣與㕔汛各員悉心體勘計此四千二百數十丈之中約有應建應修一千六百數十餘丈現宜分别加工又自陳文港東至尖山腳下內有韓家池柴塘四百六十一丈年久未修自上年八九月間漸為洄溜冲逼外沙汕刷經臣酌撥儲備柴薪六十萬斤分貯該處以備不虞今柴塘以西護沙刷盡水逼塘根自應一律拆鑲以資捍禦現貯柴薪不敷尚有堆積老鹽倉等處者可以撥用臣將海寧各工勘畢之後即循海而北由海鹽而至平湖遍歷乍塘逐一查勘查海鹽一邑東臨大海南有秦駐北有乍浦諸山山趾角張而鹽邑獨以一靣當潮汐之衝該縣城外石塘最關緊要上年八月朔汛風潮稍大該處翌翔等號一切石工塘工間有冲損經臣督率道㕔營汛各員刻期搶護幸保無虞今查閲該㕔屬修竣各工現俱穩固其餘未修處所間有一二殘損之處皆係常年應辦之工興作無多臣已指示㕔汛各員隨時修補以禦春潮除南乍兩塘及翁家埠老鹽倉一帶柴塘現俱穩固並東西石塘勘係舊址堅實舊坦完固足資保護者毋庸議建議修外就臣查勘應修之一千六百餘丈其中工段亦尚有緊緩之分如不分緩急同時並舉誠恐需用樁石非可一時猝辦轉以緩工而悮要工臣等議將魚鱗大石塘外舊址低窪石塊坍缷及緩修搶修案內各塘石料本小而塘外舊坦又復殘缺過甚者計共工長七百七十餘丈作為最要之工其餘舊基舊坦雖樁殘石缺而現非險要之八百八十餘丈列為次要一靣飭行東防同知海寧縣知縣先將最要各工造具工料估冊由司道確核轉請動項給發上緊購辦樁石同韓家池一帶柴工及時修築以資捍衛所有塘外條塊舊石傾陷沙土中者並飭酌撥夫役逐一撈取即於應用石內剔除抵數毋任混冒總期帑不虛糜工歸實用其餘次要各工容俟緊工告竣再為察看潮溜情形以次接辦外所有勘過通塘情形及現在籌辦事宜恭摺具奏奏入報聞乾隆二十五年五月十一日莊有恭奏言竊照海寧東南有大小尖山橫踞海口塔山又在尖山之西相去二百丈兩山之間建有石壩一道此壩經始於雍正十二年工竣於乾隆五年帑費六萬七千餘兩自此掣溜南趨北岸塘堤無濤頭衝突之患者垂二十年即上年江海驟遷北沙日刷而海潮江溜不能挾其全力徑薄塘根者仍由此壩為之障衛挑溜外行之力居多臣於二月間周歷各塘登壩履勘竊見石壩近西連屬塔山之數十丈貼壩老沙所存無幾而潮溜俱由塔山之麓旋繞而過大溜至此為山麓所逼盤渦激旋回注壩根維時雖存有老沙數丈臣知其勢不可恃然沙未盡去無可施功當飭東防同知海寧縣知縣留心晨夕伺察一靣將防護事宜先事熟籌茲於三月望汛後據該縣丞先後禀報石壩南靣護沙刷去五十二丈北靣刷去二十丈除南靣貼近塔山之二十二丈外有山腳抱護毋庸籌辦外其餘五十丈現有剝落綻紋請用塊石竹簍三層疊砌以資捍衛每簍以長一丈四尺髙寬各五尺為度核計共需銀一千四百五十九兩零造具估冊由司詳送到臣臣查該壩為全塘關鍵急須設法防護該處樁木難施惟有造用寬長竹簍填貯塊石兼用篾纜聮絡順貼壩身攩浪護根莫善於此今大汛已届工難寬待隨飭集料鳩工并飭海寧縣知縣劉純緯住宿工所刻期督辦務保無虞如有續增工段并即仿照隨時禀報辦理除估冊咨送户工二部外所有酌籌預護事宜謹恭摺具奏奏入報聞乾隆二十五年八月初五日莊有恭奏言竊照北岸塘沙漸漲情形經臣於本年五月十八日恭摺奏聞嗣據㕔汛各員按期摺報情形每汛各有加增臣並不時差員勘覆亦與所報相符惟是六月望汛為交伏後汛水最大之時竊恐新漲嫩沙易遭汕刷而體勘沙形又必俟汛小潮平之後方能確切臣隨於六月二十四日親赴海寧逐加履勘適於二十五日辰刻自海寧途次遇臣所差標辨齎回前摺欽奉硃批此實佳兆也應虔誠往觀潮樓海神祠致祭並繪圖奏來欽此臣跪讀之下仰體欽衷虔查往例伏見省城海寧均有敕建神祠例應並祭即臣上秋恭報秋潮平穩欽蒙諭祭亦經將兩處海神祠暨海寧之天后宮遵㫖並祭緣由具摺奏明此次似應恭照臣於二十五六兩日查勘各塘事畢即於二十七日宜祭之辰在海寧海神廟暨天后宮潔齊致祭祭畢即於是日回省復蠲吉於七月初一日率同在省文武恭赴觀潮樓海神祠䖍製祝辭恪恭將事展聖主懷柔之義竭微臣禱祝之誠以祈仰副我皇上祗迓神庥福佑生民之至意至北塘一帶漲沙形勢臣於履勘時復率同海防道永德海寧縣知縣劉純煒逐加查丈視臣前次奏報之時加寬至二百餘丈至二三十丈不等前報離塘腳百餘丈不等者今亦漸次相連謹遵㫖繪圖將寬長丈尺於圖內逐一簽注恭呈睿覽臣查此一月內加漲雖屬無多而呈露之處沙形較髙沙色亦比前較老經此大汛不遭汕刷且漸加增誠如聖諭實為佳兆今年秋汛仰賴我聖主如天之福海若安瀾潮汐順軌則日引月長實大為可慶再臣此次查勘兩塘一切柴石工程俱極平穩所有海寧以東要工坦水亦俱如式修築陸續皆可完竣以禦秋潮惟東塘境內之陳文港有應修舊草盤頭二座所需工料核估無多兼有上年預備柴薪易於集事至尖山石壩東南一靣緣有護沙被刷經臣奏明安置塊石竹簍以資保衛今勘竹簍以東復有刷去護沙四十餘丈然底沙猶存未便徑用竹簍安置經臣勘明應如道㕔所禀先將壩石坡陀整砌再預備塊石數十方堆貯工所以防底沙游動填築簍工之用所有遵㫖致祭日期及現在查勘情形謹繪圖恭摺奏覆奏入上諭曰此處朕明嵗應往叩謁爾等預備否欽定南巡盛典卷五十六
