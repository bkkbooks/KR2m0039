body:
  text: 欽定四庫全書欽定南廵盛典卷五十六海塘乾隆十四年十月二十日閩浙總督喀爾吉善署浙江廵撫永貴奏言竊照浙省錢塘江接連海洋潮汐經行之所分南北中三亹水行南大亹則南岸塘工受險水行北大亹則北岸塘工受險康熙年間江流盡歸北大亹仁和海寜二縣頂衝極險經聖祖仁皇帝親臨相視指授機宜復蒙世宗憲皇帝暨我皇上先後興舉大工㡬經籌畫大費帑金城社民生均獲保全茲于乾隆十二年秋間江流忽趨中小亹現在潮汐經行深通暢流北岸仁寜各縣塘工之外漲沙綿逺盡成腴産沿海各郡永免衝激之險並享地利之益實千載難逄之㑹也兩浙羣黎既感三朝保䕶之恩且欣遇景運適逄之會羣情踴躍咸望皇上臨幸浙省閲視海塘紹聖祖時廵沛澤之盛典奠萬年鞏固之鴻圖俾海若效靈安流順軌兩浙民生從此永享安瀾之福實為慶幸臣等身任地方目覩民情懽欣鼓舞激切抒誠不敢壅於上聞奏入上諭部知之乾隆十六年正月二十一日兵部尚書舒赫徳閩浙總督喀爾吉善署浙江廵撫永貴奏言乾隆十五年十二月十二日奉上諭浙江海塘為捍衛民生要務朕明春廵幸浙省意欲親臨閲視著尚書舒赫徳於江南審訊事畢之日即赴浙江會同該督撫等查看豫備奏聞欽此臣舒赫徳并奉内廷發交海塘圖一張令将看過海塘應由何處行走於圖内簽明具奏臣喀爾吉善臣永貴於十二月二十五日接准部文一面籌畫預備事宜一面候臣舒赫徳到浙㑹同勘定詳悉奏聞兹臣舒赫徳於正月十六日抵浙臣等㑹同先赴海寧一帯閱看海塘復渡江至赭山閱看中小亹臣等謹看得浙江海塘土石鉅工均在自省至海寜縣屬尖山一帯康熙雍正年間水行北大亹之時此一帯海塘處處均屬至險迨後塘外漸漲沙灘潮汐江流日徙而南乾隆十二年水歸中小亹北岸漲沙一望無際非秋汛異漲水不到塘上石各塘屹立稳固自省直至尖山並無受險工段至中小亹居北岸河荘葛㠗二山南岸文堂赭山禅機諸山之中天然門户現在深通暢衍臣等恭閲之下咸仰我皇上敬天勤民至徳感孚故能致此安瀾順軌之庥徴南北兩岸不特塘工毫無受險之處抑且塘之内外桑麻遍野尺土寸壤無非膏腴新漲沙灘或耕犁布種或刮鹵煎鹽無處非安居樂業景象是今日南北兩塘與中小亹情形固無險要工程尚須布置即善後事宜亦節經題奏均蒙聖明指示欽遵辦理此現在南北兩塘實在情形也至臣等相度御道經行之處自省城至尖山計程一百數十餘里往来道路皆就塘上行走塘以内遍地桑麻水田竟鮮平曠高壤塘以外新漲沙灘地氣斥鹵臣等沿途細加閲看自省至海寜將及百里直至縣城方可駐蹕其海寜城至尖山往返九十里更屬瀕海沙磧無堪設立大營地盤必須仍回海寜駐蹕所經道路如遇天晴土乾塘上尚屬可行若一遇春雨南方土性膠粘泥濘甚屬難走臣等於十八日前往海寜適值午後㣲雨便覺跋渉維艱黎明自省啟行至日暮方抵海寜次日由海寜尖山往回不過九十里亦至更餘方回縣城至於尖山登陟路徑極為偪窄及至山頂眺望江海形勢又為大尖山所壅蔽不能窮髙極逺是以臣永貴上年在京陛見即會商大學士公臣傅恒等奏請聖駕毋庸閲視欽奉硃批俞允臣喀爾吉善亦於上年正月内備細奏明業蒙聖鑒自省至尖山往回三日道路甚長臣等再四查看沿途實無可以設立大營處所至閲看中小亹又須回至省城渡錢塘江由轉塘村大營至赭山往回雖止七十餘里程站又湏兩日臣等伏覩海塘工程稳固中小亹暢行無滯江海安瀾民竈樂業揆之現在情形海塘竟可無庸親臨閲視且臣等往來錢塘江周覽形勢見杭城候潮門外豫備臨幸之觀潮樓地踞江海上游潮汐之往來塘工之捍禦與夫沿江濵海情形已可見其大概是翠華幸浙捍禦民生之要務皆在睿照之中臣等愚見如此是以一切應行豫備之處未經舉行謹據實繕摺馳奏至臣舒赫徳奉内廷所發海塘圖係臣永貴上年春間恭進之道里程圖彼時不過按照里數酌擬設立營盤處所原未經與嚮道勘定地盤是以中有未符今既請無庸親臨閲視所有行走道路亦無庸簽明謹將原圖恭繳奏入報聞乾隆二十四年四月十九日閩浙總督臣楊廷璋奏言竊照浙省江海塘工向設海防兵備道統率官兵興修防䕶嗣因尖山石壩告成中小亹引河暢流之後北岸塘工較前平稳乾隆十九年間經前督撫臣奏准將海防兵備道裁汰南北兩岸塘工歸併杭嘉湖道與寜紹台道専管其原設員弁除改撥杭乍二營外尚餘千總二員把總四員外委八員均行裁汰原設馬歩守兵一千名亦改撥杭乍二營三百名又改為堡夫四百名内以三百名防守北岸以一百名防守南岸尚餘馬兵四十名歩戰兵七十名守兵一百九十名均行裁汰惟是江海坍漲靡常情形亦因時更易按海寜縣屬之中小亹地靣窄小不及南北兩大亹三分之一是以向來水勢不徙而南即徙而北我朝百餘年以來江溜多由北大亹東趨入海自乾隆十二年始由中小亹而行實為百餘年中僅有之事今中小亹之下口門因雷蜀二山漲沙連接水勢仍致北趨現在北大亹河莊山後已衝開港道大溜由中北二亹各半分流誠慮再厯嵗時中小亹漲沙日漸髙起水勢竟由北大亹直逹則北岸海寜一帯又為全塘第一𦂳要之區雖管理北塘之杭嘉湖道前臣於在京時已奏允移駐海寜就近經理但石塘草塘悉闗緊要搶修防䕶在在需人現今北岸除可緩工程外其緊要塘工計設堡夫一百八十三名伊等毎因嵗支工食無㡬又未若兵丁之得以考拔上進是以材技優長工程熟諳之人往往不願充應其現充之堡夫率多軟弱無能難供修防之用臣思黄河運河皆設弁兵以備搶築險工而海塘尤重於黄運豈可祗令無能堡夫防守今北岸海塘現在既屬要工則原裁弁兵自應酌量議復以資臂指謹與司道暨熟諳營員等悉心籌畫應請於原裁海防營千總二員把總四員外委八員兵丁三百名之内酌復千總一員把總二員外委三員并馬兵二十名歩戰兵六十名守兵一百零三名共兵一百八十三名自海寜縣南門外分界起迤東至尖山談仙嶺止尖山緊要之地設立一汛又自南門外迤西至八仙石塘止應於翁家埠緊要之地設立一汛毎汛派撥把總一員専防外委一員協防尚餘千總一員外委一員駐劄寜城稽查調度至此項兵丁應於海防營原撥杭乍二營兵丁内擇其熟諳修防之人撥回充補其不敷之數并杭乍二營所出兵額另募補充所有北岸現設要工堡夫一百八十三名應即裁汰以抵酌復兵丁之數其鹽平二縣塘工堡夫一百一十七名無庸改設所需兵餉除以堡夫工食抵給外其不敷餉米仍於原裁海防營餉米内按數支給惟此次酌復兵丁既止一百八十三名其千把外委應需養㢘名糧并公費名糧若再於此内支食勢致兵數無多不敷差遣似應亦在原裁海防營官兵俸餉内按照公費額數以及該千把外委應支數目截留支領如此通融辦理既無増設之繁而修防獲臂指之用實於要工大有禆益奏入上諭部知之乾隆二十四年閏六月十六日浙江廵撫莊有恭奏言竊臣仰蒙恩㫖以浙省海塘漸有改趨北大亹之勢一切應辦之事命臣預籌妥辦臣抵浙後即馳往查勘業將江溜海潮全趨北大亹情形恭摺奏明今臣復往親勘究已往之成規察目前之大勢博稽輿論廣集衆思竊見論塘工者以石塘為最固為海塘計者至建石塘而已極今東西兩防同知經管海寜仁和二縣塘工凡屬險要處所自康熙五十四年以後聖聖相承軫念民生不惜數千百萬帑金於舊有條塊石塘之外又陸續改建石塘七千六百餘丈屹若崇墉似已無復可加之工其西防同知所管自老鹽倉迤西至章家菴有柴塘四千二百二十八丈五尺當年亦曽屢議接建石塘始以活土浮沙難施樁石而止繼以塘外䕶沙接漲廣逺而止本非惜費而留未竟之工惟是江海坍漲倐忽靡常安流十餘年之中小亹可以數月而全淤平陸千百丈之北大亹可以數月而遽開則難必者天時宜盡者人事臣與司道詳加籌議審潮汐之往來騐䕶沙之盈縮今昔異形有宜思患預防者敬為我皇上陳之一老鹽倉一帶柴塘宜酌備物料也查老鹽倉迤西之華家衖翁家埠等處正在河莊嚴峯之𦂳對北岸現在江溜海潮俱經行北大亹水靣約寛七八百餘丈不等雖塘外沙尚未坍動然水勢靡常磡形陡立設遇江溜汛發秋潮盛滿又資風力互相撞撃不能保無横冲成堰進臨塘脚之虞溯柴塘停修越今已十四年現多矬蟄底柴自必霉朽若議概加拆䣃一律加鑲現有老沙擁䕶平險情形尚難預測且工鉅料繁亦湏慎重辦理若但將矬蟄處所填築髙平則靣實底虚更屬糜費無益今與該司道等籌議應先酌發價銀四千兩循照往例給發産柴之富建桐分四縣採辦齊全限一月内運至工程較要之老鹽倉華家衖一帶堆貯備用計毎百觔給價銀九分發價四千兩可購柴四百四十餘萬觔毎工拆鑲見方一丈例用柴六千觔可敷七百餘丈工程之用其應用樁木夫工器具等項均可臨期辦募不致遲悮仍候秋汛過後水落潮平審量溜勢有無坍逼塘身應否拆修另行分别緩急奏聞辦理一海寜縣附塘土堰宜相度情形帮築髙厚也查海寜縣石塘近城一帶䕶沙日見冲刷坍䣃僅存九十餘丈至二三百丈不等秋潮大汛自必逼臨塘脚查南門外遶城石塘五百餘丈向因逼近城垣無地可建備塘而東至七里廟西至小荆場雖有備塘但石塘之内田廬鱗次倘遇異常風汛潑塘之水亦復可虞今與該司道等籌議該處起止共長二千三百一十一丈九尺應於現存矬蟄舊土之上加高三尺以六尺為凖又舊堰底原寛一丈二尺靣寛八尺今於堰底帮寛二尺上至堰頂仍寛八尺毎丈估需加土四方一分共約需土九千四百七十方零此次需土甚多所有改設兵丁分段廵防大汛未能分身力作應請僱夫挑築繞城子堰五百三十四丈二尺取土甚逺循照舊例毎方給銀一錢八分東西各堰取土稍近毎方給銀一錢五分均連夯硪在内共約需夫工銀一千四百八十三兩零連前需用欵項統於節省引費欵内給發以資備辦及時上𦂳趕築完工自可足資捍禦至新舊石塘之外修砌層石坦水原為保䕶塘根而設查雍正十三年原任督臣嵇曽筠於擇險塘搶築案内奏請修砌仁寜等縣石塘外坦水八千四百餘丈經總理事務王大臣等議覆准行在案現今水勢北趨塘根䕶沙日被冲卸有需添建坦水處所亦應先事籌維應俟大汛過後相度情形如有逼臨頂衝處所查勘未建坦水另行籌議添建如係舊有坦水或因年久樁朽石欹亦即勘實補修庻石塘根脚經久可資鞏固以上數條臣為預籌海防起見是否有當伏乞皇上睿鑒訓示遵行奏入上諭部知之乾隆二十四年九月十二日莊有恭奏言本年閏六月三十日申刻奉准廷寄内開乾隆二十四年閏六月十六日奉上諭莊有恭奏東西海防柴石塘工豫備事宜一摺已批該部速議具奏矣江溜海潮全勢既趨北大亹則一切應行修築事宜正闗𦂳要現在時届立秋防汛不宜遲緩而部臣議覆不無尚需時日且定議時亦無可駁詰着𫝊諭該撫速就勘明籌辦之處一靣即行發帑興工上𦂳趕築無庸聴候部覆遲悮要工欽此臣跪讀之下仰見聖主軫切要工以衛民生至意除應辦柴薪欽遵諭㫖飛飭富建桐分四屬領價購辦依限運工堆貯備用仍照原奏俟秋汛過後審量情形另行分别緩急奏聞辦理外臣查附塘土堰本為防禦秋潮而七月已當大汛之期此項工程最為𦂳要臣於未奉廷寄之先即經遵照急工之例豫撥六分工費分飭東防同知林文徳海寜縣知縣劉純煒糾集夫工分段赶築海寜縣承築繞城工段併日加工先於閏六月底帮築完工東防同知工段稍長亦於七月望汛以前報竣又七里廟迤東至薛家壩止工長七百二十一丈二尺前因該處䕶沙尚逺未將該塘工堰彚估加帮嗣因潮勢直從南岸轉撃折向北趨塘外䕶沙日漸冲刷該處又闗險要亦應豫防據該司道續請加帮估需夫工雜料銀四百五十七兩零又經臣飭令一律加帮並將估冊送部是以七月兩汛遇有風雨海寜城東一帶海潮雖湧而潑塘之水均資捍禦無虞茲臣於七月二十二日自湖郡審辦逆案回省即於二十六日馳詣海寜查閲工程均髙寛如式夯築堅固其現在水臨塘脚一切應修應建坦水處所另行具摺所有遵㫖趕辦及七月兩汛工程稳固情形臣謹恭摺奏明奏入報聞乾隆二十五年三月二十七日楊廷璋莊有恭奏言竊照浙海塘工前因大溜北趨上厪睿念經臣節將加培土堰儲備柴薪並修建坦水分别緩急各事宜先後請㫖遵行茲查海寜縣塘坦工程先請擇險修築並續添工段共五百八十餘丈均於上冬至本年正月陸續完工今自正月至二月朔汛㨿報北岸老沙仍有汕刷坦基塘脚復多呈露所有臣前奏内聲明請緩修工段及未經議建議修坦水請俟沙盡後随時勘辦之工均宜乗此浮沙刷盡通加察勘分别施工以為先事之防茲臣勘得寜邑南門外西過戴家石橋工長二千一百六十丈零東至陳文港工長二千九百八十丈零臣臨勘之時正值望汛潮水盛長此五千一百四十餘丈之工現俱水臨塘脚雖間有沙未刷盡尚存三四尺至一二丈不等者所有塘坦舊基亦俱呈露内除擇險修築案内已修已建坦水五百八十餘丈又兵修整舊坦三百餘丈不計外查有未建坦水二千八百二十餘丈未修坦水一千四百三十餘丈就此四千二百數十丈之中臣率同㕔汛各員逐一親加閲勘如魚鱗大石塘初建工竣之時雖因䕶沙漸漲未將坦水併建然各就舊塘基址清槽建築塘身自十六層十八層不等今勘塘外舊基亦尚有抱䕶塘身自一二層至七八層不等者雖舊塘石塊參差殘缺高下不齊然俱根脚堅實經歴數十餘年不可搖動今若因其外貌殘缺祗取完美適觀一律拆建無論費帑不貲轉恐新工不若舊址之堅即緩修搶修案内各塘之外所存舊坦雖多殘缺然亦有樁木尚全石塊未缺不過些㣲潑亂可資兵力摃擡理砌以漸完整者並無庸一律興修致滋糜費其中實有塘脚單露舊坦傾矬樁殘石缺必湏修築者臣亦不敢姑事因循不及時籌辦臣與㕔汛各員悉心體勘計此四千二百數十丈之中約有應建應修一千六百數十餘丈現宜分别加工又自陳文港東至尖山脚下内有韓家池柴塘四百六十一丈年久未修自上年八九月間漸為洄溜冲逼外沙汕刷經臣酌撥儲備柴薪六十萬觔分貯該處以備不虞今柴塘以西䕶沙刷盡水逼塘根自應一律拆鑲以資捍禦現貯柴薪不敷尚有堆積老鹽倉等處者可以撥用臣將海寜各工勘畢之後即循海而北由海鹽而至平湖徧歴乍塘逐一查勘查海鹽一邑東臨大海南有秦駐北有乍浦諸山山趾角張而鹽邑獨以一靣當潮汐之衝該縣城外石塘最闗𦂳要上年八月朔汛風潮稍大該處翌翔等號一切石工塘工間有冲損經臣督率道㕔營汛各員刻期搶䕶幸保無虞今查閲該㕔屬修竣各工現俱稳固其餘未修處所間有一二殘損之處皆係常年應辦之工興作無多臣已指示㕔汛各員隨時修補以禦春潮除南乍兩塘及翁家埠老鹽倉一帶柴塘現俱稳固並東西石塘勘係舊址堅實舊坦完固足資保䕶者毋庸議建議修外就臣查勘應修之一千六百餘丈其中工段亦尚有𦂳緩之分如不分緩急同時並舉誠恐需用樁石非可一時猝辦轉以緩工而悮要工臣等議將魚鱗大石塘外舊址低窪石塊坍缷及緩修搶修案内各塘石料本小而塘外舊坦又復殘缺過甚者計共工長七百七十餘丈作為最要之工其餘舊基舊坦雖樁殘石缺而現非險要之八百八十餘丈列為次要一靣飭行東防同知海寜縣知縣先將最要各工造具工料估冊由司道確核轉請動項給發上𦂳購辦樁石同韓家池一帶柴工及時修築以資捍衛所有塘外條塊舊石傾陷沙土中者並飭酌撥夫役逐一撈取即於應用石内剔除抵數毋任混冐總期帑不虚糜工歸實用其餘次要各工容俟𦂳工告竣再為察看潮溜情形以次接辦外所有勘過通塘情形及現在籌辦事宜恭摺具奏奏入報聞乾隆二十五年五月十一日莊有恭奏言竊照海寜東南有大小尖山横踞海口塔山又在尖山之西相去二百丈兩山之間建有石壩一道此壩經始於雍正十二年工竣於乾隆五年帑費六萬七千餘兩自此掣溜南趨北岸塘堤無濤頭衝突之患者垂二十年即上年江海驟遷北沙日刷而海潮江溜不能挾其全力徑薄塘根者仍由此壩為之障衛挑溜外行之力居多臣於二月間周歴各塘登壩履勘竊見石壩近西連屬塔山之數十丈貼壩老沙所存無㡬而潮溜俱由塔山之麓旋遶而過大溜至此為山麓所逼盤渦激旋回注壩根維時雖存有老沙數丈臣知其勢不可恃然沙未盡去無可施功當飭東防同知海寜縣知縣留心晨夕伺察一靣將防䕶事宜先事熟籌茲於三月望汛後據該縣丞先後禀報石壩南靣䕶沙刷去五十二丈北靣刷去二十丈除南靣貼近塔山之二十二丈外有山脚抱䕶毋庸籌辦外其餘五十丈現有剥落綻紋請用塊石竹篓三層疊砌以資捍衛毎篓以長一丈四尺髙寛各五尺為度核計共需銀一千四百五十九兩零造具估冊由司詳送到臣臣查該壩為全塘闗鍵急須設法防䕶該處樁木難施惟有造用寛長竹篓填貯塊石兼用篾䌫聮絡順貼壩身攩浪䕶根莫善於此今大汛已届工難寛待隨飭集料鳩工并飭海寜縣知縣劉純緯住宿工所刻期督辦務保無虞如有續増工段并即仿照隨時禀報辦理除估冊咨送户工二部外所有酌籌預䕶事宜謹恭摺具奏奏入報聞乾隆二十五年八月初五日莊有恭奏言竊照北岸塘沙漸漲情形經臣於本年五月十八日恭摺奏聞嗣據㕔汛各員按期摺報情形每汛各有加増臣並不時差員勘覆亦與所報相符惟是六月望汛為交伏後汛水最大之時竊恐新漲嫩沙易遭汕刷而體勘沙形又必俟汛小潮平之後方能確切臣隨於六月二十四日親赴海寜逐加履勘適於二十五日辰刻自海寜途次遇臣所差標弁齎回前摺欽奉硃批此實佳兆也應虔誠往觀潮樓海神祠致祭並繪圖奏來欽此臣跪讀之下仰體欽衷虔查往例伏見省城海寜均有勅建神祠例應並祭即臣上秋恭報秋潮平稳欽蒙諭祭亦經將兩處海神祠暨海寜之天后宮遵㫖並祭縁由具摺奏明此次似應恭照臣於二十五六兩日查勘各塘事畢即於二十七日宜祭之辰在海寜海神廟暨天后宮潔齋致祭祭畢即於是日回省復蠲吉於七月初一日率同在省文武恭赴觀潮樓海神祠䖍製祝辭恪恭將事展聖主懐柔之義竭㣲臣禱祝之誠以祈仰副我皇上祗迓神庥福佑生民之至意至北塘一帶漲沙形勢臣於履勘時復率同海防道永徳海寜縣知縣劉純煒逐加查丈視臣前次奏報之時加寛至二百餘丈至二三十丈不等前報離塘脚百餘丈不等者今亦漸次相連謹遵㫖繪圖將寛長丈尺於圖内逐一簽註恭呈睿覧臣查此一月内加漲雖屬無多而呈露之處沙形較髙沙色亦比前較老經此大汛不遭汕刷且漸加増誠如聖諭實為佳兆今年秋汛仰頼我聖主如天之福海若安瀾潮汐順軌則日引月長實大為可慶再臣此次查勘兩塘一切柴石工程俱極平稳所有海寜以東要工坦水亦俱如式修築陸續皆可完竣以禦秋潮惟東塘境内之陳文港有應修舊草盤頭二座所需工料核估無多兼有上年預備柴薪易於集事至尖山石壩東南一靣縁有䕶沙被刷經臣奏明安置塊石竹篓以資保衛今勘竹篓以東復有刷去䕶沙四十餘丈然底沙猶存未便徑用竹篓安置經臣勘明應如道㕔所禀先將壩石坡陀整砌再預備塊石數十方堆貯工所以防底沙游動填築篓工之用所有遵㫖致祭日期及現在查勘情形謹繪圖恭摺奏覆奏入上諭曰此處朕明嵗應往叩謁爾等預備否欽定南巡盛典卷五十六
