  text: 欽定四庫全書欽定南巡盛典卷八十八
  hash: sha256:069f1f2d28d7edc77cb1c66dfe3521f356410649bb5652b75dea755f39a6f345
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_121-1a, image: WYG0659/WYG0659-0364c.png}
body:
  text: 名勝江浙各名勝附識乾隆十六年辛未聖駕駐蹕淮安書賜山陽縣普濟堂額曰誼敦任恤駐蹕髙旻寺書賜棲靈寺額曰蜀岡慧照聨曰淮安竒觀别開清淨地江山靜對逺契妙明心吉祥寺額曰智珠福祿菴額曰福祿禪林駐蹕鎮江書賜三義閣額曰曲阿勝地駐蹕江寧書賜慧居寺額曰光明法界曰寶網長新曰精進正覺聨曰地控秣陵金殿香浮華鬘動山盤句曲石壇月朗戒珠圓慈應寺額曰慈應普應聨曰地近秣陵飛法雨江連天塹聽潮音永濟寺額曰德水香林曰江天淨界曰覺岸聨曰吳楚江山通廣望華嚴樓閣總懸居乾隆二十二年丁丑駐蹕金山寺書賜五洲山寺額曰淨因駐蹕常州書賜黃埠墩觀音閣額曰水月澄觀駐蹕惠山寺書賜崇安寺額曰靜慧駐蹕蘇州書賜圓妙觀玉皇閣額曰穆清元始三清殿額曰清虛靜妙斗姆閣額曰珠杓朗耀又書賜開元寺額曰靈著滄溟瑞光寺額曰慧燈無盡駐蹕靈巖寺書賜石佛寺額曰普門香梵聨曰願力廣施甘露味聞思逺應海潮音海潮菴額曰海潮又書賜三山會館天后宫額曰德孚廣濟聨曰忠信涉波濤周厯玉洲瑶島神明昭日月指揮水伯天吳霞漳會館天后宫額曰祥飈慈應聨曰靈昭千里風濤看航通絶域惠普萬帆雲影驗雅舞神霄邵武會館天后宫額曰靈佑恬波聨曰廣著神庥錦浪平時開素練長昭福佑彩雲飛處展靈旗駐蹕江寧書賜永濟寺額曰永濟宏覺寺殿額曰萬法皆如幽棲寺額曰無去來處乾隆二十七年壬午駐蹕揚州書賜救生寺額曰寶筏地藏菴額曰善因駐蹕金山寺書題行館畫曰海闊天空駐蹕焦山寺書賜海潮菴額曰會音駐蹕常州書賜天寧寺殿額曰龍城象教聨曰合相澄三摩光融西竺衆香超萬有界現南藍駐蹕蘇州書賜圓妙觀額曰太初闡教聫曰圓管叶三元仁宣槖籥妙機含萬有夀溥垓埏報恩寺額曰吳雲香梵聨曰茂苑霏春三果同參開鹿苑祗林現瑞一峯遙接證獅林駐蹕杭州書賜吳山文昌閣額曰斗匡司化駐蹕安瀾園書賜安國寺額曰法海安禪聨曰香水護須彌功德常澄一鏡妙華現優鉢莊嚴合證三輪駐蹕塘棲書賜西塘萬夀山寺額曰本覺駐蹕嘉興煙雨樓書賜三塔寺額曰茶禪曰標示三乘聫曰湧塔同參法華品試茶分證趙州禪乾隆三十年乙酉駐蹕焦山寺書賜品泉亭額曰淙雲駐蹕蘇州書賜圓妙觀額曰梵籟清機駐蹕杭州書賜勝果寺額曰勝果曰阿閣禪枝聫曰半嶺妙鬘垂翠微初上曲江毫相印渌淨平鋪乾隆四十五年庚子駐蹕楊家莊書賜清江浦慈雲寺額曰慧照常圖斗姥宫額曰璇樞佑順乾隆四十九年甲辰駐蹕林家莊書賜慈雲寺聫曰緑竹紅梅猶假色行雲流水是真詮欽定南巡盛典卷八十八
