body:
  text: 欽定四庫全書欽定南巡盛典卷二十七恩綸乾隆二十三年九月三十日上諭内閣曰兩江總督尹繼善等以河工告竣年榖豐收臣黎望幸情殷請于庚辰之嵗再舉南巡令典等因合詞具奏朕惟東南河道民生時縈宵旴前者翠華載莅每切咨詢不敢自逸兹當大工既蕆澤國安瀾於焉攬轡觀風上以驗曩時往来指畫之勤下以考在事大臣宣化承流之績理亦宜之顧各督撫等前後奏報工程披章如睹而嵇璜裘曰修等又以親承指示甫經復命回京條析敷陳情形頗悉乃者大江南北年榖順成民氣和樂封函疊至仰見上蒼福佑額手為南黎稱慶此意與封疆諸大吏共之猶念積潦初除汙萊日闢正宜乗時勸諭俾瘠土盡化膏腴以培元氣已降旨各督撫勘明濱河地畆有秋穫雖登而小民牛犂籽種不能接濟致曠土尚有未耕者並予格外加恩官為借給使得資東作而厚西成其果盈寧之象與嵗俱增則機杼倉箱熈恬滿目其足以佐時巡風景者不更多耶且明嵗車駕臨幸索約爾濟又平定伊犂後若左右哈薩克東西布魯特及回部各城以次平定歸降不無覲謁宴賚之典車馬之煩所當少恤且嵗屇辛巳即恭逢聖母皇太后七旬大夀普天同慶如於是年敬奉安輿重臨江浙庶㡬省方問俗嘉地利之畢登喜生民之益懋于以仰悦慈懐夀祺康豫當推恩錫福俯慰元元望幸之忱俟臨期另行降㫖所有庚辰年南巡之奏暫停舉行毋庸具摺固請先将此通行曉諭知之乾隆二十四年十月十八日上諭内閣曰前據陳宏謀奏請截撥京銅五十萬觔加鑄偹用一摺部臣以未經分晰聲明業經議駁但念錢法闗係閭閻日用前請五十萬之數原屬過多若酌量增加卯數以裕鼓鑄于地方亦屬有益著加㤙酌半給撥二十五萬觔俾官錢流通以裕民用該部即遵諭行乾隆二十四年十月二十二日上諭内閣曰雍正五年恭值皇考五十萬夀因㑹試舉人請于京城寺廟設立經壇以申頌祝欽䝉頒諭禁止並勅各直省督撫母得因萬夀進獻玩好聖訓有云朕心惟以民安物阜為美薦賢舉能為貴倘督撫等秉公察吏實心為國行一利民之政勝扵獻希世之珍薦一可用之才勝於貢連城之寳仰見我皇考恭儉聖徳實為萬世訓行朕嗣服以來屢諭各督撫等不得於方物之外别有進獻諒内外大小臣工無不明體朕意開嵗八月為朕五十誕辰惟恐臣僚中或以萬夀聖莭欲購覔珍竒共申祝嘏其各省士民或且有設立經壇建立碑亭之事非先期詳悉傳諭必将競事浮華徒滋糜費甚非所以勵官常惜物力也朕心深所不取其飭禁之至在籍年老諸臣如尚書沈徳潜侍郎錢陳羣等若以隨班叩祝䟦渉逺来亦非朕優體老臣之意况嵗届辛巳恭遇聖母皇太后七十大慶以新春敬奉安輿時巡南服諸臣就近迎鑾相見不逺又何必僕僕道路為耶著將此通行傳諭知之乾隆二十四年十一月二十六日上命軍機大臣傳諭兩淮鹽政高恒曰據尹繼善奏辛巳年應辦差務尚有上届賞給銀十萬兩未經動用現在存貯等語著傳諭髙恒再扵兩淮鹽庫公項内酌撥銀三十萬兩交與該督尹繼善令其偹辦充裕母致絲毫派累民間可也乾隆二十五年八月初八日上諭内閣曰獻嵗恭逢皇太后七旬萬夀於新春敬奉安輿時巡南服俯慰士民顒祝之忱並順道閲視徐州石堤及海寧塘工因降㫖令該省地方官修整道路橋梁照例預偹今嵗大江以南在在豐收惟夏間雨水稍多河湖甚長髙寳興㤗一帶低窪處所頗有漫溢前因河臣等先後摺奏特傳諭尹繼善查明下㳺被水之區預籌撫綏復恐地方有司承辦南巡差務轉于賑恤事宜不能盡心經理是以諭令該督将實在情形確查具奏候朕降㫖酌緩巡幸今據奏到髙寳等處被水較重該處既現已成災亟宜以賑務為切要南巡一事原不妨酌量改期該督身任封疆自當權其緩急早為奏請何必待朕詢及始行入告耶所有南巡應辦差務暫行停撤改于壬午春恭奉慈輦以慰輿情仍可攬民風而昭盛典大差既經停止自可耑心辦理賑務該督等務宜仰體朕懐董率僚屬確按災地情形實力妥辦勿使窮黎稍有失所以副朕痌瘝在抱之意該部即遵諭行乾隆二十六年九月初三日上諭内閣曰朕前降旨扵乾隆二十六年恭奉聖母皇太后南巡適江省各屬去秋偶被偏災因展期于二十七年今秋髙寳數邑入秋遇有風暴窪下田禾不無傷損恐地方有司查賑辦差難以兼顧傳諭該督尹繼善令其查奏毋得稍事粉飾今據該督撫奏稱江省今嵗秋收大勢豐稔髙寳等處早稲已有收穫被水亦較去嵗為輕應賑恤者不過數州縣儘可從容辦理而差務一切事宜早經預偹聖母七旬萬夀之後行慶施惠望幸彌殷等語所有明春南巡典禮着照例舉行乾隆二十六年十月初三日上諭内閣曰朕明春恭奉皇太后聖駕南巡著照丁丑年例于江浙兩省冬兑漕糧内各截留十萬石于水陸駐蹕地方分厰平糶著漕運總督及各該督撫㑹同妥協辦理該部遵諭速行乾隆二十六年十月二十七日上諭内閣曰今年恭逢聖母皇太后七旬大慶在籍諸臣來京叩祝具見悃忱獻嵗之初朕恭奉安輿時巡南服諸臣甫及旋里復當出境迎鑾僕僕道途于林下髙年諸多未便可諭諸臣今冬曽經赴闕者明春毋庸越省候接在浙江者不必至江南在江南者不必至東省如沈徳潜即于蘇州錢陳羣即于嘉興餘均視此為例副朕體惜至意乾隆二十六年十一月二十日上諭内閣曰髙恒奏兩淮商人等呈稱世享昇平受恩優渥明春恭遇省方盛典行慶施恵情愿公捐銀一百萬兩以偹賞賚等語明嵗朕恭奉聖母安輿巡幸江浙一應推恩錫賚俱經各衙門照例動用正項預偹苐該商等奏稱踴躍急公今既抒誠籲懇情詞肫切著于此内撥銀三十萬兩交于尹繼善辦理差務即賞給両淮二十萬兩為伊等修理行營等項之需酌留十萬兩以偹賞賜其餘四十萬兩著觧交河南巡撫胡寳瑔偹充工程賑恤之用該商等並著交部議叙以示嘉奨乾隆二十六年十二月初四日上諭内閣曰朕恭奉皇太后鑾輿巡幸江浙于明嵗正月十二日起程乾隆二十六年十二月二十八日上諭内閣曰向来巡幸所需車輛例由順天府用官價預為僱覔應用其中胥役人等多有乗機藉名抑勒需索諸弊為累閭閻此次南巡啟鑾伊邇順天府自己照例豫偹著歩軍統領衙門簡派員役查察如有滋事情弊即行拿究以儆刁猾嗣後有應偹車輌著交内務府總管大臣交㑹計司所属大糧荘頭等設法官辦既可供應無悞又可永㫁因差滋弊根株其悉心妥議具奏乾隆二十七年正月二十日上諭内閣曰去嵗山東被水偏災各屬雖不如豫省之重現在時當青黄不接例賑又應停止小民生計未免拮据因傳諭該撫阿爾㤗令将各處被災分數查明具奏今據奏到被災較重之曹縣城武徳州濟寕魚臺五州縣著加恩無論極貧次貧俱行加賑一個月其濱河次重之齊河金鄉嘉祥菏澤单縣定陶鉅野濮州范縣臨清邱縣館陶恩縣夏津武城等十五州縣成災在八分以上所有貧民及衛地貧軍亦著加恩展賑一個月以資接濟該撫其董率屬員妥協經理務俾閭閻均霑實恵副朕軫念窮黎之意乾隆二十七年二月初三日上諭内閣曰上年曾降㫖于兩淮運庫内撥銀三十萬兩交與總督尹繼善辦理差務但恐尚有不敷著髙恒于運庫内酌量再撥銀二十萬両以為添補辦差之用乾隆二十七年二月初五日上諭内閣曰上年江省被災各州縣已叠頒諭㫖加㤙賑䘏但念時值春和東作方興恐民力不無竭蹶著再加恩将髙郵寳應甘泉㤗州山陽安東桃源清河銅山沛縣睢寧等十一州縣無論極次貧民俱加賑一月至安徽省之太和亳州阜陽潁上靈璧五州縣亦著一體加賑一月以示恵養黎元至意該部遵諭速行同日上諭内閣曰宿遷一帶州縣地方濱臨大河向來嵗收率多歉薄現在巡行省視見閭閻氣象較前似覺稍舒而生計未能優裕時值春和農功肇舉尚須加㤙接濟著該督等從優酌借籽種俾得從容東作以冀有收該部遵諭速行同日上諭内閣曰朕巡省江浙所過地方並未禁止行旅将來旋蹕時皇太后御舟由水路進京程途尤為穏便昨巡漕給事中洋海廼先期奏請自通州南下船隻悉令廻避所見甚屬紕繆運河為南北通津舟楫往來相望即届聖母御舟經過時旁有支河港汊自可暫行引避設其地别無可避亦苐附泊傍岸不致妨碍縴道足矣若豫事盡行飭禁則自春渉夏為日頗長以千里長河使行者乆覊道路于事理全未通曉已傳旨申飭並傳諭經行各處一切如常放行但江浙二省水程更多有司不能曉事或有似此拘泥辦理者並著各該督撫即飭知沿河地方官凡商民船隻均行照常行走毋得稍有禁阻将此通諭知之乾隆二十七年二月十八日上諭内閣曰向来巡幸所至地方大吏預備燈船烟火頗覺繁俗頃在揚州適以哈薩克陪臣入覲聊示内地民情和樂之意是以聽其預備倘蘇杭等處悉仿而行之更屬不必朕省方觀民勤求治理即以㡬暇適情則山川名勝儘足以供吟眺之資又何事徒資繁費為耶著将此傳諭知之乾隆二十七年二月二十一日上諭内閣曰扈蹕南巡之漢大臣籍隸江浙二省者著于迴鑾時酌量道路所便請假歸省乾隆二十七年二月二十九日上諭内閣曰朕稽古省方乗春布令而清理庶獄矜恤尤深用沛徳音式照盛典所有江蘇安徽浙江三省軍流以下人犯俱著加恩各予減等發落凡親民之吏其諄切告誡俾知改過自新共享太平之福乾隆二十七年三月二十三日上命軍機大臣傳諭兩江總督尹繼善曰凡各馬頭地方只許鋪棕毯不許鋪紅黄等氊乾隆二十七年三月三十日上諭内閣曰朕巡幸所至凡地方預偹一切飾觀之具殊覺繁俗已屢降旨槩行斥禁因念回鑾直𨽻時莭令適近端午恐地方官不無㸃綴節景或于趙北口有供備龍舟之事著方觀承先期實力飭禁毋得稍踵靡文以副朕意乾隆二十八年四月十一日上命軍機大臣傳諭閩浙總督楊廷璋等曰工部議覆楊廷璋等奏銷南巡動用欵項一本因該督等籠統開報未将應用各項詳細聲明駁令據實刪减現已明降諭旨加㤙准其報銷矣此係出自朕之特恩不可視為常例奏銷銀欵原宜慎重例係将前後動用各項暨物料尺寸細數逐一分晰造報該部方可據以察核若但籠統開銷何以信其並無浮冐且奏銷時既可籠統則動用時必不能加意撙莭此在督撫大臣可保其必無染指司道大員受㤙簡用即不致因辦理差務混冐肥槖而其往来食用或不免藉端取給至于承辦之佐雜等官藉此含糊弊混以為冐銷之地更勢所必有若以從前尹繼善奏銷江南辦差銀兩既降㫖准銷今楊廷璋此本又得一例降旨將來遂至視為故事並不按照成例詳晣造册仍前籠統開銷以至不肖官吏得以從中取利一經察出則惟該督撫是問朕巡省所至凡行宫預偹等項已屢經詳諭該督撫等一切務從簡樸從前三次辦理已不免踵事増華倘将来彼此效尤日甚一日何所底止且如朕在京及圓明園每日視事之所雖細如頂槅糊飾之類不過隨時粘補不求一律鮮華此亦廷臣所共知若以偶然駐頓之地當上届已經整葺而小有渗剥不過畧加補苴便已妥恊何必更増繁費前此地方官知朕絲毫不肯累民動以商捐藉口殊不知官取給于商而商人所捐孰非民用所給自後該督撫惟應實力約省凡有所需用只許支取例給之項及前此賞用所餘據實冊報查核其啇捐一莭亦儘可停止又扈從官員並已給船乗載何須預偹公館在扈蹕大臣等朝夕侍直該班既不能四出居停其各衙門官員差使稍緩者即泊舟稍逺亦無難從容退食乃有司等輒以此為名致不肖胥役保甲等佔貼民房勒索滋弊此風㫁不可長亦著嚴飭禁止無得稍為寛假或大臣官員等自需住宿則聼其出資僦賃不許地方官代為購覔以杜擾累此後公館一事竟宜停止欽定南巡盛典卷二十七
