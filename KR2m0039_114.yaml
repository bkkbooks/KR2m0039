  text: 欽定四庫全書欽定南巡盛典卷八十一
  hash: sha256:d4bba4aa216d82d3d4222cec9c9e795248c48cc9565b9d9fd18da98615804e8a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_114-1a, image: WYG0659/WYG0659-0289a.png}
body:
  text: 名勝臣等謹案方域之內山為積德川為積形而扶輿清淑磅礴之氣又必獨鍾靈秀以表異於山水之間頌為奧區目為福地圗繪景物美諸形容此亦嶽貢川珍之一驗也禹貢冀兖徐揚之域都㑹星羅於山見泰岱之髙於水見黃河之深帶以長江清淮達於具區漸水其間巖谷森秀花木清妍據四達之衝而復擅登覽之美者所在多有豈獨如歐陽修所舉金陵錢塘為東南勝境歟然以擬聖天子勤民育物之本懷則不在是溯自鑾輿未駕即以率由舊章毋或踵事增華諄諄垂誡逮夫入疆伊始劇易周知時未經旬庶政備舉即偶值幾暇登臨亦無非軫念民依形諸歌詠蓋帝心所繾注者惟河工海塘之永慶安瀾而不在問水尋山之足供睿覽所欣慰者惟農夫蠶婦之咸安耕織而不在尋幽選勝之偶愜宸襟是以德澤涵濡山川增潤一卉一木莫不共效珍異同副昌期斯誠極千載一時之嘉㑹矣矧夫駐蹕之所於以敷政覲侯復屢奉訓言務從簡朴大河以北安設帷宫僅列梐枑間備屋宇礱斫不施自揚州江寧而至蘇杭則多就名藍左近略為搆葺敬奉宸遊居頌有那夀同無量至是而知朝㑹之地與名勝之區胥沐光榮要非創建臣等所由彚載一編而無所容其侈叙者也謹志名勝苐十一欽定四庫全書欽定南巡盛典卷八十一名勝乾隆十五年十一月初五日上諭內閣曰朕明歲巡幸江南隨駕人員已經派定左侍郎秦蕙田自行奏請以臨幸惠山必至秦園為辭秦園在惠山之麓聖祖嘗經臨駐留賜御書朕清蹕所經自當瞻仰然不過名山古蹟偶爾登臨初非因朝臣林園之勝足供遊覽致煩供帳秦蕙田已不准隨駕並令軍機大臣等諭知朕意但恐秦蕙田指稱臨幸𣲖纍闔族人衆出資修理而伊獨居其功且以餘資自潤此則不可著傳諭黃廷桂令其留心查察至園亭既有皇祖御筆即動用商捐公項官為修理俾得世世承守豈不更沾愷惠乎乾隆二十年六月十九日上命軍機大臣傳諭兩江總督尹繼善曰朕明嵗南巡一應務從簡朴之處已屢降㫖曉諭該督等矣兹據尹繼善奏稱從前未及登臨之地如寒山别墅石湖石佛寺棲霞山等處一併酌量興修以備省覽等語此等處所皆與行宫相去不逺間或登臨眺覽俱可即日往返無庸駐蹕只當就山寺內原有屋宇可以憩坐之處量為掃除不可專搆行軒以滋糜費其修葺費用一併于普福所奏商捐銀內動支乾隆二十七年三月初九日上諭內閣曰朕奉皇太后安輿涖兹南服所以省方觀民勤求治理其各處舊有行宫清蹕所駐為期不過數日但須掃除潔净以供憩宿足矣固無取乎靡麗飾觀也而名山勝蹟尤以存其舊規為自然之趣從前屢降諭㫖至為明晰乃今自渡淮而南凡所經過悉多重加修建意存競勝即如浙江之龍井山水自佳又何必更興土木雖成事不說而似此踵事增華伊於胡底轉非朕稽古時巡本意且河工海塘為東南民生攸繫朕厪懷宵旰時切紆籌地方大吏果能加意修防永資捍禦則兹之親臨閲視其欣慰當何如耶而田疇豐潤井里熙恬所以博朕愜覽不在彼而在此也嗣後每屇巡幸之年江浙各處行宫名勝處所均無庸冉事增葺徒滋糜費即圬墁裱飾至年久剝落亦可悉任其舊此實為愛惜物力起見也該督撫等其各善體朕諭敬相遵守乾隆二十九年十月二十日上諭內閣曰崔應階前奏該省魏家莊大營有四賢祠陳家莊有晏子祠其建祠時代始末及諸賢姓氏事蹟並費縣之萬松山有無故實可稽俱著確切查明詳悉具奏乾隆四十五年正月十九日上諭內閣曰朕因東南黎庶望幸情殷爰舉舊章五巡江浙所以省方觀民勤求治理清蹕所經各處舊有行宫祗令掃除潔淨以供憩宿毋得踵事增華致滋糜費屢經降旨諄切曉諭封疆大臣自能仰體朕心遵㫖辦理苐念直省行館近京數程屢經駐蹕即圬墁裱飾為費尚屬無多其自山東以至江浙所有行宫則自乙酉南巡至今未經臨蒞閲時既久不免􅀈舊剝落地方官修理葺治不無所費且山東江蘇二省俱有添建座落此項用度聞各省俱係捐亷辦理在地方大吏養亷豐厚分年扣捐以抒忱悃尚屬可行况朕又復加恩賞給庫銀用示體恤伊等辦理儘足敷用若更因此𣲖纍閭閻致滋苛擾則斷不可且非朕念切民依行慶施惠之意也苐恐不肖有司或有藉辦差為名暗中科斂而窮鄉僻壤未及周知亦有幫貼差費者一經察出必將該督撫等重治其罪以昭警戒其各遵凛朕㫖慎勿自干嚴譴也乾隆四十七年十二月二十七日上諭內閣曰浙省上屇辦理南巡於杭州西湖等處添設座落㸃綴甚多繁費無益殊非朕省方問俗之意屢經降㫖訓飭而此內葛嶺一處鑿山開道建蓋屋宇尤屬無謂且所費不資朕心實所不取是以上屇即未往臨幸此皆王亶望王燧借辦差為名肆行糜費外博見長之巧隂遂貪縱之私其罪實由於此著傳諭福嵩於葛領座落斷不必冉加修整但係已成之局竟任其自然可也乾隆四十九年五月初一日上諭內閣曰仿宋板五經著於直𨽻趙北口絳河山東德州白鶴泉泮池泉林江南天寧寺髙旻寺金山焦山寄暢園蘇州靈巖山江寧徐州桞泉浙江杭州聖因寺龍井安瀾園等處各陳設一部其平定凖噶爾回部兩金川得勝圗亦著一併陳設欽定南巡盛典卷八十一
