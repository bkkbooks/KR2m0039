body:
  text: 欽定四庫全書欽定南巡盛典卷三十二蠲除乾隆二十七年正月初二日上諭内閣曰今春朕㳟奉皇太后鑾輿巡幸江浙便道閲視河工海塘與封疆大臣講求吏治民生諸要務念昨冬㳟逢慈恩覃被之餘正東南士民望幸情殷之候翠華所過宜沛隆施益光慶典著将江蘇安徽浙江三省自乾隆二十二年起至二十六年止所有節年災田緩徴及未完地丁各欠項照二十二年例概予蠲免該督撫等其嚴飭所属悉心核實奉行俾閭閻膏澤均沾毋致吏胥中飽副朕錫類推恩至意該部遵諭速行乾隆二十七年正月十三日上諭内閣曰朕此次南巡所有經過直𨽻山東地方本年應徴地丁錢糧俱著加恩蠲免十分之三此内該二省上年偶被偏災處所著蠲免十分之五該督撫等董率属員查明妥協辦理俾小民均沾實恵該部遵諭速行乾隆二十七年正月二十四日上諭内閣曰東省去秋被水偏災各属已疊降恩㫖多方撫恤兹朕鑾輿臨幸體察民依雖閭閻氣象和樂而災黎元氣始復深為厪懐該省尚有厯年未完民欠啇輸等榖及籽糧麥本牛具等銀例應照數徴收還項著再加恩将恵民商河霑化金鄉魚臺濟寧州濟寧衛荷澤單縣城武定陶范縣館陶臨清衛等十五州縣衛自乾隆十年至二十四年民欠常平商輸等榖三萬七千餘石又金鄉魚臺濟寧等三州縣二十二三四等年民欠籽糧麥本牛具等銀一萬四千九百餘兩概予豁免俾民力益加寛裕足資耕作副朕嘉恵災黎至意該部遵諭速行乾隆二十七年二月初四日上諭内閣曰朕恭奉皇太后鑾輿巡省江浙前已特頒恩㫖将該二省積欠地丁全行豁免兹入疆伊始慶典宜行所有江南浙江水陸經過地方本年應徴額賦俱著加恩蠲免十分之三此内或有去秋被水歉收者蠲免十分之五該督撫等其董率属員實力奉行稱朕子恵黎元至意該部遵諭速行乾隆二十七年正月十四日上諭内閣曰朕此次南巡省方問俗翠華所過慶典時行念兩淮竈户僻處海濵生計殊為艱苦所有従前帯徴未完折價銀九千餘兩著加恩一體豁免以示優恤乾隆二十七年三月二十七日上諭内閣曰朕㳟奉皇太后安輿臨幸江浙翠華所至蠲賚疊加而省㑹駐蹕之地宜行茂典載沛渥恩其江南之江寧蘇州浙江之杭州附郭諸縣本年應徴地丁銀兩悉予豁免用昭行慶施恵省方勤民之至意該部遵諭速行乾隆二十七年四月二十八日上諭内閣曰朕巡省江浙畿輔所過地方應徴額賦已特頒恩㫖分别蠲免但念各属尚有節年民欠未完之項因災分年緩帯錢糧尚應按數徴收兹回鑾沿途體察民依宜敷恵澤著再加恩将乾隆十二年至二十五年大興靜海龍門宣化懐安萬全西寧懐來蔚州四旂等十州縣㕔未完地糧銀七千一百餘兩改折銀六千六百餘兩屯粮一萬六千餘石概予豁免其自十九年至二十五年各属因災緩帯地粮銀八萬六千七百餘兩改折銀九千一百餘兩屯粮六萬三千餘石並著加恩於本年起限再分作三年帯徴俾民力益舒得資耕耨用稱愛養黎元至意該部遵諭速行乾隆三十年正月初二日上諭内閣曰今春朕㳟奉皇太后安輿四巡江浙東南黎庶望幸情殷宜布渥恩用光盛典前此三經臨幸恩㫖疊頒所有江南省積欠地丁等銀蠲免至二百餘萬兩維時地方大吏率多遵循舊例例所應蠲者不論災熟積欠並予豁除而於因災緩帯之項其中有例不准蠲者轉未獲一體邀恩於情理未為允協因思成熟地畝當年出産本豊自不難踴躍輸将年清年欵其陳積未完者實不免預覬恩膏有心觀望若因災停緩之糧勢由嵗歉不齊致滋逋負初非玩户抗延之比今翠華所過慶典聿修而此等祲薄窮黎未䝉濊澤朕心實為軫念著加恩将江蘇安徽乾隆二十五年以前節年因災未完蠲剩河驛俸工等欵並二十六七八三年因災未完地丁河驛等欵以及二十八年以前節年因災未完漕項暨因災出借籽糧民糧民借備築堤堰等銀一百四十三萬餘兩又籽種口糧内米麥豆榖十一萬三千餘石概予蠲免至浙江一省額賦本較江南為少其積欠亦属無多著将乾隆二十六七八三年因災未完地丁銀兩並二十七年屯餉沙地公租二十六七兩年未完漕項等銀一十三萬二千五百餘兩又二十八年借給籽本榖一萬三千七百餘石加恩悉行蠲免以均恵澤該督撫等其董率所属實力詳查妥辦副朕嘉予元元至意倘有不肖胥吏従中舞弊影射侵漁察出即與嚴叅従重治罪該部遵諭速行乾隆三十年正月十七日上諭内閣曰朕此次巡幸江浙所有經過直𨽻山東地方本年應徴地丁錢糧俱著加恩蠲免十分之三該督撫等務董率属員實力奉行俾小民均沾實恵副朕愛養黎元之至意乾隆三十年正月十八日上諭内閣曰直𨽻連嵗收成豐稔民間盖蔵自應充裕但従前因災未完積欠新舊並徴尚恐難於完納兹當鑾輅南巡道經畿輔體察民隠用沛恩膏以廣慶澤著加恩将直𨽻各属自乾隆十九年至二十五年舊欠並二十六年未完緩徴銀共三萬二千四百年兩米榖豆共三百五十餘石一體豁免該督其實力稽察妥協辦理俾閭閻並霑實恵稱朕疊沛渥恩至意該部即遵諭行乾隆三十年正月二十四日上諭内閣曰朕清蹕時巡道經山左昨已特沛恩膏降㫖将所過地方本年額賦蠲免十分之三東省連嵗豐稔民氣恬熙朕攬轡所覩深為欣慰但念該省尚有積年欠項皆係従前無力輸将所致若按限催科仍恐稍有拮据著加恩将濟南武定兖州曹州東昌等府属乾隆二十六七兩年未完因災緩徴地丁暨民借麥本牛具等銀六萬二千九百五十餘兩又濟南武定兖州東昌曹州沂州等府属乾隆十二年至二十七等年未完因災緩徴暨民借年乆常平倉榖七萬五千四百四十餘石概行豁免俾閭閻益資饒裕該撫其善體朕意率属實力奉行務期膏澤下施均沾實恵該部即遵諭行乾隆三十年二月初七日上諭内閣曰朕㳟奉皇太后安輿四巡江浙啟鑾之前已特頒恩㫖将該二省積年緩帯未完銀糧全行豁免兹當入疆伊始宜敷愷澤以昭盛典所有江南浙江水陸經過地方本年額賦俱著加恩蠲免十分之五該督撫等其率属實力妥辦稱朕觀民行慶至意該部遵諭即行乾隆三十年二月初九日上諭内閣曰宿遷一帯地方濵河沮洳土瘠民貧従前巡幸所經毎深軫念兹入疆咨省見閭閻氣象較前頗覺寛舒攬轡之餘用深欣慰昨已降㫖免經過州縣額賦十分之三因念陸路經行一切灑道清塵較水程倍為勞勩雖按名給值絲毫不以累民而百姓踴躍赴公瞻依恐後其情尤堪嘉悦著加恩将現在經過之宿遷桃源清河暨回鑾時所過之銅山等四縣本年應徴地丁銀兩蠲免十分之五該督撫其率属實心經理俾盖蔵益資饒裕元氣大復共樂恬熙以副朕加恵愛養之至意該部遵諭速行乾隆三十年二月十六日上諭内閣曰朕此次南巡啟鑾前已降㫖将江蘇省厯年災緩節欠一百四十餘萬兩概行豁免並於入疆之初諭将經過地方本年額賦蠲免十分之三宿遷等縣地土素稱瘠薄特免十分之五以示體恤今自渡淮而南見羣黎歡迎道左愛戴有加因念江蘇為財賦重地頻嵗屢獲豐稔維正之供諒無拮据但所免災欠一項蘇松各属不及淮徐之多恩施未能徧逮即駐蹕處所将來更沛恩膏亦止省㑹數縣其餘各屬尚未一體均沾著再加恩將江蘇布政使所屬各州縣乾隆二十八年以前熟田地丁雜欵未完銀四萬一千六百餘兩一體概行豁免並將江蘇經過地方本年錢糧均免十分之五俾閭閻益資殷阜共樂昇平副朕加恵無已至意該部遵諭速行乾隆三十年閏二月初三日上諭内閣曰朕巡幸江浙啓鑾之初降㫖將江浙二省累年積欠銀糧全數豁除而浙省所免之數較之江省尚少兹當入疆伊始疇咨民瘼該省尚有未完欵項著再加恩將浙江省乾隆二十六七八等年積欠未完漕項及仁和袁浦等塲未完竈課銀一萬八千六百餘兩二十四六七八等年因災緩帯積欠未完南米及借給各塲竈户倉米一萬八千九百餘石二十六八兩年錢塘諸暨玉環等㕔縣借給農民緩徵穀及因災緩徵租穀一萬六千九百餘石概行蠲免該督撫等其率屬實力奉行務俾恩膏下逮稱朕恵愛黎元至意該部遵諭速行乾隆三十年閏二月初四日上諭内閣曰朕翠華南幸始莅浙境念該省所免積欠較江省獨少且於未奉恩㫖以前復有續完之項民情可謂急公因命悉查積年未完各項無論於例應蠲與否盡予豁除以紓民力至清蹕所經前已降㫖蠲本年十分之三昨巡厯江省復念淮徐各屬地瘠民貧江淮以南人知愛戴凡水陸經行州縣加免十分之五浙省雖郵頓無多而除道清塵亦足覘閭閻歡感兩省皆係赤子誠求懐保厥視維均著再加恩將浙江經過地方本年應徵錢糧概免十分之五俾羣黎普沾膏澤益慶阜恬副朕入疆施恵至意該部即遵諭行同日上又諭内閣曰朕稽古省方四莅江浙已降㫖將經過地方本年額賦豁免十分之三而省㑹駐蹕之地加恩更宜優渥其將江南之江寧蘇州浙江之杭州附郭諸縣本年應徵地丁銀兩概予豁免用宣慶恵該部遵諭速行欽定南巡盛典卷三十二
