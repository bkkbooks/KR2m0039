body:
  text: 河防乾隆二十九年四月十三日江南河道總督髙晉奏言竊臣由徐州至清口查勘黃河各廳工程料物前經恭摺奏聞伏查清口為淮黃交滙之區清口以上宿桃等廳専受黃水自清口東壩以下則淮黃合流計程二百餘里至雲梯關迤東歸海比年來臣仰遵皇上聖訓將清口東西壩預為啓拆大加展寬俾湖水暢流東注不致由五壩旁泄業已著有成效惟下遊山海二廳以二瀆之水合為一河兼以伏秋盛漲或遇海潮相抵每致水勢平堤拍岸工程險要臣前於荆山橋工次據山安海防廳營稟北岸之五套南岸之陳家浦近日溜勢趨逼漸次坐灣將成頂沖入袖之勢舊有土堤卑矮單薄請估幫髙厚添築魚鱗越堤方能抵禦估需工料銀二萬餘兩臣隨于查工時親赴各該處往來周厯細加察勘如雲梯關之內南岸阜寧縣馬起營等工北岸安東縣佃湖等工均屬逼近城垣更多民舍村莊凡迎溜頂沖之處所謂尺地必爭自應將現有掃壩工程加謹防護隨時修築堅實以資鞏固至雲梯關以外南岸至灶工尾北岸至六套俱係蘆葦蕩地離海甚近即間有樵採漁戶散處其間亦遷徙無定是以舊制本無堤岸因一望平灘水勢易於散漫曽設卑矮土堤約攔水勢與雲梯關內緊要堤工形勢迥别每年汛水長發海潮倒漾出槽漫灘內外皆水無關緊要自應不與水爭地無事生工檢查舊案乾隆十年南岸陳家浦漫溢因海灘土性浮沙樁掃旋築旋塌不能施工直至水落挂淤填土補築其北岸五套於乾隆十八年及二十五年亦經兩次漫灘過水旋即挂淤並無妨礙今若因溜勢坐灣乃復添築越堤勢必又將卑矮土堤加幫髙厚修築掃工昔年之陳家浦前車可鑒不特虛糜錢糧而海灘地面掃工難期穩固實屬無益臣與淮揚道吳嗣爵率同各廳營詳加相度冉四講求陳家浦五套二處與其築堤束水致生新工不若讓地與水以順其性查現在黃河距堤尚有八九十丈以至一百二十丈不等此時可以緩辦將來伏秋汛內冉看刷崖情形如溜勢仍然兜灣向裹則舊有卑薄土堤不必加幫亦不必添築魚鱗越堤只須預于舊堤上首另做斜長子堰一道俾地勢展寬約攔漫灘之水使之滙歸正河暢達入海而所築子堰夫工約估需銀不過數千金即在該二廳嵗搶修庫貯內撙節辦理毋庸另請錢糧如此則山海二廳雲梯關下遊既可不致生工而清口東西壩每年大加拆展湖水滙黃歸海尾閭寬濶於就下之勢益資暢達矣奏入上諭曰覽奏俱悉餘有旨諭乾隆二十九年五月十九日江南河道總督髙晉奏言竊臣接準廷寄欽奉上諭朕前嵗南巡在徐州閲視河工見北岸有隄身單薄髙晉奏稱應行放淤培護先挑倒勾引河俟應放時放淤等語今閲時已久未見該督摺奏及此其曾否相度籌辦並現在該處情形若何著傳諭髙晉可即詳悉具奏欽此臣跪讀之下仰見我皇上垂念河防工無巨細莫不時厪宸𠂻臣伏查徐屬宿虹廳之黃河北岸夏家馬路一工係在運河縷隄外正當黃河頂沖築做壩臺鑲掃保護縷隄與壩臺兩相交峙中隔二三十丈全是坑窪深塘工程素稱險要臣從前協辦河務時曾與前河臣白鍾山以放淤相啇事未果行乾隆二十七年春恭逢聖駕南巡親臨閲視該工隄身單薄經臣將該處應行放淤培護先挑倒勾引河俟水長時相機放淤之處面奏請訓仰蒙聖鑒俞允臣於跪送聖駕回鑾後即赴該工相度將工頭工尾應開進水出水倒勾引河如法辦竣然放淤必待黃河水勢盛長開放始克有濟是年伏秋汛內黃水盛長兩次閛放後計澄淤五六尺至八九尺不等臣於該年奏報查勘徐屬各工情形附摺聲明未經專摺具奏上年臣於勘辦春工時復將該處倒勾引河挑挖修慗逮伏秋黃水盛長又經疊次閛放因工長四百四十餘丈尚未一律淤成夲年臣督辦徐州荆山橋河往返該工查勘數次詳加測探現在上假長一百餘丈下段長九十餘丈已澄淤八九尺不等通身坑塘亦俱墊平惟中段計長二百丈許止澄淤二三四尺仍須設法接續辦理未便使其功虧一簣隨與道廳參逰等冉四講求細心籌計查放淤引河形取倒勾是以進水勢緩工頭則水過淤停工尾則倒漾之水淤亦易積惟中段所過之水沙停兩頭積淤甚少今應於該工中段磨盤掃回溜處另挑倒勾引渠一道俾黃水自中段引入由上下兩頭分流而出則中段進水停淤必多可期與兩頭所澄之淤一律相平庶隄掃培護堅厚工程得資鞏固現在督飭廳營照此辦理臣原擬今年夏秋放淤工竣恭備明春鑾輅經臨奏請皇上閲視今奉諭旨垂詢所有臣厯年相度籌辦並該處現在情形理合繪圖貼説詳悉具奏奏入報聞乾隆二十九年五月二十七日山東巡撫崔應階奏言竊臣因直𨽻全漳歸衛東省沿河州縣及直屬下遊一帶恐致漫溢已照裘曰修所奏將四女寺壩口支河展寬一十二丈以資分泄並將沿河兩岸堤堰勸民加髙培厚辦理完竣臣往來查勘如沿河之武城縣境內地勢最窪運河東岸有沙河一道遇伏秋雨多臨清夏津等處坡水皆由沙河滙注武城之牛蹄窩祝官屯一帶為東岸運堤所隔不得入運常至淹浸民田雖牛蹄窩舊有涵洞因地勢外髙內低運河漲發反至倒灌民間每年加築護堤俟秋後運河水消閛堤泄水民田方得消涸又武城縣境內運河西岸有蔡河一道西通黃潞河遇伏秋雨多則上遊臨清並直𨽻清河等處坡水俱由黃潞河蔡河滙注武城之馮家灣為西岸運堤所隔不得入運浸灌民田每年亦俟秋後運河水消開堤泄水臣查武城東西兩岸坡水不能入運民間每年秋後開堤春間堵築出於萬不得已且時堵時開堤不堅固運道攸關任民開挖恐失緩急機宜况開堤之處水勢旁刷每年以數十萬之土沖入運河多費撈濬臣與布政使梁翥鴻運河道李清時濟東道尹嘉銓履勘詳籌擬於東岸之牛蹄窩祝官屯西岸之馮家灣等三處各建石閘一座設板啓閉遇運河水大則下板以防倒灌深秋水落則啓板以消積潦較之閛堤顯有節制內如馮家灣坡水甚盛一閘不足以資宣泄擬將閘門展寬分為兩空中設磯心開槽下板則水勢得以暢泄以上三處閘座除將牛蹄窩舊有涵洞甲馬營舊有廢閘選舊石可用者湊用外其應添工料飭令據實確估叧取估册咨報於耗羡項下動用似此辦理庶得大消坡水直東民田均免淹浸又免民間每年閛堤有悮運道似屬一勞永逸之事臣謹會同河臣葉存仁恭摺奏明並將該處情形繪圖貼説恭呈御覽奏入諭如議行乾隆二十九年九月十九日江南河道總督髙晉奏言竊查宿虹廳屬夏家馬路放淤工程伏汛內新淤尺寸業經臣繕摺奏蒙聖鑒交秋以來黃河水勢節經加長臣又兩次飛飭該廳營等如法閛放旋據廳營稟報該工中段業已淤平應否接續辦理請示到臣兹臣前赴上遊徐屬查工隨親至該處逐一履勘查該工計長四百四十餘丈從前自兩頭進水上段一百餘丈下段九十餘丈兩年來已澄淤八九尺不等中段之二百餘丈只澄淤二三四尺本年伏汛內改由中假進淤雖又增淤二三尺然較兩頭所澄之淤尚少一二尺今秋汛內又經兩次進淤二三尺已與兩頭一律淤平測量現在淤髙水面三尺是當日掃後深塘已成平地從此頂沖要工得有後靠化險為平臣復再四相度該工淤髙水面三尺雖已著有成效然而淤益髙則工益固自應接續辦理以期一勞永逸臣隨面交該管廳營督率兵夫在新淤中間接挑溝槽寬以一丈深以三尺為率挖起之土分鋪淤面並將上中下三道倒勾引渠如式修慗目下秋汛未過若遇水長仍可進淤即或水不再長亦可為明嵗伏秋放淤之計臣並在工上下看定安設馬頭地方明春翠華南幸屆期敬謹預備恭請聖駕臨工閲視若得仰蒙指示臣更知有所遵守矣奏入報聞乾隆三十年二月十三日江南河道總督髙晉奏言本月十二日恭逢聖駕親臨閲視清口木龍工程荷蒙聖明指示應于四架木龍迤下與陶莊積土相對之處再添木龍一架庶挑溜更為有力大溜全歸北岸則陶莊積土自可沖刷淨盡以收清黃並流之效臣遵即測量地勢蒙皇上指示之處在四龍迤下相隔一百九十丈正與北岸陶莊積土緊對應遵旨即於該處添建木龍一架擬長五十丈挑溜全趨北岸實屬有益除現在委員核實確估辦料俟料物到齊儧辦務於伏汛前完竣奏入上是之乾隆三十年二月十四日兩江總督尹繼善江蘇巡撫莊有恭奏言據協辦大學士陳宏謀奏請將常鎮二府港汊墟圍責成司道大員前往查勘有阻塞破損者疏濬培補其通江尾閭如孟河之類如有淤塞大加挑挖期於有蓄有泄奉旨俟到江南時交該督撫查辦欽此準軍機處移交到臣等竊照農功必藉乎水利而水利之興修全在溝洫流通墟隄堅固方足以資灌溉而衛田疇伏查江南一省恭逢我皇上疊舉時巡盛典翠華所遇指示機宜如徐海淮揚一帶河道溝渠俱大發帑金次第疏瀹並於工竣之後督率民力每年嵗修不使稍有淤塞其蘇松太等處前嵗亦經奏明將淞江婁江河道一體開濬現在宣泄以時旱潦有備豐亨屢慶成效可稽至常鎮二府地土寬平河流坦易本不至如淮揚蘇松各郡之低窪惟是地近江邉潮汐往來不無淤沙停積如鎮江府之城河臣等已于上年飭令該道府勸諭紳士設法開疏報驗竣工又如金壇縣之運河亦據該縣紳士呈議集費經臣等批準定於今嵗農隙築埧大挑原俱仰體聖主重農興利至意量民之力因天之時次第辦理今據陳宏謀所奏皆屬應辦之事臣等伏查該二府支河汊港圍蕩堤塘所在皆有向俱民間自為經理但恐心力不齊彼此諉缷自應官為督辦至通江尾閭如孟河之類淤塞年久工煩費重非可茍且圖功且東作將興大江以南民勤力作屆期即刻無寧晷斷不能即時興工臣等擬請先委常鎮道督同常鎮二府親往各處逐一查勘分别先後舉行如支河汊港圍蕩堤塘坍塌淤滯工費無多者即立督各業佃􅀈期挑挖培固至通江尾閭如孟河之類應大加挑濬者先測量髙下淺深工費需用若干諭令民間公同議辦或一時民力難於集費則酌借公帑分年徴還俟查明之後冉另委大員覆勘分定段落預選紳耆多派官員先定規模俟本年農隙齊力大舉務期莭莭疏通農田永賴以仰副聖懷奏入諭依議行乾隆三十年三月二十八日江南河道總督髙晉奏言切查徐州豐碭廳毛城鋪原設碎石滚壩為宣泄黃水盛漲之水啓閉機宜最關緊要乾隆二十七年恭逢聖駕南巡臨徐閲視北門外志樁水勢仰蒙睿謨廣運因時制宜欽奉諭旨毛城鋪迤東之唐家灣引河視徐城水志長至一丈一尺五寸以上閛放宣泄俟漫灘水落即行堵閉仍令督撫河臣於按志應放時一面奏聞一面辦理欽此臣敬謹遵守二十七八兩年伏秋汛內徐城水志加長逾志將唐家灣草埧依時啓閉二十九年未經漫灘唐家灣亦未開放俱經臣先後具摺奏聞臣數年以來留心察勘該處從前漫灘係在唐家灣迤下二十七年漫灘正對唐家灣引河二十八年漫灘又在唐家灣迤上察其所以上下無定之故蓋漫灘一次則河唇必髙仰數寸以至尺餘不等水性就下乘低而漫理勢固然惟是唐家灣漫灘形勢既已自下而上河崖袤延二三十里地方廣濶若聼其自然不加修治將來漸徙漸上正與蔣家營傅家窪等處逼近恐過水較多致有掣溜之虞臣查毛城鋪下遊濉河每年秋汛後如有淤墊俱經勘估挑濬今唐家灣引河外灘既因沙淤髙仰自應比較欽定徐城水志尺寸將該處河灘新淤浮沙剷去一遇水長逾志即閛放唐家灣引河以資宣泄方合機宜臣于上年冬間親往查勘督飭道廳將該處河灘新淤測量剷平地勢髙下悉仍其舊總以徐城水志為凖似於節宣下遊減泄盛漲均有禆益奏入報聞乾隆三十年四月十三日河道總督李清時山東巡撫崔應階奏言竊查德州城外衛河因西方菴形勢偏趨城垣受險于乾隆二十七年十一月內經前河臣張師載前撫臣阿爾泰會同奏明在於對岸魏家莊挑挖引渠長四百九十五丈分泄溜勢嗣因新挑引渠河身窄狹閛放之後舊河內西方菴險工仍不能盡除又經前河臣張師載奏明將舊河口門堵築攔河大壩令全流悉歸引渠冀其沖刷寬深臣等屢至其地逐一勘驗舊河原寬三十五六丈今引渠僅口寬十二三丈引渠兩崖全係膠淤兩年以來水勢不能沖刷現在口底寬深仍與原挑丈尺不相上下伏查衛河之水滙合汶漳每至伏秋大汛勢甚浩瀚在河面較寬之慮尚慮出槽盈岸今以十餘丈之引渠承受全衛之水咽喉既束勢必益增其漲上年汛水安瀾至此處因引渠窄狹水勢擁髙浸及攔河壩上竭力搶護始保無虞此其明驗也查舊河現寬三十五六丈若將引渠大加展寬與上下舊河一律水勢非不可以下達而核計土方銀兩需費較多若閛壩分水不加約束則舊河勢順溜復偏趨險仍未除臣等公同商酌可否將攔河壩挑開酌留舊河口門二十丈聼其分流壩之兩頭用草柴褁護并於西方菴頂沖迎溜之處修築挑水草壩以挑溜勢其舊日掃工酌量應修之處相機辦理庶水勢分行俾得有莭制舊河內不致盡吸全河之水而迎溜之處復有壩工挑護河流暢順于河道城垣均屬有益奏入報聞乾隆三十年九月二十六日大學士管兩江總督尹繼善等奏言竊照常鎮二府港汊墟圍通江尾閭前據協辦大學士陳宏謀奏請修培挑挖經臣等議奏先委常鎮道府查勘如支河港汊圍蕩堤塘坍塌淤滯工費無多者應督業佃尅期挑挖培固至通江尾閭應大加挑浚者諭令民間公同議辦或一時力民難以集費酌借公帑分年徴還奉旨依議欽此當即飭委該道府逐一詳查確勘兹據常鎮道陳大化等勘明該二府通江尾閭支河汊港多屬深通圍埂堤岸亦俱完固其武陽宜荆四縣聮界之南運河暨金壇丹陽兩邑交界之七里橋河冬令水涸均有淤淺現據各該縣士民按田集費自行興挑外惟常州府屬武進縣之孟瀆德勝兩河南通運道北達大江關係數邑水利蓄泄民田萬頃咸資灌溉緣吐納江潮流沙停積河身淤墊亟須築壩大加挑濬孟瀆河計長一萬五百餘丈約估工價銀三萬一千九十餘兩德勝河計長六千六百餘丈約估工價銀二萬二千七百五十餘兩其孟瀆河旁舊有小河一道分流入江較正河近便直捷潮退盡由小河泄㵼正河水緩沙停易致淤墊應于小河分流處添建石閘一座責成小河司巡檢同孟河舊閘一並管理依時啓閉使潮退全歸正河以免停沙壅滯所有建閘工料約估需銀五千六百九十兩零通計孟瀆德勝兩河挑浚建閘共約估工料銀五萬九千五百四十餘兩工費浩繁民力一時難以措辦據武進陽湖兩縣士民呈請備動公項于今冬築壩分假儧辦按兩邑田畝驗派分作四年徴還又鎮江府屬丹陽縣之九曲河亦係通潮濟運灌溉田疇年久淤塞應行挑濬計河長九千五百餘丈內有橋閘坍塌均須修慗共約估工料銀一萬三千七百九十餘兩據該縣士民呈請借項于今冬興挑按照沾用水利田畝驗派分作三年完􅌳詳報到臣臣等查常鎮二府屬孟瀆德勝九曲三河均係通江尾閭攸關水利農田今既年久淤塞自應一律挑濬深通以資宣泄灌溉現在行司遴委幹員于秋深水涸時再行詳細覆勘核實一面選擇誠實士民分派段落酌定章程於冬間興舉勒限完竣其孟瀆河添建閘座一並選擇紳士購料承修仍遴委諳練河員分段督催責成道府隨時稽察工竣委員驗收務期處處如式工歸實在惟是三河所需工料多至七萬數千兩民力不齊仰懇聖恩俯準於司庫公項銀內借給儧辦仍按所借銀數丹陽縣分作三年徴還武進陽湖二縣分作四年徴還庶民力稍紓大工得以尅期告竣數邑水利農田永資利賴億萬民人感沐隆恩於靡既矣奏入諭如所議行乾隆三十年十月十四日河道總督李宏山東巡撫崔應階奏言竊臣等接準乾隆三十年七月初五日廷寄欽奉上諭前因微山湖蓄水過多遇夏秋漲溢之時瀕湖窪地每多淹浸經崔應階等奏請宣泄微湖以志一丈為度於韓莊添建新閘以殺其勢並挑荆山橋以暢其流辦理以來漸著成效今嵗南巡回鑾時舟行所經詢悉該處情形知濵湖漥地近多涸出農田耕作有資但湖水暢消既久瀦蓄未充亦恐艱于濟運事難兩利深厪熟籌今據楊鍚紱奏稱湖內之水須存一丈二尺用至五月八閘底水尚可得四尺餘寸足供挽運若止存一丈則五月八閘底水止存二尺六七寸重運難以遄行請交山東河撫二臣將現在各處出水口門地勢髙下水勢深淺尺寸與湖口滚水壩是否相等及可否量改水志之處確切定議如水志難以議改或將湖口以下至頓莊閘數十里河底一律挑深五尺以為調劑等語所奏于漕渠轉輸自有禆益但水志改加二尺於低窪地畝有無妨礙及挑深河底是否可行著崔應階同李宏李清時詳悉確勘定議具奏期於漕運民田均得利賴可將此傳諭知之楊錫紱摺並抄寄閲看欽此臣崔應階接奉諭旨後即于九月十四日自省城起程前至濟寧會同臣李清時馳赴韓莊等處臣李宏亦于十九日到工隨會同悉心相度詳加籌議遵查濟魚等處向因微湖水大不能消掣致淹民田上厪宸𠂻屢荷聖慈欽差大臣會同河撫諸臣勘籌妥辦加意疏消近年以來積水暢泄嵗獲有秋臣等細查水志濟魚濵湖地勢髙于滚壩無幾如消水至一丈濟魚民地方能播種若將滚壩加髙二尺則濵湖地畝未免浸淹厯冬及春未能速涸越至次年舊水未消新水又至民田消涸實屬難期惟是漕運民生均關緊要不得不反覆籌熟如漕臣所稱八閘水勢至五月止存二尺六七寸正值天晴日久上源放水過弱之際誠為不足查現在湖水深九尺九寸時屆蓄水入湖湖口雙閘未經啓放而目下八閘運河之水現存四尺五寸不等即最淺之處亦有二尺臣等探量湖水現髙於運河水面二尺餘寸來春閛放雙閘河淺處可有五尺餘寸之水厯查微湖滚壩每月消水六寸重運經行約有三月之久除消水一尺八寸逮江廣重運入境尚可存水三尺四五寸江廣船身重大三尺餘寸之水實難浮送臣等冉四圖維將滚壩內磯心每空安砌石槽設立板片如今嵗水小之年加板攔束多收一尺設遇隂雨連綿水勢日增即將所下板片盡行啓除俾得及時暢泄至于八閘河底多係砂礓難於開鑿若自湖口以下至頓莊五六十里悉行挑深五尺不特工力浩大糜費帑金而且韓莊以上運河亦恐抽掣過甚反至淺阻惟應將八閘運河確加勘估不必拘定五尺之數凡有新經淤墊沙泥盡行估挑務至舊時河底而止如此則水小之年滚壩之上既經加水一尺八閘河底又復挑深於漕臣增水二尺之數儘可相符而濟魚民地亦不致有浸淹之患矣至于各處支河出水之口如小梁山內華山蘭家山伊家河等處較量河底俱低于滚壩今既于該壩設板攔水所有各處水口應悉堵閉以俟應行宣泄之時立即啓放臣等再查韓莊以下地勢西髙東窪勢若建瓴所以舊制於數里之內建閘至八座之多原欲莭莭關攔以資瀦蓄年來因江南泇口貓兒窩等處間有淺澀不得不亮八閘之板以為接濟之用督臣髙晉覆奏漕臣條奏案內已將盧口亂石壩拆寬五丈沂河之水得以引導入運而江南河定河清河成等閘與山東八閘毗連亦可以下板臣李宏已飭令管閘官員照山東八閘之例會閘啓閉其泇口貓兒窩淺澀之處逐一測量于冬底流濬一律深通是運河水勢來路增多而山東八閘既無虞淺阻而江南邳州一帶足資浮送有餘矣臣等凛遵聖訓周詳因時斟酌惟在泄所當泄蓄所當蓄務期民田無淹浸之患漕渠無淺澀之虞庶幾仰副我皇上重農利漕至意添設滚壩石槽閘板及疏濬八閘所需銀兩即在運河道莭省項下通融辦理毋庸另請錢糧奏入上諭曰所議甚妥依議行乾隆三十年二月二十四日河道總督李清時奏言竊照德州城外西方菴運河逼近州城兜灣迎溜年年修做掃工所費不資乾隆二十七年經原任河臣張師載升任撫臣阿爾泰來往勘籌會同奏明在於對面魏家莊改挑引河一道以免城垣之險復將舊河口堵築令全流悉歸引河彼時籌辦之初原寬十二三丈深與舊河一律足資糧艘冬春運行俟伏秋水盛使兩崖自行刷寬因年來漳衛水勢未經盛漲河底雖較舊河刷深而兩崖俱係膠泥未能大刷嗣經調任河臣李宏以新河窄狹水盛之時恐不能吞納全河于三十年四月內奏請將所築舊河大壩仍行挑閛鑲做挑水壩褁頭復將西方菴掃工附請鑲做各在案臣來往勘工見該處自開挑舊壩以來水勢旁分恐冬春水弱運河未免淺澀且舊河既已閛通伏秋氷長西方菴等掃工仍須年年修做以衛城垣臣查此假運河自西南直射西方菴折而東北形如灣月該處運堤外臨大溜內趺深潭情形備極緊要當年創挑引河以免城垣受險最為妥協惟原挑河身未免過於窄狹再三熟籌仍當將舊河大壩照舊堵截其河身窄狹之處再加展寬與上下舊河約略相等核計土方共需銀三千餘兩細為核算西方菴及挑水壩兩褁頭嵗有搶修所費亦三千餘金今展挑引河需用之銀不過搶修之數一年一經告成不獨該處堤工可以化險為平德州城垣可以永資保障西方菴等各掃工亦可以永停修做至估需銀兩仍在運河道屬嵗搶項下通融動用毋需另請司庫錢糧除確核細數造册送部外所有臣籌辦情形謹繕摺恭奏奏入報聞欽定南巡盛典卷四十三
