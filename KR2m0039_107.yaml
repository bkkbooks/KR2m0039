body:
  text: 欽定四庫全書欽定南巡盛典卷七十四籲俊臣等謹按觀民設教王者省方之舉其義莫偹于易蓋必有久于其道之聖人而後能觀乎人文以化成天下斯籲俊之典隆焉禮記王制詳巡狩之典首云命太師陳詩以觀民風蓋德教之純風俗之盛棫朴薪槱之化吉人吉士之材胥於玊輅所經騰涌翔洽不獨輶軒是採已也後世取士科目多門自漢而後天子自詔則曰制舉蓋以待異能之選歐陽修新唐書志亦稱四方德行才能文學之士於天下巡狩行幸往往會見行在所以待之之禮甚優而宏才偉論非常之人亦時出於其間云江浙為人文淵藪聖祖仁皇帝六飛涖止諸生以詩賦獻者欽取入館修書獲邀優敘皇上文思復旦法駕時巡詔諭學臣弟子之額既增其員拔萃之科復廣其制而於鼓篋肄雅之倫呈進詩册者特恩召試親定甲乙授官中書錫之文綺蓋自辛未以來叨沐殊恩取額時有增益庚子嵗則江右儒生亦與迎鑾獻賦之列至甲辰並列閩省譽髦英俊連茹彚征彬彬乎極盛之選矣而崇文典學教思無窮特發帑金繕寫四庫全書三分存貯江浙名勝處所俾嗜古之儒獲探天祿石渠之祕流傳抄録益廣見聞斯又所謂鼓之舞之以盡神者歟是以四海之內學校如林庠序盈門靡不爭自濯磨期副旁求盛典取王制陳詩之義叶羲經設教之占陶鑄羣倫益光文治非誠千載一時之嘉會乎謹志籲俊第八欽定四庫全書欽定南巡盛典卷七十四籲俊乾隆十六年二月初一日上諭內閣曰朕問族觀風南巡江浙清蹕所至廣沛恩膏更念三吳兩浙為人文所萃皇祖聖祖仁皇帝屢經巡幸嘉惠膠庠試額頻加覃敷教澤朕法祖省方鑾輿斯涖式循茂典用示渥恩所有江蘇安徽浙江三省本年嵗試文童府學及州縣大學著增取五名中學增取四名小學增取三名舉行一次該部傳諭各該學政慎加搜擇拔取真才副朕育才造士至意乾隆十六年二月初十日上諭命軍機大臣傳諭浙江學政雷鋐曰浙省生監有進獻詩賦者爾可擇其有學有品者代為進呈乾隆十六年二月二十七日上諭內閣曰朕省方觀民南巡江浙羣黎士庶踴躍趨迎就瞻恐後紳士以文字獻頌者載道接踵愛戴之忱有足嘉者朕已疊沛恩膏隨時賞賚𬗟昔皇祖聖祖仁皇帝時巡所至優奬士類一時碩學通才多蒙鑒拔方䇿所載稱盛事焉兹之于于而來皆棫朴作人久道所貽也夫膠庠之秀志切近光其積學有素文采頴異者加之甄録良合於陳詩觀風育才造士之道顧工拙既殊真贋錯出理應試之無使魚目碔砆得混珠玉其如何分别考試著大學士傅恆協辦大學士梁詩正侍郎汪由敦會同該總督學政詳議具奏乾隆十六年三月十一日上諭內閣曰此次考中之謝墉陳鴻寶王又曽皆取其最精者且人數亦不多著加恩特賜舉人授為內閣中書學習行走令其與考取候補人員一體補用併仍準其會試乾隆十六年三月三十日上諭內閣曰此次考中之蔣雍植錢大昕吳烺禇寅亮吳志鴻著照浙省之例特賜舉人授為內閣中書學習行走與考取候補人員一體補用其進士孫夢逵著授為內閣中書遇缺補用乾隆二十二年二月初八日上諭內閣曰朕敬承祖德問俗觀風嘉惠黎元培植士類今者乘春布令載􅊩東南濟濟青襟來迎道左因念三吳兩浙民多俊秀加以百年教澤比户書聲應試之人日多而入學則有定數甚有皓首而困入童子試者其無遺珠之惜耶宜循舊典再沛渥恩其將江蘇安徽浙江三省本年嵗試文童照乾隆十六年例府學及州縣大學增取五名中學增取四名小學增取三名各該學政其慎加甄别稱朕樂育人才之至意焉乾隆二十二年三月初四日上諭內閣曰明日覆考諸生顧震等五十人其進獻詩册之二等諸生李如蘭等五十一人一併考試乾隆二十二年三月初八日上諭內閣曰浙江進獻詩賦考取一等之童鳳三陳文組顧震錢受榖著照乾隆十六年之例俱特賜舉人授為內閣中書學習行走與考取候補人員一體補用其二等之沈初等十二名著各賞縀二匹乾隆二十二年三月二十一日上諭內閣曰江蘇安徽二省進獻詩賦考取一等之進士王昶著授為內閣中書遇缺即補曺仁虎韋謙恆吳省欽禇廷璋吳寬徐曰璉俱著特賜舉人授為內閣中書學習行走與考取候補人員一體補用其二等之劉潢等十四名著各賞縀二匹乾隆二十七年二月二十九日上諭內閣曰三吳兩浙文風素盛前此清蹕時巡嘉惠膠庠頻增試額兹朕敬奉皇太后安輿載蒞南服仰惟慈慶之綿臻益廣作人之雅化宜循舊典以示渥恩其將江蘇安徽浙江三省本年應試文童府學及州縣大學增取五名中學增取四名小學增取三名各該學政務宜詳加校閲遴拔真才稱朕樂育甄陶至意乾隆二十七年三月初十日上諭內閣曰浙江進獻詩賦考取一等之進士孫士毅舉人汪孟鋗俱著授為內閣中書遇缺即補沈初王鑾俱著特賜舉人授為內閣中書學習行走與考取人員挨次補用其二等之李旦華等十三名著各賞縀二匹乾隆二十七年三月二十八日上諭內閣曰江蘇安徽進獻詩賦諸生考取一等之進士吳泰來陸錫熊郭元漋俱著授為內閣中書遇缺即補程晉芳趙文哲嚴長明徐步雲錢襄俱著特賜舉人授為內閣中書學習行走與考取候補人員挨次補用其考列二等之劉潢等十四名著各賞縀二匹乾隆三十年正月初六日上諭內閣曰向來選拔貢生定例惟府學準選二名州縣學均係額取一名其江蘇安徽二省有分設各縣仍統於新舊兩學中彚拔一人貢入成均肄業兹當翠華臨幸正值選拔之年因念分設各邑版籍既繁膠庠亦盛僅令兩學拔取一人懷才者亦不免拘於常格何以昭鼓勵而廣甄陶著加恩將江蘇安徽二省所有分設各縣準於本年選拔時每學各取一人俾得均沾惠澤該學政其悉心秉公遴選務取文行兼優之士用副廣勵學宫至意乾隆三十年閏二月初五日上諭內閣曰三吳兩浙文風素盛昨於起鑾之先特降恩諭將江南分設各縣準於本年選拔時每學各取一人以廣教澤兹當翠華蒞止因念成均既多豫拔尤而黌序亦宜增試額用循舊典以示渥恩其將江蘇安徽浙江三省本年應試文童府學及州縣大學增取五名中學增取四名小學增取三名各該學政務慎加遴選詳悉校閲副朕樂育作人至意乾隆三十年閠二月十四日上諭內閣曰浙江進獻詩賦考取一等之進士張培馮應榴舉人吳夀昌俱著授為內閣中書遇缺即補陸費墀著特賜舉人授為內閣中書學習行走與考取候補人員挨次補用其二等之黃瀛元等十四名著各賞縀二匹乾隆三十年三月十七日上諭內閣曰江蘇安徽進獻詩賦諸生考取一等之舉人鄭澐張熙純俱著授為內閣中書遇缺即補鮑之鍾金榜秦潮周發春吳楷洪朴陳希哲蔣寬劉種之俱著特賜舉人授為內閣中書學習行走與考取候補人員挨次補用其二等之程世錞等二十一名著各賞縀二匹乾隆四十五年二月十三日上諭內閣曰三吳兩浙文風素盛前此清蹕時巡嘉惠膠庠特增試額兹當翠華臨蒞宜循舊典以示渥恩著將江蘇安徽浙江三省本年應試文童府學及州縣大學增取五名中學增取四名小學增取三名各該學政務宜詳悉校閲遴拔真才副朕樂育甄陶至意乾隆四十五年三月初十日上諭內閣曰浙江進獻詩册考取一等之馬履泰沈揚李彤沈叔埏著特賜舉人授為內閣中書學習行走與考取候補人員挨次補用其二等之吳純等十三名俱著賞縀二匹乾隆四十五年三月二十八日上諭內閣曰江蘇安徽進獻詩册諸生其考取一等之舉人汪履基著授為內閣中書遇缺即補吕光復洪梧趙懷玉楊揆董教增朱文翰盛惇大言朝標金廷欣江漣俱著特賜舉人授為內閣中書學習行走與考取候補人員挨次補用江西省考試一等之蔣知讓裘元復著照直𨽻山東召試之例賞給舉人準其一體會試其江蘇安徽江西三省考列二等之葉恩紱二十三名著各賞縀二匹乾隆四十七年七月初八日上諭內閣曰朕稽古右文究心典籍近年命儒臣編輯四庫全書特建文淵文溯文源文津四閣以資藏庋現在繕寫頭分告竣其二三四分限於六年內按期􅟹事所以嘉惠藝林垂示後世典至巨也因思江浙為人文淵藪朕翠華臨蒞士子涵濡教澤樂育漸摩已非一日其間力學好古之士願讀中祕書者自不乏人兹四庫全書允宜廣布流傳以光文治如揚州大觀堂之文滙閣鎮江金山寺之文宗閣杭州聖因寺行宫之文瀾閣所以藏書之所著交四庫館再繕寫全書三分安置各該處俾江浙士子得以就近觀摩謄録用昭我國家藏書美富教思無窮之盛軌至前者辦理四庫全書考募各謄録皆令自偹資斧五年期滿給豫議敘至為優渥但人數衆多未免開幸進之門且現在議敘者尚慮壅滯若因此致礙選途又非朕䇿勵人才之本意此次續繕四庫全書三分俱著發內帑銀兩雇覔書手繕寫在鈔胥等受值傭書自必踴躍從事而書成不致濫邀議敘亦於銓政無礙所有應辦各事宜及添派提調校對等官著交四庫全書館總裁悉心妥議具奏以副朕振興文教嘉惠多士之至意乾隆四十九年二月二十一日上諭內閣曰前因江浙為人文淵藪特降諭旨發給內帑繕寫四庫全書三分於揚州文滙閣鎮江文宗閣杭州文瀾閣各藏庋一分原以嘉惠士林俾得就近抄録傳觀用光文治苐恐地方大吏過於珍護讀書嗜古之士無由得窺美富廣布流傳是千緗萬帙徒為插架之供無禆觀摩之實殊非朕崇文典學傳示無窮之意將來全書繕竣分貯三閣後如有願讀中祕書者許其陸續領出廣為傳寫全書本有總目易於檢查秪須派委妥員董司其事設立收發檔案登注明晰並曉諭借抄士子加意珍惜毋致汚損俾藝林多士均得殫見洽聞以副朕樂育人材稽古右文之至意乾隆四十九年二月二十二日上諭內閣曰江浙兩省文風素盛前此翠華臨幸曽降旨增廣試額兹舉六巡慶典允宜特沛恩施所有江蘇安徽浙江三省本年應試文童府學及州縣大學著增取五名中學增取四名小學增取三名各該學政務宜遴拔真才副朕嘉惠膠庠樂育甄陶之意乾隆四十九年三月二十一日上諭內閣曰浙江福建進獻詩册考取一等之張師誠費錫章何金姚祖同著特賜舉人授為內閣中書學習行走與考取候補人員挨次補用浙江省考列二等之吳純張廷桂張彤王觀沈樹錢枚朱光烈汪步瀛黃絲凌鉞朱孫垣應澧許翼宗楊本翁樹沈珏翁濓陸以誠福建省列為二等之鄭光䇿詹碧炎王上泰俱著各賞縀二匹乾隆四十九年閠三月初九日上諭內閣曰江蘇安徽進獻詩册考取一等三名之進士莊選辰著授為內閣中書遇缺即補劉召揚鄭宗洛黃文輝汪彥博司馬亶葉銓孫一元繆炳泰莊復旦程振甲張曽獻鮑勳茂金應琦朱承寵俱著特賜舉人授為內閣中書學習行走與考取候補人員挨次補用江西省考取一等之談光詳吳本著照上屆之例賞給舉人準其一體會試其江蘇安徽江西三省考列二等之周愛蓮蔣光世袁肅陸甲林張雲培周嘉植洪士逹唐仁埴秦智鉷徐凖宜詹應甲唐廣模汪文錦胡鳳儀印鴻緯畢敦吳楷徐嵩張詒顧鳳毛翟金蘭黃鉞王浦程尚義吳紹涑方熊唐人最巴慰祖閔道恂葉棟蔣知亷趙本治方振伍延昺黃旭裘元巽著各賞縀二匹欽定南巡盛典卷七十四
