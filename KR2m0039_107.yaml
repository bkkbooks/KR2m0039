body:
  text: 欽定四庫全書欽定南巡盛典卷七十四籲俊臣等謹按觀民設教王者省方之舉其義莫偹于易盖必有久于其道之聖人而後能觀乎人文以化成天下斯籲俊之典隆焉禮記王制詳廵狩之典首云命太師陳詩以觀民風盖徳教之純風俗之盛棫樸薪槱之化吉人吉士之材胥於玊輅所經騰涌翔洽不獨輶軒是採已也後世取士科目多門自漢而後天子自詔則曰制舉葢以待異能之選歐陽修新唐書志亦稱四方徳行才能文學之士於天下巡狩行幸徃徃㑹見行在所以待之之禮甚優而宏才偉論非常之人亦時出於其間云江浙為人文淵藪聖祖仁皇帝六飛涖止諸生以詩賦獻者欽取入館修書獲邀優叙皇上文思復旦法駕時巡詔諭學臣弟子之額既増其員㧞萃之科復廣其制而於鼓篋肄雅之倫呈進詩冊者特㤙召試親定甲乙授官中書錫之文綺盖自辛未以來叨沐殊㤙取額時有増益庚子嵗則江右儒生亦與迎鑾獻賦之列至甲辰並列閩省譽髦英俊連茹彚征彬彬乎極盛之選矣而崇文典學教思無窮特發帑金繕寫四庫全書三分存貯江浙名勝處所俾嗜古之儒獲探天禄石渠之祕流傳抄録益廣見聞斯又所謂鼓之舞之以盡神者歟是以四海之内學校如林庠序盈門靡不争自濯磨期副旁求盛典取王制陳詩之義叶羲經設教之占陶鑄羣倫益光文治非誠千載一時之嘉㑹乎謹志籲俊第八欽定四庫全書欽定南巡盛典卷七十四籲俊乾隆十六年二月初一日上諭内閣曰朕問族觀風南巡江浙清蹕所至廣沛㤙膏更念三呉兩浙為人文所萃皇祖聖祖仁皇帝屢經巡幸嘉恵膠庠試額頻加覃敷教澤朕法祖省方鑾輿斯涖式循茂典用示渥㤙所有江蘇安徽浙江三省本年嵗試文童府學及州縣大學著増取五名中學増取四名小學増取三名舉行一次該部傳諭各該學政慎加蒐擇㧞取真才副朕育才造士至意乾隆十六年二月初十日上諭命軍機大臣傳諭浙江學政雷鋐曰浙省生監有進獻詩賦者爾可擇其有學有品者代為進呈乾隆十六年二月二十七日上諭内閣曰朕省方觀民南巡江浙羣黎士庶踴躍趨迎就瞻恐後紳士以文字獻頌者載道接踵愛戴之忱有足嘉者朕已叠沛㤙膏隨時賞賚𬗟昔皇祖聖祖仁皇帝時巡所至優奨士類一時碩學通才多䝉鑒㧞方䇿所載稱盛事焉兹之于于而來皆棫樸作人久道所貽也夫膠庠之秀志切近光其積學有素文采頴異者加之甄錄良合於陳詩觀風育才造士之道顧工拙既殊真贋錯出理應試之無使魚目碔砆得混珠玉其如何分别考試著大學士傅恒恊辦大學士梁詩正侍郎汪由敦會同該總督學政詳議具奏乾隆十六年三月十一日上諭内閣曰此次考中之謝墉陳鴻寳王又曽皆取其最精者且人數亦不多著加㤙特賜舉人授為内閣中書學習行走令其與考取候補人員一體補用併仍准其㑹試乾隆十六年三月三十日上諭内閣曰此次考中之蒋雍植錢大昕呉烺禇寅亮呉志鴻著照浙省之例特賜舉人授為内閣中書學習行走與考取候補人員一體補用其進士孫夢逵著授為内閣中書遇缺補用乾隆二十二年二月初八日上諭内閣曰朕敬承祖徳問俗觀風嘉恵黎元培植士類今者乗春佈令載􅊩東南濟濟青衿來迎道左因念三呉兩浙民多俊秀加以百年教澤比户書聲應試之人日多而入學則有定數甚有皓首而困入童子試者其無遺珠之惜耶宜循舊典再沛渥㤙其将江蘇安徽浙江三省本年嵗試文童照乾隆十六年例府學及州縣大學増取五名中學増取四名小學増取三名各該學政其慎加甄别稱朕樂育人才之至意焉乾隆二十二年三月初四日上諭内閣曰明日覆考諸生顧震等五十人其進獻詩冊之二等諸生李如蘭等五十一人一併考試乾隆二十二年三月初八日上諭内閣曰浙江進獻詩賦考取一等之童鳳三陳文組顧震錢受榖著照乾隆十六年之例俱特賜舉人授為内閣中書學習行走與考取候補人員一體補用其二等之沈初等十二名著各賞縀二疋乾隆二十二年三月二十一日上諭内閣曰江蘇安徽二省進獻詩賦考取一等之進士王昶著授為内閣中書遇缺即補曺仁虎韋謙恒呉省欽禇廷璋呉寛徐曰璉俱著特賜舉人授為内閣中書學習行走與考取候補人員一體補用其二等之劉潢等十四名著各賞縀二疋乾隆二十七年二月二十九日上諭内閣曰三呉兩浙文風素盛前此清蹕時巡嘉恵膠庠頻増試額兹朕敬奉皇太后安輿載莅南服仰惟慈慶之綿臻益廣作人之雅化宜循舊典以示渥㤙其将江蘇安徽浙江三省本年應試文童府學及州縣大學増取五名中學増取四名小學増取三名各該學政務宜詳加校閲遴㧞真才稱朕樂育甄陶至意乾隆二十七年三月初十日上諭内閣曰浙江進獻詩賦考取一等之進士孫士毅舉人汪孟鋗俱著授為内閣中書遇缺即補沈初王鑾俱著特賜舉人授為内閣中書學習行走與考取人員挨次補用其二等之李旦華等十三名著各賞縀二疋乾隆二十七年三月二十八日上諭内閣曰江蘇安徽進獻詩賦諸生考取一等之進士呉㤗來陸錫熊郭元漋俱著授為内閣中書遇缺即補程晋芳趙文喆嚴長明徐歩雲錢襄俱著特賜舉人授為内閣中書學習行走與考取候補人員挨次補用其考列二等之劉潢等十四名著各賞縀二疋乾隆三十年正月初六日上諭内閣曰向來選㧞貢生定例惟府學准選二名州縣學均係額取一名其江蘇安徽二省有分設各縣仍統於新舊兩學中彚㧞一人貢入成均肄業兹當翠華臨幸正值選㧞之年因念分設各邑版籍既繁膠庠亦盛僅令兩學㧞取一人懐才者亦不免拘於常格何以昭鼓勵而廣甄陶着加㤙將江蘇安徽二省所有分設各縣准於本年選㧞時每學各取一人俾得均沾恵澤該學政其悉心秉公遴選務取文行兼優之士用副廣勵學宫至意乾隆三十年閏二月初五日上諭内閣曰三吴両浙文風素盛昨於起鑾之先特降㤙諭將江南分設各縣准於本年選㧞時每學各取一人以廣教澤兹當翠華莅止因念成均既多予㧞尤而黌序亦宜増試額用循舊典以示渥㤙其将江蘇安徽浙江三省本年應試文童府學及州縣大學増取五名中學増取四名小學増取三名各該學政務慎加遴選詳悉校閲副朕樂育作人至意乾隆三十年閠二月十四日上諭内閣曰浙江進獻詩賦考取一等之進士張培馮應榴舉人呉夀昌俱著授為内閣中書遇缺即補陸費墀著特賜舉人授為内閣中書學習行走與考取候補人員挨次補用其二等之黄瀛元等十四名著各賞縀二疋乾隆三十年三月十七日上諭内閣曰江蘇安徽進獻詩賦諸生考取一等之舉人鄭澐張熈純俱著授為内閣中書遇缺即補鮑之鍾金榜秦潮周發春呉楷洪樸陳希哲蔣寛劉種之俱著特賜舉人授為内閣中書學習行走與考取候補人員挨次補用其二等之程世錞等二十一名著各賞縀二疋乾隆四十五年二月十三日上諭内閣曰三呉兩浙文風素盛前此清蹕時巡嘉恵膠庠特増試額兹當翠華臨莅宜循舊典以示渥㤙著將江蘇安徽浙江三省本年應試文童府學及州縣大學増取五名中學増取四名小學増取三名各該學政務宜詳悉校閲遴㧞真才副朕樂育甄陶至意乾隆四十五年三月初十日上諭内閣曰浙江進獻詩冊考取一等之馬履㤗沈颺李彤沈叔埏著特賜舉人授為内閣中書學習行走與考取候補人員挨次補用其二等之呉純等十三名俱著賞縀二疋乾隆四十五年三月二十八日上諭内閣曰江蘇安徽進獻詩冊諸生其考取一等之舉人汪履基着授為内閣中書遇缺即補吕光復洪梧趙懐玉楊揆董教増朱文翰盛惇大言朝標金廷訢江漣俱着特賜舉人授為内閣中書學習行走與考取候補人員挨次補用江西省考試一等之蔣知讓裘元復着照直𨽻山東召試之例賞給舉人准其一體㑹試其江蘇安徽江西三省考列二等之葉㤙紱二十三名著各賞縀二疋乾隆四十七年七月初八日上諭内閣曰朕稽古右文究心典籍近年命儒臣編輯四庫全書特建文淵文溯文源文津四閣以資藏庋現在繕寫頭分告竣其二三四分限於六年内按期􅟹事所以嘉恵藝林垂示後世典至鉅也因思江浙為人文淵藪朕翠華臨莅士子涵濡教澤樂育漸摩已非一日其間力學好古之士願讀中祕書者自不乏人兹四庫全書允宜廣布流傳以光文治如揚州大觀堂之文滙閣鎮江金山寺之文宗閣杭州聖因寺行宫之文瀾閣所以藏書之所著交四庫館再繕寫全書三分安置各該處俾江浙士子得以就近觀摩謄録用昭我國家藏書羙富教思無窮之盛軌至前者辦理四庫全書考募各謄録皆令自偹資斧五年期滿給予議叙至為優渥但人數衆多未免開倖進之門且現在議叙者尚慮壅滯若因此致碍選途又非朕䇿勵人才之本意此次續繕四庫全書三分俱著發内帑銀両僱覔書手繕寫在鈔胥等受值傭書自必踴躍從事而書成不致濫邀議叙亦於銓政無碍所有應辦各事宜及添派提調校對等官著交四庫全書館總裁悉心妥議具奏以副朕振興文教嘉恵多士之至意乾隆四十九年二月二十一日上諭内閣曰前因江浙為人文淵藪特降諭㫖發給内帑繕寫四庫全書三分於揚州文滙閣鎮江文宗閣杭州文瀾閣各藏庋一分原以嘉恵士林俾得就近抄録傳觀用光文治苐恐地方大吏過於珍䕶讀書嗜古之士無由得窺羙富廣布流傳是千緗萬帙徒為挿架之供無禆觀摩之實殊非朕崇文典學傳示無窮之意将來全書繕竣分貯三閣後如有願讀中祕書者許其陸續領出廣為傳寫全書本有總目易於檢查秪湏派委妥員董司其事設立收發檔案登註明晰並曉諭借抄士子加意珍惜毋致汚損俾藝林多士均得殫見洽聞以副朕樂育人材稽古右文之至意乾隆四十九年二月二十二日上諭内閣曰江浙兩省文風素盛前此翠華臨幸曽降㫖増廣試額兹舉六巡慶典允宜特沛㤙施所有江蘇安徽浙江三省本年應試文童府學及州縣大學著増取五名中學増取四名小學増取三名各該學政務宜遴㧞真才副朕嘉恵膠庠樂育甄陶之意乾隆四十九年三月二十一日上諭内閣曰浙江福建進獻詩冊考取一等之張師誠費錫章何金姚祖同著特賜舉人授為内閣中書學習行走與考取候補人員挨次補用浙江省考列二等之呉純張廷桂張彤王觀沈樹錢枚朱光烈汪歩瀛黄絲凌鉞朱孫垣應澧許翼宗楊本翁樹沈珏翁濓陸以誠福建省列為二等之鄭光䇿詹碧炎王上泰俱著各賞縀二疋乾隆四十九年閠三月初九日上諭内閣曰江蘇安徽進獻詩冊考取一等三名之進士莊選辰著授為内閣中書遇缺即補劉召揚鄭宗洛黄文輝汪彦博司馬亶葉銓孫一元繆炳泰荘復旦程振甲張曽獻鮑勲茂金應琦朱承寵俱著特賜舉人授為内閣中書學習行走與考取候補人員挨次補用江西省考取一等之譚光詳呉本著照上届之例賞給舉人准其一體㑹試其江蘇安徽江西三省考列二等之周愛蓮蔣光世袁肅陸甲林張雲培周嘉植洪士逹唐仁埴秦智鉷徐凖宜詹應甲唐廣模汪文錦胡鳳儀印鴻緯畢敦呉楷徐嵩張詒顧鳳毛翟金蘭黄鉞王浦程尚義呉紹涑方熊唐人最巴慰祖閔道恂葉棟蒋知亷趙本治方振伍延昺黄旭裘元㢲著各賞縀二疋欽定南巡盛典卷七十四
