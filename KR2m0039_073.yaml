body:
  text: 河防乾隆四十八年九月初九日山東巡撫明興奏言竊照濟寧以南運河兩岸堤工先經奏明興修運河㕔所属之在城閘以下第一第二分泇河㕔所属之珠梅閘以下第一第二分嶧汛閘内之第二十分已將次竣工所有稍髙涸出之處可以施工者應酌量地勢即行趕修方不致冬令擁擠臣先經飭令運河道沈啟震率同兩㕔按照情形逐一親履查勘據該道具報運河㕔境接連先修一二分之第三四五六七分及二十八九分泇河㕔境接連先修一二分之第三四五分共工十叚均已涸出髙水面三四五尺不等可以先行動工已催令工員募夫集料於八月初八日開工臣查涸出地叚既已陸續興工所有應用土石樁料俱應早為備貯以資臨時應用臣已飭工員趕𦂳運送貯工不致稍有遲悮其餘地叚如一有可以施工者即應隨時趕辦臣現在出闈日内即親往濟寧一帶查勘督催仍于掲曉前趕回入闈㑹同填榜亦可無悮至微山湖水截至本月十二日計深一丈三尺九寸昭陽湖計深四尺七寸南陽湖計深三尺六寸獨山湖計深四尺六寸近日各湖消水甚為迅速所有間段深水之處將来自可全行涸出一律動工尅期完竣以仰副皇上厪念要工至意奏入報聞乾隆四十八年十月初七日河道總督蘭第錫奏言竊查運河濟寧以南應修堤岸工程綿長數百里荷䝉皇上大發帑金五十萬兩次第興修係臣職任専責臣因防汛在豫雖節次檄催究不克親身督辦兹據運河道沈啟震禀稱原派工程四十九分除四月至八月先已動工修葺之十五分外其餘三十四分時逾白露堤岸均已涸露俱可一律趕辦酌定于二十二日普律動工臣查大工一時齊舉臣急須親往率同查辦現在黄河兩岸舊工接添搶辦之處臣逐一查勘一律稳固連日水勢長落不過數寸蘭陽以下新工三處分溜漸次平緩埽工不復報蟄其正河溜形愈覺迅駛至寧陵商邱一帶堤根澄淤更厚大溜由中泓直達河尾奔騰東注形勢至為暢順臣與撫臣面為商酌就近督率該道㕔營縣照舊巡防可冀永慶安瀾現在秋分已過臣即扵二十七日由山東曹單黄河下游一帶順查工程即由碭山一路取道馳赴山東臺荘八閘泝流而上率同該道㕔按段稽查以臻妥速其續涸工叚内節據該道禀稱逐細確估尚可撙節銀數萬兩容臣與撫臣明興核定另行奏請聖訓再南糧回空船隻已進臨清口者截至八月二十日之宿州二帮止共有四十八帮已過濟寧者截至二十二日之淮安頭帮止共有三十帮已出東境者截至十六日之常州白糧帮止共有五十帮其未進臨清口之船祗有二十八帮較上年此時重運尾帮尚未出口實為非常迅速本年輪届大挑攸闗緊要將来南旺煞壩之日期自可趕早無悮奏入報聞乾隆四十八年十月十五日河道總督蘭第錫山東巡撫明興奏言竊查運河濟寧以南應修堤岸工程本年三月間大學士公阿桂與前河臣何裕城㑹同撫臣明興督率運河道沈啟震等逐加探估運泇二㕔境共堤工五萬三千二十餘丈民埝五萬五千八百餘丈内除未經漫水及雖漫而不致坍損之堤埝無庸估計祗責令額夫平墊外至堤埝出水卑薄者量估髙寛按照彼時水痕以出水四尺為度維時淹沒之堤埝尚有二萬九千餘丈水深一二尺至四五尺不等約計至秋令動工時可以消水三尺其餘未必盡能涸露因於排樁碎石工段之外酌量増添其堤根積水之處添估碎石坦坡并將各缺口水深處所廂填樁埽至韓莊大石工并上下閘座橋壩涵洞裹頭等工分别估修其坍塌過甚者則估計拆修移建復于大石工外估築臨湖圏壩以便興築統計各項工程共需銀六十四萬九千七百七十餘兩擬將已露之三大段先行動工餘於秋令普律興辦但各工係就彼時水勢約畧估計而水底探量究不能甚凖應俟秋令動工時逐一再查如尚有可減之工即歸節省如有闗蓄洩必須増改之處另行具奏仰邀俞允臣蘭第錫于抵任後㑹同催辦已將先修之三大段趕辦完工其餘各段亦即于八月初八日及二十二日次第普律動工均經奏䝉聖鑒查濟寧以南各湖漫水俱滙注于微山一湖上年七月盛漲時深至二丈五尺六寸自豫工堵合以後四月間尚深一丈八尺餘寸詢查乾隆二十二三年間江南孫家集漫口漲水入運消落甚遲且毎年伏秋必有汛水長發是以前于估工時就彼時湖水情形約計自春徂秋消長相抵祗可消水三尺因即照此逐加估計今荷聖主洪福本年伏秋間消水甚速而去路更復大暢現在微湖水深一丈二尺八寸計自估工至今又消水五尺餘寸各處堤埝除水口深塘之外已盡行涸露所有土石工程均得乘時趕辦按日計工定于明春一律全完凡工次人員以及沿河居民並赴工力作人等無不鼓舞歡欣喜出望外因查兩岸堤埝此時普律顯露既可一目瞭然即大石閘壩等工其水中根脚亦正可探量確切臣等先經叠飭運河道等將應改應減之處逐細確查務歸切實臣等于往來查工之時復率同覆勘如原估排樁碎石工内已經堤根涸露即減去樁石改為土工其水勢雖退而地形窪下處所則減去排樁祗留碎石坦坡以資攔䕶至大石工内查明底石己未損各層數及該工應築之臨湖圈壩一併量為節減其拆修各閘座内亦有因根脚尚堅改估補修之處此外有稍為請添者亦就水落情形酌量修做並經臣蘭第錫奏明將魚臺汛東岸十八水口嵗修工程歸入估辦其餘悉照原估辦理通共復估土石各工實需銀五十五萬六千八十兩零比較原估之數除増減相抵外計共節省銀九萬三千六百八十九兩零臣等現照此次估定工程飭知承修各員各就所分定段落乘時趕辦以期来春妥速完竣除俟工竣後將修辦各工銀數照例確核造冊具題奏入報聞乾隆四十八年十月二十三日河東河道總督蘭第錫奏言竊臣據運河道沈啟震禀稱上河㕔属板閘外汶衛交㑹之處向建挑水雞嘴草壩一道以挑溜勢俾免渾流倒灌淤墊口門本年河勢變遷該壩未能得力應請酌量加修以資抵禦並該㕔属東昌迤北之永通戴灣磚板等閘歴年乆逺閘墻閘底多有損壞應即分别拆修補修昨漕臣毓竒過濟時亦諄諄以板閘外應將挑壩籌商以免停淤嘱臣勘明酌辦今臣率同明幹㕔員逐一詳加察看查臨清板閘以下汶衛合流自乾隆二十八年上游直省堵築沙莊大壩漳河别無分減全入衛河毎當汛漲挾帶泥沙奔騰湍激閘内汶水不足相抵凡遇啟板渾水即借勢倒灌是以磚閘至板閘兩旁二里之内厯年挑出沙土髙阜成山夏間重運行走時有水中撈濬之事從前乾隆二十五年於板閘下順崖建做挑水壩順流外挑助汶敵衛厯年廂修以免直灌口門之患今查板閘外衛河已向西北坐灣並不直注閘口自閘口至衛河河崖新長淤灘六十餘丈灘髙水面四五尺不等汶水出閘六十丈外方與衛河合流現在形勢尚順惟淤灘頗厚衛河河底亦漸淤髙汶水不克建瓴冲刷所有雞嘴壩工未能挑溜得力祗借以䕶崖保閘惟應照常酌量加髙以備盛漲臣與熟諳河員及老民土兵詢謀商酌實無一勞永逸可免倒漾停淤之法擬俟明春挑工完竣閘河鋪水後酌于口門外汶水將㑹衛水之處在汶河兩崖對築箝口草壩中留三丈金門隨時酌量安置挨牌既不使衛水散漫倒漾而汶水借資箝束下注有力可以攻衛刷沙即板閘啟板之時閘内水勢亦可無虞過洩如此酌辦需費無多如果辦有成效再為加廂髙厚来年恭逢皇上南巡經由該處容臣另行繪圖貼説恭請聖駕閲視指示機宜敬謹遵照辦理再查磚板二閘為汶衛門户當衛水發時須多下板蓄汶俟衛力緩後啟放今磚閘下截數層及板閘閘面閘耳多有殘損臣委員確切估計逐一修補所費亦属無㡬歸于明年嵗修造報至板塊向係按年抽換三年一週今即令全行更換新板俾無漏縫仍俟三年後方許照舊抽換至永通戴灣兩閘建自前明嗣經拆修迄今已歴四五十載或閘墻坍損或閘底蟄裂均應拆修而現當濟寧迤南衆工畢舉各處大挑工程亦較往年為多不便同時興修且開春挑工竣事即須鋪水以待新漕亦恐趕辦不及臣即責令該道㕔認真粘補不許草率有悮啟閉俟明年重運過後再行另估拆修以垂永久臣現即由甲馬營一帶馳赴戴村壩查勘壩工並将現估大挑土方銀數及煞壩日期再與該道詳細核定另摺具奏奏入報聞乾隆四十八年十一月二十八日兩江總督薩載河道總督李奉翰奏言竊臣等承准乾隆四十八年十月二十三日廷寄欽奉上諭據薩載等奏黄河形勢兠灣刷成新河一摺内稱郭家堂一帯黄河坐灣溜勢偏趨南岸田家樓埽工係頂衝迎溜正擬於老灘挑挖引渠引溜直趨現在興工尚未挑成而河溜日見塌進勢甚迅速當即乘勢啓放河頭河尾共刷寛一百數十丈全河大溜暢達所有田家樓埽工現經淤閉等語覽奏忻慰已於摺内批示矣郭家堂老灘正在挑挖引渠仰邀河神黙佑乘勢塌寛全河大溜忽然取直歸中自係善機朕心深為嘉悅但閱圖内郭家堂逼近新河該處現有居民房屋向来堤外灘地其距河稍逺之處原准民間居住惟不准私築堤堰致碍水道例禁本明前經降㫖命河臣㑹同地方官妥協經理但恐日久廢弛小民各䕶田廬仍不免私自圏築竟侵佔河形以致汛水長發時有碍溜勢於河務大有闗係除将此摺交軍機處存記俟明春南巡若就近亦可親臨閲看外著傳諭薩載李奉翰蘭第錫何裕城明興於南北兩河灘地留心實力查辦毋得視為具文将此諭令知之欽此臣等跪讀之下仰見我皇上念切河防諄諄訓示永期順軌安流之至意伏查堤外灘地距河稍逺之處雖聴民住居但不准私築堤堰有碍水道誠如聖訓例禁本明乾隆四十六年欽奉諭㫖飭查臣等曾經通飭查禁并於往来勘工之便留心察看凡民間住居之所皆在髙阜老灘為溜行不到之處若汛水長發溜勢所經民早遷移是以近年以来堤外灘地尚無私築圏堰之事郭家堂地方在平日距河稍逺本有民居今該處挑直成河民居較近臣等現在飭令道府㕔縣隨時查看相度形勢如河漸塌寛即督令居民遷讓毋許私築圈堰侵佔河形致碍溜勢此外南北兩岸或有似此民居距河較近之處臣等惟有凛遵聖訓留心實力查辦不敢視為具文至該處新河明春恭逢聖駕臨幸徐州若就近仰邀閲視指示臣等更知有所遵守惟該處相距徐城較逺其里數實有若干當即行令道府確查兹據淮徐道劉錫嘏並徐州府知府錢金殿查明禀覆臣等查新刷引河在徐州以上蕭縣境内北岸名郭家堂南岸即田家樓埽工若南岸雲龍山起由蘇堤韓家山一帶至田家樓計程九十五里再由田家樓起至外灘新河頭十四里計程共一百零九里若自雲龍山出徐州北門外渡黄由北岸至李家樓計程九十五里再由李家樓至郭家堂外灘新河頭十六里計程共一百一十一里由郭家堂至栁泉行宫須由山徑取道荆山橋總路行走計程有一百四十里核計南北兩岸距徐總在百里以外不惟一日不能往回即做兩日往回程站亦覺稍逺臣等恭繹諭㫖若就近亦可親臨閱看今郭家堂新河相距徐城既逺明春聖駕幸徐是否親往閱視謹繕摺由驛覆奏並繪圖貼説恭呈御覽奏入上諭曰如此可以不必往視又徒勞爾等修葺也届期再奏或差一人往視亦可乾隆四十九年閏三月十八日兩江總督薩載河道總督李奉翰奏言竊照江南河工一應脩防蓄洩機宜仰荷聖明洞鑒隨時指示凡闗𦂳要土石工程毎逢翠華南幸親臨閲視指示周祥固已金堤鞏固共慶安全茲逢聖主厪念河防六巡江浙廣諮博採以期安益求安臣等職司水土自當仰體聖心再加籌畫查江南黄河自豫省開放新河以来水勢建瓴直注上年伏秋大汛異常盛漲溜勢上提下坐各工在在險危臣等往来督率搶䕶仰賴聖主洪福幸獲平稳揆厥所由葢因徐州河面寛止八十餘丈形勢最窄黄河止此一束雖上有毛城舖蘇家山下有峯山閘等處分洩相距徐州較逺總未能得隨長隨消之力是以徐城上下各工搶䕶頗費周章查徐州以上南岸舊有天然閘一座原為減洩黄水之路亦由五湖㑹入洪澤湖出清口歸海縁閘下引河年久淤墊一經開放去路不暢則經過之蕭縣宿州靈壁等州縣民田易致淹浸故多年未敢輕易啟放而下游引河淤墊較甚所費煩滋亦未敢遽請興挑臣等愚昧之見黄河伏秋兩汛水勢大小不一如可容納自毋庸藉此引河分洩設遇盛漲有此引河實可減其壅盛之勢且與其倉皇於既漲之後又莫若籌减於未漲之先是此道引河寧可備而不用庶不致臨時周章合無仰懇聖恩将天然閘下引河一律挑浚深通以備盛漲之年開放分洩水由引河而下附近民田亦可無虞淹浸如此多一去路不但徐城可期永保奠安即通工亦不致有危險之虞至該閘減下之水歸入洪澤湖所有髙堰山盱臨湖石工上届恭逢聖駕南巡欽奉諭㫖加髙改建一律修整石工層數已髙惟堤外子堰尾土尚矮只須普律加髙培厚則淮揚數州縣民生更資保障再外河老壩口堤工後有深塘上年臣等㑹奏加帮寛厚以資捍衛欽奉硃批此非長䇿明嵗至彼爾可提奏面議欽此臣等凛遵訓諭先行勘籌審度該處後塘寛濶積水過深設法宣放無可通之路若戽乾積水用土墊平約需銀三十萬兩未免多費就現在堤工而論底寛十七丈頂寛十丈至十二丈不等往後逓年酌量加帮足資抵禦此時似可毋庸改辦惟查外河順黄壩一帶空塘河神廟後前嵗已遵諭㫖用土填平其攔黄壩内塘尚有積水若一併填平則前後聨成一氣更屬萬年鞏固所有三處情形謹繪圖貼説恭摺具奏如䝉聖恩俞允仰懇皇上特頒諭㫖以便欽遵估辦所需錢糧並懇就近在于兩淮運庫勅撥應用更沐皇仁於無既矣奏入上諭曰即有㫖諭乾隆四十九年閏三月二十日河道總督蘭第錫山東巡撫明興奏言竊查東省運河堤岸自濟寧以南至黄林莊計長三百四十里從前豫省漫水下注湖河一片東西兩岸土石閘壩工程多有淹漫經厯三次伏秋風浪撞擊為時既久坍損益多查微山湖水勢最大之時計深二丈五尺六寸比常年多至一丈四五尺仰䝉皇上厪念河防廣籌宣洩分路疏消漫水日漸減落自上年春間豫省工程堵竣經大學士公阿桂㑹同前河臣何裕城撫臣明興督率運河道等逐加查勘維時微山湖水仍深一丈八尺三寸計尚有漫水六七尺未經消退所有兩岸土石堤埝并閘壩橋洞裹頭等工尚多淹漫水中當經逐節探量就水勢之淺深定施工之先後除未經漫水及雖漫而不坍損之處毋庸估計祗令額夫平墊外其漫損堤埝酌估修復或用土工或加樁埽或于湖坡著重之處堆砌碎石簽釘排樁至韓荘一帶大石堤工及各處正閘单閘并橋壩涵洞裹頭等項分别估修拆修概復舊制約估需銀六十四萬九千餘兩聲明俟秋令水落再行確核一面将先涸之三段即行動工臣蘭第錫自上年五月抵任㑹同臣明興催辦至秋間水勢大消堤形間段涸露即經查照原奉撙節覆估共節减銀九萬三千六百八十餘兩實需銀五十五萬六千八十兩零䝉聖鑒綂計運泇兩㕔境工程共分為四十九段派委河工地方丞倅以下等官及投効各員承修於上年八月間普律動工臣等飭令運河道沈啟震暨濟東道楊鍾嶽住工經理並委留工効力之李封陳淮及㕔汛佐雜各員分頭催儧並多派委員續辦一切木石料物源源運工以資接濟臣等互相往來親加督辦當将稍易工段先行辦完其最難段落臣復率同該道等上下查催並隨時體察情形設法添員帮辦兩月以来亦據陸續報竣臣等逐處查騐凡有稍不如式之處均令重加修築務期一律堅實現查修復兩岸官堤共長五萬一千八百十七丈内土堤一萬七千七百十六丈九尺埽工八十六丈大石工三千八十二丈四尺碎石坦坡工一萬三千七百二十二丈八尺湖河排樁碎石工二萬九百七十五丈八尺至兩岸民埝本應民間自為修理上年欽奉恩㫖此次概歸官辦計長一萬四千五百六十三丈二尺内土工一萬三千八百一十四丈二尺樁埽碎石等工七百四十九丈又修補大閘二十四座单閘十九座三空橋二座滚水壩二座水口褁頭四十二座洩水涵洞十二座俱於閏三月十一日普律完工所用例價銀兩臣等因工段繁多復於查催之時就其修做情形逐細察看務歸切實其中有原估土石各方較之實在工程其零星尺寸稍有未符即經隨時更定計又節省銀一萬六千六百三十兩零以重錢糧通計兩岸土石等工共實用銀五十三萬九千四百四十九兩零臣等伏思東省運道惟濟寧以南地勢本低而昭陽微山兩湖之間河坡各水連為巨浸向係於水中築堤簽樁堆石以通縴挽在昔年創建鉅工興修不易迺自漫流入運數百里之縴道久被浸淹雖竭力經營漕船尚能行走迨既經涸露水無堤束節節淺淤運道河工大有闗係仰䝉聖明厪注特沛恩膏大發帑金又幸漫水疏消迅速得以大施工作凡有闗於蓄洩啟閉機宜者無不復還舊制不特縴路通連漕行無阻而沿河兩岸從前被水居民藉資力作口食充裕莫不懽忻鼓舞感戴皇仁是以數月之内堤岸一新民居復舊臣等於各工完竣之後次第騐收均屬整齊堅實其堤身髙寛尺寸亦悉與原估相符從此濟運有資自可長期鞏固欣幸之餘倍深感激奏入報聞乾隆四十九年四月十二日河道總督蘭第錫山東巡撫明興奏言本月初十日奉上諭山東運河前因豫省漫水下注湖河一片縴道閘壩俱被淹浸上年合龍河復後特降諭㫖將東省運河官民堤埝土石各工一律興修通共用銀五十三萬九千四百餘兩今因例價不敷加用津貼銀五十三萬餘兩據該撫明興奏請分年按亷歸欵毋庸按例攤徴等語向来黄運兩河間遇𦂳要工程採辦物料雇募人夫官發例價本屬優厚即或因料物昂貴限期稍𦂳一時難以取給于例價之外復有津貼不過加至十分之二三至多亦不過十分之五儘足敷用况運河堤岸工程尤非若豫省之堵築壩工可比加價銀兩何以較正項増至一倍恐其中不無藉端分潤之弊但朕軫念羣黎如河南江南等省一切河務闗係民生者不惜數千百萬帑金興工修築以期永資捍衛又何靳此數十萬津貼銀兩致官民竭蹷耶所有此次東省運河津貼銀五十三萬餘兩若按例攤徴民力固不免拮据即地方官捐㢘歸欵亦恐不肖之吏有所籍口致滋派累竟加恩准其一體作正開銷以示朕惠愛黎元有加無已之至意即使工員等果有侵蝕浮開等弊將來别經發覺時必當按律懲治所謂與其有聚歛之臣寧有盗臣自不肯因恐有弊端轉致恩澤不能下逮也将此通諭知之欽此臣等跪讀之下不勝感悚竊查東省運河堤工前因河流下注致被淹浸䝉皇上厪念運道民生大發帑金無論官民堤埝土石各工俱一律興修祗因工程稍難購料昻貴取土運石逺近不同夫功亦有多用酌加津貼遂至五十三萬餘兩此皆例外加増為數過多自應本省官民稍効悃忱自行籌辦是以臣明興奏請分年捐亷歸欵毋庸按例攤徴乃䝉皇上格外隆施念此項津貼銀兩若按例攤徴民力固不免拮据即地方官捐亷歸􅍁亦恐不肖之吏轉滋派累恩准此項津貼銀五十三萬餘兩俱作正開銷仰見聖主睿慮周詳防微杜漸恵養黎元無微不至臣等謹即刊刻謄黄遍行曉示俾官民人等咸知皇仁浩蕩恩加無已之至意並嚴飭各工員永逺存記此後一切工程不得例外多用至臣等及各工員辦理工程即不能力圖樽節又復安享厚亷夙夜自思寤寐難安伏查用項既已充裕則保固自應加展臣等酌議此次工程内有例應保固三年者請加為六年例應保固五年者請加為十年限内如有殘缺坍卸即責令承辦之員自行修補不准再行開銷嵗修錢糧其有事故實在無力者即著落原派之總催分催各員及臣䒭名下分别代修以重帑項以昭平允奏入報聞乾隆四十九年六月初七日河東總督蘭第錫山東巡撫明興奏言竊臣等前於四月初一日恭奉上諭山東運河堤岸各工前經發帑興修現已一律完整辦理甚為妥速蘭第錫何裕城明興俱著交部議叙其道府以下各官著蘭第錫明興查明實在奮勉出力者交部從優議叙其次出力者交部議叙其餘隨同在工未經出力者亦不必濫行叙入至効力各員或留河工委用或留地方差遣並著蘭第錫明興分别查明酌議具奏欽此臣等跪讀之下感激悚惶伏查此次東省運河工程因段落綿長期限𦂳迫其在工承修及僱工辦料各員派用人數未免過多必須詳加查察就其出力之等差以定列名之先後臣等凛遵諭㫖公同查議計總催司道三員分催知府同知等官八員辦料官三員辦工優等官二十二員内除布政使陸耀甫經開工即赴新任不敢仰邀議叙又原任布政使今授知府李封原任按察使今授知府陳淮均已䝉恩簡用及現已降調通判之原任知府王祿朋均無庸復予議叙外其餘道府以下沈啟震等三十一員均屬辦理妥速奮勉出力應請㫖交部從優議叙又承辦工程應列為次等之濟寧州知州王道亨等三十一員及委催工料出力之候補布政司經厯馮津等十員均請交部議叙此外辦工黽勉及需員帮辦始能完竣者計十三員并隨辦工程及協催工料之佐雜官二十八員雖均於要工無悮然僅隨同辦事應同新投効之四十員均無庸概請議叙以致稍有冐濫再查上年投効各員捐資辦工均已一律妥竣其應歸於河工地方之處臣等就其才具分别酌議如捐復知府李濤等二員業於行在引見奉㫖仍留東省補用又捐復直隸州知州許承蒼一員應俟引見後請亦留地方差遣又候選知州許紹錦等七員均應留于地方計應留地方之府州縣佐雜等官共十員至原任同知魏逢堯本係河員出身其承辦工程早經完竣應俟捐復後仍請留於河工委用又候選同知何元度等二十九員均請留於河工其應留河工之丞倅佐雜等官共三十員以上各員臣等往来工次留心體察随時分晰登註今復遵奉恩㫖詳加察核往返札商意見相同謹将辦工人員出力等第及應留河工地方之投効各員查明酌議具奏並分繕清单恭呈御覽奏入上諭部議之乾隆四十九年七月初六日吏部奏言議得内閣抄出署理河東河道總督蘭第錫等奏稱竊臣等凛遵諭㫖公同查議謹将辦工人員出力等第及應留河工地方之投効各員查明酌議具奏並分繕清单恭呈御覽於乾隆四十九年五月二十五日奉硃批該部議奏欽此欽遵抄出到部除山東布政使陸燿四川寧逺府知府李封山東青州府知府陳淮兖州府降調知府王禄朋淄川縣叅革知縣孫功烈該督等既稱不敢仰邀議叙應毋庸議至河東河道總督蘭第錫山東巡撫明興臣部業經淮其加一級在案毋庸再行辦理外應将總催工程之運河道沈啟震濟東道楊鍾嶽等二員分催工程之東昌府知府興安等五員辦料官武定府同知藍嘉瓉等二員承辦工程列為優等之濟南府同知繆暉吉等二十二員應請照例從優各准其加一級承辦工程列為次等之濟寧州知州王道亨等三十員委催工料出力之候補布政司經厯馮津等十員應照例各准其紀錄二次投効辦工請留地方差遣之捐復知府李濤知縣郭徳平業經引見奉㫖准其捐復原官仍留該省補用辦工已竣之捐復直𨽻州知州許承蒼業經捐復尚未引見應俟引見後准其留於山東地方委用投効辦工請留河工委用之原任同知魏逢堯應俟該員捐復引見後准其留於河東河工委用候選知州許紹錦等七員俱准其留於山東地方差遣委用侯選同知何元度等二十九員俱准其留於河東河工差遣委用仍令該督撫詳加察看如果始終奮勉出力遇有相當缺出分别題咨補用再查各省差委需員奏請㨂發例由臣部帶領引見發往向來河道總督奏請將候補候選正佐雜職等官留工差委者臣部俱議令該督給咨送部引見今試用知州許紹錦等投効河工未經引見應行令該督等分别給咨送部引見恭候欽定奏入諭依議行乾隆四十九年十二月初一日兩江總督薩載奏言竊照江南揚州至金山向由運口入江該處江面較寛且迴瀾一帶係屬大溜往來對渡未免涉險應将𤓰洲城内外舊有河道挑浚深通由此渡江至金山江面僅止三里較為便捷又自鎮江至龍潭棲霞一帶向係經由陸路若從長江行走必須經由黄天蕩舟行不便應自錢家港起挑河一道直達棲霞一水可通又金壇境内漕河淤淺亦應挑浚此三處河道經臣與撫臣閔鶚元於乾隆四十七年九月初十日繕摺繪圖具奏聲明請動金壇于時和入官銀五萬七千餘兩辦理不敷之銀再行籌撥等因奉到硃批好知道了欽此旋接廷寄内開乾隆四十七年十二月初八日奉上諭昨福長安到京奏及伊過江南據薩載告稱江南運河入江口門距金山行宫較逺今查有舊河身一道若加挑濬止有三里經過更覺便捷且可避中泓溜勢之險而於商賈舟楫往來亦為利便又往棲霞向係經由陸路不免捨舟登岸今亦擬挑河一道直達棲霞一水可通以省往返䟦涉之勞等語並將圖説呈覽此議可行俱應亟為者著傳諭薩載閔鶚元即将此二處於明春迅速興工挑濬先動張鸞玉案留江銀兩應用但念四十九年南巡粘補行宫等費未免不敷現已傳諭富勒渾等於賞給浙省辦差多餘銀兩内撥解江南二十萬兩薩載等自能仰體朕意妥協辦理也将此由四百里諭令知之欽此查前項河道臣與撫臣閔鶚元督同總局司道並調到河工熟諳估計之員往来查勘逐細確估派員分段承挑瓜洲金壇兩處河道尚易辦理惟自錢家港至龍潭棲霞一帶河道綿長南岸臨山北岸通江山水江潮互相灌注兩岸即以挑河之土築做縴堤並酌開汊河以資蓄洩臣等隨時察看指示工員妥辦於四十八年四月内工竣騐收後開壩通流聴民舟楫往來試騐因原估口底逢灣處尚覺稍窄縴堤亦覺卑矮又經奏明於上年霜降水落潮平後復行築壩展挑寛深加培縴道並酌添橋座増修駁岸涵洞於今春一律完工恭值聖駕南巡御舟經臨仰䝉皇上沿途閲視奉聖諭以此河於商民往来稱便欽定該河之名為便民港遵即勒碑表竪現在江水通流隨潮長落大小舟楫多由此河行走以避長江黄天蕩之險而渡江船隻悉走𤓰洲城河江面甚近商民莫不感頌皇恩永慶安恬核計開挑便民港河道並分築兩岸縴路建設橋座涵洞原估續估共用銀一十二萬九千三百三十七兩一分四釐挖撥民田拆遷房屋照例給價共用銀一萬六百九十四兩九錢五分四釐又開挑𤓰洲城河築壩並修建木石橋座水闗共用銀一萬八千六兩二錢三分三釐又挑浚金壇漕河用銀三千八百二十一兩一錢七分七釐以上三處河道統共用銀一十六萬一千八百五十九兩三錢七分八釐除金壇漕河動用銀兩另行造冊咨部報銷外所有開挑便民港并𤓰洲城河因差務案内開挑遵㫖動用恩賞各欵銀内辦理除分晰造冊咨送軍機處核銷外臣謹㑹同江蘇撫臣閔鶚元繕摺具奏奏入報聞欽定南巡盛典卷五十
