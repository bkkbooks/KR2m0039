body:
  text: 河防乾隆二十二年九月初七日裘曰修夢麟鶴年奏言竊臣裘曰修臣鶴年於六月之初在於嶧縣韓莊之迤西查舊有伊家河一道雖河形尚存而淤埂已久是否開通得以疏消湖水臣等遽難定議應俟委員確勘再行查辦業經具摺奏聞臣裘曰修即前赴徐州河南等處查辦一切臣鶴年回省之後即委布政使阿爾泰運河道李清時會同確勘是否可開有無利益據實稟覆今據該司道稟稱會勘得伊家河舊有水溝形迹寬一二丈深一二尺不等隨沿河往東南履勘相度形勢及入運處所其河身假落自韓莊迤西舊有河形之伊家河開起至江南之梁旺城入運計程六十九里七分零一萬二千五百五十三丈河頭髙於河尾一丈九尺四寸所開河面自應加寬但據泇河通判張克儉稟稱逐處挖井測驗下多砂礓刨挖需時恐誤放水未便加寬原議河靣只寬七丈似覺稍窄今議定開寬八丈底寬四丈深一丈二三四尺不等河尾入運之處挑寬十丈使湖水得以暢流河頭處所係江南利國驛驛路所經請照兩江督臣所議於河頭建滚水石壩一座按河身寬八丈壩座金門應寬十一丈有零並酌建石橋以通驛路所需土方滚壩各工料原估需銀四萬二千三百八十六兩零今河面加寬一丈土方銀數加增另行估報如有河身開至民間地畝之處亦即照例查辦時值臣夢麟到濟共相斟酌至韓莊詳悉相度洵屬應行之事至徐復與臣裘曰修籌辦意見亦復相同臣等伏查微山湖積水為患以致濟金魚等莊村久被淹浸時厪宸衷諄諄訓誡惟期民生永奠袵席早登我皇上宵旰圖維仰見匪朝伊夕臣等敢不竭力籌辦設法疏消以上慰聖懷惟是湖河一片去路甚微運河之水年來又復盛漲而傍泄運河之漲者全賴支河分流暢達無滯今河清等閘越河業經兩江督臣尹繼善酌議開寬盧口等處又擬堵閉入運之水既分則來源漸少亦可日就疏消其下遊之駱馬湖臣夢麟臣尹繼善會商挑挖菱溝港河二道由運河入海以資分泄至伊家河實為微山湖宣泄扼要之區今速行挑濬與荆山湖口三路爭流則奔騰無滯直注八閘之外微湖積水自能遞掣而下臣等再四詳查自應如該司道所議迅速辦理謹繪圖貼説恭呈御覽伏候諭旨欽遵臣等現在商酌擬派兖沂曹道徐鐸運河道李清時督辦並分派假落専員經理於九月初七日興工臣鶴年另摺恭奏外臣等仍不時往來親加查勘務期速竣厥工庶上遊可資宣泄而下遊亦無滙注之虞除移督臣尹繼善河臣白鍾山撫臣陳宏謀髙晉胡寶瑔臣等謹會同河東總河臣張師載合詞恭奏奏入上諭曰如所議行乾隆二十二年九月十二日夢麟尹繼善白鍾山嵇璜陳宏謀奏言竊惟淮徐海地方水患頻仍民罹災苦荷蒙聖心軫念宵旰憂勞特命臣等悉心熟籌不惜帑金開濬河道以期消彌災患拯救民生臣等恪遵訓旨公同啇酌通籌全局竊以湖河之水各有源流支派要皆以海為歸宿若下遊去路不能疏通則上流來源必多壅滯湖河正身不能容納則民田廬舍即受漫淹淮徐等處厯年之被災皆由於此臣等親厯各處遍加查勘細考受病之由詳求治病之法必使田間坡水層層引導由溝渠以達湖河湖河之水莭莭疏通由尾閭以歸大海則源委並治支幹兼修庶可蘇積困而收實效如山東與江南接壤之南陽昭陽微山等湖積水未消亟宜設法宣泄在山東僅由湖口閘入運過水無多現在另行籌開伊家河至梁旺城入運江南運河經邳宿桃清一由楊家莊出口會黃一由鹽河閘壩滙六塘河入海現在運河俱屬寬深各閘越河已經奏明再加開展運河內如有砂礓淺滯間段應濬者並行相機辦理惟因沂河之水自盧口旁泄由沙家徐塘二口入運過多有阻微山湖水經行之路經臣尹繼善奏明酌辦臣等親往細看沂河源出山東河寬百餘丈行至邳境盧口地方正流由駱馬湖六塘河歸海旁流由盧口壩分注入運祗緣舊壩口門寬至八十丈且未築石底年久刷深以致旁流過多淹沒邳境民田阻礙運河宣泄亟宜籌辦但沂水來源甚大若遽行堵閉不但暴漲之時全注六塘為宿桃清沭之患倘遇運河水小之年無以接濟亦甚有關係再三相度擬將石壩裹頭接長中間祗留口門寬三十丈並築亂碎石壩底以為莭制使沂水多半歸湖祗留二三分濟運但目下運河之水惟患壅滯無需接濟應於盧口築做草壩將沂水堵截使涓滴不得入運其邳境沂河尚屬寬深間有積沙淤灘酌加疏濬兩岸土堰亦為培修使沂水正流暢入駱馬湖由六塘河歸海俾運河宣泄微山湖之水得以全力下注庶可望其速消至荆山一河原係分泄湖水之要路業蒙皇上指示於小梁山內華山茶城開挑引河其有沙積灘現之處現在凛遵諭旨於荆山橋上下並出水湖口再加疏濬務使暢流入運其荆山橋下遊之彭家河又經臣夢麟奏準開濬現在趕辦此籌辦微山等湖宣導入河歸海之情形也又勘得六塘河處駱馬湖下遊為宣導沂水之要道駱馬湖尾閭有引河五道甚屬寬暢自引河以下滙為一河形勢窄狹亟宜開寬並將永濟橋酌添一十二孔俾湖水暢注其六塘河內如有間段淤淺及兩岸舊堰殘缺之處亦應修濬培補又六塘河北岸宿遷境內凌溝地方向有水口通砂礓河注於沭陽縣之沐河入漣河歸海盛漲之時散漫四出波及民田今擬就現有河路開挑寬深仍於凌溝酌建滚壩俾節宣有制又桃源境內有港河一道亦係分泄六塘河會沭入漣歸海年久淤淺應行挑濬亦於河頭建築滚壩並將沐河舊堰酌加修補使六塘得有分泄之支下遊可免為壑之患至六塘河下尾在海州地方與鹽河交滙由武障義澤項沖東門白蜆牛墩六里等河歸海口門閘間有淺阻俱加疏濬並將鹽河加挑寬深現有之泄水各壩減低二尺其例應啇人辦者仍歸啇辦臣等派官監督俾鹽運泄水兩有禆益惟義澤項沖二河與武障下遊同歸北潮河紆回灣曲宣泄不能通暢今查義澤河下遊舊有小沖河一道年久淤墊應行疏濬深通則泄水更為徑直又東門白蜆牛墩六里等河由六道溝滙入北潮河與武障義澤同歸一路未免壅阻今查東門河下遊現有五圖河河形淤塞應行開挑深通俾下遊尾閭多一入海之路庶千里長流咸順朝宗之勢自無橫溢之虞此籌酌六塘河分導沂水入海之情形也再河南夏邑永城等縣之水向由濉河下注江南宿靈虹之楊疃泗山等湖經宿遷之烏鴉嶺桃源之安河抵泗州陡門入洪澤湖出清口會黃歸海近年河道多有淤阻業經臣裘曰修臣髙晉會同查勘將應行挑濬之處具摺奏明內有烏鴉嶺安河董家溝等工係下江宿遷桃源所管乃濉河五湖之水歸入洪澤湖尾閭更為緊要現在委員確估趕辦惟各水多歸洪澤則出口務須宣暢查凊口之束水二壩業蒙聖明指示汛前早行拆卸俾得暢流自當永逺遵守其冬間收束之時亦宜相機斟酌如湖水足留敵黃則口門酌量留寬不得收束太緊其裴家厰張福莊等處引河俟水落之後通身細看如有淤淺並加疏濬使湖口出水得以暢達此籌酌濉河入湖並湖水入海之情形也以上應開各河道或因舊河淺窄而加挑寬深或因來源寬廣而添籌去路皆係上接鄰省下聨數郡之幹河所當首先興舉其餘一州一邑山泉坡水連界接疆滙而成河必須因勢利導使之水由地中如碭山之利民溝永定溝豐縣之食城河蕭縣之歐邵河爛石河銅山之奎河房村河睢寧之沈家河白山河邳州之武河燕子河艾山河宿遷之北岸民便河蔡家閘引河羅家河桃源之薑胡窪河清河縣之包家河民便河郭家河周橋河山陽之十字河太平河烏沙河安東之民便河舊鹽河阜寧之穿里河戴家溝河海州之髙墟口王官口丁家溝等河沭陽之分水沙河以上均係支流於民田俱有關係現多淤墊脈絡不能貫通臣等詳加斟酌有必須通身開挑者有止須間段疏濬者有疏泄積潦添設閘洞者俱應因地因時逐一經理使之入湖入河各有會歸現在督率道府選帶熟諳人員分頭確估一面委員興挑臣等往來督查限於年內告成以期積水消涸農民及時播種仰副我皇上念切痌瘝懷保黎元之至意所有敬籌湖河宣導機宜謹偹晰具摺恭奏並將各河源委繪圖貼説同臣嵇璜奏準下河應濬河道一併粘簽恭呈御覽奏入上諭曰覽奏頗得領要但須諸臣無分彼此和衷共濟以慰朕南顧之憂仍須實力督催不可草率塞責其共勉之圖留覽乾隆二十二年九月十四日直𨽻總督方觀承山東巡撫鶴年奏言乾隆二十二年八月初六日欽奉廷寄上諭近年山東頻被水患而今年南運河更屬異常泛漲因思東省境內如徒駭馬頰及老黃河等皆古九河故道原為河水分注之區其遺迹故在特因循日久遂致湮塞若將南運河之水從此宣泄相當淌注迅速方觀承當往來德州一帶閲視堵築第三屯決口或即乘便前赴山東會同鶴年將徒駭馬頰等舊日河身循行履勘核其現在形勢如可由此放運河之水似亦一宣泄之法但今昔異宜亦不必存膠柱之見現今秋分已屆海受衆水之時應酌量導之入海俾有所歸天津一帶凡有可開支河分減水勢之處亦即相度情形妥協籌議一併具奏總期廣為疏濬使尾閭通暢則水患自可漸消要在師古人之意而不泥其迹斯得之耳著將此傳諭方觀承鶴年等知之欽此又於八月二十四日欽奉廷寄上諭鶴年所奏堵築三屯決口及挑􅀈支河一摺內稱四女寺哨馬營二處皆運河歸海之路現已興工挑濬等語朕前以運河異漲非泄之入海不能消減是以降旨方觀承鶴年等令於徒駭馬頰等處相度歸海之路設法疏濬原非欲復九河故道總期於泄運河之水使之入海不必存膠柱之見今鶴年所奏四女寺哨馬營等處既為泄運尾閭此即朕諭中所及該撫等自當及時開濬以收疏導之益至此外或尚有可資宣泄者亦應留心查勘次第辦理總之多一入海之路即多一泄運之路不必拘泥也著將此諭令方觀承鶴年等知之欽此臣方觀承欽遵於八月二十四日自天津起程由德州哨馬營四女寺一帶會同臣鶴年赴東昌府運河東岸查勘馬頰徒駭二河復至東阿縣屬之張秋鎮迤南周回閲視查得運河自汶上縣南旺分水處引汶入運北行三百八十里經東平東阿聊城博平諸境至臨清州衛水自館陶合漳水滙之又北行三百三十餘里經武城恩縣德州入直𨽻境厯吳橋東光南皮滄州青縣靜海天津以達於海除直𨽻境內運河有捷地興築二減河分流入海莭年加濬深通現資宣泄經臣方觀承奏明其山東境內運河自德州至南旺共七百一十二里內有德州哨馬營減水壩一座寬三十丈壩面髙運河一丈二尺又南五十五里有四女寺減水壩一座寬八丈壩面髙運河一丈堤外老黃河一道即古之鈎盤河哨馬營壩下引河長五十里四女寺壩下引河長九十里俱入於吳橋縣屬之玉泉莊會流經寧津南皮樂陵鹽山慶雲至海豐縣大沽口入海計長二百九十里自四女寺而南又三百七十里過臨清州至博平縣之魏灣有馬頰河一道係唐時黃河故道經清平髙唐恩縣樂陵慶雲至海豐之沙土河入海計長五百七十里河頭十里之內設有減水壩一座寬八丈壩面髙運河八尺減水閘二座每座口門寬一丈五尺底髙運河七尺五寸涵洞一座寬八尺底髙運河五尺五寸自馬頰河而南又五十五里至聊城縣屬之龍灣有徒駭河一道即古之漯水經博平茌平髙唐禹城濱州至霑化縣久山口入海計長六百五十里河頭八里之內設有減水壩一座寬八丈壩面髙運河七尺五寸減水閘二座每座口門寬一丈五尺底髙運河七尺五寸自徒駭河而南又一百三十里至東阿縣屬之張秋鎮舊有五空橋一座寬十一丈五尺底髙運河一丈二尺又南二十五里舊有三空橋一座寬八丈底髙運河一丈五寸五空之南三空之北乾隆十九年復建有減水閘三座每座口門寬二丈底髙運河一丈減西岸沙河趙王河之水由堤外引河就近入於大清河歸海自三空橋而南又一百二里即係南旺分水處為汶水北入運河之始以上七百一十二里中蒙聖諭指示之老黃河馬頰徒駭三河所有減水壩四座減水閘七座涵洞一座又三空五空橋二座今年盛漲之時俱過水自三四尺至一丈五尺不等現在尚過水自一尺至六尺不等合計閘壩各口門共寬八十六丈三尺皆以宣泄運河盛漲入海其馬頰河河身寬自二十丈至一百餘丈容水為多老黃河次之徒駭又次之此運河分減舊有之途經也臣等欽遵先後所奉訓旨惟期泄運多途不敢稍存膠柱之見兹查哨馬營壩口並壩下引河業經臣鶴年奏明挑挖現在深通其四女寺壩外十二里有德州三十里鋪大橋橫亘髙埂之上橋內水深三四尺橋外迤東至嚴家莊四十里內水止二三尺形勢不順自嚴家莊下接玉泉莊會流處中間四十里並無河身水勢散漫髙低不一應行一律挑深自吳橋以下老黃河均於乾隆十四年水利案內抽挑子河迄今不無淤墊並葦草阻塞之處均應徹底疏通馬頰徒駭二河亦於乾隆十四年曽經挑濬莭年水過沙停閘口引河尤多淤阻並須加挑河身之內亦多蘆葦盤結兼有民間捕魚土壩及道埂攔阻之處均應間段清理又馬頰河於海豐境內將近入海處所有羊沽橋支河一道現為居民築堰斷流並應拆毁以暢尾閭又各河所經橋座多有窄隘兩頭土壩甚長束水不能暢流並須拆改展寬添設木橋寬通水道俾無壅遏方為妥協查各河至海豐綿長數百里復多支河傍港臣等已派委明白河員每處二人挨查自至海口逐段測量水勢分晰開報但河身現皆過水其寬窄深淺情形尚難查丈確實應請俟水勢消退之後再行復勘分别工程難易或勸用民力或動帑興修臣方觀承會同東省撫臣河臣次第妥酌辦理期於支流暢達泄運有資以仰副我皇上指示機宜期於有偹無患之至意再查張秋運河西岸有沙河趙王河二道滙上遊河南之儀封延津直𨽻之長垣東明山東之鄆濮范張諸境厯來橫衝入運每逄水發勢甚洶湧而該處運河兩岸東髙西下東岸所設之三空五空橋及減水各閘口門皆髙運河一丈至一丈二尺水勢不能暢消不獨運道阻艱兼致附近州縣汛溢為患本年八月盛漲之時臣鶴年曽於三空五空橋之間新閘之南地名八里廟將運河東堤刨開數丈泄水入大清河數日之內運漲頓落旁邑積水亦消行之已有成效今臣李清時公同詳加相度應請即於此處建滚水石壩一座面寬十二丈底髙運河八尺比五空橋低四尺比新建閘座低二尺遇八尺以上之水即可由此減泄隨長隨過不須啓閉兼有限制既資分導之利並收濟運之益相應一併請旨交與新任撫臣會同河臣再行籌議奏請聖訓辦理至直𨽻天津一帶支河祗係消泄境內􅅹水下通淀泊無關南運宣泄等情形業經臣方觀承恭摺奏覆在案所有臣等會勘各情形及籌辦緣由理合繪圖貼説恭摺具奏奏入報聞並有旨諭部乾隆二十二年十月初三日山東巡撫蔣洲奏言竊山東德州衛所三屯四屯地方本年六七月間運河水發各衝決堤口淹浸田廬臣赴任道經德州於九月十四十五二日親赴各該處勘視查三屯地方有哨馬營支河原為宣泄運河之水由海豐入海近年支河淤淺運河水無泄㵼本年水大遂致衝決三屯堤口經升任撫臣鶴年親詣該地督率署德州知州吳祖修將哨馬營橋洞開通使水泄疏始於老堤決口之外搶築月堤一道使運河之水不能流入三屯之水方得盡涸今老堤決口現尚水深工力難施應俟來嵗春融方可填築於新築月堤內外堵禦庶可永資捍衛又四屯地方亦有四女寺支河藉疏運河之水亦俱淤淺支河髙於運河今年運河水漲水難消泄將四女寺上遊衝決兩口目下南岸決口已築月堤抵禦現在北岸決口未築因尚有武城縣菜家場決口漫入恩縣西北鄉下灌四女寺附近民田積水賴此決口泄㵼須俟水退後再行填築臣又查哨馬營支河由東省流入直𨽻復轉入山東海豐入海現在下遊一帶悉屬淤淺以致水難暢流自易泛溢臣管窺之見先於哨馬營支河上遊築一攔水土壩堵截河水將下遊淤淺之處一律開濬深通之後拆去土壩俾水得暢流其四女寺支河係由東省老黃河而下合入海豐縣入海下遊淤淺各處亦須逐一開濬此二處支河均關民田耕種皆應及時急為開濬使水得暢流入海自可永慶安瀾其開濬工程應請責令各該地方官各就境界分段承辦専委濟東道稽查督率其哨馬營支河下遊有屬直𨽻地方者聽督臣方觀承委員承辦庶各專責成辦理可期迅速再臣勘得德州運河兩岸堤岸係保護民田廬舍例係民築民修現在面寬二三尺底寬四五尺不等追溯其源因河水日事衝激堤泥剝落是以堤身日薄而河底日漸淤髙現今運河水面髙於堤內民田且運河過往船隻絡繹停泊必在堤身錠椿繫攬現多殘損水發之時漫決甚易民力有限勢難責其加築寬厚此又保護民間田廬必應早為籌畫之處臣伏思皇上痌瘝在抱凡於民生有益莫不上厪宸衷不惜帑金登斯民於袵席之安本年災祲之餘災黎已荷聖主撫賑頻施無虞失所但賑畢之期在二月正值青黃不接之時臣愚伏懇皇上天恩俯準動項將臨清以下一帶運河悉行挑濬深通其堤岸加築髙厚務須面寬一丈底寬三丈於明年二月鳩工集事寓賑於工小民之利賴無窮矣如蒙俞允臣再會同河臣逐一估計咨啇直督臣方觀承會同請旨遵行其餘東省水利工程臣甫經到任現擬將政務料理數日即親赴各處逐加查勘會同欽差及河臣等籌議趕緊辦理務期一勞永逸息水患而安民業以仰慰聖主宵旰厪念之德意奏入上諭曰已有旨交劉統勳帶去爾等同心實力妥為之乾隆二十二年十月十四日裘曰修夢麟張師載蔣洲奏言臣裘曰修臣張師載於濟寧上下查勘臣夢麟臣蔣洲前後俱至韓莊會同籌議查得山東應行疏濬之處兖州為要曹州次之其故皆原於微山一湖積水不消以致宣泄無路臣裘曰修與前撫臣鶴年六月間於微山湖一帶相度地勢惟伊家河形勢最順檄令藩司阿爾泰運河道李清時勘議嗣臣夢麟與撫臣鶴年又細加講求奏請興工臣裘曰修於九月初七日復到工所諭令將原估十丈河請再行展寬數丈今已按段分工併日儧辦總期十一月上旬完竣將來告成微山湖積水建瓴而下則濟寧金鄉魚臺滕縣嶧縣以及江南之豐沛二邑地畝可以普行涸出既有此宣泄之路即伏秋盛漲亦必不致如前此之壅閼不下臣等再詳求原委水消之後更有應辦者在兖州言之魚臺縣屬有舊運河一道係明代未開泇河之先舊行運道也在今運河之西向雖年久不治河形尚存且通舟楫今則淪入湖中幾及二載查此河故道界微湖之西南上接濟寧牛頭河金鄉之淶河桞林河由沛縣安家口鬭虎店至銅山縣之玉皇廟出茶城十字河至荆山橋入邳州之彭家河歸運若微湖消退之後疏通此河並牛頭河淶河桞林河一併挑濬在下遊言之則直接現在之茶城河頭而脈絡貫通在上遊言之則濟寧金鄉以下各州縣滙注之水皆有去路而水患可除矣又泗水河發源於泗水縣之陪尾山經曲阜縣滋陽鄒縣入濟寧州境歸魯橋濟運在滋陽鄒縣曲阜境內者向不為患自濟寧州姚家莊以下河身愈下愈窄至張家橋等處寬不及四分之一在在淤阻致多泛濫迄今未消又白馬河自鄒縣北九龍山發源入濟寧孟家橋歸獨山湖濟運因中假之董家口與泗河相接泗河之尾窄隘不能容納每多旁溢遂漫入白馬河合流愈致淤阻今請於泗河白馬河二水並將河尾挑浚務俾各行故道勿致交阻則兩河分流消納亦易矣此均在伊河既成微湖既泄之後所應辦之工程也至現今可興舉者有府河係泗水分支向有金口閘俗名黑風口建涵洞二座由涵洞穿入府城至濟寧東關之楊家壩一出天井閘入運一會洸河入馬場湖今涵洞淤墊已在河底來路既已壅滯至楊家􅄵又以用土堵築去路亦復隔斷每嵗俱有暴漲之虞今若將涵洞改建減水閘一座楊家壩亦改建石閘一座用板啓閉則上下通流且有節宣之制至洸河會流入馬場湖之洸河每多旁溢查自濟寧之興文鎮以下舊有河形一半入運一半入馬場湖年久淤墊應請挑浚則兩河交治矣此現今即可興作者也至曹州府則應分二道言之其西南一道則自豫省之延津滑縣封邱直𨽻之長垣東明等處坡水漫溢而來是以明代建築太行堤之始即沿堤開河一道名曰順堤河長短起止悉與堤同使順軌東流曹單等縣入江南豐沛境以逹於微湖自微湖水長此水不能下逹以致每嵗為災多有淤墊此亦在伊河既成微湖既泄之後所應辦之工程也其東北一道則曹濮范鄆夀張陽榖上承濮州定陶各坡河之水俱從沙河趙王河二處入運由東岸之三空橋五空橋及平水閘泄入大清河歸海而壩底過髙宣泄不及今嵗衛河異漲運河為其頂阻倒樣而上遂多淹漫今直督臣方觀承前撫臣鶴年奏請於八里廟添建滚水壩一座臣等再加詳酌此處正當沙趙二河之衝於地勢最為切中但壩底仍髙則泛漲之時尚有不能暢消之慮今奉旨俱放低改為七尺以使過水仰見聖鑒精詳之至應欽遵辦理總使平槽之水濟運有餘而泛漲之時消減亦易則曹州東面一帶水患可除矣且不獨此也向來入運之水無所宣泄泛溢於上則濮州范縣朝城莘縣陽榖夀張等處固先受其患泛溢於下則巨野嘉祥濟寧金鄉魚臺諸縣亦為所波及今沙趙二河既治則水之從東入大清河歸海也地近而速不復從巨野以下南灌金濟是即於兖屬言之治之於源頭亦止火息薪一術至東省地勢臣等上下察看並詢之河員該地土人實係安山以南東髙西下安山以北則西髙東下東堤之外入大清河之路勢皆順利無虞倒漾若馬頰徒駭四女寺哨馬營等處皆為東泄入海之路已前後奉旨遣員分導是諸水皆有所歸東省數千里從此可免積潦之患臣等公同啇酌意見相同謹據實合詞陳奏臣張師載臣蔣洲再逐細詳審確估並各支港溝渠分别民力官工一切及時辦理以期仰副聖天子軫念民生之至意再查沂沭二水皆為幹河沭河至江南經沭陽縣入海山東境內尚屬安流沂河正支入江南之駱馬湖旁支從盧口入運向因入運太多臣等業經會議於盧口建壩不使多泄以疏運河水勢今開沂河入駱馬湖之正支受賢集等處多有淤阻如此則恐夏秋水漲之時蘭山郯城易致泛濫臣等仍咨明江省將沂河入駱馬湖正支再行疏通增入下江水道工程案內辦理合併聲明奏入上諭曰覽奏俱悉朕正慮沂州府屬每被水災摺內有疏通駱馬湖之議速行妥協相度乾隆二十二年十月十八日白鍾山嵇璜奏言竊查下河歸江歸海各工一案欽奉諭旨令臣等督率屬員悉心妥協辦理俾下河民生永有禆益欽此欽遵臣等與督臣尹繼善當經飛飭該管道府選帶熟諳估計人員將各處工程分頭確估上緊興修去後查湖河水勢歸江近而歸海逺歸海紆回而歸江徑直是以臣嵇璜前奏內將歸江者列為急工歸海者列為緩工今查歸江之路固宜急辦而歸海各工其中亦有應行先辦者不便以列為緩工遂使遲緩如歸海工內髙寶運河東堤之郎兒閘子嬰南閘邵伯減水三閘水大則藉以泄水歸海水小則藉以灌溉民田今因年久損壞急應拆修完固以資啓閉阜寧之射陽湖改紆為直移逺為近則歸海徑捷宣泄甚暢不致阻壅水勢頗為緊要泰州之孔家涵河鹽邑之皮岔河岡溝河係分導西水之要路亟須疏濬深通以資利導又下河之石䃮天妃越閘裹頭尾土俱已塌卸兩墻壁立若不急修恐致傾圮重防多費難以再緩以上俱係歸海緩工內應行先辦之工今與歸江急工俱已一併估定臣等於河廳營汛及鹽務人員內遴委幹員酌撥帑銀分段承修現在興工又將一切挑河建閘事宜給發條約委令道府大員實力查催嚴加稽察統限於年內一律如式完竣不使稍有草率遲延臣等敬遵聖訓董率屬員悉心妥辦務使歸江歸海之路莭莭疏通不致阻遏泛溢淹漫農田以冀仰副我皇上軫念下河奠安民生之至意奏入上諭曰甚好知道了同日劉統勳鶴年奏言竊山東江南一帶河道工程關係民生漕運上厪宸衷指示臣等實力查辦臣鶴年現管山東巡撫事務臣劉統勳將應行事宜面加啇𣙜漕臣楊錫紱所請挑河築堰修理縴道整頓閘壩等事俱需親身勘估派員分修至八里廟湖閘以及盧口壩等處亦經撫河臣各抒所見先後陳奏當此水落歸槽風日和暖之候正當覆加相度計日儧工惟運河南岸民堰一事既不應任其傾圮又未便過滋糜費則酌量賞給飯食照河撫臣胡寶瑔所奏給錢數十文之例俾無業貧民藉以糊口實屬公私有益臣等又思現在運河既需挑濬其挑出之土堆向兩邊即係增培堤岸但中多泥濘未便即用夯硪請目下以挑河作培堰既可一舉兩便俟土乾之後仍照前例雇募民夫加以夯硪俾得整齊堅固既可以防泛濫又足以利遄行俟臣鶴年前赴濟寧時與河臣張師載定議舉行臣劉統勳於再回工之時接續辦理奏入報聞欽定南巡盛典卷三十九
