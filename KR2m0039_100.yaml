  text: 欽定四庫全書欽定南巡盛典巻六十七
  hash: sha256:94dbe8445eb0223a0a003b25a7e6ee1caa838e1f1bdef7b75489aeddaa7cc97e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_100-1a, image: WYG0659/WYG0659-0133a.png}
body:
  text: 祀典乾隆二十六年十二月初二日禮部奏言明春聖駕南巡所有山東省元聖周公先師孔子闕里東嶽岱宗江南省河瀆淮瀆江瀆明太祖陵請照例遣祭以昭盛典其浙江省禹陵南鎮㑹稽山海神聖駕兩次南巡俱有祀典應請一體遣祭如禮至渡江渡河或親詣拈香或遣官拈香之處屆期臣部具奏請㫖再御路經行三十里内應祭先賢名臣勲臣祠墓乾隆十六年二十二年二次皇上南巡均遣官致祭此次應請將從前致祭處所照例致祭祭文交翰林院撰擬祭品交地方官備辦香帛由太常寺帶往遣官屆期臣部於扈從大臣内奏派奏入報聞乾隆二十六年十二月二十七日太常寺奏言恭查乾隆二十二年皇上南巡渡黄河淮河揚子江㸃香應遣官致祭各處所用香帛祭品蠟燭拜褥桌案等項内應地方官備辦者行文江南總督敬謹預備應帶往者臣寺臨期行文兵部咨取人夫車輛船隻並䕶送兵丁派辦理㕔官帶領鋪排人等前往運送指示陳設預備㸃香祭祀事務今此次皇上南巡拈香致祭各處所用香帛祭品等項内應地方官備辦者仍行文江南總督敬謹預備外應帶往者臣等遵照乾隆二十二年之例預備行文兵部咨取擡夫二十名車一輛派辦理㕔務之贊禮郎訥清額讀祝官德明帶領鋪排前往運送指示陳設預備奏入得㫖俱交地方官敬謹預備乾隆二十七年正月初八日禮部奏言此次聖駕南巡先經臣部奏請致祭山川先聖先師並請將乾隆十六年二十二年致祭過先儒名臣等祠墓照例遣官致祭臣等伏思先儒名臣究非嶽鎮海瀆先聖先師可比理應分别辦理臣等酌議除嶽鎮海瀆先聖先師歴代帝王陵寢仍照舊例奏遣扈從大臣讀文致祭外其餘先儒名臣等祠墓二十七處前於聖駕南巡己經兩次邀㤙致祭今次毋庸讀文致祭屆期臣部將扈從大臣名籖進呈恭候欽㸃拈香奠酒以昭優卹至兩江總督尹繼善於乾隆二十六年十二月二十五日續報到銅山縣河神廟係乾隆二十二年勅建亦應照祭山川之例遣大臣讀文致祭臣等謹繕清單恭呈御覽奏入報可乾隆二十七年正月二十八日行在禮部奏言乾隆十六年二十二年二次聖駕南巡渡河渡江時往返俱親詣拈香惟淮河乾隆十六年起鑾時在武家墩親詣拈香囘鑾時在惠濟祠親詣拈香此次皇上渡河渡江渡淮或親詣拈香或遣官拈香之處伏候聖訓奏入得㫖朕親詣拈香乾隆二十七年二月初四日行在禮部奏請致祭河瀆淮瀆河臣靳輔等合祠遣官讀文致祭拈香得㫖祭河遣雙慶祭祠遣程巖乾隆二十七年二月十四日行在禮部奏言先經臣部奏准江省江瀆之神遣官讀文致祭周泰伯呉季扎言子游宋臣宗澤韓世忠范仲淹本朝大學士臣張玉書尚書臣趙申喬總河臣陳鵬年巡撫臣湯斌張伯行潘思榘祠俱遣官拈香今謹將扈從文武大臣職名繕冩名籖進呈伏候致祭江瀆之神欽㸃一員各祠拈香欽㸃四員奏入得㫖祭江遣雙慶拈香遣張成勲永福程巖張映辰乾隆二十七年二月二十五日行在禮部奏言先經臣部具奏浙省海神廟禹陵南鎮㑹稽山神遣官讀文致祭江海潮神唐臣陸䞇錢鏐張巡許逺宋臣岳飛明臣于謙本朝大學士臣徐本蔣溥尚書臣徐潮等祠墓遣官拈香奠酒今謹將扈從文武大臣職名繕冩名籖進呈恭候欽㸃二員致祭三員拈香奠酒奏入得㫖讀文致祭遣永福介福拈香奠酒遣張成勲程巖張映辰乾隆二十七年三月十七日行在禮部奏言先經臣部奏准江寧府明太祖陵遣官讀文致祭晉臣卞壼宋臣曹彬祠明臣李文忠祠徐達墓常遇春墓再方孝孺等一百十八人合祠本朝總督臣傅臘塔祠于成龍祠等八處遣官拈香奠酒今謹將扈從之文武大臣職名繕冩名籖進呈恭候欽㸃一員往明太祖陵讀文致祭欽㸃二員各處拈香奠酒奏入得㫖承祭遣永瑋拈香奠酒遣雙慶程巖乾隆二十七年四月初九日行在禮部奏言先經臣部具奏徐州府銅山縣勅建河神廟遣官讀文致祭謹將扈從之文武大臣職名繕冩名籖進呈恭候欽㸃一員前往致祭奏入得㫖遣阿里衮乾隆二十九年十二月初四日禮部奏言恭照明春聖駕南巡有應行致祭陵墓祠宇臣等詳查乾隆十六年二十二年二十七年三次南巡於明太祖陵或聖駕親詣致祭或親詣奠酒仍遣官致祭或遣官致祭照歴代帝王之例親詣行禮此次南巡應照何年舉行之處謹開清單恭候欽定至夏禹王陵查乾隆十六年親詣致祭一次二十二年二十七年俱遣官讀文致祭其元聖周公先師孔子及嶽鎮海瀆河神等九處前次南巡俱遣官讀文致祭此次南巡所有夏禹王陵及以上九處應請照上次舉行又先賢勲臣名臣等祠墓三十二處查乾隆十六年二十二年俱遣官讀文致祭二十七年遣官拈香奠酒此次南巡應請照上次舉行所有應祭各處謹列清單一併恭呈御覽臣部行文各該督撫飭令地方官備辦祭品香帛并行文翰林院將致祭夏禹陵諸處撰擬祭文奏入得㫖照二十七年舉行梁詩正亦宜添入乾隆三十年二月初二日禮部奏言恭查乾隆二十七年聖駕南巡往返渡河渡江皇上親詣彩棚拈香惟渡淮起鑾時皇上親詣武家墩拈香囘鑾時皇上親詣惠濟祠拈香此次皇上往返渡河渡淮渡江或照上次親詣拈香或遣官拈香之處伏候聖訓奏入得㫖朕親詣拈香乾隆三十年二月初八日禮部奏言先經臣部具奏江南省河瀆之神淮瀆之神遣官讀文致祭本朝河臣靳輔齊蘇勒嵇曾筠髙斌等四人合祠遣官拈香謹將扈從文武大臣職名繕冩名籖進呈恭候欽㸃一員承祭一員拈香奏入得㫖遣五福全奎乾隆三十年二月十七日禮部奏言先經臣部具奏遣官讀文致祭江瀆之神江南省丹徒縣本朝大學士臣張玉書祠宋臣宗澤祠陽湖縣周呉季扎祠武進縣本朝尚書臣趙申喬祠巡撫臣潘思榘祠遣官拈香謹將扈從文武大臣職名繕冩名籖進呈恭候欽㸃一員致祭江瀆之神欽㸃二員各祠拈香奏入得㫖致祭江瀆之神遣五福各祠拈香遣張若澄孫灝乾隆三十年二月二十三日行在禮部奏言恭查乾隆二十七年聖駕南巡欽奉特㫖大學士陳元龍陳世倌蔣溥等墓俱遣官奠酒今大學士史貽直墓請照上次之例謹將扈從文武大臣職名繕冩名單恭呈御覽伏候欽㸃一員前往致奠奏入得㫖遣蔣檙乾隆三十年二月二十六日禮部奏言先經臣部具奏江南省長洲縣言子游祠宋臣韓世忠祠范仲淹祠本朝撫臣湯斌祠張伯行祠河臣陳鵬年祠呉縣周泰伯祠常熟縣本朝大學士臣蔣溥墓等八處遣官拈香奠酒謹將扈從文武大臣職名繕冩名籖恭候欽㸃三員各處祠墓拈香奠酒奏入得㫖遣富德張若澄温福乾隆三十年閏二月初一日行在禮部奏言先經臣部具奏紹興府禹陵南鎮㑹稽山神遣官讀文致祭秀水縣唐臣陸䞇祠錢塘縣江潮神海潮神唐臣錢鏐祠宋臣岳飛明臣于謙祠墓本朝尚書臣徐潮墓大學士臣徐本梁詩正墓九處遣官拈香奠酒謹將扈從文武大臣職名繕冩名籖恭候欽㸃一員致祭二員拈香奏入得㫖致祭遣雙慶拈香遣張若澄孫灝乾隆三十年閏二月初二日行在禮部奏言先經臣部具奏浙江省海神祠遣官讀文致祭唐臣張巡許逺祠本朝大學士臣陳元龍墓陳世倌墓遣官拈香奠酒謹將扈從文武大臣職名繕冩名籖進呈恭候欽㸃一員前往致祭拈香奏入得㫖遣范時紀乾隆三十年閏二月二十六日禮部奏言先經臣部具奏江寧府明太祖陵遣官讀文致祭江寧縣晉臣卞壼祠宋臣曹彬祠明臣徐達墓常遇春墓李文忠墓方孝孺等一百十八人合祠本朝督臣于成龍祠傅臘塔祠等八處遣官拈香奠酒謹將扈從文武大臣職名繕冩名籖恭候欽㸃一員致祭明太祖陵欽㸃二員各處拈香奠酒奏入得㫖遣簡親王致祭遣温福范時紀拈香奠酒乾隆三十年三月十四日禮部奏言先經臣部奏准此次聖駕南巡恭照乾隆二十七年之例先師孔子闕里諸處請遣官讀文致祭御路所經三十里以内江海神廟先賢名臣勲臣祠墓各等處請遣官拈香致祭奠酒今聖駕囘鑾由水路至德州臣部行文山東巡撫將御舟經過三十里以内所有應行致祭等處詳查報部以憑議奏兹據山東巡撫崔應階報稱濟寧州有先賢仲子祠任子祠汶上縣分水口有禹王廟龍神廟明臣宋禮祠俱係瀕臨運河附近御路應否致祭查汶上縣分水口禹王廟龍神廟瀕臨運河應請遣官拈香再查宋禮係明代尚書治河濟運著有功績雍正四年欽定封號為寧漕公春秋致祭其祠亦在汶上縣分水口瀕臨運河與例相符又先賢仲子由任子不齊俱從祀孔廟列入祀典其祠在濟寧州御舟所經三十里以内亦與例相符應請一體遣官拈香以光祀典奏入報可乾隆三十年三月二十四日行在禮部奏言先經臣部具奏徐州府銅山縣河神廟遣官讀文致祭山東省汶上縣分水口禹王廟龍神廟明臣宋禮祠濟寧州先賢仲子由祠任子不齊祠等五處遣官拈香謹將扈從文武大臣職名繕冩名籖進呈恭候欽㸃一員致祭徐州府銅山縣河神廟派一員前往禹王廟等五處拈香奏入得㫖致祭徐州府銅山縣河神廟遣五福山東汶上縣分水口禹王廟五處拈香遣范時綬乾隆三十年三月三十日河道總督李宏奏言竊查白英老人建築戴村壩遏汶水出南旺利濟漕運功垂不朽前明萬歴年間曾賜建祠戴村春秋祭祀並䕃其子孫一人給以八品冠帶奉祀香火載在誌乘嗣於雍正四年䝉世宗憲皇帝勅封白英為永濟之神其子孫承襲八品之處我朝定鼎以來未經奉有諭㫖而父子相承仍循前明舊例臣等伏思國家崇德報功給以世職例應出自皇㤙今永濟神白英導汶濟運一時奏分水之功萬世獲通漕之利合無仰懇聖㤙俯念永濟神白英生前未得一命之榮仍准其子孫一人承襲八品頂帶奉祀香火如䝉俞允臣等確查永濟神白英嫡派子孫另行取結咨部承襲以崇祀典奏入得㫖允行欽定南巡盛典巻六十七
