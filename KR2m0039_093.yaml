body:
  text: 海塘乾隆四十六年正月十三日富勒渾王亶望奏言竊照浙省海塘前因黃宇字號已成頂沖臣等酌籌在於天字號柴塘之後趕辦搶險條塊石塘三百丈以備春汛節經恭摺奏聞臣王亶望率同工員上緊儧辦臣富勒渾不時到工查看前後打樁已共有一萬一千六百餘根其竪築地盤嵌夯塊石并安砌底石者已有十餘丈一切鬪縫灌漿鈎貫極為緊密在工員固不敢稍辭勞瘁其樁夫工匠除雨雪日期暫停外餘俱逐日趕緊儧築內擇其勤奮者酌加給賞鼓勵均皆踴躍從事並無茍簡草率之弊計至春汛以前所築三百丈自能辦竣惟察看近日水勢減落范家埠對面水底隂沙漸濶大溜日逐移西由天字號以上數十丈刷成灣兜逼塘而下所以添築柴塘業已數十丈臨水自天字號至辰字號沿塘溜勢俱屬湍激現將柴塘加意保護其趕築之搶險石塘三百丈臣等前請天字號迤西築一百丈迤東築二百丈共三百丈今細察形勢尚屬不敷應於天字號迤西再添築一百丈迤東添築一百丈共五百丈方與塘外水勢情形足備捍禦現飭接續一律開槽下樁與前工次第所需塘工石料臣等分檄嚴催隨採隨運內紹興府産石各縣另委寧紹道吳恩詔親赴該處督辦其湖州産石縣分即委湖州府知府永福催儧并因紹屬石料必由海運到工稍難海船雇覔不能多得又酌量𣲖員添造運船五十隻以資協濟所需工價先行借墊工竣後變價歸欵其採運承催各員即以石料到工之多寡分别功過以示勸懲現俱源源解運到工條石已有六千五百餘丈江蘇省亦運到五百丈俱可應手築砌輪番轉運不致遲誤至石塘根腳前督臣三寶奏請緊靠柴塘之內築砌可以免動民居但石塘必須預留坦水地步庶緩急俱屬有備現築石工塘腳酌量情形離柴塘土創二三丈不等該處即偶有民居不過板屋土房亦可給費遷移其納糧民地俟大工告竣均查照前督臣嵇曽筠築塘成例分别辦理臣等疊蒙聖訓周詳諄切於此等緊要工程惟有公同悉心籌畫辦理不遺餘力處處務期周妥以仰副我皇上為濱海民生永籌捍衛之至意所有塘工現辦情形恭摺具奏奏入報聞乾隆四十六年二月二十六日阿桂陳輝祖奏言竊查老鹽倉迤西至章家庵柴塘四千二百餘丈從前亦曽屢議接建石塘始以活土浮沙難施樁石而止繼以塘外護沙接漲廣逺而止本非不可辦之工率以施工難易所見紛岐迄無成議上年皇上南巡軫切海疆親臨閲視念潮勢直趨北岸護沙無存塘根水深數丈朝沖暮擊一線草塘豈能捍禦全海潮勢况柴塘易於坍塌年年修補終非長䇿究不如石塘之堅固諭令將可以改建石塘之處勘估辦理經王亶望奏明先從辰字號起至伏字號止改建魚鱗石工長二千丈每丈用條石一百十三丈釘樁一百五十根條石在於本省德清武康山隂會稽餘杭等縣及江南省分辦樁木在於金華衢州嚴州三府屬購辦正在開工間忽范家埠對岸淤漲隂沙日漸北趨水勢貼塘搜刷以致柴塘屢次間段被沖矬陷恐屆春汛更難抵禦而魚鱗石塘採石較難釘樁不易難以及時趕辦因復議請於寒字號頂沖之處建築搶修石工五百丈以禦春汛其魚鱗石塘暫行停辦至李質頴到京面奏改建石塘徒費無益不若於現在柴塘外一律改築坦水實於柴塘有禆等語臣等自到浙後相度情形稽查舊案柴塘之外止有用竹簍木匱以禦潮汐從無修築坦水之事無論塘根臨水深有至二三丈一日兩潮油灰漿汁無所施用難以釘樁砌石且塘根固藉坦水為保護而坦水亦藉石塘為倚靠方能堅固若以石鑲柴表裏浮鬆憑何存立此事之斷不可行者臣等自到工以來虛𠂻體訪一時衆論俱屬畏難苟安毫無定見臣等伏思海潮遷徙不常浮沙往來無定此時章家庵既屬頂沖即迤東一帶亦在在俱關險要是從前改建石塘尚屬先事預籌而現在之改建石工尤為刻不容緩臣等前奏或仿照條塊石塘酌增工料加添丈尺以期施工易而成事速之處欽奉諭旨俟履勘確實衆議僉同即速上緊興工辦理但條塊石塘究不如魚鱗石塘之堅固臣等前奏止就大概情形而論今數日以來悉心履勘通盤籌畫按日計工按工計料辦理魚鱗石塘二千二百四十丈均可於乾隆四十七年冬間完竣伏思皇上加惠黎元不惜多用帑金為沿海生民永籌樂利終以改建魚鱗石塘方可資捍衛而垂永久臣等不敢因有前奏稍存畏難遷就之見公同酌議富勒渾等所辦搶修條塊石塘長五百丈內自天字號向東至寒字號止長三百丈天字號向西工長二百丈今自來字號起迤東至食字號止二千二百四十丈俱擬建魚鱗石塘仿照東塘之例量地勢髙低或用十八層至十六層不等應需條石二十五萬餘丈浙省原辦條石十二萬八千七百五十丈江省原辦條石十一萬三千七百五十丈現運到工條石二萬一千餘丈僅供搶險石塘之用至續辦魚鱗石塘應用條石臣等現飭本省並飛咨江省分派購辦嚴催趕運又所需樁木約估三十五萬根並飭本省金華衢州嚴州三府屬産木各縣領銀購辦并一應需用料物亦陸續採買俟現辦搶險石塘完竣尅期諏吉開工以上二千二百四十丈工料腳價約共估銀三十餘萬兩臣陳輝祖督率工員上緊趕辦務於四十七年冬初完工至下樁處所臣等逐段簽試自來字號至師字號一千餘丈一丈八尺之樁打至二時全行入土而至師字號至率字號即有打至四個時辰方能入土者其自化字號至老鹽倉積字號一千七百丈試樁三處誠如聖諭沙性澀汕難以下樁除相近老鹽倉立字號至積字號二百餘丈不能釘樁處所應仍留柴塘外其餘一千五百丈安樁一丈八尺用硪夯打至四個半時辰打下一丈四五尺周圍沙土即合籠平樁不能再打查樁木不能深入其底沙堅硬可知沙齧樁牢力能擎石或可一律築砌或應仍存其舊恭候聖駕臨幸指示機宜再行多分年限接續辦理至現在擬築石塘離柴塘土創二三四丈酌留坦水地步緣石塘工程全恃塘根堅固保護塘根實賴坦水蓋非此則海潮大溜往來衝激搜刷塘根無論柴石塘工均難保護無虞從前辦理魚鱗石塘或用條石二三層鑲砌坦水或即以竹簍木匱作坦水塘根恃此外護方能經久實為第一善䇿是以議建石塘無論將來用坦水或用竹簍木匱皆須預留地步但現在尚有柴塘為重關保障且工費浩繁勢難同時並舉俟全工告竣後酌地形之髙卑水勢之平險或用坦水或用木匱竹簍因地制宜總期塘根得資擁護其新工未竣以前柴塘仍令照前加意保護俟石塘坦水一併築成即將柴塘嵗修停止聽其自然以節縻費再繞海寧城之魚鱗石塘內有工二十餘丈外係條石作牆內填塊石厯年久逺為潮汐衝激底樁黴朽兼有裂縫蹲矬之處又城東八里文將字號至陳文港密字號止有石塘工七段約共一百五六十丈地當險要塘身單薄石面亦微有裂縫上年欽奉諭旨令於兩處俱改建魚鱗石工俾一律堅穩今此項工程雖稍可緩仍應先為修築完整俟前項工程竣後再行改建魚鱗石塘所有改建石塘各事宜臣等督率在工各員詳悉商酌逐一勘估辦料鳩工次第興修務期妥速集事以仰副聖主宵旰疇咨保衛萬民至意除俟酌定章程條欵再行縷晰具奏外謹將現在勘辦塘工緣由恭摺具奏再臣阿桂前往尖山一帶查勘其尖山至塔山石壩內外自正月下旬以來均有新漲嫩沙而壩外更約寬里許實為轉機嘉兆其章家庵地方欽遵諭旨添築盤頭溜勢亦漸離塘根現在趕釘底樁腰樁鑲柴出水計日可以完工合併陳明奏入上諭曰覽奏俱悉實力妥為以期久安黎庶勉之乾隆四十六年三月初二日阿桂陳輝祖奏言臣等奉命勘辦海塘業將自來字號起至食字號止先建魚鱗石塘二千二百四十丈恭摺奏聞伏思海塘工巨費繁關係重大必須經理得宜始於塘工有益謹將修築事宜酌議數條恭呈睿鑒一管理工程人員宜揀選酌派以専責成也查此次改建魚鱗石塘二千二百四十丈其工程修築做法非熟諳妥幹之員未便輕委海塘本設有東西兩防同知二員責任綦重今辦理大工應請在於現任丞倅等揀選老成幹練者數員分辦各務所有各認段落經手辦理即以兩防廳及委令協辦者定為承辦之員其查收物料稽察工作即以奏留並揀發來浙之丞倅知縣分段𣲖委定為監辦之員至杭嘉湖道盛柱寧紹台道蔣全迪為督辦大員一切集料鳩工稽查𣲖委皆其専責王亶望本係總辦塘工應令常川在工照料督催所有採辦木石儧運物料固臣陳輝祖之専責而工程做法一切俱與王亶望公同籌酌如王亶望各有所見許令具摺陳奏如此逐層分派則事有責成自無推諉觀望等弊一採辦石料宜通盤籌畫以濟巨工也查此次改建石塘應用條石計二十五萬四千八百丈上年原議江省承辦十一萬三千七百五十丈現在已經運到六千餘丈僅供搶險石塘之用應仍照原數採辦轉運查江省原奏太湖廳吳縣開採石料每年約可出石五萬餘丈嗣欽奉諭旨於宜興荆溪等山石性鬆脆者採為裏石之用則每年更可多辦一二萬丈查海塘條石原係奏明浙江江蘇二省分辦現在應行添辦之數仍照原奏在於兩省各半加添趕辦臣陳輝祖已飛咨江省按照丈尺上緊開採迅速儧運但魚鱗塘逐層收分必須厚一尺寬一尺二寸條石方能丁順間砌參差壓縫今江省所辦為數無多自應按照尺寸購辦其不合式者無庸採運至浙省應辦石料原派山隂烏程餘杭德清武康各縣承辦每月約辦塘一百丈應用石一萬一千三百七十五丈分於各該縣名下採辦併飭各該府勒限嚴催其運石船隻查紹屬有船三百六十餘隻由外海濟運每月飭令運石五千餘丈湖屬辦石由內河運工飭令每月可運石三千餘丈加以江省協辦條石每月濟運之數已足敷用一採辦樁木應及時派定以期迅速也查改建魚鱗塘應用排樁木十七萬九千二百根梅花樁十五萬六千八百根原派金衢嚴三府屬十七縣承辦每月約辦塘一百丈應用樁木一萬五千根分於各該縣名下領銀勒限採辦解工亦責成各該府分限催解所有釘樁夫架按每次開槽四百丈應用樁架四百副並飭令各州縣専覔釘樁人夫到工應用再查塘工首重底樁應派佐雜各員分段監看按照樁木圍圓長短尺寸親身量記驗點入槽目覩如式簽釘深實俾寸木必皆入土百密總無一疏以期鞏固一購辦料物宜設法稽查以清弊竇也查各處採辦條石樁木均按料給發足價採辦恐承辦州縣心存不肖及胥役作姦短發價值勒索辦運皆難保其必無應先出示將給發採購裝運各腳價逐一曉諭料物到工時驗收後仍將各該州縣現收及前次所收總細各數再行出示曉諭俾衆共知如有短價勒派情弊準令首告即將承辦之員嚴𠫭從重究治至石料樁木運解到工即令各該縣解役一面報明總理道員一面將所持印票批文自投管收専員處所立即驗放即用該員印信給與回照以免轉輾稽延守候并免胥役留難需索等弊一經辦工程應預定考成以收實效也查改建石塘二千二百四十丈本年應先辦一千二百丈擬分作三次每次開槽四百丈俟此四百丈釘樁已竣一面鋪砌條石即一面另開槽四百丈釘樁挨次蟬聫而下以期迅速其附塘民居板屋土房為數本屬無多須給銀遷移者務令豐裕支食俾資移蓋至簽釘樁木最關緊要安砌丁順條石尤須堅實應飭承辦各員每按五日將每段釘樁若干開具實數清摺申送查考王亶望親駐工所率同杭嘉湖道盛住等就近稽察往來監視臣陳輝祖不時赴工携帶原報清摺前往查驗如有怠忽從事及草率悮工者立即嚴𠫭重處其有實心出力認真辦理之員統俟工完之日酌量奏請升用以示鼓勵一在工各員宜酌量分班以均勞逸也查辦理海塘有原請留浙十五員續請留浙四員又續請揀發十二員共丞倅知縣佐雜三十一員內丞倅知縣共十六員今每一次辦理四百丈每員監辦五十丈只須八員即可敷用但辦理需時自應分班更换應將十六員分為兩班其前一班俟監辦三次一千二百丈完竣之後即豫委署其後一班先令在於省城聽候差遣委署俟前一班辦竣之日即令赴工監辦統俟工竣補缺所有分段巡查亦將佐雜十五員分為兩班前一班分派八員後一班分派七員均照丞倅之例一體輪流更换如有行走懈怠者即行參處以示懲戒以上各條臣等公同悉心籌畫務期周詳妥速早竣要工以仰副皇上為濱海民生永籌捍衛之至意所有籌議辦理章程緣由恭摺具奏奏入上諭曰諸條皆妥依議行乾隆四十六年三月十八日阿桂陳輝祖奏言臣等條議魚鱗石塘酌定章程摺內在工各員分為兩班以均勞逸一條內前班辦工完竣之後即豫委署其後一班先令在於省城聽候差遣委署旁奉硃批獨此條所奏未明所云委署者何事再明白奏來欽此查浙省海塘前後請發丞倅知縣佐雜共三十一員內丞倅佐雜居多此等人員本屬窮苦若令常川在工即不能兼署地方一切薪水資斧未免拮據現在塘工二千二百四十丈分作兩年次第辦理無需多員在工監辦是以臣等原議三十一員分為兩班更换前一班在塘監辦完竣即豫委署後一班留省差委遇相當之缺暫行委署輪值赴工監辦時仍行掣回専辦塘務將員缺另委别員署理統俟大工全行告竣之後再照各員應得缺分陸續請補實缺緣摺內聲敘未明欽奉硃批垂詢恭摺覆奏奏入上諭曰亦祇可如此乾隆四十六年四月二十六日陳輝祖奏言竊照浙省海塘經大學士公阿桂會同臣悉心履勘議從來字號起迤東至食字號止建辦魚鱗石塘二千二百四十丈酌定章程奏蒙聖鑒查工段以四百丈為一限分作五限半趕辦按日計工每限四個月約來嵗冬間可以全工告竣今初限四百丈工程已於三月初五日諏吉開工第一緊要以底樁為最緣塘身穩固全在根盤結實所用前面排樁本係比密築打旁無空隙裏層梅花散樁寸節深打入土之後摏面彼此相間處例須填築碎石并墁灰土俾樁石槽底連成一片庶承重巨工分外得力而安砌塘身及鈎鋦灌漿等項必須熟諳工程之員認真經理朝夕在工亦能事事如法現委杭州東防同知劉鴈題西防同知清泰台州府同知談官誥山隂縣知縣趙思恭於初限四百丈內各承辦一百丈該員等勤諳妥協續後各限工程均可令一手經理石料一項共需丁順條石二十五萬四千八百丈照原奏與江蘇分半採辦浙東山隂會稽二縣出石較旺而由海抵工運道稍難業已分别雇辦船隻可以按數解運浙西德清武康餘杭三縣由內河運工舟行較便而出石不多就原定採取丈尺均能如數交工其應用船隻分别設法雇辦亦可輪轉無誤江蘇太湖等處條石源源起運相續不絶計兩省到工石料合每月應用之數俱無虞短絀樁木一項共需三十三萬餘根分派本省金衢嚴三府屬承辦依江傍河各就附近購運現俱如限解送足敷工用又仰蒙我皇上恩施優渥格外賞給商捐銀二十萬兩俾得工用價腳充裕寬展臣已飭司道核明木石匠工轉運各項加添銀數臚列曉示既杜胥役人等暗中侵隱之弊亦令趨事赴工之衆共知恩賚所加感激奮興是以邇來工所夫匠不招自集採購木石等處無不欣欣鼓舞乘此春和日永踴躍將事儧工亦速即如工所樁夫現足木架四百餘副之用各夫齊力簽打雖遇沙土澀滯每副日有三根若易打之處尚可增多察看近日工料情形漸有端緒原可畫一按照辦理惟是興建大工自當循序漸進固不容過於求速致啓草率之漸然就人力易施之際相機設法似又可乘時量為加緊如第一限初次開槽四百丈打樁完足一面鋪砌條石即一面將二限四百丈接續開槽趂此人夫櫛比打樁其餘各限亦挨次加工庶打樁砌石各無間斷本不求速而自收迅速之效惟到工石料即加緊轉運不比樁木之可以加倍採購一限供兩限之用臣與王亶望及在工道廳通盤籌議按塘身自底面至結頂用條石十六層及十八層不等酌令將運工條石於已經打樁各段落一律牽勻攤砌底面四五層俟續後運到石料再按層加砌結頂一層先後通融互相濟用則石料不煩另籌而施工可免停待况塘工地土卑濕開槽打樁已後皆係泥水存積得此蟬聨接辦先砌底下數層並可免深槽積水之虞實皆與要工有益臣蒙皇上天恩畀委重任惟有竭盡駑鈍不時往來工所親加督察務令實料實工在在堅密整齊以保永逺鞏固仰副聖主捍衛濱海民生之至意所有塘工現辦情形理合恭摺奏聞再章家庵地方添築盤頭以挑大溜現逢春汛臣令工員加緊保護務期挑分溜勢合併陳明奏入上諭曰諸凡用心妥協知道了又諭曰此法甚善自當如此欽定南巡盛典卷六十一
