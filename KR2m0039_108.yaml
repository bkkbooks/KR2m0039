  text: 欽定四庫全書欽定南巡盛典卷七十五籲俊
  hash: sha256:3060c7b0a62eaa0a7aa6e2cd31abe2435b4600be5d3ead3c2d7f38686daf0e1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_108-1a, image: WYG0659/WYG0659-0215a.png}
body:
  text: 乾隆十六年二月二十七日大學士公傅恒等奏言該臣等㑹議得江浙兩省進獻詩賦之生監人等作何分别考試之處竊惟江浙為人文所萃重以聖朝作養久道化成士風日盛兹值翠華臨莅更荷特沛温綸増廣學校取額異數優渥無有倫比其進獻詩文賦頌自出於歡忭感激不能自已之至情今復䝉諭㫖考試甄録仰見遴選真才敦尚實學之至意伏查江南省自入境以後江蘇各屬進士舉人生監人等陸續進呈詩文業經學政臣莊有恭遵㫖詳閲前後兩次開列名单奏聞共二十九名並䝉御覽賞給縀疋之翁照陸遵書陸授詩等俱應令其與考伊等現已各回原籍應令學政莊有恭行文所屬指名調赴江寜省城恭侯駕至江寜之日定期考試再㨿安徽學政臣䨇慶稱安徽各屬所有進獻詩賦之生監等俱在江寜恭侯迎鑾亦應俟駕至江寜之日令該學政分别去取其入選者與江蘇獻詩人等俱在江寜一體考試至現在浙江省所有士子進獻詩文應交學臣雷鋐随接随看分别去取彚齊開列名单進呈所有應考士子即令在杭州省城静侯考試應於駕至杭州江寜臣等㑹同酌擬日期奏聞請㫖並特派監試大臣侍衛䕶軍人等監視稽查届期該學政等恭請欽命試題收卷進呈其考試地方預備士子本日飯食茶水等項交各該督撫辦理務令嚴肅整齊以仰副我皇上優渥隆恩有加無已之至意恭候命下遵行奏入報聞乾隆四十五年三月二十三日兩江總督薩載江蘇學政劉墉安徽學政戴第元奏言竊臣等接江西撫臣郝碩學臣汪永錫咨開欽惟乾隆四十五年恭逢聖駕南巡江西貢監生員等素深愛戴之忱共切就瞻之願内有于朝幹等三十三名情願前赴江南恭迎鑾輅進獻詩賦伏查乾隆四十一年聖駕巡幸天津恩許外籍諸生一體進獻詩賦今江西士子請随江左諸生拜舞迎鑾恭進南巡詩賦并請附入鍾山書院恭候召試等因移咨前來臣等查歴届聖駕南巡江西士子未遂覲光之願兹來南迎鑾獻賦益徴聖主壽考作人之雅化應否准其與江南士子一體考試之處臣等未敢擅便謹恭摺具奏奏入報聞乾隆四十九年三月十七日閩浙總督富勒渾奏言恭照鑾輅時巡士林歡慶除浙省進獻詩賦各生經浙江學臣竇光鼐考試具奏外所有閩省進士生監鄭光䇿等九名瞻雲就日愛戴同殷籲請赴浙迎鑾獻冊先准前任福建學臣朱珪考試列冊咨送嗣據該生等來浙適值布政使徐嗣曽奏准迎鑾抵杭查開各生履歴申送經臣㑹同竇光鼐復行扄試文理尚俱明順合無仰懇聖慈俯准與浙省諸生一體考試之處出自皇上天恩理合恭摺奏聞另繕名单敬呈御覽謹奏奉㫖准其考試乾隆十六年南巡召試浙江諸生欽命題目賦得披沙揀金得真字五言八韻明通公溥論無逸圖賦欽命閲卷大臣恊辦大學士吏部尚書臣梁詩正兵部右侍郎臣汪由敦欽取一等人名謝墉陳鴻寳王又曽南巡召試江南諸生欽命題目蠶月條桑賦賦得指侫草得忠字五言八韻理學真偽論欽命閲卷大臣大學士總督江南南河河道兵部尚書臣髙斌兵部右侍郎臣汪由敦刑部左侍郎臣錢陳羣欽取一等人名蔣雍植錢大昕呉烺禇寅亮呉志鴻孫夢逵乾隆二十二年南巡召試浙江諸生欽命題目黄屋非堯心賦明通公溥論賦得蠶月條桑得留字五言八韻欽命閲卷大臣大學士臣蔣溥工部尚書臣秦蕙田戸部左侍郎臣劉綸欽取一等人名童鳳三陳文組顧震錢受榖南巡召試江南諸生欽命題目精理亦道心賦經義制事異同論賦得鴻漸于陸得時字五言八韻欽命閲卷大臣協辦大學士吏部尚書臣梁詩正兵部尚書兩江總督臣尹繼善都察院左副都御史臣竇光鼐欽取一等人名王昶曹仁虎韋謙恒呉省欽褚廷璋呉寛徐曰璉乾隆二十七年南巡召試浙江諸生欽命題目賦得春兩如膏得逄字五言八韻和闐玉賦以分寳輯瑞西旅底貢為韻海塘得失䇿欽派閲卷大臣大學士臣劉統勲兵部尚書臣劉綸戸部右侍郎臣于敏中欽取一等人名孫士毅汪孟鋗沈初王鑾南巡召試江南諸生欽命題目賦得江漢朝宗得宗字五言八韻觀回人繩伎賦耗羡有無利弊䇿欽命閲卷大臣兵部尚書兩江總督臣尹繼善兵部尚書臣劉綸户部右侍郎臣于敏中欽取一等人名程晉芳趙文喆呉泰來陸錫熊郭元漋嚴長明徐歩雲錢襄乾隆三十年南巡召試浙江諸生欽命題目菜花賦誠無為㡬善惡論賦得春蠶作繭得同字五言八韻欽命閲卷大臣户部尚書臣于敏中兵部右侍郎臣蔣檙禮部左侍郎臣䨇慶内閣學士兼禮部侍郎臣全魁欽取一等人名張培呉壽昌陸費墀馮應榴南巡召試江南諸生欽命題目賦得稼穡為寳得夫字五言八韻玉壺氷賦聖人定之以中正仁義而主静論欽命閲卷大臣御前大臣大學士仍理兩江總督事務臣尹繼善協辦大學士刑部尚書暫留江蘇巡撫臣莊有恭户部尚書臣于敏中户部左侍郎兼管順天府府尹事臣錢汝誠内閣學士兼禮部侍郎安徽學政臣全魁欽取一等人名鮑之鍾金榜秦潮鄭澐張熙純周發春呉楷洪樸陳希哲蔣寛劉種之乾隆四十五年南巡召試浙江諸生欽命題目集賢院山池賦木之神不二論賦得春風扇㣲和得巡字五言八韻欽命閲卷大臣協辦大學士吏部尚書臣嵇璜吏部右侍郎江蘇學政臣劉墉禮部右侍郎臣逹椿欽取一等人名馬履泰沈颺李彤沈叔埏南巡召試江南諸生欽命題目養老乞言賦先天學心法也論賦得日華川上動得暉字五言八韻欽命閲卷大臣協辦大學士吏部尚書臣嵇璜户部尚書臣梁國治户部左侍郎臣董誥户部右侍郎江蘇學政臣彭元瑞内閣學士兼禮部侍郎臣嵩貴欽取一等人名呂光復洪梧趙懐玉汪履基楊揆董教增朱文翰盛惇大言朝標金廷訢江漣蔣知讓以下江西省裘元復乾隆四十九年南巡召試浙江諸生欽命題目禮義為器賦暑變物性寒變物情論賦得南坍北漲得心字五言八韻欽命閲卷大臣文淵閣大學士臣嵇璜户部尚書臣和珅内閣學士兼禮部侍郎臣尹壯圖内閣學士兼禮部侍郎臣朱珪欽取一等人名張師誠費錫章何金姚祖同南巡召試江南諸生欽命題目士伸知已賦以君子和而不同為韻謹權衡論賦得至人心鏡得無字五言八韻欽命閲卷大臣協辦大學士户部尚書臣梁國治户部尚書臣和珅户部左侍郎臣董誥内閣學士兼禮部侍郎臣朱珪翰林院侍讀學士臣阿肅欽取一等人名劉召揚以下江蘇省鄭宗洛莊選辰黄文輝汪彦博司馬亶葉銓孫一元繆炳泰莊復旦程振甲張曽獻鮑勲茂金應錡朱承寵譚光祥以下江西省呉本欽定南巡盛典卷七十五
