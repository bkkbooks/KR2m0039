body:
  text: 河防乾隆四十二年正月初八日兩江總督髙晉河道總督薩載奏言竊照外河清口黃河北岸陶莊迤上前經臣等奏請開挖引河一道使黃水繞北下注相距清口較逺清水益得暢出行至周家莊而後㑹黃東注以期二瀆并流合力攻沙仰蒙皇上聖明逺照叠頒諭㫖訓示周詳令將引河挑挖寬深河頭展寬向上當經臣等欽遵辦理查引河估長一千零六十丈河頭估寬四十丈深一丈河身估寬三十五丈深一丈二尺五寸河尾估寬三十丈深一丈五尺分委裏河外河二㕔山陽清河二縣四股承挑臣等於九月十一日恭摺奏蒙聖鑒隨督飭工員領銀雇工上緊挑挖自開工以來仰賴聖主洪福天氣晴和人夫雲集工員亦各踴躍奮勉于十二月十二日儧挑完工僅留兩頭土壩其河身界埂間有不平之處復令消除净盡收拾妥協并於引河中心抽挖溝槽數處以備開放時跌塘掣溜一律完竣兹臣等於十七日上自河頭下至河尾逐細查丈面底寬深均照原估如式並無偷减情弊至該處引河臣等原定挑竣後將新河兩頭土壩即行開放近因連次得雪天氣寒冷黃河內間假凍結氷凌層疊凝積較往年為甚臣等察看情形並與道將等公同商酌現在河靣既經氷凍新挑引河若遽行開放恐氷底水流微弱難資冲刷日內即使天氣和暖氷凍甫解河內又值淌凌亦恐壅塞且時屆五九嚴寒雨雪無定設或旋融旋凍一經阻滯更恐有淤墊之虞臣等再四思維該處工程攸關緊要河雖挑成未便輕開本年節氣較早應俟交春後天暖氷融臣等㑹同相度機宜乘勢放水妥協料理另行奏聞務期全河大溜盡歸引河趨北暢注以仰副聖懷臣髙晉商定一切因安撫臣閔鶚元進京陛見即從清口暫回省城兼署巡撫印務臣薩載現往各屬查勘來春應修土掃工程及年內到工料物合併陳明奏入上諭曰甚是已有㫖了乾隆四十二年正月二十八日兩江總督髙晉河道總督薩載奏言竊臣等接准乾隆四十一年十二月二十八日廷寄欽奉上諭據髙晉奏開挖陶莊引河完竣驗看工程如式因時屆嚴寒黃河凍結氷凌恐水底水流微弱難資冲刷請俟交春後天暖氷融再行放水等語所奏甚是陶莊開挑引河於全河極有關係開壩時必須乘勢引放俾大溜直趨暢注方為有㿽自當俟春融後趂桃汛相機妥協為之至引河為河工要務並須選用吉日著傳諭髙晉薩載等即預行擇吉先期迅速奏聞再行辦理又髙晉另摺奏稱現因閔鶚元進京陛見暫署安徽撫篆俟閔鶚元回任後接兼河篆俾薩載即行赴京等語現在開放引河為總河専責必須在工督視不便遽行離工且薩載此時並無亟須陛見請示之事著傳諭薩載於引河放溜後細視新河上下是否循流順軌俟大局全定即行奏聞一靣將總河印務交髙晉暫行兼署起程來京將此由三百里傳諭知之欽此臣等跪讀之下仰見聖主垂念要工於唘放機宜訓示周詳中心欽服莫可名言伏思陶莊引河放關全河機要上年挑挖時原擬於工完之日斟酌放溜後因臘月內天氣嚴寒氷凌凍結更兼底水較小臣等察看情形未便驟開是以㑹摺奏明暫緩唘放今春以來河內氷凌漸缺融解苐春水未生溜勢綿緩誠如聖諭當俟春融後趂桃汛相機妥協為之庶乘勢引放俾大溜直趨暢注方為有益而開放之期必須選用吉日以冀循流順軌兆慶安瀾臣等復查每年花以泛水總在二月間發生今嵗立春既早則水長似應較早但遲速究未敢預必臣等遵㫖預行諏吉彼此札商選擇正月二十五日二月初六初十十五等日均係吉日臣髙晉於開篆後即馳河工㑹同籌度總視水勢光景在於所選日期內相機開放以期成功仰慰聖懷臣薩載於放水後悉心審視俟新河上下暢流循軌大局全行即行奏聞一靣將總河印務交臣髙晉暫行兼署進京陛見奏入報聞乾隆四十二年二月三十日兩江總督髙晉河道總督薩載奏言外河清口黃河北岸陶莊一帶上年臣等奏請開挑引河一道以期清黃並流免到到灌仰邀俞允並蒙皇上智炳幾先訓示周詳令將引河挑挖寬深河頭展寬向上當經臣等欽遵辦理於臘月十二日儧挑完竣時因天寒氷凍未便輕開奏明緩俟交春後天暖氷融再行放水復奉諭㫖陶莊引河於全河極有關係開壩時必須乘勢引放俾大溜直趨暢注方為有㿽並須選用吉日著迅速奏聞等因欽此又經臣等預擇吉期恭摺奏覆奉到硃批好知道了欽此入春後河水未長之前臣等察看情形舊河內原估北岸之兜水壩南岸之挑水壩固為得力但河不兩行必須籌計萬全庶可成功迅速臣等復加商酌測量該處河靣計寬一百零四丈除兩岸原估挑水兜水壩工計長七十七丈其餘河面僅有二十七丈與其留此河泓旁泄不若一律估築使水無分注則全河溜勢自必盡歸新河雖所用工料較原估加增銀八千餘兩而一勞永逸於要工更為有裨隨飭工員確估照辦酌留口門十餘丈以俟水長開放引河時再為全行堵閉自二月初旬以來黃水漸次長發外河志樁加長三尺餘寸水力旺盛開放引河正合機宜臣等即照選定二月十五吉期先將引河上下土壩趕緊起除爭盡次將引河頭挑通開放過水仰賴聖主洪福河神默佑新河內大溜暢注衡刷寬深形勢甚順從此清黃分流直至周家莊滙歸東注清口可免倒灌之患其舊河內酌留未築之壩工並即分頭儧堵旬日內亦可告竣臣髙晉於拜摺後即由工次星馳北上臣薩載駐工督辦并遵前奉諭㫖在於新河上下隨時察看壩工完竣新河大局已定另行奏聞即兼程進京奏入報聞乾隆四十二年三月初七日河道總督薩載奏言外河清口陶莊挑挖新河一道於二月十五日乘勢開放大溜暢注情形及舊河內酌留未築壩工臣駐工儧堵緣由業經㑹摺奏聞旬日以來臣住宿清口將舊河壩工督率道將㕔營趕緊接築兹于二月二十四日一律儧堵完竣舊河內即經斷流閉氣並於壩外廂做邉掃一道以為外護可免水長搜刷之患兩日來上水壩根漸次停淤下水業已澄清甚為穩固其新河上下臣欽遵前奉諭㫖息心細視查新河迤上大溜自玉皇閣掃工尾循流而下趨入新河由周家莊一帶直達中泓並未傍趨偏注形勢頗為暢順至新河內􅘇勢湍急迅疾奔騰仰賴聖主洪福兩崖又加刷塌前挑河頭原寬四十丈今陸續塌去三十餘丈現寬七十餘丈河身河尾原寬三十五丈及三十丈不等今續續塌去二十餘丈現寬五六十丈探量河底水深一丈四五尺兩崖尚髙出水靣二三尺較原估刷深六七尺往後水力日盛溜勢日緊河身日加冲刷即可與舊河一律寬深其善後事宜臣與道將等往來察看新河之南即係陶莊積工離河六七十丈應將積土翻築堤工一道從新壩根起直至河尾以防漫灘之勢新河之北舊有縷越堤工縷堤近在河崖應聽其自行塌去使河身舒展越堤離河一百四五十丈至二百餘丈不等應加髙培厚並於下尾接長以越作縷俾資欄禦新河頭下唇溜勢旋轉著力應俟灘土塌定廂柴裹護以順其勢新河河尾目下正在塌崖將來刷寬刷深新堤尾有應行裹護之處隨時相機另為酌辦再清口舊有木龍七架內五六七三架在新壩之下淤入土中應將各龍木植刨挖折起以為將來改扎木龍之用至頭二三架正對新河挑溜有力第四架已在新河口下應移在二龍迤上扎做則挑溜護灘更有禆㿽以上工程臣前與大學士督臣髙晉靣加商酌意見相同現即督令逐細估計核實𣲖員分投儧辦另行造冊具題外所有陶莊新河上下循流順軌大局全定及舊河壩工築竣穩固情形謹由驛奏報上慰聖懷並繪圖貼說恭呈御覽再臣前經奏明俟新河定局壩工辦竣即行進京今接髙晉來信於途中欽奉諭㫖前往安徽查辦事件臣現將一切善後工程督率料理約計儹辦停妥髙晉亦可事竣來工臣欽遵前㫖將河道總督關防委員迎賫髙晉暫署即兼程進京合併陳明奏入上諭曰諸凡妥協嘉慰覽之乾隆四十二年三月初十日河道總督薩載奏言竊臣於二月二十八日酉刻接准乾隆四十二年二月二十四日廷寄欽奉上諭據髙晉奏㑹同薩載開放陶莊引河業于二月十八日將開放暢順引河功成情形専差㑹摺奏報等語陶莊開放引河為全河此時辦理關鍵朕心時切懸念髙晉等既經開放暢順自應由驛馳奏以慰厪懷乃僅差人賫摺此時尚未到京何以不權事體輕重若此至引河既經開放則舊口自應嚴密堵禦或將木龍相度移置或竟度地堅築掃工俾引河永逺暢流以資鞏固髙晉等接奉此㫖務須盡心籌畫相度機宜妥協商辦一靣𣲖熟練之員詳加指示令其在工料理薩載進京陛見髙晉前赴安徽查辦琨玉之案完竣後地方事務緊要仍遵前㫖不必來京可將此由四百里傳諭髙晉並薩載知之仍將㑹同籌辦情形詳悉覆奏欽此臣跪讀之下惶悚靡寧伏念陶莊新河甚關緊要時厪宸衷臣與大學士督臣髙晉㑹同開放之後理應將暢順情形由驛奏報上慰聖懷乃差人賫進實屬不知輕重茫昧糊塗之至查該處舊河兩岸估築挑水兜水壩工時髙晉與臣㑹同察看并與道將等復加籌酌河不兩行與其尚留舊口旁泄不若一律堵閉使水無分注更屬有裨因即上緊儧築留口門寬一十餘丈於新河開放後臣即督令星夜儧辦于二十四日堵閉斷流臣復上下審視全河大溜盡趨新河業將循流順軌大局全定及籌辦善後事宜於二十八日巳刻由驛奏䝉聖鑒今欽奉諭㫖引河既經開放則舊口自應嚴密堵禦俾引河永逺暢流以資鞏固仰見睿謨廣運智炳幾先於千里外之情形早蒙聖明洞燭訓示周詳臣與在工道將等無不心悅誠服所有善後工程業已辦有端緒臣現在派委河庫道李奉翰淮揚道松齡副將徐建功參將李永吉等督率㕔營上緊儧辦可無遲誤至總河關防原奉諭㫖交髙晉暫署今髙晉正在安徽查辦事件距工稍逺因即交與河庫道李奉翰暫行護理俟髙晉事竣來工即行轉送接署除扎㑹督臣髙晉外臣即于二十九日自清江浦起身兼程北上奏入報聞乾隆四十二年三月十二日河道總督薩載奏言竊臣於二月三十日桃源途次准兵部火票遞到本月十八日臣與大學士督臣髙晉㑹奏陶莊引河開放成功一摺奉御批何不具一圖來餘有㫖諭欽此摺內與其留此河泓旁泄不若一律估築使水無分注句上奉硃批甚是欽此又於河神默祐新河內大溜暢注句上奉硃批以手加額覽之此處不應立廟以酬神貺乎欽此又㑹奏勘辦通湖引河情形一摺奉硃批陶莊改流則無倒漾之患此皆其餘事但當謹防舊河口為要又老黃壩更要緊慎之欽此並接准乾隆四十二年二月二十六日廷寄欽奉上諭據髙晉等奏報陶莊引河開放成功大溜暢注情形一摺覽奏深為欣慰已於摺內批示並明降諭㫖將薩載交部議叙矣陶莊開挑引河為治黃一大關鍵今開放之後新河內大溜暢注衝刷寬深形勢甚順從此清黃分流直至周家莊滙歸東注清口可免倒灌之虞實為一勞永逸非神默祐不能成此巨功自應於該處立廟以酬神貺又另摺內所稱通湖引河勘辦情形此皆其餘事惟當謹防舊河口最為關係重大又老黃壩工程尤關緊要更宜悉心詳慎防護以期永逺鞏固至摺內稱原估挑水壩工計長七十七丈其餘河靣僅有二十七丈與其留此河泓旁泄不若一律估築使水無分注則全河溜勢自必盡歸新河雖所用工料加增銀八千餘兩於要工更為有裨等語所奏甚合機宜自應如此辦理其舊河內未築壩工據稱旬日內可儧堵告竣現在曾否已經堵築畢工並著上緊妥辦至現在河身挑寬若干及河流暢注之處自應繪畫全圖貼說注明以便省覽何以伊等見未及此著傳諭髙晉薩載速即詳晰繪圖貼說並將工所立廟及老黃壩工程如何防護之處迅速據實覆奏將此由四百里諭令知之欽此仰見聖主慎重壩工諄諄訓誡并報功崇祀以酬神貺至意伏查舊河口壩工堵築斷流之後臣恐水長搜刷又經添做邉掃以為外護甚為穩固其老黃壩工誠如訓諭尤關緊要臣前此往來查勘新河北岸舊有縷越堤工應行分别加倍髙厚陶莊積土之外亦應添築新堤以防外灘漫水其南岸木龍後御樁亭一帶老堤直至新口舊西壩止均屬髙厚外灘甚寬現在髙出水面四五尺不等並有木龍挑護東首河灘今春舊河口築壩時臣相度形勢即於灘上斜築攔水堤一道長一百四十丈接連舊河口壩頭俾資攔禦以上善後各工先經臣與督臣髙晉靣加商定𣲖員分投儧辦隨於二月二十八日繪圖貼說同新河刷塌寬深情形繕摺由驛奏蒙聖鑒兹欽奉諭㫖訓示臣現又扎飭道將㕔營將堤壩工程悉心加意防護並將現辦堤工上緊儧築完竣務期一律鞏固以仰副聖懷至建廟地基擬在新河頭舊河口適中地方建立該處現在接築新堤應俟築竣容臣與髙晉再加相度遵㫖建立奏入上諭曰覽汝不日即面㑹一切再細講乾隆四十二年三月十三日河道總督薩載奏言竊臣於本月初三日行至山東郯城縣十里鋪地方接准乾隆四十二年二月三十日廷寄欽奉上諭據髙晉接奉諭㫖由驛覆奏陶莊引河開放情形并住滁州確查琨玉有無虧空各緣由一摺均於摺內批示矣此次開放新河并堵築舊河為全河一大關鍵自應繪圖貼說方能瞭如指掌何以髙晉等總不具圖呈覽實屬疏忽至摺內所稱河無兩行原擬估做挑水兜水壩與其留此河靣任其分流不若一律估築堵閉所奏甚是正與朕前降諭㫖相合但所稱僅存上口七丈下口五丈薩載現在住工督辦旬日內亦可完竣等語此時曾否竣工向來河工習氣如上口七丈雖經堵閉其下口五丈內必尚留罅隙使餘水仍得走泄以為日後做工冒銷地步著傳諭髙晉薩載等於堵閉時務須悉心講求設法籌築厚實堅固無使㸃滴不漏方保無虞不可輕信河員飾詞完局仍一靣詳晰繪圖貼說具奏俟薩載辦竣後來京時再為按圖指示善後保固各事宜將此由四百里傳諭知之欽此臣跪讀之下惶恐無地伏念陶莊引河上勤睿慮二月十五日開放之後理應繪圖貼說進呈御覽乃竟見未及此以致重厪天心實屬疏忽之至查舊河清黃界壩計寬九丈二月十八日大學士督臣髙晉自工起身時原存上口七丈下口五丈口門既窄水勢愈緊臣因堵築合龍若稍留罅隙除水仍得走泄關係非細當經悉心講求日夜住工督率道將㕔營慎重辦理接剩口門三丈兩邉復進掃箇層層廂壓到底仰賴聖主洪福于二十四日平安合龍其時口門下水離壩三四丈外間有翻花黃水臣又督令實力追壓上加厚土旋即閉氣并恐水長搜刷復加做邉掃以為外護臣上下察看壩外水已澄清壩內用竿試探業經停淤甚為穩固可保無虞當於二十八日繪圖貼說由驛奏蒙聖鑒臣初任河工事事務求實際况堵築舊河實為全局一大關鍵斷不敢輕信人言草率完局上負聖恩今臣遵㫖進京陛見一切善後保固事宜更得跪聆聖訓有所遵循感戴鴻慈㿽無涯矣奏入報聞乾隆四十二年四月二十八日兩江總督髙晉河道總督薩載奏言竊臣薩載于三月十六日陛見時靣奉諭㫖清河界壩上首應加築壩工一道以為重門保障其頭架木龍之上應添扎木龍一架命將御筆圈㸃記出原圖帶回㑹勘奏辦兹臣薩載于四月初六日馳回清口臣髙晉先自安徽來至公所隨即遵㫖㑹同察勘上下審度查陶莊新河功成之後一月以來日見寬深現在河頭已寬有九十餘丈河身河尾寬有五六十丈至七十餘丈不等水深一丈八九尺至二丈五六尺形勢暢順其舊河內清黃界壩邉掃外沙停淤淺處從前水深三丈四丈者今則量水深二丈一二尺及一丈三四尺不等現在壩工甚為穩固但將來伏秋大汛水勢加長盛如聖訓應加築壩工一道以為重門保障更可放心臣等遵照御筆㸃示在於新河頭下唇起至第三架木龍迤上止斜建壩工一道長一百三十丈頂寬五丈若將該壩全用柴料築做需費較多臣等復加酌議臨黃一靣廂做掃工靠裏用土填築即使伏秋大汛黃水長發亦堪抵禦並于南首壩頭起至老堤止河灘寬一百三十丈一律接築土堤以防水漫庶資攔禦核計土方工料共需銀一萬八千餘兩其南岸頭架木龍迤上御筆圈示之處再添木龍一架臣等詳細㑹勘於桃溜護灘情形實有裨㿽查第三架舊木龍迤上現在遵㫖添築壩工該架木龍係在壩工之內應行起拆移於頭龍迤上扎做至五六七三架淤入土內舊木龍業將木植斥起存俟新河兩崖塌定再為相度情形請㫖建扎所有清黃界壩上首加築壩工一道及頭龍迤上添扎木龍一架臣等現已督令上緊集夫備料即于四月初十日興工迅速儹辦務於迅前完竣以期上慰聖懷謹另繪新圖同御筆圈㸃原圖一併恭呈御覽至前奏善後各工內新河南岸堤工一道業經辦竣新河北岸加培接長之堤亦已辦有八分工程新河頭下唇接做壩臺廂柴裹護假落現亦次第儹辦再臣薩載前奉諭㫖查明從前兩次挑挖陶莊引河寬深丈尺及因何未成原委容臣詳查案卷另行具奏至應建河神廟宇現飭酌擬估計再行繪圖進呈恭侯欽定合併聲明奏入上諭曰諸几皆妥知道了謹按大河自南行入淮後清黃交㑹之地關鍵最為緊要蓋迤南則逼近清口倒灌堪虞迤北則清水暢流刷沙有力自前明嘉靖之初三義口就淤而可㿽南徙我朝康熙年間聖祖仁皇帝洞燭幾先親臨閲視詔司河諸臣開陶莊引渠而以逼近舊河分流勢緩逮我皇上睿謨廣運指授機宜于積土之北挑挖新渠並按圖垂示酌定河頭直迎大溜河臣等始行禀承智略迅速奏功且於舊口則嚴密堵塞不使分流於新河則添築堤工以資保障而凡增木龍切灘靣展寬河身填實壩腹諸務無不睿算周詳勘酌盡善是以雙流循軌交齊有成漕運往來安如枕席為億萬載無疆之利㿽要皆本聖心之誠敬以為貫通感格者矣欽定南巡盛典卷四十五
