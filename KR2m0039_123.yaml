body:
  text: 奏議乾隆十五年十一月十二日鴻臚寺奏言查定例凡遇皇上行幸沿途地方文武官員百里內接送明嵗皇上南巡所有沿途地方文武官員幾十里以內接送之處謹奏請旨奏入上諭曰著在三十里以內接送乾隆十五年十一月十三日總理行營事務和碩莊親王允祿等奏言恭照明春皇上南巡江浙所有應行預備事宜令臣等定議具奏伏查皇上駕幸五臺嵩山等處曽經奏準𣲖侍衛三班前鋒護軍一千名其各處官員兵丁各就本處差使酌量派往所需官馬由京全數散給其大營尖營道路橋梁一應預備事宜交與地方官照例預備隨往之官員兵丁等所需米糧柴草等項令地方官聚集商賈公平交易明春翠華南邁遵聖祖時巡之典慰臣民望幸之心問俗省方行慶施惠一切事宜仍循舊例但江浙二省自聖祖仁皇帝巡幸以來厯今已數十年未邀萬乘寵臨至現在辦差及扈從官員人等俱未躬逢盛典凡一應預備事宜若不議定章程恐致臨時有悮臣等公同酌議三吳兩浙帶水縈紆非平原陸路可比皇上聖駕南巡羽衛固宜嚴肅若隨從官兵太多則舳艫相接縴挽不易必宜量為酌減方可遄行無滯除扈從文武大臣等應行中途留住及隨往江浙已蒙欽派此次自京起程時侍衛仍派三班其所派三班統於六班中揀選足額至兵丁應派八旗六百名健鋭營四百名共一千名但此次隨往兵丁中途應行減派其江浙一路又俱乘船行走健鋭兵久不操練恐致生疏應請停其派撥所有兵丁統於八旗內遴派前往其各處官員兵丁執事人等仍照例交各該處視其差使之繁簡酌量揀派至江南登舟時除差使緊要必應全行隨往外其各處官員人等一槩量為酌減但取差使無悮而衙門執事足敷承應餘俱令其留住其前鋒護軍等兵減派五百名合之江寧迎駕兵二百名共有七百名亦足備水營差使之用其章京視兵丁之數擬派四十員以資管轄虎鎗侍衛兵丁一百三十七員名內揀選四十員名以供虎鎗差使其餘侍衛入於三班侍衛數內兵丁入於前鋒護軍五百名數內一體揀派其備帶銀兩縀匹等項交與户部內務府其奏備帶上船後祗須酌量敷用隨營載往所有應騎官馬人等按照應給馬匹數目仍於京中全數給發俱先支與兩箇月路費途間約計日期再行找給至江浙路程往返􅢖有五千七百餘里而由京至江南登船旱路不過一千四五百里且馬匹俱應留住喂養儘足歇息毋庸再行更換隨駕大臣官員應領明年春季俸銀俱于今冬十二月內先行支放以便料理行裝至屆時皇太后皇上旱路劄營所需大城蒙古包帳房等項俱照今秋河南之例帶往二分工部應備黃城樁橛等項亦令照例帶往所用駝隻及茶膳房等處應需駝隻車輛交與各該處照例預備皇上至徐家渡過河至直𨽻厰地方留駐旱營一日閲視髙堰堤工所用大城蒙古包帳房等項應先期運往劄營等候至皇上登舟後照臣等減定之數帶往隨行之大臣官員等駝隻馬匹等項亦俱不必過河令與留駐之官兵一體留駐仍著總管大臣哈逹哈等加意管束並酌量於黃河迤北寬曠處所或分作二處或合住一處安靜守候毋許稍有滋擾至皇上回鑾時總管大臣率領留住官兵於就近地方恭迎聖駕其留住官兵之馬匹自行拴養外隨往江浙人等所領官馬或交與留駐之人托其代喂或伊等各留家人照管聽其自便官用駝隻交與山東巡撫分給附近各州縣及緑旗官辨等喂養俟皇上回鑾時先期趕赴等候總管大臣會同兵部照數散給其回京所用車輛前經臣等議奏奉旨派出侍郎蔣炳前往會同該地方官經理雇備自可無悮再查徐家渡至直𨽻厰閲視堤工自小五臺至揚州平山堂髙旻寺等處由錢家港至江寧府由蘇州至靈巖鄧尉虎邱等處由杭州至西湖由紹興至禹陵南鎮等處俱係旱路應需馬匹除預備皇上所乘御馬用船載往一切必應隨帶官物交與該督撫等預派人夫擡運隨從人等所需馬匹康熙年間皆取用於地方每大臣一員給馬五匹章京侍衛官員等每員給馬三匹護軍緊要執事人等每人給馬二匹其餘人等每二人給馬三匹現在江南浙江二省駐防官兵所拴官馬共九千八百餘匹緑營六千八百餘匹驛馬三千九百餘匹除驛馬應酌留一半以供驛遞差使外合計共有一萬八千七百餘匹此次隨往江浙大臣三十三員章京侍衛官員等六百一十一員拜唐阿兵丁等二千五百五十九名合計需馬六千六百九十餘匹除自錢家港至江寧自杭州至西湖自紹興至禹陵等處所需馬匹均應全數散給其由徐家渡至直𨽻厰旱營由小五臺至揚州平山堂髙旻寺由蘇州至靈巖鄧尉虎邱等處非係緊要差使必須隨往者俱可留於舟次不必全行此三處所需馬匹俱應減備十分之四約計備馬四千匹即可敷用應交與江浙督撫及京口杭州將軍等于旱路應散馬匹之處照數預備在就近地方散給每馬十匹之外仍多備一匹以便臨時添用其散給馬匹時交與領侍衛內大臣兵部會同分派至上船交馬後該地方文武官即將馬匹由陸路趕至前途通融預備或分作二起輪流更替應付交與該督撫酌量辦理其官員兵丁人等隨身行裝等物有應用人夫擡運者俱令地方官聚集民夫聽其自行雇用再查總督黃廷桂等奏請聖駕南巡隨從人等需用船隻數目應備若干并何項人員於御舟前後何處行走之處請分别定議預行知會遵照備辦等因一摺奉硃批總理行營王大臣等議奏欽此臣等公同酌議此次隨往江浙官兵人等雖經大加酌減若所用船隻稍令寬裕猶恐擁擠難行擬將派出之一品大臣三員二三品大臣九員及御前大臣領侍衛內大臣等四員御前乾清門行走大臣十二員鑾儀衛武備院堂官四員或每員給船二隻或給船一隻均按其品級分别給與其侍衛官員等或每二三人給船一隻或每四五人給船一隻拜唐阿兵丁人等或每八九人給船一隻或每十數人給船一隻皆酌量其差使之緩急行檔之分合船隻之大小分别勻派除裝載物件之便民船二十五隻外統計共需沙飛馬溜船四百四十一隻即可敷用仍令其船十隻之外多備一隻以便臨時添補之用現在該省或有預備多餘船隻俱即令其各覔生理不必守候屆期仍請特派大臣二三員前往會同兵部及地方官經理其事先期各給印票按照派定船數一一散給如有不遵定數擅行搶奪者即行恭處至所派船隻頭號者居多或有不敷準其大小酌量抵算通融乘座其各項船隻行走先後次序御前大臣領侍衛內大臣軍機大臣御前侍衛皆係皇上親近侍從之臣其船隻應在御舟之前上駟院侍衛官員人等皆有伺候馬匹差使其船隻應與裝載御馬船隻一併在前行走批本奏事軍機處侍衛處內閣兵部官員等皆係承辦緊要事件之員亦應令其在前行走其餘大臣侍衛官員等船皆照舊例在後行走若有承辦事件必應在前行走之處俱令臨時自行奏請再管理御舟及稽查各項人等船隻應需専管之人俟臨時奏請於隨從之大臣內派出一二員協同護軍統領等専司管理凡各項船隻行走及停泊之時各按派定次序毋令擁擠再查皇上由江南舟行至浙江應用縴夫已經遵旨傳諭江南河道總督及江浙督撫令於河兵內撥用該督等自應遵照辦理臣等毋庸另議至皇上駐蹕行宫隨從官兵除應行該班值宿外其餘官員人等如離水次在十里以內者俱令仍回各船住宿若離水次甚逺令地方官於附近寺院歇店及民間原有之空間房屋酌備數處以便住宿不許占住民房以致滋擾冉隨從官兵所需米糧柴草等項俱交與直𨽻山東督撫於駐蹕之處廣聚商人貿易不許在京客販隨營賤買貴賣并令提督衙門及該地方官嚴行查拿至登舟之後所需物件若往各村市購買未免往返阻滯應交與江浙督撫等派地方官招集商販於行營左近公平售賣至於黑豆一項前據尚書蔣溥所奏經臣等議令山東巡撫酌量採買運送沂州一帶以免價值昻貴至江浙地方需用無幾或有應行撥濟之處令咨明東撫撥運業經奏準現據準泰奏稱酌買黑豆三萬石運貯沂州一帶以供東省支糶再買二萬石運貯臺莊水次以備接濟江浙聽其委員領運其留養馬匹並酌買麩草髙糧以備支糶奉硃批總理行營王大臣等議奏欽此查該撫所奏酌買黑豆運貯沂州等處分别支糶接濟之處與臣等原議相符應如所奏辦理其留養馬匹所需麩草髙糧亦應如所奏令其酌量數目預期購買運至官兵留住處所以備支糶統於事竣歸還原欵所有經過地方大營尖營及舟行水營并道路橋梁一切應行預備之處俱著直𨽻山東浙江各督撫照例辦理又臣等伏查從前原議皇上至順河集登舟由水路至徐家渡過河是以臣等於議覆蔣溥蔣炳等條奏豆石車輛摺內俱即照此定議今該督黃廷桂又奏請將順河集迤南三站縴路改為御路由旱道至徐家渡過河雖據稱商之兆惠等亦以為然但是否果屬妥協應俟兆惠等回京之日奏明請旨遵行如有應行改換事宜臣等再行定議奏入報聞乾隆十五年十一月十五日閩浙總督喀爾吉善署浙江巡撫永貴奏言本年十月十八日接準部咨欽奉上諭朕明春巡幸江浙所過道路橋梁該地方官現在以次預備應遣嚮導大臣覆加查看著兆惠努三就近自開封府馳驛前往并傳諭該督撫等一切供頓料理務從簡朴毋得徒尚紛華以致糜費欽此臣等遵即自省前往交界會同嚮道大臣查看於十一月二十九日嚮道大臣兆惠努三抵浙界臣等迎赴前途跪請聖安後兆惠謹將面奉諭旨備細宣示臣等一一跪聆訖兆惠努三復將沿途道路橋梁各項俱應聽從民便不必過於開廣經由街市止須打掃潔淨不可動民房寸椽片瓦告知臣等臣等即會同兆惠努三聨銜出示宣布省事便民之聖心咸使知曉隨順道查看於初一日抵省遍閲各處行宫景亭并西湖御舫即渡江閲看紹郡道路暨行盤御舟事宜畢旋省即于初八日起程回京復命臣等恭查浙省自蒙聖恩俯順輿情翠華臨幸臣民無不踴躍急公願效子來之義臣等凛遵聖訓凡有應行修建工程與應預備什物事事委員動支公項撙節辦理即如省城各項工匠因部定日給工價實不敷匠夫日食曽經奏明照民間之例增給仰邀睿鑒俞允浙江實無科斂民財以致糜費情事至於一應工程浙省現任各員與閩省調來各員領銀承辦各員皆志切急公倍求堅固整飭自願捐資加工承辦者有之臣等因其出於奉公敬事之誠加以奬勵俾抒誠悃其沿塗修做道路營盤有必須藉用民力之處鄉民皆荷鋤舉鍤踴躍赴工臣等尚令地方官各給與飯食之資不令枵腹從事此皆浙省辦理之實在情形也至浙省預備修整之道路營盤綵牌綵亭等項臣等因杭嘉二郡遍地桑麻惟恐有礙民業道路止就舊有縴道平治並未開闢寬廣其看定營盤處所有用民地修築者量其所獲花利按畝償給俾免失業沿途綵牌綵亭等項屢據士民呈請欲效巷舞衢歌之意臣等恐過於糜費但令就城市總滙處所間或搭蓋業經附摺奏聞惟是輿情難以槩行禁遏致伊等踴躍忭舞之忱無由上逹臣等惟當剴切曉諭士民切勿過於華麗繁多以仰副我皇上崇儉斥奢之至意再杭城內外兩處行宫前經臣永貴在京陛見面奉諭旨與大學士忠勇公臣傅恆會商繪定圖式恭呈聖覽遵即回浙與臣喀爾吉善遵照會辦雖現在一切規模制度悉照原圖而房間門户以及進深寬濶丈尺不無因地制宜稍為變通處所現已將次告竣所有臣等欽遵聖訓并浙省實在情形謹繕摺具奏仰慰睿懷奏入上諭曰覽奏俱悉一切辦理妥協乾隆十五年十一月二十四日鑾儀衛奏言恭照明春皇上南巡經總理行管王大臣議奏內稱御前大臣領侍衛內大臣軍機大臣御前侍衛乾清門侍衛皆係御前隨皇上親近侍從之臣其船隻應在御舟之前上駟院侍衛官員人等皆有伺候馬匹差使其船隻應與裝載御馬船隻一併在前行走及批本奏事處軍機處侍衛處內閣兵部官員等俱係承辦緊要事件之人亦應令其在前行走如有承辦事件必應在前行走之處俱令各該處臨時自行奏請查臣衙門隨從轎輿係預備皇上內廷并下船上岸之用所有儀仗必須臣在前排設於早晚仍行奏樂更鐘每在御營內預備務須在前行走始可無悮如令在後行走船隻甚多擁擠一處不能無悮伏乞將臣衙門隨從轎輿儀仗樂器更鐘等項并執事人等船隻亦與上駟院官員等一例在前行走奏入報聞乾隆十五年十二月十一日允祿等奏言總督黃廷桂奏預備南巡馬匹縴手一摺奉硃批管理行營王大臣議奏欽此據稱明嵗南巡一切扈從官員人等所需騎坐馬匹今於江寧鎮江兩處駐防旗兵拴養馬匹並督撫提鎮標營額馬內共酌調二千餘匹以之分布預偹至沿途臺站業經兵部派出司員自宿遷縣起至蘇州平望勘定正腰各站共三十七處約設馬二千一二百匹現在咨部酌定俟部覆至日於上下兩江州縣驛馬內抽調足用以備傳遞本摺文報之需又應用船隻亦經預為雇備俟定有數目行知到日即於年底新正飭令齊抵直𨽻厰迤南水次庶便臨時散給至縴手人等除河兵恭備御舟需用外其扈從人等應用縴手將通省不辦差州縣之民壯鹽快通融調用其不敷者再於沿途州縣雇備民夫恭查明春皇上南巡所有應行隨往江浙之大臣官員兵丁人等需用船隻馬匹業經臣等酌定應需數目于本年十二月十三日具奏奉旨依議欽此當即行文該督撫等遵照預備其縴手一項亦屬水路必須皇上御舟縴手已遵旨傳諭該督撫等於河兵內撥用此外沙飛馬溜船隻雖本船原有水手人等以供縴挽但御舟遄行迅速隨從各船若不酌添縴手難免遲悮今該督奏稱將通省不辦差之州縣民壯鹽快通融調用其不敷者於沿途雇備民夫辦理已屬妥協但在御舟之前行走各船自應多添縴手俾其前行無滯其在御舟之後行走各隻僅須酌添數人即可於一日之內挨次陸續抵泊不必多為預備應令該督酌量分别妥辦以省雇偹之繁至於沿途安設臺站以備遞送本報等項事𨽻兵部既據勘定正腰各站咨部酌定應聽該部照例辦理奏入報聞乾隆十五年十二月十二日兵部侍郎兼管順天府府尹蔣炳奏言竊照明春恭遇聖駕南巡所有回鑾時需用車輛臣欽奉諭旨前往順河集會同江南山東督撫董率地方官備辦臣當將兩省作何分派料理咨商兹準兩江督臣黃廷桂山東撫臣準泰覆稱兩省應各分派一半至所需車價或由江南山東給發或由內務府給發臣伏查回鑾時所需車價約銀萬餘兩今車輛既在兩省備辦似應即由該督給發照例報銷再查兩省辦車臣應先期到彼預行料理擬即隨駕前往合並奏明奏入上諭曰知道了蔣炳不必隨往俟應去之時冉酌量前去乾隆十五年十二月十三日兩江總督黃廷桂奏言竊查明春扈從官兵所需各項食物其程站如在陸路者自應於大營附近一里外設立買賣街以便就近買用惟水路行走兩旁均係河堤縴道之外即係水田溝塍交錯舉步維艱别無隙地堪設貿易之所若於五六里或七八里之外勉強擇地設立而官兵船隻必待停泊之後始行登岸覔買時已傍晚不特往返遙逺有悮食用且恐昏暮歸船難以識認將有終夜尋覔而不得者轉屬未便臣與司道等再三籌計如米麵柴炭原可隨船載裝不妨多貯查沿途如清江浦揚州鎮江蘇州均有駐蹕日期且此四處相隔不過四五站及二三站不等一切隨從官兵人等應請于此四處將米麵柴炭量其足用上岸購買一次即可為數日之需至葷素蔬菜等類難以久貯必須每日買用者查南省水路城市相接村鎮毗連凡經過之處均有鋪户出賣應聽官兵隨地購買無虞缺乏臨時臣再大張告示曉諭兵民各按本處市價公平交易不許髙擡價值抑勒強買仍揀派文武官辨所在稽查彈壓以杜爭端所有水路難設買賣街緣由謹繕摺奏聞恭俟命下臣咨會總理行營處冉行一體遵照奏入上諭曰諸凡皆妥欣悅覽之乾隆十五年十二月十八日喀爾吉善等奏言竊照辛未年春恭逢翠華南幸所有沿途驛站最為緊要前經臣等詢商直𨽻山東江南等省及飭行總理司道等分别查勘彚奏謹查南北情形不同道路逺近各異自須因地制宜變通籌辦自江省交界至杭州城內行宫計程二百七十里分設杉青閘石門鎮塘棲鎮杭城正站四處王江涇石門鎮安樂橋拱宸橋腰站四處每處相離二十餘里至三四十里不等若照直𨽻山東等省正站設馬百匹腰站設馬五十匹未免過多今按康熙年間舊例正站各設馬七十匹腰站各設馬三十匹共設快船四十隻又自杭城渡江由蕭山江干至紹興府城麓湖村大營計程一百里分設轉塘村麓湖村正站二處江干板橋腰站二處每處相離不過二三十里其路較近為時亦暫擬照杭嘉一帶再為酌減正站各設馬四十匹腰站各設馬二十匹共設快船二十隻惟浙江站馬有限通省不過百匹祗敷本處差遣之用是以貼站馬共五百二十匹悉調營馬派值其餘一切乘騎備差之馬尚多亦均于滿漢各營撥用所有沿途一切棚厰槽棧以及草料遞夫等項久經預為安頓貯備不致臨期缺乏除安設營站事宜已委溫處道張九鈞樂清協副將王臣會同部員勘明報部外所有臣等辦定驛站并調撥營馬及選用塘兵民壯緣由理合繕摺具奏奏入報聞乾隆十五年十二月二十二日江蘇巡撫王師奏言恭照辛未年春聖駕南巡一切預備事宜經鹽臣吉慶會同督臣黃廷桂具摺奏明道路橋梁馬頭營尖茶棚等項例應報部者動藩庫錢糧由撫臣稽核報銷行宫名勝及附近上山道路并鋪墊陳設等項不報部者動支運庫商捐銀兩由鹽臣稽核登簿奏聞奉硃批好知道了欽此續準工部咨令將道路營尖馬頭橋座供應器具什物船隻縴夫飭令預備將現在作何辦理之處先行報部俟差竣日核實造册報銷當即轉行遵照妥辦兹據布政使永寧等詳稱道路橋梁河道馬頭營尖茶棚教場製辦縴夫水手衣帽等項及屯駐馬騾地方并設買賣街應備麥豆等物添雇騾頭船隻扛縴等夫均係應動司庫錢糧備辦但欵項繁多必須隨時隨事酌核辦理難以預定銀數應請仿照直𨽻山東辦過成例隨時動辦事竣核實報銷再查司庫耗羡存公銀兩不敷支給請於司庫雜稅及驛站餘剩等銀內暫行動用俟事竣核明應銷者報部請銷應賣還原價者照數歸欵如此辦理庶免稽悮經臣與督臣一面如詳確核妥辦一面分案咨明户工二部今準户部咨覆雜稅耗羡等銀例應奏明動用相應遵照部文具奏伏祈皇上睿鑒飭部查照俟事竣時臣等核實報銷冉查金山行宫對渡之錢家港係康熙年間御舟停泊之所今年久淤墊應加挑濬深通以便停泊臣等檄行司道詳加勘估約需銀二千餘兩現在興工挑濬俟工竣一併確核報銷奏入上諭部知之乾隆十五年十二月二十三日允祿等奏言黃廷桂奏請酌減馬匹一摺奉硃批總理行營王大臣速議具奏欽此又喀爾吉善等奏籌辦馬匹緣由一摺奉硃批原議大臣速議具奏欽此據黃廷桂奏接準廷議應備馬匹數目臣隨於通省滿漢標營內均勻抽調照數預備派員管領又因浙省止有馬五千匹不敷應用臣酌備馬二千餘匹屆期趕赴浙省協濟但查此次應用正餘馬匹為數衆多沿途並無平原空曠及寬展村鎮可以安頓此數千馬匹之地以便飼餵者且揚州蘇州人稠地狹若安置四千餘匹馬擁擠喧囂阻滯道路殊多未便似應請將無緊要差使之官員兵丁並跟隨人等所需騎馬再為酌減再查由焦山過江至象山起旱至甘露寺等處回至駐蹕之處需用馬匹似應照揚州之例一體備辦又此次經嚮導大臣勘定沿途如淮安寶應髙郵丹徒丹陽常州無錫等處車駕進城巡幸隨從官員所需騎馬因廷議在先勘定在後未經議定統請一併定數以便遵照於前項馬內輪流預備又據喀爾吉善等奏稱由杭州至西湖由紹興至禹陵南鎮蘭亭名勝等處各陸路原止備皇上逰幸所經御道近不過二三里至十餘里惟雲棲一處最逺亦僅二十餘里原非按站行走之旱道更鮮空曠地場可以屯扎數千馬匹且馬多道窄恐致擁擠喧雜臣等因南方城市馬匹馱載什物難以行走已預備人夫擬將御用什物敬謹扛擡下至官兵行李亦用人夫搬運所需騎乘馬匹臣等擬于杭紹調集通省營馬五千匹以供乘用查臣等原議應行預備事宜以隨從人等所需馬匹康熙年間皆取用於地方每大臣一員給馬五匹章京侍衛官員等每員給馬三匹護軍緊要執事人等每人給馬二匹其餘人等每二人給馬三匹現在江浙二省駐防官兵所拴官馬共九千八百餘匹緑營六千八百餘匹驛馬三千九百餘匹除驛馬應酌留一半以供驛遞差使外合計共有一萬八千七百餘匹此次隨往江浙大臣三十二員章京侍衛官員等六百一十一員拜唐阿兵丁等二千五百五十九名合計需馬六千六百九十餘匹除自錢塘港至江寧自杭州至西湖自紹興至禹陵等處所需馬匹均應全數散給其由徐家渡至直𨽻厰旱營由小五臺至揚州平山髙旻寺由蘇州至靈巖等處非係緊要差使必應隨往者俱可留於舟次不必全行此三處所需馬匹俱應減備十分之四約計備馬四千匹即可敷用應交與江浙督撫等於旱路應備馬匹之處照數預備在就近地方散給每馬十匹之外仍多備一匹以便臨時添用其散給馬匹交與領侍衛內大臣兵部會同分派至上船交馬後該地方官即將馬匹由陸路趕至前途通融預備或分作兩起輪流應付該督撫酌量辦理業經奏準行文知照今黃廷桂既於通省滿漢標營內均勻抽調照數預備派員管領臨期自可無悮至所稱江南無平原空曠及寬展村鎮可以飼餵數千馬匹及揚州蘇州人稠地狹若安置四千餘匹馬擁擠喧囂殊多未便應請再為酌減之處臣等恭查皇上此次巡幸江浙上船之後水程居多若遇舍舟遵陸之地聖駕既由陸路至行營駐蹕隨從官兵若非必應隨行者已在酌減並留住之列所有大臣官員兵丁人等均有應辦差使或應先往伺候或應隨侍行走若不給與馬匹仍令乘船前往實屬緩不及事徒步追隨更恐貽悮是以臣等酌量數目分别定議於鎮江至江寧及杭州紹興等處均令全給其餘各減去十分之四不過僅取無悮差使並無多令預備之處今黃廷桂既已遵照所定馬匹數目如數預備獨因地方狹窄奏請酌減臣等查照康熙年間舊例合之現在隨從人數似不便遽行議減以致臨時周章但黃廷桂既為此奏亦必實有難于照數預備情節臣等再三斟酌應將原議每馬十匹之外多備一匹之處準其量為減省其餘應需馬匹令其隨處儘數預備如遇地方實在狹隘不能多備者或臨時將非緊要差使之大臣官員應需馬匹每員酌減一二匹兵丁人等亦各分别減給仍照原議派領侍衛內大臣會同地方官均勻分派如此通融辦理庶差使不致有悮而地方官員亦無掣肘之虞矣其由焦山過江至象山等處及續經嚮導大臣勘定所過各州縣車駕進城巡幸所有隨從大臣官兵人等需用馬匹現在定議一二百匹已可敷用又喀爾吉善等所奏於杭紹二處預備馬五千匹之處查現據黃廷桂備馬二千匹趕赴浙省協濟是該省馬匹亦可如數預備但江浙二省情形略同今江省既準臨時酌減浙省自應照例一體辦理俾得從容應付至所需馬匹僅供騎乘並無議及馱載若一切隨帶官物原議令該省督撫預備人夫擡運已經行知其喀爾吉善等所奏預備人夫以備扛擡之處毋庸再議俟命下之日臣等行文黃廷桂喀爾吉善等遵照可也奏入報可欽定南巡盛典卷九十
