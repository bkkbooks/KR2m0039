body:
  text: 海塘乾隆四十六年閏五月二十一日陳輝祖奏言竊照海塘改建魚鱗石工二千二百四十丈所有起工興築日期及各屬解運木石料物足敷應用各緣由業經臣楊魁於抵工後㑹同臣陳輝祖履看恭摺奏聞兹查塘工初限開槽四百丈安設樁架四百副計排樁梅花樁共六萬根用樁夫五千餘名臣楊魁駐工督率承辦監工各員往來催䟎夫役人等莫不踴躍赴工奮力硪打每日釘樁總有一千限以外自三月初五日起工初限四百丈之樁木現在俱已一律簽釘齊全臣陳輝祖不時到工同臣楊魁悉心察看探驗樁底悉皆沙齧堅牢並無浮鬆之處一面將丁順條石逐層鋪砌自二三層至六七層不等其灌漿開縫扣搭鐵鋦務令鈎抿周密盡合工程做法一面於四月初六七等日飭將二限四百丈多集人夫開槽清底安設樁架如前上緊釘樁不致稍有怠玩至木石二料最關緊要前經臣陳輝祖節次飛飭承辦樁木之金華蘭溪等十七縣承辦條石之山隂㑹稽等六縣依限解運到工應用臣等恐各屬仍有觀望延挨不能照數解工之事當飭布政司國棟㑹同杭嘉湖道盛柱寧紹台道蔣全迪議定規條嚴立限期如有逾限短運挪移規避等情即行揭報嚴參不敢心存姑縱臣陳輝祖又思山隂縣之羊山宕産石較旺可以加採因令該道蔣全迪前往該處踏勘酌量添辦條石二萬五千餘丈並即添雇船隻趕運以足砌用江省所辦條石亦據蘇撫臣閔鶚元陸續採辦委員解浙現俱源源而來石質亦堅緻可用是木石二項均屬有盈無絀並無貽悮臣楊魁親厯工所梭織稽查臣陳輝祖亦常川赴工商確催辦務期妥速集事仰慰皇上宵旰殷懷所有塘工初限四段底樁釘完現在砌石及二限四段開樁釘樁各情形理合恭摺㑹奏奏入報聞乾隆四十六年閏五月初六日阿桂奏言本月二十七日接奉上諭本年二月間據阿桂奏勘辦石塘工程二千二百餘丈務於四十七年冬初完工至老鹽倉一帶樁木不能深入其底沙堅硬可知沙齧樁牢力能擎石或可一律築砌或應仍循其舊恭候臨幸指示機宜再行接續辦理等語昨詢據富勒渾面奏老鹽倉一帶仍有可以施工之說即阿桂所奏沙齧樁牢力能擎石或可一律砌築之語是其所見亦似謂此段工程可以辦理朕思現辦二千餘丈之石塘既於明嵗可以完工且屆四十九年南巡之期尚逺此段要工既有益於民生即可及時接辦現在阿桂督𠞰逆回到京尚需時日著傳諭阿桂即將老鹽倉一帶實在情形詳悉具奏欽此查老鹽倉一帶相傳以為難建石塘者俱稱該處沙性澀汕一樁甫下始多扞格繼復動搖不能成立難以下樁砌石臣在工時逐假簽試除相近老鹽倉立字號至積字號二百餘丈釘樁止入八九尺外其餘一千五百丈安樁一丈八尺用硪夯打至四個半時辰打下一丈四五尺周圍沙土即合壟平樁不能再打臣思此段工程如果活土浮沙自難下樁砌石今樁木打至一丈四五尺不能深入其底沙堅硬可知沙齧樁牢力能擎石即可一律築砌况樁深一丈四五尺亦不能懸髙於水面而外有坦水層層擁護更無虞潮汐往來搜刷塘根但工費浩繁勢難同時並舉是以奏請恭候聖駕臨幸指示機宜再行分年接辦兹奉諭㫖垂詢以現辦二千餘丈之石塘既於明嵗可以完工且屆四十九年南巡之期尚逺此假要工既有益於民生即可及時接辦如果有工費浩繁不能拘定開銷成例之處亦不妨據實奏明欽此仰見我皇上厪念民生不惜多費帑金為濱海閭閻永籌捍衛久長至計臣查此一千五百丈一假工程可以辦理臣在工時陳輝祖所見亦同至添用幫費現辦二千二百餘丈塘工䝉恩賞銀二十萬兩外尚有另籌添補若接辦一千五百丈較前雖少七百餘丈但釘樁較難則所需幫費亦約略相等從前因興築無期尚未核算查陳輝祖辦理海塘已屆半年於該處情形較前自必熟悉所有原算二千二百餘丈之幫費或另有樽節妥辦之法亦未可定楊魁以欽差大臣駐工督辦尤應諳習一切事宜相應敕下楊魁㑹同陳輝祖將此工程應否接辦共應開銷正項若干幫費若干之處熟商妥酌定議奏聞恭候聖明訓示再行遵辦所有接奉諭㫖緣由謹恭摺具奏奏入報聞乾隆四十六年七月初三日陳輝祖奏言欽奉上諭前經降㫖令富綱來京陛見並諭楊魁即赴福建署理巡撫事務但計此時楊魁尚未起身著仍留海塘工次候朕另有簡用之處楊魁既仍留浙江工次富綱此時亦不必來京如楊魁富綱已遵前㫖起程接此㫖後即遵照各回本處並諭令陳輝祖知之欽此又欽奉上諭浙省老鹽倉一帶塘工如何接辦並應如何開銷正項及幫費之處俟楊魁回至工所後再與陳輝祖妥議熟商具奏所有阿桂奏到之摺著先抄寄陳輝祖楊魁同看等因到臣查海塘興建巨工乃我皇上厪念濱海民生永資保衛為萬年經久之計今自來字號迤東至食字號工程二千二百餘丈已分限趕辦而老鹽倉以下工程一千五百丈前因土性澀汕簽樁不能與來字等號各樁深入且工長費大難以同時並舉是以先就現工集料齊夫悉力經理凡關工務臣俱逐細與楊魁籌酌計核不敢稍有稽延玩忽兹奉諭㫖於現辦工程完竣後再行次第籌辦令臣與楊魁妥辦熟商具奏查楊魁前奉上諭暫行署理福建巡撫已於閏五月初二日起程當經具摺奏聞在案兹奉㫖仍令各回本處計期此時楊魁將次抵任富綱尚未起程臣現飛咨楊魁富綱遵照將來楊魁回浙自速工程情形離浙未久伊已熟悉臣即將老鹽倉工程並應如何開銷正項及幫費之處另行㑹同詳細查議奏請聖訓外所有奉到諭㫖緣由謹恭摺具奏奏入報聞乾隆四十六年七月十九日陳輝祖奏言臣等前於閏五月二十一日接奉諭㫖前以浙江老鹽倉一帶塘工是否可以及時接辦降㫖詢問阿桂兹據覆奏此假工程一千五百丈可以接續辦理前在工時陳輝祖所見亦同至添用幫費現辦二千二百餘丈塘工除恩賞銀外尚有另籌添補之項若接辦一千五百丈釘樁較難所需幫費亦約略相等請敕下楊魁㑹同陳輝祖將此假工程共應開銷正項若干幫費若干之處熟商妥酌等語浙省辦理石塘二千二百餘丈計明嵗冬間始可蕆工其老鹽倉一帶塘工若一律築砌自應俟現辦工程完竣後再行次第籌辦昨經降㫖令楊魁赴閩省暫置撫篆換令富綱來京陛見所有老鹽倉工程如何接辦並應如何開銷正項及幫費之處俟楊魁回至工所後再與陳輝祖妥議熟籌具奏亦不為遲所有阿桂奏到之摺著先抄寄陳輝祖楊魁同看並諭令阿桂知之欽此臣等查老鹽倉一帶塘工自場字號至因字號共長一千七百丈西接現辦鱗塘之食字號東連老石塘之積字號相傳該處沙性澀汕難以下樁春間臣阿桂臣陳輝祖在工時曽經打樁試探其中一千五百丈下樁一丈四五尺沙齧樁牢俱可改建石塘業經奏䝉聖鑒在案其相近老鹽倉之立字號至因字號二百丈沙性更覺澀汕是以臣阿桂臣陳輝祖亦以為不能釘樁臣楊魁駐工三月餘與陳輝祖悉心體察並令工員再加簽試一丈八尺之樁儘力硪打竟可打下一丈二三尺不復搖動力能擎石惟每副樁架尚須添用樁夫以期併力速下是老鹽倉迤東一千七百丈之柴工皆可改建石塘已有明驗因思場字號至名字號一千五百丈改築鱗塘而獨立字號至因字號二百丈之柴工恐潮汐往來冲激究不抵石塘之足資捍禦臣等再四熟籌不如將一千七百丈一律改建石塘為一勞永逸之計兹欽遵諭㫖親往該處履勘率領在工各員逐假試驗簽樁一面即飭總局司道詳議規條核實估計去後旋據該司道禀稱現辦鱗塘二千二百四十丈應用銀九十一萬零今續辦之一千七百丈估需工料銀七十九萬八千八百餘兩較前僅少銀十一萬四千餘兩緣老鹽倉以下各假釘樁較難且通工一切夫工口食實有難於節省之處兼之木石料物等項需用繁多在在均須增益實係確核估計並無浮虛臣等查老鹽倉改建工程需銀七十九萬八千餘兩除正項開銷二十八萬五千餘兩外臣等伏讀聖諭此假要工既有益於民生即可及時接辦如果有工費浩繁不能拘定成例開銷之處亦不妨據實奏明欽此仰見我皇上厪念民依不惜多費帑金為瀕海生民永籌樂利之至意合無仰懇聖恩於正項之外再賞給二十萬兩在浙江省本年奉㫖賞給地方公用項下動支報銷其餘不敷銀三十餘萬兩臣陳輝祖另籌欵項以濟工需應請照臣陳輝祖㑹同大學士公阿桂具奏現辦塘工貼費一體毋庸造冊報銷仍隨時奏聞並嚴飭承辦各員加意稽查務使料實工堅實用實銷以杜浮冒情弊此次工程費用浩大勢難同時並舉應俟現辦之二千二百丈之工全行完竣再行奏聞擇吉興工趕緊接辦庶免顧此失彼之虞再需用條石十九萬三千三百餘丈應請與江蘇各半分辦照例解價咨明採鑿濟運至本省應辦之石仍照舊飭令湖州紹興二屬有宕各縣分别派辦其樁木一項需用二十五萬五千根仍專令浙東金衢嚴三府屬採辦除臣陳輝祖先期知㑹江蘇撫臣及扎飭浙省各屬一體預為籌辦外所有臣等㑹議老鹽倉續辦塘工事宜各緣由謹據實覆奏再尖山塔山之間舊有石壩應欽遵乾隆二十七年上諭如沙漲漸逺即改築條石壩工俾屹然成砥柱之勢等因欽此現因塘外漲沙消長靡定容臣陳輝祖察看於可辦時即請㫖一律建築魚鱗石塘以永資鞏固合並陳明奏入報聞乾隆四十六年九月十八日陳輝祖奏言竊照海塘改建魚麟石工初限砌石及二限開槽釘樁各情形經臣於五月二十日㑹同楊魁恭摺具奏聞在案兹查初限四百丈砌至五月二十五日已有八層二限四百丈釘樁於五月二十四日完竣至六月初七日已砌石六層三限四百丈即於五月二十五日起安設樁架四百餘副齊力簽打至六月初十日完竣七月初五日已砌石四層四限四百丈於六月十一日起至二十六日止已釘樁四萬三千一百餘根查每限四百丈釘樁六萬根初二三限及四限工假通計釘過樁木二十二萬三千一百餘根砌過條石五萬九千三百七十餘丈樁俱寸節入土沙齧深牢石俱周密鈎抿層層結實六月下旬天氣炎暑多有感冒暑邪時值農工正忙難以多集人夫嗣又因槽內風潮潑湧俱有蓄水須車戽涸出方可簽樁不得不暫時停工以示體恤今自七月以來日漸凉爽已于十六日開工所有四限第四假釘樁指日即可完竣現令匠作先將五限開槽以便蟬聨接辦伏查原定章程自底面至結頂用條石十六層及十八層不等經臣先行奏明在案今逐假量驗通工只須砌石十七層已與搶修石塘齊平屹如山立似可測準一律辦理惟六月初旬雨澤稀少河道淺涸始則減裝剝運繼則日漸難行江南石料及夲省湖州府屬各縣運石船隻俱由大麻港滙入施賀兩壩交卸而壩內河底首尾髙于外河並無來源水平即通遇旱便涸其中淺阻難以轉運者自壩抵工計程十六里僅止一尺內外之水七月以來雖間日得雨已有七次內二十四五兩日大雨連綿不絶田水滿足不虞缺乏而大河之水長不盈尺以致貫注未能深通其紹興府屬各縣石船由海由江至工者出羊大二山自小河運至長山壩宋家漊盤壩交缷內河亦未通流此二處運到石塊隨路堆積水口候運查核情形現需尅日深通不能坐待遲悮且更防冬令水涸臣當飭仁邑將施賀兩壩以外之十六里逐段探量分派十州縣勒限十日一律挖深三尺需用夫工銀兩先為籌辦給發毋庸動支俟河道計日挑通即行多雇船隻挽運各處石料到工接續趕砌至現在各山宕匠仍令逐日採取不得短少一面查明在工運存石料先為按層鋪砌不敢稍有怠忽至承辦樁木之金華蘭溪等十七縣承辦條石之山隂㑹稽等六縣逐日按假查核比較尚無短少倘有遲悮立即嚴參不敢稍有寬縱臣常赴工所稽查務期迅速蕆事以仰副我皇上懷保小民鞏固萬年之至意所有塘工初二三限砌石層數及四限釘樁將竣先將五限開槽各情形恭摺奏聞再六月十八九兩日風潮狂猛石工之外一帶柴塘間假低矬并東塘石工尖山石壩俱裂縫蹲矬潑卸之處誠如聖諭亟宜趕集料物加緊鑲築搶護以期迅速完固臣於查勘風潮情形時因需料甚多即飭藩司國棟海防道盛住估計購運交工隨到隨辦一面飭令迅速督催運工接辦其石塘裂縫蹲矬并石壩潑卸處所同時集料星夜趕緊補修務令完固結實尅期完竣合並陳明奏入上諭曰好勉為之乾隆四十六年十一月初六日陳輝祖奏言竊照現辦鱗塘二千二百四十丈每限四百丈分作五限半辦理令布政使㑹同杭嘉湖寧紹台二道督率在工各員協令妥議趕辦並隨帶南河營員田宏謨留工委用經臣㑹同大學士阿桂恭摺奏明在案今初限已砌石八層二三兩限均砌六層四限亦砌石五層所有五限半工程併入五限辦理工長六百四十丈一律開槽截至本月十五日止已釘樁四萬有餘按日按工計算十月底可以釘完即應及時鋪砌條石以免泥沙灌浸其初二三四等限亦須通共按程加砌計來年春夏之交即可趕緊完竣而續估之老鹽倉迤東各工現已議定規條來年亦可蟬聫接辦臣于海塘工程本不諳練惟恪遵聖明訓示兢協凛承一載以來所有轉輸木石其材質之美惡料物之短長收放之遲速督率杭嘉湖道盛住隨時查察設法調劑至一切工作自開槽打樁以迄砌石灌漿層次鱗接鈎連其間巡察稍疏即虞工程草率偷減道員有董率督察之責必得親身經厯方能稽查周察庶無誤卯該道盛住開工及今㑹同藩司國棟諸事悉心商禀勇往奮勉洵稱能事惟是海防事務本繁所轄東西兩塘柴石各工嵗有修防既須料理而鱗塘原估工程先後勻砌頭緒紛繁工作備舉且段落綿長一日之內該道不能周遭閲厯必得加派道員按照章程分司其事是以臣於寧紹台道出缺時奏懇聖恩簡放熟諳人員協辦仰䝉皇上特用印憲曽來浙自可與盛住相濟協籌商辦工務但計該道抵任後即應接手查原辦鱗塘並接築老鹽倉一帶工段甚長往來查催仍恐未能首尾兼顧似應再為添員分辦則集事儹工自歸迅速查有糧道周克開才具幹練臣於前署兩江總督時見其辦事勤明與之議論工程亦心有成竹該道糧儲本任事亦不繁若派令一體辦理塘工即可將明嵗接續之老鹽倉分辦印憲曽到時再為酌量派用如此則責成専而耳目較密又可共相資助而臣亦得收指臂之效除將新舊工假勻派檄飭該道遵遵照辦理外合將𣲖委緣由恭摺奏聞再查樁木一項原派金衢嚴三府屬領銀購買尅期交竣但各屬逺近不一且均有地方公事誠恐有顧此失彼之虞查有候補同知方體泰雖尚未得缺而在工效力已及一年臣派令工所總查收放木石諸務甚為奮勉兹將續辦老鹽倉工假樁木委令方體泰専辦買運交工該員頗知工程緊要自不虞其遲緩至留辦鹽塘之江南逰擊田宏謨於一切料物工程亦尚熟悉方體泰遇有稽查各項事件令其協同田宏謨酌詢查辦倘有遲悮立即揭參不敢稍有寬容合並陳明奏入上諭部知之
