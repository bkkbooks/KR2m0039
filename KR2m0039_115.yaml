body:
  text: 欽定四庫全書欽定南巡盛典卷八十二名勝乾隆十四年七月十五日大學士公傅恆等奏言臣等遵旨會同浙江巡撫臣永貴議得聖駕南巡浙省所有杭州織造衙門行宫舊在衙署東西兩旁其西首殿內供奉聖祖仁皇帝神牌伏思神牌在織造署前已屬未協而臣子署中供奉神牌尤非敬謹之意今議將織造移駐於裁存鹽政衙署就現存宫殿房屋量加修葺于宫後建樓供奉神牌將來皇上駐蹕亦便行禮其中房屋或年久傾圯或規模卑小並地方卑濕木料不無剝蝕俱應量為添換購辦至城外西湖地方行宫經前撫臣李衛奏明改作佛寺世宗憲皇帝御題名曰聖因舊制房屋四所地盤甚寬現亦供奉聖祖神牌但在西偏甚非體制應請敬謹移供從前舊寢宫其西首房屋並迤西一帶地基及寺後山圍酌量劃出另建行宫就現在房屋並可用木料量為增添購辦以上行宫二處其舊有宫殿房屋及臣等現在商酌派改之處謹繪圖呈覽俟欽定後令該督撫等敬謹遵照從儉辦理至于海塘自翁家埠至尖山離城一百五十里由杭城前往止有塘路一條塘外皆係漲沙窪地塘內皆係村舍桑園難以相度駐蹕之處中小亹更在禪機河莊兩山之間北岸既沙嫩泥濘南岸道路亦窄狹紆曲查海塘引河從前康熙年間聖祖均未巡幸現今江海安瀾隄工鞏固引河水歸故道此次皇上南巡臣等愚見似毋庸親臨閲視惟查候潮門外舊有觀海樓一座從前聖祖南巡曽經臨幸該處既可觀潮而中小亹引河等處亦可逺眺應略為修飾以備臨幸至于杭城內外及紹興嘉興等處名山勝迹可備巡覽之處均有房屋無庸添建是以臣等未及另行定議凡聖駕臨觀憩息處所俱就現在房屋內酌量粘補修理數間不必拘泥現在圖樣亦無事過於華飾至紹興府之南鎮蘭亭二處與禹陵相去不逺從前聖祖未經臨幸該處現在亦俱有房屋並應略為修理俟皇上幸浙之時應否臨觀恭候欽定謹各繪圖粘簽並經由水陸程途一併進呈御覽至一切沿途經行道路橋梁作何修理預備之處臣永貴回任後會同總督並嚮導大臣等會商妥議再行具奏請旨奏入報聞乾隆十五年正月初四日大學士公傅恆奏言臣等遵旨會同臣黃廷桂等議得辛未嵗聖駕南巡自德州由山東東路至江南宿遷縣登舟已經奉旨允行其自楊家莊渡黃駐蹕直𨽻厰營盤原擬於此處添設行宫今臣等公同酌議此處可以無庸建造仍駐蹕營盤皇上自直𨽻厰起旱閲視河工至髙家堰行宫駐蹕仍由旱路回駐直𨽻厰營盤自直𨽻厰登舟由天妃閘越河過清江浦達淮安其淮安城內總漕衙門內之行宫並總漕衙門年久朽壞難以臨駐已奉旨毋庸修理皇上仍駐御舟由運河直達掦州三汊河行宫駐蹕自三汊河至天寧寺復登舟至平山堂仍由原路回駐三汊河行宫自三汊河登舟至瓜洲渡江金山寺行宫駐蹕由金山至焦山象山由象山旱路至甘露寺並至教場閲操畢回駐金山閲視水操過江至錢家港登旱路至龍潭行宫駐蹕由龍潭至江寧省行宫駐蹕俟覽閲名勝後仍由原路回至龍潭由龍潭至寶華山回駐龍潭仍至錢家港登舟進鎮江口直逹無錫惠山至秦園回舟行抵蘇州行宫駐蹕由旱路至虎邱仍由原路回駐蘇州行宫又由旱路至靈巖山行宫駐蹕由靈巖至鄧尉山此處前擬添設行宫今酌議不必添建或俟此次巡幸後將來漸次酌辦由鄧尉山至靈巖仍還駐蘇州行宫復由旱路往觀音山等處亦回蘇州行宫駐蹕其蘇州至松江往返八九日道路綿長沿途並無名勝古迹可備逰覽所有舊時行宫均已朽壞業經奉旨毋庸巡幸自蘇登舟至平望即入浙江地界臣等謹按圗會商其應行新添及可不必添建並舊有而無庸修理之處俱仰體皇上從儉辦理之意詳悉講明定議並於圖樣內分别貼簽進呈至髙家堰舊有行宫尚堪修理應估修費就近會同河臣監修江寧蘇州舊有行宫均在織造衙門之內尚多完整應照舊式修理粘補亦估定修費會同江寧蘇州兩織造分修其餘應修行宫俱照呈樣酌減修理合併奏明奏入報聞乾隆二十年五月二十三日署兩江總督尹繼善兩淮鹽政普福奏言竊照江南臣庶仰望鑾輅重臨莫不情深踴躍臣等業已聮名恭奏請定吉期南巡凡屬差務均已酌定章程次第預備各處行宫及名勝之地仰遵聖訓撙節妥辦不敢稍事虛糜經臣尹繼善節次奏明兹臣尹繼善查勘各處應修工程臣普福在鎮江相會將一應事宜又復面為商酌分别緩急妥協料理所需經費荷蒙恩旨於運庫應解內府間款銀兩撥給十數萬兩兹臣等公同商酌查有應解內府生息餘利銀十二萬九百六十兩零又吉安窩利銀五萬二千三百二十九兩零以上共銀十七萬三千二百八十九兩零一切備辦事宜均請於此內動用統俟事竣另開清摺奏報所有遵旨撥動運庫間款銀兩臣等謹合詞恭摺具奏奏入報聞乾隆二十年六月二十日大學士公傅恆等奏言尹繼善等奏請南巡另摺稱聖駕未經臨幸之處如寒山别墅石湖石佛寺棲霞山等處均應略加修治以備省覽所需費用奉旨令臣等籌項臣等恭查南巡經費先經遵旨傳諭普福於兩淮運庫應解間款內撥給十數萬兩交與該督為動用之需嗣據普福奏將生息餘利及吉安窩利二項共銀十七萬三千餘兩撥用今臣等酌議如普福奏撥數目不敷應統令於應解間款內再為撥給數萬兩一併交與該督為辦理費用奏入報聞乾隆二十年九月二十五日兩江總督尹繼善兩淮鹽政普福奏言竊臣前奏寒山别墅石湖石佛寺棲霞山等處從前聖駕未經臨幸之所均酌量興修以備省覽欽奉上諭新預備之處可畫圖呈覽並將所需費用復命大學士等籌議於運庫應解間款內再為撥給銀數萬兩恩施稠疊感激難名除應繪各圖臣現在親行賫呈御覽並將此外續修名勝另行詳細奏聞外伏思此次差務臣惟事事仰遵聖訓加意妥辦所有寒山别墅等處原係略加修葺以備登臨兹蒙聖主隆恩續撥銀數萬兩以為辦理費用臣與鹽臣普福商酌查有應解內府生息一項自本年七月起扣至明嵗六月底止應交息銀七萬二千兩請即於此內酌留銀六萬兩應用事竣連前撥運庫銀兩一併開具清摺奏報臣謹會同兩淮鹽臣普福合詞恭奏奏入報聞乾隆二十二年五月初三日兩江總督尹繼善奏言恭照皇上軫念徐屬屢被偏災親臨閲看恩施稠疊至渥至周凡河工應辦工程無不詳悉指示復念河流順軌全憑神功默佑命臣擇地建龍神廟并酌量修建房屋以為勘工駐蹕之所臣謹遵諭旨於恭送聖駕後回至徐州親行查勘彭城地處窪下髙燥平坦之區甚少北門外雖舊有大王廟但地勢窄狹兩旁俱係民房城外周回查閲西門以外地勢雖寬一遇隂雨即有積水惟雲龍山旁有隙地十餘丈可以建廟形勢北向俯視黃河規模其屬宏敞且雲龍山名亦與龍神廟字義相關極為合式西北有地數十丈髙爽平坦可建行宫其地在郡城之南雲龍山之北逺近適中臣相度再四此處最為妥協謹將勘定地基繪圖敬呈睿覽伏惟聖明訓示以便委員確估另行奏聞即遵旨動運庫公項辦理務期仰體聖心諸從儉約奏入上諭曰不必另擇地此不過在廟旁就便一宿之地可耳何須多費廟牆周圍寬展足容數間憩息一宿為妙乾隆二十二年十二月二十三日兩江總督尹繼善奏言竊臣接準廷寄欽奉上諭前因徐州孫家集河溜直趨汕刷深濬降旨令該地方建立河神廟以答靈貺嗣據尹繼善奏擇地雲龍山西北並建行宫繪圖進呈經朕批示不必另擇地基祇須於廟旁搆闢數間可容一宿憩息足矣並將圖中圈出寄諭令其遵照辦理乃距今日久所辦若何未經奏到此等處不過數年一至信宿言旋何必多費以飾美觀該督勿因前已估計興工遂謂成事不説非所以體朕意也著傳諭尹繼善務遵前旨將現在所辦情形即行具奏再石隄工程前據該督奏稱於霜降後動工此時水落歸槽諒已興工何時可以完竣著一併奏聞欽此除徐城石工完竣日期業經臣等會摺奏聞外伏查孫家集大工告成河流順軌前奉諭旨建立河神廟並酌建房屋以為勘工駐蹕之所經臣擇地雲龍山之北繪圖進呈荷蒙皇上明切指示不必另擇地基只須於廟旁搆建臣仰體聖心諸從儉約辦理隨即親行相度即於廟基之旁擬建行宫三層從房亦不多蓋止期朴實不事華美約計費用不過八九千兩於廟工辦完之後即行續辦今廟工已於十一月十九日如式完竣應建行宫業已委員購備物料次第興工明春即可告成並不敢徒飾美觀稍有縻費所有現在辦理情形臣謹繕摺具奏並將房屋基址繪圖恭呈御覽仰祈聖明訓示再廟工告竣應請河神封號並匾額碑文告祭等事宜另照例具題合並陳明奏入報聞乾隆二十九年十一月初四日山東巡撫崔應階奏言竊臣承準廷寄乾隆二十九年十月二十日奉上諭崔應階前奏該省魏家莊大營有四賢祠陳家莊有晏子祠其建祠時代始末及諸賢姓氏事迹並費縣之萬松山有無故實可稽著即確查詳悉具奏欽此臣謹按四賢祠在泰安境內山東通志內載泰山西南麓有投書澗上書堂係宋儒胡瑗孫復石介講學之地舊有祠宇今祠已廢後人於縣境東南鄉建祠祀胡瑗孫復石介又增祀孔道輔為四賢祠其建祠時代無碑記可考又謹按晏子祠在齊河禹城交界之處山東通志內載齊河西北二十五里有晏城係齊相晏嬰采邑後人立祠於晏城之北祀齊相晏嬰其建祠時代亦無碑記可考又謹按萬松山在蒙山之南通志內載費縣北七十里有蒙山山趾延亘一百三十里其前為陽口山有玉皇觀老子故宫又費縣志載陽口山近祊城山之北浚水出焉今萬松山即陽口山其上多松故土人咸呼為萬松山臣謹遵旨查明覆奏奏入報聞乾隆四十五年二月二十二日閩浙總督三寶浙江巡撫王亶望奏言竊臣三寶前在浙江巡撫任內於乾隆四十年因開濬西湖告成勒碑紀事相度樹碑之所獲隙地於六一泉左相傳係孤山柏堂竹閣舊址恭讀御製詩集乾隆二十七年三十年兩次南巡俱有柏堂竹閣宸詠臣敬考詩中所指印之杭人相傅柏堂竹閣遺址確係其地仰見聖學淵深即一地一名舊迹所在無不援據詳核臣以其地為白居易蘇軾遺迹且蒙天章題詠當即略為修復還其舊名作記述事又臣三寶曾夢御題羅漢大士像臨流示現隨因謝雨詣上天竺於大士殿之西獲有靈泉宛符夢兆因即其處搆殿供像臣亦有記述今恭逢皇上五舉南巡盛典臣等現於該二處重加修葺恭備座落祇候宸幸奏入報聞乾隆四十五年三月二十三日兩江總督薩載江蘇巡撫楊魁奏言竊臣薩載於上年查勘棲霞工程行至千佛嶺以東見石壁所刻𨽻書白乳泉試茶亭六字臣等考之江寧府志攝山中峯上天開巖為明徵君故宅宅後有白乳泉又檢閲明人盛時泰攝山志白乳泉在棲霞寺千佛嶺下昔有伐木見石壁上刻𨽻書六字曰白乳泉試茶亭不知得名所自又考唐人皇甫冉有送陸鴻漸棲霞寺採茶詩黃居中有試茶亭詩復閲盛時泰金陵泉品有白乳泉讃是白乳泉之名由來已久今於其地敬搆數椽恭懇聖駕臨幸棲霞時順道片時憩息俾前人陳迹得邀睿覽山澤生輝榮幸無極臣等謹繕摺具奏並將皇甫冉黃居中盛時泰詩讃各一首另繕恭呈御覽奏入報聞欽定南巡盛典卷八十二
