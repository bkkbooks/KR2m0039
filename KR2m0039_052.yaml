body:
  text: 欽定四庫全書欽定南巡盛典卷三十七河防乾隆十四年十一月十三日河道總督髙斌協辦河道總督張師載奏言竊照南省輿情久望聖主巡幸臣等會同督撫諸臣奏請荷蒙皇上諭旨俯允於辛未年恭遇皇太后六旬萬壽之年舉行盛典凡闔省紳耆士庶莫不額手歡呼衢歌巷舞而南河通工之官辨軍民更切歡欣踴躍尤覺什倍輿情伏念河工為國家重務厯來談河務者人各異説紛如聚訟莫能折衷從前仰荷聖祖仁皇帝六次巡幸翠華所至勘閲情形指授方略數十年間厯任河臣得有遵守即今一切修防之法悉皆凛奉成規循照辦理吏民謳歌帝德至今感頌彌深我皇上繼統御極十四年來承聖祖愛民之至意體世宗經國之逺圖親總萬幾不遑宵旰而河防諸務更皆上煩睿慮周詳是以綱舉目張已屬盡善無遺惟是水勢厯久不無變遷而修守機宜難於膠執如徐州之毛城鋪宿遷之駱馬湖十字河之竹絡壩朱家閘之引河清口之木龍運口之收束洪澤湖之山盱天然二壩髙郵之東堤南關車邏各壩以及黃河之雲梯關海口等處皆為運道所關民生所繫臣等仰荷聖主委任雖竭盡駑駘不敢稍懈而知識淺陋多有未周其中形勢或昔平而今險節宣或昔是而今非修防蓄泄之方情形委宛實有非敷陳章奏所得詳明繪圖貼説所能曲盡者兹欣逢我皇上聖駕南蒞於御道之所經由近者順邀睿覽仰遵指示規模即遠者亦可就便敕委重臣前往勘度奏請聖訓上繼聖祖仁皇帝之鴻休偉烈於宸遊之順路抒底定之嘉謨以立百世之章程而垂萬年之法守則南工可以永慶安瀾此兩河文武官辨與軍民人等所以倍切歡欣鼓舞萬口同聲者也臣等恭候欽差嚮導至日當與商定鑾輅所經御舟所由之道路凡河工緊要工程應恭請聖駕親臨閲視處所臣等即與靣商敬謹籌辦其有應行遣令大臣閲勘者亦即預行分晰奏明臨期候旨酌派臣等凛遵諭旨不敢過求華麗多耗物力一切殫竭心力敬謹料理預備奏入報聞乾隆十五年三月二十四日嚮導努三兆惠奏言據河道總督髙斌等奏稱徐州之毛城鋪宿遷縣之駱馬湖十字河之竹絡壩朱家閘之引河清口之木龍運河閘洪澤湖之山旴天然二壩九里岡髙郵州之東堤南關車邏壩再黃河雲梯關海口皆關運道民生皇上御蹕所經近者懇請皇上指訓遠者就近敕委大臣勘度等因臣等順看附近皇上御路之朱家閘九里岡引河清口木龍運河閘髙郵州東堤南關車邏壩等處工程俱係順路再髙家堰最為緊要聖駕尚可經臨閲視將此八處入於御路營盤外其徐州之毛城鋪黃河雲梯關海口相距御路數百里山盱天然壩距髙堰百里宿遷縣之駱馬湖十字河竹絡等壩工程在御營之北二十里非住一日不能往看屆期差何項大臣往勘之處應令髙斌等自行請旨再有山東郯城縣所屬之禹王臺廟廟前所做之竹絡壩亦係要緊工程經髙斌等會同臣往看相距御營七里餘將此已繪入圖內呈覽亦俟屆期差大臣往看之處應令髙斌等自行請旨奏入報聞乾隆十六年二月初八日大學士管江南河道總督髙斌奏言洪澤湖在山陽縣西南清河縣東南盱眙縣東北周環三百餘里發源河南桐柏經信陽羅山息縣光州新蔡固始霍邱至正陽關與汝水合又經安徽壽州與肥水合厯臨淮懷逺五河泗州盱眙合豫皖山河之水滙為洪澤湖由清口會黃入海堤工自武家墩至秦家髙岡長一萬七千餘丈查洪澤湖地居淮揚數十州縣上遊堰盱堤工所以障全淮之水使不得分流旁出併力北趨以與黃會復分入運口以通運道乃黃運兩河之關鍵也先是堤身單薄石工間段幫築不足以資捍禦屢致沖潰淮揚頻告水災淮水勢分力弱黃水倒灌入湖運口淤墊運道民生均為可虞厯蒙聖祖仁皇帝南巡親臨指示堅築髙堰堵閉六壩使淮水得歸故道暢出清口雍正八年荷蒙世宗憲皇帝智神天縱洞悉機宜特降諭旨以治道之道惟有使黃水暢流無所壅滯則永慶安瀾然欲使黃水無所壅滯必須保固髙家堰堤工使清水力能敵黃且以助其暢流之勢則河工可以永遠無虞發户部帑銀一百萬兩將堤工險要之所及單薄之處俱加修石工務令堅固髙厚以為久逺之計欽此欽遵自石工大加修築以後屹若金墉捍禦洪澤全湖巨浪保護淮揚二郡民生蓄清會黃利漕濟運聖德神謨功成底定誠千古不易之章程也臣等竊查髙堰一帶石堤現今完固間有舊石工殘缺隨時修整惟土堤尚有未能一律之處緣湖水汪洋浩瀚兼以西風鼓浪洶湧搏擊漸次汕刷尾土查自武家墩至秦家髙岡有寬十餘丈者有寬七八九丈者且有僅寬五六丈者雖土堤之外俱有磚石工程原可無虞而萬全之䇿必須將尾土再加修築髙厚惟是堤長一萬七千餘丈工費浩繁臣等周厯往來再三籌畫計通身幫寬一律以十丈為率約需土方銀五萬餘兩若即於堰盱二廳嵗搶修柴掃工內分年節省妥辦土工則數年之間可以一律完整不須另請錢糧該處土性頗堅足資捍禦將來俱寬至十丈則既有石工以為外捍復厚其土堤以資保障髙堰一帶大堤益增鞏固正以仰體世宗憲皇帝大修石堤保固髙堰之聖謨昭垂久遠而淮揚數十州縣民生咸底安全萬世永賴實為大有裨益臣等現在委員細加確估兹欣逢鸞輅南巡親臨髙堰是否可行仰祈聖明指授方略俾臣等敬謹遵守辦理奏入上親臨閲視面諭髙堰山盱土堤幫寬十丈為率需用土方銀五萬餘兩即於堰盱二廳歲搶修柴掃工內分年節省妥辦照所奏準行乾隆十六年三月十五日大學士管江南河道總督髙斌奏言乾隆十六年二月十九日奉上諭朕經過淮安見城北一帶內外皆水雖有土堤為之防禦而人煙湊集之區設經異漲其何以堪甚覺怵然亟應改建石工以資保障著總河髙斌等會同總督黃廷桂確勘詳估及時建築毋忽欽此欽遵仰見我皇上慎重河防念切民生之至意臣等遵即委員確勘詳估查淮城地勢低窪逼近運河西門一帶只有石工長三百六十七丈自北角樓迤上至石馬頭內外俱水土堤難資捍禦每年鑲修柴掃伏秋大汛甚屬危險今蒙聖明洞悉機宜指受方略建築石工以垂永逺淮安城社民生永資鞏固臣等查北角樓迤上舊石工尾至石馬頭計長四百五十丈應行建築石工按照漕規核實確估共需工料銀四萬七千四百餘兩臣等謹開具清摺繪圖貼説恭呈御覽臣等另行照例題估仍一靣行令江蘇布政司撥款解交河庫委員辦料及時興工奏入諭依議行乾隆十六年六月初三日大學士管江南河道總督髙斌奏言該臣等看得洪湖隄工為淮揚之保障係清水之來源會黃濟運實南河第一關鍵欽奉我皇上親臨閲視全隄周覽形勢特頒諭旨添建智信二壩仍加封浮土俟仁義禮三壩過水三尺五寸始相機節宣天然壩則永禁啓閉其舊用土工形勢不稱之處一律改建磚石工程隨即欽遵諭旨率同道廳委員前往堰盱隄工詳悉查勘確加丈量查舊建之仁禮二壩寬七十丈義壩寬六十丈今新建二壩亦應寬六十丈其壩基石脊欽遵諭旨五壩髙下一律維均總以髙堰水志深八尺五寸平水為度內新建智壩一座估銀五萬八千三百四十兩五錢零信壩一座估銀五萬九千二兩一錢零林家西改建石工估銀四萬四千二百二十三兩零沈家西改建石基磚工估銀三萬五千三百八十一兩三錢零清水溝秦家髙岡改建石基磚工估銀一萬八千一百三十五兩七錢零又接下石基磚工估銀四千七百九十三兩八錢零蔣家壩改建石基磚工估銀一萬八百五十兩三錢零蔣家閘工鉗口石壩一座估銀六千九百一十兩七錢零以上通共估需料物夫工銀二十三萬七千六百三十七兩八錢零理合造册題估再查此項工程所需磚石木灰等料繁多採買轉運稍費時日必需早為發帑購辦庶可及時修築完竣臣等一靣移咨江蘇撫臣於藩庫內撥款解交河庫動支給發遴委幹員分投採辦料物速即到齊本年秋泛水退後尅期興工於乾隆壬申年伏泛水長以前一律完竣合併陳明奏入諭部速議乾隆十六年六月十四日大學士管江南河道總督髙斌奏言臣等看得淮城地勢低窪逼近運河西門一帶只有舊石工三百六十七丈自北角樓迤上至石馬頭內外俱水土堤難資捍禦每年鑲修柴掃伏秋大汛甚屬危險恭逄我皇上親臨閲視洞悉機宜指授方略建築石工以垂永久臣等遵即委員確勘詳估恭摺奏明查自漂母祠迤北石馬頭至北角樓舊石工尾應建石工長四百五十丈確估共需料物匠役夫工銀四萬七千四百七十六兩八錢零相應造册題估再查此項石工所需磚石木灰等料繁多採買轉運稍費時日必須早為發帑購辦庶可及時修築完竣臣等一靣移咨江蘇撫臣於藩庫內撥款解交河庫動支給發遴委幹員分投採辦料物速即到齊俟本年秋泛水退後尅期興工於乾隆壬申年伏汛水長以前一律完竣合併陳明奏入諭部速議同日工部奏言工科抄出大學士管江南河道總督髙斌等題山盱添建智信二壩並改建磚石各工估需工料銀二十三萬七千六百三十七兩八錢零一疏乾隆十六年六月初三日奉旨該部速議具奏欽此臣等查得髙堰隄工保障淮揚蓄清濟運實運道民生之關鍵我皇上周覽形勢洞悉機宜諭令將天然壩立石永禁開放其三滾壩以外添建智信二壩上封浮土俟仁義禮三壩過水三尺五寸則啓智壩如仍不減乃次及於信相機節宣又自新建信壩北雁翅以北一律改建石工南雁翅以南至蔣家閘則用石基磚甃以期首尾完固仰見睿慮周詳務使全堤鞏固永慶安瀾今該總河髙斌等欽遵查勘將添建二壩改建磚石各工通共估需工料銀二十三萬七千六百三十七兩八錢零造册題估並聲明此項工程用料繁多採運需時一靣移咨江蘇撫臣於藩庫內撥欵給發委員採辦俟秋汛後尅期興工於次年伏泛以前一律完竣查本年閏五月二十二日據蘇州巡撫王師咨報新建二壩並改建磚石等工準河臣委員赴司請領銀二十三萬七千九百兩已照數撥解河庫相應行令該督作速委員上緊採辦物料齊全及時興工如式堅固工完照例核實造具清册題銷查核可也奏入諭依議速行諭依議速行乾隆十六年六月二十六日工部奏言工科抄出大學士管江南河道總督髙斌等題淮城運河西門建築石工估需工料銀四萬七千四百七十六兩八錢零一疏於乾隆十六年六月十四日奉旨該部速議具奏欽此臣等查得淮城地處低窪逼臨運河甚屬危險堪虞荷蒙我皇上親臨閲視於乾隆十六年二月十四日欽奉上諭朕經過淮安見城北一帶內外皆水雖有土堤為之防禦而人煙湊集之區設經異漲其何以堪甚覺沭然亟應改建石工以資保障著總河髙斌等會同總督黃廷桂確勘詳估及時修築毋忽欽此今據該總河髙斌等委員確估自漂母祠迤北石馬頭至北角樓舊石工尾應建石工長四百五十丈共估需工料銀四萬七千四百七十六兩八錢零造册題估並聲明此項石工用料繁多採買需時一面移咨江蘇撫臣於藩庫內撥款給發委員採辦俟秋泛後尅期興工於次年伏泛以前一律完竣應令該督俟藩庫撥解銀兩到日即速委員上緊採辦物料齊全及時興工如式完竣仍照例核實造具清册題銷查核可也奏入諭依議速行欽定南巡盛典卷三十七
