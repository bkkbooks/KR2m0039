body:
  text: 乾隆三十年閏二月初十日總理行營事務和碩簡親王豐納亨等奏言乾隆三十年閏二月初三日奉諭㫖此次隨營人等雖俱加恩賞給但行走係内地與外地不同用度稍費著交總理行營事務王大臣等分别賞給再王家營存住各項人等應如何恩賞之處分别議奏所賞銀兩在兩淮鹽政庫内存貯公項内動用欽此查得乾隆二十七年為遵㫖查辦隨營人等賞給之處除荘親王簡親王額駙色布騰巴爾珠爾等如何賞給請㫖定奪其餘大臣官員各項人等并存住王家營人等仍照前次賞給具奏奉㫖莊親王賞銀五百兩簡親王額駙色布騰巴爾珠爾傅恒等著各賞銀四百兩扎拉豐阿兆恵阿里衮富徳著各賞銀三百兩劉統勲汪扎爾努三福隆阿劉綸于敏中著各賞給一年俸王家營存住人等賞給一半其餘各衆照前次例賞欽此今次照一品以下三品以上文武大臣再兼職王額駙等俱賞正俸銀半年四品堂官侍衛鑾儀衛章京等每各賞銀四十兩五品堂官監察御史内府䕶軍統領前鋒叅領侍衛䕶軍章京每各賞銀三十兩六品以上文員粘竿上行走散職官員内府叅領步營副尉歩軍校等每各賞銀二十兩七品以下文官都察守營官員等每各賞銀十五兩前鋒校親軍校戴藍翎頭目驍騎校巡捕營千總把總庫使庫丁毎各賞銀六兩前鋒及親軍䕶軍等每各賞銀五兩食四兩錢糧領催及拜唐阿等每各賞銀四兩食三兩二兩錢糧頭目拜唐阿書吏承差披甲校尉毎各賞銀三兩各項匠役畨役厨役步兵領催綠旗兵水手網户每各賞銀二兩總管太監每各賞銀二十兩有頂帶太監等每各賞銀十五兩其餘太監每各賞銀四兩存住王家營大臣官員各項人等減半賞給俟命下之時各該處造具清冊交與兩淮鹽政㑹同行在户部照數賞給奏入報聞乾隆四十五年二月十七日兩江總督薩載奏言竊臣接准部咨欽奉上諭朕清蹕時巡恩施宜渥所有江浙二省派出辦差兵丁著加恩賞給兩月錢糧欽此除經轉行欽遵辦理外伏查辦差兵丁仰䝉聖主殊恩賞賚莫不歡欣鼓舞感頌皇仁查厯次恭逢聖駕南巡調撥江西來南辦差兵丁與江南各營兵丁同一辦差均經前督臣奏明奉㫖允准給賞今次翠華南幸臣以南省馬匹不敷奏明仍撥江西馬匹協濟及酌調将備等員來南差遣所有江西押馬并隨同将備來南辦差兵丁似應照依前屆一體給賞俾得同沐恩膏臣未敢擅便循例繕摺恭奏奏入上諭曰照例賞給乾隆四十五年三月初五日總理行營和碩荘親王永瑺奏言乾隆四十五年二月二十九日奉上諭此次隨駕人等雖給過恩賞但内地行走比在邊外不同用度不無稍費總理行營王大臣等将此次跟隨各項人等并存留王家營各項人等如何施恩分别給賞之處議奏其賞銀動支兩淮運庫銀兩欽此查得上次聖駕臨幸江南賞給隨駕荘親王簡親王御前大臣領侍衛内大臣軍機大臣等每員五百兩三百兩一年俸禄不等至存留王家營減半賞給其餘各項人等分别賞給此次仍照前例一品以下三品以上文武大臣再兼職王額駙等均給半年正俸四品堂官侍衛鑾儀衛章京奏事官員批奏官員軍機章京主事等每名四十兩五品堂官御史並内府章京前鋒章京前鋒侍衛䕶軍章京等毎名三十兩六品以上文職粘竿上散職官員内府叅領步軍協領札蘭達等每名三十兩七品以下文職巡捕營守備等毎名十五兩前鋒統領䕶軍統領藍翎達駮騎校廵捕營千總把總庫使庫守毎名六兩前鋒親軍等毎名五兩領催食四兩錢糧頭目拜唐阿等毎名四兩食三兩二兩錢糧頭目拜唐阿各項匠役畨役厨役歩軍領催兵緑旗兵水手網户等每名二兩總管太監等每名二十兩首領太監有頂太監等每名十五兩各太監等每名四兩存留王家營大臣官員等項人等減半賞給之外其荘親王睿親王御前大臣領侍衛内大臣軍機大臣等進呈緑頭牌請皇上應否賞給銀兩賞給俸之處俟指示命下令各該處造具清冊交給兩淮鹽政與行在户部一同查核數目賞給奏入上諭曰淳頴永瑺福隆安札拉豐阿和珅徳保拉旺多爾濟海蘭察阿克棟阿梁國治董誥福長安等每員賞給本身職俸一年總管太監不必賞首領太監有頂太監各賞十兩餘依議乾隆四十五年三月初六日閩浙總督三寳奏言竊臣上年恭逢恩科鄉試臣兼署福建巡撫印務監臨科場有興化府學生員郭鍾岳陳應騰宋耀等三名年登耄耋試竣三塲内郭鍾岳一名年係九十九嵗精神步履俱属强健經臣恭摺具奏仰䝉聖恩一體欽賜舉人今該舉人郭鍾岳本年係一百嵗又陳應騰年八十八嵗宋耀年八十五嵗該舉人等情殷感激現由福建來至浙省叩謝天恩恭迎聖駕理合奏聞奏入上有㫖諭閣臣乾隆四十五年五月十二日薩載奏言乾隆四十五年恭逢聖駕南廵欽奉上諭江寧京口駐防老男老婦加恩一體賞賚用宣慶澤欽此臣接准部咨即經移行今據江寧布政使劉墫蘇州布政使瑺齡詳稱江寧八旗老年男婦奉江寧将軍發冊内開七十以上老男六十四名每名賞銀三兩共銀一百九十二兩八十以上老男十七名每名賞銀四兩共銀六十八兩九十以上老婦三口每口賞絹二疋折價銀一兩五錢布八疋折價銀二兩三錢二分共銀一十一兩四錢六分八十以上老婦九十九口毎口賞絹二疋折價銀一兩五錢布八疋折價銀二兩三錢二分共銀三百七十八兩一錢八分七十以上老婦二百三十七口每口賞絹一疋折價銀七錢五分布四疋折價銀一兩一錢六分共銀四百五十二兩六錢七分通共應賞并折給絹布價銀一千一百一兩三錢一分當經在於漂水縣解司乾隆四十五年地丁銀内動支呈解散給又京口八旗老年男婦冊報七十以上老男十五名毎名賞銀三兩共銀四十五兩八十以上老男一名賞銀四兩七十以上老婦八十口毎口賞絹一疋折價銀七錢五分布四疋折價銀一兩一錢六分共銀一百五十二兩八錢八分九十嵗以上老婦三十四口毎口賞絹二疋折價銀一兩五錢布八疋折價銀二兩三錢二分共銀一百二十九兩八錢八分通共應賞并折給絹布價銀三百三十一兩六錢八分隨於華亭縣解司四十五年地丁銀内照數動支呈解給領合将江寧京口八旗賞給過老男九十七名銀兩老婦四百五十三口絹布折價通共銀一千四百三十三兩九錢九分各造具姓名人數冊結并動欵清冊一併詳請題銷臣覆核無異除冊結送部查核外臣謹㑹同江蘓撫臣閔鶚元具題奏入報聞乾隆四十五年六月十六日薩載奏言查江南浙江辦差滿兵恩賞一月錢糧接准部咨在於司庫地丁銀内給發造具姓名冊結送部查核兹據江寧布政使劉壿詳稱查得江寧八旗辦差兵丁領過一月錢糧賞銀四千九百二十三兩即經呈請江寧将軍飭取八旗兵丁實領人數銀數細冊並各旗印結加結今奉發司遵即造具人數清冊同各印結詳送察核題銷至前項銀兩係在於乾隆四十四年地丁銀内動放臣覆查無異除冊結送部外臣謹㑹同江蘇撫臣閔鶚元具題奏入報聞乾隆四十八年五月初十日兩淮鹽政伊齡阿奏言恭照厯屆聖駕南廵賞賚官兵人等銀兩並備辦奨武養老銀牌小錠向係兩淮應解内庫各項等餉銀下奏請撥留銀十萬餘兩以備支用兹甲辰年恭逢聖主巡幸江浙所有賞賚需用銀兩及銀牌小錠等件據運使倉聖裔詳請照例先期預備臣伏查向來動用解京餉項原以運庫一時别無存欵不得不於應解項下支用臣檢查庫項現有上屆兩淮恭進備賞銀一百萬兩内除分給直𨽻山東山西各省公用銀六十九萬餘兩本年撥交督臣薩載銀二十萬兩外仍有餘存銀十萬七千六百五十七兩七錢留為公用之需此項正堪動用查上屆預備銀十二萬兩今存項即有不敷亦属有限另飭該司於運庫零欵内凑撥毋庸動支應解銀欵理合恭摺奏明請㫖如䝉俞允臣即将前項銀兩撥給以備明春恩賚之用俟差竣用有餘剩仍核明確數解繳合併聲明奏入報聞乾隆四十九年二月初一日領侍衛内大臣尚書和珅等奏言遵㫖查得青州徳州當差兵丁數目青州派出接駕隨營當差兵三十名泰安府交馬拉馬兵四百名徳州派出俟聖駕回鑾時由江南交界管轄拉縴兵丁兵三十名此等有正項差務應照例賞給兩個月錢糧外其各隨印等項差使跟來兵丁均不應入於得賞之數至杭州江寧時亦照此将派有正項差使兵丁數目再令該將軍等核實賞給謹奏奏入上諭曰照依所奏賞給乾隆四十九年二月初三日山東巡撫明興奏言竊照乾隆四十八年癸夘科山東省鄉試臣遵例監臨查諸生内有長清縣増生焦㑹塗年八十八嵗長山縣附生趙象觀年八十四嵗汶上縣附生張申年八十三嵗新城縣増生張自道年八十一嵗新泰縣附生徐簡颺年八十一嵗夀張縣附生梁重華年八十嵗皆三場完卷未經中式臣查該生等六名生逢盛世沐浴恩膏雖年逾八旬猶能奮志功名精神不倦洵為聖天子夀考作人之所致可否仰邀皇上格外優䘏之處出自天恩臣謹繕摺具奏奏入上諭曰嗣後著於鄉試榜發後即行奏請餘另有㫖乾隆四十九年三月初三日和珅等奏言查從前拉縴兵丁曽經賞給一月錢糧此次應否賞給之處恭請欽定奏入上諭曰著照所奏賞給乾隆四十九年三月初四日兩江總督薩載奏言竊臣接准部咨欽奉上諭朕清蹕時巡恩施宜溥所有江浙二省派出辦差兵丁著加恩賞給兩月錢糧欽此除轉行欽遵外伏念辦差兵丁仰䝉聖主殊恩賞賚莫不歡欣踴躍感頌皇仁查厯屆恭逢聖駕南巡江西來南辦差兵丁均經奏䝉恩准同江南辦差兵丁一體給賞在案此次恭逢翠華南幸臣以南省營馬不敷奏明仍撥江西馬匹協濟並酌調将備等來南差遣所有江西押馬並隨同将備來南辦差兵丁合無仰懇聖恩俯准照依上屆一體給賞俾得同沐恩施共戴鴻慈於靡既矣臣謹循例繕摺具奏奏入報聞乾隆四十九年三月十六日和珅奏言查上屆閲視水操曽經分别賞賚謹繕清单進呈御覽此次應否賞賚之處伏候訓示俟命下交該衙門預備於皇上閱操後遵照賞給奏入報聞乾隆四十九年四月初二日和珅等奏言此次應賞水手查前次京城水手網户每人賞一個月錢糧江南水手頭目每人賞一兩重銀錁二個水手等每人一兩重銀錁一個山東省拉縴河兵每人賞一個月錢糧今江南水手頭目山東河兵仍照上屆賞給外京城水手網户似可無庸賞給奏入報聞乾隆四十九年九月初四日兩淮鹽政全徳奏言竊照本年聖駕南巡應備賞賚官兵銀兩及奨武養老牌先經伊齡阿奏明有上屆兩淮恭進備賞銀一百萬兩除解給各省公用外餘銀十萬七千六百五十七兩七錢現存運庫請即以此項預備恩賚之用兹據鹽運使倉聖裔詳據委員造冊開報核計支過賞賚官兵人等銀五萬七千二百九十三兩七錢五分廣儲司支銀一萬五千兩總共支銀七萬二千二百九十三兩七錢五分實除存銀三萬五千三百六十三兩九錢五分詳請察銷臣覆核無異謹繕摺奏明並造册呈送户部及内務府查照上屆備賞銀兩除先後分解外餘銀原係遵㫖存留在外備用之項所有此次賞賚餘剰銀三萬五千三百餘兩應存存貯運庫以備将來公用合併聲明奏入報聞欽定南巡盛典卷七十二
