body:
  text: 河防沂河上承臨朐沂諸山河之水兼有汶祊淶及桞青等河合流下注每遇水發瀰漫坡田乾隆十三年大學士髙斌修築西岸長堤並於江風口建砌滚水石壩分消異漲經歷十年石壩刷坍其壩口泄入武河之支河多有淤墊二十三年欽差臣裘曰修河臣張師載撫臣阿爾泰勘修石壩長一百八十丈挑挖壩外之武河陷泥燕子芙蓉等河沂水分流有制蘭郯二邑水有去路漲不為患微山湖居東省下游衆水滙聚湖之尾閭一由韓莊湖口閘入運一由茶城小梁山一帶㑹荆山橋河以逹江南運河自黃河北岸石林口漫溢之後茶城一河漸淤乾隆二十一年間孫家集全黃灌注而小梁山之河復淤僅有湖口閘宣泄去路甚微黃水漫流入湖歷經嵗餘湖不能容遂與運河連為一片積聚難消兖屬瀕湖村莊及江南銅沛二縣地畝悉被淹浸我皇上軫念民生堵築孫家集挑挖小梁山至荆山橋河緣湖水浩大三月之間僅消尺餘二十二年撫臣鶴年查韓莊迤南舊有伊家河形可以開通泄水奏准查辦復經鶴年㑹同欽差臣裘曰修夢麟河臣張師載勘度河頭通湖處髙於梁旺城河尾入運處一丈九尺四寸實為微湖宣泄扼要之區計挑河長一萬二千五百五十三丈因第七假河身之下有山根大石阻遏水道又開通月河長一百三十五丈河頭係利國驛路所經建築滚水石壩一座金門寬十一丈並建石橋以通驛路此河與荆山湖口三路分流奔騰無滯其所出湖水直注韓莊八閘之外遞掣而下濟金魚銅沛等州縣被淹村莊漸次消涸永除水患此河于二十二年開挖兼有侯孟龍王二泉自西而東橫穿入河每遇伏秋汛漲停積沙泥年久愈多兼之四十六年黃河北岸曲家樓漫溢東注湖河浩瀚未能迅速疏消四十七年欽差直督臣袁守侗河臣何裕城撫臣明興㑹奏普加挑挖中假長七千二百四十五丈及河內萬年花山二石橋因橋空窄小橋底髙仰有礙宣泄一併拆改落低以資疏消暢利嶧縣韓莊滚水壩舊係石堤乾隆二十一年微湖水漲亟籌疏泄江南總督尹繼善奏請添建閘座尚未興工二十三年奉諭微湖積水已消閘座雖不必添建或酌量運河蓄水尺寸將閘口迤上之堤留為滚水壩經督臣尹繼善河臣張師載撫臣阿爾泰勘明即于湖口閘迤北六丈之上奏建滚水石壩金門寬三十丈壩脊照湖口閘金門水深一丈二尺五寸水大則漫壩宣泄水小則收蓄濟運二十三年河臣張師載撫臣阿爾泰因上源濟寧魚臺尚有未盡全涸之地奏請落低以湖口閘水深一丈為度三十年河臣李清時撫臣崔應階江南河臣李宏議覆漕臣楊錫紱奏將滚壩磯心每孔添砌槽石設板啓閉如水小之年加板攔束多收一尺設遇隂雨連綿水勢日增將板起除暢泄洵于漕運民田均資利賴四十六年儀工漫水東注風浪擊撞韓莊湖口一帶壩堤俱致坍塌四十八年將堤岸閘壩一律修理整齊以時啓閉魚臺縣西堤辛莊橋北舊有水口二處每年秋水盛漲由此分泄入昭陽湖以逹微山湖春閒堵閉以濟運行緣歷年口門過水日漸刷深運河既難節制微湖受水過多乾隆二十七年河臣張師載撫臣阿爾泰奏堵水口另建滚水石壩寬二十丈壩脊髙運河底六丈如水汛浩大聽其滚泄入湖六尺以內留以濟運節宣有制無慮旁流可省每年築壩拆壩之費並免湖水過大之患四十六年儀工漫水下注湖河一片此處壩岸亦被冲塌四十八年修理復還舊制工程鞏固魚臺以西湖河悉已平治舟行無阻居民亦保永寧矣乾隆二十三年河臣張師載撫臣阿爾泰興築南陽縴道以利運道至三十二年因樁木經歷年久漚泡朽折石無樁管土隨石䣃河臣李清時奏將殘缺過甚各假補修四千餘丈嗣又續有塌䣃均經隨時估修以資利涉又運河之西有牛頭河一道上承宋家窪及各州縣坡水下逹昭陽湖湖中舊有馬公橋一座係魚臺縣驛路所經計長五百一十八丈下設橋洞統計僅寬二十三丈牛頭河入湖之水當來源極盛時因橋洞收束往往壅滯不消三十七年河臣姚立德撫臣徐績奏多添橋洞加寬十丈並將湖河淤淺之處抽溝導引俾上游之水捷趨昭陽湖而濟寧西坡一帶已除水患四十六年儀封曲家樓漫水下注自濟寧在城閘下直至沛汛交界水勢汪洋湖河一片兩岸土石閘壩等工盡皆淹沒四十八年春間漫流疏消經大學士公阿桂河臣何裕城撫臣明興奏復還舊制次第興修其湖靣水深之處除原有碎石假落外擇其最要或加排樁或添碎石坦坡河靣掃灣迎溜之處用樁石攩護足資抵禦而縴道橋梁閘壩等工亦已一律完固矣魚臺縣舊運河係明時運道自濟寧耐牢坡由牛頭河至榖亭鎮出徐州鎮口閘屢受黃淤且經吕梁洪之險明臣朱衡開新河改南陽至夏鎮道出昭陽湖之東又被黃淤明臣李化龍復取東西二泇水為源開河至江南皂河名曰泇河而舊運河遂廢現在河形尚存且通舟楫界於微山湖之西南上接金鄉之淶河桞林河由沛縣安家口至銅山縣之茶城與荆山橋河相通乾隆二十二年河臣張師載撫臣蔣洲㑹同欽差臣裘曰修夢麟奏疏此河并濬牛頭河淶河桞林河在上游言之則濟寧金鄉以下滙注之水皆有去路而水患可除在下游言之則直接現在之茶城河而脉絡貫通泗河發源於泗水縣之陪尾山㑹合諸泉由魯橋入運名為魯橋𣲖至兖州府城東向有金口石壩遏泗水由黑風口㴠洞穿入府城㑹府河之水至濟寧州之楊家壩一出天井入運名為天井𣲖一㑹洸水入馬場湖瀦蓄因涵洞淤在河底來源既已壅滯楊家壩用土堵築去路亦復隔斷每嵗俱有暴漲之虞乾隆二十二年河臣張師載撫臣蔣洲㑹同欽差臣裘曰修夢麟奏將黑風口涵洞改建減水閘楊家壩亦改建石閘用板啓閉上下流通節宣有制又泗水下流董家口于十四年修建石壩減泄漲漫之水由孟家橋逹蜀山湖旁分一股由貫家灣之西出興隆橋仍㑹泗水入運因壩身過髙每遇水漲即溢入濟境東坡三十七年河臣姚立德撫臣徐績以今昔情形不同泗水南趨轉為石壩所纍拆除董家口石壩展寬孟家橋疏濬馬坡以下入湖尾閭俾水大之時直逹蜀山湖免致旁溢東坡春間水小即于孟家橋以下築一土壩攔截仍由興隆橋濟運從此泗水歸宿有路濟寧東坡一帶亦不致有漫溢之患二十三年于新店月河內新閘月河內仲淺月河內魯橋擺渡口修建涵洞四座新店閘下四里灣修建單閘一座于秋汛過後測量坡髙于河即挨次起放以資疏消四十六年儀封曲家樓漫水下注汪洋一片兩岸土石閘壩等工盡皆淹沒單閘涵洞漫泡兩年全行坍䣃于四十八年照舊拆修惟新店閘上之上四里灣並無單閘涵洞緣坐當窪區宣泄甚暢歷年鄉民呈請于此處開挖堤口以泄積水屢開屢築殊費民力是以添建單閘一座以期坡水速消民田有禆其兩岸堤工亦俱次第興修復還舊制惟坡靣水勢寬深迎風受險之處添砌碎石坦陂以資抵禦山東郯城縣城北禹王臺傳為大禹遺跡既鑿馬陵山以導沭水復築臺以遏其衝俾由江南沭陽海州注海不使㑹合䝉沂諸水入駱馬湖以為民患故俗諺有沂沭不相見見靣成一片之語明季時郯令毁臺取石修城沭水遂無所禦康熙二十八年聖祖仁皇帝命河臣王新命建竹絡石壩約攔水勢該工雖𨽻屬山東而實關繫江南之利病嗣是南省下游數十年得以奠安又經河臣陳鵬年齊蘇勒先後增設堤堰雍正八年山水驟發舊堰年久多被衝潰水勢下注越運漫黃下游皆成巨浸河臣嵇曽筠奏建竹絡壩工長六百餘丈補修堰工三百五十丈下接郯宿沭河民堰以資捍衛河臣髙斌於乾隆元年以壩工坐當迎溜處所地勢尚有卑窪恐難資捍禦奏加修裏創石工以為未雨綢繆之計每嵗於汛水將發之前即𣲖撥南河目兵前往住宿防守按期探報水勢小心防衛毛城鋪減水壩於康熙十七年河臣靳輔所建蓋因江南兩堤窄狹非若河東之寬廣以致水勢湍激難免衝突是以於碭山縣黃河南岸之毛城鋪創建減水石壩宣泄異漲以護徐城一帶堤工其所減之水由洪溝河至睢溪口歷揚疃土山孟山陵子崔家等五湖澄清而至洪澤湖滙出清口以助清刷黃紓患而兼收其利法誠善也逮後黃流衝刷多成支河減水過盛下游永蕭諸邑屢被偏灾上厪宸衷河臣髙斌奏將壩外迎溜支河七道俱經築壩堵塞挽流歸正復於毛城鋪口門內填築碎石以防衝深又於壩外圈築土壩依時啓閉使黃水不致減泄過多其壩下之洪溝河及睢河之灰谷堆燕子口等處向患淺阻者俱經疏治通暢下逹五湖藉以容蓄由安河入洪澤湖又將安河上游分流之謝家溝挑通下逹汴河亦歸洪湖其間紆徐曲折六百餘里均無阻滯之虞又於乾隆十一年以徐城水志長至七尺為度始行啓放毛城鋪口門至九月初一日即便堵閉蓋毛城鋪為河南第一蓄泄關鍵今得節宣有制蓄泄適宜而近河諸邑民登袵席皆我皇上洞􅊖機宜指示方略俾得遵循辦理惟查黃河大溜挾沙而行其上提下坐之勢變遷不定所有分泄引河必相度情形於漫灘無溜倒勾處所方可引放若引河口門稍有迎溜之形即應堵閉另挑倒勾引河以資宣泄惟在因時度勢酌量辦理以期悉協機宜蜀山等三湖均稱水匱其在分水口以南者曰蜀山湖周圍六十五里在分水口以北者曰馬踏湖周圍三十四里每秋冬間由永定永安永泰三斗門及徐建李家二單閘專收汶水至次年漕船盛行則由利運金線及新河頭洪仁橋各單閘次第宣泄分濟南北運河至南旺湖周圍九十三里在運河西岸適當分水口之衝伏秋汶水異漲于蜀山馬踏二湖未經收水之時先將渾濁之水由關家大閘及盛進常鳴等七斗門掣入湖中使之泄漲保堤並減運河淤墊向稱囊沙不能出水濟運乾隆二十五年在寺前閘下建設涵洞二座宣泄濟運甚有禆益四十八年因上涵洞一座樁朽根空墻石臌裂俱皆蟄陷徹底拆修改建單閘閘底落低二尺墻石加髙二層宣泄暢利三十五年在寺前閘上土地廟前添建石閘一座安置閘板相機啓閉亦資濟運蜀山湖永定永安永泰三斗門均僅寬一丈收水未足三十二年將永定斗門展寬一丈八尺于四十三年大學士髙晋河臣姚立德奏將永安永泰二斗門改建二空橋落低七寸收水甚暢復將引渠展寬培築圈堤並添建臨湖斗門遇伏秋收水先將臨湖斗門閉板攔水停淤俟水勢澄清即啓板泄入湖內不惟湖水充裕更免湖心淤墊又蜀山湖臨運一帶堤工單薄受險四十年河臣姚立德分别修砌石工並碎石坦坡各加髙頂土二尺以資捍衛汶上縣何家壩坐落汶河西岸建自前明為泄水北行入運之路乾隆十八年移于舊壩以下另建滚水石壩長二十丈髙一丈緣汶河分水口南多北少雖將南壩接長北壩收短而何家壩壩身過髙北流不暢二十五年河臣張師載奏落低二尺並濬壩下石頭口入運支河俾汶水北流不致偏少並節南流過多之勢查此壩原修兩頭均係草廂褁頭兼之壩身僅止單石一層跌水迎水又皆短窄三十八年伏秋大汛汶水漲發溜勢汹湧致將草褁頭冲塌壩身迎水跌水亦俱冲掀損壞全汶北趨幾致奪溜河臣姚立德奏明壩身全行拆修加添靣石一層迎水跌水改修寬長兩頭改建石褁頭接修雁翅俾汶水分泄舒緩以保穩固因壩髙河底五尺餘寸每逢漲水浩瀚分泄未暢四十七年河臣韓鑅將中間十丈落低一尺遇汶水長發由此分泄甚屬暢利東阿縣運河兩岸東髙西下西岸沙趙二河水發橫衝入運勢甚汹湧東岸舊有之三空五空橋及減水各閘皆髙運河水不能消不特漕運維艱附近州縣並虞汛溢撫臣鶴年曽于八里廟運河東岸刨堤泄水由大清河歸海漲消有效乾隆二十二年直𨽻督臣方觀承㑹同撫臣鶴年勘即此處建滚水石壩一座靣寬十二丈底髙運河八尺嗣奉諭落低壩脊髙于運河底七尺二十七年河臣張師載並將五空橋照此尺寸落低沙趙河水由此減泄均有限制三十一年伏秋汛內因汶河及沙趙二河之水同時並漲致將平水三閘並五空橋座均多掀塌河臣李清時奏照舊修整以資分導之利並收濟運之益衛河發源於豫省蘇門山之百門泉合丹淇湯洹漳汶之水北逹天津海口昔年清濁二漳在直𨽻境內原有支河由威縣寧津分泄逮直𨽻沙莊築壩攔截分流之路全漳歸衛每遇伏秋雨水盛行各河並注常至陡長丈餘渾流湍急無異黃河乾隆二十二年山東州縣多有冲溢之區直𨽻下游並有漲漫之患撫臣蔣洲奏加修兩岸民埝仰䝉皇上痌瘝在抱寓賑於工堤埝藉得髙厚可收捍衛之益二十五年于板閘之下建做挑水壩順溜外挑助汶敵衛每年廂修以免直灌今衛河又向西北坐灣並不直注自閘口至衛河河崖新長淤灘甚長且髙汶水出閘六十丈始與衛河合流現在淤灘較寬衛河河底亦漸淤髙汶水不克建瓴冲刷而雞嘴壩亦因變遷不能挑溜得力祗可護崖保閘四十八年河臣蘭第錫奏於汶河兩崖對做箝口草壩中留三丈金門隨時量置挨牌不使衛水散漫倒漾汶水亦廂束下注攻衛刷沙藉免水患欽定南巡盛典卷五十一
