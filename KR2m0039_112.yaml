body:
  text: 程塗乾隆十五年四月二十三日嚮𨗳統領努三兆惠奏言臣等欽奉上諭會同總督方觀承黃廷桂喀爾吉善巡撫凖泰署巡撫永貴鹽政吉慶總河髙斌張師載等公同查閲巡幸御道分派營盤尖頓由京從趙北口過山東由濟南經泰安至江南所屬宿遷縣之運河順河集馬頭旱程一千四百九十里分為二十四站由順河集登舟閲看沿途所有朱家閘九里岡駱馬湖之引河等處河工近黃河至徐家渡水程一百五十四里分為四站由徐家渡過黃河經由河堤閲看惠濟閘運河口木龍等處河工閘口至直𨽻厰營盤四十二里由直𨽻厰至髙家堰堤三十三里回鑾仍駐驆直𨽻厰由直𨽻厰登舟過淮安府城閲看髙郵東地南關車邏壩等處河道堤工由揚州府平山堂渡揚子江至金山寺駐驆計程三百七十七里分為八站由金山寺至江寧省城旱程一百三十四里分為兩站回鑾仍駐驆金山寺由金山寺至鎮江府城水程經惠山秦園至蘇州府三百二十五里分為五站由蘇州府入浙江境經嘉興煙雨樓至杭州府行宮計程三百三十里分為五站由杭州過錢塘江至紹興府一百一十五里分為兩站所往旱程一千七百五十八里計三十三站水路一千三百四十六里計十九站共三千一百零四里計五十二站回鑾不由江寧濟南減去水旱七站仍有旱程一千四百四十二里計二十八站水路一千二百九十四里計十七站共二千七百三十六里計四十五站往返共五千八百四十里分為九十七站所有分派營盤尖䪺道路橋梁悉皆仰體睿懷公同籌畫不擾民間墳塋不伐樹木不拆改房屋路徑即或稍有紆繞惟取易於修葺期於公私有益奏入報聞乾隆十五年十月二十一日兩江總督黃廷桂奏言竊查自宿遷縣之順河集聖駕登舟南蒞係順水三站方抵徐家渡由此渡黃至直𨽻厰比及回鑾則係溯流牽挽河靣寬濶風浪靡常恐致遲緩難行臣等查水路之外原有陸路隨委淮徐河道德倫查勘由徐家渡至順河集計程僅有兩站較之水程減少一站路徑平坦辦理較易臣等復加商酌如自順河集登舟各項隨從船隻出楊家莊口門必須逆流渡黃拉進清河草壩風順猶費周章風逆則挽濟更艱且進壩之後又過惠濟三閘層層啓閉魚貫而下難免擁擠臣等詢之老民人等僉稱當年聖祖南巡時隨從各船拉壩過閘五六日後方能畢渡執事供應人等竟有數日不得渡者似覺未便應請鑾駕自順河集改由陸路至徐家渡御路往回可以節省兩日其間程途較近又可免溯流需日致有遲緩而各項人員均在徐家渡以下過河彼地處處得岸所在可渡只須多偹渡船臨時官員人等隨到隨渡旦晚之間即可渡竣至直𨽻厰其一切需用船隻俱在直𨽻厰迤南一帶灣泊預偹不過量撥夫役運送各員行李入船相距不逺運送頗昜伏惟聖駕駐驆直𨽻厰大營次日臨髙家堰閲視河工有此一日之間散給各員船隻撥運行裴約計俱可辦完恭侯御舟起行即可依次隨進免致壩閘阻滯奏入報聞乾隆十五年十一月十三日閩浙總督喀爾吉善署浙江巡撫永貴奏言恭照明春聖駕南巡浙省所有杭嘉紹三郡御道經臨沿途應行預偹安䪺事宜雖經臣等先期派委文武各員查勘定議其中勘酌情形隨地制宜必須親與承辦各官詳悉講求方能布置妥協兹臣等公同提臣談行義暨總理司道各員詳加商酌查得杭嘉兩郡均屬水鄉阡陌之間湖蕩港汊縱橫交錯民間往來皆以泛艇為便即有田間小徑亦紆回曲折到處桑麻礙路自江南界至杭州陸路運河縴道寬僅七八尺直達省會舍此之外並無陸路可通凡聖駕駐驆處所一切應用物件暨各項執事人等有須由偹道馳赴前站預偹者水鄉非北路可比今臣等於江省交界至杭州勘定水路副河一道相離運河逺近不等總不出數里內外雖港路橋梁間有卑矮窄小之處小舟儘可遄行御用什物以及執事人等均由副河前進較為簡便其沿途馬匹既無陸路偹道毋庸多為預偹又御道兩傍俱應安民站圍以昭警驆之義今浙省運河惟上塘縴路寬有七八尺可容站圍兵丁下塘則桑園田墘竟有無可站立之處臣等復查勘運河兩岸支河汊港四通八達御舟經臨時無知愚民撑駕小舟從支河闌入殊失敬慎之意今酌定於兩岸之內凡支河汊港橋頭村口各安卡兵二三名臨時止遏民舟往來上塘縴道每里安設站圍兵丁三名下塘酌量安設圍兵如無路徑之處不復安兵站圍其兩岸有村鎮居民處所許令男婦老幼跪伏瞻仰仍分派官兵在彼稽查約束耆民老婦欲瞻仰天顔與紳襟生監應叩迎聖駕者皆擇空曠處所令官兵率領排列跪伏以肅體制至聖駕幸浙之時正東作方殷之候且杭嘉一帶蠶事將舉沿途有須耕耘灌溉及採桑之類亦應仰體皇上省方觀民首重農桑至意聽民間男婦盡力耕桑惟令官兵曉諭於應回避時令丁男退入村內回避婦女仍聽其力作至紹郡應偹事宜亦經酌量地方情形分别妥辦再三郡士民欣逢翠華南幸羣懷瞻雲就日之誠欲效巷舞衢歌之事各具呈請於御道左右或搭綵亭或陳水戲冀抒獻暴微忱以達呼嵩誠悃臣等因其情詞懇切令地方官酌量於河道空曠處所妥當陳設並令勿過於糜費紛沓務使閭閻安靜無擾以仰副我皇上勤恤民依省事務朴之至意奏入報聞乾隆十五年十一月十八日兩江總督黃廷桂奏言竊查自宿遷清河淮安以至揚州鎮江江寧無錫蘇州各處應需水程縴路並登陸御道臣於十月初旬民間禾稼刈穫已畢派委各員分頭趕辦兹值欽差嚮𨗳臣兆惠努三到揚逐加指示臣已飭行各處遵式修整統於十一月底可以竣工至各處近城地方有兩岸盡係民居並無縴路者臣上年雖經奏明用篙撑駕但行走終恐濡滯今嵗復加相度於民居之外搭造小板縴橋寬止二尺釘扎堅固前次臣等恭試御舟令縴夫由此挽拽通利便捷頗屬適用再查一切閣本文報并扈從執事及辦差人員往來絡繹江省一線河道千里有餘既不便梭織穿越而兩岸又逼窄不寬縴夫之外難容多人應偹副路以便行走臣令司道飭委各員按照村莊通行小徑接修並不占礙民田其有溝渠坑坎處所或加填平或搭小橋統令各該員分地親身勘辦不假胥役之手是以並無擾纍奏入報聞乾隆十五年十二月十五日工部奏言恭查皇上展謁陵寢暨巡幸直屬等處省方問俗行慶施惠凡一切經由道路及營尖地靣各該督撫均係委員敬謹辦理惟恐差竣報銷承辦之貟任意浮冒開銷是以臣部於乾隆八年奏準將營盤每座準修墊夫一百六十名尖盤每座準修墊夫八十名道路每里準修墊夫三十五名如遇皇上巡幸一次後修墊舊有營尖道路營盤每座準夫八十名尖盤每座準夫四十名道路每里準夫二十五名其應行搭蓋橋座工料及應用器具什物等項價值均經酌定章程明春恭遇翠華巡幸江浙各該州縣並未辦過差務相應請旨將臣部從前擬定修墊營尖道路準給夫工名數並應行搭蓋橋座工料數目做法及一切器具等項查明刋刻頒給令各該督撫一體遵循辦理至修墊營尖各盤務擇其寬展平坦地靣飭交各屬敬謹修墊其間或遇地窄低窪泥濘之處必須修墊者務將修墊處所先期報部至於道路遇有山嘴石岡必須開鑿或遇沙塍土坡應加刨挖者亦應先行核實估報並將製偹應用器具等項工料價值各若干分晰開載如有尖營道路已經修墊過一次者亦即於估册內一併聲明報部統俟該省報銷時臣部逐一查對按照定例準銷如是則事有成例帑不虛縻而於差務錢糧均有禆益俟命下之日臣部行文各該督撫一體遵照奏入得旨如所議行乾隆二十年十月二十七日工部奏言恭照聖駕巡幸一切供應俱動帑項該地方官報部核銷臣部自應仰體皇仁妥協辦理查直省恭辦皇上經由一切橋道營尖盤座等項先經臣部將辦差工料做法并應用器具什物成例奏明刋發各省督撫轉飭遵照辦理但查地方官偹辦營尖盤座向係嚮導統領指示修墊間有地方官自行預備如遇聖駕俱經臨幸者事竣之日準其造具實用清册報部核銷更有嚮導指示預備未經臨幸及臨時酌改越過於次站駐蹕者雖地方官已經預備向例不準開銷臣等竊思前項營尖盤座如地方官自行揣摩預備臨期未經駐蹕則所備各項臣部無憑稽核其用過各項自難準銷如所備之處實係遵奉嚮導指示預備臨期雖未駐蹕但營尖地靣業已辦妥與該地方官自行揣摩預備者不同嗣後仰懇皇上天恩將地方官所備營尖盤座等項如經嚮𨗳統領奏明指辦俱先具文報部臨期或有未經駐蹕者亦請照例一體報部核銷庶地方官辦理不致周章即不肖官吏亦不得藉端浮冒而我皇上體恤深仁益昭淪浹於靡既矣奏入報聞乾隆二十五年六月二十二日兩江總督尹繼善奏言恭照聖駕南巡江浙水路營盤自江南直𨽻厰起至杭州府止共預備大營十三座兹準部咨嚮𨗳處奏準酌量逺近共撙去三處令將指示數處所可否編作馬頭之處酌定具奏奉旨是欽此臣查江省境內共應預備撙定水路大營八座當即遴委道府遵照指示處所詳細查勘除直𨽻厰平橋二處照依嚮𨗳處奏定仍用舊基外其新定之海棠菴地勢寬濶新定之三義閣迤東一百丈地勢較敞新定之吉慶寺迤南半里之大成墟地盤平坦均堪設立大營至新定之萬夀亭該處地盤既窄兩岸居民稠密河灣岸陡難以編作營盤查有萬夀亭迤東三里之政成橋地方堪建大營又崇家灣北望亭兩處水營雖俱嚮𨗳處奏定仍用舊基但崇家灣地處背溜最易淤蟄查有崇家灣迤北七里之夏家莊河靣寬濶堪以設立大營又北望亭相距現擬安營之政成橋計有九十七里是以聖駕臨幸惠山道路稍逺查有北望亭迤北十八里之十里亭平坦寬濶北至政成橋七十九里至蘇州七十八里道路亦復適均堪以移建大營此係現在酌擬水路應建之營盤也至於自東省入江南境旱路大營嚮𨗳處原未奏請改移臣留心查看內有仰化集舊營地勢低窪易致積水且與順河集太近今擬改建於迤南十三里之林家莊以為均勻再上屆皇上回鑾臨幸徐州所定旱道營基係臨時急遽辦理地勢亦皆低窪擬將張家莊舊營移於迤東十五里之周家莊營基既皆髙爽道里亦復適均謹將江南通省水旱營盤開具清單覆奏仰祈訓示再照浙省撙定水營處所接浙江撫臣莊有恭札會以浙閩督臣楊廷璋在京靣奏安設兩處營盤地方與現在嚮𨗳處奏案未符業已繕摺請旨遵行奏入報聞乾隆二十五年八月初九日山東巡撫阿爾泰奏言恭照明春翠華南幸營尖橋道理宜敬謹預備臣接準工部咨恭悉嚮𨗳統領奏準自江南直𨽻厰至浙江杭州府撙去尖營三座可否編作馬頭令該督撫等詳查具奏并知照東省臣伏查乾隆二十二年聖駕南巡啓鑾經由東省自德州劉智廟至郯城紅花埠交界計程八百零二里初經嚮𨗳查看擬分一十五程內德州靈巖泉林備有座落三處其餘安設大營十二座尖營二十五座奉旨撙為大營九座尖營二十一座聖駕回鑾經由東省自嶧縣韓莊至德州劉智廟交界計程七百三十二里初經擬分一十三程於曲阜靈巖德州三處座落外安設大營十座尖營十七座奉旨撙去尖營三座皇太后回鑾係照起鑾時嚮𨗳所擬程站明春鑾輅經臨官民望幸臣查勘上屆營尖道路俱係寬敞平坦鄉民言及安營除道咸覺欣欣色喜各思踴躍爭先臣謹照乾隆二十二年聖駕經由路程及所定營尖開具道理清摺恭呈御覽奏入報聞乾隆二十五年十月二十九日兩江總督尹繼善奏言準軍機大臣行知內稱本處於七月十九日具奏遵奉諭旨會同嚮𨗳查得自順河集至直𨽻厰現定大營四座令改為水營三座由運河行走查對圖説均可改為三座水營但隨從船隻甚多俱走運河過天妃閘時地窄必致壅滯若將皇太后皇上御舟預備順河集由運河行走隨從船隻仍備在直𨽻厰即屬可行但隨從旱營如照依圖説官貟兵丁當差似覺稍逺請將隨從旱營在於皇上駐蹕水營相近安立謹將原圖撙改水營之處恭呈御覽俟欽閲指示交與督臣尹繼善如可照依所擬圖內改辦即令其更改設有不能照此改辦之處聲明緣由具奏奉旨知道了欽此臣查皇太后皇上御舟預備順河集由運河行走道路雖屬便宜但運河兩沿坡岸甚髙又有大堤移送圖內簽定駐蹕水營相近均係偏窄窪下之地並無官貟兵丁當差近便可安營盤之處且御舟由運河出楊家莊渡黃設遇風信不順實屬難行轉入清口內河過天妃等三閘湍流甚急汛水暴長風信難以預定臣再四思維實有未便仰懇仍照前奏由旱路自徐家渡過黃至直𨽻厰再行水路奏入報聞乾隆二十七年二月初一日兩江總督尹繼善奏言恭逢聖駕南巡先於乾隆二十六年十二月內接準部咨回鑾至順河集分營皇太后由水路抵通皇上至徐州由陸路進京經嚮𨗳努三於江省境內指定自順河集以北編設水營四座兹於本年正月十七日復準部咨據嚮𨗳將順河集以南乾隆十六年經由水營舊址應否預備之處一體繪入圖內奏奉諭旨自直𨽻厰至順河集馬頭大營德州馬頭大營全行預備欽此臣等伏思自直𨽻厰至順河集既奉諭旨預備馬頭大營是渡黃至徐家渡以後皇太后必由水路至順河集皇上是否同由水路未奉訓示恭查水陸兩路道里適均若聖駕回鑾自徐家渡同由水路至順河集似更妥便臣等親詣該處詳行查勘現照淮南水營寬深丈尺一體敬謹預備恭候聖駕奉皇太后自徐家渡仍舊乘船至順河集再行分路惟查自直𨽻厰渡黃經由閘壩船隻提溜而上必須銜尾單行不能迅速所有隨從皇太后回京各項乘座船隻自應全數渡黃至隨從皇上各項船隻若概令濟渡未免稽延時日應擇緊要執事人貟乘舟隨行餘俱仍走陸路住宿旱營統計隨船不過數百隻皇上駐蹕直𨽻厰之日酌定隨從之船先行濟渡次日聖駕渡黃之後仍請駐蹕徐家渡旱營少為停待臣等多派文武大貟催挽船隻日夜遄行不致遲誤再查嚮𨗳所指徐家渡以北之李家莊尤家灣兩處水營雖係十六年經由舊址但與今次旱營相隔十三四里恐陸路隨行官貟應差不便若即於水營屯住沿河地靣褊窄難以擴充臣等親加察勘有陳家道口中林家莊二處可以編設水營較之舊日基址雖略有更移而地勢更覺平坦相去現在旱營只有三四里較為近便除已派定官貟敬謹預備外合將順河集以南水營編近旱營恭請聖駕自直𨽻厰同由水路至順河集分營之處臣謹會同撫臣陳宏謀繪圖貼説恭呈睿覽奏入報聞乾隆二十九年十月初十日山東巡撫崔應階奏言恭照明春鑾輅南巡經臨東省臣率同司道敬謹籌辦東省風土簡朴臣又賦性愚拙諸凡料理恐未合宜因上屇差務臣隨同前撫臣阿爾泰勷理一切俱有成規臣當勉力照辦兹查嚮𨗳奏定營尖道路東省境內自德州至郯城計程陸路八百二里分為十三站內行宫四處大營九座尖營二十二座回鑾經由運河自嶧縣至德州計水路一千一百五十六里分為十四站除常家口水營歸江省沛縣承辦外東省共水營十三座又皇太后自德州至袁樓水營一座以上各處水陸營尖橋梁道路縴道馬頭乘此天氣晴和民間種麥早竣現俱次第儧辦臣往來查勘已有就緒內如楊家莊大營地勢窪下建設大營未甚妥協查費縣之萬松山舊有預備房屋原係尖營臣即就預備房間添建數椽擬備座落較楊家莊稍有山水之勝但萬松山距上站東京堡大營止十里距下站橋頭大營尚有一百四里敬擬勻撙適均請自泉林至永安莊尖營改為大營計五十三里自永安莊至萬松山計五十八里自萬松山至孟家泉尖營應改為大營計八十三里自孟家泉至郯子花園計七十八里仍屬適均其中尖營亦酌量逺近撙勻一二處又如禹城縣之陳家莊大營泰安縣之魏家莊大營此二處土性鬆浮風起多灰臣因陳家莊大營稍南有晏子祠魏家莊大營左近有四賢祠該處地勢平坦已俱加築圍墻一道以避灰土墻內建有房屋數間皆不過就其隙地粗備數椽瓦房稍供宸憩並不敢建造行宫所費工料無多上屇蒙聖恩賞給帑銀二萬兩儘足敷用並無絲毫出自臣民前撫臣阿爾泰在東時原已商酌建蓋臣思於此二處粗備房屋則東省十三站中大營與座落依次相間行幄只須一分此外如恩泉靈巖泉林郯子花園四處臣凛遵二月十四日諭旨不敢稍增繁費即裱飾修理等項亦酌量完好整潔者皆仍其舊以期仰慰聖慈再德州運河西岸因奏明新挑引河一道聖駕到德如循行舊路則相隔重河今恭擬往南里許統過引河由運河浮橋進恩泉行宫似更穩妥合并陳明奏入上諭曰知道了屢有不必修建之旨而汝竟已措辦所謂成事不説耳乾隆二十九年十一月十五日兩江總督尹繼善奏言恭照明春聖駕南巡各處水陸營尖道理經嚮𨗳統領處繪圖粘簽具奏皇上回鑾由水路至韓莊閘水馬頭起旱往徐州閲視河工仍從舊路回韓莊上船奉旨知道了自萬年倉馬頭大營前往徐州似屬便捷著尹繼善回任之便看明具奏欽此臣查自萬年倉馬頭大營前往徐州較之至韓莊大營起旱赴徐可省自萬年倉至韓莊一站水路誠如聖諭原屬便捷臣回南路經徐州即親往查看自萬年倉大營至徐州雲龍山計九十九里五分內江南境內道路俱屬平坦易於辦理其自山東萬年倉起至江南銅山交界一帶道路窄狹村房紆繞地勢髙低不平支河山溝甚多且係淤土一遇隂雨泥濘難行臣復飭行道府通身細看將作何設法填墊詳悉熟籌兹據該道府稟覆該處道路全係淤土即幫墊新路一遇隂雨甚屬難行况以尋常里數計算即在百里以外一日程途亦覺太逺臣再三斟酌恭請聖駕仍由韓莊大營起旱往徐州計程八十里道路平坦似覺妥便奏入報聞乾隆四十四年正月十九日直𨽻總督周元理奏言恭照乾隆四十五年春間仰蒙聖主俯允江浙臣民所請重舉南巡盛典所有蹕路經臨直𨽻地方計程五百五十九里向分八站自良鄉縣黃新莊行宫之外涿州城南新城縣紫泉任邱縣趙北口及思賢村河間縣太平莊獻縣紅杏園景州絳河七站皆舊有行宫祗須略為修理即可預備駐蹕其沿途橋道尖營均有乾隆三十年嚮𨗳查勘奏定章程當經飭據地方官查報原有地盤基址均可遵照查辦臣謹遵諭旨將行宫尖營橋道按站開列程途總摺恭呈御覽至各處行宫並無鹽政承辦之處臣於差竣後即由河間至景州詳細查勘酌定分别辦理合并聲明奏入報聞乾隆四十四年二月初六日山東巡撫國泰奏言恭照乾隆四十五年春聖駕南巡經由東省自直𨽻交界入山東德州境至郯城縣之紅花埠出境計陸路八百二十一里分為十四站上年正月經臣靣奏自德州之恩泉至泗水縣之泉林計十站各處俱舊有行宫酌有安設尖營及道路橋梁俱應遵照四十一年東巡章程辦理自泉林至郯城出境計四站內如萬松山郯子花園二站係舊有行宫毋庸另建其餘二站經臣靣請於費縣之注經臺郯城之問官里添設行宫二處已蒙俞允臣恭照乾隆四十一年聖駕東巡東省添建行宫二座係鹽務公辦一座今因拆改各處舊料即為添建行宫之用所費較省臣敬謹督率妥為修造無需鹽務公幫但恭遇鑾輅經臨鹽務官商情殷報效今據運司等稟懇恭辦問官里一處陳設似應俯如所請俾得展其誠敬所有此四站道路橋梁俱應遵照乾隆三十年南巡章程辦理但臣查泉林至注經臺計程五十三里向止安設純厚莊尖營一處查係四十里以上應請安設尖營二座今擬於相距泉林十八里之栁莊又於相距栁莊十九里之蔡家莊各安設尖營一座又自萬松山至問官里為一站恭照乾隆二十七年聖駕自費縣之萬松山至郯城之孟家泉駐蹕乾隆三十年經前撫臣崔應階因孟家泉地勢低窪改於附近之黃家埝安設今于問官里添建行宫計程八十里較黃家埝較近而地勢亦髙是站向於楊家莊山前莊二處安設尖營二處又自問官里至郯子花園為一站計程八十一里向於橋頭仁里莊二處安設尖營二座臣查此二站安設尖營相距二十餘里及三十餘里不等無四十以上之處應請舊舊恭辦至各站行宫有需拆改舊基恭擬旁建天章閣三間敬奉御書墨拓尊藏恭貯再臣恭照聖駕回鑾由江南之黃林莊入山東境第一站係嶧縣之萬年倉第二站係滕縣之韓莊乾隆三十年聖駕回鑾自韓莊水營由陸路至江南徐州閲視河工駐蹕徐州府之雲龍山行宫仍回至韓莊由水路北上上年正月臣靣奉諭旨仍照前恭辦又恩縣石屯汛水營至德州恩泉行宫河道紆回計程八十里上年正月經臣靣奏請自石屯汛由陸路至德州計程止四十七里已蒙允準統計水路自江南入境至恩縣石屯汛共一千一十四里內惟常家口係江南沛縣地方其餘十三站俱係山東境內以上陸路水路差務臣惟有仰體聖慈凛遵訓諭率屬敬謹從實辦理不致稍有糜費即如河道有水之處應設橋梁但明嵗春初尚非發水之時止應酌量水靣修建其河灘乾地儘可修墊馬頭不必多費木料匠工惟水營板房原有舊存木料臣擬率屬敬謹辦理裝修謹將水陸程站里數開列清摺並將經由水陸各州縣境內河道古迹添纂條目一併恭呈御覽奏入報聞又奉上諭曰自泉林至注經臺此站五十三里向於純厚莊安設尖營一處止須照舊毋庸添設乾隆四十四年三月十七日閩浙總督楊景素浙江巡撫王亶望臣等伏思翠華巡幸慶洽東南除道清塵實臣子分內之事况絲粟悉資內帑又荷隆恩特沛恩賞辦差銀十萬兩經費充裕更屬易辦乃復上勤宸眷特頒諭旨訓示周詳臣等惟有督率屬貟敬謹遵辦所有江浙交界處所營盤已委大貟會同勘明悉照上屇辦理並無更易其省城內外行宫以及各處景亭名勝節年以來本係隨時修理今不過略為葺治斷不敢踵事增華以期仰副慈懷合將行宫古迹暨程站營盤謹遵旨繪繕圖説分晰開列清摺恭呈御覽奏入報聞乾隆四十四年四月十二日兩江總督薩載江蘇巡撫楊魁奏言恭照乾隆四十五年聖駕南巡自山東紅花埠入江南境至黃河渡黃馬頭計程五站內順河集陳家莊兩站係舊有行宫其龍泉莊林家莊徐家渡三站旱營前督臣髙晉在京奏明俱已改建行宫臣前經委貟查勘妥辦除林家莊係於旱營舊基建蓋外其龍泉莊旱營舊基地勢低濕不便施工於舊基西南二里勘定髙燥平坦之地敬謹建造又陳家莊至徐家渡一站計程三十九里九分但徐家渡旱營舊基逼近河堤地亦低窪因於迤東九里之桂家莊擇地恭建聖駕自桂家莊起鑾閲視新改李家莊運口並楊家莊運口計程較近又陶莊新河攔黃順黃二壩一切情形將來聖駕親臨閲視指示機宜臣薩載在浦時酌擬於陶莊河神廟西首添建座落數間恭備翠華憩息至渡黃渡青各道路已與上屇不同復經委貟查勘并咨會署河臣李奉翰飭令河貟將經由道路詳細繪入總圖其餘江南境內營尖道路俱係照舊並無更易至各處行宫名勝及各項差務臣等惟有凛遵聖訓督率所屬敬謹撙節辦理斷不敢稍有糜費踵事增華以仰副聖主省方問俗阜成兆民之至意奏入報聞乾隆四十五年四月三十日閩浙總督三寶浙江巡撫王亶望奏言恭照聖駕臨幸海寧閲視塘工上年臣等奏明鑾輅到浙先由石門縣何家橋過長安壩至海寧奉硃批照三十年之例欽此兹查何家橋一路河道橋梁合之御舟雖可經由苐連日天氣晴和水勢不免少減恭查乾隆三十年接準行在工部咨開嚮𨗳統領處奏由海寧縣至石門縣河道自石門縣南營汛關馬頭起至海寧縣三十五里河道可容如意船行走皇上行至石門縣南營汛關馬頭換如意船行十六里至長安壩外備如意船至海寧陳園十九里合算自石門鎮馬頭大營至海寧陳園共五十九里奉旨知道了記著再走預備此路欽此查石門縣境南營汛關馬頭即迎薰館前之馬頭今次聖駕臨幸迎薰館應請在於迎薰館馬頭換坐如意船直抵長安新壩實為妥便所有嘉興恭備之如意船伏候命下帶往石門迎薰館恭候聖駕乘座奏入報聞乾隆四十八年十月二十八日嚮𨗳統領處奏言據兩江總督薩載咨稱明嵗皇上巡幸江南等省遵旨將江省桂家莊行宫移改楊家莊高旻寺行宫起至金山行宫回鑾時將徐家渡馬頭大營移改新莊備用又自金山行宫起至徐家莊由髙閣莊花鮮壩劉家邉等處至寶華山自寶華山由青龍嶺至龍潭行宫等因具咨前來理合奏明奏入報聞乾隆四十九年二月十六日兩江總督薩載江蘇巡撫閔鶚元奏言恭照聖駕臨幸江浙江南境內自山東郯子花園交界起至蘇州南斗墟入浙江境止水陸計程二十站又聖駕回鑾自南斗墟起至常家口入山東境止水陸計程三十一站分繪總圖並將沿途經過各府州縣地方行宫名勝繪具全圖恭呈御覽奏入報聞乾隆四十九年三月十三日閩浙總督富勒渾浙江巡撫福嵩奏言恭照聖駕臨幸海寧係由石門縣迎薰館馬頭換坐如意船前至海寧長安新壩查上屇曽請將嘉興恭備之如意船帶至迎薰館備用屇期河路擁擠船隻未到以至遲誤此次臣等已於迎薰館馬頭敬謹添入如意船一隻恭候聖駕乘座至長安新壩再換壩外如意船幸海寧州城理合奏明奏入報聞欽定南巡盛典卷七十九
