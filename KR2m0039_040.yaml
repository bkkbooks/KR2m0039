body:
  text: 欽定四庫全書欽定南巡盛典卷二十八恩綸乾隆二十八年十二月十七日上諭內閣曰兩江總督尹繼善等合詞具奏請于乾隆乙酉年再舉南巡之典以慰臣民顒望一摺朕惟江浙地廣民殷一切吏治農功均關要計且襟江帶河濵河近海之區籌護澤國田廬無一不重縈宵旰前以壬午嵗恭奉安輿時巡周覽凡淮河水志莭宣閘壩啓閉以及杭屬塘工勘建柴石料假諸事宜曽與封疆大吏目擊手畫以期利濟羣生年來疊經督撫等疏報下河郡邑泛水恬流並無漫溢唯是浙中海潮漲沙雖有起機大溜尚未趨赴中亹是深所厪念而新修柴石諸塘亦當親閲其工以便隨時指示又近日特遣大臣督修水利如濉河荆山橋等處亦為數省灌輸喫緊關鍵所以驗前功而程後效正惟其時矧東南嵗時頻告豐登洪惟聖母皇太后福履康寧彌增純嘏于是承歡行慶答士民望幸之忱稽典實為允協著照所請于乙酉之春􅓪吉南巡其河工海塘應親臨省視者即行先期預偹至前次燈綵繁文暨扈從人員雇覔巨舟簽占公館諸禁已屢頒諭旨即朕所過行宫道路距上屆為日匪遙祗須灑掃潔蠲足供頓憩不得稍事增華勞費副朕仰承慈豫俯順輿情之至意將此通諭各該衙門知之乾隆二十九年五月初三日上命軍機大臣傳諭兩淮鹽政髙恆曰著傳諭髙恆于兩淮運庫公項內酌撥銀三十萬兩交與尹繼善為乙酉年辦差之用乾隆二十九年九月二十五日上諭內閣曰朕明春恭奉皇太后聖駕南巡著照從前之例于江浙二省冬兑漕糧內各截留十萬石在水陸駐蹕地方分厰平糶即令漕運總督及各該督撫妥協辦理該部遵諭速行乾隆二十九年十月二十三日上諭內閣曰朕明春恭奉皇太后安輿巡幸江浙于正月初九日起鑾所有一應事宜著各該衙門照例預備乾隆二十九年十一月十二日上諭內閣曰明春南巡江浙所過直𨽻山東及江浙等省地方其應辦差務原不過就屬員中酌量派委非各屬各員皆有承辦之責即派出人員于緊要民事自可先期趕辦俾案牘速清方為急公之道乃聞向來有司故習率以差務展限為詞所有民間詞訟等案任意稽延不為尅期完結豈朕察吏安民本意著傳諭各該督撫等即行轉飭所屬凡應理事件毋論派委不及者固不得因循推諉即派出人員其應辦之事亦當乘此封印前後加緊料理倘有藉名遲滯以易結之案遷延貽誤必待差竣辦理者即應力破情面加之創懲使小民不致羈留拖纍以副封疆表率之任朕于該督撫等有厚望焉乾隆二十九年十二月初四日上命軍機大臣傳諭直𨽻總督方觀承等曰方觀承查奏直𨽻辦差州縣出結一事所奏殊屬顢頇此等積弊固由地方官所用胥役長隨藉端開銷以便其中飽之計遂爾盤踞把持牢不可破及至查究根源此等庸吏又安肯據實開陳自干罪戾該督從前既據屬員之言輒行入告逮降旨詳查又以無從根究為詞殊不思若輩小人藉名舞弊固不足惜而車駕所經一切毫無供頓而長隨人等竟有以支應名色從中滋為口實其風猶可長乎在前此官更吏易此時即實有難于逐一質對之處而明春南巡在即現已先諭總理行營暨提督衙門沿途加意察訪該督務須先期嚴飭地方官一體力行防範禁革如有另換名色别生弊竇者該州縣官立即扭稟總理行營處治罪倘不能查禁一經總理行營處察出則惟該督是問並傳諭山東江南浙江各督撫知之乾隆二十九年十二月二十四日上諭內閣曰前經禮部奏請于正月初五日舉行祭辛典禮是以降旨于初九日起鑾恭奉皇太后安輿巡幸江浙但初五日在立春以前為時尚早應俟春後初辛舉行於義方協所有祈榖典禮著于十五日舉行起鑾之期著改為十六日將此傳諭各該衙門並各該處知之乾隆三十年正月十一日上命軍機大臣傳諭兩江總督尹繼善等曰此次南巡衍聖公孔昭煥尚書嵇璜俱現在制中不必前來接駕如伊等尚未起程該督尹繼善該撫崔應階可即傳諭停止如業已在途亦即令其回籍乾隆三十年閏二月初七日上諭內閣曰朕時巡江浙清蹕所經恩膏疊沛軍民士庶無不忭舞臚歡而清理庶獄亦矜恤所宜逮用循舊典以廣深仁著將江蘇安徽浙江三省軍流以下人犯俱加恩各豫減等發落俾得改過自新勉為良善共享太平之福欽定南巡盛典卷二十八
