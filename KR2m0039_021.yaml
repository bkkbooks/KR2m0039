body:
  text: 欽定四庫全書欽定南巡盛典卷十二天章乙酉江南詩入江南境雨霽仲春初策驄却輦輿瞻依從衆願長途雖御輿輦毎策馬則民得遂瞻依趨隨幾至萬人亦盛事也呵禁戒相於弗令侍衛呵禁羣情益喜竟集鞭鐙左右矣麥露含平壠栁烟䕶逺墟劃圻各迎送分野異青徐民望真憐彼江浙之民望幸者多河防益厪予入疆欣幸者氣象較前舒淮徐向為瘠土毎嵗被災邇年疏濬六塘水有所歸幸逢連嵗有收民間氣象較前畧蘇為之欣幸四依皇祖示江南大小諸吏韻士不談王道或致笑樵棷而况任保障民瘼應細剖繄予巡江國三年隔未久入疆古有慶要務安黔首漢良二千石召父與杜母政不在催科心惟籌畎畆揚徽彼居前繼美誰當後其司水土臣金隄在鞏守文武縱殊途和衷貴相友前度示訓言已勒琬琰夀賡韻重申意實踐毋虚負度永濟橋再叠舊韻作歌長橋卧波如虹迤中泓有水旁無水夏秋淫潦藉此消前人建議所由起其如六塘填閼多重臣命徃悉心視湖水由橋下注為六塘河河中尚多閼埂夏秋漲氷宣洩不暢輒漫及田廬前巡經臨籌度命大學士劉統勲等上下履勘定議濬壅培堤俾資利導土水合穰俾剔導大禁淤田侵河裏責成則各有司存六塘舊無専駐之員土人侵占河淤莫知節制又尾閭横經鹽河商利蓄而民利消唘閈所闗綦鉅自前巡增設牐壩且簡㕔員移駐董事章程始為可守怠緩從事将罪爾三年以来頗見效秋禾未致為波毁下民清問較前蘇乃知事在人經理臨斯上祗切恫瘝善斯後莫懐矜恃此去淮黄審所行兩言敬畏常銘以六塘河叠舊作韻治水無奇術要當使歸海駱馬之下游厥有六塘在疏斯受利益淤斯受危殆而何久因循弗謀更張改徃勘命諸臣事在壬午載地利相機宜民瘼救吝悔僉同亟舉後肯作道謀待咉咽與濬通卑薄與培倍鹽河置閘壩節宣有定楷自兹潦歸壑耕犁得興乃力田免水患民自以不怠近嵗頗穫收閭閻象熈愷詎予獨㫁臧實藉羣言採順河集行館叠舊作韻橋過永濟不多程行館西鄰宿預城数宇瓦房樸非舊周圍布帳制如營南来行館率簡樸非宫殿比至此處則益令從約内則数宇外列布帳為周廬仍如行營之制栁絲墻外揺還弱蘭朶階前馥以榮到處懋勤供研匣捨斯何用遣閒情賜江南總督大學士尹繼善綸扉昨已命和羮江國仍資扈蹕行明代稱賢必王守仁石永漢家推盛則韋賢平當封疆㡬處皆時望旌節世年獨老成亦識心殷依北闕待宣入閣賛樞衡賜協辦大學士刑部尚書仍管江蘇巡撫莊有恭重教任蘇撫近復擢秋卿豈不輕車藉要資法網平蹕途暫留扈翰幄自歸并莊有恭早官待從厯典封疆昨謝陞刑部尚書摺深以仍趨侍内廷為喜徳政吳松在何曽譲畢亨明畢亨開吳松江大恵民前年莊有恭亦奏請疏治蘇松湖􅍩圩蕩各工過宿遷縣大隄臨運水宿預過名城煙火隔隄庶倉箱際嵗亨殷勤詢吏治親切愛民花栁遅何碍寜因攬勝行隄上四首淮北由来本瘠土六塘疏治起耕畬迎鑾萬姓休稱頌為汝宵衣尚愍如累跡摩肩隄上鋪果看氣象較前蘇寧徒云慰畢吾事駢駢叠恩綸有後圖夾隄栽栁為去聲河防河兵例於隄内外種栁以供下楗之用髙下成行䕶野塘却是春風不相讓䡖揺絲縷半薫黄大隄内外麥菁蔥食接青黄跂望中趨覲萬民略塵坱恰欣細雨潤濛濛過仰化集自警策馬重過仰化集因之返已深長思三年必世斯已厯風醇俗美夫何時長官宣訓有典故毎月朔望有司宣聖諭廣訓耆庶環集祗聼以廣教化著在令甲家喻户曉誠難其設曰程督俾盡力矯枉恐益騷擾滋神禹惜隂乃敏徳大舜南面臻無為富猶艱致教豈易顧名安得不忸怩降㫖免宿遷等四縣本年正賦十分之五詩以誌事憶我三畨曾過此滿目民艱恫瘝視蠲租加賑不少靳䆒亦無能瘡痏起壬午之嵗博咨訪略覺其中悉源委因之疏剔六塘河果然潦退堪耕耜人事盡而天貺隨連嵗秋收皆穫美兹来殊覺大改觀慿輿厯覽心生喜户有葢藏育鷄豚衣鮮上聲褸裂贍婦子不災不賑奚所加䆒欲加恩念無已因思時巡免正供十分之三常例耳数縣瘠土應倍憐益三至五斯可矣留有餘用蘇茒簷減一半惟投縣匭佇看元氣復閭閻庶協以休以助理雨二月初十日雲容兩日宻鋪空曉霧旋霏細雨濛故識江南此易致却思移澤遍齊東賜江南大小諸吏食因示志負弩概勞勤肆筵恰衆欣聫情交泰陛霈澤叶需雲是日值雨因各賜帛為霑衣也後樂吾猶惕先憂誰共分恵鮮端有要所望莫孤殷清河道中雜詠夜雨逹晨曉未晴大隄以上御車行山東塵土江南濘轉眼如人無定情迎鑾黎庶聚猶多雨裏那曾笠與簑愛敬真如子於父可無恵保計如何御營将近忽開晴隔岸清河見故城遺跡元明籍可按孰非保障為民生和門近對運河濵来徃誰何禁不申瞥過風帆信如畫明朝也是畫中人閲中河東西悉屢更惟此協中行聖制利千古中河定利皇祖相視所賴無窮時巡仰大成黄河南滙近汶水北分清擬命溯洄舫詳觀濟運情向来南巡返蹕皆遵陸今年命由水路御舟而還欲以觀運河節宣情形亦要務也楊莊牐四依皇祖詩韻通漕北南千里餘審形建牐俾紆徐臨黄最以斯為近䖍鞏節宣計漫踈仲春遲日靄晴絲玉馬觀民轡緩移叠跡摩肩縱瞻就不訶七萃早羣知渡黄河六韻雨霽物熙春風恬波静淪綵棚叩靈瀆渡河時有司于北岸具綵棚為躬祀河神之所瓣香展敬始登舟徑度畫舫發通津恵濟祠名瞻前見慈寜奉四巡安瀾一川喜彼岸片時臻天意昭恩佑人情愜愛親自維何以答勤政與仁民恵濟祠河畔崇祠金碧煌渡河瞻禮敬誠将代天敷佑今兮古行地昭靈清與黄利渉徃来賴神貺升香楮帛籲民康敢云錫羡由昭假慎徳惟殷勵不遑觀清口出水誌叠舊作韻審悉洪澤患率縁清口壅東西束兩壩惟留一壑送此固具深意蓄清敵黄縦所以靳拆壩亦半惜費葑然其勢既盛又當權輕重何必恃五壩髙堰盡處設仁義禮智信五壩以為洪湖尾閭之洩俗所謂天然􅄵也一過水而下河無不被災之理向屢有詩云有尾閭供久度入聲略知要欲救為魚痛獨㫁示機宜初不資紛訟尺寸慎詳計毎壩口水誌増長一尺即令清口拆開十丈凖是為式然後上下節宣嵗無嬴縮拆收在敬用河臣奉此策年来豫留空五壩未過水幸哉言偶中計其拆收費帑金数萬動下河連年收曽弗驚􅀈洶損益多少間昭然知者衆觀民與觀河豈可辭倥偬隄上相咨詢珠勒轡緩控株守亦非佳推行貴錯綜茍其利吾民慰哉奚勞頌過清口觀木龍六韻清口乘舟渡木龍欲審觀試非虚費帑建一木龍計費至萬金果見有淤灘閲罷西涯戀泛迴東岸歡渡清口而西縁隄閲視木龍四悉其掛淤情形因相度河勢於陶莊積土相對處諭河臣添建木龍一具俾益收桃溜之用事畢旋艤西涯之民有戀意而東岸之民益歡迎何曽嚴蹕路竟是近隨鞍幸不為民畏由来以子㸔河工謀保障安得弗心殫木龍示總河髙晉作積土陶莊勢久成逼黄恐致漸侵清曰斌重舉木龍製此宋陳堯佐法髙斌效而為之汝晉仍於沙渚營南漲北坍雖有效前巡相度清口允髙晉請添建木龍以資利導兩載以来南岸新漲灘二百六十餘丈北岸刷去舊淤一百四十餘丈䕶工挑溜已著成效揚湯止沸可無驚河工艱一勞永逸補罅期輸爾我誠閲河四依皇祖詩韻閲河厯厯仰堯營挈要云由地裏行稍事調停在清口下河連嵗幸收成河臣向皆靳拆清口平時節宣未暢下㳺易遭漫溢壬午春巡定制以髙堰五壩水誌髙一尺清口即開放十丈為凖下河頻年不受水患嵗穫亦慶屡豐清江浦渡河今日莅清江沙岸邉旁艤鳯艭便覺景光非北地行㸔佳麗到南邦建牙近守金隄固總河衙門建于是以近清黄交㑹堤工最要置牐永期玉柱杠恵濟閘為通津最要闗鍵向晚澄波印新月謐人神思果無雙賜江南河道總督髙晉叠舊作韻東南稱澤國保障畀雙旌詎在工穿鑿惟應盡敬誠隄堅幸黄刷口拓暢淮清年来清口宣洩之法髙晉善體朕意於啟閈尺寸一以髙堰五壩為程不惜拆清口壩之勞費是以屡年五壩不過水下河田廬並資利益實爾推行善毋湏揚頌聲過淮安府漂母祠邉暫據鞍射陽城裏徹鳴鑾竟成減從還輕騎都為民親與俗安縦喜市頭平米價那無簷底嘆衣單孳生庶更謀生窘不見其熙祗見難閲淮安石隄再叠前韻河工於何艱艱惟亘徐海山陽處其中人烟庶更倍所恃惟一隄因命以石改雖非探本計粗安賴厯載皇祖有徽猷功同禹乘橇動皆合天人舉必䆒源委藐予四南巡䋲先志勤毎曰述實非作仍以遵神楷隄髙将埒城詎曰安非殆淮黄茍暢消為魚憂庶罷顧咨司河臣莫恃兹晏愷常凛一心畏俾免萬民駭賜漕運總督楊錫紱内供卿貳外封疆司運今畨政最良不必精嚴事皆就善于驅使衆胥㐮即今水次排南舸弗誤秋来到北倉楊錫紱奏今嵗南巡漕船於水次分别前後頓置且二月逄閏定當如期抵通更議僉丁蠲積習向来軍籍各户多攛易規避甚至藉捐銜冐考為巧於詭脱之計楊錫紱條奏立法禁治凡紳衿請托一概除屏不徇流俗審應臧過寳應縣鳯舸泊川塘城闉緩控韁欲求萬民晏慎選有司良直道由来久平安亦自臧縣志漢時為平安縣至唐上元間因得定國寳改今名上元因得寳改縣失荒唐晴三首江郊宜雨更宜晴麗景迎㬢嫩暖生催漕去聲東南風豈碍江南春月多東南風俗謂之催漕北上也漲添順水送舟䡖東南風旋去聲轉西南藉卜開晴有俗談南方俗諺風西南得晴占雲散日輪光尚淡入波疑是玉蟾涵栁態蕪姿入畫情隄梅又放兩三英似傳鄧尉催人意却為觀民不䟎程過髙郵州覆盂城北艤行舟玉勒城中厯覽周建置詎惟圖目覩資生要欲悉心求下河獨㫁幸無澇前巡審悉河湖形勢因命河臣視髙堰五壩過水尺寸拆清口以洩洪澤之漲連嵗下河得免水患並獲有秋連嵗羣稱歌有秋馬首拜恩亦奚藉哺孩寜復望其酬車邏壩車邏諸石壩所以洩狂瀾洩之水猶盛増置東西灣丁丑南巡以髙寳湖河入江未暢因命于金灣加寛引河中閘増置石壩而東灣滚壩則令落低壬午春親莅籌度並令将西灣滚壩落低四尺俾成建瓴之勢亦謂悉心謀其如多来源洪澤過五壩厥勢誠滔天詎此所能救坐看潦下田因謀抽薪計拆壩清口宣為之定尺寸寛窄相衡權前巡諭暢開清口以洩洪湖視髙堰水誌如過水一尺即拆開十丈節宣永為定制年来守此䇿洪澤洩漲前天恩更未澇五壩無漏泉車邏常封土清口既暢湖水宣洩有資車邏始得堅閉下河頻年幸不被水遂致屡豐下河有收連厯覽為額慶吾言中偶然而此詎敢矜惟益勵惕乾初逰上方寺灣頭遥見起平岡聞説精藍有上方雖是徑蹊畧紆轉果然松竹不尋常八禪漫論通其要萬姓尤欣副所望馬足紛隨定何碍躪蹂惟惜麥抽芒萬姓隨馬足趍瞻竟有踐踏麥苖者既不忍嚴禁呼令莫履麥田彼乃不聼也香阜寺龍角蜀岡低香阜俗又謂之小五臺葢蜀岡盡處如龍之角云花宫湧地棲浮樓過運水下馬叩招提三載誠倐爾千秋可例兮天寜知不逺易舫進前溪天寜寺再叠前韻作八㑹窮源開舍衛三明極地演迦陵雖云蕪郡城北郭已似四禅天上層馬到門前知路熟鳥来簷下聼經能昔題著處逢迎是不異今朝惬賞凴駐蹕天寜寺行宫叠舊作韻曲徑相通向右邉了知行館最清便綪旌又駐仲春月香扆何殊壬午年嘉䕃仍看喬柏峙幽芳已有早梅妍大觀堂裏披書坐無逸當前意悚然九峰園小憇觀民緩轡度蕪城宿識城南别墅清縦目軒忩饒野趣遣懐梅栁入詩情評奇都入襄陽拜園有九奇石因以得名非山峰也舉数去聲還符洛社英小憇旋教進烟舫平山翠色早相迎蓮性寺一瓣一不虞韻皆具性萬不萬瓣性皆空􅋔嚴塔院有如是無盡光明碧水中功徳林竺宇平山左厥名功徳林石磴雖不髙亦足具四臨右俯適来川絲管猶繁音左挹麥塍緑實覺娱吾心視聼胥且置一思功徳義譬如恵心者勿問孚恵意佛無物不度度亦不居恵是則功與徳二字将何寄微覺調御笑語言實兒戱題平山堂鬰律山堂倚碧嶒建時猶是紀廬陵羶薌佳勝七百載嘯詠風流四五朋必有真能被民澤不然何以至今稱重来拱讀奎章煥旌淑原從漢詔徴大觀堂叠舊作韻南巡重莅止寧為恣娱觀展也必由義樂兮敢渉盤何来此有覺恧若未遑安益勵甄心戒深防適已歡餘閒聊可棄精藴亦因殚在上思羲象䕫䕫祇見難降㫖免江南熟田未完欠項並将江蘇經過州縣均免十分之五詩以誌事唘鑾前免百􅜼萬實指災田所欠尾入疆詢知江北多江南纔三萬而已是則江北被恩重江南無災恩薄矣因問熟田或有逋亦不過四萬斯止概與蠲之仍覺輕十分免五恵同視宣尼曽云不繼富葢於他人非赤子藏富閭閻信益佳詎曰驩虞博民喜逰倚虹園情知名墅郡城西遂艤蘭舟歩蘚隄花木正佳二月景人家疑近武陵溪笙歌隔水翻嫌閙池館藏筠致可題片刻徘徊還進舫蜀岡秀色重去聲相徯浄香園雨過浄猗竹夏前香想蓮不期教歩緩率得以神傳几潔待題研忩含活畫船吹笙橋那畔可入牧之篇趣園即景多有名園綠水濆清逰不事羽林紛何曽日渉原成趣恰值雲開亦覺欣得句便前無繋戀遇花且止足芳芬問予喜處誠奚託宜雨宜𤾉利種耘水竹居栁隄繫桂艭散歩俗塵降水色清依榻竹聲凉入窗幽偏誠擅獨攬結喜無雙凴底静諸慮試聽石壁淙是處本名石壁流淙為平山四十景之一題天池在功徳林中林中功徳池逈自半天披渌水入澄照青山猶古姿魚衝漪上下花㺯影葳蕤一派曺溪味尋源識者誰題小香雪居竹裏尋幽逕梅間卜野居畫樓真覺遜茒屋偶相於比雪雪昌若曰香香淡如浣花杜甫宅聞説此同諸再逰平山堂即景雜詠八首曉烟欲泮猶未泮山色如遥却不遥一路名園都可憩木蘭先泊倚虹橋纜牽春水拍舟䡖㦸㦸新蒲刺水生夾岸樓臺不知幾上聲飄颻都在鏡中呈澹蕩䡖風静碧淪堤籠絲栁拂船唇沿隄緹騎非嚴蹕為挈銀牌賜老人春光滿眼已撩人梅白茶紅倚翠筠屈指長橋過廿四風流誰是紫微倫有時屧歩有時舟幾暇聊成爛漫逰饒舌咄哉此言失得閒吾豈樂天流傍午徂雲忽放晴平山濯翠益分明吾寜徒為去聲逰山計計到田功實暢情綠竹叅天一徑細白梅似海萬株多援毫題曰小香雪大者浹旬較若何屈指十朝當至鄧尉梅塢西鄰即蜀岡春風依舊坐山堂適来絲管真嫌聒恰喜松風一掃凉塔灣行宫四依皇祖詩韻乘氣寜闗玩物華籌民本計厪禾麻庶繁郡過蕪城市瀟灑軒依鹿苑家金栁已揺髙下縷玉梅都放净娟花天章賡和知垂訓䝉業承平意敢奢微雪二月十九日夜雨晨隂午後凉凝成雪片灑飄揚旋看落地融為水穡事花期兩不妨長空細糁漫徘徊六出花飛費剪裁滕六應知别有意欲因親切較江梅塔灣行宫三依皇祖示江南吏韻載諮大小吏為政有常經恕不妨蒲示節當如竹亭莫忘恫瘝念恒切怨咨形豈必催科巧逋徵早已停過𤓰洲鎮江裏洲傳𤓰字曽廣陵潮昔有明徴蔡寛夫詩話潤州大江本與楊子橋對岸𤓰洲乃江中一洲耳李紳詩揚州郭裏見潮生自𤓰洲以閘為限潮遂不至楊州夫唐時揚州尚見潮何况于漢著述家遷就枚乘賦語俱以曲江觀潮為是杭非揚且謂廣陵舊治甚大錢塘當在所轄之内此與刻舟膠柱之見何異既為之辨復注大意于此開元以後襟喉要乾道之間城堡興占地其来亦已久讓川雖妥卒何能去年異漲坍沙磧幸保安然惕倍増渡江至金山駐蹕作南巡又奉大安舟今日金山此重去聲逰昨尚風狂今乍息毎逢浪静信何修親歡誠益惬深願祖徳思惟朂逺猷浮玉底為新景㑹筭山對映玉微留昨夜微雪算山一帶曉猶未融積素更為江天剏觀金山寺再依皇祖詩韻忽聞江上按雲和仰首方知天籟多我切聰聴在軒碣三年睫眼訝無何金山三叠舊作韻萬頃銀濤百丈青文章大塊善形形誠知天地此鍾秀敢曰山川特効靈滿月面重瞻相好如氷壺裏悟流停妙髙臺上逰遥目興寄鳶魚徹洞㝠近涯南北春盈地逺派東西水接天想像䋲床叅印老補蔵玉帶證坡仙寺有坡翁玉帶久缺数版壬午臨幸為補足之曽有詩拱瞻羲碣欽前烈欣奉任輿悦大年到處花宫䖍祝嘏誠同蒼赤一心連觀濤楼歌傍晚大江略作風逆風者勞順者逸不如山頂坐層楼勞逸齊觀冺得失䕫然悔此非我談談合漆園寥天一一物逸我為心惬一物勞我為心疾疾心惬心紛乎中辭之斯吝安猶吉夫然那免鬢星星擬藉觀濤滌塵沕逰金山寺四叠蘇軾韻大江入中國十分到此三分己近海河常有患江無患偶然亦復有患在去嵗荆楚肆難陀尾打浪冠湏彌波文泉監利被災重賑恤寜靳費帑多𤓰洲城下走舟楫坍砂日甚於一日茭楗保䕶那可施南望心憂為黔赤上年六月湖廣總督李侍堯等奏楚省積雨江漲上㳺文泉監利迤及黄梅廣濟被災数邑叠行降㫖賑恤旋經髙晉奏江省𤓰洲江水長發丈餘迴瀾壩岸坍嚙至七月汛平加甃碎石江塘復完漲退城安定駭魄民色如前澤而黒輕艫重剪江波明為思昨夏猶餘驚我有恒心民盡識屢巡豈縁攬景物韻春復駐氐父山強和蘇韻不避頑獨愧詀詀言未己可知既水弗洗水自金山放舟至焦山四叠蘇軾韻兩岸束江深眈眈𤓰歩在北京口南天塹形勢攬已熟奚啻曰再與曰三金山放舟纔片刻迥視銀海擎黛蠺山􅊶屋處欠一到隠慮或致焦先慙順流鼔枻意甚快風浪奚礙心澄潭故知羅巘草木茂枝姿葉態迎春酣乃復寺旁構行館成事不説何勞談己見壬午叠韻詩小憇弗宿發青雀調御月面空花龕熾然今昔非今昔中邉食蜜皆甜甘獨是結習寄吟詠屢賡蘇韻寜辭貪八州牧同五斗祿見蘇詩一長老商七不堪呼之欲出難想像但聞其聲留谷菴亦用蘇語清寄堂别館精藍側逕幽花木芬棲遲雖覺適供奉略嫌勤古栢虬蟠影髙峰螺皺紋偶然寄清興流水與行雲竹樓竹裏書樓架竹為拂筵還入戛風枝恐人強與分賓主故藉泠然一掃之海門菴倚壁為菴對海門絶無塵處閲髙奔山僧不用蓮花漏自有潮頭報曉昏逰焦山作歌再叠舊作韻焦山侵尋亦有屋難傲金山獨在腹土為母子木弟兄世人慣作響應聲太古以来大江水豈知較此與量彼三詔先生如可起首肯吾言歎止止水流地而雲行空誰論有是有非是維舟登岸又斯辰如来黙坐何修勤無色聲香味觸法施檀禮足徒紛紜風旛不動自標偈龍象變見皆成文吾方興属層峯雲下暎江色青氤氲今新昔故冺芥蔕南疆北界誰區分東瞻海門詄蕩蕩百川虚受胥平吞蓬莱方丈竟何處祗餘潮聲朝暮聞甘露寺用張祐韻心净冺羣象目空無㸃埃三乘于以閲四度底論来江色翻禅壁山光落講臺衛公固扄鐍舍利也還開逺㠶樓即景四首清晨進舫攬焦山甘露紆臨卓午還東望青螺湧玉海畫如我適在其間来徃帆資一面風舟師破浪實稱工忽思駿馬馳山阪控縦隨人此或同舉目雲行與水流廓然俯仰契神投大江東去千秋調多把黄州誤潤州寺壁勒明季夏言等大江東去詞葢皆数典東坡黄州之作重閣名同太液池瓊華島北閣臨液池亦名逺帆織梭㠶影鏡中披即看浮玉原瓊島外苑何湏異視之登金山塔頂三叠舊韻塔頂應湏更有尖碧空在上獨稀兼㸔兹卓爾禅明示到此誰能意不恬風物江山原弗異詩篇今昔且由添了知未似東坡句却喜依他韻屢拈題鏡治齋浮玉大江裏行齋浮玉中堯勲遵露冕禹徳慚去聲卑宫不到塵埃處真教機象融省方闗治化淵鏡意何窮金山妙髙臺和蘇軾韻先我問誰登眉山玉局子仕朝七品官辭家六千里屈信往来間葢同逰戱耳忽愛浮玉峯嵬㠑江中起義取華嚴經名此臺如砥比邱擬徳雲談禅對棐几了了契心神朗朗出口齒斯誠逈出塵那更申盟水獨歩妙髙間是是非非是效之者計愚似之者法死策馬過鎮江府揚子横江片刻過毘陵策騎度逶迱民情較昔尤相熟馬足趨隨那厭多城有絃歌興禮讓户無滋擾自熙和黄童白叟誠繁庶為去聲計資生應若何登城霞閣再叠舊作韻二首運路襟烟郭横樓帶水衢助休度已義灑掃厪人劬登攬寜無興安懐要有圖㑹歸惟北極禮樂盛東吳方抱一心欿那經萬口呼殷殷祝綏屢庶得四民蘇詎可揚帆過登臨俯市衢四巡非一嵗三義眄千劬西蜀成偏業南揚賛逺圖深謀艱伐魏遺恨未吞吴紙幣今仍走樓桑昔罷呼城霞揭妙理勁筆備顔蘇過艤舟亭不泊南邦風雨是其常凉迫詢無害麥秧邇日風雨作凉夜凝微雪恐傷麥苖問地方史稱無害也避濘漫嫌孤勝境迥舟再艤又何妨石尤風送雨絲濛駐處猶遲十里通玉局艤舟予進舫景情雖異地原同淺水寜闗答庵主利風更異趁将軍畫亭舍是非無謂早到圖休扈蹕羣寸麥尺水寸麥尺水猶無妨尺麥寸水亦致殃不是南来諮穡務似兹委曲那能詳沈徳潛錢陳羣来接因成是什仍各書一通賜之二仙仍此候河濱三載相暌意更親郭泰李膺一烟舫二人同舟而来沈期錢起兩詩人飄然白髪都還健瞭爾青瞳自有神筆力年華雖共老載賡知復倍清新泛舟遊恵山即景襍詠川路遥看平聲見恵山䡖雲淡日蔚孱顔遄飛吟興於何是祗在泉流峯峙間烟溪暫泊換䡖舟兩岸麥苖綠似油致我欣然誠在此寜徒留意為去聲清逰寄暢園中小憇遲􅟒紅梅白鬯春姿林泉别我三年矣似曰無他祗待詩精藍西轉有禅庵啜茗聼松即庵名設竹罏毎至必試茗此最堪疊韻寜辭綺語過前三三復後三三寄暢園三叠舊韻流引恵泉水一灣石橋過處敞軒閒樹遮洞以千年計瀑出峽分数道潺趣為去聲永哉暢非俗樂惟仁者寄於山飬疴旋里人何在撫境愀然是此間園為秦氏别業去秋尚書秦蕙田以病請假南還尋即在途不起囘溯地是人非為増感者久之恵山寺再疊舊作韻春氣濛濛潤岫螺花宫兼有古松羅青衣童子誰曾見白足僧人此處多畫卷重教神晤㑹竹爐一為去聲手摩娑底須今昔頻量檢七識田中幻末那圓池圓池方之上堪輿含至理得氣擅清輕應較下為美方池方自圓流出非遥品乃低雖然甘不逮猶自勝梁溪自恵山䟦馬過無錫縣城登輕舟至水營即景襍詠錫山雲氣自南濃促返恐防春雨逄䟦馬烟塍不三里棼絲已是灑􅓴􅜾黔黎趨擁喜逾常所惜無端躪麥秧萬民趨隨夾道竟者有踐蹈麥苗不顧雨笠烟蓑都不藉忍教呵禁警龍驤寜民自視廟堂謨豈繋尋常錫有無比户安和心實慰頌言那在謝蠲租城南盪槳下川郵烟意溟濛勢乍稠前指水營猶十里倩誰風雨畫歸舟駐蹕蘇州叠舊韻試言底事重時巡必在恩敷率土濱到處繼䋲仰聖祖行春追賞奉慈親迎鑾不較晴還雨是日值雨萬姓雨中迎鑾歡呼夾道不避淋潦益為嘉憐不置賚老那分富與貧信是民情大可見由来十室有忠淳賜沈徳潛吳中今古老人科比似徴明定若何書畫雖輸詩勝彼功名已過夀如他逰山有興仍清健處世無争祗善和明説九旬有三嵗那更年格尚嫌多徳潛老而始過通仕籍時未以真年告故吏部履厯今當以八十九然徳潛實康熙癸丑生今應九十三嵗此政東南士林宿望亦國家祥瑞何必更以老為嫌故末句調之凝懐堂再叠舊作韻行令駐葩瑵承歡奉鞠衣永同天下飬時勅化工機供帳毋求備情田曲體微璿題参妙義恒䕶慶雲輝獅子林叠舊作韻毎閲倪圖輒悦目重来圖裏更怡心曰溪曰壑皆臻趣若徑若庭宛識尋足貌伊人惟怪石藉知古意是喬林何堪摹卷當前展壬午南巡曽手摹倪元鎮獅子林圖弆藏林園今復擕倪卷来逰相形之下殊覺效顰不當因並書于倪卷及摹圗中笑似雷門布鼓音遊虎邱即景襍詠馬嘶小歩出金閶細雨輕風正不妨為愛觀民慢鞭策湏臾亦復到山塘河裏龍舟畫鼓鳴布商藉以獻其誠欲思返樸申嚴禁矯枉兼虞拂物情為門為逕我曽知若石若泉彼益奇開著雲窗聊俯暢四郊烟景總宜詩虎邱雲巖寺雲巖真是徳山雲古樹時花總浄芬求跡無珍誠畫虎㸃頭有石似疑黂竹聲繞砌通其響麥色盈窗致我欣那是司徒志逺處志在逺遊王珣伯逺帖語千秋佳話付云云静觀齋叠舊作韻静觀猶是當年額巖壑何曽占逈深却為不交絲竹耳堪知宏藴地天心含暉山館春山多淑氣巖館值来遊缻吐蘭心馥簷開栁眼柔王祠緬曠逹謝句詠風流信美非吾事吾惟民隠求虎邱寺四叠蘇軾韻異哉金寳氣何以化岡嶺千秋鎮姑蘇改邑不改井溪田帶秀蒨閭里暎清耿春氣入山塘已聞呌蛙黽奇傳劍三千誰見飛出礦平石坐千人既博勢亦猛生公緬講堂妙理元言騁葛賢有遺墓奮義志悲哽閲古過雲烟不異一瞬頃調御趺花宫其心死灰冷我亦合忘懐言詩興猶永四叠玉局韻聊以答風景聞有陽氷書蒼苔漶石影後視今猶昔莫更鐫崖請賜江蘇學政李因培再叠舊作韻三年滿浙政兩任返吳邦惟是簡英逹将資化駁厖要存心一敬莫詡手無雙為問羅賢網可曽獲二龎逰支硎山叠舊作韻依舊青山與白泉重来過眼又三年發硎那是庖丁刄招鶴仍参開士禅舞為去聲鼓琴同木石甜如食蜜徹中邉設云佛法全拈出逺矣失之大不然支公庵支遁何曽遁硎庵尚有庵迹同羅什北心是慧能南馬䟦仍山逕鶴歸帶曉嵐不殊覿面者松月映虚龕寒山别墅支硎一嶺過咫尺到寒山坐㺯流泉潔行尋曲棧閑心因新霽喜幾趁片時間大吏稱馳驛逰覽所至畧觀大意即行尹繼善比之馳驛看山然過而不留片時閒適足矣謂之馳驛固當俞哉為去聲破顔綠雲樓即目便門進即綠雲樓過支硎小嶺即寒山别墅園墻向由園門入尚紆里許壬午逰憩命從園墻開一門進門不数武即綠雲楼益覺近便拾級閒登楼上頭蔚翠麥田真罨畫適来原在畫中遊飛魚峽再叠舊作韻石峽龍門似常㸔魚闖然息原入潭水飛即上雲天或羡知名士抑希登籍仙留題意何属欲問隠居賢馳烟驛戱題髙人伏處去聲必柴荆那識金根與翠旌萬騎馳烟縁驛路似為去聲斯日設斯名對瀑再叠前韻飛瀑恒面壁不言真得髓綺言邇覺多合以摐摐洗題澄懐堂借問澄懐處寒泉泉石間落來心與洗渟際俗全刪竹戛琅玕韻峯開翡翠顔最宜棄閒地摛句卒無閒清暉樓書樓宛在水中央簷際波翻㶑灔光自是清暉供去聲山水成詩誰似謝家郎寒山千尺雪三叠舊作韻知者樂水仁樂山合妙撰斯惟石泉宦光若可起而問應以是語為探源拘墟彼此執名象乃舍實道循虚詮澄懐之堂暫憩息在寒山别墅中餘興幽逕仍攀縁曲欄扶者宛熟路澄潭注處成深淵釃流雖無三千尺同一雪色鋪岡巒坐令亭臺疑瑶圃平㸔花木栽銀田香聞蓊濛不辨色訝至光福望海然聼雪有閣可虚擲便當摘句於其間聼雪閣三叠舊作韻滴水傾於海濕性直到底此雪千古恒其理如是耳溪閣尚未登早識箇間美既至坐而聼信足稱觀止弗忘者先憂暫凴者後喜摐摐皚皚中何今復何始邂逅託有因寤寐良無已遊法螺寺千尺雪上心已洗法螺寺中隨法喜肩輿旋轉入菁蔥萬里之間論尺咫我聞吹螺演三乘又云佛頂螺髻青色覔聲求盡邪道如見如来能不能四依皇祖華山詩韻二首法螺西䟦馬雲表竺龕深有進亦云到無營孰與侵昔題猶舞鳯春景入言禽别室青山對凴軒一暢襟舜歌賡四度彈指嵗年深是日盤雲逕春風謖籟侵苔蒼皴峙栢泉響答鳴禽峯頂孤亭在曽予豁逺襟駐蹕靈巖三叠舊作韻三載流隂瞬息中靈巖重禮梵王宫髙標穹塔依空住右轉行廬有逕通虚室還生今日白春花又吐昔年紅慿欄最喜晴明望綠蔚平疇吴苑東臨湖榭峯巔虚榭臨太湖太湖萬頃胸中俱東洞庭山正當檻青螺一㸃鏡面扶廓然上下共澄澈遊與造物為清娱吴顛越躓實蟻鬭水天千古寜差殊少伯扁舟都藉藉彼何人哉名利徒靈巖襍詠四叠沈徳潛韻館娃宫四計惑吳心羅縠教歌舞容歩于何習或曰城名土蠡獻子胥諌弗聼其言杜伊人詠館娃戒之在鑑古琴臺七絃實古器斯臺未恰然抑于闔閭代抑在夫差年世遷猶月白人去餘泉湲但供幽客至曲肱時枕眠響屧廊長廊今弗見但餘山洞敞索然怒公孫何能為聲響殺諌國必亡館娃久榛莽奚稱踏歩人足底佳音徃涵空閣石鼓天平南㠎嶫聳碧空一目可千里具區波㶑風有名無其閣望若雲中龍豈必拘墟求縦觀慿離宫吴王井日東而月西一例噴峯頂不見古人汲猶照今人影詩雅詠缾罍易象示繘綆却想歸愚翁當年此汲井研池研池涌研山一泓清波冷得名盖因境明如銅鏡青詎縁習揮毫筆陣辨直横其下應何有波伏龍不驚采香逕子友為諷諌挟彈履濡露笑愚而不聼先入言有素徒傳香逕名春風馡錦霧狸卑終見放三津歸日暮翫花池徳潛老始逹大耋歸棲谷方其未出時此振衣濯足凭池匪翫花為愛澄波渌八章四叠賡藉擬蘭湯浴穹窿山上真觀嶽嶽髙居祀上真抒誠叩必以躬親太湖萬頃在襟袖穹窿億丈凌星辰不問長生崇羽士所希大有綏農民片刻成吟策返轡鄧尉香雪猶西鄰鄧尉村鄧尉村前萬樹梅半猶含朶半嫣開問他底事不全放應為今朝待我来崑軸前旬己見梅心憐鄧尉背人開誰知玉馬尋山處尚有香風撲面来鄧尉山恭詠皇祖松風水月額再叠舊作韻逕入海為雪寺投寮是松蘇臺巡蹕四鄧尉仰題重心各水如淡影當春互濃于斯名獨讓曽不介乎胸右松既具蓊濛氣何妨淡蕩風擘惟蕾是綠舒或瓣逄紅山谷雪猶滿僧房春正融一聲清磬度雅思眄崔峒右風託根既於岡寫影那辭水態是弄珠人品乃濯纓子逸格在横斜幽香徹表裏把擬問山僧可似曺溪㫖右水浮動黄昏間不宿知宜月散采方森沉流香益飛越姢姢覩神姿青青定仙骨潄潤懐清芬賡吟無厭歇右月鄧尉香雪海歌三叠舊作韻吾家山信誰家吾輿圖府志難考初安名立字各阿好咄哉史氏多傳誣姑胥省方已三度春風又拂鑾旗舒尋山問水乃餘事觀民設教有正模雖然詎可負清暇鄧尉一帶旄騎紆訂訛甄異弗重藉昔詩屢具兹遵途化人寺亦仍小憩至理村旋去聲發前趨不舟而泛香雪海較之牙檣樂有餘其色真色目止觀去聲其香真香鼻静娱似置滕六于太湖配藜旁魄無同殊筆規墨寫勢欲輸蘭薫檀爇庸更需清淺水復黄昏月于何浮動致影疎那更逺憶大庾大了知近勝孤山孤前三後三薈光福千秋萬嵗薌句吳千秋萬嵗薌句吳笑我叠韻無已夫石湖八絶句和王寵題周臣畫箑頭韻吳中山水致人憐最愛石湖茶磨前萬頃烟波連震澤一堤花栁繪春天参政當年經濟流虚名肯與世沉浮立朝事業誠無忝寓意聊斯託狎鷗風静春湖玉鏡開北隣入影是郊臺狐卑雉傲偏誇勢欲使東流直倒迴亭子湖心昔日成周遭漪影漾檐輕三經攬景弗一到弗到中饒不盡情湖心亭非石湖舊蹟盖丁丑南巡時大吏以備臨眺者然三度石湖曾未一到其地也何必牙檣牽錦絲輕舟蕩槳可前移一鳩呌為頻呼婦雙燕飛還欲乳児石湖詎較太湖強海潮菴後倚巖石泉滙而為池實半畆餘因鐫壁題之曰石湖湖上花龕若鳯翔設使山僧斯面壁當前法乳是津梁一帶春山問景歸是日自靈巖取道上方山石湖一帶策馬歸蘇城春雲時作雨絲飛亂烟忽向峯頭歛迴望靈巖濯翠微不少丹青鳥與花㨂金驀遇此披沙東郊烟景雅宜句一例東京説夢華詣文廟行禮雨中歸茂苑聖廟郡城隅城文廟在西南隅崇像應䖍叩太學神主甚合古禮亦闕里及此乃崇像設然有其舉之莫可廢也入門惟敬趨春堂烟織幕古樹露垂珠信曰有如化然而無有乎戲題滄浪亭假山真水傍城闉結搆誠云清絶塵一帶隔溪列公廨不知誰是濯纓人過紫陽書院書院泮宫後菁莪藉地靈學優乃從政身致在明經羣秀其無忝老人尚有星沈徳潛長書院是日領多士跪接明知艱歩履卧理足儀型望晴兩日剛快霽一半復宻雨江國雖其常過甚亦致苦詢稱弗礙麥恐出慰我語溝渠縱洩水根黄一二覩此豈非傷潦即晴庶救補到處均赤子為之厪相輔蘇州唘蹕作霽景麗天杠水程發畫艭清晨别茂苑巳刻過吳江縣名迎送民情篤郊圻春色摐明将入浙境時邁亦予邦欽定南巡盛典卷十二
