  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_010-1a, image: WYG0658/WYG0658-0113a.png}
body:
  text: 詩自嘉興一日至靈巖駐驆二首檇李至靈巖一百卅餘里舟行縱順風比至亦晚矣長隄可跋馬篤速便且駛易馬行逾刻風帆落後已北南殊所習其别乃若此誰挂翰林帆布帆有大書翰林者是日所見故戲及之晝寢方隱几前行馬及之艤岸行且止隨行無事之舟率令前行是日昜馬由隄行及之故反落後謂後落後勞彼喜逸無比飽食倦且眠夜到亦可耳易舟寶帶橋取道石湖寺跋馬上方山復行草里地申刻至靈巖罨畫峯愈翠坐我臨湖榭太湖在襟袂非歷半日勞那愜無窮意來往已半月彈指訝何易再逰寒山别墅靈巖紆罕蹕所為逰寒山春曉宿雨收千嶂泮輕煙遵磴下髙峯天平在目前此則姑舍是已悉率戒盤過嶺不五里别墅爰至焉嶻嶭屏陡壁逶迤枕平巒渟為半畝地激為千仞湍隨宜置亭閣面勢抱林泉昨去落梅英今來綻牡丹今昨信幻耳來去亦儻然凡夫果不凡即境知人仙中心以藏之句留蒼巖間清暉樓架木為髙閣疏泉得廓池淙聲階下聼秀色坐間披笙奏新篁籟衣沾宿霧絲景參米氏畫神會謝家詩聼雪閣疊舊作韻宧光鑿石處引泉墮潭底其上有别墅我昔聞名耳今來乃一尋兩竒信並美而此舊所賞亦可稱觀止映心鏡如朗蠲俗園成喜擬水為雪得水原雪之始請君忘耳觀聼可弗聼已逰獅子林蘇州府城內早知獅子林傳自倪髙士疑其藏幽谷而宛居閙市肯構惜無人久屬他氏矣今為黃姓涉園手迹藏石渠不亡賴有此石渠寶笈舊藏有獅子林圗為倪髙士真迹詎可失目前大吏稱未飾叶未飾乃本然益當尋屐齒假山似真山仙凡異咫尺松挂千年藤池貯五湖水小亭真一笠矮屋肩可掎緬五百年前良朋此萃止澆花供佛鉢瀹茗談元髓未擬泉石夀泉石况半毁西望寒泉山趙氏遺舊址亭臺乃一新髙下煥朱紫何幸何不幸誰為剖其旨似覺凡夫云慙愧雲林子詣文廟行禮文廟建城南相傳錢氏園仲淹得斯捨胡瑗聘還尊惟是重經術何嘗計子孫相傳文正得此園形家以為子孫當世世科甲文正乃捨之以為府學云短長相較量終覺勝于門過紫陽書院疊舊作韻書院臨泮宫講學興賢俊斯為儲材地董率尤當慎潛老宏章寄相讓如亷藺章更閩中人紫陽道應振性理無竒言躬行敦至訓人已審所為改過要不吝去華以就實素位惟守分克己茍弗力外染將乘釁適因禮至聖宫牆仰數仞過兹接諸生為誦朂新進暇當付剡藤揮毫意以運蘇州起蹕作金閭三日略延留鳳艒平明啓蹕郵惠瀑重期清入聼靈巖回望翠凝眸豈無餘意民情戀更有殷憂河務籌况復秣陵亟徯我便當減從一為逰惠山寺疊舊作韻峯峯晴色濯新螺紺宇珠宫借巘羅希有祕珍永寶四率成佳話實堪多春泉石罅淙聲細新竹風前弄影娑文字禪雖非本分要因淨業悅陀那題漪瀾堂一泓清照鏡光新耐可含風漾細淪印滿半輪千古月入龍鳳影數竿筠題名乍爾懷蘇軾肄業還應憶李紳笑我匆匆催騎去豈云瀟灑箇中人若氷洞我昔撫石甃己愛冽且泚今探若氷洞更識泉在此牝谷孕靈液乳穴淙神髓九夏其中寒而况三春尾不可以久立巖齋聊徙倚展書悟為學進步詎可止澄懷對有源靜觀懷無始斯固太古然何乃稱陸子寄暢園雜韻水雲佳趣罨簷楹軒名園中十二景之一過雨林嵐滿目清也識舟行紆十里奈他泉石繫崇情逺峯近巘滴新螺清曠名園一再過異世一家能守業猶傳鳯谷昔行窩九人六百有餘嵗前度曽因佳話傳碩果今惟四好在了知夀者相非堅松篁深處小逍遙紫綻藤花綴幾條今日錫山姑且置間間塔影見髙標自無鍚放舟過丹陽駐蹕方瀆橋之作回鑾將幸徐金陵應必至六朝文物邦訪古吾素志寧無數日留復恐歸期滯無以每趲程原非為逰恣今朝遇順風早停頗無事宣傳駐方瀆一百卅里地毗陵及曲阿瞬息度次第衆舟多不及中途瞪乎棄乃悟有快心即有不如意駐蹕金山揚子乘波換綵􅞤定光遙見石排峯吳頭越角才經攬浪靜風恬幸每逢萬古東流目逰恰一時佳景興飛重往來屈指剛彌月爾許青山兩岸濃慧居寺八韻寶華深秀處問路記吾曽是日觀民暇青春佳興乘梵宫迎馬迎﨑徑破雲登戒井誰當汲蓮池依舊澄六檀身口意三寶佛經僧淨業遵毗奈禪機謝慧能璇題千載煥寺舊名聖化隆昌名皇祖南巡時易今飴慕一心增小憩催行轡耽斯理豈應逰棲霞山第一金陵明秀山所欣初遇足空前畫屏雲罨紫峯閣乳竇春淙白鹿泉梵業鐫碑尚隋代淨因捨宅自齊賢更誰鑿壁名紗帽只恐平原意未然紫峯閣一峯傑𥪡衆崖巔絢靄凝嵐秀撲筵不是匡廬瀑簾側也應名託李青蓮春雨山房山房號春雨雨景一斟酌萬籟靜亦悠諸峯翠如濯煙絲織空羅雲片張油幕農夫早歌舞行路來憩樂囅然笑子瞻曽是曾弗著太古堂水態將山致都觀唐氏詩何當蠲萬慮來度小年時駐蹕棲霞行宫作建業路由西棲霞適可棲聲名冠白下樹木見蕭齊一宿誠多費諸峯率入題山房春雨足春雨山房是處舊名也頗望霽光䨑靣勢延清矚林巒景未藏流銀響琴瑟依緑撫琳琅藻繪信何有茅茨覺倍強漫重舉僧紹傲志恐無當逰攝山棲霞寺用尹繼善沈德潛倡和韻久聞攝山名秀如玉而冠僧紹小隱處髙節古今羡拔地百卅丈嶤峯凌碧漢衆山皆在下如翁視童丱畫石及落星歷歷皆可按圖經昔羶薌久矣繫清戀兹來緣省方乘暇逰禪院蘇民厪解澤對佛愧止觀咨爾肆覲牧峻宇何須辨山房號萬松屧步尋深徑孫枝貌已蒼側幹形猶正何况古喬者孰不見生敬幾赦斧斤劫益凛氷霜性拂星自成景吐雲應號慶偓佺曽遺堯養真稱戰勝又如啇伯夷乃得清之聖層臺一登臨民瘼當前憑元氣復也無謖濤何心聼古人亦有言枕流而潄石不可無此意愛斯淙復峉懸崖仲璋琢其佛四十尺松撑雲態破竹迸埓形坼盤拏互轇轕如蓋亦如帟可以謝棟梁永此安巖壁峯回路轉處化身更千億既不辨異同誰更分主客泄泉得品外盤陀聊憩息軒渠笑陸羽未遇此真脈跑曽聞有虎名得因逢鹿每吐雲英英亦浸月漉漉其始乃何年太古此澗谷蘚痕石縫間細注才漩洑聞自候停蹕階下完成瀑斯事屬偶然不必稱更僕儻來還儻去誰歟享清福回首與山僧付爾聼真築山有白鹿泉日久就淤大吏於此建書室備憩因稍為疏導遂成巨流飛瀑奔注冬夏不竭云昻首最髙峯巉巖拾級上藥草堪攝生含芳襲人賞北地見大江皓氣涵漫漭吾懷與之如廓然坦蕩蕩忽憶東坡翁赤壁曽獨往俯憑夷幽宫長嘯發逸響其氣蓋古今其景融機象斯逰可同乎吾惟企遐想藉問夏諺中逰豫緣何事江國災祲餘如傷猶未置嗟爾在位者孰非民攸塈邇來閭閻况略悉巡春騎縱云免溝壑未稱富蔣芰矧兹乃所見寧無未見際供奉爾勿勞徒勞亦奚異踏閲便逰山間挈詩人儷索觀賡其章匪侈詞華麗尹繼善入山閲工沈德潛偕往故有此作萬松山房萬松春曉坐山房雨後千峯濯翠光因迥為髙步入古受宜得趣意延涼間聼倚巘濤翻鬛極眺鋪阡浪擺芒詎事逰山欣愜賞為民額手慶宜暘幽居菴緑雲深敻處結屋號幽居不辨明僧紹張瓌昔真堪師友豫羣峯圍峭蒨叢桂映扶疏想見伊人致徜徉賦遂初登最髙峯望江放歌坐井者不可與觀天窺隙者不可與決鬭鵬圗南技窮於居籠驥空北術乏於見囿得逸於勞見逺於髙茍不造極安識括苞吳頭楚尾雲島風潮上下億計劫東西萬計里魏吳相割據金宋互興圯一枕覺槐隂渺乎其小矣謖謖天風拂鬚蕩胸濤入耳砰磕鏗􅣨收帆息楫羣避蛟龍孰知坐峯頂者豪吟虛閣之中霽光下照彌平野菜黃麥緑真宜農太虛亭太虛亭縱縱遙目一片晴光千里俱快意不關林壑美却因農慶憶杭蘇登燕子磯觀江峭壁捍長江探竒勝絶雙目窮空宇合耳駭雪濤淙鴥鳥瑞殷祖泥駒造宋邦從來稱守德天塹詎斯漎逰觀山山永濟寺濵江得初地插漢俯諸天鐵鎖連飛閣金繩闡福田濤聲風裏立花色雨中燃默默今何在彼寧非大年默默和尚向住此寺年過百矣辛未南巡時尚矍鑠出迎今已示寂云駐蹕江寧作龍蟠虎踞古神區展義觀民六轡紆詎彼迤南山水境曰兹鑒夏帝王都春前耕植羣猶力災後鄽闤氣幸蘇解澤有何遍黎庶憐他愛戴不謀俱泛舟後湖攬古太平門外蔣陵湖春波演漾含新蒲鳴榔煙水入深處濯清因以為清娛憶昔繁華樂逰苑穿池肄武陳舳艫熙寧泄水號濟困實與青苗意不殊勝朝乃復事開浚洲上置庫藏輿圗即今陂沼靜無事魚蝦者往同民俱輕舟自謂忘機矣何乃紛飛鷗與鳬大報恩寺南朝四百八十寺惟有建初真最初步長千巷尋覺路想赤烏年創佛廬放燭天光鎮如彼登凌雲頂記曽豫拾級聳眸姑且置千秋興廢慨慿餘雨花臺口號崔巍雨花臺迹傳梁武帝雲光講經致雨花臺城不救嗟何濟文殊問訊維摩處乃有天花散天女一之為甚可再乎著者空捶塗毒鼓秦淮歌祖龍東巡壓王氣通淮鑿斷方山埭癡心慮後五百年詎知亡秦在二世長源因此名秦淮縈紆建業逹江隈時塞時流異沿革秣陵終免淮為災六朝往事難尋迹王謝燕飛誰氏宅風流江令倦逰歸惟見秦淮依舊碧楊吳竊據築金陵清波溶溶乃貫城十六紅橋夾兩岸蜀嬌越豔揚新聲千金買笑輕一擲纒頭錦是寒女織會稱盒子鬭新竒薛鴨袁羊飣珍食而今功令禁俳倡歌樓舞館都荒涼煙花麗景縱遜昔疸邪敦朴誠良方賦得鴻漸于陸得時字五言八韻江寧試士子題懿彼三同鳥玩兹上九辭陵終莫之勝羽可用為儀胎産則成幻天沖或有時去容郭瑀指來必季卿隨鳬乙任呼耳毳毛豈恃其稻粱原得致矰繳底須施薄漢雁斯後載旌騎早知寄言觀國者尚勵賁來思靈谷寺鐘阜東南尋道林蔚然深秀松森森溪光山色宛其識鐘聲幡影空去聲人心八功德水清且泚梵天震旦何彼此更聞左側琶琵街鼓掌響應彈絲起非神竒亦非邪淫世尊早明示其旨乾闥鼓琴山河大地作琴聲迦葉作舞亦復如是而已矣閲兵建業開牙駐禁軍當年深意守惟勤安時要忘忘危日詰武寧當視具文八色旗分光耀旭千行士厲氣凌雲方行禹迹無非事大烈欽承朂聞題雞鳴山元黃剖判初江流山即峙山不自道名名况非其始六朝稱雞籠或云因形似易謂鳴者誰紛任後人揣漢魏前無聞時寧未有此或開處士館教授傳經旨或創浮屠宫清淨演禪理我來暢逺目元武澄見底欲倩揚清波稱謂一以洗逰清涼寺石城禮香界此路舊曽經淨業真稱白好山不改青欲尋辛未句因上翠微亭觸景成新會清機悅性靈石城歌依巖捍江據地利建置緬懷吳大帝舟師風利不得停一片降幡遂由出宋吞齊并相割爭石城幾閲凡與荆袁粲雖死固未死禇淵儼生何謂生省方偶此經層巘百雉埤堄猶完善孝陵締搆想當年金川門開瞥轉眼風雨中晦明宛右顧興悲應不免吁嗟德險守鑒兹及其守兹則已晚朝天宫冶城謁琳宇竹樹鬱蒼蒼弔古懷王謝遺風泯宋梁緣山飛紫閣守汞鎖丹房顧諟吾恆悃寧同尚老莊牛首山聊以萬幾暇遊兹雙闕山丹梯登覺路白業訪禪關鐘韻響還靜吟情搜亦間隙中窺倒影寺西側一殿闔雙扇則闔寺峯形塔影皆倒影入其中實一竒也塵念此都刪江寧回蹕駐棲霞作三日金陵駐葆旌觀民率己悉民情尊親豈可不羣戴疏瀹都緣繫别營將往徐州閲河襄邑四乘將閲壩攝山一宿且隨程較農所願收春雨逰景偏欣值午晴玲峯池天池一泓峯頂泌旱暵不竭潦不溢豈許凡鱗箇裏藏時有卿雲波上霱南齊隱者枕潄日那見紅亭崖側出為幸否乎泉自知俯清聊爾怡神謐石梁精舍即明僧紹隱居故址髙臺迥榭頗宜煙巒攬結幽竒遐想南齊隱士爾時未必如斯萬松山房一徑愜心賞數間容膝安濤聲晴亦雨蓋影夏應寒疏固宜清寄密寧礙暢觀由來無不可倣佛在田盤盤山萬松寺為十六景之一疊浪崖海濤稱排山崖容謂疊浪稱謂豈本然名字出想像叶翹首盻層峯誠有翻波狀谷神不獨工氷夷宛相向僧紹昔乘桴依稀於此放德雲菴英英靄靄鎮氤氲路轉禪房花木分那共闍黎舉公案諸峯都見德山雲九株松觀象為乾數合陽竒形古貌鬱蒼蒼攝山擬作香山喚九老居然會會昌玉冠峯舊名紗帽峯嫌其近俚適和沈德潛詩得句云久聞攝山名秀如玉而冠即以昜之宇宙以來便有此秀拔江南鮮倫比六朝近始著稱物持以名之豈其理彭澤不折五斗腰科頭散髮常逍遙假使賁然白駒賦夏收殷冔或可招回巒沓嶂疊崚嶒我欲易名難揣稱詩𢋫老沈得竒句神傳機輳真絶勝僧紹有知應默肯崔琰何人敢爾能駐蹕金山棲霞跋馬蒞江干恰喜輕風不動瀾舟繫石簰才過午級攀雁堵略生寒雲來氣接巫峽逺月湧輪髙海嶠寬饒得蒼巖泐新句他年又作舊題看觀濤樓地據江山勝樓臨潮汐竒慿觀悟有術妙理契無為月鏡光明印風紈淡蕩披驚濤曽未睹允翕幸裒時渡江駐蹕天寧寺春江浪息曉風輕片刻瓜洲跋馬行舟易長川廣陵近岸臨别館午天晴詎緣問景常探勝要為籌河便趲程舞榭歌臺都不繫繫吾懷者是民情逰平山堂卓午行宫頗無事偷間一再至平山花辭駘蕩紅紛雨林報清和緑可攀逾月風光易爾許千秋吟咏檢其間何當向者留新什早泐苕華待我還命築髙郵城外石隄詩示董事諸臣河水日以髙河隄日以起漾舟度髙郵城廬見隄底無計使之與隄平生靈所繫驚心視前度淮城命砌石兹審緩急略可恃無已下䇿仍用之糜帑固非所惜己愧我猶無疏瀹能責人盡職斯非理鞏固崇墉保障資費期實用而已矣運河行運河之水東南流催漕風向西北遞風水胡乃太相􅘅造物節宣有妙意順水行舟南者欣順風揚帆北者遂是謂天地之大公往來無不資利濟順風復希順水人不知足矣聼斯議閲河示總督尹繼善副總河嵇璜皇祖闢清口啓閉因時制髙堰障淮東三壩尾閭置侵循湖漸寬頗有弗容勢辛未親相度因命增築二其三勢實危乃得開信智髙堰舊設三壩洪湖資以蓄泄伏秋湖漲至弗能容辛未南巡閲河命增築其二與三壩而五以仁義禮智信為次遞相宣泄智信二壩非漲極弗得輒啓多泄堰則固髙寶潦必暨其間亘運河諸壩復鱗次車邏及天然昔人具深意不得已乃宣宣欲有次第而為下河者閉壩堅持議一再偶獲幸前河臣髙斌堅持保護下河之議髙寶田廬初得其利迄以壅閉致潰未可頻嘗試所以癸酉秋上下咸被沴其心可矜諒其智誠愚昧設云鑒其轍保隄則了事開壩孰不能災傷將嵗逮審度權節通時刻謹消息叶五言慎大端推行慎所自恭和皇祖覽淮黃詩韻竹箭東流川氣黃清淮交滙癸壬方六巡勞己無所逸一念勤民如視傷休息恆關足衣食賑蠲敢靳救災荒宣防前嵗心猶惕即看洪波沸泆湯閲髙堰工有作癸酉秋之月沴氣行江南濁黃潦日增清淮漲復添清口不能暢五壩尾閭淹而何膠柱者前議持愈嚴天然壩弗啓為慮下河漸究之乃大潰匪愛害倍兼髙寶危城郭興鹽壞閭閻上下兩俱敗何有修防諳其時河復決奪溜渾波淹不亟事堵築將慮洪澤占叶岌岌數丈堰水連堰靣涵億萬淮揚民殆哉奚忍談立命重臣往分任各勉擔是秋洪湖漲決髙郵二閘而黃河復決銅山南徙特命舒赫德劉統勳等往來董率堵築茭楗莫惜費齊鄭助料僉在工物料皆命山東河南轉輸速濟其冬乃合龍同日逹奏函二閘銅山均以臘月十二日合龍同日奏至善後慎在兹滲漏可視凡培髙斫山骨取固灌米泔因工賑災餘庶民來畚杴閲嵗績乃奏緩急庶可諶叶崇墉兹臨視咨度停巡驂終無永逸䇿忸怩惟益慙渡河駐蹕行營作蕆事南巡此渡江五旬餘日白駒過桃花水後全消漲天后風恬不動波彭沛縈心勞相去聲視瀹疏蒿目歎如何陸程計里應須趲武帳聊欣習慣多將往徐州閲河命簡親王竒通阿率衆護衛皇太后先至山東靈巖行宫駐蹕減從登途八韻紀事有序州維禹畫方見雅歌溯開國於大彭指名都於西楚聿自澶淵既徙遂當黃水最衝比至邇年益為險要當怒濤澎湃之際束於地狹則勢激而成危逮濁流濔漫之餘分於力弱則沙渟而致淺中泓易阻上遊受倒漾之災旁出多歧支渠有奪溜之患頻年告祲勞負楗於公卿鄰壤不登嗟釋來於黎庶披圖蒿目曽無長䇿之可施覽奏增夏孰則成勞之可恃乃者翠華時邁清蹕言旋相望數程親臨周視惟是經途沮洳掖輦非宜抑亦繞道遄征輕裝取便爰簡親藩而衛從先駐勝地以憩留民事籌咨計往還者旬日慈顔載覲奉色笑於晨昏律諧八韻事述五言禹迹久湮廢堯災每大投漢曽通巨野宋已賦黃樓近嵗溢淤墊乘時欲酌籌安輿遵故路減從指徐州永逸誠無術預防要有謀䇿誰陳賈讓佑獨籲陽侯所恃茭兮楗還虞伏與秋未觀愁弗置觀亦祗增愁欽差工部侍郎夢麟總河白鍾山等奏報荆山橋疏浚工成命議敘董事諸臣詩以紀事去年秋溢孫家集大事茭楗塞決口餘波泥澱荆山橋微湖路塞水不受連延數郡被災沴未涸春田農束手加賑聊以救目前善䇿亟為籌其後冬官之亞適隨鑾相度疏排汝其𢡟叶南北河臣江南總河白鍾山河東總河張師載胥本責毋分疆界連臂肘集役偹物發帑償守土臣職晉也就叶撫安徽巡髙晉同心合力勉宣防豈在清塵供奔走瀹濬兩月工始成荆山水泄四臣奏叶二麥雖已失餅餌大田庶可播畎畝酬勞奬績爾則應消患致和吾益忸賜河道總督白鍾山南巡江國周遭歷不使河干負弩朝嘉爾導疏合優敘肯因小節課臣僚安瀾龍王廟六韻皇考勤民瘼龍祠建皂河層甍臨聳壩峻宇鎮回渦毖祀精誠逹安瀾永佑歌彭城將往閲宿頓此經過捍禦方多事平成竟若何所希神貺顯沙刷輯洪波舊邳州艾陽遷業聖恩留康熙己巳年始改建州城於艾山南患自羊山初改流一片白波浮故壘土人猶道舊邳州七壩西來近彭城川狹河益曲曲則名生工搴茭事修築昨過夏家路七壩兹經復疊葦禦洪濤洞心吁駭目尚聞水工云如此不一足救急固云可經久誠非淑以官為家者方藉資津漉譬如人無疾爬搔偶成毒毒已雜方投禍多鮮見福所過示總督尹繼善巡撫愛必逹所過沮洳鄉民艱觸目是入疆覘田野大都荒蕪矣髙地縱種麥或冀半收耳低地麥復潦青黃將安恃翻犁播禾黍復苦無種子官借雖有例吏胥弊無己罪固孔距心吾豈徒責己方伯日隨鑾爾我同見此設更無實政責又將誰委方面逮有司如臂之使指其遍歷窮鄉民瘼周詳視開倉貸穀種加賑賙流徙惠必使遍霑仍防螙役技最哉各盡心庶俾瘡痏起麥田麥田狀不一髙下頓爾殊髙可望餅餌災後口聊糊下者春即潦根黃苗半枯哀哉煢煢民食將近奪乎加賑至夏五倉儲嗟無餘博施古己難况多蠧役徒豈如接青黃各為足食謀見髙固少慰見下增憂吁慰不抵憂多民艱紛蹕塗渡河駐蹕徐州作畫州思禹績建國緬堯封楚漢惟蝸角山川實地衝澶淵徙以後渤海入無從邇日淤尤甚防秋䇿預供用爰紆六轡都大為三農恬浪徐鳴槳洪流髙指墉驚心斯創見著意敢辭慵寧更言多費惟勤救鞠訩石隄築一律徐州北靣護城有石隄而東西皆土隄命易之以石葦掃勝千重惟是補偏計曽無永逸庸黃樓讀昔賦宋代即今蹤謾詡新沙刷水工云近日城下黃流較前刷深三尺許寅哉兹偶逢災餘災餘癘必行古人言之矣將為徐州行大吏云宜止去去關民瘼寧忍復避此銅山蒞古邑菜色嗟惄視藍縷鮮完衣踉蹌或無屣實澤果遍及仍然故何以太醫雖庸醫玉缺碔玞美四鄉分往救所司撥藥耳叶斯固子産惠應勝魏公指視爾傷曷瘳曰豫愧無已彭城河復蘇公河復昔非復彭城河復今仍河何以謂之復解嘲聊爾為斯歌漢唐以來通巨野燒草不屬無如何浸淫吕沛漸多事川狹濤怒騰盤渦然惟宜合不宜散合資刷沙離渟波斯流雖古有成語徒見其害利則那去嵗奪溜孫家集中泓力緩沙淤多隄旁水志度分寸泥停五尺髙益加桃汛湯湯已拍岸伏秋轉眼難延俄用是切切愁弗置紆程歷覽親研摩下䇿仍惟事修築易石鞏固周遮羅水工喜稱漸復舊數日頓爾形遷訛三尺沙刷餘二尺志在敢飾虛言詑此亦偶然慢過頌靈實昭矣感不磨逰雲龍山作彭城駐輦厪河防咫尺雲龍戲馬旁本意原非是山水偷間聊復訪蘇軾張天驥翠峯夏首關林葉緑野風清泛麥芒底事今來艱迥句為民籌濟為民傷大士巖峯有飛來像豈無色空空色定同殊普門誠切宏慈願利濟應殷此際夫試衣亭用蘇東坡韻甕乏黃虀身缺衣民艱露冕訪斜暉祗餘恧若先憂切那有軒然逸興飛放鶴亭歌水石豈千年羽衣早翩去何來雲龍頂依然有其處疏軒眺逺棲嶙峋階前亦立胎仙羣坡翁公案一重唱爾時更有張山人青山緑野古徐州黃河之水東南流本意登臨豁逺志宣房深計翻增愁戲馬臺用謝靈運詩韻謝客昔攬勝摛藻蜚白雪逸志託邱園皓皓秋陽潔西來為籌河彭城此駐節導俊無良方俾乂資賢哲旋顧災餘民食乏衣並缺八珍為弗甘寧能暢逰悅雲龍有蘇迹秀色城頭列途便臺頭寺即戲馬古臺也清詞記一闋放鶴已憩驂戲馬慢停轍寄言賡佳作伊人所懷别汲古緬心藏撫今慚治劣孫家集去嵗霖為災漫灘遂奪溜上年秋汛後黃河漫溢孫家集是處本無隄工以備盛漲例于秋汛後補築水衝溝渠而富勒赫漫視之兩年未嘗補築遂致成渠奪溜特命尚書劉統勳督工堵禦河流始復故道先事防少疏禍致不可救非人用鰥官吾過其誰售連延淤荆山齊豫胥潦遘用是深厪懷王臣課奔走捍禦築決口疏瀹通下就今來閲崇隄未雨為綢繆叶層層牢關鍵切切防滲漏此誠燃眉計秋遙奚善後登黃樓作岧嶤傑構俯徐城黃堊還存玉局名作鎮千秋彭與沛祀賢並坐弟和兄樓中胎塑子瞻子由像我詩傑句真無就夫子當年妙獨成二語櫽括東坡黃樓詩句意太守為民猶切意况吾飢溺敢忘情再題黃樓用蘇東坡韻黃樓登不可無説更讀蘇詩引興發上惟青天張幕圓下有洪川流笏滑脫胎髙坐兩賢人便欲拾級嫌塵襪遐想九日勝賔筵痛飲豪歌鸚鵡呷亦未因樂忘憂民隄築王尊督錙鍤我來黃水雖刷沙災後飢民景憐煞北瞻沛沛開霸圖南望雲龍羅梵剎城頭曽不淖泥侵河中亦有鳴榔軋即景都弗減愁懷解嘲險韻聊吟壓泗水無從覓津滴楚山依舊圍􅚖齾嗟我羣黎乏衣食那有千村畜雞鴨違議紆程切痌瘝詎同攬結尋苕霅初議至徐州閲河大吏僉以頓次為積雨停潦所侵經途淖濘多方沮止朕以籌河恤災非事逰覽不可中輟排衆議登程連日晴明安驅周覽一如初指渡黃河春巡來往六乘舟總喜風恬濟巨流民務河防豫並厪天禧神貺衆蒙庥越山吳水别江國齊郡燕畿指陸郵只有此都人太鞠不堪蹙額望回頭荆山橋歌石橋三里許以長如虹蜿蜒飲兩塘南北咽喉形勝控春秋節宣計畫良東接睢邳耕桑野西連豐沛王霸鄉我曽坐照資利涉發帑修築乃如常乾隆丙寅發帑數萬修橋至丁卯年告成徐州省方今回蹕路便因度斯輿梁去嵗孫工河奪溜聞道經此東歸洋一百餘孔不足泄其時水過橋靣強水過沙渟半淤澱微山遂壅趨壑方疇咨督課速疏浚即今尾閭才通航吁嗟民艱觸目是善後之䇿猶茫茫入山東境去去雁鴻減行行雞犬繁一朝渾别省百里易方言對此慰誠切過來愁尚存亂山合沓處回首是彭門韓莊閘韓莊界微湖蓄水以濟運猶恐春水弱冬令例疏濬去嵗黃瀆溢壅遏湖流順泛溢連運渠無從辨隄堰即令漫縴道轉漕遲北進荆山近雖剔十未減五分立馬望湯湯播種待數郡艱矣籌何防恧哉念民困降旨截漕十萬石為徐州鳳陽各郡縣倉儲之備詩以言志加賑至夏五民猶未免飢平糶及借種諸政命齊施常平雖積貯展轉將無遺我身縱北來我心每南馳彭城實親歷瘟疫方時時不待監門圗目覩嗟流離鳯陽所屬縣聞亦同沛徐叶惠但施經見向隅豈其宜夏非截漕時災重不可泥叶分貯補倉缺緩急可賴之與我共治者寧非良有司體此在抱心推行其善為麥色麥色北來日勝前黍禾鋪野潤芊芊含風沃露清和月逭歉希豐齊魯田境不災荒方講讓戶多絃誦自興賢蕭豐均是吾民耳鵠靣鶉衣劇可憐詣闕里瞻拜去嵗躬親奠素王回程重謁廟堂皇誰知獻馘翻成偽去春以上年平定伊犁親告闕里啓蹕時適得擒獲阿睦爾撒納之報久之乃知䇿楞等為賊所紿輕信妄奏遂致餘氛更搆殃逆賊既未就獲揚竄哈薩克其餘孽尼瑪等復與噶爾藏多爾濟糾結為亂豈礙告成斯局定曰惟聲罪不庭方祖功聖德胥垂佑在泮行歌載輯章駐蹕古泮池之作古泮城東在鳴鑾此日停壁詩宛隔嵗去嵗駐蹕於此壁間留題庭柏只常青自較氊廬爽况看石沼渟卑宫近思訓切切志遑寧皇太后車駕至泰安行營問安紀事紆程十日往徐州齊甸言旋傍麥秋趨謁起居倍常敬慘舒民氣奏從頭謁岱廟六韻春巡限定程望嶽寄遙情用趁回塗便一申肅拜誠震方惟帝出寅德肇人生仰載無私禱祈年有屏營英雲龍寶殿佳氣護層城退憩尋環詠環詠亭在廟西側四壁刻歷代逰人詩詩裁不易評登泰山作合雲亭度棧縈紆旬嵗重教履巘途昔日今時渾不隔登封降禪總無須儻來憂樂亦矣矣試問山川亦異乎昻首天門三萬尺到因步步積工夫壺天閣迥閣昔經坐今來無復登攀躋緣未暇攬結識吾曽碧水自深澗白雲指上層勒崖多舊句歷歷可明徴回馬嶺昔人回馬地進馬跋巖扄夫子有明訓功毋一簣停朝陽洞當年題句處灑掃備延停雲棧有翹白岱峯未改青不教鎮留憩緣是舊曽經率以勞為逸天門即叩扃十八盤猶記昔登十八盤坦途髙架丈餘寬曽因過費飭方伯率為趨平奉大安戊辰恭奉成坦皇太后安輿登岱有司架木為棧道險竣皆途兹來朕䇿馬以登不令架木今度揮鞭吟馬上不教倣棧闢雲端石梯拾級千層迥却喜嶤峯本色看登泰山恭依皇祖詩韻春月南巡限程迫題詩興寄碧峯頭設如兩度皆空過辛未及今丁丑終覺一心太率浮謁聖才辭曲阜縣登山遂至泰安州乾坤普照天襟廓景仰奎章萬古留瞬息十春巖電影年來憂樂憶從頭誰能石上三生認且看煙中九點浮幻矣仙蹤謝蓬海憫哉民瘼指徐州雲巢若問前巡事岱頂行宫名戊辰三月孝賢皇后得病實于此灑空庭不忍留登玉符最髙峯得四百字春巡氣尚寒有興未登眺清和兹返輿日長况早到宇宙最竒處空過山靈譙設如逢炎暄揮汗亦何要時景值佳會况鮮幾務告邂逅不可失一暢智仁樂園北啓便門不必命旌纛肩輿陟崇椒林鳥為前導嶊崣羅疏峯威紆列層嶠陡壁若無路一線穿林徼或如田見龍或如霧隱豹或雄以狰獰或深以窅窱或秀若丹青或壯若廊廟樹抱石為胎泉飛峽成調山花霏細芳山禽遞幽噪歷歷所攬結朗朗開懷抱舍輿還進步何藉笻屐趠初至半室巖厜㕒以柵窖方狀儼維摩不著天花落叶為想詩僧逸頓息塵緣閙躡險捫煙蘿洞有白雲號膚寸一脈起澤應三農禱證盟功德頂調御真古貌巢鶴最髙處仙胎宛可召應接乃無暇竒觀拱四照南瞻日觀峯是我昨所造北睇鵲華翠雲中辨隱約其東朝公近疑聼錫聲摽惟西乃豁開來路盤崖隩已覺鮮其匹便欲觀其竅設匪片時勞安識無窮妙蒼然日色暮歸路尋舊峭憶昔可公輩别傳西竺教想亦巢許流林泉寄笑傲侵尋事莊嚴逐末吁可笑其師若有知弗許頭應掉有為法終幻成壞像相詔猶然冀施檀云有福田報松塢坐靜觀萬緣信誰覺忘物我未能吟懷且推敲恭奉聖母懿旨啓蹕還京紀事有序徐方時邁鸞馭暫違曲阜言旋帷宫載覲逮􅊩玉符之勝境泉石蔚其清涼聿奉鑾輅於名區飲膳調其旨適乃頒懿訓俾速星言奏小憩以同行未蒙慈允用首途而遄發仰體聖懷中宫率嬪御以承顔親藩整師徒而扈蹕稍稽旬日佇待起居詩紀五言情抒六韻南巡三閲月北至近臨期方澤躬禋祭明庭臚選時皇都程尚逺慈馭速非宜况喜名山秀欲留幾宿頤親藩簡護衛宫眷畢追隨懿命關勤政前驅志敬兹過運河一水宛分趙與齊浮橋飲練接長隄去才弱桞含煙嫩回看來牟擺浪萋較雨量晴以度耳慰豐愁儉亦紛兮僕人惟識皇州近揮䇿誰能惜馬蹄降旨免濟寧魚臺等五州縣積欠詩以紀事齊南五州縣去嵗秋霖傷荆山不能泄率因河為殃春巡始知然督課疏濬忙兹來問涸土一半才播秧其餘尚沮洳安可冀秋糧無收則賦艱災黎焉能償亟應籌撫恤詎可言出疆是日已過德州加賑至夏五更無施惠方亷知負逋賦其數十萬強槩與豁徴輸閭閻俾樂康羣赤庶少蘇努力西成望紅杏園簾樹羅紅雨庭莎深緑雲去來原未異春夏若為分榭較氊廬爽池饒氷沼文田田見蓮葉龜戲誦清芬駐蹕趙北口作萬桞跋長隄江鄉景重題誰知今趙北大似向杭西魚鳥悅人意蘼蕪惜馬蹄渚宫乘爽到雲水盻清淒往來三閲月瀟灑一憑窗了識隙隂速未能塵意降風漪青草接沙渚白鷗雙欵乃雲汀外漁舟唱晚腔新城道中北來麥益佳黍禾亦日好自此晴雨時西成冀萬寶邇來頗災蒸土燥埋秧小朝露雖略潤終覺為澤少為之復望霖因以常年考春旱率成例祈至花開棗麥秋恆歉登大田尚可保豈能如今嵗緑野懷新早蜀望人盡同欲速詎非躁叶自解雖如斯希澤終縈抱江浙晴方佳燕齊雨滋妙叶寰宇九萬里畢願時若報叶慰少憂恆多分應箇中老良鄉行宫晚坐停鑾來往近皇都瞥憶南巡此啓途三月光隂誠迅矣百年久暫豈殊乎展義從來重豫逰曰休曰助悉心求觀豐未覺饒同樂視歉惟因切先去聲憂越水吳山攬結餘北來饒得事何如清歡未抵殷憂盛不在蘇杭在沛徐甌香研淨值幾間記里詩篇自改刪却我無心戀江國是誰有意賦東山南巡回鑾駐蹕圓明園之作麥登秋穰黍全耕喜氣迎鑾逹帝京又此南巡成北返恰看夜雨值朝晴是夜微雨康功災壤憐羣赤勤政明廷接九卿懿旨身遵心膝下所欣旬日近歸程啓皇太后駐蹕靈巖以十九日鑾回京午熱緩行計當遲十餘日恭迎皇太后車駕至暢春園得近體一律方山佳景似西池養志因成小憩遲順旨遄歸勤大政問安頻遣繫遐思歡迎鳯輦臨長日恰駐仙園協凊時草日寸心縈頓釋階萱庭柏總含怡
