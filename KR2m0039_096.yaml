body:
  text: 海防海塘總圖浙東西十一郡杭嘉寧紹溫台六府皆臨大海溫台山多土結所有海塘之處間多碶閘斗門蓄泄之利多冲決之患少故厯來修築之事較省於他郡杭嘉寧紹四府江水順流海潮逆上加以回溜汕刷一日兩次非巨石長樁密排深砌不足以資捍禦然寧紹塘外沙塗近者二三里逺者或數十里非遇異常之湧漲潮不輕至塘根惟杭嘉二郡海水直逼塘下又與湖州及江南之蘇松常各府壤地相接是以防海工程北岸要於南岸按北岸海塘自錢塘縣之江塘起至江南金山界止袤延三百餘里跨連錢塘仁和海寧海鹽平湖五縣然省城以西乍浦以東皆倚山作隄土石相間向來稱為平穩自乍浦諸山突出海口南與鹽邑之秦駐山兩峯遙對山趾角張潮既入套不得舒展至尖山一束激起潮頭活土浮沙難施樁橛所以仁寧二邑之地在在皆屬險要全恃一線塘工為之捍衛塘工有土有柴有石石塘亦有二等自潮走北大亹以來嵗修搶築殆無虛日世宗憲皇帝特簡重臣相度形勢改建魚鱗大石塘一百餘里新添土備塘一萬四千餘丈築石壩以挑溜開引河以分流大工漸舉皇上御極以來一切工程次第告竣金堤屹若崇墉乾隆二十四五年間海潮漸有北趨之勢壬午乙酉聖駕親臨咨度疆吏恪遵謨訓隨時查勘章家菴至老鹽倉一帶加謹修防西塘自章家菴至老鹽倉舊以活沙不能受樁僅築塘庚子翠華五幸以柴塘長至四千二百餘丈未必盡係活沙特命大臣勘估將可以改建石工之處一律興築魚鱗石塘其鎮海塔東字號至陳文港等處為海寧全城保障亦均改建除章家菴天字號起西至范家埠寒字號止因迎溜頂冲先行搶築石塘五百丈外復自來字號起迤東至食字號止建鱗塘二千二百四十丈自場字號起迤東至因字號止建鱗塘一千七百丈甲辰再蒞復命范公塘一帶一律改建石工于是浙江海塘西起省城東盡尖山遂無一寸土塘現已化險為平安瀾永慶謹將全塘形勢繪圖綴說恭列簡端尖山石壩圖海寧州之東南有尖山其西有塔山相距二百餘丈為海潮入江門户雍正十一年內大臣海望等奏請於兩山間壘石為壩使江水海潮挑向外行於是先築雞嘴浮壩以挑水勢繼用竹簍裝石挨磡推墊計築起一百餘丈而波濤洶湧厯二年而不能合龍十三年大學士兼督臣稽曽筠奏請停止至乾隆四年巡撫盧焯復請接築其時護沙已漲前測量中流深十二三丈至是最深不過一丈九尺隨接續堵建築成二百丈鑄鐵牛四座以鎮之自此掣溜南趨北岸塘堤無濤頭冲突之患者垂二十年實賴此灞為之障蔽二十五年巡撫莊有恭以壩根護沙漸有坍缷請用長方竹簍裝填塊石緊貼壩身三層叠砌工長一百餘丈用以攩浪護根二十七年皇上親至尖山聖諭以其橫截海中直逼大溜為海塘扼要關鍵特敕加意修防相時改建條石壩工俾屹然成砥柱之勢命插立標記以驗漲沙尺寸三十年再幸尖山閲視量驗竹簍漲沙比較二十七年情形續有增長諭巡撫熊學鵬照新定標記辦理按月勘驗隨時修補兩月一次繪圖奏報四十五年總督三寶奏塔山口從前起有中沙一道計二千五百餘丈今春水稍旺逐漸刷低八百餘丈嗣大學士公阿桂奉命查勘奏尖山至塔山石壩內外自四十六年正月下句以來均有新漲嫩沙而壩外約更寬里許至六月中因風潮狂猛尖山石壩致有裂縫蹲矬潑缷之處總督陳輝祖奉諭趕集料物加緊鑲築搶護並遵前奉諭㫖如漲沙漸逺即改建條石壩工俾益鞏固無虞魚鱗石塘圖海寧州治濱臨大海早潮晚汐橫齧斜搜全藉一線塘堤以資捍禦從前石工皆外用條石包裹內用塊石堆填屢有潑缷康熙五十九年巡撫朱軾於普兒兜地方創建大石塘五百丈工堅料實足以捍禦頂冲世宗憲皇帝軫念海疆特令全塘一律改建魚鱗大石為一勞永逸之計皇上御宇復命閣臣綜理經畫為濱海生民計安久逺遂先築繞城大石塘五百餘丈次建東西兩防大石塘五千九百三十丈又于緩修工內次第改建連前巡撫朱軾所築共七千四百餘丈其建築之法先測量地勢髙下自十六層至十八層不等髙一丈六七八尺不等底寬一丈二尺頂寬四尺五寸為凖逐層收分陂陀斜下塘腳密釘馬牙樁四路間釘梅花樁七路用三和土堅築每層用厚一尺寬一尺二寸之大石條丁順間砌參差壓縫自九層以下外砌坦水保護九層以上至頂間層鑿成槽筍扣嵌錠鋦聨合牽制難於動搖石之接縫處用米汁油灰灌抿俾免滲漏其塘後身又加幫附塘土創髙過塘面三尺寬三四丈不等全塘以梁周興嗣千字文編號每二十丈為一字號自仁和章家菴天字號起至海寧尖山腳颻字號止共七百一十八號而老鹽倉改建鱗塘長至四千二百餘丈保衛民生永資利賴所有塘工正面形勢及排樁附創各式另圖如右又舊建鱗塘就地勢之髙卑定層數之多少今奏明統以十七層為率一律完整條石坦水圖浙江海潮隨地異勢澉浦以東潮水暗長自尖山激起濤頭斜搜橫齧潮退之時江流又順勢汕刷是以海寧一帶既重塘身又重塘腳此坦水之制實為護塘第一善策也但從前或用木匱填築或用塊石鋪砌雖多至數層終易潑缷乾隆二年大學士兼總督嵇曽筠建築魚鱗大石塘奏請改建條石坦水遂於繞城五百五丈二尺外鋪砌二層裡髙外低斜披而下面用條石鑲蓋底用塊石墊髙每層計寬一丈二尺石口各釘排樁二路關攔八年大石塘工竣議請一律鋪砌㑹以塘外沙漲停止二十四年潮溜仍趨北大亹石塘根腳尤資擁護巡撫莊有恭遵㫖於普兒兜大石塘四百六十丈外俱增築條塊石坦水又修補東西兩塘舊坦水并陸續改念里亭白牆門陳文港秧田廟等處草盤頭為坦水二十八年巡撫熊學鵬奏請小文前魚鱗石塘外建築坦水十六丈又戴家橋汛念里亭汛內有未建坦水者六段請一律添建二層以護塘腳二十九年又勘得海寧近城地面勢尤頂冲請於原築二層之外添建一層工長六十餘丈三十年皇上親臨相度以繞城石塘五百三十餘丈實為全城保障而塘下坦水尤所以捍衛塘身上年加建三層止有六十餘丈殊未全備降㫖將應建之四百六十餘丈一例普築三層石坦既以捍蔽塘根復可保護城郭四十五年復奉恩㫖將老鹽倉等地一律改建魚鱗大石塘經大學士公阿桂等議現築之石塘擬離柴塘土創二三丈酌量坦水地步俟全工告竣後酌地形之髙卑水勢之平險再建坦水及木匱竹簍等俾塘根得資擁護章家菴柴盤頭圖柴盤頭即挑水壩突出海中形如半月蓋其處塘堤原屬平穩忽因對岸漲有新沙或海中沙灘隂積水勢直冲平即成險故築此以挑溜其式下捆掃牛鋪底或以竹簍盛石為腳周圍密釘排樁加鑲柴土又用磈石貼樁填砌以固根基按丈簽釘底面腰樁各二根再于頂上用雲梯蜻蜓架釘長樁深貫其底形制大小不等有髙至三四丈外圍三四十丈直長一二十丈者自潮走北大亹後隨時建築自西至東計有普兒兜馬牧港戴家石橋秧田廟賣魚橋小文前鄭九臯門前白牆門陳文港念里亭共十座乾隆四年巡撫盧焯復以塘外漲沙漸逺無溜可挑請俱改建石塘奉㫖准行二十四年潮勢又直逼塘下巡撫莊有恭奏請興復陳文港念里亭盤頭二座以挑急溜嗣後秧田廟白牆門曹將軍殿普兒兜馬牧港韓家池凡值頂冲之處又經陸續添設自二十七年至三十年以後因各工次第改建坦水止存普兒兜馬牧港曹將軍殿韓家池四座四十六年大學士公阿桂查勘塘工以水勢北趨仁和之章家菴頂衝險要欽遵諭旨於其地添築盤頭自後溜勢漸離塘根搶築塘工可期平穩范公塘石工圖仁和范公堤外頭圍沙塗挺入江心江流南行向北直刷章家菴其地遂成頂衝前議開濬引河使江水東行頗為順軌皇上六巡浙江復以范公堤本係土塘不如石工堅固因命一律改建石塘使省城永資鞏護
