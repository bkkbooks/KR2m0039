body:
  text: 河防乾隆四十八年三月十一日两江總督兼署河道總督薩載奏言竊照江南黄河北岸通連㣲山湖及運中河一帶上年經臣與河臣李奉翰遵㫖酌籌先後将潘家屯張家荘蘇家山之水線河并十字河顧家荘河北鎮等處開放分洩入黄均属暢達今豫省南岸引河告成欽差大學士公阿桂㑹同河撫諸臣商酌擬于清明以前開放𨗳引黄流順軌下注河臣李奉翰與臣督飭南河各㕔營将北岸各水口興工堵築業經臣於督辦各㕔春修工程摺内聲明奏聞嗣據各㕔營陸續禀報潘家屯張家荘以及蘇家山之水線河十字河之臨運黄各壩均經堵閉堅寔惟中河顧家荘一處口門較寛相距臨黄之河北鎮口門亦近洩水本暢口門收窄溜勢愈覺湍急堵閉稍難經臣耑委淮揚道師彦公淮徐道劉錫嘏河營叅将鄭永泰駐彼督率中河桃源㕔營各於金門下埽分投儧堵兹於二月二十九日将臨運臨黄兩處壩工俱已一律堵合斷流現各追壓以期到底並接手趕辦内澆土戧外廂防風可期堅實穩固此外黄河兩岸春修埽工亦俱鑲做完整足資抵禦豫省如期放水下注自可循軌暢達歸海至目前㣲山湖洩下之水綂歸運中河不無稍長上年經欽差大學士公阿桂㑹同臣勘籌預将運河北岸増挑引渠三處并因劉老澗閘底較髙復於閘旁開挑引渠一道滙入閘下引河均歸駱馬湖六塘河分洩去路甚暢是以中河内自顧家荘堵閉後僅長水二尺餘寸不致盛漲其海州境内漣河展挑寛深各工現據具報已有九分工程日内即可完竣下游添一分洩之路歸海又必迅速若上㳺豫省黄水歸復故道則㣲湖運河之水更必日漸消落臣現在確探一俟黄河水頭下注再行星馳奏聞仰慰聖懐奏入上諭曰覽阿桂已奏黄河歸故道何尚未至江南境乎乾隆四十八年四月十二日大學士公阿桂河東河道總督何裕城山東巡撫明興奏言竊照豫工合龍後東省各處坡水從上而下以次就消湖水亦漸見消動其運河堤岸臣明興率同前任藩司陸燿運河道沈啟震等逐一查量隨時登記各縁由業經恭摺奏蒙聖鑒臣阿桂臣何裕城先後自豫起程由山東之菏澤鉅野嘉祥取道至濟沿途察看各該縣境内漫水已經全涸其濟寧西北一帶臣阿桂上年冬間所見被水之區現涸出四五十里田畆耕種者頗多至江南之藺家山壩前據河臣李奉翰札知及河員等禀報自三月十六日見消起至二十八日共消水一尺八寸臣阿桂復派軍機章京舒濓直至荆山橋查看水勢據該員禀稱該橋一百九十餘孔現仍孔孔過水其中泓水勢八九尺至一丈不等流行甚駛運河内落水八九寸至一尺餘寸不等而㣲湖水誌自上月初一日豫省放河後迄今止消水三寸仍深一丈八尺一寸者臣等悉心體察縁各湖地勢本属最窪㣲湖又為各湖之歸宿水勢從西北向東南收束是以湖靣日覺收窄而湖口誌樁仍未見速消目下各路坡水日漸減涸荆山橋仍前暢達且駱馬湖自上月十九日䦕放運河後水勢亦應消動則江境運河之水又可由臨湖王栁各閘分洩是上㳺来源既截下路復多路分消㣲湖水勢自不難於早符定誌至運河堤㟁自乾隆四十六年豫省曲家樓漫水下注濟寧以南湖河相連汪洋一片其下則直注八閘其上則倒漾至趙村石佛閘一帶東西兩岸土石堤工淹漫者㡬及二百餘里其正閘单閘橋壩各工亦俱漫於水底屢奉諭㫖廣籌宣洩水勢得以陸續消退臣阿桂臣何裕城抵濟後復㑹同臣明興乗船上下察看自濟寕在城閘下起至江境黄林荘止綂計两岸土石堤工共長五萬三千二十餘丈現已出水者二萬八千九百七十餘丈未出水者二萬四千四十一丈民捻共長五萬五千八百五十餘丈現已出水者五萬十丈零未出水者五千八百四十丈零正閘二十三座已出水者二十二座惟六里石閘一座舊制本低現與单閘橋壩涵洞等工俱漫水中今就現在情形約加估計除地形最高未經漫水及雖經漫水不致殘損之堤埝均毋庸估計責令額夫平墊外其堤根水淺汕刷無多之各叚均照舊式估加修補至逼臨湖坡水深之處堤身收分丈尺亦照舊制估計惟堤頂高處若按叚估辦未免低昻不一查出水之堤有現髙至四尺者即照此勘估總以髙出此時水靣四尺為度以期一律整齊平坦計興工時堤根已涸乾者純用土方堅築如堤根尚存積水土工難以站立者照老堤舊制添估碎石坦坡其缺口水勢較深者則用排樁廂埽俾土工可期堅實又魚臺汛東堤向来僅髙五六尺許應加髙土頂二尺以偹縴道其西岸排樁工及韓荘一帶大石工仍照舊估辦不必増髙以節帑項再運河正閘底石板已損之處方可拆修其餘或補修數層或止加鈎抿惟現漫水中之单閘橋壩涵洞等工殘損既多均應拆估重修舊閘之下跌有深塘者酌為移建築堤之後往常壩内坡水難以立消者則於最窪處酌添单閘以洩之又各閘及滚水壩等工俱應於水中簽樁鋪底必湏先築圈壩以便動工其韓荘大石工數千丈西靣逼臨大湖亦宜照舊制於該工之外先築圏壩将根盤堅築至兩岸民埝前奉恩㫖概歸官辦埝身寛窄不一兹照官堤稍窄之工酌估而頂髙之處則與官堤相平庶上下堤埝相連倍加平整以上各工除将堤身舊土及尚可應用之舊石通盤核抵外計两㟁土堤及加築碎石坦坡工共需銀十萬七百三两零民埝土掃及排樁等工共需銀三萬六千三十四两零排樁碎石堤工並填築土心及上加頂土共需銀二十八萬八千八十九两零大石壩工共需銀十萬六百六十八兩零修做閘座橋壩涵洞裹頭並築圈堤等工需銀十二萬四千二百七十四两零通共估需銀六十四萬九千七百七十两零此係就現在水勢約略估計但水底探量究恐不能甚凖仍俟秋令動工時逐一再查如尚有可減之工即歸節省核實請銷如實有闗宣洩必湏量為増改之處臣何裕城等另行具奏或因取土遥逺以及風雨守候臣明興酌量辦理毋庸復請䦕銷致滋糜費之漸再查官堤舊制道路已属綿長今民埝統歸於官辦則叚落更為遥逺臣等於酌估之便復公同商酌所有自濟寕在城閘下起至新店閘上止一段長三十里自珠梅閘下白家水口起至彭口閘下止一段長五十里並将望湖亭至黄林荘一段長八十餘里均係地形稍髙現可取土自當派員即行修辦則秋令以前可先得工程十分之三其餘水深各工仍照前奏於大汛時将採買已到之木石料物分運工次並多𣲖人員認明段落一俟秋令水退普律興工分投趕辦㫁可不致遲悮其運河正閘應送漕艘而滚水壩等工亦資宣洩未能同時並舉查本年糧艘抵東各帮較之上年已早半月况河湖水勢日減更可銜尾遄行而江西省蠲免漕糧重船又經減少約至九月以内囘空定可全出東境維時将届冬令水勢全涸閘壩各工次第儧辦計於四十九年春令以前一律完竣概復舊制奏入上諭曰如所議行用項足否乾隆四十八年四月二十三日两江總督薩載河道總督李奉翰奏言竊照江南黄河地處下㳺两年来凢河身淤淺之處及露出灘嘴節經督臣薩載隨時勘估屢次挑切以期寛深順勢今黄水復歸故道必湏上下相度溜勢之趨向預為防範臣自豫省蘭陽新河一帶查勘回南督同總兵銜左營副将李永吉上由虞单交界至清口一帶沿河探量黄河水靣寛九十餘丈至一百三四十丈不等一律深通流行迅疾毫無阻滯大溜仍循舊軌東注惟豐碭北岸石林地方從前溜走中泓二十年來舊工淤閉今黄流下達溜勢稍向北趨現在尚存灘靣三十餘丈恐将來或致生工臣已飭令該管㕔員運貯料物以為有偹無患之計其餘形勢如常並無改易至外河順黄壩南岸一帶乾隆四十六年六月内大學士公阿桂覆奏河工圖内於御樁亭之西仰蒙皇上硃筆㸃記飭令詳加籌畫當經臣與督臣薩載㑹同履勘奏請在於該處築做磨盤大壩以資挑䕶奉到硃批此非目前急務矣俟新工合龍後妥為可耳欽此今黄水下注溜勢仍由西南坐灣臣到彼察看現在塌崖自應在於該處用柴土廂做磨盤壩工使河勢不至卧進有碍木龍既可保䕶南岸灘崖又可挑溜東趨實属两有禆益現已督飭道㕔確切估計造冊具詳核實興工奏入報聞乾隆四十八年五月初九日河道總督蘭第錫山東巡撫明興奏言竊查東省濟寧以南運泇两㕔属堤岸工程先經臣等㑹同大學士公阿桂確切勘估需銀六十四萬九千餘两奏蒙俞允並荷聖慈垂念大工用項特賞撥部庫銀五十萬两到東俾資應用臣明興因興工在即飭令藩司孫士毅於餘剩恩賞商捐項下先撥銀二十萬两發交運河道庫先行支給其運道两岸工段臣等惟有率同辦工司道等慎重撙莭上𦂳籌辦以期得尺則尺漸復舊制兹查月餘以來各湖水勢已共消落一尺有餘兩岸堤形露出更多所有原估土石工程除各閘座橋壩等項現在尚漫水中應俟水勢減落再行確核情形分别修舉外其東西两岸堤埝内有出水漸髙之處如運河㕔境内自濟寧在城閘下至新店閘一段及泇河㕔境内自珠梅閘下至彭口閘上一段又嶧汎八閘内一段均可遵照前奏先行赶辦其餘各段落雖應俟秋令䦕工而通計湏用木石料物為数甚多上年採辦之樁木大石計數尚属不敷至碎石一項亟湏䦕採必湏乗此数月内一一辦齊陸續運貯各工以便臨時取用不致稍有停待臣等就工程之難易定銀數之多寡遴𣲖地方河工各員酌定段落分投承修共計将两岸堤工分為四十九叚内属運河㕔境者計二十九段委令運河道沈啟震在濟寕一帶督催其属泇河㕔境者計二十段即派前任布政使陸燿駐夏鎮一帶督催其隨同分催之員復委在工効力之李封陳淮並東昌府知府興安兖州府知府王祿朋及丞倅等官分路查催以期迅速臣等俟部撥銀两解到時飭令孫士毅再行按時續撥由運河道轉發承修各員陸續領辦所有現在應行先辦之三段即令分得該工之員飛即集夫興築已於四月二十八日䦕工臣明興現赴濟寧一帶上下督催趕辦秋令以前先行辦畢迨一交八月以後水勢更落各工物料亦已偹辦齊全即可次第興修一律妥完不致遲悞臣等仍不時往來查察務期併力同心要工畢舉以仰副我皇上慎重河防漕運之至意統計此次工程按照漕規已属敷用或尚有例外支給臣明興即當通融籌辦以資接濟奏入報聞乾隆四十八年五月十三日两江總督薩載奏言竊臣於徐州交缷河篆後即遵㫖前赴沛縣勘籌移建城工均經恭摺奏蒙聖鑒嗣臣帶同各道府自徐至淮将淮北各處行宫詳細確勘凛遵聖訓祗将舊有房間粉飾裱糊見新其新添之黄巚行宫移建之楊家庄行宫亦各撙節估辦不敢稍事増華至金山對岸之師古灘至棲霞一帶前經臣奏請䦕挑河道以通舟楫以避長江之險仰蒙聖恩俞允撥發帑金當即確估派委十三州縣分段承挑臣今春陛辭回南暫駐清江督辦河務所有師古灘河道責成江寧總局司道就近督催赶辦嗣據禀報河已挑成其河頭河尾以及两岸尚湏建設閘座酌開涵洞以資蓄洩禀請勘籌到臣查該河既已開通即為商賈往來要道自應籌計萬全庶可一勞永逸應添閘洞亦湏熟諳人員確估此時河工事簡加總兵銜之副将李永吉素稱諳練現在無事臣即帶同該員渡江與司道等由師古灘以至棲霞挨工查騐該河員已照估挑挖其中尚有應行收拾之處而原估口底逢灣處尚覺稍窄两岸縴堤亦覺卑矮該河南岸一帶多山遇雨則山水下注盡歸新河北岸則多汉港通江潮汐往來夾沙而行均不免於停積自應於两岸多設涵洞河頭河尾亦應建設閘座相機啟閉則山水江潮出入節宣有制可無壅遏停沙之患惟是此河現已挑通壩基尚未起除臣體察輿情商民亟思通行舟楫臣隨将两岸應行收拾之處指示各工員上緊收拾並将建設閘座涵洞處所勘定交李永吉等詳細確估一靣即令各工員将壩基先行起除淨盡使江潮灌注水勢通流聴民舟楫往來試騐仍於水平之後潮小之時測其何處寛深何處淺窄逐一插立標記俟本年霜降後水落潮平時再行築壩展挑寛深並将两岸縴道加培髙厚其應建閘座涵洞現在委員購料次第分投趕辦務於霜降後一律完工則來年春水長發開放通行商民更可永資利賴臣騐籌事畢即由棲霞勘工回省其李永吉於各閘洞估計核定已令仍囘河工辦事奏入報聞乾隆四十八年六月初六日河東河道總督蘭第錫山東巡撫明興奏言東省濟寧以南運河工程仰蒙皇上特發帑金乘時修復因两岸工段綿長計程三百數十里分段派委需員甚多現在臣等将水勢消落易辦工段先行興修已於四月二十八日動工業經奏蒙聖鑒其餘各段先令領銀辦料以偹臨時應用所有丞倅州縣佐雜及㕔汎等官已派有一百餘員一至秋令水落工程齊舉加以協辦分催在在需員未免不敷派委現有來東投効之候補候選等官情願各認工段捐資承辦又有革職降調等員亦情願一靣自行出貲分段承修一靣照例呈請捐復原官紛紛具呈到臣臣等伏思運道工段較長必湏多員承辦此項投効人員果能奮勉出力則工程既得尅期早竣而正佐等官便可減派數員更於地方有裨可否准其在工効力之處出自皇上天恩如蒙俞允臣等即於两岸堤工内添出數段令其自行出貲承辦無庸動支帑項除查明各該員履厯分别䦕列職名另行具奏外所有呈請投工効力人員應否准行臣等謹先㑹同請㫖奏入諭部速議乾隆四十八年七月初九日河道總督蘭第錫山東巡撫明興奏言竊照東省濟寧以南運河两岸縴道工段綿長計程三百數十里分段派委需員甚多現在丞倅州縣佐雜及㕔汛等官已派有一百餘員一至秋令水落工程齊舉加以協辦分催在在需員未免不敷派委現有來東投効之候補候選等官情愿各認工叚捐資承辦可否准其在工効力之處經臣等恭摺具奏經部議覆准其留在東省捐貲承辦查明人數止湏足敷差委毋任濫收併将人數履厯報部存案奉硃批依議速行欽此行知到臣臣等查投工効力人員現在來東具呈者自丞倅而下至佐雜等共三十六員内有本應即用者有議叙分發者有止應雙月選用者資格既有不同工程之難易亦属不一若不量加限制聴其自行佔認不特㪚漫難稽亦易啟趨避之弊臣等公同斟酌量其班次之遲速以定出資之多寡按照原估工程派出次難者三段責成該員等分段承修仍𣲖委熟諳工程之員協同辦理務湏材料堅實工程穩固不得草率從事希圖将就完工令原派之督辦分催各員輪流稽查毋許稍有偷減懈怠臣等仍不時查考稽其分數勤惰以定将来之優劣如有辦工不如式者立即掣去除将人數履厯造冊報部存案外臣等謹䦕列各該員簡明清单恭呈御覽奏入上諭部知之乾隆四十八年七月十一日江南河道總督李奉翰奏言竊照江南黄河地處下㳺河形窄狭今嵗黄流歸復故道恐大汛水長時溜勢或有改移必湏留心防範先事綢繆臣於四月内自豫囘江沿途察勘河溜趨向情形見豐碭北岸石林地方河勢坐灣溜往北趨止存灘寛三十餘丈即慮生工當經飭令該管㕔員運貯料物以為有偹無患之計並經恭摺奏聞兹查前月以來黄水漸次加長該處大溜趨逼刷灘迅速情形喫𦂳臣隨督令道将㕔營一靣儧築壩臺加帮裡戧一靣趕𦂳䦕槽預辦下埽旋即溜勢刷至堤根半月内已接續做成新埽七十餘丈趕𦂳追壓到底一律廂做堅實現在埽外水深二丈五六尺至三四丈不等臣上下相度大勢已定専委總兵銜副将李永吉在工督辦所做新埽隨時保䕶足資抵禦可免他虞又邳睢㕔属黄河南岸瓦房工從前大溜䦕行上中下三段舊埽工長二百餘丈已􅌎閉多年前嵗溜向南趨下叚先已生工今黄水加長溜復上堤臣與道将等勘籌商酌若上段中段同時廂做不但緩不濟急並用料較多徒滋縻費隨于上段督令趕做挑水大壩一道挑䦕溜勢中段即經平穩可以毋庸搶辦動用料物錢糧現令淮徐道核實造冊請銷不使稍有浮冒再外河老壩口至紅幅荘一帶堤長四百七十餘丈外係埽工内係深塘情形既属单薄而溜勢又係頂冲不得不早為籌計若将後塘一律填平需費浩繁臣再四思維惟有将堤工加帮寛厚以資捍衛就堤工臨溜之緩急定帮寛之丈尺共需土方銀一萬一千餘两如此斟酌辦理庶錢糧不至多糜而堤工實資鞏固奏入上諭曰覽奏欣慰乾隆四十八年七月二十一日山東巡撫明興奏言竊照濟寧以南運河两岸工程最闗𦂳要屢奉諭㫖嚴催重運船隻迅速抵通並令回空各帮速出東境以便運河工程及早興修查運河自六月以來湖水日漸消減臣查看情形彭口閘至十字河向係涸淺處所南陽棗林新店以及石佛趙村等閘两年来因湖水浸漫未經大挑两岸堤工坍刷入河未免淤淺恐江廣各帮船重難行臣督飭地方河員齊集人夫設法疏濬一靣多撥剝船隨時起剥漕臣毓竒押送尾帮来東又復親身督押上下往來照料儧行并押令旗丁多加縴夫日夜趕挽各帮船隻俱依限行走並無遲滯六月二十四五及七月初一等日各属又普得透雨閘河水勢連日増長足資浮送兹江西各帮已於本月初四日全行過濟較之上年實早五十五日漕臣毓竒即督押尾帮沿途催儧北上諒可遄行無滯現據具報豫東回空漕船已次第入境已飭沿河各委員迅速嚴催俾囘空各帮接續南下早出東境一俟秋汛過後水勢消落所有两岸各工即可普律興修現在所辦各段臣往來工次逐段查看運河㕔所属在城閘以下第一第二分已修完一千六百二十餘丈泇河㕔所属珠梅閘以下第一第二分又嶧汎閘内第二十分已修完三千九百三十餘丈臣親加查騐俱属合式完整稍有夯築不如法者臣即靣加指示務令一律堅實鞏固至两岸土石堤工自四月以來續行涸露者又有二萬三千餘丈其間段漫水之處通計尚有六千二百餘丈所有涸出之處可以施工者臣已飭令原派各員酌量地勢即行趕修總期得尺則尺現在㣲山湖水量深一丈五尺南陽湖水現深六尺四寸昭陽湖水現深七尺五寸獨山湖水現深七尺一寸将來汛水過後下流暢消間段漫水之處自可全行涸出一律動工尅期完竣所有應用土石物料現在陸續督催運貯各工以偹臨時應用以期無悞奏入報聞乾隆四十八年八月初二日两江總督薩載河道總督李奉翰奏言竊查黄運湖河伏汎安瀾情形業經臣等恭摺奏聞嗣據河南陜州呈報萬錦灘黄河内七月初四初七初九等日三次共長水一丈二尺又據黄沁同知呈報沁河内初八日長水六尺三寸滙歸下注南河交秋以後黄水有長無消徐城誌樁現長至一丈三尺七寸查南岸之毛城舗峯山四閘先經次苐啟放其北岸之蘇家山滚壩普靣過水一尺及一尺五六寸不等四路分洩而水勢未消上下各㕔工程在在報險如桃源㕔属之七里溝宿虹㕔属之化村舗夏家馬路朱家閘邳睢㕔属之七壩魏工或溜勢下移異常湍激或埽工塌缷傷及堤坡急需搶辦臣李奉翰即由桃源宿虹以至邳睢挨工查勘督飭叅遊㕔營分頭搶䕶淮徐道劉錫嘏在豐碭一帶巡防據報亦星飛馳至下㳺料理或轉運料物或跑簰買土晝夜赶辦各工現俱搶廂平稳保䕶無虞臣薩載自東省㑹勘運河工程事竣回徐接據銅沛㕔營禀報張家馬路溜勢頂冲舊埽塌缷潰傷堤頂當即委令加總兵銜副将李永吉并銅山縣知縣田文龍酌帶銀两星夜前赴該工㑹同該㕔營實力搶䕶臣薩載亦即到工察勘查張家馬路一工最為𦂳要乾隆四十二年八月内因水長工險曽經前督臣髙晉查勘該工内塘寛深越堤綿長當經加帮髙厚䦕挖進黄出清溝槽放淤保䕶平稳嗣即逐漸淤閉本年因溜勢上堤直射該工刷去外灘将上壩舊埽二十三段計長一百六十二丈全行塌去潰傷堤頂幸内塘淤髙尚有後靠但係迎溜頂冲必湏摟䕶惟隨廂隨塌舊料業已用盡無可措手轉運緩不濟急所幸新料已經登場買運交工接濟無如工叚綿長所費不貲隨與李永吉等靣為商酌該工越堤寛長尚属可恃第年乆恐有隙漏隨即跑簰買土帮築裡戧一靣将上壩掃工趕𦂳補廂挑䕶一靣在於下壩挑挖進黄溝掣其溜勢順流下注則上壩不致着重并将大王廟後撑堤挑開使水勢灌滿下塘澄淤由四道溝渠出清仍歸正河下注以水禦水可無冲囓之虞開放水戧後仰賴聖主洪福河神黙佑溜勢順行業已化險為平至該工大王廟前後皆水則廟宇自難保全現已敬謹移請神像在髙阜處所安置俟該工淤定再為遷盖其越堤仍飾加謹保守不使稍有疎懈奏入報聞乾隆四十八年八月二十五日两江總督薩載河道總督李奉翰奏言竊臣等前奏黄河水勢盛漲搶䕶各工及張家馬路酌放水戧平穩情形一摺奉到硃批以手加額覽之秋汛即至敬之慎之欽此又摺内張家馬路放淤将廟後撑堤挑䦕使水勢灌滿内塘句上奉硃批此法甚好欽此又接准乾隆四十八年七月二十七日上諭據薩載等奏黄河水勢盛漲搶䕶各工及張家馬路相機酌放水戧平穩情形一摺已於摺内批示矣此次伏汎黄水連前共長至一丈三四尺大溜奔騰浩瀚實為盛漲上下各㕔工程如夏家馬路張家馬路等處在在險要該督等督率在工員弁人等或趕𦂳搶䕶或酌放水戧仰賴上蒼嘉佑河神黙助得以化險為平各工保䕶安稳以手加額欣慰覽之朕感荷之餘益深䖍敬現在秋汛即至新河下㳺在在喫𦂳薩載等尤宜倍加謹慎督飭工員晝夜防守保䕶各工俟秋汎奏報安瀾後再降諭㫖将該督並河東江南两總河及在事出力員弁交部議叙以示奨勵再閲圖内張家馬路堤後塘内清水深八九尺至一丈一二尺不等恐傷及堤根亦為可慮此時如能放淤使水去泥澄壅䕶堤根固為盡善否則亦湏設法疏消毋令清水積存堤外致貽後患上届南巡時閲視河工亦見數處堤後尚有積水彼時曽諭設法疏消放淤該督等並宜逐一留心查勘一律妥辦或放堤外以為鞏固堤工之計至薩載等另摺所奏李家荘口門外黄水漸次増髙恐致漾入淤墊新河已於六月二十八日堵閉等語楊家荘口門出水既暢自無湏李家荘新河分溜該督等相時堵閉所辦甚合機冝但何以未經奏及計彼時薩載已赴東省㑹勘運河工程李奉翰何以亦未具奏直至降㫖詢問始行奏覆伊等豈未知朕厪念河防昕夕懸注耶着傳諭該督等此後凡有關河務事宜俱着隨時具奏以慰厪念将此由四百里諭令知之欽此臣等跪讀之下感悚交集查李家荘口門前經相機堵閉未能仰體聖心隨時奏聞實切惶恐時當秋汎臣等理應督飭工員加謹保䕶且頻年河務上厪宵旰殷勤感荷天庥今河流復歸故道臣等更當竭力修防以期安瀾永慶仰慰宸𠂻此臣等職分應盡之事乃蒙皇上先事施恩飭俟秋汎安瀾降㫖将臣等並河東河臣及在事出力員弁交部議敘聞命自天感激無地臣等敬将奉到恩諭傳宣在工文武各員咸知感戴倍加奮勉晝夜在工敬慎防守不使一刻少懈並經札㑹河東河臣蘭第錫一體欽遵督飭防䕶以副聖懐張家馬路新放淤工塘内清水較深誠如聖諭恐致傷及堤根仰蒙指訓應使水去泥澄或設法疏消毋令清水積存堤外致貽後患聖慮周詳至明至當臣等查該工下壩内塘自清水灌滿以後由五道水溝而出仍歸正河進黄出清逓行灌注内塘清水原深八九尺至一丈一二尺者今測量止水深一二尺至四五尺不等計已澄淤六七尺至丈許進黄口門水勢平緩出清溝五道水深自四五尺至八九尺不等塘内仍在澄淤今秋可望淤平大堤内帮裡戧外䕶埽工均甚穩固上壩埽外溜勢日漸開行該工可保無虞至此外舊有數處堤後積水或空塘之處上届恭逢聖駕南巡時親臨閲視指示設法辦理如順黄壩並夏家馬路等處臣等已凛遵聖訓用土填平其外河老壩口一工因係從前漫水冲成深塘寛濶積水過深放淤既不放心若将積水放於堤外而周圍俱属民田並無可通引渠且車水填土不惟需費浩繁附近亦無處取土臣等前經靣加籌畫惟有将堤工加帮寛厚以資捍衛估需土方銀一萬一千餘两當於本年六月十三日繕摺具奏並繪圖貼說恭呈御覽七月十一日奉到硃批覽奏欣慰欽此查該處加帮堤工飭令層土層硪修築堅實現已儧辦将次工竣足資穩固其餘各處現在督飭道廰詳加確勘臣等惟有凛遵聖訓留心勘籌相機妥辦務使堤工一律鞏固以仰副我皇上慎重河防之至意再臣等前奏各工搶䕶平稳後大河已消水二三尺不等臣等業於七月二十九日恭摺由驛奏聞嗣於八月初二日至初八日復又陸續長水二尺五寸徐城誌樁仍長至一丈三尺七寸與上月相等各工加謹修守仰賴聖主洪福天氣晴爽風勢寧静河流循軌暢行通工俱属穩固今水已平定三日時交白露可望漸消臣現惟嚴督各工員倍加保䕶以兾秋汎安瀾上慰聖懐奏入報聞欽定南巡盛典卷四十九
