body:
  text: 欽定四庫全書欽定南巡盛典卷三十五河防臣等謹按周頌般言允猶翕河敷天裒對而時邁舉懷柔之盛亦河為稱首誠以四瀆莫大於河制備時巡則敷土惠民澤國益資利顧近世治河之法不外乎以隄束水以水刷沙而尤莫善於以水治水河治而江淮湖澤無不治所關於民生漕運者非淺鮮也溯自聖祖仁皇帝六幸江南指示興修河湖循軌世宗憲皇帝特頒帑幣增築高堰諸工立法極為詳備皇上睿謨廣運丕纘前功六駕鑾輿親授方略炳燭於幾先疇咨於事後者固紀載所不勝書而臚舉其要則如十六年之添建淮安城外石磡加增洪湖智信二壩閉天然閘定過水志二十二年之疏濬荆山橋水加築徐州石工二十七年之落低金灣壩尺寸挑濬駱馬諸湖渠三十年之增設清口木龍培濬常鎮墟汊綱舉目張釐然就理逮至四十二年陶莊引河告成清水永無倒灌而四十五年四十九年又叠邀臨視於舊堤腹則用土填實於九里岡則别開引渠於徐城則加高石工於高堰則改磚為石他如二套外之修補縷堤雲梯關外之不必建閘江南錢家港之便民河山東運河之修補堤埝並次第施工一勞永逸勤求於法宫宵旰之中而觀成於雲旱巡行之候祇貺屢昭百神奉職河湖翕治糧艘遄輸億萬年無疆之利濟洵為摹繪叙述之莫能罄者已謹志河防第四欽定四庫全書欽定南巡盛典卷三十五河防乾隆十六年二月十四日上諭內閣曰朕經過淮安見城北一帶內外皆水雖有土堤為之防禦而人烟凑集之區設經異漲其何以堪甚覺怵然亟應改建石工以資保障著總河髙斌等㑹同總督黃廷桂確勘詳估及時建築毋忽乾隆十六年四月初六日上命軍機大臣傳諭河道總督髙斌曰朕閲視髙堰山盱工程沿堤桞株稀少著於堤面堤坡寬空之處多為栽種該官員加意培植俾之暢茂庶堤工既資鞏固而工料亦得有備該總督即遵諭行乾隆十六年四月初十日上諭內閣曰洪澤湖上承清淮泗潁諸水滙為巨浸所恃以保障者惟髙堰一堤天然壩乃其尾閭伏秋盛漲輒䦕此壩泄之而下游諸州縣胥被其患冬月清水勢弱不能刷黃往往濁流倒灌在下游居民深以䦕壩為懼而河臣轉藉為防險祕鑰二者恆相持朕南巡親臨髙堰循堤而南越三滚壩至蔣家閘周覽形勢乃知天然壩斷不可䦕夫設堤以衛民也堤設而民仍被其災設之何用若苐為掣流緩漲自保上游險要各工而鄰國為壑田廬淹沒弗復顧惜此豈國家建立石堤保護生靈本意耶為河臣者固不當如此存心也天然壩當立石永禁開放以杜絶妄見近者河督大學士髙斌副總河巡撫張師載於䦕天然壩之說亦深以為非而請於三滚壩外增建石滚壩以資宣泄朕親臨閲視謂增三為五即以過水一二尺言之向過三尺者即為五尺向過六尺者增而至丈是與天然壩名異實同人必有議其巧避䦕壩之名而隂襲其用者自當為之限制上年滚壩過水三尺五寸天然壩仍未䦕放應即以是為準俾五壩石面髙下維均以仁義禮智信為之次仁義禮三壩一如其舊智信二壩則於石壩之上加封浮土必仁義禮三壩已過水三尺五寸猶不足以減盛漲則啓智壩之土仍不減乃次及於信斯為節宣有度較之開天然壩之一往莫禦者懸殊矣再高堰石堤至南滚壩以南舊用土工石堤有首無尾形勢不稱應自新壩北雁翅以北一律改建石工南雁翅以南至蔣家閘水勢益平則石基甎甃如此方首尾完固屹如金湯永為淮揚利賴至洪湖束水藉以刷黃而上游宿虹鳯潁諸邑嵗被水患議者謂洪湖盛漲諸邑先被其災泄洪湖仍於上游無補自朕觀之漲減則上游之漫溢者亦減此固在封疆大吏於未被水時先事綢繆而司水土者亦未可以閭閻休戚非已職掌所在而専以束水保堤為得計也河工宿弊不可枚舉而無益之費尤多或明知無用而因循弛廢或隂以為利而妄事興修高斌張師載於此雖能持正如茆家墟頭二草壩固已廢所當廢而此外無益之費即以朕巡視高堰一壩之內已不勝屈指數然屬員已議其不發帑不興工矣朕觀河臣管領河漕數千里民命所繫視督撫綏緝一二省者為難冒涉風雨守護隄防亦視督撫坐辦案牘者為勞而督撫職在刑名錢榖事有實據是非難掩河臣遵守章程可以福命茍安無事則其任較易歷年河臣不乏表表尸祝之輩而糜帑養患有罪無功其識機宜得關鍵實著功效者幾人哉果使全不興工則置民瘼於不問河臣幾於虛設固無此政體如其糜脂膏以擲虛牝則蠧弊之最巨者總之河不可不治而勿循其虛名工不可不興而必歸於實用斯為至要昔我皇祖聖祖仁皇帝屢幸南河躬親指示平成睿略萬世永賴朕何能仰企一二即經臨視有所籌畫亦不敢自信為必不可易惟愛養黎元揆理度務崇實敦本兢兢業業之衷可共白耳將此詳悉宣諭中外臣民其庀材興工一切應行事宜河臣㑹同督臣按例確估具題乾隆二十二年正月初三日上命軍機大臣傳諭白鍾山等曰據白鍾山等奏稱濟寧迤南積水未消請緩開汶河大壩保護縴道民田並數咨江南河臣疏濬下游茅村河荆山橋之彭家河以及猫兒窩墊高處所等因一摺前據署山東巡撫楊應琚奏荆山橋河身淤淺出水甚少以至滕嶧等縣積水難以宣泄等語曽經降㫖令白鍾山親往悉心查勘奏聞辦理山東江南連界處所積水未消亟宜相度疏濬現在尹繼善愛必逹經理南巡差務兼有交辦承審事件於河工事務不能兼顧所有白鍾山等奏內緩䦕汶壩及疏濬下游等事即著白鍾山親往確查妥協辦理其南河文武官員均一體聽其調遣不必更分疆界總期於運道民生兩有禆益乾隆二十二年二月二十一日上命軍機大臣傳諭白鍾山等曰據白鍾山張師載所奏淮徐湖河疏築事宜一摺其所稱河身淤淺之處切難挑渠並增築堤工及堵築北岸支河以防冲刷奪溜二條實為此時第一要工自應急為籌辦而駱馬湖居六塘河之上游受水既多湖隄殘缺必應修築堅厚方足以資捍禦以朕視之亦非可緩之事也若謂工程派委乏員不獨安徽州縣佐二可以檄調即河南山東二省佐二官亦何不可酌調者而宿遷一帶貧民甚多朕車駕經臨得之目覩則以工代賑在工程既不致稽延於窮黎更屬有益亦何無人應募之足慮耶荆山橋挑濬工程現有侍郎夢麟在彼督辦頃據張師載奏稱人夫雲集竣工自易其淮徐湖河各工白鍾山嵇璜身任總河自當悉心商辦現又令高晉前往㑹同辦理張師載雖赴濟寧但運河現無可辦之事自當仍來荆山橋駱馬湖等處伊等當同體朕軫念民生至意公同酌議每最要處分一人獨任其事同時並舉而分任之中又宜和衷共濟聯為一體不可稍存自了之意當使各處只如一處而諸人只如一人方見伊等實心出力不負朕之倚任也已於摺內批諭可再詳悉傳諭知之乾隆二十二年二月二十二日上諭內閣曰淮徐湖河各工億萬民生攸擊朕宵肝憂勤時殷軫念頃者翠華南邁再蒞江南於清黃交滙處及高堰石工雖已親臨閲視而徐州一郡地處上游南北兩岸相距甚迫逺承陜豫諸水一遇盛漲時有潰決之患是以特命白鍾山張師載嵇璜高晉前往確勘形勢妥速籌辦俾城垣民舍永獲安全今據白鍾山等奏於河身淤淺之處切灘挑濬並增築隄工及堵築北岸支河為南北分籌之議夫河工一事自石林口之漫溢張家馬路孫家集之冲奪黃流勢弱不能刷沙直趨致河底沙停大溜側注其受病已非一日為今之計舍此亦别無良䇿朕巡省所至首在勤民而河湖要工所關尤巨一切應濬應築奏牘批答自不如親臨相度又得以隨處指示也擬於回鑾渡淮後由順河集前往徐州即由徐州取道至山東之曲阜展謁孔林用伸仰止之忱皇太后鑾輿仍由順河集先至泰安府之靈巖山駐蹕所有自宿遷至徐州及山東一帶營尖道路俱務從簡約但取足供行走頓宿而已不必過求齊備以副朕厪念民瘼親閲河工之本意乾隆二十二年二月二十七日上諭內閣曰前因淮徐湖河工程關係億萬生靈是以降㫖於回鑾時親往閲視其一切道路營尖已令愛必逹前往辦理所有辦差之員應自蘇州帶往沿河辦工之員斷不可復令辦差庶得専一在工迅速集事倘致顧此失彼于河工稍有遲誤殊非朕軫念河防之意至於米糧草豆不必多為儲偫將來隨皇太后鑾輿行走各官兵仍由原路至靈巖此外各部院衙門亦俱令由原路先至曲阜等候即應隨往徐州侍衛官兵緊要差使之人亦僅令足供本職現在酌定數目另行寄知該撫不必過為張羅也至毛城鋪離徐城不逺亦當就近閲看道路營尖亦略為除備一併傳諭愛必逹知之乾隆二十二年三月二十九日上命軍機大臣傳諭夢麟等曰張師載奏稱南陽至韓莊之淹漫縴道俱用草土填築高出水面二三尺糧船銜尾前進並無阻礙等語運河之水雖較黃河未見加長但現今荆山橋既已疏通則彼處積水直趨南下恐運水復有長發治河之道有疏必有泄既已疏其上流而不泄其尾閭則水無所歸勢必有泛濫之虞矣著即傳諭夢麟白鍾山張師載高晉等速行共為商酌將微山湖六塘河以下應行泄放之處預為籌度即速疏濬先事預防無滋後患仍著一面辦理一面即行奏聞將此傳諭伊等知之乾隆二十二年四月初三日上命軍機大臣傳諭圖爾炳阿曰前據夢麟等奏蔣家營支河需用物料移咨豫東之曹儀等㕔將本年貯備者撥運協濟昨經張師載奏報已遣官役管送但現在該處需用甚亟張師載現又在徐州工所著即傳諭圖爾炳阿速飭委員迅將所運物料催䟎南下即赴工所毋得稍有濡遲乾隆二十二年四月初四日上諭內閣曰河工為運道民生所繫朕宵旰憂勤時深厪念兹者翠華南幸於高堰清口及徐州等處工程親臨閲視並與司河務諸臣詳加籌酌現今伏汛將屆且近河皆積歉之區貧民甚多以工代賑於窮黎有益而於工程亦易集事白鍾山身任總河工務自其専責但以目今時勢所有應疏應築事宜同時並舉朕意分任大臣以専其事當可速收實效黃河至徐州漸窄北岸蘇家山一帶又復迫束大溜近城石壩誠為最要從前已有者應加幫以培其勢從前所無者應接築以重其防著尚書劉統勳率該道王鴻勳錢度善為經理加緊督催務於伏汛前竣工以資防護而備料集事尹繼善亦不得辭其責其六塘河以下為沂沐諸水下游現有餘潦停積桃源宿遷諸縣阻黃臨運為堤堰所隔積水無由宣泄窪地多成巨浸農民失業堪憫或應添建滚壩或應酌建涵洞或䦕導溝渠瀦為陂澤水減一分則民間受一分之益著侍郎夢麟率該道吳嗣爵同知李宏等速行確勘次第妥協辦理至下河高寶諸湖之水入江入海各有分途小港支渠排比行列但或淤或淺以致水無所歸不特沿海興鹽七邑被其患而高寶首當其冲城垣廬舍亦重為可慮當使近江者入江近海者歸海條理井然深通暢逹不致泛濫田畝則所全實多嵇璜前奏請於昭關設滚壩一座滚壩之下復䦕支河南關舊壩改建滚水石壩此項工程並一應支河即著嵇璜率同何煟董其事諸臣當仰體朕焦勞至意諸事公同商酌和衷共濟聨為一體毋稍分畛域各持意見蓋治河非他政務可比非卓識逺慮明於全局又不執已見廣咨博採而能應機決䇿其委用河汛員辨則一本大公好惡毫無偏狥備此數者庶或有濟顧安得斯人而受之重任耶且所興建掃壩各工率以意增益一經准建嵗嵗加修其以險化平停止者百不一二此或因河臣沿襲因循漫不省視更或故留為河員養贍計所謂帑歸實用者固如是乎即欲為河員計與其留此無用之工何不移之有用之地亦可資其搶護不致潰决成災此皆不能慮患於事先惟求茍免於無事一經决裂雖悔何追此司河務諸臣所當銘刻提撕奉為炯戒也徐城南北各工現今培厚加高者仍令張師載高晉分辦務於四月完竣後交白鍾山收工各回本任現今各工應需一切物料並著㑹同總督尹繼善巡撫愛必逹高晉等酌辦其有需豫東二省協濟者即行知圖爾炳阿鶴年隨時撥運總期迅速鳩工疏瀹得宜於運道民生兩有裨益以副朕慎重河防至意乾隆二十二年五月初九日上諭內閣曰朕此次南巡親涖河工相度險要指授在工諸臣并特派侍郎夢麟㑹同總河白鍾山疏荆山橋一帶總河張師載巡撫高晉協辦徐州府黃河兩岸堤工其徐州護城石工則委之副都御史德爾敏下河諸工則委之副總河嵇璜六塘河以下各工復委之侍郎夢麟分任責成各有専屬凡以為積嵗被災羣黎籌疏泄之方捍禦之䇿者宵旰糜寧冀收實濟業經屢頒明㫖矣近據山東巡撫鶴年奏報山東之金鄉魚臺等州縣未涸地畝尚有一千餘莊因思此地積潦再經伏雨秋霖將益苦泛溢而上江之宿虹靈璧等處河南之永城夏邑等處在在皆有積水計漫淹地界不下數百里此其受病非一朝一夕驟至蔓延蓋其始皆由於地方官漫不經心偶遇小災不亟為籌度日復一日因循釀害積水日益增淹地日益廣以致高下田廬盡成巨浸及至受害既深自非大動帑項厚資工力不能奏效而大小臣工又莫能深悉受害之由確得祛患之術惟恐議疏議築虧帑貽纍遂爾噤口束手坐視其民為魚而莫展一籌現今水患已不可勝言若不及時徹底籌辦將來其何所底止耶此亦朕南巡未了之事著侍郎裘曰修馳驛前往山東河南上江現在積水各州縣往來周視寬以時日熟察情形咨詢輿論勿憚再三其在山東者與鶴年㑹商在河南者與圖爾炳阿㑹商在上江者與高晉㑹商其地方官有熟悉水道之員聽其酌量差委務在通盤籌算無分疆域凡可以登民袵席計安全而謀樂利者果歸實用毋惜多費帑金朕痌瘝一體南顧疇咨輾轉憂勤之意皆諸臣所共悉其深體而共勉之以副委任乾隆二十二年六月二十日上諭內閣曰據白鍾山奏洪澤湖水勢長發仁義智三壩過水甚多現將清口束水東壩量行寬展俾清水暢流㑹黃入海等語白鍾山此舉已遲矣清口原淮水故路東西兩壩古人具有深意所為淮流力弱資其堵束迸力刷黃至淮水既當盛漲之時西壩不動東壩當早為宣泄以減其勢此固操縱由人非可膠柱五壩則不得已而設此尾閭也欲泄水勢當在清口清口泄一分尾閭便減七八分清口壩不早為展拓毋怪乎水勢全注五壩而高寶諸邑行被水患矣此朕今春親臨相度時所欲言而未及言者可傳諭白鍾山嗣後清口東水東壩當秋冬淮弱時仍照舊修築束清敵黃其春夏之交一遇水漲即行展拓䦕濶至盛漲時三壩等處過水一寸則東壩便可䦕寬二丈過水二寸則開寬四丈俾得疏泄通暢不致奔赴尾閭此最要之著所當永逺遵行又黃河水勢於五月下旬陡長其力既盛自能刷沙現在徐州一帶沙淤處所可冲刷加深否亦著白鍾山具奏摺并發乾隆二十二年六月二十四日上諭內閣曰嵇璜奏湖河宣導機宜並應疏應修各工一摺頗中綮要運河減泄之水歸海路逺歸江路近然亦有不能歸江之處此皆南巡得之目擊者今分别緩急因勢利導俾田畝資其灌溉水漲不受淹漫所言頗合朕意但向來地方各官州縣局守一隅不能通盤籌畫而大吏又因循草率憚於動帑興工每致臨期竭蹶節節補苴迄無成效今㑹全局而熟籌之綢繆於先事其中改紆為直移逺為近濬淺為深所奏應疏應修各工甚有條理不必更行交議著照所請交與尹繼善白鍾山普福等㑹同嵇璜於應動工時次第興舉所需帑項照例分别動支該督等其董率屬員悉心妥協辦理俾下河民生永有禆益嵇璜摺並發乾隆二十二年七月十三日上諭內閣曰今日召見陳宏謀詢及各水災據奏皆因上游為衆水所滙而下游無所歸宿必當㑹同通盤籌辦方為有益等語其言頗中肯綮江南山東河南壤地相接數年以來頻罹水患而今年為最朕早見及此於閲河時即已諄切訓諭並分命欽差及督撫河臣相度籌辦而時已首夏不及措施竣事者荆山橋上下百餘里及清河積水而已豫兖之境則被災之地較廣人户田廬撫恤者不下數十州縣南望為之惄然傷懷轉瞬秋冬正工作可施之候若不先事而亟圖之徒坐視其年復一年橫流四出直至臨時張皇補苴何所底止耶山東之水逹於鳯潁該督撫等雖各守封疆要不得各分畛域况此嗷嗷災黎皆朕赤子人臣公忠體國之謂何而忍稍存分别見乎在今日言之㑹三省之全局而川澮以疏之隄防以禦之工費誠屬浩繁然一舉而使千百里內之田疇民舍可以永獲安全則生民之利孰大於是即多需帑金所不當惜况統屢年賑恤所用計之為數果孰多孰寡耶在國家蠲賑未嘗不動盈數百巨萬而小民已先受蕩析之苦即使為督撫者皆能體朕愛民之心郡縣之吏又悉良有司撫恤極其周經理極其善而災黎所得日才以升合計度命而已何如無災而得終嵗蓋藏稍裕之為能自樂其生耶且水非旱比赤地千里待澤上蒼非人力所及有吁嗟籲禱而已水則治之專藉人工所難者治之當得要領及任事當求忠實勇往之大臣耳前曽以此諄切傳諭尹繼善伊於地方情形非不熟悉其才力亦非不能辦此特惜費省事之意膠固於胸中而又惟恐辦之或無成效動曰地處窪下而治之亦不能保其不被水患夫治之而仍受水患此則未得治之之道耳豈終不可治耶乃以是藉口而委之不治是正因噎而廢食矣為地方興大利除大害詎可沾沾為一身功過計是豈朕委任意耶江蘇巡撫陳宏謀安徽巡撫高晉山東巡撫鶴年河南巡撫胡寶瑔等皆能任事之大臣所有三省積年被水之由應如何相度形勢從長計議俾可永弭水患之處著該撫等各於所屬境內悉心查勘仍復彼此㑹同詳籌妥辦侍郎裘曰修夢麟往來查閲隨時商酌其應㑹兩總河者亦著㑹閲詳議陳宏謀著即由河南歸德一路前赴江蘇沿途逐一先行審視與高晉等㑹奏請㫖諸臣膺兹委寄務各矢實心和衷共濟以慰朕念切民瘼宵旰憂勞之至意乾隆二十二年七月十六日上諭內閣曰尹繼善奏籌沛縣疏濬事宜一摺內稱山東湖口閘與韓莊閘相近雖為蓄水濟運實亦泄水尾閭而該閘僅寬丈餘不足宣泄又沂河自北而南流入駱馬湖近因水大於邳州之盧口向西散漫入運與荆山橋泄下之水相阻以致不能通暢皆為沛縣受病之由等語尹繼善此言頗中近日形勢而沂水不使入運尤為切要蓋諸湖向以濟運而邇年運河之水不患其少惟患其多良由橫決之水散漫入湖以致湖不能容溢而入運運溢不能容併為巨浸運艘阻滯旁邑為災皆緣於此不可不亟為籌辦其應如何設法堵築使沂水各歸駱馬湖及湖口一閘應如何添建滚壩俾得暢為宣泄而不致橫流微山入運之處著該督等通盤詳加勘閲繪圖具議以聞朕昨經降㫖交陳宏謀高晉鶴年胡寶瑔等四人經理河務裘曰修夢麟往來相度其尹繼善原係該省總督白鍾山張師載身任總河事均一體此九人者當合為一人庶克有濟今嵗黃河順軌中泓刷汕較前深通實為上蒼庥祐但荆山橋一帶仍需廣為疏通要知此橋如許空洞皆應過水若如今嵗經由時情景則但為虛設矣此事仍須責成夢麟令再加開濬總之尾閭多減一分則上游少一分灌浸朕於河務一事宵旰厪念諸臣務宜共體朕懷協力同心和衷集事以副朕委任至意尹繼善摺併發乾隆二十二年八月初五日上諭內閣曰據尹繼善奏稱湖口閘應添滚壩及河清河定河成三閘應開挑越河等各項工程現已咨商白鍾山張師載等次第籌辦等語所奏並圖中所指工假於該處情形頗中肯綮惟是近年受患全因湖流宣泄未暢所有關係宣泄機宜既經查勘明確該督即當㑹同欽差及河督等速行相度興工蓋此數百里中久遭泛溢災黎待拯刻不可緩雖籌畫不厭精詳而興作不容濡滯咨商往返坐耽時日轉不免築室道謀圖中應舉工程甚多轉瞬冬令必須乘此時動工庶可於嵗前竣事稍或遲延則明年春水方生又妨工作且該處民田久被淹沒無西成可望更無慮傷及秋禾亦復何所瞻顧而不亟亟為之耶著裘曰修夢麟尹繼善白鍾山嵇璜張師載及各該撫等凡有先後勘明各工通盤籌算權其輕重緩急就中最要者分任責成速即同時並舉餘亦次第興修均於嵗內告成以收實效總之各工早竣一日則水患早弭一日諸臣其同心協力奮勉趨事副朕奠安民生至意乾隆二十二年八月初六日上命軍機大臣傳諭方觀承鶴年等曰近年山東頻被水患而今年南運河更屬異常泛漲因思東省境內如徒駭馬頰及老黃河等皆古九河故道原為河水分注之區其遺迹故在特因循日久遂至湮塞若將南運河之水從此宣泄想當淌注迅速方觀承當往來德州一帶閲視堵築第三屯決口或即乘便前赴山東㑹同鶴年將徒駭馬頰等舊日河身循行履勘核其現在形勢如可由此放運河之水似亦一宣泄之法但今昔異宜亦不必存膠柱之見現今秋分已屆海受衆水之時應酌量導之入海俾有所歸天津一帶凡有可䦕支河分泄水勢之處亦即相度情形妥協籌議一併具奏總期廣為疏濬使尾閭通暢則水患自可漸消要在師古人之意而不泥其迹斯得之耳著將此傳諭方觀承鶴年等知之乾隆二十二年八月十二日上諭內閣曰裘曰修高晉等奏㑹勘宿靈虹積水情形籌辦疏濬事宜一摺於該處水勢之來源去路頗為明晰所言歷年受病之由及目前利導之法已俱得其要領前曽降㫖令在事諸臣將勘明工程及時辦理現奏宿靈虹等處疏濬各工應興舉者即行興舉不必㑹商往返致稽時日朕為百姓生計並不惜費惟期用之於實永逺消患而已總之侍郎裘曰修夢麟河臣白鍾山嵇璜張師載並各督撫受命同事祇如一人原無分此疆彼界所見既確即應一力擔承務期嵗前竣事始於河工有禆而不誤明春耕種為要至毛城鋪為濉河上游欲濉河之無淤墊計惟有堅閉毛城鋪茍非盛漲不得開放萬不得已如今嵗之自行漫溢即當於斷流之後將黃水淤沙盡力挑濬若少因循則今年淤一尺明年即淤二尺河身墊高節節阻礙年復一年其淤更盛故逐年挑濬深通是為要務河臣當永久奉行其濉河下游皆逹於洪澤湖而洪澤湖以清口為去路前經指授河臣於汛前將草壩拆䣃俾得暢流已有成效嗣後即以此為成法不待盛漲一遇水勢長發隨時酌量拆䣃草壩預為泄水之地從前惟恐運河水少故需蓄以濟運今則惟患其多情形逈異此所當因時審度不可執一而論者也向來河員習氣欲保堤工則以䦕毛城鋪為長䇿至於下游之清口則又墨守舊規憚於拆䣃草壩以致出水不暢啓閉兩失河工日就敝壞而沿河州縣嵗受其災河臣能於此等肯綮處恪遵所示機宜以時蓄泄常無後艱所有現議應開支河趕辦竣工去纍年淤阻泛溢之積患不特宿靈虹等州縣漸有起色上游豫東諸積水皆有所歸民生利賴所關甚巨諸臣其共勉之摺併發乾隆二十二年八月十七日上命軍機大臣傳諭裘曰修等曰據夢麟奏微山湖積淤處所應行挑濬及彭家河應再加䦕濬深通等語所見俱中肯綮微湖迤北金鄉一帶之水皆因湖身仰側不能下注荆山橋雖䦕放寬展所泄者不過微湖迤南之水而於東省積水終不能十分宣泄自應設法挑濬以期寬暢舊聞黃河刷沙有用鐵掃帚等物者朕意黃河寬廣此無濟實用湖水原無撈濬之法不知此等器具用之有濟否如可資其瀼刷或亦撈濬之法朕偶思及此該督等酌量情形惟求有裨實用不必拘泥也其荆山河入運去路不多雎邳界口既有彭家河可以䦕濬目下即應速為動工不必歸入淮徐水利案內輾轉坐視以致稽延時日至七月內黃河中泓較前刷深前已據尹繼善白鍾山等奏較上年刷深二尺今夢麟又奏刷深二尺四五寸此所刷深尺寸或係河身新停之沙抑係較數年來舊停之沙更深二尺有餘亦著再行查明詳細具奏以慰馳念向來河員積習總以䦕毛城鋪為保守堤工之上䇿並不計減泄既多貽患滋大不知毛城鋪若不䦕放則河流疾走刷沙自易現在蔣家營等處未開而河流冲刷得力實其明效矣嗣後非萬不得已斷不可輕言開放減泄以致仍蹈前轍再夢麟既經到徐與尹繼善等面晤何以未同列銜總之一督四撫三總河均有河工専責而裘曰修夢麟二人奉命往來商酌並宜同心協力數人如出一人一面定議奏聞一面分假興工揀委員辨派料迅速興舉以期早竣方不負朕委任之意耳可傳諭裘曰修夢麟尹繼善白鍾山張師載陳宏謀高晉鶴年胡寶瑔知之乾隆二十二年八月十八日上命軍機大臣傳諭夢麟等曰昨據夢麟奏䦕濬微山湖積淤一摺已有㫖諭矣湖身既屬仰側致金鄉一帶之水不能歸入荆山橋自應於霜降水落後設法挑濬以期暢流無滯但向來未聞有治湖之法即朕昨所諭及鐵掃帚混江龍等器具或亦止於黃河挾急溜之勢可以刷沙而於積年淤塞之湖身未必有效現今微湖填淤既多若於水落時先就仰側處䦕濬河身倣洪澤清口之意逼令自為汕刷似屬善䇿其餘一應湖中淤積處廣為䦕濬支河以引迤北之水一律歸入荆山河當可源源宣泄著傳諭夢麟等察勘情形酌量定議具奏辦理奏中所稱今年十一月內不能完工不但金鄉一帶乾涸無望並礙明嵗糧艘其言切中在事諸臣均當以此為程奮勉趨事積水災地庶有起色至夢麟所奏黃河中泓刷深二尺四五寸之語從前黃河停沙淤至五尺今春朕南巡時已刷去三尺七月中又據尹繼善白鍾山等奏刷深二尺是現在河身已復其舊今夢麟又奏刷深二尺四五寸此所刷之數是否於河身復舊之後更加刷深二尺有餘若果如此則更善矣仍著查明詳悉奏來以慰厪念至下河一帶今嵗秋成俱稔朕心深為慰藉此皆由歸海之路各得暢流可見果能實力籌辦自有禆益也乾隆二十二年八月二十四日上命軍機大臣傳諭方觀承鶴年等曰鶴年所奏堵築三屯決口及挑濬支河一摺內稱四女寺哨馬營二處皆運河歸海之路現已興工挑濬等語朕前以運河異漲非泄之入海不能消減是以降㫖方觀承鶴年等令於徒駭馬頰等處相度歸海之路設法疏濬原非欲復九河故道總期於泄運河之水使之入海不必存膠柱之見今鶴年所奏四女寺哨馬營等處既為泄運尾閭此即朕諭中所及該撫等自當及時開濬以收疏導之益至此外或尚有可資宣泄者亦應留心查勘次第辦理總之多一入海之路即多一泄運之路不必拘泥也著將此諭令方觀承鶴年等知之乾隆二十二年九月十三日上命軍機大臣傳諭方觀承等曰據方觀承鶴年奏稱張秋運河兩岸東高西下東岸所設之三空五空二橋及減水各閘口門皆高運河一丈至丈二尺水勢不能暢消請於東岸地名八里廟建滚水石壩一座高運河八尺遇八尺以上之水即可減泄等語運河東岸地勢既高舊設之橋閘皆不足資宣泄自應另行酌建滚水壩以減盛漲但該督等所奏有底高八尺以及一丈者尚覺太高運河有七尺之水於糧艘即可浮送所有酌建水壩及諸舊壩應均令高於運河底七尺或慮運河僅高七尺遇有淤淺處不免阻滯此則當於每年撈濬時實力挑挖務使一律深通不得有名無實再滚水壩既建運河自是減泄然壩以外河身若高則運河所減之水又不免倒漾旁溢為地方害該督等並當設法疏濬深通毋致下游受害將此傳諭知之乾隆二十二年十一月初六日上諭內閣曰據嵇璜奏高郵運河東堤添建石壩已經完竣並請酌定水則如上游五壩過水漸多車邏南關二壩過水三尺五寸開放五里中壩若車邏南關二壩過水至五尺再䦕放新建石壩視水勢之大小以為啓閉自無壅潰之虞等語此所見深得蓄泄機宜蓋湖河水勢以五壩為來源以江海為去路而歸江之路近於歸海况下河一帶地本卑窪必視歸江諸閘壩實有宣泄不及之勢始可以次啓放今春南巡時親臨指示令將車邏南關二壩常行䦕放俾河水得以隨時減泄而又早闢歸江之路以逹其流下河田畝遂獲豐收此已試之明效自當酌定水則以時啓閉者著照嵇璜所奏過水尺寸立志壩旁以垂久逺然此時専就下河言之耳若論湖河全局則五壩之水泄自洪湖但使洪湖之水從清口暢流㑹黃入海則黃水不致有倒灌之虞而五壩之過水自可稍減向以河臣惟恃護堤轉致湖漲遂有一潰難收之勢而清口則收東迫隘託言濟運不知近日運河之水患其多不虞其少前曽降㫖白鍾山等以清口東西二壩古人具有深意惟淮水力弱則資其堵束迸力刷黃淮水盛漲之時則早為宣泄以減其勢至於五壩則不得已而設此尾閭也因令於五壩過水一寸則東壩開寬二丈過水二寸則䦕寬四丈以期疏泄通暢不致奔溢五壩以為下河之患昨據裘曰修夢麟白鍾山高晉奏稱今值冬令應照例束壩蓄水向來口門僅留十八丈至二十丈今擬酌留三十丈湖水可以暢出等語是清口之水已不患其不暢流而㑹黃入海矣至春夏盛漲之期則仍遵前㫖立為水則視五壩過水之分寸以加展拓如此通盤籌辦操縱得宜則湖河全局自可永奏安瀾之績矣但河官積習惟以因循守前規為事可將㫖泐石於清口及運河東壩俾治河諸臣永逺遵行焉乾隆二十二年十二月二十三日上諭內閣曰據夢麟等奏稱淮揚徐海等處滙湖入海幹支各河暨高寶下河歸江歸海之河港統計五十餘道俱先後告竣等語數郡蒸黎積困已久今春省方之便目擊情形特指授諸臣動帑興工廣為疏導兹數月以來遂能陸續報竣諸臣仰體朕意悉心經理迅速集事甚屬可嘉夢麟尹繼善白鍾山嵇璜陳宏謀俱著交部議叙裘曰修往來㑹商實力籌辦亦著一體交部議叙其在工承辦各員該督等查明分别咨部議叙以示奬勵乾隆二十三年正月初三日上諭內閣曰據高晉奏報上江鳯潁泗所屬水利要工均於上年嵗底一律完竣安省河道淤墊頻年被水特命裘曰修夢麟等㑹同督撫河臣和衷籌議發帑興修廣為疏濬自䦕工以來諸臣能仰體朕懷悉心經理所在要工俱能迅速集事甚屬可嘉裘曰修夢麟尹繼善嵇璜已於下江各工告成疊豫議叙外高晉著交部議叙其在工承辦各員並著該督撫等查明分别咨部議叙以示奬勵乾隆二十三年四月三十日上諭內閣曰據巡漕給事中海明奏稱東省水患由微山湖之漲溢而微山湖之南圈築攔黃堤工即以取土方塘挑成順堤河形導入荆山橋出猫兒窩入運並於內華山西建築通湖閘座以備宣泄等語具見悉心籌畫黃河由豫入徐兩岸夾束河身甚狹不潰決為銅山諸邑害則漫衍而入於金鄉魚臺今徐城已增築石工足資捍禦而山東之濵湖州縣民舍田廬不免仍成巨浸孰非吾赤子而忍坐視果使民生永獲安全即多費帑金朕所不惜且年年蠲賑所費不更無已耶但是否實有禆於東省而於徐郡兩岸亦不致另生險工或究不如於北岸無堤處所接築堤工之為得計著尚書劉統勳馳驛前往㑹同尹繼善白鍾山逐加閲勘詳籌妥議請㫖辦理夢麟裘曰修尚在河干著一併㑹同查辦乾隆二十三年五月初三日上諭內閣曰據嵇璜尹繼善等奏報上下江水利各工陸續全竣各就所分工假逐一丈量並無偷減浮冒情弊等語江省上江之鳯潁泗下江之淮揚徐海等處濵臨湖河地勢窪下連年頻被水患特命廷臣㑹同督河諸臣協力商辦分濬支幹各河俾上下游節節疏通以期積水全消永資利賴去冬興工以來諸臣皆能仰體朕心奮勉集事並各分工假悉心丈勘雖有一二偷減浮冒者皆微末工員已據實參處現在續辦各工俱已迅速完竣尚無大員作弊者今經保結奏聞具見實心經理朕自信之嵇璜夢麟裘曰修尹繼善白鍾山託恩多高晉高恆俱著交部議叙其在工承辦各員辨並著該督等查明分别咨部議叙以示奬勵乾隆二十三年五月十一日上諭內閣曰據嵇璜奏稱芒稻一閘為諸湖入江之路宣泄通暢下河州縣自可永免水患等語此實經理下河之要鍵朕去春南巡時所諄切指示令早闢歸江之路者正為此也芒稻一閘乃歸江第一尾閭向因淮南鹽艘皆由灣頭河轉運必須芒稻閘門下板方可蓄水遄行以致不能啓放合宜前據該督等奏閘東有舊越河一道應令鹽艘由越河直走金灣北閘是泄水與運鹽已自分為兩途芒稻閘自可常為啓放矣但恐終狃於蓄水運鹽之習仍不免因循觀望夫蓄水運鹽不過少省縴挽之勞所費在富厚商人而下河數州縣之民生攸繫此其輕重豈不較然耶嗣後芒稻閘應永逺不許再下閘板俾得暢泄歸江則諸湖積水自可減退遇伏秋大汛亦足以資容納而下河一帶得永䝉樂利之休矣該督等將此㫖泐石閘畔俾後來司事者知所遵守焉乾隆二十三年五月二十日上諭內閣曰據劉統勳等奏㑹勘黃河北岸應接築堤工現在委員發帑儹辦等語伊等既經勘定情形自可次第興舉劉統勳即著回京不必在彼看視興工所有該處工程著德爾敏馳驛前往督辦乾隆二十三年六月初三日上命軍機大臣傳諭尹繼善等曰據裘曰修等奏被水地畝已多涸出所有從前奏請於湖口閘上添建閘座之處應行停止等語從前尹繼善以運河水漲亟應疏濬是以奏請於該處添建閘座以資宣泄今復奏請停止其意蓋以積水已消若建出水閘轉恐於蓄水濟運之法有礙此未免過計現在積水雖退而運河諒不慮無水接濟該處閘座雖不必添建或酌量運河蓄水尺寸將閘口迤上之堤留為滚水壩俾蓄水俱有所資殊更為有益著傳諭尹繼善等即妥協查勘辦理再摺內有安山湖已成平陸之語此湖既成平陸民間自必耕種現在曽否已經升科著一併傳諭該督等查明具奏欽定南巡盛典卷三十五
