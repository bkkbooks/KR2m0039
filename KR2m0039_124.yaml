body:
  text: 奏議乾隆十五年十二月二十六日兵部奏言臣部查向來皇上巡幸各處沿途安設臺站調撥馬匹原期一切本報事件馳遞迅速不致稍有稽延明春恭逢皇上巡幸江浙應設臺站業經臣部派員查勘安設正站四十九處腰站四十九處除直𨽻山東俱係旱路一切本報皆由馬上馳遞毋庸另議外惟江省前據該督黃廷桂咨報蘇常鎮三屬因旱路窄狹雨水過多丹徒等六驛原各設站船十五隻以代驛馬淮揚徐三屬旱路稍寬馬行尚易向未設立站船來春聖駕經臨臺站馬匹請照山東之例正站安設九十匹腰站五十匹或一時雨水過多則旱站之外當有水站請於丹徒等驛站船內共撥四十隻分泊於宿遷等處以備代馬之用至船隻行駛窮日夜之力不過百餘里若非過於泥濘所有本報等項仍當由馬馳送又近據該督咨報江省非産馬之地此畨差務需馬繁多臺站馬匹若照前議安設則别項差使殊費周章請照康熙四十六年之例正站安馬七十匹腰站三十匹至前議船隻尚可酌添請每處總偹船十五隻所有丹徒等處原設站船十五隻者毋庸議外至宿遷等十處向無站船每處雇備快船十五隻則水陸兼備緊要本報等件無虞遲滯臣等伏查江南地方該督既稱馬匹短少此畨差務需馬繁多請將臺站馬匹照康熙四十六年之例正站安設七十匹腰站三十匹是按該省馬匹之多寡酌量安設自應如該督所議辦理務期臨時不致貽悮至所稱安設水站雇備船隻以備代馬之用並稱船隻行駛窮日夜之力不過百餘里查本報事件關係緊要向例皆由馬上馳送每一時限行三十里計算晝夜限行三百六十里原以杜稽延遲滯之弊向來各省即有崇山竣嶺冰凝雪滑之地俱能按時遞送今該省雖雨水過多亦不過一時泥濘未可因此另雇船隻雇用且據稱晝夜只行百餘里則船隻遞送更不若馬行之便捷一設船隻勢必避勞就逸概欲登舟轉致遲滯該省既設站馬儘可供本報之用應將該督所請安設水站雇備船隻之處毋庸議奏入報聞乾隆十五年十二月二十七日總理行營事務和碩莊親王允祿等奏言臣等議得據努三奏稱一屆期皇上座船行走御前乾清門侍衛前引四副撒袋併幫助縴繩侍衛俱應在沿岸乘騎馬匹或令若干人騎馬行走皇上船前御前乾清門侍衛等坐小船如何前引行走之處俟御前大臣等定議時將馬匹小船交與該督預備臣等會同御前大臣敬謹酌議皇上座船時派御前乾清門侍衛各二員皇上船前前引船隻派出兩對在兩邊行走御前乾清門侍衛等酌量乘座皇上船旁令一人騎馬在河沿行走以備皇上差遣拉船幫縴侍衛等酌派四員四副撒袋令在拉船幫縴侍衛後行走此項人員令御前大臣臨時具奏在御前乾清門侍衛內酌量派出輪班行走前引船隻應用馬匹令該督合算人數預備一查得經由府州縣城俱臨河相近河岸窄狹且兼水田地方甚屬難行臣等酌量離城門一二里或三四里之間定擬馬頭交明地方官自船上岸由岸登船馬頭令其修理外皇上經由各城當日回鑾之處應各備馬一百五十匹給隨行大臣侍衛拜唐阿乘騎拏馬時派出侍衛什長等帶領親軍由地方官取領預備皇上登舟時侍衛什長等將馬匹收回照數交與地方官太監等乘騎馬匹交上駟院人等拏給各城街道窄狹難執馬上儀駕且道路不甚逺令校尉等執步下儀駕章京等令其騎馬皇上城內巡幸畢及至馬頭登船時大船不能趕到如預備等候地方窄狹且江南既有預備皇上升座如意快船即將此項船隻先行令其前往馬頭地方等候皇上升如意船後或登大船或緩行等候皆可查據努三既稱皇上經由府州縣城臨河相近河岸窄狹難行地方酌量交與地方官自城門一二里或三四里之間修理馬頭毋庸另議外所稱皇上經由各城當日回鑾等處隨行大臣官員拜唐阿等必需乘馬應交該督每處各備馬一百五十匹至拏馬交馬經由各城道路窄狹難執馬上儀駕令執步下儀駕章京等令其騎馬之處俱照所奏外至皇上巡幸城內時既稱大船不能趕到如預備等候地方窄狹江南既有預備如意船隻令其先行在馬頭等候亦照所奏行一存留人等俱令在徐家渡等處駐扎地方窄小草豆難以購買或令伊等在楊家莊宿遷縣山東郯城縣沂州等處可得草豆地方散住俟皇上回鑾時仍令迎至黃河北徐家渡營盤等候查從前臣等以皇上登船後存留官兵令在黃河北寬厰地方或分二處駐札或在一處駐札之處交令管轄大臣等加謹約束具奏行文今努三雖稱徐家渡地方窄小將存留官兵令在楊家莊宿遷縣山東郯城縣等處散住可以無悮但官兵若令數處星落散住不免鞭長莫及難以管轄應交管轄大臣哈達哈等酌量存留官兵在徐家渡等處尚可居住易得草豆時仍照前奏或在二處或在一處駐札外若徐家渡等處難容駐札或有難覔草豆緣由管轄大臣臨期籌酌散住可也一恭屆皇上過黃河至真隸厰駐驆之日黃河南岸至直隸厰有旱路數里俟皇上至黃河渡口前二三日派出大臣會同該督將隨往人等行李先期料理渡過黃河在直𨽻厰分給船隻等候令其多備黃河渡船在運河內外沿邊等候可以無悮至數里旱路並令多備扛夫運送內廷行李衆人輜重亦交該督先期酌量籌辦預備人夫等候查本年皇上巡幸河南時臣等因渡河奏派大臣先期運渡官兵行李此次前往江南仍照從前俟臨近時奏派隨往大臣會同該督兼管運渡衆人行李過河至直隸厰分給船隻等候其十里旱路仍照臣等議奏一切官物交該督多撥人夫運送外官兵行李等物多集人夫各聽其隨便雇用可也一分船大臣等分船完畢時除大臣船隻外每船委署頭目一名管理委署頭目之處即交分船大臣等派往查臣等從前以查船應需専管人員俟臨時大臣內奏派一二人會同護軍統領管理奏準行文今每船一隻復委頭目一名反滋煩擾應將努三所奏毋庸議一布城奏帶二分須倒替轉行方能無悮其水營布城蒙古包帳房斤重人數令各該處開明行知該督預備快船裝載二起船隻前後倒替换用或穿營行走之處明白曉諭護軍統領武備院查該督黃廷桂以水路裝載布城等物船隻難越皇上座船應預備二分船隻裝載至駐驆處穿營時用夫挑騾馱武備院上駟院俱經行文所奏不必另議外布城等物倒替行走用夫騾挑馱穿營行走之處交護軍統領等令管城章京護軍校護軍等加謹管理不致貽悮可也一明春皇上已渡黃河即駐驆水次衆人俱在船住宿其揚州之髙旻寺行宫坐落河沿金山寺行宫在江之中髙旻寺駐驆時衆人仍回船住宿外金山寺駐驆時入班大臣侍衛護軍拜唐阿之外御前乾清門行走大臣侍衛軍機處內閣大臣官員內大臣兵部大臣官員令其在山前兩旁僧房住宿其餘人等令往從南岸往宿蘇州杭州江寧行宫俱在城內令覔民房住宿聖因寺行宫在西湖北岸地方狹窄衆人令在附近民房俱在船上住宿靈巖山龍潭行宫附近人民稀少難以駐札應令該督豫備緑旗各營帳房分給隨往護軍拜唐阿等起程時仍令明白交回如有遺失損壞查明治罪侍衛官員如有領取帳房者亦著應付查近經臣等以恭屆皇上駐宿行宫時除隨往官兵入班人員外其餘人員若離船十里以內俱令回各本船住宿若相離甚逺交該地方官酌量就近廟宇店房或民間空房預備數處令其住宿奏準行文令努三所奏髙旻寺金山寺聖因寺等處行宫衆人令在附近民房或回船住宿之處與臣等原議相符應口所議外又稱靈巖山龍潭行宫附近人煙稀少令該省預備緑旗帳房如有遺失損壞查明治罪亦屬可行應令該督預備辦理奏入上諭曰儀駕不必帶往其因賞賜耆民沿河兩邊行走御前乾清門侍衛應騎馬匹著一邊預備二匹餘依議乾隆十五年十二月二十七日署浙江巡撫永貴奏言恭照明春欣逢聖主巡方盛典杭嘉湖等府屬運河之內皆須預為清蹕庶足以盡臣子敬謹之誠每年二三月間正當漕艘北上之時運河祇有一路又無别道可通若不催令趲行前進必致壅塞御河殊多未便向來各屬收糧必俟嵗底方得竣事而納户尚多零星挂欠抵兑不清以故漕船領運未能迅速本年徴漕之前先經臣預行頒發告示諄諄勸諭士民早為完納并立法稽查嚴禁官胥勒掯浮收等項積弊漕政于以肅清糧户爭先輸納本月初間通省漕糧即已具報全完較諸往年幾早一月實為從來未有之事此皆聖德涵濡民情踴躍故能無事催科莫不輸將恐後現在漕船均已陸續兌竣開行又浙鹽半多行銷江省之蘇松常鎮等四府兩浙之商資本微薄逺非淮商可比向例商船過掣之後所有課費不能一時完納鹽船每仍停泊河干必俟陸續輸完課費方由運河內源源領運以濟民食春夏菜醬二市正當鹽斤廣銷之候非預為運貯賣地不特沿途經行有礙抑且民食攸關尚有缺乏不肖鋪户得以昻價貧民私販梟徒更可乘機侵越勢不得不設法變通臣經飭將各商配掣之鹽槩於今冬分别賣地逺者預運十分之五近者預運十分之三先行運往以資接濟惟是商本有限若令一併預為完納課費實恐力有不繼臣仰體我皇上惜商愛民之至意暫令先納正課即行準其領運所有例輸引雜公費尚非正項可比統于來年四月內後運一半之鹽全數扣足完項則民無食淡引得疏消仍於課費無虧公事似有禆益奏入上諭曰諸凡皆妥欣悅覽之乾隆十六年正月初六日禮部尚書伍齡安奏言查每逢皇上巡幸例有鴻臚寺帶領地方官迎送聖駕從前原任鴻臚寺少卿查斯海因在途騷擾乾隆七年九月內奉特旨將查斯海解退少卿以旗員補用伏思近地而尚如此滋事今嵗皇上南巡隨往之少鄉趙之垣係漢堂官帶領鳴贊等官沿途演習地方官迎送聖駕禮儀日與地方官接見若不預行嚴禁其帶往各員內保無有在途需索生事如不許居住地方官預備之房令其各自扎營則地方官難以尋覔且礙難演禮臣愚見鴻臚前行之員請由臣部行文該督撫只令預備房屋外一切飲食供應槩行禁止倘有不肖官員仍有需索生事者該督撫即行咨明行在禮部臣指名糾恭交部嚴加治罪不惟互加防間而於禮儀亦易整肅至太常寺運送祭器指名陳設官員內如有需索生事者亦照此辦理奏入報聞乾隆十六年正月十五日兩江總督黃廷桂奏言恭照聖駕巡幸江浙回鑾所需四大套騾馬車四百輛查江南王家營不過渡黃馬頭並非聚集之所勢難雇覔山東之濟寧臺莊雖係商旅往來之地然求其四大套馬騾堅車一時欲得數百輛之多其勢亦有不能惟有將順天府原來之車留住一半交與江南一半交與山東備用至留住守候期內應給車户之飯食騾馬之草料酌議樽節辦理會同山東巡撫凖泰另行具奏奏入報聞乾隆十六年正月十六日署浙江巡撫永貴奏言臣等伏查辛未年春恭逢翠華南幸率土歡忭普天同慶江浙雖屬兩省而臣等籌辦諸事無不會同商酌以期和衷共濟不敢稍有畛城之心即如運河內恭備御舟業經臣黃廷桂等會商直送至杭內庭扈從各船亦由江省雇募浙省祗給貼水腳均未另行備辦前已恭摺奏聞惟縴夫一項因浙省向例係屬雇夫是以酌定河兵僅到交界地方浙省亦另擬於海塘標兵及各屬民壯衙役內挑選應用祗以辦差公務俱屬臣等應盡之職守未經上瀆宸聰今奉聖恩訓諭復思自江省交界以至杭城計程不過二百餘里所有更换之浙省兵役縴務非所素習即使勤加教演終不若河兵在江經行已久自必益就􅌻嫻誠有如聖明洞鑒令其隨至浙江彼此均覺妥便臣等欽遵諭旨會同通融籌酌查江省原擬於河兵內挑選三十名分為上下兩班供奉御船及內庭各船帶縴之用各兵行坐口糧每兵每日給與飯食銀五分自宿遷至瓜洲江口應由河庫給發自鎮江至浙江交界應由蘇州藩庫給發其自平望至杭州應由浙省給發上班縴兵沿途搭蓋棚厰以為造飯住宿之用下班縴兵併押縴官員人等俱給與小船乘坐其到杭之後自應恭候聖駕回鸞所有在杭守候坐糧亦均由浙省給發以供各兵資斧惟是長途往返屯聚日久江省河標之兵必得江省河標之員約束稽查方為妥協臨時擬派河道一員河標恭將一員同行至杭會同浙員督率拘管其沿途押縴官辨仍聽兩省各自派撥至浙省西湖紹河錢江等處係用水縴所有槳縴人夫均已久經預備毋需再用河兵除一切未盡事宜臣喀爾吉善臣永貴現與臣黃廷桂等詳細會商總期仰遵聖訓務使公務有禆妥協籌辦斷不敢存此疆彼界之見奏入報聞乾隆十六年正月二十五日大學士公傅恆等奏言尚書舒赫德具奏南省水次相近經由州縣大村委派提督衙門官員會同地方官稽查及旱路臨幸地方隨往人員乘騎馬匹預請先遣派大臣指示存站之處一摺奉旨總理行營事務大臣議奏欽此該臣等議得舒赫德奏稱臣自水路往江南一路看得經由州縣大村馬頭離水次甚近約束隨來官兵跟役不無進州縣城內買取物件往觀熱閙此次皇上巡幸江南非同行幸過省分可比自應嚴加稽察管束臣愚見皇上登舟後每日於起鑾之先令本衙門筆帖式帶領步軍副尉步軍校會同地方大員一員先往經由州縣城內加謹稽察母令旗民生事如有生事者係民即交同往地方官辦理外如係兵丁跟役即行拏究酌量辦理皇上起鑾後令步軍總尉富僧格在後亦會同地方官一員尾後行走管束務令一人不可存剩如有存留生事者亦分别辦理臣事竣即趕迎聖駕到日令富僧格在前稽查臣在後尾行管束如遇歇駐地方臣同富僧格輪班帶領官兵查管街道不令生事伏查此次皇上初巡南省非已經行幸省分可比水次相近州縣大村閙熱地方甚多隨往兵丁跟役亦衆若不預行曉諭臨期嚴行稽查不肖之人在後進城入村強買鬭毆生事俱不可定今尚書舒赫德所奏派委該衙門官員帶領地方官先往水次相近經由州縣大村閙熱地方稽查令步軍總尉富僧格在後尾行管束如遇歇駐之日提督與步軍總尉輪班稽查不令生事應如所奏辦理外臣等預先傳諭各處敬謹遵行如不遵行違背者係兵即交該管官員頭目從重處治係跟役除重責之外將伊主一併恭奏交部查議又奏稱南省旱路俱窄凡有皇上臨幸地方隨往人員乘騎馬匹於皇上未到之先或領侍衛內大臣或總理行營事務大臣護軍統領應預派一二員指示下馬站馬地方臨期不致擁擠臣與富僧格酌量前後管查查南省地方旱路俱各窄狹凡有皇上臨幸地方隨往人員乘騎馬匹若不預先派員前往指示管理臨期必致紛舛擁擠應如所奏臨近將應派大臣職名進呈請皇上酌量派出一二員指示管理奏入報聞乾隆十六年正月二十九日漕運總督瑚寶奏言正月二十八日準户部咨開乾隆十六年正月十六日內閣奉上諭直隸上年偏災州縣現在降旨加賑有需用米石之處著將河南本年運通粟米截留十萬石交總督方觀承酌量辦理該部遵諭速行欽此臣遵查河南省今嵗起運正耗粟米共一十一萬石有零除前次欽遵諭旨截留五萬石外止存應運通粟米六萬餘石不敷截留再查山東省今嵗起運粟米除前次欽遵諭旨截留五萬石外尚存仍應運通粟米十二萬石有零所有此次欽遵諭旨截留粟米似應仍請在於河南山東二省起運粟米內各截留五萬石以符十萬石之數除一面移咨直隸督臣倉場督臣及豫東二撫臣外謹將欽遵辦理緣由恭摺具奏奏入報聞乾隆十六年二月十一日瑚寶奏言竊照直屬上年偶被偏災蒙皇上念切民依將本年豫東二省粟米截留十萬石以資賑糶臣等接準部咨隨檄行坐糧廳於東豫二省起運幫船內各截撥五萬石兹於本年正月二十七日準直督臣方觀承咨準行在户部咨欽奉上諭將河南省本年運通粟米截留十萬石以為加賑之需仰見皇仁普被睿慮周詳臣等伏查河南省本年運通之粟米共一十一萬三千四百餘石除前次欽奉上諭截留直𨽻五萬石并應運薊糧五萬石外僅餘剩米一萬三千四百餘石其不敷米八萬六千五百餘石臣等通融辦理已檄坐糧廳於山東省先進幫船內找截以足十萬石之數除一面移咨直𨽻督臣查照辦理外理合恭摺具奏奏入報聞乾隆十六年三月十四日傅恆等奏言查徐家渡等處留養上駟院之馬俱係預備各太監等乘騎及膳房茶房馱載物件關係最要今據該院侍衛托雲等呈稱原帶來馬一千五百六十六匹內除沿途疲乏例缺遺失一百四十九匹外其餘陸續收到馬匹一千四百一十七匹此內五分臕馬三十二匹四分臕馬二百六十三匹三分臕馬七百六十六匹打瘡疲乏馬十七匹又經雨雪陸續倒馬三十六匹外餘剩馬一千三百八十一匹因原定徐家渡地方窄狹泥濘槽䥷不敷職等向委派辦理喂馬事務道員知縣等令將馬匹移至王家營喂飬該地方官所備草束並不敷用每馬只得通融一半喂飼屢次行催地方官始將草豆送到雖經分給各羣頭目等加謹喂養但皇上回鑾在邇今未及一月所備草豆即不敷用再至數日勢必不能接續請速轉咨該督上緊運送草豆毋致缺乏是該道王德階並不加緊辦理顯係疏忽現交王德階辦理雇騾頭事務俟辦完之日視其所辦何如之處另行辦理具奏外其王家營留養上駟院馬匹原來時沿途疲乏倒缺及留養之際因地方預備草豆等物不能敷用是以陸續又有殘傷若不即為通融辦理臨期必致有悮臣等酌議除嚴飭王家營喂養馬匹侍衛托雲等令其此際加謹喂養以備應用外查東省所有營驛馬匹據凖泰奏明通融四千匹預備抵補隨來拜唐阿兵丁倒斃疲乏官馬今若又調山東馬匹難得許多臣等詳加商酌直𨽻營驛馬共有二萬五千餘匹此際並無别差俱係拴喂之馬請旨令直督方觀承於直東接壤相近地方營驛馬內酌挑一千匹預行趕赴順河集等處以備抵補上駟院馬匹之用俟馬匹到順河集時請令該大臣會同兵部將原留喂養馬匹再加查看將可乘騎者挑出應用外其不敷者即將直省預備一千匹內照數給與乘騎上駟院不能全用一千匹應將餘剩之馬俱令預備抵换順河集留存拜唐阿兵丁疲瘦馬匹之用俟命下之日交兵部飛行直督將馬匹照數辦理即速趕赴順河集等處以備應用奏入報聞乾隆十六年三月十八日兵部侍郎兼管順天府府尹蔣炳奏言竊臣於二月十九日自京起程赴順河集會辦回鑾車輛於二月二十八日至山東之齊河縣會商撫臣凖泰據稱東省應分辦車二百輛將原來京車留住一百二十二輛尚少七十八輛現飭雇辦足敷應用至倒缺駝隻需車抵補亦現飭預備但東省需車甚多不能協濟江省臣於三月初八日至順河集據江省辦理車輛之淮徐道王德階稟稱江省應分辦車二百輛將原來京車留住一百十八輛尚少八十二輛現在遣人往各處雇備臣查內務府鑾儀衛原用車共三百四十九輛內除沿途回空及馬騾疲乏外計江南山東兩省留住原車二百四十輛督辦之各該道等日給守候銀兩臣復飭令加意喂養務期臕力壯健應用其短少一百六十輛現在雇覔臣逐加指示飭催雇辦共足四百輛之數限於三月內到齊順河集一帶預備回鑾之用奏入報聞乾隆十六年四月初六日傅恆等奏言總督方觀承奏預備馬匹趕赴順河集應用等因一摺奉硃批原議大臣速議具奏欽此查臣等前因上駟院之馬俱係預備各處太監乘騎及茶膳房馱載物件原來時沿途疲乏憊瘦留養後陸續又有殘傷東省營驛馬匹業已通融四千匹抵補隨來拜唐阿兵丁憊瘦疲乏官馬是以酌議於直𨽻附近東省營驛馬匹內挑備一千匹趕赴順河集等處抵補備用奏準行文今據該督奏稱於各驛內撥肥壯馬五百匹標營內挑撥肥壯馬五百匹又另備餘馬一百匹差遊擊王曰信等管押分作三起限於四月初四五等日趕到順河集應用是此項馬匹現在將次已到臨期自可不致有悮至到齊之後業經奉旨派臣舒赫德前往將原留喂養馬匹再加查看可以乘騎者挑出不敷者即照數補給如有餘剩預備抵换順河集留存拜唐阿兵丁疲瘦馬匹之用至所稱此項營驛馬匹似應即行開除另籌買補足數請將所撥之驛馬于留二項下動銀買補所撥之營馬於朋抽項下動銀買補餘馬照此辦理並請於出直境之日即將營驛應支馬乾草料均行扣除其山東江南境內所支草豆即由該省報銷毋庸直𨽻另議還項之處查營驛馬匹有差操各務最關緊要况直𨽻為畿輔重地郵寄殷繁非他省可比馬額尤不便久懸此項缺額之營驛馬一千匹自應即待籌辦應如該督所請所撥之驛馬五百匹即於留二項下動銀照數買補營馬五百匹即于朋扣項下動銀照數買補餘馬一百匹如有换用亦準照此辦理至馬額既已開除所有馬乾草料亦應如所請於出直境之日即行扣清其山東江南境內沿途所支草豆據稱恐委員呼應不靈已移咨轉飭經過州縣備辦自應令該省查明照例核實報銷母庸直𨽻另議還項以致牽混此項馬匹業已抵補上駟院其上駟院換下之馬該督雖稱于東江二省就近撥補查東省業已籌備馬四千匹所有换出拜唐阿兵丁疲瘦馬匹自應存留東省撥抵至上駟院應换之馬自應於江省籌辦因江省馬匹疲乏憊瘦者多是以議令于直隸協濟直隸之馬既已代江省支應所有上駟院換下之馬自應令専留江省以補營驛缺額之數再據該督奏稱於奉文之前預備營馬一千五百匹令撥去營馬六百匹尚存馬九百匹趕赴德州或景州聽用辦理極為妥協應令先期趕赴臨時如上駟院及拜唐阿等之馬有應更換者聽侯更換俟命下之日臣等行文該督遵照辦理奏入報聞乾隆十六年四月初七日黃廷桂等奏言恭值御輅南巡大小各官承辦差務俱應殫力奔走勉盡職分即有微勞原無足數但文武賢愚不一人心勤惰各殊若不分别勸懲恐無以鼓示將來臣等愚見除司道大員及已經奉旨升補並降級奏請恩準留任暨尋常供職之員均毋庸置議外所有實在出力與衆不同之員江省有所難得謹繕列名單恭呈御覽應否賞豫記名恭候皇上恩裁至臨事退謹並不急公之劣員事竣查確嚴加恭處庶使不肖者知所警戒急公者益思奮勉兩江省官常舊習可得振肅矣奏入上諭曰著於行宫前帶領引見乾隆十六年四月初八日兵部奏言查得原交與山東喂養拜唐阿兵丁等乘騎馬六千三百七十三匹陸續憊瘦馬一千二百三十三匹除疲乏難以帶往留養馬五百七十四匹外實在趕往順河集馬四千五百六十六匹尚可乘騎三四分不等臕馬㨂選二千一百四十四匹從山東巡撫凖泰所奏預備馬匹青州將軍屬下旗馬共四千一百四十五匹內㨂選四五分臕馬三千九百二十九匹合并六千七十三匹放給原交馬之拜唐阿兵丁等查得尚不敷用馬三百匹上駟院為換給馬匹原議調來直省馬一千匹內如上駟院用足餘剩馬匹换給拜唐阿兵丁等乘騎現今從直省趕來馬一千匹又多備馬一百匹查看得因逺路趕來兼之稍為緊急故馬臕不甚肥壯然而㨂選三四分臕可以乘騎馬六百六十二匹除换給上駟院疲瘦缺空馬三百六十二匹外將尚可乘騎馬三百匹即照原議足數放給拜唐阿兵丁等此項調换放給缺空馬匹從山東留養馬匹內撤出瘦馬三百匹直省選足餘剩馬四百三十八匹合并上駟院所换馬三百六十二匹共馬一千一百匹除交與該省總兵官保住道員王德階遵照原議辦理外山東選足餘剩馬匹疲乏難以帶往留養馬共計二千九百十二匹亦俱交與山東兖州鎮總兵官王朝輔遵照原議辦理奏入報聞乾隆十六年四月初九日蔣炳奏言竊臣欽奉諭旨會辦回鑾車輛查催江南山東兩省將所辦車輛在順河集預備共四大套車四百六十七輛於四月初六七初八等日督同兩省辦車道府並內務府司員監放計放給內務府鑾儀衛車二百七十三輛內用江省預備車一百二十九輛東省預備車一百四十四輛其餘車一百九十四輛並江省預備之三套兩套各車現聽隨駕之大臣官員等自行雇用如有餘剩即交山東辦車道府帶回東省為沿途預備之用奏入報聞乾隆十六年五月十六日御史李友棠奏言竊照江浙士民久殷望幸翠華南指大沛恩膏凡兹黎元俱獲近光而錫福誠曠代之殊遭升平之極軌也惟是江浙地方素稱繁劇即以詞訟一端論之繁難州縣每日約有二三百件簡僻者亦不下百十件牧令専心辦理尚虞竭蹶偶爾公出壅滯恆多雖鑾輅經臨供億咸支帑項絲毫不擾官民而地方有司理應平治道路備具舟車先期料理敬謹將事一切田土户婚命盜案件或限於才力不能兼顧因藉口辦差任意推延亦情理之所必有者伏讀上諭朕待督撫等惟因其能實心辦理令地方日有起色加恩奬豫而不知朕心者未必不以辦差華美為工玩視民瘼此風一開於吏治民生所關甚大仰見我皇上豫遊所至行慶施惠無非念切民依今值聖駕回鑾大差甫竣其牧令之夙號才能者方冀量録辛勤妄希擢用庸懦自甘者又以甫經勞勩暫圖息肩於是茍且偷安即大吏亦且不復深求積久生玩勢所不免正宜乘此急加整頓以仰副皇上省方觀民求寧求莫之至意臣請敕諭江浙督撫嚴飭所屬辦差州縣一應新舊大小事件分别先後立定限期貢令道府等官不時督催應審結者審結應省釋者省釋倘有玩愒廢弛之員即行據實糾參毋得以辦差之後輒為姑容如此則牧令益加奮勉案牘可以肅清於吏治民生不無禆益奏入上諭曰所奏是著照所請行該部知之欽定南巡盛典卷九十一
