body:
  text: 欽定四庫全書欽定南廵盛典巻八十五名勝江南鎮江常州蘓州金山在鎮江府西北七里大江中唐裴頭陀於此䦕山得金故名一名浮玉山隨山搆屋金碧交輝與江光相激射有泉曰中泠陸羽品為天下第一山之東有日照岩東麓有善才石一名鶻峯西有石􅑉山其頂則金鰲妙髙諸峯在焉浮圖冠其上屹立梯霄洪濤四繞宋汪藻所云攬数州之秀於俯仰之間者也江天寺在金山上寺剙於晉代本名澤心寺宋改龍游寺蘓軾以玉帯施元長老今玉帯橋其遺迹也聖祖仁皇帝南廵賜額江天寺乾隆辛未嵗恭建行宫於寺之右皇上六舉省方之典渡江而南疊經駐蹕堂曰靜瀾齋名鏡治皆親灑宸翰懸之梁􅎝又建閣尊蔵聖祖欽定古今圖書集成全帙及四庫全書全部大江南北望之如蓬莱瀛島焉辛未御書寺額曰寳帯名藍曰寒香古韻曰天際杯浮曰龍藏香嚴曰缽龍珠洞曰潮音蓮界聫曰潮湧西津不斷天風傳塔語山蟠北固遥分晴籟散爐烟又聫曰海嶼雲濤天共逺梵宫香靄日長新又聫曰甘露常流功徳海香雲遥映普陀山又聫曰岫湧白雲飄晻靄林䦕翠柏繞清凉御書行宫額曰紫金浮玉曰春煙海曙又樓額曰逺帆曰壮觀曰更上一層楼聫曰氣接鴻濛中流䦕逺勢山浮杳靄一柱倚髙空又聫曰日湧輪髙海門近雲來氣接巫峡長丁丑御書寺額曰靈區仙蹟又樓額曰觀濤壬午御書行宫聫曰瓷椀竹罏皆恰當新題舊什各分明又聫曰詩句全從畫間得雲山常在鏡中留又聫曰三春麗俯雲巒上太古清流水鏡中又聫曰到海春潮漲新碧渡江煙樹織遥青又聫曰江澄萬頃淨如練峯峙一卷髙入雲又聫曰泉冷石為瘦峯髙樹與遥乙酉御書寺額曰風恬浪靜庚子御書江神殿額曰徳佑安瀾聫曰靈源派滙襟三逺澄練功符得一寧御書佛殿聫曰法界靜恭清凈相香臺普現妙明心又聫曰真如不動超觀察念力常圓普吉祥又聫曰潮音普徧華嚴海慈竹常霏妙鬘雲御書行宫額曰江山永秀又賜閣額曰文宗又額曰妙髙臺又堂額曰太古甲辰御書行宫聫曰喜有清音相問荅絶無塵意與周旋又聫曰煙霞表裏因心靜天水空明觸目新焦山在鎮江府東北九里大江中以漢焦先隐此故名與金山對峙上有焦仙嶺三詔洞以先嘗三詔不起也曰塢曰灣曰棧道諸竒勝不能殚述寺中古鼎篆銘莫能盡識傳為周時器浮圖二樓閣亭臺之屬三十有四其最著者曰寳墨亭貯王奐之集暨右軍書陀羅尼經幢也山麓有瘞鶴銘以摹􅒽甚難康熈年間舁置山上乾隆丁丑嵗恭䝉皇上親灑宸翰一通摩勒上石龍翔鳳翥藻耀萬古非特山靈邀寵即寳界諸天亦應和南以効梵祝矣辛未御書寺額曰海門鷲嶺曰江界慧燈殿額曰松寥竹塢楼額曰鏡江並賜漢隐士焦先匾曰山髙水長又御書聫曰領要得江山鼎伏恰依仙隐處觀空参水月錫飛還傍鶴銘邊又聫曰山削雙清玉塢潜光髙士卧潮來一碧金瀾對峙化人居壬午御書額曰竹楼又堂額曰清寄聫曰雲容水態不相厭畫意詩情分與投又聫曰四面波光動襟䄂三山烟靄䕶壺洲又聫曰到來俯視原無地攀陟遥吟恰有楼又聫曰一泓水鏡呈當面滿魄氷輪映舉頭又聫曰山色江聲恭一合花香月影證三摩又聫曰净業江澄鏡圓光月印珠乙酉御書堂額曰曠觀曰髙軼羣倫聫曰春秋風月因心㑹上下水天與目謀又聫曰波含静渚心同澈雲住髙峯態自靈又聫曰岷水溯䧺圖神依西蜀焦峯冠靈宇目俯東吴又聫曰山水足清音賞尋物表雲烟供静寄妙契天倪甲辰御書聫曰屏山鏡水皆真縡蘿月松風合静觀錢家港在鎮江府西門外可逹大江適當金山之麓横峯側嶺蒼翠時呈細浪長波瀠洄如帯乾隆庚辰嵗大吏於其處恭建行宫以備御舟渡江駐蹕之地甲辰南廵迴鑾遂䝉翠華臨憇焉甘露寺在鎮江府北固山山三面臨江巖壑陡絶梁武帝登楼延望改曰北顧寺為吳孫皓建以改元甘露遂以命名舊在山下宋祥符間移建吴琚榜曰天下第一江山上有巨石状如羊傳為諸葛亮與孫權坐謀破曺處勝蹟則多景楼鳯凰池天津泉秋月潭為最寺後有鐡柱峯下為觀音洞郡城之後屏也乾隆辛未御書額曰南徐净域聫曰地窄天寛江山雄楚越漚浮浪卷棟宇自孫吴艤舟亭在常州府東門外宋蘓軾常繫舟於此後人因以名亭地多古木土阜蜿蜒雜植花竹為御舟經行之地恭搆数椽以備臨幸亭右岡巒洞壑起伏綿亘下有蘓軾洗硯池形如半圭水檻風廊淥波半畆亦覺天光雲影共徘徊也乾隆丁丑御書額曰玉局風流惠山在無錫縣錫山之西舊名西神山僧慧照居之故又名慧山山有九隴蜿蜒如龍故亦名九龍山有泉岀石間陸羽品為第二甃以石方圓各一建亭覆之前有堂三楹曰漪瀾為宋令蘓舜欽建自亭右折而西上曰若氷洞其左則惠山寺也寺有金蓮池亦曰涴沼泉流瀦焉寺左桃花塢下為聼松菴明僧性海即繡嶺亭故址為之舊藏王紱諸人竹罏圖四卷屢逢臨幸題詠留貯山寺後因收弆弗慎致燬於火乾隆庚子嵗皇上五廵江南以名流韻事未可闕如親灑宸翰補繪竹罏第一圖天章炳煥超軼前人竝命皇六子及諸臣工續成二三四圖各為一卷賜付聼松菴尊藏自是圗畫昭於雲漢竹罏寳若鼎彛勝地名泉遂得流傳不朽矣辛未御書額曰法乳流慈聫曰九隴雲連吉光䦕佛相二泉玉瀉禅味得真如丁丑御書額曰漪瀾堂又額曰竹爐山房寄暢園在惠山之左初本僧寮曰南隐又曰漚寓明正徳中尚書秦金得之闢為園名鳯谷行窩子孫次第増葺易名寄暢環以清流䕃以嘉木遂成勝地康熈年間聖祖御賜詩章諭徳行秦松齡敬顔其堂曰宸翰又曰卧雲曰嘉樹閣曰天香曰凌虚一峯卓立其中乾隆丁丑仰䝉睿賞賜名曰介如拳石之㣲並邀榮遇遭逢之幸盖不偶云又御書額曰玉戞金摐聫曰清泉白石自仙境玉竹氷梅總化工乙酉御書額曰竹净梅芬蘓州府與江寧並為省㑹其地山澤藏育土風清嘉誦唐白居易八門六十坊句闤闠至今稱盛焉府治舊有織造官廨聖祖仁皇帝南廵即其址改建行宫中有凝懐堂御書賜額也乾隆庚午嵗皇上下詔省方稍加修葺以備臨幸自是疊邀法駕東南喁喁望幸已歴有年所恭逢法祖時廵鴻㤙大沛民間歡迎瞻就巷舞衢歌盖閲時而彌盛云辛未御書額曰擷芳攬秀丁丑御書額曰吴苑清輝聨曰軒忩自納雲霞氣書卷常含草木馨又聨曰歌誦春聲喧井里林巒曉色入樓臺又聫曰南國鶯花多勝賞吴中山水稱清吟又聫曰氣清松竹有餘韵雨足湖山是處佳壬午御書佛堂額曰福徳相聨曰圓覺光常垂妙鬘吉祥境本徹優曇又御書神堂額曰篤純佑聫曰居處式慿資拱衛馨香儼在契神明又御書行宫堂額曰南國熙春聫曰閶臨詄蕩通民隐里撫殷豐騐物華又聫曰牕意包含畫天容醖醸春又聫曰寧惟容膝務敬念治民方乙酉御書聨曰居中攬外襟懐暢擊轂摩肩職殖殷庚子御書額曰研經聫曰滿忩松石無非古一屋雲烟總是清又聫曰墨沼雲濃凝絮雨筠簾風細引松簧又聫曰湛華饒水木挹韻在琴書又聫曰樂意觀生物遐心寄太初又聫曰四壁圖書鑑今古一庭花木念農桑又聨曰樹色碧無礙山光靜有餘又聫曰展圖恰對景清候得句多於神謐餘又聫曰軒忩惟静寄書史供清拈又聫曰堪㑹智仁趣都包今古詮又聫曰春秋足風月飛躍有鳶魚甲辰御書堂額曰玊蘭滄浪亭在郡學之東積水瀰漫小山曲折相傳為錢元璙池館宋蘓舜欽得之作亭曰滄浪歐陽修有清風明月本無價之句其名遂著尋屬章惇後歸韓世忠愈擴其址元明間廢為僧舎嘉靖時知府胡纘宗重建韓祠釋文瑩復於其旁建滄浪亭本朝宋犖撫呉搜訪遺蹟構亭於山巔得文徴明隸書滄浪亭三字掲諸楣獅子林在城東北隅中多怪石状如狻猊故名元至正二年天如禅師之門人結屋以居其師有峯有池有橋有亭有松有竹僧寮賔館無不具備勅賜寺額曰菩提後為勢家所佔倪瓚曽作圖貎之真蹟傳入内府聖人按圖臨幸寵以天章一曲林亭遂與南國名山爭勝乾隆辛未御書額曰鏡智圓照壬午御書額曰畫禅寺乙酉御書額曰真趣虎邱在蘓州府西北九里晉司徒王珣别墅後捨為寺兩崖劈分劍池在焉石泉清泠不可測相傳為闔閭試劍處前為千人石晉異僧竺道生講經於此有説法臺可中亭㸃頭石諸蹟山後浮圖髙切雲漢清逺道士題詩云白雲蓊欲歸青松忽消半顔真卿愛之刻諸崖上乾隆辛未御書寺額曰須彌春滿又堂額曰春臯麗矚曰海湧嵐浮曰吴天蓬閬聫曰雁塔影標霄漢表鯨鐘聲度石泉間又聨曰喬柯嘉䕃盤陀石曲澗清音觱沸泉又聫曰風聲滿逕竹鏗爾春氣入林花翳如又聫曰翠竹蒼松全夀相清泉白石養天和壬午御書千頃雲額曰靜觀齋靈巖山在蘓州府西三十里一名石鼓山又名硯山吴王置館娃宫於此今靈巖寺其址也内有響屧廊琴臺吴王井諸遺蹟頂有月池硯池玩華池雖旱不竭西南石壁峭㧞者為佛日巖欣然如立弛然如臥者為夀星石醉僧石又有松嘯迎暉二亭並據勝地宋范大成謂下瞰太湖洞庭兩山滴翠叢碧在琉璃世界中洵竒境也靈巖寺靈巖山之陽相傳晉太尉陸抗捨宅置寺名曰秀峯南宋時為韓世忠功徳寺改名崇報禅院明洪武中賜額靈巖寺林巒囘抱實據一山之勝聖祖仁皇帝南廵駐蹕於此皇上法祖省方吴中大吏於寺旁營搆行宫松棟雲軒不尚粉飾其髙處為臨湖榭俯視具區三萬六千頃如在几席間也乾隆辛未御書寺額曰吴范香林聫曰雲去雲來池邊留塔影烟凝烟泮林外泛湖光御書行宫額曰晴湖逺碧曰雲峯罨翠又額曰靈巖聫曰空際兩山青玉削望中一界白銀鋪丁丑御書佛龕屏聫曰金輪彩映牟尼浄寳塔光含舍利圎御書行宫額曰臨湖榭曰隨安室聫曰三春烟景染新藻萬頃湖光開逺襟壬午御書行宫聨曰毎因物表延遥寄似與天遊得靜陶又聫曰座挹山光将水態牕延秋月與春風又聫曰蜃忩縱望湖天濶鈿几披吟花栁妍又聫曰雲容水態不相厭畫意詩情分與投又聫曰巖依古髻山常在湖滿祥輪鏡本圓乙酉御書行宫聫曰氣接鴻濛䦕逺勢峯連青靄入髙空又聫曰雲霞流麗東西暎天水空明上下鮮又聫曰逰目樂山水甄心悟筦倪庚子御書行宫聫曰臨虚標秀琴書潤因迥為髙坐卧便又聫曰雲端曠奥軒疑畫杪髙低圃是懸又聫曰波涵阿耨資功徳雲䕶須彌現吉祥又聫曰鳶飛魚躍同澄澈雲影天光會渺茫又聫曰流水今日明月前身甲辰御書行宫聫曰太湖萬頃碧予意一般澄寒山别墅在支硎山西明趙宦光隐此築小宛堂以居後為僧舍庭前老梅相傳宧光手植芙蓉泉出其旁西臨清淺池通千尺雪名飛魚峡東南為空谷竒石横亘上跨小石如環名馳烟驛皆篆書刻石宧光舊跡也乾隆丁丑御書額曰寒山别墅曰眺聼清機又額曰對瀑曰空谷曰琳瑯叢曰芙蓉泉又楼額曰清暉曰緑雲又堂額曰澄懐聨曰石擁雲根涵秀潤泉淙玉韻得清真又聫曰脩竹弄風金瑣碎飛泉激石玉琮琤又聫曰隨歩山泉引清聼悦懐烟樹入幽吟壬午御書額曰馳烟驛庚子御書聨曰暗琴淙乳竇明鏡漾雲根又聫曰誰洗筝琶耳獨怡雲水情千尺雪在寒山石壁峭立明趙宧光鑿山引泉縁石壁而下飛瀑如雪不减匡廬山半有屋曰雲中廬又有弹冠室驚虹渡皆宦光舊址再上為法螺寺乾隆辛未御書額曰玉峡飛流又閣額曰聼雪聫曰幽室数楹聊不俗清機片晌恰宜閒法螺寺在寒山山逕盤紆從修篁中百折而上勢如旋螺故名徑旁澗水瀠洄石梁跨之名津梁渡寺中精舍数椽四山拱翠庭前樹石位置天成翛然有出塵之致乾隆辛未御書額曰妙雲頂相聫曰一徑盤雲瞻寳髻萬山飛翠拱螺峯支硎山在蘓州府西二十五里晉沙門支遁嘗憩遊於此山多平石如硎故名今石室寒泉放鶴亭皆遁遺跡南有三巨石屹立如門下有觀音寺故亦名觀音山巖石清幽烟霞映發劉長卿詩所云林巒非一状水石有餘態者是也乾隆辛未御書額曰道風神駿又軒額曰暖翠春泉聫曰峯含畫意如懸軸澗有琴音不藉桐丁丑御書聫曰華海慧舟聲聞昭善應蓮臺香界願力普慈縁華山在蘓州府西三十里相傳晋太康間生千葉石蓮花故名上有石屋二間四壁皆鑿浮屠像又有龜巢石虎跑泉蒼玉洞洗心泉秀屏鳥道諸勝南為華山寺長松夾逕最為幽絶連接三嶺曰湼槃曰雞窠曰賀九過湼槃即支硎之南峯矣乾隆辛未御書寺額曰蓮界雲岑又軒額曰清池空碧聨曰秀挺蓮峯觀空悟華藏清延松逕聼法演潮音又聫曰山色雨晴無定畫泉聲髙下不停絃鄧尉山在蘓州府西南七十里相傳漢有鄧尉隐此亦名光福山以地為光福里也山勢綿亘岡巒起伏西有銅井銅青㸃㸃浮水上又一小山曰銅坑左岡曰米堆明顧天叙闢五雲洞相近一峯曰西磧磧之左曰弹山瀕湖有閣曰七十二峯西南六里曰元墓傳為東晉刺史郁㤗元塟處丹崖飛檻儼若畫屏東望太湖洞庭漁洋掩映几席為東南名勝之最乾隆辛未御書寺額曰梵天香海又堂額曰衆香國裏曰千林烟月聫曰萬頃湖光分來功徳水千重花影勝入梅檀林又聫曰春入湖山韶且秀雪凝楼觀净無埃香雪海即吾家山鄧尉之支峯也居人以種梅為業滿嶺梅花望之如雪香亘数十里前撫臣宋犖鐫香雪海三字於石西北石梁為虎山槗又有司徒廟或云漢髙宻侯鄧禹祠在青芝山北古栢雄竒蟠鬰葢千餘年物北有龜山光福塔在焉乾隆壬午御書聫曰疎影横斜水清淺暗香浮動月黄昏髙義園在蘓州府西天平山中有卓筆飛來卧龍諸峯山頂平正曰望湖臺面湖圓石曰照湖鏡山半有雲泉一線泉又有古松虬龍偃葢数百年物也南址為白雲寺宋范仲淹祖墓在焉旁即范氏義荘後闢為園乾隆十六年賜名髙義其後羣石林立所謂萬笏林也名臣勝地曠代沾榮遂為千古林巒増色穹窿山在蘇州府西南六十里相傳赤松子採赤石脂於此吴都賦云赤須蝉蜕而附麗葢指此其頂方廣可百畆有赤松子煉丹䑓昇仙䑓遺蹟名泉三而法雨下注可以溉田東嶺下有盤石相傳為朱買臣讀書䑓梁天監中建穹窿寺明改為拈花寺乾隆丁丑御書玉皇殿額曰穹宇清都又御書聫曰百尺聳丹梯欝羅最上羣峰環紫葢顥氣常清壬午御書聫曰太湖萬頃在襟䄂穹窿億丈凌星辰石湖在蘓州府西南十八里太湖之支流也相傳范蠡泛五湖始此宋范成大因越來溪故址為亭榭孝宗書石湖二字賜之中有千岩觀天鏡閣玉雪坡盟鷗亭諸蹟又有巨石鑱大士像因名石佛寺寺外長橋臥波風帆沙鳥出沒空濛間茶磨諸山映帯如畫恭遇時廵臨覧上惬宸襟真酈道元所謂仁知之性共山水效深者矣乾隆壬午御書額曰石湖治平寺在上方山下臨石湖之北梁天監中建亦名楞伽寺宋治平元年改今名旁有巨井深不可測嘉靖元年作石湖草堂文徴明題額前縈修竹後帯清泉水石烟雲並擅湖山之勝乾隆壬午御書額曰水觀澄因聫曰户外一峯秀堦前衆壑深又聫曰峯頂香雲凝妙鬘湖心寳月印摩尼上方山距石佛寺二里許一名楞伽山勢綿亘浮圖冠其巔北望吴王郊䑓東茶磨石湖烟波掩映綿渺無極東即治平寺也明王寵詩雅足誌其勝槩乾隆丁丑御書佛殿額曰水精法界又觀音殿額曰香雲應現聫曰風吹貝梵聲聞寂月照優曇色相空又闗帝殿額曰神佛賢豪聫曰丹心自比午日炯浩氣常存寰宇周庚子御書楞伽寺聫曰峯姿濯翠入澄照鏡影含虗惬曠懐欽定南巡盛典卷八十五
