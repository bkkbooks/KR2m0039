body:
  text: 河防治淮即以治黃清口實為湖河關鍵清水有力遂足以敵黃而來源不逺則其勢易緩河口東西壩對束湖水仰䝉聖明指授機宜視湖水之大小定拆展之限制實為永逺遵守不易之章程乾隆四十一年河臣將清口東西壩基趾移下一百六十丈在於平成臺處建築使清水源逺流長出口有力嗣因西壩迤外舊黃河內存有清水內外相連湖水出口至此不免散漫奉命於西壩迤下接築束水堤一道俾清水直注歸海四十四年河臣因清口壩外至陶莊新河尾清黃交滙處一帶河身寬長湖水至此其力紆緩又請將清口東西壩再行移下二百九十丈於惠濟祠前地方建築兩頭各築三四十丈不等如鐡心壩式其口門水小之年酌留十數丈或二十餘丈以資收束清水抵禦黃流設遇水大之年將壩工大加展寬更可資其暢泄兩岸束水堤工並可保護無虞自是湖水出口益暢抵黃更為得力洪澤湖水由五道尾閭太平等處引河出清口自東西壩移於惠濟祠前建築源逺流長力足敵黃永無倒灌之虞顧清水藉以敵黃者又藉以濟運乾隆四十六年黃流未歸故道清水建瓴東注易於消耗設遇東南大風則入運無多漕艘每致淺滯因於舊東西壩迤上兩岸築做兜水壩工使清水多入運口以濟漕運遇水小之年倣而行之著有成效乾隆四十五年恭逄翠華南幸親臨髙堰武家墩閲視洪澤湖磚石工程令將石工卑矮假落加髙其原舊用磚成砌各工均令改用石料修砌俾臨湖大堤通身全改石工永逺鞏固以為淮揚數郡民生捍衛仰見我皇上慈愛黎元至深且逺經督臣薩載奏准洪澤湖磚石工自髙堰武家墩汛至山旴蔣家壩南工尾止通共工長一萬七千一百八十九丈內舊有石工應行加髙者九千一百三十六丈一尺磚工改砌石工者五千七百七十一丈七尺並山盱㕔屬澗徐二汛堤身窄矮處一並加估幫培土工將已經朽壞應先拆改之磚工及正當湖心之卑矮應加石工並堤身卑薄應行加髙幫創之土工列為急修至磚工內雖有朽􅀈而根腳尚未搖動及卑矮石工之不甚犯風者列為次修其應行改石尚未朽壞之磚工及石工稍為卑矮並應一律加髙者次第修整分年辦理工程均得實在矣髙堰山盱臨湖磚石大堤為淮揚保障乾隆四十五年聖駕親臨閲視命將磚工改砌石工卑矮假落確估加髙分年興修已屬鞏固但石工層數既髙而石後頂土子堰尚矮四十九年復荷聖諭普律加培淮揚兩郡民生永資保障徐屬宿虹㕔之黃河北岸夏家馬路一工雍正十二年黃河大溜北趨河臣嵇曽筠修築壩臺下掃保護歷年嵗搶修防該工外黃內運縷堤與壩臺相隔僅二三十丈中間係屬坑窪深塘素稱險要乾隆二十七年聖駕南巡親臨閲視該工堤身單薄命將工頭工尾開挑倒溝引渠二十七八兩年伏秋汛內每於黃水盛長相機開放上假下假俱澄淤八九尺惟中假尚未一律淤成二十九年復將中假磨盤掃回溜處所另挑倒溝引渠水長開放一律淤平測量內淤髙於黃河水靣三尺是從前坑塘俱已填平業有成效該工雖已淤髙水靣三尺然淤益髙則工益固接續辦理以期一勞永逸又於新淤中間復接挑溝渠以寬一丈深三尺為度將挖起之土分鋪淤靣並將上中下三道引渠如式修整以備水長時開放進淤務期積寸得寸積尺得尺則黃河頂冲單薄要工得有後靠化險為平而運道堤工亦資鞏固豐碭㕔屬之毛城鋪碎石滚壩原為宣泄黃河盛漲之水攸關緊要從前因壩工坍卸啓閉失時漫無節制以致泄水過多下游濉河淤成平陸窪地常被淹浸乾隆二十二年將下游洪濉二河挑濬深通並將毛城鋪滚壩用碎石填平壩脊加髙以為重門節制其壩外支河如榮家壩竇家寨蔣家營傅家窪等處已成迎溜均堅閉不開惟唐家灣地勢稍髙向有倒鉤引河可以減泄漫灘之水二十七年聖駕南巡臨徐閲視北門外志樁水勢仰䝉睿謨廣運因時制宜奉諭將毛城鋪迤東之唐家灣引河俟徐城水志長至一丈一尺五寸以上開放宣泄俟漫灘水落即行堵閉俾河臣遵守二十七八兩年伏秋汛內徐城水志加長逾志將唐家灣草壩依時啓閉所減漫灘之水流入毛城鋪壩根水已澄清過壩僅止數寸及尺許不等三五日內即已斷流下游並不為患二十九年伏秋汛內唐家灣一帶並未漫灘南岸之毛城鋪北岸之蘇家山均未過水此皆皇上垂示機要束水攻沙溜走中泓河底年深一年之明驗也其北岸之黃村壩至大谷山一帶無堤處所自二十三年奉㫖接築縷堤六十餘里以來黃水不致漫衍堤內窪地悉成膏壤南北兩岸髙下田疇咸得一律豐登濵河黎庶莫不感頌皇仁永資利賴雲梯關以外海口為黃河尾閭近因海口紆逺而道淺二套三套漫口由北潮河入海之處捷近而水深似應亟籌更易海口而不知有無庸者乾隆四十五年督臣薩載奏明如果黃河現在經由之四浤以下海口大有淤墊之勢尾閭不能暢逹必須另籌入海道路則取捷就下舍北潮河别無他途但現今溜勢順軌其通洋海口落潮水定時雖比口內較淺而雲梯關以外水靣比兩岸尚低丈許海口外灘比現在水靣又低數尺寬至三百六十餘丈是河水歸槽之時安流東注尚無壅遏之虞自無庸亟籌更易海口之舉但或遇大汛盛漲洪流湍駛一時不及暢泄則從前連次漫口處所不能保無復溢若將漫口堤外現有冲出河形處所略為通其淤滯俾漫溢之水循途入海則盛漲可資疏消於上游各處河工不為無補又查得二套堤外從前漫水之東直至海邉均係阜寧安東海州等處減則灘地及葦蕩營産蘆蕩地間有淤沙溝槽形迹並無防護堤堰漫水之西淤沙較厚舊有之南潮河上假業已淤平則西係已涸之馬港河有夾河殘缺舊堤二道堤之南頭均與黃河北頭相接其東堤長六百里零西堤長二十九里零迤下無堤空檔長十六里零下接北潮河西岸民堰此堤之西俱係安東海州等處民田再四商𣙜馬港河西舊堤雖在雲梯關外十數里但其上游即係腹裏民田每遇盛漲漫溢時即倒漾至雲梯關以上且該處只有木牌樓一座鐫刻古雲梯關四字並無內外界限若將此堤殘缺處所修復並將無堤之十六里一律補足下接北潮河兩岸民堰則自雲梯關北堤下建通海潮河堤堰連為一縷既可保衛安海等處上游民田偶遇長水時溢出之水不致淹浸俾濵臨河海民人得享樂利之休並可作為雲梯關內外界址其堤東之海灘減則地畝遵二十九年諭㫖不必與水爭地聼民隨宜耕種以收自然之利河防民生均有禆益固無庸驟為更張之舉也海州漣河上接淩溝陸家口承受六塘河來水下至新壩由恬風渡歸海為海州水利幹河寬七八十丈長七十餘里緣潮汐往來年久淤澱乾隆四十六年豫省青龍岡漫水下注由駐馬湖五道尾閭及劉老澗九孔石閘兩路滙歸水勢盛大去路不暢海沭地方均被淹浸經大學士公阿桂及督臣薩載河臣李奉翰奏允興挑於以疏濬深通不但六塘河之水分泄歸海較為便捷而海州沭陽一帶民田俱經涸出實為禆益乾隆四十二年河臣奏辦淮揚運河形勢查西岸寶應諸湖周圍三百餘里湖靣寬濶水勢一律相平而運河自運口以至瓜洲計髙十四丈有竒地形北髙南下勢若建瓴是以三溝閘之外未設堤防下游之邵伯一帶湖河相通向來形勢即係如此復往運河上下逐假測量目下寶應運河水深八九尺至一丈一二尺河面較髙湖靣一丈二寸汜水汛運河水深六七八尺河靣較髙湖靣六尺七寸永安汛運河水深六七尺河靣較髙湖靣五尺五寸迤下六滿閘至萬家塘一帶河靣較髙湖靣四尺五寸及二尺九寸一尺八寸不等逮至髙郵一帶運河水深五六七尺河靣與湖靣相平惟露筋閘迤下至三溝閘通湖港一帶則湖靣髙於河靣自二尺四寸及一尺不等此髙郵以上河髙而湖低髙郵以下湖髙於運河之實在情形也其湖水歸宿之路溯查從前水大之年一由髙郵迤下西岸通湖二十四港口入運從東關南關五里車邏昭關等壩泄入下河歸海一由西岸三溝閘之通湖港及邵伯鰍魚等港入運從金灣東西灣鳯凰壁虎橋等處歸江後因歸海之路紆逺下河民田易於被淹仰䝉皇上聖謨廣運指授機宜大展清口使洪澤湖清水㑹黃東注歸海山盱五滚壩一律封土每年酌量啓放因而寶應諸湖存水較小髙郵南關車邏等壩久經封閉即西岸通湖各港亦俱堵塞現在湖水止由三溝閘以下之邵伯通湖各港入運形勢頗為順利前將三溝閘下通湖港一道築壩堵閉使湖水由二河行走至邵伯西岸各港入運仍從金灣等閘壩下注歸江其去路原未改易祇令湖水從南首二河之鰍魚各港入運距三溝閘較逺俾三溝閘以上運河水勢至此不為湖水橫衝兜阻則運河上游之水得以流行迅疾於湖歸江之路仍無阻礙至寶應西岸修建閘座之處因淮揚運河綿長三百四十餘里遇有水勢盛漲之年一線運河下注不能迅速未免壅盛不得不預籌分泄查運河東岸閘座涵洞運河水小時應須蓄水濟運即使下河民田需水亦只量為挹注以資播種若運河水大時下河民田形如釡底未便將河水泄入致淹民田是東岸閘洞不過資農田灌溉不能分泄運河盛漲惟有西寶應臨湖一帶河靣髙於湖靣數尺儘可宣泄查從前原有竹絡壩三里溝滚埧及減水閘等處分泄運河有餘之水以減上游暴漲近因該閘埧年久損壞是以酌請於三里溝上下修建石閘二座以備減泄入湖亦可容納四十三年又將東岸黃浦閘西閘瓦甸減水閘損壞處俱行拆修舊時葉雲洞改建雙孔石閘以備節宣並於三溝閘下通湖港築做草埧攔截湖流使運河水勢一路暢行而歸江乃無虞阻滯矣髙寶諸湖之水歸入運河邵伯以上向從髙郵車邏南關五里各壩分注下河入海邵伯以下向從金灣三閘及鳯凰壁虎橋灣頭閘各路分注由芒稻河入江查運河入江較入海之路甚為近捷而運河之水髙於江靣通流順勢消退亦速若從興鹽等縣入海路既遼逺又沿海地靣昂於內地所有通海河港多被沙淤即使疏濬極深亦恐潮水內灌且興鹽一帶形如釡底運河之水稍大必先淹過內地然後歸海是入海不如入江之便形勢顯然康熙三十八年聖祖仁皇帝南巡諭令將湖水河水俱由芒稻河人字河引出歸江如有淺處俱令挑深仰見聖謨廣逺洞悉機宜乾隆七年將邵伯以下入江之路酌量加增於金灣滚壩之下東西灣地方添建滚水壩二座並挑引河復將仙女廟金灣對過之越河及通江之石羊溝董家溝俱行增挑其原有之金灣壩下並鳯凰橋引河及通江之廖家溝秦唐港白塔河百汊港各河道則大加疏浚並於各河頭分别建立閘壩每年視水勢之大小相機啓閉以資宣泄謹按運河入江之路本為便捷今河道又經加增則髙寶湖水自足以資分泄其邵伯迤上髙郵各壩非遇異常泛漲無庸輕啓髙寶運河東堤以下與興鹽泰阜一帶民田俱得豐收而湖河入江分泄利便並無阻滯之虞髙寶兩境運河東堤建築閘壩凡十四處皆泄湖河溢漲之水由鹽城興化阜寧泰州以入海其來源本於洪澤湖每於伏秋湖水長發由運口歷清江淮安下注髙寶城郭堤工俱當其衝不得不多求分減之路而下河髙寶興鹽阜甘泰七州縣之田廬多成巨浸河臣張鵬翮以啓壩慮為害於民田閉壩又恐傷於堤岸隨將過水最多之五里車邏南關三減壩改為石滚壩非值有餘不令過泄以冀兩全之道後又歷經區畫而下河一帶仍難免於淹浸䆒之計其流而未究其源也乾隆四年河臣髙斌奏洪澤湖之天然壩無使輕易啓放祗留三滚壩以資減泄又奏於運口內建設閘壩既以節洪湖之水使暢出清口足以禦黃又以保髙寶下流無泛溢之患又查髙寶一帶閘壩口門俱寬四五六尺不等節宣有制惟五里車邏南關等壩俱各寬六十餘丈泄水過多今來源既減則此三壩無庸輕放其五里等壩俱用柴草堵築設遇洪澤湖異漲三滚壩泄水過多酌量將南關車邏二壩啓放以減水勢其五里中壩地勢卑下泄水過大一經啓放則下河不能容受應常行堵閉而下河各支河又䝉皇上發帑挑浚深通上減來源下通去路從前被災各邑得免淪胥無不仰戴皇仁謳歌聖德大江源出岷山南流經四川松潘衛歷夔州府出三山峽至漢陽大别與漢水合流經江西九江府入江南至瓜洲江口又東至通州入於海先是沿江本無工程康熙三十二年河臣于成龍將瓜洲儀徴河道交江防同知管理五十五年奉聖祖仁皇帝諭㫖江流日漸北徙衝刷瓜洲城垣必致危險事關民生若不預為籌畫修堤保護斷乎不可著江南督撫察勘詳議一靣動帑修築一靣奏聞經河臣趙世顯等於息浪庵前建築護城堤掃工程又花園港等處建築掃壩各工歷年歲搶修防至雍正五六年以後江溜北趨直逼瓜洲江岸逐漸塌卸逼近城垣河臣嵇曽筠於瓜洲沿江拋填碎石增修掃工共長三百三十六丈五尺保固江岸始獲平穩其揚州迤下十里為三汊河一通瓜洲一通儀徴故名三汊自三汊河至儀徴之沙漫洲江口共五十五里専資鹽運並江西湖廣安徽等省漕船由此入運江潮吞吐靡常易於淤淺建設響水通濟邏泗攔潮四閘隨時啓閉以資鹽漕運行查瓜洲江靣寬濶潮勢洶湧兼之風浪漰湃一經塌卸衝刷最深樁掃一時難以施工惟在未做掃工以前先用碎石拋擲填平其底既做掃工以後復以碎石護其根基則雖有風潮不致輕易掣動崖岸方能保固城垣可以無虞瓜洲舊有河道上通運河由閘下逹大江祗以河身淺窄年久淤墊舟楫罕通凡自揚州渡江者出瓜洲西境運河口繞回瀾壩過金山麓入京口閘江靣十有餘里適當中泓大溜南北俱不免涉險為虞四十六年開挑瓜洲跨城河路以利舟行發帑興修計河身長一千二十餘丈挑浚寬深可容巨艦旋轉修築兩岸縴道起髙橋座城圈并添建南北水關二座木石橋梁七座工竣後千檣萬艘絡繹往還俱由此河渡江徑至金山收口相距僅止三里永享通津之利云髙寶湖河之水以山旴五壩為來源以江海為去路其歸江之路則在邵伯以下灣頭閘壁虎橋鳯凰橋西灣東灣金灣各閘壩宣泄便捷歸海之路則在邵伯以上髙郵南關車邏五里等壩由興鹽等縣入海河道迂逺一經水長宣泄過多則下河每致被淹分泄不暢則運河又難容納歷年籌辦總無良法乾隆二十五年經河臣髙晉將髙郵南關各壩奏准封土三尺稍為限制然歸海雖節其流而歸江未展其路湖河盛漲之水一時仍難暢泄二十七年恭逄聖駕南巡指示機宜將歸江之西灣壩底落低四尺平時運河水勢未長已有尺水入江循序而進預減暴漲之勢並將金灣南閘改建石滚閘金灣河底加挑展寬十丈各壩下引河一律挑深由芒稻閘董家廖家石羊等溝暢逹歸江復䝉聖明洞悉全河形勢溯源挈要廣疏清口將東西壩預為展寬洪澤湖隨長隨消三載以來五滚壩並未過水南關車邏等壩封土如故上河下河髙低田畝嵗嵗豐收萬民樂利鎮江府京口為江浙兩省糧船由運入江之要道東西諸山環繞岡連髙阜惟京口臨江一靣地勢平衍居民稠密向有談家洲以為外護雍正十一年間江溜刷去談家洲直逼京口坍塌崖岸街道民房俱有傷損經河臣嵇曽筠於雍正十三年奏照瓜洲之式拋填碎石下掃護岸得以平穩現在掃工長一千一百一十八丈隨時修防不致疏忽金陵省㑹之區士商輻輳鎮江抵江寧計百六十里水程由長江歷黃天蕩江靣浩瀚風浪每多可駭若舍舟就陸則輦運倍為勞費撫臣吳壇奏請開挑句容分水脊一帶河道嗣經督臣薩載覆勘以分水脊一帶橫亘山岡難於開挖若就丹􅑫之師古灘開至龍潭舊有間假河形復多小港即有隔斷之處地勢平衍施功較易邀恩准發帑金於四十七年分假開濬通計河身長百里有竒其自師古灘至樂亭鋪舊有河身加工展拓自樂亭鋪至髙資港則於蘆灘地內挑挖自髙資港至太平橋半由平地亦間假水溝自太平橋至棲霞之碾䡐壩即河身內挑去淤埂河成引東莊口江水為源以錢家港為委中間復多汊港潮汐流通又於師古灘河尾及髙資港三江口等處建築閘壩以時蓄泄凡賈舶民船俱於金山對渡入錢家港直至棲霞之四板橋登岸僅陸行三十里即抵省㑹先是上元九鄉等處每遇山水驟發無可宣泄田禾時被漫溢今中通一港多設涵洞俾山水悉注於河而河旁田畝取資灌溉旱潦俱無所慮蓋自新河既成而曩之跋涉行旅與夫佃業居民至是而翕然稱便矣甲辰春皇上御安福艫親臨閲視錫名便民港紀以宸章益信聖人興事建工德施普而流澤長億萬斯年永永無極也謹按導河導淮分紀夏書河自積石至播為九河而入於海未嘗南㑹於淮也自東周以後漸徙而南隋時開通濟渠引榖洛水逹於河復自板渚引河通於淮而後河淮始㑹唐宋以來河流遷溢無定建治河之策者不下數十家若開寶纂禹元經祥符導河形勝等書要止取效一時未足以圖久逺也恭惟聖祖仁皇帝六巡南土指受河工世宗憲皇帝發帑加堤淮徐保乂我皇上聖神繼起本紹庭繩武之思建平地成天之業頻頒諭㫖興舉大工相地利之所宜不泥於古今之迹而審行之睿慮周詳非羣臣思議所至舊河攔黃壩既成復加築順黃壩以資堵禦甫及竣工而河勢南逼直至壩根賴此壩以為重門保障于是在工趨事諸臣下及兵夫士庶萬口同聲咸頌聖人首出庶物明燭幾先所謂五帝神聖其臣莫及者千古同符矣他若北潮河以下不必添建閘壩雲梯關以外不必與水爭地河身之挑濬木龍之改移以及添築土壩加幫縷堤開治引河填平塘土靡不上勤宸念精益求精而徐城髙堰增建石工不惜帑金數百餘萬以衛護生民俾咸登于樂利猗歟非常之功足以萬世永賴也昔人謂嚴安導洛農民享其利而轉漕之功弗聞韋堅堰渭漕運得其便而灌溉之績弗著今者河道所經通淮接運我皇上於數十年中經畫至當遂使瀆祗效順坤輿永寧河治而淮治淮治而運亦治巨艦通津南北稱便沃野千里桑稼連雲疏瀹得宜獲利斯普神禹錫圭之績紀自帝堯刻玉之年不又自古罕逄之景運哉欽定南巡盛典卷五十四
