body:
  text: 河防治淮即以治黄清口實為湖河闗鍵清水有力遂足以敵黄而来源不逺則其勢易緩河口東西壩對束湖水仰䝉聖明指授機宜視湖水之大小定拆展之限制實為永逺遵守不易之章程乾隆四十一年河臣将清口東西壩基趾移下一百六十丈在於平成臺處建築使清水源逺流長出口有力嗣因西壩迤外舊黄河内存有清水内外相連湖水出口至此不免㪚漫奉命於西壩迤下接築束水堤一道俾清水直注歸海四十四年河臣因清口壩外至陶荘新河尾清黄交滙處一帶河身寛長湖水至此其力紆緩又請将清口東西壩再行移下二百九十丈於恵濟祠前地方建築兩頭各築三四十丈不等如鐡心壩式其口門水小之年酌留十數丈或二十餘丈以資收束清水抵禦黄流設遇水大之年将壩工大加展寛更可資其暢洩兩岸束水堤工並可保䕶無虞自是湖水出口益暢抵黄更為得力洪澤湖水由五道尾閭太平等處引河出清口自東西壩移於恵濟祠前建築源逺流長力足敵黄永無倒灌之虞顧清水藉以敵黄者又藉以濟運乾隆四十六年黄流未歸故道清水建瓴東注易於消耗設遇東南大風則入運無多漕艘毎致淺滯因於舊東西壩迤上两岸築做兠水壩工使清水多入運口以濟漕運遇水小之年倣而行之著有成效乾隆四十五年㳟逄翠華南幸親臨髙堰武家墩閲視洪澤湖磚石工程令将石工卑矮叚落加髙其原舊用磚成砌各工均令改用石料修砌俾臨湖大堤通身全改石工永逺鞏固以為淮揚數郡民生捍衛仰見我皇上慈愛黎元至深且逺經督臣薩載奏准洪澤湖磚石工自髙堰武家墩汛至山旴蒋家壩南工尾止通共工長一萬七千一百八十九丈内舊有石工應行加髙者九千一百三十六丈一尺磚工改砌石工者五千七百七十一丈七尺並山盱㕔屬澗徐二汛堤身窄矮處一並加估帮培土工将已經朽壊應先拆改之磚工及正當湖心之卑矮應加石工並堤身卑薄應行加髙帮戧之土工列為急修至磚工内雖有朽􅀈而根脚尚未摇動及卑矮石工之不甚犯風者列為次修其應行改石尚未朽壊之磚工及石工稍為卑矮並應一律加髙者次第修整分年辦理工程均得實在矣髙堰山盱臨湖磚石大堤為淮揚保障乾隆四十五年聖駕親臨閲視命将磚工改砌石工卑矮叚落確估加髙分年興修已屬鞏固但石工層數既髙而石後頂土子堰尚矮四十九年復荷聖諭普律加培淮揚两郡民生永資保障徐屬宿虹㕔之黄河北岸夏家馬路一工雍正十二年黄河大溜北趨河臣嵇曽筠修築壩臺下埽保䕶歴年嵗搶修防該工外黄内運縷堤與壩臺相隔僅二三十丈中間係属坑窪深塘素稱險要乾隆二十七年聖駕南廵親臨閲視該工堤身單薄命将工頭工尾開挑倒溝引渠二十七八两年伏秋汛内毎於黄水盛長相機開放上叚下叚俱澄淤八九尺惟中叚尚未一律淤成二十九年復将中叚磨盤埽廻溜處所另挑倒溝引渠水長開放一律淤平測量内淤髙於黄河水靣三尺是從前坑塘俱已填平業有成效該工雖已淤髙水靣三尺然淤益髙則工益固接續辦理以期一勞永逸又於新淤中間復接挑溝渠以寛一丈深三尺為度将挖起之土分鋪淤靣並将上中下三道引渠如式修整以備水長時開放進淤務期積寸得寸積尺得尺則黄河頂冲單薄要工得有後靠化險為平而運道堤工亦資鞏固豊碭㕔屬之毛城舖碎石滚壩原為宣洩黄河盛漲之水攸闗𦂳要從前因壩工坍卸啟閉失時漫無節制以致洩水過多下游濉河淤成平陸窪地常被淹浸乾隆二十二年将下游洪濉二河挑濬深通並将毛城舖滚壩用碎石填平壩脊加髙以為重門節制其壩外支河如榮家壩竇家寨蒋家營傅家窪等處已成迎溜均堅閉不開惟唐家灣地勢稍髙向有倒鉤引河可以減洩漫灘之水二十七年聖駕南廵臨徐閲視北門外誌樁水勢仰䝉睿謨廣運因時制宜奉諭將毛城舖迤東之唐家灣引河俟徐城水誌長至一丈一尺五寸以上開放宣洩俟漫灘水落即行堵閉俾河臣遵守二十七八兩年伏秋汛内徐城水誌加長逾誌将唐家灣草壩依時啟閉所減漫灘之水流入毛城舖壩根水已澄清過壩僅止數寸及尺許不等三五日内即已斷流下游並不為患二十九年伏秋汛内唐家灣一帶並未漫灘南岸之毛城舖北岸之蘇家山均未過水此皆皇上垂示機要束水攻沙溜走中泓河底年深一年之明騐也其北岸之黄村壩至大谷山一帶無堤處所自二十三年奉㫖接築縷堤六十餘里以来黄水不致漫衍堤内窪地悉成膏壤南北两岸髙下田疇咸得一律豊登濵河黎庶莫不感頌皇仁永資利賴雲梯闗以外海口為黄河尾閭近因海口紆逺而道淺二套三套漫口由北潮河入海之處㨗近而水深似應亟籌更易海口而不知有無庸者乾隆四十五年督臣薩載奏明如果黄河現在經由之四浤以下海口大有淤墊之勢尾閭不能暢逹必湏另籌入海道路則取㨗就下舍北潮河别無他途但現今溜勢順軌其通洋海口落潮水定時雖比口内較淺而雲梯闗以外水靣比两岸尚低丈許海口外灘比現在水靣又低數尺寛至三百六十餘丈是河水歸槽之時安流東注尚無壅遏之虞自無庸亟籌更易海口之舉但或遇大汛盛漲洪流湍駛一時不及暢洩則從前連次漫口處所不能保無復溢若将漫口堤外現有冲出河形處所畧為通其淤滯俾漫溢之水循途入海則盛漲可資䟽消於上游各處河工不為無補又查得二套堤外從前漫水之東直至海邉均係阜寜安東海州等處減則灘地及葦蕩營産蘆蕩地間有淤沙溝槽形迹並無防䕶堤堰漫水之西淤沙較厚舊有之南潮河上叚業已淤平則西係已涸之馬港河有夾河殘缺舊堤二道堤之南頭均與黄河北頭相接其東堤長六百里零西堤長二十九里零迤下無堤空檔長十六里零下接北潮河西岸民堰此堤之西俱係安東海州等處民田再四商𣙜馬港河西舊堤雖在雲梯闗外十數里但其上游即係腹裏民田毎遇盛漲漫溢時即倒漾至雲梯闗以上且該處只有木牌樓一座鐫刻古雲梯闗四字並無内外界限若将此堤殘缺處所修復並将無堤之十六里一律補足下接北潮河两岸民堰則自雲梯闗北堤下建通海潮河堤堰連為一縷既可保衛安海等處上游民田偶遇長水時溢出之水不致淹浸俾濵臨河海民人得享樂利之休並可作為雲梯闗内外界址其堤東之海灘減則地畝遵二十九年諭㫖不必與水争地聼民隨宜耕種以收自然之利河防民生均有禆益固無庸驟為更張之舉也海州漣河上接淩溝陸家口承受六塘河来水下至新壩由恬風渡歸海為海州水利幹河寛七八十丈長七十餘里縁潮汐往来年久淤澱乾隆四十六年豫省青龍崗漫水下注由駐馬湖五道尾閭及劉老澗九孔石閘两路滙歸水勢盛大去路不暢海沭地方均被淹浸經大學士公阿桂及督臣薩載河臣李奉翰奏允興挑於以疏濬深通不但六塘河之水分洩歸海較為便㨗而海州沭陽一帶民田俱經涸出實為禆益乾隆四十二年河臣奏辦淮揚運河形勢查西岸寳應諸湖周圍三百餘里湖靣寛濶水勢一律相平而運河自運口以至瓜洲計髙十四丈有竒地形北髙南下勢若建瓴是以三溝閘之外未設堤防下游之邵伯一帶湖河相通向來形勢即係如此復往運河上下逐叚測量目下寳應運河水深八九尺至一丈一二尺河面較髙湖靣一丈二寸汜水汛運河水深六七八尺河靣較髙湖靣六尺七寸永安汛運河水深六七尺河靣較髙湖靣五尺五寸迤下六滿閘至萬家塘一帶河靣較髙湖靣四尺五寸及二尺九寸一尺八寸不等迨至髙郵一帶運河水深五六七尺河靣與湖靣相平惟露筋閘迤下至三溝閘通湖港一帶則湖靣髙於河靣自二尺四寸及一尺不等此髙郵以上河髙而湖低髙郵以下湖髙於運河之實在情形也其湖水歸宿之路溯查從前水大之年一由髙郵迤下西岸通湖二十四港口入運從東闗南闗五里車邏昭闗等壩洩入下河歸海一由西岸三溝閘之通湖港及邵伯鰍魚等港入運從金灣東西灣鳯凰壁虎橋等處歸江後因歸海之路紆逺下河民田易於被淹仰䝉皇上聖謨廣運指授機宜大展清口使洪澤湖清水㑹黄東注歸海山盱五滚壩一律封土毎年酌量啟放因而寳應諸湖存水較小髙郵南闗車邏等壩久經封閉即西岸通湖各港亦俱堵塞現在湖水止由三溝閘以下之邵伯通湖各港入運形勢頗為順利前将三溝閘下通湖港一道築壩堵閉使湖水由二河行走至邵伯西岸各港入運仍從金灣等閘壩下注歸江其去路原未改易祇令湖水從南首二河之鰍魚各港入運距三溝閘較逺俾三溝閘以上運河水勢至此不為湖水横衝兠阻則運河上游之水得以流行迅疾於湖歸江之路仍無阻礙至寳應西岸修建閘座之處因淮揚運河綿長三百四十餘里遇有水勢盛漲之年一線運河下注不能迅速未免壅盛不得不預籌分洩查運河東岸閘座涵洞運河水小時應湏蓄水濟運即使下河民田需水亦只量為挹注以資播種若運河水大時下河民田形如釡底未便将河水洩入致淹民田是東岸閘洞不過資農田灌溉不能分洩運河盛漲惟有西寳應臨湖一帶河靣髙於湖靣數尺儘可宣洩查從前原有竹絡壩三里溝滚埧及減水閘等處分洩運河有餘之水以減上游暴漲近因該閘埧年乆損壊是以酌請於三里溝上下修建石閘二座以備減洩入湖亦可容納四十三年又将東岸黄浦閘西閘瓦甸減水閘損壊處俱行拆修舊時葉雲洞改建雙孔石閘以備節宣並於三溝閘下通湖港築做草埧攔截湖流使運河水勢一路暢行而歸江乃無虞阻滯矣髙寳諸湖之水歸入運河邵伯以上向從髙郵車邏南闗五里各壩分注下河入海邵伯以下向從金灣三閘及鳯凰壁虎橋灣頭閘各路分注由芒稻河入江查運河入江較入海之路甚為近㨗而運河之水髙於江靣通流順勢消退亦速若從興鹽等縣入海路既遼逺又沿海地靣昂於内地所有通海河港多被沙淤即使疏濬極深亦恐潮水内灌且興鹽一帶形如釡底運河之水稍大必先淹過内地然後歸海是入海不如入江之便形勢顯然康熙三十八年聖祖仁皇帝南廵諭令将湖水河水俱由芒稻河人字河引出歸江如有淺處俱令挑深仰見聖謨廣逺洞悉機宜乾隆七年将邵伯以下入江之路酌量加増於金灣滚壩之下東西灣地方添建滚水壩二座並挑引河復将仙女廟金灣對過之越河及通江之石羊溝董家溝俱行増挑其原有之金灣壩下並鳯凰橋引河及通江之廖家溝秦唐港白塔河百汊港各河道則大加疏浚並於各河頭分别建立閘壩毎年視水勢之大小相機啟閉以資宣洩謹按運河入江之路本為便㨗今河道又經加增則髙寳湖水自足以資分洩其邵伯迤上髙郵各壩非遇異常泛漲無庸輕啟髙寳運河東堤以下與興鹽泰阜一帶民田俱得豊收而湖河入江分洩利便並無阻滯之虞髙寳兩境運河東堤建築閘壩凡十四處皆洩湖河溢漲之水由鹽城興化阜寜泰州以入海其來源本於洪澤湖毎於伏秋湖水長發由運口歴清江淮安下注髙寳城郭堤工俱當其衝不得不多求分減之路而下河髙寳興鹽阜甘泰七州縣之田廬多成巨浸河臣張鵬翮以啟壩慮為害於民田閉壩又恐傷於堤岸隨将過水最多之五里車邏南闗三減壩改為石滚壩非值有餘不令過洩以冀兩全之道後又歴經區畫而下河一帶仍難免於淹浸䆒之計其流而未究其源也乾隆四年河臣髙斌奏洪澤湖之天然壩無使輕易啟放祗留三滚壩以資減洩又奏於運口内建設閘壩既以節洪湖之水使暢出清口足以禦黄又以保髙寳下流無泛溢之患又查髙寳一帶閘壩口門俱寛四五六尺不等節宣有制惟五里車邏南闗等壩俱各寛六十餘丈洩水過多今來源既減則此三壩無庸輕放其五里等壩俱用柴草堵築設遇洪澤湖異漲三滚壩洩水過多酌量将南闗車邏二壩啟放以減水勢其五里中壩地勢卑下洩水過大一經啟放則下河不能容受應常行堵閉而下河各支河又䝉皇上發帑挑浚深通上減來源下通去路從前被災各邑得免淪胥無不仰戴皇仁謳歌聖徳大江源出岷山南流經四川松潘衛歴夔州府出三山峽至漢陽大别與漢水合流經江西九江府入江南至𤓰洲江口又東至通州入於海先是沿江本無工程康熈三十二年河臣于成龍将𤓰洲儀徴河道交江防同知管理五十五年奉聖祖仁皇帝諭㫖江流日漸北徙衝刷𤓰洲城垣必致危險事闗民生若不預為籌畫修堤保䕶斷乎不可著江南督撫察勘詳議一靣動帑修築一靣奏聞經河臣趙世顯等於息浪庵前建築䕶城堤埽工程又花園港等處建築埽壩各工歴年歳搶修防至雍正五六年以後江溜北趨直逼𤓰洲江岸逐漸塌卸逼近城垣河臣嵇曽筠於𤓰洲沿江抛填碎石増修埽工共長三百三十六丈五尺保固江岸始獲平穏其揚州迤下十里為三汊河一通𤓰洲一通儀徴故名三汊自三汊河至儀徴之沙漫洲江口共五十五里専資鹽運並江西湖廣安徽等省漕船由此入運江潮吞吐靡常易於淤淺建設響水通濟邏泗攔潮四閘隨時啟閉以資鹽漕運行查𤓰洲江靣寛濶潮勢洶湧兼之風浪漰湃一經塌卸衝刷最深樁埽一時難以施工惟在未做埽工以前先用碎石抛擲填平其底既做埽工以後復以碎石䕶其根基則雖有風潮不致輕易掣動崖岸方能保固城垣可以無虞𤓰洲舊有河道上通運河由閘下逹大江祗以河身淺窄年久淤墊舟楫罕通凡自揚州渡江者出𤓰洲西境運河口繞廻瀾壩過金山麓入京口閘江靣十有餘里適當中泓大溜南北俱不免渉險為虞四十六年開挑𤓰洲跨城河路以利舟行發帑興修計河身長一千二十餘丈挑浚寛深可容巨艦旋轉修築兩岸縴道起髙橋座城圏并添建南北水闗二座木石橋梁七座工竣後千檣萬艘絡繹往還俱由此河渡江逕至金山收口相距僅止三里永享通津之利云髙寳湖河之水以山旴五壩為来源以江海為去路其歸江之路則在邵伯以下灣頭閘壁虎橋鳯凰橋西灣東灣金灣各閘壩宣洩便㨗歸海之路則在邵伯以上髙郵南闗車邏五里等壩由興鹽等縣入海河道迂逺一經水長宣洩過多則下河毎致被淹分洩不暢則運河又難容納歴年籌辦總無良法乾隆二十五年經河臣髙晉将髙郵南闗各壩奏准封土三尺稍為限制然歸海雖節其流而歸江未展其路湖河盛漲之水一時仍難暢洩二十七年恭逄聖駕南廵指示機宜将歸江之西灣壩底落低四尺平時運河水勢未長已有尺水入江循序而進預減暴漲之勢並将金灣南閘改建石滚閘金灣河底加挑展寛十丈各壩下引河一律挑深由芒稻閘董家廖家石羊等溝暢逹歸江復䝉聖明洞悉全河形勢溯源挈要廣疏清口将東西壩預為展寛洪澤湖隨長隨消三載以来五滚壩並未過水南闗車邏等壩封土如故上河下河髙低田畝嵗嵗豊收萬民樂利鎮江府京口為江浙兩省糧船由運入江之要道東西諸山環繞崗連髙阜惟京口臨江一靣地勢平衍居民稠宻向有談家洲以為外䕶雍正十一年間江溜刷去談家洲直逼京口坍塌崖岸街道民房俱有傷損經河臣嵇曽筠於雍正十三年奏照𤓰洲之式抛填碎石下埽䕶岸得以平穏現在埽工長一千一百一十八丈隨時修防不致疎忽金陵省㑹之區士商輻輳鎮江抵江寜計百六十里水程由長江歴黄天蕩江靣浩瀚風浪毎多可駭若舍舟就陸則輦運倍為勞費撫臣呉壇奏請開挑句容分水脊一帶河道嗣經督臣薩載覆勘以分水脊一帶横亘山岡難於開挖若就丹􅑫之師古灘開至龍潭舊有間叚河形復多小港即有隔斷之處地勢平衍施功較易邀恩准發帑金於四十七年分叚開濬通計河身長百里有竒其自師古灘至樂亭舖舊有河身加工展拓自樂亭舖至髙資港則於蘆灘地内挑挖自髙資港至太平橋半由平地亦間叚水溝自太平橋至棲霞之碾䡐壩即河身内挑去淤埂河成引東荘口江水為源以錢家港為委中間復多汊港潮汐流通又於師古灘河尾及髙資港三江口等處建築閘壩以時蓄洩凡賈舶民船俱於金山對渡入錢家港直至棲霞之四板橋登岸僅陸行三十里即抵省㑹先是上元九鄉等處毎遇山水驟發無可宣洩田禾時被漫溢今中通一港多設涵洞俾山水悉注於河而河旁田畝取資灌溉旱潦俱無所慮葢自新河既成而曩之䟦渉行旅與夫佃業居民至是而翕然稱便矣甲辰春皇上御安福艫親臨閲視錫名便民港紀以宸章益信聖人興事建工徳施普而流澤長億萬斯年永永無極也謹按導河導淮分紀夏書河自積石至播為九河而入於海未嘗南㑹於淮也自東周以後漸徙而南隋時開通濟渠引榖洛水逹於河復自板渚引河通於淮而後河淮始㑹唐宋以来河流遷溢無定建治河之策者不下數十家若開寳纂禹元經祥符導河形勝等書要止取效一時未足以圖久逺也恭惟聖祖仁皇帝六廵南土指受河工世宗憲皇帝發帑加堤淮徐保乂我皇上聖神繼起本紹庭䋲武之思建平地成天之業頻頒諭㫖興舉大工相地利之所宜不泥於古今之迹而審行之睿慮周詳非羣臣思議所至舊河攔黄壩既成復加築順黄壩以資堵禦甫及竣工而河勢南逼直至壩根賴此壩以為重門保障于是在工趨事諸臣下及兵夫士庶萬口同聲咸頌聖人首出庶物明燭幾先所謂五帝神聖其臣莫及者千古同符矣他若北潮河以下不必添建閘壩雲梯闗以外不必與水争地河身之挑濬木龍之改移以及添築土壩加帮縷堤開治引河填平塘土靡不上勤宸念精益求精而徐城髙堰増建石工不惜帑金數百餘萬以衛䕶生民俾咸登于樂利猗歟非常之功足以萬世永賴也昔人謂嚴安導洛農民享其利而轉漕之功弗聞韋堅堰渭漕運得其便而灌溉之績弗著今者河道所經通淮接運我皇上於數十年中經畫至當遂使瀆祗効順坤輿永寜河治而淮治淮治而運亦治巨艦通津南北稱便沃野千里桑稼連雲䟽瀹得宜獲利斯普神禹錫圭之績紀自帝堯刻玉之年不又自古罕逄之景運哉欽定南廵盛典卷五十四
