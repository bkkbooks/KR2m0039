  text: 欽定四庫全書欽定南巡盛典卷二十二天章甲辰浙江
  hash: sha256:e499f246adeeb2ca4f1a2bf0e36f16882e63796d4fb8b7d639ff1771bc915332
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_034-1a, image: WYG0658/WYG0658-0385a.png}
body:
  text: 詩入浙江境海塘躬閲此来巡迎送河邊兩省臣疆有其分臨益切民無不愛見尤親春雲尚覺籠午日宿雨已看清路塵麥欲滋膏蠶欲霽江浙三月間麥田欲雨蠶桑欲晴故有種麥要雨採桑要晴之諺兩全難矣豈能均雨三月十二日夜雨曉漸止午雲復霈零急飄迷縴岸密㸃打篷舲梅片連飛白麥苗滋蔚青迎鑾憐萬姓冒濕走無停是日入浙江境夾岸迎鑾老㓜冒雨奔趍益見愛戴之忱出于至誠也題烟雨樓疊庚子詩韻春秋三閲喜重平聲来雨意烟情鏡裏開承徳奚妨摹畫貌庚子年南巡旋蹕攜烟雨楼圖歸於熱河倣為之至辛丑工成情景宛肖有攜圖去嵗興工始斷手今年蕆事勤之句嘉興畢竟啟詩材夏中讓彼泛錦芰春季饒兹對玉梅不擬南巡更臨此鳴榔欲去重去聲㣶徊降㫖寛免浙江杭嘉湖三府正供十分之三詩以誌事入疆民隐切諏咨積欠概將寛免之昨入江南境即降㫖免江寧江蘇安徽各藩司所屬未完積欠地丁漕項及民借籽種等項共銀米一百三十餘萬全行蠲免並未逢灾謝天估無灾則無借項更常完賦慶豐時雨𤾉時而嵗美毎年完賦更無欠項所當嘉也其風善寧可靳哉我恵施十以免三正供逭浙省附郭之仁和錢塘二縣本年應徴地丁正項先經降㫖槩予豁免外因思杭州嘉興湖州三府蹕途所經復加恩将三府屬本年應徴地丁錢糧共一百九萬餘兩再行普免十分之三計三十餘萬俾近光黎庶益享盈寜之福幸兹同樂世雍熙謁海神廟瞻禮三疊舊作韻庚子重来厪晏奠石工一律命堅修庚子南巡親臨閲視海塘飭該督撫於老塩倉一帶将舊有柴塘一律改添建魚鱗石塘母惜工費仍留舊有柴塘為重門保障嗣據該督撫等於辛丑壬寅等年陸續採辦石料派委誠妥大員勘估建築至癸夘年八月内據富勒渾福崧奏将原辦續辦魚鱗石塘共三千九百四十丈督率司道實力稽查於七月二十四日面石均已砌竣通工一律全完該督撫前往詳勘均屬如法砌築整齊堅實可以永慶安瀾矣勤劬雖曰不遺力䕶估仍惟賴賜庥神廟載瞻申九叩御碑欽仰示千秋敢云塘固民安枕未翕中亹未解愁駐蹕安瀾園三叠前韻六首北坍今次永塘尚近洪瀾海塘沙北漲南坍則塘工鞏固今自壬辰春以来沙痕漸覺北坍至庚子前巡親閲則北岸漲沙盡坍海潮直逼塘根今尚如此實為厪念春月來觀海古稀仍據鞍毎於城邑或乘馬便民就瞻也魚鱗期越固庚子命於柴塘後為石工飭該督撫等於老鹽倉一帶添築魚鱗石塘凡三千九百四十丈仍留柴塘為重門保障於癸卬七月全功告竣矣蠶市較蘇寛蘇州街市頗窄兹海寧衢市較寛鄉語分疆異民心一例歡㙮山近海邊踏勘慰心懸竹簍喜増漲㙮山壩上當潮汐頂冲向藉竹簍貯碎石三層擁䕶壩根昨秋據富勒渾等奏䕶壩竹簍上中兩層現俱露出今自二月後漲沙増長全掩三層竹簍為之稍慰蟻坯惕漏泉隅園且停憩比户有歌弦自是文章邑然當戒藻妍舊家原有述熟路不須尋世業傳來久國恩受已深翰林兹挂藉書囿勉繩音海寕陳氏向多為翰林者今乃寥寥庚子臨此陳善慶以家藏察襄茶錄真蹟呈進念為陳氏家傳墨寳因還之并為題句俾得世守勉紹前聲也重展蔡襄蹟依然懸古鍼蔡襄茶錄筆意秀勁有晋唐懸鍼遺法其自記云草木之微處之得地則能盡其材頗能即小見大故庚子題詩有頌不忘規應著眼處之得地盡其材之句即襄自叙意也安瀾詎祇名永祝晏而清明日觀形勢一宵厪慮情前吟巡壁舊聖藻額檐明載語世臣者承家在敬誠是園有紫竹不計嵗和年畫格應為創吟情詎可捐松非自稱直梅亦捨其姢三益於斯盍都因静以延一溪春水柔溪閣向曽修月鏡懸簷角古芸披案頭去来三日駐新舊五言留六度南巡止他年夢寐遊登尖山觀海尖山迤北弗資塘銕板沙比石猶固尖山迤西乃賴塘閭閻必藉石為䕶天時地利自古然人事弗和斯致誤所謂和亦匪云同盡心籌民保障固我登兹山亦已屢不為觀瀾暢神遇漲沙靡定不可恃毎因蒿目乏良慮視㙮山誌事三叠舊作韻兩山尖山㙮山接石壩恃竹簍外翼條石未可築潮汐日夜逼乙酉沙䕶簍尖山㙮山之間向有壩工正當潮汐頂冲條石難施惟藉竹簍貯碎石三層䕶根壬午閲視時沙漲掩簍四尺因命該督撫標記尺寸按月奏報至乙酉嵗親莅勘騐䕶簍沙漲較舊誌増至五尺時咸為壩工稱幸然坍漲無定未可恃也庚子坍漸急今幸䕶以全並無簍露立庚子前巡閱視㙮山塘山不惟乙酉所見掩簍之漲沙五尺盡坍並三層竹簍已露上一層至癸夘八月上中兩層俱露今甲辰二月以来漲沙増長上中下竹簍三層復全行掩䕶北漲期難望遑此論寸尺乙酉即有言安保無更易乙酉㙮山沙漲増長尺寸大吏皆謂江海效靈然海沙變易無常豈可深恃是以乙酉視㙮山詩即有效靈漫致頌安保無更易之句籲佑未䝉庥誠弗假予責毎閲海塘必詣漸祠䖍籲而神佑今沙漲已見増長向稱難以施工老塩倉之活沙兩年間接築魚鱗石塘籌辦江蘇及紹興等處所運石料均能及時應用亦賴惟有天佑誠神助益勉敬耳接築魚鱗塘工料籌詳悉兹更有後議欲擬將范公堤一帶土塘接至省城者都易以石庶乎可恃費帑非所惜也欲接築堅石此次南巡閲視議自搶塘柴工尾斜向西南接至范公塘而于柴塘後添築石塘即留柴塘為重門保障更添建挑水壩兩道以資保䕶帑項非所靳然斯亦下䇿觀潮四首再疊乙酉韻鎮海寺傍臨海臺行春觀處正潮来逮今三度詩十二不擬石塘重去聲往迴詠事酉年信筆随悔愆子嵗亦於斯乙酉觀潮詩有伍胥文種誠司是之二人前更屬誰之句其後北坍南漲潮勢漸逼石塘因悔前詩之見雖髙而語似慢故庚子詩反其意云設非之二人司是如是雄威更合誰謂當鑒我漲沙矣仍看北坍更籲誰李嵩妙蹟擕行笈相證雄觀信弗差詩讀張仁近楊基刺南宋風霜二帝忘行車石渠寳笈藏李嵩錢塘觀潮圖真蹟有張近仁題云雕闌玉檻照東海貪看秋潮㤀黍離又楊基題句潮水信可定日夕来朝宗人心獨不如而不思兩宫兩宫未雪恥屢下班師㫖云云葢深譏宋髙宗之耽晏安而忘國恥也一帶石塘工已就庚子閲海塘命改老塩倉一帶柴塘後為石塘昨嵗癸夘八月據富勒渾等奏報石塘三千九百四十丈大工已全行告竣魚鱗擬築向西仍老塩倉一帶石塘雖已全竣而章家菴以西惟藉范公土塘衛䕶形勢单薄恐不足資捍禦兹與該督等悉心籌勘欲一律堅築石塘使闔郡黔黎永資樂利費帑所不惜也亦惟此日盡人力敢冀他年㡬可乘海沙南北坍漲原無常自己夘以後潮勢近塘沙痕漸覺北坍今已二十餘年循環往復理之自然當有北漲南坍之㡬然朕惟盡人事以待之其時㡬可乘固不可必耳賜扈蹕王大臣及浙省大小吏食庚子斯上已清明此甲辰庚子前巡於三月三日駐蹕安瀾園行宫賜食兹以三月十五日清明節駐此宴賚需雲宜飲食勝地㑹臣隣小雨亦為澤是日小雨即晴輕烟那論新清明禁烟傳燭之事後世久不行遥心綣北省渥􅉈可霑春賜浙閩總督富勒渾武林曽昔撫而巡開府兹教綂浙閩祗以迎鑾来隔省又看閲嵗㑹今春漫勤供奉水及陸應勉調和軍與民識大體毋苛小節思之莫㤀誨諄諄賜浙江巡撫福崧辛丑畨回變畫籌甚有方辛丑春甘省蘇四十三之變福崧時任臬司隨總督勒爾謹前往𠞰賊暫駐狄道勒爾謹怯懦無能幸福崧隨行諸事賛助調度有方以是知其可用旋授甘肅藩司因之知可用遂命撫兹杭蠧政頗能剔壬寅秋擢福崧為浙江巡撫到任後釐剔浙省收漕積弊奏定章程諸事頗能整頓官箴勉自强掃除斯足矣奢費戒其王前庚子南巡時王亶望任用王燧惟務奢費増飾葛嶺瑪瑙寺等處座落所費者塩商之資而伊二人尚於其中作威福以牟利彼時即知其必敗未㡬果以甘省冐灾鬻監貪黷營利敗露抵罪浙省大吏所宜引為前鑒也賜浙江學政竇光鼐士習民風首端方繫厥司况兹文盛處所重行去聲修時熟路輕車試竇光鼐向年曽任浙江學政士習民風是其熟悉也迪人克已為前車應鑒已竇光鼐前任浙江學政時有訓𨗳章知鄴以竇光鼐不准伊進獻詩冊欲揑詞叩閽呈内有西陲用兵久稽成功情愿從軍之語其狂誕亦無可逭以其欲從軍即發往闢展効力嗣復據該處駐劄大臣安奏查奏章知鄴筆札有討奸邪竇光鼐文揑造悖逆之言托諸竇光鼐之口則其居心奸險實為惡逆之尤因即於闢展地方将章知鄴正法以示懲儆然亦竇光鼐平時不能自立約束屬員所致也自立尚勤思夜雨三月望日微雨尖山觀海迴未牌賜食霽光開濃雲入夜欣鋪矣時雨達辰正霑哉麥緑菜黄胥沃潤老扶㓜挈普瞻來憐他弗惜衣衫濕十六日早自海寧至杭州夾塗老㓜冒雨曕迎不惜霑濕倍見愛戴之誠既欣且憐之親切民情栽者培老塩倉一帶魚鱗石塘成命修海神廟謝貺并成是什誌慰用壬午觀海塘誌事詩韻壬午觀海塘無非求民寧並携督撫臣時總督楊廷璋巡撫莊有恭疇咨閲情形憶自庚辰年沙勢已漸更然尚去塘逺未致大工興壬午至庚子北坍水鋪平畧無漲沙意日夕縈念恒長此其奚窮民生闗匪輕戴家橋迤東猶有魚鱗屏迤西惟柴塘安足䕶桑耕庚子我重來崇祠籲佑靈憑輿厯厯觀既觀慮且行其間老塩倉下樁我所經活沙旋吐樁海塘自戴家橋迤西皆柴塘不足資保衛因擬改築石塘司事者輒稱老塩倉一帶活沙難于下樁若移内接築又有碍田廬壬午親臨試下木樁始苦沙澁用二百餘觔之硪一築率不及寸許樁下既深又苦沙散不能齧木樁搖摇無著是活沙之説信然彼時既未能即築石塘因藉坦水石簍為固迨庚子南巡沙坍簍露决計接建魚鱗石塘云蒿目乏計生申命築魚鱗切念樁難擎然事在人為未可謝不能老塩倉一帶沙活難以釘樁然事在人為未可遽謝不能庚子南巡復申命改建魚鱗塘初開工時仍有已釘復起之患旋有老翁指㸃云用大竹探試俟千定沙窩再下木樁加以夯築入土甚易因依法扞築又梅花樁以五木攅作一處同時齊下方能堅𦂳不致已釘復起試之果有成效迨後跟尋老翁已無踪跡現據富勒渾福崧等奏詢之盛柱及在員弁兵役等皆稱老人指㸃傳為並神助請勅修該處潮神廟以答靈貺因俞所請賦詩以紀其事月月具圖報心懸如目憑大小吏胥勤民夫盡力爭老塩倉一帶石塘竟築并外仍䕶柴塘内無害溪阬却聞夯樁時老翁言信應竹扦試沙窩成效免變驚因下梅花樁堅𦂳無欹傾魚鱗屹如峙如峙潮汐通江瀛功成翁不見詎非神所營賛天福萬民竟得鉅工成臨塘新祠宇榱棟煥支撑肅拜致䖍謝五言得行程迤西更易為仍欲殚吾誠老塩倉一帶三千九百四十丈鉅工已竣而章家菴迤西僅有范公土塘一道難資衛䕶因令該督等悉心籌勘一律改築石塘較之老塩倉一帶更易施工亦惟殚吾愛民之誠不惜再費數百萬帑金俾闔郡黔黎永慶安枕耳閲海塘四疊舊作韻己夘以来潮近塘卄餘年未漲沙良丁丑嵗南巡閲視海塘其時海潮大溜尚趍中亹自己夘以後潮漸趍北亹至庚子前巡親臨相度則北岸漲沙盡坍海潮直至塘根矣雖然救弊柴易石先是建請者請易柴塘為石工又有謂老塩倉一帶為活沙不可下樁而内徙更恐有妨田廬壬子親視之果然彼時惟命増添料值専修柴塘其舊有條石各工仍令随宜加甃以偹捍衛亦一時補偏救弊不得已之䇿耳尚未䕶安海變桑縱看魚鱗一律鞏暫聴額手萬民慶庚子親臨閲視以柴塘究不若石塘之鞏固因不惜工費飭該督撫等扵老塩倉一帶一律改建照鱗石塘凡三千九百四十丈其舊有柴塘留為重門保障昨癸夘秋八月據該督撫奏報石塘工已全竣浙省永慶安瀾等語今来巡視該處士民歡忭拜舞出于至誠然予宵旰憂勤有加無已之意尚欿然未足也范公塘更應籌固老塩倉一帶改築石塘業經告竣惟章家菴以西僅藉范公土塘䕶衛形勢单薄曽諭富勒渾等悉心籌勘一體改建石塘以資捍衛據富勒渾等奏該處淤沙土性浮鬆即添築柴塘一遇潮汛頂冲亦不足抵禦等語因思柴塘自不及石工之堅固事在人為不可惜費即多費帑金數百萬使闔郡黔黎永慶安枕何樂如此遂明降諭㫖一律堅築石塘矣暇食民艱厪弗遑命於新建石塘尾柴塘内接築石塘越范公塘直抵烏龍廟即以范公塘為外䕶之土塘詩以誌事江南范公堤久傳仲淹義浙省范公塘乃自承謨置范公土塘乃本朝閩浙總督范承謨所建承謨即仲淹後裔也一家兩大工先後勤民事在浙斯言浙石堅土易潰邇年沙北坍迴瀾噭齧恣范塘東北尾内奰已有事昨嵗癸夘四月據福崧奏范公塘原築埽工自二月以來因迴溜汕刷致有間段矬蟄現用船沉石以䕶塘根尚属稳固等語朕以該處既是潮水頂冲且囘溜汕刷即用石沉船亦係暫時防䕶非一勞永逸之計因傳諭富勒渾福崧通盤熟籌是否應照老塩倉之例一例添築石塘詳悉繪圖貼説具奏並諭令于所呈圖内硃筆圂處添築挑水石壩以期挑溜南趍仍俟今嵗南巡時親臨閲視指示機宜再行定奪沉舟下石簍幸保目前計塩倉石塘建繼此誠當議柴塘補范公率以允大吏該督撫等請于新築石塘工止處之現做埽工柴塘之尾接築柴塘八百餘丈直抵范公塘以為外䕶即允所請兹來細斟酌建石難再遲發帑五百萬分年物料備兹親臨閲視所建柴塘及范公塘一帶亦必須一律接建石工方于省城足資永逺鞏䕶因諭令自新建石塘尾起越范公塘直抵烏龍廟止范公塘盡處一體添築石塘撥給部庫銀五百萬兩子限五年自東而西分段陸續修築並諭先行備辦工料擇日興工一如章菴東外柴内石暨柴即代坦水庚子前巡諭令将章家菴以束柴塘内普建石工兹来親閲見石塘之前柴塘之後有溝漕一道現存積水並無去路恐致淹渗塘根又石塘上堆積土牛無禆實際諭令将土牛填入積水溝槽之内仍将柴塘後之土順坡斜做並于其上栽種栁樹俾根株蟠結益資鞏固且令外柴内石連為一勢即以柴塘為石塘之坦水且令柴塘亦時見本有坦水也柴接土塘比即范公塘土内石相倚烏龍廟齊至柴塘石塘中間将土牛填實種栁互相倚恃聫絡鞏䕶最為得力兹范公土塘後接築石塘直抵烏龍廟范公塘盡處均令照式修築堅固俾海疆永慶安恬民生益資樂利永矣保杭城千年安晏遂六巡塘事畢五字始終誌恭依皇祖巡幸杭州詩六叠韻石塘接築俾民安為報功成此厯觀庚子巡視海塘命于老塩倉上下接築魚鱗石塘為永逺安瀾之計其舊有柴塘仍命留為重門保障昨嵗癸夘八月内據該督撫奏報魚鱗石塘三千九百四十丈一律工竣今來躬親厯視所砌石工整齊堅實洵可永資保障窮尾溯源暫紆蹕尖山在㙮山之北自此北至乍浦一帶向無塘堰以其地係銕板沙不畏潮勢冲齧而西自海寧沿塘觀海窮尾溯源一切塘工形勢可以一覽而得故自壬午乙酉庚子及今甲辰皆紆蹕登尖山項觀海觀塘而返杭州衢歌巷舞此迎鑾欲尋南宋宫庭泯究是偏都街道寛杭州街道較蘇州甚寛知為南宋偏安之都㑹也敬仰奎章六依韻悵然思昔侍遊歡韻玉館再叠乙酉詩韻設使擬君子南方真有强虚心對今素白髮較前長春即秋何礙竹以春為秋見賛寧筍譜風和月總凉無須待夔戛恒此韻琳琅六依皇祖呉山詩韻且遲明日駐西湖覽陟湖山厯市衢左右翹瞻老與㓜可知養給切吾圖瑞石洞吳山瑞石洞每來必有詩庚子繹其名云有㑹意斯昨庚子于此題句云曰瑞誰所名想有㑹意深然引而未發兹當申其辭虚室能生白其祥止止禔瑞即祥别名洞則虚也宜是實註䝉莊詎稱嵒齬竒飛來石無翼而來此止之其翔其翥莫窮疑設如􅤢㠑方其玉禦冦良言怵我思紫陽洞題句瑞石洞或稱紫陽申其義謂註䝉莊瑞石洞又名紫陽洞適題瑞石洞詩有虚室能生曰其祥止止禔瑞即祥别名洞則虚也宜盖以申明庚子詩未發之意實于䝉荘有㑹心也又云祠以真人立洞在紫陽山下康熙年間于其下建紫陽書屋葢因朱子得名雍正年間又因紫陽真人曽居此復為立祠主敬端知朱義長朱子之學主敬為宗即荘子之虚室生白亦豈外是洞之得名紫陽地賴人傳當以朱義為長閲杭州旗兵已此百年久駐防侵尋風氣漸如杭一齊傅耳誠何益衆楚咻之義可方今各省駐防旗兵其清語率皆生澁然音律尚不致大錯設令其漢語則與本地漢人無異風土所習染亦無可如何然必不可令忘清語也何事弗厪返舊俗無思不服緬前王命皇子射聊示衆老弗躬為慙莫遑昭慶寺壬午曽留句喜恒慈慶昭重來殊景况此慮久蕭條橋畔尋門熟墻頭望㙮嶤寳叔㙮近此寺疑昔年原属寺内也徘徊憩精舍又得片時消大佛寺題句須彌弗為大芥子弗為小此語實佛語其徒應俱曉此何以大稱鑿像山骨窈始自宋思浄北宋僧名六百年名表曰是已涉非謂器斯逺道隠若調御言頓置斯不少瑪瑙寺叠庚子韻精藍昔未到庚子始臨云祗惡逢迎巧那嘉構築勤謬稱商獻悃葛嶺下舊有瑪瑙寺庚子南巡見其増飾華美深不愜懷畺吏謬以浙商捐修為辭余謂商民一體故前巡詩有商力彼民力求欣吾不欣之句可識佛無欣越益吾慙愧恐防議論紛詣聖因寺瞻禮皇祖神御殿又至西湖謁聖因聖堯遊豫總因民助休澤實被黔赤臨莅古曽鮮六巡别緒猶懷庚子嵗重瞻欣此甲辰春敬遵前度敢渝越我如其皇祖凡六度南巡兹適數亦弗擬増至矣祗愧瞠乎望後塵題澄觀齋聖因西側有行館兩字澄觀奎畫顔不覺數年隔往嵗又于斯日憇㡬閒明湖萬頃㑹心處韻景四圍朗照間識得昔今不異者每同樂弗㤀民艱涵清居漫道今春蕆六度前武皇祖六度南巡予惟敬繩成昨不敢有過兹六巡之典幸曽製南巡記以申予意欣幸之餘倍切兢兢也底言古月印千潭一清無際天連水方寸都於静裏涵五題西湖行宫八景四照亭睿藻煌煌額掲亭繹思弗為賞澄濙照臨民物伊誰責申庚子舊作萬方民物照臨中之意敢不孜孜慎九經竹凉䖏見説三春是竹秋既秋凉自有來由閒披料峭琅玕裡未可其間坐久留綠雲逕有暇孤山遊片時千林新綠始偨池霑衣原在雲深處不約而同長史詩瞰碧樓春水初生漾細淪樓忩開處渺無垠瞰來一碧萬頃者閲盡古今摘句人貯月泉半畝方塘亦有波四時無礙印嫦娥平湖漫道當秋好平湖秋月為西湖十景之一貯月泉山半一泓亦先得月正不以大小殊觀也小許還勝大許多鷲香庭靈鷲由來隔弗遥天香雲外月中飄昔年雖設秋來興鷲香庭老桂連蜷辛未題詩有何當秋宇下意滿領天香之句然究未秋月来巡也忖度無妨不踐饒領要閣閣髙越覺聖湖寛水態山容入静觀領要設如絜矩者吾知兩字是君難玉蘭堂一雙玉樹植堂襟香色同参静且愔題以七言弗迴顧年年春苑付無心題文瀾閣四庫鈔書蕆次第因之絜矩到南邦壬寅秋以四庫全書分弆文淵文溯文源文瀾四閣者已次第就蕆因思江浙為人文淵藪宜令廣布流傳勅發内帑雇覔書手再繕全書三分安置揚州之文滙金山之文宗及此杭州之文瀾三閣俾東南士子得就近觀摩並有㫖令不必靳固准願抄冩者抄寫但不可致錯亂遺失以昭我國家藏書美備教思無窮之至意班傭此實官帑發盧徑彼殊衆力扛按唐盧藏用始隠終南山時有意當世人目為隨駕隠士晚乃就徵拜徇權利司馬承楨将還山藏用指終南曰此中大有嘉處承禎曰以僕視之仕宦之捷徑耳前辦理四庫全書四分時准各謄錄自備資斧効力五年期滿給予議叙其中人數衆多不無倖進借此為終南捷徑者既慮有礙選法亦非䇿勵人才之意是以後次續繕全書三分飭發内帑銀百餘萬兩覔書手予值繕冩在抄胥等受值傭書即同和雇而書成又不邀議叙仍于銓政無礙也也致衮鉞必公慎取捨淄渑細辨斥䝉厖范家天一于斯近幸也文瀾乃得雙趣亭文源取式逮文津御園之文源閣繼山荘之文津閣而建其南屏以假山俱有趣亭月台文津閣詠月台有米家范氏兩兼竒之句兹文瀾閣亦倣其式為之亦有趣亭棲碧峋寄語将來鈔讀者文瀾不外史經循月臺叠石為山路不長月台重肖米襄陽月台見米芾西山書院帖限于地異平湖好登望微嫌似面墻此台在文瀾閣前是以近東墻故戲及之題西湖十景五叠舊作韻蘇隄春晚頻煩叠韻剏髯蘇一再無妨肖以吾増景已難僂指計却兹數典占西湖栁浪聞鶯南渡宋家忘北金相于絲管樂春深新鶯一囀非無意河北由來有故林花港觀魚渠成水到自為港名以實傳因號花却異如棠觀魚者隨時玩景助年華曲院風荷宋時麯院此時風荷豈分疏等燦紅不識吳民尋樂輩可知今昔樂非同雙峯挿雲迴峙雙峯天四垂豐隆巧與絮衣披一時却想窮民夥可乏無衣露肘時雷峯西照浄慈雁㙮由來古十景乾淳已有名想像未經欝攸際玲瓏旭影照縱横三潭印月到許舟而弗許輪無塵處憩少閒身祗于民隠厪宵旰那向禅宗悟果因平湖秋月小駐遊軒綠繖油倚欄萬頃俯波柔底論秋月與春月宋代蟾光流不流南屏晩鐘清夜觀書倚翠屏霜鐘㫁續送來聲宋顛元躓荆凡幻僕數上聲何須藉屢更斷橋殘雪三十三年一瞥餘自辛未初次南巡越壬午丁丑乙酉庚子及今甲辰六巡凡三十三年矣聖湖佳致故如如新詩五叠吟殘雪不擬捜題更命輿杭州孤山寺三用張祜詩韻孤山自有岑古山盖孤山之誤西湖志稱陳文帝天嘉元年有天竺僧持辟支佛舍利至杭遂于孤山見寺立㙮此刹劍自南朝唐人已多題詠名蹟最古後人以孤訛古亦以音相近耳佛寺照湖心古往今何在山陽水却隂難尋當日景畧寓五言深命舫問他處菁葱隠逺林題述古堂庚子南巡此纔看述古堂庚子前巡畺吏重修栢堂竹閣並葺述古堂雖成事不説然惡其綴景過當有㸃綴却嫌非朴素徘徊祗覺惹嗟咨之句新成事不説小憩意翻忙深惡逢迎輩大乖休助方憑軒思述古越覺慙去聲徬徨栢堂四叠蘇東坡韻一栢東坡猶見前見東坡詩祗今其一亦茫然可知形色終歸壞奚必宋唐追論年却惜白翁半字冺還餘蘇老七言傳偶因寄興四賡韻莫擬擎拳豎拂禅竹閣四叠蘇東坡韻竹閣黄州然不然時移弗見兩層軒傳將佳句真圖畫贏得名山是子孫那辦岡前留古寺猶看湖畔有烟村從前擬罷尖义體蘇軾詩毎以叠韻見長其咏雪二首用尖义兩韻凡經數叠詩家兢傳此體口業由来戒綺言題六一泉用乙酉韻東坡懷六一因以名斯泉兩賢去雖遥仿彿見遺篇逢時歐勝蘇立朝常諮延云何亦寄傲髙尚托清便集古錄千卷藏書萬卷然琴碁復各有置酒瓦壺圓與已六而一娯老頗自賢由是薌西湖境改名無遷西湖六一泉以蘇軾守杭時與僧恵勤懷歐陽修得名至南宋時入于禁苑故韓淲詩有山林已禁苑復與道院連蘭若縱莫存此水猶泠然之語盖陵谷雖遷而六一之名數百年来不改禁苑僧道居何醜復何妍兹為遊幸地賡詩増愧焉賦得南坍北漲得心字八韻浙江試題紹興海寧對相峙江潮自古今中亹誠最美兩界幻難諶坍漲事無定北南勢有斟興猶山作禦寕祗岸虞侵紹興在浙省迤南諸山聮絡海潮南注可資抵禦若海寕一帶地本平衍正當北岸之衝潮水毎虞侵齧必沙勢南坍北漲始保萬全也壬午溜遷後甲辰水尚深丁丑南巡時見海潮大溜尚取中亹己夘以後漸遷北亹壬午親臨閲視漲沙猶擁䕶隄根竹簍因命督撫標記尺寸按月奏報至庚子前巡往視㙮山塘工漲沙盡坍至癸夘八月三層竹簍俱露今甲辰閲視幸漲沙復将三層竹簍上下全行掩䕶漸有南坍北漲之機然水勢尚未改趋中亹石塘經久之計不容緩耳築塘圖久計庚子春巡閲視塘工飭督撫等于老塩倉舊有柴塘後一律添建石塘四千二百餘丈上年七月間告竣兹親臨閲視范公塘一帶亦必需接建石工方于省城足資鞏䕶因再降㫖自新築石塘工尾起于范公塘内至烏龍廟止一體添建石塘仍留柴塘為重門保障于柴塘後石塘前溝槽内填土種栁俾柴石連為一勢即以柴塘為坦水撥給部庫銀五百萬兩予限五年陸續修築以期海疆永慶安恬射弩罷雄心無往思不復斯升謂北漲祝彼沉謂南坍神祠躬致拜籲佑愧為欽九里松欲問三天竺先循九里松一亭臨入路萬樹暎雙峯地古塵自逺年深翠越濃祗疑幽絶處公十八堪逢上天竺法喜寺靈感衆生願咸淳臨安志稱後晉天福四年僧道翊結廬山中夜有光就地視之得竒木命孔仁謙刻觀音像㑹得古佛舍利因納之頂間妙相具足又錢椒夢白衣人感悟即其地創佛廬號天竺每逢旱禱雨必應頗著靈感嘉祐末郡守沈文通以為天竺起于司馬晉時踰七百載請于朝賜名靈感觀音院慈悲古佛身隨縁為法喜住世㡬千春復此瞻相好於何論果因訂他真裏幻證此幻中真朱彛尊日下舊聞引程敏政之説謂玉河鄉所供大士像係自杭州天竺移來曽命舁觀與天竺像迥異夫法象不過藉以𫝊幻中之真是一不可何况云二詳見向所著程敏政重修觀音寺記訂訛法鏡寺路迴天竺此重經此寺舊名下天竺為上天竺所必經庚子新修備憩停賜額無過允僧請壬午南巡時寺僧乞額因賜名法鏡寺庚子嵗畺吏遂重加修葺以供停憩可見人主一言一動迎合者多即此知為君之難也應聲因以愧身型鏡懸佛智大圓白㙮矗神尼不斷青静室茗餘思往事豈緣求悦失明刑前巡時西湖添設㸃綴皆王亶望任用王燧所為其意将因以求悦而不知悦不以道欲益反損未㡬究以貪黷營私抵法朕與諸臣刑賞一秉大公豈因求悦曲貸乎西嶺草堂在法鏡寺西嶺草堂蕭創因唐道標無端重脩飾反覺愧逍遥地方大吏以其地在下天竺為至上天竺路所必經畧為修葺因成事不説亦遂聴之座擬天花落庭多古樹喬欲尋中竺去隔障梵鐘飄三生石口號無生一亦無有生三不止笑彼牛背人其實未了此題瓔璐泉在法鏡寺内石竇淙雲泉名以瓔珞擬圓如珠磊落連似絲飄纚丈六清浄身披處恰合體此中有深義欲把莊嚴洗七葉堂口號避暑禅堂稱七葉白居易有天竺寺七葉堂避暑詩循名責寔未明言一花五葉非闗此初祖達摩付法時有一花開葉之偈故庚子詩有初祖明留五葉祠忽増其二是誰為之句意在青蓮佛偈存七佛偈為禅宗鼻祖自毗婆尸佛尸棄佛毗舍浮佛枸留孫佛拘那舍牟尼佛迦葉佛釋迦牟尼佛皆各有偈出佛青蓮口則七葉之名意或取此然亦未見輿志云湖心亭西湖無不佳而此稱湖心是為五官首四面歸照臨然予絜矩思庶政誰所任敬勝怠勝間念念凛難諶可兹遊目乎怵㢤惟益欽漪園逺圖暎碧嶺近鏡俯清波一晌尋澄勝五言寄静哦雖攄賞春興却念占湖多漪園在雷峯西照亭下盖依山占湖為之寛十畝許西湖本以蓄水民間牟利者因緣侵占湖面或圍水籪葑田或圍之以為池囿均于民田未便乙酉南巡時即降㫖嚴禁侵占以有闗水利故也因識君難語政無不慮麽詠雷峯㙮莫氏圖中塔尚窺雷峯以郡人雷就所居得名吴越王妃建㙮于雷頂向有重檐飛梀忩户洞達後燬于火孤塔巋然獨存磚皆赤色藤蘿牽引夕景返照尤佳故有雷峯夕照之目皇祖御書改為西照内府舊藏有莫景行西湖草堂圖盖未燬前所寫是以壬申題句有玲瓏更見雷峯塔喜未曽經刼失火之句廢頽莫辨故何其大都成乃壞之本欲示色原空即斯燦爛南朝詡金界荒唐野史説黄皮玲瓏半截入忩影月任照還風任吹淨慈寺瞻禮南岸精藍誰巨擘浄慈古刹久羶薌背山無礙樓臺起面水有如空色㤀未徹當頭七佛偈惟欣撲鼻一爐香經棚却憶祝釐處昔年南巡浙省紳士于淨慈寺建設經壇以事闗祝釐即境思舊祗益悵然今昔不同神黯傷小有天園向年遊此園無過詠佳景春風此重来乃覺别有省人心祗方寸萬物備俄頃其中各有天不昧斯為幸然而難言哉要當私盡屏顔淵問為仁四勿同兹領留餘山居山居號留餘留餘意可想受福欲留餘其來自穰穰得譽欲留餘副實庶不爽稱去聲意欲留餘風帆戒一往問景欲留餘乃弗窮其賞獨于施恵間留餘則為枉四韙一涉非戒非厪吾掌聴泉亭子在留餘山居内山荘之泉題曰觀嵗嵗奎章瞻尺咫留餘之泉題曰聴是則一時興所喜顧其間亦别其義觀在乎目聴在耳二者實弗可偏廢於表固當識其裏目色耳聲歸至静何有于聆及于視然而在兹應言兹兹謂天樂演梵㫖丁家山白石緑蕉閒逕尋此處又名蕉石鳴琴為續西湖十八景之一不知曽孰此鳴琴設云泉響如焦尾聴作南風解阜音福建一百四嵗老人郭鍾岳自閩來迎加恩賜予國子監司業銜詩以賜之登袠夀百四來程里二千誠云天下老疑是地行仙忱悃足嘉矣精神尚躍然恩榮司業秩酬爾矻芸編喜雨三月二十二日江浙那得喜雨詩喜當知以霽多時吾寧徒務晴遊好民寔深厪潤稼宜杭城自三月望日得雨至今又閲數日田疇正當長發之際得此時雨更為農民喜慰也連夜達晨欣澤暢菜黄麥綠發生資雖然言喜詎容易齊豫京畿正綣思直𨽻山東河南屢經傳㫖馳詢尚未據報得雨為之縈念不置萬松嶺鳯嶺東来此結坡翠籠書院萬松科傍即敷文書院欲詢箇裏工佔畢秀助江山得㡬多敷文書院四叠舊作六韻借問讀書者敷文敷底文必先脩其已乃可致乎君詎以風雲貴徒然月露勤枕經固厥柢葄史博于聞何必妍華尚翻滋思慮紛大端示五字朂矣雅儒羣慈雲嶺髙嶺郡城西松杉蔚翠萋聳來莫山並抱處祗湖低古蹟原多幻昔遊難重去聲提慈雲猶是故仰望益増悽題勝果寺當年甲第作祗園随時建既為錢鏐及南宋宫殿後復為寺世事由來逝水翻亟勝隨衰理不易施檀重煥謂徒煩此寺舊頹廢乙酉南巡地方大吏施檀重修者風來旛動誰能所山峙江流各静喧趙氏排衙石尚在都為龍象䕶空門登鳯凰山澄觀臺鳯凰山舊號澄觀臺新名乙酉登此與新名新名與舊號一例因幻成既以来是山斯台能弗登江山一攬全實足暢心情金宋元明間其故多變更江山祗淡然何曽繫廢興下台問景前松送寒濤聲詠排衙石是地本多南宋蹟峯頭尚峙排衙石風雨㡬度閲凡荆不改雙雙猶鵠立叶爾時一徳稱格天滿朝仗馬還寒蝉能言弗如無言者至今誰議斯一卷復雨三月二十三日春雨連綿南國常優霑真利浸去聲新秧何當分恵施北省浙省及江南春雨現俱優渥惟北省尚多望澤據劉峩奏報直𨽻各属得雨自一二寸至四五寸不等究未透霑至山東河南尚未據奏到殊深企望耳渇壤都教潤霈霶虎跑泉三叠蘇東坡韻十六應真二増上十六羅漢名見梵經納納達荅喇傳及法住記俗名十八者詢諸西僧一為嘠巴尊者一為納納達蜜荅喇尊者即世所稱降龍伏虎也詳見向所作十八羅漢賛識語虎其一名久仰而何信空亦有之虎為去聲跑泉以雙掌一之為甚可再乎掩耳安能止鈴響不如忘慮俯清泉曰無想已涉有想題開化寺六和㙮宋初創寺月輪山聞説江潮鎮此間宋開寳三年僧智覺于龍山月輪峯創建六和塔以鎮江潮塔院曰開化寺可識曽無永逸法曰惟賴有補偏閑防也每来必鼓吟情勃罷陟漸慚步力艱七級浮屠畢懸額辛未南巡初登是塔題額云初地堅固二諦俱融三明浄域四天寳網五雲扶葢六鰲負戴七寳莊嚴㝠捜亦足破天慳閲水操庚子觀潮樓曽登閲水師可觀不可用曾以紀吟詩閩省水師列營佈陣搶風施銃皆能精􅌻然可觀而不可用己丑征緬甸時曽令提督葉相徳統領福建水師二千人赴滇聴候調遣而臨陣殊怯一聞鎗響即欲泅永逺遁轉賴徤鋭營兵管押救䕶可見全無實用詳見庚子年閲水操紀事詩並注今來依例備觀處移向西云舊處水淺不可水操施富勒渾奏上屆于觀潮樓備閲水操今塘外深濶沙漲水淺難以操演因于梵村汛之西江身水勢平緩廢所另建起座閲視水操戰船駕駛裕如以事已成遂聴之既然弗閲可嫌復多脩治果其有用者移閱尚可為無用而多費是謂供遊嬉弗欣且憮然吾意其應知更思此漲沙何弗向東移塘固利耕桑一宜無不宜洗心亭漸入綠雲輪尺篁洗心亭子箇中藏墨名儒行題額者彖傳能知十一章雲棲寺四叠舊韻作此處眼看合用青蝸稱居室笠稱亭寺非華貴儉為貴經弗耳聴意以聴欲去不期他嵗至興来聊可片時停對雲謂爾權棲止且共徘徊作雨靈是日雨理安寺詠古一谷一溪環抱巒到來古寺愜遊盤蹟留唐代寔已泯名定宋年義可觀寺在南山十八澗志稱古涌泉院舊名法雨寺盖唐以來遺蹟也至宋理宗以祝國泰民安改為理安寺然爾時江山半壁亦顧名思義否合與墨家娱性地似殊儒道論心官爾時早失中原半於理安乎抑未安水樂洞在烟霞嶺下與石屋洞相近烟霞嶺下水樂洞嘉泰以來屢廢興宇宙浩刼原自有水石之勢聊相乘其興其廢偶所值曰水曰石初無意五音六律寧所期不得其平則亦未或云似道得深求因之振響勝地留是誠塗汙水樂矣水樂有識應含羞石屋洞石屋嶺下石屋洞洞乃宜也嶺未宜洞實可居斯屋耳於嶺奚有義足思邃穴入幽還復朗生白虚室夫何疑或稱壁鎸東坡字惜哉苔蘿漫漶之題靈隐寺今曰雲林昔靈隐雲林越䆳隐滋靈相資殷故聖留額本合相知佛有經苦行去聲僧常修業白清吟客祗悦山青却憐文物斯邦久何少劉家陋室銘五和皇祖靈隠寺詩韻皇祖題隠奎文山並峩康熙二十八年己巳五言皇祖南巡幸靈隠寺御製律詩一章雲林寶後易嵗月亦云多己巳靈隠南巡䝉題為寺後皇祖御製詩尚賜額改名雲林至三十八年寺葢己巳年南南巡巡時御製詩題即改為雲林題詩在前賜額在後計今凡九十五年矣暎砌長上聲禅草拂忩宻慧蘿觀韶如季札不擬重去聲相過葛嶺庚子臨葛嶺弗悦惡侈為庚子初至葛嶺見其梯山架壑装㸃過甚深為弗悦曽有詩云殊吾觀海省方意弗為嘉斯實慙斯實因亶望作資商營已私葛嶺添設㸃綴雖浙省衆商輸悃然實王亶望信任王燧藉端滋擾以營私壑爾時已心惡其所為矣後亷知其奸甘省弊並治王亶望在浙藉公營私即意其必有貪黷不法之事及辛丑嵗甘省蘇四十三事發因四五月間多兩究出厯年報旱緣由始得盡悉王亶望等上下勾通折收監糧冐災冐銷之弊抵法治罪抵法治乾綱太阿肯下移又謂形家言山脈戒㫁斯葛嶺在西湖北後聞形家言以為省城地脈所闗不宜開鑿其實王亶望黷貨營私即不開葛嶺豈能逭罪乎其然豈其然政惟秉理施夀星院四景再叠蘇東坡韻在葛嶺智果寺傍錢唐太守叩禅扉幸未金山輸帶圍有松有竹即契友底學墨者著袖衣恵勤恵思二人皆杭僧與東坡唱和或可語無須持戒觴還飛逸興摛藻不拘律淋渪題壁休嫌肥右寒碧軒泉有名杯杯實無有無名實幻如夫東坡留得風流在到此何妨試茗盂右杯泉有目觀難止如觀目自寧如来者如彼之来也孰為賓及主不出户和庭聖水常拖白髙峯弗改青恒兹青白裏騁望悦清泠右觀臺莫謂朝中少識人用東坡意吳僧頗足張去聲吾軍用昌黎語至今傳有夀星院个个曽朋玉局君右此君軒紫雲洞妙智菴傍紫雲洞冬恒温暖夏恒凉不常中可其常見齊物篇曽著有莊黄龍洞詠古呉興黄龍山慧開聚禅侣後卓錫斯洞因得名同舉其事在淳祐武林正偏處燕堂守江介象教侈佛宇理宗誠何心徒傳講學語設問應循名實忘金之府徽欽被羈乃在金之黄龍府也参寥泉再用宋韓淲韻玉局熟䝉莊數典秋水清參寥名此泉疑始寄遥情始既己疑色何妨謂聲我毎品笑泉錙銖較重輕向嘗製銀斗較量各處名泉就其輕重以别等差詳見向所作玉泉山天下第一泉記去道益逺矣對矣對斯生愧明然而請進之無非天一生清漣寺觀魚五叠舊作韻西湖十景足斯乃續増餘西湖志續増十八景有玉泉魚躍即此也玉泉發跡西山伏流數十里至此始見色清味甘甃石為池方廣三丈許清澈見底游魚鱗鬛可數内府舊藏有王淵畫魚對此恍如展卷也漫擬新勝平聲舊由他僧妬魚寺僧以遊人觀魚者毎攜饝以飤嘆已不如魚云方塘紛展畫一鏡静含裾叠翠於牣矣出藍突闖如是寺魚皆青翠色潜知心不競躍似手騰書弗擬重拈句古稀今老歟題放鶴亭湖心一嶼真蓬瀛棲嶼四柱貽孤亭借問孤亭以何建放鶴逸士留斯名胎仙為子誠肖子放去歸來一任彼等較梅妻更絶塵千年丁令益俗矣雲龍山復稱其張我亦肖之以山莊避暑山荘内亦有亭名放鶴向曾有詩紀之一之為甚可再三去聲俯仰間祗増暫惶吟香别業孤山東北脚别業故臣居吟香别業在孤山東北為故督臣范承謨别業易以吟香久屢經攬景予至今憶松桂謂承謨盡節非夏那芙蕖是處沼中引湖水植荷花吟香所以得名也設曰勾留處别業本名勾留處盖取樂天詩意後疆吏重葺易今名兹來意頗知龍井八詠過溪亭亭自亭而溪自溪言傳三笑信無稽雖然久假不歸者千古人過去重去聲提滌心沼六祖當年傳法音可知神秀悟非深滌之何乃重名沼吾謂辨才尚有心一片雲巒罅生雲雲䕶巒自成一片習而安仰知皇祖經臨處嵗嵗山莊三字看避暑山荘内延薫山館束偏别室有皇祖御題額曰一片雲風篁嶺清風拂處翠交加等度卑之龍與蛇過嶺即為上天竺琳瑯韻裏步雲霞方圓菴儒曰仁圓而義方菴名數典豈荒唐辨才應讀昌黎集文暢希其取友良龍泓澗刻峭崇山澗有泉㡬畨坐石得吟篇外人不識臨眼底却道湍流落半天神運石運以神功誠有無卓然立不借傍扶方圓菴是米顛䟦對此曽經下拜乎翠峯閣八詠逮兹四度酬翠峯廿載閲春秋吟成去弗復迴顧結習由来不欲留冷泉亭飛来峯之側呼猿洞之口曲澗宛轉間中有玉龍吼功徳任彼稱清泠恒自守曰空尚弗可曰色更何有林洪惜流出未免失享帚洪句云流出西湖載歌舞回頭不似在山時韜光庵三叠舊作韻平生志不厭山林况此山林處最深螺髻龕叅檀篆結金蓮池汲茗漿斟片時静可消塵慮七字成聊托素襟行漏泠泠促歸轡曰歸曰住兩無心普圓院在雲林寺之西普圓復古號改額總從刪院創自劉宋元嘉時石晋天福中顔為普圓院又名資巖南宋咸淳間改為永福寺資巖無所取義或資嚴之誤兹仍復普圓古號餘㮣從剛詳見庚子年逰普圓院詩按語頗協佛之義佛以圓通為義宜居僧以閒而何冀檀施去聲今之僧人多冀布施者豈不汚湖山弗與談禅偈成詩即便還孤山晴望一雨三日伊誰力傍晚快晴送我行将以明日旋蹕遂􅕾林逋最髙處恰如曽㸃詠歸情山明水秀誠無比寓意澄觀詎有縈聊以七言當留别膩雲收盡碧天清杭州啓蹕迴鑾之作七日西湖暢豫情平明啓蹕度杭城大凡勝處祛留戀乃可道心契一精冬麥抽苗含宿雨春桑發葉烘去聲新晴亟應歸矣俾民暇巡蹕所至迎鑾男婦夾道瞻覲駢肩接跡其愛戴寔出至誠然春季正當盡力農蠶亟應旋蹕俾得及時勤業也莫誤斯邦蠶與耕夜雨三月二十八日夜雨隔忩聞打篷亂㸃紛優於澤何礙知是熱之薫昨近頗熱知薫蒸有雨也行漏聴長短潤郊計寸分因希北省遍逺綣近斯欣昨據薩載奏報雨澤有霑二三寸處兹徹夜終朝寔甚優渥入土均盈尺矣雨中過平望夜雨淋漓曉未巳川路計程六十里刻期以進衆早行㝠濛舟度絲烟裏米家真蹟故常觀較斯活畫彼遜美獨憐縴兵跋泥濘霑體塗足苦莫比白金按名都遍給念他固亦人之子瀰漫四宇藏逺山平望鎮村忽莅止兩傍瞻覲無萬民弗惜濕衣色都喜闔閭坐覽意􅍀然顧我何徳以致此欽定南巡盛典卷二十二
