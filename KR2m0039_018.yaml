body:
  text: 詩廻避至蘇州廻避至蘇州葑門泊御舟郡城徐按轡仄巷不鳴騶接踵摩肩衆授衣足食謀萬民親切意兩日得因留支遁菴支公當日此肥遁剜石為龕隠翠棱却是無能遁後世至今菴尚以支稱出閶門逰寒山即景二首清曉出閶門輕隂涼變暄逓來將雨意南方涼則雨暖則晴北方暖則雨涼則晴風氣之異有如此者慮致礙春温江南今嵗春寒甚長恐致傷農為切切念之麥葉秀含潤菜花黄較繁將興耕作矣愛聴上農論鳴鞭度慶橋别墅見山椒小憇支公閣旋慿趙隠寮竹虚原自宻花冶却非妖欲暢青蓮想法螺喜不遥澄懐堂别墅多佳號澄懐我所題飛魚峽之上瀑布澗猶西㳺目樂山水甄心悟筦倪無能斯久坐苑外馬聲嘶蓉泉泉以峰名峰俯泉春風翠蹕小流連清暉表裏欣相映一朶芙蓉上下鮮清暉樓寒山别墅裏髙閣曰清暉足日重來賞春光正入㣲含漪訝波立落影認峰飛那更因天繪勞勞辨是非戲題馳煙驛馳煙驛路見孔徳璋山山移文宦光所以命名也前屢有詩令見石上刻驛為嶧命更正之並戱成是什驛路馳煙移草堂千秋結想有宦光何人􅘧石稱博古不見孤桐曰嶧陽法螺寺竹逕通幽竺宇披髙樓延賞坐移時華山更不煩重到几席之間攬莫遺天池天池有水瀣漿如仿彿明星玉女居度難在人寧在境曰毋錯㑹枕中書老子忱中記華山可度難池在山之巔故高啟詩有靈峰可度難昔見枕中書之句題髙義園萬笏天平翠名園有范家但看題兩字早覺勝其他雨意如湔竹風情善舞花麥舟前軌在善繼莫教差白雲泉三疊白居易韻白雲泉是白家泉林色嵐光太古閒不為炫能頻疊韻髙人風度緬其間用髙啟虎邱次清逺道士詩韻清逺竟何人清詞麗霄漢豈其謫仙籍塵世等遷竄飄然落吴下虎阜一遊翫驀遇沈恭子殷周談汗漫仍復返雲衢誰能窺道岸魯公書劔池漫漶苔蒙亂此時未磨崖得全乃以半青邱出塵想和韻懐聚散而我兹竭來勝跡遇春旦依様易得句詎能誇藻翰本無求仙心饒有憂民歎流連非所宜敕幾思益贊劔池山川宇宙來便有豈信劒飛劃作巖四字宣尼曽不語惜哉佳境溷愚凡冄遊靈巖作昨日細雨今朝晴南國為喜宜春耕靈巖秀色在咫尺姑舍遼待非近情出郊罫町濯綠潤花栁時世装嫌輕駢填老㓜歩隨馬禁􅏳菜麥􅀈農氓不三十里倐已到盤旋山路袁熟程松風謖謖掃塵跡塔影矗矗標心旌調御丈夫對我笑去來現在奚稱名到此著語不可得逡廵行館慿南榮太湖眼底一勺水三萬餘頃誰量衡但覺空濶物不染無内外復無將迎我心與之然乎否風鈴落落催宜行遊山方方楞伽寺治平西去總湖邉熟路分憶昔年山色波光相蕩漾漾蜂臺鹿苑實駢田春忍草奚為忍泯識禪枝固是禪若問楞伽標妙諦峯峯法爾茁青蓮行春橋乘舟歸蘇州行宫即景雜咏八首蹋馬靈巖復上方石湖側畔小徜徉昨題七字磨崔讀昨仲春遊石湖時見山腰一泓清泚可愛四面皆石大士閣在其上因題有誰識山腰始是真之句今來重逰則已􅘧巖壁間矣行館言旋進便航白芷青蒲演漾舒漁舟艤待欲何如繄予漢詔猶曽憶生飬方春不打魚行春橋下春水明行春橋上萬民迎我欲治民如治水淆之則濁澄之清亭子湖心從未到西湖攬景况方廻勤民都似此争勝吾更何憂不治哉平流一帶郡城西潤逼吴天霽景䨑水碓溪橋皆入畵男耕女織總堪題菜麥潤含方過雨杏桃芳鬭恰烘晴省春正義夫何謂詎謂無端問景行馬行本較舟行速溝洫紆廻反致遲因悟北南形勢異諸凡要適用為宜鳴榔廿里胥門到按轡城中路不遥大略已觀民意悉江寧發駕定明朝蘇州啟蹕作兩日駐行旌黄龍發水程不耽惟我志略戀是民情吴㑹歌聲逺恵山秀色迎東南風恰好卓午到舟營雨中雨中遊惠山寄暢園春雨雨人意惠山山色佳輕舟溯源進别墅與清皆古木濕全體時花香到荄問予安寄暢觀麥實欣懐惠山寺疊前韻毎逢佳景喜題句率以鐫崖紀嵗年是曰有為之法耳逺哉無我祇如然愛聴春鳥閒彈梵懶與山僧坐講襌一語何妨聊顧問即今悟處可曽圓寺中猶有雍正年間内廷行走僧戱題惠泉方圓二池一脈流來疏雨池圓甘方劣志傳竒人情圓喜方斯惡泉自淙淙自不知題漪瀾堂四圍清泚繞書堂檐梠光翻漾鏡光乍可觀瀾知有術因之㸃筆遂成章春隂瓊島雖數典瓊島春隂有堂亦堂亦額是名松菴詎易方緬溯東坡題額意崇情泉石託偏長若氷洞石甃方圓引側注攀躋更上下雲巒討源直到真處處氷洞翻花萬古寒駐驆金山作秣陵將問古氏父暫浮江雨不妨兼驛是日自丹陽城霞閣發舟行八十餘里申刻即到金山風全静度艭水天慿几席花鳥列軒牕祗合蠲諸慮誰云聲色摐句容道中掦子登舟指秣陵中途易馬渡江乘菜花引蝶麥藏雉畵裏溪村農事興迤南峻嶺北長江天塹真稱險莫䨇底事古來恃險者豎旛頻見出城降小兒已長老年多縱令隨觀不禁訶五十帛需七十肉孜孜為慮應去聲如何慧居寺峰嶺因何秀秀因泉石遭恰宜耆域擴底較蔣山髙禽演無生偈松翻萬古濤闍黎惟守律不習坐禪迯遊棲霞山棲霞名寺遂名山㸃竄寧因字句間本名攝山棲霞寺名也今云棲霞山或因避攝之耳故戱及之藥草攝生何不可乳泉滌慮恰宜閒偶來尋勝非耽静敢懈觀民正憶艱樸㫁行宫居信宿對時擒藻我猶閑紫峯閣峭拔髙峰生紫煙峰巔松柏見齊年三間小閣開牕對太華何殊玉井蓮功徳泉紫峰閣對青蓮壁下有泠泠功徳泉僂指不湏數以八論年詎祗閲惟千何當古月臨澄照且看㣲風作細漣雖是山根略疏引由來得倍藉天然棲霞行館作行館樸而幽依然前度脩軒牕無俗韻林壑有神投鳥語花間出泉聲竹裏流玲琒院牆内趁暇一登遊太古堂仰睎疊巘俯臨池宇宙以來原有之我自先憂後樂者底湏髙企子西詩玲峰池天半渫天池玲峰四面竒五年纔一照為爾坐移時山以萬丈計泉淙為有源下視溝澮盈豈可相衡論老松髙百丈新松低數寸小草莫相欺㑹有凌雲分澹澹含春日英英吐春煙野花姍入影也自一時妍不肯㵼為瀑渟然守太初忽懐齊隠士亟命返肩輿萬松山房名山駐清蹕乘暇探山春春山日以佳紅紫繪菲芬山房萬松中古色千青雲不與世同調乃得意所欣謖謖寒濤翻蔥蔥翠蓋匀金吾報行漏適可前塗遵十八公如語原非箇中人題般若臺山鳥春前呌山花雨後開是云般若相那辨有無䑓練練影堂山中一湖水借問是誰開識性易疏塞得源可溯洄軒圖略㸃綴練影足徘徊妙契澄清義觀民有自來徳雲菴口號淰淰復英英境真乾闥城不教餘結習得句便前行九株松謂似㑹昌曽有詩三三瘦骨挺仙姿去嵗香山㑹九老居然兩倍之疊浪崖層疊竒峰作浪形大瀛海䜿萬尋青漁人何物津輕問祗合虛舟不繫停見山樓出樹有高樓見山與額留由來一合相那問幾經秋崖浪階前疊疊浪崔在其下松濤牕外流如何僧紹後不復覯潛修幽居菴寒泉帶曲溪茂林鎻層嶁得趣以深逕納逺愛虚牖南朝樓臺無太古雲山有幽居緬前賢今人稱去聲居否峭舊室幽居最幽處逕自林穿剔土得飛壁劙沙沙出㵼泉蒼杉濕埀露宻竹靄生煙結念屬峰頂無何便著鞭登最高峰作登峰登合最髙峰風拂鬚眉雲盪胸下視鍾山諸培塿綠瓊盆裏種芙蓉江山地險帶還襟守徳孜孜獨切心􅘧石長歌一再讀丁丑登最髙峰長歌紀事却教視冺去來今話山亭遊山歸來日未午院内山亭憇久許舉頭題額曰話山不識誰賓抑誰主石梁精舍得逕琳瑯叢憇息煙霞宇遙吟目空闊俯暢意軒舉江國既欣春呉雲復不雨山鳥與山花争妍真静所五年瞬息間石梁自太古春雨山房冮國今年雨恰好行春無礙毎逢晴晚來細㸃凌空灑却喜山房善副名武夷一曲精廬巖根水繞階除歩廓曲折雲擬議以成變變化武夷一曲精廬燕子磯峭壁插長江孤騫似飛燕西引幕府巒東接臨沂巘叶翠逕入丹崖花木繪明絢春風三度經毎因駐雲䍐叶設險信無過天塹夫何患南朝凡幾更臨流發浩嘆遊觀音山永濟寺縁壁飛樓鐡鎻牽下臨無地上惟天須彌海水依空住棗葉龍宫現偶然駐蹕江寧疊舊作韻寰中可數建邦區觀勝應教翠蹕紆山帶江襟誠劇地家絃户誦久名都上㳺雖遜闗兮􅏖偏處上聲猶嬴杭與蘇守以金湯終在徳每懐殷鑒敬惶俱賦得江漢朝宗得宗字八韻試江南士子題岷山濫觴泛嶓冡象天淙三澨峽流過九江川氣衝入南垂禹蹟㑹北帯堯封是瀆首羣瀆朝宗惟地宗藏精在箕斗戢浪息蛟龍來往濟商旅耕桑利士農海門滙知近澤國勢觀重歸極保皇極吾滋絜矩恭謁明太祖陵嬗謝都闗運乘攘除非自本朝興代為翦逆當方革豈是因危致允升常禁里民闌採木還教衛户謹廵陵省方近撫前王蹟殷鑒惟懐惕倍増靈谷寺蔣山開善寺移置得兹名一切有為法本來無定評閒花明柰苑真樹䕶祇城偶讀前題句不牽今昔情閲武白下扼衝都将軍分節符百年久休飬一日此陳鋪技奏桓如虎恩頒藻躍鳬謾云循故事嬉武戒殷吾鷄鳴山崥崹鬰鬰城北區髙出城頭可望湖春風葩瑵朅臨駐不須俞騎紛前趨扶擕老㓜願瞻覲誰何無事嚴聲呼六朝興廢則且置斯民三代寧有殊廵方詎謂玩山水鑒古益切憂勤苦遊清涼寺去嵗曽禮清涼山今朝乃謁清涼寺既曰清凉應一真吾所知者已有二其不知者想更多旋於蘇文悟其義譬如鑿井因得泉不可謂水專在是叶井同泉水無不同妄分彼此真兒戲調御丈夫如是云是謂清涼無上朝天宫用蘇軾題玉局風流似紫薇遊吴望蜀逺歸登樓未覺山川羙送雁因懐音信稀髙觀當年如宋否西園今日姓王非冶城不少留題者獨和坡吟倚素暉大報恩寺城南最古寺跋馬試重尋亦藉觀民便曽無學佛心禪枝千載茂梵㖵四天吟穹塔千雲表神遊當去聲歩臨題雨花臺梅岡東麓雨花臺聞道談經曽致來豈識維摩不著座争如太白祇銜杯李白詩朝沽金陵酒即此處六朝坊市誰興廢九道江流自漩去聲洄未審苑城偶南望可應追悔此為哉賜梅瑴成無欲有精神趨迎清浦濱閉門惟教子下榻不延賓能駐西山日引恬江國春推恩緣念舊瑴成諸子俱未通籍詢知長子釴尚可造就命賜舉人准其一體㑹試皇祖内廷臣牛首山大易乾為象南京離占去聲方兩峰恒角嶷雙闕表天閶盡得江山秀况逢花草芳鶴林坐調御萬古示真常再題幽居菴金陵返蹕駐棲霞西峪幽居清且嘉窄路入從雲片石闌春落半錦堆花水流山住露全體竹浄松蕤是道芽僧紹便存不徴聘名求名應底堪誇遊攝山棲霞寺仍疊尹繼善沈徳潛倡和韻建業多佳山要以攝生冠聞名未見者尚爾生歆羡况我曽命遊馳情結霄漢諸峯盡婉孌秀比總角丱幾暇輙神交那藉圖經按泉石應好在毎毎縈遙戀却付忘言僧長平聲年對塔院兹來縁省方寧圖暢遊觀獨此未能恝吟懐吾早辦言入功徳門載尋煙霞逕颯爾淨四塵坦然遵八正調御坐青蓮屏息不期敬緬懐平原人捨宅悟本性旅食或乏糧之鬱隨弟慶謂僧紹弟慶符也仍住弇榆山水石足幽勝吾聞狂狷者不棄尼山聖惜哉被季世化裁孰可凭徒傳賜如意放浪林間聴山之姿曰林山之骨曰石林姿既蔥菁石骨復垤峉盡善誰能同那可計尋尺雲生峰欲連泉畫巖疑坼擇勝不勝平聲擇底藉東坡帟徘徊擬遼待天籟落絶壁竅詎概以萬號信笇以億山靈秘其奥應謝塵凡客東麓有行宫松軒成少息澄懐思向遊摛藻抽義脈草藥既芬菲應遊鶴與鹿巢松風籟翻飲泉月光漉翠華忽來過想皆避深谷徒見曲折溪泠泠自瀠洑繖山如有語未能隠者瀑以此我欲返秣馬命羣僕了知乾惕人未可耽清福出門試廻聴澗水猶鳴筑鳴筑清神心枉駕重攀上徑指最髙峰沿路分竒賞雲林揖峭舊煙江俯泱漭暢觀既云愜託懐亦戒蕩信宜下崇椒髙吹遵路往掦子剪平波棹歌發清響寓物貴不留有如鏡中象展讀舊廵編聊當抒餘想舊編一再看宛憶倡和事長詩欲重賡幾忙則且置是不宜作輟促成值少塈休文留林泉吉甫隨車騎一則効負弩一則賦製芰跡殊心則同悃見興歌際明逺擬俊逸長吉非詭異欲罷我不能匪逞藻詞儷片時成六章用誌江山麗駐蹕金山百里棲霞曉䇿驄金山舟到日方中又成廻蹕時臨夏毎喜梅喜横江静戢風氣接鴻濛開逺勢峯連入高空精藍寳帶常留鎮那見蘇公與印公逺帆樓梭織往來衆舳艫風恬浪静蔽江鋪逺帆樓上延遥目太液池頭了不殊西苑瓊島後臨液池有閣曰逺帆妙髙望玉京一峰秀浮至水中央此是最髙處快觀千里長從來無旱澇誰説有滄桑笑失中原者仍誇天塹强三月晦日錦春園即景名園𤓰歩倚江濵綵䑵淩江到及晨梅朶落同蓂莢盡麥芒潤逼菜花新鳥言似惜芳菲意石態全含淺淡􅀈綠桞紅桃流水閲錦春即景恰婪春罨畫牕塔灣行宫旁室曲折臨水致有佳趣因以避暑山荘内牕名名之虚牕正對綠波涯名借山莊號水齋却似石渠披妙蹟水容山態各臻佳駐蹕天寧寺行宫作二首江浙豫遊返淮掦信宿留景光及春尾民物尚呉頭真樹絶勝古新軒那藉脩睪然思謝傅千載真風流去日梅纔發歸時梅子青流隂迅如此行館暫為停静趣相酬答清機冺色形花宫坐調御萬古自天寧大觀堂六韻行館天寧側文㮰額大觀省方恊中正設教戒遊盤式展九歌義匪求一己安増華稍踵事為愧不因歡去嵗在京聞淮掦行館視前廵頗有増葺召塩政髙恒入京西飭則稱建置已成不能更罷今來駐蹕賔覺過華不為喜也民力雖無藉商財詎可殫舜廵知弗逮禹徳繼誠難四月朔日遊平山堂畫舫輕移䢴水濱人思六一重遊廵隂隂葉色今迎夏衮衮花光昨餞春巧法底須誇激水啇人引水為匪瀑激為趵突髙尺餘雖稱新巧頗失天真淳風惟是慙去聲投薪江南山可平筵望望豈因山因憶民閲金灣六閘書事湖西下河東行潦患必逮運河挾以南歸江路冝議豈嘗無閘􅄵尺寸未詳計譬如受以尺洩丈斯得濟受丈而洩尺弗壅定致潰昨過金灣時切切慮莫置重臣命踏勘昨以髙寳湖河入江之路末暢命大學士劉繞勲等先行相度議以金灣加寛引河中閘改建石壩西灣落低滚壩各條分立標識今舟次按閲悉恊機宜果如所言弊相啇事觧更一一建標記灣頭洩水暢壁虎無多地鳳凰兩岸陡冝皆姑舍是叶所重金灣頭洩水暢窄奰宣逹實罕暢應與疏展暨東灣既落低事在乾隆二十二年西灣當並治亦應落低三尺今親臨視猶以為髙命冄落一尺引河更拓寛俾有建瓴勢我欲歩履視細雨風帆利閤閭厯攬全進止授次第即今東灣低河水流未洎云以待漲時春時漲弗至何不先抽薪掦湯勞止沸是宜重審度亦寧執己意欲使常時湖水入運運水入江庶湖虚得容夏潦然其有無礙運道則俟冄啇然此猶治標根源吾熟思在洪湖五􅄵其故曽屡示苟其清口暢是皆可勿慮叶其如蓄清言深中督河惎蓄而鮮致害願從吾無悔清口靳弗拓小小煩從事信其功難成猶將患屢試三依皇祖閲河隄詩韻冬官慎蟻户河伯守龍宫無事功湏建多竒智轉窮泗州安可復泗城舊為水圯康熈初淮溢武家墩成大皇祖命築髙堰之天然壩皇考繼工居民得免水患洪澤僅能通皇考成髙堰堯巍舜繼功洪澤湖三依皇祖詩韻遙天無際碧涵虛為閲金隄立以徐我有要求豈縁木那煩里革諫觀魚命接築髙堰磚工詩以紀事武家墎迤南湖水已到岸皇考脩髙堰衛民帑弗笇迤北岸離湖築土仍舊貫癸酉幾致危易磚籌禦捍其長千餘丈運口將及半今來一再視預防慎思患一律屬運口緩急庶幾逭拮劬事下䇿忸怩懐永奠定清口出水誌詩以示總督尹繼善總河髙晋清口湖尾閭兩􅄵東西壅黄未奪淮時全淮此東送後始言蓄禦本由人操縱而何膠柱者甚靳拆茭葑司事者不肯大擴清口草􅄵雖稱蓄清敵黄實以隨時拆築恐干多費之議耳窺其意所在重平聲築恐費重寧使漲髙堰五􅄵漏巵供髙寳曷能容下河災可痛於是議出江徒紛如聚訟釡底不抽薪掦湯審何用悉心求其䇿洪澤宜騰空髙堰今出水七尺五寸中如増至三尺清口仍弗動叶設再増一尺開十丈洩洶叶遞長遞拓寛殺去聲漲利應衆奚待出五壩而始拆倥偬秋汛過弗漲收壩資禦控秋汛後洪湖水勢既定即應如常接鑲口門或二十丈至十數丈皆可審機在専一圖便戒旁綜有過願分任其功不勞頌渡黄河作江浙返廵蹕清黄渡水郵往來恰兩月慈夀奉千秋川闊氣雄亘風恬浪細流馨香慚去聲明徳錫佑每蒙庥命疏濬六塘下游詩以誌事大河迤北窪宿遷桃源清河沭陽海州六塘為之經其緯諸河在嵗久或淤滯暴漲屢致殆所以三度臨民瘼曽未改是宜事鬟剔地廣艱乘載叶諸臣命往勘詳酌期無悔具圖如指掌進止取有待展寛及去淤増低補薄倍其鹽河滚壩啓閉定凖楷商利蓄固否民利消毋乃仍責成監司向無専司今命移駐同知一員特司啓閉閘壩事相機理莫怠集思廣忠益所期民樂愷佇望起瘡痏慰予此風採命莊親王率衆䕶衛皇太后由水路還都是日分程减從取道徐州閲河詩以紀事有序江鄉掖輦三春燕喜方申淮甸迴鑣四月清和乍屈惟念舍舟遵陸將循置頓於齊燕以言晏起早眠莫若溯洄於江路冀奉萱幃而增豫宜從蘭舫以安旋親藩夙事前驅禁衛分番按部幾程徳水浹旬視膳恰逢半月仙園仲夏承顔伊邇敬侍登艫之候爰摛弭楫之篇慈夀今登七袠餘奉遊江浙意怡舒禮成展義還京國志切觀河邁沛徐春序無妨今逮夏舟行自較逸於車親藩扈衛遵川路半月言違謁起居至徳州日水陸程適相值當於行宫問安安瀾龍王廟疊舊作韻保障觀徐郡崇祠臨大河載瞻循路便馬祜固隄渦去嵗楊橋驛初冬瓠子歌合龍真是速錫祉此無過銅沛今稍幸自丁丑命増築徐城石隄戊寅又築徐州北岸新隄河身刷溜既深凡徐属銅沛迤北至東省嘉祥魚臺汙田以次就涸閭閻生計漸復耕桑幾閲河安瀾欽聖勅繼志祝恬波渡黄河至徐州作丁丑省方至流行災實寛中般謀救濟是年銅沛被水為劇既命衛城土隄改建石工復留侍郎夢麟等會同督臣尹繼善脩治荆山橋一帶各工俾資釃澹且值災餘度作並増給賑糧藥餌窮甿藉以少甦午夜切辛酸旋轉蒙天佑閭閻今改觀石堤衛城固河瀆渡舟安民謝重生幸吾懐痛定嘆然寧不為喜今日應去聲加餐恵佑龍王廟瞻禮有序徐州地扼吕梁當大河之衝屢遭水患丙子秋孫家集漫口郡屬田廬益多被淹浸丁丑廵蹕臨勘既分遣大臣等繕治上下各渠顧城北䕶隄仍土工之舊難資鞏固命悉改甃以石事集而利水抑神貺實嘉賴焉勅所建祠雲龍之岡用昭祈報壬午再莅升香展敬而系以詩設教資神道明煙著六宗城闉祈鞏固廟貎奐舂容帝惠惟敷佑吾心敢懈恭洪波籲恬壑萬古鎮雲龍題放鶴亭昨甫浙中吟處士今來徐下緬山人一般放鶴留髙躅舍是更當誰與親遊雲龍山人作大彭作鎮迥超羣蜿蜒如龍靉靆雲自是氣求詮易理不妨幻住悦聲聞土饅頭下老亞父石綽楔前狂使君千頃麥田民氣復絶勝前度此為欣試衣亭再用蘇軾韻二首前章詠古後章即事反前詩意放蕩雲龍試㸃衣故人赴選趁行暉臨岐那恝忘京國一片心隨去馬飛稍喜徐民足食衣馬頭莫漫頌宸暉前廵惸狀猶滿眼祗覺流隂迅似飛黄茅岡戲成口號黄茅當日使君狂突兀猶存百尺岡縱酒放歌且攜妓即今寧不掛彈章閲徐州城西石隄城北由來有石隄加長五百丈延西依依萬民眠宵穏嶪嶪崇墉出水齊凶嵗經營還代賑丁丑夏即興工代賑賑濟頗多洪波緩急賴相批即看綠野耕桑起保障千秋永福禔河北孤山新土隄成詩以誌事河至徐州窄此實限於地所以夏秋汛容川每艱致北岸未築隄是或有深思蓋欲聴漫流聊為燃眉計然聞河貴合刷深達海遂縱藉餘波厮忘慮沈沙積即今㣲山湖南仰已明試浸滛金鄉魚臺沛縣無嵗不行沴南岸石隄成緩急庶可恃叶三縣金魚沛均吾民可弗為籌逮重臣自都遣經營排衆議戊寅夏命尚書劉統勲來徐相度築隄河員尚墨守留洩漫水之議以束急易漲為疑統勲持之甚力遂定議築此隄起自大孤山迤西接舊塈大孤至蘇山亂石􅄵權宜亦足洩易漲沙存任水去叶渡河閲告成衛田誠愜意數年頗獲収民氣較前異懃懇事不䇿益復増吾愧題黄樓再疊蘇軾韻每遊黄樓必有説風流玉局前茅發到斯欲罷乃不能把筆先愁韻險清野亭且置試衣衫九日緬懐洗鞾韈二語櫽括東坡詩意望谼幸過守孤城痛定歡容綠酒呷賢守勤民應若此河復為雲欣舉鍤丁丑事蹟略或同休我生之戚我殺較於刺史有甚焉其奈行災煽羅刹千方救濟不遺力旋轉終賴鴻鈞軋今來閭閻頗改菆井賣蒸酒槽壓載登城閣得怡情黄水廻環碧山齾千村喜覩起耕桑百里相聞有鵞鴨一杯遥酹老東坡何必髙情寄清霅渡黄河作兩日雲龍駐四番來往經過河駐蹕雲龍次日閲城西石工畢復渡北岸閲孤山新隄仍溯流而㢠廻今始渡河就陸北旋鴻川常戢浪巨瀆信昭靈楗石希安奠瓣香詎徳馨凡渡河所司備綵棚瓣香致敬舍舟遵路驛封牘奏慈寧荆山橋三里長橋開孔多橋凡一百五十九孔湖河之水由孤山茶城等處經橋下東入運河綠芒千頃浪婆娑漲波未至春膏足且喜農民穫麥歌詣闕里瞻拜疊丁丑舊作韻過魯嘗聞祀漢王師尊萬古帝兮皇斯文未喪真成慶違道以治平聲必致六籍俱存猶港五年又值此廵方天庥獻馘曾於泮載和籌邉昔嵗章丁丑過班闕里時尚未奏凱師故有在泮行歌載章之之句駐蹕古泮池此地非常地新城即故城按一統志載曲阜故城在今縣東十里故丙子駐蹕詩有十里東郊舊魯城新城安得泮池名之句今細考縣志所稱新築縣城乃明正徳七年移送祥符間自此徙去之城耳其宋以前縣治原在此盖新築隘而故址寛土人傳聞率多岐悮且考水經注所紀孔廟泮宫方位近逺其地亦當在今行館之地丙子所咏失之未精覈也館仍今日駐池是古時清柏矗參天翠花攜入夏榮獻功久保定䖍鞏凛持盈謁岱廟時廵指江國致祀遣春官兹取迴程近親瞻祭席單大生功配帝如在貎臨壇肅拜無私禱抒誠心始安戲題環詠亭廟旁精舍小逡廵瞬息流隂十四春自戊辰題句至今閲十四年矣環壁苕華泐羣詠幾成五色目迷人粗閲數首無一佳者登㤗山作欲笑相如逢漢武更非張説諛唐明却因瞻彼巖巖象便以暢兹坦坦情或馬或輿遵棧路宜詩宜畫入仙京齊州九㸃烟中辨益切憂懷保㤗平登㤗山六依皇祖詩韻春廵南國孤紆蹕按轡髙山仰焉頭可匹何曾吳嶺見既成乃復大江浮便教一問峯兮谷未許多勞郡與州清曉載登午言降那因勝處恣耽留五嶽之中宗首出誰能昆脚與皆頭神傳杜句真稱獨象擬韓文信不浮結攬聖情昭㤗麓照臨民隠遍齊州繼繩今日伊余責敢不聰聴一意留登玉符山極須作歌初春晝短景易闌復慮髙處不勝寒即今清和駐蹕早有山罷登孤素抱内豎肩輿攀巘蘿更弗松下鳴梢訶絶頂放眼一千里犂雲鋤雨何其多東山小魯㤗山小天下我則何敢凛乎御六馬惟有祈年意非假與民休息孜孜者雄辯那須誇炙輠返吾勤政延儒雅至徳州詣皇太后行宫問安川陸郵程㑹徳水起居今日覲慈雲御舟敬悉適眠食半月縈懷一旦欣新城道中作麥穗秀將實黍苗吐欲齊農功日逢好土吏語堪稽地方大吏雖屢報得雨兩目覩方慰賤昨年冀去嵗賴麥大熟秋霖雖澇米麥至今不致大踊沙乾復雨徯北地易乾三五日不雨即起塵問農人云其下仍濕然為之望雨矣西成尚遥在祈望正長兮復雨五月初二日昨日晴晹無雨望青郊厯覽心已暢思量復雨當更佳夜報輕雲翳天上平明趁爽催歸驂雲濃旋旋煙絲􅓴涿鹿之野五十里時疎時宻均優霑都中迎鑾人畢至王公大僚及羣吏哈薩陪臣列末班雖濕衣裳同喜意行宫駐蹕延諏詢咸稱膏澤今春頻此雨既渥麥方秀定期􅕗穗盈倉困入夕滂沱勢未正垂簷琴筑鳴銀水甫纔生冀得快霖祗覺傍偟怵已南廵廻鑾駐蹕圓明園作快雨兼欣值快晴㢠廻鑾益覺愜羣情元亨四閲月時序信屈六千里路程幾政冝勤取騎速慈圍圖逸御舟行三朝僂指還仙苑正喜金萱映砌榮恭迎皇太后駕至暢春園駐蹕即事誌喜南國臨山常却輦北京旋蹕日乗舟輕輿趁爽來仙籞馬詢安謁道周慈豫都因看好麥薫風恰正綻芳榴高年食履増康健願奉徽遊億萬秋欽定南廵盛典卷十
