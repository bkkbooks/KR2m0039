body:
  text: 欽定四庫全書欽定南巡盛典卷十一天章乙酉直𨽻山東詩恭奉皇太后南巡啓蹕三疊前韻冇序留熟支閛恰肇金穰之嵗棣通氣奏甫頒青陸之春􅓪上元翼日良辰猶是宜燈宜月舉江國四巡令典望均自東自南溯夫展義陳詩賜酺給復進疆吏則書登風俗羅黌宫而牒上俊英既不辭三至以云勞寧或改一遊之為度顧維於越勾吳之壤厥號襟河帶海之區雖五壩示其節宣幸卜澄瀾於紆轡而兩亹資為夾束期覘漲灘于候潮殷懷將在此行逺計曰無非事矧黎獻扶笻之願切尤夀康掖輦之歡增朴室郤飛翬十笏明窗披月字輕艭捐采鷁一桁柔櫓剪煙江七校點前班尚減傳餐之簿六曺遴後扈才充繞仗之儀匪髙選勝乎山川彌軫疇咨於民物對此韶光添九十東皇之閏律方中因之清蹕紀三千南服之行編可冠南邦初蒞嵗維辛依戀常牽澤國倫三載忽如過影隙當春仍此卜時巡預教減從去聲事從平聲簡命一應扈從人員均較上屆減𣲖仍由該衙門核定奏聞諄戒增華命屢申度節尚隨朝節客時蒙古王公暨西域輪班入覲朝正在都並移上元節宴就送駕之次令其預坐遣還近光先有覲光民一清寧止徴求寡千里何須兵衛陳日日大安承喜色恢恢四海共熙春念周黔赤愛如舊興助江山句亦新却是靜中時自省得無觀采略嫌頻過盧溝橋通閏遲節候河氷尚未開徑行誰病涉氷上行人往來竟似不知有河隄防去聲似虛堆兩堤上積土成堆蓋夏秋以備不虞因悟乘時要難言永定該遙源溯代地西北萬山崔長新店村亘五里盧溝濵廬舍比櫛復次鱗借問往來投店者幾不勞勞名利人墟里蓋藏真覺好幸值去年登萬寶紅聫貼户竿豎燈長新即此長安道一二老人衣黃衣欣於所遇顧賜之向南日日數增倍侍衛行賜將或遺惟有望近不厭述聖名言可味思良鄉行宫恭奉皇太后觀煙火駐惟初頓節翼日處處承歡養萬方合設燈花酬景令所欣食履正康強却看月隱勝月現是日同雲密布大冇雪意欲笑廣陵輸廣陽入夕同雲將釀雪連阡麥壠願敷祥良鄉行宫三疊舊韻初頓常教依北闕長途復此指東江門前煙火同觀罷却喜盆梅伴燭窗南巡四度不言勞詎為江山事一遨察吏要因悉民隱舉賢寧止拔文豪壬午春當蹕旋際為民回顧頗牽情三年才浹巡鑾出欲答蒼黎盻幸誠立春越日駕巡南梅信緣寒想未酣遙憶孤山放鶴處也留芳朵待吟探向來觀梅至蘇已覺爛漫今嵗春遲且蓬閣月至杭或尚可觀梅也郊臺庚辰曾是勞旋師叩貺臺陳得勝旗自此西瀛盡來賀每循南路引餘思固資衆力成勳績實藉元戎善指麾享澤何期騎箕尾協辦大學士一等武毅謀勇公兆惠以去嵗冬至月患病溘逝雖親臨酹酒今經此地不禁回憶生悲不禁觸境一生悲𢎞恩寺蘢蔥翠蔭濃隨喜梵宫重庭有百年樹僧修六度宗白蓮持戒律黃蘖謝機鋒小坐遵前路聞徐煙外鐘琉璃河石橋千尺壓兩涯接以石路平不陂夏秋行潦每致濘藉此無礙車馬馳前人妄為後人賴長城運河率有之勝朝魏璫兹故里葆輿安坐逹京師非官帑即勞民力小修所費尚不資窶人子勢有如是奚怪朱家社不移涿鹿行五疊前韻今日駐輦鄰州城明日啓駕遵南行倐忽一夜今成昨荏苒來者今非明三年飰得桃花飽無去來今惟靜好藉可喻四巡江東却是言實非譬巧人有來去日何尤其間哀樂事已稠試看厯厯前題句幾纎毫分為恆留所幸里民鮮菜色蓋因客嵗逢稔收以此祈年益切切謹身宵旰慎厥修紫泉行宫賜隨營諸臣及直𨽻各官食吉行五十里非遙元夕逾三尚節朝有暇宫門臨賜食兩行茵席答熙韶嵗收即是君臣福民樂多緣風雨調虔鞏居謙戒欹器欽哉自朂朂羣僚紫泉行宫十詠敞軒情知别館縣城南朴斫欣堪稅六驂三架軒楹教豁敞為宜春色箇中含屏山數峯意亦足瀟湘畫法奚論米與黃最喜當門無俗韻愛他本色是清防鏡湖淥水胥堪供鑒觀青銅試比有餘寬臨行江國休衡校鶯脰菱絲祗一般舫室舫室閣閭臨鏡湖推篷煙水趣真殊箇中摘句吾原慣消息先傳安福艫南巡所御舟名棕亭剪縛棕毛覆上層徑穿詰曲倚崚嶒靜觀設問誰堪比一笠居然雲水僧虹橋宛轉橋欄俯渚汀垂如螮蝀飲波形武夷君若期相會躡此知當到幔亭魚罾今歲春逰湖尚氷何嘗倚岸置魚罾有名無實翻成當去聲里革讜言憶讀曾石徑碨􅀈白石玉為堆曲徑重尋春日來踱步向深忽失笑不由還覺愧淡臺竹埭誰把篬筤護閣栽坐宜月入與風閛何須艷舉江南好一例虛心徑節材箭廳箭廳仍是倚溪涯衛士歸廬免候排臂病邇來稍廢此信豫慙處豈豫佳降旨免直𨽻山東經過州縣錢糧詩以志事新春頒旨惠江南前此三次南巡屢蠲上下江逋賦昨詢之大吏以江南尚有因偏災緩貸各項積至一百餘萬兩念皆無力輸將所致較每嵗未完額徴尤堪軫恤因於新正二日降旨概豫豁免以慰望幸而均慶惠輦路經應澤遍覃執伇那無灑與掃正供胥免十之三即看夾道相親切寧不置懷共苦甘更厪欠逋詎全鮮上聲傳宣方伯面詢探賜直𨽻總督方觀承棨戟依京國隼旟鎮冀門中丞近張鎣大尹昔王尊任久民情悉心恆吏治敦幸哉連稔後元氣復堪論駐蹕趙北口即事雜詠大隄回望見雄城駐驆燕南趙北營一宿已看分兩國爾時政令若為行春遲冰凍未全閛近水程途喜不埃侍衛囊金例行賞野翁依舊獻魚來煙宫數字可停驂窗裏淀池萬頃涵點筆今朝别有託愛他消息遞江南積葑圍泥種麥圖未能一例禁西湖西湖葑田民多占種向於南巡時覘知利弊隨敕大吏釐核禁將耒毋許續增致礙宣節兹淀池內外淤地衍沃於蒔麥尤宜民間墾藝滋廣若不示以限制恐日久有妨瀦泄自當仿浙省之例飭禁亦在有司之經理得宜耳勤耕豈不資民食所慮因循占水區逺浦連氷一片白簇枝綴蕊萬星紅十三橋畔韶光嫩假藉春燈著意烘春宵燕九例收燈婪尾氷嬉試賞慿閙罷夜深古月上法王無盡示真乘降旨命免直𨽻厯年逋賦詩以志事江南百萬豁逋租潔矩京畿此豈無多厪寧因少忽耳頃詢方觀承知直𨽻自乾隆十九年至二十六年未完緩徴各項計三萬有餘雖為數不及江南四十分之一而拮據輸納情自相同因降特旨蠲除俾閭閻益資饒裕逺憐翻可近忘乎况當禾稼連逢熟益使錙銖不藉呼庶俾閭閻歌樂嵗春風載道共民娛鄚州道中作鄚州久省尚存名水郭人家漁且耕大抵治民戒滋擾郭駝傳裏語尤明思賢村行館疊舊作韻常山太傅授經祠津逮於斯憩息宜汲古端知稽此要經邦寧復藉他資自專韓氏惟傳易衆好去聲燕人尤述詩不號行宫號行館愛伊朴簡契無為題毛公祠博士始稱毛獻王慶際遭上承述卜子下接逮徐敖藉以觀虞夏誰云祗粕糟古祠旁駐罕衍繹一焚膏憶昔一首示直𨽻衆官憶昔壬午過是郡甫經災沴民未蘇歷覽雖鮮鳩鵠狀寧免飾觀經蹕途其嵗夏秋復兩失調幕乏計惟增吁蠲租賜賑不稽澤救急詎弗遺向隅上天好生默旋轉癸未幸歌西成愈昨年夏秋更均穫桑棉瓜菜皆豐腴䇿驄欣閲元氣復黃童白叟真􅌚娛户有崇墉村象美衣無須人面舒乃知補苴信何濟力田豈似逢年乎因之逋賦概豁免索俾閭閻逭追呼方伯有司日扈蹕此慶共銘汝與吾然宜抱愧何修致不宜志滿誇祥符紅杏園四疊前韻獻王昔好學竹簡論車輦招致道術人賢材率來館得書獨稱多儒學因之顯古地闢今園春風又席展何事消清暇摛詞興堪遣五詩四疊韻用以彰厥善於景州行館作地方官以皇太后髙年旃屋究不如瓦室之暖因建行館以備憩息義重溫凊且事已成遂不峻拒東省頗亦有之然非朕本懷故詩以志愧行營向所諳隨處足停驂如曰髙年養無過數宇堪何來景歷歷且復厦耽耽覺適以為恧惟清信可耽牙籖供古鑑紗牖納春含未得忘言去言斯自識慙景州行館八詠展義齋朴字數楹臨駐時視事於此觀民展義意斯寓焉新闢行齋駐罕旌由來不説事云成便教摛藻題展義思義還因惕顧名頥志堂堂為恭奉皇太后安憩之所叶時溫凊於髙年頥養尤冝四度南巡奉聖慈朴堂溫凊適相宜承歡常仰身康健大慰吾心乃在兹通渌橋板橋宛轉渌水斜通步屧往來儼然江鄉圖畫一泓渌水也成溪屧步通橋雁齒低阿那堤楊雖未緑柔條拂處已生稊淡懷室行館後為邃室幾餘靜寄因之淡泊明志深契澄懷溪畔軒庭一宿便琴書猶覺過清妍淡然對處懷澄照寧祗方心似水焉延月臺平屋傍疊石為梯登之可揖東山之月時雖過望意足千古月與髙人雅作陪於吾何有乃斯來石梯設以皇山擬方搆誠為米氏臺米芾寶晉齋東有月臺而以上皇山樵所告異石致其側兹臺疊磴玲瓏亦以石勝應不啻寶晉桐衫間耳涵虛舫池上舫室可居非水非陸而兼水陸之趣南華虛舟之喻足以當之即室即舟臨水裔不浮不繫任天真今朝識得涵虛妙凍浦雖風那漾淪葆光洞延廊窈窕間環以石洞雲根含潤髣佛有光縵轉逰廊石洞穿趣含幽顯得天然何須僕僕尋丹藥步此應逢元圃仙四照亭四柱翼然清景隨方可攬會心咫尺政不必艷舉西湖蹕停過午恰餘間四面春光攬結間雖不刻舟覔津逮遄飛逸興亦孤山孤山聖因寺行宫八景其一曰四照亭過德州浮橋有作漕河聫艇作輿梁鞠􅎽迎鑾夾岸傍何處黎民非赤子那分彼界與斯疆全無菜色誠豫喜自有鴻恩副衆望不數里遙蒞行館朴齋書史足徜徉五依皇祖德州即事詩韻二首轉輿指東陸紀序正春初省方將設教有舉必應書百年祖制昭七萃軍容肅不遊體以休曰豫凛恆燠恭奉皇太后觀煙火即事早傳度節屆燈收大吏偏稱備已周燕九已過不應再陳燈火而東省大吏以時值春正節月入疆首頓瞻以輦祝樂所釐冝申慶賞即逺近黎庶亦得共快就彰同請尚尚屬近理且供具已周逆聼之且是未過正月內更兼來覩萬民稠春郊合奉思齋賞夕景何殊樂國遊星箭騰空數無萬增齡都作海山籌降旨免山東積欠詩以志事輸多欠少詎能無積少為多遂屢逋江浙已胥霑我澤青齊忍聼向其隅率因災歉成陳負概與優蠲俾衆娛昨崔應階來迎蹕詢知濟南各屬乾隆二十七年以前因災􅌧貸各項積至十二萬有竒因降旨概豫豁免俾民力益資充贍潔矩要從民所好為民父母意殷吾賜山東巡撫崔應階此地向旬宣撫安遂晉遷崔應階先任東省藩司因繼阿爾泰擢撫本省奏辦荆山橋一帶水利工程頗見利民任事理疆皆熟路涸淤為疏川斯識勤農要寧嘉供帳便前人芳軌在帑力繼其賢前撫阿爾泰實心任事經畫得宜應階守而弗失是其所長德州行宫再疊舊作韻三年東國宛重蒞幾宇行宫占首程盆卉含胎方欲綻庭柯圍拱已將成展藝靜覺蓮壺永摛藻長看花炬榮惟是黔黎所厪念豈因今昔漫牽情填倉日作御營草五稅騑驂今日填倉渡濟南麵餅月形團箇箇韭芽春意緑鬖鬖中心祗祝茅簷宴一飯常懷玉食慙大雅漫須嗤俗節喜他名義寓餘三齊河縣行館作晏子祠邊十畝居春風初度駐鑾輿雖然數字朴欣此尚覺中人産厪豫地久自饒老松柏幾間相伴古詩書龍門合傳無須讀比似伊周逺遜諸題晏子祠枕股寧稱見義為委蛇以出賴工辭史遷偏有執鞭慕解贖應懷石父知嘗謂莊公之事晏嬰成禮而出史遷比之見義而為非正論也且晏嬰獨非齊卿乎既為卿雖不必以身殉無道之君獨不當討為逆之臣耶乃遊移其辭尚自託於義而委蛇以退此寧可比於明哲保身之道哉審如是則孔子之請討陳恆反為不當乎史遷無卓識且毁譽背經者多矣兹因過祠詠古特申其義至於執鞭之羡益覺卑鄙蓋史遷悲己之陷罪無赦者耳而司馬貞索隱謂之好賢樂善後世熱中標榜者流率由斯道祗可鄙無可法也麥色麥色吐青微紐芽初發機看憐塵土翳為望雪花霏冷釀心猶慮雨佳時又非籌農展轉意不識竟何依閲本部章過節郵傳至每間兩日京中封奏一至過節問印則兼有閣部本章秉燭氊廬悉處分吏治民生慎幾敕法官蹕路敢殊勤黜雖敗類心先愧登得賢材意輒欣少讀魯論記提要曰難惟是惕為君四依皇祖南巡過濟南韻四度濟南不入城恐防一入百悲生春三月昔分偏劇十七年過恨未平排遣間情厯村墅殷勤正務祝寧盈明朝便近方山駐秀色遙看雲表橫靈岩寺再疊前韻煙霞朝暮傳心印泉石古今愜性靈不二殿傍法松鬱摩頂松相傳元植成雙門外剎竿亭風來簷角虛鈴語春入山根新水渟此是色空無著處作麼更覔梵王形再題靈岩寺八景巢鶴巖瑞迹原因法定開胎仙那識去兮來層岩或見􅛺􅛺者莫認當年丁令回甘露亭一例回回山下泉名稱甘露豈徒然法王解灌羣生頂會否原來在汝邊卓錫泉泉如為所錫為能有卓應非最上乘藉問阿誰留此迹依稀云是佛圖澄摩頂松法師西域返關中𢎞福譯經闡梵風何涉殿旁摩頂樹真成野語述齊東鐡架裟鑄鐘弗就架裟就孰是幻兮孰是常或曰石堅如鐵耳難持一切問榮將白雲洞昔年回蹕憶登峯疑見仙人馭鹿蹤春曉尚寒且無暇白雲洞口任他封雨花巖弗隨冬謝逐春芳滿意清涼滿鼻香更不分疏著與否較於天女散猶強愛山樓髙低七景圍山寺獨喜書樓在小園更不安名徴故事包涵無盡意中存方山歌久行廣甸思見山侵尋行入衆山裏行山未岩宿山逸宿山况是山最美山方宛似碧玉符帝付東皇俾掌此熊熊奕奕鎮齊疆藴寫靈泉為玉水是時峯頂春雲起氛雯靉靅流成綺羃松鋪谷乍有無巖齊響像難容擬為霖信好雪亦佳麥壠崇朝潤千里駐驆方山再疊前韻南北靈岩若合符一般佛宇足遨娛由來在此即言此何必分區有定區計里而行堪駐矣闢齋以待豈宜乎壁間相映朗公石却是前巡手自圖賜河東總河李宏南河久董役李宏在南河最久由微員瀳至淮徐河道北省特掄英試小將投大惟明更要誠固隄綏禹甸輸漕逹燕京河東總督兼管山東運河諸務咨度久安計寧徒扈蹕行望岱廟有作翕河喬嶽例馳香告祀涓辰遣太常詎止一時修故典都緣萬姓籲明慶配天作鎮欽神德廟中配扁曰皇祖御書天作鎮與地無疆祝懿祥漢柏輪嘉蔭下春風曾憶小徜徉過泰山七依皇祖詩韻祗合登山小天下便當觀海悉源頭已看嶽嶽雲霞俯未了青青齊魯浮嶺别隂陽分作郡星明角亢照為州逮今六度賡元韻為有峯巔聖迹留大嶺隆崇自參漢衆峯拱揖若駢頭春朝又覩神霄矗佳氣忽來馬首浮憶昔豫遊臻上界至今樂利遍東州千秋欲問登臨者幾箇能如杜句留四賢祠行館作平陽弗愧先生席孫復守道願居弟子行石介原魯雅欽曾造第孔道輔翼之不合竟同堂胡瑗威儀一代巾將履爼豆千秋梓與桑何必於傍行館築斯之未信祗倣徨過汶河氷解中流細春風兩岸髙原山𣲖亘野濟水會資漕麗日虹翻影輕風縠不濤黔黎迎蹕路情更切前遭至泉林三疊舊作韻一山陪尾又負尾紀載從來艱確明按轡早知行館近駐旌剛值曉春晴所佳東國羣黎朴已有南江大吏迎四度安輿奉遊豫同民翹首祝釐情橫雲館裏忘機坐橫雲館為泉林八景之一那是前過平聲及此來最愛林泉若相候且欣甌研與為陪子云逝者如斯耳回嘆末由也已哉觸目多成慙愧處敢從勝境恣邅徊賜山東巡撫崔應階及屬吏食并詩以示志駐輦有餘暇賜餐聊示恩法亷誠吏本衣食亦民源要以聫堂陛勞哉扈輴軒朴齋供信宿華飾戒從繁四題泉林行宫八景近聖居泉林豈是泛林泉聖迹昭如雲漢懸雖未奠芹臨曲阜西瞻近矣倍顒然在川處靈淙乳竇泗之源川上宣尼昔有言逝者如斯恆不舍如斯不逝亦恆存鏡瀾榭鏡空弗設妍媸見照者妍媸自彼身設向周書尋切已不於斯監要於民橫雲館靈鏡由來迥出羣山嵐川靄相入聲氤氲澤民解作東郊雨龍井那誇一片雲九曲彴板橋九轉接溪涯溪裏新蒲發凍荄屧步莫嫌頻中矩越因曲折致偏佳栁煙坡窣地柔絲若弗勝雅宜淡蕩曉煙凝協時祗合觀生意王氏詩情底用稱古蔭堂鬱蔥古把盤嘉蔭翠覆書堂甌研間致我睪然集遙思去聲安能揖讓見其間紅雨亭昌條春曉未敷榮神解還因靜賞生既有芳菲須爛漫曾非想像漫題名望蒙山三疊舊韻將謂其雱昔嵗同前三度經此皆遇雪有詩不期孤望此行中山姿雖是分明見麥色偏憐塵土蒙罨畫懶看平野景吹雲厭作落崖風亦知遇閠遲節令及早心希利穡功萬松山駐驆前巡停蹕兹駐蹕為去聲愛蒼松欲久陪白月喜於踈處度清風時自杪間來小軒早是臨髙置懸牖偏宜向逺閛我本不希學仙者而何遊涉宛蓬萊氊廬夜雨二月初五日雲隂便思雪獲否尚疑然何幸逢春雨真資潤大田披寒一廬永聼響半宵連為想明朝路芳郊景異前晴四首曉煙輕泮欲開晴潤浥東郊啓蹕旌三寸已霑不致濘農夫行路兩怡情麥隴南來已發青香含宿雨濕溟溟愛他平野珠光綴日照風翻無定形似此春霖遇豈多老農村外笑婆娑傳宣大吏馳郵問迤北霑膏究若何雨潤日烜恰適冝栁條黃染露珠垂分明一段江南景借與人間二六時明日即入江南境郯子園疊舊作韻茲尚程郯境昔猶少皥墟鳥官答問逺塗蓋論傾餘述古真班爾居今又駐豫數間雖朴若一宿豈煩諸苔砌訝如許藝編伴所於摛吟排日有右史可同書欽定南巡盛典卷十一
