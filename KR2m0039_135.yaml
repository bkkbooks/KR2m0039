body:
  text: 奏議乾隆四十四年十一月初七日總理行營事務和碩荘親王永瑺等奏言恭查乾隆三十年皇上南巡陸路營盤自山東徳州以下因隔站俱有行宫而江南之魯家荘亦有行宫是以大城蒙古包帳房等項止令備帶一分所需駝隻及牽駝兵丁酌敷一分之用辦理應派兵丁一千名減去三百名止派七百名茶膳房等處酌量給與駱駝車輛拉船人夫於河兵内揀派應行備帶銀兩緞疋由户部内務府具奏帶往三班侍衛各項官員酌量派往至江南登舟裁減兵丁止派五百名章京四十員虎鎗侍衛兵丁一百三十七名内酌派四十名其餘入於三班侍衛五百䕶軍數内揀派應給官馬人等俱全行放給随往大臣官員年前預支春季俸銀兵丁先領兩個月盤費途中再行補領登舟後大臣官員馬匹各留家人喂養其拜唐阿兵丁所騎官馬及官駝交與山東巡撫喂養至存留喂養馬匹所需麩子草料等項交與山東巡撫酌量採買以備支糶江浙地方豆石短少或有應行撥濟之處令該撫咨眀山東巡撫酌量採買運至沂州一帶地方以備支糶沿途應設臺站由兵部騐眀正站腰站安設令各督撫於通省驛站馬匹内抽撥備用所有經過道路橋梁等處各項事宜交與該督撫照例預行備辦眀年恭遇皇上南巡陸路俱有行宫大城蒙古包帳房等項俱毋庸帶往只備帶兩分尖城蒙古包帳房等項前鋒䕶軍仍派七百名其所需駝隻及茶膳房等處所用駝隻車輛交與兵部酌量辦理牽拉駱駝兵丁亦令酌量足用派出其拉船縴夫於河兵内揀派應用銀兩緞疋等項由户部内務府具奏帶往其侍衛三班各處官員酌量派往至江南登舟之時令裁減兵丁止派五百名章京四十員虎鎗兵丁既據該處具奏裁減止派七十名應照舊例派出四十名當差行走外其餘入於三班侍衛五百前鋒䕶軍數内揀派所有應給官馬人等俱照應領之數全給先領兩個月盤費途中再行補給登舟後大臣官員各留家人喂養馬匹拜唐阿兵丁等所騎官馬及官駝交與山東巡撫喂養馬匹所需麩豆草料髙粱等項交與山東巡撫採買以備支糶江浙地方或有應需撥濟之處令其咨眀山東巡撫酌量採買由泝州一帶地方運往沿途安設臺站由兵部騐定正腰各站令各該撫於通省驛站馬匹内抽撥應用所有經過地方應辦尖營道路橋梁一切事宜交與該督撫照例預行備辦其随往大臣官員年前預支春季俸銀之處俱照上次之例辦理再上次随往江南之侍衛等因有恩賞銀五十兩是以未經放給帮貼銀兩查去嵗随往盛京之三班侍衛鑾儀衛章京等除賞銀外仍給帮貼銀兩此次往還日期較往盛京日期尚多而侍衛等差使比别項又繁應請仍照例支給帮銀至管轄存留兵丁家人之大臣及照料回京車輛之大臣俟臨時請㫖簡派再查登舟後所需馬匹江以北緑營馬匹四千江以南八旗營馬四千至浙江等處添備馬二千匹其放給等項交與兵部行知該省照上次之例辦理其跟随皇上御舟及催儧拉船縴夫所需馬匹交與該省亦照上次之例辦理所需船隻俟各該處派定人數具報總理行營王大臣彚齊移咨該省辦理其放給船隻交與兵部亦照上次之例辦理御前大臣領侍衛大臣軍機大臣乾清門行走大臣侍衛等船隻装載御馬船隻上駟院侍衛官員鑾儀衛章京批本處奏事處軍機處侍衛處内閣兵部官員船隻俱照例在前行走其餘船隻俱令在後行走如有承辦事件應前行者臨時各該處自行具奏江南河路窄狭恐其混行擁擠應嚴行管轄著交與派出管船之大臣㑹同䕶軍統領所有船隻行住之處嚴行管轄浙江省放給馬匹等項事宜亦照上次江南省之例一體辦理聖駕回鑾時至徳州登陸所有經過地方應辦營盤道路橋梁等項事宜俱交該督撫敬謹備辦再上次青州滿洲營預備馬八百匹直𨽻緑營預備馬一千匹俱於回鑾時在徳州劉智廟等處更換出京時雖未換馬但由京城至直𨽻厰登舟之處共二十八站将及二千里官員兵丁所騎官馬如不更換一次恐馬力不無疲乏而兩處共備馬一千餘匹亦覺過少查四十一年前往山東時除青州備馬八百匹外山東緑營派馬一千二百匹去時在泰安地方更換一次又直𨽻綠營派馬三千六百匹回鑾時在徳州地方更換一次此次應請照往山東之例青州副都統現備滿營馬八百匹再交山東巡撫将綠營馬匹内選派一千二百匹共馬二千匹在於泰安地方預備去時官兵所騎馬内如有實在疲乏者准其更換仍交直𨽻總督於綠營酌派馬二千匹在於徳州預備回鑾時更換如此辦理似可少省馬力再上駟院拜唐阿太監等所騎馬匹留於河北官給草料喂養不惟需人照管而小人混生事端亦所不免此次除上駟院帶往圏馬仍照舊例喂養外所騎官馬七百匹同兵丁所騎官馬亦應交與山東巡撫一體喂養是否允協恭候命下之日交與各該處遵照辦理奏入報聞謹按是奏内登舟後所需馬匹江以北綠營馬四千江以南八旗營馬四千照上次之例辦理一條查據本年十二月十八日兩江總督薩載奏眀八旗營馬向在江以南應差綠旗營馬向在江以北應差乾隆三十年将軍容保等咨眀總理行營處将八旗營馬改於江北緑旗營馬改於江南今次業經照依上屇之例辦理似毋庸再為更易復䝉奉㫖准行謹附識於此乾隆四十四年十一月十六日兵部奏言恭照眀春聖駕巡幸江南各處䭾載什物所需駝隻經臣部查據武備院覆稱需駝三百五十餘隻茶膳房需駝四十隻途次預備更換駝共七十五隻以上該駝四百六十餘隻現在直𨽻喂養官駝六百三十九隻除照數撥用外尚剰駝一百七十餘隻據太僕寺咨稱預備尖城需駝七十餘隻途次更換駝十隻上届因官駝不敷係僱覔民駝䭾載此次現有餘剰之駝自應令其照數領用再查此項駝隻日給亁銀一錢在槽喂養自䭾載之日起停止亁銀只給空草一束是駝隻負重之日轉無料豆飼喂長途重載未免易致疲乏竊查駝亁向照旗馬一例支銷地方官備辦草豆又係預購本有寛裕臣等酌議應於各駝日支亁銀内毎隻各節省銀二分積存報部遇有䭾載差使擬於官給空草外令各該地方官每日辦給料豆一升資其飼喂作正開銷毋庸另籌以節糜費如䝉俞允所有此次各處應需駝數行知沿途按照程期與草束一同備辦仍令牽駝官員照料兵丁如數領喂並令該管大臣不時稽查俾得實濟所需豆價即於樽節銀内抵算還項如此稍為變通以在槽之有餘補負重之不足駝隻得以保其臕力長途不致疲斃而䭾載一切什物亦不致稽遲有悮至随圍木蘭口外各處均有水草牧放仍應照舊例辦理奏入報聞乾隆四十四年十一月二十二日總督倉場户部侍郎雅徳等奏言恭查乾隆三十年聖駕南巡因河道糧艘正在盛行之際應需随時料理經前任倉場侍郎温福蒋炳奏請欽派一人随往奉㫖著派温福欽此眀春恭逢翠華南幸沿途御舟經過一切軍民船隻欽奉諭㫖俱不必停避仰見皇上重視運務體恤商民之至意惟是春間北漕經過山東閘河夏初南漕過淮渡黄均湏随時料理伏祈皇上於臣雅徳臣蒋賜棨二人内派出一人随駕前往奏入上諭曰著派蒋賜棨乾隆四十四年十一月二十三日山東巡撫國奏奏言恭照眀春聖駕南巡經臣恭繪程站總圖開眀道路橋梁清单奏蒙聖鑒臣復委道府覆加查勘各處橋梁有止湏酌量水面修建其河灘亁地止湏修墊馬頭不必多費工料通計照上届可撙節正副橋梁二百八十二丈三尺又加平原縣之趙王河長清縣之六律荘河墊台北沙河界首西沙河以上四河春初並不存水止湏修墊涵洞毋庸建設橋梁計可節省撙辦正副橋十二座不特工歸實用亦免承辦官浮開冐銷之弊奏入報聞乾隆四十四年十一月二十四日兵部奏言據䕶軍統領咨稱准武備院咨開眀春聖駕南巡需用水營黄布城帶往二分或用官駝䭾載或僱覔民䭾之處請示到部臣等伏查上屇水營備用黄布城係随大城一路行走至江南徐家渡由該省僱備騾頭過河接替䭾載眀春聖駕南巡現經總理行營王大臣奏准大城毋庸帶往只帶尖城二分自京至直𨽻厰一路俱有行宫其水營黄布城一項於陸路並無應用之處若仍用駝隻䭾載前往勢必多派官兵牽拉行走往返徒滋煩費臣等酌議請将此項水營應用之黄布城交沿途驛逓先期運送之直𨽻厰飭令該處地方官敬謹收貯届期轉交行營䕶軍統領支搭應用其回鑾時山東一路水程尚有需用之處應仍在江省僱備騾頭内撥用其應用數目屇期由行在兵部酌量挑選核實辦理庶運送較為便捷於領用駝隻亦多節省恭候命下臣部行文各處遵奉施行奏入報聞乾隆四十四年十一月二十九日永瑺等奏言據山東巡撫國泰具奏所有留於山東喂養之馬駝請就近在於江南之衆興集地方喂養一摺奉㫖令臣等議奏欽此臣等會議據國泰奏明年聖駕渡黄後所有官兵騎乗及䭾載馬駝留於河北喂養查從前俱在徐家渡接收分派山東之嶧縣滕縣鄒縣濟寧州蘭山縣莒州沂水等七州縣喂養俟皇上回鑾前數日趕往徐家渡交納但馬駝四千餘匹若趕回山東往返千有餘里徒勞馬力茲與兩司議得眀年春皇上渡黄後應留河北之馬匹著江南委員分營接收交眀山東派出文武各員即在江南之衆興集地方喂養以便臨時就近交納至所需草豆查淮安揚州一帶地方所種俱係粇米稲草不合喂馬仍由山東採買草豆運送備用其棚槽等項江南雖有但此次喂養兩月有餘為日較多現在會商兩江總督如江南省不能全備即交與山東委員辦理亦属易行不致有悮查前經臣等具奏明年皇上南巡聖駕登舟後大臣官員等俱各留家人喂養馬匹拜唐阿兵丁等所騎官馬官駝交與山東巡撫分喂今國泰既稱江南桃源縣之衆興集地方距徐家渡不及百里而可以立營之髙阜所在甚多請将此項馬駝就近接收在於彼處喂養甚属順便應照國泰所奏眀年春恭候皇上渡黄後拜唐阿兵丁等所騎官馬官駝應留喂養者即令江南接收交與山東委員在於衆興集地方喂養所需草豆麩子髙粱仍由山東採買陸續運送至棚槽等項現據署兩江總督楊魁咨稱業經交與桃源縣在林家庄兩處預備馬槽一千具此外倘有不敷所有増辦馬槽價銀及所用民田應給籽種銀兩為數無多即由江南省開銷毋庸山東省分償還亦應照該署督所咨辦理奏入諭如議行乾隆四十四年十二月十三日鴻臚寺奏言恭照眀年皇上南巡經過沿途地方文武各官應於㡬十里以内接送聖駕之處伏候訓示奏入上諭曰著照向例在三十里以内接送乾隆四十四年十二月十八日尚書公福隆安等奏言恭查上屇南巡随往江浙大臣官員兵丁執事人等奏眀統以六千馬匹核計随往餘俱留住眀春聖駕南巡所有随往渡黄上舩人數據該各處册報共三千零五十四人臣等按其品級之大小及差使之緩急照向例酌量分派共需馬五千四百八十七匹尚未及奏眀統以六千馬匹核計之數至渡黄以及各名勝處原奏派馬俱在四千匹以内今照原奏或按人減馬或按差減人渡黄時需馬三千六百六十一匹名勝處需馬三千六百四十七匹俟命下時交部行知兩江總督查照并交兵部照例辦給馬票一面知照各該處将单内随往名勝處所減派人數自行通融辦理至船隻一項仍令該督遵照舊定章程将預備上用船隻及装載御用什物等船敬謹預備其随往官兵人等需用船隻仍按從前奏定船數将現在該省所有船隻照单内人數分别派撥至浙省應如何給票監放之處即照江省之例辦理應令兩江總督轉行浙江地方遵照妥辦奏入報聞乾隆四十五年二月三十日閩浙總督三寳等奏言恭照翠華幸浙聖駕由石門何家橋至海寧内廷主位應由石門先至杭州除派衢州鎮總兵官常泰布政使國棟寧紹台道王站柱嚴州府知府木和倫跟随外應否再派大員之處理合繕冩緑頭牌請㫖恭候欽定遵行奏入上諭曰不必再派乾隆四十五年三月初五日刑部奏言乾隆四十五年二月十四日奉上諭朕鑾輅時巡乗春行慶而清理庶獄矜恤尤深用沛徳音式敷愷澤所有江蘇安徽浙江三省恩詔後軍流以下人犯俱著加恩各予減等發落因昭肆眚施恩至意欽此仰見我皇上稽古省方恩膏叠沛温綸之覃被如春億兆之歡騰載路前奉頒發恩詔條欵各直省軍流以下人犯已蒙皇仁俱著減等此次巡幸江浙所有該三省恩詔後軍流以下人犯又蒙聖慈矜全誠格外之殊恩難邀之曠典恭查乾隆二十七三十等年皇上巡幸江浙欽奉恩㫖軍流以下人犯各與減等發落經臣部奏眀除叛逆緣坐强盜免死發遣家奴吃酒行兇棍徒生事擾􅊣用藥迷拐子女開窑誘賣為從并例應給披甲人為奴及擬遣之積匪猾賊搶竊滿貫及三犯竊盜擬絞緩決減等及偷刨人參私鑄十千以上為從不及十千為首并擬遣新疆以及由新疆改發内地等項人犯俱属情罪較重不准減等外其餘尋常軍流以下人犯一概分别減免奉㫖依議今恭逢恩㫖應請仍照乾隆三十年之例除縁坐等項情罪較重人犯毋庸查辦外改發新疆人犯情節較重亦毋庸查辦外其江蘇安徽浙江三省一切尋常軍流遣犯并犯該發遣黒龍江寧古塔及雲貴兩廣不在前議條欵之内者情節與軍流相等事犯在恩㫖以前應請一體減為杖一百徒三年徒罪人犯概減為杖一百襍犯准徒總徒人犯逓減一年已經到配決杖徒犯即行釋放迯徒并免緝拿枷杖人犯俱行寛免應刺字者并免刺字應追賍者仍行追賍其應減軍流遣犯内已犯未審已審未結已結未詳及已經起觧計其程限尚未到配者均照例准其會赦減等再江浙之人有在他省犯案逓回原籍追賍發配者今既在籍適逢恩㫖亦應一體准其減等其他省之人罪犯軍流逓發江浙者與江浙之軍流不同未便濫邀曠典至該三省題咨到部尚未核覆及嗣後到部之案核其事犯在恩㫖以前查與赦欵相符者臣部随案聲眀分别減免俟命下日臣部行文各該督撫遵照辦理奏入報聞乾隆四十五年七月初四日大學士公阿桂等奏言本年皇上南巡所有沿途接駕之文武廢員奉㫖令臣等會同查辦除文職佐雜以下武職千總以下並休致降調及曽經賞銜加級並貪酷永不叙用餘罪未經納贖各員遵照向例扣除外又四十二年以後緣事各員遵㫖毋庸辦理所有應行查辦之文武各員臣等将吏兵兩部叅革原案詳悉秉公酌核其中或案情較重或事出有心者亦均行扣除今止檢出文職十二員武職二員查照向例摘叙緣事畧節繕寫清单恭呈御覽伏候欽定奏入上諭曰交該部行文調取来京於迴鑾後十月内帶領引見乾隆四十五年十月初六日兩江總督薩載奏言恭照今春翠華南幸扈從官兵人等應需乘騎馬匹經臣調撥江南營馬三千八百匹江西營馬四百六十餘匹随營伺應各營馬匹應差日乆難免倒缺若照常例辦理所領大報馬價不敷購補且沿途喂養豆草較之在營時不無多費例支草料銀兩亦不敷用上届乾隆二十二及二十七三十等年節次恭逢聖駕南巡均經前督臣尹繼善奏眀差峻之後於通省各營實􅋵馬數中酌量情形暫缺十分之二三将例准報倒馬價及缺馬草料銀兩按月存留公處通融補苴於一年之後再行購補足額荷䝉聖恩俞允今次随營應差馬匹事同一例差峻後臣典提臣李奉堯往返札商仰體上軫恤兵艱至意通行各營循照上屇之例按各處情形将額馬暫缺十分之二三以所存馬乾通融歸補沿途添喂草料并為補買馬匹之用俟眀嵗夏間動支積存缺馬草料及例准報倒馬價銀兩委員出口採買馬匹於冬間回營補足缺額之數其有差峻馬匹照常堪以騎􅋵並未報倒無需暫缺營分亦即據實辦理如此酌籌調劑既於兵丁毫無苦累而眀年即行補足馬數仍無虧缺所有各營應差馬匹照依上屇通融辦理縁由臣謹循例奏眀奏入報聞乾隆四十五年十月初十日薩載奏言竊照乾隆四十五年恭逢聖駕巡幸江省行慶施恵億兆歡欣一切預備事宜先經前督臣髙晋查照上四屇章程分别増減設局辦理臣接任後仰體聖心諸從儉樸不敢稍事増華清蹕所經舉凢水陸營盤橋梁道路與夫行宫名勝夫馬船隻等項所需經費悉動帑項發辦絲毫不累官民因此次差務相距上屇乾隆三十年南巡已隔十五年之乆各工不無應湏修整見新又淮北之桂家庄林家庄龍泉庄三處旱營改建行宫三座臣與各撫臣并總局司道周厯查勘派委平日辦事幹練之員詳細確估分别辦理内有因工程實在􅀈舊必需拆修需費稍多者即量為加増有工程尚属堅固祇湏稍加修葺不使過為糜費此外各項事宜照依往例預備有費與上屇相符者亦有上屇有而今次未辦或應酌減者均經預籌估定飭辦並専派道府丞倅往来查催臣復随時親詣各州縣指示辦理凢動支正項各欵俱於差前預估報部其餘随事随時由總局耑案估詳經臣與撫臣核眀批准方許動辦差竣後即定限飭造報銷清册送局核與預估相符及耑案詳定並臨期飭令増辦改辦有案可稽者均予准銷其有不在預估或用數逾於估數又無禀詳批定案據係地方官自辦者槩不准其銷算各項料物有差後應湏變價者即令照估折變歸欵總期帑不虚糜官無浮冐民無滋擾茲據江寕蘇州總局各司道核明造册報銷臣復細加核算例應報部動支司庫正項銀十五萬二千六百五十七兩零較上屇少用銀二萬餘兩循例由撫臣會核題咨請銷其各項添新修舊工程随工陳設并磚石橋路夫船車騾等項計用銀五十一萬一千九百九十八兩零現在分欵造册咨送軍機處查核查上屇咨報軍機處核銷銀四十二萬六千餘兩今次雖多用銀八萬五千九百餘兩因有淮北添建行宫三座共用銀八萬九千五百餘兩以之核除比較上屇用數仍属有減無増所動銀欵查有乾隆四十三年荷蒙恩賞運庫銀三十萬兩又藩司並糧道庫内充公閑欵項下存有海門㕔解繳天南沙地價銀五萬四千四百六十兩零又通州節年馬厰公租銀七千一百一十六兩零又原任運使邉廷掄解繳積存養㢘銀二萬兩奏奉硃批留充地方公用又各属觧存留漕費銀八千二百三十七兩零又松太二属塘工平市銀五千六百七十六兩零又各年減存行月盈餘銀三萬六千九百三十二兩零以上各欵共銀十三萬二千四百二十餘兩均係在外充公閑欵堪以撥充差務之用祇少銀七萬九千五百七十餘兩查乾隆四十五年復蒙恩賞運庫銀十二萬三千七百九十二兩零除動支銀七萬九千五百七十餘兩外仍存恩賞銀四萬四千二百一十六兩零應請留為下届差務之用此外尚有上屇乾隆三十年差案恩賞用存銀六千四百四十三兩零及河庫撥觧水利平餘銀一萬三千八百二十七兩零二共銀二萬二百七十兩零經前督臣髙晋奏眀發典生息以為嵗修差案工程并看管人役飯食之費現仍存典生息照案辦理所有差案銷算逐細查清造册報銷縁由相應會同江蘇撫臣閔鶚元恭摺具奏奏入報聞欽定南巡盛典卷九十八
