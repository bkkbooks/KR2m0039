front:
  text: 欽定四庫全書欽定南巡盛典卷三十三蠲除
  hash: sha256:7661bc4490966547883ef3119471def4e77ba1987d5f743e05709e12017eff67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_045-1a, image: WYG0658/WYG0658-0510a.png}
body:
  text: 乾隆四十五年正月十二日上諭內閣曰朕巡幸江浙省方觀民鑾輅所經宜施渥澤用普春祺所有經過直𨽻山東地方本年應徴地丁錢糧俱著加恩蠲免十分之三該部即遵諭行乾隆四十五年正月十三日上諭內閣曰朕清蹕時巡道經畿輔昨已特沛恩膏將所過地方本年額賦蠲免十分之三直省昨嵗豐稔民氣恬熙朕心深為欣慰苐念該省尚有節年欠項皆因從前被災較重時出借今若按律催科民力恐不無拮據著再加恩將順德廣平大名天津四府屬所有積年因災出借常平倉榖八萬四千八百餘石折色銀九萬八千七百餘兩屯糧豆榖一千二百四十三石零概豫蠲免該督其實力稽察妥協辦理俾閭閻均沾實惠該部即遵諭行乾隆四十五年正月二十日上諭內閣曰朕清蹕時巡道經山左昨已特沛恩膏降旨將所過地方本年額賦蠲免十分之三兹當入疆伊始疇咨民瘼該省尚有未完欵項著再加恩將山東省乾隆四十二三四等年歷城等二十一州縣因災緩徵未完地丁銀十三萬四千四百餘兩臨清等七州縣因災緩徵未完常平穀二萬六千三百餘石社穀二千四百餘石麥種合榖三千二百餘石概豫豁免該撫其善體朕意率屬實力奉行俾閭閻均霑實惠副朕惠愛黎元用普春祺至意該部即遵諭行乾隆四十五年二月初五日上諭內閣曰朕因東南黎庶望幸情殷爰舉舊章五巡江浙兹當入疆伊始慶澤宜敷所有江南浙江水陸經過地方本年應征地丁錢糧俱著加恩蠲免十分之三該部即遵諭行同日上又諭內閣曰朕翠華南幸慶典時行蹕路所經已降旨將直𨽻山東二省纍年積欠銀糧概豫蠲除江省為財賦重地兹入疆伊始渥澤宜覃著加恩將江寧藩司所屬自乾隆十一年至四十四年積欠及災緩共未完銀四十五萬二千餘兩未完米十七萬二千餘石蘇州藩司所屬自乾隆三十九年至四十三年災緩未完地丁屯折漕項學租銀二萬三千九十六兩未完災緩漕糧漕項兵糧米十二萬九千八百九十餘石又安徽藩司所屬自乾隆四十三年以前積欠災緩地丁漕項等欵共未完銀四十萬七百餘兩未完米麥榖九萬七千六百餘石俱全行豁免用敷愷澤副朕行慶施惠之至意該部即遵諭行乾隆四十五年二月初八日上諭內閣曰朕此次南巡勤求民隱翠華所過慶典時行而兩淮竈户僻處海濵生計殊屬艱苦所有乾隆三十九四十四十二四十三等年各場因災帶徵遞緩各未完銀三萬五千六百二十四兩零著加恩普行豁免以示惠澤乾隆四十五年二月初九日上諭內閣曰朕巡行江浙取道維揚因念兩淮竈户生計勞苦業經降旨將節年未完應徵積欠銀三萬五千餘兩全行豁免以示惠恤其兩淮啇衆踴躍抒忱並應一體加恩俾霑慶澤所有應還川餉項內尚有未繳銀一百二十萬兩著加恩全行豁免又兩淮商人歷綱提引餘利項內庚子年限應完銀二十七萬六千餘兩並著展限遞緩一年俾淮揚商衆益資饒裕該部即遵諭行乾隆四十五年二月十五日上諭內閣曰朕巡幸江浙已經降旨將經過地方本年額賦蠲免十分之三而省會駐蹕之地加恩更宜優渥著將江南之江寧蘇州浙江之杭州所有附郭諸縣本年應徵地丁錢糧概豫豁免俾近光黎庶無事輸將共享盈寧之福該部即遵諭行乾隆四十五年二月三十日上諭內閣曰朕展義言巡順時行慶浙省輦路所經本年應徴地丁錢糧已先降旨蠲免十分之三兹當入疆伊始用宜更沛新恩俾資樂利所有該省歸安等縣緩征未完地丁漕白各欵銀五萬三千九百餘兩零並歸安等三縣緩征未完南米四千七百餘石仁和等三縣未完民借榖一萬八千二百餘石均著加恩一併豁免以紆民力該督撫等其董率各屬實力奉行稱朕愛惠黎元至意該部遵諭速行乾隆四十九年正月二十一日上諭內閣曰朕巡幸江浙省方觀民鑾輅所經宜施渥澤用溥春祺所有經過直𨽻山東地方本年應徴地丁錢糧俱著加恩蠲免十分之三該部即遵諭行乾隆四十九年正月二十二日上諭內閣曰朕清蹕時巡道經畿輔昨已特沛恩膏將所過地方本年額賦蠲免十分之三第念該省尚有積年欠項皆因從前偶被偏災較重地方隨時出借今若按限催科民力恐不無拮據著再加恩將順天保定河間天津正定順德廣平大名宣化遵化趙州深州等十二府州屬未完積年因災出借倉榖一十五萬五千二百四十石概豫豁免該督其實力稽查妥協辦理俾閭閻均霑實惠該部即遵諭行乾隆四十九年正月三十日上諭內閣曰朕清蹕時巡道經山左昨已特沛恩膏將所過地方本年額賦蠲免十分之三兹當入疆伊始疇咨民瘼該省尚有未完欵項著再加恩將山東省利津霑化等二十一州縣衛因災出借籽種牛具銀十一萬八千六百一十九兩零並因災出借倉榖十萬一千一百餘石概豫豁免該撫務須率屬實力奉行俾閭閻均沾實惠副朕行慶施惠有加無已之至意該部即遵諭行乾隆四十九年二月十六日上諭內閣曰朕因東南士庶籲幸情殷且河工海塘以次告竣一切善後機宜均須親臨指示爰循舊典六巡江浙兹當入疆伊始慶澤宜覃所有江南浙江水陸經過地方本年應徴地丁錢糧俱著加恩蠲免十分之三該部即遵諭行同日上又諭內閣曰朕翠華南幸慶典時行蹕路所經已降旨將直𨽻山東二省因災積欠銀米概豫蠲除江省為財賦重地兹入疆伊始渥澤宜覃著加恩將江寧藩司所屬積欠地丁漕項等欵未完銀三十六萬七千五百十兩零民借籽種口糧未完銀一十五萬一千九百五十九兩零漕糧漕項等欵未完米麥豆一十八萬九千七百二十六石零蘇州藩司所屬地丁漕項等欵未完銀四萬五百五十四兩零民借籽種口糧未完銀一千二百四十八兩零漕糧漕項等欵未完米豆三萬八千九百六十四石零安徽藩司所屬地丁等項未完銀三十七萬三千二百十一兩零民借籽種口糧未完銀六萬一千九百兩零漕倉等項未完銀八萬三千一百六十三兩零漕糧漕項等欵未完米麥豆六萬五千七百四十餘石零俱著全行豁免用敷愷澤副朕行慶施惠之至意該部即遵諭行乾隆四十九年二月十七日上諭內閣曰朕翠華南幸周咨民隱渥澤覃敷蘇州藩司所屬地丁漕項公田餘租等欵積欠銀糧業經概豫蠲除因思吳縣公田已與民田一例交納條銀漕米並加徴義租嗣因該縣有積年無著田糧復於公田徴收餘租米二千二百二十餘石抵補無著虛糧七百餘石外尚餘米一千四百餘石留為該縣地方公用歷年均有拖欠民力未免拮據自應特沛恩施俾閭閻永資樂利所有該縣無著田糧除照舊於此項餘租徵收抵補其留備地方公用應徴米一千四百餘石著加恩永免徴收以示省斂惠民有加無已之至意該部即遵諭行乾隆四十九年二月二十六日上諭內閣曰朕巡幸江浙已降旨將經過地方本年額賦蠲免十分之三而省會駐蹕之地恩膏更宜優渥著將江南之江寧蘇州浙江之杭州所有附郭諸縣本年應徴地丁錢糧概豫豁免俾近光黎庶無事輸將益享盈寧之福該部即遵諭行同日上又諭內閣曰朕翠華南幸取道維揚兩淮商衆踴躍抒忱自應特沛恩膏俾霑慶澤所有該商等未完提引餘利銀一百六十三萬二千七百七十四兩零著加恩全行豁免俾淮揚商衆益資饒裕該部即遵諭行乾隆四十九年二月二十八日上諭內閣曰朕此次南巡勤求民隱翠華所蒞慶典時行因念兩淮竈户僻處海濵亦應一體加恩俾得均沾渥澤所有乾隆四十五四十六等年各場因災帶徴遞緩未完銀七千九百餘兩著加恩全行豁免以光惠澤乾隆四十九年三月十二日上諭內閣曰朕翠華蒞浙愷澤覃敷前已降旨將經過地方本年額賦蠲免十分之三並省城駐蹕之仁和錢塘二縣本年應徴地丁錢糧概豫豁免今入疆伊始周咨民隱再沛恩綸所有杭州嘉興湖州三府屬本年應徴地丁錢糧共一百九萬餘兩著再加恩普免十分之三俾近光黎庶益享盈寧以副朕省方問俗施惠閭閻有加無已之至意乾隆四十九年閠三月初四日上諭內閣曰朕鑾輅時巡普施慶惠前長蘆山東商衆踴躍抒忱自應一體加恩俾沾渥澤所有長蘆應徴引課銀四十九萬餘兩山東應徴兩年引課銀三十六萬餘兩俱著加恩分作八年帶徴俾商力益資饒裕該部即遵諭行欽定南巡盛典卷三十三
