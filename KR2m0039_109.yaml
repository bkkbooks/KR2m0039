body:
  text: 欽定四庫全書欽定南巡盛典卷七十六閲武臣等謹按較閲之法莫詳于周禮大司馬職中春教振旅中夏教苃舍中秋教治兵中冬教大閲蓋聖王寓軍政于狩田而鼓鐸鐲鐃之用坐作進退之莭綦備焉漢制京師有南北軍為天子所親試而郡國材官騎士嵗時之試則守臣主之唐宋以來相沿不改夫兵可百年不用不可一日不備易之師曰容民畜衆書之立政曰克詰戎兵震疊懷柔理無偏廢我皇上聖神文武撫育萬方威􅏢憺于遐陬偉伐鎸于貞石猶且木蘭秋獮南苑春搜載纘于苖肄勤繩武蓋仁育義正之規未有如斯之懿爍者也江浙沐浴湛恩久安耕鑿材勇技擊之士既無所用其蹶張因得講習知方雍容決拾而清蹕所經又必討軍實而申警之親臨簡閲指示樞鈐因以廣勵戎行普行慶賞厲韎韋之壯氣革絲竹之靡音意美法良靡不賅舉所謂覲光揚烈足兵衛民禮各有宜備斯無患即古岐陽甫草之盛未足以比方萬一曽何有于長楊羽獵華林馬射之云爾哉謹志閲武第九欽定四庫全書欽定南巡盛典卷七十六閲武乾隆二十二年二月二十七日上諭內閣曰今日朕至杭州省城其接駕之緑營兵丁有奏簫管細樂者夫身隸行伍當以騎射勇力為重戊樓鼓角不過用肅軍容即古者鐃歌鼓吹之詞亦以鳴其得勝之氣耳若吹竹彈絲技近優伶豈挽強引重之夫所宜相效此等緑營陋習各省均所不免可傳諭各該督撫提鎮等轉飭所屬標營嗣後營伍中但許用鉦鼓銅角其簫管細樂概行禁止乾隆二十六年十一月十七日上諭內閣曰伍彌泰等奏請明嵗南巡伊等揀選江寧京口官兵沿河安設臺站等語朕幸南省所有京城隨從官兵足敷當差至上船時於官兵內尚且酌量存留伊等縱逺接亦無用處明嵗所有江寧京口兵丁不必迎至宿遷亦不必安設臺站預備差使乾隆十五年五月初六日總理行營王大臣和碩莊親王允祿等奏臣等議得江寧將軍保德等奏稱辛未年皇上南巡臣等駐防地方老少俱得瞻仰聖顔不勝欣悅官兵等亦各得隨行營當差無不踴躍伏查康熙年間將軍副都統等帶領官兵在宿遷地方接駕明春聖主南巡臣保德祁爾丹富昌等請帶領官兵六百名前至宿遷地方接駕所帶之官兵日則隨駕當差夜則支更等語查明春聖駕南巡所有隨駕官兵俱係酌量派定差使裕如駕至宿遷地方必由舟行兩岸路窄隨從當差無關緊要之人尚且存住若如該將軍等所請帶領官兵六百名接駕人數過多沿途行走一切地方必至擁阻似毋庸若許人等但該處官兵幸際聖駕親臨而不得黽勉當差殊屬不安臣等酌議交與將軍江寧駐防官兵內挑取二百名前至宿遷地方接駕沿途照木蘭學習行圍人等之例交與護軍統領等日則與護軍人等一同當差夜則支更至將軍副都統等若俱前來接駕則省城內存下官兵尚多不可無大員管束况聖駕至江寧省時副都統等亦得瞻仰聖顔所有宿遷接駕之處應止令該將軍保德帶領官兵前來其副都統祁爾丹富昌等不必前來在該處等候奏入報可乾隆十五年七月初六日大學士公傳恆等奏言本年三月內鎮海將軍趙宏恩等奏明春皇上南巡所有沿途一帶應於駐防辨兵內派撥護送自清江浦至鎮江分作十臺每臺撥兵四十名經臣等議以安臺派撥四十名未免過多或酌派三十名或十數名沿途護送亦屬可行應令該將軍會同總督黃廷桂妥商定議再江寧杭州俱有駐防辦理自宜畫一亦行令該督等會同該省將軍都統一體妥商今稱詳細議商量為減撥鎮江兵丁自清江浦至瓜洲分設十臺江寧兵丁自鎮江至平望分設十臺各臺派官一員兵二十名派協領二員以為統轄自鎮江至江寧派江寧兵十名鎮江兵十名各官一員在於龍潭安設一臺至浙江總督將軍業已咨商該督等自另摺具奏其安臺地方另行委員勘定查沿途護送惟期人數足敷差遣可以不必過多是以臣等原議將派撥四十名之處令會同總督黃廷桂等妥議今據奏安臺派官一員兵二十名已較原奏量為裁減自清江浦至瓜洲十臺則派撥鎮江駐防自鎮江至平望十臺則派撥江寧駐防辦理亦已畫一但所奏安臺派兵二十名猶覺過多酌派十名已敷沿途防護差遣應令該將軍等預為派撥以備明春臨期護送所派兵辨必悉心選擇務得賢能強壯之人足供使令者方為妥協其安臺地方亦應飭委幹員詳加勘定總期前後適中庶聫絡照應一切不致貽悮至杭州駐防應如何預備派撥之處亦毋庸俟該省總督將軍另行具奏應俟臣等此奏命下之日行文知會仿照江省之例酌量辦理奏入得旨依議乾隆十五年十二月十三日兩江總督黃廷桂江寧將軍保德奏言竊照江寧省城駐防滿漢兵丁明春聖駕臨幸應備大閲但查滿兵雖有四千除循例輪派水操兵一千名之外實兵止有三千名而營汛遼濶堆卡繁多兼之臨時各項差務所餘無多又督標兩營及城守兩營額兵止共二千餘名除去親丁公費並分防差務之外餘兵更屬有限若滿漢各自分操備閲為數既少隊伍不密似不足以壯軍威而肅觀瞻臣等公同商酌仿照直隸保定府滿漢合操之例預備滿兵一千五百名漢兵一千五百名會合操練祗候皇上臨閲以整部伍以壯軍容奏入報可同日兩江總督黃廷桂奏言江寧鎮江蘇州等處應行預備官兵祗候大閲除江省滿漢合操緣由臣另摺恭奏外其鎮江駐防旗兵與將軍標營漢兵均應在教場預備又將軍所管水師標兵應在江靣預備惟蘇州撫標額兵僅止五百餘名除親丁公費并差防之外餘兵甚少不足備閲查鄧尉山下前傍太湖此地水勢不深溜亦平恬帆檣易施合操水陳較京口大江中流上下往來不免濡滯者似覺捷便可觀臣謹量調蘇松鎮標及太湖營船隻於鄧尉山下操船預備恭候皇上駕臨鄧尉登山閲視奏入報聞乾隆十五年十二月十四日兩江總督黃廷桂奏言明春翠華南幸蘇松水師鎮臣王澄係武職大員理應隨臣叩接聖駕但查鎮屬髙家嘴汛地係內外大洋通連要隘髙家嘴之內又有呂泗一汛係江海交接之區風帆便利自髙家嘴兩日可逹鎮江所以每嵗立春以後定有鎮臣帶領辨兵巡緝洋靣之例我朝德威逺播數十年來久已海不揚波惟是春初御輅臨幸臣等身任地方不敢不加意慎重臣謹擬令該鎮於正月初旬遵照往例即赴髙家嘴一帶外洋率領將辨加意巡防其吕泗係狼山鎮標右營所轄即調該管將領帶兵駐守仍交狼山鎮一體督察恭候聖駕將臨京口令鎮臣王澄先期由水路前來祗候迎鑾其髙家嘴洋面飭令在彼將辨梭織巡遊毋許疏懈在鎮臣既可遂其瞻天仰聖之誠而海洋重地得有大員督巡似更嚴密再查京口焦山之下僻處江心懸隔江岸臣更將海船辨兵量調三十隻周圍屯劄以肅警蹕至各處支河港汊并大營防護外衛以及沿途站道官兵臣咨行提臣武進升率同狼山鎮臣魏文舉壽春鎮臣常岱管領約束合并奏明伏祈皇上睿鑒奏入報可乾隆十六年二月二十七日閩浙總督喀爾吉善奏言臣於乾隆十四年冬間入覲天顔荷蒙皇上詢及南巡事宜經臣將閲看水操必須在乍浦西山炮臺地甚淺窄風汛亦須守候據實具奏面奉諭旨乍浦朕不必前往閲看臨時或遣王子或差大臣往看彼處不必預備欽此臣於上年秋間到浙與提臣談行義酌定於沿海水師各營內按額設戰船兵數之多寡每營調撥一二隻不等配足兵丁器械派委鄰近之定海鎮總兵官陳鳴夏預期統領前赴乍浦洋面伺候會同乍浦滿營水師兵合操陳勢苐臣伏查操演舟師全藉風力在內洋更須候風泛地勢相合方可開篷出碇布列陳勢如遇無風之期固不能操演而乍浦係向南洋面遇南風直抵山腳石礁遇北風揚出外洋俱不便操演惟東南西南諸風汛方可開操大臣赴乍浦須等候風汛與洋面相合然後開操不能一到即閲如俟聖駕抵省後奏請欽點大臣前往恐有稽程限臣查乍浦即在嘉興府屬平湖縣境自嘉興府至乍浦路僅一百三四十里又支河一水可通臣先期已飭地方官預備小船乘坐前往相應具摺奏請特派大臣赴乍浦閲看水操事竣仍由水路至嘉興府回至省城復命至乍浦滿營水師將軍臣薩爾哈岱有統轄之責理應隨同欽差前往閲操苐恭逢聖駕臨幸省城將軍應在省伺候皇上親閲陸路操演並統率官兵辦理省城差使未便前往乍浦其乍浦副都統臣額爾登現今奉旨令跟隨護軍統領沿途一體辦差乍浦滿營水師係伊管轄兵丁應請令額爾登即從嘉興跟隨欽差大臣赴乍浦閲操事竣仍赴省恭候差遣合并陳明奏入得旨命納延泰閲之乾隆十六年三月十二日大學士公傳恆奏言查得去年皇上豫省閲兵時曽賞演陳之巡撫大縀三匹總兵官城守尉等大縀各一匹八絲緞各一匹參將佐領等八絲縀各一匹都司守備防禦等金奬武牌各一面千總把總等銀奬武牌各一面此次浙省演陳大臣官員兵丁賞賜之處遵旨酌議亦照前賞賜外再預備步射騎射花馬箭放鳥鎗騎射跑解舞藤牌官員兵丁等亦照此賞賜內有演陳而又預備各樣技藝官五員兵二名臣等酌量議於伊等演陳之應得賞賜等項外增賞官員貂皮各一張兵丁銀奬武牌各一面謹將應賞大臣官員兵丁人數與物件數目另繕清單一併進呈俟命下之日所賞貂皮縀匹金銀奬武牌赴廣儲司支領賞給奏入報可乾隆十六年三月二十四日行在兵部奏言明日江寧駐防官兵及緑旗營兵合操請酌量於伊等齋集時先往操演一次恭俟皇上閲看今將陳圗并官兵數目一并進呈奏入報聞乾隆十六年三月二十六日大學士公傅恆等奏言遵旨賞賚江寧省演陳大臣官兵酌議亦照賞給浙江省演陳大臣官員兵丁之例將軍總督以下防禦守備以上等官分别賞給縀匹驍騎校滿洲兵丁賞給一月錢糧千總把總外委把總緑旗兵丁賞給奬武銀牌今將應賞大臣官員兵丁及物件數目叧繕清單謹呈俟命下之日賞給驍騎校兵丁一月錢糧著該將軍飭行藩司攴給外其賞給大臣官員縀匹及緑旗千把總兵丁奬武牌著在廣儲司支領賞給奏入得旨如所議行乾隆二十年十一月二十六日護理鎮海將軍印務京口副都統伊林阿奏言乾隆十六年聖駕南巡前任將軍趙宏恩奏請帶領官兵二百名前往宿遷縣地方恭迎聖駕經軍機大臣議以京口至宿遷路途不逺又係江南境內請照該將軍所請準其帶領官兵二百名至宿遷縣地方恭迎聖駕今將軍李紱尚未到任俟到任時遵照前例帶領官兵二百名前往宿遷縣地方恭迎聖駕日則敬謹隨行夜則守更巡邏倘將軍李紱未及到任伏乞皇上即準臣等帶領官兵迎接再查乾隆十六年聖駕南巡前任將軍趙宏恩奏請安臺一摺經軍機大臣議覆準行自瓜洲起至清江浦止安設十臺於龍潭地方江寧京口合設一臺明嵗聖駕南巡臣等請亦照前例辦理奏入上諭曰安臺照前兵丁不必來接乾隆二十一年十一月初十日江寧將軍德敏奏言恭照乾隆十六年聖主南巡前任將軍保德等奏請帶領官兵接駕一事經總理行營王大臣議準將江寧駐防官兵內挑取二百名前至宿遷地方接駕沿途照木蘭學習行圍人等之例交與護軍統領日則與護軍人等當差夜則巡邏支更至省城內存下官兵尚多必須有大員管束應祗令該將軍帶領官兵前至宿遷接駕其副都統等不必前來明春聖駕南巡臣等遵照前例派官十六員兵二百名臣德敏帶領前至宿遷地方接駕所帶官兵仍照例交與護軍統領與護軍等一同支更當差再辦理江寧馬匹總督尹繼善奏準派副都統一員辦理臣等請將副都統富昌帶領江寧八旗馬匹在京口地方預備聖駕未至京口之前富昌過江恭請聖安副都統佟明存住守城暫理將軍印務約束官兵聖駕未至江寧之前佟明在龍潭地方恭請聖安奏入報聞乾隆二十一年十一月十一日江寧將軍德敏奏言恭照乾隆十六年聖駕南巡由臣等奏派官兵沿河坐臺其江寧官兵自京口起至平望地方安設十臺每臺官一員兵十名派協領二員統轄其京口官兵自京口起至清江浦地方安設十臺每臺官一員兵十名派協領二員統轄龍潭地方江寧京口官兵合設一臺每處官一員兵五名明春聖駕南巡臣等請仍照十六年定例分别預備奏入報聞乾隆二十二年二月二十六日杭州將軍薩爾哈岱閩浙總督喀爾吉善浙江巡撫楊廷璋浙江提督武進升同奏言竊照浙江滿營緑營各官兵馬步技勇自乾隆十六年荷蒙皇上校閲迄今五載恭逢翠華重幸將士歡騰臣等謹於杭州省城滿營教場預備滿營操陳緑營操陳并照上屆預備滿營緑營合操陳式伏候皇上訓示應閲何項屆期祗候恭請大閲奏入得旨滿漢合操乾隆二十二年二月二十九日大學士公傅恆奏言遵旨賞賜浙江省合操大臣官員兵丁之處查十六年皇上賞賜浙江省大臣官員兵丁自將軍總督以下防禦等官以上俱經分别賞給縀匹驍騎校兵丁給奬武銀牌今此次浙江省合操大臣官員兵丁請俱照十六年之例賞給再皇上前步射騎射對撲馬上打鎗官兵應入於合操官兵內一體賞給所有應賞之大臣官員兵丁數目所賞之縀匹錢糧銀牌數目另開清單一併進呈其賞給驍騎校及滿兵之一月錢糧亦照前交於行在户部將兩淮鹽項銀兩內動支除應賞之縀匹銀牌由廣儲司支領外是日舞藤牌之浙江福建省分緑營官兵前蒙皇上親閲時已經恩賞此次應毋庸再議奏入得旨如所議行乾隆二十二年三月二十日大學士公傳恆等奏言遵旨賞給江寧省演陳大臣官員兵丁一事查十六年賞給江寧省演陳將軍總督以下防禦以上俱分别賞以縀匹驍騎校兵丁俱賞一月錢糧緑營兵丁賞奬武銀牌此次演陳江寧省大臣官員兵丁等請俱照十六年之例賞給再御前射箭對撲官兵亦照演陳官兵一體賞給其撂跤滿洲兵丁有間散二名未食錢糧之人應請每人賞給銀牌一面所有應賞演陳之大臣官兵等數目併賞給縀匹錢糧銀牌數目另繕清單一併進呈所有賞給縀匹銀牌在廣儲司支領賞給驍騎校兵丁一月錢糧亦照上次交行在户部飭行布政司庫銀內動支奏入得旨如所議行欽定南巡盛典卷七十六
