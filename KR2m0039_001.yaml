body:
  text: 欽定四庫全書欽定南巡盛典卷首上御製南巡記乾隆四十九年三月舉大事者有宜速而莫遲有宜遲而莫速於宜速而遲必昧機以無成於宜遲而速必草就以不達能合其宜者其惟敬與明乎敬者敬天明者明理敬天斯能愛民明理斯能體物千古不易之理也豫臨御五十年凡舉二大事一曰西師一曰南巡西師之事所為宜速而莫遲者幸賴天恩有成二十餘年疆宇安晏兹不絮言若夫南巡之事則所為宜遲而莫速者我皇祖六度南巡豫藐躬敬以法之兹六度之典幸成亦不可以無言我皇祖蕩蕩難名豫藐躬瞪乎景仰述且弗能作於何有然而宜遲莫速之義則不可不明示豫意也蓋南巡之典始行于十六年辛未是即遲也南巡之事莫大于河工而辛未丁丑兩度不過敕河臣慎守修防無多指示亦所謂遲也至於壬午始有定清口水志之諭向來河臣率皆靳拆清口恐干多費工料之議洪湖盛漲則開五壩下河一帶無嵗不被偏灾自壬午三次南巡始定髙堰五壩水志髙一尺清口即開放十丈為凖俟秋泛後洪湖水勢既定仍如常接鑲口門嗣是河臣恪守此法數十年來下河免受水患田廬並資保護丙申乃有改遷陶莊河流之為向來清口每慮黃水倒漾康熙己卯春口迤皇祖南巡陶莊親蒞河干閲視形勢命于清西隔岸挑引河𨗳黃使北因河臣董安國開放過早施復淤墊其後庚辰辛己壬辰甲午以及雍正庚戌厯命大臣㑹同河臣籌勘挑辦功迄未就嗣以黃水倒灌舍開陶莊引河更無善策丙申春諭令河臣薩載詳悉履勘繪圖貼說往返指示即於是年秋興工至丁酉仲春蕆事開放新河大溜暢達既免黃流倒漾之虞兼收清水刷沙之益因命建詳河神廟以答神祐見御製碑訖庚子遂有改築浙江石塘之工浙江海塘自戴家橋迄西皆柴塘不足資鞏護庚子南巡親臨閲視因飭該督撫于老鹽倉一帶改建魚鱗石塘仍諭令存留舊有柴塘以為重門保障辛丑壬寅等年陸續採辦石料勘估建築至癸卯八月該督撫富勒渾福嵩等奏報石塘三千九百四十丈全行告竣今甲辰更有接築浙江石塘之諭浙江海塘老鹽倉一帶魚鱗石塘雖已全竣而章家菴以西惟藉范公塘土隄一道衛護形勢單薄不足以資捍禦因先期傳諭該督撫詳晰籌畫採石鳩工兹甲辰南巡親臨指示不惜百餘萬帑金降㫖一律接築石塘俾濵海黔黎永資樂利至於髙堰之增卑易磚庚子南巡閲視髙家堰工據薩載請將三堡六堡等卑矮磚工加髙豫以磚工究不若石工之經久因命毋惜帑費一律改建石工分年修甃以兾永逺鞏固徐州之接築石堤並山丁丑壬午乙酉三次南巡均至徐城閲視河工形勢次第籌辦添甃石堤俱用石十七層以資鞏固其舊冇石工三段長九百七十餘丈較之丁丑新建石堤短少二三層於庚子南巡時命嵇璜薩載㑹勘一律加髙十七層又自韓山至奎山一帶向止土堰兹亦一律接築石堤四百五十丈直連山腳俾濵河永保安居無不籌度咨諏得宜而後行是皆遲之又遲不敢欲速之為夫臣之事君其有知不可而强諍者鮮矣河工關係民命未深知而謬定之庸碌者惟遵㫖而謬行之其害可謄言哉故豫之遲之又遲者以此而深懼豫之子孫自以為是而後之司河者之隨聲附和而且牟利其間也與其有聚斂之臣寧有盜臣在他事則可在河工則不可河工而牟利宣泄必不合宜修防必不堅固一有疏虞民命繫焉此而不慎可乎然而為君一二日萬幾胥待躬親臨勘而後剔其弊日不暇給焉則仍應於敬明理根本處求之思過半矣豫之舉兩大事而皆幸以有成者其在斯乎其在斯乎若夫察吏安民行慶施惠羣臣所頌以為亟美者皆人君本分之應為所謂有孚惠心勿問元吉豫嘗以此自朂也至於克己無欲以身率先千乘萬騎雖非扈蹕所能減而體大役衆俾皆循法而不擾民亦亟其難矣斯必有以振其綱而挈其要然後可以行無事而胥得宜實總不出敬明兩字而已故兹六度之巡攜諸皇子以來俾視豫躬之如何無欲也視扈蹕諸臣以至僕役之如何守法也視地方大小吏之如何奉公也視各省民人之如何瞻覲親近也一有不如此此可言南巡而西師之事更不必言矣敬告後人以明豫志臣等伏讀乾隆四十九年御製南巡記大哉皇言式型海㝢維時恭遇我皇上六巡江浙駐蹕行軒親灑宸翰凡先後時巡要㫖焕乎如揭日月而行仰見聖天子敬天法祖之鴻規奎章彪炳永垂萬祀矣臣等竊由御製遲速之論恭繹平定兩金川凖噶爾回部方略聖謨睿算疊奏膚功悉與記文宜速莫遲之訓相吻合臣等愚昧之見既已曠若發矇兹恭纂南巡盛典凡察吏安民行慶施惠諸大政見於省方時者至巨至隆實為曠古所未有而尤於河防海塘之修治仰窺鴻猷碩畫悉本諸宵旰之憂勤其間親臨相度指示機宜自辛未以迄甲辰行之以漸要之以久然後長慶安瀾而益臻康乂誠有如聖訓所謂宜遲莫速者而宸𠂻淵默猶兢兢於敬天明理之本原則所謂皇極之敷言是彛是訓于帝其訓者無以加兹而諸臣之稟承聖諭宣力效勤要不過是訓是行以仰副髙深于萬一爾臣等纂輯盛典成書謹遵㫖恭録御製南巡記及乾隆三十六年御製南巡盛典序冠諸簡端實足以總全書之綱領為萬世之法式云臣阿桂臣和珅臣王杰臣薰誥臣福康安臣慶桂拜手稽首謹跋御製南巡盛典序乾隆三十六年正月南巡盛典之作非朕志也兩江總督髙晉輯書既成始以入告念已成事不可止第南巡所經非獨江南也若他省踵為之不益䋣且贅乎遂下軍機大臣議則請令浙江山東直𨽻督撫録其事系南巡者裒付髙晉都為一書斯體偹而文省乃俞之越嵗而薈纂蕆事復郵進以序請朕惟南巡之典亦遹率我皇祖成憲祗奉慈寧宣祺𨗳豫而民隱遐阻以勤以安不自暇逸乃肇自冀兗達于淮海之域溯乾隆辛未以暨乙酉蓋四蒞焉於凡風土之物宜吏治之善否民生之利病既諏覽而規措之而所在耆庶婦孺臚歡祝釐前于後喁趼項相望繄兹林總親愛之誠每見益摯然敬惟聖母春秋髙而江浙經涂數千里頓置煩數非所以適頤養也爰於四巡回蹕時靣敕東南諸大吏勿更以南巡籲亦既衆喻之矣輯書者顧因是有言曰曩者鑾輅時至慶惠迭行淪浹肌髓兹臣民顒跂懇欵既弗克申則鴻典茂儀非是莫紀愷澤良政非是莫著碩畫深逺非是莫循大文炳鑠非是莫偹豫曰不然朕法祖省方承志尊飬惟其實不惟其文若夫慶賜所頒治要所舉咨度所周罔不布在詔令洽于人心而觀風察聲以時賡識大者揭諸石餘亦鋟詩文各集中尚不欲與文士競短長奚以是敷敶扢榷為哉惟是翕河遵海係於澤國民寧者綦巨朕親履相度定清口水志以衛下河培海塘坦簍以驗沙漲與夫徐州之隄微湖之閘及諸河防興作皆蘄於灑淡康乂綜而編孴之俾有司知所稽式亦固其宜且使諸有土大小吏憬然於巡守本意各慎厥職阜厥民不啻朕之入疆考詢毋忘毋怠而朕幾暇披覽及之亦不啻蒼赤之瞻就依戀時在目前則是書又未嘗不可作然朕之志實在彼而不在此序而付之剞劂則從皇祖序幸魯盛典例也恭進欽定南巡盛典表乾隆五十六年十二月初八日臣等奉𠡠纂輯南巡盛典書成謹奉表恭進者伏以乾符握健帝車運為柄之衡皇極敷彛寰庶殷近光之願省方設教象中正以大觀申命隨風取潔齊於重㢲是以負書荷劔軒裳訪道之踪刻玉披圖虞采紀逰之牒五嶽則文傳科斗禹迹方行雙魚則輯瑞竹書湯馳不越然欲嵩瀛效祉開椿笇之八旬虹電揚暉衍瓜祥之五代三千里河清海潤億姓孚顒五十年陽煦春涵六􅛍懋舉敻乎尚矣未有如今日之盛也欽惟我皇上福基姒範勤敕堯幾合運㑹世而統於元璿圖䖍鞏得位祿名以歸之夀泰策洪延疆開䓗雪之途鴈臣北嚮聲訖居風之國䳒瘴南諧業業兢兢使安益安而治益治巍巍蕩蕩非道可道而名可名蓋惟不息自强無逸作所東西朔南暨即康常厪民依雨晹燠寒時屢省時勤法駕敷天裒對升中則􅛬視髙山向海朝宗登祇則津連㭊木依京遼瀋瞻王迹於肇基祝嘏臺懷普佛光於慧照帝謂淮海維揚州之域尤切疇咨人思天日為聖人之容倍深望幸粵自辛未之嵗聚于甲辰之春四奉慈寧六繩祖武宵雅卷阿之詠車庶馬間青陽月令之辰布德和令春祺首路井㕓披三輔之圖雨蓋隨車綸綍下十行之詔歌聞夏諺自纓笏以及士民景媚春臺由齊魯而達吳越躬臨瀆澨靣授宣房定水志以瀉懸洪壩開十丈徙引河以疏倒漾沙刷幾層易三堡六堡之磚工建魚鱗而甃石相韓山奎山之土堰改鴈齒而築堤溯自絶域探源視星槎而更逺方兹巨工底績搴茭玉而無勞載蒞瀛壖實屏浙水始老鹽倉而創建三千丈列碣重門接范公塘以增修百萬金鳩材庀事東南保障耕桑樂業于嘉湖南北漲坍薪楗收功於龕赭河千里一曲波平竹箭之流海百谷之王壑淨鯷鮹之彩此皆求寧乙夜惟遲乂遲而斯合機宜所由效順寅方雖難乎難而悉臻美善者也若夫恩覃輦道惠洽編黎裕粒食于茨檐每蠲丁賦厪芻糧於袀服重賚鏹金道右鳩笻扶杖而寵沾榖帛班行鷺侣結綬而褒被璽書第詞賦于青襟榮搴桂譜軫誦絃於白屋額擴芹宫頒天上之寶書瑶華逺載起水心之延閣壁府分儲日觀雲蠻砰隱則禮成檢岱金絲玉簡淵源則道契升堂而况黜供頓之華儉惟仍舊給堊丹之費錫有頻蕃剪燭安艫匭牘必勤夫批答鋪棻綺陌湖山盡入于賡吟風麗日暄帶陽春之有腳壤韶轅頀福函夏以無方是以萬祥應圖三靈蕃祉宜蠶宜稻合春鋤秋杼以綏豐夀世夀人偕東棗西桃而獻瑞河如明鏡榮光生貝闕之宫海不揚波息浪逮麟州之水憑江魚而送喜飛章正達夫屬車快若木之凝華潢胄又添夫奕葉紀嵗陽於先庚後甲天行符三日之期宅皇心于夕惕朝乾時成合六陽之數允冝丹青流絢臚萬國之歡心翠琬鐫芳作億年之盛典臣等才慙塵代識陋扣槃展渥慶於鴻儀先豫逰而志喜扈末班于豹仗親指授而宣謨且也恭繹奎文竊揆宸念揭敬明之兩字事並大於西師頒稽式為一書典亦從夫幸魯考前次疆臣經進曽裒甲乙之編欣今兹策府重新櫽括時幾之敕分門㭊類昉自卿雲晨露之歌㫖逺詞文陋彼白鴈赤麟之瑞敬呈御覽伏候睿裁一百卷琅函增祕皇春並焕乎文章萬六載夀㝢方新華祝同深夫衢壤佇見化騰雪徼豈特江州海島被入疆有慶之隆庥從兹珍弆蘭臺庶使登岱翕河闡揚厲無前之偉績臣等無任瞻天仰聖激切屏營之至謹奉表恭進以聞進南巡盛典前編表兩江總督髙晉等謹撰附録臣等誠歡誠忭稽首頓首上言伏以哲后勤民首重巡方之大典盛王建極式昭輯瑞之隆文紀刻玉於堯年榮河焕彩考披圖於舜陛卿靄騰輝禹功載自塗山慶四方之和㑹周頌歌夫喬嶽朝萬國之衣冠並皆著美於詩書允足垂光於史冊蓋惟法天行以緯化長綿不息之神順輿望以宣猷大沛如春之澤皇王一轍今古同符非如賜酺殿庭僅綴頌揚之什銘功泰岱但傳封禪之書者也洪惟聖祖仁皇帝恩覃九有化洽三無問俗東南一德慶賡揚之盛采風江海六巡行補助之文既兩大之同流實萬年之垂裕欽惟皇帝陛下治焕重離功符出震巍巍蕩蕩仰帝德之難名繼繼承承紹鴻圖而大振纘列聖無窮之統緒丕冒海隅日出之間擴前王未有之版章宣威月竁天方而外既憲天以祇事三靈叶大順之祥爰率祖以攸行萬葉肇貽謀之善自御極之十六載暨於三十年四勤法駕敬奉安輿欣愛日之舒長洽敷天之裒對九重隆孝治偹尊養以豫慈寧五載重時巡合曕就而申華祝時則春風鼓蕩晴日暄和青旗徐展於京郊彩仗遙迎於鎮嶽經鄒魯以臨吳地道路騰歡由淮甸而蒞海邦神靈效順迓六飛之四幸欣瞻九九龍車呼萬嵗之三聲競拜雙雙豹尾則有十行溫詔施雨露以均霑五色祥雲捧絲綸而下逮天章炳焕懸日月之輝煌睿藻繽紛燦雲霞之綺麗或蠲租免賦而三年蓄積益擅豐盈或賜帑留漕而四省倉箱倍資饒裕若夫河光獻瑞開億萬年底定之勳海水恬瀾貽千百世奠安之福並荷宸謨之指畫屢蒙聖訓之周詳載圖繪以流傳著堤塘之鞏固至於燔柴望秩懷柔次及於百神賞爵褒功繒帛遞加於三老擢英才於五字講幄揆文陳大閲於六師行圍奮武通程塗於水陸𨗳先記里之車考名勝於山川用佐輿圖之志以及廷臣之奏疏大吏之敷陳莫不上達聖聰仰邀天鑒是惟我國家太和洋溢治化光昭闓澤旁流湛恩普被百數十年重熙纍洽天下同風二萬餘里納欵輸誠太平一統皇上於以上繩祖武俯順民心歡情連兾兖之區喜氣徹斗牛之域青疇緑野競傳夏諺之聲白叟黃童遍洽春臺之樂固並王謨帝典垂萬古以常新應同玊檢金函夀千秋而不朽臣等欽承俞㫖彚集纂修自畿輔而三齊越江淮而兩浙恭載四巡大典用昭萬世宏謨類分一十二門帙成百二十卷輕塵益岱祇慚蠡測管窺弱霧輸溟敢擬皋揚益之伏願璇圖永固金鏡髙懸玉軸牙籖宸覽每勤於乙夜松窗雲楝睿裁遍訪於酉陽錫御製之序文偹珍藏於琬琰彰聖朝之典則耀符采於星辰祝萬夀以無疆日升川至荷一人之有道海晏河清百福呈祥集三多而受祉九如衍慶並萬寶而登豐則近光者喜溢燕雲詎惟浙水東西嵗嵗企省方之駕被潤者澤覃魯甸不特大江南北年年懷望幸之情矣臣等無任瞻天仰聖踴躍歡忭之至謹奉表恭進以聞進南巡盛典續編表兩江總督薩載等謹撰附録臣等誠歡誠忭稽首頓首上言伏以瑞炳璿圖軒后垂裳而播化祥凝翠牒伊耆刻玊而承庥修禮器於虞書山川奠績徵豫逰於夏諺箕畢臚歡雲祇肅天乙之壇獻令傳於子籙和㑹著姬宗之憲懷柔溯自周京莫不彪彩金函泰媪賚十華之劵蜚文碧檢員靈恢九囿之符綿寶以掦徽燦縹囊而紀實從未有乾行協健乘五位而鸞輅彌勤離照懸輝馭六飛而龍光載錫如今日者也欽惟皇帝陛下巍焕崇模清寧合撰撫辰調燭暢八表之淳風握鏡陳樞萃三靈之榮貺聲教被蜵涓蠖濩亭毒均敷德威震烏滸狼㬻昄章式廓宏堂構而敬繩祖武時乃有功軫宵旰以廣裕民寧所其無逸四勤法駕溯重光以迄旃蒙載啓鑾輿繇畿輔而臨江介隆施茂浹闓澤旁霑裒盛典以成書卿靄絢赤文緑字辨奎章而錫序榮光耀錦贉牙籖固已炳炳麟麟邁岱嶺雲封之紀豈直熊熊奕奕嫓峒山虹宛之文猶復俯眷輿忱屢慰蒼黎之嚮日頻勞睿慮親籌河海之安瀾爰自庚子初春更屆甲辰紀嵗翠華重蒞歡騰萬姓嵩呼玉輅時巡慶溢九衢華祝下金隄之竹楗靈源探噶達素而西甃錦石之鱗塘巨障鞏老鹽倉以下風恬河曲龍堂偃千里之波日麗瀛壖鯷壑靜三亹之浪念絲粟皆關民力特頒少府之金謂糧芻悉本田功預截神倉之漕十行溫詔帷宫捐刻鏤之華四野熙春供億減輸將之額記法廉於屏扆鏘洋黻佩之班禮嶽瀆以琮璜砰隱淵祥之氣爰乃展隆儀而近聖道範親承懋謙德以尊師心源默契賜琅函於祕府三閣雲連增髦士於黌宫四門風動第鳬趨之嘉頌授緗簡而薇省羅英嫻虎旅於承平御玉帳而柳營講武榮分縑粟尤殷問嵗於黃衣寵賚旌題特重書年於絳老承歡寶輦三章咏麟趾之仁送喜璇宫五世衍螽斯之慶時幾敕命封章勤答於星廬仁智歸懷篇什頻宣於雲幄潄金壺而濡翰琳琅騰七曜之輝秉瑶管以摛文橐籥啓兩儀之祕敬天明理闡五十年兢業之神體物愛民垂億萬載訓行之凖蓋惟古稀天子久於道而百度惟貞首出聖人入其疆而兆民有慶仁滂施茂符川嶽之髙深典巨儀崇竝日星之焕爛有事則先庚夙駕匪惟舉以五年無私而令甲頒恩洵足超乎百代編儲金匱光華燭牛斗之躔輯彚璣囊矩範協乾坤之度有冊有典告於文人是經是程歸於皇極謹奉五六巡之隆軌續成一百卷之新書體裁悉凖乎前幀帙有恢其朔宏綱巨目玢璘鐫王㑹之圖合璧聫珠閶闔展帝車之轂紀休風於禹甸不數銀繩金薤之藏志渥慶於堯樽敻超玊匭靈書而上臣等識同窺管難以繪天地之容智類挈瓶未易測滄瀛之量仰鴻鈞之迭運新而又新欽龍德之時乘旦兮復旦快編摩之就列慚挂漏之猶多恭候睿裁敬呈御覽伏願飭蘭臺而檢校指示南針貯蓬觀以翻紬輝煌東璧從此就瞻靡懈逰萬八千嵗之春秋纂撰方新軼七十二家之紀載介純禧而益劭奏河清河晏以書祥慶聖夀之無疆賡日升月恆而拜頌臣等無任瞻天仰聖踴躍歡忭之至謹奉表恭進以聞
