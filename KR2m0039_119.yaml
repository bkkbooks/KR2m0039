body:
  text: 名勝浙江嘉興杭州烟雨樓在嘉興府城東南滮湖中吳越錢氏建澄湖如鏡萬瓦鱗次雉蝶周遭晨煙暮雨杳靄空濛漁唱菱歌與欵乃聲相間洵晴雨皆宜之境乾隆壬午御書聨曰船泛春波天上坐樓稱烟雨霽中來安瀾園在海寧州拱辰門內初名隅園前大學士陳元龍之别業也鏡水淪漣樓臺掩映竒峯怪石秀削玲瓏古木修篁蒼翠蓊鬱乾隆壬午御書額曰安瀾園曰水竹延清聫曰妙香文室花飛雨寶相圓光月印川乙酉御書聫曰筠含籟戞金石韻花湛露霏錦繡香庚子御書額曰筠香館聫曰成隂喬樹天然爽過雨間花自在香甲辰御書聨曰翁之樂者山林也客亦知夫水月乎鎮海塔院在海寧州春熙門外下臨海塘建自明季舊名占鰲塔髙一百五十尺廣周九十六尺左有平臺覆以巍榭拾級憑欄滄溟在目每逢朝潮晚汐雪浪排空洵為巨觀尖山在海寧州城東南四十六里突出海岸正當潮汐之衝凡石壩柴塘竹簍坦水各工防禦要處俱在尖山以西皇上情殷保赤靡逺不届自壬午以迄甲辰翠華幸浙必先登臨審察江海全局籌辦石塘俾瀕海黎庶永措袵席之安古稱神禹盡力溝洫何足専美於前哉壬午御書觀音殿額曰補陀應現聫曰耳觀海潮音非彼非此心源甘露品大慈大悲又御書潮神廟額曰恬波孚信聫曰池通潮汐安江裔川障東南護海門乙酉御書觀海閣額曰海濶天空聫曰臺臨上下空無際舟織往來波不興杭州府為全浙省㑹南跨吳山北兜武林左帶長江右臨湖曲山川秀麗井邑浩穰斯范仲淹所為東南巨屛者也康熙二十八年聖祖仁皇帝南巡即府治太平坊織造官廨恭建行宫我皇上法祖勤民六巡浙省大吏重修恭駐清蹕奎章焕彩雲物舒妍松棟雲楣直與浙水吳山水光奕􅑤乾隆辛未御書額曰觀風浙水曰雅宜清致又額曰熙春仙館曰明秀澄觀聫曰煙火萬家添勝概江山千里引遙情又聫曰臨憩名區欣富庶咨諏善俗識游歌乙酉御書額曰琅玕瀟照又額曰韻玉館聫曰梅香聞不厭竹靜望偏深庚子御書聫曰寧誇池館消閒暇雅意詩書悅性靈又聫曰泉石燒天趣琴書養性和又聫曰謀目惟芳潤因心得靜陪又聫曰心田净洗全如水臭觀清芬豈必蓮又聫曰圗畫竒參忩户裡筑琴響遞榻床邉又聫曰誰云城市無三島即聼松篁有八琅甲辰御書聫曰對時真愜農桑慶寧道非關聽視娛又聫曰雲白松青山自靜花香鳥語物皆怡又聫曰問景詎寧欣若繢甄心益覺慎惟幾宗陽宫在杭城新宫橋東即南宋德夀宫遺址宋時亭榭多規仿靈鷲諸勝今尚存石丈許玲瓏娟秀與飛來峯相似孝宗有題德夀宫飛來峯詩即指此石也咸淳中改為道院曰宗陽宫雍正九年重修規制宏敞為杭城道院之最觀梅古社在宗陽宫東即德夀宫别圃明時為南關𣙜使公廨建社祠曰觀梅社舊有苔梅芙蓉石相傳為藍瑛畫橅鐫於碑乾隆乙酉嵗皇上親臨審視始知梅為孫杕所畫而瑛惟畫石御製詩并記以正其訛又灑翰橅梅石恭勒碑亭甲辰御書聫曰名蹟補孫藍還斯舊觀清風况梅石寓以新題吳山大觀在紫陽山巔崇臺秀峙左江右湖近在几席而環城三十里煙火萬家與山光雲影相為映射洵一郡之大觀也聖祖仁皇帝臨幸御製詩章皇上御製吳山大觀歌又恭依皇祖詩韻俱勒石山上西湖即古明聖湖以在郡西故名西湖湖分裏外其間一嶼聳立旁無聫附是為孤山聖因寺在其南聖祖仁皇帝省方南服屢經駐蹕於此逮皇上翠華臨幸全浙臣民就寺址中界為二恭建行宫有御題八景曰四照亭曰竹凉處曰緑雲徑曰瞰碧樓曰貯月泉曰鷲香庭曰領要閣曰玉蘭館萬幾之暇即景題詠山色湖光倍增明秀矣辛未御書寺額曰超諸有境聫曰長見日華臨寶掌依然帝釋駐香臺御書行宫齊額曰明湖福地曰月波雲岫曰繡壁空青聫曰雲嵐靜對自髙秀城郭逺映餘青蒼壬午御書行宫額曰鏡治澄懷聫曰曰逰曰豫所無逸樂水樂山亦靜機乙酉御書寺額曰慈雲遍䕃聫曰嶼雲連竺境湖月澄潮音又聨曰林端浥甘露峯際現青蓮御書行宫聨曰表裡湖山含動靜虛明今古印羲娥又聫曰霽見山容凝翠黛風披水面皺氷紈庚子御書行宫聨曰峯姿濯翠入澄照鏡影含虛愜曠懷甲辰御書閣額曰文瀾曰敷文觀海又額曰月臺曰趣亭又行宫聫曰常含古往今來月不異雲容水色天又聫曰春色芳菲入圗畫化機活潑悟魚鳶又聨曰好是足山兼足水自然宜畫也宜詩又聫曰境是天然贏圗畫理含理要入精微又聫曰鏡水雲岑標道趣䡖荑嫩花繢春光又聫曰湖光檐上下山色鏡沉浮平湖秋月在孤山路口宋時有水仙王廟在蘇堤三橋之南明季移建於此曰望湖亭聖祖仁皇帝巡幸西湖御書平湖秋月匾額建亭其地前為石臺三面臨水旁構水軒蟬聫金碧當清秋氣爽水痕初收皓魄中天玻璃澄徹恍若瓊樓玉宇彈指應現也三潭印月在湖心亭南三塔鼎立相傳湖中有三潭深不可測故建浮屠以鎮之塔影如瓶浮漾水中月光映潭影分為三繞潭作埂為放生池內置髙軒傑閣度平橋三折而入空明窅映儼然湖中之湖聖祖仁皇帝御書三潭印月匾額並建碑亭于池北雷峯西照在淨慈寺北峯自九曜山來逶迤起伏為南屛支脈相傳郡人雷就居此故名雷峰吳越時建塔峯頂所謂黃妃塔也林逋詩云夕照前村見故十景有雷峯夕照之目聖祖仁皇帝御書易夕照為西照每當日輪西映亭臺金碧與山光互耀如寶鑑初開火珠半墜雖赤城霞不是過也桞浪聞鶯在湧金門外即宋時豐豫門也沿堤植桞地名桞洲上有桞浪橋聖祖仁皇帝臨幸御書桞浪聞鶯匾額並建亭構舫平臨湖曲架石梁于堤上桞絲踠地輕風搖揚如翠浪翻空春時黃鳥睍睆其間流連傾聼與畫舫笙歌相應答也雙峰插雲在行春槗湖上層巒叠嶂蜿蜒蟠結列峙爭雄而南北兩峯特為秀出每當雲氣蓊鬱時露雙尖故有兩峯插雲之稱聖祖仁皇帝御筆題額易兩峯為雙峰構亭於行春槗側春秋佳日慿欄四眺儼如天門雙闕拔地撑霄五色絪緼隨風舒卷益徴太平雲物之瑞應云斷橋殘雪出錢塘門循湖行入白沙堤第一槗曰斷橋亦曰假家槗界於前後兩湖之間水光㶑灔橋影倒浸如彩虹明鏡聖祖仁皇帝御書斷槗殘雪匾額建亭橋上每當六出飛霙葛嶺東西悉瓊林瑶樹晶瑩朗徹不啻玉山上行逮至條風將届春雪初消遙巖近岫餘光尚積洵為百榖兆豐之慶矣蘇堤春曉宋元和間蘇軾以學士出知杭州築堤湖上自南山至北山夾道植桞嗣守林希榜曰蘇公堤康熙三十八年聖祖仁皇帝臨幸御書蘇堤春曉為西湖十景之首並構曙霞亭於左榱桷凌雲簷牙浸水春時晨光初起宿霧未散雜花生樹飛英蘸波紛披掩映如列錦鋪繡攬勝者咸謂四時皆宜而春曉為最曲院風荷在跨虹橋西宋時取金沙澗之水造麴以釀官酒名麴院中多荷花稱麴院荷風國朝因其舊址平臨湖面環植芙蕖引流叠石為盤曲之勢聖祖仁皇帝親灑宸翰改為曲院風荷並構亭於跨虹橋之西軒檻玲瓏池亭􅌄窱花時香風四起水波不興緑蓋紅衣陂塘披拂穆然如見南風解愠時也南屛晚鐘在清波門外南屛山與孤山遙對層巒聳列翠嶺橫披宛若屛障凌空而中峙者為慧日峰其下即淨慈寺每當雲歸六瞑萬籟俱寂寺鐘一鳴山谷皆應康熙三十八年聖祖仁皇帝御書南屛晚鐘匾額而名山古蹟益著人寰矣乾隆辛未御書額曰正法眼藏聫曰慧日髙擎猊座自安圎覺相慈雲近接蕊幢時轉妙明機丁丑賜寺僧明中聫曰片石孤雲窺色相清池皓月照禪心花港觀魚由蘇堤第三橋曰望山與西岸第四橋斜對水通花家山故名花港因宋時廢園鑿池甃石引湖水注其中畜異魚數十種並建樓于花港之南飛甍倒水重簷接霄方池一奩清可見底揚鬐鼓鬛之狀纎悉畢陳雖濠濮之間無以踰此聖祖仁皇帝臨幸御書花港觀魚匾額建亭安奉焉雲林寺在北髙峯下即古靈隱寺晋僧慧理始駐錫於此唐宋名人多有題詠國朝重修大雄殿及諸堂宇樓閣聖祖仁皇帝賜名雲林寺皇上南巡屢經臨幸梵宇盤空香雲繞地洵為禪林最勝而宸翰留題長萹短律超邁古今宋之問白居易李紳諸人皆在下風矣乾隆辛未御書額曰鷲嶺龍宫曰湧翠披雲聫曰峯從天竺來雲根無往泉自上房出月印常圓甲辰御書堂額曰七葉冷泉猿嘯在雲林寺山門外飛來峯下峯有呼猿洞六朝時僧智一善嘯嘗畜猿山中臨澗長嘯聲振林木則衆猿畢集其下有泉清瑩寒徹沁人心脾唐時作冷泉亭于水中宋時改建於岸上今仍其舊蓮華峯在飛來峯稍西即靈鷲峯也狀如蓮華故名峯之南麓有天竺靈山教寺是為下天竺其間古蹟曰翻經臺曰夢謝亭皆宋謝靈運遺蹟曰神尼舍利塔隋仁夀年建曰三生石唐李源訪圎澤相遇處曰七葉堂隋僧真觀建曰西嶺草堂唐僧道標建曰月桂亭宋僧慈雲建曰曲水亭宋蘇軾與周燾倡和有詩曰連雲棧宋郭祥正有詩曰瓔珞泉元時所濬乾隆壬午御書寺額曰法鏡庚子摩崖御書曰秀拔曰無不竒韜光觀海從雲林寺而西山徑屈曲松篁夾道草樹䝉密晨曦穿漏如行深谷中約三四里始達韜光菴懸崖結屋勢若凌空五六月中無暑氣上至寺頂有石樓方丈正對錢江雲濤浩渺直接海亹唐宋之問詩樓觀滄海日門對浙江潮即其地也乾隆辛未御書額曰靈岑日觀庚子御書寺額曰韜光北髙峯在雲林寺後為湖上諸山最髙之峯石磴數百級曲折三十六盤乃至峯頂慿髙俯瞰羣山培塿湖水杯盂雲光倒垂萬象在下遙望浙江如匹練橫亘振衣騁目超然塵壒之表皇上御製登北髙峯極頂詩恭勒石上天竺香市天竺寺在白雲峯南晋天福間建以奉普門大士寺有上中下三院故稱三竺而上天竺香火尤盛春時逺近鄉民駢肩接踵焚香頂禮以祝豐年聖祖仁皇帝御題法雨慈雲及靈竺慈緣匾額世宗憲皇帝賜帑重建大殿御製碑文皇上南巡叠䝉臨幸乾隆辛未御書上天竺寺額曰法喜又額曰寶陀飛觀聨曰繞座法輪明寶月盈階甘雨散天花乙酉御書中天竺寺額曰法净蕉石鳴琴在丁家山當湖之西上有岡阜俯瞰全湖與北岸之烏石峯棲霞嶺相拱揖竒石林立狀類芭蕉題曰蕉石山房其下有池泉從石罅出㶁㶁作琴筑聲磴道之南有石壁髙丈許卓立如屛遂稱蕉屛內庋石牀石几瑩潤無滓可以撫琴乾隆甲辰御書聫曰明月松間照清泉石上流虎跑泉在大悲寺相傳唐元和中僧性空棲禪所山苦難得水忽有二虎跑出山泉甘冽異常因名虎跑泉宋時名祖塔院蘇軾蘇轍均有詩聖祖仁皇帝臨幸西湖御製詩二章皇上六度經臨每有題詠且叠和蘇韻於是勝蹟名泉益擅湖山之美矣法雲寺在赤山舊名慧因禪院宋元豐時僧靜源居此疏釋經義傳播逺域有髙麗國王子以金書華嚴經三百部并捨經閣之資附貢舶以進因呼為髙麗寺寺前為慧因澗乾隆丁丑嵗聖駕臨幸御書寺額曰法雲龍井在風篁嶺泉自崖腹湧出相傳有蛟龍居之唐時建寺井上宋改名夀聖院僧辨才居此與蘇軾秦觀米芾輩唱和芾書方圎菴記今存寺中內有八景為湖山佳勝之冠乾隆壬午御書額曰龍井曰湖山第一佳又額曰篁嶺卷阿曰清虛靜泰曰不著一相又八景額曰過溪亭滌心沼一片雲風篁嶺方圎菴龍泓澗神運石翠峯閣又額曰振鷺曰聽泉又池額曰浴麟曰浣花又聨曰秀翠明湖游目頻來過溪處腴含古井怡情正及採茶時又聨曰欣於所遇何空色樂在其間足古今又聫曰玉毫珠頂無離即皓月清池得證因湖山春社在金沙澗北有泉發自棲霞山涓涓下流伏榛莽中上多桃花舊名桃溪雍正九年創建祠宇祀湖山之神闢地為園遍植卉木中構髙軒恭懸世宗憲皇帝御書竹素園額右為溪流屈曲環繞作流觴亭亭西置舫齊曰臨花舫迤南為水月亭後有樓曰聚景最後為觀瀑軒為泉香室恭遇皇上春巡屢停鑾輅考正祀典廟貌聿新永為村人報賽之所焉玉帶晴虹在金沙堤上堤有槗曰玉帶槗中設三洞以通裏湖舟楫南即丁家山隔湖眺望林壑深窅恍如蓬闕槗西飛閣撑空回廊繞水朱欄畫栱金碧澄鮮橋畔花桞夾映灣環如帶宛若長虹卧波橫亘霄漢玉泉魚躍在清漣寺內泉發源西山伏流數十里至此始見甃石為池方廣三丈許清徹見底畜五色魚鱗鬛可數投以香餌則揚鬐而來吞之輒去有相忘江湖之樂泉上有亭曰洗心旁一小池水色翠緑以白粉投之亦成緑色聖祖仁皇帝賜名清漣寺皇上翠華蒞止御製詩章恭摹勒石大佛寺在錢塘門外石佛山以巨石得名相傳秦時纜船石也宋宣和間僧思淨就石鐫開佛面并露肩頂一若湧地化現滿月初升構殿覆之遂名大佛禪寺石壁下有沁雪泉四時澄徹不涸乾隆乙酉御書額曰大佛寺瑪瑙寺在葛嶺之麓舊有瑪瑙寶勝院宋髙僧智圓所居本在孤山紹興間徙築於此先是智圎於孤山課僕藝竹得泉名僕夫泉及寺徙之後元僧芳洲亦於階下開鑿得泉因名後僕夫泉水極清冽張雨有記乾隆庚子御書額曰香臺普現曰禊亭餘韻聫曰法界湛虛明梵聲指月淨因超色相幡影參風葛嶺在寶雲山以晋葛洪所居故名其巔曰初陽臺山半曰仙翁祠祠畔有丹井有寶雲泉皆稚川遺跡山有古剎二一曰智果寺吳越時建宋蘇軾守杭州延僧道潛號參寥子者居之因名其泉曰參寥泉且為撰銘一曰夀星院亦建於吳越有寒碧軒此君軒觀臺杯泉諸勝蘇軾所題夀星院四景也乾隆四十五年皇上臨幸賡和蘇韻勒石山間黃山積翠在棲霞嶺後宋淳祐間僧慧開說法吳興黃龍山後卓錫于此忽雷震有泉出洞色紺而冽人以為龍隨錫至因名黃龍洞洞中鑿石為佛像旁有禪院院前層崕聳峙長松修竹互相掩映望之蒼翠欲滴石屋洞在石屋嶺下洞口刋石屋二字稍東為小石屋刋石别院三字西北為石隩上刋滄海浮螺四字西偏有石鐫虛谷二字又一窟上通天光是為石樓四壁皆鐫羅漢像舊有僧舍遊亭乾隆四十八年稍加式廓恭偹宸覽水樂洞在煙霞嶺下四望林巒聳秀巖石蟠結有洞深窈莫測夏凉冬溫清泉自洞底出奔赴澗谷泠泠然作金石聲宋守鄭獬題曰水樂蘇軾為詩紀之其旁僧居乃吳越時所創名西關淨化院今為㸃石菴湖心平眺在外湖之中央明嘉靖間建本宋時三塔之一因其基築而廣之平臨浩漾南北兩峯左右對峙羣山遙列如屛前築石臺後啓舫軒中構層樓周遭雜植花桞雕欄畫檻金碧掩映波恬翠繞天影涵虛極水光山色之勝聖祖仁皇帝御題亭額曰靜觀萬類樓額曰天然圖畫皇上六度時巡均䝉臨幸天章稠疊即景㑹心洵愜知仁山水之趣乾隆壬午御書額曰光徹中邉瑞石洞在瑞石山麓有宋米芾書第一山三字由半山亭而上為觀音洞夀星石青芙蓉石再上即瑞石洞洞頂有飛來石旁為丁仙閣元道士丁野鶴棲真於此秀石玲瓏巖竇􅌄窱清幽徹骨空翠撲肌湖山奧區罕有倫匹六一泉在孤山西麓宋蘇軾守杭時與僧惠勤為方外交適有泉出惠勤講堂下因感懷歐陽修取以名之惠勤亦歐陽修素交也南渡後歸入延祥觀其蹟漸湮明夏時正訪得始重表之皇上六度臨幸睿藻聫翩偹有古今諸體從此歐蘇遺跡永垂不朽矣乾隆乙酉御書額曰六一泉甲辰御書額曰光明普印梅林歸鶴在孤山之隂宋處士林逋隱此構放鶴亭及巢居閣又於孤山植梅三百本嵗久不存後人補植者多今已成林早春雪霽梅花盛開輒有白鶴翩􅗁翔舞其庭聖祖仁皇帝臨幸御書放鶴二字又御臨董其昌書舞鶴賦勒碑亭上皇上六次臨幸萹詠尤富又得蘇軾題林逋詩帖真跡賡和其韻刻石亭前遂使真隱髙蹤亘數百年猶有光寵孤山從此不孤矣述古堂在六一泉左蘇軾有柏堂竹閣詩即此地也舊址久廢乾隆庚子嵗稍加葺治復其舊觀御書額曰述古堂曰柏堂曰竹閣聫曰妙悟契魚鳶風披水面澄懷凝紫翠霽見山容吟香别業在孤山放鶴亭之南舊稱勾留處前浙江撫臣范承謨去杭時取白樂天未能拋得杭州去一半勾留是此湖句書勾留處三大字揭於湖心亭後移額建亭於此亭臨方塘清瑩如鑑塘內栽荷花花時風來四面香滿一亭𬗋的緑房足供吟賞小有天園在净慈寺西慧日峯下舊名壑菴後闢為園上構南山亭以供遐眺拾級而登有幽居洞歡喜巖石壁摩崖刻米芾琴臺二字及司馬光𨽻書家人卦俱稱名蹟乾隆辛未御書額曰小有天園壬午御書額曰勝閣聫曰每聞善事心先喜或見奇書手自抄乙酉御書額曰入雲留餘山房在南髙峯隂里人陶驥别業竒石峭拔因山髙下架屋數楹上為聼泉亭泉從石罅出瑽琤不絶如奏琴筑每遇雨餘則飛瀑直注宛同匹練下瀦為池澄徹可鑑中構平橋以通步屧亭後循磴而上為流觀亭振衣俯視縈清繚白江湖皆在舄下乃南山勝地也乾隆丁丑御書額曰留餘山居壬午御書額曰聼泉乙酉御書額曰流觀聫曰鑿開石徑通雲徑搜出真山作假山甲辰御書聫曰緑桞紅桃春繪冶飛泉怪石地吟清漪園在雷峯西照亭下舊名白雲菴乾隆二十年重葺長廊繞閣鏡水通湖魚鳥親人雲山入畫一邱一壑之勝亦足助湖山秀色乾隆丁丑御書額曰漪園又額曰香雲法雨昭慶寺在錢塘門外晋天福間吳越王錢元瓘建名菩提院宋太平興國三年築萬善戒壇七年改今額天禧時僧圎净嘗倣廬山慧逺結社於此王禹稱有昭慶寺華嚴社詩國朝康熙五十二年重建倚郭面湖稱為名剎有緑野堂碧玉軒藏經閣諸蹟乾隆辛未御書額曰深入定慧敷文書院在鳯凰山之萬松嶺舊為萬松書院康熙五十五年聖祖仁皇帝賜浙水敷文匾額因名敷文雍正十一年世宗憲皇帝特賜帑金以資諸生膏火延掌教講學其中日有程課恭逢我皇上六次南巡右文臨幸御製詩章令士子恭和作人雅化洵與雲漢昭回矣乾隆御書額曰正誼明道曰養士求賢聫曰瀠洄水抱中和氣平逺山如藴藉人乙酉御書聫曰正其誼不謀其利明其道不計其功普圎院在資巖山之塢宋元嘉時僧慧琳開山吳越時號資巖院宋大中祥符間始易今名院有石筍峯髙數仭圎峭如筆亦名卓筆峯又有金沙銀沙二泉分繞左右合流為池乾隆庚子御書額曰香界霏春聫曰寶月光圎妙不可思議鬘雲香普真如是吉祥理安寺在南山十八澗舊名法雨寺緑嶂百重清泉萬轉異木靈草四時敷榮宋理宗時改為理安國朝康熙五十三年聖祖仁皇帝發帑重建置寺山千畝齊田二百餘畝御書石磬正音及理安寺匾額雍正五年御賜慈悲自在匾額寺有松巔閣法雨泉最為清勝恭遇皇上時巡每停清蹕焉乾隆辛未御書額曰樹最勝憧乙酉御書額曰識安心竟六和塔在錢塘江岸宋開寶三年僧智覺於龍山月輪峯開山建塔以鎮江潮名六和塔塔下為開化寺國朝雍正十三年奉敕鼎建乾隆十六年聖駕南巡厪念海塘親登塔頂悉江流之曲折東望龕赭二山陽侯順軌海若不驚聖情悅豫爰親灑宸翰為文紀事兼御書額凡七曰初地堅固二諦俱融三明净域四天寶網五雲扶蓋六鰲負戴七寶莊嚴分懸於塔又賜開化寺額曰净宇江天聫曰潮聲自演大乘法塔影常懸無住身潮神廟在海塘上章家菴東乾隆四十五年聖駕南巡申命築老鹽倉一帶魚鱗石工而沙性澀汕樁木難施忽有老翁言以大竹扦定沙窩同時齊下梅花樁必無搖動試之果然及尋老翁莫知所向此皆皇上勤求民瘼上格天心是以百神效靈巨工速蕆乾隆癸邜冬奉敕重修廟宇欽頒御製聫額詩章以答靈貺勒之貞珉並命將壬午御製觀海塘志事詩鐫於碑隂丁丑御書額曰保障東南聫曰神祐安瀾曲折三江潮有信人占利涉澄清萬里海無波壬午御書額曰澄瀾保障聫曰百谷歸墟澤滙江湖資利濟三亹循軌潮平龕赭慶安恬甲辰御書額曰福佑靈宣聫曰昭貺順南亹信符朓朏恬瀾安子位利普農桑鳯凰山在鳯山門外有左右兩峯綿亘數里形如鳯翥因以得名其右麓有勝果寺創自吳越由寺側取徑而上曰中峯又上曰月巖又上曰排衙石吳越錢氏所名也峯頂地平如掌舊名四顧坪乾隆乙酉御書額曰澄觀臺曰江湖曠覽聫曰花含春意冶石戴古皴竒梵村閲武樓在五雲山南地本名范村見神州古史考近志以其地近雲棲時聞梵唄改今名乾隆辛未以後翠華幸浙皆閲福建水師於觀潮樓之江滸甲辰嵗臣僚以其地沙漲水淺難於駕駛因於是村恭建行殿並重樓數楹以偹法駕臨視焉雲棲寺在錢塘江上五雲山之西舊傳山上時有五色瑞雲飛集遂名雲棲前繞大江沿江取路而入行萬竹中延緣十餘里轉入轉深山半有洗心亭為逰人憩息之所寺建於吳越時後名棲真院明季有釋祩宏號蓮池者居之復名雲棲聖祖仁皇帝南巡疊䝉臨幸御書雲棲及松雲間匾額皇上翠華頻蒞喜其地僻而幽緇流猶能守其家法吟咏之間三致意焉乾隆辛未御書額曰香門净土曰修篁深處曰南無阿彌陀佛又亭額曰悅性聫曰山深獨闢清净界竹翠常飛妙鬘雲壬午御書額曰西方極樂世界安養道場乙酉御書聫曰水向石邉流出冷風從花裡過來香浙江秋濤按浙江亦名曲江潮汐自海入江為龕赭二山所束激而為濤一日夜再至應候不爽而秋八月為尤盛祖祖仁皇帝兩幸江濵御製恬波利濟四字匾額我皇上法祖勤民疊䝉臨幸宸章璀璨照耀江潯自是川靈效順潮汐以時利涉興歌安瀾永慶焉欽定南巡盛典卷八十六
