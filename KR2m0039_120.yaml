body:
  text: 欽定四庫全書欽定南巡盛典卷八十七名勝江南江寧徐州龍潭鎮在句容縣西北八十里龍潭山背倚大江居京口金陵適中之地聖祖仁皇帝南巡恭逢行殿於此大吏重修以駐清蹕檻前烟樹仗外巖巒蒼翠葱蘢昕夕效靈而獻秀云乾隆辛未御書額曰勝攬龍蟠曰江聲潭影聫曰岡巒縈繞桑麻富洲渚參差帆槳通又聫曰三茅天際青蓮聳二水雲邊白鷺分庚子御書聫曰清風明月取無盡山峙川流用不窮寶華山在句容縣北本名華山山寺相傳為寶志道場故一名寶華明慈聖太后夢登一山皆蓮花後訪得之因於寺建銅殿秦淮水發源於此有虎山觀音洞疊石塔楊栁泉諸勝西峯有龍池一泓入石罅間聖祖南巡敕賜慧居寺皇上臨幸復蒙天章叠錫後先輝映洵為千秋盛事棲霞寺在江寧府東北山多藥草可以攝生故名攝山又以重嶺如繖名繖山南齊明僧紹隱此捨宅為寺山有三峯中峯屹立東西拱抱寺在中峯之麓唐髙宗製明徴君碑碑隂書棲霞二大字因以名寺左有舍利石塔鐫琢極工隋文帝所建也東通無量殿一泉曰品水殿東有閣翼然曰紫峯循中峯而上有千佛巖齊時隨石勢鑿成千佛旁一石曰紗帽峯上賜名玉冠其前平石曰明月臺自紫峯閣循澗而上渡春雨橋即白鹿泉昔村民逐鹿至此得之瀦以為池清泠可愛中峯之脊曰石梁旁有玲峯池絶頂為最髙峯峯下迤西矗石凌空曰天開巖北為幽居菴稍南為霞心菴為萬松山房其麗于西峯者曰叠浪崖曰德雲菴曰般若臺珍珠泉臺右層巒邃谷雲布星羅乾隆二十二年始恭建行宫於中峯之左瓦屋疏櫺不施繪藻而隂陽髙下位置天然自後聖駕時巡皆䝉臨幸幾暇揮毫篇章美富名山益增光寵矣其景之尤著者謹各綴說於後丁丑御書各名勝額曰最勝幢曰紫峯閣曰功德泉曰萬松山房曰受翠樓曰泉石自佳曰太虛亭御書行宫額曰白下卷阿曰春雨山房曰有凌雲意曰石梁精舍又亭額曰笠亭曰話山曰暢觀又堂額曰太古聫曰清泉繞砌琴三叠翠篠含風管六鳴壬午御書各名勝額曰峯翠波光曰幽居處曰乾德舍曰德雲菴曰般若臺曰練影堂曰雲片曰靜深曰峭蒨又樓額曰見山聫曰衆花勝處松千尺羣鳥喧時鶴一聲又聫曰澗筑松濤相問答峯容波態總氤氲又聫曰溪聲便是廣長舌山色常如清淨身又聫曰松間覓雲徑石罅眄壺天御書行宫額曰武夷一曲精廬聫曰蘿壁峭中尋昔句松軒勝處得今停又聫曰竒松詭石天然淨澗草山花自在芳乙酉御書行宫額曰鋪翠曰停雲又樓額曰夕佳聫曰無礙搜竒披谷靄有時延賞愛岩風庚子御筆摩崖書額曰太古又最髙峯天后廟額曰利濟安瀾御書行宫聫曰峯含畫意似懸軸澗有琴音不藉桐又聫曰樹匝丹崖空外合泉鳴碧澗靜中聞又聫曰蘿境因幽偏得趣雲峯含潤獨超羣又聫曰謀目惟芳潤因心得靜陪甲辰御書行宫樓額曰得趣聫曰氣接鴻濛開逺勢峯連青靄入髙空又聫曰不生波處心恆定大寂光天相總融玲峯池在中峯之側孤亭屼峍與石梁遙對羣山萬壑中一泓湛然可鑒毫髮御製詩云不肯瀉為瀑渟然守太初斯池千古生光矣紫峯閣在中峯之麓秀峙如錐閣在山址羣巒環繞皆軒翔聳拔西通無量殿明僧紹子仲璋依山琢大佛像皆極莊嚴峯旁舊有雲根泉清徹可鑒後于石壁間復搜得一泉飛瀑從空而下蒙御錫嘉名曰功德萬松山房在中峯之半山固多松此尤蓊蔚山風過處謖謖如萬壑鳴濤中有傑閣崇臺掩映蒼翠最為幽勝天開巖在中峯之右石壁竒峭如截中通一線仄境森沉若天開然下有大石刻六朝人所書醒石二字後為迎賔石明時楊時喬摹刻衡山􅒖嶁碑于其隂石壁上有宋徐鉉徐鍇張稚圭等題名幽居菴在中峯之右與西峯相接數楹量笏竹木環之閴若人境外坡前亂石數叢雲堆浪立獸伏鴟蹲竒怪莫可名狀階下流泉泠泠如奏琴筑拾級而登崇欄曲徑直達禹碑洞壑深幽以此為最皇上奎章叠賜永勒貞珉誠山靈之厚幸也叠浪崖在西峯之側層崖岝崿亂石錯之髙低起伏如大海潮汐波瀾萬叠崖下為見山樓前後疏窗洞達通以回廊翼以傑閣憑欄而望九松鬱然為西峯最勝之處德雲菴在西峯之麓幽篁繞屋間以喬柯清隂彌望菴臨桃花澗竒石玲瓏萬竅穿溜雨後澗水懸瀑而下屈曲環流于菴外清響泠泠自成絲竹誠西麓最勝處前岡飛翠盤空參雲翳日即九株松也珍珠泉在西峯之麓泉纚纚出石間厯澗而下相傳逰人拍手呼笑則白珠㸃㸃上浮晶瑩可玩右為般若臺明歙處士王寅得四十二章經善本乞諸名士書各一章勒石四面彩虹明鏡在三㑹殿之西向有流泉散漫無所歸乾隆二十二年始鑿為池水從桃花澗下直噴池內浩瀚瀰漫一望無際其間怪石林立錯落﨑嶔中築壩橋扶欄以渡則依山結屋就水為亭倣佛明聖湖邉風景二十七年翠華臨幸肇錫嘉名焉白乳泉在千佛嶺之東泉水清洌相傳金陵有二十四泉此其一也石壁上有𨽻書白乳泉試茶亭六字考唐皇甫冉有送陸鴻漸棲霞寺採茶詩試茶之名當起于陸羽矣乾隆四十五年守臣於泉旁敬構數椽恭邀臨幸一勺涓流得承賞鑒何其幸也燕子磯在觀音門外即觀音山餘支也一峯特起三面陡絶江中望之形如飛燕峯頂有俯江亭曠覽長江極目千里檣帆樓櫓出沒烟濤雲浪間西為永濟寺明洪武初建觀音閣傑搆緣崖半出空際繫以鐵絙登之如憑虛御風正統間復因閣建寺乾隆辛未御書磯前關帝額曰氣攝怒濤丁丑復書額曰燕子磯後湖在江寧府大平門外一名蔣陵湖一名秣陵湖一名練湖宋元嘉中有黑龍現又名元武湖孝武大閲水軍於此號昆明池周數十里六朝遺蹟頗多明初開濬置庫貯天下圖籍中有五洲浮若島嶼東西二溝流入秦淮即青溪上源也江寧府秦之秣陵孫吳改稱建業也山川渾深土壤平厚六代以來並為都邑南國提封此為最著矣乾隆辛未皇上法祖省方守臣就㑹城中織造廨署改建行宫恭備臨幸窗楹棟宇丹雘不施樹石一區以供宸憩西偏即舊池重濬周以長廊通以略彴俯檻臨流有合魚躍鳶飛之趣辛未御書額曰天闕雲搴曰風華麗矚曰三山天外聫曰聖蹟長留欣繼武慈顔有喜慶承歡又聫曰風物江山艷陽候人文都㑹太平時又聫曰喜聽豫逰徴夏諺時憑解阜協虞絃壬午御書聫曰黃屋非堯志薰絃學舜心乙酉御書聫曰詩情詎花栁樂意在農桑庚子御書聫曰隨緣堪靜㑹所遇得幽欣甲辰御書行宫各額曰緑净榭勤政堂鑑古齊塔影樓鏡中亭判春室彩虹橋聽瀑軒聫曰四壁圖書鑑今古一庭花木驗農桑又聫曰景清神謐天常泰水趣山情靜可論又聫曰竹秀石竒參道妙水流雲在示真常報恩寺在聚寶門外古大長千里也向有阿育王塔即以名寺吳時寺塔並廢晉太原中掘得舍利即其地建塔焉南唐時復廢宋祥符中重建天禧中改名天禧寺明永樂間增至九級賜名報恩嘉靖中大殿燬國朝康熙三年重修塔髙百餘丈五色琉璃照耀雲日篝燈百二十有八佛火宵然光徹逺近乾隆辛未御書額曰赤烏靈梵聫曰天半插浮圖宫殿金銀三界上雲中現忉利樓臺丹碧六朝前又御書塔額曰真入覺路化成資偹舍衛莊嚴天際丹梯攬妙鬘雲心逰萬仞空外風濤手捫星斗無上法輪壬午御書額曰吳雲香梵聫曰茂苑霏春三果同恭開鹿苑祗林現瑞一峯遙接證獅林雨花臺在江寧府聚寶山東麓梁雲光法師講經於此天為雨花故名據岡阜之巔俯矚城闉烟火萬家與逺近雲峯相間遙望江流微茫千頃其頂舊無草宋劉克莊詩一片山無草敢生是也朝天宫地即冶城相傳為吳夫差鑄劍處晉建冶城寺宋為天慶觀蘇軾有天慶觀詩明洪武重修易今名山門徑道向折為九恭逢皇上臨幸大吏鳩工改作重門直達前為三清殿後為大通明殿棟宇崇深規制巨麗乾隆甲申嵗欽奉諭㫖發帑重新石室丹臺為金陵道觀之最丁丑御書額曰妙髙崑閬壬午御書額曰含元恭化清凉山在江寧府之西北隅山據石頭城下臨大江稱金陵雄觀上有清凉寺吳順義中名興教寺唐為清凉道場宋為清凉廣惠寺蘇軾嘗捨彌陀佛畫像有贊明初改今名其嶺有翠微亭南唐時建舊藏董羽畫龍李後主八分書李霄逵草書稱三絶乾隆甲辰嵗添建行軒以俟翠罕憩息辛未御書額曰臺頂飛雲又書山嶺亭額曰翠微聫曰波心似鏡留明月松韻如簧振午風雞鳴山在江寧府城東北舊名雞籠象形也宋元嘉中徴廬山隱士雷次宗使開館聚徒教授又竟陵王子良於此集學士為四部要略其東麓則晉永康間建設道場明初改創為寺建浮圖五級前俯㑹城後瞰元武湖聖祖御題曠觀二字勒石蓋亭山之全勝具焕發奎藻中矣而日月之華益光于復旦兹山何榮遇若此其巔為北極閣祀文昌之神乾隆辛未御書寺額曰聲覺大千聫曰法身常現寶塔品空界似聞曇鉢香靈谷寺在鍾山東南舊有道林寺在獨龍阜明初徙于此改名靈谷入山門松徑五里乃至殿廡規制頗極壯麗有無梁殿不施一木壘甓空洞而成後有浮圗即寶志改葬處塔前有石泉僧曇隱所得八功德水也東有琵琶街履之有聲地本擅靈乾隆丁亥嵗復䝉聖恩以杭州宋德夀宫梅石御筆詩畫碑摹發寺供奉而名藍永煥江界矣辛未御書額曰空籟天音丁丑御書堂額曰净土指南牛首山在城南三十里雙峯角立取其形似晉王導指為天闕故亦名天闕山髙一百四十丈由山麓起石磴數百級杉檜行列殊有幽致上有虎跑泉南有芙蓉峯梅雪嶺山峯之間為梁昭明飲馬池山有石窟深不可測曰辟支洞梁武建寺因名佛窟即今洪覺寺也殿宇依山望之如畫栁泉在銅山縣東北境今鳯皇山麓頗近之其地環以連山潄以曲渚逺可損雲龍之蒼翠近可矚盤馬之嵯峩誠彭城佳境也厯次皇上南巡皆由韓莊登岸是以此地未設行宫乾隆癸卯嵗督臣奏請聖駕自萬年倉就陸至徐州閲視河工較為徑捷于適中之黃巘恭建殿廡數重以供清憩旋奉諭㫖地近栁泉其名尤雅敕易今稱逮乎翠華臨御更錫龍章遍題顔額從此山林生色亭館增輝永為東南勝地矣甲辰御書行宫各額曰春靄堂怡神室知依齊含漪館水樂庭漾影橋鳴翠亭俯緑墅聫曰苕霅溪山吳苑畫瀟湘烟雨楚天雲又御書春靄堂佛座聫曰風鈴常轉蓮花藏貝葉閒披金字經雲龍山在徐州府城南二里舊志云山有雲氣蜿蜒如龍故名東巖有大石佛又名石佛山山上為宋山人張天驥放鶴處蘇軾為之記乾隆丁丑嵗皇上親履河壖睿謨指授恩膏疊沛慶溢生民壬午守土諸臣于山麓恭構行宫以奉清蹕丁丑御書亭額曰放鶴亭又觀音殿額曰普門妙應聫曰慈雲無住莊嚴相法雨常飛清淨身又石佛殿額曰定光寂照聫曰清淨法身雲山留慧相空靈妙性水月悟前因壬午御書龍王廟額曰敕建惠佑龍王廟聫曰洪瀆導東南城安百雉交流循汴泗隄鞏雙虹又河神廟額曰彭城保障又御書行宫聫曰昔今不異觀民切來往寧因問景行欽定南巡盛典卷八十七
