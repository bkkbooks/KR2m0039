body:
  text: 欽定四庫全書欽定南巡盛典卷二十四天章御製文重修惠濟祠碑文經國之務莫重於河與漕而兩者必相資而成曩者東南之民數厪河患矣我皇祖聖祖仁皇帝亶天縱之神明乾苞坤絡瞭列指掌清蹕屢勤比隆神禹開示方略神契龜從用詒萬世無疆之休河臣稟受聖謨罔失尺寸若隄若遙隄若縷隄若月河若引河若霸若堰若閘措必其要用必其時河奏安瀾民無昏墊成績彰灼五紀于兹天庾陳紅雲帆直逹厥包織篚琛賮南金公私百貨之需船輸艦載楫交津渠溯前代南北運道逆河而上者五百餘里明季開泇河避黃河之險者三百里越我朝康熙年間開皂河以通泇復開中河以通皂漕艘出清口絶流北入中河浮於黃者僅七里遂盡避黃河五百里之險漕之利無過此時者黃河自積石龍門經豫徐東下挾淮泗交流入海勢湍悍不可禦泥濁易閼漕艘渡江逹淮黃河亘其衝其入中河也必資於黃治之之道以清淮迅激蕩滌之俾無壅沙河恆強淮恆弱則瀦洪澤之巨浸以助之交會于清口是為運道之樞紐河防之關鍵導河乂淮利漕舉繫于此瀕河迄下遊郡縣數十城郭田廬皆恃以為命司水土者恆惴惴焉清口治而河與漕胥得其理矣清江浦之涘神祠曰惠濟鼎新于雍正二年靈祝孔時孚應若響過祠下者奠醴薦牢靡敢弗肅乾隆十有六年朕巡省南服瞻謁庭宇敬惟神功庥佑宜崇報享命有司鳩工加焕飾焉夫名山大川精氣磅礴必有神焉主之經國大政芘賴生靈必有神焉相之其顧享者必其有勤民敬事之忱者也苟墮庶事而瘝厥官或穿鑿自用而失其故有弗干譴怒而罹其罰者乎政岡弗修無貽神羞敬舉乃職神錫爾極惟神式慿庶永底寧勒文貞珉用諗河臣遂為迎神送神之歌辭曰河之來兮天上晧晧旰旰兮無與抗瀰瀰兮清淮滙淪漣兮河流湝湝峩巨艑兮橫中流望靈旗兮淡淡遊桂楫兮荃橈紛弭節兮蘅皋縆絃兮考鼓爼肥牷兮式歌且舞神格歆兮福女千夫邪許兮搴長茭鞏金隄兮障彼樂郊鄂舟容與兮吳榜交溯長川兮利濟轉玉粒兮時攸賴洪濤伏兮神哉沛簫管競兮應棹歌神之留兮祥颷和紹平成兮恪蕆事飫苾芬兮虔報祀靈河翕兮福萬世恭奉皇太后駕臨金山記朕惟省方觀民先王所重時巡之典虞夏以來尚已我皇祖聖祖仁皇帝撫御九有匪居匪康以江浙地逺京畿其民文而慧文則知禮義導之善可以為天下倡慧則鮮堅持入於惡亦可以為天下倡而且財賦所出國家藏富之地也是以涉河渡江不憚數勤清蹕問風俗咨疾苦湛恩汪嵗江鄉父老至於今謳思弗諼朕臨御以來十有六年于兹蚤作寤思宵衣旰食兢兢懼一夫之不獲罔敢稍自暇逸謁盛京幸三晉巡齊魯逰河洛所在周察民隱廣敷解澤而東南士民尚未得邀清問而布愷惠良用殷然嵗辛未恭遇皇太后六帙萬夀朕將合億兆望幸之歡心以祝無疆爰敬循皇祖舊典躬奉慈輿屆春南幸上元前二日發自京師渡濟漯汶沂至黃河周覽隄工遂泛舟踰淮以逹于江採民謡詢土俗祗承慈訓屢沛殊恩維時逺邇欣愈殊音同聲秀眉黃髮扶杖而觀者耋期之叟也摳衣束帶望清塵而忭舞者官吏迎而縉紳謁也掞華摛藻陳詩而獻頌者士藹吉而民秀良也携童稚挈壺飱駢肩接踵于輦路之旁者田夫野老村嫗里媪之雜還而笑語也蓋江國之望朕耒已久而歡欣鼓舞願為聖母稱萬年之觴者其積忱非一日矣二月之望舟過大江顧瞻金山上凌太虛下瞰洪流為江南諸勝之最遂奉皇太后一登覽焉逮巡浙回舟以及江寧旋蹕先後凡三登焉侍輦周厯敬仰聖祖宸翰榜署詩篇貞珉相映其豐碑屹立于中冷之右者則康熙三十六年奉寧夀皇太后駐蹕兹山所為御製記也瞻誦之餘穆然見當日忭喜之情戀愛之意與夫士民慶豫之忱髣佛長在江聲山色間以今日觀之雖不敢云後先一轍傳有之曰豐水有芑數世之仁也洪惟我聖祖貽謀至深且逺與斯民休養生息涵育煦嫗於無窮者如膏之沃浹而彌融如水之潤濡而彌廣醖醲釀厚蒸為太和用使奕祀子孫臣民藹然親愛于山川清晏之餘即金山一行宫而繞屬車環宫扇者數十年以前於皇祖見之數十年以後又于朕奉聖母皇太后見之豈非重熙纍洽純佑命於日引月長有以得此歟皇太后聖慈覃被福德並茂母儀天下享尊養之隆與寧夀前後輝耀仰見我朝聖母嗣徽篤祜其為宫庭之盛美寰宇之鴻庥繄皇古以來所未有則是舉也實有足紹美于前徽者焉若夫江天之浩蕩風煙雲樹之鬱蒼與夫鱗昆甲族之神竒而變化雖遇目賞心偶一寄興然朕之所以俯仰而欣愜者固不在此也登開化寺六和塂記杭州月輪峯六和塔宋開寶中創建以鎮江潮開化寺其塔院也自宋以來屢燬屢復燬則有驚浪之虞復則有安瀾之慶是以雍正十三年我皇考世宗憲皇帝特發帑金命有司鳩工庀材是輪是奂越二年而告成又十有四年而朕以南巡之便親陟其頂且為之記焉蓋浙之潮人所共知為雄巨浙之塘人所共知為要害然非目擊終為耳食且沿江而來亦不辨其曲折之形也造塔巔而後審其所以稱浙江者溯流東睎又悉其亹龕赭迓溟渤頓挫渟蓄迭蕩掀激斯所以為廣陵之潮者我皇考居九重之穆清運萬宇于几席留意海塘福彼蒼赤葺新穹塔資兹佑相豫小子景仰前烈深為愛民之心既誠故為民之慮無所不至而必中其綮夫必待身悉而始圖之斯不己遲乎是皇考之聖神而豫小子瞪乎其後者也故勒貞珉以識之乾隆十有六年嵗在辛未春三月之吉御製并書浙海神廟碑文浙西地瀕海扼其衝者先海寧次錢塘錢塘距海門尚一舍而逺然天下言觀潮之竒者獨推廣陵之骨母蓋徽歙衆山水自新安江下至富陽而金衢嚴處數郡千巗萬壑復滙入錢塘出海必得海潮逆之坌涌拗怒軋盤蕩裔然後流益急而軌益順故江之歸壑非濤不為功然其北擊南蕩生民農桑之命繫焉斯恃塘堰為保障漢書注始紀郡議曹華信作塘捍潮唐書捍海隄凡二百二十四里宋元二史並志袁花諸塘之修築及石囤木匱之坊禦如世所傳斛土千錢之諺其勤且囏如此雍正八年我皇考世祖憲皇帝以海塘告成維神效靈助順特敕建廟海寧褒封秩祀用申昭報近海州縣不知有水患者二十餘年于兹然其時潮尚循北亹也乾隆辛未丁丑朕兩巡浙水登觀潮樓乃悉所為趨北亹而有軼則仁錢迤西害不可言趨南亹則蕭會諸邑之戴山者藩㰚略具猶間有侈囓之虞比年來大溜直趨中亹兩岸沙灘鱗起如左右引從民居其間川原膏沃可耕可桑曾不知白馬骨濤足以動心而䮙目夫人之情久則忘而逸則淫今之居樂土安作息者非昔之日夜怵惕懼為魚之民也耶則我皇考之深宫宵旰謀建塘以衛生靈與明神之肸蠁垂釐嘉佑是邦其何可以弗紀觀潮樓當錢塘都會之地東瞻中亹為尤悉爰視海寧祠宇之例命守臣鳩工庀材崇象設而展時事夫元氣灌輸端委相成無感弗假又何一二之可區分哉因為迎神送神歌俾肄之工祝以揭虔妥靈其辭曰赭龕閕兮翼户睋紫瀾兮蒼嶼氷夷導兮江婓扈兩旍毶㲚兮金支中樹神之來兮按部回水犀兮萬弩虹隄一線兮安堵福我民兮于昭揚詡傳芭兮鼚鼓紛配藜兮神靈雨右迎神攬若木兮留暉櫩雲解駮兮赬霞罨幃樽蠲滌兮俎腯肥聆繁會兮叶呼豨神之去兮載祈波恬羅剎兮石平磯潤千里兮涵郊圻引晦濁兮歸墟是歸式歆饗兮庶幾朝潮夕汐兮長無違右送神小有天園記謹按有關記雖為典御園仿建而作但巡故恭録於卷左淨慈面明聖兼挹湖山之秀為南屏最佳處者莫過於汪氏之小有天園蓋辛未南巡去嵗丁丑復至其地為之流連為之倚吟歸而思畫家所為收千里於咫尺者適得思永齋東林屋一區室則十笏忩乃半之忩之外隙地方廣亦十笏命匠氏疊石成峰則居然慧日也範錫為宇又依然壑庵也汪氏别業舊名激水作瀑泠泠琤琤不殊幽居洞之所聞而黃山松樹子雖盈尺有凌雲之概夭矯盤拏髙下雜出於石筍峭舊間復與琴臺之古木蒼巖􅌑瓏秀削不可言同何況云異吾於是知天地間之景無窮而人之心亦無窮境有異而人之心無有異夫此為軒為亭為磴為池為林泉為崖壑同不可厯厯手攀而足陟之者使目擊道存會心不逺則此為軒為亭為磴為池為林泉為崖壑又何不可厯厯手攀而足陟之乎昔新豐雞犬各識其户固已侈矣李德裕平泉之像巴峽寫洞庭則又務窮逺盡態極妍而不必師所可師者其意而已然吾之意不在千里外之湖光山色接接目前而在兩浙間之吏治民依來往胸中矣是為記閲海塘記隆古以來治水者必應以神禹為凖神禹乘四載隨山濬川其大者導河導江胥入于海禹之迹至于會稽會稽者即今浙海之區所謂南北互為坍漲遷徒靡常地神禹親厯其間何以未治豈古今異勢爾時可以不治治之乎抑海之為物最巨不可與江河同人力有所難施乎河之患既以隄防海之患亦以塘壩然既有之莫能己之己之而其患更烈仁人君子所弗忍為也故每補偏救弊亦云盡人事而已施隄防於河已難而况措塘壩于海乎海之有塘壩李唐以前不可考可考者蓋自太宗貞觀間始厯宋元明屢修而屢壞南岸紹興有為之禦故其患常輕北岸海寧無山為之禦故其患常重乾隆乙丑以後丁丑以前海趨中亹浙人所謂最吉而最難獲者辛未丁丑兩度臨觀為之慶幸而不敢必其久如是也無何而戊寅之秋雷山北首有漲沙痕已卯之春遂全趨北大亹而北岸護沙以漸被刷是柴塘石塘之保護於斯時為刻不可緩者易柴以石費雖巨而經久去害為民者所弗惜也然有云柴塘之下皆活沙不能易石者有云移內數十丈則可施工者督撫以斯事體大不敢定議夫朕之巡方問俗非為展義制宜措斯民于袵席之安乎數郡民生休戚之關孰有大于此者可以沮洳海濵地險辭而不為之悉心相度以期乂安吾赤子乎故于至杭之翼日即減從趲程䇿馬隄上一一履視測度然後深悉夫柴塘之下不可施工以其實繫活沙樁橛弗牢訖不可以擎石也柴塘之內可施工而倉卒不可為以其拆人廬墓桑麻填坑塹未受害而先驚吾民也即曰成大利者不顧小害然使石塘成而廢柴塘是棄石塘以外之人矣如仍保柴塘則徒費帑項為此無益而有害之舉滋弗當也于是定議修柴塘增坦水加柴價一經指示而海塘大端已具守土之臣有所遵循即隨時入告亦以成竹素具便于進止也議者或曰所損者少而全者衆柴固不如石堅何為是姑息之論然吾聞古人云井田善政行于亂之後是求治行于治之時是求亂吾將以是為折中而不肯冒昧以舉者此也踏勘尖山之日守塘者以漲沙聞後數日漲沙又增命御前大臣志石簍以驗之果然自初三日親臨塘後即命都統努三額駙福隆安立標於石簍之上以驗增長今復遣往視回奏云十日以來沙漲至五尺餘土人以為神佑斯誠海神之佑耶但丁丑以前已趨中亹者尚不可保而况今數尺之漲沙乎然此誠轉旋之機是吾所以黔識靈貺益勵敬天勤民之心也是吾所以望神禹而怵然以懼慚無奠定之良䇿也至海寧日即虔謁海神廟皇考御製文在焉因書此記于碑陰以識吾閲塘咨度者如是固不敢以已見為必當也古泮池證疑甚矣讀書之忌粗疏浮過不沉潛深造慱綜詳考執一為是譬為禾者鹵莽耕而鹵莽穫確乎其弗可也今之泮池非古之泮池歟而豫丙子過此曾有詩闢之舊詩云十里東郊舊魯城靳城安得泮池名徒以新城舊城之説橫于中遂以為新城不應有古池耳丁丑再過闕焉未證其疑兹南巡回蹕復駐曲阜廣核諸書及詢之孔氏家乘乃知古魯城即今曲阜其可證者以史記孔子葬魯城北泗上也水經注所引亦與吻合輿志稱今之曲阜為新城者蓋因宋大中祥符間移築城于東十里許明正德間因流寇兵燹仍徙還魯古址而築新城焉夫以明視宋固為新而不知以宋視古為尤新也是以統志諸書錯出者悉可按訂乃知今之曲阜縣治即古之魯城也古魯城既不舛則古泮池之與靈光舊址其不出此城章章明矣至若南北步武之數偶爾差乖大者同而小者異稽古者可以折中而弗羅縷究也豫實悔夫前詩之率爾置論不足為據也甚矣讀書之忌粗疏浮過不沉潛深造博綜詳考執一為是譬為禾者鹵莽耕而鹵莽穫確乎其弗可也茅山正偽壬午春巡將發金陵道句容徴三茅之勝而邑志率托吳越春秋禹改茅山曰會稽為兹山數典所自是援越入吳疆域紊而世代淆豫不可以辨不按史記注引越傳禹到大越上苗山苖與茅古字通而小異其為屬越則均水經注漸江條云會稽古防山亦謂之茅山别稱防者蓋以防風後至故而漸江即浙江其山𨽻今紹興境明甚若句容之茅山本名句曲亦名已山自後漢茅盈兄弟學仙于此三茅之名始著詎吳越時既逺地與紹興又絶不相蒙輯志無識者沿名竄附牽連為一謂會稽同出異名若良常秦望海江仙韭之屬二十有六實為一山且注出吳越春秋今覆全書初無是語况自紹興至句容道踰千里中隔一江三茅即號地肺安能呼吸一氣若此使其言然則方內纍纍宫霍蜀繹者疇不當名之曰崑崙岱宗乎再考江寧郡志良常秦望仙韭諸山並與句曲壤接道里可數更于紹興無涉即以所引秦望言紹興句容皆有要各自為一山未可強而合之獨于茅山乎何疑或曰會稽為古揚州鎮山後漢移會稽郡治越秦初置時本治吳焉知會稽始名之茅山不可通于句曲後著之茅山也豫得仍以吳越春秋正之其書凡六卷前吳傳三後越傳三茅山之改名會稽入越外傳不入吳內傳當時方隅所限詎不較然風馬牛哉用覼縷析之以俟後之訂山經者荆山橋記乾隆丙寅允尹繼善之請重修荆山橋越明年丁卯橋成而未有記丁丑壬午匆匆兩過之各有詩記梗槩然亦未悉其肯綮為之記也去年甲申用崔應階議濬微湖下逰乃復疏剔荆山以資宣泄茲自韓莊遵陸往徐閲河長橋所必經兼欲洞燭源委因慿輿厯覽過北山口不一里許則逮橋之北梁兩傍麥田齊橋頂漸南田漸低見跨橋有隄髙亦與橋欄齊以為南岸矣至隄始知為所除沙土積以成者實北隄也其內方為正河果深濬露石橋中間十九洞未全過水夏秋盛漲頗足容河南之隄之梁之田以次低髙與北同乃愕而吁曰有是哉橋之所以長圖容水也今束其中間為河而兩垂之餘出者棄之隄外豈資容納之計乎然南北之田以次漸髙者多與橋面濟平實亦無藉其橋之長如許也則有詩曰橋建茍非虛河疏功乃捐二者必居一于此矣因考張玉書為邑人張膽作重修橋記引周禮雨畢治道水涸成梁云云乃知此地故為沮如之鄊橋之築一所以釃巨浸一所以避泥潦疊土為路虞不固故甃以石耳按舊橋長三百六十丈已屬過甚而重修者乃至四百八十丈是甚而又甚矣舊橋所費財二萬六千餘金今所增之石梁長未至一倍而所費乃至五萬八千餘金是倍而又倍矣是以詢之尹繼善則稱承修者為張宏運後以張家馬路工侵帑治罪然督察之未詳自不能辭其責近有詠桃源耕者句云斌豈欺余者蓋受人欺蔽非斌為然尹繼善即其次矣然屢受人欺朕亦豈能以觀過知仁自解哉傳云與其有聚斂之臣寧有盜臣此朕本意也茲盜臣以他事抵罪則天網原未漏而既往不咎今亦仍置之弗問但記其詳悉如此使後之復修是橋者不便張大其事冒帑干咎而已耳雖然天下大矣萬機煩矣必待目擊而後知其當否一人之聰明所與幾何可不畏哉可不勗哉安瀾園記謹按關但有記雖為記御園仿建而作巡典事故恭録於卷安瀾園者壬午幸海寧所賜陳氏隅園之名也陳氏之園何以名御園蓋喜其結構致佳圖以歸園既成爰數典而仍其名也然則創歟曰非也就四宜書屋左右前後略經位置即與陳氏園曲折如一無二也四宜書屋者圓明園四十景之一既圖既詠至于今已厯草年也土木之工草年斯弊故就葺修之便稍為更移費不侈而一舉兩得也彼以安瀾賜額則因近海塘似與此無涉也然帝王家天下薄海之內均豫户庭也况豫繾念塘工旬有報而月有圖所謂魚鱗土偹南坍北漲諸形勢無不欲悉安瀾之願實無時不厪于懷也由其亭臺則思至鹽官者以籌海塘而願其瀾之安也不寧惟是凡長江洪河與夫南北之濟運清黃之交滙何一非豫宵旰切切關心者亦胥願其瀾之安也是則豫之以安瀾名是園者固非逰清泉石之為而實蒿目桑麻之計所為在此不在彼也重修碧霞元君廟碑記緣岱麓磴梯而上隃盤道者五十然後羾天門捫日觀岧岧嵉嵉緯星列檻垂芒若引手可摘其地正應積髙神明之隩有廟馬笵金塗雘晃赩慶霄稽水經注所載嶽頂上廟兹其故址矣而神禕翟珈笄孔睟孔愈耉鮐婦豎擎薌捧萁厥角徠輳相與喁喁請命則曰碧霞元君説者以為黃帝所遣玉女或以謂是即泰山神女往往􅏠背不合核之志乘元君封號肇自有宋大中祥符間真宗有事東封以上頂有玉女池乃易池旁石象為玉龕而祭之顧考劉禹錫送張鍊師還東嶽詩有久事元君住翠微之句是唐以前故有元君之名不自宋始彼道藏及諸家所徴姓名世系庸足深辨哉古者治神人和上下設教不為戾俗求其指歸亦曰禮由義起實以名章而已爾易曰乾天也故稱乎父坤地也故稱乎母漢郊祀歌於后土夫人曰富媪又曰媪神張宴云媪者老母之稱坤為地故名媪記言地秉陰竅於山川而泰山萬物之始陰陽之交衆嶽之宗是證以之太乙青元實為其所宜乎有生之屬齋心祗祓願揭其虔於元君而元君亦將憫共勤而錫之羡然則國家秩祀泰山之神與億兆人奔走奉事碧霞元君之神其為翼縡元化二乎一乎在周官大宗伯有各因其方之語在魯論有祭神如在之文如在云者詎誰是肸蠁荒忽不可端倪於山僅見若堂若霍於草木僅見維夭維喬之謂乎亦將因其聲容得其精爽而後著之目而成之心神人之道可接也且嶽視三公特自其秩言之今之肖象炳靈者則既蔽旒秉圭矣又安知旻旻穆穆其對越乎禕翟珈笄者不誠二而一乎以是比類而推北如元冥南如祝融西如皓靈應具有其主名正位犂然食報於方望此物此志也朕荷穹昊垂庥疊逢國慶嘉薦普淖夙事宜周是廟自辛酉鼎新距今垂三十載因徠工官往會所司支內帑金庀材增葺閎塏完緻所以答神貺所以祈神禧胥於是焉在其經始則己丑季春其藏成則庚寅孟冬也重修岱廟碑記泰山位長羣嶽稱宗最古表望最尊而有其秩之舉莫敢廢所繫於正經亦最巨逖稽詩書首紀有虞成周之世彌文懿爍隆茂大要非巡狩述職穆穆皇皇未聞輕議展采錯事數典特為嚴重凌夷汔乎霸國覬覦三五妄希受命告功其臣猶知設詞以靳之然自七十二家之説興而昭姓考瑞大號顯名鋪陳極乎遷之書相如之文世世封土作䃭瑑玉成牒甚者以上山恐傷木石以遇風雨為德未至以舉火輒應為得行祕祠蓋由柴望一變為封禪由封禪再變為神仙而汰侈益無等矣我朝監於成憲祗慎明禋洪惟皇祖聖祖仁皇帝康熙二十三年甲子廷臣有援黃帝上元封巒勒成之説為請者聖諭特下九卿等議駁甚盛典也甚盛心也朕寅承永懷蠡訓是式每逢時巡盛儀即躬祀嶽廟潔蠲將事而於登封臺紀事諸什時復長言申諭所謂便是堯舜至今存迄無可告成功日者其義庶幾質諸古皇而不易耳夫戾經者不可以不斥則準經者不可以不修方曲咫聞之士猥言易壇墠而廟庭而象設疑乎踵事非制故吳澄以五嶽之麓各立一廟謂始自唐時及考酈道元引從征記稱岱廟有三今屹峙南麓者實即昔之下廟又稱廟有漢柏廟庫藏漢時神車樂器則祀嶽於此自漢已然所從來甚逺且巡狩述職特祀也國有令典遣官齋祝䇿來告常祀也是皆於廟有専響而又何泥古之云乃者嵗庚寅為朕六十慶辰至辛卯恭逢聖母皇太后八旬萬夀於時九宇臚歡百靈介祉維岱大生秉蒼精化醇之氣用克推演鴻釐綏作我皇極而重閈周闉嵗渝弗飭靈承曷副馬爰􅓪將作擴而新之其嵗月詳嶽頂記中以是廟為太常宿縣之所因為迎神送神歌俾主者肄而落之其辭云遙參亭兮置頓帝乘青陽兮出震會東后兮前驅標天齊兮作鎮炳蕭兮馧馞傳芭兮還晉霱雲童童兮起膚寸睇肅然其神來兮肸蠁獻右迎神何九皇兮六十四民升中頌德兮欲云云羅封坎兮葅席藉禺車兮蒲輪江茅鄗黍兮紛效珍神安格兮顧歆曰豫正祀兮薦訴誾榑桑鼂采兮告慶轃秦符在握兮與物為春啿啿乎根一而衍萬兮翊我昌辰右送神陶莊河神廟碑記天成大事者必有其時事有視若易盡人力而為之然終於弗成者則以天弗助神弗相而非其時也事有視若難盡人力而為之而終於有成者則以天所助神所相而適逢其時也雖然天助也神相也無所為告之者也使時有可乘而人弗盡力而為之亦難望其有成也故舉大事者必當審事機乘時會盡人力以敬祈天助神相則庶乎奏平成之功三者不可缺一焉吾於陶莊引河益信此理之弗爽陶莊之土逼河南流近清口蓋始自宋時南徙厯元及明不知其幾何年矣於是有黃水倒漾之患於是有藉清敵黃之説然而清水常溺黃水常勝雖劼劬補苴終不能得共要領而倒漾自若也唯我皇祖聖祖仁皇帝首見及於此康熙己卯嵗南巡時即命開陶莊引河俾逺避清口以除倒灌之患誠釡底抽薪之計也其後庚辰嵗辛巳嵗壬辰甲午嵗以及雍正庚戌嵗厯任河臣屢挑屢淤於是引河之事遂置而弗論康熙己卯春於清皇祖南巡岸挑親蒞河干河導閲視形勢命口進西隔治陶莊引黃使北並河臣命於南岸築挑水壩橫截河流逼入陶莊河口因董安國開放過早隨即淤墊庚辰春刑部侍郎常綬等遵挑濬旨履勘以董安國所挑引河已淤霸亦毁壞請再寬深計長七百餘丈辛巳秋河臣張鵬翮以引河中段淤阻宜加挑濬又運南岸積土於北岸加挑新河五百餘丈其時黃河僅藉以分流不免沙停水緩壬辰甲午兩年河臣趙世顯兩次疏濬屢挑屢塞雍正庚戌北岸長出淤灘遂至大溜南趨全由故道逮乾隆己未嵗豫命大學士鄂爾泰視河仍持開引河之議而河臣河員率以為難行高斌向稱為善治河者亦以為功不易就乃創建木龍挑溜北趨圖補偏救弊之為於是引河之事更罷而無有言及者矣鄂爾泰請開引河因訪知前此不成之故遂有河頭若不迎溜河尾若不順流開放若不及時三者有一於此無能成河之議河臣髙斌正欲興辦適大水驟至不便施工逮汛水消退察看停淤形勢較前低窪恐水長易漫引河難望成功乃議遂寢建木龍於南岸以挑溜引河之然豫以為陶莊之引河不開終無救清口倒灌黃流之善䇿但南巡四次未至其地用是耿耿于懷適昨嵗東巡河臣吳嗣爵蘇州撫臣薩載各來覲因見嗣爵老病遂以薩載易之與之談及河務以為海口淤泥之説終難行至陶莊引河則必宜開而未敢必也命其抵任悉心相視及薩載之任與督臣高晉親履其地測量髙下曲直頭尾寬窄繪圖貼説以聞朕復詳酌形勢以硃筆點記往返相商者不啻數次議既定乃於去嵗九月十六日興工以今嵗二月十五日乘春汛水長之候放流入新河而舊河築攔黃壩以禦之既放之後新河順軌安流直抵周家莊始會清東下去清口較昔逺五里於是永免倒灌之患而引河之工成引河既成薩載奏河長計一千六十文其河頭原挑寬四十丈河身河尾原挑寬三十丈至三十五丈放流後續經將兩崖刷塌河頭寬至七十餘丈河身河尾寬至五六十丈河底水深一丈四五尺亦較原挑刷深六七尺云云此寶默邀新神相至舊河口既築壩堵流並於陶莊積土外添築堤以防外灘漫水及薩載工竣入覲復面諭於靳河頭下唇至第三架木龍處添壩一道為重門保障薩載曰任旋即興工亦善後最要機宜也夫自康熙己卯逮今乾隆丁酉厯七十餘嵗屢舉而未成及一舉而遂成者豈非時有可乘不可乘之殊而總賴天助神相之所致耶其能劼毖籌畫盡人力而不失事機任投艱而弗猶豫者則錫賚酬勳國家之典具在至夫天恩之賜助蓋自始事以迄成功豫實畫夜在心默叩禱謝無可言喻而河神之佑相非持建崇祠其何以顯明貺逹羣誠乎爰即新口石壩建廟妥神俾司事者春秋潔祀以邀惠於無窮並無迎神送神之辭以協律焉河之舊兮本南每灌清兮黃兼神之相兮北漸即運河兮賴永恬迎神之來兮爼豆甘於萬斯年兮恩沛覃右迎神樂河之新兮移北既避曲兮就直神之相兮南塞去清口兮無復逼送神之還兮帷幕飾於斯年兮恆戴德右送神樂按記中有河南流近清口始自宋時南徙之語未甚明確蓋宋史所稱神宗熙寧時河道南徙尋經塞治即蘇軾河復黃樓諸詩所由作也惟統志所稱金明昌時河淮并為一瀆之言為今黃河南徙之確據然彼時有宋存焉淮泗一帶非金所有地當屬之宋此因今作河復詩考訂而得者則向之所云自宋時南徙亦未為不可特未詳明言之耳因附書本記後庚子清和月御筆河復記河之復也以隄合龍隄之合龍也以天佑神助然天之佑廣大精微不可以一二事舉亦不可以一二日期神之助則有可以顯示昭靈事舉日期者此義已見於丁酉陶莊河神廟之文而今復有顯示昭靈聲應底績之貺是不可以不記儀封決口之築移金門開引河厯以年餘訖未成功亦無别法於舊冬仍為大開引河圖掣溜歸壑之為及今春二月阿桂等始有十一日兩壩自行合龍隨填壓茭土不逾數刻金門立見斷流俟十分穩固即馳報合龍之奏未數日而合龍之奏果至然所謂自行合龍之語不解何謂茲阿桂以善後大局已定來行在復命細詢之乃稱二月十一日儀封漫口未合龍以前金門尚濶三大水深十一丈餘至午時忽報順黃南壩沈墜驚往勘視則南壩掃根全勢向北移走陡與北壩接連時金門水面深止一二丈爾時見機可乘隨將合龍秸料趕緊填壓不三四刻已見斷流而掃底亦無翻花過溜若非南壩向北沈墜移走則三丈口門下掃合龍非三兩日不能完竣今機緣巧合因敗為功以兩載之勤劬收功片刻實由至誠感召天和河神默相非人力所能到更非在事諸臣所敢望云云自前嵗河決後豫無日不叩天禱神冀速合龍以佑蒼生昨初十日渡黃於香棚及陶莊河神廟更益竭誠默籲而十一日遂有兩壩自行合龍黃流順歸故道之事豈非天佑神助前記所謂適逢其時者歟豫非敢自翊誠之能感若謂能感則自前嵗至今二月初十以前豈誠之未至耶而神之顯示昭靈實不可以不志或謂陶莊在江南儀封在河南云一則不可兩處各有廟云二則此未必能及彼夫一佛而為千百億化身姑不必論即蘇東坡論韓昌黎所謂如水在地中無往不在昌黎不過文宗尚能如是而福國佑民之正神固當論其在此在彼是一是二耶及蒙庇蔭合答庥祉豫惟虔鞏孜孜日甚一日永祈安瀾之錫儀封合龍處已命建廟答貺當别有記而此陶莊實豫竭誠蒙佑之所因命樹碑紀實親書泐石一如前建廟之例時庚子嵗暮春上浣之吉也臣等伏讀御製河復記以觀天人交格之際相契甚微相感甚神有莫之為而為者蓋天之可信者理也不能違乎數也理者率其常而數不能無往復循環之變惟盡其誠以合乎天順乎理之常而因以弭乎數之變聖人所以律天時襲水土宏位育而建中和也往在壬午乙酉皇上載巡南服閲河工設木龍親定五壩水志展拓清口及嵗丙申復追溯皇祖遺迹開陶莊引河功既勤矣績亦偉矣然而九重宵旰之殷與夫成功之久蠲帑之頻則未有如儀封漫口之甚者而天人感應之捷理數契合之微亦未有如儀封合龍之顯著者惟我皇上以已飢己溺為心因物付物為法弗惜繁費弗蘄近功慎謀以圖成先幾以集事故於清蹕南臨之日已報引河掣溜之刑洎夫陶莊躬濤之期即奏漫口合龍之績其地數百里也其時不終朝也馨香感格如響應聲自非至誠之蟠乎天而際乎地窮髙極逺而測深厚則曷能轉敗為功以兩載之勤劬收功片刻有若是之捷于桴鼓者歟我皇上聖德謙沖功成弗有歸本於天歸功於神因於陶莊竭誠蒙佑之所御製記文親書泐石以對天庥以答神貺蓋誠之至者天也數之所不能變者理也臣等伏惟禹之平地成天也本乎祗承克艱舜之封山濬川也本乎溫恭允塞惟盡其誠以合乎天故有府事修和之效九功九敘之歌我皇上以朝乾夕惕之心虔鞏孜孜日甚一日蓋無時不有無事不然而於河復一記仰見大聖人心源精一即舜禹之所以感神所以無間而於成功文章之外復凜然於天人理數之徴也臣等不勝欣忭踴躍之至臣梁國治臣董誥臣曹文埴臣沈初臣金士松拜手稽首恭跋廣陵濤疆域辨枚乘七發觀濤廣陵之曲江注云廣陵國屬吳自是詠潮數典者概舉廣陵而於其封域則姑舍而未詳酈道元水經注於漸江引海水逆流江水上潮似神而非為江流兩山間濤來髙大之據亦不定云廣陵所屬自元時錢惟善試羅剎江賦始云惟羅剎之巨江實發源於太末人皆知此語始自惟善而不知惟善實祖元稹為問西州羅剎岸濤頭衝突近何如之句於是以浙江為曲江而浙江潮廣陵潮遂溷而為一矣夫乘漢人也其舉方域不能違漢制考漢書地理志廣陵國髙帝六年屬荆州十一年更屬吳所治廣陵江都髙郵安平四縣而錢塘在當時為餘杭𨽻會稽郡雖顔師古注有景帝四年屬江都之文劉敞駁其非是敞長於考訂其説必有可信則會稽之不屬廣陵明甚然以今日濤形論之揚子之潮雖亦應朝夕期候若七發所侔揣刻劃目為似神者固究於浙江之潮為近然其理又實有不可強為比附者即以乘所云弭節伍子之山通厲胥母之場而言不特越絶書所云旦食於組山畫遊於胥母其文與姑胥之臺相屬即胥山之見於史記及吳越春秋者注一以為在吳縣西四十里一以為在太湖邉皆不出今蘇州境於揚於杭又皆風馬牛不相及矣揚子固不能逺踰吳松以通潮汐具區雖連亘數郡而去海逺甚浙江之濤又安能指數百里外之湖濵而弭且厲哉是乘之言已不免相相矛質矣蓋七發之作不過文人托事抒藻之為如子虛亡是騁其贍博非必若山經地志専供考資者之脈絡分明也又唐李紳詩云揚州郭裏見潮生而蔡寬夫詩話亦以為潤州大江與揚子橋對岸瓜州乃江中一洲疑曩時大江之潮揚州固嘗見之又何必以文人怪異詭觀之辭本無確據而拘墟享帚定以廣陵古國屬之餘杭抑亦刻舟膠柱之甚矣濟水考濟為四瀆之一禹貢導沇為濟以至會汶入海不過八語而窮源至委昭垂千古為不易之恆流向嘗賦四瀆詩雖加考證祗以漢志及水經注酈道元李濓輩各持已見究之其身並未厯其地尊耳食而相齟齬蓋因濟流伏見原無定是以展轉紛岐無足怪者即如禹貢所云入於河者非濟之清流入黃也蓋即伏於黃之底所謂入也溢為滎則又見而出為滎地志所謂即滎波之滎見豫州者三伏三見此其一證然其伏見原亦無定處而無定數也東出陶邱則今之曹州又至于荷則今之荷澤縣蔡沈所謂濟陰縣自有荷派也又東北會于汶汶自有源宋樂史所云清河即今之大清河唐李賢所謂濟水東貫滑曹鄆青以入於海者也是則濟之源委實不出禹貢數語以解之者愈多而考之者愈紊乃致人但知大清河而反不知濟遂若靈瀆有不可以復求者然蓋嘗論之禹貢所言乃本然之形勢今則時代變遷伏見靡定亦理之所必有而以禹貢八語證之總不出敷土奠川之本末其紛然口舌之論偶藉以資多聞亦可即付之不求甚解亦可宋孝宗論宋孝宗之事髙宗可謂極其孝光宗之事孝宗可謂極其不孝天道好還在孝宗不宜有此豈天未垂鑒乎余謂此正所以天之垂鑒也蓋人君之孝與庶人不同必當思及祖宗不失其業兹南渡之宋祖宗之業已失其半不思復中原報國耻而區區養志承歡之小節斯可謂之孝乎且孝宗奉髙宗逰西湖已獨不共逰乎是託於娛親而私以行樂是可謂之孝乎又恐髙宗往西湖為勞于宫內肖其勝斯不更勞民而費財乎光宗受制悍婦非人類其不孝固不必責而孝宗之所以得此豈無所以致之之由乎此即天道好還所以垂鑒也稗官小乘乃謂臨安士庶皆興于孝何其見之小哉蓋此論非豫不能言亦不敢言今嵗秋將擕諸皇子往盛京明年春南巡亦必至西湖命於兩處各立碑志之以示天下之孝當以不失祖業為重而承歡養志固不在逰山玩景之小節也萬夀重寧寺碑記天得一以清池得一以寧王得一以貞天言清而地言寧清故寧也天地清寧而王以貞貞即夀也乾隆甲辰孟春六巡江浙先敕疆吏省供頓節勞費兩淮鹽政伊齡阿奏衆商籲請於天寧寺後增建萬夀寺以申忱悃且請敕賜寺名勒文以紀夫下之祝上不過以華封天保歸美君上而君之奉天子民以求萬邦黎庶之寧則未可一言盡者朕臨御四十九年率祖攸行六巡江浙計民生之最要莫如河工海防凡一切補偏救弊因時制宜之方亦既殫精勞思夙夜講求不惜數千百萬帑金以蘄一勞永逸為億兆生靈永逺安全之計兹幸南北河工自開放新河之後化險為平海塘石工依限告蕆是以年逾古稀省方問俗不敢康寧夫天以下民之寧為寧天子以天下之夀為夀遹求厥寧文王所以兢兢也惟恭則夀周書所以惓惓也兹寺之建出於商民至誠因俞所請賜額曰萬夀重寧寺蓋合萬姓之夀以為夀所以為萬夀也以下民之寧為寧所以為重寧也如是而重熙纍洽以至于萬有千嵗眉夀無疆我君民永享升平之福以迓天庥不競不絿不剛不柔敷政優優百祿是遒豈不美乎至於寶相莊嚴法輪常轉以不可思議因緣證無量無邉功德所謂天以四時循環生成萬物聖人之教迭相扶持以化成天下其道一也因勑發內廷所供佛像安奉斯寺使夫寶月金容青蓮妙相長明法藏宏濟羣生則萬民之所以為夀即天地之所以清寧又何必華封天保頌揚稱美之文乎是為記欽定南巡盛典卷二十四
