body:
  text: 河防恩縣四女寺減水壩係明臣白昻治張秋決河於四女寺涵洞鑿河分泄衛河之水至九龍口入老黃河歸海雍正八年建設石壩寬八丈壩脊髙衛河底一丈一尺乾隆二十七年河臣張師載撫臣阿爾泰奏展寬壩門三丈大學士劉統勳直𨽻督臣方觀承撫臣阿爾泰奉命查勘此壩坐當衛河頂沖分水減溜最為得力奏再行展寬一丈落低一尺六寸與下遊哨馬營減壩兩處分消以減衛漲移駐德州州判於邊臨鎮專司河捕並責成山東糧道稽查疏築嵗事增修二十八年河臣張師載撫臣崔應階因全漳歸衛以二十餘丈之河受直豫東三省之水又河流迂回曲折易漲難消奏再展十二丈共寬二十四丈較舊時加倍德州以北得收減泄之益武城縣境內地勢最窪運河兩岸坡水東由沙河滙注西由黃潞河蔡河滙注俱為運堤所隔淹浸民田嵗須開堤放水未有善䇿乾隆二十九年河臣葉存仁撫臣崔應階於東岸牛蹄窩祝官屯西岸馮家灣等三處建泄水石閘各一座運河水大下板以防倒灌深秋水落啓板以消積潦遵守章程相機啓閉黃水至清口與淮水會清水力弱不能敵黃每有倒灌之患洪湖既已停淤運道亦即受病矣運河之在黃河以北者取給于汶泇泗諸水在淮以南者取給于淮湖諸水而淮安之山阜鹽揚州之髙寶興泰東諸州縣形如釡底謂之下河一遇洪湖異漲清口宣泄不及不得不由五壩分泄以為保固髙堰計而髙寶諸湖既溢下河往往受險司河者每苦不能兼顧我聖朝保愛蒸黎奠平水土每以東南河務為要政發帑頻修我皇上睿智天錫洞矚機宜翠華南幸周厯河堧親授方略著有成效睿謨獨運永為治河金鑑乾隆四十一年挑濬陶莊引河加築攔黃大壩尤為全河關鍵仰惟皇上成矩在心多方指示煌煌聖訓無非泄淮以刷黃引湖以濟運總蘄上遊下河安流循軌四十五年南巡回蹕奉命將堰盱徐城堤岸石工一律加髙四十九年聖駕六幸江浙復諭將子堰尾土普律培厚他如攔黃順黃二壩填平塘土臨河集天然閘等處開挑引河以及添築土壩加幫縷堤凡所以籌河務而衛萬民者無不至詳且備慶德水之安瀾頌金堤之鞏固考之史册敻乎莫與京矣乾隆三十九年河臣姚立德以微湖來源缺乏近處無可挹注奏于江南徐屬之潘家屯開挖引河引黃助湖奉諭令兩江總督髙晉迅速妥辦以引黃助湖是亦有益無損之一道且潘家屯原定徐城水志消至六尺始行開放俾過水二尺入湖俟徐城志樁長至七尺以上即行堵閉非若毛城鋪于大汛水漲時開放分泄異漲可比擬照毛城鋪作法建立碎石滚壩兩牆砌石外築束水堤並鉗口草壩以為重門關鍵原為慎重啓閉一經水漲則將引渠層層堵築不致有吸溜之虞辦理工竣後將引河頭開放進水由倒勾而入過壩下注導引入湖頗資接濟並奏嗣後如遇微湖需水接濟于霜降之後桃汛以前一面奏聞一面知會江南河臣並委員來江會同豐碭廳營查明徐州水志若在八尺以下冉為開放以昭慎重徐州南岸逼近城垣北岸民居稠密河行至此一束愈加湍悍堤工在在受險乾隆四十四年奉諭將該堤卑矮處所加砌石塊次年聖駕南巡特遣大學士嵇璜兩江總督薩載查勘確估將韓家山起至石工頭止補砌石工長四百五十丈工頭二十丈計石十二層其餘砌髙十七層又自奶奶廟起至四大王廟止加髙石工長六百五十四丈加砌石三四層不等又東門外關帝廟起至拐角樓舊石工止長二百四十一丈加砌石二三層不等梓潼閣至石磯嘴止舊石工長六十一丈二尺加砌石二三層不等梓潼閣起石工外又砌碎石工長五十九丈五尺東門外至石磯嘴止上加築子堰長三百零二丈從此城郭民居均資擁護利賴無窮唐家灣倒勾引河減泄黃河盛漲之水由毛城鋪石壩下注每年伏秋大汛以徐城水志長至一丈一尺五寸開放下遊洪河濉河兩岸並下江之蕭縣上江之宿州靈璧虹縣往往受險乾隆四十二年河臣髙晉以該處水大之由皆緣唐家灣引河在徐城上遊相距有二百餘里待徐城水志長至一丈一尺五寸上遊水已逾志冉為輾轉知會刨挖又需工夫逮至開止一丈一尺五寸是以開放之後流行不及以致下遊難以容納查上遊河勢寬闊下遊徐城兩岸窄狹遡考厯年水勢如上遊唐家灣長至九尺下遊徐城志樁水長至一丈以外經酌定以唐家灣水志長至九尺五寸時即令開放循軌安流下注洪濉二河並未出槽兩岸堰工均甚穩固即定為章程以垂久逺嗣後水志以唐家灣為凖一俟長至九尺五寸即將倒勾引河開放循序下注下遊可免漫溢之虞矣黃河當盛漲時分泄之路固欲其多尤欲其近多則泄之廣近更泄之速徐州河面寬止八十餘丈形勢最窄黃河至此一束伏秋大汛水平堤岸雖上有毛城鋪蘇家山下有峰山閘等處分泄而距徐稍逺總未得隨長隨消之力徐州迤上南岸舊有天然閘減泄黃漲近而且速水由五湖入洪澤湖出清口歸海緣閘下引河年久淤墊一經開啓去路不暢經過之蕭縣宿州靈璧等州縣民田易於淹浸故未敢輕議啓放乾隆四十九年河臣相度機宜奏允將天然閘下引河一律挑濬深通以偹盛漲之年開放分泄水由引河而下各州縣民田既無虞淹浸而黃河多此分泄去路不但徐州可期永保奠安即通工亦得免危險之慮矣黃河至睢寧縣南岸有峰山龍虎山北岸有鯉魚山河行中央兩岸夾束恐致驟漲為患康熙二十三年河臣靳輔因山鑿建石閘四座以減泄黃水由焦管營入孟山等湖逹於洪澤乾隆三年循四閘故迹量加修整上遊毛城鋪等處節宣有制水非異漲不致旁泄所以黃河日漸深通暢流下注河深則閘髙現在二閘三閘俱仰於河面其頭四兩閘雖地勢稍下然亦過水無多十一年以該閘泄水無多不遇盛漲之年無庸啓放河道民田兩資禆益宿遷縣運河之十字河竹絡壩係康熙二十八年挑浚中河告成堵閉支河口之後因駱馬湖水直刷黃河北岸堤工經河臣王新命請建竹絡石壩一道以偹湖黃溢漲三十五年河臣董安國因黃水盛漲將壩衝卸題請堵築未竣三十九年經河臣張鵬翮復請堵築以禦黃河因旋閉旋衝亦未竣事四十二年聖祖仁皇帝南巡指示竹絡壩口門宜留口門北通湖南通黃運河橫亘其間形如十字故名十字河逮雍正初年黃河形勢變遷大溜北徙刷去外灘直逼竹絡壩口門灌入十字河淤墊駱馬湖河臣齊蘇勒於竹絡壩口門外建築箝口壩并汰黃壩以挑黃溜將十字河北口堵閉另於迤上之王家溝地方建造五孔石閘以便宣泄湖水俾黃河不致有灌湖之患惟黃河由竹絡壩入運勢漸湍激妨於運道河臣髙斌於乾隆六年議奏現在情形黃水入運勢盛則衝囓堤岸溜緩則淤墊運河而下遊之鹽河亦受其患且黃河勢漸北徙與運河僅隔一灘應將竹絡壩堵閉使黃水歸黃得以併力刷沙而運河又可專受上源之清水實有禆益惟是黃水常患其盛清水常患其弱又不得不權宜啓閉於一時以為補救之計若遇各省重運經臨適值清水過弱則暫啓此壩引黃以助清濟運若遇黃水過盛宿遷以下工程險要亦暫啓此壩以泄黃漲更遇清強黃弱之時又得藉以泄清以固下遊中河一帶工程閉於常以守其經啓於暫以行其權得以相濟為用庶於聖祖仁皇帝口門宜留之諭旨相符至於蓄泄啓閉之宜惟在臨時相機辦理徐城北岸蘇家山舊有明季所建石閘乾隆二十四年河臣白鍾山改建石滚壩一道長五百二十丈如遇黃水異漲由滚壩入水線引河分泄嗣因外灘淤髙不能過水三十八年豫東二省河水陡長下遊水勢驟湧各廳工程受險毛城鋪滚壩雖經開放而大河盛水未減經兩江總督髙晉展寬至十二丈以泄上遊來水其分泄之路則由荆山橋及潘家河靳家口彭家口等河入運宿遷縣迤東黃河北堤舊有朱家閘河臣靳輔挑浚運河緣與黃河逼近遂廢其閘而不用至今仍循其名乾隆五年秋汛異漲黃河坐灣頂衝直刷堤根隨水塌卸堤外運河相隔咫尺河臣下掃幫堤上緊搶護仰賴皇上洪庥保護無虞當即奏鑲做掃工二百一十丈又經加築越堤格堤重重保障逮後水勢下徙工假漸生於十一年秋汛河臣顧琮引水放淤地勢淤髙十二年河臣周學健於兜灣處疏挑引河長二百七十丈河頭下唇築壩逼溜以趨引河順性下注正河現在引河溜勢通行即值冬令水緩之時並不停淤大溜全歸引河朱家閘隄掃工程既資穩固而對岸陳家道口並迤下五堡舊有掃工之下遊俱可漸次淤閉化險為平黃河自豫省虞城縣入江南境奔騰千里至清口會淮以逹於海桃源地方居徐邳之下遊在清口之上首水勢盈聚險工較多北岸九里岡工程又為桃源之首工掃灣頂衝切近中河運道尤為險要之地厯經題建掃工以資抵禦康熙四十二年聖祖仁皇帝南巡指示方略於大王廟東上水頭建挑水掃壩又於四十四年親臨指示舊龍門處建掃壩二假以挑溜勢保護安全現在掃工長七百餘丈嵗加鑲修以禦三汛江南地窄民稠兩岸縷隄相去甚近與水爭尺寸之地黃河數里一曲掃灣頂衝恐刷坍堤岸淹浸地方勢不容已而下掃以資捍禦一有掃工則塌卸者自應鑲補蟄陷者自應加修又勢不容已而有嵗搶二修之工程黃河一灣生一險工南省黃河容易掃灣所以掃工亦多九里岡為黃河最險之工自蒙聖祖仁皇帝兩次臨工指示建築掃壩河臣遵守修防克臻平穩矣聖人所過者化所存者神隨在皆然而翠華臨幸之處指示均關機要宿遷縣皂河之夏家馬路內運外黃兩堤相隔僅三十餘丈中間空塘積水甚深素稱危險節年放淤尚未坦平乾隆四十五年恭逢聖駕南巡敕令一律填實與堤面相平掃後得此數十丈寬堤有恃無恐洵屬王道蕩平矣洪澤湖西岸祥符五瑞二閘康熙三十九年河臣張鵬翮題建原由白洋河涵洞分泄洪澤湖水入黃如湖水微弱亦可泄黃助清乾隆四十年河臣吳嗣爵以湖水缺乏籌泄黃水改由陳工東首河形宣泄自閘南束水堤至河形築堰長一千一百四十五丈閘北臨黃外灘挑倒勾岔河長四十七丈閘東開挑引河長三百八十五丈兩閘上各做鉗口壩並雁翅防風南挑河長八百一十五丈北築子堰以護縷堤四十四十一二等年黃水異漲俱行啓放桃源黃河向趨北岸之九里岡本係險工自乾隆三十六年南岸陳家道口漫溢之後溜往南趨九里岡掃工淤閉河勢即由臨河集下注該處素稱岡淺砂礓性甚堅凝橫亘千餘丈溜勢不能沖刷水行至此為之梗阻四十六年大學士公阿桂會同河臣相度情形復按土性在於北岸坐灣處奏請取直開挑引河一道長一千數百丈深以二丈為度奉旨宜速為之是年夏照估挑竣大汛水長相機啓放因勢利導河身已刷滌寬深嗣因曲家樓決口大河水涸又於臨河集上下接挑河長數千丈從此梗阻之患盡除實全河扼要之關鍵也欽定南巡盛典卷五十二
