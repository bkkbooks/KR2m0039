  text: 欽定四庫全書欽定南巡盛典卷二天章辛未浙江江南山東直隸
  hash: sha256:93c038abd621a565d6da3cc02063b92a2ec94b13065549ecff75e9aacdd8483c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_004-1a, image: WYG0658/WYG0658-0048a.png}
body:
  text: 詩入浙江境午臨於越曉勾吳一水何曽易舳艫爾界此疆人縱别民胞物與我寧殊敢忘求莫心常切且喜行程春與俱萬姓尊親盈蹕路豈辭膏澤以時敷烟雨樓用韓子祁詩韻春雲欲泮旋濛濛百頃南湖一棹通回望還迷隄栁緑到來才辨榭梅紅不殊圖畫倪黃境真是樓臺烟雨中欲倩李牟擕鐵笛月明度曲水晶宫舟過嘉興徐牽錦纜過嘉禾隱隱時聞款乃歌慢陟髙樓傳八詠獨欣舊館號三過油花香入青葱町毛芷新浮淡沱波夾岸桑林數十里果然蠶事此邦多賜浙閩總督喀爾吉善巡吳于越便中過恐悮農桑候正和完賦自緑民俗美不須重勉善催科今南巡免江南積逋二百餘萬而浙江向無逋缺特加恩蠲免本年正賦三十萬兩以示奬勵尚書梁詩正之父夀屆八旬特加恩晉封一品詩正適以扈從南還因許給假留侍甸月詩以賜之錫類榮加五色封扈隨侍養許從容膝前喜勝三特備身畔先看一子從其長子翰林梁啓心請告家居侍奉盛世祥膾炙桑梓髙年人伯仲喬松教忠優老巡方志越水吳山瑞靄濃三月溯日車駕至杭州駐蹕之作今春初度茁初恰值餘杭翠輦停展義省方欽祖烈承歡祝嘏奉慈寧三朝休養繁滋息萬里提封在户庭覽彼就瞻心實切慚兹懷保德非馨人文舊地風猶朴禮樂名邦教易型明聖湖重瞻聖藻飛來峯已送來青昌昌艷裔差無負濯濯林泉信有靈即漸風光臨上已便當觴詠賞蘭亭巡幸杭州恭依皇祖詩韻銅龍不異日詢安掖輦吳山賞大觀烟火萬家來問俗春風三月暫遊鑾承顔悅志期無忝咨吏安民要在寬秀麗湖光豈無助每成佳句亦增歡恭依皇祖吳山詩韻崇巘雜江復帶湖俯臨萬井樂亨衢百年休養三朝澤繼述豫懷凛永圖吳山大觀歌我遊名山亦已多吳山大觀今作歌興安大嶺及長白嵩泰臺麓田盤窩諸山未兼江海勝此間曠覽俱遮羅南北髙峯走龍脈蜿蜒入郡成嵯峨琳宫梵宇許居下不許牆宇盤尖螺平列坎石鎮火患風從其俗無煩訶第一峯頭縱遐矚壯哉所見真無加叶左江右湖互環抱海氣蓊匌含羲娥維水有四三已具故富魚族蛟黿鼉天吳陽候時出沒列缺豐隆相蕩摩吳顛越躓閲興廢宋遷元伐紛誵訛只賸吳山青不磨吳山大觀今作歌聖因行宫即景離宫當日詠眷阿春暮巡方此重過遙岫開雲飛翠嫩叢蘭經雨送馨多平陵塔矗玲瓏影俯瞰舟回㶑灧波陶冶惟靈欣始遇逺風何處遞笙歌檀欒修竹澗巖紆極頂軒亭俯碧湖真副其名非謬也不孤我詠則然乎請看春物因時鬯能使神心與靜俱承志宫中養天下千秋萬嵗奉慈娛放鶴亭溪亭閲古坐斯須千載孤山信不孤豈必鶴歸識丁令恰因梅放緬林逋贏將白髮還蘇守留得青山與碧湖葛嶺當前漫相傲頑仙未必及潜儒題小有天園佳處居然小有天南屏北渚秀無邊如依妙鬟雲中佳便是超然劫外仙幾曲澗泉才過雨一園梅栁欲生烟坐來拈句渾難得不落空還不涉詮淨慈寺沿緣蘇氏隄霽景斷烟低遂造白禪所閒尋碧篆題堂圍曲屏嶂地是古招提翠竹籠僧户芳蘭引客蹊巖扉如有約井木或無稽相傳建寺時木取之井中此附㑹語也䇿馬因還去鐘聲隔嶺西題敷文書院松岡回首望祗園講舍層階喜得門氣助湖山鍾逺秀道傳孔孟有真源清遊祗欲心無逸名教何非樂所存嘉爾青襟真濟濟嗣音實行勉相敦題西湖十景蘇堤春曉通守錢塘記大蘇取之無盡適逢吾長隄萬古傳名姓肯讓夷光擅此湖栁浪聞鶯那論清波湧金栁浪橋宋時在清波門外聚景國中康熙三十八年於湧金門南創建亭榭御書聖祖仁皇帝賜今額名春來樹緑隂深間關幾囀供清聽還似年明步上林圓明園四十八景中亦有是明花港觀魚花家山下流花港著魚身魚嘬花最是春光萃西子底須秋水悟南華曲院風荷九里松旁曲院風荷花開處照波紅莫驚筆誤傳新榜惡㫖崇情大禹同九里松旁有宋時麯院地多荷花遂有麯院荷風之名康熙三十八年構亭疊石為盤曲之勢風為御書匾額易麯院為曲院荷風荷雙峯插雲髙不畏風雙髻垂天衣幾縷稱身披畫師若與開生面想見淡妝濃扶時雷峯西照何處髙峯無夕照斜陽此地獨標名錢王遺跡猶堪指愛是山頭塔影橫三潭印月湛淨空潭印滿輪分明三塔是三身禪宗漫許添公案萬劫優曇現聖因平湖秋月春水初生緑似油新蛾㵼影鏡光柔待豫重命行秋棹飽弄金波萬頃流南屏晚鐘淨慈掩映對南屏斷續蒲牢入夜聲却憶姑蘇城外泊寒山聽得正三更斷橋殘雪想像銀塘積素餘湖光山色又何如近從趙北橋邊過一例風光入翠輿錢塘觀潮歌向聞錢塘潮最竒江樓憑几今觀之更聞秋壯春弗壯弗壯已匪夷所思兩山夾江龕與赭亹束長流逼東㵼海潮應月向西來恰與江波風牛馬江波畢竟讓海波回瀾退舍如求和洪潮拗怒猶未已却數百里時無何於今信識海無敵苞乾括坤浴淵魄何處無湖此處雄雄在奔騰旋蕩激蓂茁三葉及落三皆最勝日期無淹我來正值上已節晴明遙見尖山尖須㬰黯雲容作似是豐隆助海若天水遙連色暗昏倐見空際橫練索旁人道是潮應來一彈指頃堆銀堆疾於風檣白於雪寒勝冰山響勝雷砰硡礌硠礴礚紞紞哼哼吼噦噦流離頓挫無不兼回斡旁噴極滂沛地維天軸震撼掀天吳陽侯挾飛廉蛟龍鼓勢魚蟹遁長鯨昻首噓其髯榜人弄潮偏得意金支翠旗簫鼓沸忽出忽入安其危但過潮頭寂無事因悟萬里在人為持志不定顛患隨遲疑避禍反遭禍幾不見笑於舟師竹素園縱目湖山景游心竹素園社過春正麗園在湖山春社西鄰西與道俱存黛重雲根古淙鳴水樂喧沈思堪致逺得句異常言清漣寺即玉泉觀魚清漣山裏寺泉石勝其餘坐近琉璃沼言觀翡翠魚噞喁花湧浪潑剌玉濺裾遊客欣初見山僧道不如僧謂人來觀魚者擕饝以飼嘆己不如魚也舊曽見王畫內府有王淵畫魚頗得其妙可以悟莊書無慮投竿者鱗中大隱歟雲林寺水盡山幽趣轉竒中宏恰當闢檀維明珠仙露垂乎聖寺內存御筆皇祖布襪青鞋始者誰用杜甫句意僧足髙閒宜逺俗佛無揀擇曷居斯尋巖步屧吾原慣更覺雲深意與遲飛來峯歌武林山髙九十丈回巒復壑含萬象舊時靈隱今雲林靈隱寺康熙年間賜今名月地雲居虛且朗天龍八部共咨議宜有竒嵐作屏障叶調御丈夫破顔笑何須爾力勞鞅掌惟西天竺靈鷲峯彈指飛來大方廣飛來閻浮人不識碧眼胡僧識非誑叶恆河沙數無量物仍坐峯頭白毫放但看相好及手印一一不異梵銅像劫萬億不飛去鎮以佛力信無爽我來徒訝未前逢玉削雲鏤相偃仰怪石斜墜掛天紳異木倒生謝土壤猿吟鶴唳演摩訶不雜人間絲竹響竒境至此無更竒大士如如不動想賜浙江學政雷鋐衡文慎辨僞兮真兩浙湖山近八閩為汝便因養老母即斯推可教都人晷膏良苦母驕貴藜藿曽甘莫忘貧佇見賔興皆碩彥近名宜戒致諄諄翰林院侍講劉起振年一百三嵗自粵東來浙迎駕詩以賜之逮背聳隆肩來瞻路邊成名後梁灝向聞起振老於場屋乾隆元年彼已八十七嵗矣因時恩賜以進士仍命選館至十三年夀躋百嵗督撫以聞故特賜今職得夀擬彭籛人瑞今猶古經傳後繼前越都無慮逺應是地行仙題冷泉亭子不礙靜中喧看取動時定小坐忘萬緣湱然滿清聽韜光雲林境已幽韜光幽更極蜿蜒盤雲徑仰視天一隙琅玕輪尺圍過雨翠欲滳蔥蒨交風枝似掃行人迹野禽送春聲可見不可識猶嫌山寂厯間以泉淙石攀陡造其巔長烟一空白稍待烟旋消千里來几席近湖逺者江由江達海直足力不能窮結攬須㬰得譬如虛空光其通乃在寒留兹片晌興酬彼萬古客天竺寺屈曲流泉繞石林到來竺宇暢幽尋了知說法無多子且喜入山不厭深七佛總空身語意三生誰話去來今未能習靜催歸轡已聽鐘流雲外音水樂洞用蘇軾韻君不見三郎未辨涇與渭却厭絲桐淡於水又不見興公作賦强出頭目空一切低九州持示榮期髙位置擲地金石聲應流都官别開聞思竅創名水樂俗人笑俗人笑博雅人喜致使東坡契清照錢塘春月駐巡轅烟霞嶺下鳴鈞天更道東陽亦有此相去不過兩郡間偶聞謂是招在徴即景成吟亦堪喜歸來跋馬蘇公隄至今想像知音耳理安寺路盡九溪十八澗境竒三竺兩髙峯香臺聽講來馴鴿靜室安禪制毒龍法雨淙常空色相岩花放不論春冬歸鞭却恐留清戀倩取白雲一片封丁家山又名蕉石鳴琴緑蕉白石足天然勝李差桃鬬麗妍三日春光兩日雨一溪明水半溪田憑髙恰喜逢初霽望逺何妨泮曉烟鳥語泉聲間喧靜絲桐不鼓亦成連虎跑泉溯澗尋源忽得泉淡如君子潔如仙餘杭第一𫝊佳品便拾松枝烹雨前象教開兹泉眼開共傳跑得藉牛哀感通亦自尋常耳記得前身曽飲來開化寺髙嶺度南屏澗谷遵曲折出峽忽開豁川雲景復别蘭若枕石磯葱蒨扶屼􅝝佛宇既莊嚴精廬亦清潔結習未能忘隨喜試禪悅憑軒俯江濤似演廣長舌登六和塔作歌我遊西湖率三日樂矣慮非凛無逸㑹稽南望舉精禋宣命明當發清蹕穹塔鎮江久所聞到此不登孤良因振衣拾級陟其頂耳飫天籟衣濕雲海眼龍宫寂寥鎖江花雁堵香花妥之字長流寫向東月峯朝靄攬於左壯觀至是真空前那更息心安四禪杜甫添憂我添喜境移所遇理則然雲棲一碧萬竿翠雙流百折澄竹泉行盡處門徑得來登罄禮悲心佛疇咨苦行僧鐘魚守本色拳拂謝多能矮屋常妨帽明珠不斷燈蓮池家法在六字括三乘渡錢塘江斛土千錢詭就塘風恬日暖綵舟方一江吳越分疆界三月煙花正艷陽航葦誰曽見神異射潮未免話荒唐漲沙南徙民居奠海潮向逼北岸海寧仁和二邑塘工頗以為患近年來北岸漲沙潮汐南徙遂慶安瀾永賴神庥敬倍常謁大禹廟恭依皇祖元韻展謁來巡際憑依對越中傳心真貫道底績莫衡功勤儉鴻稱永儀型聖度崇深惟作民牧益凛亮天上禹廟覽古得涖稽山峻言瞻禹廟崇碑文擬衡嶽井穴達龍宫問訊傳工部栖遲遇義公錞于尋豈在窆柱恨難窮帆石終鄰誕梁梅久付空惟應敷土跡天地並鴻功蘭亭恭詠皇祖撫帖御筆真膺操戈互詆攻聖多能以不同同右軍設使瞻仙藻定早傾心拜下風自紹興一日渡江至聖因寺行宫朝辭餘暨暮錢塘片刻長江穩渡航未免情殷戀西子不殊風便送滕王快晴乍覺烘山翠弦月遙疑釣水光十畝行宫遊不足憩閒命筆玉蘭堂閲杭州旗兵承平世恐軍容弛文物邦應武備明已向㑹稱陟禹迹便教浙水詰戎兵羽林舊將今誰是州閲皇祖駐蹕杭武詩有羽林舊將分防重之句七萃材官古莫衡四十年重逢盛典行間踴躍倍常情登北髙峯極頂南北兩髙峯北勝南始捨適除天氣佳峯頭一駐馬琅霄拂仙籟吳山皆在下江海一杯水向我眼前㵼滌盡萬慮塵何有閒愁惹巡檐古作無曲髙和者寡再至韜光題壁前日坐韜光觀海窮境逺今日登髙峯韜光又平坦以此識萬理進界無止滿徒愛境致幽輒復紆畫罕嵐翠度重重徑險遵踠踠山鳥及山花夾道紛不斷松翻緑雲濤竹帶碧琅粉不厯百磴艱安知十里近山僧縱慣經和南笑而莞雲林寺二十韻靈隱古禪林佳稱乃自今康熙二十八年御賜今名佛原泯名象天與闢幽深竒絶驚初見清閒試重尋嶤巒北南峯先陟頂靜室韜光菴一開襟自內尤綜要居髙總照臨澄懷參月相對面賞雲岑稍憩塵中跡聊清物表心冷侵泉潄玉靜聽澗調琴乍啓玲瓏竅憑吹金石吟冷泉亭畔石竅人吹則鳴呼猿時踔洞招鶴早鳴隂辨茗傳初火是日偶閲採茶炮焙之法攀松驗五針洞天窮窈窕乳竇注渟涔路盡忽開豁巖攢復鬱森線光常漏日鳥道欲捫參丹閉仙人竈草生王母簪栖嵓鏨龍象