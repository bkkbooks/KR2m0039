乳何從問來脈摩娑幾千載滌蕩含光澤澄徹不受塵豈雜溪毛碧鴻漸真識味髙風緬疇昔北固山北固當年戰守衝嶤峯今見有喬松蘭舟來往才經月翠黛新添幾叠濃金山行宫即景勾吳於越省方還解澤何稽載道頒重舉明禋謁鍾阜便紆清蹕駐金山樓臺入水紅翻浪楊栁當春緑掩關逾月風光異來往摩空塔影只閒閒江寧駐蹕恭依皇祖詩韻下民疾若厪清諏晏處遑安慎一游祖德巍巍期仰法俊才濟濟切旁求試江南生監於㑹城將加録用六朝文物資憑攬數日慈寧奉豫留問俗平康宜正直無須式克用剛柔過明故宫六朝崇構早摧殘基剩明宫煙草寒木鳯已聞翔北闕明至今四百餘年且在明則猶南京也不宜荒廢至此傳聞成祖建北京時移宫殿巨材北上以備營建故柱礎石甃無恙惟木則無存或或信然蓋别有深意云石鯨無恙枕春欄胡寬巧思具重都宫殿規制無不與北京同蓋北京本取式於此猶新豐之不改市肆也鄒緝忠言信不刋諫成祖遷都者周監在殷殷監夏凛然動念慘然看報恩寺六韻路問長千里聲傳古寺鐘城頭瞻塔鳯溪口渡橋龍宛識清凉近真看瑞靄濃金輪三國始雁堵九霄重祝嘏香花列南省紳士於此建壇恭祝皇太后萬夀攄誠紳佩從慈寧無量夀長願過喬松登報恩塔作歌登塔有㑹心成句從塔下借問登時何不書攀躋應接真無暇我懷杜老登慈恩仰穿始出步步真當年筆硯誰供奉英雄未免還欺人七星北户江西流天風入耳聲颼飀金陵自昔帝王州至今遺蹟歸浮休怪底禪林標窣堵應令心空萬古愁雨花臺崇岡跋馬晚春晴憑覽遺臺觸慨情便果雲光致花雨可能末路救臺城謁明太祖陵金陵蒞止為巡方展謁龍蟠奠桂漿保護遺規崇勝國紹承家法禮前王開基洵是過唐宋繼葉無能鑒夏商形勝不須矜壯麗惟天佑德慎周防閲兵曣㬈晴午麗光春映日晶晶組練陳天塹長江稱地刋省方要務重安民放牛歸馬承平久踞虎蟠龍指顧新我適孝陵禋謁罷當時創業想艱辛登雞鳴山即事鍾阜西去堆翠崖丹梯宛聽天雞喈元武湖光上眉睫金陵春色怡胸懷江山不厭城郭占閭閻半與桑麻皆曠觀臺畔瞻天藻烈並崇峯詎可階清凉山宛然溪流反徑長青雲五里夾松篁凌虛金覽秣陵景過刻剛消貝葉香城枕石頭低野色渡連桃葉淡烟光徴名無實兼名泯參到清凉意亦忘題太平箭金陵太平門其左扇一箭飲羽又餘箭痕者二為順治年間取江寧時淡臺都統所射駐防人不忍湮其跡故常整緝存之經過朅覽輒成近體人心天命向清時江表安能一木支况復處堂仍燕樂福王于明亡之際南奔金陵仍與阮大鋮等日以聲伎為樂云豈能怒臂拒雄師膺揚三箭皆飲羽烏合千軍盡例旗應勝天山樹邊續英名長共石城垂元武湖即景雜詠太平門外進蘭舟元武湖中撰勝游款乃漁歌出蘆渚冶怡花影漾沙洲鏡涵春水一篙深白芷青蒲刺碧潯却怪橫峯礙蘭棹雞籠晴翠落波心璿池昔亦號昆明遺跡蕭齊入品評留得六朝風月在鷗波依舊照人清燕子磯當年聞說繞江瀾撼地洪濤足下看却喜漲沙成緑野烟村耕鑿久相安永濟禪院花笑軒小憩梯巖白閣靜籠户緑筠幽花事春將暮樹姿隂已稠生憐早鶯囀聊為老僧留默默和尚年一百一嵗屬念於何許雲停江水流觀音山玲瓏懸峭壁漩澓帶長江幕府遙開嶂樓船正掛䉶濤聲在几席烟景罨軒忩葦渡西來意長明珠殿釭靈谷寺六韻蕭梁靈谷寺昔據獨龍中明卜元宫址新移碧嶂東於今四百嵗不改八禪風壘甓攢雲殿雕瓊敞月宫蟠階松益翠倒井菂消紅佛地何興廢憑教萬慮空閲織機者有作皇祖勤民務早題耕織圖親看成帛者更惜授衣夫經緯絲無紊朱黃素後殊雲門土鼓始大布慢嫌粗寶華山慧居寺松徑霏花雨香臺靄法雲笵銅輝傑閣鏤玉穩蜚文寶志名長在梁皇籖尚聞芳飈舞錦卉仙籟韻瓊篔誰識隆昌舊從來名象紛澄觀忘萬慮小坐亦堪欣麥秀數日好晴催麥秀南方候早信今徴茒檐自覺收堪待蒸肆遙知價不增比隴懷新承露潤望秋欲實帶烟凝花村栁陌尋常攬愜意今朝喜絶勝髙資港孝陵未讀栁州論繼世旋看禍亂紛詎可長江恃天塹早教髙港覆舟軍金川守禦終無濟瓜蔓誅夷不忍聞一死齊黃難贖罪獨憐氣節在斯文渡江吳越巡方兩月周長江回汛木蘭舟風恬北指瓜州渡天朗西窮巫峽流花有繁紅識津口樹多佳䕃出城頭髙旻寺行宫即事塔影遙瞻碧水隈北來駐蹕又南來風光一日更春夏俯仰幾時經往回燕促殘紅㸃瑤席鶴行濃緑印蒼苔江城晼晚猶牽興隄外蘭舟且慢催過淮安檣烏五兩順瞬息將百里郡城臨清淮蜿蜒聳堞雉土堤興城齊一線束流水切近俯閭閻意外虞艱恃讓水勢不能保障惟藉此甃石費雖巨為民無惜理爰以命河臣形勢大端指歸舟相去聲設蕝稍慰勤民意叶來來司水土欽哉聆從後㫖有孚我弗問匪懈汝其矢令堅比墉母俾穿於蟻洪澤湖具區昨遙望澔汗含咸池洪澤兹重臨澒洞撼地維尾閭有籌畫駕言親閲之西瞻天無際南睎山一絲蘋末息微風濤聲萬馬馳須㬰排雪山拍岸還嵾嵳漁舟及賈舶出沒銀雲堆觀者為膽寒爾乃忘其危熱中名利人吁嘻可以思觀打魚洪湖之水納百川仰流鱗集多鱧鰱水鄉民計欲一悉打魚早見來魚船烟波浩渺舴艋集施罟潑潑羣魚急適口但取庖厨充跳身寧惜波濤失揚子銀鰣節尚早徐州秃尾未覺好鮮腥况匪性所嗜水族傷生殊不少岸旁朅覽命罷之首夏正育鯤鮞時閲髙堰壩示河臣建堤以衛民民安賴堤利設仍民受災堤存亦何濟洪洪湖實巨浸髙堰為障蔽猶虞盛漲時莫禦汪洋勢三壩建尾閭節宣原有制何人倡邪說强與安名字云開天然壩每嵗成故事吸川所不恤潦田所不許惟保石堤固河臣能事畢叶以此云稱職夫誰不能逮髙斌覺此非力排向浮議戒以鄰為壑下河實受惠但尚虞意外添壩請豫示豫謂三多多况五可輕試是與開天然實同名略異因與定恆規率視昨嵗例仍舊貫者三更新為者二三猶漲不減許可及次第下河數縣民庶免飢溺纍昨過清江浦名宦堤旁祀皆昔保堤人對民能弗愧久聞久聞黃河尾漸淤審然民瘼亟宜慮去嵗春月閲永定騎牆行水吁可懼不啻尾淤河半淤夏霖堤濆果旁騖泛濫空懷瓠子歌至今未涸憐沮洳爾時南望增戚憂未識金堤何以護兹來兩度剪黃流水由地中直東注回斡奔騰勢雄放雲梯達海須㬰赴盛漲云或時拍岸要亦歸川得其故人言紛紜難盡信解疑要在親目覩叶因思永定原無尾不疏則淤理所固九曲源從天上來宋元以後奪淮據古之黃河在齊冀為歸墟自宋元以來漸南徙奪淮水之路並行入海云齊驅赴壑有歸墟葦蕩寬深延套巨自雲梯關以下葦蕩延袤南岸為十巨北岸為十套而清口淮水暢流會黃東注趨海之勢既専攻沙之力益徑矣迥異渾流善變更去嵗過憂今始悟去嵗閲永定河有未臨先懷憂之句閲豆班集堤工中河之水來青齊漕儲浮送輸京師春常苦弱夏苦壯節宣有道貴合宜去嵗霖雨成異漲六塘達海疏泄遲河臣束手窘無䇿遂致蟻穴穿長堤哀哉吾民罹水患廬舍飄蕩田淤泥蠲租賑粟縱不惜豈始樂業免溺飢茭楗并力亟堵築宣房速就頗得之設堤本以禦民患不免衝决患益滋補偏救弊賴無隱博施膏澤何稽時臨堤東望增吁嘻桃源耕者桃源耕者存古風千畝合作衆力攻彼此借助相通融不勞長官頻課農鳴鑼召呼羣來從閭閻親睦和氣濃渡河經川舟可通閲堤䇿騎欣初逢兩浙三吳回憶中山容水態春翹經不無寄興吟題重未若兹者愜豫衷不知有漢敦厖崇泉明記豈徒鑿空寰宇如是信大公垂裳南面正巳恭但思民欲難强同力田任恤俗化隆為爾更切祈年豐過宿遷縣宿遷去嵗灾加賑早降㫖南巡春月過閭閻色未起憑與惄豫愁是皆吾赤子鳩形或伶仃露肘多藍縷叶未見切厪懷况乎親見此不亟令安全豈其勤民理加矣寧再加庶乎免轉徙承宣有職司供帳何藉爾留兹總大綱庶吏爾任使賑貸便宜行毋遺寧濫矣更戒忽遐陬惟飾經途邇回鑾忽兩月被野麥秋美民心賴以定吾亦因之喜進詢方伯臣三縣率如是見前詩謂宿遷桃源清河元氣詎易復稍救燃眉耳黃童及白叟駢肩道旁跽言謝爾莫頻尚冀歌盈止入山東境南巡經兩月北上入三齊緑重雲千頃黃滋雨一犁馳驅戒緹騎瞻就任黔黎樹影連村暗烟光羃野低寒輕栁藏絮露重草含荑回望江鄉渺無須惜解擕麥青齊麥為秋民食兹攸繫南郡處下游衆水所歸地惟恃夏收稔粗具終嵗計去嵗秋復潦拋荒耕未備春巡悉民艱切切愁弗置蠲租早施恩加帳豈稽惠回鑾重經過田功覘次第來牟撲隴青懷新暢生意民心賴以定吾意亦因慰雨北方春末夏初時强半愁腸盻雨遲獨喜今年飛絮候似逢南國熟梅期度川乍惜青山失霏隴偏欣緑麥滋却為多人跋泥淖眼前真境繪蘇詩喜晴麥禾阡陌播耕齊近逺新霑雨一犁更值快晴風日好旅人跋涉免衝泥麥秀江南見麥秀已遲春之杪江南人謂今年春寒故麥秀稍遲不然尚應早旬日青齊見麥秀正及初夏早冀北風候夙所知麥秀孟夏婪尾時更聞閩粵當此際早充餅餌供晨炊自南自北皆吾民乘時因地力作勤歉多豐少良苦辛歉為憂愁豐為欣欣不藉人慰愁亦無人分控轡見此含含者不令蹂躪馳車馬老翁鞠􅛏道旁跽停鞭一問資生計翁言昨嵗被偏災幸望麥收無麥稅謁岱廟岱宗遙望謝重登岱廟森嚴玉升升只有豐年祈帝貺愧無明德答神憑唐槐漢柏形容古時景民風氣象增迅矣三年成瞬息向來欣戚總難勝賦得麥浪非烟非水蹙紋如髙下層層卷復舒生意肯教藏化蝶祥苻瑞合兆維魚三山碧海乘風近九穗黃雲湧雪餘便泛虛舟詎憑險田農將以傲溪漁渡運河即事濃露暄曦初夏天虹橋迤邐緩鳴鞭運河重渡踰三月衛水遙源溯百泉百泉即衛源去嵗曽至其地東國漫留西去馬南風仍送北來船青郊麥秀搖晴浪所幸占秋兩省連紅杏園别館迥巡蹕閒齊書史陶偶然半刻逸無乃衆人勞紫燕營化棟頳魚簇錦濤新題成舊什邈爾憶含毫讀通鑑綱目三五以前蹟沓茫三五以後滋益詳編年事例自涑水正紀褒貶推紫陽列眉指掌示法戒四千餘年治亂彰武帳幾餘一翻閲豈因巡狩懈就將但經觸目心輒驚不為博覽供詞章雨低野繁雲傍晚濃為霖疏密復舂容清塵解熱頗宜旅飽麥滋禾實利農北地希逢慰心切南江遙望寄懷重又因盼霽歌漸石人欲奚能天盡從晴平效快霽景暄妍絶勝江鄉潤溽連最愛懷新髙下意緑疇行處緩催鞭回鑾趙北口駐蹕緑栁護堤修鄭州北名萬栁堤南巡返翠斿鏡光倐改觀去聲駒影信如流渚館聊停蹕藝齊一縱眸逺帆忩裏度永漏座中留即景思江國連程指帝州明當辰弗集預命罷龍舟節近午日有司陳競渡之戲以詰旦日食先期修省巳之恭奉皇太后南巡回鑾之作凊溫序乍更春夏往返程將歷六千法祖娛親殷念遂省方問俗惠心宣所期赤縣足衣食頗慮南邦尚管弦百嵗修和匪易致勤思保泰益欽旃欽定南巡盛典卷二
