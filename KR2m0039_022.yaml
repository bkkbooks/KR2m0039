  text: 欽定四庫全書欽定南巡盛典卷十三天章乙酉浙江
  hash: sha256:9e34c779e0f3fdef6a12af0b815db705cdd248b33e8539823018e853a81f38cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_022-1a, image: WYG0658/WYG0658-0235a.png}
body:
  text: 詩入浙江境一川不異舟兩省頓分郵風俗漸因别桑麻較更稠春晴真是暢三載忽如流祗覺民情切惠鮮可忘去聲謀題煙雨樓岩嶤無地起樓臺一棹宛從鏡裏來問孰宜烟更宜雨合稱惟柳復惟梅韶光艷裔為屏匝漪影空明映座開錢趙王孫詩與字樓中有錢陳羣書趙孟頫耕織圖詩屏却因吟翫乆延陪降㫖免浙省所有積欠並經過地方正賦十分之五詩以誌事新正降恩諭江浙免積逋江省數實多前降㫖免江浙逋賦江南至一百四十餘萬浙江止十三萬餘已不及十分之一且又報有續完則較江省更少南北已大殊因加惠江南昨經臨江省詢知所免災緩積欠淮北獨多江以南纔三萬餘因將江蘓各属熟田未完欠項概行蠲免並免水陸所經州縣本年額賦十分之五浙省亦吾赤子懐保同殷且積欠又少用是并例不應蠲之未完銀糓悉予豁除復將經過地方新賦蠲半以均惠澤浙省可忘乎入疆再諮詢逋祇江南如更有續完者急公益加予漕欠及借項寛免例所無此豈非在民爰概與豁除其經過正賦十五蠲厥租休助庶以副歌頌寕所圖賜閩浙總督蘓昌楚粤曽宣績浙閩兹撫封外中乆敭歴聲望益舂容早是心如水應知夀比松自當随蹕輦奕葉本從龍賜浙江巡撫熊學鵬西江儒素家兩浙撫安衙清慎勤無忝猷為守有嘉淳風原在樸佳景漫求加識我慇懃意由來在漲沙自石門縣䟦馬度城易輕舟至陳氏安瀾園即景襍詠艤舟䟦馬度由拳心喜觀民緩著鞭更有閲塘予正務遂循溪路易輕船夾溪萬姓喜迎鑾桑柘盈郊入畫看廿四槳過風㠶去聲駛片時新壩到長安即壩名壩隔髙低換綵舟綵舟致重櫓聲柔仍圖迅利筞予馬蓄眼韶光靣靣酬塩官三載重經臨兩字安瀾實厪心駐輦春風棄清暇果然城市有山林駐陳氏安瀾園疊舊作即事雜詠六首韻如杭第一要籌奠海塘瀾水路便方舸前巡抵杭城由陸路赴海寕閲塘今年舟次石門即從别港水道前進先駐是園取便程急先務也江城此税鞍汐潮仍似舊宵旰那能寛増我因心懼慙其載道歡隅園城角邉新額與重懸意在安江海心非耽石泉喬柯皆入畫好鳥自調絃有暇詩言志雕蟲不尚妍塩官誰最名陳氏世傳清詎以簮纓嚇惟敦孝友情春朝尋勝重去聲聖藻賜褒明原任大學士陳元龍請老時奉園皇考書賜林泉耆碩額以寵其行今恭樓正中來日尖山詣祈庥盡我誠書堂橋那畔熟路宛知尋既曲越延趣惟幽不礙深風翻花動影泉出峽留音古栝無榮謝森森青玉針園以梅稱絶盤根數百年古風度迥别時世態都捐春入香惟浄月來影亦娟閒吟將對冩消得意為延溪泛櫓聲柔溪涯有竹修獺時看伏翼是園水中有獺魚並育槎頭似此真佳處無過信宿留觀塘吾本意詎可恣遨逰謁海神廟瞻禮疊舊作韻庚辰之嵗潮趨北柴石塘工重去聲事修亟籲施仁斯益切不更平聲為患即貽庥漲沙雖縱聞増渚汛水無過幸晏秋廟貎欽崇緬皇考中亹未復祗懐愁賜浙江學政錢維城化民惟在學取士要通經詎在工文采還當屏濫形湏懸虚鑑朗莫負舊氊青扈蹕常賡韻何殊侍内廷命添建海寕縣城石塘前坦水石詩以誌事柴石兩塘工前巡大端定前巡閲視海塘時有以老塩倉一帶柴塘恐難經乆請易柴為石者及親臨度視則塘内沙活不可下樁再移内移十丈雖工作可施勢必毀棄田廬未弭患而先殃民又豈保衛之道因决意修築柴塘勅部議増薪值俾採購裕足並命添置坦水簍石捍䕶隄根兹來重相視事無不用敬念兹古縣城萬民所托命城南即石塘魚鱗固綿亘但潮今北趨已近塘根迎坦水縱両層潮來惟一賸設使乆盪激塘根將致病去嵗雖添建六十丈而竟尚欠乆安筞俾増一律稱去嵗撫臣請建坦水六十餘丈止就險要而言于全塘形勢尚未籌及因命増建四百六十餘丈並視二層舊坦之樁殘石缺令補易繕完使䕶塘根永資鞏固殺去聲勢䕶石工費帑吾寕聼何當復中亹額手斯誠慶賜浙江督撫及其属吏食詩以言志入疆雖曰慶土地豈其宜嘗謂孟子此言或可行于其時實難行于千古然奪彼與此即當時亦覺難行且若皆宜慶者將以何地與之聊以肆筵惠酬斯執役疲所嘉民弗課實慰我深思休養富而教朂哉賢有司塘上三首尖山將往閲潮淤塘上清晨發歩輿一帶堤根皆囓水撫斯安得暫心紓魚鱗誠頼此崇隄隄裏人家屋脊齊土備却稱守重障土備塘海望所修欲以為重関保障夫石塘外如果可為重障尚可今為之塘内且置人家于外豈有土更堅于石之理譬之防盗者舎墻門而扃屋扉甚無足取也一行遥見枊烟低竈户資生釜海存刮沙煎滷事牢盆茅棚蓽竇何妨覽欲悉吾民衣食源登尖山觀海岧嶤浄土普門憑觀海因之棧道登愧我敢云希績底奠兹惟是頼仁能臺臨上下空無際舟織往來波不興俯視塔山資射浪謾言沙漲有明徵視塔山誌事疊舊作韻並示地方督撫及司事者壬午視塘後沙漲伸如翼不乆復致坍溜仍塘根逼自兹月據報壩基下有䕶根石簍前巡臨閲時沙漲掩簍㾗四尺許因命標誌其處騐増漲尺寸浙撫每月奏報時緩亦時急即今石簍下又見漲沙立較之昔立標乃更増五尺沙漲時有贏縮兹親臨勘騐較舊誌復増五尺大吏皆謂江海效靈然坍漲靡常實不敢即以為慰也效靈漫致頌安保無更易夫惟君與臣均有安民責為民籌保障可弗此心悉何時沙坂堅魚鱗易條石惟俟天黙佑斯實乏良䇿閲海塘再疊舊作韻依舊潮頭近逼塘貽謨昔日計深良自乾隆戊寅後潮勢復漸趨北亹恃魚鱗大石塘及坦水竹絡壩為鞏䕶益仰實為皇考定制萬世永賴成規敬守修柴石先是建議者擬易柴塘為石工壬午親臨相度塘下活沙既汕澁不受樁而内徙又妨田廬因命専修柴塘且増料傎其條石各工随宜加甃俾資桿禦古語誠符變海桑南坍北漲北坍南漲惟浙省為然盖無百年不易之事思復中亹亦過平聲望便由故道敢私慶盡人事俟神庥耳蒿目一勞念未遑觀潮四首鎮海塔傍白石臺觀潮那可負斯來塔山濤信湏臾至羅刹江流為去聲倒迴槖籥堪輿呼吸随混茫太古合如斯伍胥文種誠司是之二人前更属誰候來底藉鳴鷄伺朔望六時定不差斫陣萬軍馳快馬飛空無轍轉雷車當前也覺有竒訝閙後本來無事仍我甫廣陵辨方域枚乗七發觀濤廣陵之曲江注未詳其所在後世乃指浙江為曲江以浙江濤廣陵濤溷而為一盖未深考漢書地理志餘杭属㑹稽而不属廣陵相習傳譌耳且如篇内伍子之山胥母之場並在吳境于揚于杭皆風馬牛不相及尤難强為比附因作廣陵濤疆域辨以正之漫重七發述枚乗至杭州詣皇太后行宫問安有作鹽官先往為籌塘舊路安舟奉夀康百里郵程至卓午兩朝食履慶増常撫兹鄽市誠殷富益為去聲黔黎計乆長咫尺西湖清且麗承歡雅足答韶光恭依皇祖巡幸杭州詩四疊韻深宫晏處敢求安吏治民生厪省觀寕海未兹駐巡駕海寕先彼莅鳴鑾魚鱗塘欲石圍固魚鱗大石塘屢接築以期鞏固雁字灘希沙漲寛此是來遊最要務詎縁山水覔清歡賜錢陳羣王帖一旬猶過之羲之帖足下今年政七十耶陳羣今年八十嵗故云來迎喜重去聲晤龎眉杖朝足領羣仙列從政仍教一子随陳羣子汝誠適扈蹕來商𣙜古今闗治亂咨詢風物度淳漓我閒却是卿無暇合為去聲催賡攬勝詩韻玉館杭州行宫内前度教栽竹今來萬个强故知功獲倍南方種竹最易北地所不逮也恰與嵗俱長安得三庚至坐披滿意凉清風簷際度彈是子登琅策馬登吴山策馬登吳山撫今並攬古金主寄遐懐宋帝守偏宇離宫蹟乆湮殘碑委榛莽茍安忘中原處堂亦何取江湖仍江湖曽㡬荆凡覩衢市日繁富為之厪相輔必也臻大當詎其在小補瑞石洞吳山臨絶頂石洞在其下捨馬盤輕輿因循輿並捨峭蒨奥窔間蹀歩窮幽冶怪狀疑鬼神虚勢若廡庌盡態復極妍誰能辨炙輠畆半得小亭天池一杯㵼設使導之流何異香罏者四依皇祖吳山詩韻崇岡俯視見西湖氣接三元上景衢設使畫家為設色定湏粉本夏侯圖飛來石何處飛來此處栖玲峯想自聖湖西翩􅗁漫擬嗤無翼何悟南華大小齊初遊勝果寺紺宇鳯凰山名上曹溪初問津佛無六塵染僧喜一時新地方大吏施檀為新廟宇竹䕶山腰路花榮殿角春排衙稱有石見志書浄地恐非倫澄觀䑓鳯凰山上有髙臺題以澄觀記剏來湖水鏡光自西湧江潮帶影日東迴澄懐觀物真超矣得意忘言亦快哉訝到水晶宫觀表更于何處惹塵埃觀潮樓前度沙平漲樓原陸地陵壬午登晀時樓前漲沙頗逺江船不能近岸多以牛車輓運今來則江水近在隄下舟可泊塘盖逺則衝囓無虞而艱于估舶近則帆檣稱便而潮溜或侵塘根似兹遷漲靡常益為全塘厪念今來江又近舟可跨欄乗變幻有如此晏清竟底憑水師呈技藝總督蘇昌攜閩省水師于樓前呈演水操諸技頗為嫻熟因行賞以奬之行賞命旌能晴夜半問隂晴報曰雲垂宇昨近臨茂苑頗覺霪春雨登舟始開霽逮兹六日許宜暘乃利農麥菜資曦煦何處不籌穡為之心憂鼠朝來西南風密雲散如縷農父笑迎鑾此樂吾同汝閲武杭州詰戎要務政攸闗駐蹕宣程執㦸班列陣旌旗特親閲統軍甲胄搃躬擐練方有勇誠斯謂安不忘危厪此間那似建隆誇偃武春風惟是賞湖山昭慶寺錢塘西北隅律寺接通衢六度守毘苑千年對聖湖繞階馥忍草出屋鬰禪株慈夀山齊永誠哉昭慶符大佛寺題句昔圖黄龍佛已謂大無比今遊石佛山大佛實在是一面露堂堂滿月光如洗我聞芥子㣲湏彌納其裏熾然無昔今咄哉那彼此遊黄龍洞舊識山隂路重尋春仲天樹藤他作體巖卉浄為娟䕶逕饒修竹繞階泌冷泉曽經圖丈六洞有石佛像壬午南巡遊此親圖其像成幀系贊􅏻池並命摹勒石壁丈六祇如然紫雲洞口號春暄攀陟汗流漿牝洞入纔迫體凉却上丹梯不數武轉温仍欲換衣裳題六一泉嶼山西南隅云有六一泉三度曽未臨寄興託吟篇今來稱潔葺用備小憩延適自西泠橋名過路左實近便遂與一蹀歩花竹誠翳然竒石貯天池清泠如鏡圓誰當此濯纓因之緬昔賢蹟縱有顯晦境固無變遷獨是亭軒者微嫌踵増妍歐蘇肯斯乎不能無疑焉詣聖因寺瞻禮皇祖神御殿南邦六度事虞巡神御今猶瀛嶼垠翹殿三年思聖軌見牆一脉切天倫百王屈指誰同德四海傾心永戴仁䝉業貽庥益欽若自惟何以憲章循恭奉皇太后至聖因寺行宫駐蹕作西湖行館聖因傍三載重欣奉夀康節值閏春駐韶景地呈佳境萃天慶一隄柳色間花色四面山光入水光更喜快晴宜麥菜餘閒消得有詩償浄慈寺瞻禮古刹南屏明水涯畢轃紳士祝延釐依然波浄連天浄可識佛慈即聖慈春物薫馨含慧業名禽宛轉入聞思誰云儒釋非同道似此傾誠豈不宜小有天園花木昌如候名園小有天面湖澄浄影背嶺蔚晴烟何礙髙樓起翻成一覽全興心尚龍井詩就便鳴鞭龍井八詠過溪亭溪云不過忽成過一笑名因二老留有意無心設相較不過属有意過属無心過贏不過兩三籌滌心沼雲棲己有洗心亭龍井復傳滌心沼滌之洗之名太紛不及無心自了了一片雲片石􅌑瓏依碧峰英英常帶岫雲濃山莊别室斯津逮避暑山莊有熏山皇祖御題一片雲額在延館東偏别室對此依然仰聖踪風篁嶺聼曲曽聞絶勝去聲絃老枝介介穉娟娟分明好是三春景忽訝清秋籟颯然方圓菴數椽敝屋號方圓立字安名属偶然何事南山誇博學方圓娓娓著言詮南山僧守一有方圓菴記米芾書之龍泓澗石欄四面一泓清可數鬚眉鏡影呈流出細渠原足底山根聞作半天聲神運石詭石狰如偉丈夫遥年題識半糢糊新詩業已行行􅘧曷不由今視昔乎翠峯閣翠峯却是新成閣前度遊情祇目前問水尋山付餘事觀民察吏勅機權上天竺法喜寺盤髙下龍井入妙造西峯仍是諸天上䖍瞻滿月容春花紺宇䕶古樹翠隂濃不二門惟此那分教與宗咸淳臨安志郡守沈文通以教易禪故末聨及之過三天竺口號一天竺耳乃稱三似属岐談實理談譬以人身心情性是分是合是瞿曇賦得春蠶作􅗀得同字八韻題試浙江士子候占春駘蕩功盛浙西東有女柔桑取惟蠶作繭充寒暄騐曉夜蛹螝辨雌雄飼浴勤民舎繹繅倡后宫室温防冷逼箔岌擬山崇經緯不言表樞機黙運中鮫人空説巧園客那稱工比似抽思者成章畧或同虎跑泉用蘓軾韻二虎來跑泉湧上至今稱泉其名仰試問此事信也無不過竒談供抵掌東坡頗透如來禪云何唯唯随影響末後一句原不凡迥絶世間徃來想即用蘇詩意瞻禮六和塔作歌出山策馬循江干窣堵遙見青雲端旋到捨騎入塔院屏營瞻禮心神寛鎮江初建憶北宋時方一統歸提封詎知九世忽南遷徒供紹淳遊賞用昔年我實親曽登睫眼條歴最上層江海全勢在指顧兹弗躬臨意以憑漫言見表知其裏由來我亦増年矣開化寺疊舊作韻枕巖紺字鬰嶕嶤雖事􅏻嚴逺市朝鳥雀聼經皆宿慧風旛説偈自髙標山雲不雨峯猶濯閏月當春景益饒穹塔六和建初宋為安民庶鎮江潮雲棲寺冄疊舊韻一律萬緑瓊竿叅漢青十尋枝見下亭亭此中尋路一時到教外無言六字聼是寺僧以念佛為務不叅禪坐對溪聲流不盡了同山色峙常停道塲開後於莬避誌稱其地人跡罕至明僧祩宏結菴後虎不傷人借問山僧具底靈理安寺環繞七峯處合流䨇澗間棲真適歸逕掛衲寺中齋名見武林梵志便尋山詎亟一遊興圖消片刻閒凴欄挹蔥翠可以謝躋攀用張祜杭州孤山寺詩韻湖中峙玉岑可以空去聲禪心佛自超六度僧還論五隂瑶壇接天浄舎利影波深随歩香風遞依稀薝葡林清漣寺觀魚三疊舊作韻䟦馬蘓隄上㡬閒尚有餘隔松聳瓦獸穿竹敞扉魚己是知途逕聊當湔袂裾翠鱗仍牣若玉鏡自澄如潜合六根浄浮成八體書不湏聞梵貝對此即禪歟三和皇祖靈隐寺詩韻冷泉繞曲曲鷲嶺矗峩峩襟帶有如此清凉那見多雲居懸月地塵跡掃風蘿分付庭前柏記予四度過韜光菴疊舊作韻竺菴猶隔㡬重林雲隐西廂路入深借石為闗誰許敂引泉接竹逓相斟上方殿塔寂鐘磬下界湖山自帶襟比喻漫同虚室白箇中祇合證無心柏堂再疊蘓軾韻聖因之右嶼山前陳跡空尋竟漠然廣化那存當日寺天嘉空紀建時年有為一切法如夢無盡雙株指可傳太乙荒基一再詠西湖志柏堂廢基在西太乙宫欲呼玉局與談禪竹閣再疊蘇軾韻兩翁謂白蘓遺蹟辨疑然那更追尋堂與軒千載月明來鶴伴四時風颯動龍孫勝遊何必思蕭寺逸格仍看䕶野村真者在前應擱茟却因觸興未忘言漪園一園倚南嶺十畝占西湖盪槳到門第開軒眄畫圖鳶魚機表察花柳鏡中鋪有術如觀水誰能捨此乎遊小有天園登絶頂最愛南屏小有天登峯原攬大無邊易詮藉用還司馬琴趣那能效米顛峯頂勒司馬光書家人卦及米芾大書琴䑓二字百卉都知鬪春莭翼日清明千林乍欲歛朝烟菁蔥峭蒨閒探妙比似仇池然不然留餘山居南山北麓有山居早識清幽試訪諸犖嶨竒峯中進輦砰訇懸瀑近濺裾千林黝藹藏濃霧一氣空濛合太虛不盡興而便言返吾原毎事欲留餘聼泉亭子題額不經想有泉實入聼武林傳梵志無復見蘓亭向題山居亭子曰聼泉兹偶閲武林梵志則載東坡所榜聼泉亭在法相寺里許沿塢而上云云正為此地蘇亭雖不可考而我心同然彼已先得之矣因並識之吟香别業斷橋盡處孤山左范撫池亭早就荒事見前巡詩註雖是葺新為勝賞却因易舊曰吟香㡬迴攬結全非候盖以池中多蓮吟香之名由是而得然春月非蓮候也無乃稱呼特好去聲祥似此山明兼水秀便勾留亦定何妨題放鶴亭一嶼湖心聳絶竒問誰雅合此居之墓門詩裏有佳句隠士傳中無愧辭可是寒梅猶手植欲招野鶴識心期由來肥遯終非遯両字逋仙萬古知題西湖十景三疊舊作韻蘓堤春曉春來萬物喜昭蘓正值巡方蹕駐吾䟦馬長堤頻按轡韶光輝暎両邊湖柳浪聞鶯輕風萬縷弱揺金披不知寒望轉深乍聼緡蠻尋不見繾懐宵雅詠遷林花港觀魚平鋪設認港如練亂簇當知魚即花不辨乾淳當日蹟杭人猶説舊京華曲院風荷緑水漣漪細皺風為瞻題額想花紅遄飛逸興昆明上夏月揺光正此同雙峯挿雲一雙長劍倚天垂雲作衭襓片片飛宇宙以來便有此那稱歐冶破堇時雷峯西照斜陽一照本無意古塔七層浪有名恰與静慈作屏障赤文豎竪復横横三潭印月恒沙常轉法王輪潭月偏標清浄身識得西江汲一口是中非果亦非因平湖秋月春和駘蕩正油油逺矣秋蟾弄影柔却是平湖自千古豈知今昔有遷流南屏晚鏡月色罘罳清暎屏南風送得夜鐘聲時巡展義率由舊政化無煩在屡更斷橋殘雪麥色佳因䕶雪餘斷橋冬景眼前如行春所喜情田好老㓜歡欣擁蹕輿西湖行宫八景重詠四照亭南來逐處仰堯巡四柱幽亭冠碧峋從識憂民聖皇照絶勝避世隠人淪竹凉處猗玕新粉欲霑衣曲處通幽㡬个稀春日暄妍静風籟何來拂靣嫩凉微緑雲逕喬林羃嶺蔚英英四季那知謝與榮不向山隂更移歩恐妨鶴訝客來生瞰碧樓迥樓特地背孤山明聖湖光襟袖間底識與民同樂處酒船一任往和還貯月泉平湖秋月乆聞諸輪尺山泉印亦如最是南禪提要句小非嫌窄大非餘鷲香庭髙出庭簷始有枝天香疑是月中披何湏漫惜非秋莭㑹取根塵未現時領要閣山色湖光應接忙閣中領要足徜徉然予却未忘拈句名畫輸他印識梁梁清標最為賞鑒家然于書畫佳蹟惟用觀其大畧印從未見著語故戯及之玉蘭堂王維文璧地皆異李白江淹夢亦虚千古西湖付批判底湏多事更吟予喜晴逾旬幸值晴一雨審何妨昨宵勢頗綿清曉醸微凉過甚傷麥菜兼虞害蠶桑以此切切愁崇居不敢康日出忽聞霽雨止雲漸昻然時猶聚㪚卓午乃盡藏按轡徐觀民佳與農夫慶有喜乃真喜寕因賞景光敷文書院再疊舊作六韻湖山孕靈處憂行去聲不憂文詎尚三都賦誰批五鹿君甄身貴方正績學要精勤盧植刋碑在戴凴奪席聞崇儒臨帳絳程士駐旄紛何以對休命佇惟佔畢羣策馬由南屏復至天竺敷文幸書院崇學勵士英天竺謁梵宇設教順民情浙民敬奉天竺大士朔望尤盛雨𤾉必禱况予昨望霽可弗謝快晴策馬下松嶺書院在萬松嶺上遵陸過南屏漪園小有天概弗翠蹕停取道丁家山不過廿里程菜麥暄曦光襍然皆向榮蠶事雖未興柔桑亦已萌攬結足怡心非闗山水清是日值香市是日月望更弗嚴蹕驚駢填老與㓜都増喜色迎如如瞻大士朗朗通吾誠設再十日霽春収庶有成靈隠寺仍疊宋之問韻五字特嶤嶤千秋属和寥兩章笑多事一滴欲増潮緬想驀然過重尋去若飄都成佳話許漫惜勝期遥過雨花如笑經冬松不凋原來符道趣那得惹塵囂識取冷泉畔橋為信度橋水樂洞八音獨無水一洞乃兼全激石纔越若摐金恒繹然竹絲匏有壊土木革非堅不待太師作千秋角徵絃理安寺儒釋雖殊道理安原實同為咨學佛侣何以繼宗風澗水環門浄山峯暎座崇摐然聲與色箇裏不空空再遊雲棲雲棲最愛幽而樸每至西湖必両來依舊矮簷環曲堵底湏香閣聳琱䑓舉頭竹宻藏峯峻撲鼻蘭馨過雨纔合掌闍黎不饒舌真言六字已云該再登鳯凰山鳯凰山豈鳯凰遊態實翩􅗁麗且遒湖景當春竒畢獻海門浴日勢全收難尋建置錢還趙何論廢興夫與句設以來巢擬阿閣不増吾喜祇増羞排衙石口號致譏幸不同松下曠覽真教窮海涯我自觀民勤露冕豈資卷石為去聲排衙再遊瑞石洞覧古石洞真看以石竒飛空矞若瑞雲垂訝如欲墜忽然住已似難前又可披􅌄窱森森通地穴澄泓處處貯天池禁山南宋無人到賜第居然獨属誰青湖襍志瑞石為南宋禁山惟韓侂胄得賜第云云再遊龍井作清蹕重聼龍井泉明將歸轡啓華㫋問山得路宜晴後汲水烹茶正雨前入目景光真迅爾向人花木似依然斯誠佳矣予無夢天老那希李謫仙杭州啓蹕迴鑾之作武林門外候蘭船旬日盤桓合命旋指數上聲流隂迅稔冉情知勝處戒留連江工塘壩籌悉定民事農桑期恐愆勤爾農桑湏盡力莫更依戀蹕途邉再逰烟雨樓南去北還半月餘滮湖樓閣祗猶初墨辛夷縱花全謝紫碧桃方朶艶舒是處見紫碧桃花特鮮艶波態含烟欲藏舫雲容醸雨正如車循名奚要惟晴好念在蠶筐與麥鋤三和錢陳羣田園襍興詩十首詩篇來往達音聲前席尤欣晤耉成曰善頌卿思古者不忘規我厪民生肩輿弗許逺近催喜過新年八袠開民數無央覲鑾路就中遥識地仙來清短身如愚也柴當年給杖重去聲扶來相逢一别三年話不覺金猊篆已灰問汝林居更底勞每逢賡韻首應搔陳羣雖居林下每得新作常和韻以進故以此句嘲之即今三疊田園興一例還當報木桃詎必鄉田藉自畦潤身原以德充肥不妨春冷常朝出或遇山佳定暮歸晏眠誰斥入朝遲娛老那虞生理微子貳地官身里俸豈同寒士論潛飛鄉居想復濟貧寒未肯君恩身受單更有餘閒問風景南湖春水暎心寛老伴詩人沈與錢清詞麗句答芳年為詢北阜竹梅月何似南樓烟雨天于公門巷豈嫌低歸省還聼琴轡飛依蹕却因勤供奉肯教婦子一家圍陳羣以老侍從迎鑾後即随扈行在特命其子汝誠先還家侍母俾得歡聚庭闈石湖髙致寄冬崧潤筆應知藉酒醲三十首中和十首范成大田園襍興本三十首陳羣所和三分之一也想因詩興偶然供夜雨閏二月廿二日纔方盪槳返南湖興託湖樓烟雨圖入夜􅓴􅜾却頻霔滿川㸃滴乍平鋪問誰司化真竒矣廼善循名若此乎適可宜晴多未可恐妨織婦與耕夫喜晴二首水風㕸㕸拍舟鳴吹散吴雲喜快晴夹岸菜花與桑葉宜暘總覺愜予情鳩已無聲鵲已鳴所希繼此浃旬晴農夫織婦歡迎蹕爾我同斯悦霽情欽定南巡盛典卷十三
