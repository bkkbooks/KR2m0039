  text: 欽定四庫全書欽定南巡盛典卷十三天章乙酉浙江
  hash: sha256:9e34c779e0f3fdef6a12af0b815db705cdd248b33e8539823018e853a81f38cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_022-1a, image: WYG0658/WYG0658-0235a.png}
body:
  text: 詩入浙江境一川不異舟兩省頓分郵風俗漸因别桑麻較更稠春晴真是暢三載忽如流祗覺民情切惠鮮可忘去聲謀題煙雨樓岩嶤無地起樓臺一棹宛從鏡裏來問孰宜烟更宜雨合稱惟柳復惟梅韶光艷裔為屏匝漪影空明映座開錢趙王孫詩與字樓中有錢陳羣書趙孟俯耕織圖詩屏却因吟玩久延陪降㫖免浙省所有積缺並經過地方正賦十分之五詩以志事新正降恩諭江浙免積逋江省數實多前降㫖免江浙逋賦江南至一百四十餘萬浙江止十三萬餘已不及十分之一且又報有續完則較江省更少南北已大殊因加惠江南昨經臨江省詢知所免災緩積缺淮北獨多江以南才三萬餘因將江蘇各屬熟田未完缺項概行蠲免並免水陸所經州縣本年額賦十分之五浙省亦吾赤子懷保同殷且積缺又少用是并例不應蠲之未完銀穀悉豫豁除復將經過地方新賦蠲半以均惠澤浙省可忘乎入疆再咨詢逋祇江南如更有續完者急公益加豫漕缺及借項寬免例所無此豈非在民爰概與豁除其經過正賦十五蠲厥租休助庶以副歌頌寧所圖賜閩浙總督蘇昌楚粵曽宣績浙閩兹撫封外中久揚歷聲望益舂容早是心如水應知夀比松自當隨蹕輦奕葉本從龍賜浙江巡撫熊學鵬西江儒素家兩浙撫安衙清慎勤無忝猷為守有嘉淳風原在朴佳景漫求加識我殷勤意由來在漲沙自石門縣跋馬度城易輕舟至陳氏安瀾園即景雜詠艤舟跋馬度由拳心喜觀民緩著鞭更有閲塘豫正務遂循溪路易輕船夾溪萬姓喜迎鑾桑柘盈郊入畫看草四槳過風帆去聲駛片時新壩到長安即壩名壩隔髙低換綵舟綵舟致重櫓聲柔仍圖迅利策豫馬蓄眼韶光靣靣酬鹽官三載重經臨兩字安瀾實厪心駐輦春風棄清暇果然城市有山林駐陳氏安瀾園疊舊作即事雜詠六首韻如杭第一要籌奠海塘瀾水路便方舸前巡抵杭城由陸路赴海寧閲塘今年舟次石門即從别港水道前進先駐是園取便程急先務也江城此稅鞍汐潮仍似舊宵旰那能寬增我因心懼慙其載道歡隅園城角邉新額與重懸意在安江海心非耽石泉喬柯皆入畫好鳥自調絃有暇詩言志雕蟲不尚妍鹽官誰最名陳氏世傳清詎以簮纓嚇惟敦孝友情春朝尋勝重去聲聖藻賜褒明原任大學士陳元龍請老時奉園皇考書賜林泉耆碩額以寵其行今恭樓正中來日尖山詣祈庥盡我誠書堂橋那畔熟路宛知尋既曲越延趣惟幽不礙深風翻花動影泉出峽留音古栝無榮謝森森青玉針園以梅稱絶盤根數百年古風度迥别時世態都捐春入香惟淨月來影亦娟閒吟將對寫消得意為延溪泛櫓聲柔溪涯有竹修獺時看伏翼是園水中有獺魚並育槎頭似此真佳處無過信宿留觀塘吾本意詎可恣遨逰謁海神廟瞻禮疊舊作韻庚辰之嵗潮趨北柴石塘工重去聲事修亟籲施仁斯益切不更平聲為患即貽庥漲沙雖縱聞增渚汛水無過幸晏秋廟貌欽崇緬皇考中亹未復祗懷愁賜浙江學政錢維城化民惟在學取士要通經詎在工文采還當屏濫形須懸虛鑑朗莫負舊氊青扈蹕常賡韻何殊侍內廷命添建海寧縣城石塘前坦水石詩以志事柴石兩塘工前巡大端定前巡閲視海塘時有以老鹽倉一帶柴塘恐難經久請易柴為石者及親臨度視則塘內沙活不可下樁再移內移十丈雖工作可施勢必毀棄田廬未弭患而先殃民又豈保衛之道因决意修築柴塘敕部議增薪值俾採購裕足並命添置坦水簍石捍護隄根兹來重相視事無不用敬念兹古縣城萬民所托命城南即石塘魚鱗固綿亘但潮今北趨已近塘根迎坦水縱兩層潮來惟一賸設使久蕩激塘根將致病去嵗雖添建六十丈而竟尚缺久安策俾增一律稱去嵗撫臣請建坦水六十餘丈止就險要而言于全塘形勢尚未籌及因命增建四百六十餘丈並視二層舊坦之樁殘石缺令補易繕完使護塘根永資鞏固殺去聲勢護石工費帑吾寧聼何當復中亹額手斯誠慶賜浙江督撫及其屬吏食詩以言志入疆雖曰慶土地豈其宜嘗謂孟子此言或可行于其時實難行于千古然奪彼與此即當時亦覺難行且若皆宜慶者將以何地與之聊以肆筵惠酬斯執役疲所嘉民弗課實慰我深思休養富而教朂哉賢有司塘上三首尖山將往閲潮淤塘上清晨發步輿一帶堤根皆囓水撫斯安得暫心紓魚鱗誠賴此崇隄隄裏人家屋脊齊土備却稱守重障土備塘海望所修欲以為重關保障夫石塘外如果可為重障尚可今為之塘內且置人家于外豈有土更堅于石之理譬之防盜者舍墻門而扃屋扉甚無足取也一行遙見枊烟低竈户資生釜海存刮沙煎滷事牢盆茅棚蓽竇何妨覽欲悉吾民衣食源登尖山觀海岧嶤淨土普門憑觀海因之棧道登愧我敢云希績底奠兹惟是賴仁能臺臨上下空無際舟織往來波不興俯視塔山資射浪謾言沙漲有明徵視塔山志事疊舊作韻並示地方督撫及司事者壬午視塘後沙漲伸如翼不久復致坍溜仍塘根逼自兹月據報壩基下有護根石簍前巡臨閲時沙漲掩簍㾗四尺許因命標志其處驗增漲尺寸浙撫每月奏報時緩亦時急即今石簍下又見漲沙立較之昔立標乃更增五尺沙漲時有贏縮兹親臨勘驗較舊志復增五尺大吏皆謂江海效靈然坍漲靡常實不敢即以為慰也效靈漫致頌安保無更易夫惟君與臣均有安民責為民籌保障可弗此心悉何時沙坂堅魚鱗易條石惟俟天默佑斯實乏良䇿閲海塘再疊舊作韻依舊潮頭近逼塘貽謨昔日計深良自乾隆戊寅後潮勢復漸趨北亹恃魚鱗大石塘及坦水竹絡壩為鞏護益仰實為皇考定制萬世永賴成規敬守修柴石先是建議者擬易柴塘為石工壬午親臨相度塘下活沙既汕澀不受樁而內徙又妨田廬因命専修柴塘且增料傎其條石各工隨宜加甃俾資桿禦古語誠符變海桑南坍北漲北坍南漲惟浙省為然蓋無百年不易之事思復中亹亦過平聲望便由故道敢私慶盡人事俟神庥耳蒿目一勞念未遑觀潮四首鎮海塔傍白石臺觀潮那可負斯來塔山濤信須臾至羅剎江流為去聲倒回槖籥堪輿呼吸隨混茫太古合如斯伍胥文種誠司是之二人前更屬誰候來底藉鳴雞伺朔望六時定不差斫陳萬軍馳快馬飛空無轍轉雷車當前也覺有竒訝閙後本來無事仍我甫廣陵辨方域枚乘七發觀濤廣陵之曲江注未詳其所在後世乃指浙江為曲江以浙江濤廣陵濤溷而為一蓋未深考漢書地理志餘杭屬㑹稽而不屬廣陵相習傳訛耳且如篇內伍子之山胥母之場並在吳境于揚于杭皆風馬牛不相及尤難强為比附因作廣陵濤疆域辨以正之漫重七發述枚乘至杭州詣皇太后行宫問安有作鹽官先往為籌塘舊路安舟奉夀康百里郵程至卓午兩朝食履慶增常撫兹鄽市誠殷富益為去聲黔黎計久長咫尺西湖清且麗承歡雅足答韶光恭依皇祖巡幸杭州詩四疊韻深宫晏處敢求安吏治民生厪省觀寧海未兹駐巡駕海寧先彼蒞鳴鑾魚鱗塘欲石圍固魚鱗大石塘屢接築以期鞏固雁字灘希沙漲寬此是來遊最要務詎緣山水覔清歡賜錢陳羣王帖一旬猶過之羲之帖足下今年政七十耶陳羣今年八十嵗故云來迎喜重去聲晤龎眉杖朝足領羣仙列從政仍教一子隨陳羣子汝誠適扈蹕來商𣙜古今關治亂咨詢風物度淳漓我閒却是卿無暇合為去聲催賡攬勝詩韻玉館杭州行宫內前度教栽竹今來萬個强故知功獲倍南方種竹最易北地所不逮也恰與嵗俱長安得三庚至坐披滿意凉清風簷際度彈是子登琅策馬登吳山策馬登吳山撫今並攬古金主寄遐懷宋帝守偏宇離宫蹟久湮殘碑委榛莽茍安忘中原處堂亦何取江湖仍江湖曽幾荆凡覩衢市日繁富為之厪相輔必也臻大當詎其在小補瑞石洞吳山臨絶頂石洞在其下捨馬盤輕輿因循輿並捨峭蒨奧窔間蹀步窮幽冶怪狀疑鬼神虛勢若廡庌盡態復極妍誰能辨炙輠畝半得小亭天池一杯㵼設使導之流何異香罏者四依皇祖吳山詩韻崇岡俯視見西湖氣接三元上景衢設使畫家為設色定須粉本夏侯圖飛來石何處飛來此處栖玲峯想自聖湖西翩􅗁漫擬嗤無翼何悟南華大小齊初遊勝果寺紺宇鳯凰山名上曹溪初問津佛無六塵染僧喜一時新地方大吏施檀為新廟宇竹護山腰路花榮殿角春排衙稱有石見志書淨地恐非倫澄觀臺鳯凰山上有髙臺題以澄觀記創來湖水鏡光自西湧江潮帶影日東回澄懷觀物真超矣得意忘言亦快哉訝到水晶宫觀表更于何處惹塵埃觀潮樓前度沙平漲樓原陸地陵壬午登晀時樓前漲沙頗逺江船不能近岸多以牛車挽運今來則江水近在隄下舟可泊塘蓋逺則衝囓無虞而艱于估舶近則帆檣稱便而潮溜或侵塘根似兹遷漲靡常益為全塘厪念今來江又近舟可跨欄乘變幻有如此晏清竟底憑水師呈技藝總督蘇昌攜閩省水師于樓前呈演水操諸技頗為嫻熟因行賞以奬之行賞命旌能晴夜半問隂晴報曰雲垂宇昨近臨茂苑頗覺霪春雨登舟始開霽逮兹六日許宜暘乃利農麥菜資曦煦何處不籌穡為之心憂鼠朝來西南風密雲散如縷農父笑迎鑾此樂吾同汝閲武杭州詰戎要務政攸關駐蹕宣程執㦸班列陳旌旗特親閲統軍甲胄總躬擐練方有勇誠斯謂安不忘危厪此間那似建隆誇偃武春風惟是賞湖山昭慶寺錢塘西北隅律寺接通衢六度守毗苑千年對聖湖繞階馥忍草出屋鬱禪株慈夀山齊永誠哉昭慶符大佛寺題句昔圖黃龍佛已謂大無比今遊石佛山大佛實在是一面露堂堂滿月光如洗我聞芥子微須彌納其裏熾然無昔今咄哉那彼此遊黃龍洞舊識山隂路重尋春仲天樹藤他作體巖卉淨為娟護徑饒修竹繞階泌冷泉曽經圖丈六洞有石佛像壬午南巡遊此親圖其像成幀系贊􅏻池並命摹勒石壁丈六祇如然紫雲洞口號春暄攀陟汗流漿牝洞入才迫體凉却上丹梯不數武轉溫仍欲換衣裳題六一泉嶼山西南隅云有六一泉三度曽未臨寄興託吟篇今來稱潔葺用備小憩延適自西泠橋名過路左實近便遂與一蹀步花竹誠翳然竒石貯天池清泠如鏡圓誰當此濯纓因之緬昔賢蹟縱有顯晦境固無變遷獨是亭軒者微嫌踵增妍歐蘇肯斯乎不能無疑焉詣聖因寺瞻禮皇祖神御殿南邦六度事虞巡神御今猶瀛嶼垠翹殿三年思聖軌見牆一脉切天倫百王屈指誰同德四海傾心永戴仁䝉業貽庥益欽若自惟何以憲章循恭奉皇太后至聖因寺行宫駐蹕作西湖行館聖因傍三載重欣奉夀康節值閏春駐韶景地呈佳境萃天慶一隄柳色間花色四面山光入水光更喜快晴宜麥菜餘閒消得有詩償淨慈寺瞻禮古剎南屏明水涯畢轃紳士祝延釐依然波淨連天淨可識佛慈即聖慈春物薰馨含慧業名禽宛轉入聞思誰云儒釋非同道似此傾誠豈不宜小有天園花木昌如候名園小有天面湖澄淨影背嶺蔚晴烟何礙髙樓起翻成一覽全興心尚龍井詩就便鳴鞭龍井八詠過溪亭溪云不過忽成過一笑名因二老留有意無心設相較不過屬有意過屬無心過贏不過兩三籌滌心沼雲棲己有洗心亭龍井復傳滌心沼滌之洗之名太紛不及無心自了了一片雲片石􅌑瓏依碧峰英英常帶岫雲濃山莊别室斯津逮避暑山莊有熏山皇祖御題一片雲額在延館東偏别室對此依然仰聖踪風篁嶺聼曲曽聞絶勝去聲絃老枝介介稚娟娟分明好是三春景忽訝清秋籟颯然方圓菴數椽敝屋號方圓立字安名屬偶然何事南山誇博學方圓娓娓著言詮南山僧守一有方圓菴記米芾書之龍泓澗石欄四面一泓清可數鬚眉鏡影呈流出細渠原足底山根聞作半天聲神運石詭石狰如偉丈夫遙年題識半糢糊新詩業已行行􅘧曷不由今視昔乎翠峯閣翠峯却是新成閣前度遊情祇目前問水尋山付餘事觀民察吏敕機權上天竺法喜寺盤髙下龍井入妙造西峯仍是諸天上䖍瞻滿月容春花紺宇護古樹翠隂濃不二門惟此那分教與宗咸淳臨安志郡守沈文通以教易禪故末聨及之過三天竺口號一天竺耳乃稱三似屬岐談實理談譬以人身心情性是分是合是瞿曇賦得春蠶作􅗀得同字八韻題試浙江士子候占春駘蕩功盛浙西東有女柔桑取惟蠶作繭充寒暄驗曉夜蛹螝辨雌雄飼浴勤民舍繹繅倡后宫室溫防冷逼箔岌擬山崇經緯不言表樞機默運中鮫人空說巧園客那稱工比似抽思者成章略或同虎跑泉用蘇軾韻二虎來跑泉湧上至今稱泉其名仰試問此事信也無不過竒談供抵掌東坡頗透如來禪云何唯唯隨影響末後一句原不凡迥絶世間往來想即用蘇詩意瞻禮六和塔作歌出山策馬循江干窣堵遙見青雲端旋到捨騎入塔院屏營瞻禮心神寬鎮江初建憶北宋時方一統歸提封詎知九世忽南遷徒供紹淳遊賞用昔年我實親曽登睫眼條歷最上層江海全勢在指顧兹弗躬臨意以憑漫言見表知其裏由來我亦增年矣開化寺疊舊作韻枕巖紺字鬱嶕嶤雖事􅏻嚴逺市朝鳥雀聼經皆宿慧風幡說偈自髙標山雲不雨峯猶濯閏月當春景益饒穹塔六和建初宋為安民庶鎮江潮雲棲寺冉疊舊韻一律萬緑瓊竿參漢青十尋枝見下亭亭此中尋路一時到教外無言六字聼是寺僧以念佛為務不參禪坐對溪聲流不盡了同山色峙常停道場開後於莬避志稱其地人跡罕至明僧祩宏結菴後虎不傷人借問山僧具底靈理安寺環繞七峯處合流雙澗間棲真適歸徑掛衲寺中齊名見武林梵志便尋山詎亟一遊興圖消片刻閒憑欄挹蔥翠可以謝躋攀用張祜杭州孤山寺詩韻湖中峙玉岑可以空去聲禪心佛自超六度僧還論五隂瑶壇接天淨舍利影波深隨步香風遞依稀薝葡林清漣寺觀魚三疊舊作韻跋馬蘇隄上幾閒尚有餘隔松聳瓦獸穿竹敞扉魚己是知途徑聊當湔袂裾翠鱗仍牣若玉鏡自澄如潜合六根淨浮成八體書不須聞梵貝對此即禪歟三和皇祖靈隱寺詩韻冷泉繞曲曲鷲嶺矗峩峩襟帶有如此清凉那見多雲居懸月地塵跡掃風蘿分付庭前柏記豫四度過韜光菴疊舊作韻竺菴猶隔幾重林雲隱西廂路入深借石為關誰許叩引泉接竹遞相斟上方殿塔寂鐘磬下界湖山自帶襟比喻漫同虛室白箇中祇合證無心柏堂再疊蘇軾韻聖因之右嶼山前陳跡空尋竟漠然廣化那存當日寺天嘉空紀建時年有為一切法如夢無盡雙株指可傳太乙荒基一再詠西湖志柏堂廢基在西太乙宫欲呼玉局與談禪竹閣再疊蘇軾韻兩翁謂白蘇遺蹟辨疑然那更追尋堂與軒千載月明來鶴伴四時風颯動龍孫勝遊何必思蕭寺逸格仍看護野村真者在前應擱茟却因觸興未忘言漪園一園倚南嶺十畝占西湖蕩槳到門第開軒眄畫圖鳶魚機表察花柳鏡中鋪有術如觀水誰能捨此乎遊小有天園登絶頂最愛南屏小有天登峯原攬大無邊易詮藉用還司馬琴趣那能效米顛峯頂勒司馬光書家人卦及米芾大書琴臺二字百卉都知鬪春莭翼日清明千林乍欲斂朝烟菁蔥峭蒨閒探妙比似仇池然不然留餘山居南山北麓有山居早識清幽試訪諸犖嶨竒峯中進輦砰訇懸瀑近濺裾千林黝藹藏濃霧一氣空濛合太虛不盡興而便言返吾原每事欲留餘聼泉亭子題額不經想有泉實入聼武林傳梵志無復見蘇亭向題山居亭子曰聼泉兹偶閲武林梵志則載東坡所榜聼泉亭在法相寺里許沿塢而上云云正為此地蘇亭雖不可考而我心同然彼已先得之矣因並識之吟香别業斷橋盡處孤山左范撫池亭早就荒事見前巡詩注雖是葺新為勝賞却因易舊曰吟香幾回攬結全非候蓋以池中多蓮吟香之名由是而得然春月非蓮候也無乃稱呼特好去聲祥似此山明兼水秀便勾留亦定何妨題放鶴亭一嶼湖心聳絶竒問誰雅合此居之墓門詩裏有佳句隱士傳中無愧辭可是寒梅猶手植欲招野鶴識心期由來肥遁終非遁兩字逋仙萬古知題西湖十景三疊舊作韻蘇堤春曉春來萬物喜昭蘇正值巡方蹕駐吾跋馬長堤頻按轡韶光輝映兩邊湖柳浪聞鶯輕風萬縷弱搖金披不知寒望轉深乍聼緡蠻尋不見繾懷宵雅詠遷林花港觀魚平鋪設認港如練亂簇當知魚即花不辨乾淳當日蹟杭人猶說舊京華曲院風荷緑水漣漪細皺風為瞻題額想花紅遄飛逸興昆明上夏月搖光正此同雙峯插雲一雙長劍倚天垂雲作衭襓片片飛宇宙以來便有此那稱歐冶破堇時雷峯西照斜陽一照本無意古塔七層浪有名恰與靜慈作屏障赤文豎竪復橫橫三潭印月恆沙常轉法王輪潭月偏標清淨身識得西江汲一口是中非果亦非因平湖秋月春和駘蕩正油油逺矣秋蟾弄影柔却是平湖自千古豈知今昔有遷流南屏晚鏡月色罘罳清映屏南風送得夜鐘聲時巡展義率由舊政化無煩在屢更斷橋殘雪麥色佳因護雪餘斷橋冬景眼前如行春所喜情田好老幼歡欣擁蹕輿西湖行宫八景重詠四照亭南來逐處仰堯巡四柱幽亭冠碧峋從識憂民聖皇照絶勝避世隱人淪竹凉處猗玕新粉欲霑衣曲處通幽幾個稀春日暄妍靜風籟何來拂靣嫩凉微緑雲徑喬林羃嶺蔚英英四季那知謝與榮不向山隂更移步恐妨鶴訝客來生瞰碧樓迥樓特地背孤山明聖湖光襟袖間底識與民同樂處酒船一任往和還貯月泉平湖秋月久聞諸輪尺山泉印亦如最是南禪提要句小非嫌窄大非餘鷲香庭髙出庭簷始有枝天香疑是月中披何須漫惜非秋莭㑹取根塵未現時領要閣山色湖光應接忙閣中領要足徜徉然豫却未忘拈句名畫輸他印識梁梁清標最為賞鑒家然于書畫佳蹟惟用觀其大略印從未見著語故戲及之玉蘭堂王維文璧地皆異李白江淹夢亦虛千古西湖付批判底須多事更吟豫喜晴逾旬幸值晴一雨審何妨昨宵勢頗綿清曉釀微凉過甚傷麥菜兼虞害蠶桑以此切切愁崇居不敢康日出忽聞霽雨止雲漸昻然時猶聚散卓午乃盡藏按轡徐觀民佳與農夫慶有喜乃真喜寧因賞景光敷文書院再疊舊作六韻湖山孕靈處憂行去聲不憂文詎尚三都賦誰批五鹿君甄身貴方正績學要精勤盧植刋碑在戴憑奪席聞崇儒臨帳絳程士駐旄紛何以對休命佇惟占畢羣策馬由南屏復至天竺敷文幸書院崇學勵士英天竺謁梵宇設教順民情浙民敬奉天竺大士朔望尤盛雨𤾉必禱况豫昨望霽可弗謝快晴策馬下松嶺書院在萬松嶺上遵陸過南屏漪園小有天概弗翠蹕停取道丁家山不過草里程菜麥暄曦光雜然皆向榮蠶事雖未興柔桑亦已萌攬結足怡心非關山水清是日值香市是日月望更弗嚴蹕驚駢填老與幼都增喜色迎如如瞻大士朗朗通吾誠設再十日霽春收庶有成靈隱寺仍疊宋之問韻五字特嶤嶤千秋屬和寥兩章笑多事一滴欲增潮緬想驀然過重尋去若飄都成佳話許漫惜勝期遙過雨花如笑經冬松不凋原來符道趣那得惹塵囂識取冷泉畔橋為信度橋水樂洞八音獨無水一洞乃兼全激石才越若摐金恆繹然竹絲匏有壞土木革非堅不待太師作千秋角徵絃理安寺儒釋雖殊道理安原實同為咨學佛侣何以繼宗風澗水環門淨山峯映座崇摐然聲與色箇裏不空空再遊雲棲雲棲最愛幽而朴每至西湖必兩來依舊矮簷環曲堵底須香閣聳雕臺舉頭竹密藏峯峻撲鼻蘭馨過雨才合掌闍黎不饒舌真言六字已云該再登鳯凰山鳯凰山豈鳯凰遊態實翩􅗁麗且遒湖景當春竒畢獻海門浴日勢全收難尋建置錢還趙何論廢興夫與句設以來巢擬阿閣不增吾喜祇增羞排衙石口號致譏幸不同松下曠覽真教窮海涯我自觀民勤露冕豈資卷石為去聲排衙再遊瑞石洞覽古石洞真看以石竒飛空矞若瑞雲垂訝如欲墜忽然住已似難前又可披􅌄窱森森通地穴澄泓處處貯天池禁山南宋無人到賜第居然獨屬誰青湖雜志瑞石為南宋禁山惟韓托胄得賜第云云再遊龍井作清蹕重聼龍井泉明將歸轡啓華㫋問山得路宜晴後汲水烹茶正雨前入目景光真迅爾向人花木似依然斯誠佳矣豫無夢天老那希李謫仙杭州啓蹕回鑾之作武林門外候蘭船旬日盤桓合命旋指數上聲流隂迅稔冉情知勝處戒留連江工塘壩籌悉定民事農桑期恐愆勤爾農桑須盡力莫更依戀蹕途邉再逰烟雨樓南去北還半月餘滮湖樓閣祗猶初墨辛夷縱花全謝紫碧桃方朵艷舒是處見紫碧桃花特鮮艷波態含烟欲藏舫雲容釀雨正如車循名奚要惟晴好念在蠶筐與麥鋤三和錢陳羣田園雜興詩十首詩篇來往達音聲前席尤欣晤耉成曰善頌卿思古者不忘規我厪民生肩輿弗許逺近催喜過新年八袠開民數無央覲鑾路就中遙識地仙來清短身如愚也柴當年給杖重去聲扶來相逢一别三年話不覺金猊篆已灰問汝林居更底勞每逢賡韻首應搔陳羣雖居林下每得新作常和韻以進故以此句嘲之即今三疊田園興一例還當報木桃詎必鄉田藉自畦潤身原以德充肥不妨春冷常朝出或遇山佳定暮歸晏眠誰斥入朝遲娛老那虞生理微子二地官身里俸豈同寒士論潛飛鄉居想復濟貧寒未肯君恩身受單更有餘閒問風景南湖春水映心寬老伴詩人沈與錢清詞麗句答芳年為詢北阜竹梅月何似南樓烟雨天于公門巷豈嫌低歸省還聼琴轡飛依蹕却因勤供奉肯教婦子一家圍陳羣以老侍從迎鑾後即隨扈行在特命其子汝誠先還家侍母俾得歡聚庭闈石湖髙致寄冬嵩潤筆應知藉酒醲三十首中和十首范成大田園雜興本三十首陳羣所和三分之一也想因詩興偶然供夜雨閏二月草二日才方蕩槳返南湖興託湖樓烟雨圖入夜􅓴􅜾却頻霔滿川㸃滴乍平鋪問誰司化真竒矣乃善循名若此乎適可宜晴多未可恐妨織婦與耕夫喜晴二首水風㕸㕸拍舟鳴吹散吳雲喜快晴夾岸菜花與桑葉宜暘總覺愜豫情鳩已無聲鵲已鳴所希繼此浹旬晴農夫織婦歡迎蹕爾我同斯悅霽情欽定南巡盛典卷十三
