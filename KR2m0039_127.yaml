body:
  text: 奏議乾隆二十一年十一月十七日江蘇巡撫莊有恭奏言准户部咨乾隆二十一年閏九月二十六日奉上諭朕明春巡幸江浙所有供宿頓次皆出自帑項絲毫不以纍民苐扈從官兵以及外省接駕人等輻輳雲集經過地方錢米價值恐一時或致騰踴著將運京銅鉛兩省各截留十萬斤添爐鼓鑄減價發賣並將該二省應運本年漕糧各截留五萬石減價平糶以裕民間食用欽此仰見我皇上省方觀民嘉惠東南之至意除截留漕糧現在酌核派撥外至錢文一項上年臣經奏奉俞允於寶蘇局加鑄一十四卯并收買各爐頭工料錢文凑濟現存局加卯錢四萬七千六百餘串又收買各爐工料錢一萬六千六百餘串又蘇局額鑄餉錢除搭放兵餉外尚餘錢二萬五千餘串通共存局錢八萬九千餘串查乾隆十六年翠華南幸各州縣共止兌發錢七萬五千九百餘串核計現存局錢較上届已屬有餘無庸再行加鑄所有恩諭截留江省銅鉛十萬斤似應仍聽運京以濟户工兩局鼓鑄之用奏入上諭曰如所議行該部知道乾隆二十一年十一月二十一日內務府奏言查從前凡遇皇上駕幸木蘭等處臣衙門所有備帶物件應需擡運者向由各該處雇覔民夫抬運每夫一名行程日支銀一錢三分住宿日支銀一錢歷來照此辦理惟乾隆十六年皇上巡幸江南經總理行營大臣奏准凡有抬運官物之夫自京至順河集仍由臣衙門雇覔應用其自順河集過河即交巡撫備辦前次該地方官所備民夫甚屬便利且派有佐雜沿途管押抬運一切無悮苐查臣衙門廣儲司等處每次需用抬夫由京雇往向係夫頭包攬各處凑雇多有匪徒混入長途抬運難於管束易生事端臣等酌議嗣後凡恭遇皇上巡幸自京起運所需抬夫均照南省備辦之例交沿途地方官雇夫抬運派員管押俾抬夫一項盡歸地方官就近備辦庶抬運彈壓俱屬利便自無生事貽悮之虞如蒙俞允嗣後凡恭遇皇上巡幸俱由臣衙門預行移咨經過該地方官一體遵照辦理奏入報聞乾隆二十一年十二月二十日大學士公傅恆等奏言明春皇上巡幸江浙共需駝九百隻前次交與直隸喂養駝九百餘隻俱趕赴甘肅現在京城所有駝三百餘隻不敷應用經臣等議得武備院等處應用駝隻俱交與該衙門移㑹直隸方觀承酌量或雇車或雇騾需用之處具奏行文續因太僕寺䭾載黃布城需用䭾二百七十隻或用官駝或用民駝需用之處護軍統領等請示臣等經臣等查得若用官駝必須以符駝隻之數派章京三十四員牽駝披甲三百五十八名伊等應得賞銀盤費幫銀合計一萬四千六百餘兩若雇覔民駝需用駝二百七十餘隻兩個月整價銀按日各三錢兩個月一半價銀按日各一錢五分通計核算共需銀七千三百餘兩此二項較比雇覔民駝需用與官用駝隻即減省一半七千三百餘兩而且不用官駝不派官兵節省官馬數百匹順河集存下等候兵丁隊內若無此項牽駝官兵管轄亦屬便易相應將䭾載黃布城即雇覔民駝應用交與護軍統領等辦理今方觀承又將武備院茶飯房廣儲司等處需用駝六百餘隻俱已採買備用具奏外雖無别需用駝隻之處但現今需用駝隻之時必得敷餘數百隻以備應用現在京城所有官駝三百七十八隻即交與方觀承歸併現在伊採買駝隻內㨂選臕壯者以備明嵗皇上巡幸南省應用外其餘臕缺疲瘐者加謹喂養以備應用奏入報聞乾隆二十一年十二月二十四日總理行營事務和碩莊親王允祿等奏言據兩江總督尹繼善奏請將明嵗隨駕官員所騎馬匹並應留車輛在附近徐家渡之王家營地方屯留一摺奉硃批總理行營處議奏欽此查上次聖駕南巡回鑾時係在順河集起旱是以各官員馬匹車輛就近在順河集屯留明嵗聖駕自徐家渡渡黃至回鑾時亦在徐家渡起旱則應留馬匹車輛自應在徐家渡附近地方屯喂無庸再駐順河集該督既查明附近徐家渡之王家營地形髙阜堪以屯駐即令該督於該處將應備草料等項飭員先期妥辦俟命下之日臣等行令該督遵照辦理并行知在京各該處一體遵照奏入報聞乾隆二十一年十二月二十四日允祿等奏言恭照明春聖駕南巡隨往江浙大臣官員兵役執事人等前經奏明統以六千馬匹核計隨往今按各處冊報隨往人數計算馬匹不敷臣等酌定將原議二人給馬三匹者改為每人給馬一匹合計需馬五千六百六十九匹至渡黃以及各名勝處原議派馬俱在四千匹以內今照依原奏渡黃時按人減馬應需三千八百一十二匹名勝處按差減人應需馬三千九百五十六匹應開單行知兩江總督遵照仍交兵部查照原奏辦給馬票一面知照各該處將單內隨往名勝處所減派人數通融辦理至船隻一項應令該督遵照原奏將預備上用船隻敬謹預備其隨往官兵人等船隻亦按奏定船數及單內人數分别派撥奏入報聞乾隆二十二年正月初七日軍機處㑹同兵部奏言據河南巡撫圖爾炳阿奏稱竊照西路軍營文報向由陜晉直𨽻一路轉遞京師明嵗春正恭逢聖駕南巡啓鑾之後若仍由晉省遞京未免路逺稽時臣等查豫屬之內黃縣路通直隸考城縣壤接山東永城縣界連江省凡軍營文報自應由陜省潼關出境即從豫省就近遞送行在庶可速達御覽但查豫省並未設有腰站恐一有遲悮關係匪輕應於陜豫交界之閿鄉縣起凡路通直隸山東江南三省之各州縣挑撥好馬安設正腰各站以速遞送但各站事務僅責成該管州縣經理查各該州縣均有地方事務不能時刻在站照察勢必委之丁役人等若輩不知緩急恐不無稽延應每二站就近派委佐雜一員遇有文報到站即稽查件數接送時刻登注排單號簿限日行六百里者刻即遞送仍令該管州縣及各府州隨時稽察其要站馬匹即於正站內抽撥既無增添糜費而馬匹亦可免疲乏除咨陜西直𨽻山東江南各督撫外理合恭摺奏明奉㫖軍機大臣㑹同兵部速議具奏欽此查先經直督方觀承咨稱今嵗恭逢皇上南巡請照上届東巡之例西路軍營文報由甘肅嘉峪關陜西定邊營山西保德州等處遞至直𨽻回龍關直送盧溝橋由良鄉遞送行營安設正要各站每站一律設馬五十匹於各該正站內派守備一員千把外委三員專司馳遞仍派道府丞倅等官往來稽查續據山東江南浙江各督撫亦照例一體安設今據巡撫圖爾炳阿奏稱豫屬內黃縣路通直隸考城縣接山東永城縣界連江省凡軍營文報應由陜省潼關出境就近遞送行在庶可速達查西路軍營文報由陜甘山西沿邊一帶遞至直𨽻良鄉縣計程四千六百四十里由良鄉至山東界計程五百九十里由山東德州至江南界計程九百一十二里今若由陜西潼關入河南閿鄉縣就近分路接遞自嘉峪關至潼關計程三千四百四十里自潼關由河南內黃縣至直隸計程一千一百二十里自潼關由河南考城縣至山東界計程一千一十五里自潼關由河南永城縣至江南界計程一千三百五里臣等統計核算查自嘉峪關由潼關至河南內黃縣共程四千五百六十里已較沿邊遞至良鄉縣之路相等若再由內黃縣遞送直𨽻各站程途轉逺七八百里及千餘里不等反不免紆遲應將該撫所請由河南內黃縣安設臺站接送直隸之處毋庸議至河南接連山東界之考城縣并接連江南界之永城縣較之由沿邊馳遞山東計近程七百七十五里江南計近程一千三百九十七里查軍機文報關係緊要自應就近接遞以期迅速應如該撫所請恭逢聖駕南巡啓鑾之後軍營文報准其由陜省潼關出境從閿鄉起於考城永城二縣等處安設正腰各站就近分路送往行營之該撫所稱每二站派佐雜一員登記號件令各該州縣稽查之處臣等伏查陜甘直隸等省遞送軍營文報臺站俱經奏明每正站各派守備一員千把外委三員專司馳送酌派同知通判往來料理併責成各該道府經理稽查今豫省僅派佐雜辦理恐佐雜不諳馳遞必委之驛卒等夫難保其一無遺悮應令該撫照直𨽻等省之例一體辦理其所需馬匹於通省驛馬內㨂選挑撥仍將派委員辨姓名臺站馬匹數目造冊報部查核俟命下之日行文該撫并直𨽻陜甘山東江南各督撫一體遵照恭遇聖駕巡幸直𨽻山東江南等省入境之日行在兵部即將入境日期知照河南巡撫遵照辦理奏入上諭曰依議著兵部行文陕督沿邊一帶尚有北路軍營奏報所有臺站仍照舊安設俟啓鑾後計程已抵山東境則西來文報即由潼關往送河南接遞至回鑾將抵直境即仍由北路馳遞其陜西河南山東江南浙江著該督撫各㨂派滿洲道員一人専司軍臺事務往來督察以期迅速乾隆二十二年正月初八日傅恆等奏言查本月十一日聖駕自京啓鑾按程核計應於十九日抵山東德州西路文報自潼關由河南考城縣至山東界計程一千一十五里以日行六百里扣算應即於十九日從潼關分路由河南馳遞約三日即可遞至行在大營臣等交兵部行文該省辦理至回鑾將抵直𨽻今行在兵部先期核算日期知㑹各該省仍由山西一路馳遞可也奏入報聞乾隆二十二年正月初十日允祿等奏言案照武備院奏將交與直𨽻總督喂養駝隻內除挑選使用外所剩駝隻趕赴紅花鋪喂養俟回鑾時預備補换一摺奉㫖著交與總理行在事務王大臣議奏欽此伏查今嵗皇上巡幸南省共需駝九百餘隻經直𨽻總督方觀承將武備院等處所用駝六百餘隻俱已採買其太僕寺䭾載黃布城之駱駝三百隻由臣等酌議交與護軍統領等雇覔使用又八旗所有官駝三百七十八隻亦由臣等議明交直𨽻總督方觀承歸入伊之採買駝隻內挑選肥壯者使用所剩疲瘦者仍著喂養預備補换業經奏明遵行今武備院惟恐又似前次南巡駝隻內疲乏甚多雖交地方官喂養並未能肥壯以致有悮大營黃城故請將所剩之駝隻趕赴紅花鋪等處喂養以作回鑾補换之用查此次自京起程至徐家渡止需二十餘日皇上升舟後即將駝隻交與地方官喂養則行走二十餘日之駝若喂養兩月有餘斷無不肥之理應著該武備院逐一驗明嚴交地方官妥協喂養倘似前次不能肥壯以致不堪使用即將該地方官等題恭如照武備院所奏將用剩駱駝三百七十餘隻俱趕赴紅花鋪備用則該衙門官員人等倚仗有補换駝隻領去之駝遂不愛惜反致多有瘦憊應將武備院所奏此次用剩駝隻不必趕赴紅花鋪仍照常存于直省喂養惟是所稱回鑾時正值雨水道濘難行臣等酌量擬議著交與直𨽻總督方觀承將此次用剩駱駝三百七十餘隻內挑出一百五十隻恭候皇上起鑾以後緩緩趕赴紅花鋪交與地方官等妥協喂養以備回鑾補用如此則官駝輕健捷速亦不致多所瘦憊矣倘䝉俞允臣即行文飭交直𨽻總督山東巡撫一體遵行奏入報聞乾隆二十二年正月十二日江蘇巡撫愛必達奏言恭照乾隆丁丑年春聖駕南巡一切應備事宜節經督臣尹繼善暨前撫臣莊有恭率同司道等官敬謹備辦今據江蘇布政司許松佶詳稱今查乾隆十六年翠華南幸所有扈從官員人等乘坐船隻需用縴夫并聖駕經由旱路遊覽名勝需用扛抬旱夫及回鑾需用車輛䭾載御用什物等項需用騾頭均於司庫正項銀內動支自應循照上届成例動用事竣據實報銷又扈從官兵馬駝沿途需用豆草麥麩以及屯駐馬駝地方設立買賣街購備麩豆等物上届係於司庫雜稅及驛站餘剩銀內借發預期採辦差竣之日將奉文支給應開銷者造冊請銷應發賣者解價歸款再行宫名勝備辦器具什物安頓御舟御馬搭建棚厰并槽䥷人夫運送冰塊修理道路橋梁開濬河道安設馬頭修墊縴路平治營盤等項上届係於司庫耗羡存公項下動支辦理均應循例動支事竣彚案報銷除取造估冊另詳咨部外所有動用銀款相應詳請㑹奏臣覆核無異除飭取清冊分咨户兵工三部備案外謹㑹同兩江總督臣尹繼善恭摺奏入報聞乾隆二十二年正月二十四日步軍統領衙門奏言查向來皇上巡幸各處臣衙門捕盜官兵番役人等所有拏獲竊盜取供後即送行在刑部該部辦理轉送行在兵部兵部始行交發地方官但行在刑部辦理交送兵部兵部尋交地方官之際二部俱無看守之人仍交臣衙門原拏官兵隨營押帶臣衙門番役捕盜兵丁俱係酌量派出為數無多若拏一犯看守即須三四人若拏數犯看守即致乏人且兵丁小人因所拏人犯仍交伊等隨營押帶在帳房看守伊等不免因有看守之責轉致託故不行勇往拏賊臣請嗣後凡遇皇上巡幸處所令經過省分地方之州縣逐日派佐雜官一員衙役十名隨處交與行在刑部跟隨帳房預備接收看守人犯如此行在刑部看守人犯有人臣衙門所拏事件亦能隨交隨收原拏官兵番役既得交出拏獲事件亦可另捕他犯隨營稽察甚有俾益俟命下之日除行文此次經過之該督撫遵照一體辦理外嗣後永著為例凡遇皇上巡幸俱照此例辦理奏入報聞乾隆二十二年正月二十七日兵部奏言查上届聖駕南巡臣部官員等俱在前面行走此次凡一應奏摺俱從後趕送請備坐船一隻令臣部官員等輪班在豹尾鎗後與軍機處官員一處行走至駐營時將船在布城從角灣住以便接遞事件再請將驛馬選擇十匹令隨在豹尾鎗後堤岸行走以備馳送事件奏入報聞乾隆二十二年二月十一日刑部奏言乾隆二十二年二月初八日奉上諭江浙二省讞獄滋繁陳臬之司素稱劇任兹朕巡省所至覃布恩膏黎庶均沾閭閻愷樂而有罪之人囹圄桎梏實由自取亦何恤焉但念獄一成而不變其中奸民之犯法者固多而無知誤蹈之人亦所時有况未抵於重辟尚可望其自新用播德音以符寬大所有江蘇安徽浙江等屬軍流以下人犯俱著加恩各豫減等發落從此案牘一清在問刑各官當益勵精勤期於明慎而凡爾百姓更宜各安本業勉為良民勿為曠典可以幸邀而輕國法也欽此仰見我皇上鑾蹕所臨太和洋溢恤刑宥罪特沛殊恩臣伏思此次皇上巡幸江浙現在軍流以下人犯仰䝉聖恩各豫減等惟是情罪輕重攸分辦理自應稍為區别臣詳加酌議所有江浙人犯該發遣黑龍江寧古塔及內遣雲貴川廣人犯罪與軍流相等應請一體援減此內如叛逆緣坐强盜免死發遣家奴喫酒行凶棍徒生事擾害用藥迷拐子女開窑誘賣并例應給披甲人為奴及擬軍之積匪滑賊情罪較重俱不准其減等其餘軍流遣犯俱應減為杖一百徒三年徒罪及雜犯准徒人犯減為杖一百其已經到配徒犯即行釋放逃徒並免緝拏枷杖人犯均應寬免應刺字者并免刺字其已經發遣軍流計其程限尚未到配核其情罪與恩㫖相符准其㑹赦減等再江浙之人有在别省犯案遞回原籍追贓僉配人犯計其犯事在恩㫖以前似應推廣皇仁俱准其減等發落其外省犯事遞發江浙軍流人犯與江浙現在軍流不同未便濫邀曠典均不在減等之例侯命下之日臣部行文各該督撫遵照辦理奏入報聞乾隆二十二年二月十六日直𨽻總督方觀承奏言竊查八旗官駝三百七十八隻奉文發直喂養備用嗣准部咨內開總理行營處議覆武備院籌備回鑾時補换駱駝一摺請於發直駝內挑出一百五十隻恭候皇上啓鑾以後緩緩趕赴紅花鋪交與地方官喂養以備回鑾補换之用奏准行知到臣伏查武備院䭾載之駝係六百隻今預備補换駝一百五十隻自可敷用臣昨至德州見東省撫臣進有駝隻又臣上年在張家口買有瘦駝牧放已久俱臕肥可用臣現在挑選一百隻趕赴紅花鋪一帶如䝉天恩賞收合之東省駝隻已可為沿途補换之用所有八旗官駝一百五十隻似可毋庸送往應請仍留直𨽻喂養以備木蘭差務奏入報聞乾隆二十二年三月二十九日兵部侍郎管順天府府尹劉綸奏言恭照聖駕回鑾內務府鑾儀衛衙門各行檔需用車輛臣先期前赴水次督同山東江南兩省道府委員并內務府司員稽核監放查山東省原分留京車一百三十四輛江南省原分留京車一百六十二輛並直𨽻協濟代雇車一百輛共四大套車三百九十六輛於本月二十五六七等日㑹同各員在厰陸續驗照支給計放過各行檔車二百八十二輛所有餘剩原車並兩省預備三套二套各車俱照上届成規酌聽隨駕大臣官員等自行給價添雇接濟疲乏餘仍交與兩省各員自行檢收以為沿途預備之用奏入報聞乾隆二十二年四月初九日浙江巡撫楊廷璋奏言乾隆二十二年三月初一日恭逢聖駕駐驆西湖臣等面奉上諭西湖之水海寧一帶田畝藉以灌溉今聞沿湖多有占墾若將墾􅌻之田挖廢歸湖小民未免失業如任其占墾將來湖身日漸壅塞海邑田畝有涸竭之虞於水利民田均有未便除已經開墾成􅌻者免其清出外嗣後不許再行侵占欽此臣等跪奉之下仰見聖主軫念民生􅌻籌水利至意伏查西湖故址周圍原額係三十餘里東南抵城西北接山受武林諸山之水滙聚成湖由湧金水門入城出艮山等門㑹上塘河而直達海寧沿塘民田數千頃皆藉湖水以資灌溉緣湖身寬廣水大則可容納無汛溢之虞水小則可停蓄無涸竭之患利益民生其功甚溥嗣經瀕湖小民栽荷蓄魚始則圈湖為蕩繼則開墾成田日漸侵占以致水利日多阻滯雍正二年荷䝉世宗憲皇帝敕令清查將所占田蕩豁除糧額照址盡行清出歸湖開通水源俾無淤滯下游田畝可以不虞旱熯伏查西湖舊址三十餘里彼時查丈僅存二十二里四分有竒通計裡外湖面一萬一千三百一十五畝淤淺沙灘三千一百二十五畝已失故址四分之一歷今三十餘年為時既久小民又復漸次占墾亟應清釐禁止仰䝉聖主洞燭情形敕令設法查禁臣等隨與藩司公同斟酌現在遴委幹員將湖址逐假悉心勘丈除久墾成田無礙水源者欽遵諭㫖免其清出外其現存湖面及淤淺沙灘逐段俱丈量清楚竪立標記飭委大員覆勘明確于湖岸立石永禁仍繪圖貼說存案查禁之後遇有侵占絲毫即照强占官湖律嚴加治罪至現存小民栽荷蓄魚之蕩止許用竹箔攔隔以通水道不許私築土硬圖為後日占墾帳本仍責令地方官於每年冬令水落時按圖勘丈一次倘有越占立押刨挖歸湖如無侵越即出具並無侵占印結申報各上司稽考倘敢瞻徇隱匿查出立即嚴參其已經墾􅌻田畝蒙聖主格外施恩免其清出但究係私占官湖俯俟丈出確數核明雍正二年清查以後復占墾田蕩各若干畝如果無礙水源容臣等具奏請㫖應否按畝酌量徴輸地租歸入西湖嵗修項下為挑濬西湖淤泥葑草等項之用恭候聖明定奪如此立法查禁庶小民不敢再行侵占湖水自可永不淤塞下游民田旱潦有資聖主恩施當與湖流永頌靡涯矣奏入報聞乾隆二十三年正月初十日楊廷璋奏言乾隆二十二年春恭逢聖主重幸浙江面奉上諭西湖之水海寧一帶田畝藉以灌溉今聞沿湖多有占墾若將墾􅌻之田挖廢歸湖小民未免失業如任其占墾將來湖身日漸壅塞海邑田畝有涸竭之虞於水利民田均有未便除已經開墾成􅌻者免其清出外嗣後不許再行侵占欽此欽遵先經㑹同前督臣喀爾吉善將酌籌清理情形恭摺奏請聖鑒欽奉硃批俞允臣隨飭委署鹽驛道事溫處道朱椿續又委鹽繹道張唯寅率同杭州府知府張逢堯等先將湖面通行查丈自雍正二年清理西湖丈量湖面周圍計二十二里四分迄今三十餘年沿湖居民或築隄為塘或培土成田逐漸占墾並淤淺沙灘共二里有餘現丈湖面祇存不及二十里之數此次清查自應以雍正二年丈定之數為凖將陸續占墾之處悉行刨挖歸湖以疏下游水利乃仰蒙聖主軫念民生將已墾􅌻者免其清出此誠聖主格外恩施臣敢不欽遵查辦第西湖之水攸關下游水利若將有礙水道之處一概准其存留恐日漸淤塞必至不敷灌溉似應分别辦理臣因率同司道并承辦各員親歷湖濵周遭相度將各處占墾之地蕩田畝及淤灘勘明有無阻遏水源逐一插籖記認分定應去應留明白揭示曉諭於秋杪收穫後令該道府督率佐雜各員分頭展復計小有天園迤西一天山腳下金沙港廟後錦帶橋內湖錢塘門迤南湧金門迤南清波門西首長橋等處共清出有礙水道之地蕩淤灘約計一里有零逐一開挖歸湖其已成田者概免刨挖內將小有天園門前圈占之水蕩清出建築馬頭不特湖船直達無礙而水源亦疏暢流通又於栁浪聞鶯處將開挖圈蕩之土方即用以築堤一道計長一百餘丈直至湧金門馬頭以作界限其於沿湖凹凸不齊之處各按形勢悉行裁直淤淺沙灘一律開濬深通現在丈實湖面已有二十一里二分零較前清出一里有餘其各處不礙水源之田畝地蕩尚有五百八十九畝零應遵㫖免其清出即照現在二十一里二分之湖面立石永禁侵占東面於湧金門馬頭之右西面于一天山腳下南於長橋埠北面於湖山春社之左共四處各立一碑將現在清出里數及侵占官湖例應擬流條款刋刻碑上俾小民咸知畏法遵守仍造冊繪圖存案每年責令地方官查丈一次稍有侵占立押刨廢徇𨼆即行參處所有免其清出之田畝地蕩雖䝉聖恩不豫刨廢但究係侵占既已免其治罪復仍歸管業自應酌量徴租以充嵗修疏濬西湖之用臣與司道悉心斟酌計其出息之厚薄定以租額之低昻每蕩一畝嵗徴租銀五錢田一畝嵗徴租銀四錢地一畝嵗徴租銀三錢造具户畝各確冊於二十三年起令地方官按數徴收解鹽驛道衙門歸入西湖租息項下以備挑濬修理公用自此畨清理後斷不容稍有圈占再沿湖雖已立石刋禁但湖身寬濶恐小民惟利是圖或於各處堤岸仍有侵損擬令地方官於清出之堤岸上照蘇隄之式沿岸栽插栁樹不特可杜小民侵損其根株盤結亦可堅固堤身且一二年後長發茂盛萬緑成隂更足與湖山增色所用刨費即於鹽道收存之西湖租息項下動支無需開銷正項錢糧現在湖面較前已大為開展湖流暢達水道不淤下游田畝從此倍資灌溉之利白叟黃童咸歌聖澤優渥樂利無涯矣奏入上諭曰好如議行欽定南巡盛典卷九十三
