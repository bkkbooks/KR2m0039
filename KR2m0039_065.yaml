body:
  text: 欽定四庫全書欽定南巡盛典卷四十六河防乾隆四十二年五月十八日河道總督薩載奏言竊臣前月在京時軍機處傳奉諭㫖令將從前開挑陶莊引河寬深丈尺及因何未成原委查明具奏臣回任後詳查案卷并考之河防志書康熙三十八年三月聖祖仁皇帝南巡閲視河工詔開陶莊引河一道引黃北注又於南岸標立御樁令築挑水大壩逼溜北行以除倒灌之患著落原任總河董安國原任河道馮佑挑築因開放過早旋即淤塞三十九年三月欽差刑部侍郎常綬員外郎費掦古查勘河務仍命大挑陶莊引河長七百八十丈寬三十丈深一丈三尺南岸加築挑水大壩長四十一丈寬十丈交與兵部尚書范承勳左都御史董訥督挑用銀二萬三千餘兩於四十年七月經前河臣張鵬翮開放是年黃水消落引河中段淤墊左都御史李柟題請加濬寬深經河臣張鵬翮飭挖新淤六百二十餘丈又將引河南岸積土運至北岸於積土之下加挑新河五百九十餘丈共用銀三萬餘兩彼時黃河藉以分流水緩沙停勢所不免五十一五十三兩年復經前河臣趙世顯兩次疏濬屢挑屢塞至雍正八年北岸長出淤灘遂致大溜南趨全由故道乾隆四年五月大學士伯鄂爾泰欽承簡命查勘河務事宜奏挑陶莊引河其時挑水壩尚存舊引河久已全淤河身隱約可辨訪問舊日河員前此不成之故由於河身太長河形稍曲河流未審而放水過急所致遂有河頭若不迎溜河尾若不順流開放若不及時三者有一於此無能成河之議請於舊河頭之東迎溜處定為河頭東北直下河尾正對惠濟祠挑長四百六十餘丈寬三十丈深一丈三尺并於南岸接築挑水大壩奉㫖准行前河臣髙斌正在興辦適大水驟至不及趕挑奏明俟秋汛後相機辦理逮汛水消退察看沙灘停淤形勢較前低窪恐水長易漫引河難望成功奏請於南岸御壩一帶建設木龍數架以資挑溜北趨毋庸再挑引河前議於是中止此從前辦而未成議而未辦之原委也茲臣悉心查核並體察前此屢挑未成之故皆由逼近舊河分流勢緩易致停淤此次仰䝉聖訓指授機宜在於積土以北開挑並將舊河築壩堵塞使河不兩行引溜北趨盡歸新河暢流東注是皆上賴聖主睿謨廣運始獲成功者也再臣衙門逺年册檔黴爛不全是以撿採河防志書以資考證彚叙各原案抄送軍機處備查奏入報聞同日兩江總督髙晉河道總督薩載奏言竊照陶莊開挑新河一道仰䝉我皇上厪念淮黃關鍵指授機宜不惜多費帑金惟期有利民生河道始則按圖垂示親定河頭以迎大溜並令一律挑挖寬深俾得易於趨注繼又命俟桃汛水長之時擇吉相機開放並以河不兩行諭將舊口嚴密堵禦務使水無分泄全走新河直逹周家莊㑹歸東注凡茲睿略宏深聖裁獨斷諄諄訓示至再至三臣等敬謹遵循督率辦理放水之日黃流暢注頃刻成河在工文武官民歡聲雷動莫不感頌我皇上聖敬格天百神效職所致臣薩載進京陛見復䝉聖主靣示善後保固事宜應行加築壩工以為重門保障添扎木龍以資挑溜護崖宸慮周詳益加慎重現已欽遵趕辦尅日告成至於崇祀報功敕建河神廟宇臣等約估需銀三千餘兩現在集料鳩工謹繪廟圖貼說并繕清單進呈恭候欽定伏念我皇上至仁如天大智如神維茲新河之成事事皆由廟算臣等恪恭將事幸覩成功惟有恭懇御製鴻文頒發勒石俾豐碑之屹峙曕睿藻之輝煌共仰聖謨昭垂千古並乞御賜匾額對聨用酬靈貺益隆盛世懷柔之典永荷河神效順之庥臣等不勝踴躍欣幸奏入上諭曰知道了俟書成頒去乾隆四十二年六月十四日河道總督薩載奏言竊臣前月㑹奏陶莊新河迤上添築壩工摺內聲明從前兩次挑挖陶莊引河原委詳查案卷另行具奏句上奉御批並當查古有在陶莊迤北河流之事否或自宋明以來即流陶莊以南之處詳悉查明以便作記也欽此查康熙三十八年以來挑挖陶莊引河原委業經繕摺奏明茲䝉諭㫖令查前古河流之處臣復委員檢查書籍三代時河未南行自漢以後屢見入淮旋經塞治仍由北行入海惟至宋紹熙五年即金章宗明昌五年是嵗河徙陽武而東分為二派一由北清河入海一由南清河入淮是為黃河南行入淮之始明宏治六年築斷黃陵岡河全南行北派流絶正德四年河决曹縣楊家口直抵豐沛自汴城下徐州經邳宿至桃源自桃源三義鎮入口由毛家嘴繞清河縣舊治後大河口㑹淮流謂之老黃河按入三義口出清河縣舊治後㑹淮係在陶莊迤北嘉靖初年三義口淤塞河流南徙出清河縣舊治前與淮水交㑹於小清口按小清口即今淮水所出之清口係在陶莊以南除條晰摘叙另繕清摺恭呈御覽奏入上諭曰朕之陶莊新河碑語大槩弗錯知道了同日河道總督薩載奏言竊照陶莊新河迤上欽奉諭㫖加築壩工一道經臣等㑹勘興辦並將做過工程分數先後恭摺奏聞茲查該處壩工原估臨黃一靣廂做掃工靠裏用土填築開工以來土掃同時並舉臣督率道將等查催儧做仰賴皇上洪福天氣連晴人夫踴躍業於五月十五日廂築完竣計長一百三十丈頂寬五丈內臨黃掃工寬二丈裏靣土工頂寬三丈底寬十二丈臣逐段量驗均係照估築做如式堅實新河下首得此重門保障往後大汛經臨抵禦有資實可放心至新壩南首壩頭起至老堤止灘上接築土堤亦已儧趕完工尚無草率虛鬆諸弊再南岸頭架木龍迤上御筆圈示添扎木龍一架臣等奏請將應行啓拆之第三架舊木龍移建目下已經拆起改扎有六七分工程查該處溜勢從前緊靠南岸前月興扎木龍時即已逐漸挑動此時雖未扎竣而大溜業已直逼中泓實為得力仰見聖明指授機宜無逺弗照凡在工人員莫不中心欽服奏入報聞乾隆四十二年七月十七日河道總督薩載奏言竊臣於本年五月二十三日奏報陶莊新河迤上加築順黃壩工完竣一摺奉到硃批欣慰覽之欽此於摺內南岸頭架木龍迤上御筆圈示添扎木龍一架此時雖未扎竣而大溜業已直逼中泓句上奉硃批具一圖來看欽此伏查外河頭架木龍迤上仰䝉聖明指示添扎木龍一架於六月初旬扎辦完竣臣親往勘驗該處溜勢直逼中泓挑溜實為得力當於本月十二日㑹摺奏報所有該處溜勢情形謹㑹同大學士督臣髙晉遵㫖繪圖進呈奏入報聞同日兩江總督髙晉河道總督薩載奏言外河南岸莭年以來舊存大小木龍共有七架上年冬間挑挖陶莊新河之後在於第四架木龍處築做清黃界壩一道各架木龍上下間隔當於本年二月二十八日㑹摺奏明五六七三架在新壩之下淤入土中應將各架木植刨挖拆起以為將來改扎木龍之用頭二三三架正對新河第四架已在新河口下應移在二龍迤上扎做逮後臣薩載進京陛見靣奉諭㫖於頭架木龍之上添扎木龍一架回任後即欽遵御筆圈示處所將第三架拆起舊木如式添建長五十丈於扎竣後恭摺奏聞茲查新添木龍之下舊有頭架木龍現尚堅整無須移動其龍尾起至二木龍頭空檔長一百餘丈相距較逺挑溜恐難得力是以二月內臣等奏請在於中間再添一架仰䝉允准今自扎成新木龍以來大溜均已挑入中泓舊有頭架木龍又屬得力臣等相度形勢復加商酌舊二木龍原長三十丈正屆拆扎之年只須將該架移上二十丈再於龍尾加長二十丈共長五十丈升關往河心稍挺即資挑溜護灘臣等商定後即令趕緊扎做業已辦有五分工程順黃壩南首一帶已長新淤著有成效所有二月內奏請二龍迤上添扎之一架無庸再辦其陶莊新河內南岸河崖自峙家莊對岸起至河尾一帶共長三百四十一丈因灘土逼近新堤春間用木筏攩護現在均屬平穩溜往北趨北岸日見塌坂灘崖陡立惟是該處河靣現寬七八十丈及九十丈不等前扎木筏窄小恐於挑溜不甚得力臣等往來商酌若於峙家莊對岸處將拆存舊木添扎三十丈長木龍一架又於下首再添二十丈長木龍二架分段安設以資挑溜直刷北岸而南岸河崖亦可永資保護實有禆益奏入上諭曰甚好已於圖內批示矣又諭曰應改木龍甚好乾隆四十二年七月十八日兩江總督髙晉河道總督薩載奏言臣等在清口工次接准乾隆四十二年七月初四日廷寄欽奉上諭前據薩載奏陶莊新河溜勢湍急河頭河身河尾現加寬濶形勢較前更為暢順等語具奏於六月十二日奏到距今二十餘日未據續奏現在伏汛甫過已當秋汛之期黃水自較前加長不知近日新河溜勢若何能否暢流無滯以及清口出水是否暢出有力足資禦黃朕心深為厪念著傳諭薩載即將該處實在情形迅速由驛覆奏以慰懸注此㫖著由五百里發往并諭髙晉知之欽此臣等跪讀之下仰見我皇上厪念河防垂詢殷切曷勝欣感伏查陶莊新河前經臣薩載於六月十二日將溜勢暢順情形恭摺具奏嗣又時刻留心察看南岸河崖自峙家莊對岸起至河尾一帶共長三百四十一丈因灘土逼近新堤春間用木筏攩護均屬平穩溜往北趨北岸日見塌坂甚為有益祗以該處河靣現寬七八十丈至九十丈不等前扎木筏窄小恐於挑溜不甚得力臣等往返商酌將拆存舊木添扎木龍三架分段安設庶資挑溜直刷北岸則南岸更可永資保護啇定後並將欽定添建木龍挑溜得力情形及各工平穩緣由於六月二十七日繕摺繪圖恭呈御覽仰邀聖鑒臣髙晉於六月二十六日自省起程來工防汛經淮掦各㕔一路查勘工程於七月初三日抵清口復㑹同臣薩載親赴陶莊新河上下查勘該河溜勢直趨北岸暢流無滯峙家莊對岸擬扎之木龍現已興工察勘形勢較木筏更屬得力現在北岸灘崖日見刷塌測量河靣寬自七十餘丈至八九十丈不等深自二丈三尺至二丈七尺伏秋之交黃河水勢雖較前加長而新河暢順情形與臣等前奏無異原築之清黃界壩及添築之順黃壩工均甚穩固實可放心清口口門現寬四十五丈溜勢奔騰暢出有力抵黃直至彭家馬頭迤下㑹歸東注入海上游徐城志樁存長水一丈一尺六寸既有徐州迤上北岸之蘇家山南岸之毛城鋪各壩分泄不致盛漲黃河循軌下注上下運河水勢有長有消黃運湖河各工仰賴聖主洪福伏汛已慶安瀾臣等現在繕摺專差賫奏此後秋汛為日正長臣等惟有督率道將㕔營上下巡看䇿應如黃河水勢再長尚有邳睢㕔屬之峯山閘桃源㕔屬之祥符閘均係分泄異漲之路可備開放如洪湖水勢加長清口東西壩尚可酌量拆展總期察看情形因時籌酌相機辦理隨時奏聞以仰副聖主慎重河防之至意奏入報聞乾隆四十二年十一月初七日兩江總督髙晉河道總督薩載奏言竊臣等前奏陶莊新河情形及舊河三架木龍之下請添木龍一架以資挑護緣由一摺由五百里馬遞發回奉到硃批覽奏俱悉如所議行餘有㫖諭欽此摺內抽挑寬深溝槽臨河酌留土格俟來年水長放溜句上奉硃批此計甚好欽此又添扎木龍一架句上奉硃批是欽此並接准廷寄欽奉上諭據薩載奏黃運河湖情形一摺已於摺內批示及閲進到新舊兩圖舊圖順黃壩外已有停淤故大溜趨北及閲新繪之圖則河流直抵壩根嫩灘所存無幾自係河勢向南略逼刷去停淤前此朕命添築順黃壩薩載在京時意尚以為可以不辦朕為之詳悉指示始遵照辦理就現在情形而論若非此壩為重門保障河流之南逼者不且直到攔黃壩根乎又閲新圖河北岸長有嫩淤一帶北淤則流必南趨乃一定之理因於其處用硃筆標記急宜將此一帶嫩灘切去使其不復停淤則南岸所添之木龍挑溜自更得力河流必日漸北趨不復搜刷壩根新河正溜亦益當暢順實為目下最要機宜著傳諭髙晉薩載及此時即速實力遵辦以期妥善仍將辦後情形迅速覆奏著將硃批兩圖發往由五百里傳諭知之欽此臣等跪讀數四仰見我皇上聖明逺照洞矚情形訓示周詳無微不至臣等感激服膺更知有所遵循伏查陶莊新河前於伏秋汛水盛長時溜走中泓南岸順黃壩外係屬回溜水淺沙停長有淤灘保護壩根甚為有益逮汛水消落後溜勢直趨順黃壩工邉掃不時坐蟄雖經搶護平穩而南岸淤灘漸次刷去以致北岸長有嫩灘誠如聖諭由於河勢向南略逼之故今春幸䝉皇上指示機宜添此順黃壩以為重門保障不然河流南逼勢必直至攔黃壩根則舊河一錢壩工關係更重是皆仰賴聖主智炳幾先早已度料及此臣等與在工文武各員莫不共深欽服今北岸新長淤灘實屬急應挑切之工臣等現在凜遵諭㫖督率趕辦惟測量該處淤灘計長三百九十餘丈半係嫩淤挑挖難以著定且嫩灘旋切旋淤恐難盡刷臣等再四思維往返札商一靣應將淤灘設法挑切一靣於裏身再抽挑引渠一道存留埂界河頭酌築土格俟來年汛水長發時與下截溝槽一併開放引溜北趨滙歸新河並將南岸現擬添扎木龍一架趕緊辦理將升關挺入河心使之挑溜得力則北岸淤灘自可刷去而南岸順黃壩外亦可望其漸次停淤以資外護新河正溜亦必更加暢順臣等惟有凜遵聖訓實力妥籌相機修防以期仰慰聖懷所有臣等遵㫖籌辦情形謹繕摺由驛覆奏並於奉發原圖內再行粘簽恭呈御覽伏乞皇上睿鑒訓示再順黃壩邉掃前經隨時廂壓直至老土迄今匝月並無續蟄甚為穩固其新河內水行迅速溜勢暢順合併陳明奏入上諭曰覽奏稍慰如所議行乾隆四十三年二月二十八日大學士兩江總督髙晉河東河道總督姚立德奏言竊臣髙晉在京陛見面奉聖訓以山東獨山等湖近年收水較小命於回任之便順道查勘並將乾隆四十年九月內㑹勘議奏原摺原圖發看臣髙晉遵於二月十三日行抵汶上與臣姚立德㑹晤即由彼取道南往同赴獨山湖遍加看視查該湖周圍六十五里收蓄汶水濟運本為東省第一水匱由永定永安永泰三斗門收水入湖從金線利運二單閘出水入運向年原定收水九尺七八寸逮乾隆四十年九月內臣髙晉奉命到東㑹同臣姚立德勘明議定應以收水一丈一尺為凖方足濟運並請將臨湖一帶單薄堤埝分别修整以禦風浪奏䝉聖鑒俞允四十一年冬間臣姚立德即率同運河道章輅照估辦理完竣屆期收水一丈一尺是年南北運河水勢充足甚為有益上年因夏秋兩澤希少汶水來源甚弱重運過後湖中僅存底水八尺經臣姚立德督飭該道將臨汶各州縣山泉逐一疏濬又將汶河淤淺之處製用刮板疏出河泓並將汶上寧陽二縣原由魯溝入汶之濼澢等十二泉設法疏導使之由春秋壩南流合馬莊一泉同入獨山湖以廣來源自冬徂春百計經營三月有餘得以加收水二尺二寸今臣等查驗志樁連底水共存一丈零二寸雖與定志尚少八寸而較之向年所收九尺七八寸則已加收數寸湖面現髙運河水靣四五尺不等本年重運經臨次第宣泄亦敷應用惟是泉源之大小全在雨水之多寡若遇雨水稀少之年汶水長發較弱泉源同一微細似不足恃今䝉皇上厪念諸湖儲蓄復命臣髙晉㑹勘臣等率同道㕔等詳加勘籌悉心講論必須籌一永資利賴之方庶免終嵗經營之患而獨山一湖捨收蓄汶水之外别無良䇿祗以汶水發於伏秋來時甚驟消落亦速水小之年不及多收蓋由各斗門較窄之故今量永定斗門現寬一丈八尺進水尚利應仍其舊永安永泰二斗門各止寬一丈石底亦髙七寸進水較少臣等酌議應將該二處斗門各添磯心改為二孔每孔寬一丈八尺落低七寸與永定斗門尺寸相同統計三處進水口門共有九丈較之原寬丈尺已增倍餘並將引渠一律挑寬俾汶水隨長可以隨時多收但念伏秋水性渾濁斗門進水既多流入湖中難免淤墊又不可不慮及於此查三斗門以內相距湖心本逺臨汶灘上低窪之處甚多儘可納於金線閘後至徐家莊湖坡之上舊有攔水停淤土埂一道年久風浪撞刷僅存基址既不能攔水更且不能停淤今臣等擬將此一帶土埂培築髙厚並於引渠臨湖之處各建斗門一座遇伏秋收蓄汶水之時先將臨湖斗門下板關攔將汶水收入灘上低窪處所俟其澄清即將臨湖斗門全啓使之灌入湖中其引渠並窪處所澄之淤仍於每年冬底勘明挑挖疏治將挑起淤土或幫培子堰或移放逺處以免淤積有礙入湖水道至沿湖圈堤所修石工現俱整齊季家路以東民堰亦經土民上年借帑一律修築石創自可無虞風浪汕刷惟孫村吳家坑觀音嘴等處草工四段共長三百五十丈每年尚需修做若改砌碎石坦坡既可省嵗修之繁更可一律穩固以上各工臣等按照漕規確估計需銀二萬一千餘兩費所當費實為一勞永逸之舉如䝉俞允臣姚立德即咨撥司庫銀兩遴派熟練工員於汛水未發之前妥速趕辦完竣以備乘時收蓄為來年濟運之計臣等復自濟寧至韓莊一路查勘東岸之馬埸湖現在水深五尺九寸獨山湖現深六尺八寸西岸之南陽昭陽二湖現深三尺至五尺二寸不等計本年蓄水均尚充裕微山湖水深一丈二尺較定志則更多一尺現已開放濟運足資接濟均可仰慰聖懷奏入上諭曰即當速行妥辦又諭曰所奏是乾隆四十三年三月二十一日兩江總督髙晉河道總督薩載奏言竊照中河㕔屬楊家莊運口為漕艘往來要津自上年開挖陶莊新河黃流全趨北岸河尾逼近口門適當回溜每易淤淺渡黃漕船行至李家莊溯流挽運方能入楊莊運口而鹽閘又相近運口未免吸溜倒灌是該處口門形勢既與從前不同自應另為改易本年正月內臣髙晉在京將前項情形面奏請將楊家莊運口移於下游李家莊地方並將鹽河閘及頭二三草壩一併改移俾形勢就下使清黃三道並行滙黃入海繪圖貼說恭呈御覽仰䝉聖鑒以事屬應行命即照辦茲臣髙晉陛辭回南於二月二十五日抵清口接印後即㑹同臣薩載前往該處督率道將㕔營上下相度口門一帶既不便使之髙仰亦不宜過於窪下髙則不能出水窪則勢若建瓴又恐泄水太過有礙運行今較量地勢髙下在於舊鹽壩以東四十丈處估挑河身一道長一千一百九十餘丈直至李家莊出口仍築頭二三草壩以為收束則中河清水㑹黃東注形勢較順其河身挑起之土即以築做兩岸縴堤亦屬便易至東岸鹽河石閘一座為運行葦左營蕩柴及淮北鹽船出入門户每年夏秋中河水長則開放鹽閘將有餘之水分入鹽河以濟鹽柴運行冬春水小時則下板堵閉以資收蓄亦為最要之關鍵今中河運口既經改建則鹽河石閘改設之處並須位置得宜茲公同籌酌在於新挑河七百八十丈處所斜挑倒勾引河長二百十丈以逹鹽河於引河上口築做鉗口草壩下口建設石閘較之從前逺近髙下之勢亦甚寬展相宜核計移建運口挑河築壩改設閘座等工共估需工料銀六萬九千八百餘兩即在河庫所存銀內動用毋庸另請錢糧查挑河築壩工程兩月內即可完竣惟移建石閘必須曬晾乾透灰漿膠固方可放水每年鹽柴船隻於糧船過完五月內即須儹運該處閘座自應拆舊建新以免多費臣等復加籌酌鹽壩以東所估新河若此時動工挑挖趕漕船回空時即可開放通行但移建鹽河新閘一時難以趕辦查該處舊閘共有二十一層牆髙二丈五尺從前水大之年閘牆出水七八層計髙九尺餘寸所有上截閘牆酌量先行起拆六層建造新閘底盤仍由舊閘下截量加柴土填平以濟今嵗鹽柴運行逮冬間船隻過竣再將舊閘下截石料拆起移做新閘上截全行修整俟通閘乾透然後放水閘座既可經久而漕運鹽柴均可無悮從此清黃三道滙黃入海與全河形勢更為順利矣再外河順黃攔黃兩壩中間空檔臣髙晉遵即傳㫖臣薩載一律填平現在委員勘估妥辦又具題報銷案內所繪之圖未確今亦遵㫖於現繪圖內更正合併聲明奏入上諭曰諸凡皆妥欣慰覽之河口既改大王廟或移或新建何未言及欽定南巡盛典卷四十六
