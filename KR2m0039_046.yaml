  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_046-1a, image: WYG0658/WYG0658-0515c.png}
body:
  text: 乾隆二十二年六月二十六日江蘇布政使託恩多奏言竊查本年恭逄鑾輅南巡恩綸疊沛蠲賚頻仍已屬淪肌浹髓復於聖駕經過之句容等十四州縣並去秋歉牧之清河等六州縣以及駐蹕之江寧五縣將本年地丁錢糧分别蠲免三分五分以及全行豁免仰見嘉惠子來更屬有加無已之殊恩也臣伏思皇上軫念民依政先貧乏且經臨之處絲粟不以擾民在田多大户非名列縉紳即席豐履厚衣租食稅垂及百餘年即今乾隆二十一年以前之地丁十年以前之漕項凡有積欠悉邀恩免已不下二百餘萬田多則積欠自多一經邀免其所以仰沐天恩者較之小户不啻什伯其倍今欽奉俞旨恩蠲三分五分並全免之地丁猶得與貧乏小户共霑惠澤更且獨受其豐揆之縉紳富戶恐亦自慚非分也臣愚昧之見竊謂與其並蠲於大户莫若先儘小戶錢糧全行蠲免省一嵗之追呼裕四時之耕作億萬貧黎更為頂戴深仁於罔極合無仰懇皇上天恩俯準仿照乾隆四年前督臣那蘇圗奏準全蠲五錢以下小户之例稍為變通將應蠲三分之州縣將三錢以下之小戶全行蠲免應蠲五分之州縣將四錢以下之小戶全行蠲免其蠲剩之數再以三錢四錢以上至三兩四兩以下之中户分别扣蠲至全免五縣之地丁其中尚有例不並蠲之耗羡等銀並請聖恩攤入五兩以上之大户按田徴收五兩以下之小户竟行全免究之大户邀免之賦尚倍多於小戶總在皇恩雨露涵濡之中並無偏倚不均之處如蒙恩允仰懇敕下督撫二臣督同臣乘此停徴之時分飭州縣核定扣蠲定數造册申送臣躬親核實轉呈督撫奏聞咨部一靣飭令州縣刋明易知由單給發各糧戶以便啓徴輸納仍不許假手書胥以滋花分勒索諸弊似此辦理臣非不知經徵州縣多此稽查扣報之繁但事茍有益於民生豈敢任其避難就易仰負皇上念切民依無微不屆之至意用敢敬獻芻蕘奏入上諭曰託恩多奏南巡經過駐蹕及去秋歉收各州縣恩蠲本年地丁錢糧先儘小户分别蠲免一摺所奏甚是江省乾隆二十一年以前之地丁十年以前之漕項積欠頗多前經降旨概豫豁除此等積欠多屬大户業已邀恩格外現在恩蠲本年地丁大户少占一分則小户多受一分之益自應照議查辦愛必逹已補授雲貴總督陳宏謀尚未到任著將原摺抄寄尹繼善令其細心核實辦理乾隆四十五年七月十八日江蘇巡撫吳壇奏言切照今春恭逄翠華南巡皇上特沛恩綸將江蘇省厯年積欠災緩各項銀米概豫蠲免小民感沭鴻慈靡不淪肌浹髓臣等現在飭令江蘇兩藩司將所屬未完應蠲銀米於去冬奏報截數之後至今春欽奉恩旨之時又有續完若干應免數內扣除核實造册另行遵旨題豁外兹查有吳縣公田餘租積欠一項緣該縣向有公田一萬二千五百餘畝原係明嘉靖年間夲地富民捐置其承種民戶除完納地漕等項銀米之外嵗收租息以為添補漕運之費自入我朝以來此項公田應完租息民間久未完納逮乾隆三十一年八月經前撫臣明德據吳縣知縣介玉濤查出碑據奏明將此項公田每年應徴餘租米二千二百二十七石遞年抵補吳縣逃亡無著錢糧之外嵗餘米一千數百石留為該縣地方公用等因厯年遵照存留即作該縣嵗修河渠等項公用足敷動支嵗有餘剩隨時報部在案祗因此項餘租有類民間租息並非正賦亦不入正項報銷偶遇歉收之年悉照應徴原額定數催徴並不按照災分辦理以致嵗有逋欠而向來每遇恩旨亦從未援請蠲豁計自乾隆三十二年起至四十三年止共積欠餘租折色銀一萬九百八十九兩五錢七分七釐逐欵清釐均係實欠在民並無官侵役蝕情弊伏思江省正項錢糧一切災緩積欠俱已仰沭殊恩普行豁免而此項餘租舊逋因係租欵轉未能與正賦一體邀恩蠲除恐將來欠項日多益增民纍且與現在恭辦恩旨之案亦未畫一臣等愚昧之見可否仰懇皇上天恩將此項公田餘租積欠附入本年恩蠲案內一體蠲免俾民欠租息與民欠正賦同沭膏澤庶不致稍有向隅並請嗣後如遇歉收之年亦照别項民田之例一體勘明災分將應完租息隨同該縣正賦一律蠲緩以昭聖慈公普同仁之至意奏入上諭曰著照所請行該部知道欽定南巡盛典卷三十四
