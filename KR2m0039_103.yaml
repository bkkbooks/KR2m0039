body:
  text: 欽定四庫全書欽定南巡盛典卷七十褒賞乾隆二十九年十月十五日上諭內閣曰朕明春恭奉皇太后安輿巡幸江浙扈從人等需用船隻俱照每船水手按名給與雇值第念該船户等在途駕駛往還實為勞勩其應行抵通船隻守候更不免需時若照常價每水手一名日給口食銀五分資給或未能充裕著加恩將所有扈從船隻按照水手每日每名日增給銀一分抵通船隻每名日增給銀三分該督撫等即于恩賞及上屇餘存銀兩內動用並責成司船之員稽查妥辦毋任胥役人等從中侵蝕俾船户均沾實惠乾隆三十年正月十八日上諭內閣曰朕恭奉皇太后安輿巡幸江浙鑾輿所蒞宜廣慈仁以昭盛典所有經過直𨽻山東二省之老民老婦著照從前恩詔之例賞賚用昭優老引年之意乾隆三十年正月十九日上諭內閣曰朕翠華南幸經過直𨽻山東二省辦差文武各官住俸罰俸降級之案俱著加恩準其開復如無此等參罰案件者各加一級同日上諭內閣曰此次南巡所過直𨽻山東二省派出辦差兵丁著加恩賞給兩月錢糧乾隆三十年正月二十日上諭內閣曰朕因巡幸江浙前經降旨于江浙二省冬兊漕糧內各截留十萬石預偹臨時平糶之用此項減歇漕船向例止給一半月糧於該丁等生計未免拮據著加恩於應給月糧之外冉賞給十分之二乾隆三十年正月二十三日上諭內閣曰朕恭奉皇太后安輿省方問俗凡清蹕所經祗令灑掃潔淨毋事華飾及添建行宫屢經降旨申諭而地方大吏以慈駕臨駐氊廬究不若屋宇之安善尚有葺治行館以供憩息者因其義適溫凊且成事不説是以不復禁止茲停景州見一切位置頗為妥適從前所賞公帑尚恐不敷應用在封疆大臣善體朕意雖不致派纍閭閶而各官或有捐亷經理亦非所以示體恤著加恩於直𨽻存公項內賞銀二萬兩以裕工作之需冉山東亦有新建坐落三處經畫量與直𨽻相同亦著於該省存公項內賞銀二萬兩充用該部即遵諭行乾隆三十年二月初八日上諭內閣曰朕恭奉皇太后安輿巡幸江浙翠華所至愷澤覃敷而優恤髙年推恩宜渥著將江南浙江二省男婦年七十以上者俱照從前恩詔之例一體賞給以示恩賚乾隆三十年二月初十日上諭內閣曰此次南巡所有江浙二省派出辦差兵丁著賞給兩月錢糧以示恩賚乾隆三十年二月十二日上諭內閣曰朕巡幸江浙所有該二省辦差文武各官任內罰俸住俸降級之案俱著加恩準其開復其無此等參罰案件者著各加一級乾隆三十年二月十三日上諭內閣曰水手吳賔吕聖林劉皇太著加恩賞給八品頂帶乾隆三十年二月十四日上諭內閣曰江南浙江辦差滿洲兵丁著加恩賞給一月錢糧乾隆三十年二月十五日上諭內閣曰朕恭奉皇太后臨幸江浙推恩錫類優渥引年著將江寧京口杭州乍浦駐防男婦年七十以上者亦照從前恩詔例一體賞給以敷慶澤乾隆三十年二月十六日上諭內閣曰朕此次南巡體恤兩淮啇衆先期傳諭不令捐輸繁費而伊等趨事踴躍甚屬可嘉著加恩均照本身職銜各加一級乾隆三十年二月十七日上諭內閣曰原任吏部尚書王安國之子生員王念孫著加恩賞給舉人一體會試乾隆三十年二月十九日上諭內閣曰京中隨來水手網户著賞給一月錢糧江南水手頭目著賞給一兩重元寶兩個水手每人著賞給一兩重元寶一個拉縴河兵一千名著賞給一月錢糧乾隆三十年二月二十日上諭內閣曰此次渡江各船水手人等往返駕駛俱屬黽勉著加恩於應給雇值四分外每名每日各增給銀一分以示體恤該部即遵諭行乾隆三十年二月二十五日上諭內閣曰拉縴六班河兵俱著加恩各賞一月錢糧管兵守偹等各賞金牌一面銀牌二面千總把總各賞銀牌三靣效力千總把總各賞銀牌二面下船催趲拉縴河兵之水手網户十四名各賞給一兩重銀錁一個乾隆三十年閏二月初六日上諭內閣曰翰林院編修陳邦直著賞給翰林院侍讀銜乾隆三十年閏二月初八日上諭內閣曰此次接駕一百七嵗之訓𨗳王世芳著賞給匾額並縀二匹乾隆三十年閏二月十二日上諭內閣曰沈德潛錢陳羣江浙耆宿也並以卿二子告里居曩者省方東南存問所及特晉尚書階優頒廪祿茲時巡蒞止二臣咸扶杖迎謁耄耋而神明不衰維國之瑞朕甚嘉焉其各加太子太傅以寵異之沈德潛之孫錢陳羣之幼子各一人並賜舉人一體應禮部試俾二臣益欣愈恬飬以躋期頥副朕優髙年眷舊臣之意乾隆三十年閏二月十九日上諭內閣曰沈德潛錢陳羣前以侍郎子告里居曾降旨準令在籍食俸今已晉加尚書銜俱著照加銜食一品俸乾隆三十年閏二月二十三日上諭內閣曰食二兩錢糧水手頭目吕聖林劉星太等俱賞給八品頂帶每月仍賞給錢糧一兩同日上諭內閣曰京城水手網户著加恩各賞給一月錢糧江南水手頭目著各賞給一兩重銀錁兩個水手等著賞給一兩重銀錁各一個拉縴河兵各賞一月錢糧乾隆三十年閏二月二十四日上諭內閣曰原任禮部侍郎蔡世逺之子蔡長訥原任江蘇巡撫邵基之孫邵洪俱著賞給舉人一體會試乾隆三十年三月二十五日上諭內閣曰由亰都隨來之水手網户著賞給一月錢糧江南省水手頭目等賞給一兩銀錁各二個水手等賞給一兩銀錁各一個拉縴河兵一千名每人賞五錢銀錁各一個乾隆三十年四月初二日上諭內閣曰東省拉縴河兵著加恩賞給一月錢糧乾隆三十年四月十一日上諭內閣曰皇太后御舟及隨從各船所有直𨽻拉縴河兵六百名每人著賞銀二兩乾隆三十年六月二十二日上諭內閣曰此次南巡接駕人員據吏兵二部查開履歷案情朕詳加檢閲核其緣事情莭內因考試休致之編修沈齊禮周龍官陸樹本戈岱邵齊燾焦汝翰檢討艾茂李臺金維岱等九員有情願來京考試者準其自行來京候朕考試定奪至因事降革之沈慰祖陸朝棟鹿驄豫王銘琮宫去吝胡邦祜季允性莫如忠張學浩朱煥彭朝元張度候克岐張開仕史錦陶淳黃玊衡胡啓植唐廷櫆葛㞳起董鈞倪存謨蔣學鏡邵謙吉顧偉烈吳嘉善周鼎劉世宏余崇年宋齊嶽耿佩誠戴超糜大禮孟明逺等三十四員著該部行文調取來京引見冉降諭旨其不願來京者聼之乾隆四十五年正月十四日上諭內閣曰此次南巡所有直𨽻山東派出辦差兵丁著加恩賞給兩月錢糧同日上諭內閣曰朕翠華南蒞行慶施恩所有經過直𨽻山東二省凡老民老婦著加恩賞賫用示優老引年之至意乾隆四十五年正月十五日上諭內閣曰此次南巡經過直𨽻山東二省所有辦差文武各官住俸罰俸降級之案俱著加恩準其開復如無此等恭罰案件者各加一級乾隆四十五年正月十六日上諭內閣曰朕巡幸江浙上年業經降旨照從前之例於江浙兩省冬兊漕糧內各截留十萬石預偹臨時平糶之用所有此次減歇漕船向例支給一半月糧於該丁等生計未免拮據著加恩於應給月糧外再賞給十分之二以示體恤該部即遵諭行乾隆四十五年正月十八日上諭內閣曰朕巡幸江浙省方觀民曾降諭旨令沿途地方大吏毋得踵事增華致滋縻費苐念蹕路經由直省一切行館悉仍其舊而地方官逐程修葺經理亦未免稍需用度著加恩於長蘆鹽課應解內務府銀兩內賞給銀二萬兩以示體恤乾隆四十五年正月二十日上諭內閣曰朕翠華南蒞問俗省方道經山左因念各處舊有行宫久未臨幸地方官逐程修葺經理不免稍需用度該省又添建坐落二處亦不無所費著加恩於山東鹽課內賞給銀三萬兩以示體恤乾隆四十五年正月二十四日上諭內閣曰鑾儀衛曰請轎校尉奉車太監著加恩俱賞給一個月錢糧乾隆四十五年正月二十八日上諭內閣曰此次南巡所有山東青州德州江寧京口杭州乍浦等處駐防老人老婦著加恩一體賞賚用宣慶澤乾隆四十五年二月初六日上諭內閣曰朕翠華南蒞愷澤覃敷而優恤髙年施恩宜渥所有江南浙江二省老民老婦俱著加恩賞賚乾隆四十五年二月初十日上諭內閣曰朕巡幸江浙所有該二省辦差文武各官任內罰俸住俸降級之案俱著加恩準其開復其無此等參罰案件者各加一級同日上諭內閣曰朕清蹕時巡恩施宜渥所有江浙二省派出辦差兵丁著加恩賞給兩月錢糧乾隆四十五年二月十四日上諭內閣曰所有江浙兩省隨營滿兵著賞給一月錢糧乾隆四十五年二月二十一日上諭內閣曰江南省水手頭目各賞一兩重銀錁兩個水手每人賞一兩重銀錁一個拉縴河兵一千名著賞一月錢糧乾隆四十五年二月二十九日上諭內閣曰此次隨營各項人等雖給過恩賞但內地行走較邉外不同用度不無稍費著總理行營事務王大臣將此次隨行人等及存留王家營各項人等作何分别給賞之處定議具奏其賞賚銀兩在兩淮運庫存貯公項內動支乾隆四十五年三月初六日上諭內閣曰據三寶奏上年福建省欽賜舉人郭鍾嶽年一百嵗又陳應騰年八十八嵗宋耀年八十五嵗該舉人等情殷感激現由福建來至浙省謝恩等語郭鍾嶽等以海隅寒畯年臻大耋兹因翠華南蒞逺涉迎鑾著各賞御書墨刻縀二匹荷包一對郭鍾嶽壽躋百齡尤為熙朝人瑞著加恩賞給進士以示優眷耆儒至意同日上諭內閣曰朕臨蒞浙江所有該省辦差各兵業已加恩賞賚其福建緑營兵丁調至浙省辦差者並著一體加恩賞給兩月錢糧乾隆四十五年三月初八日上諭內閣曰浙江巡撫王亶望之母鄧氏年逾八帙著加恩賞給御書匾額並大縀二匹貂皮四張乾隆四十五年三月初十日上諭內閣曰呈出漪園玉件之啇人姚經又據該撫奏稱為浙啇中最得力之人著加恩從優賞給四品頂帶其辦事出力列為一二等之各啇內除何宗方已授逰擊封典汪立名金海業經議敘州同即用均可毋庸加恩外其捐職主事王仕基捐職同知方燧捐職布政司經歷吳世驊許世斌捐職布政司理問許擎捐職州同葉道立六員著加恩各照原捐職銜賞給加一級頂帶乾隆四十五年三月十六日上諭內閣曰著加恩賞給京城水手網户每人一月錢糧江南水手頭目每人賞給一兩重銀錁二個水手等賞給一兩重銀錁一個六班拉縴河兵賞給一月錢糧管理河兵之守偹等各賞給金牌一靣銀牌二面千總把總等各賞給銀牌三面效力行走千總把總等各賞給銀牌二面乾隆四十五年四月初七日上諭內閣曰參將李永吉前在河南搶護壩工頗著勞績著加恩賞給銀伍拾兩縀二匹以示優奬乾隆四十五年四月十八日上諭內閣曰山東省拉縴河兵著加恩賞給一月錢糧乾隆四十八年十一月二十二日上諭內閣曰朕明春巡幸江浙扈從人等需用船隻俱照每船水手按名給與雇值苐念該船户等在途駕駛往還未免守候需時若照常價每水手一名日給銀五分未能充裕著加恩將所有扈從船隻按照水手每名增給銀一分該督撫等即于恩賞銀內動支並責成司船之員稽查妥辦毋任胥役人等從中侵蝕俾得均霑實惠乾隆四十九年正月二十二日上諭內閣曰此次南巡經過直𨽻山東二省所有辦差文武各官住俸罰俸降級之案俱著加恩準其開復如無此等參罰案件者各加一級乾隆四十九年正月二十四日上諭內閣曰此次南巡所有直𨽻山東派出辦差兵丁著加恩賞給兩月錢糧乾隆四十九年正月二十五日上諭內閣曰朕巡幸江浙上年業經降旨照從前之例於江浙兩省各兊漕糧內各截留十萬石預偹臨時平糶之用所有此次減歇漕船向例止給一半月糧于該丁等生計未免拮據著加恩於應給月糧外冉賞給十分之二以示體恤該部即遵諭行乾隆四十九年正月三十日上諭內閣曰所有長蘆啇人恭進銀十萬兩著賞給山東三萬兩以為辦差之費其餘七萬兩著解交浙江海塘工次備用乾隆四十九年二月初二日上諭內閣曰據明興奏癸卯科山東鄉試有年屆八十以上之生員焦會塗等六名三場完卷未經中式等語該生等俱年逾八旬踴躍觀光深堪嘉尚茲當鑾輅經臨允冝特沛恩施以示奬勵焦會塗趙象觀張申張自道徐簡揚梁重華俱著加恩賞給舉人準其一體會試用昭省方作人優惠耆齡之至意該部知道乾隆四十九年二月初四日上諭內閣曰所有長蘆應解浙江海塘銀七萬兩著再賞給山東三萬兩以為辦差之用其餘四萬兩仍遵前旨解赴海塘工程備用乾隆四十九年二月初九日上諭鑾儀衛曰請轎校尉每名著賞給一個月錢糧乾隆四十九年二月初九日上諭內閣曰前嵗堵築青龍岡壩工時漫水業已斷流旋因西壩陡蟄大溜下注河道總督李奉翰在工竭力搶護以致跌入金門被纜格傷若非有人拯救幾至隕命該督以總河大員身先督率經此危險實堪嘉尚從前薩載因辦理陶莊引河甚為出力曾經賞給騎都尉世職今李奉翰前來接駕朕軫念前勞冝膺懋賞李奉翰著照薩載之例加恩賞給騎都尉世職以示優眷同日上諭內閣曰騎都尉世職著加恩以李奉翰長子鑾儀衛治正李慶徴承襲乾隆四十九年二月十七日上諭內閣曰朕巡幸江浙所有該二省辦差文武各各官任內罰俸住俸降級之案俱著加恩準其開復其無此等參罰案件者各加一級同日上諭內閣曰朕翠華南蒞慶典覃敷優惠耆年冝加渥澤所有江浙二省老民老婦俱著加恩賞賚同日上諭內閣曰朕清蹕時巡恩施宜溥所有江浙二省派出辦差兵丁著加恩賞給兩月錢糧乾隆四十九年二月二十二日上諭內閣曰亰城水手網户每名賞給一個月錢糧江南水手頭目每名賞給一兩重銀錁二個水手等各賞給一兩重銀錁一個六班拉撁河兵各賞給一個月錢糧管理河兵之守偹等各賞給金牌一面銀牌二面千總把總等各賞給銀牌三面效力行走千總把總等各賞給銀牌二面乾隆四十九年二月二十六日上諭內閣曰此次南巡所有江寧京口杭州乍浦等處駐防之老人老婦著加恩一體賞賚用宣慶澤乾隆四十九年三月十四日上諭內閣曰福建欽賜進士郭鍾嶽年屇一百四嵗兹來浙迎鑾皓首龎眉允稱人瑞著加恩賞給國子監司業職銜以示朕嘉會期頥至意乾隆四十九年三月二十五日上諭內閣曰朕巡幸浙江所有該省辦差各兵業已加恩賞賚其福建緑營兵丁調至浙江辦差者並著一體加恩賞給兩月錢糧乾隆四十九年四月初七日上諭內閣曰朕清蹕巡方優惠耆年江浙兩省已普加恩賚至直𨽻山東為經過地方向來不在此例兹仰承天眷喜得五世元孫嘉慶駢臻恩施冝渥所有直𨽻山東二省老民老婦俱著加恩一體賞賚用溥夀祺
