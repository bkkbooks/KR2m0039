body:
  text: 欽定四庫全書欽定南巡盛典卷四天章丁丑江南詩二月朔日入江南境六韻仲月日臨吉江南路入徐觀民因露冕䇿馬每辭輿欣看尊親意還頒寬大書洊災常厪爾加賑莫稱豫尚恐向隅者未沾霈澤餘咨良二千石文視可銘諸冉依皇祖示江南大小諸吏韻國本重惟民反裘譬負棷有來長民官聽豫一言剖嗟此澤國區災沴流行久蠲賑惠縱施未覺蘇黔首溝壑有向隅奚稱民父母邇來雖轉旋餘糧寧棲畝省方為觀民已隔六載後與我共治者豈非賢太守須知足衣食始可言孝友設教法放勳色養奉慈夀五言示豫志朂哉慎毋負賜江南總督尹繼善幕府山邉開幕府風規得似茂𢎞無保釐務布兆民福清蹕寧求一已娛靜柝久曾厯數省建牙今復鎮全吳吏民相習休云易朂爾思艱莫漫圖賜原任大學士史貽直歸林緣舐犢辭閣匪思鱸能改無過矣知仁何礙乎迎鑾方出户資政挈同途風度猶然在江山秀助膄麥苗露浮全帶潤壠覆欲生香可識南邦暖較于魯甸長徒觀浪猶靜尚覺雉難藏邳宿經災後兾兹接夏糧度永濟橋作歌長橋接岸亘邐迤留孔多緣㵼潦水上承駱馬下六塘節宣見為濟運起有司除道欲就夷徑度河灘橋仰視漲䀶幾欲與橋平是今所行乃河裏溝澮可盈河詎可知艱慚無治法爾石砥中復多斷缺問因去年浪所毁何不亟修云有待回鑾次第方經理往來通衢賴此存夏霖轉瞬其何恃發帑鳩工勿再延永言顛末識所以復降旨加賑江南被災州縣詩以示總督尹繼善及地方大小諸吏新正寬大詔蠲欠江浙暨翠華昨發軔加賑已次苐兹入江南境宿桃目所擊叶百家鮮積糧麥苗猶在地夏收云尚遙是宜善安置吾民藍縷多嗟此飢寒輩洊災乃若斯應慚誰所致養老及賙貧雖日頒緹騎命親隨侍衛等齎養老牌以賜髙年其貧窘者則給以白金尚念溝壑􅑏匍匐或艱至已加寧冉加茒簷庶均逮以及安慶屬一例俾霑賜既毋事催科其善勤撫字漏巵何處無莫使侵胥吏隄上漫成四首避濘因為隄上行不妨百里略紆程辛未取直修路至直𨽻厰而雨後多泥濘從人若之今嵗乃從運隄雖多行及百里而舊隄無事多修且避濘云僕人莫謂仍前近豫立應如幸遇晴楗茭隄工積崇墉意外云當備急工帑項嵗支應用此未經見處可能同夾束雙隄中運河秋霖隄外尚渟波黃流咫尺臨西岸蹙額修防竟若何有隄未若無隄好既有安能復使無大禹為臣君是舜想當束手况云吾運河厹猶經古縣窑口溯新灣隄上看流注雲邉辨往還舳艫期用涉名利孰長間憂隱黃淤後瀹疏䇿正艱黃河挾沙以行流急則藉以刷沙上年孫家集漫溢幾致奪溜而毛城鋪旁泄者不早為築塞經流既緩沙積河􅌎為憂甚大特命督撫河臣亟議議節宣之策會同經理命總河白鍾山巡撫髙晉同往會商疏濬荆山橋堵塞毛城鋪等工詩以示志去秋河為災乃在孫家集漫渠未填築遂致洪波吸亟命事修防亦得成功立其如已泄波往往淤泥積荆山橋下川較昔髙數尺微山乃倒漾沛魚今在澤黍恐不能種而况兾收麥疏瀹莫惜費此實目所急同時毛城鋪分流減來脈治標出無奈隄成應即塞而何值邂逅河臣數經易因循置度外廬鳳復遭厄二患均要務展轉增反側瀉者塞其流停者疏其逼往哉相和衷宣防勉奏績詎可惜一勞未敢期永逸但望夏田耕稍救民殘息斯則宣力多豈在日扈蹕閲中河源逺復流長因清資刷黃睿謨千載頌聖澤萬年慶康熙年間移運口于楊莊是為中河聖祖親臨指示所開為萬世賴利云永利風帆旅常輸天庾糧平成期善守未敢事更張楊莊閘恭依皇祖詩韻江國重巡六載餘翠華迤邐度彭徐河工此地多衝要隄堰修防慎莫踈巡春晴旭揚鞭絲敬仰奎章漏黠移底績繩猷任胥重其難惟有寸心知渡黃河地天中氣象明昭翠艙中流蕩畫橈竹箭桃花觀浩勢風恬浪靜度春朝旰宵未得平成術遊豫常懷角徴招敬守鴻模慎多事六巡疏瀹仰神堯惠濟寺瑞氣扶輿鳳閣峩金隄千載慎洪河黃流清滙安瀾慶楚舫吳艘利涉歌百越鄉寧拘地逺六宗功著濟人多相傳越天妃為閩人也綵舟穩渡慈顔豫神貺欣叨默護呵閲河恭依皇祖詩韻繼武惟􅎋日屏營治河無事禹同行修防慎選期俾乂不用才能用老成賜總河白鍾山司河稱最久自是悉防修慎莫幸無事勉惟建逺謀况經益新􅌎上年河決孫家集致荆山橋􅌎淺上遊積水入春未涸恐妨耕作亟命疏𨗳此實厪深憂朂爾平成績紓豫宵旰籌賜副總河嵇璜淮黃近多事簡畀兾堪勝習矣吾知夙僉惟汝尚能母儀迎養便父訓熟聞曾嵇璜昔隨父大學士曾筠南河任習知河務近來以母老請假侍奉淮常一水迎養亦便佇俟成功奏憂心日所憑恭依皇祖閲河隄詩韻重穡力溝洫還淳卑室宫幾曾圖已逸惟是厪民窮繼述一心切精神百祀通即今存御霸清宴永歌功洪澤湖恭依皇祖詩韻事在人為語豈虛崇隄修築敢遲徐事在癸酉年重來細閲工堅否詎為春波看打魚清江浦清江流是𨗳淮清禹迹而今久變更􅙺戟建牙􅀈底績總河紀門建此衡閻比櫛願咸亨漕艘北上斯千庾水驛南來第一程路轉川回宜望逺樹頭瞥見片帆輕過淮安城石隄駐舸䇿龍驤紆路觀風六里強入北門還出西郭漢淮隂是晉山陽羣情愛戴今猶切前嵗飢寒刻豈忘無易由言元氣復轉旋額手為民慶閲淮安石隄記以紀事射陽古澤國諸水滙入海自從奪黃淮其危乃更倍南北咽喉扼城郭不可改初猶患黃灌閭閻無寧載皇祖排瀹之六巡勞攆橇乃得清暢流何必安東委前明議河者患黃強淮弱竟有欲委安東以拯全準者其説實謬治河謝未能繩武厪實每辛未載經斯安乂仰遺楷惟是隄埒城土自較石殆發帑命更築今來工早罷田廬資保固蒼赤庶樂愷永言識其詳癸酉事心駭淮城西北舊土隄辛未南巡過淮命建石利工癸酉河淮並漲淮城頗得石堤之夜雨二首二月初七日朝霧旋成風風罷夜為雨氣候南北殊重來知緒緒船忩聲點滳衾枕寒爾許河北昨曾經麥田澤方佇此雨設遍霑可以慰農父二月雨霏絲到處應益農南昜北難致風氣屬不同昜者虞其過艱者難其逢淅瀝聽深夜嘹唳度數鴻因更憶燕齊春膏賴化工曉發平橋三首夜雨連纖聽打船曉來猶未泮絲煙今朝百里程應趂解纜催行下水川十里剛過亦放晴覲光黎庶夾河迎曾何解澤蘇閭閈慚愧同聲感戴誠白馬湖連寶應湖際天一碧望邉無春猶如此况逢夏蒿目終艱善治模䇿馬過寶應縣閣閭坐露冕猶覺隔河遙傍岸泊蘭楫觀民揚玉鏕人煙依舊庶災疫以時消去嵗江南經災後疫氣復盛行至秋方解籲禱吾雖久還因天眷邀即事南關五里及車邏建閘原虞異漲多不免下河猶被潦修防調劑竟如何去年數􅄵未過水澤國因之幸告豐黃弱全淮出清口却教嫁禍宿靈虹車邏􅄵𨝍溝納衆水分流入江海唐宋始起隄興廢亦時改自此事亦紛鮮安率多殆黃奪淮之後其危斯更倍堰閘日以髙田廬斧底在疏濬豈易言尾大屢中罷或有慮下河堅閉志弗悔下河曾小益逢年歌樂愷河臣髙斌增築天然壩障洪湖東流運河東隄車邏等􅄵得以堅閉下河州縣連嵗豐稔後遇湖河盛漲狃于成見啓放失時遂致潰決癸酉秋為霖特前議不懈叶豈知偶幸耳決癰乃大潰叶蠲賑縱亟救接踵災乙亥嗟我惸獨民蕩析心驚駭旋為停南巡蘇民飭邑宰今來問民瘼春流靜凂凂耕作羣趁時遙遙三秋待奠川無良謀吾慚所以乃邵伯湖東艾陵西白茒南新城北甓社四湖通謝傅遺休擬召公我適乘舟經澤國修防宣蓄慮何窮疊舊作韻賜沈德潛前席何曾隔六春辛未至今凡六年矣三千里不間疏親星垣帝友豈無友吳下詩人尚有人咨度瘼情期達隱評量句義欲胠陳步趨望九雖稱健靈夀聽教手握筠香阜寺鎮過東山蔽芾畫艫卓午泊維揚莊嚴靈鷲標臺麓乂名小五臺起伏來龍分蜀岡古佛參來雖似悟萬民視處祗如傷新河十里羣啇濬敬上賙貧聽豈妨從香阜寺昜輕舟由新舟由新河直抵天寧寺行宫乃羣商新開既表敬公之心且去嵗藉此以工代賑頗益貧民故聽之天寧寺天寧門外天寧寺最古花宫冠廣陵指月禪枝閲百代庋經阿閣聳三層親民乍為去聲思蘇軾傳法何須問慧能我自多憂非獨樂豈能香界鎮吟憑天寧寺行宫作行館招提右詔春注翠華所欣無藻繢頗足賞清嘉絲桞才舒葉玉梅已放花謝家風雅近率欲罷吟義蓮性寺一朵花宫結淨因周環緑水漾波新歌臺畫舫何妨閙恰是亭亭不受塵觀音山右拱平山嶠遐臨草四橋古原詠文士今半屬禪寮法雨鏡中落天花雲外飄憑忩尤暢意緑野潤新苗平山堂西寺西頭松竹深歐陽舊迹試遊尋江南山色秀無盡二月韶光美不禁四字簷端垂聖藻康熙四十四年賜賢守清風額千秋座右揭官針春巡處處前徽仰到此尤厪籲俊心第五泉有冽蜀岡山春來玉乳新可識品泉者非關姓陸人張又新品此為苐五慧因寺竺蘭結宇緑川濵棹返平山一問津禪納已知因是慧試言慧復是何因塔灣行宫恭依皇祖詩韻廣陵風物久繁華下下翻堪樹五麻可識古今不同俗由來中外莫非家治堤弱栁搖金縷映砌芳梅綴玉花朴斫總存昔年制奎章曾是戒紛奢髙旻寺河干啓梵域塔影矗髙旻兩字騰鴻號千秋煥寶文寺名康熙四十二年所賜莊嚴開像設清淨悅聲聞頂禮祝慈夀都梁揚瑞芬自髙旻寺行宫冉遊平山堂即景雜韻六首前朝煙棹寧耽玩供帳因他率已陳自是晴明山色好重教遊騎䇿髙旻富庶從來説廣陵滿城絲管映街燈唐風擬令崇淳約謀食貧人慮失憑啇人習為侈靡其技巧役之貧民藉以糊口者甚衆亦損有餘補不足之道若令如唐魏儉嗇則土著益難于謀食故不之禁春風行館憩天寧早見平山黛色青便進湖船漾新碧且看夾岸畫為屏一株緑栁一紅欄絲縴沼堤引木蘭小令還輸蘇氏軾蘇軾有三過平山堂下小詞東山未擬謝家安潤含新麥緑塍寬恰是淮南第一觀試想風流賢太守詎因歌舞助清歡蜀岡遊罷催歸轡畫蠲原遲十里餘是日自髙旻行宫䇿馬度郡城至天寧行宫易湖船歸亦仍之以馬便于船且百姓得以近光也船馬北南殊所習始知古語信非虛塔灣行宫恭依皇祖示江南吏韻豫遊傳夏諺巡狩載虞經改典關休助化工贊毒亭韶春方駘蕩品物早物形宣澤惟良吏毋孤清蹕停自瓜州放舟至金山觀民展義狩南邦瓜步平明挂錦䉶栁緑桃紅春兩岸風和浪細昔長江辛未渡此亦無風浪樓臺四靣雲峯矗簫鼓中流水調摐西望鳳舟王母降問安歡喜詣瑶忩金山寺恭依皇祖詩韻從來佳境屬禪和佛印其人亦豈多養志延禧遵昔躅江山介夀慶如何登金山塔頂疊舊作韻定光塔據翠峰尖登眺崇情暢六兼百尺凌雲賢劫固千年入影浩波恬東西源委因心會南北風光舉目添石火春秋才瞥眼今來饒是韻重拈金山疊舊作韻瓜步堤楊已窣青放舟江勢攬全形好春如繪迎春馭福地無雙擅地靈蘿壁峭中尋昔句松軒勝處得今停雖然厯厯成今昔不可分疏理亦冥江流山峙千秋境栁暗花明二月天煮茗就泉思陸氏摛辭即景許髯仙豈能適已真無暇每為康民願有年一帶吳根將越角惠鮮勤體蹕途連遊金山寺冉疊蘇軾韻册府常披輿地圖西極江源東竟海中流銀髮能許長氐父乃如黍米在獲金名易裴頭陀祗園髙下凌澄波自兹勝迹擅吳下騷人禪客遊恆多南國重來命巡楫風恬浪靜韶春日佳境畢景不能窮琳宫梵宇層樓赤石􅑉萬劫埋仙魄金山前島世傳郭璞墓髯翁吟際髯應黑令來古往熾然明不遷者存底用驚福地只宜泯六識山色江聲定何物印公留帶可鎮山當時公案足警頑蘇公不言言未已試看衮衮東流水自金山放船至焦山冉疊蘇軾韻江赴海意虎視耽自來天塹限北南湔氐遙源達溟渤至此餘十之二三方壺貟嶠誰則到徒稱火棗將氷蠶咫尺仙山一帆力不遊可懷日後慙石峭拔潮影退俯欄可以窺深潭便命黃頭發青雀江天春物方清酣忽懷玉局曾遊目中江長老談鄉談見東坡詩豪吟靜悟兩寂寥祗饒松竹籠虛龕山蔬可以為清供豈必燒豬方覺甘紙帳困眠明便出金山留待還嫌貪片時攬勝兼望古幽情暢矣歸云堪剪波頃刻濟北固嵒端更問蕭公庵三詔洞三詔抗懷却千秋潛德光董經曾不固滕六詎能殃隱也真仙耳山髙江水長至今洞口石尚是煮餘糧逰焦山我昔金焦互量比曾云在此不在彼昨來浮玉憑朱欄又覺人間鮮並美東瞻島嶼藐拳石蓬萊有無只虛擬順流揚帆忽至之宛憶前評不差耳如來轉境故稱佛被境轉者衆生是慧禪寺禮調御夫焦先祠緬隱逸士欎蔥樹色扶竒峯倒影盡在江天裏豚入息風銀月澄龍出聽講黑雲起到斯雅合諸慮靜我則萬幾將誰委江山不改心亦然返棹吾將勤政理甘露寺江干跋玉馬雲表謁祗園不見蕭公鑊聊參能祖幡四雄迹已泯見蘇東坡詩六代地猶存獨愛司勳句因之憩北軒過鎮江府城焦山穩度紫霞舟十里鳴鞭過潤州秀麗江山窮睇眄喧闐老幼厪咨􅓪萬民爾滿瞻依願一意豫勤富教謀前嵗災荒昨嵗熟既為慶慰亦為愁練湖曲阿後湖古所聞波光如練漪澐澐中郎品鑒得神韻光祿摛藻多清芬七十二流皆滙此築堤之後事紛矣紛運利田胥賴之閘䃮修置寧聽毁停艫試望有所思豈容易言制復始登城霞閣二首董其昌題俗名三義閣攬轡丹陽縣觀風度巷衢每因咨米價惟是厪民劬閣綺登級城霞向入圖過縣城乃登閣小憩遺風仰三義勝槩攬全吳後樂先憂意同聲衆口呼轉旋賴洪造元氣幸差蘇層甍控川口來往實通衢尸祝今猶盛三分昔已叩牛黃叶佳讖龍卧贊良圖北伐應先魏東連暫緩吳何當禪勿肯若可董聞呼蔚起赤城色題簷筆是蘇過常州府城八韻傍堤維鳳艒紆路䇿龍駒問俗闠闤度覲光老幼趨舟車引百越襟帶控三吳泰伯髙風在賀公嘉政臚人文日寖盛食服衆滋膄故是升平象寧無水旱虞即今雖小補憶昔未全蘇咨爾牧民者引恬莫怠圖跋馬過常州至􅋈舟亭進舟遂是首風流蘇髯仙遙年此繫艇遺迹至今傳以人不以境流為佛氏宇松竹頗幽靜印公舊深契玉帶留堪省南來緣觀民詎為賞煙景敞檄及孤亭點綴備臨幸玉局強項人想未必首肯山僧不解禪念佛持清警云昔曾執戈放下屠刀猛寺僧自云曾于陕西勇健營從軍乘艫就前途回望崇情永坡留我則往不繫間雲影射澤國塗泥難射堋晴明是處得平陵和門適可觀羣藝破敵休誇擅獨能敢以升平弛武備詎忘弓矢是家承不矜已亦課人識慎酌權衡在勸懲賜蘇州巡撫愛必達青齊障宿保吳下節新移民隱芻蕘達官方砥礪期允當知有要寧止貴無私此地災傷後惠鮮莫漫遲賜江蘇學政李因培學校程材地江蘇大雅邦元龜要清正藻鑑辨淳厖莫負風簷昔為求瓊樹雙菁莪勤樂育濟濟引鴻龎先賢周惇頤後嗣持小像求祠名允其請並題以句錫麓祠先賢孫支世守旃開程朱道學繼孔孟心傳水碧山青處松蕤竹秀邉千秋光霽在底復藉龍眠逰寄暢園題句煙溪又復泛梁鴻路側名園曲折通新景林嵐六塵表昔逰嵗月寸心中清泉白石自仙境玉竹氷梅總化工小憩便當移蹕去一聲定磬下花宫十如峯寄暢園中一峯亭亭獨立舊名美人石其弗稱因易之而系以詩一峯卓立殊昻藏恰有古檜森其旁視之頗具丈夫氣誰與號以巾幗行設云妙喻方子美徒觀更匪修竹倚亭亭戍削則不無姍姍閻易非所擬率與易居曰介如長言不足因成圖正言辨物得朅攬惠麓梁溪永靜娛寄暢園疊舊作韻雙河舟溯慧溪灣雅愛秦園林壑間月鏡光涵窗瀲瀲雲紳聲落澗潺潺清幽已擅毗陵境規寫曾教萬夀山一沼一亭皆曲肖古柯終覺勝其間惠山寺九隴重尋惠山寺梁溪遐憶大同年可知色相非常住惟有林泉鎮自然所喜青春方入畫底勞白足試參禪聽松庵靜竹罏潔便與烹雲池汲圓府志惠山寺第二泉上有方圓二池圓者最佳題惠泉山房昔來逰惠泉聽松試竹罏八角石欄干明汲轉轆轤茶香滌塵慮泉脈即此夫重臨探靈源乃知别一區石梯拾級登髙下置精廬瀟灑緑琅玕峭舊青芙渠山茶及仙放香妍且都西北有空洞洞前方塘虛淙淙甘出源苓芬石髓膄對之坐逾時笑我前遭徒境亦不可窮竒亦難悉臚名泉自千古豈藉羶薌吾詠惠泉氷洞不可測發源惠麓東精藍據左側德水揚宗風鑿為方圓池雖二實相通方劣圓者甘其理殊難窮池上漪瀾堂舊迹傳坡翁境屯心則泰髙風想像中遊錫山惠東特出一峯青有錫名山無錫寧諺云有錫爭無錫一寧因以名縣水平吞太湖秀林巒近接九龍靈春前老柏不爭色風裏幽蘭解送馨蘿徑雲扉故相識得教精舍小延停駐蹕蘇州乘時展義玉鑾巡蒞止吳城胥水濵春色由來南國麗民情􅀈比昔年親縱看道左多歡忭寧忘災餘有窶貧鮮蓋藏還尚華飾此邦要務在還淳觀蘇城閭閻之盛不減昔年既以慰懷兼成是什旋轉深叨造化功昨春猶疫幸秋豐肉瘡剜補嗟黎獻滿益損謙切巳衷資食資衣厪宵旰任親任近繞西東羽林扈衛曾何藉膝下原吾赤子同凝懷堂在蘇州織造衙門旁行宫內康熙年間所賜名也適來居之輒成是詠三吳巡露冕數宇駐宵衣寶額懸瑶篆凝懷揭妙機盡蠲塵慮擾常守道心微展義將繩武如臨聖日輝支硎山問景東峯與碧泉支硎得號遙憶年可知愛鶴兼調馬那礙翻經及習禪圖畫竒參忩户裏築琴響遞榻牀邉舊題宛在蒼崖􅘧何事苔䀶半隱然寒泉亭子無泉不寒此檀獨鑿石引流潨復曲何當深夜坐孤亭萬慮都蠲一輪掬寒山别墅泉出寒山寒秀峯支硎支昔遊曾未到名則常聞之煙巒欣始遇林壑誠幽竒應接乃不暇而盡澄神思庭前古幹梅春華三兩枝孰謂宦光往斯人如在斯飛魚峽朗山誰假借朗水已疑然源溯雲中竇光澄鏡裏天投竿庾信釣溉釡寧封仙所遇欣初得還因緬昔賢馳煙驛驛路馳煙著璧題客來衣履尚凄凄支硎秀色千秋映津逮遙思孔稚圭緑雲樓熙春新霽間輕隂韶秀山姿暢好尋支遁寒泉才滿聽宧光别墅又登臨紅梅翠竹天然繪妙理清機不盡吟千傾緑雲餅餌計憑觀惟是悅豫心對瀑九疊垂雲紳一泓注石髓卉物太昌妍藉兹足陶洗戲題空谷幽人昔時隱空谷與木石居鹿豕遊豈謂髙卑起飛閣更教雜遝鳴羣騶徒觀梅竹三春雅便擬棲遲一刻留馳煙驛畔多條頴空谷中有馳煙驛宧光所題云問爾低枝掃迹不寒山千尺雪疊舊作韻寒山即是支硎山趙凡夫始疏山泉我昔憑觀愛清泚雲中曽未窮其源隱人别墅兹一至故迹厯厯間評詮乃知芙蓉注乳竇千支萬派斯依緣煙崖水峽疊髙下瀉為飛瀑瀑渟為淵大珠小珠跳澗谷五出六出紛林巒四時恆此舞滕六千尺幻欲生藍田雪乎否乎否雪乎長笑人然我亦然朅爾題詩朅爾去淙淙響在依稀間聽雪閣疊前韻飛魚于雲中聽雪乃峽底髙下殊倒置名象若斯耳適從寒山來始遇空谷美辛未惟至千尺雪寒山别墅今始過之過墻即范園水閣重憩止峯色與泉聲識我重臨喜理解泯今昔耳觀無終始點筆一囅然偶如是而已遊華山跋馬度寒山屏秀宛相映天池知不遙由來稱熟徑圖經志洗心柱史標養性初入松竹幽遂陟巖巒亘﨑嶔峭舊間時有飛泉迸鳴鞭豈不便安用山輿乘地方大吏備登山輿以策騎便弗用延緣造絶頂諸峰皆下憑春如有腳來雲自無心競小立極遊目已足暢清興行漏報午刻歸路盤煙磴精藍禮莊嚴别室憩幽淨寶翰垂日月寧止書中聖處處仰昔蹤起愛復起敬恭依皇祖華山詩韻春物和而盎春山秀且深佛光今昔亘奎藻嵗年侵籟奏風過竹歌喧暖啅禽石蓮華那在望古集遙襟駐蹕靈巖疊舊作韻熟路明知步步中穿松鐘識出花宫峯姿峭舊四鄰接塔影玲瓏八靣通震澤逺憑鏡呈白雲忩小坐篆消紅靜觀何物名今昔行漏依然丁復東臨湖榭震澤三萬六千頃虛榭三間十笏寬榭置澤上粒黍浮澤延榭中片鏡懸遊乎物外忘憂樂東坡昔道皆可觀偶來靈巖駐春蹕幾餘一憑臨湖欄氣清天朗陽侯靜具區渺渺無微瀾洞庭西東列眉黛芥納須彌曾不難靈威丈人縱可接我心何暇求神仙穹窿山上真觀穹窿惟帝宇巡狩值春朝虔謁碧霄上髙居絳節朝雨㿩願時若明旦揭于昭精室蕭臺側憑欄縱目遙拈花寺暫乘紫機暇言訪青蓮宇穹窿真穹窿陽山卑爾許雲棧厯覺路山泉汲法雨春景青帝繪石脂赤松取遂造古道場信是出塵所太湖當我胸雲煙與吞吐如如者西竺皇皇者東魯此既未能逮彼又何曾補徘徊兩增慚把筆欲忘語買臣乃俗吏往事奚足舉穹窿山望湖亭望湖震澤天連水洞庭西復東雙眸望無盡諸慮對宜空三萬六千頃春風秋月中五車稟精氣誰詔陸龜蒙鄧尉山恭贍皇祖題額松風水月四字各得八句以題為韻稱鄧尉者以梅而睿藻全不涉焉然言不涉而意已賅此所謂得梅之神韻者乎觸目會心摛辭衍義亦情之不能已也松宿契權辭竹知音恆伴松友三見兹二并昔到斯重濤影籠香淡氷心映翠濃問誰工品物大造在堯胸風此海偏稱雪于春不礙風細傳香是玉輕綻蕾猶紅搖曵韶初麗吹噓氣正融設如擬禦寇光福即崆洞水廣平腸是鐡髙密心水心仿佛見斯人何必稱仙子枝斜清淺上影弄漪瀾裏誰先獲我心和靖曾言旨月依稀有三山淡蕩方二月搖光入黃昏散馥飄清越淰淰映氷心稜稜標玉骨靜對仰當年餘芬猶未歇鄧尉香雪海歌疊舊作韻鄧尉西北山名吾香雪海即吾家山在鄧尉山西北六里姑蘇志云附鄧尉昔遊未到兹到初竒峯詭石更幽邃商邱三字􅘧匪誣虎山橋春水碧漲光福塔舍利光舒湖山表裏互映帶都拱香雪為範模循名討實何不可無妨片刻鳴鑾紆萬峯小别化人寺鄧尉山寺名至理緩問山村途鄧尉山隂名至理彌髙亘下真創見清芬冷韻非時趨襄陵湠漫亦奚必蔚雲浟湙則有餘鮫人出珠珠不計海童路路多娛香雪非江亦非湖天髙地下物散殊惟海為巨為委輸揚華繁采無復需笑我昔年略涉港嘆觀止矣誠云踈由來于廓渺無際即今乃見三山孤輿圖府志各執異明統志鄧尉山一名袁墓山而姑蘇志則云鄧尉山在鋒峯西南光福里俗名光福山與袁墓諸山相屬一鄧尉而袁墓光福二説不同紀載紛淆往往如此袁墓光福寧非吳墟拘辨枉費工夫靈巖雜詠冉疊沈德潛韻館娃宫石硯徑重尋春花風自舞昔日館娃處今時選佛土清梵落雲松靜香飄埭社於此暫息心何必論前古琴臺西蜀及東魯琴臺名紛然此胡亦有之迹傳闔閭年松風寫謖謖峽水常湲湲想彼三郎流聽之早欲眠響屧廊靈巖鎮古靈敞景當春敞山蹊誰藉楩名尚傳屧響無人歎露葵有客尋煙莾荒幻總虛無無煩賦傷往涵空閣富媪不藏景髙閣真涵空不知名者誰忩納千巖風太湖在襟袖疑聞吟淵龍洞天若能到玉柱銀為宫吳王井英英吐雲根氿氿涵峯頂秀峯寺其側舍利入塔影憶昔春雨中偶然一汲緶勿幕乃元吉玩辭觀象井研池山川自太古峙峻渟者泠誰能奪化工泉白峰常青此池蓋昔有菁藻看斜橫非吳王所斫至理無須驚采香徑句踐用心苦隂謀藏弗露采葛不連蔓作絲織絺素獻吳逞其欲吳歡墮迷露羣娃猶采香曲徑春風暮玩花池德潛本幽人所居愛巖谷一冉吟其詩調髙義亦足偶憑玩花池印心澄淡緑遺迹奚堪稱德水早淨欲遊天平山十六韻吳會重山鎮天平萬笏朝飛耒峰拔地林立石千霄茶塢西鄰近支硎北户招勢連髙景秀氣接太湖潮是日春方仲行時興倍饒靈巖盤嶺路功德訪雲寮芳玉溪梅綻柔金陌栁搖行行見别墅緩緩渡橫橋宛到前遊處間看舊詠標名園實瀟灑范家髙義園辛未賜名也古迹半荒寥文正風猶在幸桑澤未遙小停憩間館更進步層椒翠越茈虒密蒼巖突兀嶠菴傳逺公法泉溯白翁謡絶頂髙無匹三吳望裏要未能元氣復用是一心焦髙義園磴道下靈巖名園尋髙義霽煙斂寥濶韶光鬯明媚載過文正祠默讀義田記春和對芷蘭復緬後樂志白雲千載心名山五經笥我自勤政人疏連未可恣乾惕意彌厪智仁懷偶寄白雲泉冉疊白居易韻昔年少傳此題泉忘世髙情祗愛間我却異香山所願願流膏澤遍田間冉遊寒山别墅作吳中不雨亦多隂今日晴明悅可心嶻嶭天平試間攬夤緣别墅便重尋峰寧藉沐都凝黛泉豈須觀每聽琴更上緑雲樓上望虎邱塔影矗平林澄懷堂應接雖無暇澄懷乃有餘底須施藻繪惟是愛清舒春是四時冠山如太古廬何當來晏坐重習少年書琳琅叢用杜甫佳人詩韻並效其體一時憶杜詩空谷真空谷徑人琳琅叢詎同凡花木化軸尚欲培樵斧寧可戮誰謂品曲人乃道不如肉其澳將渭川羶薌遊秉燭豈知寒山幽森此萬竿玉凡夫昔卜居常抱煙霞宿有夢為平聲蝶栩無淚為去聲民哭泉或時而清泉或時而濁社祭永吳中荒祠尚老屋猗風情亦蕭影月手堪掬粉黛非佳人佳人亦修竹芙蓉泉芙蓉峰下泉輒以芙蓉稱泉固可植􅵯峰則惟肖形賔主定誰是後先底浪爭峰泉胥不知曰人強安名法螺寺詭石詫竒峯蒼松􅐻曲徑窅窕深翠處林壑相掩映春禽唱清音澗花含淨性梵宇到靣前乃識藏邃敻出密忽登髙望逺如臨鏡吳中寺亦多此獨亦幽勝設以擬詩人非賈宜在孟賦得華山鳥道㠍嶫復巃嵸青蓮植半空自來稱鳥道頗覺異蠶叢疊磴穿雲白回攔抉巘紅竹聲戞風細花色鬬春融塞路遙相擬坦途此盡同遊山當讀畫緩緩跋花驄初遊石湖作行春恰慎好春晴橋上風光蓄眼清緑竹紅花他繪事黃童白叟我田情白洋煙水在襟袖莋碓雲風若送迎却訝祗園方外地起豫兩字號治平觀打魚歌地方大吏備觀打魚因事已成略觀輒罷之而作是歌江鄉本以漁為業煙水衝寒應不怯而我行時欲物熙人跔魚斃非所悅施罛連網圍周遭大魚掉尾小魚跳烹蒸充爼供一嚼寧如虛浪聽消遙木蘭每嵗秋圍即他他藉藉曽弗惜何慈于魚弗慈鹿春秋溫肅殊南北湖魚寧實繁如斯我惟務實命罷之悠然而逝誠逝矣懷哉里革與臧僖行春橋越來溪來溪橋接恰值行春橋上過魚躍鳶飛參物理耕田鑿井樂民和湖心亭白洋滙處渚宫築水色天光有若無無已自賞心兼悅目耴名何必又西湖遊上方山治平路接楞伽院兩寺由來一寺分澗築松濤相問答峯容波熊總氤氲座披莋確棲崖月泉煮曺溪嫡派雲底更圖經考同異從來紀載議多紛郊臺羽蓋乘齊亦壯哉當年僣祭起郊臺誰知五過招三寸此自橫塘有越來遊雲巖寺短簿祠邉尋舊墅吳王邱頂禮雲岩當時捨宅兄與弟永劫超塵聖與凡霸業銷沉寒劍氣佛光今古鎮經函息幾也識忘言好觸景興吟未可緘靜觀齋康熙四十六年賜額齋額璇題號靜觀聖蹤想象寶雲端管弦盈耳彼何閙禮義悅心斯所安含暉山館亦額也賜水態山容清且妍山房勝日小周旋分明康樂詩中景著屐風流想昔年虎邱寺冉和蘇軾韻定光瞻寶塔拾級登仙嶺遂徑造其巔下視富萬井松濤虎嘯翻竹籟龍吟耿苟尚頰舌感此必下蛙黽點頭聽經輩金矣不復礦生公本無涉誰云服精猛髯翁絶世才儒佛埸馳騁勝遊託豪句豈真增跈哽小坐仰蘇樓緑疇含麥頃為祝今餅餌寧忘昔飢冷人言元氣復我嘆哀鴻永詎同彼子瞻無事但攬景歸輿循山塘羣瞻翠華影施惠貴及時奚待大吏請山塘䇿馬山塘策馬攬山歸淡蕩韶春鞭滿揮烘受朝晴花蕊綻潤含夜雨麥苗肥曰遊曰豫所無逸樂水樂山亦靜機更喜吳民還昜教重來歌舞較前稀辛未南巡于返朴還淳之教三致意焉又明降旨禁地方大吏陳劇供奉兹來民間結香亭祝者率不敢備歌舞之觀足見從令為之心喜降旨回鑾時取道徐州視河工詩以紀事南來兩務重視河及觀民表裏實相資河治民始安入疆即念兹疏瀹命河臣隨鑾乃細事佇待嘉猷陳時以曺徐二郡瀕水地積水妨農荆山橋黃流淤緩總河白鍾山未令接駕副總河嵇璜亦命赴工相度髙堰新隄固淮口如前巡其病不在斯而在徐城濵渡江以南來閭閻商賈臻麥田及菜花雨潤日暄勻目前堪慶慰額手天地仁但念彼逺鄉寧無嘆邅迍膏澤以時施袵席期登均昨者接奏牘果道􅌎河身先事不預妨恐致危城垣一自石林溢南北側注頻黃河自乾隆七年石林口漫溢經時甫塞嗣是張家馬路孫家頻患衝奪黃流勢弱不能刷沙直趨致河底沙停大淄側注中泓力反弱刷沙以為難治河雖未習要當相度親疇咨集衆思勝於紙上言道路粗修可令速馬上傳取足供頓宿勿重勞黎元曉發蘇州視河將欲至徐城五日姑蘇便啓行浙省萬民齊望幸吳川一宿且兼程是日不駐南斗墟兼程至嘉興設緣玩景生留戀豈是因心凛旦明老幼不須攀載道回途當為去聲小停旌欽定南巡盛典卷四
