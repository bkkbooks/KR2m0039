  text: 欽定四庫全書欽定南巡盛典卷首下
  hash: sha256:69b7b4b7fcf33656d51a31f3186cefc33c905444c9c1a02691ef24dcedf82f38
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_002-1a, image: WYG0658/WYG0658-0015c.png}
body:
  text: 凡例一恭纂南巡盛典前編成於乾隆三十三年始因原任兩江總督臣髙晉於四巡旋蹕後輯書呈覽所纂祗係江南一省經軍機大臣大學士臣傅恆等奉命校閲乃請以幸浙諸大典與經過之直𨽻山東二省事系南巡者令髙晉等裒為一書於是薈萃成編分門十二曰恩綸曰天章曰蠲除曰河防曰海塘曰祀典曰褒賞曰籲俊曰閲武曰程途曰名勝曰奏議凡百二十卷自辛未至乙酉四巡巨典俱已敬謹臚載而庚子甲辰兩次南巡各事宜則續纂於兩江總督臣薩載其書與髙晉所輯者别為一編雖體例相仿而未能畫一且程途名勝各門又多與前編重復今臣等遵㫖合纂謹就前後兩編刪節其重復者整齊其未畫一者參訂彚修期於賅備一前編呈進於辛卯之嵗仰荷御製序文冠諸卷首所以規吏職而軫民隱者無微不燭而河工海塘關係江浙民生尤巨是以定清口之水志培柴塘之坦簍及一切河防隄閘自乙酉以前之睿畫固已著在宸章至若新開陶莊引河改築浙江石塘咨諏籌度屢省乃成本於敬天明理者則又備於御製南巡記今恭録以冠卷首仍敬列前編御製序於次蓋一著六巡要㫖一為前編辨言並焕簡端益昭美善一髙晉薩載前後所纂各門並列恩綸於第一天章於第二蓋以六龍將駕天語先傳五禮既修帝歌庸作用是釐為次第依類分編但臣等恭校欽定諸書裒入四庫者稽其凡例類皆以天章冠首今是書彚纂進呈伏俟欽定後即繕帙裝函歸於四庫自應改從畫一爰敬録天章於各門之首而謹輯恩綸以繼之一髙晉等所輯天章均以薈萃篇題卷帙宏富為主臣等伏思御製諸集臚載大全久已昭播寰區炳如星日是編為省方盛典與御集體例有别恭繹南巡記以敬天法祖為懷凡翕河奠海察吏安民無時不上厪宸𠂻屢形吟咏今具於卷內敬謹繕録此外則凡巡蹕經臨之處名區勝跡法戒所關亦依次編列臣等敬誦敷言主於訓行奕祀不敢僅事抄謄故視原帙較為省約云一髙晉等所輯天章於御製詩外兼繕録御製文臣等恭讀閲海塘記浙海神廟碑文陶莊河神廟碑記仰見睿謨廣運籌畫安瀾所以審事機乘時㑹盡人力以奠澤國民生於康乂者大哉王言洵可垂之久逺至若鑒重修之侵冒則有荆山橋記訂千古之疑訛則有濟水泮池廣陵茅山諸考證又宋孝宗論一篇摩􅘧西湖行宫者宣示天子之孝不在承歡小節實萬世倫紀之敷言雖非専為省方而作而觀民設教莫大於是臣等敬謹彚輯仍按年依次編排聿光簡冊一恩綸奏議業已分為二門而諭㫖所頒敷陳所及有涉於蠲除河防海塘祀典褒賞籲俊閲武各門者則分載於各門之內庶俾一事之本末釐然按條可考其各門內首録綸音自辛未迄甲辰按年臚載之後始繼以臣工奏牘依年附列體例賅詳有條不紊一我朝重熙纍洽凡深仁厚澤淪浹於閭閻者幾於日用而不而躬勤鑾輅彌復念切民依免供頓之煩屏浮華之習詔書屢下大吏訓行宜乎耆庶望幸之誠無時或已今謹裒輯恩綸一門惠此嘉師偹於㢲命矣至若增鑄泉幣以通財截留漕艘以裕食暨夫眚災肆赦咸豫維新疊被天恩尤為優渥而以篇帙無多未能分門専帙謹附載於恩綸亦事從其類云一恩綸蠲除列為二門恩綸備録行慶施惠諸德音蠲除専載免逋減額諸善政雖同為膏澤下施而體例實各不相混其中亦間有詳略互見者如恩綸門載乾隆十六年二月初十日及二十二年四月初六日兩次上諭均及豁免籽種銀米之處而豁免恩㫖則已備見於蠲除門蓋以綸綍所頒事有兼及故恭録時謹遵其舊若蠲除所載則並無岐出一恩綸褒賞兩門恭載鑾輅經臨恩施優渥蠲租賜復養老作人萬類藝藝春臺共上而自扈從王公大臣以逮封疆大吏則時拜白金文綺之賜文武官辨又咸沾加級開復之恩且晉銜食俸而耆舊無不蒙庥賜秩豫銓而廢員咸思感奮恤窮經於皓首特奏科名體趨事於戎行益敷優賚下及䋞户水手誼效蒸徒亦靡不上厪宸懷隨時頒賜湛恩周溥六巡所同載筆敷宣難名髙厚各門中欽遵奉㫖月日依次謹載分年不再分類以昭皇上涵覆萬有一視同仁之至意一治河本末具詳諭㫖及諸臣敷奏中我皇上相度機宜指授方略凡規制全河者固已瞭如指掌然按古來地理之書山川都邑非圖不明故如漢三輔黃圖唐元和圖志舊皆有書有圖而唐宋州郡之志亦多以圖經為號况黃河源逺流駛挾沙而行自㑹淮以後宣防瀦泄因勢異宜誠非擬議所能懸定曩者河臣禀承聖畫節宣利𨗳皆經繪圖具說恭候睿裁而乾隆四十二年命改遷陶莊引河開放以來大溜暢達既免黃流倒漾之虞兼收清水刷沙之益實為治河一大關鍵時河臣具圖呈覽往復指示尤所謂握要執樞利普萬世者矣今恭輯河防凡清黃湖運諸水堤堰壩閘各工悉据修治以後形勢繪圖附于本門之末而修治端委則每圖撮叙要凡綴為圖說用俾爽若列眉按籍如覩至列圖先後次第一仍前編次編之舊蓋髙晉薩載皆任河臣所叙固有條貫無容更訂一治河尤厪睿慮臣等伏見聖謨訓示次第施行俾澤國生民永資利濟者至詳且備惟是各門體例唯有關于慶典者始行裒録故事非巡幸之年多略而不載若河防所録諭㫖及河臣敷奏或有在巡幸之年先後者則所以偹修治之始末且足以見聖主宵旰勤求無時不以宣防為念而法祖勤民之盛軌尤極臻兹美偹云一海塘為浙西巨工衛池湟而厚土榖利至溥也列代屢有捍衛之方我朝纍洽重熙民生庶富聖祖仁皇帝親臨指示并命巡撫朱軾創建大石塘五百丈世宗憲皇帝復命改建魚鱗大石塘詔諭屢頒至為周偹我皇上軫念海疆時勤法駕既已陸續排摏犍石兼定嵗修柴塘添建坦水復以老鹽倉一帶柴塘究不如石塘之鞏固悠久而民間日用柴薪採買太多亦易滋昻貴申命守臣易柴以石凡四千二百丈至四十八年告成旋奉諭㫖范公塘亦須改建石塘俾老土塘以外頭圍以內遍野桑麻悉成沃壤而海塘全局經制精詳瀕海蒼生從此永資樂利是兩朝求寧求莫之貽謀皆皇上善繼善述之鴻緒舉凡指示規模應自初次南巡為緣起前建各工則謹附於圖說至范公塘石工改建雖在六巡旋蹕之後而諭㫖兩頒功成不日謹依次載入用昭溥惠海壖有加無已之至意一海塘沙水情形向例兩月繪圖恭進近則按月奏報誠以潮隨月盛時有盈虛坍漲靡常難以蠡測我皇上念切黎元勤求宵旰圖陳黼座庶幾仰慰聖懷乾隆十二年中小亹一夕開通南北塘外漲沙綿逺咸卜安瀾之慶嗣緣水勢仍向北趨以致屢煩睿畫逮塘工石壩以次興修即潮水有時逼塘而護沙旋復增長沙水情形嵗難預定謹就四十九年春宸矚所及繪圖附說以志聖人洞燭先幾隄防盡善并預為將來水復中亹之佳兆鱗塘石坦等圖並附至工料確數浙省别有海塘志兹不繁叙一程塗恭載鑾蹕所經山澤川源若指諸掌法軒轅營衛之義略周官梐柢之文龍䑵中流歡騰夾道誠光被之極則也謹按道里逺近六次約略相同而行宫大營以四十九年為凖其視前五次間有改設之處則偹列簡編以資稽考若夫視河則髙堰也孫家集也老壩口也臨蒞非一時法駕紆回至為周悉觀海則三十年四十五年四十九年皆自石門之迎薰館進何家橋至海寧州尖山經大石塘而後達杭州省城先務為急視前三次程塗有别焉翠罕經繇均宜敬謹臚叙以昭聖天子勞心利濟永慶安恬之盛軌至於躬詣禹陵思深明德親奠闕里典肅宫墻有一至數至之殊而南鎮東山允宜偹載以及拈香泰岱免搭天橋或舉於省方之始或行於旋蹕之時亦就泰安途徑分晰聲叙用著懷柔之極致謹將髙晉薩載等前後編載諸說參酌彚纂俾免復漏用志吉行一江浙固多名勝而時巡展義匪事遊觀屢蒙誡諭有司所經名區勝蹟祇就舊有規模掃除葺繕斷不可稍涉浮糜致煩民力聖訓嚴飭至再至三業於天章恩綸二門敬謹偹録是宸覽之所垂注者惟在井里恬熙田疇豐茂不在名勝之踵事增華也但福地神皋欣逢六飛臨蒞慶輝所燭炳耀方輿斯誠山川之厚幸矣髙晉等所纂名勝一門揆諸周官誦訓所掌巡狩夾車之義亦未始非盛典攸關臣等薈萃諸說用附方志之義俾林蠻勝景胥得仰被光榮焉一朝嶽有明堂之建觀風為行殿之名自古從屬車而操簡筆者類皆備志珍臺璇館揚厲侈陳而我國家所謂盛典者初不在是仰惟六巡江浙法祖攸行崇實黜華悉歸儉約自燕趙而齊而魯鑾輿所憩大率平陸髙原則僅如周禮之設幄張氊供其舍事即或葺為數椽之屋亦俱朴略無文至於江浙之間如揚州行宫則在天寧寺之石江寧棲霞行宫則在中峯之在杭州西湖行宫則在聖因寺之右蓋東南名勝梵宇雲連本多莊嚴閎敞恭值翠華臨幸為大吏者每就琳宫勝地少加修治以肅觀瞻而實則未嘗特建臣等恭輯盛典若専列行宫一門殊乖紀實之體謹志修葺大略附見於名勝云一裒輯盛典每門皆以六次南巡按序續編然如恩綸蠲除河防海塘祀典褒賞籲俊閲武奏議諸門逐條皆冠有年月開卷瞭然固不必於每卷首注明何次南巡唯天章則不可概以此例故謹於每卷首標題下旁注支干如初次南巡則注辛未字二次注丁丑字三次至六次倣此庶幾簡明以便稽檢而鑾輅所臨又可按地恭載並於每卷首附注直𨽻山東江南浙江等字焉
