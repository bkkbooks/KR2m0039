body:
  text: 臣等謹按史册所載蠲除之制一曰給復徭役一曰除其賦税一曰所賑貸勿收非時而行行之而不必遍及至若省耕省歛補助必周畿甸豫遊盛推夏諺西漢制為近古然如登泰山幸中都所除逋賦賜田租者不過五縣三縣而止迨東漢車駕所至復南頓田租復濟陽徭役則又加狹焉從未有巡省屢舉新舊並蠲直以非常之典為曡沛之膏者也我皇上子惠元元有加無已屢經普免天下地丁正賦普免天下漕糧而議賑議蠲每嵗不下數百萬兩及六飛時邁政在養民辛未則特免江南厯年逋賦二百五十八萬五千餘兩浙江本年正課三十萬兩丁丑壬午則蠲免逋賦外又與直東二省並減所過州縣本年額徵十之三矣稍歉者十之五矣省㑹且概除之矣乙酉則免江南例不准蠲之折色一百四十萬兩有竒本色十一萬石有竒浙江折色十三萬兩有竒本色一萬石有竒庚子甲辰載迓鑾輅復舉直隸山東江南浙江四省厯年積欠銀米槩予豁免而省㑹之正賦全蠲蹕路之經過減額並如徃例下泊海濵竈户吳下公田莫上上厪慈懷同沾愷澤民豐物阜益慶盈寧大有頻書餘糧棲畆其在益之象曰損上益下民悦無疆天施地生其益無方此聖徳之所以大光也乎謹録蠲除第三乾隆十五年正月初二日上諭内閣曰各省耗羡銀兩以備地方一切公用向因漫無稽考是以條列章程該部嵗杪察核朕思有正供而後有耗羡耗羡非正供可比其未完之項雖應一體催徴但輸將不無拮据朕巡幸所至地方應酌量加恩以紓民力直隸屢經巡厯今春暨秋清蹕五臺命駕河汴明嵗即當南幸江浙山東亦所必經所有耗羡内直隸山西河南浙江四省未完銀兩全行豁免江蘓安徽山東三省未完銀兩蠲免十分之六着該督撫確查實數毋令吏胥借端挪抵正耗混淆暗行侵蝕倘有朦混滋弊即行㕘奏從重治罪上司稍有徇隠一併嚴議處務使閭閻均沾寔恵以普恩膏同日上諭内閣曰朕巡幸江浙問俗省方廣沛恩膏聿昭慶典更念東南貢賦甲於他省其厯年積欠錢糧雖屢准地方大吏所請分别緩帶以紓民力而每年新舊並徵小民終未免拮据朕宵旰勤勞如傷在抱兹當翠華親莅倍深軫切用普均沾之澤以慰望幸之忱著將乾隆元年至乾隆十三年江蘓積欠地丁二百二十八萬餘兩安徽積欠地丁三十萬五千餘兩悉行蠲免俾官無罣悞民鮮追呼共享昇平之福夫任土作貢嵗有常經自應年清年欵江蘓積欠乃至二百二十餘萬之多催科不力有司實不能辭其咎而疲玩成習豈明間風俗之澆漓尚有未能盡革歟朕以初次南巡故特加恩格外嗣後該地方官務宜諄切勸諭加意整頓其在小民亦當湔除舊習勉効輸將勿謂曠典可希冀屢邀而惟正之供任其逋負也其浙江一省雖額賦畧少於江蘓而莭年以來並無積欠豈犬牙相錯之地不齊乃至是歟此具見浙省官民敬事急公之義而江蘇官民所宜懐慙而傚法者也朕甚嘉焉著將本年應徵地丁錢糧蠲免三十萬兩以示鼓勵各該督撫其仰體朕惠愛黎元之意嚴飭所屬實力奉行使閭閻均沾實惠倘有不肖官吏以完作欠希圖侵蝕察出即行糾㕘從重治罪並將此通行曉諭知之乾隆十六年正月十五日上諭内閣曰朕南巡江浙經過畿輔雖一應供頓俱令動支公項而安營除道未免有需民力朕心深為軫念著將直屬所過州縣本年應徵額賦蠲免十分之三交該督方觀承確查妥辦務俾小民得沾實恵乾隆十六年正月二十一日上諭内閣曰朕南巡江浙道出青齊該省去臘以來雨雪霑足麥秋豐稔有望雖一切安營除道俱由官辦而當兹春融土潤正當有事西疇朕省方問俗念切閭閻著將經過山東州縣本年額賦蠲除十分之三交與巡撫凖泰詳悉查明照例辦理務俾得霑實惠該部遵諭速行乾隆十六年正月二十六日上諭内閣曰朕清蹕南巡道由山左所有經過州縣旣已特沛恩膏兹攬轡觀風知連嵗有秋視戊辰東巡之時閭閻大有起色為之慶慰尚念該省積年緩徴帶徵未完糓石皆因災出借之項雖疊遇有秋而按年催比民力不無拮据著將被災借榖應於庚午年起分作五年帶徵及鄒平等屬帯徴未完榖共九十七萬五千餘石概行豁免以昭格外優恤之至意乾隆十六年二月初五日上諭内閣曰朕車駕南巡乘時佈澤蠲除積欠疊沛恩施更念江蘇之宿遷等州縣上年被水稍重雖經格外加賑可以接至麥秋該督撫等自督率地方官按期散給災黎均沾實惠而清蹕所經倍深軫念著再加恩將經過之宿遷清河桃源三縣被災貧民上年借出籽種銀兩悉行免其徴還以紓民力該部遵諭速行同日上諭内閣曰朕愛養黎元惟恐一夫不獲時巡所至疊沛恩膏前已降㫖將江省民賦積欠悉行豁免更念兩淮竈户僻處海隅專以煎曬鹽觔為業其生計更窘於農民殊深軫念所有乾隆二年至十四年因災停緩帶徵各未完折價共銀四萬二千餘兩著加恩照民户例一體豁免俾斥滷編氓咸霑惠澤該部遵諭速行乾隆十六年二月二十四日上諭内閣曰江南揚州府屬之興化縣積淹荒廢田畆錢糧乆經停緩後歸冬勘辦理於乾隆九年起按年勘報豁糧其元年至八年原緩未完銀米麥石仍應分别催輸荒户殊屬拮据朕翠華南巡廣敷恩澤著將此項原緩未完銀米麥石一並查明加恩豁免以甦民困該部遵諭速行同日上又諭内閣曰朕聞常州府屬之武進陽湖二縣開抵役田租銀一項原係前明時虗田領價後因本户逃亡株連親族各將已産開抵實非前明原置之田亦非當日領價之户小民條糧役租力難並輸以致積年拖欠朕省方所至民隠勤求清問既周倍深軫念著將武進陽湖二縣開抵役田除應辦條漕仍照民田一例完納外其新舊租銀概予豁免以除民累凡爾百姓尚其永承樂利各相勉於孝弟力田以副格外加恩之至意焉乾隆十六年四月初六日上諭内閣曰徐州府屬沛縣濵江地畆近年以來屢被水災所有應徵租銀自乾隆十年起按年勘報蠲豁而九年以前積欠未完租銀以不在勘報之例仍須照數輸納貧民未免拮据著將乾隆九年以前應徵未完租銀三千一百餘兩一併加恩豁免以示軫恤災黎之至意該部即遵諭行乾隆二十二年正月初二日上諭内閣曰今春朕恭奉皇太后鑾輿載臨江浙問俗省方行慶施恵而東南黎庻望幸情殷兹當翠華發軔之初宜沛渥恩用照盛典乾隆十六年肇舉南巡曽頒恩諭將江蘇安徽十三年以前積欠地丁悉行蠲免浙省因無積欠特免應徵地丁三十萬兩以示鼓勵亦欲思愷澤覃敷官無罣悞民免追呼共享昇平之福乃邇年來江浙間被偏災其積欠未完之數又復不少雖維正之供嵗有常經不宜任其逋欠然天時之不齊亦非盡小民之過也該二省去嵗秋成豐稔糧價平减據地方大吏陳奏並清問所及民物康阜井里恬熙朕心實為忻慰但閭閻盖蔵時厪宵旰若今新舊並輸於民力未免拮据著将江蘇安徽浙江乾隆二十一年以前積欠未完地丁銀兩概予蠲免該督撫等其嚴飭所屬實力奉行毋令胥吏侵蝕中飽務俾恩膏普逮實恵均沾稱朕懐保黎元至意該部即遵諭行乾隆二十二年正月十五日上諭内閣曰直𨽻天津府屬各州縣應徵錢糧遞年緩帶積欠稍多近因年嵗豊稔百姓争先完納現在尚有滄州未完地糧八千餘兩静海滄州南皮未完米糓豆二千餘石麥折銀三十餘兩又静海滄州未完入官地租銀一千五百餘兩皆係貧乏小户零星積欠若仍新舊並輸於閭閻生計未免拮据著加恩概予豁免該督方觀承其轉飭各該州縣務宜實力奉行毋令吏胥侵蝕中飽同日上諭内閣曰朕此次南巡所有經過直𨽻山東地方本年應徵地丁錢糧俱著加恩蠲免十分之三此内山東上年偶被偏災處所著免十分之五該督撫等董率屬員查明妥協辦理務俾小民均沾實惠該部即遵諭行乾隆二十二年二月初一日上諭内閣曰朕稽古省方載臨江浙將以勤求民隠廣沛恩膏是以啟鑾之光即經降㫖將該二省乾隆二十一年以前積欠悉行蠲免而時當春令東作方興水陸經行一切除道挽舟雖皆按丁給值然終未免有需民力入疆伊始軫念方殷所有江南浙江經過各州縣地方本年應徵地丁銀兩俱著加恩蠲免十分之三此内或有去秋被水歉收者蠲免十分之五該督撫等其飭屬查明實力奉行稱朕加惠黎元至意乾隆二十二年二月初五日上諭内閣曰朕清蹕時巡勤求民隐兩淮竈户僻處海濱生計勞苦尤堪軫恤所有乾隆十七十八十九等年停緩帯徵竈欠未完折價銀三萬八千餘兩着加恩一體豁免以普恵澤同日上又諭内閣曰従前恩詔内令将各省年乆民欠錢粮查明豁免而積欠漕項該部未經查奏今朕巡幸所至清問閭閻其在江北一带則俱由積歉停緩江南各属又悉皆積年尾欠升合畸零若仍按年带徴于貧黎生計愈滋拮据其将江南省乾隆十年以前積欠􅒩項銀米及以地􅒩耗羡俱着加恩一體豁免以慰軫恤民瘼至意乾隆二十二年三月初一日上諭内閣曰江浙二省積欠地方銀兩前已有㫖豁免而浙省所免獨少足見黎庶素属急公今巡省莅止因命悉查各項則尚有乾隆十八十九二十等年各属未完緩徴及蠲剰漕項銀十八萬九千餘兩二十年分杭嘉湖紹四府属縣場未完借欠籽本銀三萬七千八百餘兩十八二十年分各衛所未完屯餉銀六千四百餘兩並海寧縣未完沙地公租銀二千餘兩着加恩概行豁免該督撫等其董率属員寔力奉行毋令胥役里長侵蝕中飽副朕曲體恵鮮之至意乾隆二十二年三月十八日上諭内閣曰朕稽查省方乘時布澤翠華所至賜賚蠲租而省㑹駐蹕之地加恩宜渥其将江南之江寧蘓州浙江之杭州附郭諸縣本年應徴地丁銀兩悉予豁免用昭行慶施恵之盛典該部即遵諭行乾隆二十二年四月初四日上諭内閣曰江南淮徐海等属受水患有年久朕翠華南蒞周覧土風所過桃源宿遷邳州睢寧諸州縣鶉衣鵠靣相望于道而徐属較甚朕心為之惄然増戚國家所恃以拯患䘏災者惟賑濟一事現在徐属七州縣已降㫖加展賑期可至五月並截㽞本處錢粮以資借糴所以為斯民計者不遺餘力而目擊情形于心寔有所不忍所見如此未見者亦復可知著加恩将淮徐海三属各州縣所有積年借欠籽種口粮不分新舊槩予豁免以紓痌瘝一體之念惟是恩澤所施非得賢守令寔力奉行無由下究况在積歉之區尤資良牧必得慈祥公正寔心任事之人以父母斯民為巳責竭力區畫經營拊循培養庶㡬日有起色若任其因循闒茸漠不闗情假手胥吏視為故事年復一年積疲重困即使厚費帑金蒼生何䏻免溝壑流離之惨是以此方州縣視他處更重該督撫當慎加遴選務得有猷有為悃愊愛民者以膺斯任仍時時㽞心體察有暇即親行咨詢使窮鄉僻壌民隐畢達守令賢否自不䏻掩惟期于地方有益該督撫其善體朕懐毋僅以簿書期㑹為課吏之先務也其數府現任守令各官著該督撫各出考語具摺奏聞或有如所諭賢明之吏宜㽞任者或有不䏻勝此而可以調他處事簡者其悉心詳酌一二年後朕将親臨考察若仍入其彊而田野不治則非守令之罪将該督是問矣著将此通行曉諭知之乾隆二十二年四月十七日上諭内閣曰山東濟寧等州縣上年被水村荘已屡次加恩賑䘏並特命大臣開濬荆州山橋河道以資宣洩今省方所至清問彌切各該州縣春季涸出地畆僅及其半尚可乗時補種而現未消涸者尚多即甫經涸出之處尚泥濘難以犁種朕心深為軫念着将濟寕魚䑓金鄉滕嶧五州縣積年民欠地丁錢粮七萬五千餘兩常平倉三十萬九千餘石借欠籽種麦本四千九百餘兩加恩槩予豁免該撫等其董率属員妥協經理務令實恵均霑毋飽胥吏侵蝕以副朕加䘏窮黎之意乾隆二十二年九月二十五日上諭内閣曰山東濟寕魚䑓金鄉滕縣嶧縣等五州縣連嵗被災其積年民欠地丁錢粮常平倉榖俱已加恩豁免而隨正徴收之耗羡銀兩係備地方公用而向例不在恩蠲之内在被災貧黎生計為艱既恐不能照数完納且正項既已蠲除復徴此畸零之耗羡不肖書吏藉端滋事閭閻仍不免追呼之擾着加恩将濟寧等州縣積年未完耗羡銀一萬一百兩一併豁免以示體䘏災民之至意該部即遵諭行欽定南巡盛典卷三十一
