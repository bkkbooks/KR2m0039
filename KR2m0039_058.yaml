body:
  text: 河防乾隆二十三年正月初一日夢麟尹繼善白鍾山嵇璜陳宏謀奏言竊惟淮揚徐海等属大興水利應修滙湖通江歸海之幹支各河儧辦完竣現今另摺恭奏外臣等於週歴各屬查催工程之便復留心遍加察勘博採輿情各州縣已辦幹支各河而外尚有宣洩民田積水通支逹幹之河渠併有逼近湖蕩支分派别之㲼港秋間查勘之際祗因盈潦佔盖髙下難分一時未能併勘入奏今當冬深水落各處情形皆已畢現内有水道貫通儘堪宣導者固可毋庸疏濬其􅌎墊阻礙之處若不併為經理則上下脈絡猶未貫通臣等公同籌酌必須及時修治層層導引處處通連務使一律條暢庻為全體周備隨經督同道府選帶熟練人員復加相度悉心履勘如碭山縣境内之華家溝河碭山蕭縣二境之周家荘河年久㳺墊亟應續辦又碭山蕭縣二境之減水河係接洩河南永城縣坡水現據永城縣詳請疏濬亦應估辦又蕭縣之龍山河小鹽河洪河銅山蕭縣境内之望州河銅山靈璧境内房村河睢寜縣之龍家河白馬河宿遷縣之縣東河南岸蔡家河李家荘民便河桃源縣之九龍潭河大成河清河縣之響水河清河安東境内之澗河山陽縣之温山河潯河阜寕縣之被澤河曺溝河窰頭支河楊家河太平河海州之王家溝河薔薇河沭陽縣之柴米河贛榆縣之大沙河圍子河共計二十餘處或通身􅌎淺或間段阻塞均宜分段疏浚舊有閘洞量加修葺臣等仰體我皇上懐保黎元恩加無已之至意現在督同道府等員詳悉估計一靣派員領帑興挑儧辦臣等仍徃來督察期於來年三月以前普律完竣統俟奉㫖允准一併確估具題至田間溝洫應歸民力自辦者應查照從前臣尹繼善原奏悉心董率立定章程次第經理奏入報可乾隆二十三年正月二十二日直𨽻總督方觀承河道總督張師載山東巡撫阿爾㤗奏言竊照東省運河䝉聖明指示機宜今將徒駭馬頬老黄河等處相度歸海之路經臣方觀承㑹同前任山東撫臣鶴年酌籌䟽濬事宜恭摺具奏並聲請俟水勢消退之後再行覆勘分别工程難易或勸用民力或動帑興修妥協辦理等情欽奉硃批俞允續經前任山東撫臣鶴年等将運河閘壩應行落低及暫從緩辦之處奏䝉聖鍳兹臣方觀承復㑹同臣張師載臣阿爾㤗覆加籌度除龍灣魏灣應照原奏辦理外其四女寺壩工臣等親加查騐將河身逐段探量惟壩口六十丈迴流冲刷水深丈餘其上河身探至四五里外皆祗水深七尺二三寸不等是此壩底自可毋庸再行落低以致宣洩太過其壩外老黄河分屬直東两省計長九十八里節年淤沮不能暢注今應大加挑濬合之迤北哨馬營石壩靣寛三十丈壩外減河又復通暢即遇盛漲有此両路足資宣洩如有改易情形臣等仍隨時酌量奏明辦理務使壩靣髙不至於漲阻低不至於澁運以仰副聖主念切民依諄切訓示之至意至於徒駭馬頬老黄河應行挑挖工段臣等先經派委两省道府大員遂叚確估兹復公同酌議徒駭一河全在東省境内河身大槩深通惟葦草盤結之處甚多掛淤阻水亟需刨除直𨽻南皮縣屬老黄河内亦有之通計長二萬三千餘丈若按蘆根方定例給價費帑不下數萬两查蘆根可作柴薪今令沿河州縣勸諭附近村民刨挖任其取携期於浄盡據各州縣皆稱為民所樂從又各河身内間叚淤淺及土埂流沙易於為力之處两省均可勸用民力毋庸議請動帑外其餘各工如東省馬頬河頭十八里上承四道引河之水不能容納亟應挑濬寛深於两岸各展寛一丈河身加深四五尺又通河及河尾入海窄狭之處共二十段長三千六百九十餘丈應於两岸各展寛一丈以暢尾閭又老黄河分減哨馬營四女寺两壩之水盤折直東两省自東省四女寺壩口起至直𨽻呉橋縣交界止計引河長十二里老黄河長四十六里均應挑靣寛四丈底寛二丈深四五尺不等即以所挑之土培築堤堰又四女寺滚壩雁翅石墻坍塌應行拆修又徳州三十里舖大橋横亘於髙埂之上應照原奏落低又哨馬營壩外引河並歸入老黄河河頭處所淤淺均應挑濬直𨽻自呉橋縣交界之嚴家荘至玉泉荘老黄河長四十餘里應如東省一律加挑靣寛四丈底寛二丈深三尺至六七尺不等又南皮縣境内馮家口淤灘長四十丈應挑抽河槽一道底靣拆寛二丈深三尺又自霍家圈起至姚家口並下㳺一帯水勢散漫已無河身計共應挑二千一百餘丈而寛八丈底寛四丈深三四尺不等並將各支流堵築使水勢直趨以収用水攻沙之益以上工程均非民力所能充役應動項僱用夫工辦理毎土一方照例給銀七分計東省馬頬河展寛挑深土工約估需銀二千九百九十餘两四女寺滚壩石塘雁翅徳州橋座哨馬營引河等工約估需銀一千二百九十一两自四女寺壩口至呉橋縣界老黄河土工約估需銀五千一百三十二两共約需銀九千四百餘両直𨽻境内老黄河土工約估需銀六千八百餘两再各河身内橋座共三十二處有應照原議於攔河土埂添建橋空酌用荆葦鑲裹以暢水道者有應行展寛以便行旅者均可勸用民力毋庸動帑致多糜費如此籌辦則運河減洩之水皆得由壩口分導入海而黄河馬頬徒駭三河以南又張秋八里廟滚壩及三空五空橋洩水入大清河歸海即遇盛漲之年當不致泛溢而減河俱已一律深通亦無漫及民田之慮矣時值春融於氷泮後水漸消涸臣等即督率委員並地方官開工儧辦速竣仍責成道府大員徃來巡查務使工歸實用仍於工竣之後另議善後事宜俾垂永久再查海豊境内佯沽橋有王家堰一道原議拆毁分流今覆勘形勢西髙東下現議將洋沽橋止疏濬深通尾閭已暢毋庸再拆民堰合併陳明除分飭造具估册送部並直𨽻工需即即於天津道要工項下動用分别支銷歸欵奏入得㫖如所議實力為之乾隆二十三年二月初二日裘曰修張師載阿爾泰奏言竊臣裘曰修等於上年九月奏辦兖沂曺各府水利一摺奉硃批覧奏俱悉朕正慮及沂州府屬毎被水災摺内有疏通駱馬湖之語宜速行妥協相度欽此臣等查駱馬湖下㳺已增入下江水道工程案内辦理外所有沂屬被災處所應行疏濬之處先經前撫臣鶴年及臣等先後飭委陞任兖沂曺道徐鐸䕶理兖沂曺道唐倚衡詳細確查兹據該道等逐一勘丈繪圖議覆臣等查沂屬蘭郯二縣地處最窪西南尤甚平常雨水之年鄰境方稱霑足該處即多被淹乂因沂河上承臨朐沂水諸山河之水兼有汶祊涑及桞青等河合流下注毎遇水發盈堤拍岸泛溢河西之武河燕子芙蓉等河以至各河不能容納瀰漫坡田甚為民患乾隆十三年經原任大學士髙斌等奏請動帑修築沂河西岸長堤更慮水勢異漲正河不能容納又於沂河两岸之江風口建砌迎水滚水各壩藉以分水洩入武河自建壩以後沂河異漲稍除歴今十載迎水壩石盡被沙埋滚水石壩刷坍已甚其由壩口洩入武河之支河二十餘里亦俱淤墊武河正流間有沙淤不能下注臣等查勘情形係急應修濬之工今㑹同酌議應將江風口碎石滚水壩連金門修整一百八十丈該壩東西两頭舊有冲刷河形俱應填平并於壩側築堤一百八十丈其壩外支河二十二里零及武河沙淤處所應一併挑挖寛深工程極為𦂳要又江風口壩外有䧟泥河一道武河之西有燕子河一道南流六十餘里由邳州歸武河入運又西有芙蓉河一道南流八十餘里由邳州歸運以上三河乾隆十三年奏准請修江風口建壩之後再勘水勢情形相機辦理今查勘河身淤淺不能暢流應將狭窄淤塞處所叚䦕挖寛深臣等酌量工程難易將多湏動帑之工撙節估計仰懇天恩將挑挖江風口壩外支河等工照河工土方成例毎方給銀八分一厘其陷泥燕子芙蓉三河工叚綿長通塞相間民力易辦應請照以工代賑之例酌給食米錢文令蘭郯二縣賑後災黎就工謀食通計修壩挑河築堤約需銀二萬五千餘两其餘蘭郯境内一切河道現俱通暢即支河小港間有淤淺之處應於農隙之時勸用民力一律修治毋庸動帑至下㳺與江南邳州接壌之處查下江工程案内已經列入現在仍一面知㑹務期上下通流両無岐悞如此籌辦是沂河入駱馬湖之正支既經濬治又有江風口滚壩以分其流而西岸𦂳要各河又復疏通民田坡水各有去路實與蘭郯二縣水利有益奏入得㫖如議速行乾隆二十三年二月初十日尹繼善白鍾山嵇璜髙晉奏言竊查上江河南興舉水利各河滙注下㳺則髙寳邵伯諸湖受水更多誠如聖訓亟宜廣求去路以為宣導之計惟是湖河水勢歸海逺而歸江近歸海紆迴而歸江順便江都所屬之芒稻閘壩實湖河諸水歸江第一尾閭若使長年啟放俾諸湖積水暢洩歸江於冬春水落時早為騰空以備伏秋容納之地則髙郵南闗車邏二壩自然過水無多而下河各州縣可免淹漫之虞此實拯治下河之要鍵無如芒稻一河乃淮南鹽艘必由之路當河工急需洩水之時正鹽艘盛行䟎掣之候若將芒稻閘版徹底啟放則溜勢湍急鹽船難以挽縴竊恐有礙鹽運若因此全行堵閉則湖河水無去路必致壅積為災伏惟江南諸省水患頻仍仰䝉我皇上軫念民瘼指示機宜大興水利現在上下支幹各河均已逐一䦕挑節節疏導而芒稲河為歸江喫𦂳尾閭更宜亟為講求妥恊方與全局有禆臣尹繼善臣嵇璜㑹同臣髙晉前徃查勘芒稻河自西北直趨東南而灣頭河則自西南至東北横亘其間所有運河東岸之金灣東灣鳯凰壁虎灣頭等閘壩減洩之水皆直趨芒稻閘及董家溝石羊溝廖家溝各滚壩歸江鹽船素由灣頭河行走必湏閘門下板各壩堵閉方資浮送所以芒稻閘壩不能啟放合宜臣等再四籌畫查芒稲閘迤東現有舊越河一道應令鹽船由越河直走金灣北閘不繞芒稲閘出灣頭則洩水運鹽分為两途芒稲閘可以長年啟放董家溝石羊溝廖家溝皆可不必封閉庻使湖河之水暢洩歸江實於水利有益第查越河長六百餘丈臣等測量水勢甚覺淤淺應再挑深五六尺一律深通以利遄行又查金灣北閘閘底尚髙改低二尺四寸以便鹽船挽運如遇水勢過小之年再行相機辦理如此則歸江尾閭無所壅遏諸湖積水得以逓相灌輸不致滙積為患矣臣等一靣飭令鹽運使盧見曾淮揚道何煟等確估委員辦理勒限二月内完工奏入報聞乾隆二十三年三月十二日嵇璜裘曰修夢麟尹繼善白鍾山奏言竊臣等接准廷寄陞任撫臣陳宏謀敬陳河工未盡事宜一摺欽奉硃批此奏著交裘曰修夢麟㑹同尹繼善等詳議速奏欽此查江省淮揚徐海鳯頴泗等屬瀕臨湖河疊罹水患䝉我皇上誠殷懐保念切痌瘝上年鑾輅南巡指示機宜特命臣等多方疏導不惜千萬帑金為億兆黎元籌久逺安全之計仁恩普被利頼無窮臣等恪遵聖訓黽勉辦理現在興舉各工將次告成凡將來善後事宜無不仰體宸衷加意講求期於地方生民永逺有益今據陳宏謀具奏各條多係臣等公同籌畫曾經靣啇者因一時工程尚未完竣是以未經㑹奏兹欽遵諭㫖悉心詳籌再三討論謹就臣等所見逐條分晰議奏伏祈睿鍳一陳宏謀奏稱此次所挑之河已節節䦕通又復酌加寛深可期永資宣洩然必湏年年挑浚方免日久淤塞淺阻請將所挑各河近黄運河者歸於河員經管隔逺無河員者令州縣及該地方同知佐貳經管分清界限毎年秋後水落㑹同查勘有淤淺者㑹同州縣分清叚落酌派附近有田地民人合力挑濬年底將某河已經挑浚某河不湏挑浚造册報院院再委道府大員於春間覆勘結報有應挑浚而不挑浚者將經管各官揭叅此等年年挑浚之費照例田主給食佃户出力果有大叚阻塞及工大費重者詳明估計題明動帑辦理堤閘損壊改建另築者照此一律分别辦理等語查江南為衆水滙歸之地必湏河道寛深庻足以資宣洩此番大工興舉雖已處處疏通然不能保其日久不仍􅌎淺應照陳宏謀所奏再加妥酌將所挑各河闗係黄運宣洩者歸於河員經管闗係民間水利者令州縣及該地方佐貳經管分清界限於毎嵗秋冬水落之時詳加查勘造册通報有些㣲􅌎塞者即酌派附近有田民人照業食佃力之例自行挑濬總責成該管道府遍厯嵇查報明督撫督率妥辦如有應挑浚而不挑浚者將該管各員叅處其有工大費重不能槩用民力及堤閘損壊改建另築者詳請估題動帑辦理如此則逐年挑浚既不至日久淤塞大費帑金而官民皆有責成庻使遵循罔懈至如何分清界限責令經管之處現行各司道妥議統俟工程全竣即行具題以定章程一據陳宏謀奏稱地方廣濶新挑之河止能洩近河之水其不及洩之水尚多請俟今年河水通流之後督令民間自行䦕浚支河小溝以逹於所䦕之幹河小民見水有去路自必樂從再各處道路之旁原有小溝不甚通暢應於秋冬督率民人將境内路旁之溝挑深使之通逹即以所挑之土平墊道路路漸髙而溝漸深平地之水由道旁之溝以歸幹河田禾免淹行人稱便查各州縣地方廣濶現在所挑之河雖上下江通身合筭已有一百餘道其平疇曠野離河稍逺不及洩水之地尚多應令民間自行陸續䦕挖小溝層層導引由支逹幹則雨水易消自可無虞壅積至各處道路之旁舊有小溝未免淤淺應於毎嵗秋冬督率附近民人挑浚即以所挑之土平墊道路路漸髙而溝漸深兩旁附近之水俱可引入溝中滙流歸河既有益於民田亦甚便於行旅應如陳宏謀所奏辦理一據陳宏謀奏稱淮徐海等境内地土非盡瘠薄可以種植之地一望無際祗因河流未通一遇天雨是處瀰漫今幸河流疏通水有去路尚宜各䦕溝洫以備旱潦即以䦕溝之土加築圩圍妥砌㴠洞隨時蓄洩以成圩田乾隆九年督臣尹繼善酌定圩圍溝洫條規奏請舉行彼時揚州之髙寳等州縣淮安之山陽等縣所築圩田至今皆成膏腴已有成效因河流未盡通暢雖築圩圍水無去路仍被淹漫遂爾不肯多築圩圍今河水通流洩水比前大暢現在仍照尹繼善原奏䦕溝築圩次第經理惟是此等地方連災之後民力拮据貧富不一難於合力築圩請自今年秋冬為始地方官相度地勢勸民築圩開溝有無力者仍照乾隆十一年河臣髙斌等奏准借給䬶两助其飯食築成之後所借工本分三年還官查田間水道蓄洩攸資必湏加意講求庻幾旱潦有備如濵河窪地向屬水田則以䦕溝之土加築圩圍使圩内之水可以車放即遇外河盛漲不致漫淹如係旱田只應多䦕溝洫不必槩築圩圍總期因地制宜經理妥恊臣尹繼善於前任两江時曾經奏明定有章程飭令淮揚等屬遵照現據淮安府詳議將溝洫圩圍規制一併核定通行淮揚徐海所屬實力遵辦即於今歲秋冬勸民䦕築其舊日圩圍有遭水坍廢者並令及時修補惟災地民力艱難不能一概自備工本應查明實在無力者准計毎土一方酌借銀二分以資飯食畚􅓩之費在於藩庫公項内動辦均作三年繳還歸欵在百姓亦屬樂從而於農田大有禆益苐恐州縣不能實力奉行應令將毎嵗䦕溝若干築圩若干於春間造册報明督撫委道府大員逐段查騐按其功過分别勸懲一據陳宏謀奏稱各河䦕通之後上㳺之水由髙而下可以逓層宣洩内有地處窪下平日原係湖蕩止能受水不能通流今雖䦕河節節相通若與去路地勢相平或更有仰盂倒漾之勢此必不能免於淹漫者非河流之不順實由外水髙於内河形如釡底地勢使然非人力所可強也請俟今年水過之後看其水勢宣洩如何果有必不能於於淹漫者將此等田地勘明頃畆減除糧賦有可種植葦草者改照蘆課輸納名曰棄地與水而仍為近水居民資生之計如水深不能種葦者另為設法安頓俾民免於失業再此等低窪之地現已䦕有小河一遇水落河仍通流倘得消涸稍早仍可種植春麥毎年得収一麥亦可資生仍不致全棄查地勢各有髙低水性總歸就下凡属極窪地畆形如釜底之處實在止能受水難以槩令成田似不若譲地與水以為容納之區應如陳宏謀所奏俟今年水過之後察看水勢情形如有地勢極窪或原係湖蕩必不能免於淹漫者勘明頃畆減除糧賦聼民間種植葦草採取資生改照蘆課輸納惟蘆葦叢根盤結最易積􅌎凡有水勢通流之處不宜種葦者仍湏禁止應令各隨地勢改種菱芡之屬亦可稍資利益更不許築埂設籪阻碍水路至如實有不能種植之處歴來並無出産即遇水小天旱之年亦屬一片汪洋實與水沉田地無異似應據實詳題豁免錢糧如偶爾被水並非常年成災或水勢消落尚可種植處所不得一槩豁免所有原奏另為設法安頓之處應毋庸議一據陳宏謀奏稱黄河北岸自李家莊起至徐城之蘇家山計九十里向無堤㟁迨後接築二十里尚有七十里未曾築堤乾隆二十年孫家集漫口其渾水直趨㣲山等湖及荆山橋河淤成平地年來湖水不能宣洩銅山沛縣俱受淹漫其患皆由於此上年仰䝉聖明洞鑒特命侍郎夢麟等竭力䦕浚湖口之茶城小梁山荆山橋等河湖水得以暢流田地方始涸出自此以後黄水决不可再令東漫則黄河北岸不可再任無堤利害已明臣恭聞此堤欽奉上諭另行辦理今各河均已疏濬又徐城南岸已築石堤石堤之對岸有子房獅子等山為岸徐城可以無虞此七十里之河岸亟宜築堤以結通河全局查黄河自河南榮澤縣以下河道俱寛至四五百丈迨至徐州河道止有七十餘丈即徐州以下河身亦俱窄狹城郭田廬在在受險是以向來留此無堤之處聼其漫灘俾平槽之水悉走中泓則河底日漸刷深可以順流歸海但北岸漫灘之水易於冲刷溝槽若不毎年収拾恐漸致奪溜成河為患匪細上年曾奉諭㫖另行籌辦臣等前後至徐詳加察看上年花莊所築之亂石壩已有間被沙淤者應請照臣等前奏量為加築所有溝槽俱補築亂石壩以資捍衛其餘地靣槩行接築之壩與舊有之民堰土壩一律相聨至地勢後窪段落加築裏壩一道如格堤之式俱謹遵訓示務期堅實稳固使尋常漫灘之水至此即可停淤設遇水勢過大之年亦止壩上些㣲過水不得北趨成流而下㳺各工俱不致受險似此年年查勘料理漫灘之淤沙停積河岸日髙而上下湖河均有禆益矣一據陳宏謀奏稱下河一帯民田以范公堤為捍衛此堤日久坍損單薄殊甚愚民於水漲時希冀水由外洩輙挖破此堤洩水隨後雖經補築不過取堤根之土虚鬆填滿又無夯硪現在缺口甚多堤身不過數尺倘遇海潮盛漲髙寳鹽城各縣必受潮災此堤於目下似無闗係而實經久捍衛不可廢棄之要工伏乞皇上勅諭鹽臣勘明估計動項派員分叚分年如式修築務期髙寛堅築通體完固永資捍衛至於内地水漲勢湏穿堤外洩業已層層建閘以時啟閉其鹽城迤北可以洩水歸海較順者河臣與督臣現在䦕挖引河添建石閘臣亦就所見札啇自此以後永禁挖堤放水其如何責成閘官分管保䕶亦聼河臣鹽臣啇辦查范公堤原為下河一帯保障凡有坍損殘缺之處自應補修堅築以禦海潮臣等現與鹽臣髙恒㑹啇酌議委員勘估具題動項辦理務使通體完固永資捍禦至鹽城天妃石䃮白駒等閘現在上𦂳趕修各閘下引河俱經挑浚是遇水漲之時儘可由現在閘河宣洩歸海此外無庸另添閘座至盗挖堤工原應禁止應如陳宏謀所奏嗣後永禁挖堤放水仍責成各閘官分管巡查加謹防䕶並令東臺同知及各地方官實力稽查以保堤工一據陳宏謀奏稱㤗興如臯境内有窑子河老龍河龍㳺河年久􅌎塞淺阻從前地方官久請挑浚因派民修無力而止應請自如臯窑子河起接㤗興之老龍河又開龍㳺河直逹於江則雨水有所宣洩遇旱可資灌溉查如㤗二邑境内之龍㳺窑子老龍等河前據該處民人呈請挑挖經臣等委署常鎮道蘇凌阿江防同知王培宗帯同两縣逐一履勘查得龍㳺河在如臯縣治之南紆迴曲折俗稱九十九灣河口寛四五六丈不等崖髙七八九尺不等即大雨時行亦止水深四五尺两崖甚髙水勢長發即暢洩入江甚為便㨗田畆不虞水漫至窑子河在如臯縣治之西自西門城濠起至㤗興縣界止迤下即老龍河屬㤗興縣境内河形俱寛三四五丈不等崖髙七八九尺不等即伏秋大雨亦止水深三四五尺従未淹及民田不致水虞為患禀覆臣等覆查龍㳺窑子老龍等河両崖髙亢地非低窪無虞淹漫且河靣俱髙於江面數尺内髙外下宣洩甚易毋庸興挑即使動帑挑深而引江水内灌誠恐一日両潮旋即淤墊徒費無益此條應毋庸議以上七條臣等逐一酌議意見均屬相同理合恭摺覆奏是否有當伏乞皇上訓示遵行再上下两江水利事同一體如䝉恩准其中有應行上江照辦者俟命下之日並移咨安省撫臣遵照辦理再准工部咨議覆御史呉鵬南條奏宜興水土之政一案今臣㑹同經畫或疏通渠港或修理堰坡凡於農田水利有益之處一體確勘造册送部至地方承辦之員作何定其殿最務使激勸有方及本鄉紳士慕義急公情願捐資勷事者作何奨勵一併妥議到日再行議覆查淮揚徐海鳯潁泗等屬應行疏通河道挑浚溝渠以及修築圩圍等項臣等現於酌議陳宏謀條奏案内詳晰陳明令地方官於秋冬水落之時勘明督率民人業食佃力分别查辦應俟地方官勘明之後統歸彼案造册送部毋庸重複再議至地方承辦之員如果實心愛民處處料理妥協著有成效者應請題明議叙仍照該御史所奏嗣後保舉知府及卓異案内概行註明倘有漫不經心不行籌辦並無實效者即隨時查明叅處以昭勸懲其本鄉紳士除應行業食佃力自辦工叚之外如有慕義急公情願捐資勷事者應請照樂善好施之例數在三百两以上者題請分别議叙如在三百两以下按其捐數多寡由督撫司道府州縣分别給匾奨勵合併陳明奏入上諭曰議中黄河北岸築堤一事俟遲數年再看餘如所議行乾隆二十三年五月二十五日劉統勲裘曰修尹繼善白鍾山奏言乾隆二十三年四月三十日奉上諭據巡漕給事中海明奏稱東省水患由㣲山湖之漲溢而㣲山湖之漲溢由黄河北岸之内灌請於㣲山湖之南圈築攔黄堤工即以取土方塘挑成順堤河形導入荆山橋出猫兒窩入運並於内華山西建築通湖閘座以備宣洩等語具見悉心籌畫黄河由豫入徐两岸夾束河身甚狭不潰決為銅山諸邑害則漫衍而入於金鄉魚䑓今徐城已增築石工足資捍禦而山東之濵湖州縣民舎田廬不免仍成巨浸孰非吾赤子而忍坐視果便民生永獲安全即多費帑金朕所不惜且年年蠲賑所費不更無已耶但是否實有禆於東省而於徐郡两岸亦不致另生險工或䆒不如於北岸無堤處所接築堤工之為得計著尚書劉統勲馳驛前徃㑹同尹繼善白鍾山逐加閲勘詳籌妥議請㫖辦理夢麟裘曰修如尚在河干著一併㑹同查辦欽此臣等伏查黄河北岸上年因慮漫水過多當將花莊溝槽築作碎石壩工本年春於議覆善後事宜案内又將各處土壩改填碎石並接築土堰臣等遵㫖節次查勘經理無非欲使黄水有所節制而又恐束之太驟致生他險也今海明請於㣲山湖之南圈築攔黄堤工並挑挖順堤引河導由荆山橋入運是原為攔黄起見但攔之於㣲山湖邊不若攔之於黄河北岸恭讀諭㫖於北岸無堤處所接築堤工之為得計聖謨廣逺洞悉機宜臣等所當欽遵辦理者也今勘得黄村壩起至大谷山止計程六十里應築土堤長一萬五百餘丈髙以六尺底寛八丈為率估需土方銀六萬餘两其所築之堤相度地勢之髙下與河形之紆直總以離河十里内外為度庶地靣寛濶得以平衍容納不致冲擊堤工其自大谷山至蘇家山計程二里許逼近河身恐生他險且两山夾峙地勢髙亢原可無庸築堤查舊有石壩基趾應行修整俾平常之水不致上灘縱遇異漲之時漫壩而過亦止由荆山橋迤下歸運該處相距㣲山湖四十餘里且在下㳺斷不致涓滴復入㣲山湖内如此通盤籌辦在東省既収保障之益而江省亦可無另生險工之虞矣所有議築堤工臣等現在遴委妥員發帑儹辦務期迅速如式完竣以仰副聖主愼重河防奠安民生之至意奏入得㫖如所議行乾隆二十三年六月初九日吏部奏言内閣抄出安徽巡撫髙晉奏稱竊照安省鳯潁泗各屬地當徐豫下游頻罹水患仰䝉我皇上饑溺為懐痌瘝在抱上年鑾輅重幸江南周覧形勢洞悉民隠不惜千百萬之帑金為民圖久安之至計特命臣等詳加查勘相度妥籌自集事之始迨工完之日無時不上厪聖懐無事不欽承明訓臣等竭力同心恪遵辦理現在一切工程次第告成所有善後事冝臣復再四熟啇悉心酌擬敬為我皇上陳之一奏稱請定水利兼銜以専責成也查地方農田水利凡督撫藩司知府直𨽻州並州縣正印等官均為職分應辦之事責無旁貸惟是正印官事務殷繁不無顧此失彼若將守巡各道及同知通判州同州判等官兼以水利職衘恊同正印官稽查辦理實為有禆現准部議調任河南布政使劉慥陳奏水利兼衘案内行令查議今臣查得上江現修河道均在廬鳯道所轄鳯頴泗三府州地方請將廬鳯道並鳯陽府同知通判頴州府通判直𨽻泗州州同均兼水利職衘另行分别鑄給闗防以重職守該道丞倅既經兼衘嗣後將所屬各州縣舊有河道並本年新修各河及堤堰橋閘即責成各該員協同地方官平時加意經理一至冬令水涸各於境内逐加查勘如有􅌎淺阻塞汕刷殘缺處所一靣報明道府一靣勸諭附近有業村民公平出夫修浚補築一律寛深堅實出結呈報存案如或其中有工費浩繁民力不繼亦即據實詳請臣與督臣再加親勘酌籌請㫖辦理臣等留心查察如果各該道府丞倅州縣毎年實力奉行河道溝渠完整堤堰橋閘堅固則分别記功奨勵三年之内始終不怠或保知府或於計典内註明卓薦以示優奨倘有玩忽從事混行揑報或藉端擾累一經發覺嚴叅治罪以昭炯戒查水利之興闗係農田凡職司民牧者均應實力籌辦但地方官印各官事務殷繁或不無顧此失彼之慮若令守巡各道及府州佐貳等官分司協理則責成更専稽察愈宻而蓄洩利頼可以咸収實效應如該撫所請廬鳯道鳯陽府同知通判頴州府通判直𨽻泗州州同均准其兼衘水利其鑄給闗防之處應令該撫另行擬定字様造册咨送吏部再行查辦至該道同知通判等官既經兼衘水利嗣後所屬各州縣舊有河道並現在新修各河及堤堰橋閘等工均應責令該員等協同地方官隨時加意經理至冬令水涸各於境内逐細查勘如有􅌎淺阻塞汕刷殘缺處所勸諭附近村民量力出夫修浚補築俾一律寛深堅固其或工鉅費繁民力不繼者即行據實詳報該督撫酌量請㫖辦理倘能實力奉行始終不懈該督撫分别奨勵以示鼓舞如有玩忽從事混行揑報或藉端擾累即將該地方官及道㕔等一併分别查叅議處一奏稱濉河之宜加保䕶以垂永久也查宿靈虹上承豫省永夏及江蘇蕭碭清黄諸水全頼濉河宣洩嗣因濉河淤墊水分南北两股以致泛溢為患臣尋源溯流體訪查勘既將濉河䦕挖原有閘座修整以復其舊又將南北两股因勢利導一併疏浚以分其流更於南北两股河流滙歸濉河處所各設閘座以備啟閉平時則上下各閘啟板聼其清水分流倘遇盛漲毛城舖漫灘水至則上下各閘必湏隨時閉板俾清水各歸南北两股本河將濉河空出以譲黄水獨行一俟黄水斷流仍將各閘啟板放入清水以資刷沙此現在辦理之形勢啟閉之機宜也夫水利河道雖與河工有間其為利害則同河工因設耑員防守是以隨時相機保䕶水利河道工竣一交地方官便無人經管遂致有名無實今新修各河情勢既具機宜宜講若不派員分管一二年間仍歸廢棄殊非仰沭皇上永垂利頼之至意臣查宿州有州同一員州判一員靈璧縣有主簿一員請將自徐溪口起至符離集止所有河道並西流黄疃沙溝三閘應交駐劄徐溪口之州同分管其自符離集起至霸王城止一切河道並蒿溝桃溝唐溝北山河四閘應交州判分管該州判向住州南臨涣集今請於伏秋両汛移駐時村適中之地以便徃來照料冬春仍駐臨涣以資弹壓又自霸王城以逹陵子湖口並無閘座有河道四十餘里應交靈璧縣主簿分管仍將各員所管可道閘座統責成宿州知州總理其事不可因有分管之員稍為岐視但既設閘座必得閘夫以司啟閉應請毎閘各設四名所需工食照例咨部支銷如此立定章程則濉河可資保䕶查宿州所屬濉河為宣洩清黄諸水之要道前經􅌎墊以致水分南北两股泛溢為患現在既經該撫體察情形將濉河䦕挑疏浚並將原有閘座修整以復其舊又將南北两股因勢利導以分其流更於南北两股河流滙歸濉河處所各設閘座以備啟閉苐不派員分管隨時相機保衛恐因循遷就一二年間仍歸廢棄今請自徐溪口起至符離集止所有河道並西流黄疃沙溝三閘交駐劄徐溪口之宿州州同分管自符離集起至霸玉城止一切河道並蒿溝桃溝唐溝北山河四閘交州判分管並請於伏秋两汛令該州判移駐時村適中之地以便往來照料冬春仍駐臨涣以資弹壓又自霸王城以逹陵子湖口河道四十餘里交靈璧縣主簿分管俱責成宿州知州總轄其事應如所奏辦理仍令該府飭令該州不時督率逐加查察因時啟閉相幾蓄積務使永垂樂利毋得因循積習稍有岐視以至有名無實其毎閘應各設閘夫四名所需工食銀两應令該撫照例咨部支銷仍於地丁奏銷案内造報户部查核一奏稱毛城鋪應責成河員與地方官一體稽查也查濉河所以淤墊之故實因毛城舖減洩黄水過多所致則毛城舖實為濉河之闗鍵嗣後凛遵聖訓堅閉不䦕并照奏准之案將口門冲深溝槽填平上建亂石壩其口門以北之鉗口壩并口門以南之亂石壩一律修復以節水勢即責成黄河之蕭碭㕔營加謹守䕶設遇盛漲之年漫灘之水仍不能不流入濉河應令蕭碭㕔先期知㑹宿州俾經管各官得以預為防範如有漫灘水發蕭碭㕔營不立時知照或已經知照而管閘各官啟閉失時俱嚴加叅處以儆玩悞務期上下闗㑹聲氣聫絡則濉河縱有停沙亦易疏濬等語查濉河當毛城舖之下㳺上㳺減洩黄水過多下㳺必致沙停淤墊今凛遵聖訓毛城舖堅閉不䦕又復將口門冲深溝槽填平修築亂石霸以節水勢固已防維嚴宻但水性靡常若不先事預防恐盛漲之年黄水漫溢仍不能不流入濉河日久又成􅌎墊自應責成河員恊同地方官一體稽查宣洩以時方為有禆無患應如該撫所奏毛城舖責成黄河之蕭碭㕔營加謹守䕶設遇盛漲之年漫灘水發令該㕔營臨期知㑹宿州俾經管各官得以預為防範如並不知照或已經知照而經管各官啟閉失時即行據寔查明嚴加叅處一奏稱新修水利河道堤堰閘座宜分别官辦民修以示遵守也查鳯潁泗各屬新䦕並䟽浚修整各河大小三十餘道長者二三百里短者亦不下數十里其間土性不一有老土淤土有淤沙有沙礓河道工成之後底岸堅實可望經久毎年縱遇雨瀮水冲不無坍䣃而工程亦屬有限又新築並舊有各子堰或有殘缺均請俟冬令水涸之後交兼管水利丞倅督率各地方官查明勸諭附近有業居民一律修築查報不許混行動項致滋糜費惟查宿州之洪河濉河從前原被黄水淤墊全是􅌎沙今在淤河中開挑成河土性終属虚鬆一遇雨淋則岸土坍卸一遇風起則浮沙飛揚將來伏秋两汛大雨時行上㳺水發两岸被水滙歸河中難免坍卸􅌎墊之患若两岸坍䣃儘可聼其寛展轉為有益而河底􅌎墊則水勢恐有阻碍必得隨時疏浚庻合機宜臣伏讀上年八月内欽奉上諭毛城舖為濉河上㳺欲濉河之無淤墊計惟有堅閉毛城舖茍非盛漲不得䦕放萬不得已如今嵗之自行漫溢即當於斷流之後将黄水淤沙盡力挑浚若稍一因循則今年􅌎一尺明年即􅌎二尺河身墊髙節節阻碍年復一年其淤更甚故逐年挑浚深通最為要務欽此臣於辦理濉河完工後體察形勢熟籌辦法仰見我皇上至聖至明無㣲不在聖明洞鍳之中誠至當不易永宜服膺遵守者也今濉河挑淤工費既繁民力不繼應請歸官辦理苐疏濬挑挖要在隨時估辦必得預撥銀两収貯道庫以備急需查江寕藩庫有匣費一項原係歸入耗羡案内以為充公之用毎年請撥銀三千两觧貯廬鳯道庫如遇盛漲之年毛城舗黄水漫溢或雖無黄水漫溢而毎年清水過後於冬初水涸時飭令該州將洪濉二河有無淤墊逐一查明如有應行挑浚工叚具文申報道府親臨勘估一靣督州多撥人夫秉公價僱如式䦕挑深通一靣通報督撫臣等委員查察再親加勘騐核實報銷所撥銀两如有餘剰存為下年之用倘有不足如數在司庫匣費内找領如或水過未淤亦不許藉端靡費倘有揑混冐濫情弊查出嚴行叅䆒等語查鳯潁泗各屬新䦕並疏浚修整各河及新舊子堰等工雖經動項一律修整完固而毎年雨淋水冲不無坍卸自宜隨時勸民修築以節錢糧應如該撫所奏如有前項些小工程於冬令水涸後交與兼管水利之員率同各該地方官查明勸諭附近有業居民自行修築不得混行動項致滋糜費至於按年䟽浚洪濉二河該撫既稱工費浩繁民力不繼應准其仍歸官辦題請動項興挑所需疏浚挑挖銀两亦應准其在於江寜藩庫匣費項下毎年預撥銀三千两觧貯廬鳳道庫備用如有餘剰存為下年之用倘有不足如數在司庫匣費内找領仍令該撫將前項銀两俟工部核明准銷之日於年底彚奏案内造報户部查核仍令於毎嵗冬初水涸時飭令該州将應挑浚工叚報明該府親臨確估如式䦕挑深通即一靣通報該督撫等委員勘騐核實報銷總期工歸實用帑不虛糜於河道錢糧均有禆益如有過水未淤藉端糜費揑報冐濫等弊該督等速即查明嚴行叅究一奏稱河道既已興修完工而民間溝洫亦應次第講求也查安省凡上承豫徐下逹洪澤湖之正河支河或加開挑或為疏浚俱經一律籌辦從此可望水勢暢流無復阻礙惟毎州縣之溝洫小河多者一百餘道少亦不下數十道現在頴屬各州縣及鳯屬之鳯䑓縣因正引支河已經開通而附近士民有將田湖溝洫公同自行䦕挖以逹正支河者又有自修子堰建設木橋者此葢勤力之士民不待勸諭而能踴躍從事者也至於宿靈虹並泗州厯年被災民多貧惰又因人心不齊彼此觀望者有之現准部咨議覆御史呉鵬南條奏宜修水土之政一案行令酌量查議又議督臣陳宏謀陳奏下江水利案内上江一體照辦臣叅酌各議悉心體察應就安省地方酌擬章程以期立法必行竊惟謀求水利貴於因地制宜今查鳯頴二府地多平衍宜開溝洫靈虹二縣及泗州瀕臨湖河地勢低窪可築圩圍一州一縣之中應開之溝洫若干應築之圩圍若干某處應先辦理某處從後舉行備細查明分晰䦕造清册由道府核實通詳立案即交兼管水利之丞倅協同地方官多方勸諭次第興舉如有本地慕義急公情愿捐資勷事者請照樂善好施之例分别奨勵既不可派累滋擾更不可因循怠忽務期士民踴躍從事庻可行之無弊仍令年終各將辦過溝洫圩圍各若干由道府勘明詳報將地方官歸入前條兼衘案内分别勸懲等語查興修水利首務固在經理幹河之大且要者其次則疏支渠築圍埂亟湏加意講求因地制宜使水潦有備而沮洳之區皆可成沃壌本年正月内臣部議覆御史呉鵬南條奏内開各省督撫如有水利農田之事應行修舉者均令留心經畫酌議具奏又欽差侍郎裘曰修等議覆督臣陳宏謀條奏内䦕上下两江水利事同一體其中有應行上江照辦者並咨安省撫臣遵照辦理今據該撫奏稱安省鳯頴二府地多平衍宜䦕溝洫靈虹二縣及泗州瀕臨湖河地勢低窪可築圩圍一州一縣之中應䦕之溝洫若干應築之圩田若干某處應先辦理某處從後舉行備細查明分晰造册由道府核實通詳立案即交兼管水利之丞倅恊同地方官多方勸諭次第興舉等語均應如所奏行令該撫飭令各該地方等官多方勸諭次第興舉年終將辦過溝洫圩圍各若干之處由道府勘明詳報該撫等分别勸懲報部查辦至如有本地士民慕義急公情愿捐資勷事者准其照樂善好施之例令該地方官據實申報督撫按所捐銀數多寡分别辦理如數在三百两以上者題請議叙如在三百两以下令督撫司道州縣酌量給匾奨勵一奏稱嚴禁居民阻水之弊以免河道􅌎墊也查水勢順流而下河底通利則奔騰迅速泥沙不停一有阻遏上靣浮水雖過而河底泥沙漸積甚有闗礙乃有沿河無知村民水發時或於河中竪立木樁拴繫葦箔捕取魚鰕名曰設籪又有於河水消落或用草土或用磚石築埂中流戽水取魚且為往來行人㨗徑河底層層阻隔習而不察迨次年水發無人収拾以致冲蕩滿河毎年如此雖有寛深河道亦必阻遏淤淺臣現飭地方官出示嚴行禁止倘再違犯枷責痛懲仍押令將阻礙處所如式修整以儆愚頑併飭道府丞倅有水利之責者一體查察務期惡習盡除河無阻礙庻免淤淺倘地方官奉行不力一併叅處等語查沿河村民𥪡樁設籪築埂戽水不過捕取魚鰕以謀㣲利原非有心阻遏河道然習而不察無人収拾積久亦易􅌎滯似應如該撫所奏飭令所屬各地方官出示嚴行禁止但東南澤國小民多傍湖河溪港而居農隙時或施罾布網或下籪安籠以収天地自然之利本難禁其取携况間遇水潦之年乏食貧民臨流採捕亦足以資餬口倘一概嚴行禁止不特有妨生計且徒䦕胥役勒索之門應一併飭令地方有司及兼管水利之員親徃詳加體察因時因地善為奉行凡官河大港闗係蓄洩機宜如有築埂立樁實係阻礙河流者應設法嚴行查禁其餘溪灣港㲼無闗蓄洩處所仍聼民便毋得委之胥役兵丁藉端需索致滋擾累恭候命下工部行文該撫並两江總督江南總河一體欽遵辦理可也奏入報可乾隆二十三年七月初二日两江總督尹繼善河道總督白鍾山奏言接准部文欽奉上諭尹繼善奏查勘宿桃等屬工程情形摺内有將駱馬湖尾閭啇之河臣早行䦕放使湖靣騰空以待汛水之語此湖河第一𦂳要之務也湖雖所以瀦衆水而不為之及時宣洩則停蓄既多鮮有不致漫溢者向来治河諸臣不思逹其去路而惟恃湖堤以相捍禦及湖漲難容終致泛溢不収而逺近田廬胥受其害矣即如洪湖五壩之水由髙寳卲伯諸湖以歸江海本有建瓴之勢乃諸閘之啟閉不時引河之分洩不暢而下河諸州縣遂瀕罹水患自去春南巡時親臨指示特命嵇璜専司其事令將車邏南闗二壩常行䦕放又早闢歸江之路以逹其流下河田畆去秋遂獲豊収今春據嵇璜奏稱髙寳二湖湖靣寛濶務使各處引河通流無滯早為騰空湖靣迨水勢漸長即由引河分注從邵伯諸湖入運歸江俾髙寳諸湖不致驟盈等語其所經理頗能恪遵朕訓適合機宜在該河督等職司疏浚於其中源委亦所深悉然非朕之諄切指畫則誰肯為此耶今駱馬湖之水由六塘河下洩而東流入海其河之两岸則宿桃安清海沭六州縣田廬在焉伏秋大汛民生攸繋若使湖靣早為騰空則汛水之來有所容納盈科後進源源下注湖水無泛漲之虞而六塘两岸亦斷不至潰决四出矣豈惟此六州縣之利其瀕湖一帶運道民生亦咸奏安瀾之慶尹繼善既已啇之河臣早為開放尾閭以為預騰湖靣之計應如所奏速行此後毎嵗大汛之前應行䦕放時著該總河㑹同該督先期奏聞以免因循觀望并將此㫖勒石湖濵俾後之司河務者永逺遵守焉欽此仰見我皇上睿謀廣運指示精詳實已無處不周無㣲不到臣等仰體聖心詳加籌畫竊查駱馬一湖上承東省䝉沂諸山之水奔騰滙注由六塘河東流入海原期使其暢洩不致壅滯方為得宜舊例將湖之尾閭冬間堵閉俟春間粮船過完始行䦕放原為蓄水以濟漕運也但歴年以來偶值運河水小尚少資其接濟而水勢充餘之時較多糧船轉運竟無藉於湖水毎年尾閭堵閉之後湖水停蓄不能預先騰空及至水發之時前者未去後者又來一時宣洩不及以致漫延為害職是故也臣等與各道再四啇酌似應因時變通將冬間堵閉尾閭之制竟行停止使湖水源源下注將湖面早為騰空縱遇夏秋水發有地可以容納隨長隨消六塘河堤埝亦可無冲潰之虞如遇秋冬水小之年必須堵閉蓄水以備來春濟運再行奏明酌辦如此不但毎年啟閉錢糧可以節省而蓄洩得宜庻於数州縣民田更有禆益奏入上諭曰如所議行該部知之乾隆二十三年七月初四日两江總督尹繼善河道總督張師載山東巡撫阿爾㤗奏言乾隆二十三年六月初六日准廷寄乾隆二十三年六月初三日奉上諭據裘曰修等奏被水地畆已多涸出所有從前奏請於湖口閘上添建閘座之處應行停止等語從前尹繼善以運河水漲亟應疏濬是以奏請於該處添建閘座以資宣洩今復奏請停止其意盖以積水已消若添建出水閘轉恐於蓄水濟運之法有礙此未免過計現在積水雖退而運河量不慮無水接濟該處閘座雖不必添建或酌量運河蓄水尺寸將閘口迤上之堤留為滚水壩俾蓄洩俱有所資殊更為有益著傳諭尹繼善等即妥恊查勘辦理再摺内有安山湖已成平陸之語此湖既成平陸民間自必耕種現在曾否已經陞科著一併傳諭該督等查明具奏欽此臣等跪讀之下仰見我皇上睿慮周祥籌畫盡善至意除安山湖陞科縁由臣張師載臣阿爾㤗另行覆奏外遵即知㑹先後齊至韓荘悉心查勘伏查湖口閘水勢徃年以金門水深一丈二尺五寸即湏閉板収蓄今探量水深一丈三尺五寸較徃年尚多一尺現在宣洩查東省運河自濟寕以北有汶府等河並蜀山馬踏諸湖之水濟運濟寜以南又有泗洸等河並南陽獨山㣲山等湖之水濟運今運河一帯凡有通湖陡門及支幹各河俱已疏濬深通將來水小之年亦不慮無水接濟若遇水大之時湖口閘現止一孔寛僅二丈實慮不足宣洩自應欽遵諭㫖建設滚壩誠為得宜臣等相度地勢擬於湖口閘迤北六丈之上添建滚水石壩一座口門酌寛三十丈洩水入河形勢甚為順利其壩脊亦照湖口閘金門水深一丈二尺五寸為度水大則漫壩宣洩水小則収蓄濟運庻水有節制於運道民田均収實益俟奉到諭㫖臣張師載臣阿爾泰當即欽遵核估撥􅍁儧辦奏入得㫖如所議行欽定南巡盛典卷四十一
