body:
  text: 河防乾隆二十三年正月初一日夢麟尹繼善白鍾山嵇璜陳宏謀奏言竊惟淮揚徐海等屬大興水利應修滙湖通江歸海之幹支各河儧辦完竣現今另摺恭奏外臣等於周歷各屬查催工程之便復留心遍加察勘博採輿情各州縣已辦幹支各河而外尚有宣泄民田積水通支逹幹之河渠併有逼近湖蕩支分派别之汊港秋間查勘之際祗因盈潦占蓋髙下難分一時未能併勘入奏今當冬深水落各處情形皆已畢現內有水道貫通儘堪宣導者固可毋庸疏濬其􅌎墊阻礙之處若不併為經理則上下脈絡猶未貫通臣等公同籌酌必須及時修治層層導引處處通連務使一律條暢庶為全體周備隨經督同道府選帶熟練人員復加相度悉心履勘如碭山縣境內之華家溝河碭山蕭縣二境之周家莊河年久遊墊亟應續辦又碭山蕭縣二境之減水河係接泄河南永城縣坡水現據永城縣詳請疏濬亦應估辦又蕭縣之龍山河小鹽河洪河銅山蕭縣境內之望州河銅山靈璧境內房村河睢寧縣之龍家河白馬河宿遷縣之縣東河南岸蔡家河李家莊民便河桃源縣之九龍潭河大成河清河縣之響水河清河安東境內之澗河山陽縣之溫山河潯河阜寧縣之被澤河曺溝河窰頭支河楊家河太平河海州之王家溝河薔薇河沭陽縣之柴米河贛榆縣之大沙河圍子河共計二十餘處或通身􅌎淺或間段阻塞均宜分段疏浚舊有閘洞量加修葺臣等仰體我皇上懷保黎元恩加無已之至意現在督同道府等員詳悉估計一靣派員領帑興挑儧辦臣等仍往來督察期於來年三月以前普律完竣統俟奉旨允準一併確估具題至田間溝洫應歸民力自辦者應查照從前臣尹繼善原奏悉心董率立定章程次第經理奏入報可乾隆二十三年正月二十二日直𨽻總督方觀承河道總督張師載山東巡撫阿爾泰奏言竊照東省運河蒙聖明指示機宜今將徒駭馬頰老黃河等處相度歸海之路經臣方觀承會同前任山東撫臣鶴年酌籌疏濬事宜恭摺具奏並聲請俟水勢消退之後再行覆勘分别工程難易或勸用民力或動帑興修妥協辦理等情欽奉硃批俞允續經前任山東撫臣鶴年等將運河閘壩應行落低及暫從緩辦之處奏蒙聖鑒兹臣方觀承復會同臣張師載臣阿爾泰覆加籌度除龍灣魏灣應照原奏辦理外其四女寺壩工臣等親加查驗將河身逐段探量惟壩口六十丈回流沖刷水深丈餘其上河身探至四五里外皆祗水深七尺二三寸不等是此壩底自可毋庸再行落低以致宣泄太過其壩外老黃河分屬直東兩省計長九十八里節年淤沮不能暢注今應大加挑濬合之迤北哨馬營石壩靣寬三十丈壩外減河又復通暢即遇盛漲有此兩路足資宣泄如有改易情形臣等仍隨時酌量奏明辦理務使壩靣髙不至於漲阻低不至於澀運以仰副聖主念切民依諄切訓示之至意至於徒駭馬頰老黃河應行挑挖工段臣等先經派委兩省道府大員遂假確估兹復公同酌議徒駭一河全在東省境內河身大槩深通惟葦草盤結之處甚多挂淤阻水亟需刨除直𨽻南皮縣屬老黃河內亦有之通計長二萬三千餘丈若按蘆根方定例給價費帑不下數萬兩查蘆根可作柴薪今令沿河州縣勸諭附近村民刨挖任其取携期於淨盡據各州縣皆稱為民所樂從又各河身內間假淤淺及土埂流沙易於為力之處兩省均可勸用民力毋庸議請動帑外其餘各工如東省馬頰河頭十八里上承四道引河之水不能容納亟應挑濬寬深於兩岸各展寬一丈河身加深四五尺又通河及河尾入海窄狹之處共二十段長三千六百九十餘丈應於兩岸各展寬一丈以暢尾閭又老黃河分減哨馬營四女寺兩壩之水盤折直東兩省自東省四女寺壩口起至直𨽻吳橋縣交界止計引河長十二里老黃河長四十六里均應挑靣寬四丈底寬二丈深四五尺不等即以所挑之土培築堤堰又四女寺滚壩雁翅石墻坍塌應行拆修又德州三十里鋪大橋橫亘於髙埂之上應照原奏落低又哨馬營壩外引河並歸入老黃河河頭處所淤淺均應挑濬直𨽻自吳橋縣交界之嚴家莊至玉泉莊老黃河長四十餘里應如東省一律加挑靣寬四丈底寬二丈深三尺至六七尺不等又南皮縣境內馮家口淤灘長四十丈應挑抽河槽一道底靣拆寬二丈深三尺又自霍家圈起至姚家口並下遊一帶水勢散漫已無河身計共應挑二千一百餘丈而寬八丈底寬四丈深三四尺不等並將各支流堵築使水勢直趨以收用水攻沙之益以上工程均非民力所能充役應動項雇用夫工辦理每土一方照例給銀七分計東省馬頰河展寬挑深土工約估需銀二千九百九十餘兩四女寺滚壩石塘雁翅德州橋座哨馬營引河等工約估需銀一千二百九十一兩自四女寺壩口至吳橋縣界老黃河土工約估需銀五千一百三十二兩共約需銀九千四百餘兩直𨽻境內老黃河土工約估需銀六千八百餘兩再各河身內橋座共三十二處有應照原議於攔河土埂添建橋空酌用荆葦鑲裹以暢水道者有應行展寬以便行旅者均可勸用民力毋庸動帑致多糜費如此籌辦則運河減泄之水皆得由壩口分導入海而黃河馬頰徒駭三河以南又張秋八里廟滚壩及三空五空橋泄水入大清河歸海即遇盛漲之年當不致泛溢而減河俱已一律深通亦無漫及民田之慮矣時值春融於氷泮後水漸消涸臣等即督率委員並地方官開工儧辦速竣仍責成道府大員往來巡查務使工歸實用仍於工竣之後另議善後事宜俾垂永久再查海豐境內佯沽橋有王家堰一道原議拆毁分流今覆勘形勢西髙東下現議將洋沽橋止疏濬深通尾閭已暢毋庸再拆民堰合併陳明除分飭造具估册送部並直𨽻工需即即於天津道要工項下動用分别支銷歸欵奏入得旨如所議實力為之乾隆二十三年二月初二日裘曰修張師載阿爾泰奏言竊臣裘曰修等於上年九月奏辦兖沂曺各府水利一摺奉硃批覽奏俱悉朕正慮及沂州府屬每被水災摺內有疏通駱馬湖之語宜速行妥協相度欽此臣等查駱馬湖下遊已增入下江水道工程案內辦理外所有沂屬被災處所應行疏濬之處先經前撫臣鶴年及臣等先後飭委升任兖沂曺道徐鐸護理兖沂曺道唐倚衡詳細確查兹據該道等逐一勘丈繪圖議覆臣等查沂屬蘭郯二縣地處最窪西南尤甚平常雨水之年鄰境方稱霑足該處即多被淹乂因沂河上承臨朐沂水諸山河之水兼有汶祊涑及桞青等河合流下注每遇水發盈堤拍岸泛溢河西之武河燕子芙蓉等河以至各河不能容納瀰漫坡田甚為民患乾隆十三年經原任大學士髙斌等奏請動帑修築沂河西岸長堤更慮水勢異漲正河不能容納又於沂河兩岸之江風口建砌迎水滚水各壩藉以分水泄入武河自建壩以後沂河異漲稍除歷今十載迎水壩石盡被沙埋滚水石壩刷坍已甚其由壩口泄入武河之支河二十餘里亦俱淤墊武河正流間有沙淤不能下注臣等查勘情形係急應修濬之工今會同酌議應將江風口碎石滚水壩連金門修整一百八十丈該壩東西兩頭舊有沖刷河形俱應填平并於壩側築堤一百八十丈其壩外支河二十二里零及武河沙淤處所應一併挑挖寬深工程極為緊要又江風口壩外有陷泥河一道武河之西有燕子河一道南流六十餘里由邳州歸武河入運又西有芙蓉河一道南流八十餘里由邳州歸運以上三河乾隆十三年奏準請修江風口建壩之後再勘水勢情形相機辦理今查勘河身淤淺不能暢流應將狹窄淤塞處所假閛挖寬深臣等酌量工程難易將多須動帑之工撙節估計仰懇天恩將挑挖江風口壩外支河等工照河工土方成例每方給銀八分一釐其陷泥燕子芙蓉三河工假綿長通塞相間民力易辦應請照以工代賑之例酌給食米錢文令蘭郯二縣賑後災黎就工謀食通計修壩挑河築堤約需銀二萬五千餘兩其餘蘭郯境內一切河道現俱通暢即支河小港間有淤淺之處應於農隙之時勸用民力一律修治毋庸動帑至下遊與江南邳州接壤之處查下江工程案內已經列入現在仍一面知會務期上下通流兩無岐誤如此籌辦是沂河入駱馬湖之正支既經濬治又有江風口滚壩以分其流而西岸緊要各河又復疏通民田坡水各有去路實與蘭郯二縣水利有益奏入得旨如議速行乾隆二十三年二月初十日尹繼善白鍾山嵇璜髙晉奏言竊查上江河南興舉水利各河滙注下遊則髙寶邵伯諸湖受水更多誠如聖訓亟宜廣求去路以為宣導之計惟是湖河水勢歸海逺而歸江近歸海紆回而歸江順便江都所屬之芒稻閘壩實湖河諸水歸江第一尾閭若使長年啓放俾諸湖積水暢泄歸江於冬春水落時早為騰空以備伏秋容納之地則髙郵南關車邏二壩自然過水無多而下河各州縣可免淹漫之虞此實拯治下河之要鍵無如芒稻一河乃淮南鹽艘必由之路當河工急需泄水之時正鹽艘盛行趲掣之候若將芒稻閘版徹底啓放則溜勢湍急鹽船難以挽縴竊恐有礙鹽運若因此全行堵閉則湖河水無去路必致壅積為災伏惟江南諸省水患頻仍仰蒙我皇上軫念民瘼指示機宜大興水利現在上下支幹各河均已逐一閛挑節節疏導而芒稻河為歸江喫緊尾閭更宜亟為講求妥協方與全局有禆臣尹繼善臣嵇璜會同臣髙晉前往查勘芒稻河自西北直趨東南而灣頭河則自西南至東北橫亘其間所有運河東岸之金灣東灣鳯凰壁虎灣頭等閘壩減泄之水皆直趨芒稻閘及董家溝石羊溝廖家溝各滚壩歸江鹽船素由灣頭河行走必須閘門下板各壩堵閉方資浮送所以芒稻閘壩不能啓放合宜臣等再四籌畫查芒稻閘迤東現有舊越河一道應令鹽船由越河直走金灣北閘不繞芒稻閘出灣頭則泄水運鹽分為兩途芒稻閘可以長年啓放董家溝石羊溝廖家溝皆可不必封閉庶使湖河之水暢泄歸江實於水利有益第查越河長六百餘丈臣等測量水勢甚覺淤淺應再挑深五六尺一律深通以利遄行又查金灣北閘閘底尚髙改低二尺四寸以便鹽船挽運如遇水勢過小之年再行相機辦理如此則歸江尾閭無所壅遏諸湖積水得以遞相灌輸不致滙積為患矣臣等一靣飭令鹽運使盧見曾淮揚道何煟等確估委員辦理勒限二月內完工奏入報聞乾隆二十三年三月十二日嵇璜裘曰修夢麟尹繼善白鍾山奏言竊臣等接準廷寄升任撫臣陳宏謀敬陳河工未盡事宜一摺欽奉硃批此奏著交裘曰修夢麟會同尹繼善等詳議速奏欽此查江省淮揚徐海鳯頴泗等屬瀕臨湖河疊罹水患蒙我皇上誠殷懷保念切痌瘝上年鑾輅南巡指示機宜特命臣等多方疏導不惜千萬帑金為億兆黎元籌久逺安全之計仁恩普被利賴無窮臣等恪遵聖訓黽勉辦理現在興舉各工將次告成凡將來善後事宜無不仰體宸衷加意講求期於地方生民永逺有益今據陳宏謀具奏各條多係臣等公同籌畫曾經靣啇者因一時工程尚未完竣是以未經會奏兹欽遵諭旨悉心詳籌再三討論謹就臣等所見逐條分晰議奏伏祈睿鑒一陳宏謀奏稱此次所挑之河已節節閛通又復酌加寬深可期永資宣泄然必須年年挑浚方免日久淤塞淺阻請將所挑各河近黃運河者歸於河員經管隔逺無河員者令州縣及該地方同知佐二經管分清界限每年秋後水落會同查勘有淤淺者會同州縣分清假落酌派附近有田地民人合力挑濬年底將某河已經挑浚某河不須挑浚造册報院院再委道府大員於春間覆勘結報有應挑浚而不挑浚者將經管各官揭參此等年年挑浚之費照例田主給食佃户出力果有大假阻塞及工大費重者詳明估計題明動帑辦理堤閘損壞改建另築者照此一律分别辦理等語查江南為衆水滙歸之地必須河道寬深庶足以資宣泄此番大工興舉雖已處處疏通然不能保其日久不仍􅌎淺應照陳宏謀所奏再加妥酌將所挑各河關係黃運宣泄者歸於河員經管關係民間水利者令州縣及該地方佐二經管分清界限於每嵗秋冬水落之時詳加查勘造册通報有些微􅌎塞者即酌派附近有田民人照業食佃力之例自行挑濬總責成該管道府遍厯嵇查報明督撫督率妥辦如有應挑浚而不挑浚者將該管各員參處其有工大費重不能槩用民力及堤閘損壞改建另築者詳請估題動帑辦理如此則逐年挑浚既不至日久淤塞大費帑金而官民皆有責成庶使遵循罔懈至如何分清界限責令經管之處現行各司道妥議統俟工程全竣即行具題以定章程一據陳宏謀奏稱地方廣濶新挑之河止能泄近河之水其不及泄之水尚多請俟今年河水通流之後督令民間自行閛浚支河小溝以逹於所閛之幹河小民見水有去路自必樂從再各處道路之旁原有小溝不甚通暢應於秋冬督率民人將境內路旁之溝挑深使之通逹即以所挑之土平墊道路路漸髙而溝漸深平地之水由道旁之溝以歸幹河田禾免淹行人稱便查各州縣地方廣濶現在所挑之河雖上下江通身合算已有一百餘道其平疇曠野離河稍逺不及泄水之地尚多應令民間自行陸續閛挖小溝層層導引由支逹幹則雨水易消自可無虞壅積至各處道路之旁舊有小溝未免淤淺應於每嵗秋冬督率附近民人挑浚即以所挑之土平墊道路路漸髙而溝漸深兩旁附近之水俱可引入溝中滙流歸河既有益於民田亦甚便於行旅應如陳宏謀所奏辦理一據陳宏謀奏稱淮徐海等境內地土非盡瘠薄可以種植之地一望無際祗因河流未通一遇天雨是處瀰漫今幸河流疏通水有去路尚宜各閛溝洫以備旱潦即以閛溝之土加築墟圍妥砌㴠洞隨時蓄泄以成墟田乾隆九年督臣尹繼善酌定墟圍溝洫條規奏請舉行彼時揚州之髙寶等州縣淮安之山陽等縣所築墟田至今皆成膏腴已有成效因河流未盡通暢雖築墟圍水無去路仍被淹漫遂爾不肯多築墟圍今河水通流泄水比前大暢現在仍照尹繼善原奏閛溝築墟次第經理惟是此等地方連災之後民力拮據貧富不一難於合力築墟請自今年秋冬為始地方官相度地勢勸民築墟開溝有無力者仍照乾隆十一年河臣髙斌等奏準借給䬶兩助其飯食築成之後所借工本分三年還官查田間水道蓄泄攸資必須加意講求庶幾旱潦有備如濵河窪地向屬水田則以閛溝之土加築墟圍使墟內之水可以車放即遇外河盛漲不致漫淹如係旱田只應多閛溝洫不必槩築墟圍總期因地制宜經理妥協臣尹繼善於前任兩江時曾經奏明定有章程飭令淮揚等屬遵照現據淮安府詳議將溝洫墟圍規制一併核定通行淮揚徐海所屬實力遵辦即於今歲秋冬勸民閛築其舊日墟圍有遭水坍廢者並令及時修補惟災地民力艱難不能一概自備工本應查明實在無力者準計每土一方酌借銀二分以資飯食畚􅓩之費在於藩庫公項內動辦均作三年繳還歸欵在百姓亦屬樂從而於農田大有禆益苐恐州縣不能實力奉行應令將每嵗閛溝若干築墟若干於春間造册報明督撫委道府大員逐段查驗按其功過分别勸懲一據陳宏謀奏稱各河閛通之後上遊之水由髙而下可以遞層宣泄內有地處窪下平日原係湖蕩止能受水不能通流今雖閛河節節相通若與去路地勢相平或更有仰盂倒漾之勢此必不能免於淹漫者非河流之不順實由外水髙於內河形如釡底地勢使然非人力所可強也請俟今年水過之後看其水勢宣泄如何果有必不能於於淹漫者將此等田地勘明頃畝減除糧賦有可種植葦草者改照蘆課輸納名曰棄地與水而仍為近水居民資生之計如水深不能種葦者另為設法安頓俾民免於失業再此等低窪之地現已閛有小河一遇水落河仍通流倘得消涸稍早仍可種植春麥每年得收一麥亦可資生仍不致全棄查地勢各有髙低水性總歸就下凡屬極窪地畝形如釜底之處實在止能受水難以槩令成田似不若讓地與水以為容納之區應如陳宏謀所奏俟今年水過之後察看水勢情形如有地勢極窪或原係湖蕩必不能免於淹漫者勘明頃畝減除糧賦聼民間種植葦草採取資生改照蘆課輸納惟蘆葦叢根盤結最易積􅌎凡有水勢通流之處不宜種葦者仍須禁止應令各隨地勢改種菱芡之屬亦可稍資利益更不許築埂設籪阻礙水路至如實有不能種植之處歷來並無出産即遇水小天旱之年亦屬一片汪洋實與水沉田地無異似應據實詳題豁免錢糧如偶爾被水並非常年成災或水勢消落尚可種植處所不得一槩豁免所有原奏另為設法安頓之處應毋庸議一據陳宏謀奏稱黃河北岸自李家莊起至徐城之蘇家山計九十里向無堤岸逮後接築二十里尚有七十里未曾築堤乾隆二十年孫家集漫口其渾水直趨微山等湖及荆山橋河淤成平地年來湖水不能宣泄銅山沛縣俱受淹漫其患皆由於此上年仰蒙聖明洞鑒特命侍郎夢麟等竭力閛浚湖口之茶城小梁山荆山橋等河湖水得以暢流田地方始涸出自此以後黃水決不可再令東漫則黃河北岸不可再任無堤利害已明臣恭聞此堤欽奉上諭另行辦理今各河均已疏濬又徐城南岸已築石堤石堤之對岸有子房獅子等山為岸徐城可以無虞此七十里之河岸亟宜築堤以結通河全局查黃河自河南榮澤縣以下河道俱寬至四五百丈逮至徐州河道止有七十餘丈即徐州以下河身亦俱窄狹城郭田廬在在受險是以向來留此無堤之處聼其漫灘俾平槽之水悉走中泓則河底日漸刷深可以順流歸海但北岸漫灘之水易於沖刷溝槽若不每年收拾恐漸致奪溜成河為患匪細上年曾奉諭旨另行籌辦臣等前後至徐詳加察看上年花莊所築之亂石壩已有間被沙淤者應請照臣等前奏量為加築所有溝槽俱補築亂石壩以資捍衛其餘地靣槩行接築之壩與舊有之民堰土壩一律相聨至地勢後窪段落加築裏壩一道如格堤之式俱謹遵訓示務期堅實穩固使尋常漫灘之水至此即可停淤設遇水勢過大之年亦止壩上些微過水不得北趨成流而下遊各工俱不致受險似此年年查勘料理漫灘之淤沙停積河岸日髙而上下湖河均有禆益矣一據陳宏謀奏稱下河一帶民田以范公堤為捍衛此堤日久坍損單薄殊甚愚民於水漲時希冀水由外泄輒挖破此堤泄水隨後雖經補築不過取堤根之土虛鬆填滿又無夯硪現在缺口甚多堤身不過數尺倘遇海潮盛漲髙寶鹽城各縣必受潮災此堤於目下似無關係而實經久捍衛不可廢棄之要工伏乞皇上敕諭鹽臣勘明估計動項派員分假分年如式修築務期髙寬堅築通體完固永資捍衛至於內地水漲勢須穿堤外泄業已層層建閘以時啓閉其鹽城迤北可以泄水歸海較順者河臣與督臣現在閛挖引河添建石閘臣亦就所見札啇自此以後永禁挖堤放水其如何責成閘官分管保護亦聼河臣鹽臣啇辦查范公堤原為下河一帶保障凡有坍損殘缺之處自應補修堅築以禦海潮臣等現與鹽臣髙恆會啇酌議委員勘估具題動項辦理務使通體完固永資捍禦至鹽城天妃石䃮白駒等閘現在上緊趕修各閘下引河俱經挑浚是遇水漲之時儘可由現在閘河宣泄歸海此外無庸另添閘座至盜挖堤工原應禁止應如陳宏謀所奏嗣後永禁挖堤放水仍責成各閘官分管巡查加謹防護並令東臺同知及各地方官實力稽查以保堤工一據陳宏謀奏稱泰興如臯境內有窑子河老龍河龍遊河年久􅌎塞淺阻從前地方官久請挑浚因派民修無力而止應請自如臯窑子河起接泰興之老龍河又開龍遊河直逹於江則雨水有所宣泄遇旱可資灌溉查如泰二邑境內之龍遊窑子老龍等河前據該處民人呈請挑挖經臣等委署常鎮道蘇凌阿江防同知王培宗帶同兩縣逐一履勘查得龍遊河在如臯縣治之南紆回曲折俗稱九十九灣河口寬四五六丈不等崖髙七八九尺不等即大雨時行亦止水深四五尺兩崖甚髙水勢長發即暢泄入江甚為便捷田畝不虞水漫至窑子河在如臯縣治之西自西門城濠起至泰興縣界止迤下即老龍河屬泰興縣境內河形俱寬三四五丈不等崖髙七八九尺不等即伏秋大雨亦止水深三四五尺從未淹及民田不致水虞為患稟覆臣等覆查龍遊窑子老龍等河兩崖髙亢地非低窪無虞淹漫且河靣俱髙於江面數尺內髙外下宣泄甚易毋庸興挑即使動帑挑深而引江水內灌誠恐一日兩潮旋即淤墊徒費無益此條應毋庸議以上七條臣等逐一酌議意見均屬相同理合恭摺覆奏是否有當伏乞皇上訓示遵行再上下兩江水利事同一體如蒙恩準其中有應行上江照辦者俟命下之日並移咨安省撫臣遵照辦理再準工部咨議覆御史吳鵬南條奏宜興水土之政一案今臣會同經畫或疏通渠港或修理堰坡凡於農田水利有益之處一體確勘造册送部至地方承辦之員作何定其殿最務使激勸有方及本鄉紳士慕義急公情願捐資勷事者作何奬勵一併妥議到日再行議覆查淮揚徐海鳯潁泗等屬應行疏通河道挑浚溝渠以及修築墟圍等項臣等現於酌議陳宏謀條奏案內詳晰陳明令地方官於秋冬水落之時勘明督率民人業食佃力分别查辦應俟地方官勘明之後統歸彼案造册送部毋庸重復再議至地方承辦之員如果實心愛民處處料理妥協著有成效者應請題明議敘仍照該御史所奏嗣後保舉知府及卓異案內概行注明倘有漫不經心不行籌辦並無實效者即隨時查明參處以昭勸懲其本鄉紳士除應行業食佃力自辦工假之外如有慕義急公情願捐資勷事者應請照樂善好施之例數在三百兩以上者題請分别議敘如在三百兩以下按其捐數多寡由督撫司道府州縣分别給匾奬勵合併陳明奏入上諭曰議中黃河北岸築堤一事俟遲數年再看餘如所議行乾隆二十三年五月二十五日劉統勳裘曰修尹繼善白鍾山奏言乾隆二十三年四月三十日奉上諭據巡漕給事中海明奏稱東省水患由微山湖之漲溢而微山湖之漲溢由黃河北岸之內灌請於微山湖之南圈築攔黃堤工即以取土方塘挑成順堤河形導入荆山橋出貓兒窩入運並於內華山西建築通湖閘座以備宣泄等語具見悉心籌畫黃河由豫入徐兩岸夾束河身甚狹不潰決為銅山諸邑害則漫衍而入於金鄉魚臺今徐城已增築石工足資捍禦而山東之濵湖州縣民舍田廬不免仍成巨浸孰非吾赤子而忍坐視果便民生永獲安全即多費帑金朕所不惜且年年蠲賑所費不更無已耶但是否實有禆於東省而於徐郡兩岸亦不致另生險工或究不如於北岸無堤處所接築堤工之為得計著尚書劉統勳馳驛前往會同尹繼善白鍾山逐加閲勘詳籌妥議請旨辦理夢麟裘曰修如尚在河干著一併會同查辦欽此臣等伏查黃河北岸上年因慮漫水過多當將花莊溝槽築作碎石壩工本年春於議覆善後事宜案內又將各處土壩改填碎石並接築土堰臣等遵旨節次查勘經理無非欲使黃水有所節制而又恐束之太驟致生他險也今海明請於微山湖之南圈築攔黃堤工並挑挖順堤引河導由荆山橋入運是原為攔黃起見但攔之於微山湖邊不若攔之於黃河北岸恭讀諭旨於北岸無堤處所接築堤工之為得計聖謨廣逺洞悉機宜臣等所當欽遵辦理者也今勘得黃村壩起至大谷山止計程六十里應築土堤長一萬五百餘丈髙以六尺底寬八丈為率估需土方銀六萬餘兩其所築之堤相度地勢之髙下與河形之紆直總以離河十里內外為度庶地靣寬濶得以平衍容納不致沖擊堤工其自大谷山至蘇家山計程二里許逼近河身恐生他險且兩山夾峙地勢髙亢原可無庸築堤查舊有石壩基趾應行修整俾平常之水不致上灘縱遇異漲之時漫壩而過亦止由荆山橋迤下歸運該處相距微山湖四十餘里且在下遊斷不致涓滴復入微山湖內如此通盤籌辦在東省既收保障之益而江省亦可無另生險工之虞矣所有議築堤工臣等現在遴委妥員發帑儹辦務期迅速如式完竣以仰副聖主愼重河防奠安民生之至意奏入得旨如所議行乾隆二十三年六月初九日吏部奏言內閣抄出安徽巡撫髙晉奏稱竊照安省鳯潁泗各屬地當徐豫下遊頻罹水患仰蒙我皇上飢溺為懷痌瘝在抱上年鑾輅重幸江南周覽形勢洞悉民隱不惜千百萬之帑金為民圖久安之至計特命臣等詳加查勘相度妥籌自集事之始逮工完之日無時不上厪聖懷無事不欽承明訓臣等竭力同心恪遵辦理現在一切工程次第告成所有善後事冝臣復再四熟啇悉心酌擬敬為我皇上陳之一奏稱請定水利兼銜以専責成也查地方農田水利凡督撫藩司知府直𨽻州並州縣正印等官均為職分應辦之事責無旁貸惟是正印官事務殷繁不無顧此失彼若將守巡各道及同知通判州同州判等官兼以水利職銜協同正印官稽查辦理實為有禆現準部議調任河南布政使劉慥陳奏水利兼銜案內行令查議今臣查得上江現修河道均在廬鳯道所轄鳯頴泗三府州地方請將廬鳯道並鳯陽府同知通判頴州府通判直𨽻泗州州同均兼水利職銜另行分别鑄給關防以重職守該道丞倅既經兼銜嗣後將所屬各州縣舊有河道並本年新修各河及堤堰橋閘即責成各該員協同地方官平時加意經理一至冬令水涸各於境內逐加查勘如有􅌎淺阻塞汕刷殘缺處所一靣報明道府一靣勸諭附近有業村民公平出夫修浚補築一律寬深堅實出結呈報存案如或其中有工費浩繁民力不繼亦即據實詳請臣與督臣再加親勘酌籌請旨辦理臣等留心查察如果各該道府丞倅州縣每年實力奉行河道溝渠完整堤堰橋閘堅固則分别記功奬勵三年之內始終不怠或保知府或於計典內注明卓薦以示優奬倘有玩忽從事混行揑報或藉端擾纍一經發覺嚴參治罪以昭炯戒查水利之興關係農田凡職司民牧者均應實力籌辦但地方官印各官事務殷繁或不無顧此失彼之慮若令守巡各道及府州佐二等官分司協理則責成更専稽察愈密而蓄泄利賴可以咸收實效應如該撫所請廬鳯道鳯陽府同知通判頴州府通判直𨽻泗州州同均準其兼銜水利其鑄給關防之處應令該撫另行擬定字樣造册咨送吏部再行查辦至該道同知通判等官既經兼銜水利嗣後所屬各州縣舊有河道並現在新修各河及堤堰橋閘等工均應責令該員等協同地方官隨時加意經理至冬令水涸各於境內逐細查勘如有􅌎淺阻塞汕刷殘缺處所勸諭附近村民量力出夫修浚補築俾一律寬深堅固其或工巨費繁民力不繼者即行據實詳報該督撫酌量請旨辦理倘能實力奉行始終不懈該督撫分别奬勵以示鼓舞如有玩忽從事混行揑報或藉端擾纍即將該地方官及道廳等一併分别查參議處一奏稱濉河之宜加保護以垂永久也查宿靈虹上承豫省永夏及江蘇蕭碭清黃諸水全賴濉河宣泄嗣因濉河淤墊水分南北兩股以致泛溢為患臣尋源溯流體訪查勘既將濉河閛挖原有閘座修整以復其舊又將南北兩股因勢利導一併疏浚以分其流更於南北兩股河流滙歸濉河處所各設閘座以備啓閉平時則上下各閘啓板聼其清水分流倘遇盛漲毛城鋪漫灘水至則上下各閘必須隨時閉板俾清水各歸南北兩股本河將濉河空出以讓黃水獨行一俟黃水斷流仍將各閘啓板放入清水以資刷沙此現在辦理之形勢啓閉之機宜也夫水利河道雖與河工有間其為利害則同河工因設專員防守是以隨時相機保護水利河道工竣一交地方官便無人經管遂致有名無實今新修各河情勢既具機宜宜講若不派員分管一二年間仍歸廢棄殊非仰沭皇上永垂利賴之至意臣查宿州有州同一員州判一員靈璧縣有主簿一員請將自徐溪口起至符離集止所有河道並西流黃疃沙溝三閘應交駐劄徐溪口之州同分管其自符離集起至霸王城止一切河道並蒿溝桃溝唐溝北山河四閘應交州判分管該州判向住州南臨涣集今請於伏秋兩汛移駐時村適中之地以便往來照料冬春仍駐臨涣以資彈壓又自霸王城以逹陵子湖口並無閘座有河道四十餘里應交靈璧縣主簿分管仍將各員所管可道閘座統責成宿州知州總理其事不可因有分管之員稍為岐視但既設閘座必得閘夫以司啓閉應請每閘各設四名所需工食照例咨部支銷如此立定章程則濉河可資保護查宿州所屬濉河為宣泄清黃諸水之要道前經􅌎墊以致水分南北兩股泛溢為患現在既經該撫體察情形將濉河閛挑疏浚並將原有閘座修整以復其舊又將南北兩股因勢利導以分其流更於南北兩股河流滙歸濉河處所各設閘座以備啓閉苐不派員分管隨時相機保衛恐因循遷就一二年間仍歸廢棄今請自徐溪口起至符離集止所有河道並西流黃疃沙溝三閘交駐劄徐溪口之宿州州同分管自符離集起至霸玉城止一切河道並蒿溝桃溝唐溝北山河四閘交州判分管並請於伏秋兩汛令該州判移駐時村適中之地以便往來照料冬春仍駐臨涣以資彈壓又自霸王城以逹陵子湖口河道四十餘里交靈璧縣主簿分管俱責成宿州知州總轄其事應如所奏辦理仍令該府飭令該州不時督率逐加查察因時啓閉相幾蓄積務使永垂樂利毋得因循積習稍有岐視以至有名無實其每閘應各設閘夫四名所需工食銀兩應令該撫照例咨部支銷仍於地丁奏銷案內造報户部查核一奏稱毛城鋪應責成河員與地方官一體稽查也查濉河所以淤墊之故實因毛城鋪減泄黃水過多所致則毛城鋪實為濉河之關鍵嗣後凛遵聖訓堅閉不閛并照奏準之案將口門沖深溝槽填平上建亂石壩其口門以北之鉗口壩并口門以南之亂石壩一律修復以節水勢即責成黃河之蕭碭廳營加謹守護設遇盛漲之年漫灘之水仍不能不流入濉河應令蕭碭廳先期知會宿州俾經管各官得以預為防範如有漫灘水發蕭碭廳營不立時知照或已經知照而管閘各官啓閉失時俱嚴加參處以警玩誤務期上下關會聲氣聫絡則濉河縱有停沙亦易疏濬等語查濉河當毛城鋪之下遊上遊減泄黃水過多下遊必致沙停淤墊今凛遵聖訓毛城鋪堅閉不閛又復將口門沖深溝槽填平修築亂石霸以節水勢固已防維嚴密但水性靡常若不先事預防恐盛漲之年黃水漫溢仍不能不流入濉河日久又成􅌎墊自應責成河員協同地方官一體稽查宣泄以時方為有禆無患應如該撫所奏毛城鋪責成黃河之蕭碭廳營加謹守護設遇盛漲之年漫灘水發令該廳營臨期知會宿州俾經管各官得以預為防範如並不知照或已經知照而經管各官啓閉失時即行據實查明嚴加參處一奏稱新修水利河道堤堰閘座宜分别官辦民修以示遵守也查鳯潁泗各屬新閛並疏浚修整各河大小三十餘道長者二三百里短者亦不下數十里其間土性不一有老土淤土有淤沙有沙礓河道工成之後底岸堅實可望經久每年縱遇雨瀮水沖不無坍卸而工程亦屬有限又新築並舊有各子堰或有殘缺均請俟冬令水涸之後交兼管水利丞倅督率各地方官查明勸諭附近有業居民一律修築查報不許混行動項致滋糜費惟查宿州之洪河濉河從前原被黃水淤墊全是􅌎沙今在淤河中開挑成河土性終屬虛鬆一遇雨淋則岸土坍卸一遇風起則浮沙飛揚將來伏秋兩汛大雨時行上遊水發兩岸被水滙歸河中難免坍卸􅌎墊之患若兩岸坍卸儘可聼其寬展轉為有益而河底􅌎墊則水勢恐有阻礙必得隨時疏浚庶合機宜臣伏讀上年八月內欽奉上諭毛城鋪為濉河上遊欲濉河之無淤墊計惟有堅閉毛城鋪茍非盛漲不得閛放萬不得已如今嵗之自行漫溢即當於斷流之後將黃水淤沙盡力挑浚若稍一因循則今年􅌎一尺明年即􅌎二尺河身墊髙節節阻礙年復一年其淤更甚故逐年挑浚深通最為要務欽此臣於辦理濉河完工後體察形勢熟籌辦法仰見我皇上至聖至明無微不在聖明洞鑒之中誠至當不易永宜服膺遵守者也今濉河挑淤工費既繁民力不繼應請歸官辦理苐疏濬挑挖要在隨時估辦必得預撥銀兩收貯道庫以備急需查江寧藩庫有匣費一項原係歸入耗羡案內以為充公之用每年請撥銀三千兩解貯廬鳯道庫如遇盛漲之年毛城鋪黃水漫溢或雖無黃水漫溢而每年清水過後於冬初水涸時飭令該州將洪濉二河有無淤墊逐一查明如有應行挑浚工假具文申報道府親臨勘估一靣督州多撥人夫秉公價雇如式閛挑深通一靣通報督撫臣等委員查察再親加勘驗核實報銷所撥銀兩如有餘剩存為下年之用倘有不足如數在司庫匣費內找領如或水過未淤亦不許藉端靡費倘有揑混冒濫情弊查出嚴行參究等語查鳯潁泗各屬新閛並疏浚修整各河及新舊子堰等工雖經動項一律修整完固而每年雨淋水沖不無坍卸自宜隨時勸民修築以節錢糧應如該撫所奏如有前項些小工程於冬令水涸後交與兼管水利之員率同各該地方官查明勸諭附近有業居民自行修築不得混行動項致滋糜費至於按年疏浚洪濉二河該撫既稱工費浩繁民力不繼應準其仍歸官辦題請動項興挑所需疏浚挑挖銀兩亦應準其在於江寧藩庫匣費項下每年預撥銀三千兩解貯廬鳳道庫備用如有餘剩存為下年之用倘有不足如數在司庫匣費內找領仍令該撫將前項銀兩俟工部核明準銷之日於年底彚奏案內造報户部查核仍令於每嵗冬初水涸時飭令該州將應挑浚工假報明該府親臨確估如式閛挑深通即一靣通報該督撫等委員勘驗核實報銷總期工歸實用帑不虛糜於河道錢糧均有禆益如有過水未淤藉端糜費揑報冒濫等弊該督等速即查明嚴行參究一奏稱河道既已興修完工而民間溝洫亦應次第講求也查安省凡上承豫徐下逹洪澤湖之正河支河或加開挑或為疏浚俱經一律籌辦從此可望水勢暢流無復阻礙惟每州縣之溝洫小河多者一百餘道少亦不下數十道現在頴屬各州縣及鳯屬之鳯臺縣因正引支河已經開通而附近士民有將田湖溝洫公同自行閛挖以逹正支河者又有自修子堰建設木橋者此蓋勤力之士民不待勸諭而能踴躍從事者也至於宿靈虹並泗州厯年被災民多貧惰又因人心不齊彼此觀望者有之現準部咨議覆御史吳鵬南條奏宜修水土之政一案行令酌量查議又議督臣陳宏謀陳奏下江水利案內上江一體照辦臣參酌各議悉心體察應就安省地方酌擬章程以期立法必行竊惟謀求水利貴於因地制宜今查鳯頴二府地多平衍宜開溝洫靈虹二縣及泗州瀕臨湖河地勢低窪可築墟圍一州一縣之中應開之溝洫若干應築之墟圍若干某處應先辦理某處從後舉行備細查明分晰閛造清册由道府核實通詳立案即交兼管水利之丞倅協同地方官多方勸諭次第興舉如有本地慕義急公情願捐資勷事者請照樂善好施之例分别奬勵既不可派纍滋擾更不可因循怠忽務期士民踴躍從事庶可行之無弊仍令年終各將辦過溝洫墟圍各若干由道府勘明詳報將地方官歸入前條兼銜案內分别勸懲等語查興修水利首務固在經理幹河之大且要者其次則疏支渠築圍埂亟須加意講求因地制宜使水潦有備而沮洳之區皆可成沃壤本年正月內臣部議覆御史吳鵬南條奏內開各省督撫如有水利農田之事應行修舉者均令留心經畫酌議具奏又欽差侍郎裘曰修等議覆督臣陳宏謀條奏內閛上下兩江水利事同一體其中有應行上江照辦者並咨安省撫臣遵照辦理今據該撫奏稱安省鳯頴二府地多平衍宜閛溝洫靈虹二縣及泗州瀕臨湖河地勢低窪可築墟圍一州一縣之中應閛之溝洫若干應築之墟田若干某處應先辦理某處從後舉行備細查明分晰造册由道府核實通詳立案即交兼管水利之丞倅協同地方官多方勸諭次第興舉等語均應如所奏行令該撫飭令各該地方等官多方勸諭次第興舉年終將辦過溝洫墟圍各若干之處由道府勘明詳報該撫等分别勸懲報部查辦至如有本地士民慕義急公情願捐資勷事者準其照樂善好施之例令該地方官據實申報督撫按所捐銀數多寡分别辦理如數在三百兩以上者題請議敘如在三百兩以下令督撫司道州縣酌量給匾奬勵一奏稱嚴禁居民阻水之弊以免河道􅌎墊也查水勢順流而下河底通利則奔騰迅速泥沙不停一有阻遏上靣浮水雖過而河底泥沙漸積甚有關礙乃有沿河無知村民水發時或於河中竪立木樁拴繫葦箔捕取魚蝦名曰設籪又有於河水消落或用草土或用磚石築埂中流戽水取魚且為往來行人捷徑河底層層阻隔習而不察逮次年水發無人收拾以致沖蕩滿河每年如此雖有寬深河道亦必阻遏淤淺臣現飭地方官出示嚴行禁止倘再違犯枷責痛懲仍押令將阻礙處所如式修整以警愚頑併飭道府丞倅有水利之責者一體查察務期惡習盡除河無阻礙庶免淤淺倘地方官奉行不力一併參處等語查沿河村民𥪡樁設籪築埂戽水不過捕取魚蝦以謀微利原非有心阻遏河道然習而不察無人收拾積久亦易􅌎滯似應如該撫所奏飭令所屬各地方官出示嚴行禁止但東南澤國小民多傍湖河溪港而居農隙時或施罾布網或下籪安籠以收天地自然之利本難禁其取携况間遇水潦之年乏食貧民臨流採捕亦足以資糊口倘一概嚴行禁止不特有妨生計且徒閛胥役勒索之門應一併飭令地方有司及兼管水利之員親往詳加體察因時因地善為奉行凡官河大港關係蓄泄機宜如有築埂立樁實係阻礙河流者應設法嚴行查禁其餘溪灣港汊無關蓄泄處所仍聼民便毋得委之胥役兵丁藉端需索致滋擾纍恭候命下工部行文該撫並兩江總督江南總河一體欽遵辦理可也奏入報可乾隆二十三年七月初二日兩江總督尹繼善河道總督白鍾山奏言接準部文欽奉上諭尹繼善奏查勘宿桃等屬工程情形摺內有將駱馬湖尾閭啇之河臣早行閛放使湖靣騰空以待汛水之語此湖河第一緊要之務也湖雖所以瀦衆水而不為之及時宣泄則停蓄既多鮮有不致漫溢者向來治河諸臣不思逹其去路而惟恃湖堤以相捍禦及湖漲難容終致泛溢不收而逺近田廬胥受其害矣即如洪湖五壩之水由髙寶卲伯諸湖以歸江海本有建瓴之勢乃諸閘之啓閉不時引河之分泄不暢而下河諸州縣遂瀕罹水患自去春南巡時親臨指示特命嵇璜専司其事令將車邏南關二壩常行閛放又早闢歸江之路以逹其流下河田畝去秋遂獲豐收今春據嵇璜奏稱髙寶二湖湖靣寬濶務使各處引河通流無滯早為騰空湖靣逮水勢漸長即由引河分注從邵伯諸湖入運歸江俾髙寶諸湖不致驟盈等語其所經理頗能恪遵朕訓適合機宜在該河督等職司疏浚於其中源委亦所深悉然非朕之諄切指畫則誰肯為此耶今駱馬湖之水由六塘河下泄而東流入海其河之兩岸則宿桃安清海沭六州縣田廬在焉伏秋大汛民生攸繫若使湖靣早為騰空則汛水之來有所容納盈科後進源源下注湖水無泛漲之虞而六塘兩岸亦斷不至潰決四出矣豈惟此六州縣之利其瀕湖一帶運道民生亦咸奏安瀾之慶尹繼善既已啇之河臣早為開放尾閭以為預騰湖靣之計應如所奏速行此後每嵗大汛之前應行閛放時著該總河會同該督先期奏聞以免因循觀望并將此旨勒石湖濵俾後之司河務者永逺遵守焉欽此仰見我皇上睿謀廣運指示精詳實已無處不周無微不到臣等仰體聖心詳加籌畫竊查駱馬一湖上承東省蒙沂諸山之水奔騰滙注由六塘河東流入海原期使其暢泄不致壅滯方為得宜舊例將湖之尾閭冬間堵閉俟春間糧船過完始行閛放原為蓄水以濟漕運也但歷年以來偶值運河水小尚少資其接濟而水勢充餘之時較多糧船轉運竟無藉於湖水每年尾閭堵閉之後湖水停蓄不能預先騰空及至水發之時前者未去後者又來一時宣泄不及以致漫延為害職是故也臣等與各道再四啇酌似應因時變通將冬間堵閉尾閭之制竟行停止使湖水源源下注將湖面早為騰空縱遇夏秋水發有地可以容納隨長隨消六塘河堤埝亦可無沖潰之虞如遇秋冬水小之年必須堵閉蓄水以備來春濟運再行奏明酌辦如此不但每年啓閉錢糧可以節省而蓄泄得宜庶於數州縣民田更有禆益奏入上諭曰如所議行該部知之乾隆二十三年七月初四日兩江總督尹繼善河道總督張師載山東巡撫阿爾泰奏言乾隆二十三年六月初六日準廷寄乾隆二十三年六月初三日奉上諭據裘曰修等奏被水地畝已多涸出所有從前奏請於湖口閘上添建閘座之處應行停止等語從前尹繼善以運河水漲亟應疏濬是以奏請於該處添建閘座以資宣泄今復奏請停止其意蓋以積水已消若添建出水閘轉恐於蓄水濟運之法有礙此未免過計現在積水雖退而運河量不慮無水接濟該處閘座雖不必添建或酌量運河蓄水尺寸將閘口迤上之堤留為滚水壩俾蓄泄俱有所資殊更為有益著傳諭尹繼善等即妥協查勘辦理再摺內有安山湖已成平陸之語此湖既成平陸民間自必耕種現在曾否已經升科著一併傳諭該督等查明具奏欽此臣等跪讀之下仰見我皇上睿慮周祥籌畫盡善至意除安山湖升科緣由臣張師載臣阿爾泰另行覆奏外遵即知會先後齊至韓莊悉心查勘伏查湖口閘水勢往年以金門水深一丈二尺五寸即須閉板收蓄今探量水深一丈三尺五寸較往年尚多一尺現在宣泄查東省運河自濟寧以北有汶府等河並蜀山馬踏諸湖之水濟運濟寧以南又有泗洸等河並南陽獨山微山等湖之水濟運今運河一帶凡有通湖陡門及支幹各河俱已疏濬深通將來水小之年亦不慮無水接濟若遇水大之時湖口閘現止一孔寬僅二丈實慮不足宣泄自應欽遵諭旨建設滚壩誠為得宜臣等相度地勢擬於湖口閘迤北六丈之上添建滚水石壩一座口門酌寬三十丈泄水入河形勢甚為順利其壩脊亦照湖口閘金門水深一丈二尺五寸為度水大則漫壩宣泄水小則收蓄濟運庶水有節制於運道民田均收實益俟奉到諭旨臣張師載臣阿爾泰當即欽遵核估撥􅍁儧辦奏入得旨如所議行欽定南巡盛典卷四十一
