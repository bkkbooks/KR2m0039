body:
  text: 河防乾隆二十二年二月初六日傅恆等奏言遵㫖將南河河務一事與尹繼善嵇璜等公同酌議現在毛城鋪業經奉㫖堵閉將來黃流順軌直赴下游河身自可漸就疏刷但徐州南北兩岸當上游之首衝北岸孫家集現已築有草壩其汕刷支河務須查勘填築而南岸隄工更宜迅為加幫以資捍禦至洪湖五壩所以宣泄湖水其智信二􅄵曽經奉有諭㫖非遇盛漲不得遽開但五􅄵過水既多而下游承受僅髙郵之車邏等三􅄵未免來多去少應於昭關地方復設渷􅄵滚􅄵之下開一支河更將南關舊􅄵改建滚水石􅄵其規制便與髙堰五壩相應再歸江諸河業於上年開挑現在疏通而范公隄諸閘之下入海河道應否設立閘座應請一併交與臣嵇璜㑹同白鍾山逐一相度情形請㫖遵行奏入上諭曰知道了著嵇璜明日就去乾隆二十二年二月二十七日白鍾山嵇璜奏言竊臣同河東河臣張師載將銅沛㕔屬黃河一帶應築應堵應疏各工親往逐一查看偹細繕摺具奏恭請聖訓辦理臣於本月十三日回至徐州工次適副總河臣嵇璜來徐奉㫖河南工務一摺令臣閲看㑹同覆奏臣跪聆天語洞悉全河機宜無微不燭實為萬世治河不易之良規竊查洪澤湖五壩共寬三百二十餘丈髙郵車邏等三􅄵僅寬不滿二百丈誠如聖訓來多去少難免壅遏之患自應上下相應方無偏枯之虞今軍機大臣等所議於昭關􅄵地方復設滚􅄵開一支河更將南關舊􅄵改建滚水石􅄵其規制與髙堰五壩相應計其來源籌其去路實屬量入為出之道深合機宜至范公隄諸閘之下入海河道應否設立閘座并令同臣逐一相度情形妥協籌畫請㫖遵行敢不凛遵悉心籌辦仰體聖主厪念河防之至意但臣離南河日久恐水勢河道情形較前不同未敢懸揣忘議容臣將黃河上游各工辦有就緒星即馳赴下游一帶細加查勘務期籌酌萬妥恭奏請㫖遵行抑臣更有請者髙寶諸湖上承洪澤湖並天長六合之水滙歸於運河由運河諸壩分趨下注江海向來臨湖西岸設有出水港口二三十座導水入運由港口東趨以資宣泄最為緊要若俟伏秋大汛洪澤湖水甚漲之時始行開放則五壩齊趨髙寶諸湖勢不能容納往往洶湧奔注盈堤溢岸穿運而東無怪乎興鹽髙寶窪下之處不能容受即地勢少髙之所亦難免淹漫之虞與其蓄之於平時使湖河之水盈滿莫若預為籌畫陸續宣泄庶免驟漲之水一時并注為害臣前任南河時曽經奏明於桃汛時視湖河水勢細察情形如河水足資濟運毋庸蓄水即先將西岸瀉髙寶湖水之港口預為酌量開放俾湖水日逐宣泄其勢自減而湖靣騰出以待洪湖盛漲五􅄵減下之水亦可容納湖河之水循序滙歸江海不但下河地方不致受淹且藉此循序下注之水可以插秧種稻較之壅滯偏髙陡然開放一時驟漲迥不相同仰䝉聖允今可否仍照前例預將出水港口先為開放以資陸續宣泄之處伏乞皇上訓示遵行奏入上諭曰允行照辦乾隆二十二年五月初三日夢麟德爾敏尹繼善白鍾山嵇璜奏言竊照江南黃河至徐州漸窄逼近城垣北岸蘇家山一帶又復緊束大溜形勢甚險仰䝉皇上軫念民瘼親臨閲視指授方略以近城石壩最為緊要令將從前已有者加幫以培其勢從前所無者接築以重其防不惜帑項興舉巨工仰見我皇上智炳幾先酌籌盡善從此鞏固河防永資利賴徐州紳耆士庶感激天恩歡呼動地兹臣等率同該道等凛遵皇上指示機宜逐一詳細查勘東門一帶原無石工之處自四大王廟迤東拐角樓石磯􅀈至人家頭止應接修石工三假計長一千三十丈五尺又西門外奶奶廟迤西至韓家山掃工後止應接修石工長五百三十四丈五尺共應增建石工一千五百六十五丈所需石料十一萬餘丈於就近蘇家山王家山等處採取濟用核計各項工料共約需銀二十三萬餘兩但此處河身窄狹溜勢湧急必須修建堅固始能垂之永久應請照依乾隆十八年堰盱石工之例加添汁米石灰鐵銷並甎後築打灰土方足以資捍禦又約估增添銀二萬餘兩通共約需銀二十六萬餘兩臣等已遴選幹員分投採辦尅期儧運仍多委員辨上緊查催早為預偹齊全俟九月內霜降水落之時開槽興工一舉集事其舊石工內有應需收拾粘補者亦即查一明一併估辦庶大工新舊一律整齊錢糧俱歸實用以仰副我皇上慎重河防至意奏入上諭曰好如議行乾隆二十二年六月十三日山東巡撫鶴年奏言竊臣等奉命㑹查東省兖屬積水於五月二十一日抵濟寧隨乘駕小舟遍厯被水村莊由濟寧之牛頭河金鄉之水田寺魚臺之谷停鎮沙河滕縣之戚城嶧縣之韓莊並抵沛縣之夏鎮銅山縣之欒旺村周環查視查得五屬地畝界連南陽昭陽微山等湖本屬低窪雨水過多上游曹單巨嘉等邑之水自西而來滙聚合流東則汶泗沂洸等河入運之水復泄入在西之南陽昭陽轉輪透流而總滙於微山一湖查微山湖出水之路有二一由韓莊湖口閘入運一由茶城及小梁山一帶㑹荆山橋入江南運河向來有此等處去路是以伏秋水勢雖大消落亦易自黃河北岸石林口漫溢之後茶城一河漸有沙淤逮上年孫家集黃河全溜直奔荆山橋而小梁山之河又加淤塞止有湖口一閘藉以消泄復因孫家集漫流入湖較往年更甚以致湖水益增倒漾而北兖屬等處瀕湖村莊田畝盡被淹沒兼以運河自石佛閘以下厯年汶泗等河發水亦大流沙停淤河底漸淺不能容受遂成內外相抵之勢河湖連為一片積聚難消荷䝉皇上軫念民依將孫家集來水大加堵築固已截住來源而消涸有期矣今嵗春間復䝉天恩特發帑金將小梁山至荆山橋口之舊河逐加挑挖是以髙阜地畝漸次涸出現將已涸未涸頃畝數目臣鶴年另列清單恭呈御覽但查自三月二十八日至今五月之杪湖水僅消一尺六寸不特東省積水尚多未涸即附近之江南銅沛二縣地畝亦為湖水所淹未見涸退臣等詳按情形偹訪輿論現今小梁山之河雖已開挖而荆山橋出水仍未深暢茶城一河現在築􅄵挑濬尚未竣工又聞江南中河之雙閘及駱馬湖六塘河現因重運經行亦未啓放是以湖水難消不能暢流臣查治水先須下游通利而後上游有所宣泄必俟茶城開壩流通無阻而六塘河又加疏濬駱馬湖水得以東下五州縣積潦始得遞次掣減臣等現飭地方官將各涸出之地先行寬裕借給籽種趕種雜糧其將涸未涸之地俟稍可用功亦飭酌量情形各開溝塘俾水有所歸而地亦可漸露惟一片汪洋水勢深廣之區非宣泄有路不能即行減退臣等復集父老細加講求或言利國驛西欒旺河應挑河九十里歸入江南運河或言湖口閘之南應挑挖伊河四里仍入韓莊運河或言韓莊南七八里之伊家河舊有河形應就此河挑濬入運臣等按其所說俱親詣各該處確勘情形欒旺一路山麓層疊不可開鑿湖口閘南一路相距運河止四里即便開通亦不能大有宣泄惟伊家河一路相度地勢較之他處似屬有益但茶城現在興工六塘河亦宜疏濬此兩處將來若能暢流則湖水之出荆山橋者即無阻滯而運河之出駱馬湖者又由六塘河傍泄東省積水自當漸次消涸伊家河一路即可停止毋庸多費工作現在臣鶴年一面飭委布政司㑹同運河道差諳練人員測量地勢水面尺寸詳議㑹核外俟臣裘曰修查看歸德及宿虹等處事畢仍回東省再行詳加籌計應否仍需辦理另行㑹同江南豫東督臣河臣撫臣熟商妥議具奏總之於民生地方果有禆益不敢不留心採辦亦不敢輕舉妄動為有損無益之事所有㑹同勘過積水情形謹繕摺恭奏伏祈皇上睿鍳訓示遵行又現今運河淤淺堤岸斷續之處臣等正籌議間適河臣張師載自徐州至韓莊與臣等所議意見相同據云應俟水勢消減即將斷續之堤岸淤澀之河道確估修治㑹同臣鶴年另行摺奏合併聲明奏入報聞乾隆二十二年六月二十四日江南協辦河道總督嵇璜奏言竊臣凛遵皇上諭㫖前往下河率同何煟悉心詳勘淮揚運河東堤減入下河之水自邵伯以北者皆歸海邵伯以南者皆歸江緣邵伯迤東地脉髙阜天然限制各有分途若欲使之向若歸虛必順其就下之性臣查下河歸海之路從前所建各閘丁溪小海地勢外髙不能泄水其草堰劉莊伍祐新興等場皆得地勢之宜分注鬪龍港新洋港等口歸海惟查劉莊場之大圑閘至新興場之石䃮閘相距五十五里中間並無一閘應請於伍祐場之沿窪口蔡家巷地方添建五孔石閘二座開挑上下支河引歸新洋港入海又查石䃮閘天妃越閘兩牆裹頭尾土俱已塌卸應請一併修補堅固又各閘下支河年久淤淺現在比閘底髙二三尺至四五尺不等應請勘估興挑又沿海港口現俱深通惟射陽湖灣曲太大泄水不暢竟有東西僅隔里許而南北繞一大灣至數十里者應請勘估挑通俾得徑捷歸海至於串場河以西河渠甚多其導水順而現今淤塞者如泰州之孔家涵鹽城之岡溝河皮岔河三處應需疏濬深通以資利導又髙寶運河東堤原設石閘十餘座水大則藉以泄水歸海水小則藉以灌溉民田甚為有益今查郎兒閘子嬰南閘并邵伯之三閘年久傾圮應請拆修以利啓閉以上皆下河歸海之路苐查下河州縣本係水鄉形如釡底每遇霖雨兼旬即遭淹漫若髙郵諸􅄵過水太多盈科漸進方能歸海而下河已不免泛溢查湖河水勢歸江近而歸海逺歸海紆回而歸江徑直多一分入江之路即少一分歸海之水臣查運河歸江之路芒稻閘董家溝石羊溝廖家溝四處閘􅄵共寬八十六丈邵伯以南運河東隄舊設有金灣六閘金灣滚􅄵東西灣􅄵鳯凰橋璧虎橋灣頭閘等處共寬九十餘丈上下相應用以導水入江今查東隄僅金灣六閘并灣頭閘過水通計七閘口門止寬十二丈八尺尚不如芒稻東西二閘之寬鳯凰橋正南木橋過水甚為微細東西灣􅄵面本髙金灣滚􅄵淤土久積以致運河之水不能及時宣泄臣於五月內奏明動支帑銀一千兩將金灣滚壩並鳯凰壁虎二橋抽挖溝槽不過暫為宣泄之計應請俟霜降後將金灣滚􅄵刨低一尺東灣􅄵改低二尺五寸鳯凰壁虎二木橋下淤灘一并挖深比運河底髙七尺為凖再西灣􅄵形勢不順毋庸挑挖應請將東灣􅄵添寬十二丈壁虎北木橋之上另開河頭十二丈添建木橋一座滙入壁虎橋引河內以資宣泄又金灣閘底尚髙應將北閘底改低一尺查上年已經兩淮運使㑹同淮揚道估有成數應請照案辦理東灣鳯凰壁虎等橋􅄵外支河應請照所改􅄵眷一律挑深方得湍流無滯又邵伯西岸諸港口為湖水遞入運河之咽喉內有蔡花港奶奶廟港陳家港紅橋港久經淤塞臣於五月間奏明疏濬已經完竣惟查邵伯諸湖遞注之引河多有淺阻不通平時不能暢流每致停蓄積水盈滿湖中應請將黃子湖通連朱家湖之湯家絆引河改向西南疏濬寬深再朱家湖通連董家湖之王家莊地方開挑新引河一道引水直注董家湖以逹孔家橋形勢灣曲應請於東首另挑引河入尤家窪下接挑新河一道由蕪城墩後引入越河再將越河加挑寬深節節引導諸湖積水湍流入運由鳯凰壁虎二橋出廖家溝等壩歸江又查運河寶應之竹絡􅄵外灘漸髙難資宣泄應請於竹絡􅄵之南三里溝地方建設滚水石􅄵一座庶山寶水勢可以平緩以上皆湖河歸江之路至查宣泄機宜惟在冬春初夏若六月以後江面既髙潮汐又大雖盡開閘􅄵而泄減無多且山盱五􅄵寬三百三十丈又益以蔣家壩十八丈而歸江閘􅄵止八十餘丈來水幾五倍於去水必須長年開放寸寸泄減俾髙寶諸湖預留過水之地斯不致壅滯為患但查芒稻閘河乃兩淮鹽艘必由之路若下板堵􅄵以濟鹽運則河工坐悮機宜若全開閘􅄵以利湖河則鹽船恐致淺阻期於兩不相妨庶可行之久逺臣悉心咨訪或稱另開運鹽河道或稱於人字河築􅄵建閘二說皆不可行臣查灣頭至丁堰之運鹽河道現在深淺不一竟有淺至尺許者所以芒稻閘一經啓板即虞淺阻應請將運鹽河道勘估興挑以芒稻西閘底水深五尺為度使運鹽河內長存五尺底水則鹽船可以遄行而沿河閘􅄵可以長年啓板既有利於河工亦無礙於鹽運再查下河各州縣小港支渠不可數計豈能普例興挑查康熙年間每嵗令下河居民挑濬渠港著有成效應請責成地方官於農隙之時查明田間水道有湮塞淺隘之處傳集里民按照地畝辦理佃戶出力業主給食逐年開挑挑出之土即堆成墟岸以護田疇是在有司善為督率則地方日有起色每年將所挑各河造報督撫稽考數年以後庶渠港通逹旱潦有偹至籌辦應修各工內歸江者應請列為急工歸海者應請列為緩工其歸江工程須在九十月間興工方為有益仰懇皇上敕下督河撫鹽諸臣㑹同確議如果應行興舉即速確估具題務於秋汛後刻期儧辦以收實效再各工內所需銀兩有𨽻屬水利應於江蘇藩庫內動支有𨽻屬鹽務應於兩淮運庫內動支𨽻屬河工應於河庫內動支者統俟㑹議分别辦理合并聲明臣謹繪圗貼說恭呈御覽奏入上諭恭載於前乾隆二十二年七月十六日兩江總督尹繼善奏言竊臣自省起程馳赴徐州於七月初四日接署撫印即往沛縣查勘該縣地本低窪昭陽微山諸湖接連環繞東省濟泗汶滕山水奔注滙歸向有護城堤一道以防水道近緣東省連年雨水坡河下注過多加以去年孫家集之黃流漫溢倒灌本年夏間又復隂雨連綿僅恃小梁山茶城入荆山橋尾閭宣泄來源多而去路少以致水勢不能驟消現已派委専員酌動庫項多購料物將護城工加謹修防俟水退後再行奏請動項加幫髙厚以期鞏固惟疏消積水以冀涸復地畝播種春麥為目下苐一要務查湖水去路除荆山橋外尚有湖口閘一處與韓莊閘相近雖為蓄水濟運亦係泄水尾閭向係山東河員經管該閘金門僅寬一丈數尺現在湖水較前加長濟運已嫌其過多即閘門長行開放不足以資暢泄臣現在咨商山東河撫諸臣或添設滚􅄵或添建閘座使湖水得以暢出入運庶可望其漸消又小梁山茶城之水俱由荆山橋流入運河然必運河之中無所壅滯庶水得以暢流臣查山東有沂河一道自北向南流入駱馬湖近因水大於邳州之盧口向西散漫入運河之水過多與荆山橋泄下之水相阻不能通暢似此層層阻遏皆為沛縣受病之由臣已委員前往盧口悉心相度俟可動工即行動項堵築使沂水不能入運以速湖水去路現在親往各處詳細查勘通經熟籌凡於泄水有益者另行奏請辦理所有臣酌籌沛縣疏泄事宜謹繕摺恭奏伏祈睿覽訓示再淮徐海屬等處被灾州縣雖輕重不等俱係積歉地方辦理不容稍遲臣遴委多員分路查勘并飭道府督率辦理臣於勘河之便親往稽察將極貧户口照例先行撫恤一月其應行正賑較常年早為放給以濟災黎俾無失所奏入上諭恭載於前乾隆二十二年八月初九日兩江總督尹繼善河道總督白鍾山奏言乾隆二十二年七月初二日接准廷寄欽奉上諭嵇璜奏湖河宣導機宜并應疏應修各工一摺所言頗有中要之處已有㫖交與尹繼善白鍾山等動帑辦理著再傳諭該督等於應動工時悉心經理務於下河諸水多減一分則地方早受一日之益此於下河民生關係甚巨該督等須慎重妥辦不得視為泛常草率了事所需帑項如有不敷即於鹽庫項下動支仍將辦理情形據實奏聞欽此欽遵仰見我皇上軫念下河民生以期宣泄合宜永慶奠安之至意臣等欽遵諭㫖查照嵇璜原奏歸江工程尤為緊要現在遴委幹員分段承修并委大員查催督辦於九月內即行興工尅期儧辦俟急工完竣歸海各工即行接辦臣等於動工時即親往悉心經理所需帑項照例分别動支如有不敷即於鹽庫項下支用臣等凛遵聖訓董率屬員慎重妥辦斷不敢視為泛常草率了事一面將應修各工據實確估㑹題奏入報聞同日兩江總督尹繼善奏言竊查南陽昭陽微山等湖衆流所歸水勢浩瀚宣泄之路有二一自江南小梁山茶城等處出口由荆山橋至王母山歸入運河一自山東湖口閘入運由得勝六里巨梁萬年丁廟頓莊候遷臺莊等八閘及江南之河清河定河成三閘經宿遷桃源過清河之雙閘以抵楊家莊一由草􅄵歸入黃河一由鹽河閘壩下注入海此湖河之來源去路也臣因湖口一閘過水無多應酌添滚壩使湖水得以暢出前已具摺奏明并咨商臣張師載鶴年酌辦臣又細加籌計自湖口閘以下因蓄水濟運設有各閘層層關鎖河身未免窄狹至水大時賴以宣泄者全在各閘之越河也今查自湖口閘以至黃林莊山東運河長七十餘里得勝等八閘各有越河以閘門越河并計較之正河尚不甚窄自黃林莊以至猫兒窩江南運河長八十餘里現在水面寬二十三四五丈不等河清河定河成三閘各有越河以閘門越河并計較正河窄至五六丈不等各閘層層收束原為蓄水濟運今當急籌宣泄自宜隨時變通現在㑹商河臣白鍾山將河清河定河成三閘越河委員估計再各挑寬五丈約需銀三千餘兩則湖口閘并荆山橋下去之水可以更得暢流再宿遷運河北岸有王家溝草􅄵一處現在駱馬湖水由􅄵口流入運河雖係常年舊制但此時以宣泄微山湖水為要有此王家溝之水入運橫截未免上源來水被其阻遏已商之白鍾山飭令㕔營速將王家溝機堵閉又查清河縣之雙閘原係草􅄵亦有正河越河漕船過後拆去草􅄵已寬三十二丈今又拆去四丈共寬三十六丈以逹尾閭去路目下楊家莊口門出水甚暢並有鹽河閘􅄵一股向東分流運河下游不致有所阻滯荆山橋一帶欽奉諭㫖仍須廣為疏通責成夢麟再加開濬聖明指示極為精詳臣親往荆山橋上下遍加查勘從前橋洞過水十九孔今已過水五十餘孔上下河身均屬通順再加開濬愈暢愈為有益查夢麟原奏善後事宜摺內亦稱積淤生灘之處應行疏濬挑切臣自當協同夢麟實力辦理并將茶城小梁山湖口出水處所俟水勢稍落可以煞􅄵再行疏濬深通總之湖水不消時時上厪睿慮尾閭能多宣泄一分上游即少一分灌浸臣悉心採訪百計圗維凡有關於疏泄機宜無不殫竭心力黽勉辦理以期民困稍蘇仰副我聖主愛飬元元之至意臣現在由運河各閘前往邳州查勘沂河將如何減水入運之處詳悉籌畫另行㑹商具奏并前往宿遷桃源清河沐陽海州安東一帶將應修河道親行相度外謹將籌辦運河疏泄情形繪圗貼說恭請訓示奏入上諭曰此奏頗屬盡心如所議速行仍恐疏泄不暢應再悉心講求乾隆二十二年八月十二日裘曰修髙晋奏言竊臣等奉命查勘宿靈虹積水兹臣裘曰修於七月二十日由河南入安省之宿州境經靈璧虹縣至下江宿遷縣之歸江集安河口將三州縣積水處所去來情形周遭相度臣髙晋先於六月下旬勘災時亦經逐一查過今在虹縣相晤悉心講求所勘水勢情形相同伏查宿靈虹等處所有每年被水之由緣豫省虞夏商永四邑之水畢注於宿州所恃以宣泄者惟濉河一道查濉河自徐溪口至符離集七十餘里河淤平岸河形全失自符離集至時村迤下至靈璧之霸王城一百數十里俱間段淤塞此濉河現在之情形也再查濉河因毛城鋪等處減泄之黃水纍年漫灌水過沙留積漸成淤然尚未至如今日之甚至上年毛城鋪天然閘峯山四閘陸續開放而毛城鋪至本年四月底始行堵閉黃水直流已經一載是以徐溪口一帶竟成平陸此濉河上假之在宿州者現在全行淤墊之故也濉河既淤不能容納則豫省諸水及宿州四境山水散流漫衍遂於徐溪口南北分為二股南一股自張家溝至猪羊山冲斷十五里堡驛路下至時村由唐溝歸濉河之下假入於五湖北一股自牛家樓至大山頭髙皇􅄵於時村迤下由三村歸濉河之下假亦入五湖此兩路所冲均有河形若照舊河正身挑濬現今徐溪口至符離集底岸淤平實難施工臣等公同商議濉河上假正身無庸挑挖擬即就兩旁現在冲出之河形因勢利導分一河為兩河開至符離集下仍入濉河正身俾上源散漫之水得以順軌分流其符離集下至靈璧之霸王城等處河身間假淤淺之處一律加挑深通以暢去路再霸王城下即靈璧之五湖濉河界五湖之中自難於湖中濬河且揚疃土山陵子崔家孟山等五湖原係各為一湖祗以上下頂阻水行濡滯年復一年今則五湖連為一湖矣田沉水底民多遷移臣等細勘五湖形勢聨絡其地最窪即多開溝渠亦屬無益不若捐之於水查明五湖內水沉地畝題請蠲免將五湖聼其連成一湖以為瀦蓄之道至虹縣之板橋地方各小河口則濉河之入五湖者至此復露河形東南一路趨謝家溝經古卞河入洪澤湖東北一路由烏鴉嶺經宿遷之歸仁閘下安河入洪澤湖今謝家溝雖屬深通但河頭河身俱覺淺窄應量行開寬而烏鴉嶺之下現有砂礓亦應挑挖以免阻礙至其餘支河在宿州則有彭家溝􅀈河柏山河靈璧則有斗溝拖尾河沱河虹縣則有荀家溝嶽家河等處皆須一律疏濬以暢分流之勢虹縣又有潼河一道受水極大向由林子河經歸仁閘以東之涵洞歸入安河今林子河淤塞已久亦宜舍舊圗新從潘家山南之徐家冲開通以逹董家溝歸安河入洪澤湖最為徑捷凡此皆宿靈虹三州縣積水情形就臣等所見酌擬之辦法也至烏鴉嶺董家溝安河係虹縣泗州宿遷桃源四州縣壤地相錯之境皆須㑹同辦理董家溝在宿遷境內已全行淤墊安河則界連桃源宿遷泗州三州縣亦間假淺阻金鎖鎮劉李埂田家集陡門等處上下八十里為入洪澤之咽喉尤為緊要皆須逐假開挖必此處較上游深通而後濉河一帶之水順流直下逹於洪澤施工次第當由此起現即行文下江督撫諸臣再行確勘委員詳估以便及時辦理惟是下游之下復有下游洪澤一湖以清口為出路前䝉皇上指示河臣將草􅄵拆卸以暢其流江南官民皆仰賴聖明照燭於數千里之外但每嵗皆須應期開放俾上來之水隨來隨去則來者雖多而去者能速不致壅閼於一時矣若夫濉河雖治仍為每嵗減泄黃水之路必如何始免淤墊之患此又須督河諸臣通盤籌算熟思審處期於行之無弊而有效者也除將臣等查勘情形及籌辦緣由謹遵聖訓移咨侍郎臣夢麟督臣尹繼善河臣白鍾山張師載撫臣陳宏謀鶴年胡寶瑔詳核或應㑹勘或應㑹商公同妥議請㫖遵行再查七月初八日至十七等日毛城鋪減泄黃水下注宿州一帶已涸之地復被漫淹水勢甚大難以估工現委廬鳯道寶善率同府州縣并調下江熟於工程人員來安一俟漲水消落即勘明估計造冊另繪圗貼說具奏合併陳明奏入上諭恭載於前欽定南巡盛典卷三十八
