body:
  text: 河防乾隆二十四年二月二十五日兩江總督尹繼善江南河道總督白鍾山奏言竊照揚州府屬寶應縣城居運河東岸當淮泗下遊地勢本屬低窪加以運河北來之水兜灣頂沖僅賴一線土堤為之保障每遇汛水漲發城社民生實屬危險乾隆二十二年恭逢我皇上聖駕南巡臣尹繼善面奉諭旨飭令建砌護城磚工以資捍衛今據江蘇布政使等委員確估自城北太平菴起至城南宏濟閘止創建磚工長七百八十六丈連築壩並修補尾土共需工料土方銀三萬八千二百五兩零造册詳請題估臣等復核無異恭疏具題奏入上諭部知之乾隆二十四年十月二十六日江南河道總督白鍾山等奏言竊查洪澤湖上承淮河七十二山泉之水全賴堰盱一帶堤工保障全淮蓄清敵黃最關緊要自武家墩以南至蔣家壩計長百餘里俱係磚石工程其武家墩迤北至湖口濟運壩向係土堤每遇水大之時搶修柴工搪護乾隆二十二年聖駕經臨閲視升任副總河臣嵇璜同臣尹繼善隨侍之下面奉聖訓指示應建石工並奉諭旨將來做工當先儘此石料用現在徐州石土各工併舉俟將來次第辦理欽此仰見我皇上睿謨廣運洞悉機宜慎帑重工安愈求安之至意兩年以來徐城兩岸興舉土石工程淮揚徐海各處有急辦續辦水利大工臣等欽遵聖諭俟各工告竣於今秋汛工平之後臣白鍾山親赴該處率同各道等詳加勘閲查武家墩迤北至濟運壩止計堤長一千六丈正當洪湖下遊每遇汛水長發風浪撞擊原舊土堤易於汕刷塌卸自不若改建石工以資鞏固庶可一勞永逸惟是工段綿長應需石料繁多入山採取路逺運艱甚費周章而堰盱各工所存乾隆十九年分大修石工案內餘剩石料除陸續撥用並於二十二年秋間堰盱風暴案內補修石工儘數選用無存兹復於沿湖一帶逐細搜尋弔撈計得面裡石塊四千餘丈臣等與各道細加商酌如普例建石實不敷濟用再四審度武家墩南首原係磚工擬請於該處一律建做磚工其面底蓋鋪石塊並將搜尋之石儘數估砌少辦河磚通共估需銀五萬八千餘兩既可經久抵禦且與南首磚工接連一律更得節省錢糧從此洪澤全湖大堤俾得一律鞏固永資保障實於河防大有禆益如蒙聖恩鑒允臣等即飭該管道廳逐細確估遴委妥員分段承修臣白鍾山就近率同淮揚道等不時往來實力稽查勒限照估儧辦除俟工竣核實具題造册送部查核奏入上諭曰好如所議行乾隆二十五年三月二十六日工部奏言工科抄出江南河道總督白鍾山等疏稱裡河髙堰二廳所屬山清交界一帶土堤自武家墩迤北起至濟運堤止計長一千零六丈坐當洪澤下遊每遇汛長風浪撞擊危險堪虞乾隆二十二年春恭逢聖駕南巡親臨指示諭建石工以資捍衛復經臣查勘奏明照武家墩南首一律建做磚工底面鋪蓋石塊搜尋舊石儘數估砌既可經久抵禦更得節省錢糧欽奉俞允當經轉飭遵照確估今據淮揚河務道何煟將裡河髙堰二廳應建磚石工程除運用沿湖一帶石塊并舊河磚不請錢糧外共估需物料夫工運腳銀五萬八千八百七十四兩四錢五分五釐一毫零造册詳請題估臣復核無異除册結送部查核外相應會題一疏查先據該督白鍾山等奏稱裡河髙堰二廳屬武家墩迤北濟運壩止正當洪澤下遊每遇汛水長發原舊土堤易於汕刷欽遵皇上指示不若改建石工以資鞏固但工段綿長採石艱難即於沿湖搜尋吊撈餘石如普例建石實不敷用於武家墩一帶建做磚工面底蓋鋪石塊並將搜尋之石儘數估砌少辦河磚既可經久且與南首磚工接連一律更得節省錢糧奏準咨部經臣部行令作速確估造册具題查核今據該督將前項建做磚石工程除運用沿湖一帶石塊并舊河磚不請錢糧外共估需料物夫工運腳銀五萬八千八百七十四兩四錢五分五釐一毫零造册具題應如所題辦理以資捍禦仍令該督俟工完之日將做過工段用過銀兩照例核實造具清册題銷可也奏入諭依議行乾隆二十五年十月初八日禮部尚書嵇璜奏言竊臣於九月十三日至清江浦見河臣白鍾山得知督臣尹繼善等因下河時厪宸衷悉心籌畫議得運河東西二堤勘修堅固以資捍衛挑濬淮揚運河酌辦西堤港口疏通諸湖引河俾湖水暢達歸江以為保護下河之計督臣現在會摺具奏恭請聖訓遵循辦理惟歸江之路尚有應行籌辦之處查運河東堤之金灣滚壩口門寬四十丈而尾閭仍歸入六閘河內未能暢注且易淤阻應請於金灣壩下開挑引河一道正對董家溝滚壩並將董家溝淺窄之處量加疏挑以注於江則尾閭更為寬暢又查廖家溝石羊溝董家溝三壩壩面尚髙應請改低三尺以芒稻西閘為凖使就下之水益加暢利歸江去路既多則歸下河之水自少矣臣謹繪圖貼説恭呈御覽伏乞聖明訓示敕下督河撫諸臣一併勘議辦理奏入上諭曰此係卿在京曽奏之事原以待明年南巡舉行今既改期且督河諸臣已有挑濬之舉則及時此奏實為允當有旨交尹繼善等勘議乾隆二十六年三月初十日髙晉陳宏謀奏言竊臣等接準廷寄尚書嵇璜奏請於邵伯運河東岸之金灣滚壩下開挑引河并將廖家溝石羊溝董家溝三壩改低三尺使歸江去路既多則歸下河之水自少等因欽奉諭旨交尹繼善等勘議欽此經臣等會委淮揚道何煟勘估詳候覆勘因督臣尹繼善前赴江西審案河臣白鍾山患病尚未會勘今臣髙晉自京回南臣陳宏謀正在淮徐接準督臣尹繼善來札以江西甫回又現在奉旨進京不及會勘查時屆仲春汛水將至不宜再遲臣髙晉與臣陳宏謀隨即會同親往查勘金灣壩上承諸湖之水為歸江要道緣壩下引河仍滙入金灣六閘河內宣泄不暢且易淤阻臣等細按地勢情形應如該尚書所奏於金灣壩下另開新河一道俾減下之水由董家溝直捷注江又董家溝石羊溝廖家溝等三壩均屬歸江尾閭現在壩底尚髙亦應如所奏將壩底各改低三尺與芒稻西閘之底相平則尾閭更為通暢臣等復上下相度悉心籌議南關等壩現議封土三尺將運河東西兩隄量為修補以資防護則是髙郵等湖水歸海之路既已節減必應將歸江尾閭多方開展以達其暢流之勢今金灣壩以下既已另開新河其原設之舊壩僅止四十丈不獨壩面覺小且形勢亦覺背流并請於壩北展寬十丈連舊壩面共寬五十丈以順其吸川建瓴之勢則泄水更多又迤下東灣西灣地方舊設有滚壩兩座減泄湖河之水直注石羊溝歸江緣西灣壩下引河短促僅長二百二十餘丈即與東灣河相合非特水噎不流亦且阻遏東灣之水倒漾出運今應將西灣壩下引河取直加挑三百二十丈至太平橋始與東灣之水合流則流長而勢順庶西灣滚壩方為有益再迤下鳯凰橋引河泄水係由廖家溝歸江因年久未修河內間有淤灘水勢不能通暢亦應挑濬寬濶以資宣泄至金灣壩下既開新河壩面又擬展寬則就下之董家溝壩面并應展寬十二丈連舊壩共寬三十丈石羊溝壩舊有耳閘兩孔實屬無用今應將磯心拆去即以閘墻為滚壩裹頭計展寬五丈四尺連舊壩共寬三十七丈四尺廖家溝壩面原寬十六丈連年刷寬三十八丈應就現寬丈尺於東墻修建裹頭共寬四十四丈各壩俱經改低又復展寬其壩下引河凡有髙仰淤灘積土酌量水平挑切寬深如此一律辦理庶幾歸江之路暢而南關車邏東注之水自少矣以上各工約需銀一十四萬兩因係急辦之工臣等一面咨會鹽政髙恆在於運庫銀內如數解交河庫道應用一面分定段落𣲖委附近之同知通判州縣并河員中幹練工程之員按段承修尅期興工并委揚州知府孔傳炣原任蘇州府薑順蛟往來監工責成淮揚道何煟常鎮道錢琦上下稽查定限汛前完工臣等仍隨時留心督催務期工歸實濟不容草率浮冒以副皇上垂念湖河保護民生至意除飭司道造具估册確核會題外所有臣等勘議飭辦并請動運庫銀兩緣由理合繪圖貼説會同兩江總督臣尹繼善江南河道總督臣白鍾山恭摺具奏奏入上諭曰諸凡皆妥如所議行乾隆二十六年六月初三日髙晉陳宏謀奏言竊照揚州府屬之髙寶興泰等下河地方積年被淹荷蒙皇恩準將髙郵之南關車邏等壩封土三尺於金灣壩下加挑新河分流暢泄俾水歸江現在俱已完工另摺奏聞自此洪湖運河之水不致漫過三壩而東注則髙寶興泰等處可免西來之水患矣惟是下河各州縣境內支河汊港及田間積水向來俱滙入串場河北流二百餘里於鹽城境內之石䃮天妃等閘始行歸海道逺紆回驟難消涸民間雖挑溝築墟不足以資捍衛厯來每有西水不至而雨多水積亦足為患者是下遊被淹之故固應杜其來源而本地積潦之區亦當籌其去路此閘下舊有歸海之引河不可不加疏治也而議者有謂海潮勢大近海挑濬恐內水未出外水先進者又或謂雨多水漲各處滙集即分疏引河不能泄水歸海者臣等伏查范公堤綿亘六百餘里串場河自南而北向建石閘十八座每閘俱有引河専為泄水歸海之計嗣因洪湖之水由髙郵各壩東注下河形如釡底水未到閘地已被淹是以不暇計及閘下之引河今南關等壩既已封土金灣復又開河經始既有成模則善後必規全局查現在鹽城境內石䃮天妃閘引河寬深由新洋港歸海泄水甚暢又興化境內之白駒青龍八竈大團等閘引河於乾隆二十二年經前副總河臣嵇璜奏準挑濬由鬬龍港歸海雖不能如石䃮等閘之通暢而閘水現由外趨頗資宣泄其餘迤南之丁溪小海迤北之上岡北草堰陳家沖等五閘緣彼時尚可通流列入緩工未及挑濬年來水淹沙停有竟成平陸者各閘亦常閉而不用臣等先後親往各該處上下查勘現有王家港水深八九尺至一丈二三尺寬十四五丈又有射陽湖寬深更甚臣等凛遵籌辦下河諸務之聖訓悉心討論並與常鎮道錢琦河庫道李宏淮揚河務道吳嗣爵等再四講求若將丁溪小海二閘引河疏濬深通順勢再開一引河滙入王家港歸海又將上岡草堰陳家沖三閘各引河疏濬深通順勢亦開一引河滙入射陽湖歸海就其阻塞之途因勢利導俾散漫之水裁灣取直順軌安流滙歸深通之海口庶更併力趨海總以海為歸宿並非另疏海口當不致有倒灌之慮至謂引河不能泄水歸海則從前所開之白駒等閘引河現在泄水歸海已得濟用厯有明徴蓋積水之區若得多一尺去路即可早消一尺積瀦並可早涸一尺田地數州縣之積水增此五閘之引河節節疏通源源宣泄小民見水易消涸自必齊心合力各挑河溝加築墟圍蓄泄兼資旱潦有備將見沮洳漸成沃壤仰沐皇恩永資樂利臣等為下河通籌全局起見用是合詞備陳恭請聖訓倘蒙俞允容臣等於本年封土以後夏秋之間再看下河各州縣水勢情形詳籌審度將應需銀兩撙節估計另行妥議請旨遵行謹先行繪圖貼説恭呈御覽奏入上諭曰甚應行之事妥協辦理可也乾隆二十七年三月二十六日劉統勳兆惠髙晉陳宏謀奏言臣等仰蒙皇上訓示前往髙寶甘泉運河相度疏泄機宜沿途查勘測探運河水勢現在深通至湖河之水以五壩為來源以江海為去路而歸江多一分之水即下河受一分之利臣等遵旨查勘運河歸江之路自邵伯以下向設有灣頭閘壁虎橋鳯凰橋西灣壩東灣壩金灣滚壩金灣六閘共七處俱係宣泄湖水由鹽河歸廖家溝石羊溝董家溝芒稻閘等四河分流下注兹細加查勘內如灣頭閘泄水最暢壁虎橋河僅長一百餘丈即與灣頭閘河相連鳯凰橋河兩岸陡崖厯來積土甚髙難以展寬且該處磚木橋三道河面已寬十餘丈足敷分泄均不必另行辦理外查金灣壩引河係上年新挑該處緊接六閘地居上遊由董家溝下注宣泄湖河最為便捷惟是滚壩五十丈測量河身寬十五丈河底寬八丈尚覺未能暢達又金灣六閘舊有鹽河由芒稻閘歸江最為寬深從前原係與金灣壩之水滙歸入江去路甚暢今金灣滚壩既另挑新河該處六閘金門尚存其舊僅寬十丈八尺未免來源過窄又東灣滚壩先於乾隆二十二年落低三尺西灣壩未經並落宣泄不暢以上三處臣等公同商度酌議將金灣壩新挑引河再行量為展寬以河底十丈為率河身下遊地勢稍仰亦應一律再加挑濬深通使有建瓴之勢六閘鹽河舊為歸江水道向設南中北各二閘河頭築堤分為三路滙歸一處其北閘二門為運鹽要津南中二閘閘底較髙原係相機蓄泄較之滚壩過水尚覺遲滯應將北二閘仍留以濟鹽運自中閘迤南添建石壩三十丈并將中閘照舊存留與北閘相隔二十四丈閘下土堤再行量為接築加長并酌挑引渠以順水勢其下注之水既與鹽運並無妨礙而盛漲之時湖水得以暢達西灣滚壩照東灣一體落低三尺并於西灣河頭酌挑寬深以導引水勢如此則髙寶諸湖歸江之路益增宣泄之形益暢實於下河民田廬舍大有禆益臣等於查勘後即星往六塘河等處查勘宿遷等州縣河道情形將現議建壩挑河處所交淮揚道吳嗣爵揚州府知府楊重英將工段界址插標立志恭候聖駕順道閲視如蒙允準所有應辦工程督撫河臣詳細確估奏聞請旨俟秋汛水落即遴委妥員分頭儧辦臣等謹繪圖貼説恭呈御覽奏入上諭曰所議甚合朕意應如是者圖留覽乾隆二十七年四月初九日河道總督張師載山東巡撫阿爾泰奏言竊照東省運河荷蒙皇上睿謨廣運閘壩堤堰次第興修節宣有制年來濟運行之已有成效但逢上年汛水異漲臣等細察情形尚有應行籌辦者如下河廳屬之德州有哨馬營滚壩一座恩縣有四女寺滚壩一座壩下各有支河一道均係減泄漳衛汶異漲之水由老黃河入海漳水渾濁挾帶泥沙每遇伏秋易致淤墊乾隆二年曽經題定嵗修年年疏濬動用德州河灘地租銀兩如有不敷於司庫存公項下動撥募夫辦理自乾隆二十三年大工挑濬之後每年留淤無多勸諭民力疏濬逮至上年伏秋水漲倍於往年臣等細勘情形現在哨馬營壩門寬三十丈足資宣泄惟四女寺壩門僅寬七丈宣泄不暢應將壩門展寬三丈以資吞納其壩下支河亦應一例展寬至哨馬營支河河身既寬為渾水經過停沙較厚處處淤墊祇須募夫挑濬應與四女寺滚壩展寬工程俱請仍照舊例動用灘租及司庫存公銀兩辦理庶壩門展寬而河身又足容納即遇盛漲宣泄更屬有益又如捕河廳屬有五空橋一座係泄沙趙二河之水由大清河入海橋面寬十一丈五尺底髙運河一丈二尺乾隆二十三年添建八里廟滚壩之時欽奉諭旨均令髙運河底七尺嗣將各壩落低水勢平穩曽經奏明暫請停緩俟酌看來嵗水勢情形請旨辦理連年以來河水俱平無庸興辦上年水勢既大仍應照舊落低七尺為度庶沙趙二河易於減泄而東阿夀張東平一帶民田亦深有禆益又如運河廳屬魚臺縣西堤辛莊橋北舊有泄水口二處每年秋水盛漲由此分泄入昭陽湖遞入微山湖逮至春間必須堵閉蓄水以濟漕運不特厯年需費而口門過水日漸刷深有二丈在運河既難以節制而兩湖受水過大亦非長䇿臣等公同詳勘兩水口各寬十數丈應照兩頭碎石堤工之法填築堅實另擇就近堅硬處所修建滚水壩一道寬二十丈壩脊全髙運河底六尺為度如遇汛水浩大至六尺以外可以滚泄入湖六尺以內留為濟運即使春夏水小亦無旁淺之虞較之每年築壩拆壩實為一勞永逸且入湖之水有此節制亦不致有過大之患矣以上哨馬營四女寺展寬疏濬工程所需錢糧仍歸嵗修辦理其五空橋落低並辛莊橋建壩工程所需錢糧應請在於運河道庫酌撥節省項下銀兩咨部動用毋庸請動司庫地丁錢糧臣等現飭該司道督同廳汛等官確估速辦奏入諭如所議行乾隆二十七年五月初一日大學士劉統勳直𨽻總督方觀承山東巡撫阿爾泰奏言竊臣等面奉諭旨直𨽻景州地方連年被水本處溝渠河道無可疏消上遊德州運河每遇伏秋大汛一有泛漲即波及景州田畝運河東岸之四女寺哨馬營原有減水壩座命臣等前往查勘如有應行修濬之處詳查確議請旨遵行臣等前往恩縣四女寺地方驗看現有壩座其金門寬八丈中間磯心二座髙一丈四尺四寸龍脊髙河底一丈一尺現在壩下運河水深七尺五尺其壩下口門間段停淤減水河亦為地形所束運河須水長至三尺五寸以上始行過水臣等查此壩座落形勢分水減溜最為得力而壩門窄狹壩底較髙壩下減河亦未通暢臣阿爾泰於本年四月內會同河臣請展寬三丈已蒙諭允尚未興工臣等酌請於原奏之外再行展寬一丈合之原有尺寸共寬一十二丈此處壩底較下遊哨馬營壩面髙一尺六寸請將此髙出尺寸一律落低多有減泄至哨馬營壩座金門寬三十丈建築之時龍脊髙出河底一丈五尺後於乾隆十三年落低二尺其髙寬丈尺與過水情形甚為得力但使引河通順此壩即為減水關鍵不須更議修改臣等復查四女寺哨馬營兩處壩座俱藉壩下支河減水必須一律深通下遊始無阻礙臣等按行支河兩岸積土甚髙係民間嵗修未克挖土逺送是以日積日髙易於流墊河內下遊漸次寬深總滙於玉泉莊地方由老黃河至海豐之大沽河口入海亦係民間嵗修工程惟此壩下支河一段臣阿爾泰擬於回途會河臣再行相度遴委妥員詳加勘估奏請挑濬俾得水無阻礙以收宣泄之益臣等更有請者山東運河自臨清以上疏泄閘壩共計八處而臨清迤北惟藉四女寺哨馬營兩處宣泄此兩壩必宜疏通以防盛漲浸漫波及下遊誠如聖明洞鑒但宣泄機宜向無専員管理臣方觀承臣阿爾泰因德州衛守備不足以任修防曽經奏請將兩岸堤工分屬德州恩縣地方官承辦今已有章程至此兩壩支河均會老黃河入海綿長三百餘里經由山東直𨽻十數州縣並無廳汛河員管轄愚民各顧其私遇有淤灘地段即希種植獲利河身易致淤塞一處阻礙不通兩岸即致漫溢所關誠為緊要查有兩支河交滙之德州邉臨鎮應請將德州州判移駐於此該員在德州並無專管而邉臨鎮附近德平商河民情刁健向議設員彈壓請即將此州判專司河捕俾不時兩岸巡查遇有應行修治之處即移會河道坐落之州縣公同辦理但州判官職微小河道關係兩省恐致呼應不靈查山東糧道駐劄德州哨馬營四女寺近在德州數十里之內管理甚易該道押運赴通經由道路皆係運河稽查亦便請將一切疏築事宜責成該道管理在直𨽻原係天津道管轄地方遇有關會事件即令兩道移文商辦免致隔省膜視董率既係大員汛官復有専責庶壩座河道辦定之後嵗嵗增修永無頽廢德州上遊河勢平緩下遊景州免受漫溢之患臣等公同查勘謹將原圖貼説恭呈御覽奏入諭依議行乾隆二十七年六月初七日尹繼善髙晉陳宏謀髙恆奏言乾隆二十七年四月初六日欽奉上諭駱馬湖水由永濟橋東注為六塘河源流既逺所受支河甚多河中淤埂阻滯溜勢一遇暴漲猝難容泄田廬易致漫淹應視兩岸中間窄狹者再加寬展切去河中淤埂俾遊波寬緩不致出槽堤身殘缺單薄者量為修補以資捍禦其六塘河尾閭橫經鹽河由東岸武障等河下泄入海原設條石滚壩為過水之凖其旁並設草壩水小則蓄水運鹽水漲則拆壩消水商利蓄而民利消彼此各爭其便當每年權其緩急利害立定限期以時啓閉庶於渠政有禆其草壩以下各有引河及六塘河北岸之丁家溝南岸之馬家河鮑營河形勢紆曲阻塞者均如諸臣所勘估挑辦理務使通流以達於海苐六塘河修防事宜向無専設之員即鹽河各壩亦非鹽務微員所能相機經理該督撫於通省事簡同知通判缺內議移一員置髙家溝適中地方仍應捒選能勝此任者奏聞補授俾專司水利及修防啓閉之事地方水利各員聼其調遣仍歸淮徐海道總轄亦聼總河節制務令宣防無悮而蓄泄合宜此皆朕目擊深維集衆議而取裁定制如此地方大吏其善體朕意實力奉行所有應添石壩土堤及一切挑挖疏濬各工該督撫河臣會同鹽政悉心確估核議以聞欽此仰見我皇上軫念民生永弭水患之至意臣陳宏謀於送駕之後即親赴六塘河將勘定應修之工逐一丈量明白竪立封堆簽釘志樁會委淮揚河道吳嗣爵淮徐海道瑭琦督同工員逐段確估並將六塘河尾閭各河應行挑濬之處一併勘明估計據該道等會稟前來臣尹繼善正在蘇州秋審面同臣陳宏謀覆加確核除鹽河內啓閉草壩例應商辦者仍歸商辦外通共估需銀十八萬九千餘兩現在另造細册會疏題報惟是目下已屆伏汛水勢漸長挑河切灘難以施工須俟秋後興舉至六塘河展寬堤岸培修堤工乘此上遊水未漲發之時即應上緊儧辦臣等遴委明白工程之管工河廳及沿河附近各州縣分段承修専委吳嗣爵瑭琦為總理大員又委淮徐兩知府協同兩道查催稽察如承修人員不照估妥辦侵冒錢糧及怠玩遲悮者立即揭報嚴參臣等輪流前赴該工督辦工完逐細驗收倘有偷減草率者即將該管道府及承修人員一併嚴參重處但前項應辦急工亟須發帑應用若俟題準動給未免濡遲臣等查蘇松糧道庫內現貯漕項銀二十四萬兩尚未解部仰懇聖恩即於此項內就近酌撥銀十九萬兩解交河庫存貯給發濟用因目下已經動工刻難緩待一面恭摺奏明一面先酌撥銀十萬兩以便趕辦其餘銀兩俟奉旨允準之日再行照數撥足其六塘河移駐經管人員臣等現在㨂選另疏具題奏入諭部速議乾隆二十七年十二月初二日山東巡撫阿爾泰奏言竊臣赴武定濟南東昌等處查勘一切所有沿途辦理情形業經奏蒙聖鑒臣於十一月初五日由東昌赴兖州所屬之夀張縣地方查該縣境內有沙趙二河上承荷澤濮范之水南由趙王河積水閘歸運北由沙河道人橋歸運伏秋坡水滙流沙河出水勢當頂沖雍正四年於沙河會流之處修建大壩以禦其勢此沙河大壩之所由來也臣查今昔情形不同沙河出水之處已於乾隆二十二年八里廟既建有滚壩積水閘以北道人橋以南又挑引河一道俾之分泄而五空橋又遵旨落低來源雖廣去路亦多臣察看情形商同河臣飭令該縣酌將大壩挑開口門使沙趙二河之水暢流入運則夀張一帶窪地水患似可少減至聊城陽榖東平東阿沿河堤堰伏秋大雨之後間有單薄殘缺臣先經飭令該州縣加髙培厚現俱一律修整完固而東平州尤為出色又該州地畝低窪之處於乾隆二十五六兩年開濬金線等河渠十四道疏消坡水滙入大清河歸海年來禾稼豐收皆成沃壤農夫咸知水利有禆農田爭相踴躍其州北之榖家莊州西之馮家等莊地勢均屬低窪今各開渠引水入會全大清等河現俱興挑完竣臣逐加查勘頗合機宜於窪地民田有禆又汶上縣稻屯地方查可開稻田之處該縣董勸鄉民將馮莊等泉疏濬深通現在開漏築塍并覔善種稻田之農夫教以耕耨所需稻種亦俱購辦以備來春借給即行布種俟開有成數另行奏報再濟寧州之馬場湖上承寧陽等縣坡水并資蓄以濟運緣湖堤殘缺水難容納前經臣飭令該州加髙培築堅固現已完工則蓄水濟運有資而旁溢可免臣至嶧縣之韓莊查滚壩過水仍二尺九寸與前所查無異至伊家河仰蒙聖訓河身尚需寬展臣親至查勘凡可展寬以及砂礓石塊較少之處酌量開挑總期河水暢流俾無淺阻臣自兖至沂查嶧縣臺莊至郯蘭交錯之馬頭地方計程一百二十里不通車路臣相度情形飭令該縣等兩旁開溝取土疊道並將橋座用石幫寬既可行車以便商旅而溝深通廣兼消坡水以利田疇已於十一月初八日具報完工至蘭郯二縣地勢低窪自乾隆二十三年以迄於今開挑河渠六十餘處分疏坡水引入沂河以及芙蓉燕子等河年來窪地疊獲豐登地方日有起色臣復加諄囑諸凡疏築創始幸有成效善後尤為喫緊務須嵗嵗留心妥辦以期永保前功臣復自沂至泰查各府所屬興修水利地獲有收固已糊口有賴有因種植桲欏現據飼蠶收繭以供紡織復被體有資凡所以為斯民計者臣當率屬竭力籌辦以仰副聖主懷保斯民之至意奏入上諭曰諸凡留心本務實屬可嘉乾隆二十七年十二月十七日江南河道總督髙晉奏言竊查清口淮黃交會為河工最要關鍵從前因黃河北岸陶莊漲出沙灘逼溜南行直趨清口每致倒灌為患康熙三十八年聖祖仁皇帝南巡親臨指授方略建設御壩挑溜北趨并於陶莊開挑引河以順水勢誠千古不易之良模乾隆五年臣叔髙斌推廣聖意奏請皇上訓示建設木龍自此南岸各壩掃工之外俱長沙灘數十丈至數百丈不等北岸陶莊積土日見刷去已著明效本年春間恭逢聖駕南巡臨工閲視指示機宜於現存三架木龍迤下一百二十丈處添建木龍一架挑溜直趨陶莊以期積土盡刷欽此臣遵即𣲖委署外河同知克爾圖購辦木料復委候補通判馮焜驗收齊全秋汛後臣察看水勢情形督令於九月十一日開工臣與淮揚河道吳嗣爵仍時常往來稽核查催兹據該員稟報十一月十一日儧辦完竣臣隨率同道廳前赴該工確勘查該處舊設木龍三架保護淤灘雖甚有益但三架迤下距清口之西壩尚有四百六十餘丈隔陶莊之積土亦有二百九十餘丈未免木龍力弱挑溜不能及逺黃河全勢尚未北趨今新添木龍計長五十丈寬六丈地勢較前移近一百二十丈升關挺入河身挑溜正與陶莊積土斜對其積土外灘現已刷去長三十六丈寬一丈至一丈二尺不等木龍之下新生淤灘長九十丈寬二丈至三丈有餘西壩以外亦已新生淤灘十一二丈此時乃水落歸槽之候溜勢平緩其新添木龍已覺得力如此若至明春汛水長發溜勢湍急更必大有成效臣惟當凛遵聖訓倍加謹守務期陶莊積土漸次刷淨黃河大溜全趨北岸湖水暢出清口並行東注歸海以仰副我聖主慎重河防永奠民生至意奏入奉上諭欣慰覽之乾隆二十八年正月二十九日江南河道總督髙晉奏言竊照上年春恭逢聖駕南巡經臨運河指授方略特頒上諭髙寶一帶應宣導歸江者邵伯以下西灣壩泄水情形至為便捷將壩底落低四尺河頭亦加挑寬深以資利導金灣滚壩新挑引河應再展寬以河底十丈為率迤下地勢稍仰並一律深通俾成建瓴之勢金灣六閘應折去南二閘添建石壩接築土堤并挑引渠以備盛漲湖水自無閼壅之患欽此臣等敬沐聖訓將西灣壩落低工程遵旨於汛前辦竣其金灣河應行展寬挑深并六閘改建石壩各工擬俟汛後儧辦緣由俱經會摺奏蒙聖鑒臣於秋汛霜降後會同督撫鹽臣將金灣河等工於附近廳營州縣內遴委署江防同知福隆阿等十員分段承修於上年十月初二日興工并委淮揚道吳嗣爵常鎮道姚成烈揚州府知府楊重英往來工所查催臣與督撫鹽臣隨時督察仰賴聖主洪福天氣晴和工員人夫咸知踴躍嗣據各委員於十二月初一二等日陸續具報依限完工臣隨親往驗收桉照原估丈尺段落并上下形勢細加確核金灣引河河底俱一律挑寬十丈面寬自十餘丈至二十餘丈不等迤下地勢稍仰之處亦皆挑深自二三尺至六七尺連前深一丈餘尺至二丈餘尺不等形如建瓴將來水由董家溝歸江可期暢達其金灣南二閘改建石壩寬三十丈其壩脊髙下即照西灣滚壩落低四尺之制為凖並接築土堤挑濬引渠由芒稻河歸江以上各工均屬如式辦理並無草率偷減情弊現將用過錢糧再加核實飭道另造細册詳送分别會疏題估題銷臣復查芒稻河舊設十閘向例冬春閉板夏秋酌定水志啓板續於乾隆二十三年經尚書嵇璜奏明鹽船由舊越河直達金灣北閘將芒稻閘常川開放并聲明如遇水小之年再行相機辦理數年來每值冬春下遊通泰河流淺涸即在芒稻閘迤東築壩蓄水以資農田灌溉并通糧運鹽艘直至汛水長發方始開放今金灣南二閘業經遵旨改建石滚壩照西灣滚壩一律落低壩下引渠又經加挑寬深與從前形勢不同是伏秋大汛固已暢泄無阻而冬春水小又應因時制宜酌量變通臣再四熟籌冬春之際與其在芒稻閘迤東築壩蓄水不獨多費錢糧且啓拆之時倘壩底稍有未淨轉於宣泄有礙嗣後應將芒稻閘每年冬春水小時酌量下板數塊於灌溉農田糧鹽運行既可兩有禆益一交夏令汛水將發即全行開放於減泄盛漲仍可不致阻礙從此操縱由人相機啓閉則水小水大均資利賴矣奏入奉上諭覽奏俱悉乾隆二十八年二月初一日江蘇巡撫莊有恭奏言竊照揚州府屬之髙寶興泰等州縣下河地方節年被淹仰荷皇恩準將髙郵南關車邏等壩封土三尺又於金灣壩下加挑新河分流暢泄下遊州縣俾免西來水患惟是來源既杜而本地積潦之區亦當籌其去路乾隆二十六年五月內經前署督臣髙晉調任撫臣陳宏謀凛遵籌辦下河之聖訓與司道等審度形勢悉心討論請將泰州之丁溪小海二閘引河疏濬深通順勢再開一引河滙入王家港歸海又將鹽城阜寧二縣境內之上岡草堰陳家沖三閘各引河疏濬深通順勢亦開一引河滙入射陽湖歸海俾積水可以早消等因會摺具奏欽奉硃批甚應行之事妥協辦理可也欽此欽遵隨經髙晉陳宏謀轉飭淮揚河道等督同淮揚二府并分委佐雜各員勘估議詳臣抵任後復查案行催兹據淮揚河道吳嗣爵等會同各司道等詳稱覆查此案工程専為開通閘下引河歸海起見自應先將閘下引河挑濬深通再為閘上引河之計現據覆估鹽城阜寧泰州三州縣境內通共估需銀八萬九千四百二十七兩七錢七分零其間工程多係裁灣取直順流歸海之道按照估册確核無浮酌擬委𣲖工員另詳飭辦所需前項銀兩應請於運庫正欵銀內動支給發并聲明上岡草堰二閘金門堆翅及兩墻石塊脫落之處俟挑河築壩時確估另詳造具估册會詳請題到臣伏查丁溪小海上岡草堰陳家沖等五閘引河自乾隆二十二年挑濬白駒青龍等閘引河時前項河道尚可通流是以列入緩工未及挑濬年來水漫沙停竟成平陸一經漲潦四面漫溢自應恪遵硃批諭旨妥協辦理早為挑濬以仰副聖主惠愛瀕海蒼黎之德意除已照例會同督臣尹繼善河臣髙晉恭疏具題估册送部查核外惟查江南地方每屆春深即多雨水如俟部覆到日再行興工誠恐有稽時日應請酌動五分銀兩容臣與督河二臣遴委妥員分定段落檄令領銀儧辦餘俟部覆到日再行給發臣於明年正月上旬自浙江查勘海塘回江即前赴淮揚二府工所督率指示以速要工奏入報聞乾隆二十八年四月十七日工部奏言工科抄出兩江總督尹繼善等奏六塘河一切挑濬建築等工通共估需銀十八萬七千六百八十九兩零先後撥蘇松糧道庫貯漕項銀十九萬兩照估動用餘銀即留河庫一疏乾隆二十八年二月十七日奉旨該部議奏欽此臣等覆查修築六塘河及挑濬尾閭各河一切建橋築壩等工先據該督等遵旨勘議興修奏請酌撥蘇松糧道庫項銀兩解交河庫動給辦理經户部覆準知照臣部今據該督將前項工程通共估需工料土方銀一十八萬七千六百八十九兩零造册具題應如所題辦理仍行該督俟工完之日將做過工段用過銀兩照例核實造具清册題銷至酌撥蘇松糧道庫銀十九萬兩先據該督等奏請酌撥經户部議覆應於漕項銀內先撥銀十萬兩解交河庫備用其餘銀兩俟工部核準後再於漕項內照數就近撥給今既據將工料估報工部核準應準其於蘇松糧道庫內再撥銀九萬兩解交河庫除給發前項工料外其餘剩銀二千三百十兩九錢零應令江南總河照數貯庫留為别項工程之用仍造入嵗報庫貯册內報部查核可也奏入諭依議行乾隆二十八年十月初七日河道總督李宏山東巡撫崔應階奏言竊臣等接準工部尚書阿爾泰吏部侍郎裘曰修咨開東省四女寺減河形勢最為得地而下遊老黃河寬暢足資容納若將四女寺壩門大加展寬則東省多減一分直省便少受一分已於行在召見時口奏現在亟須辦理計須再加寬二十丈或十五丈以外其口門以下亦須一律寬展接到老黃河為度臣等親赴恩縣四女寺地方會同查勘由壩口勘至歸入老黃河之處計長十四里壩口及壩下支河俱寬十二丈自上年奏明挑濬後現今一律深通臣等察看形勢查溯來源若將此處壩口及支河再為展寬實與直東兩省有益緣衛河發源於河南蘇門山之百門泉會合大丹小丹淇湯洹等水至東省之南館陶復有豫省清濁二漳全流注入東北達於臨清厯程九百四十里沿途並無支河旁泄至臨清板閘又與汶水會合北流計二百四十里至恩縣之四女寺始有此減水壩泄水由支河入老黃河歸海臣等查昔年清濁二漳在直𨽻境內原有支河分泄由威縣寧津達天津入海並非全漳歸衛近年直𨽻沙莊地方挑築土壩攔截漳水分流之路是以全漳歸衛查衛河以二十餘丈之河身受直豫東三省之水而河流又復紆回曲折易漲難消遇伏秋雨水盛行各河會注衛河常至陡長丈餘盈堤拍岸東省州縣固有沖溢之虞直𨽻下遊更有漲漫之患誠如部臣阿爾泰等所見東省多減一分直𨽻便少受一分也臣等詳加斟酌衛河正流面寬二十六丈今四女寺壩門及支河現寬十二丈若再展寬二十丈未免支河寬於正河恐致奪溜挂淤於漕渠有礙雖德州之哨馬營支河現寬三十丈但查哨馬營壩口係在運河旁側㵼水而四女寺壩口係迎溜項沖是以部臣阿爾泰等以為形勢最為得地兩處情形不同寬窄自當酌定臣等擬將四女寺壩門及壩下支河再行展寬十二丈共寬二十四丈已較舊時展寬加倍儘足以分泄盛漲所挑之土即於兩岸築成堤堰以資扺禦遇伏秋盛漲先由此處掣消則德州景州以北水既少而勢亦平實與直東均有裨益至老黃河形勢雖屬寬大但河底一律平坦水難暢流是以厯年於河心挑濬子河一道現寬四五丈不等今支河既已展寬則老黃河中心子河亦應一律加寬方足暢其入海之路臣等謹將會勘情形恭摺奏明如蒙俞允臣等將壩口及支河土石各工撙節確估另行題報其老黃河下遊應挑之處並咨直𨽻督臣轉飭辦理奏入諭如所議行欽定南巡盛典卷四十二
