body:
  text: 河防乾隆二十二年十一月初四日江南河道總督白鍾山奏言竊照裡河廳屬運口係各省漕船經由緊要之處専藉洪澤湖清水以資浮送必使清水常強庶可敵黃濟運每遇湖水微弱或東北風未免黃水倒灌淤墊河身有礙運道今春恭逢聖駕南巡臨幸運口閲視情形指授方略令於頭壩北壩外建築攔黃壩一道攔禦黃水仰見聖明天縱悉合機宜運道民生大有禆益當即轉飭敬謹遵照欽定式樣上緊儧做一律髙寬堅實穩固兹據淮揚河務道何煟詳稱運口頭壩北壩外建築攔黃柴壩一道估需工料銀四千七百四十兩零親勘確核並無浮冒造册詳請題估臣等復核無異恭疏具題奏入上諭部議之乾隆二十二年十一月十一日裘曰修夢麟白鍾山陳宏謀髙晉奏言竊臣裘曰修臣夢麟同臣髙晉於十月二十六日自宿州起程至宿遷縣之歸仁集踏看安河工段適臣白鍾山臣陳宏謀俱自清江浦來晤臣等伏查濉河上承河南及蕭碭諸水以安河為出路最關緊要臣等業經奏明開濬今復加相度凡現在水占皆係厯年不能涸出之故勢難久待臣等率同道廳各員一靣勘估即一靣設法辦理務期一律深通不致壅遏再查全淮俱入洪湖而去路又以清口為咽喉疊奉訓旨令每嵗及早多拆東西草壩以暢其流仰見聖明洞悉臣等遵奉面加啇酌今值冬令應照例束壩蓄水之期但向來口門只留十八丈至二十丈不等未免收束太緊臣等今擬酌留三十丈較往年多寬十丈至十一二丈則現在湖水可以暢出其湖水多出一分則來年可多受一分似於宣泄之道更為有益明嵗正二月春汛未發之前即仰遵聖訓相機早行大為拆放所有臣等會籌緣由恭摺奏聞再上下江各工現在已有四分以上至六七分不等合併聲明奏入上諭曰甚合機宜欣慰覽之乾隆二十二年十一月十四日河道總督張師載山東巡撫鶴年奏言竊照運河疏濬事宜上厪宸衷因尚書臣劉統勳奉差晉省欽命臣鶴年留東辦理遵即會同河臣張師載並巡漕臣海明詳加商確查東省運河北抵臨清南至臺莊上下幾及千里其資灌輸而利運行為汶為泗為洸為薛每遇伏秋兩汛水發俱帶泥沙而厯年大挑小挑不過臨清南旺濟寧彭口等處塘河淤沙最厚者酌加挑挖其餘長河亦間段疏濬總以糧艘可行而止並未大加挑挖遂致年深日久河底益髙而堤身日益卑矮加以今嵗伏秋漳衛沙趙等水泛溢於其北昭陽微山等湖漲滿於其南水壅沙停堤隨水刷河身淤墊更倍於前今冬若止照常例大挑誠如聖訓殊非經久之䇿臣等愚見除塘河工程儘照大挑往例額募等夫實力挑挖外請自濟寧以下之石佛閘起北至臨清閘止將河底淤墊逐一探估以現在水深八尺為度凡不足八尺者添估挑挖俾河身一律坦平以免阻塞之患今回空過後本月初三日南旺可以煞壩空水數日石佛以北至靳家口可以空乾本月十二日可以興挑正月告竣靳口以北至臨清地勢稍平空水較難十二月興挑二月告竣石佛以下直至臺莊內多湖河相連之處深淺段落尚難確估而糧船經行足資浮送應俟湖水稍退兩堤修整之後再行確估辦理惟彭口古淺山河噴沙之處連年因水大不能築壩雖經額夫挑挖未大加挑濬應請一併募夫分案估計儧挑總在重運未到之前凡屬淤淺之處務期上緊挑完以利運行此現在分别辦理挑河情形也其臨清以南至石佛一帶兩岸縴道間有殘缺單薄之處業飭道廳勘估以本年盛漲之時出水三尺為度或應加髙或應幫寬逐一估報臣等再加查勘委員儧辦石佛以下至南陽兩岸縴道現在水勢尚未大消即南陽以下現已開工微露堤形之三千餘丈兩面排樁掃由中心填土築堤駕船逺運土方於十餘里之外天氣漸寒河水漸凍人夫水內施工未免力作艱難且臨清州縣俱在儧挑伊河所辦樁料未能如期應付民間小船亦係出入必需難以照數雇募臣等查伊家河業將挑成開放在即約計厯冬入春湖水必日就掣消則前項縴道均可漸見涸露與其凍天興作人勞費重似不如稍待春初氷消日融工作更易經費較省只須臨時多分段落多派官員于青黃不接之時招集民夫就工謀食同未露堤形之一萬餘丈均可接續辦理即或間有水口深濶之處因地制宜或搭橋墊路或用柴軟鑲俱可隨時料理總期縴挽有資以待新運此現在分别辦理縴道情形也再臣等查臨清以北德州以南之衛河原係漳衛合流水挾沙行雖冬令水勢消落之時尚仍巨浸故自元明迄今不能煞壩挑挖厯年大挑俱係駕船撈濬移淺就深此次辦理務在徹底窮源若非逐段測量則淺深不齊恐難一律通暢自當與臨清以南之運河一體辦理但波流沙走向俱移淺就深今議修民堰所挑之土如能堆積兩旁原可增培堤堰土乾之後募夫夯硪足資鞏固以衛田廬若係淤沙又難增纍所有應修之民堰自應仍照臣等原議辦理現在難以懸擬統俟臣等伊河放水之後前往河干逐一測量詳加相度總期公私有禆再行定議其臨清以南沿河亦有民修堤堰應行培補但所挑長河之區與應培民堰之所每多不能湊合臣等確查凡培堰恰值挑河處者即將挑出之土堆放堤邉俟春融土乾之後責令本汛淺壩額夫夯硪堅實不須另請錢糧若實非挑河處所而民堰殘缺應修者一併酌給食米夯硪併案估報此現在辦理民堰情形也再若閘座攸關蓄泄如寺前鋪閘為汶水南行第二座與栁林閘互相啓閉今已樁朽石裂通身漏水應徹底拆修又李海務閘土橋閘建自前明金門較窄江廣船隻體質重大未免稍覺狹礙現今金門一面石塊臌裂俱應拆修並將金門放寬又如在城戴廟邢莊利建韓莊頓莊侯遷等閘身較低易致漫水各應加髙一二三層不等其餘各閘石塊脫落之處均俟水落撈起安砌修整庶運河節宣有制又聊城縣舊閘口大寺東吕家灣並十里鋪添建涵洞共五座博平縣皮狐洞涵洞濟寧州新店新閘仲淺魯橋等處涵洞共五座清平縣李家口張官營陳官營等處水溝橋梁共五道均應修整庶民田坡水宣泄有資又河家壩坐落汶河西岸為泄水北行入運之路今汶河分水口南多北少雖現將南壩接長北壩收短而何家壩壩身過髙北流不暢應照原議落低二尺並挑濬石頭口入運支河庶汶水北流不致偏少俱經委員確估陸續興修此現在辦理閘壩涵洞情形也至伊河工程緊要俱係責成州縣等承挑臣等現駐在工立限報竣所有現辦一切工程先令司員蔡琛和敏分頭勘驗督率一俟伊河放水即星赴各工上緊查辦以期仰慰聖主宵旰憂勞之至意除石佛以上挑河築堤工程核造估册分案具題并應修閘壩涵洞及石佛以下疏築等工分别確估另行奏懇聖恩動撥奏入上諭曰覽奏俱悉此畨大加整頓必期實濟於事不可草率慎之勉之乾隆二十二年十一月二十日海明張師載鶴年奏言竊照微湖積水為災上煩聖慮特命臣等詳加相度設法疏消臣等仰承訓諭旁咨博詢不遑朝夕以伊河舊有河形實為微湖尾閭議請動項興挑可資宣泄荷蒙聖明洞燭指示機宜命臣等速為查辦以拯災黎欽遵於九月初七日間工派委牧令分段承挑並飭司道等官嚴加督儧定於兩月為限緣第七段河身開至七尺五寸有山根一片計長一百丈如令石工開鑿必致愆期有悮放水臣等覆加查勘來源至此不過略為停蓄無虞遏流究恐不能一律奔騰又開月河一百三十五丈兩路分疏以資暢逹是以報竣稍遲其餘各工約於十一日通完臣等謹擇於十三日除日放水仰賴聖主洪慈普被各員奮勉從公敬取永除水患之義以垂久逺從茲澤國災黎咸登袵席盛朝赤子共躋春臺食德飲和凡屬編氓靡不感深刻骨矣除放水情形另行具奏奏入上諭曰欣慰覽之有旨諭部乾隆二十二年十一月二十二日裘曰修夢麟白鍾山陳宏謀髙晉奏言竊查上江地方諸水開通之後皆歸安河以達洪湖安河計長一百二十餘里金鎖鎮劉李埂陡門間段􅌎淺業經臣等奏明挑挖今詳加覆勘從歸仁集以下逐段測量自陡門出口之路此段蘆葦叢生深止尺許淤墊較前段更甚上遊數百里東下之水至此皆為門限所格連年受害之由尤在於此惟是長計二千一百餘丈寬計七八百丈不等水面瀰漫無從扎壩若槩用罱工不獨天寒艱於入水亦且蘆根糾結罱具難施若坐待水涸又恐交春以後舊水未涸新水復生臣等相度􅌎墊之故實因蘆根延蔓水行濡滯嵗嵗挂淤以致十餘里內皆成淺阻但將蘆根先行刨取則􅌎泥一并帶出水流泥活便可疏通查沿河一帶漁船頗衆用錢雇募四五百隻可以不須逺覔并打造鐡耙等器人夫站立小船之上用鐡耙刨取蘆根兼撈􅌎土俟裝滿一船載往近河土坡之下拋棄仍復回船刨取較之水中扎壩及一切罱工其難易大相懸殊且現在即可施工無庸等待是以臣等再四思維舍此無可施力惟是計船給值計日算工不能照土方成法銷算須選擇誠實勤力之員専督其事庶工可速竣而帑不虛糜查廬鳯道寶善驛道蔡長澐現有潁亳宿靈虹等處工程不能兼顧今専委江安糧道錢度總領其事董率試用同知富琦色卿額等協同泗州知州陳韶尅日趕辦以専責成尾閭一通則上遊之水皆有去路而安河河尾壅遏之志可減矣至安河河頭亦有應行再為籌計者查歸仁集外濉河奎河潼河柏家湖林子河羅家河諸水俱入安河來水既衆而咽喉尚屬狹隘臣等業經奏請開濬董家溝一路在案今又勘得歸仁堤迤下舊有涵洞穿入鮑家河以入安河年久湮塞今擬再將此河開通又分林子河一支由此經行則安河進水之地亦有所分而河頭壅遏之患亦可減矣此段現委淮徐河道王鴻勳率同各該縣及委員等并堵缺開閘諸事皆及時估辦所有臣等設法辦理安河及添挑鮑家河一段緣由合詞具奏繕圗呈覽伏祈皇上睿鑒奏入上諭曰甚好知道了又諭曰何須狃於奏銷之常例耶但期工歸實用百姓受利朕不惜費也乾隆二十二年十二月初十日海明張師載鶴年奏言竊臣等於伊家河放水後隨沿運河而北會同臣海明挨次查勘除石佛以下由南陽至韓莊水勢漸見消落轉瞬春融人力可施應築應疏土石樁掃工程臣等另行籌酌具奏外查石佛以上臣等前奏各工內塘河大挑已經照依往例儧辦其增估長河淤淺段落亦經募夫開工逐段挑挖臣等查驗督催均可於重運未到之先完竣至兩堤工殘缺無多亦已估定丈尺土方凍解興修可期經月竣事惟城市村鎮如臨清東昌張秋阿城靳口袁口濟寧及各閘上下民居比櫛多有縴路窄狹崖岸陡峻挽拽難行之處臣等因地制宜或估修片石工添用底樁石灰安砌或估做排樁掃由中心填土其間土性疏懈不能承載樁石者修做防風掃歸於遞年搶修項下辦理至如民間草土房屋搭蓋河邉占礙縴道者若一律興修工程轉致糜費未免所獲者少而所費者多臣等仰體皇上愛民如子不使一夫失所之至意酌給遷移之費令其移後丈許以俾縴挽有資且原係官地本應退還今于格外賞給民情倍加感戴縴道亦得寬展俱已丈查明確飭令該管道廳並同地方官分别估辦至應修閘座內惟有寺前鋪閘木枋損斷兩墻滲漏且無月河亟應拆修土橋閘槽石損壞亦應拆修半靣在城閘亦應加髙並石塊脫落之趙村十里等閘俱飭令動帑辦理以待新運其原請加髙之戴廟閘雖今年曽經平水但本年盛漲實非常年所時有且今已備籌宣泄可不致似從前漲滿應請停止又原請拆修之李海務閘惟金門窄狹但尚可行運即遇江廣大重船亦可由月河行走亦應停止以省繁費再如聊城博平縣境修舊增新涵洞六座並清平縣境修建橋梁五道臣等又查有濟寧州境宋家窪馬場湖外二處亦應添建涵洞各一座均係減泄民田坡水要工臣等已飭於水利案內核估發帑令地方官及時採石辦料儧修第民田積潦多在伏秋而惟時亦係運河盛漲之時髙卑相阻誠難暢注惟霜降以後煞壩以前及每年挑河完竣開壩放水之時正值運河水小坡水可以宣泄臣等仰懇聖恩永著為例令河撫二臣各専委大員屆期親詣查勘確驗內外水勢情形及時啓放宣泄俾得趕種春麥庶涵洞不致虛設民田實為有益至八里廟添建滚壩因本年水勢上厪宸衷俯允臣等所請並蒙聖訓以髙運河底七尺為度其餘閘壩亦令酌量落低仰見睿謨廣運洞徹機宜臣等謹將八里廟議建滚壩遵照諭旨改髙運河底七尺並擬先將徒駭河頭之龍灣馬頰河之魏灣老黃河頭之四女寺各滚壩俱落低髙運河底七尺飭令司道確加估計派委河員地方官查明前運江省就近存剩石料臣等又查有鹽河廢橋嵗久坍塌石塊尚可選用其不敷之數亦即採石辦料次第興修其三空五空平水等閘橋龍灣魏灣減閘哨馬滚壩若此時一並落低倘遇天時久晴七尺之下續有消落或致行運艱澀應暫行停緩俟相度明嵗水勢再請旨辦理總緣本年盛漲實有微山昭陽諸湖頂阻於南漳衛兩河泛漲於北又值沙趙二河同時異常暴長以致盈溢漲滿今既開伊家河以暢其南流又於水利案內現在勘議疏徒駭馬頰老黃等河以導其北注並八里廟及各河河頭皆有落低七尺滚灞預減於平時寸長寸消陸續減耗自不再有如前之漲溢矣至分道汶水北行之何家壩支河頻年淤墊業已髙逾壩身今先將支河挑挖深通亦看遇水情形再為辦理其運河民堰凡係挑河之處即以挑起之土堆放幫培春融土乾即令各本汛額夫夯硪毋庸另給錢糧如不係挑河之處則民􅳂仍須修築又查館陶至德州衛河不能煞壩興挑者臣等已親行履勘岸髙面濶形勢灣環堰距河逺所有應修兩岸民堰已據估計土方造報但準豫省咨覆飯食錢文之例係專指不能計方之工而言今既有方可計似應仍照臣等前奏恩允每方酌給食米鹽菜夯硪等銀六分按方給資易於稽查加以夯硪可資堅實且較之豫省每名三十文之例尚為有減無增擬於春融飭發地方官招集民夫就工謀食上緊儧築以資捍衛奏入上諭曰如此因時相機辦理實愜朕懷乾隆二十二年十二月十五日工部奏言工科抄出江南河道總督白鍾山等題裏河運口建築攔黃壩一道估需工料銀四千七百四十兩九錢一疏乾隆二十二年十一月初四日奉旨該部議奏欽此欽遵該臣等查裏河運口為漕艘經由要道今春恭逢聖駕南巡親臨閲視指授機宜於頭壩北壩外建築攔黃壩一道據該督委員確勘估需工料銀四千七百四十兩九錢零造册具題應如所題辦理以利運行仍令該督將做過工程用過銀兩照例核實造具清册題銷可也奏入諭依議行欽定南巡盛典卷四十
