  text: 程塗謹按聖駕六次南巡俱自乾清門啓鑾由大清門出廣寧門二十七里至宛平縣大井村尖營十里拱極城二里盧溝橋五里長新店二里趙新店尖營五里董公菴房山縣界十五里良鄉縣黄新莊行宫計程六十六里自黄新莊行宫起四里入良鄉縣北門二里出良鄉縣南門十八里宏恩寺尖營二里竇莊七里琉璃河橋十一里俠河村四里仙峯坡尖營七里胡良河橋三里永濟橋三里入涿州北門六里出涿州南門三里涿州行宫計程七十里自涿州行宫起三里鎮安寺十里大樹樓桑村十里三家店尖營五里方官店保定府新城縣界九里衣錦店八里入新城縣北門二里出新城縣南門一里紫泉行宫計程四十八里查乾隆十六年係設大營於五里屯自紫泉行宫起九里至十里舖十里髙橋村五里白溝河尖營十二里西栁村雄縣界十里王克橋二里王克營尖營三里留侯村三里入雄縣西門四里出雄縣南門九里至十里舖二里易易橋二里入河間府任邱縣界趙北口行宫計程七十一里自趙北口行宫起三里十方院五里棗林莊十里鄚州二里杜家營尖營十里司馬莊五里香城舖五里至八里屯尖營二里羅各莊六里南五里舖十二里思賢村行宫計程六十里十六年二十二年俱係設大營於闗張村自思賢村行宫起七里子路廟七里辛中驛二里入保定府髙陽縣界二里入河間縣界二里卞村尖營二十里至八里莊尖營八里入河間府城北門四里出河間府城南門八里太平莊行宫計程六十里自太平莊行宫起十里入獻縣界三里商家林五里水牛店五里黄百户尖營六里臧家橋村八里至五里舖四里入獻縣北門二里出獻縣南門三里盧家莊尖營六里單家莊十一里馬家舖四里錢家莊二里紅杏園行宫計程六十九里自紅杏園行宫起五里富庄驛入交河縣界十一里蓮花埠六里新店尖營七里乾河崖阜城縣界十五里阜城南尖營八里蕭家莊四里信義鄉五里新莊入景州界五里絳河行宫計程六十六里十六年係設大營於蕭家莊二十二年二十七年俱移設新莊自絳河行宫起七里曺家莊九里入景州北門一里開福寺二里出景州南門十里胡家莊七里北劉智尖營九里吳家莊二里南劉智入山東境五里至八里屯尖營六里蘇家莊六里張家莊五里徳州恩泉行宫計程六十九里自恩泉行宫起五里至七里舖六里于官屯五里至十八里寨三里前倉村尖營二里雙廟屯四里興隆寺六里史家莊二里馬頬河係濟南府平原縣界七里曲陸店行宫計程四十里十六年係設大營于史家莊二十二年回鑾始分站駐曲陸店自曲陸店行宫起四里孫家莊二里十方院四里泮吉店八里至七里屯三里馬家莊尖營三里王家莊六里隋家莊四里荆家堂四里宋家莊三里李六店行宫計程四十一里自李六店行宫起六里言家寨五里劉家莊四里小牛莊五里禹王莊係濟南府禹城縣界尖營四里周家莊四里裴家莊三里趙家莊九里馬家莊尖營六里沈家莊八里于家莊六里晏子祠行宫係濟南府齊河縣界計程六十里十六年係設大營於崔家莊二十二年回鑾於禹王莊駐蹕自晏子祠行宫起五里曺家莊七里蔣家屯八里衛家莊尖營八里謝家莊六里左家莊五里安家莊係濟南府長清縣界四里民利莊尖營四里由里莊九里杜家廟四里雙廟屯四里潘村行宫計程六十四里十六年係設大營於蔣家屯二十二年二十七年俱設於衛家莊自潘村行宫起五里垜子山七里范家莊五里崮山座落六里孫家莊七里張夏七里青楊樹尖營六里靳莊七里雙槐樹八里靈巖山行宫計程五十八里十六年係設尖營於開山二十二年二十七年俱在崮山自靈巖行宫起八里雙槐樹八里灣徳四里長城舖尖營六里皮條店四里墊臺六里界首四里小新莊尖營係泰安府泰安縣界五里義合墩八里大埠嶺墩五里至七里舖六里白鶴泉行宫計程六十四里十六年于灣徳恭設大營聖駕幸泰安府城瞻禮泰岱由泰安府取道江南二十二年二十七年三十年俱駐蹕小新莊自白鶴泉行宫起六里感恩亭六里尚家莊六里王家溝尖營七里水泉莊七里北迎駕莊六里南留莊尖營八里北石墻五里土門頭五里魏家莊行宫計程五十六里十六年係設尖營于韓家莊二十二年移設南新莊又二十二年二十七年回鑾登泰岱于泰安城西駐蹕自魏家莊行宫起三里正家莊四里太平莊四里磨莊六里梁家莊四里楊家莊尖營六里栗子莊係兖州府曲阜縣界四里河上莊四里滕家窪五里苖家莊尖營係兖州府泗水縣界七里大李白五里小李白八里中水莊行宫計程六十里十六年係設大營於紅河自中水行宫起二十二里思仁村尖營十五里陶樂村尖營十七里泮池行宫計程五十四里十六年三十年俱由中水即駐蹕泉林二十二年二十七年四十五年四十九年自泮池起蹕六里出曲阜縣北門釋奠孔林仍回中水莊駐蹕自中水行宫起七里故縣村四里小鮑村四里大鮑村四里邵家村四里李家坡尖營六里孔家舖四里黄隂集五里李家廟三里栁河峪五里泉林行宫計程四十六里自泉林行宫起五里白廟七里馬連庄係沂州府費縣界六里栁庄七里純厚庄尖營七里毛陽鎮五里蔡家庄八里西武安八里註經臺行宫計程五十三里十六年係設大營於公家莊二十二年二十七年三十年俱移於永安莊又二十二年二十七年回鑾于嶧山駐蹕自註經臺行宫起四里固城四里栁子溝六里蔣家庄四里東京堡尖營十三里玉皇廟五里萬全庄尖營五里毛峪七里峨庄六里閻馬庄四里萬松山行宫計程五十八里十六年係設大營於桃墟二十二年二十七年俱移於東京堡又二十二年二十七年回鑾駐蹕于時家莊自萬松山行宫起六里和樂庄五里南季家疃十里楊家庄尖