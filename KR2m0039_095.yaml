  text: 欽定四庫全書欽定南巡盛典卷六十三
  hash: sha256:1eec8eb00a3f69c2bd2beb2fda7d7755a1a057944f87ecc4a24f9f42960d6cc7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0039_WYG_095-1a, image: WYG0659/WYG0659-0088a.png}
body:
  text: 海塘乾隆四十七年五月初二日陳輝祖奏言竊照浙省現辦鱗塘二千二百四十丈經臣奏明以四百丈為一限分作五限半辦理每限派委同知等官四員各承辦一百丈按開槽釘樁砌石程式原係層次相承請於初限辦至砌石時即將下限接續開槽遞進挨次蟬聨而下俾夫工不致間斷又以石料係陸續採運到工酌量就各段落一律牽勻先為攤砌四五層俟有續運石料再按層加砌結頂以期工無停待已奉硃批欽遵督飭趕辦並將初限至五限半按工計日原應至本年冬間完竣若加緊趕辦擬於春夏之交蕆事繼此工作更易接辦亦經節次奏聞兹查各限條石自去冬迄春均經砌至六層一律齊平其應辦新工一千七百丈本可照依原奏辦法於二月間即行接續開工惟是通工假落綿長新工一經開工二限之開槽下樁即接初限砌石之後又有原工各限十一層應行加砌之鱗石若一併通勻攤砌不特在工夫匠不能多為添集即往返稽察照料亦慮鞭長莫及查各處所辦鱗石自上年來宕工因係入山生手不能多雇江海運期無定再四設法添工添運今春來石料已陸續運集工次適屆天氣睛和之際催辦之石源源而至核計五月內石料俱可全數到齊似應於原辦各工乘此逐段加髙庶目前多得一層砌築即此後少省一層工作然後一面接開新工則人夫物力均可逐漸節有餘以致力於續辦之工即督催亦較易為力經臣與司道親往督令趕辦今於三月二十日初限四百丈已砌足十六層二限亦已砌至七八層巨工屹立如山洵足永資捍衛鄉民聚觀之際亦無不踴躍歡呼同聲感頌自此按假接續增髙約七八月間俱可砌足十六層其墁頂一層須揀選寬厚長大條石在工所鏨鑿光淨隨時鋪蓋約秋冬之間亦可一律全竣若物料到工應手仍可早得完畢此時一切俱已辦有頭緒新工自當即行開工以便逐漸布置隨時加添工作臣即擇吉於三月二十四日開工酌請分作三限辦理初限二限各五百丈三限七百丈查原辦同知劉雁題等四員皆係諳練熟手應仍委該員等並添委明晰工程之署嘉興府通判張力行共五員初限二限各承辦一百丈三限各承辦一百四十丈凡按限挨次開槽釘樁砌石各事宜悉已逐一酌定章程妥速辦理其應需石料臣公同司道通盤核計另行覓得山宕加工添採並咨明江蘇撫臣閔鶚元照分半採辦之石每月於運工一萬丈外再加運二千五百丈以速要工應需樁木前因浙省各屬採購維艱經臣奏明専委同知方體泰勒限承辦兹據面稟已在江廣各處採辦得樁木八萬餘根均可接續運工濟用至辦工辦料各員如有怠玩因循遲悮者即按其情節之重輕分别記過劾參以示懲戒第恐各員以記過非比劾參視為無足重輕臣酌請將記過各員先行咨部如記過之後實有能奮勉效力無悮工作補贖前愆者咨部注銷記過至二次者飭令離任聽候議處再前項工程自開槽釘樁以迄加砌灌漿層次鱗接鈎連其間頭緒紛繁倘或稽察稍踈即虞偷減滋弊前經臣奏請派委道員周克開印憲曽公同該管之杭嘉湖道盛住劃分三假協力督辦俾稽察較為周密但今該道盛住已升任藩司應另行派員接辦查有金衢嚴道德克進布辦事實心與之議論工程亦頗為明晰並請飭委該道協同周克開印憲曽分段辦理至江南逰擊田宏謨自留辦海塘以來於一切催料儧工等事俱能實力妥辦今應仍令接續辦理以禆要工臣仍隨時往來工所親加督察務祈在在工堅料實永逺鞏固以仰副聖主保衛邉海民生之至意所有現辦鱗塘工程情形臣謹恭摺具奏奏入報聞乾隆四十七年八月二十一日陳輝祖奏言竊照浙省海塘前經大學士臣阿桂會同臣遵旨勘定自來字號起迤東至食字號止建築魚鱗石塘二千二百四十丈以四百丈為一限分作五限半辦理已將籌辦樁石各事宜暨開槽簽砌蟬聨趕辦各情形並測量舊工地勢砌石十七層即一律齊平緣節經臣具摺奏明惟是各處所辦條石上年因宕工多係入山生手未能多採秋冬江海運期亦復無定經臣再四設法添工添採添運自今春以來上緊催促始得應手加砌臣即約計原奏本年冬間完工之限擬趕緊先砌完十六層再為鋪蓋墁頂亦經聲明奏報嗣經臣不時往來工所巡視催查而在工督辦之布政司盛住等皆認真稽察董率晨夕罔懈分委承辦之同知清泰等亦皆實心實力勇往鼓勵其在局在工之同知方體泰等及司事各員內奮勉出力者多人俱隨時按假趕辦已於六月二十六日通工二千二百四十丈一律砌完十六層臣復親臨勘驗但見巨工屹立濱海蒼黎咸歌帝力臣身任其役不勝踴躍歡忭之至其墁頂一層臣現擬於各塿埧運到條石內照估定蓋面頂石丈尺挑採每行止用整石一塊俾無接湊參差䀶迹飭令工員加意監視鏨鑿六面光淨隨時墁砌以期永資鞏固似可不必拘以程限所有原辦鱗塘加砌條石完工日期相應恭摺奏報再查續辦鱗塘一千七百丈內初限五百丈亦於六月二十四日開槽釘樁將次完竣各假內間有土性帶澀極力簽打較前多逾數時逮打深一丈四五尺即沙齧堅牢不能再下看來實屬穩固足資擎載臣并令該司道即按照字號丈尺登載册檔蓋印存案另立號石亦鑿注明白以備查考一面催督各宕加緊採運石料尅期鋪砌並令於二限接續開槽釘樁蟬聨趕辦合並陳明奏入上諭部知之乾隆四十七年九月二十五日陳輝祖奏言乾隆四十七年七月十八日欽奉上諭本日據閔鶚元奏分辦浙江海塘料石情形一摺內稱初次所辦條石十三萬六千餘丈業經全數起運赴浙其接辦之九萬六千六百餘丈勒限趲運扣至明年三四月間可以一律辦完運竣等語該省所辦塘工料物源源接濟陳輝祖自當督率工員趕緊辦理但未知此時所辦工程究有幾分約計於何時可以完竣著傳諭該督令其確核工假按日計算據實奏聞再從前節次所撥銀兩俱留為海塘之用將來工程告竣時是否足敷應用並著該督詳晰確查開具簡明清單一併覆奏將此由四百里諭令知之欽此臣伏查浙省海塘仰蒙我皇上不惜多費帑金一律改建魚鱗石塘以為沿海民生永籌樂利恩甚渥典甚巨也臣于塘工雖素未諳練而重荷聖明之委任更蒙指訓之周詳俾得勉竭駑駘遵例辦理計原估鱗工二千二百四十丈自上年三月初四日開工以來隨時公同司道將籌辦樁石料物暨開槽簽砌蟬聨接辦各事宜親身督率工員按限加緊趕辦已於本年六月二十六日通工一律砌石十六層工程幾及十分業經臣具摺奏報並聲明墁頂一層因現有續辦工程擬於運到條石內挑選整石六面鏨鑿光淨隨時墁砌以期永資鞏固至續估之一千七百丈分作三限辦理自三月二十四日開工後初限五百丈於六月內釘完底樁現已砌石四層并將二限接續開槽釘樁約八月中旬亦可釘完隨即接釘三限底樁統計十月中旬均可簽釘完全其加砌條石現於三限釘樁時即砌初限之石三限釘樁時即砌初二兩限之石毋使匠作稍有間斷並嚴督工員添匠加工併力合作如石料得以湊手應用不致停工待料則按日程功約計嵗底春初通工即可砌完十六層其墁頂一層於明嵗二三月間亦可鋪砌全竣今浙省應辦條石臣現飭紹興等府按月如數加緊趕採無許遲缺果有風雨稽延等故皆可按時而計不得藉詞遷諉而江省分辦之九萬六千六百餘丈撫臣閔鶚元既稱明年三四月間始得辦完運竣則自江省陸續運至浙省工所陸續趕砌即須待七八月間通工始得全完再原估鱗工二千二百四十丈計需例估工料暨恩賞加貼共銀五十九萬五千九百八兩零續估鱗工一千七百丈計需例估工料暨恩賞加貼共銀四十二萬六千九百二十八兩零二共應需銀一百二萬一千八百三十七兩零前經題撥恩賞并賠繳查抄各項奉旨留為塘工應用共銀一百四十二萬一千八百六十二兩零除撥給原估續估工料銀兩外尚多餘銀三十九萬九千二十五兩零臣謹遵旨詳晰查明恭摺奏覆並分别開列清單敬呈御覽奏入報聞乾隆四十八年八月二十四日閩浙總督富勒渾浙江巡撫福嵩奏言竊照浙江為濵海要區全藉塘工保障仰蒙我皇上念切民生時勤宵旰凡有益於修防無不上勞睿慮籌畫周詳海隅蒼生固已咸登樂利復念章家庵至老鹽倉一帶僅賴一線柴塘捍禦全海潮汐形勢單薄特頒恩旨指示機宜不惜多費帑金一律改建魚鱗石塘為萬年經久之計天恩浩蕩億兆蒙庥查原辦續辦之魚鱗石工共三千九百四十丈臣等到任後原辦之鱗工二千二百四十丈面石尚未砌竣續辦之鱗工一千七百丈正在興築節經往來工次親加查勘並督率布政使盛住海防道周克開寧紹台道印憲曽金衢嚴道德克進布及派委承辦各工員等詳慎稽查實力辦理間有打樁未密灌漿不到安砌未妥之處隨時拆修照估改建不敢稍任偷減並將所辦工程於沙水情形摺內按月奏報兹於七月二十四日面石俱已砌竣通工一律全完臣等復同司道各員前往該處詳加覆勘均屬如法砌築整齊堅實洵為金堤鞏固屹若崇墉紳士軍民莫不同聲感頌仰戴皇仁自此億萬年安瀾永慶臣等不勝踴躍歡忭之至除督飭防泛員辨加謹巡查恭候明春聖駕巡幸親臨閲視一面飭司將用過工料價銀按照原奏分别造册臣等詳加察核題銷具奏外所有原辦續辦魚鱗石工全行完竣緣由恭摺奏聞奏入報聞乾隆四十八年十一月初六日富勒渾福嵩奏言乾隆四十八年九月初九日奉上諭從前盛住來京陛見時面詢海塘石工情形據稱老鹽倉一帶因沙性澀汕不能釘樁彼時在工籌辦曽有一老兵言及該工下樁必須衆樁合力同時齊下方能堅實不致已釘復起後如其法試釘樁木果有成效及訪查其人無可蹤迹似有神助等語現在老老鹽倉石塘已一律改築完竣其所稱老兵點指之處是否實有其事富勒渾等即未經眼見不能深悉而盛住係在工目覩之人及從前道府丞倅兵辨夫役人等見此神靈助佑必羣相驚異傳述不忘如詢其事屬實則係神祗效靈如分水龍王廟之白老人故事或於該處建祠以答靈貺亦為捍衛民生祀典所應得也著傳諭富勒渾等詢問盛住並詳加採訪此事究屬有無據實覆奏欽此臣富勒渾於二十四日旋省當即會同臣福嵩面詢藩司盛住據稱前在工所督辦鱗塘見樁夫先用大竹探試俟扞定沙􅌪再下樁木加以夯築入土甚易更復堅固隨詢問工員僉稱開工之始沙性澀汕多有已釘復起難以下樁時有老人指點以竹探試之法用之果有成效通工一體照辦及跟查其人已無蹤迹衆皆傳為神助本司雖未目覩而詢訪屬實因於陛見時奏聞隨行據杭嘉湖道周克開等稟覆無異臣等復又悉心採訪並傳海塘已久辨兵查問衆合僉同至衆樁齊下之説實因梅花樁木係五木攢作一處雖下樁原有先後而將與槽平之際沙土澀滯五樁不無參差必須一齊夯硪使樁悉平俱各堅緊方能補砌石塊是以有衆樁合力同時齊下之語伏思老鹽倉一帶建築鱗工仰蒙皇上念切民依不惜重帑為瀕海羣黎興萬年之利金堤屹峙迅速告成實由聖主宵旰勤求精神感格是以上蒼默佑百神效靈指示機宜巨工得以早竣自應欽遵諭旨昭報明禋查老鹽倉本有潮神廟臣等現在勘修合無仰懇天恩賜製宸章紀其靈異頒給臣等敬勒貞珉建亭樹立廟右仍即潔涓致祭以答靈貺謹恭摺具奏奏奏入報聞
