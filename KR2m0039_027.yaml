body:
  text: 欽定四庫全書欽定南巡盛典卷十六天章庚子江南詩入江南境為憶南邦望幸切春朝命駕此重巡魯齊再至别非久自乙酉南巡後辛邜丙申曽兩至東省江浙未來情更親胥赤子寧分彼此秉青陽與布和仁翕河察吏咨民隱要務非關慶七旬五依皇祖示江南大小諸吏韻鳯麟之所逰豈非郊與棷而兹胡不然此理亦易剖唐虞世去逺王道弗行久君臣應共慊於我宜為首仁皇仁逮今赤子如懷母樂樂而利利南東安畎𤱔但當守良法毋事紛更後咨爾牧民者官針慎宜守重來觀民風尚覺敦孝友迎蹕紛夾塗少者扶其夀施惠厪向隅推行爾莫負龍泉莊行館即事南巡駐皆舊行宫他應駝載御營備張御營處祗餘五江南者三山東二江南之龍泉莊林家莊桂家莊三處山東之注經臺問官里二處上四次南巡均御行營此次該督撫以駝載省費為請因各建行館雖結搆朴素而計費已不啻中人十家産矣大吏因之建行館斯實圖省駝載費入江南境此其一其二按程宿次第雖云朴斫弗丹艧中人十家産不啻疇咨政務覲林下駐蹕後召軍機大臣理政降㫖後即宣江南在籍縉紳彭啓豐張若溎蔣元益史奕昻儲麟趾金士松陸耀宫兆麟等各進見咨詢民瘼幾閒拈筆吟即事即事亦豈賞景光摛辭率以志吾愧降㫖免江蘇安徽兩省積缺詩以志事積缺寧為民願焉率緣灾歉實堪憐行時問俗莫踰是施惠因心非用權入江南境咨詢民隱將江寧藩司所屬災緩未完銀四十五萬餘兩米十七萬二千餘石蘇州藩司所屬灾緩未完銀二萬三千餘兩米十二萬九千餘石安徽藩司所屬灾緩銀四十萬餘兩米麥榖九萬餘石全行豁免俾兩省積缺悉除以紓民力漕項地丁逋並逭給求養欲道無偏儀封企望合龍速庶得災區耕涸田題行春堂龍泉莊行館內行時正值四之春露冕鳴鞭隨萬民不禁歡呼任瞻就那分疆界總尊親于焉止止恰欣朴惟是孜孜切體仁近百萬寬兩省缺循名庶副責其真夜雨二月初六日春雲傍晚忽濃鋪遂霈甘膏半夜濡知已連朝被霑潤那辭前路致泥塗雨珠太守喜誠有漸石僕人勞豈無歌舞農夫怨行路權其輕重學農夫度永濟橋三叠前韻作歌北來平陸行延迤漸南時見有積水固知此邦治水難未得領要議紛起丁丑過此命修橋剔之鬟之俾詳視橋下之水下注為六塘河向多淤埂丁丑經臨籌度命大學士劉統勳等履勘濬培添建閘壩并簡㕔員移駐禁民侵占壬午乙酉再經其地視之悉就理矣自此六塘得宣泄湖水下注中泓裏兹來乃隔十六年橋長流細春時爾夏霖秋潦或可容已成良法毋或毁黍髙稻下各隨宜是在有司勤料理撫字之勞爾莫懈催科之政爾莫恃蒿目民艱猶昔然吁嗟是吾乃所以過宿遷縣宿預過古縣運河俯大隄春烟萬户靄新水一川低吏治入疆察民情我后傒撫兹親切意惠澤可云稽順河集行館再叠舊作韻永濟橋過六里程順河集傍厹猶存仲春適可一朝憩壬午猶思大吏營壬午南巡地方大吏以此間距登舟尚有四程因搆行館數楹為憩勞息衆之所規制朴而且小遂聼之墻外桞條髙下裊盆中梅朵兩三榮撫今豈不追前度每欲摛詞輒繾情䇿馬過仰化集口占䇿馬徐過仰化集萬民迎謁路傍盈顧言扈蹕地方吏爾我寧無愧此名隄上宿霧徐開曉日暾大隄草里度輕軒左慿緑野右運水通漕籌農意合存麥苗芃緑桞絲黃蝸舍漁舟近水鄉日日迎人融冶遞果然有腳是春光有時按轡一鳴鞭萬姓隨行相後先問此人情何以得自維愛養亦多年題展義齊林家莊行館內行館向平原新題額素軒對宜時霽好憩喜朴風存烟景近江國衣裳覺潤暄逭蠲勤實政展義豈虗言賜兩江總督薩載兩江總督例兼河任重事繁資是吪晋也昔聞家訓在髙晋大學士髙斌之侄習聞家訓諳悉河務因簡任兩江總督兼管河務十餘年載弓能集衆思羅幕開建業亦無忝川改陶莊有足多陶莊引河自康熙己邜及南巡時即入覲命開治而河臣率以為難因循未就薩載履任時面諭赴工察看伊即力請開挖引河與余意合遂于四十二年二月奏報工成引河暢逹形勢甚順等語因交部從優議叙給與世職以示奬勵識要輸誠更何諭所期軍肅與民和賜蘇州巡撫楊魁久曽為府道上下習嫺知必不喜趨奉更當體溺饑於奢儉應示既飬教毋遺朂爾勤本務周帎有往規題同和堂在陳家莊行館內時之和為春民之和為親行時觀萬民瞻就胥歡欣博施以濟衆堯舜猶難云一念苟存誠亦無不懷仁名齊永自勵吾豈漫逰巡賜隨營衆臣及江南大小吏食得句示志春郊好雨復佳晴程近午前已駐旌扈駕守疆胥列坐大員小吏俾聨情時和要在叨天賜政乂還當戒已盈一食莫忘憶饑溺君臣職總為民生賜總河李奉翰今調河東總河之任之作耕當問僕世勤司奉翰父李宏曽為南河河東總河簡任南河兩載斯特以豫工須善後因移東省藉深知江南河務雖繁於河東而䂊省善後事宜緊要李奉翰又任河官較為諳習至南河本要任而現在安瀾工程穩固又有薩載兼管陳輝祖隨同辦理自可漸臻熟悉因將二人對調行於無事莫過慎防以其先豈在竒尚此合龍盻佳信關心遙望引愁思賜江蘇學政劉墉曽此司文柄後教習政衡劉墉官翰林時曽任江蘇學政後出為府道臬司俾練習政務洊升至卿二重蒞訓諸生去稗收精鑿駕輕就熟程朂哉莫孤望爾父國之楨題融春齊在桂家莊行館內登舟明日此停驂朴宇於斯憩宿堪桞眼盼春當仲月梅心融雨近江南祗須修葺舊之二圖省馱裝益乃三入江南境舊有行館應修葺者順河集陳家莊二處新構者龍泉莊林家莊桂家莊三處雖藉省馱裝而按頓又增憩宿之所于心䆒未慊耳按頓都看有行館摛詞用以志吾慙閲李家莊新河口髙晋昔建議中河沙埂之黃流況橫截勢應向東移楊莊舊中河口遷李莊新河口避阻而就夷既已從其言次苐工作施却因清水弱前嵗髙晋面請移楊莊中河口于下遊之李家莊雖允其請而意尚遲疑髙晋回任後亦未籌辦逮夏間黃水淤滯清水出口力弱未能迅即施工及髙晋前赴豫省督堵漫口中河仍復遷延待時知必有難辦之勢矣未行尚俟時後薩載入覲面詢何故遲其言似遷就其意我早知昨冬薩載入覲詢及移改中河之事其言雖遷就髙晋原奏然以為楊莊現在河流暢出今因情形異宜窺其意蓋移改李家莊乃髙晋一人之見而未嘗詢謀僉同非必當更張者因諭薩載云果爾莫若仍舊貫議為愈薩載奏謂如是則甚合機宜遂令寢髙晉之莫若仍舊貫則稱實得宜今來親履勘原屬多此為然亦非虛費疏漲或可資茲親蒞履勘楊莊河口原可毋庸移改然髙晋彼時意在避黃河橫衝抵溜之病今雖無用設中河夏秋或遇異漲由李莊新河分出亦未為無益不得䆒其妄費因以此意諭薩載酌行莫非謀民安怙過則見卑閲中河中河酌中定聖制古誰過中河酌實聖祖所定斟盡善也五度經臨熟萬年利賴多進舟斯有待䇿馬此無訛前巡于此閲中河亦皆䇿馬而行度清口始進舟也節相欲更置前春髙晋在京面奏以楊家莊中河口一帶每多淤阻欲移中河口至下游之李家莊自係實在情形雖允其請而意中䆒屬遲疑髙晋并言回任後即擇便興工逮夏間黃河淤淺未能辦及嗣于秋間令髙晋馳赴豫省督辦漫工薩載于改置一事屢遷其期因傳諭詢問則稱楊莊河口近已通暢若改由李家莊往來渡黃須在黃河中多行十餘里而李莊閘壩有開有堵亦殊不易蓋移改乃髙晋一人之見並非實有必當更張之勢詢謀僉同也因諭仍從其舊尋思未易麼楊家閘五依皇祖詩韻御碑亭七十年餘乙酉皇祖此詩成于康熙迄今七十餘年矣拱讀欽猷立為徐曹相學他守勿失陸翁思彼巧中疏陸游詩人謀常向巧中疏保障由來勝繭絲民情河務豈殊移治河本以衛民耳咨爾諸臣宜盡知渡黃河即事六韻河裔駐鑾旌瓣香叩彩棚輕風不作浪細雨忽成晴一自儀封决常懷午夜驚翕川願歸舊憑舫益為怦厪近更厪逺渡黃如渡清渡黃處竟無黃水蓋因上游儀封决口大溜全趨渦淮未行故道以致皆清水耳邇聞工逮蕆昨阿桂等奏引河工程于二月初四日全行挑竣上下一律通順現在大溜直掃北崕臨水土堰并外灘亦日漸刷深初十日內必可開放引河合龍蕆事益切佳音之至默禱盡吾誠陶莊河神廟瞻禮六韻大河南釃北陶莊逼溜恆虞清灌黃幾度興工工未就康熙己邜春河導皇祖南巡董安親蒞河干閲視即􅌎命挑陶莊引黃以河臣國開放過早隨墊庚辰春侍郎常綬遵淤阻㫖閲勘請再挑深辛巳秋河臣張鵬翮請挑中假功皆弗就壬辰甲午河臣趙世顯亦屢挑屢塞雍正庚戌以後大溜南趨更難施工乾隆己未命大學士鄂爾泰來勘仍持開引河之議時髙斌為總河以為工不易就乃創建木龍挑溜北趨為補偏救弊之計于是引河遂置而不論矣邇年黃水倒漾非開陶莊引河更無善䇿因命薩載詳悉履勘遂繪圖貼說以聞余復于圖內往返指示議既定即于丙申秋興工至丁酉仲春工蕆開引放溜極為暢順引河遂成因命建河神廟以答神祐詳見御製碑記一時賴佑佑誠長改前果向新渠徙善後還培舊壩障用答神庥祠宇建永祈民宥肆籩薌瓣香此日申誠悃峻碣多年志感慶丁河神廟碑酉年建皇祖鴻謨幸因蕆守成惟勵敬無遑閲木龍叠乙酉韻清口木龍向久成逼黃不致灌乎清陶莊改溜去南逺新渚護沙移北營清口木龍始自乾隆五年前河臣髙斌因南岸御壩迤下險工奏請建設木龍四架挑溜北趨頗著成效嗣壬午乙酉南巡閲視復經指示陸續增至七架以資逼溜護灘自乾隆四十二年開挑陶莊引河于第四架木龍處築攔黃壩溜勢改北去南漸逺所有五六七三架木龍在新壩東􅌎入土中經薩載奏明啓拆復經指示于頭架木龍上添改一架又於陶莊新河峙家莊南岸改建木龍三架以期冲刷北岸灘土甚為得力是木龍挑溜掛􅌎後並可啓拆改建事省而功倍實為補偏救弊之良法救弊補偏未可少抽薪於釡永無驚木龍雖補偏救弊逼黃挑溜使不致灌入清口固河工內不可少之法至陶莊引河新改使黃水直北趨下不復有倒漾灌清之虞則誠釡底抽薪之計也雖然應識滿招損謙鞏吾惟盡此誠觀清口出水志再叠舊作韻壬午定水志兩壩去其擁然實有節制非聼一往送亦弗害蓄清禦黃有束縱不過束縱間拆築費楗葑自從定此制殊無費太重較之下河灾鄰國為壑供所以數年來民鮮昏墊痛從來涉河務其議如聚訟兹實出獨斷幸免執已用下河屢獲收室家逭乏空河臣守此䇿竅要頗稱中戊戌秋河決竟掣大溜動賈魯不能容睢淮因致洶尾閭歸洪澤株守斯害衆預命開五壩前嵗豫省漫口之水入于賈魯河由睢河渦河而行遂為淮水歸于洪澤湖恐湖水陡長難展清口兩壩宣泄不及諭令薩載等于五壩留心預防尋據奏清水勢大以次開放五壩幸無潰溢為患雖下河不免被水但其時早禾已經刈穫所種晚禾無多即有淹浸之處尚不致成大灾臨期漫􅘓􅘓因為之以漸湖河叠疏控下河未大灾無聊之思綜懷哉切痼瘝恧矣對稱頌閲河五依皇祖詩韻禹之行在無營知者後來異所行皇祖閲河垂至訓惟期稼穡底平成謁惠濟祠惠濟千秋䝉庇佑崇祠枚實見河干十餘年别今朝謁一片誠同昔日殫不動微風剎竿靜暢流清水巨川寬大河北徙陶莊後益賴神庥永奠安阿桂等奏報引河已放溜詩以志事陶莊籲神佑即日得佳音陶莊引河初成即敕建黃河神廟以答嘉貺兹初十日渡瞻禮神祠默致䖍禱即于未刻得阿桂等馳奏稱初六日晚間開放引河掣動大溜奔騰下注至初七日卯刻已過百里外之和好地方且初開時金門頓落水一尺次日又落四寸察看引河實已掣溜六七分現在相機堵合等語是甫瓣香申悃數百里外即荷神佑垂貺更期迅速合龍耳引溜就新速歸川赴舊深翕流庶無變垂貺信昭諶必俟合龍後吾方敢慰心慈雲寺瞻禮招提久建運河濆題額依然仰聖文慈雲舊係小菴雍正十二年辦遂皇考敕建慈雲寺命淮關監督年希堯督成大叢林因僧玉林住持仍令其派下承接云為闡宗風期悟徹重臨南國致瞻勤幾畨掖輦明如幻一晌登雲忽不欣已是拊膺思昔日那堪翹首望慈雲閲老壩合龍處甲午秋漲盛老壩黃河決㴞天勢莫遏萬姓遭臲隉賑救不遺力督催速堵缺草日奏功成明神佑誠别甲午八月外河南岸老壩口隄工漫溢大溜全注決口板閘淮安一帶俱被水淹當飭趕緊堵築于九月初八日開工進掃至二十八日合龍兩旬功蕆實賴河神佑助云兹來視隄工出水髙凸凸瓣香致敬宜安瀾籲以切老幼紛隨輿溫飽多歡悅元氣似已復閭閻亦填列而我一回思往事不忍說閲淮安石隄三叠前韻淮安無不安清河並入海然而安難哉至今難更倍辛未始南巡土隄以石改癸酉並漲時恃此為寧載淮城西北舊皆土隄辛未南巡臨閲始建石工癸酉河淮並漲淮城幸賴石隄之利惟蘄奠昏墊那惜勞畚橇是後凡三巡粗識其原委然乏永逸圖宵旰厪心每亦惟事補苴何有垂範楷甲午决老壩岌岌淮城殆蕩析壞廬舍遷避市為罷亟命速堵築草日功成愷甲午八月髙晋等奏十九日外河南岸老壩口漫溢過水大溜全注缺口附近之板閘淮安一帶俱被水淹房屋人口俱有坍損城垣幸而未頽隨即飭查撫恤尋據吳嗣爵等奏淮城南門外先已乾涸東門外亦涸出里許西北二門早築一壩阻其進水居民陸續遷歸故廬城市早得安業因飭河臣上緊堵塞決口二十日即合龍兹觀雖少慰回憶心猶駭過淮安城御舟小泊射陽城登岸還教䇿馬行翠蓋錦旍徹儀衛風鞍露冕決民情弦歌那聼八音奏婦子稍欣百室盈甲午回思灾甚劇今來額慶爾更生過寶應縣傍岸艤蘭舸度衢攬玉韁民情益親切土俗念周詳舊號平安漢新稱寶應唐若論豫夙志惟是祝綏穰閲壩南關迤邐接車邏封土下河受益多壬午南巡親臨酌定視五壩水志預開清口以泄湖水其山盱五壩封土不令輕拆下河十餘年來遂獲連嵗豐收戊戌洪河經異漲預防思患早開矬戊戌秋河決儀封下游入洪澤湖清口兩壩悉行展拆猶減泄不及因敕薩載等留心預防無已啓山盱五壩歸之髙寶諸湖及歸諸湖不得不開南關車邏諸壩歸之下河幸早禾已收晚禾補種無多尚不致成大灾彼時權其輕重為無可奈何之辦理耳權其輕重誠無奈那免閭閻被薦瘥惟冀儀封合龍速不資壩減永嵯峨過髙郵州髙郵昔水鄉五壩減水受自定清口志封土五壩守前此啓五壩以泄洪湖盛漲髙郵等處下河一帶叠被偏灾自壬午春親臨相度酌定視五壩水志展拓清口東西兩壩為釡底抽薪之計其山盱五壩不令輕拆從此下河連嵗豐收乙酉南巡已觀成效十餘年來屢獲有秋下河連嵗收蓋藏比户有戊戍黃河決水向洪澤走尾大恐弗掉預減咨可否戊戌秋豫省黃河漫溢由賈魯河睢河渦河入于洪澤湖因恐清水驟長清口兩壩宣泄不及湖不能容屢敕薩載等留心預防未幾清水陡漲洪湖不能宣納清口悉行展拆仍未能泄減薩載等以次啓山盱五壩歸之下河所幸早禾已經收獲晚禾補種無多浸沒有限遂不致成大灾因為之以漸未大灾田畝己亥亦如斯幸矣邀天偶兹來觀閭閻頗覺相安阜然而憂民心益甚以日久至維揚即事小雨北風起蟄雷是日始聞雷夜隂曉霽進舟催日暄景麗春方仲幼挈老扶民總來稍厭笙歌特煩䀨不嫌梅竹作清陪竹西小杜曽留句何事唐時已有開上方寺蜀岡此其尾登岸必先臨尚逺笙歌沸却欣松竹深山僧習俗禮野鳥解禪音顔李贊吳畫查然莫可尋駐蹕天寧寺行宫再叠舊作韻梵寺天寧䢴水邉行宫右側駐旌便重來仍值仲春月别去忽成十六年柏樹喬偏增古貌梅花放不入時妍軒齊依舊景非昔東望惟增意黯然天寧寺行宫東即為奉憩慈寧之所今咫尺軒庭如舊情景非昔瞻望惟增悽感題大觀堂大觀玩象羲經示設教省方義最該必有休民敷政化寧因適已事徘徊神心契處忘今昔天下為家那去來理萬幾餘得清暇拈毫也覺暢吟材文滙閣皇祖崇經訓圖書集大成分頒廣流布髙閣此經營閣中貯分頒古今圖書集成此閣亦倣范氏天一閣為之規擬范家制工因商衆擎亦堪匹四庫四庫全書繁重不能分貯各處故祗賜圖書集成一部永以貯層甍慧因寺淨慧本無因善因亦有慧無實淨之根有以善為蔇而總非全提全提泯文義大士坐如如默然示度世青琅玕館口號矗矗干雲步步圖靜披細籟奏笙竽青琅玕信和闐顆戞徴含宫似此無題淨香園花以香為淨人因去有來春秋十六閲嵗月隙駒催徑入真玕曲座仍假竹陪入青琅玕館仍緑竹參天而軒中坐處雕木成竹為屏榻巧而不傷雅巧還不傷雅拈句亦宜哉題趣園日涉園成趣别之十六年景光仍似昔嵗月暗為遷隄桞眠還起山梅淨以妍略徘徊便去桂楫指前川遊平山堂叠壬午舊作韻䢴江昨日艤行舟清曉平山作勝逰七字昔年賡舊韻春秋十六閲如流慧因寺裏參調御淨善聊為辦有無題慧因寺詩有無實淨之根有以善為蔇之句可惜僧雛不識此施檀熱閙羡金夫杜詩休說李唐朝千百年來事已遙豈啻笙歌二十四略嫌雜遝壓溪橋漫教警蹕肅呼聲老幼任趨縱與橫到處欣他親切意不孤多載愛民情功德平山一脈岡棧途跋馬尚無妨歡虞皥皥忘分别底事子輿較霸王精藍色色與空空丈六無為罷六通到此應忘一切地而何㸃筆騁吟工賢守清風一緬思四字為御題皇祖奎文千載永留兹至今大法小亷者垂訓依然凛昔時逰餘亦命返帆揚川路韶曦暄且涼岸轉舟行回首望緑雲叢底淡烟光題倚虹園今朝駐蹕饒餘暇園倚虹橋路不賒畫舫命逰任瞻就溪堂近水實清嘉岸傍大吏周咨度川引洪流恐致差過倚虹園詢問薩載黃水到徐州之信據奏尚未接禀報計日應到而未到恐前此阿桂等所奏開引河或有更變深為懸切薩載亦以為慮如旱望霖愁更甚那更閒緒賞烟花逰康山即事二首䢴城䇿馬進南門聞說康山舊蹟存誰識濬河疏運道康山在新城南門內髙三丈許無石骨蓋昔人濬運河時積土所成因築山館志書未詳所始亦弗深考耳竟成築館作名園時花二月之中遇古樹千年以上論為倣畫禪書四字舊有康山草堂四字額欵署董其昌書以康海落職後曽來宴飲得名但筆法不類香光因倣董法重書四字賜之似於不似緬叉㾗汴州節木久名揚陶榖清異録云廣陵東南一都㑹凡百頗類京師號節木汴州更說康山有草堂城市已云擅幽絶石刻米芾城市山林四字似屬僞作管絃何事閙紛忙愛他梅竹秀而野致我吟情靜以償略步樓臺髙下者謂應數㸃愧香光新調河東總河李奉翰奏報黃流已至徐州詩以志慰清曉正慮河恐復有更變卓午接奏章徐州黃水見川流六尺餘歸故道機現十六日午刻李奉翰奏到十四日至徐州見黃河內黃水增長六尺八寸現已平槽溜行迅速此係儀工引河成功大壩定已合龍等語覽之欣慰惟佇望阿桂等奏到耳阿桂何未報疑信猶參半佇待合龍信吾憂或少間塔灣行宫四依皇祖示江南吏韻以休存夏諺時邁著葩經同任民父母莫忘物毒亭食衣雖稍足熙皞未全形咨爾法亷者毋勤供蹕停題得閒堂卯發辰牌駐程才草里強是日自揚州至塔灣春雲閣雨色野岸淡烟光到早得閒早書堂遂額堂傳宣謁疆吏仍是萬幾忙微雨微雨午前密江雲暗逺天無聲惟潤物有喜是宜田梅蕚姢如洗桞條重欲眠蜃忩憑眺處緑麥正芊芊阿桂奏報將合龍形勢詩以志慰未敢稱功就先期逹喜音金門溜已斷竹箭落猶深阿桂奏儀封決口于本月十一日午刻兩壩攏合隨上緊填壓未逾數刻金門立見斷流大溜全注引河但尚有一二腰漏處未屆十分放心不敢即馳報合龍然十一日金門業已斷流大溜全入新河壩腳俱係停水而長水亦已消退等語腰漏誠無礙腳停亦漸沉黃流將到浦薩載奏黃水已長至九尺餘十六日已據禀報黃水已到桃源境內距清黃交滙處不過百餘里蕆事庶幾今塔灣行宫五依皇祖詩韻五度南巡五嵗華亦經五次韻賡麻豫逰敢逞己之欲中外由來帝者家聒耳早嫌絲與竹怡情那在鳥和花堯年行館惟斯一兹漸多空言戒奢過瓜洲鎮瓜字原為江裏洲閘成潮不到揚州蔡寬夫詩話云潤州大江與揚子橋對岸瓜洲乃江中一洲唐李紳詩云揚州郭裡見潮生當時大江之潮揚州固嘗見之自瓜洲以閘為限潮遂不至揚州記載家遷就失實嘗訂正之詳見向所作廣陵濤疆域辨從來記載多遷就各報見聞滋怨尤無暇因他考古蹟有心惟是切民謀甲申憶被坍沙後甲申六月髙晋奏瓜洲江水長發丈餘回瀾壩岸坍嚙至七月汛平加甃碎石江塘復完十餘年來頗為安鞏今閲視民居較之前巡所見益覺稠密矣重覩閭閻奠以稠渡江不藉稱帆利真如渡鏡空雲頭霏細雨江面斂微風艤岸方知到得門乃自通瀆神信昭貺欣感意何窮至金山駐蹕作畫舸長江茲五度較前四度景嫌殊雲瞻日就情仍彼逰奉歡承感切吾未可罷巡以民戀依然安泛賴神扶金山純粹而精處秀助吟酬那得無金山寺五依皇祖詩韻治安端在萬民和欽仰堯勳自勵多即此林林迓鑾者心誠如保中去聲云何題鏡治齊浮玉中行齊向曽額鏡治憩宿偶循名於斯有二義一曰鏡在民果得教飬遂一曰鏡在已屋漏可無愧自審多未逮徒言何濟事返躬每以先玩景猶其次逰金山寺五叠蘇軾韻觀我莫若觀乎民浮江即似浮於海君師責匪道不行遐想乘浮愧應在泊舟茲復逰頭陀風恬曽弗揚微波長流萬里奚啻萬西源東委興懷多往來梭織行帆揖四民赴時爭一日飬欲給求其艱哉省方亦曰厪黎赤海門湧出玉蟾魄光耀巨川練非黑而我夕窗方映明擬賡蘇句心先驚欲罷不能羞不識險韻依然一體物流者為永峙者山曰流詎巧峙豈頑峙流祗寓樂而已何係仁山與智水題文宗閣皇祖圖書集大成區分五百草函盛空前絶後菁華煥內聖外王模楷呈秀稡江山稱去聲此地文宗今古貯層甍略觀大意那知要知要仍惟在力行金山四叠舊作韻大江洗不盡山青色匪色還形匪形萬劫以來天與淨九州之內地稱靈仲春月值景方鬯十五年過蹕重去聲停為憶前巡掖輦處措詞無緒意冥冥試看欄外東流水恰似胸中一片天魏躓吳顛同是戲風聲月色自為仙鏡呈上下照終古樓貯圖書始近年前嵗賜古今圖書集成一部于金山行宫鹺臣建閣以弆并請扁額名之曰文宗閣並御書江山永秀額賜之翻笑開函難遍讀無邉景物遞關連觀濤樓作歌觀水有術必觀瀾濤實為瀾之大者海固最巨江次之較於湖河更雄也層樓峙立俯石排盈川皓氣向東瀉習習微風略鼓之漻淚奔騰難狀寫洞心駭目不可視萬變千竒幻真假榜者於中若無事持心既定任上下叶古人於此亦有言南人之舟北人馬須㬰風定浪亦息適才見者都無把登金山塔頂四叠舊作韻大江東望玉簮尖忽到拾登百級兼無地有天雙目豁撫今思昔一心恬十餘五載景重閲四叠七年韻再添拙速雖然遜響鉢亦非鬚斷數莖拈自金山放舟至焦山五叠蘇軾韻輿情望幸酬深耽用是五舉巡江南金焦兩㸃矗波翠何異前三與後三路便聊以駐信宿要因省方觀田蠶懸華結綵稱祝頌何德被民增怍慙昨者浮玉憩山館今朝順流漾江潭西以屋勝東樹勝敷葉吐蘂春未酣未酣之意勝酣矣即斯三勝誰能談侵尋譙亦有建置莊嚴定慧寺名康熙二十三年賜額輝珠龕那更峰頂事㸃綴譬之食蔗窮其甘東坡艱韻忽五叠雖曰逸興寧非貪黃頭桂楫候已久清賞既適歸亦堪佳處無須重繫戀倩閒雲為封巗菴清寄堂書堂古寺側清寄向曽顔一十六年别青春片刻閒吟安松竹裏瞬息昔今間俯視東流水何嘗有往還竹樓竹樓此日復相過覺比前遭鳯尾娑背念王家記中語􅎈然髙致恐輸他海門庵東向江連大海溶丸泥那得此門封扶桑曉旭紅雲湧泰岱何殊日觀峰逰焦山作歌三叠舊作韻既是名山那無屋譬人盎背必有腹頭陀應弟焦先兄如氣相求相應聲東西雙峰秀拔水在此曰此彼曰彼其實一脈地根連何有於行暨夫止知之而復云來逰斯則鄰非弗鄰是春和日麗正良辰山僧速客意甚勤輕輿減從試攬勝不教緹騎呼紛紜羅漢巗傍得入路瘞鶴崖畔尋遺文棧道步步入叢雲青玉島俯江波氲由東而南漸夷曠僧菴民舍相區分周覽原未消半日回舟兩岸景吐吞江天一色逺莫辨斷續鐘聲時尚聞甘露寺再用張祜韻古寺枕江岸上方絶世埃春能醒物睡佛已識豫來徒和張祜家句那尋李德裕氏臺浮雲為去聲攬景歸岫一時開平風靜浪歌風以浪為用浪以風為鼓風平浪宜靜浪靜風平覩一解我泛揚子亦數度無不平靜邀神祐百神受職總天恩敬天感神銘心所二解昨日微雨今日晴焦山速客亦已誠往來畫舫大江渡何異太液與昆明三解浪自靜風自平巽二坎六息應聲布帆弗掛寂五兩軋軋雙櫓乘波鳴四解中流攬景猶餘事心恬因亦理解生大之無極而太極雖互為根靜肇成次之物來而順應為順應者自靜呈五解觀水雖有術觀瀾亦末矣不如寥天一無動契其始告彼抽祕騁妍者曷澄其末返而求諸六經㫖六解䇿馬過鎮江府艤舟䇿馬過毗陵為便就瞻郤輦乘那禁笑呼任前後頻詢疾苦切憐矜省方首在官方飭籌治惟於民治徴感豈易言弗致畏不嫌雜遝謂相應登城霞閣三叠舊作韻二首駐舸教依岸鳴鞭爰度衢詎寧事掃􅎈卻覺過勤劬層閣知臨水三分緬昔圖閣名為董其昌題俗為之三義閣未能便顛魏無已且親吳世逺泯傳說時巡競祝呼萬民傒我后代匪后來蘇涿鹿近經郡樓桑尚有衢建興真不肖諸葛惜虛劬川水仍常鏡城霞逺入圖耕桑殊盛昔文物向稱吳忩蜃略閒憑墨娥可便呼八章酬八韻叠倣聚星蘇黃河至清浦黃河至清浦薩載連日奏報黃河水勢加長今復據奏十八日徐城志樁長水一丈一尺餘山安㕔禀報雲梯關長水四尺九寸溜勢湍急全黃已復故道直逹歸海等語是黃水已過清黃交滙處所直赴海門可為欣慰斯為歸壑定雲梯關非遙交滙故道競河決逢已屢弗久合龍併此畨閲兩嵗久為吾民病儀封決口自四十三年七月至今幾及兩嵗屢屆垂成而毁向年堵築漫口從未有似此久者宵旰冀功成發帑吾弗吝叶重臣往經理竭力無餘賸引河大開寬始得溜還正此次漫工前後撥給部帑並兩淮鹽課銀五百六十萬兩並命大學士公阿桂前往經理近復將引河大展寬深又接作挑水壩逼溜北趨始得黃水歸還故道惟阿桂等慎重奏報尚未得合龍喜音仍未免關心北望耳惟因慎其事未報合龍竟關心仍北望既慰益顒敬逰寄暢園再叠丁丑舊作韻江表初看山勢鴻埠墩西放一舟通秦園蕭寺相鄰近水閣雲忩小憩中視昔由今興堪託松聲泉韻畫慙工倣斯早已成八景于萬夀山左倣斯成八景名之曰惠山園愧是卑稱大禹宫惠山寺四叠舊作韻惠山依舊矗青螺層叠禪林護呿羅一片赤心忘今到幾莖白髮較前多慧枝演法髙還下忍草當春婆復娑禮佛而非佞佛者留詩最是好檀那圓池圓池圓中規恰似月之滿石洞在其上夏凉而冬暖方池方池方中矩本自圓釃出清冽遂不及惡居下流述至蘇州䇿馬入城安福艫維運水濵玉鞍徐控入城闉可知其切覲光衆總是此衷保赤民少者壯而壯者老别因久故久因親銀牌分賜諸耆艾自笑吾年亦七旬凝懷堂三叠舊作韻展義觀風俗勤民念食衣豫逰切休助言行慎樞機憩宇體無逸瞻簷思入微奎章揭道趣三字萬年輝阿桂等奏報儀封合龍工成詩以志慰決隄雖幸築時和四十三年秋間儀封與時和驛先後決口乃時和驛漫口塞而復開者再至十一月杪始得合龍而儀封新工復有蟄陷遂至濡滯年餘工滯儀封一嵗過治水江南宣手熟儀封漫口後即命大學士髙晋率諳習樁掃之將偹李永吉等馳赴豫省董助堵築屬薪山左運肩摩儀封堵築漫口所需秸科較多恐本省採買不敷曽兩次諭令直𨽻山東于附近豫省地方各購買秸科運往應用幾成復變誠胡謂儀封之十六堡屢築屢衝因復議移于七堡築順黃壩又于王家莊展開引河以掣溜勢西掣東穿竟若何幸以開寬引大溜上年十二月內阿桂等奏請將引河大加開展寬深又接作挑水壩逼溜北趨黃水始掣入引河復歸故道金門合龍乃能翕受復原河文堙徒憶酸棗叙武作應同瓠子歌慰以為慙功奚有祗寬賠例廣恩波此次漫口幾閲兩載始獲蕆事合龍報到為慰復以為慙即在事大臣如阿桂等亦自不肻仰叨天功更邀甄叙惟司員及司道知府等官非大臣可比仍令交部議叙至漫工糜費銀兩照例亦應著賠但此畨辦理情形實非比前數次阿桂等悉心經理亦不遺餘力所有用過工料銀兩悉准奏銷毋庸議賠惟決口䆒由平時防護不慎所致因傳諭阿桂查明河臣姚立德撫臣徐績任內所辦隄工嵗修分别著落賠補勸彰懲勸并宣示中外令知辦理庶務一秉大公云獅子林再叠舊作韻山莊御苑雖圖貌避暑山莊與御園均仿獅子林而數典實自吳閶是同是異尚覺舊踰于新耳黃氏倪家久繫心恰以金閶重蹕駐可忘清閟清閟閣在獅子林中一言尋略看似矣彼新構祗覺輸於此古林壬午摹成長卷在展聼松竹答清音題虎邱雲巗寺虎邱上復雲巗寺略覺畫蛇與足添一切有為法如幻六時無作笑何拈磬聲自逈落而下劔氣於今久亦潛側有行齊供靜憩翻書聊當閲華嚴靜觀齊虎邱最是繁歌舞卻見堯年額靜觀我有還淳返朴責繹思垂訓意遑安含暉山館山館重來憩忘言却似歸偶參禪偈靜不異道心微庭有松隂冪床無花雨霏最繁簫管處巗閣祗含暉虎邱寺五叠蘇東坡韻蘇城北平原拔地起崇嶺其磴五十三其澗通深井嶺頂法王宫浮圖矗雄耿梵唱落雲間絲管真䀨黽虗傳虎踞巔徒說劔飛礦盡信不如無論欲戒竒猛玉局同此意妥貼新詞騁用韻不妨險廢食豈因硬逮茲五叠之雖遜響鉢頃拙速頗亦成足遣清興冷仰蘇樓咫尺致我睪思永旋蹕循山塘厯厯觀民景鐘聲漸以逺針尖餘塔影顧問扈駕臣可誤奏章請逰支硎山再叠丁丑舊作韻未改山腰石腳泉支公别卻十餘年可知無住光隂幻便是有為清淨禪大似翻經參半滿不殊懸鏡泯中邉既然一切應無礙底事回思復愴然支公庵支硎山復經蕭寺松韻泉聲總快情却笑上人稱善遁至今仍未遁其名題寒山别墅支公菴甫過别墅面前看滴翠圍橫嶺濺銀落激湍向知有行館便可憩逰鞍偶憶宦光事寒山未甚寒朱彛尊明詩綜趙宦光字凡夫吳人饒于財卜築城西寒山之麓陶洗泥沙俾山骨畢露髙下泉流凡逰于吳者靡不造廬談宴廣為樂方云云雖山以寒名而梯巗架壑構築精雅甚且廣結交逰絶不類寒士所為知非陶淵明輩之真隱也緑雲樓支硎小嶺過非遙别墅寒山近若招遂進牆門尋曲徑便登樓級憑虛寮緑雲題額橫松棟繡野連塍豎麥苖嫌彼亭臺增㸃綴無過走馬看中消飛魚峽三叠前韻溪魚異於海那有翅飛然海中魚有翅能飛江湖之魚即不能飛况溪魚乎訝此胡名峽豈其遂奮天設如燒尾喻益逺曝腮仙觸景聊成詠猶慙四十賢馳烟驛戲題稚圭文孰移於趙我此省方非隱淪老尹却云看山似凡逰覽所至不過略觀大意尹繼善曽比之馳驛看山言雖近戲頗合余寓意而不留意之㫖憶其語亦憶其人對瀑三叠前韻山為道人骨瀑即地仙髓小對兩相忘無物可持洗題澄懷堂懷藴方寸間澄或資乎境內外似倒置斯可喻而省譬之鏡設前弗對安知影影現緣對者則仍在已領别墅固明秀數嵗空孤景而覓懷不得乃因澄以靜欲遂忘言詮物物任平等清暉樓一泓池水碧而清圍映山暉漾影明鮮與層樓湊詩趣無勞響鉢亦詩成寒山千尺雪四叠舊作韻一十五載别寒山重巡依舊臨山泉泉聲山色本如是以何為委何為源澄懷胥可㑹理趣觸目無非契道詮適來别墅寒山暫逰憩輕輿遂命曲徑緣至閣坐而聼昔雪六花落峽為潭淵聲非聲亦色非色但欣濕潤蒸巗巒曲注肖之塞上塞雄流圖以田盤田西苑略葺勝朝蹟而皆視此鼻祖然向于熱河盤山竝西苑仿照寒山為千尺雪復于盤山自寫千尺雪圖而命張宗蒼寫寒山董邦逹寫西苑錢維城寫熱河各為一圖四卷合裝分貯四處要以此為鼻祖云四圖分弆於四處興存得一函三間聼雪閣四叠舊作韻雪落千尺髙其源本澗底斯乃假名象取譬言之耳六霙那計尺實固勝幻美實雪有時罷幻雪無時止又似幻勝實試看憑而喜因悟一切說炙轂艱窮始巗泉付不知如是淙而已五依皇祖華山詩韻更入向西路春山幾叠深新題選竹刻舊詠被苔侵寺鮮參禪侣庭來聼法禽雖云騁逰目隨處仰堯襟駐蹕靈巗四叠舊作韻十六春秋一瞬中靈巗重駐昔行宫瓣香梵宇先瞻謁步輦雲衢西轉通古樹護門到春緑閒花繞砌映曦紅晚來書室消清暇鐘韻悠揚恰在東臨湖榭向南山榭曰臨湖幾餘坐可盻具區具區雖逺見不逺意之到豈到之殊東西洞庭峙萬劫洞天竒語多半誣香水溪實在眼底越來由此曽傾吳撫景弔古遣清暇亦云逸興遄飛俱何來圖近新築葺此次南巡屢諭該督撫行宫名勝一切照舊勿稍踵事增華而楊魁乃于西蹟山程園中㸃綴數宇以圖近觀太湖成事不說撫景祗覺增慙耳成事不說徒慙吾成事不說徒慙吾弗此欣夫轉懼夫靈巗雜詠五叠沈德潛韻昔憐德潛老驟用緣鼓舞誰知引宫墻圬乃於糞土德潛年六十餘始得第憐其晚遇選入翰林屢擢至禮部侍郎加尚書銜以示鼓勵及豫告歸里仍准食俸于詞臣中受恩最深德潛宜如何感恩守分乃唯利是圖甚且為逆犯徐述䕫作詩序使其身尚在自當明置典刑得逃法網實其幸耳述䕫實亂民為序託李杜生當正以法幸其人成古右館娃宫不以人廢言其詩實斐然茲復至靈巗成詠聊記年仍五叠原韻水遇渠必湲琴臺接館娃絶響誰欲眠右琴臺石洞山半腰那可搆廊敞而曰有屧音捕風率傳響潛既訛以訛余亦莽其莽拙速足成萹未可無言往右響屧廊雜詠第四章髙閣吟涵空茲實有層宇拾級披清風是耶亦非耶名象混魚龍五百年之後將復傳離宫右涵空閣左日而右月一例於山頂誰與分甘澀蘇州府志載山有二井謂之日池月池相傳右甘而左澀試之殊不盡然無過虛捉影中冷固勝此無勞試修綆即今吳宫非餘此不改井右吳王井泄然一泓水颯爾萬古泠誰名曰研池虗印青天青吳王聲色徒那解溪藤橫日夕悅越姬越兵來不驚右研池吳宫多芳草揚風而浥露羣姬日采香勞勞玉腕素以供夷光用椒蘭焚曉霧旋起絲管聲響送西舂暮右采香徑德潛詠玩花意在悅山谷惜其幸晚逹而反不知足每為諛墓文不辨涇渭渌仆碑非魏徴德潛因徐述䕫逆詞案發廷臣僉議應削奪階銜祠諡並仆墓碑以為衆戒因從之此實德潛忘良負恩所自取非若魏徴為媢者毁短言徴録前後諌爭語示史官唐太宗滋不悅仆所為碑者所可比也疵行無能浴右玩花池穹窿山上真觀叠乙酉舊作韻古觀崇椒奉玉真蕭臺重仰鬱羅親求仙那問乘六氣祈嵗惟殷撫五辰偶爾小逰出塵地已教久候覲光民鳴鞭吟興知誰引鄧尉非遙即右鄰鄧尉山恭依皇祖松風水月額三叠舊作韻卉裏有三友稱兄定是松依然鄰弟季肅若緬題重惟是含香淡不妨取䕃濃漫云别之久來往每于胸右松四字額垂古五言韻叠風仲春雪霏白初日海升紅習習悠揚遞恢恢境象融即斯標至道何必訪崆峒右風青青鄧尉山白白太湖水山固如大庾水豈讓西子寫韻瀾漪間㺯影鏡光裏宸章不言梅括盡梅之㫖右水問梅何所宜不水則於月浮動漫重儓孤髙信超越印處玉是姿照得冰為骨奎畫朗千秋春芳亦無歇右月鄧尉香雪海歌四叠舊作韻閲十五載久别吾即今重逰恍似初山陽山隂各執見圖經志乘多增誣大地豈不在海中豈繫一邱一壑之卷舒辛未祗偶山陽到丁丑山隂始識模爭竒竝秀都具妙此後每並清蹕紆至理村名光福里名厯次第黃童白叟紛迎途覲光雖愜衆所願麥田猶惜躪競趨漠漠一片連南北分疏不可味之則有餘梅事實足稱觀止長歌四叠供清娛何來有稱逺太湖西蹟更闢山蹊殊楊魁奏進西蹟山程園圖在鄧尉西北山蹊窈曲泉石殊勝且南去太湖不百步可以近供眺覽乃於其地復搆數宇實覺踵事增華而結搆已成若不一至又未免孤其誠意亦成事不說耳石泉梅塢精㸃景欲與鄧尉較勝輸雙目之賞何多需心知此舉誠為疏擬遂回輿拚弗到又憐作者誠意孤增華踵事可長此後言寧免云巡吳後言寧免云巡吳摛詞先用自訟夫遊西蹟程園紀事成詠鄧尉復西去蓋行十餘里西蹟山在焉程氏園居彼志云無多景潭西差勝耳見一統志大吏修葺之供攬太湖水事成乃弗說一涉聊為此髙下度小嶺溪村凡經幾到亦未逾時坐亦未移晷屋雖謝丹雘石乃多砌壘其松非古遺其梅或新徙獨是太湖近憑欄觀足底白浮及漫山飣餖如置几何殊靈巗山臨湖榭在靈巗行宫內所視輕輿遂言旋卯出時踰已舁者覺過勞彼亦人之子易馬按轡行七十猶能爾過午還靈巗咨政戒怠弛誠馳驛觀山靈巗至程園往返八十餘里中途易馬還行館時已過午向尹繼善以馳驛觀山為比蓋以余逰覽所至憩不逾時於寓意而不留意之㫖誠有合耳倍由旬弗止顧謂大云可一再斯否園應還故主吾弗更去矣逰髙義園駐蹕靈巗有餘暇園逰髙義去非賒溪村處處聞流水春樹微微見落花徑路不殊昔年至景光恰值一時嘉門前連理荆猶在園外荆樹二本百餘年物數十年前始交合成連理范氏裔孫大同守瑶刻連理荆三字于樹田氏遺芳到范家法螺寺甫别髙義園言瞻法螺寺山路不十里遂造精微地何以識精微水明山復翠梵宇據深窈朴鮮莊嚴事風幡標法音雲峰矗螺髻左廂試展步微嫌飾㸃綴徒增淨域景未識如來意再題緑雲樓叠丁丑舊作韻靈巗清曉降山隂髙義法螺次第尋路便寒山寧可置春佳别墅得教臨千畦麥向緑中望七字詩從雲外吟陡憶當年掖輦處悵然難措此時心文廟文廟吳中古來瞻致仰欽胡為觀像設或可擬尸臨各省之文廟俱奉弟神位而吳中府學設像制雖非古然較周人以子為尸而父兄跪拜其下若尸年童稚則慮驚悸失儀如年及髫丱已有知識必且居之不安轉不若像設之妥神也秦漢後不行此制或職是故余嘗疑周人用尸事因瞻謁吳中文廟像設附識于此乙酉别成昔七旬重謁今敬思不踰矩敕命敢從心過紫陽書院書院以明學亦欲真材鑄况名曰紫陽晦翁教應溯寧徒詞藻貴甚之情面付德潛昔掌此或尚工章句而其實行卑沒後乃敗露德潛歸里為紫陽書院掌教雖詩文尚工而品行實卑後為徐述夔作詩序允廷臣議削奪爵諡向年書院題句朂以努力實修未免失之假借耳則我向所譽亦失假借處知人信難哉於豫改是懼題滄浪亭蘇城盤門側向有滄浪亭翠邏雖假山而其水誠清結構朴而雅頗具溪壑情云備來往官於此為送迎我昔曽一涉託意吟濯纓乙酉戲題此有不知誰是濯纓人之句即今興復别六計亷胥程治官應此亟惟亷清乃成寄語逰斯者勉實善副名即事於蘇州行宫作吳下艱逢十日晴浹旬開霽悅輿情人言巡狩符嘉兆我慮田疇誤早耕大吏都稱慶時若吳城二月下旬未雨詢之大吏均稱本年春雪盈尺繼以雨水兼之日內早霧沾潤農田並未缺雨等語然經旬晴霽未免厪念早耕耳深懷惟是念民生逰山玩景其餘事示意因之七字成欽定南巡盛典卷十六
